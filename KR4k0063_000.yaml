body:
  text: 三國演義第一部明羅貫中著目録第一回宴桃園豪傑三結義斬黃巾英雄首立功第二回張翼德怒鞭督郵何國舅謀誅宦豎第三回議溫明董卓叱丁原饋金珠李肅説呂布第四回廢漢帝陳留踐位謀董賊孟德獻刀第五回發矯詔諸鎮應曹公破關兵三英戰呂布第六回焚金闕董卓行凶匿玉璽孫堅背約第七回袁紹磐河戰公孫孫堅跨江擊劉表第八回王司徒巧使連環計董太師大鬧鳳儀亭第九回除暴凶呂布助司徒犯長安李傕聽賈詡第十回勤王室馬騰舉義報父仇曹操興師第十一回劉皇叔北海救孔融呂溫侯濮陽破曹操第十二回陶恭祖三讓徐州曹孟德大戰呂布第十三回李傕郭汜大交兵楊奉董承雙救駕第十四回曹孟德移駕幸許都呂奉先乘夜襲徐郡第十五回太史慈酣鬥小霸王孫伯符大戰嚴白虎第十六回呂奉先射戟轅門曹孟德敗師淯水第十七回袁公路大起七軍曹孟德會合三將第十八回賈文和料敵決勝夏侯惇拔矢啖睛第十九回下邳城曹操鏖兵白門樓呂布殞命第二十回曹阿瞞許田打圍董國舅內閣受詔第二十一回曹操煮酒論英雄關公賺城斬車胄第二十二回袁曹各起馬步三軍關張共擒王劉二將第二十三回禰正平裸衣罵賊吉太醫下毒遭刑第二十四回國賊行凶殺貴妃皇叔敗走投袁紹第二十五回屯土山關公約三事救白馬曹操解重圍第二十六回袁本初損兵折將關雲長挂印封金第二十七回美髯公千里走單騎漢壽侯五關斬六將第二十八回斬蔡陽兄弟釋疑會古城主臣聚義第二十九回小霸王怒斬于吉碧眼兒坐領江東第三十回戰官渡本初敗績劫烏巢孟德燒糧第三十一回曹操倉亭破本初玄德荊州依劉表第三十二回奪冀州袁尚爭鋒決漳河許攸獻計第三十三回曹丕乘亂納甄氏郭嘉遺計定遼東第三十四回蔡夫人隔屏聽密語劉皇叔躍馬過檀溪第三十五回玄德南漳逢隱淪單福新野遇英主第三十六回玄德用計襲樊城元直走馬薦諸葛第三十七回司馬徽再薦名士劉玄德三顧草廬第三十八回定三分隆中決策戰長江孫氏報仇第三十九回荊州城公子三求計博望坡軍師初用兵第四十回蔡夫人議獻荊州諸葛亮火燒新野第四十一回劉玄德攜民渡江趙子龍單騎救主第四十二回張翼德大鬧長阪橋劉豫州敗走漢津口第四十三回諸葛亮舌戰群儒魯子敬力排衆議第四十四回孔明用智激周瑜孫權決計破曹操第四十五回三江口曹操折兵群英會蔣幹中計第四十六回用奇謀孔明借箭獻密計黃蓋受刑第四十七回闞澤密獻詐降書龐統巧授連環計第四十八回宴長江曹操賦詩鎖戰船北軍用武第四十九回七星壇諸葛祭風三江口周瑜縱火第五十回諸葛亮智算華容關雲長義釋曹操第五十一回曹仁大戰東吳兵孔明一氣周公瑾第五十二回諸葛亮智辭魯肅趙子龍計取桂陽第五十三回關雲長義釋黃漢升孫仲謀大戰張文遠第五十四回吳國太佛寺看新郎劉皇叔洞房續佳偶第五十五回玄德智激孫夫人孔明二氣周公瑾第五十六回曹操大宴銅雀台孔明三氣周公瑾第五十七回柴桑口臥龍吊喪耒陽縣鳳雛理事第五十八回馬孟起興兵雪恨曹阿瞞割須棄袍第五十九回許褚裸衣鬥馬超曹操抹書間韓遂第六十回張永年反難楊修龐士元議取西蜀第六十一回趙雲截江奪阿斗孫權遺書退老瞞第六十二回取涪關楊高授首攻雒城黃魏爭功第六十三回諸葛亮痛哭龐統張翼德義釋嚴顔第六十四回孔明定計捉張任楊阜借兵破馬超第六十五回馬超大戰葭萌關劉備自領益州牧第六十六回關雲長單刀赴會伏皇后為國捐生第六十七回曹操平定漢中地張遼威震逍遙津第六十八回甘寧百騎劫魏營左慈擲杯戲曹操第六十九回卜周易管輅知機討漢賊五臣死節第七十回猛張飛智取瓦口隘老黃忠計奪天蕩山第七十一回占對山黃忠逸待勞據漢水趙雲寡勝衆第七十二回諸葛亮智取漢中曹阿瞞兵退斜穀第七十三回玄德進位漢中王雲長攻拔襄陽郡第七十四回龐令明擡櫬決死戰關雲長放水淹七軍第七十五回關雲長刮骨療毒呂子明白衣渡江第七十六回徐公明大戰沔水關雲長敗走麥城第七十七回玉泉山關公顯聖洛陽城曹操感神第七十八回治風疾神醫身死傳遺命姦雄數終第七十九回兄逼弟曹植賦詩侄陷叔劉封伏法第八十回曹丕廢帝篡炎劉漢王正位續大統第八十一回急兄仇張飛遇害雪弟恨先主興兵第八十二回孫權降魏受九錫先主征吳賞六軍第八十三回戰猇亭先主得仇人守江口書生拜大將第八十四回陸遜營燒七百里孔明巧布八陳圖第八十五回劉先主遣詔托孤兒諸葛亮安居平五路第八十六回難張溫秦宓逞天辨破曹丕徐盛用火攻第八十七回征南寇丞相大興師抗天兵蠻王初受執第八十八回渡瀘水再縛番王識詐降三擒孟獲第八十九回武鄉侯四番用計南蠻王五次遭擒第九十回驅巨獸六破蠻兵燒藤甲七擒孟獲第九十一回祭瀘水漢相班師伐中原武侯上表第九十二回趙子龍力斬五將諸葛亮智取三城第九十三回薑伯約歸降孔明武鄉侯罵死王朗第九十四回諸葛亮乘雪破羌兵司馬懿克日擒孟達第九十五回馬謖拒諫失街亭武侯彈琴退仲達第九十六回孔明揮淚斬馬謖周魴斷發賺曹休第九十七回討魏國武侯再上表破曹兵薑維詐獻書第九十八回追漢軍王雙受誅襲陳倉武侯取勝第九十九回諸葛亮大破魏兵司馬懿入寇西蜀第一百回漢兵劫寨破曹真武侯鬥陳辱仲達第一百一回出隴上諸葛妝神奔劍閣張中計第一百二回司馬懿占北原渭橋諸葛亮造木牛流馬第一百三回上方谷司馬受困五太原諸葛禳星第一百四回隕大星漢丞相歸天見木像魏都督喪膽第一百五回武侯預伏錦囊計魏主拆取承露盤第一百六回公孫淵兵敗死襄平司馬懿詐病賺曹爽第一百七回魏主政歸司馬氏薑維兵敗牛頭山第一百八回丁奉雪中奮短兵孫峻席間施密計第一百九回困司馬漢將奇謀廢曹芳魏家果報第一百十回文鴦單騎退雄兵薑維背水破大敵第一百十一回鄧士載智敗薑伯約諸葛誕義討司馬昭第一百十二回救壽春於詮死節取長城伯約鏖兵第一百十三回丁奉定計斬孫綝薑維鬥陳破鄧艾第一百十四回曹髦驅車死南闕薑維棄糧勝魏兵第一百十五回詔班師後主信讒托屯田薑維避禍第一百十六回鍾會分兵漢中道武侯顯聖定軍山第一百十七回鄧士載偷度陰平諸葛瞻戰死綿竹第一百十八回哭祖廟一王死孝入西川二士爭功第一百十九回假投降巧計成虛話再受禪依樣畫葫蘆第一百二十回薦杜預老將獻新謀降孫皓三分歸一統
