body:
  text: 第一回宴桃園豪傑三結義斬黃巾英雄首立功話説天下大勢分久必合合久必分周末七國分爭並入于秦及秦滅之後楚漢分爭又並入於漢漢朝自高祖斬白蛇而起義一統天下後來光武中興傳至獻帝遂分為三國推其致亂之由殆始於桓靈二帝桓帝禁錮善類崇信宦官及桓帝崩靈帝即位大將軍竇武太傅陳蕃共相輔佐時有宦官曹節等弄權竇武陳蕃謀誅之機事不密反為所害中涓自此愈橫建寧二年四月望日帝禦溫德殿方升座殿角狂風驟起只見一條大青蛇從梁上飛將下來蟠於椅上帝驚倒左右急救入宮百官俱奔避須臾蛇不見了忽然大雷大雨加以冰雹落到半夜方止壞卻房屋無數建寧四年二月洛陽地震又海水泛溢沿海居民盡被大浪捲入海中光和元年雌雞化雄六月朔黑氣十餘丈飛入溫德殿中秋七月有虹現於玉堂五原山岸盡皆崩裂種種不祥非止一端帝下詔問群臣以災異之由議郎蔡雍上疏以為霓墮雞化乃婦寺幹政之所致言頗切直帝覽奏歎息因起更衣曹節在後竊視悉宣告左右遂以他事陷雍於罪放歸田裏後張讓趙忠封諝段圭曹節侯覽蹇碩程曠夏惲郭勝十人朋比為姦號為十常侍帝尊信張讓呼為阿父朝政日非以致天下人心思亂盜賊蜂起時巨鹿郡有兄弟三人一名張角一名張寶一名張梁那張角本是個不第秀才因入山采藥遇一老人碧眼童顔手執藜杖喚角至一洞中以天書三卷授之曰此名太平要術汝得之當代天宣化普救世人若萌異心必獲惡報角拜問姓名老人曰吾乃南華老仙也言訖化陳清風而去角得此書曉夜攻習能呼風喚雨號為太平道人中平元年正月內疫氣流行張角散施符水為人治病自稱大賢良師角有徒弟五百余人雲遊四方皆能書符念咒次後徒衆日多角乃立三十六方大方萬餘人小方六七千各立渠帥稱為將軍訛言蒼天已死黃天當立歲在甲子天下大吉令人各以白土書甲子二字於家中大門上青幽徐冀荊揚兗豫八州之人家家侍奉大賢良師張角名字角遣其黨馬元義暗齎金帛結交中涓封諝以為內應角與二角商議曰至難得者民心也今民心已順若不乘勢取天下誠為可惜遂一面私造黃旗約期舉事一面使弟子唐周馳書報封諝唐周乃徑赴省中告變帝召大將軍何進調兵擒馬元義斬之次收封諝等一干人下獄張角聞知事露星夜舉兵自稱天公將軍張寶稱地公將軍張梁稱人公將軍申言於衆曰今漢運將終大聖人出汝等皆宜順天從正以樂太平四方百姓裹黃巾從張角反者四五十萬賊勢浩大官軍望風而靡何進奏帝火速降詔令各處備禦討賊立功一面遣中郎將盧植皇甫嵩朱雋各引精兵分三路討之且説張角一軍前犯幽州界分幽州太守劉焉乃江夏竟陵人氏漢魯恭王之後也當時聞得賊兵將至召校尉鄒靖計議靖曰賊兵衆我兵寡明公宜作速招軍應敵劉焉然其説隨即出榜招募義兵榜文行到涿縣引出涿縣中一個英雄那人不甚好讀書性寬和寡言語喜怒不形於色素有大志專好結交天下豪傑生得身長七尺五寸兩耳垂肩雙手過膝目能自顧其耳面如冠玉唇若塗脂中山靖王劉勝之後漢景帝閣下玄孫姓劉名備字玄德昔劉勝之子劉貞漢武時封涿鹿亭侯後坐酎金失侯因此遺這一枝在涿縣玄德祖劉雄父劉弘弘曾舉孝廉亦嘗作吏早喪玄德幼孤事母至孝家貧販屨織席為業家住本縣樓桑村其家之東南有一大桑樹高五丈餘遙望之童童如車蓋相者雲此家必出貴人玄德幼時與鄉中小兒戲於樹下曰我為天子當乘此車蓋叔父劉元起奇其言曰此兒非常人也因見玄德家貧常資給之年十五歲母使遊學嘗師事鄭玄盧植與公孫瓚等為友及劉焉發榜招軍時玄德年已二十八歲矣當日見了榜文慨然長歎隨後一人厲聲言曰大丈夫不與國家出力何故長歎玄德回視其人身長八尺豹頭環眼燕頷虎須聲若巨雷勢如奔馬玄德見他形貌異常問其姓名其人曰某姓張名飛字翼德世居涿郡頗有莊田賣酒屠豬專好結交天下豪傑恰才見公看榜而歎故此相問玄德曰我本漢室宗親姓劉名備今聞黃巾倡亂有志欲破賊安民恨力不能故長歎耳飛曰吾頗有資財當招募鄉勇與公同舉大事如何玄德甚喜遂與同入村店中飲酒正飲間見一大漢推著一輛車子到店門首歇了入店坐下便喚酒保快斟酒來吃我待趕入城去投軍玄德看其人身長九尺髯長二尺面如重棗唇若塗脂丹鳳眼臥蠶眉相貌堂堂威風凜凜玄德就邀他同坐叩其姓名其人曰吾姓關名羽字長生後改雲長河東解良人也因本處勢豪倚勢淩人被吾殺了逃難江湖五六年矣今聞此處招軍破賊特來應募玄德遂以己志告之雲長大喜同到張飛莊上共議大事飛曰吾莊後有一桃園花開正盛明日當於園中祭告天地我三人結為兄弟協力同心然後可圖大事玄德雲長齊聲應曰如此甚好次日於桃園中備下烏牛白馬祭禮等項三人焚香再拜而説誓曰念劉備關羽張飛雖然異姓既結為兄弟則同心協力救困扶危上報國家下安黎庶不求同年同月同日生只願同年同月同日死皇天後土實鑒此心背義忘恩天人共戮誓畢拜玄德為兄關羽次之張飛為弟祭罷天地復宰牛設酒聚鄉中勇士得三百餘人就桃園中痛飲一醉來日收拾軍器但恨無馬匹可乘正思慮間人報有兩個客人引一夥伴當趕一群馬投莊上來玄德曰此天佑我也三人出莊迎接原來二客乃中山大商一名張世平一名蘇雙每年往北販馬近因寇發而回玄德請二人到莊置酒管待訴説欲討賊安民之意二客大喜願將良馬五十匹相送又贈金銀五百兩鑌鐵一千斤以資器用玄德謝別二客便命良匠打造雙股劍雲長造青龍偃月刀又名冷豔鋸重八十二斤張飛造丈八點鋼矛各置全身鎧甲共聚鄉勇五百餘人來見鄒靖鄒靖引見太守劉焉三人參見畢各通姓名玄德説起宗派劉焉大喜遂認玄德為侄不數日人報黃巾賊將程遠志統兵五萬來犯涿郡劉焉令鄒靖引玄德等三人統兵五百前去破敵玄德等欣然領軍前進直至大興山下與賊相見賊衆皆披發以黃巾抹額當下兩軍相對玄德出馬左有雲長右有翼德揚鞭大罵反國逆賊何不早降程遠志大怒遣副將鄧茂出戰張飛挺丈八蛇矛直出手起處刺中鄧茂心窩翻身落馬程遠志見折了鄧茂拍馬舞刀直取張飛雲長舞動大刀縱馬飛迎程遠志見了早吃一驚措手不及被雲長刀起處揮為兩段後人有詩贊二人曰英雄露穎在今朝一試矛兮一試刀初出便將威力展三分好把姓名標衆賊見程遠志被斬皆倒戈而走玄德揮軍追趕投降者不計其數大勝而回劉焉親自迎接賞勞軍士次日接得青州太守龔景牒文言黃巾賊圍城將陷乞賜救援劉焉與玄德商議玄德曰備願往救之劉焉令鄒靖將兵五千同玄德關張投青州來賊衆見救軍至分兵混戰玄德兵寡不勝退三十裏下寨玄德謂關張曰賊衆我寡必出奇兵方可取勝乃分關公引一千軍伏山左張飛引一千軍伏山右鳴金為號齊出接應次日玄德與鄒靖引軍鼓噪而進賊衆迎戰玄德引軍便退賊衆乘勢追趕方過山嶺玄德軍中一齊鳴金左右兩軍齊出玄德麾軍回身復殺三路夾攻賊衆大潰直趕至青州城下太守龔景亦率民兵出城助戰賊勢大敗剿戮極多遂解青州之圍後人有詩贊玄德曰運籌決算有神功二虎還須遜一龍初出便能垂偉績自應分鼎在孤窮龔景犒軍畢鄒靖欲回玄德曰近聞中郎將盧植與賊首張角戰于廣宗備昔曾師事盧植欲往助之於是鄒靖引軍自回玄德與關張引本部五百人投廣宗來至盧植軍中入帳施禮具道來意盧植大喜留在帳前聽調時張角賊衆十五萬植兵五萬相拒于廣宗未見勝負植謂玄德曰我今圍賊在此賊弟張梁張寶在潁川與皇甫嵩朱雋對壘汝可引本部人馬我更助汝一千官軍前去潁川打探消息約期剿捕玄德領命引軍星夜投潁川來時皇甫嵩朱雋領軍拒賊賊戰不利退入長社依草結營嵩與雋計曰賊依草結營當用火攻之遂令軍士每人束草一把暗地埋伏其夜大風忽起二更以後一齊縱火嵩與雋各引兵攻擊賊寨火焰張天賊衆驚慌馬不及鞍人不及甲四散奔走殺到天明張梁張寶引敗殘軍士奪路而走忽見一彪軍馬盡打紅旗當頭來到截住去路為首閃出一將身長七尺細眼長髯官拜騎都尉沛國譙郡人也姓曹名操字孟德操父曹嵩本姓夏侯氏因為中常侍曹騰之養子故冒姓曹曹嵩生操小字阿瞞一名吉利操幼時好遊獵喜歌舞有權謀多機變操有叔父見操遊蕩無度嘗怒之言于曹嵩嵩責操操忽心生一計見叔父來詐倒於地作中風之狀叔父驚告嵩嵩急視之操故無恙嵩曰叔言汝中風今已愈乎操曰兒自來無此病因失愛于叔父故見罔耳嵩信其言後叔父但言操過嵩並不聽因此操得恣意放蕩時人有橋玄者謂操曰天下將亂非命世之才不能濟能安之者其在君乎南陽何顒見操言漢室將亡安天下者必此人也汝南許劭有知人之名操往見之問曰我何如人邵不答又問劭曰子治世之能臣亂世之姦雄也操聞言大喜年二十舉孝廉為郎除洛陽北部尉初到任即設五色棒十余條於縣之四門有犯禁者不避豪貴皆責之中常侍蹇碩之叔提刀夜行操巡夜拿住就棒責之由是內外莫敢犯者威名頗震後為頓丘令因黃巾起拜為騎都尉引馬步軍五千前來潁川助戰正值張梁張寶敗走曹操攔住大殺一陳斬首萬餘級奪得旗幡金鼓馬匹極多張梁張寶死戰得脫操見過皇甫嵩朱雋隨即引兵追襲張梁張寶去了卻説玄德引關張來潁川聽得喊殺之聲又望見火光燭天急引兵來時賊已敗散玄德見皇甫嵩朱雋具道盧植之意嵩曰張梁張寶勢窮力乏必投廣宗去依張角玄德可即星夜往助玄德領命遂引兵復回到得半路只見一簇軍馬護送一輛檻車車中之囚乃盧植也玄德大驚滾鞍下馬問其緣故植曰我圍張角將次可破因角用妖術未能即勝朝廷差黃門左豐前來體探問我索取賄賂我答曰軍糧尚缺安有餘錢奉承天使左豐挾恨回奏朝廷説我高壘不戰惰慢軍心因此朝廷震怒遣中郎將董卓來代將我兵取我回京問罪張飛聽罷大怒要斬護送軍人以救盧植玄德急止之曰朝廷自有公論汝豈可造次軍士簇擁盧植去了關公曰盧中郎已被逮別人領兵我等去無所依不如且回涿郡玄德從其言遂引軍北行行無二日忽聞山後喊聲大震玄德引關張縱馬上高岡望之見漢軍大敗後面漫山塞野黃巾蓋地而來旗上大書天公將軍玄德曰此張角也可速戰三人飛馬引軍而出張角正殺敗董卓乘勢趕來忽遇三人衝殺角軍大亂敗走五十餘裏三人救了董卓回寨卓問三人現居何職玄德曰白身卓甚輕之不為禮玄德出張飛大怒曰我等親赴血戰救了這廝他卻如此無禮若不殺之難消我氣便要提刀入帳來殺董卓正是人情勢利古猶今誰識英雄是白身安得快人如翼德盡誅世上負心人畢竟董卓性命如何且聽下文分解
