body:
  text: 第三回議溫明董卓叱丁原饋金珠李肅説呂布且説曹操當日對何進曰宦官之禍古今皆有但世主不當假之權寵使至於此若欲治罪當除元惡但付一獄吏足矣何必紛紛召外兵乎欲盡誅之事必宣露吾料其必敗也何進怒曰孟德亦懷私意耶操退曰亂天下者必進也進乃暗差使命齎密詔星夜往各鎮去卻説前將軍鼇鄉侯西涼刺史董卓先為破黃巾無功朝議將治其罪因賄賂十常侍幸免後又結托朝貴遂任顯官統西州大軍二十萬常有不臣之心是時得詔大喜點起軍馬陸續便行使其壻中將牛輔守住陝西自己卻帶李傕郭汜張濟樊稠等提兵望洛陽進發卓壻謀士李儒曰今雖奉詔中間多有暗昧何上差人上表名正言順大事可圖卓大喜遂上表其略曰竊聞天下所以亂逆不止者皆由黃門常侍張讓等侮慢天常之故臣聞揚湯止沸不如去薪潰癰雖痛勝於養毒臣敢鳴鐘鼓入洛陽請除讓等社稷幸甚天下幸甚何進得表出示大臣侍禦史鄭泰諫曰董卓乃豺狼也引入京城必食人矣進曰汝多疑不足謀大事盧植亦諫曰植素知董卓為人面善心狠一入禁庭必生禍患不如止之勿來免致生亂進不聽鄭泰盧植皆棄官而去朝廷大臣去者大半進使人迎董卓于澠池卓按兵不動張讓等知外兵到共議曰此何進之謀也我等不先下手皆滅族矣乃先伏刀斧手五十人于長樂宮嘉德門內入告何太后曰今大將軍矯詔召外兵至京師欲滅臣等望娘娘垂憐賜救太后曰汝等可詣大將軍府謝罪讓曰若到相府骨肉齏粉矣望娘娘宣大將軍入宮諭止之如其不從臣等只就娘娘前請死太后乃降詔宣進進得詔便行主簿陳琳諫曰太后此詔必是十常侍之謀切不可去去必有禍進曰太后詔我有何禍事袁紹曰今謀已泄事已露將軍尚欲入宮耶曹操曰先召十常待出然後可入進笑曰此小兒之見也吾掌天下之權十常侍敢待如何紹曰公必欲去我等引甲士護從以防不測於是袁紹曹操各選精兵五百命袁紹之弟袁術領之袁術全身披挂引兵布列青瑣門外紹與操帶劍護送何進至長樂宮前黃門傳懿旨雲太后特宣大將軍余人不許輒入將袁紹曹操等都阻住宮門外何進昂然直入至嘉德殿門張讓段圭迎出左右圍住進大驚讓厲聲責進曰董後何罪妄以鴆死國母喪葬托疾不出汝本屠沽小輩我等薦之天子以致榮貴不思報效欲相謀害汝言我等甚濁其清者是誰進慌急欲尋出路宮門盡閉伏甲齊出將何進砍為兩段後人有詩歎之曰漢室傾危天數終無謀何進作三公幾番不聽忠臣諫難免宮中受劍鋒讓等既殺何進袁紹久不見進出乃于宮門外大叫曰請將軍上車讓等將何進首級從牆上擲出宣諭曰何進謀反已伏誅矣其餘脅從盡皆赦宥袁紹厲聲大叫閹官謀殺大臣誅惡黨者前來助戰何進部將吳匡便於青瑣門外放起火來袁術引兵突入宮廷但見閹官不論大小盡皆殺之袁紹曹操斬關入內趙忠程曠夏惲郭勝四個被趕至翠花樓前剁為肉泥宮中火焰沖天張讓段圭曹節侯覽將太后及太子並陳留王劫去內省從後道走北宮時盧植棄官未去見宮中事變擐甲持戈立于閣下遙見段圭擁逼何後過來植大呼曰段圭逆賊安敢劫太后段圭回身便走太后從窗中跳出植急救得免吳匡殺入內庭見何苗亦提劍出匡大呼曰何苗同謀害兄當共殺之衆人俱曰願斬謀兄之賊苗欲走四面圍定砍為齏粉紹復令軍士分頭來殺十常侍家屬不分大小盡皆誅絶多有無須者誤被殺死曹操一面救滅宮中之火請何太后權攝大事遣兵追襲張讓等尋覓少帝且説張讓段圭劫擁少帝及陳留王冒煙突火連夜奔走至北邙山約二更進分後面喊聲大舉人馬趕至當前河南中部掾吏閔貢大呼逆賊休走張讓見事急遂投河而死帝與陳留王未知虛實不敢高聲伏于河邊亂草之內軍馬四散去趕不知帝之所在帝與王伏至四更露水又下腹中飢餒相擠而哭又怕人知覺吞聲草莽之中陳留王曰此間不可久戀須別尋活路於是二人以衣相結爬上岸邊滿地荊棘黑暗之中不見行路正無奈何忽有流螢千百成群光芒照耀只在帝前飛轉陳留王曰此天助我兄弟也遂隨螢光而行漸漸見路行至五更足痛不能行山岡邊見一草堆帝與王臥於草畔草堆前面是一所莊院莊主是夜夢兩紅日墜于莊後驚覺披衣出戶四下觀望見莊後草堆上紅光沖天慌忙往視卻是二人臥於草堆之畔莊主問曰二少年誰家之子帝不敢應陳留王指帝曰此是當今皇帝遭十常侍之亂逃難到此吾乃皇弟陳留王也莊主大驚再拜曰臣先朝司徒崔烈之弟崔毅也因見十常侍賣官嫉賢故隱於此遂扶帝入莊跪進酒食卻説閔貢趕上段圭拿住問天子何在圭言已在半路相失不知何往貢遂殺段圭懸頭于馬項下分兵四散尋覓自己卻獨乘一馬隨路追尋偶至崔毅莊毅見首級問之貢説詳細崔毅引貢見帝君臣痛哭貢曰國不可一日無君請陛下還都崔毅莊上止有瘦馬一匹備與帝乘貢與陳留王共乘一馬離莊而行不到三裏司徒王允大尉楊彪左軍校尉淳于瓊右軍校尉趙萌後軍校尉鮑信中軍校尉袁紹一行人衆數百人馬接著車駕君臣皆哭先使人將段圭首級往京師號令另換好馬與帝及陳留王騎坐簇帝還京先是洛陽小兒謠曰帝非帝王非王千乘萬騎走北邙至此果應其讖車駕行不到數裏忽見旌旗蔽日塵土遮天一枝人馬到來百官失色帝亦大驚袁紹驟馬出問何人繡旗影裏一將飛出厲聲問天子何在帝戰栗不能言陳留王勒馬向前叱曰來者何人卓曰西涼刺史董卓也陳留王曰汝來保駕耶汝來劫駕耶卓應曰特來保駕陳留王曰既來保駕天子在此何不下馬卓大驚慌忙下馬拜于道左陳留王以言撫慰董卓自初至終並無失語卓暗奇之已懷廢立之意是日還宮見何太后俱各痛哭檢點宮中不見了傳國玉璽董卓屯兵城外每日帶鐵甲馬軍入城橫行街市百姓惶惶不安卓出入宮庭略無忌憚後軍校尉鮑信來見袁紹言董卓必有異心可速除之紹曰朝廷新定未可輕動鮑信見王允亦言其事允曰且容商議信自引本部軍兵投泰山去了董卓招誘何進兄弟部下之兵盡歸掌握私謂李儒曰吾欲廢帝立陳留王何如李儒曰今朝廷無主不就此時行事遲則有變矣來日于溫明園中召集百官諭以廢立有不從者斬之則威權之行正在今日卓喜次日大排筵會遍請公卿公卿皆懼董卓誰敢不到卓待百官到了然後徐徐到園門下馬帶劍入席酒行數巡卓教停酒止樂乃厲聲曰吾有一言衆官靜聽衆皆側耳卓曰天子為萬民之主無威儀不可以奉宗社稷今上懦弱不若陳留王聰明好學可承大位吾欲廢帝立陳留王諸大臣以為何如諸官聽罷不敢出聲座上一人推案直出立于筵前大呼不可不可汝是何人敢發大語天子乃先帝嫡子初無過失何得妄議廢立汝欲為篡逆耶卓視之乃荊州刺史丁原也卓怒叱曰順我者生逆我者死遂掣佩劍欲斬丁原時李儒見丁原背後一人生得器宇軒昂威風凜凜手執方天畫戟怒目而視李儒急進曰今日飲宴之處不可談國政來日向都堂公論未遲衆人皆勸丁原上馬而去卓問百官曰吾所言合公道否盧植曰明公差矣昔太甲不明伊尹放之于桐宮昌邑王登位方二十七日造惡三千餘條故霍光告太廟而廢之今上雖幼聰明仁智並無分毫過失公乃外郡刺史素未參與國政又無伊霍之大才何可強主廢立之事聖人雲有伊尹之志則可無伊尹之志則篡也卓大怒拔劍向前欲殺植侍中蔡雍議郎彭伯諫曰盧尚書海內人望今先害之恐天下震怖卓乃止司徒王允曰廢立之事不可酒後相商另日再議於是百官皆散卓按劍立於園門忽見一人躍馬持戟於園門外往來馳驟卓問李儒此何人也儒曰此丁原義兒姓呂名布字奉先者也主公且須避之卓乃入園潛避次日人報丁原引軍城外搦戰卓怒引軍同李儒出迎兩陳對圓只見呂布頂束發金冠披百花戰袍擐唐猊鎧甲系獅蠻寶帶縱馬挺戟隨丁建陽出到陳前建陽指卓罵曰國家不幸閹官弄權以致萬民塗炭爾無尺寸之功焉敢妄言廢立欲亂朝廷董卓未及回言呂布飛馬直殺過來董卓慌走建陽率軍掩殺卓兵大敗退三十餘裏下寨聚衆商議卓曰吾觀呂布非常人也吾若得此人何慮天下哉帳前一人出曰主公勿憂某與呂布同鄉知其勇而無謀見利忘義某憑三寸不爛之舌説呂布拱手來降可乎卓大喜觀其人乃虎賁中郎將李肅也卓曰汝將何以説之肅曰某聞主公有名馬一匹號曰赤兔日行千里須得此馬再用金珠以利結其心某更進説詞呂布必反丁原來投主公矣卓問李儒曰此言可乎儒曰主公欲取天下何惜一馬卓欣然與之更與黃金一千兩明珠數十顆玉帶一條李肅齎了禮物投呂布寨來伏路軍人圍住肅曰可速報呂將軍有故人來見軍人報知布命入見肅見布曰賢弟別來無恙布揖曰久不相見今居何處肅曰現任虎賁中郎將之職聞賢弟匡扶社稷不勝之喜有良馬一匹日行千里渡水登山如履平地名曰赤兔特獻與賢弟以助虎威布便令牽過來看果然那馬渾身上下火炭般赤無半根雜毛從頭至尾長一丈從蹄至項高八尺嘶喊咆哮有騰空入海之狀後人有詩單道赤兔馬曰奔騰千里蕩塵埃渡水登山紫霧開掣斷絲韁搖玉轡火龍飛下九天來布見了此馬大喜謝肅曰兄賜此龍駒將何以為報肅曰某為義氣而來豈望報乎布置酒相待酒酣肅曰肅與賢弟少得相見令尊卻常會來布曰兄醉矣先父棄世多年安得與兄相會肅大笑曰非也某説今日丁刺史耳布惶恐曰某在丁建陽處亦出於無奈肅曰賢弟有擎天駕海之才四海孰不欽敬功名富貴如探囊取物何言無奈而在人之下乎布曰恨不逢其主耳肅笑曰良禽擇木而棲賢臣擇主而事見機不早悔之晚矣布曰兄在朝廷觀何人為世之英雄肅曰某遍觀群臣皆不如董卓董卓為人敬賢禮士賞罰分明終成大業布曰某欲從之恨無門路肅取金珠玉帶列於布前布驚曰何為有此肅令叱退左右告布曰此是董公久慕大名特令某將此奉獻赤免馬亦董公所贈也布曰董公如此見愛某將何以報之肅曰如某之不才尚為虎賁中郎將公若到彼貴不可言布曰恨無涓埃之功以為進見之禮肅曰功在翻手之間公不肯為耳布沈吟良久曰吾欲殺丁原引軍歸董卓何如肅曰賢弟若能如此真莫大之功也但事不宜遲在於速決布與肅約於明日來降肅別去是夜二更時分布提刀徑入丁原帳中原正秉燭觀書見布至曰吾兒來有何事故布曰吾堂堂丈夫安肯為汝子乎原曰奉先何故心變布向前一刀砍下丁原首級大呼左右丁原不仁吾已殺之肯從吾者在此不從者自去軍士散其大半次日布持丁原首級往見李肅肅遂引布見卓卓大喜置酒相待卓先下拜曰卓今得將軍如旱苗之得甘雨也布納卓坐而拜之曰公若不棄布請拜為義父卓以金甲錦袍賜布暢飲而散卓自是威勢越大自領前將軍事封弟董旻為左將軍鄠侯封呂布為騎都尉中郎將都亭侯李儒勸卓早定廢立之計卓乃於省中設宴會集公卿令呂布將甲士千余侍衛左右是日太傅袁隗與百官皆到酒行數巡卓按劍曰今上暗弱不可以奉宗廟吾將依伊尹霍光故事廢帝為弘農王立陳留王為帝有不從者斬群臣惶怖莫敢對中軍校尉袁紹挺身出曰今上即位未幾並無失德汝欲廢嫡立庶非反而何卓怒曰天下事在我我今為之誰敢不從汝視我之劍不利否袁紹亦拔劍曰汝劍利吾劍未嘗不利兩個在筵上對敵正是丁原仗義身先喪袁紹爭鋒勢之危畢竟袁紹性命如何且聽下文分解
