body:
  text: 第四回廢漢帝陳留踐位謀董賊孟德獻刀且説董卓欲殺袁紹李儒止之曰事未可定不可妄殺袁紹手提寶劍辭別百官而出懸節東門奔冀州去了卓謂太傅袁隗曰汝侄無禮吾看汝面姑恕之廢立之事若何隗曰太尉所見是也卓曰敢有阻大議者以軍法從事群臣震恐皆雲一聽尊命宴罷卓問侍中周毖校尉伍瓊曰袁紹此去若何周毖曰袁紹忿忿而去若購之急勢必為變且袁氏樹恩四世門生故吏遍於天下倘收豪傑以聚徒衆英雄因之而起山東非公有也不如赦之拜為一郡守則紹喜於免罪必無患矣伍瓊曰袁紹好謀無斷不足為慮誠不若加之一郡守以收民心卓從之即日差人拜紹為渤海太守九月朔請帝升嘉德殿大會文武卓拔劍在手對衆曰天子暗弱不足以君天下今有策文一道宜為宣讀乃命李儒讀策曰孝靈皇帝早棄臣民皇帝承嗣海內側望而帝天資輕佻威儀不恪居喪慢惰否德既彰有忝大位皇太后教無母儀統政荒亂永樂太后暴崩衆論惑焉三綱之道天地之紀毋乃有闕陳留王協聖德偉懋規矩肅然居喪哀戚言不以邪休聲美譽天下所聞宜承洪業為萬世統茲廢皇帝為弘農王皇太后還政請奉陳留王為皇帝應天順人以慰生靈之望李儒讀策畢卓叱左右扶帝下殿解其璽綬北面長跪稱臣聽命又呼太后去服候敕帝後皆號哭群臣無不悲慘階下一大臣憤怒高叫曰賊臣董卓敢為欺天之謀吾當以頸血濺之揮手中象簡直擊董卓卓大怒喝武士拿下乃尚書丁管也卓命牽出斬之管罵不絶口至死神色不變後人有詩歎之曰董賊潛懷廢立圖漢家宗社委丘虛滿朝臣宰皆囊括惟有丁公是丈夫卓請陳留王登殿群臣朝賀畢卓命扶何太后並弘農王及帝妃唐氏永安宮間住封鎖宮門禁群臣無得擅入可憐少帝四月登基至九月即被廢卓所立陳留王協表字伯和靈帝中子即獻帝也時年九歲改元初平董卓為相國贊拜不名入朝不趨劍履上殿威福莫比李儒勸卓擢用名流以收人望因薦蔡雍之才卓命征之雍不赴卓怒使人謂雍曰如不來當滅汝族雍懼只得應命而至卓見雍大喜一月三遷其官拜為侍中甚見親厚卻説少帝與何太后唐妃困于永安宮中衣服飲食漸漸少缺少帝淚不曾幹一日偶見雙燕飛於庭中遂吟詩一首詩曰嫩草緑凝煙嫋嫋雙飛燕洛水一條青陌上人稱羡遠望碧雲深是吾舊宮殿何人仗忠義泄我心中怨董卓時常使人探聽是日獲得此詩來呈董卓卓曰怨望作詩殺之有名矣遂命李儒帶武士十人入宮弒帝帝與後妃正在樓上宮女報李儒至帝大驚儒以鴆酒奉帝帝問何故儒曰春日融和董相國特上壽酒太后曰既雲壽酒汝可先飲儒怒曰汝不飲耶呼左右持短刀白練於前曰壽酒不飲可領此二物唐妃跪告曰妾身代帝飲酒願公存母子性命儒叱曰汝何人可代王死乃舉酒與何太后曰汝可先飲後大罵何進無謀引賊入京致有今日之禍儒催逼帝帝曰容我與太後作別乃大慟而作歌其歌曰天地易兮日月翻棄萬乘兮退守藩為臣逼兮命不久大勢去兮空淚潸唐妃亦作歌曰皇天將崩兮後土頽身為帝姬兮命不隨生死異路兮從此畢奈何煢速兮心中悲歌罷相抱而哭李儒叱曰相國立等回報汝等俄延望誰救耶太后大罵董賊逼我母子皇天不佑汝等助惡必當滅族儒大怒雙手扯住太后直攛下樓叱武士絞死唐妃以鴆酒灌殺少帝還報董卓卓命葬於城外自此每夜入宮姦淫宮女夜宿龍床嘗引軍出城行到陽城地方時當二月村民社賽男女皆集卓命軍士圍住盡皆殺之掠婦女財物裝載車上懸頭千余顆于車下連軫還都揚言殺賊人勝而回於城門外焚燒人頭以婦女財物分散衆軍越騎校尉伍孚字德瑜見卓暴殘憤恨不平嘗於朝服內披小鎧藏短刀欲伺便殺卓一日卓入朝孚迎至閣下拔刀直刺卓卓氣力大兩手摳住呂布便入揪倒伍孚卓問曰誰教汝反孚瞪目大喝曰汝非吾君吾非汝臣何反之有汝罪惡盈天人人願得而誅之吾恨不車裂汝以謝天下卓大怒命牽出剖剮之孚至死罵不絶口後人有詩贊之曰漢末忠臣説伍孚沖天豪氣世間無朝堂殺賊名猶在萬古堪稱大丈夫董卓自此出入常帶甲士護衛時袁紹在渤海聞知董卓弄權乃差人齎密書來見王允書略曰卓賊欺天廢主人不忍言而公恣其跋扈如不聽聞豈報國效忠之臣哉紹今集兵練卒欲掃清王室未敢輕動公若有心當乘間圖之如有驅使即當奉命王允得書尋思無計一日于侍班閣子內見舊臣俱在允曰今日老夫賤降晚間敢屈衆位到舍小酌衆官皆曰必來祝壽當晚王允設宴後堂公卿皆至酒行數巡王允忽然掩面大哭衆官驚問曰司徒貴誕何故發悲允曰今日並非賤降因欲與衆位一敘恐董卓見疑故托言耳董卓欺主弄權社稷旦夕難保想高皇誅秦滅楚奄有天下誰想傳至今日乃喪于董卓之手此吾所以哭也於是衆官皆哭坐中一人撫掌大笑曰滿朝公卿夜哭到明明哭到夜還能哭死董卓否允視之乃驍騎校尉曹操也允怒曰汝祖宗亦食祿漢朝今不思報國而反笑耶操曰吾非笑別事笑衆位無一計殺董卓耳操雖不才願即斷董卓頭懸之都門以謝天下允避席問曰孟德有何高見操曰近日操屈身以事卓者實欲乘間圖之耳今卓頗信操操因得時近卓聞司徒有七寶刀一口願借與操入相府刺殺之雖死不恨允曰孟德果有是心天下幸甚遂親自酌酒奉操操瀝酒設誓允隨取寶刀與之操藏刀飲酒畢即起身辭別衆官而去衆官又坐了一回亦俱散訖次日曹操佩著寶刀來至相府問丞相何在從人雲在小閣中操徑入見董卓坐於床上呂布侍立於側卓曰孟德來何遲操曰馬羸行遲耳卓顧謂布曰吾有西涼進來好馬奉先可親去揀一騎賜與孟德布領令而出操暗忖曰此賊合死即欲拔刀刺之懼卓力大未敢輕動卓胖大不耐久坐遂倒身而臥轉面向內操又思曰此賊當休矣急掣寶刀在手恰待要刺不想董卓仰面看衣鏡中照見曹操在背後拔刀急回身問曰孟德何為時呂布牽馬至閣外操惶遽乃持刀跪下曰操有寶刀一口獻上恩相卓接視之見其刀長尺餘七寶嵌飾極其鋒利果寶刀也遂遞與呂布收了操解鞘付布卓引操出閣看馬操謝曰願借試一騎卓就教與鞍轡操牽馬出相府加鞭望東南而去布對卓曰適來曹操似有行刺之狀及被喝破故推獻刀卓曰吾亦疑之正説話間適李儒至卓以其事告之儒曰操無妻小在京只獨居寓所今差人往召如彼無疑而便來則是獻刀如推託不來則必是行刺便可擒而問也卓然其説即差獄卒四人往喚操去了良久回報曰操不曾回寓乘馬飛出東門門吏問之操曰丞相差我有緊急事縱馬而去矣儒曰操賊心虛逃竄行刺無疑矣卓大怒曰我如此重用反欲害我儒曰此必有同謀者待拿住曹操便可知矣卓遂令遍行文書畫影圖形捉拿曹操擒獻者賞千金封萬戶侯窩藏者同罪且説曹操逃出城外飛奔譙郡路經中牟縣為守關軍士所獲擒見縣令操言我是客商覆姓皇甫縣令熟視曹操沈吟半晌乃曰吾前在洛陽求官時曾認得汝是曹操如何隱諱且把來監下明日解去京師請賞把關軍士賜以酒食而去至夜分縣令喚親隨人暗地取出曹操直至後院中審究問曰我聞丞相待汝不薄何故自取其禍操曰燕雀安知鴻鵠志哉汝既拿住我便當解去請賞何必多問縣令屏退左右謂操曰汝休小覷我我非俗吏奈未遇其主耳操曰吾祖宗世食漢祿若不思報國與禽獸何異吾屈身事卓者欲乘間圖之為國除害耳今事不成乃天意也縣令曰孟德此行將欲何往操曰吾將歸鄉里發矯詔召天下諸侯興兵共誅董卓吾之願也縣令聞言乃親釋其縛扶之上坐再拜曰公真天下忠義之士也曹操亦拜問縣令姓名縣令曰吾姓陳名宮字公台老母妻子皆在東郡今感公忠義願棄一官從公而逃操甚喜是夜陳宮收拾盤費與曹操更衣易服各背劍一口乘馬投故鄉來行了三日至成臯地方天色向晚操以鞭指林深處謂宮曰此間有一人姓呂名伯奢是吾父結義弟兄就往問家中消息覓一宿如何宮曰最好二人至莊前下馬入見伯奢奢曰我聞朝廷遍行文書捉汝甚急汝父已避陳留去了汝如何得至此操告以前事曰若非陳縣令已粉骨碎身唉伯奢拜陳宮曰小侄若非使君曹氏滅門矣使君寬懷安坐今晚便可下榻草舍説罷即起身入內良久乃出謂陳宮曰老夫家無好酒容往西村沽一樽來相待言訖匆匆上驢而去操與宮坐久忽聞莊後有磨刀之聲操曰呂伯奢非吾至親此去可疑當竊聽之二人潛步入草堂後但聞人語曰縛而殺之何如操曰是矣今若不先下手必遭擒獲遂與宮拔劍直入不問男女皆殺之一連殺死八口搜至廚下卻見縛一豬欲殺宮曰孟德心多誤殺好人矣急出莊上馬而行行不到二裏只見伯奢驢鞍前橇懸酒二瓶手攜果菜而來叫曰賢侄與使君何故便去操曰被罪之人不敢久住伯奢曰吾已分付家人宰一豬相款賢侄使君何憎一宿速請轉騎操不顧策馬便行行不數步忽拔劍復回叫伯奢曰此來者何人伯奢回頭看時操揮劍砍伯奢于驢下宮大驚曰適才誤耳今何為也操曰伯奢到家見殺死多人安肯幹休若率衆來追必遭其禍矣宮曰知而故殺大不義也操曰寧教我負天下人休教天下人負我陳宮默然當夜行數裏月明中敲開客店門投宿喂飽了馬曹操先睡陳宮尋思我將謂曹操是好人棄官跟他原來是個狼心之徒今日留之必為後患便欲拔劍來殺曹操正是設心狠毒非良士操卓原來一路人畢竟曹操性命如何且聽下文分解
