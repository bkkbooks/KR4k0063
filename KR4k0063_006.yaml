body:
  text: 第六回焚金闕董卓行凶匿玉璽孫堅背約卻説張拍馬趕到關下關上矢石如雨不得進而回八路諸侯同請玄德關張賀功使人去袁紹寨中報捷紹遂移檄孫堅令其進兵堅引程普黃蓋至袁術寨中相見堅以杖畫地曰董卓與我本無仇隙今我奮不顧身親冒矢石來決死戰者上為國家討賊下為將軍家門之私而將軍卻聽讒言不發糧草致堅敗績將軍何安術惶恐無言命斬進讒之人以謝孫堅忽人報堅曰關上有一將乘馬來寨中要見將軍堅辭袁術歸到本寨喚來問時乃董卓愛將李傕堅曰汝來何為傕曰丞相所敬者惟將軍耳今特使傕來結親丞相有女欲配將軍之子堅大怒叱曰董卓逆天無道蕩覆王室吾欲夷其九族以謝天下安肯與逆賊結親耶吾不斬汝汝當速去早早獻關饒你性命倘若遲誤粉骨碎身李傕抱頭鼠竄回見董卓説孫堅如此無禮卓怒問李儒儒曰溫侯新敗兵無戰心不若引兵回洛陽遷帝于長安以應童謠近日街市童謠曰西頭一個漢東頭一個漢鹿走入長安方可無斯難臣思此言西頭一個漢乃應高祖旺于西都長安傳一十二帝東頭一個漢乃應光武旺於東都洛陽今亦傳一十二帝天運合回丞相遷回長安方可無虞卓大喜曰非汝言吾實不悟遂引呂布星夜回洛陽商議遷都聚文武於朝堂卓曰漢東都洛陽二百餘年氣數已衰吾觀旺氣實在長安吾欲奉駕西幸汝等各宜促裝司徒楊彪曰關中殘破零落今無故捐宗廟棄皇陵恐百姓驚動天下動之至易安之至難望丞相鑒察卓怒曰汝阻國家大計耶太尉黃琬曰楊司徒之言是也往者王莽篡逆更始赤眉之時焚燒長安盡為瓦礫之地更兼人民流移百無一二今棄宮室而就荒地非所宜也卓曰關東賊起天下播亂長安崤函之險更近隴右木石磚瓦克日可辦宮室營造不須月餘汝等再休亂言司徒荀爽諫曰丞相若欲遷都百姓騷動不寧矣卓大怒曰吾為天下計豈惜小民哉即日罷楊彪黃琬荀爽為庶民卓出上車只見二人望車而揖視之乃尚書周毖城門校尉伍瓊也卓問有何事毖曰今聞丞相欲遷都長安故來諫耳卓大怒曰我始初聽你兩個保用袁紹今紹已反是汝等一黨叱武士推出都門斬首遂下令遷都限來日便行李儒曰今錢糧缺少洛陽富戶極多可籍沒入官但是袁紹等門下殺其宗黨而抄其家資必得巨萬卓即差鐵騎五千遍行捉拿洛陽富戶共數千家插旗頭上大書反臣逆黨盡斬於城外取其金資李傕郭汜盡驅洛陽之民數百萬口前赴長安每百姓一隊間軍一隊互相拖押死於溝壑者不可勝數又縱軍士淫人妻女奪人糧食啼哭之聲震動天地如有行得遲者背後三千軍催督軍手執白刃於路殺人卓臨行教諸門放火焚燒居民房屋並放火燒宗廟宮府南北兩宮火焰相接長樂宮庭盡為焦土又差呂布發掘先皇及後妃陵寢取其金寶軍士乘勢掘官民墳冢殆盡董卓裝載金珠緞匹好物數千余車劫了天子並後妃等竟望長安去了卻説卓將趙岑見卓已棄洛陽而去便獻了汜水關孫堅驅兵先入玄德關張殺入虎牢關諸侯各引軍入且説孫堅飛奔洛陽遙望火焰沖天黑煙鋪地二三百里並無雞犬人煙堅先發兵救滅了火令衆諸侯各于荒地上屯住軍馬曹操來見袁紹曰今董賊西去正可乘勢追襲本初按兵不動何也紹曰諸兵疲困進恐無益操曰董賊焚燒宮室劫遷天子海內震動不知所歸此天亡之時也一戰而天下定矣諸公何疑而不進衆諸侯皆言不可輕動操大怒曰豎子不足與謀遂自引兵萬余領夏侯惇夏侯淵曹仁曹洪李典樂進星夜來趕董卓且説董卓行至滎陽地方太守將徐榮出接李儒曰丞相新棄洛陽防有追兵可教徐榮伏軍滎陽城外山塢之旁若有兵追來可竟放過待我這裏殺敗然後截住掩殺令後來者不敢復追卓從其計又令呂布引精兵遏後布正行間曹操一軍趕上呂布大笑曰不出李儒所料也將軍馬擺開曹操出馬大叫逆賊劫遷天子流徙百姓將欲何往呂布罵曰背主懦夫何得妄言夏侯惇挺槍躍馬直取呂布戰不數合李傕引一軍從左邊殺來操急令夏侯淵迎敵右邊喊聲又起郭汜引軍殺到操急令曹仁迎敵三路軍馬勢不可當夏侯惇抵敵呂布不住飛馬回陳布引鐵騎掩殺操軍大敗回望滎陽而走走至一荒山腳下時約二更月明如晝方才聚集殘兵正欲埋鍋造飯只聽得四圍喊聲徐榮伏兵盡出曹操慌忙策馬奪路奔逃正遇徐榮轉身便走榮搭上箭射中操肩膊操帶箭逃命踅過山坡兩個軍士伏于草中見操馬來二槍齊發操馬中槍而倒操翻身落馬被二卒擒住只見一將飛馬而來揮刀砍死兩個步軍下馬救起曹操操視之乃曹洪也操曰吾死於此矣賢弟可速去洪曰公急上馬洪願步行操曰賊兵趕上汝將奈何洪曰天下可無洪不可無公操曰吾若再生汝之力也操上馬洪脫去衣甲拖刀跟馬而走約走至四更餘只見前面一條大河阻住去路後面喊聲漸近操曰命已到此不得復活矣洪急扶操下馬脫去袍鎧負操渡水才過彼岸追兵已到隔水放箭操帶水而走比及天明又走三十餘裏土岡下少歇忽然喊聲起處一彪人馬趕來卻是徐榮從上流渡河來追操正慌急間只見夏侯惇夏侯淵引數十騎飛至大喝徐榮無傷吾主徐榮便奔夏侯惇惇挺槍來迎交馬數合惇刺徐榮於馬下殺散餘兵隨後曹仁李典樂進各引兵尋到見了曹操憂喜交集聚集殘兵五百餘人同回河內卓兵自往長安卻説衆諸侯分屯洛陽孫堅救滅宮中餘火屯兵城內設帳于建章殿基上堅令軍士掃除宮殿瓦礫凡董卓所掘陵寢盡皆掩閉於太廟基上草創殿屋三間請衆諸侯立列聖神位宰太牢祀之祭畢皆散堅歸寨中是夜星月交輝乃按劍露坐仰觀天文見紫微垣中白氣漫漫堅歎曰帝星不明賊臣亂國萬民塗炭京城一空言訖不覺淚下傍有軍士指曰殿南有五色毫光起于井中堅喚軍士點起火把下井打撈撈起一婦人尸首雖然日久其尸不爛宮樣裝束項下帶一錦囊取開看時內有朱紅小匣用金鎖鎖著啓視之乃一玉璽方圓四寸上鐫五龍交紐傍缺一角以黃金鑲之上有篆文八字雲受命于天既壽永昌堅得璽乃問程普普曰此傳國璽也此玉是昔日卞和於荊山之下見鳳凰棲于石上載而進之楚文王解之果得玉秦二十六年令良工琢為璽李斯篆此八字於其上二十八年始皇巡狩至洞庭湖風浪大作舟將覆急投玉璽於湖而止至三十六年始皇巡狩至華陰有人持璽遮道與從者曰持此還祖龍言訖不見此璽復歸於秦明年始皇崩後來子嬰將玉璽獻與漢高祖後至王莽篡逆孝元皇太后將璽打王尋蘇獻崩其一角以金鑲之光武得此寶于宜陽傳位至今近聞十常侍作亂劫少帝出邙回宮失此寶今天授主公必有登九五之分此處不可久留宜速回江東別圖大事堅曰汝言正合吾意明日便當托疾辭歸商議已定密諭軍士勿得泄漏誰想數中一軍是袁紹鄉人欲假此為進身之計連夜偷出營寨來報袁紹紹與之賞賜暗留軍中次日孫堅來辭袁紹曰堅抱小疾欲歸長沙特來別公紹笑曰吾知公疾乃害傳國璽耳堅失色曰此言何來紹曰今興兵討賊為國除害玉璽乃朝廷之寶公既獲得當對衆留於盟主處候誅了董卓復歸朝廷今匿之而去意欲何為堅曰玉璽何由在吾處紹曰建章殿井中之物何在堅曰吾本無之何強相逼紹曰作速取出免自生禍堅指天為誓曰吾若果得此寶私自藏匿異日不得善終死於刀箭之下衆諸侯曰文台如此説誓想必無之紹喚軍士出曰打撈之時有此人否堅大怒拔所佩之劍要斬那軍士紹亦拔劍曰汝斬軍人乃欺我也紹背後顔良文醜皆拔劍出鞘堅背後程普黃蓋韓當亦掣刀在手衆諸侯一齊勸住堅隨即上馬拔寨離洛陽而去紹大怒遂寫書一封差心腹人連夜往荊州送與刺史劉表教就路上截住奪之次日人報曹操追董卓戰于滎陽大敗而回紹令人接至寨中會衆置酒與操解悶飲宴間操歎曰吾始興大義為國除賊諸公既仗義而來操之初意欲煩本初引河內之衆臨孟津酸棗諸將固守成臯據敖倉塞轅太谷制其險要公路率南陽之軍駐丹析入武關以震三輔皆深溝高壘勿與戰益為疑兵示天下形勢以順誅逆可立定也今遲疑不進大失天下之望操竊恥之紹等無言可對既而席散操見紹等各懷異心料不能成事自引軍投揚州去了公孫瓚謂玄德關張曰袁紹無能為也久必有變吾等且歸遂拔寨北行至平原令玄德為平原相自去守地養軍兗州刺史劉岱問東郡太守喬瑁借糧瑁推辭不與岱引軍突入瑁營殺死喬瑁盡降其衆袁紹見衆人各自分散就領兵拔寨離洛陽投關東去了卻説荊州刺史劉表字景升山陽高平人也乃漢室宗親幼好結納與名士七人為友時號江夏八俊那七人汝南陳翔字仲麟同郡范滂字孟博魯國孔昱字世元渤海范康字仲真山陽檀敷字文友同郡張儉字元節南陽岑晊字公孝劉表與此七人為友有延平人蒯良蒯越襄陽人蔡瑁為輔當時看了袁紹書隨令蒯越蔡瑁引兵一萬來截孫堅堅軍方到蒯越將陳擺開當先出馬孫堅問曰蒯異度何故引兵截吾去路越曰汝既為漢臣如何私匿傳國之寶可速留下放汝歸去堅大怒命黃蓋出戰蔡瑁舞刀來迎鬥到數合蓋揮鞭打瑁正中護心鏡瑁撥回馬走孫堅乘勢殺過界口山背後金鼓齊鳴乃劉表親自引軍來到孫堅就馬上施禮曰景升何故信袁紹之書相逼鄰郡表曰汝匿傳國璽將欲反耶堅曰吾若有些物死於刀箭之下表曰汝若要我聽信將隨軍行李任我搜看堅怒曰汝有何力敢小覷我方欲交兵劉表便退堅縱馬趕去兩山後伏兵齊起背後蔡瑁蒯越趕來將孫堅困在垓心正是玉璽得來無用處反因此寶動刀兵畢竟孫堅怎地脫身且聽下文分解
