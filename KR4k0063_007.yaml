body:
  text: 第七回袁紹磐河戰公孫孫堅跨江擊劉表卻説孫堅被劉表圍住虧得程普黃蓋韓當三將死救得脫折兵大半奪路引兵回江東自此孫堅與劉表結怨且説袁紹屯兵河內缺少糧草冀州牧韓馥遣人送糧以資軍用謀士逢紀説紹曰大丈夫縱橫天下何待人送糧為食冀州乃錢糧廣盛之地將軍何不取之紹曰未有良策紀曰可暗使人馳書與公孫瓚令進兵取冀州約以夾攻瓚必興兵韓馥無謀之輩必請將軍領州事就中取事唾手可得紹大喜即發書到瓚處瓚得書見説共攻冀州平分其地大喜即日興兵紹卻使人密報韓馥馥慌聚荀諶辛評二謀士商議諶曰公孫瓚將燕代之衆長驅而來其鋒不可當兼有劉備關張助之難以抵敵今袁本初智勇過人手下名將極廣將軍可請彼同治州事彼必厚待將軍無患公孫瓚矣韓馥即差別駕關純去請袁紹長史耿武諫曰袁紹孤客窮軍仰我鼻息譬如嬰兒在股掌之上絶其乳哺立可餓死奈何欲以州事委之此引虎入羊群也馥曰吾乃袁氏之故吏才能又不如本初古者擇賢者而讓之諸君何嫉妒耶耿武歎曰冀州休矣於是棄職而去者三十餘人獨耿武與關純伏於城外以待袁紹數日後紹引兵至耿武關純拔刀而出欲刺殺紹紹將顔良立斬耿武文醜砍死關純紹入冀州以馥為奮威將軍以田豐沮授許攸逢紀分掌州事盡奪韓馥之權馥懊悔無及遂棄下家小匹馬往投陳留太守張邈去了卻説公孫瓚知袁紹已據冀州遣從弟公孫越來見紹欲分其地紹曰可請汝兄自來吾有商議越辭歸行不到五十裏道旁閃出一彪軍馬口稱我乃董丞相家將也亂箭射死公孫越從人逃回見公孫瓚報越已死瓚大怒曰袁紹誘我起兵攻韓馥他卻就裏取事今又詐董卓兵射死吾弟此冤如何不報盡起本部兵殺奔冀州來紹知瓚兵至亦領軍出二軍會於磐河之上紹軍於磐河橋東瓚軍於橋西瓚立馬橋上大呼曰背義之徒何敢賣我紹亦策馬至橋邊指瓚曰韓馥無才願讓冀州於吾與爾何干瓚曰昔日以汝為忠義推為盟主今之所為真狼心狗行之徒有何面目立於世間袁紹大怒曰誰可擒之言未畢文醜策馬挺槍直殺上橋公孫瓚就橋邊與文醜交鋒戰不到十餘合瓚抵擋不住敗陳而走文醜乘勢追趕瓚走入陳中文醜飛馬徑入中軍往來衝突瓚手下健將四員一齊迎戰被文醜一槍刺一將下馬三將俱走文醜直趕公孫瓚出陳後瓚望山谷而逃文醜驟馬厲聲大叫快下馬受降瓚弓箭盡落頭盔墮地披發縱馬奔轉山坡其馬前失瓚翻身落於坡下文醜急撚槍來刺忽見草坡左側轉出一個少年將軍飛馬挺槍直取文醜公孫瓚扒上坡去看那少年生得身長八尺濃眉大眼闊面重頤威風凜凜與文醜大戰五六十合勝負未分瓚部下救軍到文醜撥回馬去了那少年也不追趕瓚忙下土坡問那少年姓名那少年欠身答曰某乃常山真定人也姓趙名雲字子龍本袁紹轄下之人因見紹無忠君救民之心故特棄彼而投麾下不期於此處相見瓚大喜遂同歸寨整頓甲兵次日瓚將軍馬分作左右兩隊勢如羽翼馬五千餘匹大半皆是白馬因公孫瓚曾與羌人戰盡選白馬為先鋒號為白馬將軍羌人但見白馬便走因此白馬極多袁紹令顔良文醜為先鋒各引弓弩手一千亦分作左右兩隊令在左者射公孫瓚右軍在右者射公孫瓚左軍再令麴義引八百弓手步兵一萬五千列於陳中袁紹自引馬步軍數萬於後接應公孫瓚初得趙雲不知心腹令其另領一軍在後遣大將嚴綱為先鋒瓚自領中軍立馬橋上傍豎大紅圈金線帥字旗于馬前從辰時擂鼓直到巳時紹軍不進麴義令弓手皆伏於遮箭牌下只聽炮響發箭嚴綱鼓噪呐喊直取麴義義軍見嚴綱兵來都伏而不動直到來得至近一聲炮響八百弓弩手一齊俱發綱急待回被麴義拍馬舞刀斬于馬下瓚軍大敗左右兩軍欲來救應都被顔良文醜引弓弩手射住紹軍並進直殺到界橋邊麴義馬到先斬執旗將把繡旗砍倒公孫瓚見砍倒繡旗回馬下橋而走麴義引軍直沖到後軍正撞著趙雲挺槍躍馬直取麴義戰不數合一槍刺麴義於馬下趙雲一騎馬飛入紹軍左沖右突如入無人之境公孫瓚引軍殺回紹軍大敗卻説袁紹先使探馬看時回報麴義斬將搴旗追趕敗兵因此不作準備與田豐引著帳下持戟軍士數百人弓箭手數十騎乘馬出觀呵呵大笑曰公孫瓚無能之輩正説之間忽見趙雲沖到面前弓箭手急待射時雲連刺數人衆軍皆走後面瓚軍團團圍裹上來田豐慌對紹曰主公且於空牆中躲避紹以兜鍪撲地大呼曰大丈夫願臨陳鬥死豈可入牆而望活乎衆軍士齊心死戰趙雲衝突不入紹兵大隊掩至顔良亦引軍來到兩路並殺趙雲保公孫瓚殺透重圍回到界橋紹驅兵大進復趕過橋落水死者不計其數袁紹當先趕來不到五裏只聽得山背後喊聲大起閃出一彪人馬為首三員將乃是劉玄德關雲長張翼德因在平原探知公孫瓚與袁紹相爭特來助戰當下三匹馬三般兵器飛奔前來直取袁紹紹驚得魂飛天外手中寶刀墜于馬下忙撥馬而逃衆人死救過橋公孫瓚亦收軍歸寨玄德關張動問畢瓚曰若非玄德遠來救我幾乎狼狽教與趙雲相見玄德甚相敬愛便有不舍之心卻説袁紹輸了一陳堅守不出兩軍相拒月餘有人來長安報知董卓李儒對卓曰袁紹與公孫瓚亦當今豪傑現在磐河廝殺宜假天子之詔差人往和解之二人感德必順太師矣卓曰善次日便使太傅馬日太仆趙岐齎詔前去二人來至河北紹出迎於百里之外再拜奉詔次日二人至瓚營宣諭瓚乃遣使致書於紹互相講和二人自回京復命瓚即日班師又表薦劉玄德為平原相玄德與趙雲分別執手垂淚不忍相離雲歎曰某曩日誤認公孫瓚為英雄今觀所為亦袁紹等輩耳玄德曰公且屈身事之相見有日灑淚而別卻説袁術在南陽聞袁紹新得冀州遣使來求馬千匹紹不與術怒自此兄弟不睦又遣使往荊州問劉表借糧二十萬表亦不與術恨之密遣人遺書于孫堅使伐劉表其書略曰前者劉表截路乃吾兄本初之謀也今本初又與表私議欲襲江東公可速興兵伐劉表吾為公取本初二仇可報公取荊州吾取冀州切勿誤也堅得書曰叵耐劉表昔日斷吾歸路今不乘時報恨更待何年聚帳下程普黃蓋韓當等商議程普曰袁術多詐未可準信堅曰吾自欲報仇豈望袁術之助乎便差黃蓋先來江邊安排戰船多裝軍器糧草大船裝載戰馬克日興師江中細作探知來報劉表表大驚急聚文武將士商議蒯良曰不必憂慮可令黃祖部領江夏之兵為前驅主公率荊襄之衆為援孫堅跨江涉湖而來安能用武乎表然之令黃祖設備隨後便起大軍卻説孫堅有四子皆吳夫人所生長子名策字伯符次子名權字仲謀三子名翊字叔弼四子名匡字季佐吳夫人之妹即為孫堅次妻亦生一子一女子名朗字早安女名仁堅又過房俞氏一子名韶字公禮堅有一弟名靜字幼台堅臨行靜引諸子列拜于馬前而諫曰今董卓專權天子懦弱海內大亂各霸一方江東方稍寧以一小恨而起重兵非所宜也願兄詳之堅曰弟勿多言吾將縱橫天下有仇豈可不報長子孫策曰如父親必欲往兒願隨行堅許之遂與策登舟殺奔樊城黃祖伏弓弩手于江邊見船傍岸亂箭俱發堅令諸軍不可輕動只伏於船中來往誘之一連三日船數十次傍岸黃祖軍只顧放箭箭已放盡堅卻拔船上所得之箭約十數萬當日正值順風堅令軍士一齊放箭岸上支吾不住只得退走堅軍登岸程普黃蓋分兵兩路直取黃祖營寨背後韓當驅兵大進三面夾攻黃祖大敗棄卻樊城走入鄧城堅令黃蓋守住船隻親自統兵追襲黃祖引軍出迎布陳於野堅列成陳勢出馬於門旗之下孫策也全副披挂挺槍立馬于父側黃祖引二將出馬一個是江夏張虎一個是襄陽陳生黃祖揚鞭大罵江東鼠賊安敢侵犯漢室宗親境界便令張虎搦戰堅陳內韓當出迎兩騎相交戰三十余合陳生見張虎力怯飛馬來助孫策望見按住手中槍扯弓搭箭正射中陳生面門應弦落馬張虎見陳生墜地吃了一驚措手不及被韓當一刀削去半個腦袋程普縱馬直來陳前捉黃祖黃祖棄卻頭盔戰馬雜于步軍內逃命孫堅掩殺敗軍直到漢水命黃蓋將船隻進泊漢江黃祖聚敗軍來見劉表備言堅勢不可當表慌請蒯良商議良曰目今新敗兵無戰心只可深溝高壘以避其鋒卻潛令人求救于袁紹此圍自可解也蔡瑁曰子柔之言直拙計也兵臨城下將至壕邊豈可束手待斃某雖不才願請軍出城以決一戰劉表許之蔡瑁引軍萬餘出襄陽城外於峴山布陳孫堅將得勝之兵長驅大進蔡瑁出馬堅曰此人是劉表後妻之兄也誰與吾擒之程普挺鐵脊矛出馬與蔡瑁交戰不到數合蔡瑁敗走堅驅大軍殺得尸橫遍野蔡瑁逃入襄陽蒯良言瑁不聽良策以致大敗按軍法當斬劉表以新娶其妹不肯加刑卻説孫堅分兵四面圍住襄陽攻打忽一日狂風驟起將中軍帥字旗竿吹折韓當曰此非吉兆可暫班師堅曰吾屢戰屢勝取襄陽只在旦夕豈可因風折旗竿遽爾罷兵遂不聽韓當之言攻城愈急蒯良謂劉表曰某夜觀天象見一將星欲墜以分野度之當應在孫堅主公可速致書袁紹求其相助劉表寫書問誰敢突圍而出健將呂公應聲願往蒯良曰汝既敢去可聽吾計與汝軍馬五百多帶能射者沖出陳去即奔峴山他必引軍來趕汝分一百人上山尋石子準備一百人執弓弩伏于林中但有追兵到時不可徑走可盤旋曲折引到埋伏之處矢石俱發若能取勝放起連珠號炮城中便出接應如無追兵不可放炮趲程而去今夜月不甚明黃昏時分便可出城呂公領了計策拴束軍馬黃昏時分密開東門引兵出城孫堅在帳中忽聞喊聲急上馬引三十余騎出營來看軍士報説有一彪人馬殺將出來望峴山而去堅不會諸將只引三十餘騎趕來呂公已于山林叢雜去處上下埋伏堅馬快單騎獨來前軍不遠堅大叫休走呂公勒回馬來戰孫堅交馬只一合呂公便走閃入山路去堅隨後趕入卻不見了呂公堅方欲上山忽然一聲鑼響山上石子亂下林中亂箭齊發堅體中石箭腦漿迸流人馬皆死於峴山之內壽止三十七歲呂公截住三十騎並皆殺盡放起連珠號炮城中黃祖蒯越蔡瑁分頭引兵殺出江東諸軍大亂黃蓋聽得喊聲震天引水軍殺來正迎著黃祖戰不兩合生擒黃祖程普保著孫策急待尋路正遇呂公程普縱馬向前戰不到數合一矛刺呂公于馬下兩軍大戰殺到天明各自收軍劉表軍自入城孫策回到漢水方知父親被亂箭射死尸首已被劉表軍士扛擡入城去了放聲大哭衆軍俱號泣策曰父尸在彼安得回鄉黃蓋曰今活捉黃祖在此得一人入城講和將黃祖去換主公尸首言未畢軍吏桓階出曰某與劉表有舊願入城為使策許之桓階入城見劉表具説其事表曰文台尸首吾已用棺木盛貯在此可速放回黃祖兩家各罷兵再休侵犯桓階拜謝欲行階下蒯良出曰不可不可吾有一言令江東諸軍片甲不回請先斬桓階然後用計正是追敵孫堅方殞命求和桓階又遭殃未知桓階性命如何且聽下文分解
