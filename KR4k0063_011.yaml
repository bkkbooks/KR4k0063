body:
  text: 第十一回劉皇叔北海救孔融呂溫侯濮陽破曹操卻説獻計之人乃東海朐縣人姓糜名竺字子仲此人家世富豪嘗往洛陽買賣乘車而回路遇一美婦人來求同載竺乃下車步行讓車與婦人坐婦人請竺同載竺上車端坐目不邪視行及數裏婦人辭去臨別對竺曰我乃南方火德星君也奉上帝敕往燒汝家感君相待以禮故明告君君可速歸搬出財物吾當夜來言訖不見竺大驚飛奔到家將家中所有疾忙搬出是晚果然廚中火起盡燒其屋竺因此廣舍家財濟貧拔苦後陶謙聘為別駕從事當日獻計曰某願親往北海郡求孔融起兵救援更得一人往青州田楷處求救若二處軍馬齊來操必退兵矣謙從之遂寫書二封問帳下誰人敢去青州求救一人應聲願往衆視之乃廣陵人姓陳名登字元龍陶謙先打發陳元龍往青州去訖然後命糜竺齎書赴北海自己率衆守城以備攻擊卻説北海孔融字文舉魯國曲阜人也孔子二十世孫泰山都尉孔宙之子自小聰明年十歲時往謁河南尹李膺閽人難之融曰我系李相通家及入見膺問曰汝祖與吾祖何親融曰昔孔子曾問禮於老子融與君豈非纍世通家膺大奇之少頃太中大夫陳煒至膺指融曰此奇童也煒曰小時聰明大時未必聰明融即應聲曰如君所言幼時必聰明者煒等皆笑曰此子長成必當代之偉器也自此得名後為中郎將纍遷北海太守極好賓客常曰座上客常滿樽中酒不空吾之願也在北海六年甚得民心當日正與客坐人報徐州糜竺至融請入見問其來意竺出陶謙書言曹操攻圍甚急望明公垂救融曰吾與陶恭祖交厚子仲又親到此如何不去只是曹孟德與我無仇當先遣人送書解和如其不從然後起兵竺曰曹操倚仗兵威決不肯和融教一麵點兵一面差人送書正商議間忽報黃巾賊黨管亥部領群寇數萬殺奔前來孔融大驚急點本部人馬出城與賊迎戰管亥出馬曰吾知北海糧廣可借一萬石即便退兵不然打破城池老幼不留孔融叱曰吾乃大漢之臣守大漢之地豈有糧米與賊耶管亥大怒拍馬舞刀直取孔融融將宗寶挺槍出馬戰不數合被管亥一刀砍宗寶于馬下孔融兵大亂奔入城中管亥分兵四面圍城孔融心中鬱悶糜竺懷愁更不可言次日孔融登城遙望賊勢浩大倍添憂惱忽見城外一人挺槍躍馬殺入賊陳左沖右突如入無人之境直到城下大叫開門孔融不識其人不敢開門賊衆趕到壕邊那人回身連搠十數人下馬賊衆倒退融急命開門引入其人下馬棄槍徑到城上拜見孔融融問其姓名對曰某東萊黃縣人也覆姓太史名慈字子義老母重蒙恩顧某昨自遼東回家省親知賊寇城老母説屢受府君深恩汝當往救某故單馬而來孔融大喜原來孔融與太史慈雖未識面卻曉得他是個英雄因他遠出有老母住在離城二十裏之外融常使人遺以粟帛母感融德故特使慈來救當下孔融重待太史慈贈與衣甲鞍馬慈曰某願借精兵一千出城殺賊融曰君雖英勇然賊勢甚盛不可輕出慈曰老母感君厚德特遣慈來如不能解圍慈亦無顔見母矣願決一死戰融曰吾聞劉玄德乃當世英雄若請得他來相救此圍自解只無人可使耳慈曰府君修書某當急往融喜修書付慈慈擐甲上馬腰帶弓矢手持鐵槍飽食嚴裝城門開處一騎飛出近壕賊將率衆來戰慈連搠死數人透圍而出管亥知有人出城料必是請救兵的便自引數百騎趕來八面圍定慈倚住槍拈弓搭箭八面射之無不應弦落馬賊衆不敢來追太史慈得脫星夜投平原來見劉玄德施禮罷具言孔北海被圍求救之事呈上書劄玄德看畢問慈曰足下何人慈曰某太史慈東海之鄙人也與孔融親非骨肉比非鄉黨特以氣誼相投有分憂共患之意今管亥暴亂北海被圍孤窮無告危在旦夕聞君仁義素著能救人危急故特令某冒鋒突圍前來求救玄德斂容答曰孔北海知世間有劉備耶乃同雲長翼德點精兵三千往北海郡進發管亥望見救軍來到親自引兵迎敵因見玄德兵少不以為意玄德與關張太史慈立馬陳前管亥忿怒直出太史慈卻待向前雲長早出直取管亥兩馬相交衆軍大喊量管亥怎敵得雲長數十合之間青龍刀起劈管亥于馬下太史慈張飛兩騎齊出雙槍並舉殺入賊陳玄德驅兵掩殺城上孔融望見太史慈與關張趕殺賊衆如虎入羊群縱橫莫當便驅兵出城兩下夾攻大敗群賊降者無數餘黨潰散孔融迎接玄德入城敘禮畢大設筵宴慶賀又引糜竺來見玄德具言張闓殺曹嵩之事今曹操縱兵大掠圍住徐州特來求救玄德曰陶恭祖乃仁人君子不意受此無辜之冤孔融曰公乃漢室宗親今曹操殘害百姓倚強欺弱何不與融同往救之玄德曰備非敢推辭奈兵微將寡恐難輕動孔融曰融之欲救陶恭祖雖因舊誼亦為大義公豈獨無仗義之心耶玄德曰既如此請文舉先行容備去公孫瓚處借三五千人馬隨後便來融曰公切勿失信玄德曰公以備為何如人也聖人雲自古皆有死人無信不立劉備借得軍或借不得軍必然親至孔融應允教糜竺先回徐州去報融便收拾起程太史慈拜謝曰慈奉母命前來相助今幸無虞有揚州刺史劉繇與慈同郡有書來喚不敢不去容圖再見融以金帛相酬慈不肯受而歸其母見之喜曰我喜汝有以報北海也遂遣慈往揚州去了不説孔融起兵且説玄德離北海來見公孫瓚具説欲救徐州之事瓚曰曹操與君無仇何苦替人出力玄德曰備已許人不敢失信瓚曰我借與君馬步軍二千玄德曰更望借趙子龍一行瓚許之玄德遂與關張引本部三千人為前部子龍引二千人隨後往徐州來卻説糜竺回報陶謙言北海又請得劉玄德來助陳元龍也回報青州田楷欣然領兵來救陶謙心安原來孔融田楷兩路軍馬懼怕曹兵勢猛遠遠依山下寨未敢輕進曹操見兩路軍到亦分了軍勢不敢向前攻城卻説劉玄德軍到見孔融融曰曹兵勢大操又善於用兵未可輕戰且觀其動靜然後進兵玄德曰但恐城中無糧難以久持備令雲長子龍領軍四千在公部下相助備與張飛殺奔曹營徑投徐州去見陶使君商議融大喜會合田楷為掎角之勢雲長子龍領兵兩邊接應是日玄德張飛引一千人馬殺入曹兵寨邊正行之間寨內一聲鼓響馬軍步軍如潮似浪擁將出來當頭一員大將乃是于禁勒馬大叫何處狂徒往那裏去張飛見了更不打話直取於禁兩馬相交戰到數合玄德掣雙股劍麾兵大進於禁敗走張飛當前追殺直到徐州城下城上望見紅旗白字大書平原劉玄德陶謙急令開門玄德入城陶謙接著共到府衙禮畢設宴相待一壁勞軍陶謙見玄德儀錶軒昂語言豁達心中大喜便命糜竺取徐州牌印讓與玄德玄德愕然曰公何意也謙曰今天下擾亂王綱不振公乃漢室宗親正宜力扶社稷老夫年邁無能情願將徐州相讓公勿推辭謙當自寫表文申奏朝廷玄德離席再拜曰劉備雖漢朝苗裔功微德薄為平原相猶恐不稱職今為大義故來相助公出此言莫非疑劉備有吞併之心耶若舉此念皇天不佑謙曰此老夫之實情也再三相讓玄德那裏肯受糜竺進曰今兵臨城下且當商議退敵之策待事平之日再當相讓可也玄德曰備當遺書於曹操勸令解和操若不從廝殺未遲於是傳檄三寨且按兵不動遣人齎書以達曹操卻説曹操正在軍中與諸將議事人報徐州有戰書到操拆而觀之乃劉備書也書略曰備自關外得拜君顔嗣後天各一方不及趨侍向者尊父曹侯實因張不仁以致被害非陶恭祖之罪也目今黃巾遺孽擾亂于外董卓餘黨盤踞於內願明公先朝廷之急而後私仇撤徐州之兵以救國難則徐州幸甚天下幸甚曹操看書大罵劉備何人敢以書來勸我且中間有譏諷之意命斬來使一面竭力攻城郭嘉諫曰劉備遠來救援先禮後兵主公當用好言答之以慢備心然後進兵攻城城可破也操從其言款留來使候發回書正商議間忽流星馬飛報禍事操問其故報説呂布已襲破兗州進據濮陽原來呂布自曹李郭之亂逃出武關去投袁術術怪呂布反覆不定拒而不納投袁紹紹納之與布共破張燕於常山布自以為得志傲慢袁紹手下將士紹欲殺之布乃去投張楊楊納之時龐舒在長安城中私藏呂布妻小送還呂布李傕郭汜知之遂斬龐舒寫書與張楊教殺呂布布因棄張楊去投張邈恰好張邈弟張超引陳宮來見張邈宮説邈曰今天下分崩英雄並起君以千里之衆而反受制於人不亦鄙乎今曹操征東兗州空虛而呂布乃當世勇士若與之共取兗州霸業可圖也張邈大喜便令呂布襲破兗州隨據濮陽止有鄄城東阿範縣三處被荀彧程昱設計死守得全其餘俱破曹仁屢戰皆不能勝特此告急操聞報大驚曰兗州有失使吾無家可歸矣不可不亟圖之郭嘉曰主公正好賣個人情與劉備退軍去復兗州操然之即時答書與劉備拔寨退兵且説來使回徐州入城見陶謙呈上書劄言曹兵已退謙大喜差人請孔融田楷雲長子龍等赴城大會飲宴既畢謙延玄德於上座拱手對衆曰老夫年邁二子不才不堪國家重任劉公乃帝室之胄德廣才高可領徐州老夫情願乞間養病玄德曰孔文舉令備來救徐州為義也今無端據而有之天下將以備為無義人矣糜竺曰今漢室陵遲海宇顛覆樹功立業正在此時徐州殷富戶口百萬劉使君領此不可辭也玄德曰此事決不敢應命陳登曰陶府君多病不能視事明公勿辭玄德曰袁公路四世三公海內所歸近在壽春何不以州讓之孔融曰袁公路冢中枯骨何足挂齒今日之事天與不取悔不可追玄德堅執不肯陶謙泣下曰君若舍我而去我死不瞑目矣雲長曰既承陶公相讓兄且權領州事張飛曰又不是我強要他的州郡他好意相讓何必苦苦推辭玄德曰汝等欲陷我於不義耶陶謙推讓再三玄德只是不受陶謙曰如玄德必不肯從此間近邑名曰小沛足可屯軍請玄德暫駐軍此邑以保徐州何如衆皆勸玄德留小沛玄德從之陶謙勞軍已畢趙雲辭去玄德執手揮淚而別孔融田楷亦各相別引軍自回玄德與關張引本部軍來至小沛修葺城垣撫諭居民卻説曹操回軍曹仁接著言呂布勢大更有陳宮為輔兗州濮陽已失其鄄城東阿範縣三處賴荀彧程昱二人設計相連死守城郭操曰吾料呂布有勇無謀不足慮也教且安營下寨再作商議呂布知曹操回兵已過滕縣召副將薛蘭李封曰吾欲用汝二人久矣汝可引軍一萬堅守兗州吾親自率兵前去破曹二人應諾陳宮急入見曰將軍棄兗州欲何往乎布曰吾欲屯兵濮陽以成鼎足之勢宮曰差矣薛蘭必守兗州不住此去正南一百八十裏泰山路險可伏精兵萬人在彼曹兵聞失兗州必然倍道而進待其過半一擊可擒也布曰吾屯濮陽別有良謀汝豈知之遂不用陳宮之言而用薛蘭守兗州而行曹操兵行至泰山險路郭嘉曰且不可進恐此處有伏兵曹操笑曰呂布無謀之輩故教薛蘭守兗州自往濮陽安得此處有埋伏耶教曹仁領一軍圍兗州吾進兵濮陽速攻呂布陳宮聞曹兵至近乃獻計曰今曹兵遠來疲困利在速戰不可養成氣力布曰吾匹馬縱橫天下何愁曹操待其下寨吾自擒之卻説曹操兵近濮陽下住寨腳次日引衆將出陳兵於野操立馬於門旗下遙望呂布兵到陳圓處呂布當先出馬兩邊排開八員健將第一個雁門馬邑人姓張名遼字文遠第二個泰山華陰人姓臧名霸字宣高兩將又各引三員健將郝萌曹性成廉魏續宋憲侯成布軍五萬鼓聲大震操指呂布而言曰吾與汝自來無仇何得奪吾州郡布曰漢家城池諸人有分偏爾合得便叫臧霸出馬搦戰曹軍內樂進出迎兩馬相交雙槍齊舉戰到三十餘合勝負不分夏侯惇拍馬便出助戰呂布陳上張遼截住廝殺惱得呂布性起挺戟驟馬沖出陳來夏侯惇樂進皆走呂布掩殺曹軍大敗退三四十裏布自收軍曹操輸了一陳回寨與諸將商議於禁曰某今日上山觀望濮陽之西呂布有一寨約無多軍今夜彼將謂我軍敗走必不準備可引兵擊之若得寨布軍必懼此為上策操從其言帶曹洪李典毛玠呂虔於禁典韋六將選馬步二萬人連夜從小路進發卻説呂布于寨中勞軍陳宮曰西寨是個要緊去處倘或曹操襲之奈何布曰他今日輸了一陳如何敢來宮曰曹操是極能用兵之人須防他攻我不備布乃撥高順並魏續侯成引兵往守西寨卻説曹操于黃昏時分引軍至西寨四面突入寨兵不能抵擋四散奔走曹操奪了寨將及四更高順方引軍到殺將入來曹操自引軍馬來迎正逢高順三軍混戰將及天明正西鼓聲大震人報呂布自引救軍來了操棄寨而走背後高順魏續侯成趕來當頭呂布親自引軍來到于禁樂進雙戰呂布不住操望北而行山後一彪軍出左有張遼右有臧霸操使呂虔曹洪戰之不利操望西而走忽又喊聲大震一彪軍至郝萌曹性成廉宋憲四將攔住去路衆將死戰操當先沖陳梆子響處箭如驟雨射將來操不能前進無計可脫大叫誰人救我馬軍隊裏一將踴出乃典韋也手挺雙鐵戟大叫主公勿憂飛身下馬插住雙戟取短戟十數枝挾在手中顧從人曰賊來十步乃呼我遂放開腳步冒箭前行布軍數十騎追至從人大叫曰十步矣韋曰五步乃呼我從人又曰五步矣韋乃飛戟刺之一戟一人墜馬並無虛發立殺十數人衆皆奔走韋復飛身上馬挺一雙大鐵戟衝殺入去郝曹成宋四將不能抵擋各自逃去典韋殺散敵軍救出曹操衆將隨後也到尋路歸寨看看天色傍晚背後喊聲起處呂布驟馬提戟趕來大叫操賊休走此時人困馬乏大家面面相覷各欲逃生正是雖能暫把重圍脫只怕難當徑敵追不知曹操性命如何且聽下文分解
