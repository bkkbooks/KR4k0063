body:
  text: 第十二回陶恭祖三讓徐州曹孟德大戰呂布曹操正慌走間正南上一彪軍到乃夏侯惇引軍來救援截住呂布大戰鬥到黃昏時分大雨如注各自引軍分散操回寨重賞典韋加為領軍都尉卻説呂布到寨與陳宮商議宮曰濮陽城中有富戶田氏家僮千百為一郡之巨室可令彼密使人往操寨中下書言呂溫侯殘暴不仁民心大怨今欲移兵黎陽止有高順在城內可連夜進兵我為內應操若來誘之入城四門放火外設伏兵曹操雖有經天緯地之才到此安能得脫也呂布從其計密諭田氏使人徑到操寨操因新敗正在躊躇忽報田氏人到呈上密書雲呂布已往黎陽城中空虛萬望速來當為內應城上插白旗大書義字便是暗號操大喜曰天使吾得濮陽也重賞來人一面收拾起兵劉曄曰布雖無謀陳宮多計只恐其中有詐不可不防明公欲去當分三軍為三隊兩隊伏城外接應一隊入城方可操從其言分軍三隊來至濮陽城下操先往觀之見城上遍豎旗幡西門角上有一義字白旗心中暗喜是日午牌城門開處兩員將引軍出戰前軍侯成後軍高順操即使典韋出馬直取侯成侯成抵敵不過回馬望城中走韋趕到吊橋邊高順亦攔擋不住都退入城中去了數內有軍人乘勢混過來見操説是田氏之使呈上密書約雲今夜初更時分城上鳴鑼為號便可進兵某當獻門操撥夏侯惇引軍在左曹洪引軍在右自己引夏侯淵李典樂進典韋四將率兵入城李典曰主公且在城外容某等先入城去操喝曰我不自往誰肯向前遂當先領兵直入時約初更月光未上只聽得西門上吹螺殼聲喊聲忽起門上火把燎亂城門大開吊橋放落曹操爭先拍馬而入直到州衙路上不見一人操知是計忙撥回馬大叫退兵州衙中一聲炮響四門烈火轟天而起金鼓齊鳴喊聲如江翻海沸東巷內轉出張遼西巷內轉出臧霸夾攻掩殺操走北門道傍轉出郝萌曹性又殺一陳操急走南門高順侯成攔住典韋怒目咬牙衝殺出去高順侯成倒走出城典韋殺到吊橋回頭不見了曹操翻身復殺入城來門下撞著李典典韋問主公何在典曰吾亦尋不見韋曰汝在城外催救軍我入去尋主公李典去了典韋殺入城中尋覓不見再殺出城壕邊撞著樂進進曰主公何在韋曰我往復兩遭尋覓不見進曰同殺入去救主兩人到門邊城上火炮滾下樂進馬不能入典韋冒煙突火又殺入去到處尋覓卻説曹操見典韋殺出去了四下裏人馬截來不得出南門再轉北門火光裏正撞見呂布挺戟躍馬而來操以手掩面加鞭縱馬竟過呂布從後拍馬趕來將戟於操盔上一擊問曰曹操何在操反指曰前面騎黃馬者他呂布聽説棄了曹操縱馬向前追趕曹操撥轉馬頭望東門而走正逢典韋韋擁護曹操殺條血路到城門邊火焰甚盛城上推下柴草遍地都是火韋用戟撥開飛馬冒煙突火先出曹操隨後亦出方到門道邊城門上崩下一條火梁來正打著曹操戰馬後胯那馬撲地倒了操用手托梁推放地上手臂鬚髮盡被燒傷典韋回馬來救恰好夏侯淵亦到兩個同救起曹操突火而出操乘淵馬典韋殺條大路而走直混戰到天明操方回寨衆將拜伏問安操仰面笑曰誤中匹夫之計吾必當報之郭嘉曰計可速發操曰今只將計就計詐言我被火傷已經身死布必引兵來攻我伏兵于馬陵山中候其兵半渡而擊之布可擒矣嘉曰真良策也於是令軍士挂孝發喪詐言操死早有人來濮陽報呂布説曹操被火燒傷肢體到寨身死布隨點起軍馬殺奔馬陵山來將到操寨一聲鼓響伏兵四起呂布死戰得脫折了好些人馬敗回濮陽堅守不出是年蝗蟲忽起食盡禾稻關東一境每谷一斛直錢五十貫人民相食曹操因軍中糧盡引兵回鄄城暫住呂布亦引軍出屯山陽就食因此二處權且罷兵卻説陶謙在徐州時年已六十三歲忽然染病看看沈重請糜竺陳登議事竺曰曹兵之去止為呂布襲兗州故也今因歲荒罷兵來春又必至矣府君兩番欲讓位于劉玄德時府君尚強健故玄德不肯受今病已沈重正可就此而與之玄德不肯辭矣謙大喜使人來小沛請劉玄德商議軍務玄德引關張帶十數騎到徐州陶謙教請入臥內玄德問安畢謙曰請玄德公來不為別事止因老夫病已危篤朝夕難保萬望明公可憐漢家城池為重受取徐州牌印老夫死亦瞑目矣玄德曰君有二子何不傳之謙曰長子商次子應其才皆不堪任老夫死後猶望明公教誨切勿令掌州事玄德曰備一身安能當此大任謙曰某舉一人可為公輔系北海人姓孫名乾字公佑此人可使為從事又謂糜竺曰劉公當世人傑汝當善事之玄德終是推託陶謙以手指心而死衆軍舉哀畢即捧牌印交送玄德玄德固辭次日徐州百姓擁擠府前哭拜曰劉使君若不領此郡我等皆不能安生矣關張二公亦再三相勸玄德乃許權領徐州事使孫乾糜竺為輔陳登為幕官盡取小沛軍馬入城出榜安民一面安排喪事玄德與大小軍士盡皆挂孝大設祭奠祭畢葬于黃河之原將陶謙遺表申奏朝廷操在鄄城知陶謙已死劉玄德領徐州牧大怒曰我仇未報汝不費半箭之功坐得徐州吾必先殺劉備後戮謙尸以雪先君之怨即傳號令克日起兵去打徐州荀入諫曰昔高祖保關中光武據河內皆深根固本以制天下進足以勝敵退足以堅守故雖有困終濟大業明公本首事兗州且河濟乃天之要地是亦昔之關中河內也今若取徐州多留兵則不足用少留兵則呂布乘虛寇之是無兗州也若徐州不得明公安所歸乎今陶謙雖死已有劉備守之徐州之民既已服備必助備死戰明公棄兗州而取徐州是棄大而就小去本而求末以安而易危也願熟思之操曰今歲荒乏糧軍士坐守于此終非良策彧曰不如東略陳地使軍就食汝南潁川黃巾餘黨何儀黃劭等劫掠州郡多有金帛糧食此等賊徒又容易破破而取其糧以養三軍朝廷喜百姓悅乃順天之事也操喜從之乃留夏侯惇曹仁守鄄城等處自引兵先略陳地次及汝潁黃巾何儀黃劭知曹兵到引衆來迎會於羊山時賊兵雖衆都是狐群狗黨並無隊伍行列操令強弓硬弩射住令典韋出馬何儀令副元帥出戰不三合被典韋一戟刺于馬下操引衆乘勢趕過羊山下寨次日黃劭自引軍來陳圓處一將步行出戰頭裹黃巾身披緑襖手提鐵棒大叫我乃截天夜叉何曼也誰敢與我廝鬥曹洪見了大喝一聲飛身下馬提刀步出兩下向陳前廝殺四五十合勝負不分曹洪詐敗而走何曼趕來洪用拖刀背砍計轉身一踅砍中何曼再復一刀殺死李典乘勢飛馬直入賊陳黃劭不及提備被李典生擒活捉過來曹兵掩殺賊衆奪其金帛糧食無數何儀勢孤引數百騎奔走葛陂正行之間山背後撞出一軍為頭一個壯士身長八尺腰大十圍手提大刀截住去路何儀挺槍出迎只一合被那壯士盡活挾過去餘衆著忙皆下馬受縛被壯士盡驅入葛陂塢中卻説典韋追襲何義到葛陂壯士引軍迎住典韋曰汝亦黃巾賊耶壯士曰黃巾數百騎盡被我擒在塢內韋曰何不獻出壯士曰你若贏得手中寶刀我便獻出韋大怒挺雙戟向前來戰兩個從辰至午不分勝負各自少歇不一時那壯士又出搦戰典韋亦出直戰到黃昏各因馬乏暫止典韋手下軍士飛報曹操操大驚忙引衆將來看次日壯士又出搦戰操見其人威風凜凜心中暗喜分付典韋今日且詐敗韋領命出戰戰到三十合敗走回陳壯士趕到陳門中弓弩射回操急引軍退五裏密使人掘下陷坑暗伏鈎手次日再令典韋引百餘騎出壯士笑曰敗將何敢復來便縱馬接戰典韋略戰數合便回馬走壯士只顧望前趕來不提防連人帶馬都落於陷坑之內被鈎手縛來見曹操操下帳叱退軍士親解其縛急取衣衣之命坐問其鄉貫姓名壯士曰我乃譙國譙縣人也姓許名褚字仲康向遭寇亂聚宗族數百人築堅壁於塢中以禦之一日寇至吾令衆人多取石子準備吾親自飛石擊之無不中者寇乃退去又一日寇至塢中無糧遂與賊和約以耕牛換米米已送到賊驅牛至塢外牛皆奔走回還被我雙手掣二牛尾倒行百余步賊大驚不敢取牛而走因此保守此處無事操曰吾聞大名久矣還肯降否褚曰固所願也遂招引宗族數百人俱降操拜許褚為都尉賞勞甚厚隨將何儀黃劭斬訖汝潁悉平曹操班師曹仁夏侯惇接見言近日細作報説兗州薛蘭李封軍士皆出虜掠城邑空虛可引得勝之兵攻之一鼓可下操遂引軍徑奔兗州薛蘭李封出其不意只得引兵出城迎戰許褚曰吾願取此二人以為贄見之禮操大喜遂令出戰李封使畫戟向前來迎交馬兩合許褚斬李封于馬下薛蘭急走回陳吊橋邊李典攔住薛蘭不敢回城引軍投巨野而去卻被呂虔飛馬趕來一箭射于馬下軍皆潰散曹操復得兗州程昱便請進兵取濮陽操令許褚典韋為先鋒夏侯惇夏侯淵為左軍李典樂進為右軍操自領中軍于禁呂虔為合後兵至濮陽呂布欲自將出迎陳宮諫不可出戰待衆將聚會後方可呂布曰吾怕誰來遂不聽宮言引兵出陳橫戟大罵許褚便出鬥二十合不分勝負操曰呂布非一人可勝便差典韋助戰兩將夾攻左邊夏侯惇夏侯淵右邊李典樂進齊到六員將共攻呂布布遮攔不住撥馬回城城上田氏見布敗回急令人拽起吊橋布大叫開門田氏曰吾已降曹將軍矣布大罵引軍奔定陶而去陳宮急開東門保護呂布老小出城操遂得濮陽恕田氏舊日之罪劉曄曰呂布乃猛虎也今日困乏不可少容操令劉曄等守濮陽自己引軍趕至定陶時呂布與張邈張超盡在城中高順張遼臧霸侯成巡海打糧未回操軍至定陶連日不戰引軍退四十裏下寨正值濟郡麥熟操即令軍割麥為食細作報知呂布布引軍趕來將近操寨見左邊一望林木茂盛恐有伏兵而回操知布軍回去乃謂諸將曰布疑林中有伏兵耳可多插旌旗于林中以疑之寨西一帶長堤無水可盡伏精兵明日呂布必來燒林堤中軍斷其後布可擒矣於是止留鼓手五十人于寨中擂鼓將村中虜來男女在寨內呐喊精兵多伏堤中卻説呂布回報陳宮宮曰操多詭計不可輕敵布曰吾用火攻可破伏兵乃留陳宮高順守城布次日引大軍來遙見林中有旗驅兵大進四面放火竟無一人欲投寨中卻聞鼓聲大震正自疑惑不定忽然寨後一彪軍出呂布縱馬趕來炮響處堤內伏兵盡出夏侯惇夏侯淵許褚典韋李典樂進聚馬殺來呂布料敵不過落荒而走從將成廉被樂進一箭射死布軍三停去了二停敗卒回報陳宮宮曰空城難守不若急去遂與高順保著呂布老小棄定陶而走曹操將得勝之兵殺入城中勢如劈竹張超自刎張邈投袁術去了山東一境盡被曹操所得安民修城不在話下卻説呂布正走逢諸將皆回陳宮亦已尋著布曰吾軍雖少尚可破曹遂再引軍來正是兵家勝敗真常事卷甲重來未可知不知呂布勝負如何且聽下文分解
