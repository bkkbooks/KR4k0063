body:
  text: 第十四回曹孟德移駕幸許都呂奉先乘夜襲徐郡卻説李樂引軍詐稱李傕郭汜來追車駕天子大驚楊奉曰此李樂也遂令徐晃出迎之李樂親自出戰兩馬相交只一合被徐晃一斧吹于馬下殺散餘黨保護車駕過箕關太守張楊具粟帛迎駕於軹道帝封張楊為大司馬楊辭帝屯兵野王去了帝入洛陽見宮室燒盡街市荒蕪滿目皆是蒿草宮院中只有頽牆壞壁命楊奉且蓋小宮居住百官朝賀皆立于荊刺之中詔改興平為建安元年是歲又大荒洛陽居民僅有數百家無可為食盡出城去剝樹皮掘草根食之尚書郎以下皆自出城樵采多有死於頽牆壞壁之間者漢末氣運之衰無甚於此後人有詩歎之曰血流芒碭白蛇亡赤幟縱橫遊四方秦鹿逐翻興社稷楚騅推倒立封疆天子懦弱姦邪起氣色凋零盜賊狂看到兩京遭難處鐵人無淚也恓惶太尉楊彪奏帝曰前蒙降詔未曾發遣今曹操在山東兵強將盛可宣入朝以輔王室帝曰朕前既降詔卿何必再奏今即差人前去便了彪領旨即差使命赴山東宣召曹操卻説曹操在山東聞知車駕已還洛陽聚謀士商議荀彧進曰昔晉文公納周襄王而諸侯服從漢高祖為義帝發喪而天下歸心今天子蒙塵將軍誠因此時首倡義兵奉先子以從衆望不世之略也若不早圖人將先我而為之矣曹操大喜正要收拾起兵忽報有天使齎詔宣召操接詔克日興師卻説帝在洛陽百事未備城郭崩倒欲修未能人報李傕郭汜領兵將到帝大驚問楊奉曰山東之使未回李郭之兵又至為之奈何楊奉韓暹曰臣願與賊決死戰以保陛下董承曰城郭不堅兵甲不多戰如不勝當復如何不若且奉駕往山東避之帝從其言即日起駕望山東進發百官無馬皆隨駕步行出了洛陽行無一箭之地但見塵頭蔽日金鼓喧天無限人馬來到帝後戰慓不能言忽見一騎飛來乃前差往山東之使命也至車前拜啓曰曹將軍盡起山東之兵應詔前來聞李傕郭汜犯洛陽先差夏侯惇為先鋒引上將十員精兵五萬前來保駕帝心方安少頃夏侯惇引許褚典韋等至駕前面君俱以軍禮見帝尉諭方畢忽報正東又有一路軍到帝即命夏侯惇往探之回奏曰乃曹操步軍也須臾曹洪李典樂進來見駕通名畢洪奏曰臣兄知賊兵至近恐夏侯惇孤力難為故又差臣等倍道而來協助帝曰曹將軍真社稷臣也遂命護駕前行探馬來報李傕郭汜領兵長驅而來帝令夏侯惇分兩路迎之惇乃與曹洪分為兩翼馬軍先出步軍後隨盡力攻擊傕汜賊兵大敗斬首萬餘於是請帝還洛陽故宮夏侯惇屯兵於城外次日曹操引大隊人馬到來安營畢入城見帝拜於殿階之下帝賜平身宣諭慰勞操曰臣向蒙國恩刻思圖報今傕汜二賊罪惡貫盈臣有精兵二十余萬以順討逆無不克捷陛下善保龍體以社稷為重帝乃封操領司隸校尉假節鉞録尚書事卻説李傕郭汜知操遠來議欲速戰賈詡諫曰不可操兵精將勇不如降之求免本身之罪傕怒曰爾敢滅吾鋭氣拔劍欲斬詡衆將勸免是夜賈詡單馬走回鄉裏去了次日李傕軍馬來迎操兵操先令許褚曹仁典韋領三百鐵騎於傕陳中衝突三遭方才布陳陳圓處李傕侄李暹李別出馬陳前未及開言許褚飛馬過去一刀先斬李暹李別吃了一驚倒撞下馬褚亦斬之雙挽人頭回陳曹操撫許褚之背曰子真吾之樊噲也隨令夏侯惇領兵左出曹仁領兵右出操自領中軍沖陳鼓響一聲三軍齊進賊兵抵敵不住大敗而走操親掣寶劍押陳率衆連夜追殺剿戮極多降者不計其數傕汜望西逃命忙忙似喪家之狗自知無處容身只得往山中落草去了曹操回兵仍屯於洛陽城外楊奉韓暹兩個商議今曹操成了大功必掌重權如何容得我等乃入奏天子只以追殺傕汜為名引本部軍屯于大梁去了帝一日命人至操營宣操入宮議事操聞天使至請入相見只見那人眉清目秀精神充足操暗想曰今東都大荒官僚軍民皆有飢色此人何得獨肥因問之曰公尊顔充腴以何調理而至此對曰某無他法只食淡三十年矣操乃頷之又問曰君居何職對曰某舉孝廉原為袁紹張楊從事今聞天子還都特來朝覲官封正議郎濟陰定陶人姓董名昭字公仁曹操避席曰聞名久矣幸得於此相見遂置酒帳中相待令與荀彧相會忽人報曰一隊軍往東而去不知何人操急令人探之董昭曰此乃李傕舊將楊奉與白波帥韓暹因明公來此故引兵欲投大梁去耳操曰莫非疑操乎昭曰此乃無謀之輩明公何足慮也操又曰李郭二賊此去若何昭曰虎無爪鳥無翼不久當為明公所擒無足介意操見昭言語投機便問以朝廷大事昭曰明公興義兵以除暴亂入朝輔佐天子此五霸之功也但諸將人殊意異未必服從今若留此恐有不便惟移駕幸許都為上策然朝廷播越新還京師遠近仰望以冀一朝之安今復徙駕不厭衆心夫行非常之事乃有非常之功願將軍決計之操執昭手而笑曰此吾之本志也但楊奉在大梁大臣在朝不有他變否昭曰易也以書與楊奉先安其心明告大臣以京師無糧欲車駕幸許都近魯陽轉運糧食庶無欠缺懸隔之憂大臣聞之當欣從也操大喜昭謝別操執其手曰凡操有所圖惟公教之昭稱謝而去操由是日與衆謀士密議遷都之事時侍中太史令王立私謂宗正劉艾曰吾仰觀天文自去春太白犯鎮星于鬥牛過天津熒惑又逆行與太白會于天關金火交會必有新天子出吾觀大漢氣數將終晉魏之地必有興者又密奏獻帝曰天命有去就五行不常盛代火者土也代漢而有天下者當在魏操聞之使人告立曰知公忠於朝廷然天道深遠幸勿多言操以是告彧彧曰漢以火德王而明公乃土命也許都屬土到彼必興火能生土土能旺木正合董昭王立之言他日必有興者操意遂決次日入見帝奏曰東都荒廢久矣不可修葺更兼轉運糧食艱辛許都地近魯陽城郭宮室錢糧民物足可備用臣敢請駕幸許都惟陛下從之帝不敢不從群臣皆懼操勢亦莫敢有異議遂擇日起駕操引軍護行百官皆從行不到數程前至一高陵忽然喊聲大舉楊奉韓暹領兵攔路徐晃當先大叫曹操欲劫駕何往操出馬視之見徐晃威風凜凜暗暗稱奇便令許褚出馬與徐晃交鋒刀斧相交戰五十餘合不分勝敗操即鳴金收軍召謀士議曰楊奉韓暹誠不足道徐晃乃真良將也吾不忍以力並之當以計招之行軍從事滿寵曰主公勿慮某向與徐晃有一面之交今晚扮作小卒偷入其營以言説之管教他傾心來降操欣然遣之是夜滿龐扮作小卒混入彼軍隊中偷至徐晃帳前只見晃秉燭被甲而坐寵突至其前揖曰故人別來無恙乎徐晃驚起熟視之曰子非山陽滿伯寧耶何以至此寵曰某現為曹將軍從事今日于陳前得見故人欲進一言故特冒死而來晃乃延之坐問其來意寵曰公之勇略世所罕有奈何屈身于楊韓之徒曹將軍當世英雄其好賢禮士天下所知也今日陳前見公之勇十分敬愛故不忍以健將決死戰特遣寵來奉邀公何不棄暗投明共成大業晃沈吟良久乃喟然歎曰吾固知奉暹非立業之人奈從之久矣不忍相舍寵曰豈不聞良禽擇木而棲賢臣擇主而事遇可事之主而交臂失之非丈夫也晃起謝曰願從公言寵曰何不就殺奉暹而去以為進見之禮晃曰以臣弒主大不義也吾決不為寵曰公真義士也晃遂引帳下數十騎連夜同滿寵來投曹操早有人報知楊奉奉大怒自引千騎來追大叫徐晃反賊休走正追趕間忽然一聲炮響山上山下火把齊明伏軍四出曹操親自引軍當先大喝我在此等侯多時休教走脫楊奉大驚急待回軍早被曹兵圍住恰好韓暹引兵來救兩軍混戰楊奉走脫曹操趁彼軍亂乘勢攻擊兩家軍士大半多降楊奉韓暹勢孤引敗兵投袁術去了曹操叫軍回營滿寵引徐晃入見操大喜厚待之於是迎鑾駕到許都蓋造宮室殿宇立宗廟社稷省台司院衙門修城郭府庫封董承等十三人為列侯賞功罰罪並聽曹操處置操自封為大將軍武平侯以荀彧為侍中尚書令荀攸為軍師郭嘉為司馬祭酒劉曄為司空倉曹掾毛玠任峻為典農中郎將催督錢糧程昱為東平相范成董昭為洛陽令滿寵為許都令夏侯惇夏侯淵曹仁曹洪皆為將軍呂虔李典樂進于禁徐晃皆為校尉許褚典韋皆為都尉其餘將士各各封官自此大權皆歸於曹操朝廷大務先稟曹操然後方奏天子操既定大事乃設宴後堂聚衆謀士共議曰劉備屯兵徐州自領州事近呂布以兵敗投之備使居於小沛若二人同心引兵來犯乃心腹之患也公等有何妙計可圖之許褚曰願借精兵五萬斬劉備呂布之頭獻于丞相荀彧曰將軍勇則勇矣不知用謀今許都新定未可造次用兵彧有一計名曰二虎競食之計今劉備雖領徐州未得詔命明公可奏請詔命實授備為徐州牧因密與一書教殺呂布事成則備無猛士為輔亦漸可圖事不成則呂布必殺備矣此乃二虎競食之計也操從其言即時奏請詔命遣使齎往徐州封劉備為征東將軍宜城亭侯領徐州牧並附密書一封卻説劉玄德在徐州聞帝幸許都正欲上表慶賀忽報天使至出郭迎接入郡拜受恩命畢設宴管待來使使曰君侯得此恩命實曹將軍于帝前保薦之力也玄德稱謝使者乃取出私書遞與玄德玄德看罷曰此事尚容計議席散安歇來使於館驛玄德連夜與衆商議此事張飛曰呂布本無義之人殺之何礙玄德曰他勢窮而來投我我若殺之亦是不義張飛曰好人難做玄德不從次日呂布來賀玄德教請入見布曰聞公受朝廷恩命特來相賀玄德遜謝只見張飛扯劍上廳要殺呂布玄德慌忙阻住布大驚曰翼德何故只要殺我張飛叫曰曹操道你是無義之人教我哥哥殺你玄德連聲喝退乃引呂布同入後堂實告前因就將曹操所送密書與呂布看布看畢泣曰此乃曹賊欲令我二人不和耳玄德曰兄勿憂劉備誓不為此不義之事呂布再三拜謝備留布飲酒至晚方回關張曰兄長何故不殺呂布玄德曰此曹孟德恐我與呂布同謀伐之故用此計使我兩人自相吞併彼卻於中取利奈何為所使乎關公點頭道是張飛曰我只要殺此賊以絶後患玄德曰此非大丈夫之所為也次日玄德送使回京就拜表謝恩並回書與曹操只言容緩圖之使命回見曹操言玄德不殺呂布之事操問荀彧曰此計不成奈何彧曰又有一計名曰驅虎吞狼之計操曰其計如何彧曰可暗令人往袁術處通問報説劉備上密表要略南郡術聞之必怒而攻備公乃明詔劉備討袁術兩邊相並呂布必生異心此驅虎吞狼之計也操大喜先發人往袁術處次假天子詔發人往徐州卻説玄德在徐州聞使命至出郭迎接開讀詔書卻是要起兵討袁術玄德領命送使者先回糜竺曰此又是曹操之計玄德曰雖是計王命不可違也遂點軍馬克日起程孫乾曰可先定守城之人玄德曰二弟之中誰人可守關公曰弟願守此城玄德曰吾早晚欲與爾議事豈可相離張飛曰小弟願守此城玄德曰你守不得此城你一者酒後剛強鞭撻士卒二者作事輕易不從人諫吾不放心張飛曰弟自今以後不飲酒不打軍士諸般聽人勸諫便了糜竺曰只恐口不應心飛怒曰吾跟哥哥多年未嘗失信你如何輕料我玄德曰弟言雖如此吾終不放心還請陳元龍輔之早晚令其少飲酒勿致失事陳登應諾玄德分付了當乃統馬步軍三萬離徐州望南陽進發卻説袁術聞説劉備上表欲吞其州縣乃大怒曰汝乃織席編屨之夫今輒占據大郡與諸侯同列吾正欲伐汝汝卻反欲圖我深為可恨乃使上將紀靈起兵十萬殺奔徐州兩軍會於盱眙玄德兵少依山傍水下寨那紀靈乃山東人使一口三尖刀重五十斤是日引兵出陳大罵劉備村夫安敢侵吾境界玄德曰吾奉天子詔以討不臣汝今敢來相拒罪不容誅紀靈大怒拍馬舞刀直取玄德關公大喝曰匹夫休得逞強出馬與紀靈大戰一連三十合不分勝負紀靈大叫少歇關公便撥馬回陳立於陳前候之紀靈卻遣副將荀正出馬關公曰只教紀靈來與他決個雌雄荀正曰汝乃無名下將非紀將軍對手關公大怒直取荀正交馬一合砍荀正于馬下玄德驅兵殺將過去紀靈大敗退守淮陰河口不敢交戰只教軍士來偷營劫寨皆被徐州兵殺敗兩軍相拒不在話下卻説張飛自送玄德起身後一應雜事俱付陳元龍管理軍機大務自家參酌一日設宴請各官赴席衆人坐定張飛開言曰我兄臨去時分付我少飲酒恐致失事衆官今日盡此一醉明日都各戒酒幫我守城今日卻都要滿飲言罷起身與衆官把盞酒至曹豹面前豹曰我從天戒不飲酒飛曰廝殺漢如何不飲酒我要你吃一盞豹懼怕只得飲了一杯張飛把遍各官自斟巨觥連飲了幾十杯不覺大醉卻又起身與衆官把盞酒至曹豹豹曰某實不能飲矣飛曰你恰才吃了如今為何推卻豹再三不飲飛醉後使酒便發怒曰你違我將令該打一百便喝軍士拿下陳元龍曰玄德公臨去時分付你甚來飛曰你文官只管文官事休來管我曹豹無奈只得告求曰翼德公看我女壻之面且恕我罷飛曰你女壻是誰豹曰呂布是也飛大怒曰我本不欲打你你把呂布來唬我我偏要打你我打你便是打呂布諸人勸不住將曹豹鞭至五十衆人苦苦告饒方止席散曹豹回去深恨張飛連夜差人齎書一封徑投小沛見呂布備説張飛無禮且雲玄德已往淮南今夜可乘飛醉引兵來襲徐州不可錯此機會呂布見書便請陳宮來議宮曰小沛原非久居之地今徐州既有可乘之隙失此不取悔之晚矣布從之隨即披挂上馬領五百騎先行使陳宮引大軍繼進高順亦隨後進發小沛離徐州只四五十裏上馬便到呂布到城下時恰才四更月色澄清城上更不知覺布到城門邊叫曰劉使君有機密使人至城上有曹豹軍報知曹豹豹上城看之便令軍士開門呂布一聲暗號衆軍齊入喊聲大舉張飛正醉臥府中左右急忙搖醒報説呂布賺開城門殺將進來了張飛大怒慌忙披挂綽了丈八蛇矛才出府門上得馬時呂布軍馬已到正與相迎張飛此時酒猶未醒不能力戰呂布素知飛勇亦不敢相逼十八騎燕將保著張飛殺出東門玄德家眷在府中都不及顧了卻説曹豹見張飛只十數人護從又欺他醉遂引百十人趕來飛見豹大怒拍馬來迎戰了三合曹豹敗走飛趕到河邊一槍正刺中曹豹後心連人帶馬死於河中飛於城外招呼士卒出城者盡隨飛投淮南而去呂布入城安撫居民令軍士一百人守把玄德宅門諸人不許擅入卻説張飛引數十騎直到盱眙來見玄德具説曹豹與呂布裏應外合夜襲徐州衆皆失色玄德歎曰得何足喜失何足憂關公曰嫂嫂安在飛曰皆陷於城中矣玄德默然無語關公頓足埋怨曰你當初要守城時説甚來兄長分付你甚來今日城池又失了嫂嫂又陷了如何是好張飛聞言惶恐無地掣劍欲自刎正是舉杯暢飲情何放拔劍捐生悔已遲不知性命如何且聽下文分解
