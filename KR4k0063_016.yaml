body:
  text: 第十六回呂奉先射戟轅門曹孟德敗師水育水卻説楊大將獻計欲攻劉備袁術曰計將安出大將曰劉備軍屯小沛雖然易取奈呂布虎踞徐州前次許他金帛糧馬至今未與恐其助備今當令人送與糧食以結其心使其按兵不動則劉備可擒先擒劉備後圖呂布徐州可得也術喜便具粟二十萬斛令韓胤齎密書往見呂布呂布甚喜重待韓胤胤回告袁術術遂遣紀靈為大將雷薄陳蘭為副將統兵數萬進攻小沛玄德聞知此信聚衆商議張飛要出戰孫乾曰今小沛糧寡兵微如何抵敵可修書告急于呂布張飛曰那廝如何肯來玄德曰乾之言善遂修書與呂布書略曰伏自將軍垂念令備於小沛容身實拜雲天之德今袁術欲報私仇遣紀靈領兵到縣亡在旦夕非將軍莫能救望驅一旅之師以救倒懸之急不勝幸甚呂布看了書與陳宮計議曰前者袁術送糧致書蓋欲使我不救玄德也今玄德又來求救吾想玄德屯軍小沛未必遂能為我害若袁術並了玄德則北連泰山諸將以圖我我不能安枕矣不若救玄德遂點兵起程卻説紀靈起兵長驅大進已到沛縣東南扎下營寨晝列旌旗遮映山川夜設火鼓震明天地玄德縣中止有五千餘人也只得勉強出縣布陳安營忽報呂布引兵離縣一裏西南上扎下營寨紀靈知呂布領兵來救劉備急令人致書于呂布責其無信布笑曰我有一計使袁劉兩家都不怨我乃發使往紀靈劉備寨中請二人飲宴玄德聞布相請即便欲往關張曰兄長不可去呂布必有異心玄德曰我待彼不薄彼必不害我遂上馬而行關張隨往到呂布寨中入見布曰吾今特解公之危異日得志不可相忘玄德稱謝布請玄德坐關張按劍立於背後人報紀靈到玄德大驚欲避之布曰吾特請你二人來會議勿得生疑玄德未知其意心下不安紀靈下馬入寨卻見玄德在帳上坐大驚抽身便回左右留之不住呂布向前一把扯回如提童稚靈曰將軍欲殺紀靈耶布曰非也靈曰莫非殺大耳兒乎布曰亦非也靈曰然則為何布曰玄德與布乃兄弟也今為將軍所困故來救之靈曰若此則殺靈也布曰無有此理布平生不好鬥惟好解鬥吾今為兩家解之靈曰請問解之之法布曰我有一法從天所決乃拉靈入帳與玄德相見二人各懷疑忌布乃居中坐使靈居左備居右且教設宴行酒酒行數巡布曰你兩家看我面上俱各罷兵玄德無語靈曰吾奉主公之命提十萬之兵專捉劉備如何罷得張飛大怒拔劍在手叱曰吾雖兵少覷汝輩如兒戲耳你比百萬黃巾何如你敢傷我哥哥關公急止之曰且看呂將軍如何主意那時各回營寨廝殺未遲呂布曰我請你兩家解鬥須不教你廝殺這邊紀靈不忿那邊張飛只要廝殺布大怒教左右取我戟來布提畫戟在手紀靈玄德盡皆失色布曰我勸你兩家不要廝殺盡在天命令左右接過畫戟去轅門外遠遠插定乃回顧紀靈玄德曰轅門離中軍一百五十步吾若一箭射中戟小枝你兩家罷兵如射不中你各自回營安排廝殺有不從吾言者並力拒之紀靈私忖戟在一百五十步之外安能便中且落得應允待其不中那時憑我廝殺便一口許諾玄德自無不允布都教坐再各飲一杯酒酒畢布教取弓箭來玄德暗祝曰只願他射得中便好只見呂布挽起袍袖搭上箭扯滿弓叫一聲著正是弓開如秋月行天箭去似流星落地一箭正中畫戟小枝帳上帳下將校齊聲喝采後人有詩贊之曰溫侯神射世間稀曾向轅門獨解危落日果然欺後羿號猿直欲勝由基虎筋弦響弓開處雕羽翅飛箭到時豹子尾搖穿畫戟雄兵十萬脫征衣當下呂布射中畫戟小枝呵呵大笑擲弓於地執紀靈玄德之手曰此天令你兩家罷兵也喝教軍士斟酒來各飲一大觥玄德暗稱慚愧紀靈默然半晌告布曰將軍之言不敢不聽奈紀靈回去主人如何肯信布曰吾自作書復之便了酒又數巡紀靈求書先回布謂玄德曰非我則公危矣玄德拜謝與關張回次日三處軍馬都散不説玄德入小沛呂布歸徐州卻説紀靈回淮南見袁術説呂布轅門射戟解和之事呈上書信袁術大怒曰呂布受吾許多糧米反以此兒戲之事偏護劉備吾當自提重兵親征劉備兼討呂布紀靈曰主公不可造次呂布勇力過人兼有徐州之地若布與備首尾相連不易圖也靈聞布妻嚴氏有一女年已及笄主公有一子可令人求親於布布若嫁女於主公必殺劉備此乃疏不間親之計也袁術從之即日遣韓胤為媒齎禮物往徐州求親胤到徐州見布稱説主公仰慕將軍欲求令愛為兒婦永結秦晉之好布入謀于妻嚴氏原來呂布有二妻一妾先娶嚴氏為正妻後娶貂蟬為妾及居小沛時又娶曹豹之女為次妻曹氏先亡無出貂蟬亦無所出惟嚴氏生一女布最鍾愛當下嚴氏對布曰吾聞袁公路久鎮淮南兵多糧廣早晚將為天子若成大事則吾女有後妃之望只不知他有幾子布曰止有一子妻曰既如此即當許之縱不為皇后吾徐州亦無憂矣布意遂決厚款韓胤許了親事韓胤回報袁術術即備聘禮仍令韓胤送至徐州呂布受了設席相待留於館驛安歇次日陳宮竟往館驛內拜望韓胤講禮畢坐定宮乃叱退左右對胤曰誰獻此計教袁公與奉先聯姻意在取劉玄德之頭乎胤失驚起謝曰乞公台勿泄宮曰吾自不泄只恐其事若遲必被他人識破事將中變胤曰然則奈何願公教之宮曰吾見奉先便其即日送女就親何如胤大喜稱謝曰若如此袁公感佩明德不淺矣宮遂辭別韓胤入見呂布曰聞公女許嫁袁公路甚善但不知于何日結親布曰尚容徐議宮曰古者自受聘至成婚之期各有定例天子一年諸侯半年大夫一季庶民一月布曰袁公路天賜國寶早晚當為帝今從天子例可乎宮曰不可布曰然則仍從諸侯例宮曰亦不可布曰然則將從卿大夫例矣宮曰亦不可布笑曰公豈欲吾依庶民例耶宮曰非也布曰然則公意欲如何宮曰方今天下諸侯互相爭雄今公與袁公路結親諸侯保無有嫉妒者乎若復遠擇吉期或竟乘我良辰伏兵半路以奪之如之奈何為今之計不許便休既已許之當趁諸侯未知之時即便送女到壽春另居別館然後擇吉成親萬無一失也布喜曰公台之言甚當遂入告嚴氏連夜具辦妝奩收拾寶馬香車令宋憲魏續一同韓胤送女前去鼓樂喧天送出城外時陳元龍之父陳圭養老在家聞鼓樂之聲遂問左右左右告以故圭曰此乃疏不間親之計也玄德危矣遂扶病來見呂布布曰大夫何來圭曰聞將軍死至特來吊喪布驚曰何出此言圭曰前者袁公路以金帛送公欲殺劉玄德而公以射戟解之今忽來求親其意蓋欲以公女為質隨後就來攻玄德而取小沛小沛亡徐州危矣且彼或來借糧或來借兵公若應之是疲於奔命而又結怨於人若其不允是棄親而啓兵端也況聞袁術有稱帝之意是造反也彼若造反則公乃反賊親屬矣得無為天下所不容乎布大驚曰陳宮誤我急命張遼引兵追趕至三十裏之外將女搶歸連韓胤都拿回監禁不放歸去卻令人回復袁術只説女兒妝奩未備俟備畢便自送來陳圭又説呂布使解韓胤赴許都布猶豫未決忽人報玄德在小沛招軍買馬不知何意布曰此為將者本分事何足為怪正話間宋憲魏續至告布曰我二人奉明公之命往山東買馬買得好馬三百餘匹回至沛縣界首被強寇劫去一半打聽得是劉備之弟張飛詐妝山賊搶劫馬匹去了呂布聽了大怒隨即點兵往小沛來鬥張飛玄德聞知大驚慌忙領兵出迎兩陳圓處玄德出馬曰兄長何故領兵到此布指罵曰我轅門射戟救你大難你何故奪我馬匹玄德曰備因缺馬令人四下收買安敢奪兄馬匹布曰你便使張飛奪了我好馬一百五十匹尚自抵賴張飛挺槍出馬曰是我奪了你好馬你今待怎麼布罵曰環眼賊你纍次渺視我飛曰我奪你馬你便惱你奪我哥哥的徐州便不説了布挺戟出馬來戰張飛飛亦挺槍來迎兩個酣戰一百餘合未見勝負玄德恐有疏失急鳴金收軍入城呂布分軍四面圍定玄德喚張飛責之曰都是你奪他馬匹惹起事端如今馬匹在何處飛曰都寄在各寺院內玄德隨令人出城至呂布營中説情願送還馬匹兩相罷兵布欲從之陳宮曰今不殺劉備久後必為所害布聽之不從所請攻城愈急玄德與糜竺孫乾商議孫乾曰曹操所恨者呂布也不若棄城走許都投奔曹操借軍破布此為上策玄德曰誰可當先破圍而出飛曰小弟情願死戰玄德令飛在前雲長在後自居於中保護老小當夜三更乘著月明出北門而走正遇宋憲魏續被翼德一陳殺退得出重圍後面張遼趕來關公敵住呂布見玄德去了也不來趕隨即入城安民令高順守小沛自己仍回徐州去了卻説玄德前奔許都到城外下寨先使孫乾來見曹操言被呂布追逼特來相投操曰玄德與吾兄弟也便請入城相見次日玄德留關張在城外自帶孫乾糜竺入見操操待以上賓之禮玄德備訴呂布之事操曰布乃無義之輩吾與賢弟並力誅之玄德稱謝操設宴相待至晚送出荀彧入見曰劉備英雄也今不早圖後必為患操不答彧出郭嘉入操曰荀彧勸我殺玄德當如何嘉曰不可主公興義兵為百姓除暴惟仗信義以招俊傑猶懼其不來也今玄德素有英雄之名以困窮而來投若殺之是害賢也天下智謀之士聞而自疑將裹足不前主公誰與定天下乎夫除一人之患以阻四海之望安危之機不可不察操大喜曰君言正合吾心次日即表薦劉德領豫州牧程昱諫曰劉備終不為人之下不如早圖之操曰方今正用英雄之時不可殺一人而失天下之心此郭奉孝與吾有同見也遂不聽昱言以兵三千糧萬斛送與玄德使往豫州到任進兵屯小沛招集原散之兵攻呂布玄德至豫州令人約會曹操操正欲起兵自往征呂布忽流星馬報説張濟自關中引兵攻南陽為流矢所中而死濟侄張繡統其衆用賈詡為謀士結連劉表屯兵宛城欲興兵犯闕奪駕操大怒欲興兵討之又恐呂布來侵許都乃問計於荀彧彧曰此易事耳呂布無謀之輩見利必喜明公可遣使往徐州加官賜賞令與玄德解和布喜則不思遠圖矣操曰善遂差奉軍都尉王則齎官誥並和解書往徐州去訖一面起兵十五萬親討張繡分軍三路而行以夏侯惇為先鋒軍馬至淯水下寨賈詡勸張繡曰操兵勢大不可與敵不如舉衆投降張繡從之使賈詡至操寨通款操見詡應對如流甚愛之欲用為謀士詡曰某昔從李傕得罪天下今從張繡言聽計從不忍棄之乃辭去次日引繡來見操操待之甚厚引兵入宛城屯扎餘軍分屯城外寨柵聯絡十餘裏一住數日繡每日設宴請操一日操醉退入寢所私問左右曰此城中有妓女否操之兄之曹安民知操意乃密對曰昨晚小侄窺見館舍之側有一婦人生得十分美麗問之即繡叔張濟之妻也操聞言便令安民領五十甲兵往取之須臾取到軍中操見之果然美麗問其姓婦答曰妾乃張濟之妻鄒氏也操曰夫人識吾否鄒氏曰久聞丞相威名今夕幸得瞻拜操曰吾為夫人故特納張繡之降不然滅族矣鄒氏拜曰實感再生之恩操曰今日得見夫人乃天幸也今宵願同枕席隨吾還都安享富貴何如鄒氏拜謝是夜共宿於帳中鄒氏曰久住城中繡必生疑亦恐外人議論操曰明日同夫人去寨中住次日移于城外安歇喚典韋就中軍帳房外宿衛他人非奉呼喚不許輒入因此內外不通操每日與鄒氏取樂不想歸期張繡家人密報繡繡怒曰操賊辱我太甚便請賈詡商議詡曰此事不可泄漏來日等操出帳議事如此如此次日操坐帳中張繡入告曰新降兵多有逃亡者乞移屯中軍操許之繡乃移屯其軍分為四寨刻期舉事因畏典韋勇猛急切難近乃與偏將胡車兒商議那胡車兒力能負五百斤日行七百里亦異人也當下獻計於繡曰典韋之可畏者雙鐵戟耳主公明日可請他來吃酒使盡醉而歸那時某便混入他跟來軍士數內偷入帳房先盜其戟此人不足畏矣繡甚喜預先準備弓箭甲兵告示各寨至期令賈詡致意請典韋到寨殷勤待酒至晚醉歸胡車兒雜在衆人隊裏直入大寨是夜曹操於帳中與鄒氏飲酒忽聽帳外人言馬嘶操使觀之回報是張繡軍夜巡操乃不疑時近二更忽聞寨內呐喊報説草車上火起操曰軍人失火勿得驚動須臾四下裏火起操始著忙急喚典韋韋方醉臥睡夢中聽得金鼓喊殺之聲便跳起身來卻尋不見了雙戟時敵兵已到轅門韋急掣步卒腰刀在手只見門首無數軍馬各挺長槍搶入寨來韋奮力向前砍死二十餘人馬軍方退步軍又到兩邊槍如葦列韋身無片甲上下被數十槍兀自死戰刀砍缺不堪用韋即棄刀雙手提著兩個軍人迎敵擊死者八九人群賊不敢近只遠遠以箭射之箭如驟雨韋猶死拒寨門爭奈寨後賊軍已入韋背上又中一槍乃大叫數聲血流滿地而死死了半晌還無一人敢從前門而入者卻説曹操賴典韋當寨門乃得從寨後上馬逃奔只有曹安民步隨操右臂中了一箭馬亦中了三箭虧得那馬是大宛良馬熬得痛走得快剛剛走到淯水河邊賊兵追至安民被砍為肉泥操急聚馬沖波過河才上得岸賊兵一箭射來正中馬眼那馬撲地倒了操長子曹昂即以己所乘之馬奉操操上馬急奔曹昂卻被亂箭射死操乃走脫路逢諸將收集殘兵時夏侯惇所領青州之兵乘勢下鄉劫掠民家平虜校尉于禁即將本部軍于路剿殺安撫鄉民青州兵走回迎操泣拜於地言於禁造反趕殺青州軍馬操大驚須臾夏侯惇許褚李典樂進都到操言於禁造反可整兵迎之卻説於禁見操等俱到乃引軍射住陳角鑿塹安營或告之青州軍言將軍造反今丞相已到何不分辨乃先立營寨耶於禁曰今賊追兵在後不時即至若不先準備何以拒敵分辨小事退敵大事安營方畢張繡軍兩路殺至於禁身先出寨迎敵繡急退兵左右諸將見於禁向前各引兵擊之繡軍大敗追殺百餘裏繡勢窮力孤引敗兵投劉表去了曹操收軍點將於禁入見備言青州之兵肆行劫掠大失民望某故殺之操曰不告我先下寨何也禁以前言對操曰將軍在匆忙之中能整兵堅壘任謗任勞使反敗為勝雖古之名將何以加茲乃賜以金器一副封益壽亭侯責夏侯惇治兵不嚴之過又設祭祭典韋操親自哭而奠之顧謂諸將曰吾折長子愛侄俱無深痛獨號泣典韋也衆皆感歎次日下令班師不説曹操還兵許都且説王則齎詔至徐州布迎接入府開讀詔書封布為平東將軍特賜印綬又出操私書王則在呂布面前極道曹公相敬之意布大喜忽報袁術遣人至布喚入問之使言袁公早晚即皇帝位立東宮催取皇妃早到淮南布大怒曰反賊焉敢如此遂殺來使將韓胤用枷釘了遣陳登齎謝表解韓胤一同王則上許都來謝恩且答書于操欲求實授徐州牧操知布絶婚袁術大喜遂斬韓胤于市曹陳登密諫操曰呂布豺狼也勇而無謀輕於去就宜早圖之操曰吾素知呂布狼子野心誠難久養非公父子莫能究其情公當與吾謀之登曰丞相若有舉動某當為內應操喜表贈陳圭秩中二千石登為廣陵太守登辭回操執登手曰東方之事便以相付登點頭允諾回徐州見呂布布問之登言父贈祿某為太守布大怒曰汝不為吾求徐州牧而乃自求爵祿汝父教我協同曹公絶婚公路今吾所求終無一獲而汝父子俱各顯貴吾為汝父子所賣耳遂拔劍欲斬之登大笑曰將軍何其不明之甚也布曰吾何不明登曰吾見曹公言養將軍譬如養虎當飽其肉不飽則將噬人曹公笑曰不如卿言吾待溫侯如養鷹耳狐兔未息不敢先飽飢則為用裕去某問誰為狐兔曹公曰淮南袁術江東孫策冀州袁紹荊襄劉表益州劉璋漢中張魯皆狐兔也布擲劍笑曰曹公知我也正説話間忽報袁術軍取徐州呂布聞言失驚正是秦晉未諧吳越鬥婚姻惹出甲兵來畢竟後事如何且聽下文分解
