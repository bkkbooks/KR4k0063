body:
  text: 第十七回袁公路大起七軍曹孟德會合三將卻説袁術在淮南地廣糧多又有孫策所質玉璽遂思僭稱帝號大會群下議曰昔漢高祖不過泗上一亭長而有天下今歷年四百氣數已盡海內鼎沸吾家四世三公百姓所歸吾欲應天順人正位九五爾衆人以為何如主簿閻象曰不可昔周後稷積德纍功至於文王三分天下有其二猶以服事殷明公家世雖貴未若有周之盛漢室雖微未若殷紂之暴也此事決不可行術怒曰吾袁姓出於陳陳乃大舜之後以土承火正應其運又讖雲代漢者當塗高也吾字公路正應其讖又有傳國玉璽若不為君背天道也吾意已決多言者斬遂建號仲氏立台省等官乘龍鳳輦祀南北郊立馮方女為後立子為東宮因命使催取呂布之女為東宮妃卻聞布已將韓胤解赴許都為曹操所斬乃大怒遂拜張勳為大將軍統領大軍二十余萬分七路征徐州第一路大將張勳居中第二路上將橋蕤居左第三路上將陳紀居右第四路副將雷薄居左第五路副將陳蘭居右第六路降將韓暹居左第七路降將楊奉居右各領部下健將克日起行命兗州刺史金尚為太尉監運七路錢糧尚不從術殺之以紀靈為七路都救應使術自引軍三萬使李豐梁剛樂就為催進使接應七路之兵呂布使人探聽得張勳一軍從大路徑取徐州橋蕤一軍取小沛陳紀一軍取沂都雷薄一軍取琅琊陳蘭一軍取碣石韓暹一軍取下邳楊奉一軍取浚山七路軍馬日行五十裏于路劫掠將來乃急召衆謀士商議陳宮與陳圭父子俱至陳宮曰徐州之禍乃陳圭父子所招媚朝廷以求爵祿今日移禍于將軍可斬二人之頭獻袁術其軍自退布聽其言即命擒下陳圭陳登陳登大笑曰何如是之懦也吾觀七路之兵如七堆腐草何足介意布曰汝若有計破敵免汝死罪陳登曰將軍若用老夫之言徐州可保無虞布曰試言之登曰術兵雖衆皆烏合之師素不親信我以正兵守之出奇兵勝之無不成功更有一計不止保安徐州並可生擒袁術布曰計將安出登曰韓暹楊奉乃漢舊臣因懼曹操而走無家可依暫歸袁術術必輕之彼亦不樂為術用若憑尺書結為內應更連劉備為外合必擒袁術矣布曰汝須親到韓暹楊奉處下書陳登允諾布乃發表上許都並致書與豫州然後令陳登引數騎先於下邳道上候韓暹暹引兵至下寨畢登入見暹問曰汝乃呂布之人來此何干登笑曰某為大漢公卿何謂呂布之人若將軍者向為漢臣今乃為叛賊之臣使昔日關中保駕之功化為烏有竊為將軍不取也且袁術性最多疑將軍後必為其所害今不早圖悔之無及暹歎曰吾欲歸漢恨無門耳登乃出布書暹覽書畢曰吾已知之公先回吾與楊將軍反戈擊之但看火起為號溫侯以兵相應可也登辭暹急回報呂布布乃分兵五路高順引一軍進小沛敵橋蕤陳宮引一軍進沂都敵陳紀張遼臧霸引一軍出琅琊敵雷薄宋憲魏續引一軍出碣石敵陳蘭呂布自引一軍出大道敵張勳各領軍一萬餘者守城呂布出城三十裏下寨張勳軍到料敵呂布不過且退二十裏屯住待四下兵接應是夜二更時分韓暹楊奉分兵到處放火接應呂家軍入寨勳軍大亂呂布乘勢掩殺張勳敗走呂布趕到天明正撞紀靈接應兩軍相迎恰待交鋒韓暹楊奉兩路殺來紀靈大敗而走呂布引兵追殺山背後一彪軍到門旗開處只見一隊軍馬打龍鳳日月旗幡四鬥五方旌幟金瓜銀斧黃鉞白旄黃羅銷金傘蓋之下袁術身披金甲腕懸兩刀立於陳前大罵呂布背主家奴布怒挺戟向前術將李豐挺槍來迎戰不三合被布刺傷其手豐棄槍而走呂布麾兵衝殺術軍大亂呂布引軍從後追趕搶奪馬匹衣甲無數袁術引著敗軍走不上數裏山背後一彪軍出截住去路當先一將乃關雲長也大叫反賊還不受死袁術慌走餘衆四散奔逃被雲長大殺了一陳袁術收拾敗軍奔回淮南去了呂布得勝邀請雲長並楊奉韓暹等一行人馬到徐州大排筵宴管待軍士都有犒賞次日雲長辭歸布保韓暹為沂都牧楊奉為琅琊牧商議欲留二人在徐州陳圭曰不可韓楊二人據山東不出一年則山東城郭皆屬將軍也布然之遂送二將暫於沂都琅琊二處屯扎以候恩命陳登私問父曰何不留二人在徐州為殺呂布之根圭曰倘二人協助呂布是反為虎添爪牙也登乃服父之高見卻説袁術敗回淮南遣人往江東問孫策借兵報仇策怒曰汝賴吾玉璽僭稱帝號背反漢室大逆不道吾方欲加兵問罪豈肯反助叛賊乎遂作書以絶之使者齎書回見袁術術看畢怒曰黃口孺子何敢乃爾吾先伐之長史楊大將力諫方止卻説孫策自發書後防袁術兵來點軍守住江口忽曹操使至拜策為會稽太守令起兵征討袁術策乃商議便欲起兵長史張昭曰術雖新敗兵多糧足未可輕敵不如遺書曹操勸他南征吾為後應兩軍相援術軍必敗萬一有失亦望操救援策從其言遣使以此意達曹操卻説曹操至許都思慕典韋立祀祭之封其子典滿為中郎收養在府忽報孫策遣使致書操覽書畢又有人報袁術乏糧劫掠陳留欲乘虛攻之遂興兵南征令曹仁守許都其餘皆從征馬步兵十七萬糧食輜重千余車一面先發人會合孫策與劉備呂布兵至豫州界上玄德早引兵來迎操命請入營相見畢玄德獻上首級二顆操驚曰此是何人首級玄德曰此韓暹楊奉之首極也操曰何以得之玄德曰呂布令二人權住沂都琅琊兩縣不意二人縱兵掠民人人嗟怨因此備乃設一宴詐請議事飲酒間擲盞為號使關張二弟殺之盡降其衆今特來請罪操曰君為國家除害正是大功何言罪也遂厚勞玄德合兵到徐州界呂布出迎操善言撫慰封為左將軍許于還都之時換給印綬布大喜操即分呂布一軍在左玄德一軍在右自統大軍居中令夏侯惇于禁為先鋒袁術知操兵至令大將橋蕤引兵五萬作先鋒兩軍會于壽春界口橋蕤當先出馬與夏侯惇戰不三合被夏侯惇搠死術軍大敗奔走回城忽報孫策發船攻江邊西面呂布引兵攻東面劉備關張引兵攻南面操自引兵十七萬攻北面術大驚急聚衆文武商議楊大將曰壽春水旱連年人皆缺食今又動兵擾民民既生怨兵至難以拒敵不如留軍在壽春不必與戰待彼兵糧盡必然生變陛下且統禦林軍渡淮一者就熟二者暫避其鋭術用其言留李豐樂就梁剛陳紀四人分兵十萬堅守壽春其餘將卒並庫藏金玉寶貝盡數收拾過淮去了卻説曹兵十七萬日費糧食浩大諸郡又荒旱接濟不及操催軍速戰李豐等閉門不出操軍相拒月餘糧食將盡致書于孫策借得糧米十萬斛不敷支散管糧官任峻部下倉官王垕入稟操曰兵多糧少當如之何操曰可將小斛散之權且救一時之急垕曰兵士倘怨如何操曰吾自有策垕依命以小斛分散操暗使人各寨探聽無不嗟怨皆言丞相欺衆操乃密召王垕入曰吾欲問汝借一物以壓衆心汝必勿吝垕曰丞相欲用何物操曰欲借汝頭以示衆耳垕大驚曰某實無罪操曰吾亦知汝無罪但不殺汝軍必變矣汝死後汝妻子吾自養之汝勿慮也垕再欲言時操早呼刀斧手推出門外一刀斬訖懸頭高竿出榜曉示曰王垕故行小斛盜竊官糧謹按軍法於是衆怨始解次日操傳令各營將領如三日內不並力破城皆斬操親自至城下操諸軍搬土運石填壕塞塹城上矢石如雨有兩員裨將畏避而回操掣劍親斬於城下遂自下馬接土填坑於是大小將士無不向前軍威大振城上抵敵不住曹兵爭先上城斬關落鎖大隊擁入李豐陳紀樂就梁剛都被生擒曹令皆斬於市焚燒偽造宮室殿宇一應犯禁之物壽春城中收掠一空商議欲進兵渡淮追趕袁術荀彧諫曰年來荒旱糧食艱難若更進兵勞軍損民未必有利不若暫回許都待來春麥熟軍糧足備方可圖之操躊躇未決忽報馬到報説張繡依託劉表復肆猖獗南陽章陵諸縣復反曹洪拒敵不住連輸數陳今特來告急操乃馳書與孫策令其跨江布陳以為劉表疑兵使不敢妄動自己即日班師別議征張繡之事臨行令玄德仍屯兵小沛與呂布結為兄弟互相救助再無相侵呂布領兵自回徐州操密謂玄德曰吾令汝屯兵小沛是掘坑待虎之計也公但與陳圭父子商議勿致有失某當為公外援話畢而別卻説曹操引軍回許都人報段煨殺了李傕伍習殺了郭汜將頭來獻段煨並將李傕合族老小二百余口活解入許都操令分於各門處斬傳首號令人民稱快天子升殿會集文武作太平筵宴封段煨為蕩寇將軍伍習為殄虜將軍各引兵鎮守長安二人謝恩而去操即奏張繡作亂當興兵伐之天子乃親排鑾駕送操出師時建安三年夏四月也操留荀彧在許都調遣兵將自統大軍進發行軍之次見一路麥已熟民因兵至逃避在外不敢刈麥操使人遠近遍諭村人父老及各處守境官吏曰吾奉天子明詔出兵討逆與民除害方今麥熟之時不得已而起兵大小將校凡過麥田但有踐踏者並皆斬首軍法甚嚴爾民勿得驚疑百姓聞諭無不歡喜稱頌望塵遮道而拜官軍經過麥田皆下馬以手扶麥遞相傳送而過並不敢踐踏操乘馬正行忽田中驚起一鳩那馬眼生竄入麥中踐壞了一大塊麥田操隨呼行軍主簿擬議自己踐麥之罪主簿曰丞相豈可議罪操曰吾自製法吾自犯之何以服衆即掣所佩之劍欲自刎衆急救住郭嘉曰古者春秋之義法不加於尊丞相總統大軍豈可自戕操沈吟良久乃曰既春秋有法不加於尊之義吾姑免死乃以劍割自己之發擲於地曰割發權代首使人以發傳示三軍曰丞相踐麥本當斬首號令今割發以代於是三軍悚然無不懍遵軍令後人有詩論之曰十萬貔貅十萬心一人號令衆難禁拔刀割發權為首方見曹瞞詐術深卻説張繡知操引兵來急發書報劉表使為後應一面與雷敘張先二將領兵出城迎敵兩陳對圓張繡出馬指操罵曰汝乃假仁義無廉恥之人與禽獸何異操大怒令許褚出馬繡令張先接戰只三合許褚斬張先于馬下繡軍大敗操引軍趕至南陽城下繡入城閉門不出操圍城攻打見城壕甚闊水勢又深急難近城乃令軍士運土填壕又用土布袋並柴薪草把相雜于城邊作梯凳又立雲梯窺望城中操自騎馬繞城觀之如此三日傳令教軍士于西門角上堆積柴薪會集諸將就那裏上城城中賈詡見如此光景便謂張繡曰某已知曹操之意矣今可將計就計而行正是強中自有強中手用詐還逢識詐人不知其計若何且聽下文分解
