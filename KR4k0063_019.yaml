body:
  text: 第十九回下邳城曹操鏖兵白門樓呂布殞命卻説高順引張遼擊關公寨呂布自擊張飛寨關張各出迎戰玄德引兵兩路接應呂布分軍從背後殺來關張兩軍皆潰玄德引數十騎奔回沛城呂布趕來玄德急喚城上軍士放下吊橋呂布隨後也到城上欲待放箭又恐射了玄德被呂布乘勢殺入城門把門將士抵敵不住都四散奔避呂布招軍入城玄德見勢已急到家不及只得棄了妻小穿城而過走出西門匹馬逃難呂布趕到玄德家中糜竺出迎告布曰吾聞大丈夫不廢人之妻子今與將軍爭天下者曹公耳玄德常念轅門射戟之恩不敢背將軍也今不得已而投曹公惟將軍憐之布曰吾與玄德舊交豈忍害他妻子便令糜竺引玄德妻小去徐州安置布自引軍投山東兗州境上留高順張遼守小沛此時孫乾已逃出城外關張二人亦各自收得些人馬往山中住扎且説玄德匹馬逃難正行間背後一人趕至視之乃孫乾也玄德曰吾今兩弟不知存亡妻小失散為之奈何孫乾曰不若且投曹操以圖後計玄德依言尋小路投許都途次絶糧嘗往村中求食但到處聞劉豫州皆爭進飲食一日到一家投宿其家一少年出拜問其姓名乃獵戶劉安也當下劉安聞豫州牧至欲尋野味供食一時不能得乃殺其妻以食之玄德曰此何肉也安曰乃狼肉也玄德不疑乃飽食了一頓天晚就宿至曉將去往後院取馬忽見一婦人殺於廚下臂上肉已都割去玄德驚問方知昨夜食者乃其妻之肉也玄德不勝傷感灑淚上馬劉安告玄德曰本欲相隨使君因老母在堂未敢遠行玄德稱謝而別取路出梁城忽見塵頭蔽日一彪大軍來到玄德知是曹操之軍同孫乾徑至中軍旗下與曹操相見具説失沛城散二弟陷妻小之事操亦為之下淚又説劉安殺妻為食之事操乃令孫乾以金百兩往賜之軍行至濟北夏侯淵等迎接入寨備言兄夏侯惇損其一目臥病未痊操臨臥處視之令先回許都調理一面使人打探呂布現在何處探馬回報雲呂布與陳宮臧霸結連泰山賊寇共攻兗州諸郡操即令曹仁引三千兵打沛城操親提大軍與玄德來戰呂布前至山東路近蕭關正遇泰山寇孫觀吳敦尹禮昌豨領兵三萬餘攔住去路操令許褚迎戰四將一齊出馬許褚奮力死戰四將抵敵不住各自敗走操乘勢掩殺追至蕭關探馬飛報呂布時布已回徐州欲同陳登往救小沛令陳圭守徐州陳登臨行圭謂之曰昔曹公曾言東方事盡付與汝今布將敗可便圖之登曰外面之事兒自為之倘布敗回父親便請糜竺一同守城休放布入兒自有脫身之計圭曰布妻小在此心腹頗多為之奈何登曰兒亦有計了乃入見呂布曰徐州四面受敵操必力攻我當先思退步可將錢糧移於下邳倘徐州被圍下邳有糧可救主公盍早為計布曰元龍之言甚善吾當並妻小移去遂令宋憲魏續保護妻小與錢糧移屯下邳一面自引軍與陳登往救蕭關到半路登曰容某先到關探曹操虛實主公方可行布許之登乃先到關上陳宮等接見登曰溫侯深怪公等不肯向前要來責罰宮曰今曹兵勢大未可輕敵吾等緊守關隘可勸主公深保沛城乃為上策陳登唯唯至晚上關而望見曹兵直逼關下乃乘夜連寫三封書拴在箭上射下關去次日辭了陳宮飛馬來見呂布曰關上孫觀等皆欲獻關某已留下陳宮守把將軍可于黃昏時殺去救應布曰非公則此關休矣便教陳登飛騎先至關約陳宮為內應舉火為號登徑往報宮曰曹兵已抄小路到關內恐徐州有失公等宜急回宮遂引衆棄關而走登就關上放起火來呂布乘黑殺至陳宮軍和呂布軍在黑暗裏自相掩殺曹兵望見號火一齊殺到乘勢攻擊孫觀等各自四散逃避去了呂布直殺到天明方知是計急與陳宮回徐州到得城邊叫門時城上亂箭射下糜竺在敵樓上喝曰汝奪吾主城池今當仍還吾主汝不得復入此城也布大怒曰陳圭何在竺曰吾已殺之矣布回顧宮曰陳登安在宮曰將軍尚執迷而問此佞賊乎布令遍尋軍中卻只不見宮勸布急投小沛布從之行至半路只見一彪軍驟至視之乃高順張遼也布問之答曰陳登來報説主公被圍令某等急來救解宮曰此又佞賊之計也布怒曰吾必殺此賊急驅馬至小沛只見小沛城上盡插曹兵旗號原來曹操已令曹仁襲了城池引軍守把呂布於城下大罵陳登登在城上指布罵曰吾乃漢臣安肯事汝反賊耶布大怒正待攻城忽聽背後喊聲大起一隊人馬來到當先一將乃是張飛高順出馬迎敵不能取勝布親自接戰正鬥間陳外喊聲復起曹操親統大軍衝殺前來呂布料難抵敵引軍東走曹兵隨後追趕呂布走得人困馬乏忽又閃出一彪軍攔住去路為首一將立馬橫刀大喝呂布休走關雲長在此呂布慌忙接戰背後張飛趕來布無心戀戰與陳宮等殺開條路徑奔下邳侯成引兵接應去了關張相見各灑淚言失散之事雲長曰我在海州路上住扎探得消息故來至此張飛曰弟在芒碭山住了這幾時今日幸得相遇兩個敘話畢一同引兵來見玄德哭拜於地玄德悲喜交集引二人見曹操便隨操入徐州糜竺接見具言家屬無恙玄德甚喜陳圭父子亦來參拜曹操操設一大宴犒勞諸將操自居中使陳圭居右玄德居左其餘將士各依次坐宴罷操嘉陳圭父子之功加封十縣之祿授登為伏波將軍且説曹操得了徐州心中大喜商議起兵攻下邳程昱曰布今止有下邳一城若逼之太急必死戰而投袁術矣布與術合其勢難攻今可使能事者守住淮南徑路內防呂布外當袁術況今山東尚有臧霸孫觀之徒未曾歸順防之亦不可忽也操曰吾自當山東諸路其淮南徑路請玄德當之玄德曰丞相將令安敢有違次日玄德留糜竺簡雍在徐州帶孫乾關張引軍往守淮南徑路曹操自引兵攻下邳且説呂布在下邳自恃糧食足備且有泗水之險安心坐守可保無虞陳宮曰今操兵方來可乘其寨柵未定以逸擊勞無不勝者布曰吾方屢敗不可輕出待其來攻而後擊之皆落泗水矣遂不聽陳宮之言過數日曹兵下寨已定操統衆將至城下大叫呂布答話布上城而立操謂布曰聞奉先又欲結婚袁術吾故領兵至此夫術有反逆大罪而公有討董卓之功今何自棄其前功而從逆賊耶倘城池一破悔之晚矣若早來降共扶王室當不失封侯之位布曰丞相且退尚容商議陳宮在布側大罵曹操姦賊一箭射中其麾蓋操指宮恨曰吾誓殺汝遂引兵攻城宮謂布曰曹操遠來勢不能久將軍可以步騎出屯於外宮將餘衆閉守於內操若攻將軍宮引兵擊其背若來攻城將軍為救于後不過旬日操軍食盡可一鼓而破此乃掎角之勢也布曰公言極是遂歸府收拾戎裝時方冬寒分付從人多帶綿衣布妻嚴氏聞之出問曰君欲何往布告以陳宮之謀嚴氏曰君委全城捐妻子孤軍遠出倘一旦有變妾豈得為將軍之妻乎布躊躇未決三日不出宮入見曰操軍四面圍城若不早出必受其困布曰吾思遠出不如堅守宮曰近聞操軍糧少遣人往許都去取早晚將至將軍可引精兵往斷其糧道此計大妙布然其言復入內對嚴氏説知此事嚴氏泣曰將軍若出陳宮高順安能堅守城池倘有差失悔無及矣妾昔在長安已為將軍所棄幸賴龐舒私藏妾身再得與將軍相聚孰知今又棄妾而去乎將軍前程萬里請勿以妾為念言罷痛哭布聞言愁悶不決入告貂蟬貂蟬曰將軍與妾作主勿輕身自出布曰汝無憂慮吾有畫戟赤兔馬誰敢近我乃出謂陳宮曰操軍糧至者詐也操多詭計吾未敢動宮出歎曰吾等死無葬身之地矣布於是終日不出只同嚴氏貂蟬飲酒解悶謀士許汜王楷入見布進計曰今袁術在淮南聲勢大振將軍舊曾與彼約婚今何不仍求之彼兵若至內外夾攻操不難破也布從其計即日修書就著二人前去許汜曰須得一軍引路沖出方好布令張遼郝萌兩個引兵一千送出隘口是夜二更張遼在前郝萌在後保著許汜王楷殺出城去抹過玄德寨衆將追趕不及已出隘口郝萌將五百人跟許汜王楷而去張遼引一半軍回來到隘口時雲長攔住未及交鋒高順引兵出城救應接入城中去了且説許汜王楷至壽春拜見袁術呈上書信術曰前者殺吾使命賴我婚姻今又來相問何也汜曰此為曹操姦計所誤願明上詳之術曰汝主不因曹兵困急豈肯以女許我楷曰明上今不相救恐唇亡齒寒亦非明上之福也術曰奉先反復無信可先送女然後發兵許汜王楷只得拜辭和郝萌回來到玄德寨邊汜曰日間不可過夜半吾二人先行郝將軍斷後商量停當夜過玄德寨許汜王楷先過去了郝萌正行之次張飛出寨攔路郝萌交馬只一合被張飛生擒過去五百人馬盡被殺散張飛解郝萌來見玄德玄德押往大寨見曹操郝萌備説求救許婚一事操大怒斬郝萌於軍門使人傳諭各寨小心防守如有走透呂布及彼軍士者依軍法處治各寨悚然玄德回營分付關張曰我等正當淮南沖要之處二弟切宜小心在意勿犯曹公軍令飛曰捉了一員賊將操不見有甚褒賞卻反來唬嚇何也玄德曰非也曹操統領多軍不以軍令何能服人弟勿犯之關張應諾而退卻説許汜王楷回見呂布具言袁術先欲得婦然後起兵救援布曰如何送去汜曰今郝萌被獲操必知我情預作準備若非將軍親自護送誰能突出重圍布曰今日便送去如何汜曰今郝萌被獲操必知我情作準備若非將軍親自護送誰能突出重圍布曰今日便送去如何汜曰今日乃凶神值日不可去明日大利宜用戌亥時布命張遼高順引三千軍馬安排小車一輛我親送至二百裏外卻使你兩個送去次夜二更時分呂布將女以綿纏身用甲包裹負於背上提戟上馬放開城門布當先出城張遼高順跟著將次到玄德寨前一聲鼓響關張二人攔住去路大叫休走呂布無心戀戰只顧奪路而行玄德自引一軍殺來兩軍混戰呂布雖勇終是縛一女在身上只恐有傷不敢衝突重圍後面徐晃許褚皆殺來衆軍皆大叫曰不要走了呂布布見軍來太急只得仍退入城玄德收軍徐晃等各歸寨端的不曾走透一個呂布回到城中心中憂悶只是飲酒卻説曹操攻城兩月不下忽報河內太守張楊出兵東市欲救呂布部將楊醜殺之欲將頭獻丞相卻被張楊心腹將眭固所殺反投犬城去了操聞報即遣史渙追斬眭固因聚衆將曰張楊雖幸自滅然北有袁紹之憂東有表繡之患下邳久圍不克吾欲舍布還都暫且息戰何如荀攸急止曰不可呂布屢敗鋭氣已墮軍以將為主將衰則軍無戰心彼陳宮雖有謀而遲今布之氣未復宮之謀未定作速攻之布可擒也郭嘉曰某有一計下邳城可立破勝於二十萬師荀彧曰莫非決沂泗之水乎嘉笑曰正是此意操大喜即令軍士決兩河之水曹兵皆居高原坐視水淹下邳下邳一城只剩得東無水其餘各門都被水淹衆軍飛報呂布布曰吾有赤兔馬渡水如平地又何懼哉乃日與妻妾痛飲美酒因酒色過傷形容銷減一日取鏡自照驚曰吾被酒色傷矣自今日始當戒之遂下令城中但有飲酒者皆斬卻説侯成有馬十五匹被後槽人盜去欲獻與玄德侯成知覺追殺後槽人將馬奪回諸將與侯成作賀侯成釀得五六斛酒欲與諸將會飲恐呂布見罪乃先以酒五瓶詣布府稟曰托將軍虎威追得失馬衆將皆來作賀釀得些酒未敢擅飲特先奉上微意布大怒曰吾方禁酒汝卻釀酒會飲莫非同謀伐我乎命推出斬之宋憲魏續等諸將俱入告饒布曰故犯吾令理合斬首今看衆將面且打一百衆將又哀告打了五十背花然後放歸衆將無不喪氣宋憲魏續至侯成家來探視侯成泣曰非公等則吾死矣憲曰布只戀妻子視吾等如草芥續曰軍圍城下水繞壕邊吾等死無日矣憲曰布無仁無義我等棄之而走何如續曰非丈夫也不若擒布獻曹公侯成曰我因追馬受責而布所倚恃者赤兔馬也汝二人果能獻門擒布吾當先盜馬去見曹公三人商議定了是夜侯成暗至馬院盜了那匹赤兔馬飛奔東門來魏續便開門放出卻佯作追趕之狀侯成到曹操寨獻上馬匹備言宋憲魏續插白旗為號準備獻門曹操聞此信便押榜數十張射入城去其榜曰大將軍曹特奉明詔征伐呂布如有抗拒大軍者破城之日滿門誅戮上至將校下至庶民有能擒呂布來獻或獻其首級者重加官賞為此榜諭各宜知悉次日平明城外喊聲震地呂布大驚提戟上城各門點視責罵魏續走透侯成失了戰馬欲待治罪城下曹兵望見城上白旗竭力攻城布只得親自抵敵從平明直打到日中曹兵稍退布少憩門樓不覺睡著在椅上宋憲趕退左右先盜其畫戟便與魏續一齊動手將呂布繩纏索綁緊緊縛住布從睡夢中驚醒急喚左右卻都被二人殺散把白旗一招曹兵齊至城下魏續大叫已生擒呂布矣夏侯淵尚未信宋憲在城上擲下呂布畫戟來大開城門曹兵一擁而入高順張遼在西門水圍難出為曹兵所擒陳宮奔至南門為徐晃所獲曹操入城即傳令退了所決之水出榜安民一面與玄德同坐白門樓上關張侍立於側提過擒獲一干人來呂布雖然長大卻被繩索捆作一團布叫曰縛太急乞緩之操曰縛虎不得不急布見侯成魏續宋憲皆立於側乃謂之曰我待諸將不薄汝等何忍背反憲曰聽妻妾言不聽將計何謂不薄布默然須臾衆擁高順至操問曰汝有何言順不答操怒命斬之徐晃解陳宮至操曰公台別來無恙宮曰汝心術不正吾故棄汝操曰吾心不正公又奈何獨事呂布宮曰布雖無謀不似你詭詐姦險操曰公自謂足智多謀今竟何如宮顧呂布曰恨此人不從吾言若從吾言未必被擒也操曰今日之事當如何宮大聲曰今日有死而已操曰公如是奈公之老母妻子何宮曰吾聞以孝治天下者不害人之親施仁政於天下者不絶人之祀老母妻子之存亡亦在於明公耳吾身既被擒請即就戮並無挂念操有留戀之意宮徑步下樓左右牽之不住操起身泣而送之宮並不回顧操謂從者曰即送公台老母妻子回許都養老怠慢者斬宮聞言亦不開口伸頸就刑衆皆下淚操以棺槨盛其尸葬于許都後人有詩歎之曰生死無二志丈夫何壯哉不從金石論空負棟梁材輔主真堪敬辭親實可哀白門身死日誰肯似公台方操送宮下樓時布告玄德曰公為坐上客布為階下囚何不發一言而相寬乎玄德點頭及操上樓來布叫曰明公所患不過於布布今已服矣公為大將布副之天下不難定也操回顧玄德曰何如玄德答曰公不見丁建陽董卓之事乎布目視玄德曰是兒最無信者操令牽下樓縊之布回顧玄德曰大耳兒不記轅門射戟時耶忽一人大叫曰呂布匹夫死則死耳何懼之有衆視之乃刀斧手擁張遼至操令將呂布縊死然後梟首後人有詩歎曰洪水滔滔淹下邳當年呂布受擒時空余赤兔馬千里漫有方天戟一枝縛虎望寬今太懦養鷹休飽昔無疑戀妻不納陳宮諫枉罵無恩大耳兒又有詩論玄德曰傷人餓虎縛休寬董卓丁原血未幹玄德既知能啖父爭如留取害曹瞞卻説武士擁張遼至操指遼曰這個好生面善遼曰濮陽城中曾相遇如何忘卻操笑曰你原來也記得遼曰只是可惜操曰可惜甚的遼曰可惜當日火不大不曾燒死你這國賊操大怒曰敗將安敢辱吾拔劍在手親自來殺張遼遼全無懼色引頸待殺曹操背後一人攀住臂膊一人跪於面前説道丞相且莫動手正是乞哀呂布無人救罵賊張遼反得生畢竟救張遼的是誰且聽下文分解
