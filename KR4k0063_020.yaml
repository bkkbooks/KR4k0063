body:
  text: 第二十回曹阿瞞許田打圍董國舅內閣受詔話説曹操舉劍欲殺張遼玄德攀住臂膊雲長跪於面前玄德曰此等赤心之人正當留用雲長曰關某素知文遠忠義之士願以性命保之操擲劍笑曰我亦知文遠忠義故戲之耳乃親釋其縛解衣衣之延之上坐遼感其意遂降操拜遼為中郎將賜爵關內侯使招安臧霸霸聞呂布已死張遼已降遂亦引本部軍投降操厚賞之臧霸又招安孫觀吳敦尹禮來降獨昌豨未肯歸順操封臧霸為琅琊相孫觀等亦各加官令守青徐沿海地面將呂布妻女載回許都大犒三軍拔寨班師路過徐州百姓焚香遮道請留劉使君為牧操曰劉使君功大且待面君封爵回來未遲百姓叩謝操喚車騎將軍車胄權領徐州操軍回許昌封賞出征人員留玄德在相府左近宅院歇定次日獻帝設朝操表奏玄德軍功引玄德見帝玄德具朝服拜於丹墀帝宣上殿問曰卿祖何人玄德奏曰臣乃中山靖王之後孝景皇帝閣下玄孫劉雄之孫劉弘之子也帝教取宗族世譜檢看令宗正卿宣讀曰孝景皇帝生十四子第七子乃中山靖王劉勝勝生陸城亭侯劉貞貞生沛侯劉昂昂生漳侯劉祿祿生沂水侯劉戀戀生欽陽侯劉英英生安國侯劉建建生廣陵侯劉哀哀生膠水侯劉憲憲生祖邑侯劉舒舒生祁陽侯劉誼誼生原澤侯劉必必生潁川侯劉達達生豐靈侯劉不疑不疑生濟川侯劉惠惠生東郡范令劉雄雄生劉弘弘不仕劉備乃劉弘之子也帝排世譜則玄德乃帝之叔也帝大喜請入偏殿敘叔侄之禮帝暗思曹操弄權國事都不由朕主今得此英雄之叔朕有助矣遂拜玄德為左將軍宜城亭侯設宴款待畢玄德謝恩出朝自此人皆稱為劉皇叔曹操回府荀彧等一班謀士入見曰天子認劉備為叔恐無益於明公操曰彼既認為皇叔吾以天子之詔令之彼愈不敢不服矣況吾留彼在許都名雖近君實在吾掌握之內吾何懼哉吾所慮者太尉楊彪系袁術親戚倘與二袁為內應為害不淺當即除之乃密使人誣告彪交通袁術遂收彪下獄命滿寵按治之時北海太守孔融在許都因諫操曰楊公四世清德豈可因袁氏而罪之乎操曰此朝廷意也融曰使成王殺召公周公可得言不知耶操不得已乃免彪官放歸田裏議郎趙彥憤操專橫上疏劾操不奉帝旨擅收大臣之罪操大怒即收趙彥殺之於是百官無不悚懼謀士程昱説操曰今明公威名日盛何不乘此時行王霸之事操曰朝廷股肱尚多未可輕動吾當請天子田獵以觀動靜於是揀選良馬名鷹俊犬弓矢俱備先聚兵城外操入請天子田獵帝曰田獵恐非正道操曰古之帝王春搜夏苗秋獮冬狩四時出郊以示武於天下今四海擾攘之時正當借田獵以講武帝不敢不從隨即上逍遙馬帶寶雕馬金鈚箭排鑾駕出城玄德與關張各彎弓插箭內穿掩心甲手持兵器引數十騎隨駕出許昌曹操騎爪黃飛電馬引十萬之衆與天子獵于許田軍士排開圍場周廣二百餘裏操與天子並馬而行只爭一馬頭背後都是操之心腹將校文武百官遠遠侍從誰敢近前當日獻帝馳馬到許田劉玄德起居道傍帝曰朕今欲看皇叔射獵玄德領命上馬忽草中趕起一兔玄德射之一箭正中那兔帝喝采轉過土坡忽見荊棘中趕出一隻大鹿帝連射三箭不中顧謂操曰卿射之操就討天子寶雕弓金鈚箭扣滿一箭正中鹿背倒於草中群臣將校見了金鈚箭只道天子射中都踴躍向帝呼萬歲曹操縱馬直出遮於天子之前以迎受之衆皆失色玄德背後雲長大怒剔起臥蠶眉睜開丹鳳眼提刀拍馬便出要斬曹操玄德見了慌忙搖手送目關公見兄如此便不敢動玄德欠身向操稱賀曰丞相神射世所罕及操笑曰此天子洪福耳乃回馬向天子稱賀竟不獻還寶雕弓就自懸帶圍場已罷宴于許田宴畢駕回許都衆人各自歸歇雲長問玄德曰操賊欺君罔上我欲殺之為國除害兄何止我玄德曰投鼠忌器操與帝相離只一馬頭其心腹人之周回擁侍吾弟若逞一時之怒輕有舉動倘事不成有傷天子罪反坐我等矣雲長曰今日不殺此賊後必為禍玄德曰且宜祕之不可輕言卻説獻帝回宮泣謂伏皇后曰聯自即位以來姦雄並起先受董卓之殃後遭傕汜之亂常人未受之苦吾與汝當之後得曹操以為社稷之臣不意專國弄權擅作威福朕每見之背若芒刺今日在圍場上身迎呼賀無禮已極早晚必有異謀吾夫婦不知死所也伏皇后曰滿朝公卿俱食漢祿竟無一人能救國難乎言未畢忽一人自外而入曰帝後休憂吾舉一人可除國害帝視之乃伏皇後之父伏完也帝掩淚問曰皇丈亦知操賊之專橫乎完曰許田射鹿之事誰不見之但滿朝之中非操宗族則其門下若非國戚誰肯盡忠討賊老臣無權難行此事車騎將軍國舅董承可托也帝曰董國舅多赴國難朕躬素知可宣入內共議大事完曰陛下左右皆操賊心腹倘事泄為禍不淺帝曰然則奈何完曰臣有一計陛下可制衣一領取玉帶一條密賜董承卻於帶襯內縫一密詔以賜之令到家見詔可以晝夜畫策神鬼不覺矣帝然之伏完辭出帝乃自作一密詔咬破指尖以血寫之暗令伏皇后縫于玉帶紫錦襯內卻自穿錦袍自系此帶令內史宣董承入承見帝禮畢帝曰朕夜來與後説霸河之苦念國舅大功故特宣入慰勞承頓首謝帝引承出殿到太廟轉上功臣閣內帝焚香禮畢引承觀畫像中間畫漢高祖容像帝曰吾高祖皇帝起身何地如何創業承大驚曰陛下戲臣耳聖祖之事何為不知高皇帝起泗上亭長提三尺劍斬蛇起義縱橫四海三載亡秦五年滅楚遂有天下立萬世之基業帝曰祖宗如此英雄子孫如此懦弱豈不可歎因指左右二輔之像曰此二人非留侯張良酇侯蕭何耶承曰然也高祖開基創業實賴二人之力帝回顧左右較遠乃密謂承曰卿亦當如此二人立於朕側承曰臣無寸功何以當此帝曰朕想卿西都救駕之功未嘗少忘無可為賜因指所著袍帶曰卿當衣朕此袍系朕此帶常如在朕左右也承頓首謝帝解袍帶賜承密語曰卿歸可細觀之勿負朕意承會意穿袍系帶辭帝下閣早有人報知曹操曰帝與董承登功臣閣説話操即入朝來看董承出閣才過宮門恰遇操來急無躲避處只得立于路側施禮操問曰國舅何來承曰適天子宣召賜以錦袍玉帶操問曰何故見賜承曰因念某舊日西都救駕之功故有此賜操曰解帶我看承心知衣帶中必有密詔恐操看破遲延不解操叱左右急解下來看了半晌笑曰果然是條好玉帶再脫下錦袍來借看承心中畏懼不敢不從遂脫袍獻上操親自以手提起對日影中細細詳看看畢自己穿在身上系了玉帶回顧左右曰長短如何左右稱美操謂承曰國舅即以此袍帶轉賜與吾何如承告曰君恩所賜不敢轉贈容某別制奉獻操曰國舅受此衣帶莫非其中有謀乎承驚曰某焉敢丞相如要便當留下操曰公受君賜吾何相奪聊為戲耳遂脫袍帶還承承辭操歸家至夜獨坐書院中將袍仔細反復看了並無一物承思曰天子賜我袍帶命我細觀必非無意今不見甚蹤迹何也隨又取玉帶檢看乃白玉玲瓏碾成小龍穿花背用紫錦為襯縫綴端整亦並無一物承心疑放於桌上反復尋之良久倦甚正欲伏幾而寢忽然燈花落於帶上燒著背襯承驚拭之已燒破一處微露素絹隱見血迹急取刀拆開視之乃天子手書血字密詔也詔曰朕聞人倫之大父子為先尊卑之殊君臣為重近日操賊弄權欺壓君父結連黨伍敗壞朝綱敕賞封罰不由朕主朕夙夜憂思恐天下將危卿乃國之大臣朕之至戚當念高帝創業之艱難糾合忠義兩全之烈士殄滅姦黨復安社稷祖宗幸甚破指灑血書詔付卿再四慎之勿負朕意建安四年春三月詔董承覽畢涕淚交流一夜寢不能寐晨起復至書院中將詔再三觀看無計可施乃放詔於幾上沈思滅操之計忖量未定隱幾而臥忽侍郎王子服至門吏知子服與董承交厚不敢攔阻竟入書院見承伏幾不醒袖底壓著素絹微露朕字子服疑之默取看畢藏於袖中呼承曰國舅好自在虧你如何睡得著承驚覺不見詔書魂不附體手腳慌忙子服曰汝欲殺曹公吾當出首承泣告曰若兄如此漢室休矣子服曰吾戲耳吾祖宗世食漢祿豈無忠心願助兄一臂之力共誅國賊承曰兄有此心國之大幸子服曰當於密室同立義狀各舍三族以報漢君承大喜取白絹一幅先書名畫字子服亦即書名畫字書畢子服曰將軍吳子蘭與吾至厚可與同謀承曰滿朝大臣惟有長水校尉種輯議郎吳碩是吾心腹必能與我同事正商議間家僮入報種輯吳碩來探承曰此天助我也教子服暫避於屏後承接二人入書院坐定茶畢輯曰許田射獵之事君亦懷恨乎承曰雖懷恨無可奈何碩曰吾誓殺此賊恨無助我者耳輯曰為國除害雖死無怨王子服從屏後出曰汝二人欲殺曹承相我當出首董國舅便是證見種輯怒曰忠臣不怕死吾等死作漢鬼強似你阿附國賊承笑曰吾等正為此事欲見二公王侍郎之言乃戲耳便於袖中取出詔來與二人看二人讀詔揮淚不止承遂請書名子服曰二公在此少待吾去請吳子蘭來子服去不多時即同子蘭至與衆相見亦書名畢承邀於後堂會飲忽報西涼太守馬騰相探承曰只推我病不能接見門吏回報騰大怒曰我夜來在東華門外親見他錦袍玉帶而出何故推病耶吾非無事而來奈何拒我門吏入報備言騰怒承起曰諸公少待暫容承出隨即出廳延接禮畢坐定騰曰騰入覲將還故來相辭何見據也承曰賤軀暴疾有失迎候罪甚騰曰面帶春色未見病容承無言可答騰指袖便起嗟歎下階曰皆非救國之人也承感其言挽留之問曰公謂何人非救國之人騰曰許田射獵之事吾氣滿胸膛公乃國之至戚猶自滯於酒色而不思討賊安得為皇家救難扶災之人乎承恐其詐佯驚曰曹丞相乃國之大臣朝廷所倚賴公何出此言騰大怒曰汝尚以曹賊為好人耶承曰耳目甚近請公低聲騰曰貪生怕死之徒不足以論大事説罷又欲起身承知騰忠義乃曰公且息怒某請公看一物遂邀騰入書院取詔示之騰讀畢毛髮倒豎咬齒嚼唇滿口流血謂承曰公若有舉動吾即統西涼兵為外應承請騰與諸公相見取出義狀教騰書名騰乃取酒歃血為盟曰吾等誓死不負所約指坐上五人言曰若得十人大事諧矣承曰忠義之士不可多得若所與非人則反相害矣騰教取鴛行鷺序簿來檢看檢到劉氏宗族乃拍手言曰何不共此人商議衆皆問何人馬騰不慌不忙説出那人來正是本因國舅承明詔又見宗潢佐漢朝畢竟馬騰之言如何且聽下文分解
