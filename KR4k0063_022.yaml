body:
  text: 第二十二回袁曹各起馬步三軍關張共擒王劉二將卻説陳登獻計于玄德曰曹操所懼者袁紹紹虎踞冀青幽並諸郡帶甲百萬文官武將極多今何不寫書遣人到彼求救玄德曰紹向與我未通往來今又新破其弟安肯相助登曰此間有一人與袁紹三世通家若得其一書致紹紹必來相助玄德問何人登曰此人乃公平日所折節敬禮者何故忘之玄德猛省曰莫非鄭康成先生乎登笑曰然也原來鄭康成名玄好學多才嘗受業于馬融融每當講學必設絳帳前聚生徒後陳聲妓侍女環列左右玄聽講三年目不邪視融甚奇之及學成而歸融歎曰得我學之祕者惟鄭玄一人耳玄家中侍婢俱通毛詩一婢嘗忤玄意玄命長跪階前一婢戲謂之曰胡為乎泥中此婢應聲曰薄言往訴逢彼之怒其風雅如此桓帝朝玄官至尚書後因十常侍之亂棄官歸田居於徐州玄德在涿郡時已曾師事之及為徐州牧時時造廬請教敬禮特甚當下玄德想出此人大喜便同陳登親至鄭玄家中求其作書玄慨然依允寫書一封付與玄德玄德便差孫乾星夜齎往袁紹處投遞紹覽畢自忖曰玄德攻滅吾弟本不當相助但重以鄭尚書之命不得不往救之遂聚文武官商議興兵伐曹操謀士田豐曰兵起連年百姓疲弊倉廩無積不可復興大軍宜先遣人獻捷天子若不得通乃表稱曹操隔我王路然後提兵屯黎陽更于河內增益舟楫繕置軍器分遣精兵屯扎邊鄙三年之中大事可定也謀士審配曰不然以明公之神武撫河朔之強盛興兵討曹賊易如反掌何必遷延日月謀士沮授曰制勝之策不在強盛曹操法令既行士卒精練比公孫瓚從受困者不同今棄獻捷良策而興無名之兵竊為明公不取謀士郭圖曰非也兵加曹操豈曰無名公正當及時早定大業願從鄭尚書之言與劉備共仗大義剿滅曹賊上合天意下合民情實為幸甚四人爭論未定紹躊躇不決忽許攸荀諶自外而入紹曰二人多有見識且看如何主張二人施禮畢紹曰鄭尚書有書來令我起兵助劉備攻曹操起兵是乎不起兵是乎二人齊聲應曰明公以衆克寡以強攻弱討漢賊以扶王室起兵是也紹曰二人所見正合我心便商議興兵先令孫乾回報鄭玄並約玄德準備接應一面令審配逢紀為統軍田豐荀諶許攸為謀士顔良文醜為將軍起馬軍十五萬步兵十五萬共精兵三十萬望黎陽進發分撥已定郭圖進曰以明公大義伐操必須數操之惡馳檄各郡聲罪致討然後名正言順紹從之遂令書記陳琳草檄琳字孔璋素有才名靈帝時為主簿因諫何進不聽復遭董卓之亂避難冀州紹用為記室當下領命草檄援筆立就其文曰蓋聞明主圖危以制變忠臣慮難以立權是以有非常之人然後有非常之事有非常之事然後立非常之功夫非常者固非常人所擬也曩者強秦弱主趙高執柄專制朝權威福由己時人迫脅莫敢正言終有望夷之敗祖宗焚滅污辱至今永為世鑒及臻呂後季年産祿專政內兼二軍外統梁趙擅斷萬機決事省禁下陵上替海內寒心於是絳侯朱虛興兵奮怒誅夷逆暴尊立太宗故能王道興隆光明顯融此則大臣立權之明表也司空曹操祖父中常侍騰與左悺徐璜並作妖孽叨餮放橫傷化虐民父嵩乞丐攜養因贓假位輿金輦璧輸貨權門竊盜鼎司傾覆重器操贅閹遺醜本無懿德犬票狡鋒協好亂樂禍幕府董統鷹揚掃除凶逆續遇董卓侵官暴國於是提劍揮鼓發命東夏收羅英雄棄瑕取用故遂與操同咨合謀授以裨師謂其鷹犬之才爪牙可任至乃愚佻短略輕進易退傷夷折衄數喪師徒幕府輒復分兵命鋭修完補輯表行東郡領兗州刺史被以虎文獎蹙威柄冀獲秦師一克之報而操遂乘資跋扈恣行凶忒割剝元元殘賢害善故九江太守邊讓英才俊偉天下知名直言正色論不阿諂身首被梟懸之誅妻孥受灰滅之咎自是士林憤痛民怨彌重一夫奮臂舉州同聲故躬破于徐方地奪于呂布倣徨東裔蹈據無所幕府惟強幹弱枝之義且不登叛人之黨故復援旌擐甲席捲起征金鼓響振布衆奔沮拯其死亡之患復其方伯之位則幕府無德於兗土之民而有大造於操也後會鑾駕返旆群虎寇攻時冀州方有北鄙之警匪遑離局故使從事中郎徐勳就發遣操便繕修郊廟翊衛幼主操便放志專行脅遷當禦省禁卑侮王室敗法亂紀坐領三台專制朝政爵賞由心刑戮在口所愛光五宗所惡滅三族群談者受顯誅腹議者蒙隱戮百僚鉗口道路以目尚書記朝會公卿充員品而已故太尉楊彪典曆二司享國極位操因緣眥睚被以非罪榜楚參並五毒備至觸情任忒不顧憲綱又議郎趙彥忠諫直言義有可納是以聖朝含聽改容加飾操欲迷奪時明杜絶言路擅收立殺不俟報聞又梁孝王先帝母昆墳陵尊顯桑梓松柏猶宜肅恭而操帥將吏士親臨發掘破棺裸尸掠取金寶至令聖朝流涕士民傷懷操又特置發丘中郎將摸金校尉所過隳突無骸不露身處三公之位而行桀虜之態汙國害民毒施人鬼加其細政慘苛科防互設罾繳充蹊坑阱塞路舉手挂網羅動足觸機陷是以兗豫有無聊之民帝都有籲嗟之怨曆觀載籍無道之臣貪殘酷烈於操為甚幕府方詰外姦未及整訓加緒含容冀可彌縫而操豺狼野心潛包禍謀乃欲摧撓棟梁孤弱漢室除滅忠正專為梟雄往者伐鼓北征公孫瓚強寇桀逆拒圍一年操因其未破陰交書命外助王師內相掩襲會其行人髮露瓚亦梟夷故使鋒芒挫縮厥圖不果今乃屯據敖倉阻河為固欲以螳螂之斧禦隆車之隧幕府奉漢威靈折沖宇宙長戟百萬胡騎千群奮中黃育獲之士騁良弓徑弩之勢並州越太行青州涉濟漯大軍泛黃河而角其前荊州下宛葉而掎其後雷震虎步若舉炎火以炳飛蓬覆滄海以熛沃炭有何不滅者哉又操軍吏士其可戰者皆出自幽冀或故營部曲鹹怨曠思歸流涕北顧其餘兗豫之民及呂布張楊之餘衆覆亡迫脅權時苟從各被創夷人為仇敵若回旆方徂登高岡而擊鼓吹揚素揮以啓降路必土崩瓦解不俟血刃方今漢室陵遲綱維馳絶聖朝無一介之輔股肱無折沖之勢方畿之內簡練之臣皆垂頭拓翼莫所憑恃雖有忠義之佐脅於暴虐之臣焉能展其節又操持部曲精兵七百圍守宮闕外托宿衛內實拘執懼其篡逆之萌因斯而作此乃忠臣肝腦塗地之秋烈士立功之會可不策哉操又矯命稱制遣使發兵恐邊遠州郡過聽給與違衆旅叛舉以喪名為天下笑則明哲不取也即日幽並青冀四州並進書到荊州便勒現兵與建忠將軍協同聲勢州郡各整義兵羅落境界舉武揚威並匡社稷則非常之功於是乎著其得操首者封五千戶侯賞錢五千萬部曲偏裨將校諸吏降者勿有所問廣宣恩信班揚符賞布告天下鹹使知聖朝有拘迫之難如律令紹覽檄大喜即命使將此檄遍行州郡並于各關津隘口張挂檄文傳至許都時曹操方患頭風臥病在床左右將此檄傳進操見之毛骨悚然出了一身冷汗不覺頭風頓愈從床上一躍而起顧謂曹洪曰此檄何人所作洪曰聞是陳琳之筆操笑曰有文事者必須以武略濟之陳琳文事雖佳其如袁紹武略之不足何遂聚衆謀士商議迎敵孔融聞之來見操曰袁紹勢大不可與戰只可與和荀彧曰袁紹無用之人何必議和融曰袁紹土廣民強其部下如許攸郭圖審配逢紀皆智謀之士田豐沮授皆忠臣也顔良文醜勇冠三軍其餘高覽張傕淳於瓊等俱世之名將何謂紹為無用之人乎彧笑曰紹兵多而不整田豐剛而犯上許攸貪而不智審配專而無謀逢紀果而無用此數人者勢不相容必生內變顔良文醜匹夫之勇一戰可擒其餘碌碌等輩縱有百萬何足道哉孔融默然操大笑曰皆不出荀文若之料遂喚前軍劉岱後軍王忠引軍五萬打著丞相旗號去徐州攻劉備原來劉岱舊為兗州刺史及操取兗州岱降於操操用為偏將故今差他與王忠一同領兵操卻自引大軍二十萬進黎陽拒袁紹程昱曰恐劉岱王忠不稱其使操曰吾亦知非劉備敵手權且虛張聲勢分付不可輕進待我破紹再勒兵破備劉岱王忠領兵去了曹操自引兵至黎陽兩軍隔八十裏各自深溝高壘相持不戰自八月守至十月原來許攸不樂審配領兵沮授又恨紹不用其謀各不相和不圖進取袁紹心懷疑惑不思進兵操乃喚呂布手下降將臧霸守把青徐于禁李典屯兵河上曹仁總督大軍屯於官渡操自引一軍竟回許都且説劉岱王忠引軍五萬離徐州一百里下寨中軍虛打曹丞相旗號未敢進兵只打聽河北消息這裏玄德也不知曹操虛實未敢擅動亦只探聽河北忽曹操差人催劉岱王忠進戰二人在寨中商議岱曰丞相催促攻城你可先去王忠曰丞相先差你岱曰我是主將如何先去忠曰我和你同引兵去岱曰我與你拈鬮拈著的便去王忠拈著先字只得分一半軍馬來攻徐州玄德聽知軍馬到來請陳登商議曰袁本初雖屯兵黎陽奈謀臣不和尚未進取曹操不知在何處聞黎陽軍中無操旗號如何這裏卻反有他旗號登曰操詭計百出必以河北為重親自監督卻故意不建旗號乃于此處虛張旗號吾意操必不在此玄德曰兩弟誰可探聽虛實張飛曰小弟願往玄德曰汝為人躁暴不可去飛曰便是有曹操也拿將來雲長曰待弟往觀其動靜玄德曰雲長若去我卻放心於是雲長引三千人馬出徐州來正值初冬陰雲布合雪花亂飄軍馬皆冒雪布陳雲長驟馬提刀而出大叫王忠打話忠出曰丞相到此緣何不降雲長曰請丞相陳我自有話説忠曰丞相豈肯輕見你雲長大怒驟馬向前王忠挺槍來迎兩馬相交雲長撥馬便走王忠趕來轉過山坡雲長回馬大叫一聲舞刀直取王忠攔截不住恰待驟馬奔逃雲長左手倒提寶刀右手揪住王忠勒甲縧拖下鞍橇橫擔於馬上回本陳來王忠軍四散奔走雲長押解王忠回徐州見玄德玄德問爾乃何人現居何職敢詐稱曹丞相忠曰焉敢有詐奉命教我虛張聲勢以為疑兵丞相實不在此玄德教付衣服酒食且暫監下待捉了劉岱再作商議雲長曰某知兄有和解之意故生擒將來玄德曰吾恐翼德躁暴殺了王忠故不教去此等人殺之無益留之可為解和之地張飛曰二哥捉了王忠我去生擒劉岱來玄德曰劉岱昔為兗州刺史虎牢關伐董卓時也是一鎮諸侯今日為前軍不可輕敵飛曰量此輩何足道哉我也似二哥生擒將來便了玄德曰只恐壞了他性命誤我大事飛曰如殺了我償他命玄德遂與軍三千飛引兵前進卻説劉岱知王忠被擒堅守不出張飛每日在寨前叫罵岱聽知是張飛越不敢出飛守了數日見岱不出心生一計傳令今夜二更去劫寨日間卻在帳中飲酒詐醉尋軍士罪過打了一頓縛在營中曰待我今夜出兵時將來祭旗卻暗使左右縱之去軍士得脫偷走出營徑往劉岱營中來報劫寨之事劉岱見降卒身受重傷遂聽其説虛扎空寨伏兵在外是夜張飛卻分兵三路中間使三十餘人劫寨放火卻教兩路軍抄出他寨後看火起為號夾擊之三更時分張飛自引精兵先斷劉岱後路中路三十餘人搶入寨中放火劉岱伏兵恰待殺入張飛兩路兵齊出岱軍自亂正不知飛兵多少各自潰散劉岱引一隊殘軍奪路而走正撞見張飛狹路相逢急難回避交馬只一合早被張飛生擒過去餘衆皆降飛使人先報入徐州玄德聞之謂雲長曰冀德自來粗莽今亦用智吾無憂矣乃親自出郭迎之飛曰哥哥道我躁暴今日如何玄德曰不用言語相激如何肯使機謀飛大笑玄德見縛劉岱過來慌下馬解其縛曰小弟張飛誤有冒瀆望乞恕罪遂迎入徐州放出王忠一同管待玄德曰前因車胄欲害備故不得不殺之丞相錯疑備反遣二將軍前來問罪備受丞相大恩正思報效安敢反耶二將軍至許都望善言為備分訴備之幸也劉岱王忠曰深荷使君不殺之恩當于丞相處方便以某兩家老小保使君玄德稱謝次日盡還原領軍馬送出郭外劉岱王忠行不上十餘裏一聲鼓響張飛攔路大喝曰我哥哥忒沒分曉捉住賊將如何又放了唬得劉岱王忠在馬上發顫張飛睜眼挺槍趕來背後一人飛馬大叫不得無禮視之乃雲長也劉岱王忠方才放心雲長曰既兄長放了吾弟如何不遵法令飛曰今番放了下次又來雲長曰待他再來殺之未遲劉岱王忠連聲告退曰便丞相誅我三族也不來了望將軍寬恕飛曰便是曹操自來也殺他片甲不回今番權且寄下兩顆頭劉岱王忠抱頭鼠竄而去雲長翼德回見玄德曰曹操必然復來孫乾謂玄德曰徐州受敵之地不可久居不若分兵屯小沛守邳城為掎角之勢以防曹操玄德用其言令雲長守下邳甘糜二人人亦於下邳安置甘夫人乃小沛人也糜夫人乃糜竺之妹也孫乾簡雍糜竺糜芳守徐州玄德與張飛屯小沛劉岱王忠回見曹操具言劉備不反之事操怒罵辱國之徒留你何用喝令左右推出斬之正是犬豕何堪共虎鬥魚蝦空自與龍爭不知二人性命如何且聽下文分解
