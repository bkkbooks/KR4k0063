body:
  text: 第二十三回禰正平裸衣罵賊吉太醫下毒遭刑卻説曹操欲斬劉岱王忠孔融諫曰二人本非劉備敵手若斬之恐失將士之心操乃免其死黜罷爵祿欲自起兵攻玄德孔融曰方今隆冬盛寒未可動兵待來春未為晚也可先使人招安張繡劉表然後再圖徐州操然其言先遣劉曄往説張繡曄至襄城先見賈詡陳説曹公盛德詡乃留曄於家中次日來見張繡説曹公遣劉曄招安之事正議間忽報袁紹有使至繡命入使者呈上書信繡覽之亦是招安之意詡問來使曰近日興兵破曹操勝負何如使曰隆冬寒月權且罷兵今以將軍與荊州劉表俱有國士之風故來相請耳詡大笑曰汝可便回見本初道汝兄弟尚不能容何能容天下國士乎當面扯碎書叱退來使張繡曰方今袁強曹弱今毀書叱使袁紹若至當如之何詡曰不如去從曹操繡曰吾先與操有仇安得相容詡曰從操其便有三夫曹公奉天子明詔征伐天下其宜從一也紹強盛我以少從之必不以我為重操雖弱得我必喜其宜從二也曹公王霸之志必釋私怨以明德于四海其宜從三也願將軍無疑焉繡從其言請劉曄相見曄盛稱操德且曰丞相若記舊怨安肯使某來結好將軍乎繡大喜即同賈詡等赴許都投降繡見操拜於階下操忙扶起執其手曰有小過失勿記於心遂封繡為揚武將軍封賈詡為執金吾使操即命繡作書招安劉表賈詡進曰劉景升好結納名流今必得一有文名之士往説之方可降耳操問荀攸曰誰人可去攸曰孔文舉可當其任操然之攸出見孔融曰丞相欲得一有文名之士以備行人之選公可當此任否融曰吾禰友禰衡字正平其才十倍於我此人宜在帝左右不但可備行人而已我當薦之天子於是遂上表奏帝其文曰臣聞洪水橫流帝思俾義旁求四方以招賢俊昔世宗繼統將弘基業疇咨熙載群士響臻陛下睿聖纂承基緒遭遇厄運勞謙日昃維兵降神異人並出竊見處士平原禰衡年二十四字正平淑質貞亮英才卓躒初涉藝文升堂睹奧目所一見輒誦之口耳所暫聞不忘於心性與道合思若有神弘羊潛計安世默識以衡準之誠不足怪忠果正直志懷霜雪見善若驚嫉惡若仇任座抗行史魚厲節殆無以過也鷙鳥纍百不如一鶚使衡立朝必有可觀飛辨騁詞溢氣坌湧解疑釋結臨敵有餘昔賈誼求試屬國詭系單于終軍欲以長纓牽制徑越弱冠慷慨前世美之近日路粹嚴象亦用異才擢拜台郎衡宜與為比如得龍躍天衢振翼雲漢揚聲紫微垂光虹虹霓足以昭近署之多士增四門之穆穆鈞天廣樂必有奇麗之觀帝室皇居必蓄非常之寶若衡等輩不可多得激楚陽阿至妙之容掌伎者之所貪飛兔騕嫋絶足奔放良樂之所急也臣等區區敢不以聞陛下篤慎取士必須效試乞令衡以褐衣召見如無可觀采臣等受面欺之罪帝覽表以付曹操操遂使人召衡至禮畢操不命坐禰衡仰天歎曰天地雖闊何無一人也操曰吾手下有數十人皆當世英雄何謂無人衡曰願聞操曰荀彧荀攸郭嘉程昱機深智遠雖蕭何陳平不及也張遼許褚李典樂進勇不可當雖岑彭馬武不及也呂虔滿寵為從事于禁徐晃為先鋒夏侯惇天下奇才曹子孝世間福將安得無人衡笑曰公言差矣此等人物吾盡識之荀彧可使吊喪問疾荀攸可使看墳守墓程昱可使關門閉戶郭嘉可使白詞念賦張遼可使擊鼓鳴金許褚可使牧牛放馬樂進可使取狀讀招李典可使傳書送檄呂虔可使磨刀鑄劍滿寵可使飲酒食糟於禁可使負版築牆徐晃可使屠豬殺狗夏侯惇稱為完體將軍曹子孝呼為要錢太守其餘皆是衣架飯囊酒桶肉袋耳操怒曰汝有何能衡曰天文地理無一不通三教九流無所不曉上可以致君為堯舜下可以配德于孔顔豈與俗子共論乎時止有張遼在側掣劍欲斬之操曰吾正少一鼓吏早晚朝賀宴享可令禰衡充此職衡不推辭應聲而去遼曰此人出言不遜何不殺之操曰此人素有虛名遠近所聞今日殺之天下必謂我不能容物彼自以為能故令為鼓吏以辱之來日操於省廳上大宴賓客令鼓吏撾鼓舊吏雲撾鼓必換新衣衡穿舊衣而入遂擊鼓為漁陽三撾音節殊妙淵淵有金石聲坐客聽之莫不慷慨流涕左右喝曰何不更衣衡當面脫下舊破衣服裸體而立渾身盡露坐客皆掩面衡乃徐徐著褲顔色不變操叱曰廟堂之上何太無禮衡曰欺君罔上乃謂無禮吾露父母之形以顯清白之體耳操曰汝為清白誰為污濁衡曰汝不識賢愚是眼濁也不讀詩書是口濁也不納忠言是耳濁也不通古今是身濁也不容諸侯是腹濁也常懷篡逆是心濁也吾乃天下名士用為鼓吏是猶陽貨輕仲尼臧倉毀孟子耳欲成王霸之業而如此輕人耶時孔融在坐恐操殺衡乃從容進曰禰衡罪同胥靡不足發明王之夢操指衡而言曰令汝往荊州為使如劉表來降便用汝作公卿衡不肯往操教備馬三匹令二人扶挾而行卻教手下文武整酒於東門外送之荀彧曰如禰衡來不可起身衡至下馬入見衆皆端坐衡放聲大哭荀彧問曰何為而哭衡曰行於死柩之中如何不哭衆皆曰吾等是死尸汝乃無頭狂鬼耳衡曰吾乃漢朝之臣不作曹瞞之黨安得無頭衆欲殺之荀彧曰量鼠雀之輩何足汙刀衡曰吾乃鼠雀尚有人性汝等只可謂之蜾蟲衆恨而散衡至荊州見劉表畢雖頌德實譏諷表不喜令去江夏見黃祖或問表曰禰衡戲謔主公何不殺之表曰禰衡數辱曹操操不殺者恐失人望故令作使於我欲借我手殺之使我受害賢之名也吾今遣去見黃祖使曹操知我有識衆皆稱善時袁紹亦遣使至表問衆謀士曰袁本初又遣使來曹孟德又差禰衡在此當從何便從事中郎韓嵩進曰今兩雄相持將軍若欲有為乘此破敵可也如其不然將擇其善者而從之今曹操善能用兵賢俊多歸其勢必先取袁紹然後移兵向江東恐將軍不能禦莫若舉荊州以附操操必重待將軍矣表曰汝且去許都觀其動靜再作商議嵩曰君臣各有定分嵩今事將軍雖赴湯蹈火一唯所命將軍若能上順天子下從曹公使嵩可也如持疑未定嵩到京師天子賜嵩一官則嵩為天子之臣不復為將軍死矣表曰汝且先往觀之吾別有主意嵩辭表到許都見操操遂拜嵩為侍中領零陵太守荀彧曰韓嵩來觀動靜未有微功重加此職禰衡又無音耗丞相遣而不問何也操曰禰衡辱吾太甚故借劉表手殺之何必再問遂遣韓嵩回荊州説劉表嵩回見表稱頌朝廷盛德勸表遣子入侍表大怒曰汝懷二心耶欲斬之嵩大叫曰將軍負嵩嵩不負將軍蒯良曰嵩未去之前先有此言矣劉表遂赦之人報黃祖斬了禰衡表問其故對曰黃祖與禰衡共飲皆醉祖問衡曰君在許都有何人物衡曰大兒孔文舉小兒楊德祖除此二人別無人物祖曰似我何如衡曰汝似廟中之神雖受祭祀恨無靈驗祖大怒曰汝以我為土木偶人耶遂斬之衡至死罵不絶口劉表聞衡死亦嗟呀不已令葬于鸚鵡州邊後人有詩歎曰黃祖才非長者儔禰衡珠碎此江頭今來鸚鵡州邊過惟有無情碧水流卻説曹操知禰衡受害笑曰腐儒舌劍反自殺矣因不見劉表來降便欲興兵問罪荀彧諫曰袁紹未平劉備未滅而欲用兵江漢是猶舍心腹而顧手足也可先滅袁紹後滅劉備江漢可一掃而平矣操從之且説董承自玄德去後日夜與王子服等商議無計可施建安五年元旦朝賀見曹操驕橫愈甚感憤成疾帝知國舅染病令隨朝太醫前去醫治此醫乃洛陽人姓吉名太字稱平人皆呼為吉平當時名醫也平到董府用藥調治旦夕不離常見董承長籲短歎不敢動問時值元宵吉平辭去承留住二人共飲飲至更餘承覺困倦就和衣而睡忽報王子服等四人至承出接入服曰大事諧矣承曰願聞其説服曰劉表結連袁結起兵五十萬共分十路殺來馬騰結連韓遂起西涼軍七十二萬從北殺來曹操盡起許昌兵馬分頭迎敵城中空虛若聚五家僮仆可得千餘人乘今夜府中大宴慶賞元宵將府圍住突入殺之不可失此機會承大喜即喚家奴各人收拾兵器自己披挂綽槍上馬約會都在內門前相會同時進兵夜至二鼓衆兵皆到董手提寶劍徒步直入見操設宴後堂大叫操賊休走一劍剁去隨手而倒霎時覺來乃南柯一夢口中猶罵操賊不止吉平向前叫曰汝欲害曹公乎承驚懼不能答吉平曰國舅休慌某雖醫人未嘗忘漢某連日見國舅嗟歎不敢動問恰才夢中之言已見真情幸勿相瞞倘有用某之處雖滅九族亦無後悔承掩面而哭曰只恐汝非真心平遂咬下一指為誓承乃取出衣帶詔令平視之且曰今之謀望不成者乃劉玄德馬騰各自去了無計可施因此感而成疾平曰不消諸公用心操賊性命只在某手中承問其故平曰操賊常患頭風痛入骨髓才一舉發便召某醫治如早晚有召只用一服毒藥必然死矣何必舉刀兵乎承曰若得如此救漢朝社稷者皆賴君也時吉平辭歸承心中暗喜步入後堂忽見家奴秦慶童同侍妾雲英在暗處私語承大怒喚左右捉下欲殺之夫人勸免其死各人杖脊四十將慶童鎖于冷房慶童懷恨夤夜將鐵鎖扭斷跳牆而出徑入曹操府中告有機密事操喚入密室問之慶童雲王子服吳子蘭種輯吳碩馬騰五人在家主府中商議機密必然是謀丞相家主將出白絹一段不知寫道甚的近日吉平咬指為誓我也曾見曹操藏匿慶童於府中董承只道逃往他方去了也不追尋次日曹操詐患頭風召吉平用藥平自思曰此賊合休暗藏毒藥入府操臥於床上令平下藥平曰此病可一服即愈教取藥罐當面煎之藥已半幹平已暗下毒藥親自送上操知有毒故意遲延不服平曰乘熱服之少汗即愈操起曰汝既讀儒書必知禮義君有疾飲藥臣先嘗之父有疾飲藥子先嘗之汝為我心腹之人何不先嘗而後進平曰藥以治病何用人嘗平知事已泄縱步向前扯住操耳而灌之操推藥潑地磚皆迸裂操未及言左右已將吉平執下操曰吾豈有疾特試汝耳汝果有害我之心遂喚二十個精壯獄卒執平至後園拷問操坐于亭上將平縛倒於地吉平面不改容略無懼怯操笑曰量汝是個醫人安敢下毒害我必有人唆使你來你説出那人我便饒你平叱之曰汝乃欺君罔上之賊天下皆欲殺汝豈獨我乎操再三磨問平怒曰我自欲殺汝安有人使我來今事不成惟死而已操怒教獄卒痛打打到兩個時辰皮開肉裂血流滿階操恐打死無可對證令獄卒揪去靜處權且將息傳令次日設宴請衆大臣飲酒惟董承託病不來王子服等皆恐操生疑只得俱至操于後堂設席酒行數巡曰筵中無可為樂我有一人可為衆官醒酒教二十個獄卒與吾牽來須臾只見一長枷釘著吉平拖至階下操曰衆官不知此人連結惡黨欲反背朝廷謀害曹某今日天敗請聽口詞操教先打一頓昏絶於地以水噴面吉平蘇醒睜目切齒而罵曰操賊不殺我更待何時操曰同謀者先有六人與汝共七人耶平只是大罵王子服等四人面面相覷如坐針氈操教一面打一面噴平並無求饒之意操見不招且教牽去衆官席散操只留王子服等四人夜宴四人魂不附體只得留待操曰本不相留爭奈有事相問汝四人不知與董承商議何事子服曰並未商議甚事操曰白絹中寫著何事子服等皆隱諱操教喚出慶童對證子服曰汝於何處見來慶童曰你回避了衆人六人在一處畫字如何賴得子服曰此賊與國舅侍妾通姦被責誣主不可聽也操曰吉平下毒非董承所使而誰子服等皆言不知操曰今晚自首尚猶可恕若待事發其實難容子服等皆言並無此事操叱左右將四個拿住監禁次日帶領衆人徑投董承家探病承只得出迎操曰緣何夜來不赴宴承曰微疾未痊不敢輕出操曰此是憂國家病耳承愕然操曰國舅知吉平事乎承曰不知操冷笑曰國舅如何不知喚左右牽來與國舅起病承舉措無地須臾二十獄卒推吉平至階下吉平大罵曹操逆賊操指謂承曰此人曾攀下王子服等四人吾已拿下廷尉尚有一人未曾捉獲因問平曰誰使汝來藥我可速招出平曰天使我來殺逆賊操怒教打身上無容刑之處承在座觀之心如刀割操又問平曰你原有十指今如何只有九指平曰嚼以為誓誓殺國賊操教取刀來就階下截去其九指曰一發截了教你為誓平曰尚有口可以吞賊有舌可以罵賊操令割其舌平曰且勿動手吾今熬刑不過只得供招可釋吾縛操曰釋之何礙遂命解其縛平起身望闕拜曰臣不能為國家除賊乃天數也拜畢撞階而死操令分其肢體號令時建安五年正月也史官有詩曰漢朝無起色醫國有稱平立誓除姦黨捐軀報聖明極刑詞愈烈慘死氣如生十指淋漓處千秋仰異名操見吉平已死教左右牽過秦慶童至面前操曰國舅認得此人否承大怒曰逃奴在此即當誅之操曰他首告謀反今來對證誰敢誅之承曰丞相何故聽逃奴一面之説操曰王子服等吾已擒下皆招證明白汝尚抵賴乎即喚左右拿下命從人直入董承臥房內搜出衣帶詔並義狀操看了笑曰鼠輩安敢如此遂命將董承全家良賤盡皆監禁休教走脫一個操回府以詔狀示衆謀士商議要廢獻帝更立新君正是數行丹詔成虛望一紙盟書惹禍殃未知獻帝性命如何且聽下文分解
