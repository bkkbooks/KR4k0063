body:
  text: 第二十四回國賊行凶殺貴妃皇叔敗走投袁紹卻説曹操見了衣帶詔與衆謀士商議欲廢卻獻帝更擇有德者立之程昱諫曰明公所以能威震四方號令天下者以奉漢家名號故也今諸侯未平遽行廢立之事必起兵端矣操乃止只將董承等五人並其全家老小押送各門處斬死者共七百餘人城中官民見者無不下淚後人有詩歎董承曰密詔傳衣帶天言出禁門當年曾救駕此日更承恩憂國成心疾除姦入夢魂忠貞千古在成敗復誰論又有歎王子服等四人詩曰書名尺素矢忠謀慷慨思將君父酬赤膽可憐捐百口丹心自是足千秋且説曹操既殺了董承等衆人怒氣未消遂帶劍入宮來弒董貴妃貴妃乃董承之妹帝幸之已懷孕五月當日帝在後宮正與伏皇后私論董承之事至今尚無音耗忽見曹操帶劍入宮面有怒容帝大驚失色操曰董承謀反陛下知否帝曰董卓已誅矣操大聲曰不是董卓是董承帝戰栗曰朕實不知操曰忘了破指修詔耶帝不能答操叱武士擒董妃至帝告曰董妃有五月身孕望丞相見憐操曰若非天敗吾已被害豈得復留此女為吾後患伏後告曰貶於冷宮待分娩了殺之未遲操曰欲留此逆種為母報仇乎董妃泣告曰乞全尸而死勿令彰露操令取白練至面前帝泣謂妃曰卿於九泉之下勿怨朕躬言訖淚下如雨伏後亦大哭操怒曰猶作兒女態耶叱武士牽出勒死于宮門之人有詩歎董妃曰春殿承恩亦枉然傷哉龍種並時捐堂堂帝主難相救掩面徒看淚湧泉操諭監宮官曰今後但有外戚宗族不奉吾旨輒入宮門者斬守禦不嚴與同罪又撥心腹人三千充禦林軍令曹洪統領以為防察操謂程昱曰今董承等雖誅尚有馬騰劉備亦在此數不可不除昱曰馬騰屯軍西涼未可輕取但當以書慰勞勿使生疑誘入京師圖之可也劉備現在徐州分布掎角之勢亦不可輕敵況今袁紹屯兵官渡常有圖許都之心若我一旦東征劉備勢必求救於紹紹乘虛來襲何以當之操曰非也備乃人傑也今若不擊待其羽翼既成急難圖矣袁紹雖強事多懷疑不決何足憂乎正議間郭喜自外而入操問曰吾欲東征劉備奈有袁紹之憂如何嘉曰紹性遲而多疑其謀士各相妒忌不足憂也劉備新整軍兵衆心未服丞相引兵東征一戰可定矣操大喜曰正合吾意遂起大軍二十萬分兵五路下徐州細作探知報入徐州孫乾先往下邳報知關公隨至小沛報知玄德玄德與孫乾計議曰此必求救于袁紹方可解危於是玄德修書一封遣孫乾至河北乾乃先見田豐具言其事求其引進豐即引孫乾入見紹呈上書信只見紹形容憔悴衣寇不整豐曰今日主公何故如此紹曰我將死矣豐曰主公何出此言紹曰吾生五子惟最幼者極快吾意今患疥瘡命已垂絶吾有何心更論他事乎豐曰今曹操東征劉玄德許昌空虛若以義兵乘虛而入上可以保天子下可以救萬民此不易得之機會也惟明公裁之紹曰吾亦知此最好奈我心中恍惚恐有不利豐曰何恍惚之有紹曰五子中惟此子生得最異倘有疏虞吾命休矣遂決意不肯發兵乃謂孫乾曰汝回見玄德可言其故倘有不如意可來相投吾自有相助之處田豐以杖擊地曰遭此難遇之時乃以嬰兒之病失此機會大事去矣可痛惜哉跌足長歎而出孫乾見紹不肯發兵只得星夜回小沛見玄德具説此事玄德大驚曰似此如之奈何張飛曰兄長勿憂曹兵遠來必然困乏乘其初至先去劫寨可破曹操玄德曰素以汝為一勇夫耳前者捉劉岱時頗能用計今獻此策亦中兵法乃從其言分兵劫寨且説曹操引軍往小沛來正行間狂風驟至忽聽一聲響亮將一面牙旗吹折操便令軍兵且住聚衆謀士問吉凶荀彧曰風從何方來吹折甚顔色旗操曰風自東南方來吹折角上牙旗旗乃青紅二色彧曰不主別事今夜劉備必來劫寨操點頭忽毛玠入見曰方才東南風起吹折青紅牙旗一面主公以為主何吉凶操曰公意若何毛玠曰愚意以為今夜必主有人來劫寨後人有詩歎曰籲嗟帝胄勢孤窮全仗分兵劫寨功爭奈牙旗折有兆老天何故縱姦雄操曰天報應我當即防之遂分兵九隊只留一隊向前虛扎營寨餘衆八面埋伏是夜月色微明玄德在左張飛在右分兵兩隊進發只留孫乾守小沛且説張飛自以為得計領輕騎在前突入操寨但見零零落落無多人馬四邊火光大起喊聲齊舉飛知中計急出寨外正東張遼正西許褚正南於禁正北李典東南徐晃西南樂進東北夏侯惇西北夏侯淵八處軍馬殺來張飛左沖右突前遮後當所領軍兵原是曹操手下舊軍見事勢已急盡皆投降去了飛正殺間逢著徐晃大殺一陳後面樂進趕到飛殺條血路突圍而走只有數十騎跟定欲還小沛去路已斷欲投徐州下邳又恐曹軍截住尋思無路只得望芒碭山而去卻説玄德引軍劫寨將近寨門忽然喊聲大震後面沖出一軍先截去了一半人馬夏侯惇又到玄德突圍而走夏侯淵又從後趕來玄德回顧止有三十餘騎跟隨急欲奔還小沛早望見小沛城中火起只得棄了小沛欲投徐州下邳又見曹軍漫山塞野截住去路玄德自思無路可歸想袁紹有言倘不知意可來相投今不若暫往依棲別作良圖遂望青州路而走正逢李典攔住玄德匹馬落荒望北而逃李典虜將從騎去了且説玄德匹馬投青州日行三百里奔至青州城下叫門門吏問了姓名來報刺史刺史乃袁紹長子袁談談素敬玄德聞知匹馬到來即便門開相迎接入公廨細問其故玄德備言兵敗相投之意談乃留玄德於館驛中住下發書報父袁紹一面差本州人馬護送玄德至平原界口袁紹親自引衆出鄴郡三十裏迎接玄德玄德拜謝紹忙答禮曰昨為小兒抱病有失救援於心怏怏不安今幸得相見大慰平生渴想之思玄德曰孤窮劉備久欲投于門下奈機緣未遇今為曹操所攻妻子俱陷想將軍容納四方之士故不避羞慚徑來相投望乞收録誓當圖報紹大喜相待甚厚同居冀州且説曹操當夜取了小沛隨即進兵攻徐州糜竺簡雍守把不住只得棄城而走陳登獻了徐州曹操大軍入城安民已畢隨喚衆謀士議取下邳荀曰雲長保護玄德妻小死守此城若不速取恐為袁紹所竊操曰吾素愛雲長武藝人材欲得之以為己用不若令人説之使降郭嘉曰雲長義氣深重必不肯降若使人説之恐被其害帳下一人出曰某與關公有一面之交願往説之衆視之乃張遼也程昱曰文遠雖與雲長有舊吾觀此人非可以言詞説也某有一計使此人進退無路然後用文遠説之彼必歸丞相矣正是整備窩弓射猛虎安排香餌釣鼇魚未知其計若何且聽下文分解
