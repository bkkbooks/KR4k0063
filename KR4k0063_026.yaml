body:
  text: 第二十六回袁本初損兵折將關雲長挂印封金卻説袁紹欲斬玄德玄德從容進曰明公只聽一面之詞而絶向日之情耶備自徐州失散二弟雲長未知存否天下同貌者不少豈赤面長須之人即為關某也明公何不察之袁紹是個沒主張的人聞玄德之言責沮授曰誤聽汝言險殺好人遂仍請玄德上帳坐議報顔良之仇帳下一人應聲而進曰顔良與我如兄弟今被曹賊所殺我安得不雪其恨玄德視其人身長八尺面如獬豸乃河北名將文醜也袁紹大喜曰非汝不能報顔良之仇吾與十萬軍兵便渡黃河追殺曹賊沮授曰不可今宜留屯延津分兵官渡乃為上策若輕舉渡河設或有變衆皆不能還矣紹怒曰皆是汝等遲緩軍心遷延日月有妨大事豈不聞兵貴神速乎沮授出歎曰上盈其志下務其功悠悠黃河吾其濟乎遂托疾不出議事玄德曰備蒙大恩無可報效意欲與文將軍同行一者報明公之德二者就探雲長的實信紹喜喚文醜與玄德同領前部文醜曰劉玄德屢敗之將於軍不利既主公要他去時某分三萬軍教他為後部於是文醜自領七萬軍先行令玄德引三萬軍隨後且説曹操見雲長斬了顔良倍加欽敬表奏朝廷封雲長為漢壽亭侯鑄印送關公忽報袁紹又使大將文醜渡黃河已據延津之上操乃先使人移徙居民于西河然後自領兵迎之傳下將令以後軍為前軍以前軍為後軍糧草先行軍兵在後呂虔曰糧草在先軍兵在後何意也操曰糧草在後多被剽掠故令在前虔曰倘遇敵軍劫去如之奈何操曰且待敵軍到時卻又理會虔心疑未決操令糧食輜重沿河塹至延津操在後軍聽得前軍發喊急教人看時報説河北大將文醜兵至我軍皆棄糧草四散奔走後軍又遠將如之何操以鞭指南阜曰此可暫避人馬急奔土阜操令軍士皆解衣卸甲少歇盡放其馬文醜軍掩至衆將曰賊至矣可急收馬匹退回白荀攸急止之曰此正可以餌敵何故反退操急以目視荀攸而笑攸知其意不復言文醜軍既得糧草車仗又來搶馬軍士不依隊伍自相雜亂曹操卻令軍將一齊下土阜擊之文醜軍大亂曹兵圍裹將來文醜挺身獨戰軍士自相踐踏文醜止遏不住只得撥馬回走操在土阜上指曰文醜為河北名將誰可擒之張遼徐晃飛馬齊出大叫文醜休走文醜回頭見二將趕上遂按住鐵槍拈弓搭箭正射張遼徐晃大叫賊將休放箭張遼低頭急躲一箭射中頭盔將簪纓射去遼奮力再趕坐下戰馬又被文醜一箭射中面頰那馬跪倒前蹄張遼落地文醜回馬復來徐晃急輪大斧截住廝殺只見文醜後面軍馬齊到晃料敵不過拔馬而回文醜沿河趕來忽見十餘騎馬旗號翩翻一將當頭提刀飛馬而來乃關雲長也大喝賊將休走與文醜交馬戰不三合文醜心怯撥馬繞河而走關公馬快趕上文醜腦後一刀將文醜斬下馬來曹操在土阜上見關公砍了文醜大驅人馬掩殺河北軍大半落水糧草馬匹仍被曹操奪回雲長引數騎東沖西突正殺之間劉玄德領三萬軍隨後到前面哨馬探知報與玄德雲今番又是紅面長髯的斬了文醜玄德慌忙驟馬來看隔河望見一簇人馬往來如飛旗上寫著漢壽亭侯關雲長七字玄德暗謝天地曰原來吾弟果然在曹操處欲待招呼相見被曹兵大隊擁來只得收兵回去袁紹接應至官渡下定寨柵郭圖審配入見袁紹説今番又是關某殺了文醜劉備佯推不知袁紹大怒罵曰大耳賊焉敢如此少頃玄德至紹令推出斬之玄德曰某有何罪紹曰你故使汝弟又壞我一員大將如何無罪玄德曰容伸一言而死曹操素忌備今知備在明公處恐備助公故特使雲長誅殺二將公知必怒此借公之手以殺劉備也願明公思之袁紹曰玄德之言是也汝等幾使我受害賢之名喝退左右請玄德上帳而坐玄德謝曰荷明公寬大之恩無可補報欲令一心腹人持密書去見雲長使知劉備消息彼必星夜來到輔佐明公共誅曹操以報顔良文醜之仇若何袁紹大喜曰吾得雲長勝顔良文醜十倍也玄德修下書劄未有人送去紹令退軍陽武連營數十裏按兵不動操乃使夏侯惇領兵守住官渡隘口自己班師回許都大宴衆官賀雲長之功因謂呂虔曰昔日吾以糧草在前者乃餌敵之計也惟荀公達知吾心耳衆皆歎服正飲宴間忽報汝南有黃巾劉辟龔都甚是猖獗曹洪纍戰不利乞遣兵救之雲長聞言進曰關某願施犬馬之勞破汝南賊寇操曰雲長建立大功未曾重酬豈可復勞征進公曰關某久間必生疾病願再一行曹操壯之點兵五萬使于禁樂進為副將次日便行荀彧密謂操曰雲長常有歸劉之心倘知消息必去不可頻令出征操曰今次收功吾不復教臨敵矣且説雲長領兵將近汝南扎住營寨當夜營外拿了兩個細作人來雲長視之內中認得一人乃孫乾也關公叱退左右問乾曰公自潰散之後一向蹤迹不聞今何為在此處乾曰某自逃難飄泊汝南幸得劉辟收留今將軍為何在曹操處未識甘糜二夫人無恙否關公因將上項事細説一遍乾曰近聞玄德公在袁紹處欲往投之未得其便今劉龔二人歸順袁紹相助攻曹天幸得將軍到此因特令小軍引路教某為細作來報將軍來日二人當虛敗一陳公可速引二夫人投袁紹處與玄德公相見關公曰既兄在袁紹處吾必星夜而往但恨吾斬紹二將恐今事變矣乾曰吾當先往探彼虛實再來報將軍公曰吾見兄長一面雖萬死不辭今回許昌便辭曹操也當夜密送孫乾去了次日關公引兵出龔都披挂出陳關公曰汝等何故背反朝廷都曰汝乃背主之人何反責我關公曰我何為背主都曰劉玄德在袁本初處汝卻從曹操何也關公更不打話拍馬舞刀向前龔都便走關公趕上都回身知告關公曰故主之恩不可忘也公當速進我讓汝南關公會意驅軍掩殺劉龔二人佯輸詐敗四散去了雲長奪得州縣安民已定班師回許昌曹操出郭迎接賞勞軍士宴罷雲長回家參拜二嫂于門外甘夫人曰叔叔兩番出軍可知皇叔音信否公答曰未也關公退二夫人于門內痛哭曰想皇叔休矣二叔恐我姊妹煩惱故隱而不言正哭間有一隨行老軍聽得哭聲不絶於門外告曰夫人休哭主人現在河北袁紹處夫人曰汝何由知之軍曰跟關將軍出征有人在陳上説來夫人急召雲長責之曰皇叔未嘗負汝汝今受曹操之恩頓忘舊日之義不以實情告我何也關公頓首曰兄今委實在河北未敢教嫂嫂知者恐有泄漏也事須緩圖不可欲速甘夫人曰叔宜上緊公退尋思去計坐立不安原來于禁探知劉備在河北報與曹操操令張遼來探關公意關公正悶坐張遼入賀曰聞兄在陳上知玄德音信特來賀喜關公曰故主雖在未得一見何喜之有遼曰兄與玄德交比弟與兄交何如公曰我與兄朋友之交也我與玄德是朋友而兄弟兄弟而主臣者也豈可共論乎遼曰今玄德在河北兄往從否關公曰昔日之言安肯背之文遠須為我致意丞相張遼將關公之言回告曹操操曰吾自有計留之且説關公正尋思間忽報有故人相訪及請入卻不相識關公問曰公何人也答曰某乃袁紹部下南陽陳震也關公大驚急退左右問曰先生此來必有所為震出書一緘遞與關公公視之乃玄德書也其略雲備與足下自桃園締盟誓以同死今何中道相違割恩斷義君必欲取功名圖富貴願獻備首級以成全功書不盡言死待來命關公看書畢大哭曰某非不欲尋兄奈不知所在也安肯圖富貴而背舊盟乎震曰玄德望公甚切公既不背舊盟宜速往見關公曰人生天地間無終始者非君子也吾來時明白去時不可不明白吾今作書煩公先達知兄長容某辭卻曹公奉二嫂來相見震曰倘曹操不允為之奈何公曰吾寧死豈肯久留於此震曰公速用回書免致劉使君懸望關公寫書答雲竊聞義不負心忠不顧死羽自幼讀書粗知禮義觀羊角哀左伯桃之事未嘗不三歎而流涕也前守下邳內無積粟外無援兵欲即效死奈有二嫂之重未敢斷首捐軀致負所托故爾暫且羈身冀圖後會近至汝南方知兄信即當面辭曹公奉二嫂歸羽但懷異心神人共戮披肝瀝膽筆楮難窮瞻拜有期伏惟照鑒陳震得書自回關公入內告知二嫂隨即至相府拜辭曹操操知來意乃懸回避牌於門關公怏怏而回命舊日跟隨人役收拾車馬早晚伺候分付宅中所有原賜之物盡皆留下分毫不可帶去次日再往相府辭謝門首又挂回避牌關公一連去了數次皆不得見乃往張遼家相探欲言其事遼亦托疾不出關公思曰此曹丞相不容我去之意我去志已決豈可復留即寫書一封辭謝曹操書略曰羽少事皇叔誓同生死皇天後土實聞斯言前者下邳失守所請三事已蒙恩諾今探知故主現在袁紹軍中回思昔日之盟豈容違背新恩雖厚舊義難忘茲特奉書告辭伏惟照察其有餘恩未報願以俟之異日寫畢封固差人去相府投遞一面將纍次所受金銀一一封置庫中懸漢壽亭侯印於堂中請二夫人上車關公上赤兔馬手提青龍刀率領舊日跟隨人役護送車仗徑出北門門吏擋之關公怒目橫刀大喝一聲門吏皆退避關公既出門謂從者曰汝等護送車仗先行但有追趕者吾自當之勿得驚動二位夫人從者推車望官道進發卻説曹操正論關公之事未定左右報關公呈書操即看畢大驚曰雲長去矣忽北門守將飛報關公奪門而去車仗鞍馬二十餘人皆望北行又關公宅中人來報説關公盡封所賜金銀等物美女十人另居內室其漢壽亭侯印懸於堂上丞相所撥人役皆不帶去只帶原跟從人及隨身行李出北門去了衆皆愕然一將挺身曰某願鐵騎三千去生擒關某獻與丞相衆視之乃將軍蔡陽也正是欲離萬丈蛟龍穴又遇三千狼虎兵蔡陽要趕關公畢竟如何且聽下文分解
