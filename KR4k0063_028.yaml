body:
  text: 第二十八回斬蔡陽兄弟釋疑會古城主臣聚義卻説關公同孫乾保二嫂向汝南進發不想夏侯惇領三百餘騎從後追來孫乾保車仗前行關公回身勒馬按刀問曰汝來趕我有失丞相大度夏侯惇曰丞相無明文傳報汝于路殺人又斬吾部將無禮太甚我特來擒你獻與丞相發落言訖便拍馬挺槍欲鬥只見後面一騎飛來大叫不可與雲長交戰關公按轡不動來使於懷中取出公文謂夏侯惇曰丞相敬愛關將軍忠義恐于路關隘攔截故遣某特齎公文遍行諸處惇曰關某于路殺把關將士丞相知否來使曰此卻未知惇曰我只活捉他去見丞相待丞相自放他關公怒曰吾豈懼汝耶拍馬持刀直取夏侯惇惇挺搶來迎兩馬相交戰不十合忽又一騎飛至大叫二將軍少歇惇停槍問來使曰丞相叫擒關某乎使者曰非也丞相恐守關諸將阻擋關將軍故又差某馳公文來放行惇曰丞相知某于路殺人否使者曰未知惇曰既未知其殺人不可放去指揮手下軍士將關公圍住關公大怒舞刀迎戰兩個正欲交鋒陳後一人飛馬而來大叫雲長元讓休得爭戰衆視之乃張遼也二人各勒住馬張遼近前言曰奉丞相鈞旨因聞知雲長斬關殺將恐于路有阻特差我傳諭各處關隘任便放行惇曰秦琪是蔡陽之甥他將秦琪託付我處今被關某所殺怎肯幹休遼曰我見蔡將軍自有分解既丞相大度教放雲長去公等不可廢丞相之意夏侯惇只得將軍馬約退遼曰雲長今欲何往關公曰聞兄長又不在袁紹處吾今將遍天下尋之遼曰既未知玄德下落且再回見丞相若何關公笑曰安有是理文遠回見丞相幸為我謝罪説畢與張遼拱手而別於是張遼與夏侯惇領軍自回關公趕上車仗與孫乾説知此事二人並馬而行行了數日忽值大雨滂沱行裝盡濕遙望山岡邊有一所莊院關公引著車仗到彼借宿莊內一老人出迎關公具言來意老人曰某姓郭名常世居於此久聞大名幸得瞻拜遂宰羊置酒相待請二夫人于後堂暫歇郭常陪關公孫乾于草堂飲酒一邊烘焙行李一邊餵養馬匹至黃昏時候忽見一少年引數人入莊徑上草堂郭常喚曰吾兒來拜將軍因謂關公曰此愚男也關公問何來常曰射獵方回少年見過關公即下堂去了常流淚言曰老夫耕讀傳家止生此子不務本業惟以遊獵為事是家門不幸也關公曰方今亂世若武藝精熟亦可以取功名何雲不幸常曰他若肯習武藝便是有志之人今專務遊蕩無所不為老夫所以憂耳關公亦為歎息至更深郭常辭出關公與孫乾方欲就寢忽聞後院馬嘶人叫關公急喚從人卻都不應乃與孫乾提劍往視之只見郭常之子倒在地上叫喚從人正與莊客廝打公問其故從人曰此人來盜赤兔馬被馬踢倒我等聞叫喚之聲起來巡看莊客們反來廝鬧公怒曰鼠賊焉敢盜吾馬恰待發作郭常奔至告曰不肖子為此歹事罪合萬死奈老妻最憐愛此子乞將軍仁慈寬怒關公曰此子果然不肖適才老翁所言真知子莫若父也我看翁面且姑恕之遂分付從人看好了馬喝散莊客與孫乾回草堂歇息次日郭常夫婦出拜于堂前謝曰犬子冒瀆虎威深感將軍恩恕關公令喚出我以正言教之常曰他于四更時分又引數個無賴之徒不知何處去了關公謝別郭常奉二嫂上車出了莊院與孫乾並馬護著車仗取山路而行不及三十裏只見山背後擁出百餘人為首兩騎馬前面那人頭裹黃巾身穿戰袍後面乃郭常之子也黃巾者曰我乃天公將軍張角部將也來者快留下赤兔馬放你過去關公大笑曰無知狂賊汝既從張角為盜亦知劉關張兄弟三人名字否黃巾者曰我只聞赤面長髯者名關雲長卻未識其面汝何人也公乃停刀立馬解開須囊出長髯令視之其人滾鞍下馬腦揪郭常之子拜獻下馬前關公問其姓名告曰某姓裴名元紹自張角死後一向無主嘯聚山林權于此處藏伏今早這廝來報有一客人騎一匹千里馬在我家投宿特邀某來劫奪此馬不想卻遇將軍郭常之子拜伏乞命關公曰吾看汝父之面饒你性命郭子抱頭鼠竄而去公謂元紹曰汝不識吾面何以知吾名元紹曰離此二十裏有一臥牛山山上有一關西人姓周名倉兩臂有千斤之力板肋虯髯形容甚偉原在黃巾張寶部下為將張寶死嘯聚山林他多曾與某説將軍盛名恨無門路相見關公曰緑林中非豪傑托足之處公等今後可各去邪歸正勿自陷其身元紹拜謝正説話間遙望一彪人馬來到元紹曰此必周倉也關公乃立馬待之果見一人黑面長身持槍乘馬引衆而至見了關公驚喜曰此關將軍也疾忙下馬俯伏道傍曰周倉參拜關公曰壯士何處曾識關某來倉曰舊隨黃巾張寶時曾識尊顔恨失身賊黨不得相隨今日幸得拜見願將軍不棄收為步卒早晚執鞭隨鐙死亦甘心公見其意甚誠乃謂曰汝若隨我汝手下人若何倉曰願從則俱從不願從者聽之可也於是衆人皆曰願從關公乃下馬至車前稟問二嫂甘夫人曰叔叔自離許都于路至此獨行曆過多少艱難未嘗要軍馬相隨前廖化欲相投叔既卻之今何獨容周倉之衆耶我輩女流淺見叔自斟酌公曰嫂嫂之言是也遂謂周倉曰非關某寡情奈二夫人不從汝等且回山中待我尋見兄長必來相招周倉頓首告曰倉乃一粗莽之夫失身為盜今遇將軍如重見天日豈忍復錯過若以衆人相隨為不便可令其盡跟裴元紹去倉隻身步行跟隨將軍雖萬里不辭也關公再以此言告二嫂甘夫人曰一二人相從無妨於事公乃令周倉撥人伴隨裴元紹去元紹曰我亦願隨關將軍周倉曰汝若去時人伴皆散且當權時統領我隨關將軍去但有住扎處便來取你元紹怏怏而別周倉跟著關公往汝南進發行了數日遙見一座山城公問土人此何處也土人曰此名古城數月前有一將軍姓張名飛引數十騎到此將縣官逐去占住古城招軍買馬積草屯糧今聚有三五千人馬四遠無人敢敵關公喜曰吾弟自徐州失散一向不知不落誰想卻此乃令孫乾先入城通報教來迎接二嫂卻説張飛在芒碭山中住了月餘因出外探聽玄德消息偶過古城入縣借糧縣官不肯飛怒因就逐去縣官奪了縣印占住城池權且安身當日孫乾領關公命入城見飛施禮畢具言玄德離了袁紹處投汝南去了今雲長直從許都送二位夫人至此請將軍出迎張飛聽罷更不回言隨即披挂持矛上馬引一千餘人徑出北門孫乾驚訝又不敢問只得隨出城來關公望見張飛到來喜不自勝付刀與周倉接了拍馬來迎只見張飛圓睜環眼倒豎虎須吼聲如雷揮矛向關公便搠關公大驚連忙閃過便叫賢弟何故如此豈忘了桃園結義耶飛喝曰你既無義有何面目來與我相見關公曰我如何無義飛曰你背了兄長降了曹操封侯賜爵今又來賺我我今與你拼個死活關公曰你原來不知我也難説現放著二位嫂嫂在此賢弟請自問二夫人聽得揭簾而呼曰三叔何故如此飛曰嫂嫂住著且看我殺了負義的人然後請嫂嫂入城甘夫人曰二叔因不知你等下落故暫時棲身曹氏今知你哥哥在汝南特不避險阻送我們到此三叔休錯見了糜夫人曰二叔向在許都原出於無奈飛曰嫂嫂休要被他瞞過了忠臣寧死而不辱大丈夫豈有事二主之理關公曰賢弟休屈了我孫乾曰雲長特來尋將軍飛喝曰如何你也胡説他那裏有好心必是來捉我關公曰我若捉你須軍馬來飛把手指曰兀的不是軍馬來也關公回顧果見塵埃起處一彪人馬來到風吹旗號正是曹軍張飛大怒曰今還敢支吾麼挺丈八蛇矛便搠將來關公急止之曰賢弟且住你看我斬此來將以表我真心飛曰你果有真心我這裏三通鼓罷便要你斬來將關公應諾須臾曹軍至為首一將乃是蔡陽挺刀縱馬大喝曰你殺吾外甥秦琪卻原來逃在此吾奉丞相命特來拿你關公更不打話舉刀便砍張飛親自擂鼓只見一通鼓未盡關公刀起處蔡陽頭已落地衆軍士俱走關公活捉執認旗的小卒過來問取來由小卒告説蔡陽聞將軍殺了他外甥十分忿怒要來河北與將軍交戰丞相不肯因差他往汝南攻劉辟不想在這裏遇著將軍關公聞言教去張飛前告説其事飛將關公在許都時事細問小卒小卒從頭至尾説一遍飛方才信正説間忽城中軍士來報城南門外有十數騎來的甚緊不知是甚人張飛心中疑慮便轉出南門看時果見十數騎輕弓短箭而來見了張飛滾鞍下馬視之乃糜竺糜芳也飛亦下馬相見竺曰自徐州失散我兄弟二人逃難回鄉使人遠近打聽知雲長降了曹操主公在於河北又聞簡雍亦投河北去了只不知將軍在此昨于路上遇見一夥客人説有一姓張的將軍如此模樣今據古城我兄弟度量必是將軍故來尋訪幸得相見飛曰雲長兄與孫乾送二嫂方到已知哥哥下落二糜大喜同來見關公並參見二夫人飛遂迎請二嫂入城至衙中坐定二夫人訴説關西曆過之事張飛方才大哭參拜雲長二糜亦俱傷感張飛亦自訴別後之事一面設宴賀喜次日張飛欲與關公同赴汝南見玄德關公曰賢弟可保護二嫂暫住此城待我與孫乾先去探聽兄長消息飛允諾關公與孫乾引數騎奔汝南來劉辟龔都接著關公便問皇叔何在劉辟曰皇叔到此住了數日為見軍少復往河北袁本初處商議去了關公怏怏不樂孫乾曰不必憂慮再苦一番驅馳仍往河北去報知皇叔同至古城便了關公依言辭了劉辟龔都回至古城與張飛説知此事張飛便欲同至河北關公曰有此一城便是我等安身之處未可輕棄我還與孫乾同往袁紹處尋見兄長來此相會賢弟可堅守此城飛曰兄斬他顔良文醜如何去得關公曰不妨我到彼當見機而變遂喚周倉問曰臥牛山裴元紹處共有多少人馬倉曰約有四五百關公曰我今抄近路去尋兄長汝可往臥牛山招此一支人馬從大路上接來倉領命而去關公與孫乾只帶二十餘騎投河北來將至界首乾曰將軍且未可輕入只在此間暫歇待某先入見皇叔別作商議關公依言先打發孫乾去了遙望前村有一所莊院便與從人到彼投宿莊內一老翁攜杖而出與關公施禮公具以實告老翁曰某亦姓關名定久聞大名幸得瞻謁遂命二子出見款留關公並從人俱留于莊內且説孫乾匹馬入冀州見玄德具言前事玄德曰簡雍亦在此間可暗請來同議少頃簡雍至與孫乾相見畢共議脫身之計雍曰主公明日見袁紹只説要往荊州説劉表共破曹操便可乘機而去玄德曰此計大妙但公能隨我去否雍曰某亦自有脫身之計商議已定次日玄德入見袁紹告曰劉景升鎮守荊襄九郡兵精糧足宜與相約共攻曹操紹曰吾嘗遣使約之奈彼未肯相從玄德曰此人是備同宗備往説之必無推阻紹曰若得劉表勝劉辟多矣遂命玄德行紹又曰近聞關雲長已離了曹操欲來河北吾當殺之以雪顔良文醜之恨玄德曰明公前欲用之吾故召之今何又欲殺之耶且顔良文醜比之二鹿耳雲長乃一虎也失二鹿而得一虎何恨之有紹笑曰吾實愛之故戲言耳公可再使人召之令其速來玄德曰即遣孫乾往召之可也紹大喜從之玄德出簡雍進曰玄德此去必不回矣某願與偕往一則同説劉表二則監住玄德紹然其言便命簡雍與玄德同行郭圖諫紹曰劉備前去説劉辟未見成事今又使與簡雍同往荊州必不返矣紹曰汝勿多疑簡雍自有見識郭圖嗟呀而出卻説玄德先命孫乾出城回報關公一面與簡雍辭了袁紹上馬出城行至界首孫乾接著同往關定莊上關公迎門接拜執手啼哭不止關定領二子拜於草堂之前玄德問其姓名關公曰此人與弟同姓有二子長子關寧學文次子關平學武關定曰今愚意欲遣次子跟隨關將軍未識肯容納否玄德曰年幾何矣定曰十八歲矣玄德曰既蒙長者厚意吾弟尚未有子今即以賢郎為子若何關定大喜便命關平拜關公為父呼玄德為伯父玄德恐袁紹追之急收拾起行關平隨著關公一齊起身關定送了一程自回關公教取路往臥牛山來正行間忽見周倉引數十人帶傷而來關公引他見了玄德問其何故受傷倉曰某未至臥牛山之前先有一將單騎而來與裴元紹交鋒只一合刺死裴元紹盡數招降人伴占住山寨倉到彼招誘人伴時止有這幾個過來餘者俱懼怕不敢擅離倉不忿與那將交戰被他連勝數次身中三槍因此來報主公玄德曰此人怎生模樣姓甚名誰倉曰極其雄壯不知姓名於是關公縱馬當先玄德在後徑投臥牛山來周倉在山下叫罵只見那將全副披挂持槍驟馬引衆下山玄德早揮鞭出馬大叫曰來者莫非子龍否那將見了玄德滾鞍下馬拜伏道旁原來果然是趙子龍玄德關公俱下馬相見問其何由至此雲曰雲自別使君不想公孫瓚不聽人言以致兵敗自焚袁紹屢次招雲雲想紹亦非用人之人因此未往後欲至徐州投使君又聞徐州失守雲長已歸曹操使君又在袁紹處雲幾番欲來相投只恐袁紹見怪四海飄零無容身之地前偶過此處適遇裴元紹下山來欲奪吾馬雲因殺之借此安身近聞翼德在古城欲往投之未知真實今幸得遇使君玄德大喜訴説從前之事關公亦訴前事玄德曰吾初見子龍便有留戀不舍之情今幸得相遇雲曰雲奔走四方擇主而事未有如使君者今得相隨大稱平生雖肝腦塗地無恨矣當日就燒毀山寨率領人衆盡隨玄德前赴古城張飛糜竺糜芳迎接入城各相拜訴二夫人具言雲長之事玄德感歎不已於是殺牛宰馬先拜謝天地然後遍勞諸軍玄德見兄弟重聚將佐無缺又新得了趙雲關公又得了關平周倉二人歡喜無限連飲數日後人有詩贊之曰當時手足似瓜分信斷音稀杳不聞今日君臣重聚義正如龍虎會風雲時玄德關張趙雲孫乾簡雍糜竺糜芳關平周倉部領馬步軍校共四五千人玄德欲棄了古城去守汝南恰好劉辟龔都差人來請於是遂起軍往汝南駐扎招軍買馬徐圖征進不在話下且説袁紹見玄德不回大怒欲起兵伐之郭圖曰劉備不足慮曹操乃徑敵也不可不除劉表雖據荊州不足為強江東孫伯符威鎮三江地連六郡謀臣武士極多可使人結之共攻曹操紹從其言即修書遣陳震為使來會孫策正是只因河北英雄去引出江東豪傑來未知其事如何且聽下文分解
