body:
  text: 第三十一回曹操倉亭破本初玄德荊州依劉表卻説曹操乘袁紹之敗整頓軍馬迤邐追襲袁紹幅巾單衣引八百餘騎奔至黎陽北岸大將蔣義渠出寨迎接紹以前事訴與義渠義渠乃招諭離散之衆衆聞紹在又皆蟻聚軍勢復振議還冀州軍行之次夜宿荒山紹于帳中聞遠遠有哭聲遂私往聽之卻是敗軍相聚訴説喪兄失弟棄伴亡親之苦各各捶胸大哭皆曰若聽田豐之言我等怎遭此禍紹大悔曰吾不聽田豐之言兵敗將亡今回去有何面目見之耶次日上馬正行間逢紀引軍來接紹對逢紀曰吾不聽田豐之言致有此敗吾今歸去羞見此人逢紀因譖曰豐在獄中聞主公兵敗撫掌大笑曰果不出吾之料袁紹大怒曰豎儒怎敢笑我我必殺之遂命使者齎寶劍先往冀州獄中殺田豐卻説田豐在獄中一日獄吏來見豐曰與別駕賀喜豐曰何喜可賀獄吏曰袁將軍大敗而回君必見重矣豐笑曰吾今死矣獄吏問曰人皆為君喜君何言死也豐曰袁將軍外寬而內忌不念忠誠若勝而喜猶能赦我今戰敗則羞吾不望生矣獄吏未信忽使者齎劍至傳袁紹命欲取田豐之首獄吏方驚豐曰吾固知必死也獄吏皆流淚豐曰大丈夫生於天地間不識其主而事之是無智也今日受死夫何足惜乃自刎於獄中後人有詩曰昨朝沮授軍中死今日田豐獄內亡河北棟梁皆折斷本初焉不喪家邦田豐既死聞者皆為歎惜袁紹回冀州心煩意亂不理政事其妻劉氏勸立後嗣紹所生三子長子袁談字顯思出守青州次子袁熙字顯奕出守幽州三子袁尚字顯甫是紹後妻劉氏所生生得形貌俊偉紹至愛之因此留在身邊自官渡兵敗之後劉氏勸立尚為後嗣紹乃與審配逢紀辛評郭圖四人商議原來審逢二人向輔袁尚辛郭二人向輔袁談四人各為其主當下袁紹謂四人曰今外患未息內事不可不早定吾將議立後嗣長子談為人性剛好殺次子熙為人柔懦難成三子尚有英雄之表禮賢敬士吾欲立之公等之意若何郭圖曰三子之中談為長今又居外主公若廢長立幼此亂萌也今軍威稍挫敵兵壓境豈可復使父子兄弟自相爭亂耶主公且理會拒敵之策立嗣之事毋容多議袁紹躊躇未決忽報袁熙引兵六萬自幽州來袁談引兵五萬自青州來外甥高幹亦引兵五萬自並州來各至冀州助戰紹喜再整人馬來戰曹操時操引得勝之兵陳列於河上有土人簞食壺漿以迎之操見父老數人鬚髮盡白乃命入帳中賜坐問之曰老丈多少年紀答曰皆近百歲矣操曰吾軍士驚擾汝鄉吾甚不安父老曰桓帝時有黃星見於楚宋之分遼東人殷馗善曉天文夜宿於此對老漢等言黃星見於乾象正照此間後五十年當有真人起于梁沛之間今以年計之整整五十年袁本初重斂於民民皆怨之丞相興仁義之兵吊民伐罪官渡一戰破袁紹百萬之衆正應當時殷馗之言兆民可望太平矣操笑曰何敢當老丈所言遂取酒食絹帛賜老人而遣之號令三軍如有下鄉殺人家雞犬者如殺人之罪於是軍民震服操亦心中暗喜人報袁紹聚四州之兵得二三十萬前至倉亭下寨操提兵前進下寨已定次日兩軍相對各布成陳勢操引諸將出陳紹亦引三子一甥及文官武將出到陳前操曰本初計窮力盡何尚不思投降直待刀臨項上悔無及矣紹大怒回顧衆將曰誰敢出馬袁尚欲于父前逞能便舞雙刀飛馬出陳來往賓士操指問衆將曰此何人有識者答曰此袁紹三子袁尚也言未畢一將挺槍早出操視之乃徐晃部將史渙也兩騎相交不三合尚撥馬刺斜而走史渙趕來袁尚拈弓搭箭翻身背射正中史渙左目墜馬而死袁紹見子得勝揮鞭一指大隊人馬擁將過去混戰大殺一場各鳴金收軍還寨操與諸將商議破紹之策程昱獻十面埋伏之計勸操退軍於河上伏兵十隊誘紹追至河上我軍無退路必將死戰可勝紹矣操然其計左右各分五隊左一隊夏侯惇二隊張遼三隊李典四隊樂進五隊夏侯淵右一隊曹洪二隊張郃三隊徐晃四隊於禁五隊高覽中軍許褚為先鋒次日十隊先進埋伏左右已定至半夜操令許褚引兵前進偽作劫寨之勢袁紹五寨人馬一齊俱起許褚回軍便走袁紹引軍趕來喊聲不絶比及天明趕至河上曹軍無去路操大呼曰前無去路諸軍何不死戰衆軍回身奮力向前許褚飛馬當先力斬十數將袁軍大亂袁紹退軍急回背後曹軍趕來正行間一聲鼓響左邊夏侯淵右邊高覽兩軍沖出袁紹聚三子一甥死沖血路奔走又行不到十裏左邊樂進右邊於禁殺出殺得袁軍尸橫遍野血流成渠又行不到數裏左邊李典右邊徐晃兩軍截殺一陳袁紹父子膽喪心驚奔入舊寨令三軍造飯方欲待食左邊張遼右邊張郃徑來沖寨紹慌上馬前奔倉亭人馬困乏欲待歇息後面曹操大軍趕來袁紹捨命而走正行之間右邊曹洪左邊夏侯惇擋住去路紹大呼曰若不決死戰必為所擒矣奮力衝突得脫重圍袁熙高幹皆被箭傷軍馬死亡殆盡紹抱三子痛哭一場不覺昏倒衆人急救紹口吐鮮血不止歎曰吾自曆戰數十場不意今日狼狽至此此天喪吾也汝等各回本州誓與曹賊一決雌雄便教辛評郭圖火急隨袁談前往青州整頓恐曹操犯境令袁熙仍回幽州高幹仍回並州各去收拾人馬以備調用袁紹引袁尚等入冀州養病令尚與審配逢紀暫掌軍事卻説曹操自倉亭大勝重賞三軍令人探察冀州虛實細作回報紹臥病在床袁尚審配緊守城池袁談袁熙高幹皆回本州衆皆勸操急攻之操曰冀州糧食極廣審配又有機謀未可急拔見今禾稼在田恐廢民業姑待秋成後取之未晚正議間忽荀彧有書到報説劉備在汝南得劉辟龔都數萬之衆聞丞相提軍出征河北乃令劉辟守汝南備親自引兵乘虛來攻許昌丞相可速回軍禦之操大驚留曹洪屯兵河上虛張聲勢操自提大兵往汝南來迎劉備卻説玄德與關張趙雲等引兵欲襲許都行近穰山地面正遇曹兵殺來玄德便於穰山下寨軍分三隊雲長屯兵於東南角上張飛屯兵於西南角上玄德與趙雲于正南立寨曹操兵至玄德鼓噪而出操布成陳勢叫玄德打話玄德出馬於門旗下操以鞭指罵曰吾待汝為上賓汝何背義忘恩玄德曰汝託名漢相實為國賊吾乃漢室宗親奉天子密詔來討反賊遂於馬上朗誦衣帶詔操大怒教許褚出戰玄德背後趙雲挺槍出馬二將相交三十合不分勝負忽然喊聲大震東南角上雲長衝突而來西南角上張飛引軍衝突而來三處一齊掩殺曹軍遠來疲困不能抵當大敗而走玄德得勝回營次日又使趙雲搦戰操兵旬日不出玄德再使張飛搦戰操兵亦不出玄德愈疑忽報龔都運糧至被曹軍圍住玄德急令張飛去救忽又報夏侯惇引軍抄背後徑取汝南玄德大驚曰若如此吾前後受敵無所歸矣急遣雲長救之兩軍皆去不一日飛馬來報夏候惇已打破汝南劉辟棄城而走雲長現今被圍玄德大驚又報張飛去救龔都也被圍住了玄德急欲回兵又恐操兵後襲忽報寨外許褚搦戰玄德不敢出戰候至天明教軍士飽餐步軍先起馬軍後隨寨中虛傳更點玄德等離寨約行數裏轉過土山火把齊明山頭上大呼曰休教走了劉備丞相在此專等玄德慌尋走路趙雲曰主公勿憂但跟某來趙雲挺槍躍馬殺開條路玄德掣雙股劍後隨正戰間許褚追至與趙雲力戰背後於禁李典又至玄德見勢危落荒而走聽得背後喊聲漸遠玄德望深山僻路單馬逃生捱到天明側首一彪軍沖出玄德大驚視之乃劉辟引敗軍千餘騎護送玄德家小前來孫乾簡雍糜芳亦至訴説夏侯惇軍勢甚鋭因此棄城而走曹兵趕來幸得雲長當住因此得脫玄德曰不知雲長今在何處劉辟曰將軍且行卻再理會行到數裏一棒鼓響前面擁出一彪人馬當先大將乃是張郃大叫劉備快下馬受降玄德方欲退後只見山頭上紅旗磨動一軍從山塢內擁出為首大將乃高覽也玄德兩頭無路仰天大呼曰天何使我受此窘極耶事勢至此不如就死欲拔劍自刎劉辟急止之曰容某死戰奪路救君言訖便來與高覽交鋒戰不三合被高覽一刀砍于馬下玄德正慌方欲自戰高覽後軍忽然自亂一將沖陳而來槍起處高覽翻身落馬視之乃趙雲也玄德大喜雲縱馬挺槍殺散後隊又來前軍獨戰張郃郃與雲戰三十餘合撥馬敗走雲乘勢衝殺卻被郃兵守住山隘路窄不得出正奪路間只見雲長關平周倉引三百軍到兩下相攻殺退張郃各出隘口占住山險下寨玄德使雲長尋覓張飛原來張飛去救龔都龔都已被夏侯淵所殺飛奮力殺退夏侯淵迤邐趕去卻被樂進引軍圍住雲長路逢敗軍尋蹤而去殺退樂進與飛同回見玄德人報曹軍大隊趕來玄德教孫乾等保護老小先行玄德與關張趙雲在後且戰且走操見冀德去遠收軍不趕玄德敗軍不滿一千狼狽而奔前至一江喚土人問之乃漢江也玄德權且安營土人知是玄德奉獻羊酒乃聚飲於沙灘之上玄德歎曰諸君皆有王佐之才不幸跟隨劉備備之命窘纍及諸君今日身無立錐誠恐有誤諸君君等何不棄備而投明主以取功名乎衆皆掩面而哭雲長曰兄言差矣昔日高祖與項羽爭天下數敗於羽後九裏山一戰成功而開四百年基業勝負兵家之常何可自隳其志孫乾曰成敗有時不可喪志此離荊州不遠劉景升坐鎮九郡兵強糧足更且與公皆漢室宗親何不往投之玄德曰但恐不容耳乾曰某願先往説之使景升出境而迎主公玄德大喜便令孫乾星夜往荊州到郡入見劉表禮畢劉表問曰公從玄德何故至此乾曰劉使君天下英雄雖兵微將寡而志欲匡扶社稷汝南劉辟龔都素無親故亦以死報之明公與使君同為漢室之胄今使君新敗欲往江東投孫仲謀乾僭言曰不可背親而向疏荊州劉將軍禮賢下士士歸之如水之投東何況同宗乎因此使君特使乾先來拜白惟明公命之表大喜曰玄德吾弟也久欲相會而不可得今肯惠顧實為幸甚蔡瑁譖曰不可劉備先從呂布後事曹操近投袁紹皆不克終足可見其為人今若納之曹操必加兵於我枉動干戈不如斬孫乾之首以獻曹操操必重持主公也孫乾正色曰乾非懼死之人也劉使君忠心為國非曹操袁紹呂布等比前此相從不得已也今聞劉將軍漢朝苗裔誼切同宗故千里相投爾何獻讒而妒賢如此耶劉表聞言乃叱蔡瑁曰吾主意已定汝勿多言蔡瑁慚恨而出劉表遂命孫乾先往報玄德一面親自出郭三十裏迎接玄德見表執禮甚恭表亦相待甚厚玄德引關張等拜見劉表表遂與玄德等同入荊州分撥院宅居住卻説曹操探知玄德已往荊州投奔劉表便欲引兵攻之程昱曰袁紹未除而遽攻荊襄倘袁紹從北而起勝負未可知矣不如還兵許都養軍蓄鋭待來年春暖然後引兵先破袁紹後取荊襄南北之利一舉可收也操然其言遂提兵回許都至建安七年春正月操復商議興師先差夏侯惇滿寵鎮守汝南以拒劉表留曹仁荀彧守許都親統大軍前赴官渡屯扎且説袁紹自舊歲感冒吐血症候今方稍愈商議欲攻許都審配諫曰舊歲官渡倉亭之敗軍心未振尚當深溝高壘以養軍民之力正議間忽報曹操進兵官渡來攻冀州紹曰若候兵臨城下將至壕邊然後拒敵事已遲矣吾當自領大軍出迎袁尚曰父親病體未痊不可遠征兒願提兵前去迎敵紹許之遂使人往青州取袁談幽州取袁熙並州取高幹四路同破曹操正是才向汝南鳴戰鼓又從冀北動征鼙未知勝負如何且聽下文分解
