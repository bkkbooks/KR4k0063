body:
  text: 第三十二回奪冀州袁尚爭鋒決漳河許攸獻計卻説袁尚自斬史渙之後自負其勇不待袁談等兵至自引兵數萬出黎陽與曹軍前隊相迎張遼當先出馬袁尚挺槍來戰不三合架隔遮攔不住大敗而走張遼乘勢掩殺袁尚不能主張急急引軍奔回冀州袁紹聞袁尚敗回又受了一驚舊病復發吐血數鬥昏倒在地劉夫人慌救入臥內病勢漸危劉夫人急請審配逢紀直至袁紹榻前商議後事紹但以手指而不能言劉夫人曰尚可繼後嗣否紹點頭審配便就榻前寫了遺囑紹翻身大叫一聲又吐血鬥餘而死後人有詩曰纍世公卿立大名少年意氣自縱橫空招俊傑三千客漫有英雄百萬兵羊質虎皮功不就鳳毛雞膽事難成更憐一種傷心處家難徒延兩弟兄袁紹既死審配等主持喪事劉夫人便將袁紹所愛寵妾五人盡行殺害又恐其陰魂於九泉之下再與紹相見乃髡其發刺其面毀其尸其妒惡如此袁尚恐寵妾家屬為害並收而殺之審配逢紀立袁尚為大司馬將軍領冀青幽並四州牧遣使報喪此時袁談已發兵離青州知父死便與郭圖辛評商議圖曰主公不在冀州審配逢紀必立顯甫為主矣當速行辛評曰審逢二人必預定機謀今若速往必遭其禍袁談曰若此當何如郭圖曰可屯兵城外觀其動靜某當親往察之談依言郭圖遂入冀州見袁尚禮畢尚問兄何不至圖曰因抱病在軍中不能相見尚曰吾受父親遺命立我為主加兄為車騎將軍目下曹軍壓境請兄為前部吾隨後便調兵接應也圖曰軍中無人商議良策願乞審正南逢元圖二人為輔尚曰吾亦欲仗此二人早晚畫策如何離得圖曰然則於二人內遣一人去何如尚不得已乃令二人拈鬮拈著者便去逢紀拈著尚即命逢紀齎印綬同郭圖赴袁談軍中紀隨圖至談軍見談無病心中不安獻上印綬談大怒欲斬逢紀郭圖密諫曰今曹軍壓境且只款留逢紀在此以安尚心待破曹之後卻來爭冀州不遲談從其言即時拔寨起行前至黎陽與曹軍相抵談遣大將汪昭出戰操遣徐晃迎敵二將戰不數合徐晃一刀斬汪昭于馬下曹軍乘勢掩殺談軍大敗談收敗軍入黎陽遣人求救于尚尚與審配計議只發兵五千餘人相助曹操探知救軍已到遣樂進李典引兵於半路接著兩頭圍住盡殺之袁談知尚止撥兵五千又被半路坑殺大怒乃喚逢紀責罵紀曰容某作書致主公求其親自來救談即令紀作書遣人到冀州致袁尚尚與審配共議配曰郭圖多謀前次不爭而去者為曹軍在境也今若破曹必來爭冀州矣不如不發救兵借操之力以除之尚從其言不肯發兵使者回報談大怒立斬逢紀議欲降曹早有細作密報袁尚尚與審配議曰使談降曹並力來攻則冀州危矣乃留審配並大將蘇由固守冀州自領大軍來黎陽救談尚問軍中誰敢為前部大將呂曠呂翔兄弟二人願去尚點兵三萬使為先鋒先至黎陽談聞尚自來大喜遂罷降曹之議談屯兵城中尚頓兵城外為掎角之勢不一日袁熙高幹皆領軍到城外屯兵三處每日出兵與操相持尚屢敗操兵屢勝至建安八年春二月操分路攻打袁談袁熙袁尚高幹皆大敗棄黎陽而走操引兵追至冀州談與尚入城堅守熙與幹離城三十裏下寨虛張聲勢操兵連日攻打不下郭嘉進曰袁氏廢長立幼而兄弟之間權力相並各自樹黨急之則相救緩之則相爭不如舉兵南向荊州征討劉表以候袁氏兄弟之變變成而後擊之可一舉而定也操善其言命賈詡為太守守黎陽曹洪引兵守官渡操引大軍向荊州進兵談尚聽知曹軍自退遂相慶賀袁熙高幹各自辭去袁談與郭圖辛評議曰我為長子反不能承父業尚乃繼母所生反承大爵心實不甘圖曰主公可勒兵城外只做請顯甫審配飲酒伏刀斧手殺之大事定矣談從其言適別駕王修自青州來談將此計告之修曰兄弟者左右手也今與他人爭鬥斷其右手而曰我必勝安可得乎夫棄兄弟而不親天下其誰親之彼讒人離間骨肉以求一朝之利願塞耳勿聽也談怒叱退王修使人去請袁尚尚與審配商議配曰此必郭圖之計也主公若往必遭姦計不如乘勢攻之袁尚依言便披挂上馬引兵五萬出城袁談見袁尚引軍來情知事泄亦即披挂上馬與尚交鋒尚見談大罵談亦罵曰汝藥死父親篡奪爵位今又來殺兄耶二人親自交鋒袁談大敗尚親踏矢石衝突掩殺談引敗軍奔平原尚收兵還袁談與郭圖再議進兵令岑璧為將領兵前來尚自引兵出冀州兩陳對圓旗鼓相望璧出罵陳尚欲自戰大將呂曠拍馬舞刀來戰岑璧二將戰無數合曠斬岑璧于馬下談兵又敗再奔平原審配勸尚進兵追至平原談抵當不住退入平原堅守不出尚三面圍城攻打談與郭圖計議圖曰今城中糧少彼軍方鋭勢不相敵愚意可遣人投降曹操使操將兵攻冀州尚必還救將軍引兵夾擊之尚可擒矣若操擊破尚軍我因而斂其軍實以拒操操軍遠來糧食不繼必自退去我可以仍據冀州以圖進取也談從其言問曰何人可為使圖曰辛評之弟辛毗字佐治現為平原令此人乃能言之士可命為使談即召辛毗毗欣然而至談修書付毗使三千軍送毗出境毗星夜齎書往見曹操時操屯軍西平伐劉表表遣玄德引兵為前部以迎之未及交鋒辛毗到操寨見操禮畢操問其來意毗具言袁談相求之意呈上書信操看書畢留辛毗於寨中聚文武計議程昱曰袁談被袁尚攻擊太急不得已而來降不可準信呂虔滿寵亦曰丞相既引兵至此安可復舍表而助談荀攸曰三公之言未善以愚意度之天下方有事而劉表坐保江漢之間不敢展足其無四方之志可知矣袁氏據四州之地帶甲數十萬若二子和睦共守成業天下事未可知也今乘其兄弟相攻勢窮而投我我提兵先除袁尚後觀其變並滅袁談天下定矣此機會不可失也操大喜便邀辛毗飲酒謂之曰袁談之降真耶詐耶袁尚之兵果可必勝耶毗對曰明公勿問真與詐也只論其勢可耳袁氏連年喪敗兵革疲於外謀臣誅於內兄弟讒隙國分為二加之飢饉並臻天災人困無問智愚皆知土崩瓦解此乃天滅袁氏之時也今明公提兵攻鄴袁尚不還救則失巢穴若還救則談踵襲其後以明公之威擊疲憊之衆如迅風之掃秋葉也不此之圖而伐荊州荊州豐樂之地國和民順未可搖動況四方之患莫大于河北河北既平則霸業成矣願明公詳之操大喜曰恨與辛佐治相見之晚也即日督軍還取冀州玄德恐操有謀不跟追襲引兵自回荊州卻説袁尚知曹軍渡河急急引軍還鄴命呂曠呂翔斷後袁談見尚退軍乃大起平原軍馬隨後趕來行不到數十裏一聲炮響兩軍齊出左邊呂曠右邊呂翔兄弟二人截住袁談談勒馬告二將曰吾父在日吾並未慢待二將軍今何從吾弟而見逼耶二將聞言乃下馬降談談曰勿降我可降曹丞相二將因隨談歸營談候操軍至引二將見操操大喜以女許談為妻即令呂曠呂翔為媒談請操攻取冀州操曰方今糧草不接搬運勞苦我由濟河遏淇水入白溝以通糧道然後進兵令談且居平原操引軍退屯黎陽封呂曠呂翔為列侯隨軍聽用郭圖謂袁談曰曹操以女許婚恐非真意今又封賞呂曠呂翔帶去軍中此乃牢籠河北之心後必終為我禍主公可刻將軍印二顆暗使人送與二呂令作內應待操破了袁尚可乘便圖之談依言遂刻將軍印二顆暗送與二呂二呂受訖徑將印來稟曹操操大笑曰談暗送印者欲汝等為內助待我破袁尚之後就中取事耳汝等且權受之我自有主張自此曹操便有殺談之心且説袁尚與審配商議今曹兵運糧入白溝必來攻冀州如之奈何配曰可發檄使武安長尹楷屯毛城通上黨運糧道令沮授之子沮鵠守邯鄲遙為聲援主公可進兵平原急攻袁談先絶袁談然後破曹袁尚大喜留審配與陳琳守冀州使馬延張顗二將為先鋒連夜起兵攻打平原談知尚兵來近告急於操操曰吾今番必得冀州矣正説間適許攸自許昌來聞尚又攻談入見操曰丞相坐守于此豈欲待天雷擊殺二袁乎操笑曰吾已料定矣遂令曹洪先進兵攻鄴操自引一軍來攻尹楷兵臨本境楷引軍來迎楷出馬操曰許仲康安在許褚應聲而出縱馬直取尹楷楷措手不及被許褚一刀斬于馬下餘衆奔潰操盡招降之即勒兵取邯鄲沮鵠進兵來迎張遼出馬與鵠交鋒戰不三合鵠大敗遼從後追趕兩馬相離不遠遼急取弓射之應弦落馬操指揮軍馬掩殺衆皆奔散於是操引大軍前抵冀州曹洪已近城下操令三軍繞城築起土山又暗掘地道以攻之審配設計堅守法令甚嚴東門守將馮禮因酒醉有誤巡警配痛責之馮禮懷恨潛地出城降操操問破城之策禮曰突門內土厚可掘地道而入操便命馮禮引三百壯土夤夜掘地道而入卻説審配自馮禮出降之後每夜親自登城點視軍馬當夜在突門閣上望見城外無燈火配曰馮禮必引兵從地道而入也急喚精兵運石擊突閘門門閉馮禮及三百壯士皆死於土內操折了這一場遂罷地道之計退軍于洹水之上以候袁尚回兵袁尚攻平原聞曹操已破尹楷沮鵠大軍圍困冀州乃掣兵回救部將馬延曰從大路去曹操必有伏兵可取小路從西山出滏水口去劫曹營必解圍也尚從其言自領大軍先行令馬延與張顗斷後早有細作去報曹操操曰彼若從大路上來吾當避之若從西山小路而來一戰可擒也吾料袁尚必舉火為號令城中接應吾可分兵擊之於是分撥已定卻説袁尚出滏水界口東至陽平屯軍陽平亭離冀州十七裏一邊靠著滏水尚令軍士堆積柴薪乾草至夜焚燒為號遣主簿李孚扮作曹軍都督直至城下大叫開門審配認得是李孚聲音放入城中説袁尚已陳兵在陽平亭等候接應若城中兵出亦舉火為號配教城中堆草放火以通音信孚曰城中無糧可發老弱殘兵並婦人出降彼必不為備我即以兵繼百姓之後出攻之配從其論次日城上豎起白旗上寫冀州百姓投降操曰此是城中無糧教老弱百姓出降後必有兵出也操教張遼徐晃各引三千軍馬伏於兩邊操自乘馬張麾蓋至城下果見城門開處百姓扶老攜幼手持白旗而出百姓才出盡城中兵突出操教將紅旗一招張遼徐晃兩路兵齊出亂殺城中兵只得復回操自飛馬趕來到吊橋邊城中弩箭如雨射中操盔險透其頂衆將急救回陳操更衣換馬引衆將來攻尚寨尚自迎敵時各路軍馬一齊殺至兩軍混戰袁尚大敗尚引敗兵退往西山下寨令人催取馬延張顗軍來不知曹操已使呂曠呂翔去招安二將二將隨二呂來降操亦封為列侯即日進兵攻打西山先使二呂馬延張顗截斷袁尚糧道尚情知西山守不住夜走濫口安營未定四下火光並起伏兵齊出人不及甲馬不及鞍尚軍大潰退走五十裏勢窮力極只得遣豫州刺史陰夔至操營請降操佯許之卻連夜使張遼徐晃去劫寨尚盡棄印綬節鉞衣甲輜重望中山而逃操回軍攻冀州許攸獻計曰何不決漳河之水以淹之操然其計先差軍於城外掘壕塹周圍四十裏審配在城上見操軍在城外掘塹卻掘得甚淺配暗笑曰此欲決漳河之水以灌城耳壕深可灌如此之淺有何用哉遂不為備當夜曹操添十倍軍士並力發掘比及天明廣深二丈引漳水灌之城中水深數尺更兼糧絶軍士皆餓死辛毗在城外用槍挑袁尚印綬衣服招安城內之人審配大怒將辛毗家屬老小八十余口就於城上斬之將頭擲下辛毗號哭不已審配之侄審榮素與辛毗相厚見辛毗家屬被害心中懷忿乃密寫獻門之書拴於箭上射下城來軍士拾獻辛毗毗將書獻操操先下令如入冀州休得殺害袁氏一門老小軍民降者免死次日天明審榮大開西門放曹兵入辛毗躍馬先入軍將隨後殺入冀州發配在東南城樓上見操軍已入城中引數騎下城死戰正迎徐晃交馬徐晃生擒審配綁出城來路逢辛毗毗咬牙切齒以鞭鞭配首曰賊殺才今日死矣配大罵辛毗賊徒引曹操破我冀州我恨不殺汝也徐晃解配見操操曰汝知獻門接我者乎配曰不知操曰此汝侄審榮所獻也配怒曰小兒不行乃至於此操曰昨孤至城下何城中弩箭之多耶配曰恨少恨少操曰卿忠於袁氏不容不如此今肯降吾否配曰不降不降辛毗哭拜於地曰家屬八十余口盡遭此賊殺害願丞相戮之以雪此恨配曰吾生為袁氏臣死為袁氏鬼不似汝輩讒諂阿諛之賊可速斬我操教牽出臨受刑叱行刑者曰吾主在北不可使我面南而死乃向北跪引頸就刃後人有詩歎曰河北多名士誰如審正南命因昏主喪心與古人參忠直言無隱廉能志不貪臨亡猶北面降者盡羞慚審配既死操憐其忠義命葬於城北衆將請曹操入城操方欲起行只見刀斧手擁一人至操視之乃陳琳也操謂之曰汝前為本初作檄但罪狀孤可也何乃辱及祖父耶琳答曰箭在弦上不得不發耳左右勸操殺之操憐其才乃赦之命為從事卻説操長子曹丕字子桓時年十八歲丕初生時有雲氣一片其色青紫圓如車蓋覆於其室終日不散有望氣者密謂操曰此天子氣也令嗣貴不可言丕八歲能屬文有逸才博古通今善騎射好擊劍時操破冀州丕隨父在軍中先領隨身軍徑投袁紹家下馬拔劍而入有一將當之曰丞相有命諸人不許入紹府丕叱退提劍入後堂見兩個婦人相抱而哭丕向前欲殺之正是四世公侯已成夢一家骨肉又遭殃未知性命如何且聽下文分解
