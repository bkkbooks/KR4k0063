body:
  text: 第三十三回曹丕乘亂納甄氏郭嘉遺計定遼東卻説曹丕見二婦人啼哭拔劍欲斬之忽見紅光滿目遂按劍而問曰汝何人也一婦人告曰妾乃袁將軍之妻劉氏也丕曰此女何人劉氏曰此次男袁熙之妻甄氏也因熙出鎮幽州甄氏不肯遠行故留於此丕拖此女近前見披發垢面丕以衫袖拭其面而觀之見甄氏玉肌花貌有傾國之色遂對劉氏曰吾乃曹丞相之子也願保汝家汝勿憂慮遂按劍坐於堂上卻説曹操統領衆將入冀州城將入城門許攸縱馬近前以鞭指城門而呼操曰阿瞞汝不得我安得入此門操大笑衆將聞言俱懷不平操至紹府門下問曰誰曾入此門來守將對曰世子在內操喚出責之劉氏出拜曰非世子不能保全妾家願獻甄氏為世子執箕帚操教喚出甄氏拜於前操視之曰真吾兒婦也遂令曹丕納之操既定冀州親往袁氏墓下設祭再拜而哭甚哀顧謂衆官曰昔日吾與本初共起兵時本初問吾曰若事不輯方面何所可據吾問之曰足下意欲若何本初曰吾南據河北阻燕代兼沙漠之衆南向以爭天下庶可以濟乎吾答曰吾任天下之智力以道禦之無所不可此言如昨而今本初已喪吾不能不為流涕也衆皆歎息操以金帛糧米賜紹妻劉氏乃下令曰河北居民遭兵革之難盡免今年租賦一面寫表申朝操自領冀州牧一日許褚走馬入東門正迎許攸攸喚褚曰汝等無我安能出入此門乎褚怒曰吾等千生萬死身冒血戰奪得城池汝安敢誇口攸罵曰汝等皆匹夫耳何足道哉褚大怒拔劍殺攸提頭來見曹操説許攸如此無禮某殺之矣操曰子遠與吾舊交故相戲耳何故殺之深責許褚令厚葬許攸乃令人遍訪冀州賢士冀民曰騎都尉崔琰字季圭清河東武城人也數曾獻計于袁紹紹不從因此托疾在家操即召琰為本州別駕從事因謂曰昨按本州戶籍共計三十萬衆可謂大州琰曰今天下分崩九州幅裂二袁兄弟相爭冀民暴骨原野丞相不急存問風俗救其塗炭而先計校戶籍豈本州士女所望於明公哉操聞言改容謝之待為上賓操已定冀州使人探袁談消息時談引兵劫掠甘陵安平渤海河間等處聞袁尚敗走中山乃統軍攻之尚無心戰鬥徑奔幽州投袁熙談盡降其衆欲復圖冀州操使人召之談不至操大怒馳書絶其婚自統大軍征之直抵平原談聞操自統軍來遣人求救于劉表表請玄德商議玄德曰今操已破冀州兵勢正盛袁氏兄弟不久必為操擒救之無益況操常有窺荊襄之意我只養兵自守未可妄動表曰然則何以謝之玄德曰可作書與袁氏兄弟以和解為名婉詞謝之表然其言先遣人以書遺談書略曰君子違難不適仇國日前聞君屈膝降曹則是忘先人之仇棄手足之誼而遺同盟之恥矣若冀州不弟當降心相從待事定之後使天下平其曲直不亦高義耶又與袁尚書曰青州天性峭急迷于曲直君當先除曹操以卒先公之恨事定之後乃計曲直不亦善乎若迷而不返則是韓盧東郭自困於前而遺田父之獲也談得表書知表無發兵之意又自料不能敵操遂棄平原走保南皮曹操追至南皮時天氣寒肅河道盡凍糧船不能行動操令本處百姓敲冰拽船百姓聞令而逃操大怒欲捕斬之百姓聞得乃親往營中投首操曰若不殺汝等則吾號令不行若殺汝等吾又不忍汝等快往山中藏避休被我軍士擒獲百姓皆垂淚而去袁談引兵出城與曹軍相敵兩陳對圓操出馬以鞭指談而罵曰吾厚待汝汝何生異心談曰汝犯吾境界奪吾城池賴吾妻子反説我有異心耶操大怒使徐晃出馬談使彭安接戰兩馬相交不數合晃斬彭安于馬下談軍敗走退入南皮操遣軍四面圍住談著慌使辛評見操約降操曰袁談小子反覆無常吾難準信汝弟辛毗吾已重用汝亦留此可也評曰丞相差矣某聞主貴臣榮主憂臣辱某久事袁氏豈可背之操知其不可留乃遣回評回見談言操不準投降談叱曰汝弟現事曹操汝懷二心耶評聞言氣滿填胸昏絶於地談令扶出須臾而死談亦悔之郭圖謂談曰來日盡驅百姓當先以軍繼其後與曹操決一死戰談從其言當夜盡驅南皮百姓皆執刀槍聽令次日平明大開四門軍在後驅百姓在前喊聲大舉一齊擁出直抵曹寨兩軍混戰自辰至午勝負未分殺人遍地操見未獲全勝棄馬上山親自擊鼓將士見之奮力向前談軍大敗百姓被殺者無數曹洪奮威突陳正迎袁談舉刀亂砍談竟被曹洪殺於陳中郭圖見陳大亂急馳入城中樂進望見拈弓搭箭射下城壕人馬俱陷操引兵入南皮安撫百姓忽有一彪軍來到乃袁熙部將焦觸張南也操自引軍迎之二將倒戈卸甲特來投降操封為列侯又黑山賊張燕引軍十萬來降操封為平北將軍下令將袁談首級號令敢有哭者斬頭挂北門外一人布冠衰衣哭於頭下左右拿來見操操問之乃青州別駕王修也因諫袁談被逐今知談死故來哭之操曰汝知吾令否修曰知之操曰汝不怕死耶修曰我生受其辟命亡而不哭非義也畏死忘義何以立世乎若得收葬談尸受戮無恨操曰河北義士何其如此之多也可惜袁氏不能用若能用則吾安敢正眼覷此地哉遂命收葬談尸禮修為上賓以為司金中郎將因問之曰今袁尚已投袁熙取之當用何策修不答操曰忠臣也問郭嘉嘉曰可使袁氏降將焦觸張南等自攻之操用其言隨差焦觸張南呂曠呂翔馬延張顗各引本部兵分三路進攻幽州一面使李典樂進會合張燕打並州攻高幹且説袁尚袁熙知曹兵將至料難迎敵乃棄城引兵星夜奔遼西投烏桓去了幽州刺史烏桓觸聚幽州衆官歃血為盟共議背袁向曹之事烏桓觸先言曰吾知曹丞相當世英雄今往投降有不遵令者斬依次歃血循至別駕韓珩珩乃擲劍于地大呼曰吾受袁公父子厚恩今主敗亡智不能救勇不能死於義缺矣若北面而降操吾不為也衆皆失色烏桓觸曰夫興大事當立大義事之濟否不待一人韓珩既有志如此聽其自便推珩而出烏桓觸乃出城迎接三路軍馬徑來降操操大喜加為鎮北將軍忽探馬來報樂進李典張燕攻打並州高幹守住壺關口不能下操自勒兵前往三將接著説幹拒關難擊操集衆將共議破幹之計荀攸曰若破幹須用詐降計方可操然之喚降將呂曠呂翔附耳低言如此如此呂曠等引軍數十直抵關下叫曰吾等原系袁氏舊將不得已而降曹曹操為人詭譎薄待吾等吾今還扶舊主可疾開關相納高幹未信只教二將自上關説話二將卸甲棄馬而入謂幹曰曹軍新到可乘其軍心未定今夜劫寨某等願當先幹喜從其言是夜教二呂當先引萬餘軍前去將至曹寨背後喊聲大震伏兵四起高幹知是中計急回壺關城樂進李典已奪了關高幹奪路走脫往投單于操領兵拒住關口使人追襲高幹幹到單于界正迎北番左賢王幹下馬拜伏於地言曹操吞併疆土今欲犯王子地面萬乞救援同力克復以保北方左賢王曰吾與曹操無仇豈有侵我土地汝欲使我結怨于曹氏耶叱退高幹幹尋思無路只得去投劉表行至上洛被都尉王琰所殺將頭解送曹操曹封琰為列侯並州既定操商議西擊烏桓曹洪等曰袁熙袁尚兵敗將亡勢窮力盡遠投沙漠我今引兵西擊倘劉備劉表乘虛襲許都我救應不及為禍不淺矣請回師勿進為上郭嘉曰諸公所言錯矣主公雖威震天下沙漠之人恃其邊遠必不設備乘其無備卒然擊之必可破也且袁紹與烏桓有恩而尚與熙兄弟猶存不可不除劉表坐談之客耳自知才不足以禦劉備重任之則恐不能制輕任之則備不為用雖虛國遠征公無憂也操曰奉孝之言極是遂率大小三軍車數千輛望前進發但見黃沙漠漠狂風四起道路崎嶇人馬難行操有回軍之心問于郭嘉嘉此時不伏水土臥病車上操泣曰因我欲平沙漠使公遠涉艱辛以至染病吾心何安嘉曰某感丞相大恩雖死不能報萬一操曰吾見北地崎嶇意欲回軍若何嘉曰兵貴神速今千里襲人輜重多而難以趨利不如輕兵兼道以出掩其不備但須得識徑路者為引導耳遂留郭嘉于易州養病求何導官以引路人薦袁紹舊將田疇深知此境操召而問之疇曰此道秋夏間有水淺不通車馬深不載舟楫最難行動不如回軍從盧龍口越白檀之險出空虛之地前近柳城掩其不備踏頓可一戰而擒也操從其言封田疇為靖北將軍作向導官為前驅張遼為次操自押後倍道輕騎而進田疇引張遼前至白狼山正遇袁熙袁尚會合踏頓等數萬騎前來張遼飛報曹操操自勒馬登高望之見踏頓兵無隊伍參差不整操謂張遼曰敵兵不整便可擊之乃以麾授遼遼引許褚于禁徐晃分四路下山奮力急攻踏頓大亂遼拍馬斬踏頓于馬下餘將皆降袁熙袁尚引數千騎投遼東去了操收軍入柳城封田疇為柳亭侯以守柳城疇涕泣曰某負義逃竄之人耳蒙厚恩全活為幸多矣豈可賣盧龍之寨以邀賞祿哉死不敢受侯爵操義之乃拜疇為議郎操撫尉單于人等收得駿馬萬匹即日回兵時天氣寒且旱二百里無水軍又乏糧殺馬為食鑿地三四十丈方得水操回至易州重賞先曾諫者因謂衆將曰孤前者乘危遠征僥幸成功雖得勝天所佑也不可以為法諸君之諫乃萬安之計是以相賞後勿難言操到易州時郭嘉已死數日停柩在公廨操往祭之大哭曰奉孝死乃天喪吾也回顧衆官曰諸君年齒皆孤等輩惟奉孝最少吾欲托以後事不期中年夭折使吾心腸崩裂矣嘉之左右將嘉臨死所封之書呈上曰郭公臨亡親筆書此囑曰丞相若從書中所言遼東事定矣操拆書視之點頭嗟歎諸人皆不知其意次日夏侯惇引衆人稟曰遼東太守公孫康久不賓服今袁熙袁尚又往投之必為後患不如乘其未動速往征之遼東可得也操笑曰不煩諸公虎威數日之後公孫康自送二袁之首至矣諸將皆不肯信卻説袁熙袁尚引數千騎奔遼東遼東太守公孫康本襄平人武威將軍公孫度之子也當日知袁熙袁尚來投遂聚本部屬官商議此事公孫恭曰袁紹在日常有吞遼東之心今袁熙袁尚兵敗將亡無處依棲來此相投是鳩奪鵲巢之意也若容納之後必相圖不如賺入城中殺之獻頭與曹公曹公必重待我康曰只怕曹操引兵下遼東又不如納二袁使為我助恭曰可使人探聽如曹兵來攻則留二袁如其不動則殺二袁送與曹公康從之使人去探消息卻説袁熙袁尚至遼東二人密議曰遼東軍兵數萬足可與曹操爭衡今暫投之後當殺公孫康而奪其地養成氣力而抗中原可復河北也商議已定乃入見公孫康康留於館驛只推有病不即相見不一日細作回報曹公兵屯易州並無下遼東之意公孫康大喜乃先伏刀斧手於壁衣中使二袁入相見禮畢命坐時天氣嚴寒尚見床榻上無床褥謂康曰願鋪坐席康瞋目言曰汝二人之頭將行萬里何席之有尚大驚康叱曰左右何不下手刀斧手擁出就坐席上砍下二人之頭用木匣盛貯使人送到易州來見曹操時操在易州按兵不動夏侯惇張遼入稟曰如不下遼東可回許都恐劉表生心操曰待二袁首級至即便回兵衆皆暗笑忽報遼東公孫康遣人送袁熙袁尚首級至衆皆大驚使者呈上書信操大笑曰不出奉孝之料重賞來使封公孫康為襄平侯左將軍衆官問曰何為不出奉孝之所料操遂出郭嘉書以示之書略曰今聞袁熙袁尚往投遼東明公切不可加兵公孫康久畏袁氏吞併二袁往投必疑若以兵擊之必並力迎敵急不可下若緩之公孫康袁氏必自相圖其勢然也衆皆踴躍稱善操引衆官復設祭于郭嘉靈前亡年三十八歲從征十有一年多立奇勳後人有詩贊曰天生郭奉孝豪傑冠群英腹內藏經史胸中隱甲兵運謀如範蠡決策似陳平可惜身先喪中原梁棟傾操領兵還冀州使人先扶郭嘉靈樞于許都安葬程昱等請曰北方既定今還許都可早建下江南之策操笑曰吾有此志久矣諸君所言正合吾意是夜宿于冀州城東角樓上憑欄仰觀天文時荀攸在側操指曰南方旺氣燦然恐未可圖也攸曰以丞相天威何所不服正看間忽見一道金光從地而起攸曰此必有寶於地下操下樓令人隨光掘之正是星文方向南中指金寶旋從北地生不知所得何物且聽下文分解
