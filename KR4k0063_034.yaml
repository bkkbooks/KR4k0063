body:
  text: 第三十四回蔡夫人隔屏聽密語劉皇叔躍馬過檀溪卻説曹操于金光處掘出一銅雀問荀攸曰此何兆也攸曰昔舜母夢玉雀入懷而生舜今得銅雀亦吉祥之兆也操大喜遂命作高臺以慶之乃即日破土斷木燒瓦磨磚築銅雀台於漳河之上約計一年而工畢少子曹植進曰若建層台必立三座中間高者名為銅雀左邊一座名為玉龍右邊一座名為金鳳更作兩條飛橋橫空而上乃為壯觀操曰吾兒所言甚善他日台成足可娛吾老矣原來曹操有五子惟植性敏慧善文章曹操平日最愛之於是留曹植與曹丕在鄴郡造台使張燕守北寨操將所得袁紹之兵共五六十萬班師回許都大封功臣又表贈郭嘉為貞侯養其子奕於府中復聚衆謀士商議欲南征劉表荀彧曰大軍方北征而回未可復動且待半年養精蓄鋭劉表孫權可一鼓而下也操從之遂分兵屯田以候調用卻説玄德自到荊州劉表待之甚厚一日正相聚飲酒忽報降將張武陳孫在江夏虜掠人民共謀造反表驚曰二賊又反為禍不小玄德曰不須兄長憂慮備請往討之表大喜即點三萬軍與玄德前去玄德領命即行不一日來到江夏張武陳孫引兵來迎玄德與關張趙雲出馬在門旗下望見張武所騎之馬極其雄駿玄德曰此必千里馬也言未畢趙雲挺槍而出徑沖彼陳張武縱馬來迎不三合被趙雲一槍刺落下馬隨手扯住轡頭牽馬回陳陳孫見了隨趕來奪張飛大喝一聲挺矛直出將陳孫刺死衆皆潰散玄德招安餘黨平復江夏諸縣班師而回表出郭迎接入城設宴慶功酒到半酣表曰吾弟如此雄才荊州有倚賴也但憂南越不時來寇張魯孫權皆足為慮玄德曰弟有三將足可委用使張飛巡南越之境雲長拒固子城以鎮張魯趙雲拒三江以當孫權何足慮哉表喜欲從其言蔡瑁告其姊蔡夫人曰劉備遣三將居外而自居荊州久必為患蔡夫人乃夜對劉表曰我聞荊州人多與劉備往來不可不防之今容其居住城中無益不若遣使他往表曰玄德仁人也蔡氏曰只恐他人不似汝心表沈吟不答次日出城見玄德所乘之馬極駿問之知是張武之馬表稱讚不已玄德遂將此馬送與劉表表大喜騎回城中蒯越見而問之表曰此玄德所送也越曰昔先兄蒯良最善相馬越亦頗曉此馬眼下有淚槽額邊生白點名為的盧騎則妨主張武為此馬而亡主公不可乘之表聽其言次日請玄德飲宴因言曰昨承惠良馬深感厚意但賢弟不時征進可以用之敬當送還玄德起謝表又曰賢弟久居此間恐廢武事襄陽屬邑新野縣頗有錢糧弟可引本部軍馬於本縣屯扎何如玄德領諾次日謝別劉表引本部軍馬徑往新野方出城門只見一人在馬前長揖曰公所騎馬不可乘也玄德視之乃荊州幕賓伊籍字機伯山陽人也玄德忙下馬問之籍曰昨聞蒯異度對劉荊州雲此馬名的盧乘則妨主因此還公公豈可復乘之玄德曰深感先生見愛但凡人死生有命豈馬所能妨哉籍服其高見自此常與玄德往來玄德自到新野軍民皆喜政治一新建安十二年春甘夫人生劉禪是夜有白鶴一隻飛來縣衙屋上高鳴四十餘聲望西飛去臨分娩時異香滿室甘夫人嘗夜夢仰吞北斗因而懷孕故乳名阿斗此時曹操正統兵北征玄德乃往荊州説劉表曰今曹操悉兵北征許昌空虛若以荊襄之衆乘間襲之大事可就也表曰吾坐據九州足矣豈可別圖玄德默然表邀入後堂飲酒酒至半酣表忽然長歎玄德曰兄長何故發歎表曰吾有心事未易明言玄德再欲問時蔡夫人出立屏後劉表乃垂頭不語須臾席散玄德自歸新野至是年冬聞曹操自柳城回玄德甚歎表之不用其言忽一日劉表遣使至請玄德赴荊州相會玄德隨使而往劉表接著敘禮畢請入後堂飲宴因謂玄德曰近聞曹操提兵回許都勢日強盛必有吞併荊襄之心昔日悔不聽賢弟之言失此好機會玄德曰今天下分裂干戈日起機會豈有盡乎若能應之於後未足為恨也表曰吾弟之言甚當相與對飲酒酣表忽潸然淚下玄德問其故表曰吾有心事前者欲訴與賢弟未得其便玄德曰兄長有何難決之事倘有用弟之處弟雖死不辭表曰前妻陳氏所生長子琦為人雖賢而柔懦不足立事後妻蔡氏所生少子琮頗聰明吾欲廢長立幼恐礙于禮法欲立長子爭奈蔡氏族中皆掌軍務後必生亂因此委決不下玄德曰自古廢長立幼取亂之道若憂蔡氏權重可徐徐削之不可溺愛而立少子也表默然原來蔡夫人素疑玄德凡遇玄德與表敘論必來竊聽是時正在屏風後聞玄德此言心甚恨之玄德自知語失遂起身如廁因見己身髀肉復生亦不覺潸然流涕少頃復入席表見玄德有淚容怪問之玄德長歎曰備往常身不離鞍髀肉皆散今久不騎髀裏肉生日月蹉蛇老將至矣而功業不建是以悲耳表曰吾聞賢弟在許昌與曹操青梅煮酒共論英雄賢弟盡舉當世名士操皆不許而獨曰天下英雄惟使君與操耳以曹操之權力猶不敢居吾弟之先何慮功業不建乎玄德乘著酒興失口答曰備若有基本天下碌碌之輩誠不足慮也表聞言默然玄德自知語失托醉而起歸館舍安歇後人有詩贊玄德曰曹公屈指從頭數天下英雄獨使君髀肉復生猶感歎爭教寰宇不三分卻説劉表聞玄德語口雖不言心懷不足別了玄德退入內宅蔡夫人曰適間我於屏後聽得劉備之言甚輕覷人足見其有吞併荊州之意今若不除必為後患表不答但搖頭而已蔡氏乃密召蔡瑁入商議此事瑁曰請先就館舍殺之然後告知主公蔡氏然其言瑁出便連夜點軍卻説玄德在館舍中秉燭而坐三更以後方欲就寢忽一人叩門而入視之乃伊籍也原來伊籍探知蔡瑁欲害玄德特夤夜來報當下伊籍將蔡瑁之謀報知玄德催促玄德速速起身玄德曰未辭景升如何便去籍曰公若辭必遭蔡瑁之害矣玄德乃謝別伊籍急喚從者一齊上馬不待天明星夜奔回新野比及蔡瑁領軍到館舍時玄德已去遠矣瑁悔恨無及乃寫詩一首於壁間徑入見表曰劉備有反叛之意題反詩於壁上不辭而去矣表不信親詣館舍觀之果有詩四句詩曰數年徒守困空對舊山川龍豈池中物乘雷欲上天劉表見詩大怒拔劍言曰誓殺此無義之徒行數步猛省曰吾與玄德相處許多時不曾見他作詩此必外人離間之計也遂回步入館舍用劍尖削去此詩棄劍上馬蔡瑁請曰軍士已點齊可就往新野擒劉備表曰未可造次容徐圖之蔡瑁見表持疑不決乃暗與蔡夫人商議即日大會衆官於襄陽就彼處謀之次日瑁稟表曰近年豐熟合聚衆官於襄陽以示撫勸之意請主公一行表曰吾近日氣疾作實不能行可令二子為主待客瑁曰公子年幼恐失於禮節表曰可往新野請玄德待客瑁暗喜正中其計便差人請玄德赴襄陽卻説玄德奔回新野自知失言取禍未對衆人言之忽使者至請赴襄陽孫乾曰昨見主公匆匆而回意甚不樂愚意度之在荊州必有事故今忽請赴會不可輕往玄德方將前項事訴與諸人雲長曰兄長自疑心語失劉荊州並無嗔責之意外人之言未可輕信襄陽離此不遠若不去則荊州反生疑矣玄德曰雲長之言是也張飛曰筵無好筵會無好會不如休去趙雲曰某將馬步軍三百人同往可保主公無事玄德曰如此甚好遂與趙雲即日赴襄陽蔡瑁出郭迎接意甚謙謹隨後劉琦劉琮二子引一班文武官僚出迎玄德見二公子俱在並不疑忌是日請玄德於館舍暫歇趙雲引三百軍圍繞保護雲披甲挂劍行坐不離左右劉琦告玄德曰父親氣疾作不能行動特請叔父待客撫勸各處守牧之官玄德曰吾本不敢當此既有兄命不敢不從次日人報九郡四十二州官員俱已到齊蔡瑁預請蒯越計議曰劉備世之梟雄久留于此後必為害可就今日除之越曰恐失士民之望瑁曰吾已密領劉荊州言語在此越曰既如此可預作準備瑁曰東門峴山大路已使吾弟蔡和引軍守把南門外已使蔡中守把北門外已使蔡勳守把止有西門不必守把前有檀溪阻隔雖有數萬之衆不易過也越曰吾見趙雲行坐不離玄德恐難下手瑁曰吾伏五百軍在城內準備越曰可使文聘王威二人另設一席於外廳以待武將先請住趙雲然後可行事瑁從其言當日殺牛宰馬大張筵席玄德乘的盧馬至州衙命牽入後園拴系衆官皆至堂中玄德主席二公子兩邊分坐其餘各依次而坐趙雲帶劍立于玄德之側文聘王威入請趙雲赴席雲推辭不去玄德令雲就席雲勉強應命而出蔡瑁在外收拾得鐵桶相似將玄德帶來三百軍都遣歸館舍只待半酣號起下手酒至三巡伊籍起把盞至玄德前以目視玄德低聲謂曰請更衣玄德會意即起如廁伊籍把盞畢疾入後園接著玄德附耳報曰蔡瑁設計害君城外東南北三處皆有軍馬守把惟西門可走公宜速逃玄德大驚急解的盧馬開後園門牽出飛身上馬不顧從者匹馬望西門而走門吏問之玄德不答加鞭而出門吏當之不住飛報蔡瑁瑁即上馬引五百軍隨後追趕卻説玄德撞出西門行無數裏前有大溪攔住去路那檀溪闊數丈水通湘江其波甚緊玄德到溪邊見不可渡勒馬再回遙望城西塵頭大起追兵將至玄德曰今番死矣遂回馬到溪邊回看之時追兵已近玄德著慌縱馬下溪行不數步馬前蹄忽陷浸濕衣袍玄德乃加鞭大呼曰的盧的盧今日妨吾言畢那馬忽從水中湧身而起一躍三丈飛上西岸玄德如從雲霧中起後來蘇學士有古風一篇單詠躍馬檀溪事詩曰老去花殘春日暮宦遊偶至檀溪路停驂遙望獨徘徊眼前零落飄紅絮暗想咸陽火德衰龍爭虎鬥交相持襄陽會上王孫飲坐中玄德身將危逃生獨出西門道背後追兵復將到一川煙水漲檀溪急叱征騎往前跳馬蹄踏碎青玻璃天風響處金鞭揮耳畔但聞千騎走波中忽見雙龍飛西川獨霸真英主坐下龍駒兩相遇檀溪溪水自東流龍駒英主今何處臨流三歎心欲酸斜陽寂寂照空山三分鼎足渾如夢蹤迹空留在世間玄德躍過溪西顧望東岸蔡瑁已引軍趕到溪邊大叫使君何故逃席而去玄德曰吾與汝無仇何故欲相害瑁曰吾並無此心使君休聽人言玄德見瑁手將拈弓取箭乃急撥馬望西南而去瑁謂左右曰是何神助也方欲收軍回城只見西門內趙雲引三百軍趕來正是躍去龍駒能救主追來虎將欲誅仇未知蔡瑁性命如何且聽下文分解
