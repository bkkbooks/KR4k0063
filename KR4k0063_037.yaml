body:
  text: 第三十七回司馬徽再薦名士劉玄德三顧草廬卻説徐庶趲程赴許昌曹操知徐庶已到遂命荀彧程昱等一班謀士往迎之庶入相府拜見曹操操曰公乃高明之士何故屈身而事劉備乎庶曰某幼逃難流落江湖偶至新野遂與玄德交厚老母在此幸蒙慈念不勝愧感操曰公今至此正可晨昏侍奉令堂吾亦得聽清誨矣庶拜謝而出急往見其母泣拜於堂下母大驚曰汝何故至此庶曰近于新野事劉豫州因得母書故星夜至此徐母勃然大怒拍案罵曰辱子飄蕩江湖數年吾以為汝學業有進何其反不如初也汝既讀書須知忠孝不能兩全豈不識曹操欺君罔上之賊劉玄德仁義布于四海況又漢室之胄汝既事之得其主矣今憑一紙偽書更不詳察遂棄明投暗自取惡名真愚夫也吾有何面目與汝相見汝玷辱祖宗空生於天地間耳罵得徐庶拜伏於地不敢仰視母自轉入屏風後去了少頃家人出報曰老夫人自縊于梁間徐庶慌入救時母氣已絶後人有徐母贊曰賢哉徐母流芳千古守節無虧於家有補教子多方處身自苦氣若丘山義出肺腑讚美豫州毀觸魏武不畏鼎鑊不懼刀斧唯恐後嗣玷辱先祖伏劍同流斷機堪伍生得其名死得其所賢哉徐母流芳千古徐庶見母已死哭絶於地良久方蘇曹操使人齎禮吊問又親往祭奠徐庶葬母樞于許昌之南原居喪守墓凡曹操有所賜庶俱不受時操欲商議南征荀彧諫曰天寒未可用兵姑待春暖方可長驅大進操從之乃引漳河之水作一池名玄武池于南教練水軍準備南征卻説玄德正安排禮物欲往隆中謁諸葛亮忽人報門外有一先生峨冠博帶道貌非常特來相探玄德曰此莫非即孔明否遂整衣出迎視之乃司馬徽也玄德大喜請入後堂高坐拜問曰備自別仙顔日因軍務倥傯有失拜訪今得光降大慰仰慕之私徽曰聞徐元直在此特來一會玄德曰近因曹操囚其母徐母遣人馳書喚回許昌去矣徽曰此中曹操之計矣吾素聞徐母最賢雖為操所囚必不肯馳書召其子此書必詐也元直不去其母尚存今若去母必死矣玄德驚問其故徽曰徐母高義必羞見其子也玄德曰元直臨行薦南陽諸葛亮其人若何徽笑曰元直欲去自去便了何又惹他出來嘔心血也玄德曰先生何出此言徽曰孔明與博陵崔州平潁川石廣元汝南孟公威與徐元直四人為密友此四人務於精純惟孔明獨觀其大略嘗抱膝長吟而指四人曰公等仕進可至刺史郡守衆問孔明之志若何孔明但笑而不答每常自比管仲樂毅其才不可量也玄德曰何潁川之多賢乎徽曰昔有殷馗善觀天文嘗謂群星聚於潁分其地必多賢士時雲長在側曰某聞管仲樂毅乃春秋戰國名人功蓋寰宇孔明自比此二人毋乃太過徽笑曰以吾觀之不當比此二人我欲另以二人比之雲長問那二人徽曰可比興周八百年之薑子牙旺漢四百年之張子房也衆皆愕然徽下階相辭欲行玄德留之不住徽出門仰天大笑曰臥龍雖得其主不得其時惜哉言罷飄然而去玄德歎曰真隱居賢士也次日玄德同關張並從人等來隆中遙望山畔數人荷鋤耕於田間而作歌曰蒼天如圓蓋陸地似棋局世人黑白分往來爭榮辱榮者自安安辱者定碌碌南陽有隱居高眠臥不足玄德聞歌勒馬喚農夫問曰此歌何人所作答曰乃臥龍先生所作也玄德曰臥龍先生住何處農夫曰自此山之南一帶高岡乃臥龍岡也岡前疏林內茅廬中即諸葛先生高臥之地玄德謝之策馬前行不數裏遙望臥龍岡果然清景異常後人有古風一篇單道臥龍居處詩曰襄陽城西二十裏一帶高岡枕流水高岡屈曲壓雲根流水潺潺飛石髓勢若困龍石上蟠形如單鳳松陰裏柴門半掩閉茅廬中有高人臥不起修竹交加列翠屏四時籬落野花馨床頭堆積皆黃卷座上往來無白丁叩戶蒼猿時獻果守門老鶴夜聽經囊裏名琴藏古錦壁間寶劍挂七星廬中先生獨幽雅間來親自勤耕稼專待矬雷驚夢回一聲長嘯安天下玄德來到莊前下馬親叩柴門一童出問玄德曰漢左將軍宜城亭侯領豫州牧皇叔劉備特來拜見先生童子曰我記不得許多名字玄德曰你只説劉備來訪童子曰先生今早少出玄德曰何處去了童子曰蹤迹不定不知何處去了玄德曰幾時歸童子曰歸期亦不定或三五日或十數日玄德惆悵不已張飛曰既不見自歸去罷了玄德曰且待片時雲長曰不如且歸再使人來探聽玄德從其言囑付童子如先生回可言劉備拜訪遂上馬行數裏勒馬回觀隆中景物果然山不高而秀雅水不深而澄清地不廣而平坦林不大而茂盛猿鶴相親松篁交翠觀之不已忽見一人容貌軒昂丰姿俊爽頭戴逍遙巾身穿皂布袍杖藜從山僻小路而來玄德曰此必臥龍先生也急下馬向前施禮問曰先生非臥龍否其人曰將軍是誰玄德曰劉備也其人曰吾非孔明乃孔明之友博陵崔州平也玄德曰久聞大名幸得相遇乞即席地權坐請教一言二人對坐于林間石上關張侍立於側州平曰將軍何故欲見孔明玄德曰方今天下大亂四方雲擾欲見孔明求安邦定國之策耳州平笑曰公以定亂為主雖是仁心但自古以來治亂無常自高祖斬蛇起義誅無道秦是由亂而入治也至哀平之世二百年太平日久王莽篡逆又由治而入亂光武中興重整基業復由亂而入治至今二百年民安已久故干戈又復四起此正由治入亂之時未可猝定也將軍欲使孔明斡旋天地補綴乾坤恐不易為徒費心力耳豈不聞順天者逸逆天者勞數之所在理不得而奪之命之所定人不得而強之乎玄德曰先生所言誠為高見但備身為漢胄合當匡扶漢室何敢委之數與命州平曰山野之夫不足與論天下事適承明問故妄言之玄德曰蒙先生見教但不知孔明往何處去了州平曰吾亦欲訪之正不知其何往玄德曰請先生同至敝縣若何州平曰愚性頗樂間散無意功名久矣容他日再見言訖長揖而去玄德與關張上馬而行張飛曰孔明又訪不著卻遇此腐儒間談許久玄德曰此亦隱者之言也三人回至新野過了數日玄德使人探聽孔明回報曰臥龍先生已回矣玄德便教備馬張飛曰量一村夫何必哥哥自去使人喚來便了玄德叱曰汝豈不聞孟子雲欲見賢而不以其道猶欲其入而閉之門也孔明當世大賢豈可召乎遂上馬再往訪孔明關張亦乘馬相隨時值隆冬天氣嚴寒彤雲密布行無數裏忽然朔風凜凜瑞雪霏霏山如玉簇林似銀妝張飛曰天寒地凍尚不用兵豈宜遠見無益之人乎不如回新野以避風雪玄德曰吾正欲使孔明知我殷勤之意如弟輩怕冷可先回去飛曰死且不怕豈怕冷乎但恐哥哥空勞神思玄德曰勿多言只相隨同去將近茅廬忽聞路傍酒店中有人作歌玄德立馬聽之其歌曰壯士功名尚未成鳴呼久不遇陽春君不見東海老叟辭荊榛後車遂與文王親八百諸侯不期會白魚入舟涉孟津牧野一戰血流杵鷹揚偉烈冠武臣又不見高陽酒徒起草中長揖芒碭隆準公高談王霸驚人耳輟洗延坐欽英風東下齊城七十二天下無人能繼蹤二人功迹尚如此至今誰肯論英雄歌罷又有一人擊桌而歌其歌曰吾皇提劍清寰海創業垂基四百載桓靈季業火德衰姦臣賊子調鼎鼐青蛇飛下禦座傍又見妖虹降玉堂群盜四方如蟻聚姦雄百輩皆鷹揚吾儕長嘯空拍手悶來村店飲村酒獨善其身盡日安何須千古名不朽二人歌罷撫掌大笑玄德曰臥龍其在此間乎遂下馬入店見二人憑桌對飲上首者白麵長須下首者清奇古貌玄德揖而問曰二公誰是臥龍先生長須者曰公何人欲尋臥龍何干玄德曰某乃劉備也欲訪先生求濟世安民之術長須者曰我等非臥龍皆臥龍之友也吾乃潁川石廣元此位是汝南孟公威玄德喜曰備久聞二公大名幸得邂逅今有隨行馬匹在此敢請二公同往臥龍莊上一談廣元曰吾等皆山野慵懶之徒不省治國安民之事不勞下問明公請自上馬尋訪臥龍玄德乃辭二人上馬投臥龍岡來到莊前下馬扣門問童子曰先生今日在莊否童子曰現在堂上讀書玄德大喜遂跟童子而入至中門只見門上大書一聯雲淡泊以明志寧靜而致遠玄德正看間忽聞吟詠之聲乃立於門側窺之見草堂之上一少年擁爐抱膝歌曰鳳翺翔於千仞兮非梧不棲士伏處於一方兮非主不依樂躬耕隴畝兮吾愛吾廬聊寄傲於琴書兮以待天時德待其歌罷上草堂施禮曰備久慕先生無緣拜會昨因徐元直稱薦敬至仙莊不遇空回今特冒風雪而來得瞻道貌實為萬幸那少年慌忙答禮曰將軍莫非劉豫州欲見家兄否玄德驚訝曰先生又非臥龍耶少年曰某乃臥龍之弟諸葛均也愚兄弟三人長兄諸葛瑾現在江東孫仲謀處為幕賓孔明乃二家兄玄德曰臥龍今在家否均曰昨為崔州平相約出外間遊去矣玄德曰何處間遊均曰或駕小舟遊於江湖之中或訪僧道於山嶺之上或尋朋友于村落之間或樂琴棋於洞府之內往來莫測不知去所玄德曰劉備直如此緣分淺薄兩番不遇大賢均曰少坐獻茶張飛曰那先生既不在請哥哥上馬玄德曰我既到此間如何無一語而回因問諸葛均曰聞令兄臥龍先生熟諳韜略日看兵書可得聞乎均曰不知張飛曰問他則甚風雪甚緊不如早歸玄德叱止之均曰家兄不在不敢久留車騎容日卻來回禮玄德曰豈敢望先生枉駕數日之後備當再至願借紙筆作一書留達令兄以表劉備殷勤之意均遂進文房四寶玄德呵開凍筆拂展雲箋寫書曰備久慕高名兩次晉謁不遇空回惆帳何似竊念備漢朝苗裔濫叨名爵伏睹朝廷陵替綱紀崩摧群雄亂國惡黨欺君備心膽俱裂雖有匡濟之誠實乏經綸之策仰望先生仁慈忠義慨然展呂望之大才施子房之鴻略天下幸甚社稷幸甚先此布達再容齋戒薰沐特拜尊顔面傾鄙悃統希鑒原玄德寫罷遞與諸葛均收了拜辭出門均送出玄德再三殷勤致意而別方上馬欲行忽見童子招手籬外叫曰老先生來也玄德視之見小橋之西一人暖帽遮頭狐裘蔽體騎著一驢後隨一青衣小童攜一葫蘆酒踏雪而來轉過小橋口吟詩一首詩曰一夜北風寒萬里彤雲厚長空雪亂飄改盡江山舊仰面觀火虛疑是玉龍鬥紛紛鱗甲飛頃刻遍宇宙騎驢過小橋獨歎梅花瘦玄德聞歌曰此真臥龍矣滾鞍下馬向前施禮曰先生冒寒不易劉備等候久矣那人慌忙下驢答禮諸葛均在後曰此非臥龍家兄乃家兄嶽父黃承彥也玄德曰適間所吟之句極其高妙承彥曰老夫在小壻家觀梁父吟記得這一篇適過小橋偶見籬落間梅花故感而誦之不期為尊客所聞玄德曰曾見令壻否承彥曰便是老夫也來看他玄德聞言辭別承彥上馬而歸正值風雪又大回望臥龍岡悒怏不已後人有詩單道玄德風雪訪孔明詩曰一天風雪訪賢良不遇空回意感傷凍合溪橋山石滑寒侵鞍馬路途長當頭片片梨花落撲面紛紛柳絮狂回首停鞭遙望處爛銀堆滿臥龍岡玄德回新野之後光陰荏苒又早新春乃令蔔者揲蓍選擇吉期齋戒三日薰灑更衣再往臥龍岡謁孔明關張聞之不悅遂一齊入諫玄德正是高賢未服英雄志屈節偏生傑士疑未知其言若何下文便曉
