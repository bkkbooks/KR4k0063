body:
  text: 第三十八回定三分隆中決策戰長江孫氏報仇卻説玄德訪孔明兩次不遇欲再往訪之關公曰兄長兩次親往拜謁其禮太過矣想諸葛亮有虛名而無實學故避而不敢見兄何惑于斯人之甚也玄德曰不然昔齊桓公欲見東郭野人五反而方得一面況吾欲見大賢耶張飛曰哥哥差矣量此村夫何足為大賢今番不須哥哥去他如不來我只用一條麻繩縛將來玄德叱曰汝豈不聞周文王謁薑子牙之事乎文王且如此敬賢汝何太無禮今番汝休去我自與雲長去飛曰既兩位哥哥都去小弟如何落後玄德曰汝若同往不可失禮飛應諾於是三人乘馬引從者往隆中離草廬半裏之外玄德便下馬步行正遇諸葛均玄德忙施禮問曰令兄在莊否均曰昨暮方歸將軍今日可與相見言罷飄然自去玄德曰今番僥幸得見先生矣張飛曰此人無禮便引我等到莊也不妨何故竟自去了玄德曰彼各有事豈可相強三人來到莊前叩門童子開門出問玄德曰有勞仙童轉報劉備專來拜見先生童子曰今日先生雖在家但今在草堂上晝寢未醒玄德曰既如此且休通報分付關張二人只在門首等著玄德徐步而入見先生仰臥于草堂幾席之上玄德拱立階下半晌先生未醒關張在外立久不見動靜入見玄德猶然侍立張飛大怒謂雲長曰這先生如何傲慢見我哥哥侍立階下他竟高臥推睡不起等我去屋後放一把火看他起不起雲長再三勸住玄德仍命二人出門外等候望堂上時見先生翻身將起忽又朝裏壁睡著童子欲報玄德曰且勿驚動又立了一個時辰孔明才醒口吟詩曰大夢誰先覺平生我自知草堂春睡足窗外日遲遲孔明吟罷翻身問童子曰有俗客來否童子曰劉皇叔在此立候多時孔明乃起身曰何不早報尚容更衣遂轉入後堂又半晌方整衣冠出迎玄德見孔明身長八尺面如冠玉頭戴綸巾身披鶴氅飄飄然有神仙之概玄德下拜曰漢室末胄涿郡愚夫久聞先生大名如雷貫耳昨兩次晉謁不得一見已書賤名於文幾未審得入覽否孔明曰南陽野人疏懶性成屢蒙將軍枉臨不勝愧赧二人敘禮畢分賓主而坐童子獻茶茶罷孔明曰昨觀書意足見將軍憂民憂國之心但恨亮年幼才疏有誤下問玄德曰司馬德操之言徐元直之語豈虛談哉望先生不棄鄙賤曲賜教誨孔明曰德操元直世之高士亮乃一耕夫耳安敢談天下事二公謬舉矣將軍奈何舍美玉而求頑石乎玄德曰大丈夫抱經世奇才豈可空老于林泉之下願先生以天下蒼生為念開備愚魯而賜教孔明笑曰願聞將軍之志玄德屏人促席而告曰漢室傾頽姦臣竊命備不量力欲伸大義於天下而智術淺短迄無所就惟先生開其愚而拯其厄實為萬幸孔明曰自董卓造逆以來天下豪傑並起曹操勢不及袁紹而竟能克紹者非惟天時抑亦人謀也今操已擁百萬之衆挾天子以令諸侯此誠不可與爭鋒孫權據有江東已曆三世國險而民附此可用為援而不可圖也荊州北據漢沔利盡南海東連吳會西通巴蜀此用武之地非其主不能守是殆天所以資將軍將軍豈有意乎益州險塞沃野千里天府之國高祖因之以成帝業今劉璋暗弱民殷國富而不知存恤智慧之士思得明君將軍既帝室之胄信義著于四海總攬英雄思賢如渴若跨有荊益保其岩阻西和諸戎南撫彜越外結孫權內修政理待天下有變則命一上將將荊州之兵以向宛洛將軍身率益州之衆以出秦川百姓有不簞食壺漿以迎將軍者乎誠如是則大業可成漢室可興矣此亮所以為將軍謀者也惟將軍圖之言罷命童子取出畫一軸挂于中堂指謂玄德曰此西川五十四州之圖也將軍欲成霸業北讓曹操占天時南讓孫權占地利將軍可占人和先取荊州為家後即取西川建基業以成鼎足之勢然後可圖中原也玄德聞言避席拱手謝曰先生之言頓開茅塞使備如撥雲霧而睹青天但荊州劉表益州劉璋皆漢室宗親備安忍奪之孔明曰亮夜觀天象劉表不久人世劉璋非立業之主久後必歸將軍玄德聞言頓首拜謝只這一席話乃孔明未出茅廬已知三分天下真萬古之人不及也後人有詩贊曰豫州當日歎孤窮何幸南陽有臥龍欲識他年分鼎處先生笑指畫圖中玄德拜請孔明曰備雖名微德薄願先生不棄鄙賤出山相助備當拱聽明誨孔明曰亮久樂耕鋤懶于應世不能奉命玄德泣曰先生不出如蒼生何言畢淚沾袍袖衣襟盡濕孔明見其意甚誠乃曰將軍既不相棄願效犬馬之勞玄德大喜遂命關張入拜獻金帛禮物孔明固辭不受玄德曰此非聘大賢之禮但表劉備寸心耳孔明方受於是玄德等在莊中共宿一宵次日諸葛均回孔明囑付曰吾受劉皇叔三顧之恩不容不出汝可躬耕於此勿得荒蕪田畝待我功成之日即當歸隱後人有詩歎曰身未升騰思退步功成應憶去時言只因先主丁寧後星落秋風五丈原又有古風一篇曰高皇手提三尺雪芒碭白蛇夜流血平秦滅楚入咸陽二百年前幾斷絶大哉光武興洛陽傳至桓靈又崩裂獻帝遷都幸許昌紛紛四海生豪傑曹操專權得天時江東孫氏開鴻業孤窮玄德走天下獨居新野愁民厄南陽臥龍有大志腹內雄兵分正奇只因徐庶臨行語茅廬三顧心相知先生爾時年三九收拾琴書離隴畝先取荊州後取川大展經綸補天手縱橫舌上鼓風雷談笑胸中換星斗龍驤虎視安乾坤萬古千秋名不朽玄德等三人別了諸葛均與孔明同歸新野玄德待孔明如師食則同桌寢則同榻終日共論天下之事孔明曰曹操于冀州作玄武池以練水軍必有侵江南之意可密令人過江探聽虛實玄德從之使人往江東探聽卻説孫權自孫策死後據住江東承父兄基業廣納賢士開賓館于吳會命顧雍張紘延接四方賓客連年以來你我相薦時有會稽闞澤字德潤彭城嚴畯字曼才沛縣薛綜字敬文汝陽程秉字德樞吳郡朱桓字休穆陸績字公紀吳人張溫字惠恕烏傷駱統字公緒烏程吾粲字孔休此數人皆至江東孫權敬禮甚厚又得良將數人乃汝南呂蒙字子明吳郡陸遜字伯言琅琊徐盛字文向東郡潘璋字文圭廬江丁奉字承淵文武諸人共相輔佐由此江東稱得人之盛建安七年曹操破袁紹遣使往江東命孫權遣子入朝隨駕權猶豫未決吳太夫人命周瑜張昭等面議張昭曰操欲令我遣子入朝是牽制諸侯之法也然若不令去恐其興兵下江東勢必危矣周瑜曰將軍承父兄遺業兼六郡之衆兵精糧足將士用命有何逼迫而欲送質於人質一入不得不與曹氏連和彼有命召不得不往如此則見制於人也不如勿遣徐觀其變別以良策禦之吳太夫人曰公瑾之言是也權遂從其言謝使者不遣子自此曹操有下江南之意但正值北方未寧無暇南征建安八年十一月孫權引兵伐黃祖戰于大江之中祖軍敗績權部將淩操輕舟當先殺入夏口被黃祖部將甘寧一箭射死淩操子淩統時年方十五歲奮力往奪父尸而歸權見風色不利收軍還東吳卻説孫權弟孫翊為丹陽太守翊性剛好酒醉後嘗鞭撻士卒丹陽督將媯覽郡丞戴員二人常有殺翊之心乃與翊從人邊洪結為心腹共謀殺翊時諸將縣令皆集丹陽翊設宴相待翊妻徐氏美而慧極善卜易是日卜一封其象大凶勸翊勿出會客翊不從遂與衆大會至晚席散邊洪帶刀跟出門外即抽刀砍死孫翊媯覽戴員乃歸罪邊洪斬之於市二人乘勢虜翊家資侍妾媯覽見徐氏美貌乃謂之曰吾為汝夫報仇汝當從我不從則死徐氏曰夫死未幾不忍便相從可待至晦日設祭除服然後成親未遲覽從之徐氏乃密召孫翊心腹舊將孫高傅嬰二人入府泣告曰先夫在日常言二公忠義今媯戴二賊謀殺我夫只歸罪邊洪將我家資童婢盡皆分去媯覽又欲強占妾身妾已詐許之以安其心二將軍可差人星夜報知吳侯一面設密計以圖二賊雪此仇辱生死銜恩言畢再拜孫高傅嬰皆泣曰我等平日感府君恩遇今日所以不即死難者正欲為復仇計耳夫人所命敢不效力於是密遣心腹使者往報孫權至晦日徐氏先召孫傅二人伏於密室幃幕之中然後設祭於堂上祭畢即除去孝服沐浴薰香濃妝豔裹言笑自若媯覽聞之甚喜至夜徐氏遣婢妾請覽入府設席堂中飲酒飲既醉徐氏乃邀覽入密室覽喜乘醉而入徐氏大呼曰孫傅二將軍何在二人即從幃幕中持刀躍出媯覽措手不及被傅嬰一刀砍倒在地孫高再復一刀登時殺死徐氏復傳請戴員赴宴員入府來至堂中亦被孫傅二將所殺一面使人誅戮二賊家小及其餘黨徐氏遂重穿孝服將媯覽戴員首級祭于孫翊靈前不一日孫權自領軍馬至丹陽見除氏已殺媯戴二賊乃封孫高傅嬰為牙門將令守丹陽取徐氏歸家養老江東人無不稱徐氏之德後人有詩贊曰姦回一旦受摧鋤庸臣從賊忠臣死不及東吳女丈夫且説東吳各處山賊盡皆平復大江之中有戰船七千餘只孫權拜周瑜為大都督總統江東水陸軍馬建安十二年冬十月權母吳太夫人病危召周瑜張昭二人至謂曰我本吳人幼亡父母與弟吳景徒居越中後嫁與孫氏生四子長子策生時吾夢月入懷後生次子權又夢日入懷蔔者雲夢日月入懷者其子大貴不幸策早喪今將江東基業付權望公等同心助之吾死不朽矣又囑權曰汝事子布公瑾以師傅之禮不可怠慢吾妹與我共嫁汝父則亦汝之母也吾死之後事吾妹如事我汝妹亦當恩養擇佳壻以嫁之言訖遂終孫權哀哭具喪葬之禮自不必説至來年春孫權商議欲伐黃祖張紹曰居喪未及期年不可動兵周瑜曰報仇雪恨何待期年權猶豫未決適平北都尉呂蒙入見告權曰某把龍湫水口忽有黃祖部將甘寧來降某細詢之寧字興霸巴郡臨江人也頗通書史有氣力好遊俠嘗招合亡命縱橫於江湖之中腰懸銅鈴人聽鈴聲盡皆避之又嘗以西川錦作帆幔時人皆稱為錦帆賊後悔前非改行從善引衆投劉表見表不能成事即欲來投東吳卻被黃祖留住在夏口前東吳破祖時祖得甘寧之力救回夏口乃待寧甚薄都督蘇飛屢薦寧于祖祖曰寧乃劫江之賊豈可重用寧因此懷恨蘇飛知其意乃置酒邀寧到家謂之曰吾薦公數次奈主公不能用日月逾邁人生幾何宜自遠圖吾當保公為邾縣長自作去就之計寧因此得過夏口欲投江東恐江東恨其救黃祖殺淩操之事某具言主公求賢若渴不記舊恨況各為其主又何恨焉寧欣然引衆渡江來見主公乞鈞旨定奪孫權大喜曰吾得興霸破黃祖必矣遂命呂蒙引甘寧入見參拜已畢權曰興霸來此大獲我心豈有記恨之理請無懷疑願教我以破黃祖之策寧曰今漢祚日危曹操終必篡竊南荊之地操所必爭也劉表無遠慮其子又愚劣不能承業傳基明公宜早圖之若遲則操先圖之矣今宜先取黃祖祖今年老昏邁務於貨利侵求吏民人心皆怨戰具不修軍無法律明公若往攻之其勢必破既破祖軍鼓行而西據楚關而圖巴蜀霸業可定也孫權曰此金玉之論也遂命周瑜為大都督總水陸軍兵呂蒙為前部先鋒董襲與甘寧為副將權自領大軍十萬征討黃祖細作探知報至江夏黃祖急聚商議令蘇飛為大將陳就鄧龍為先鋒盡起江夏之兵迎敵陳就鄧龍各引一隊艨艟截住沔口艨艟上各設強弓硬弩千余張將大索系定艨艟於水面上東吳兵至艨艟上鼓響弓弩齊發兵不敢進約退數裏水面甘寧謂董襲曰事已至此不得不進乃選小船百餘只每船用精兵五十人二十人撑船三十人各披衣甲手執鋼刀不避矢石直至艨艟傍邊砍斷大索艨艟遂橫甘寧飛上艨艟將鄧龍砍死陳就棄船而走呂蒙見了跳下小船自舉櫓棹直入船隊放火燒船陳就急待上岸呂蒙捨命趕到跟前當胸一刀砍翻比及蘇飛引軍于岸上接應時東吳諸將一齊上岸勢不可當祖軍大敗蘇飛落荒而走正遇東吳大將潘璋兩馬相交戰不數合被璋生擒過去徑至船中來見孫權權命左右以檻車囚之待活捉黃祖一併誅戮催動三軍不分晝夜攻打夏口正是只因不用錦帆賊至今衝開大索船未知黃祖勝負如何且看下文分解
