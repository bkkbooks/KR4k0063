body:
  text: 第四十一回劉玄德攜民渡江趙子龍單騎救主卻説張飛因關公放了上流水遂引軍從下流殺將來截住曹仁混殺忽遇許褚便與交鋒許褚不敢戀戰奪路走脫張飛趕來接著玄德孔明一同沿河到上流劉封糜芳已安排船隻等候遂一齊渡河盡望樊城而去孔明教將船筏放火燒毀卻説曹仁收拾殘軍就新野屯住使曹洪去見曹操具言失利之事操大怒曰諸葛村夫安敢如此催動三軍漫山塞野盡至新野下寨傳令軍士一面搜山一面填塞白河令大軍分作八路一齊去取樊城劉曄曰丞相初至襄陽必須先買民心今劉備盡遷新野百姓入樊城若我兵徑進二縣為齏粉矣不如先使人招降劉備備即不降亦可見我愛民之心若其來降則荊州之地可不戰而定也操從其言便問誰可為使劉曄曰徐庶與劉備至厚今現在軍中何不命他一往操曰他去恐不復來曄曰他若不來貽笑於人矣丞相勿疑操乃召徐庶至謂曰我本欲踏平樊城奈憐衆百姓之命公可往説劉備如肯來降免罪賜爵若更執迷軍民共戮玉石俱焚吾知公忠義故特使公往願勿相負徐庶受命而行至樊城玄德孔明接見共訴舊日之情庶曰曹操使庶來招降使君乃假買民心也今彼分兵八路填白河而進樊城恐不可守宜速作行計玄德欲留徐庶庶謝曰某若不還恐惹人笑今老母已喪抱恨終天身雖在彼誓不為設一謀公有臥龍輔佐何愁大業不成庶請辭玄德不敢強留徐庶辭回見了曹操言玄德並無降意操大怒即日進兵玄德問計于孔明孔明曰可速棄樊城取襄陽暫歇玄德曰奈百姓相隨許久安忍棄之孔明曰可令人遍告百姓有願隨者同去不願者留下先使雲長往江岸整頓船隻令孫乾簡雍在城中聲揚曰今曹兵將至孤城不可久守百姓願隨者便同過江兩縣之民齊聲大呼曰我等雖死亦願隨使君即日號泣而行扶老攜幼將男帶女滾滾渡河兩岸哭聲不絶玄德於船上望見大慟曰為吾一人而使百姓遭此大難吾何生哉欲投江而死左右急救止聞者莫不痛哭船到南岸回顧百姓有未渡者望南而哭玄德急令雲長催船渡之方才上馬行至襄陽東門只見城上遍插旌旗壕邊密布鹿角玄德勒馬大叫曰劉琮賢侄吾但欲救百姓並無他念可快開門劉琮聞玄德至懼而不出蔡瑁張允徑來敵樓上叱軍士亂箭射下城外百姓皆望敵樓而哭城中忽有一將引數百人徑上城樓大喝蔡瑁張允賣國之賊劉使君乃仁德之人今為救民而來投何得相拒衆視其人身長八尺面如重棗乃義陽人也姓魏名延字文長當下魏延輪刀砍死守門將士開了城門放下吊橋大叫劉皇叔快領兵入城共殺賣國之賊張飛便躍馬欲入玄德急止之曰休驚百姓魏延只管招呼玄德軍馬入城只見城內一將飛馬引軍而出大喝魏延無名小卒安敢造亂認得我大將文聘麼魏延大怒挺槍躍馬便來交戰兩下軍兵在城邊混殺喊聲大震玄德曰本欲保民反害民也吾不願入襄陽孔明曰江陵乃荊州要地不如先取江陵為家玄德曰正合吾心於是引著百姓盡離襄陽大路望江陵而走襄陽城中百姓多有乘亂逃出城來跟玄德而去魏延與文聘交戰從巳至未手下兵卒皆已折盡延乃撥馬而逃卻尋不見玄德自投長沙太守韓玄去了卻説玄德同行軍民十余萬大小車數千輛挑擔背包者不計其數路過劉表之墓玄德率衆將拜於墓前哭告曰辱弟備無德無才負兄寄託之重罪在備一身與百姓無干望兄英靈垂救荊襄之民言甚悲切軍民無不下淚忽哨馬報説曹操大軍已屯樊城使人收拾船筏即日渡江趕來也衆將皆曰江陵要地足可拒守今擁民衆數萬日行十餘裏似此幾時得至江陵倘曹兵到如何迎敵不如暫棄百姓先行為上玄德泣曰舉大事者必以人為本今人歸我奈何棄之百姓聞玄德此言莫不傷感後人有詩贊之曰臨難仁心存百姓登舟揮淚動三軍至今憑吊襄江口父老猶然憶使君卻説玄德擁著百姓緩緩而行孔明曰追兵不久即至可遣雲長往江夏求救于公子劉琦教他速起兵乘船會于江陵玄德從之即修書令雲長同孫乾領五百軍往江夏求救令張飛斷後趙雲保護老小其餘俱管顧百姓而行每日只走十餘裏便歇卻説曹操在樊城使人渡江至襄陽召劉琮相見琮懼怕不敢往見蔡瑁張允請行王威密告琮曰將軍既降玄德又走曹操必懈弛無備願將軍奮整奇兵設於險處擊之操可獲矣獲操則威震天下中原雖廣可傳檄而定此難遇之機不可失也琮以其言告蔡瑁瑁叱王威曰汝不知天命安敢妄言威怒罵曰賣國之徒吾恨不生啖汝肉瑁欲殺之蒯越勸止瑁遂與張允同至樊城拜見曹操瑁等辭色甚是諂佞操問荊州軍馬錢糧今有多少瑁曰馬軍五萬步軍十五萬水軍八萬共二十八萬錢糧大半在江陵其餘各處亦足供給一載操曰戰船多少原是何人管領瑁曰大小戰船共七千余隻原是瑁等二人掌管操遂加瑁為鎮南侯水軍大都督張允為助順侯水軍副都督二人大喜拜謝操又曰劉景升既死其子降順吾當表奏天子使永為荊州之主二人大喜而退荀攸曰蔡瑁張允乃諂佞之徒主公何遂加以如此顯爵更教都督水軍乎操笑曰吾豈不識人止因吾所領北地之衆不習水戰故且權用此二人待成事之後別有理會卻説蔡瑁張允歸見劉琮具言曹操許保奏將軍永鎮荊襄琮大喜次日與母蔡夫人齎捧印綬兵符親自渡江拜迎曹操操撫慰畢即引隨征軍將進屯襄陽城外蔡瑁張允令襄陽百姓焚香拜接曹操俱用好言撫諭入城至府中坐定即召蒯越近前撫尉曰吾不喜得荊州喜得異度也遂封蒯越為江陵太守樊城侯傅巽王粲等皆為關內侯而以劉琮為青州刺史便教起程琮聞命大驚辭曰琮不願為官願守父母鄉土操曰青州近帝都教你隨朝為官免在荊襄被人圖害琮再三推辭曹操不準琮只得與母蔡夫人同赴青州只有故將王威相隨其餘官員俱送至江口而回操喚于禁囑付曰你可引輕騎追劉琮母子殺之以絶後患於禁得令領衆趕上大喝曰我奉丞相令教來殺母子可早納下首級蔡夫人抱劉琮而大哭于禁喝令軍士下手王威忿怒奮力相鬥竟被衆軍所殺軍士殺死劉琮及蔡夫人於禁回報曹操操重賞於禁便使人往隆中搜尋孔明妻小卻不知去向原來孔明先已令人搬送至三江內隱避矣操深恨之襄陽既定荀攸進言曰江陵乃荊襄重地錢糧極廣劉備若據此地急難動搖操曰孤豈忘之隨命於襄陽諸將中選一員引軍開道諸將中卻獨不見文聘操使人尋問方才來見操曰汝來何遲對曰為人臣而不能使其主保全境土心實悲慚無顔早見耳言訖欷覷流涕操曰真忠臣也除江夏太守賜爵關內侯便教引軍開道探馬報説劉備帶領百姓日行止十數裏計程只有三百餘裏操教各部下精選五千鐵騎星夜前進限一日一夜趕上劉備大軍陸續隨後而進卻説玄德引十數萬百姓三千余軍馬一程程挨著往江陵進發趙雲保護老小張飛斷後孔明曰雲長往江夏去了絶無回音不知若何玄德曰敢煩軍師親自走一遭劉琦感公昔日之教今若見公親至事必諧矣孔明允諾便同劉封引五百軍先往江夏求救去了當日玄德自與簡雍糜竺糜芳同行正行間忽然一陳狂風就馬前刮起塵土沖天平遮紅日玄德驚曰此何兆也簡雍頗明陰陽袖占一課失驚曰此大凶之兆也應在今夜主公可速棄百姓而走玄德曰百姓從新野相隨至此吾安忍棄之雍曰主公若戀而不棄禍不遠矣玄德曰前面是何處左右答曰前面是當陽縣有座山名為景山玄德便教就此山扎住時秋末冬初涼風透骨黃昏將近哭聲遍野至四更時分只聽得西北喊聲震地而來玄德大驚急上馬引本部精兵二千餘人迎敵曹兵掩至勢不可當玄德死戰正在危迫之際幸得張飛引軍至殺開一條血路救玄德望東而走文聘當先攔住玄德罵曰背主之賊尚有何面目見人文聘羞慚滿面引兵自投東北去了張飛保著玄德且戰且走奔至天明聞喊聲漸漸遠去玄德方才歇馬看手下隨行人止有百餘騎百姓老小並糜竺糜芳簡雍趙雲等一干人皆不知下落玄德大哭曰十數萬生靈皆因戀我遭此大難諸將及老小皆不知存亡雖土木之人寧不悲乎正悽惶時忽見糜芳面帶數箭踉蹌而來口言趙子龍反投曹操去了也玄德叱曰子龍是我故交安肯反乎張飛曰他今見我等勢窮力盡或者反投曹操以圖富貴耳玄德曰子龍從我於患難心如鐵石非富貴所能動搖也糜芳曰我親見他投西北去了張飛曰待我親自尋他去若撞見時一槍刺死玄德曰休錯疑了豈不見你二兄誅顔良文醜之事乎子龍此去必有事故吾料子龍必不棄我也張飛那裏肯聽引二十餘騎至長阪橋見橋東有一帶樹木飛生一計教所從二十餘騎都砍下樹枝拴在馬尾上在樹林內往來馳騁沖起塵土以為疑兵飛卻親自橫矛立馬於橋上向西而望卻説趙雲自四更時分與曹軍廝殺往來衝突殺至天明尋不見玄德又失了玄德老小雲自思曰主公將甘糜二夫人與小主人阿斗託付在我身上今日軍中失散有何面目去見主人不如去決一死戰好歹要尋主母與小主人下落回顧左右只有三四十騎相隨雲拍馬在亂軍中尋覓二縣百姓號哭之聲震天動地中箭著槍拋男棄女而走者不計其數趙雲正走之間見一人臥在草中視之乃簡雍也雲急問曰曾見兩位主母否雍曰二主母棄了車仗抱阿鬥而走我飛馬趕去轉過山坡被一將刺了一槍跌下馬來馬被奪了去我爭鬥不得故臥在此雲乃將從人所騎之馬借一匹與簡雍騎坐又著二卒扶護簡雍先去報與主人我上天入地好歹尋主母與小主人來如尋不見死在沙場上也説罷拍馬望長阪坡而去忽一人大叫趙將軍那裏去雲勒馬問曰你是何人答曰我乃劉使君帳下護送車仗的軍士被箭射倒在此趙雲便問二夫人消息軍士曰恰才見甘夫人披頭跣足相隨一夥百姓婦女投南而走雲見説也不顧軍士急縱馬望南趕去只見一夥百姓男女數百人相攜而走雲大叫曰內中有甘夫人否夫人在後面望見趙雲放聲大哭雲下馬插槍而泣曰使主母失散雲之罪也糜夫人與小主人安在甘夫人曰我與糜夫人被逐棄了車仗雜于百姓內步行又撞見一枝軍馬沖散糜夫人與阿斗不知何往我獨自逃生至此正言間百姓發喊又撞出一枝軍來趙雲拔槍上馬看時面前馬上綁著一人乃糜竺也背後一將手提大刀引著千余軍乃曹仁部將淳於導拿住糜竺正要解去獻功趙雲大喝一聲挺槍縱馬直取淳於導導抵敵不住被雲一槍刺落馬下向前救了糜竺奪得馬二匹雲請甘夫人上馬殺開條大路直送至長阪坡只見張飛橫矛立馬於橋上大叫子龍你如何反我哥哥雲曰我尋不見主母與小主人因此落後何言反耶飛曰若非簡雍先來報信我今見你怎肯幹休也雲曰主公在何處飛曰只在前面不遠雲謂糜竺曰糜子仲保甘夫人先行待我仍往尋糜夫人與小主人去言罷引數騎再回舊路正走之間見一將手提鐵槍背著一口劍引十數騎躍馬而來趙雲更不打話直取那將交馬只一合把那將一槍刺倒從騎皆走原來那將乃曹操隨身背劍之將夏侯恩也曹操有寶劍二口一名倚天一名青钅工倚天劍自佩之青钅工劍令夏侯恩佩之那青钅工劍砍鐵如泥鋒利無比當時夏侯恩自恃勇力背著曹操只顧引人搶奪虜掠不想撞著趙雲被他一槍刺死奪了那口劍看靶上有金嵌青钅工二字方知是寶劍也雲插劍提槍復殺入重圍回顧手下從騎已沒一人只剩得孤身雲並無半點退心只顧往來尋覓但逢百姓便問糜夫人消息忽一人指曰夫人抱著孩兒左腿上著了槍行走不得只在前面牆缺內坐地趙雲聽了連忙追尋只見一個人家被火燒壞土牆糜夫人抱著阿斗坐於牆下枯井之傍啼哭雲急下馬伏地而拜夫人曰妾得見將軍阿斗有命矣望將軍可憐他父親飄蕩半世只有這點骨血將軍可護持此子教他得見父面妾死無恨雲曰夫人受難雲之罪也不必多言請夫人上馬雲自步行死戰保夫人透出重圍糜夫人曰不可將軍豈可無馬此子全賴將軍保護妾已重傷死何足惜望將軍速抱此子前去勿以妾為纍也雲曰喊聲將近追兵已至請夫人速速上馬糜夫人曰妾身委實難去休得兩誤乃將阿斗遞與趙雲曰此子性命全在將軍身上趙雲三回五次請夫人上馬夫人只不肯上馬四邊喊聲又起雲厲聲問夫人不聽吾言追軍若至為之奈何糜夫人乃棄阿斗於地翻身投入枯井中而死後人有詩贊之曰戰將全憑馬力多步行怎把幼君扶拚將一死存劉嗣勇決還虧女丈夫趙雲見夫人已死恐曹軍盜尸便將土牆推倒掩蓋枯井掩訖解開勒甲縧放下掩心鏡將阿斗抱護在懷綽槍上馬早有一將引一隊步軍至乃曹洪部將晏明也持三尖兩刃刀來戰趙雲不三合被趙雲一槍刺倒殺散衆軍衝開一條路正走間前面又一枝軍馬攔路當先一員大將旗號分明大書河間張郃雲更不答話挺槍便戰約十餘合雲不敢戀戰奪路而走背後張郃趕來雲加鞭而行不想咣啷一聲連馬和人顛入土坑之內張郃挺槍來刺忽然一道紅光從土坑中滾起那匹馬平空一躍跳出坑外後人有詩曰紅光罩體困龍飛征馬衝開長阪圍四十二年真命主將軍因得顯神威張郃見了大驚而退趙雲縱馬正走背後忽有二將大叫趙雲休走前面又有二將使兩般軍器截住去路後面趕的是馬延張顗前面阻的是焦觸張南都是袁紹手下降將趙雲力戰四將曹軍一齊擁至雲乃拔青钅工劍亂砍手起處衣甲平過血如湧泉殺退衆軍將直透重圍卻説曹操在景山頂上望見一將所到之處威不可當急問左右是誰曹洪飛馬下山大叫曰軍中戰將可留姓名雲應聲曰吾乃常山趙子龍也曹洪回報曹操操曰真虎將也吾當生致之遂令飛馬傳報各處如趙雲到不許放冷箭只要捉活的因此趙雲得脫此難此亦阿斗之福所致也這一場殺趙雲懷抱後主直透重圍砍倒大旗兩面奪槊三條前後槍刺劍砍殺死曹營名將五十余名後人有詩曰血染征袍透甲紅當陽誰敢與爭鋒古來沖陳扶危主只有常山趙子龍趙雲當下殺透重圍已離大陳血滿征袍正行間山坡下又撞出兩枝軍乃夏侯惇部將鍾縉鍾紳兄弟二人一個使大斧一個使畫戟大喝趙雲快下馬受縛正是才離虎窟逃生去又遇龍潭鼓浪來畢竟子龍怎地脫身且聽下回分解
