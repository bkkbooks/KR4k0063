body:
  text: 第四十二回張翼德大鬧長阪橋劉豫州敗走漢津口卻説鍾縉鍾紳二人攔住趙雲廝殺趙雲挺槍便刺鍾縉當先揮大斧來迎兩馬相交戰不三合被雲一槍刺落馬下奪路便走背後鍾紳持戟趕來馬尾相銜那枝戟只在趙雲後心內弄影雲急撥轉馬頭恰好兩胸相拍雲左手持槍隔過畫戟右手拔出青钅工寶劍砍去帶盔連腦砍去一半紳落馬而死餘衆奔散趙雲得脫望長阪橋而走只聞後面喊聲大震原來文聘引軍趕來趙雲到得橋邊人困馬乏見張飛挺矛立馬於橋上雲大呼曰翼德援我飛曰子龍速行追兵我自當之雲縱馬過橋行二十餘裏見玄德與衆人憩於樹下雲下馬伏地而泣玄德亦泣雲喘息而言曰趙雲之罪萬死猶輕糜夫人身帶重傷不肯上馬投井而死雲只得推土牆掩之懷抱公子身突重圍賴主公洪福幸而得脫適來公子尚在懷中啼哭此一會不見動靜多是不能保也遂解視之原來阿斗正睡著未醒雲喜曰幸得公子無恙雙手遞與玄德玄德接過擲之於地曰為汝這孺子幾損我一員大將趙雲忙向地下抱起阿斗泣拜曰雲雖肝腦塗地不能報也後人有詩曰曹操軍中飛虎出趙雲懷內小龍眠無由撫慰忠臣意故把親兒擲馬前卻説文聘引軍追趙雲至長阪橋只見張飛倒豎虎須圓睜環眼手綽蛇矛立馬橋上又見橋東樹林之後塵頭大起疑有伏兵便勒住馬不敢近前俄而曹仁李典夏侯惇夏侯淵樂進張遼張郃許褚等都至見飛怒目橫矛立馬於橋上又恐是諸葛孔明之計都不敢近前扎住陳腳一字兒擺在橋西使人飛報曹操操聞知急上馬從陳後來張飛睜圓環眼隱隱見後軍青羅傘蓋旄鉞旌旗來到料得是曹操心疑親自來看飛乃厲聲大喝曰我乃燕人張翼德也誰敢與我決一死戰聲如巨雷曹軍聞之盡皆股栗曹操急令去其傘蓋回顧左右曰我向曾聞雲長言翼德于百萬軍中取上將之首如探囊取物今日相逢不可輕敵言未已張飛睜目又喝曰燕人張翼德在此誰敢來決死戰曹操見張飛如此氣概頗有退心飛望見曹操後軍陳腳移動乃挺矛又喝曰戰又不戰退又不退卻是何故喊聲未絶曹操身邊夏侯傑驚得肝膽碎裂倒撞于馬下操便回馬而走於是諸軍衆將一齊望西奔走正是黃口孺子怎聞霹靂之聲病體樵夫難聽虎豹之吼一時棄槍落盔者不計其數人如潮湧馬似山崩自相踐踏後人有詩贊曰長阪橋頭殺氣生橫槍立馬眼圓睜一聲好似轟雷震獨退曹家百萬兵卻説曹操懼張飛之威驟馬望西而走冠簪盡落披發奔逃張遼許褚趕上扯住轡環曹操倉皇失措張遼曰丞相休驚料張飛一人何足深懼今急回軍殺去劉備可擒也曹操神色方才稍定乃令張遼許褚再至長阪橋探聽消息且説張飛見曹軍一擁而退不敢追趕速喚回原隨二十餘騎解去馬尾樹枝令將橋梁拆斷然後回馬來見玄德具言斷橋一事玄德曰吾弟勇則勇矣惜失於計較飛問其故玄德曰曹操多謀汝不合拆斷橋梁彼必追至矣飛曰他被我一喝倒退數裏何敢再追玄德曰若不斷橋彼恐有埋伏不敢進兵今拆斷了橋彼料我無軍而怯必來追趕彼有百萬之衆雖涉江漢可填而過豈懼一橋之斷耶於是即刻起身從小路斜投漢津望沔陽路而走卻説曹操使張遼許褚探長阪橋消息回報曰張飛已拆斷橋梁而去矣操曰彼斷橋而去乃心怯也遂傳令差一萬軍速搭三座浮橋只今夜就要過李典曰此恐是諸葛亮之詐謀不可輕進操曰張飛一勇之夫豈有詐謀遂傳下號令火速進兵卻説玄德行近漢津忽見後面塵頭大起鼓聲連天喊聲震地玄德曰前有大江後有追兵如之奈何急命趙雲準備抵敵曹操下令軍中曰今劉備釜中之魚阱中之虎若不就此時擒捉如放魚入海縱虎歸山矣衆將可努力向前衆將領命一個個奮威追趕忽山坡後鼓聲響處一隊軍馬飛出大叫曰我在此等候多時了當頭那員大將手執青龍刀坐下赤兔馬原來是關雲長去江夏借得軍馬一萬探知當陽長阪大戰特地從此路截出曹操一見雲長即勒住馬回顧衆將曰又中諸葛亮之計也傳令大軍速退雲長追趕十數裏即回軍保護玄德等到漢津已有船隻伺候雲長請玄德並甘夫人阿斗至船中坐定雲長問曰二嫂嫂如何不見玄德訴説當陽之事雲長歎曰曩日獵於許田時若從吾意可無今日之患玄德曰我於此時亦投鼠忌器耳正説之間忽見江南岸戰鼓大鳴舟船如蟻順風揚帆而來玄德大驚船來至近只見一人白袍銀鎧立於船頭上大呼曰叔父別來無恙小侄得罪玄德視之乃劉琦也琦過船哭拜曰聞叔父困于曹操小侄特來接應玄德大喜遂合兵一處放舟而行在船中正訴情由江西南上戰船一字兒擺開乘風呼哨而至劉琦驚曰江夏之兵小侄已盡起至此矣今有戰船攔路非曹操之軍即江東之軍也如之奈何玄德出船頭視之見一人綸巾道服坐在船頭上乃孔明也背後立著孫乾玄德慌請過船問其何故卻在此孔明曰亮自至江夏先令雲長於漢津登陸地而接我料曹操必來追趕主公必不從江陵來必斜取漢津矣故特請公子先來接應我竟往夏口盡起軍前來相助玄德大悅合為一處商議破曹之策孔明曰夏口城險頗有錢糧可以久守請主公且到夏口屯住公子自回江夏整頓戰船收拾軍器為掎角之勢可以抵當曹操若共歸江夏則勢反孤矣劉琦曰軍師之言甚善但愚意欲請叔父暫至江夏整頓軍馬停當再回夏口不遲玄德曰賢侄之言亦是遂留下雲長引五千軍守夏口玄德孔明劉琦共投江夏卻説曹操見雲長在旱路引軍截出疑有伏兵不敢來追又恐水路先被玄德奪了江陵便星夜提兵赴江陵來荊州治中鄧義別駕劉先已備知襄陽之事料不能抵敵曹操遂引荊州軍民出郭投降曹操入城安民已定釋韓嵩之囚加為大鴻臚其餘衆官各有封賞曹操與衆將議曰今劉備已投江夏恐結連東吳是滋蔓也當用何計破之荀攸曰我今大振兵威遣使馳檄江東請孫權會獵于江夏共擒劉備分荊州之地永結盟好孫權必驚疑而來降則吾事濟矣操從其計一面發檄遣使赴東吳一面計點馬步水軍共八十三萬詐稱一百萬水陸並進船騎雙行沿江而來西連荊峽東接蘄黃寨柵聯絡三百餘裏話分兩頭卻説江東孫權屯兵柴桑郡聞曹操大軍至襄陽劉琮已降今又星夜兼道取江陵乃集衆謀士商議禦守之策魯肅曰荊州與國鄰接江山險固士民殷富吾若據而有之此帝王之資也今劉表新亡劉備新敗肅請奉命往江夏吊喪因説劉備使撫劉表衆將同心一意共破曹操備若喜而從命則大事可定矣權喜從其言即遣魯肅齎禮往江夏吊喪卻説玄德至江夏與孔明劉琦共議良策孔明曰曹操勢大急難抵敵不如往投東吳孫權以為應援使南北相持吾等於中取利有何不可玄德曰江東人物極多必有遠謀安肯相容耶孔明笑曰今操引百萬之衆虎踞江漢江東安得不使人來探聽虛實若有人到此亮借一帆風直至江東憑三寸不爛之舌説南北兩軍互相吞併若南軍勝共誅曹操以取荊州之地若北軍勝則我乘勢以取江南可也玄德曰此論甚高但如何得江東人到正説間人報江東孫權差魯肅來吊喪船已傍岸孔明笑曰大事濟矣遂問劉琦曰往日孫策亡時襄陽曾遣人去吊喪否琦曰江東與我軍有殺父之仇安得通慶吊之禮孔明曰然則魯肅之來非為吊喪乃來探聽軍情也遂謂玄德曰魯肅至若問曹操動靜主公只推不知再三問時主公只説可問諸葛亮計會已定使人迎接魯肅肅入城吊喪收過禮物劉琦請肅與玄德相見禮畢邀入後堂飲酒肅曰久聞皇叔大名無緣拜會今幸得見實為欣慰近聞皇叔與曹操會戰必知彼虛實敢問操軍約有幾何玄德曰備兵微將寡一聞操至即走竟不知彼虛實魯肅曰聞皇叔用諸葛孔明之謀兩場火燒得曹操魂亡膽落何言不知耶玄德曰徐非問孔明便知其詳肅曰孔明安在願求一見玄德教請孔明出來相見肅見孔明禮畢問曰向慕先生才德未得拜晤今幸相遇願聞目今安危之事孔明曰曹操姦計亮已盡知但恨力未及故且避之肅曰皇叔今將止於此乎孔明曰使君與蒼梧太守吳巨有舊將往投之肅曰吳巨糧少兵微自不能保焉能容人孔明曰吳巨處雖不足久居今且暫依之別有良圖肅曰孫將軍虎踞六郡兵精糧足又極敬賢禮士江表英雄多歸附之今為君計莫若遣心腹往結東吳以共圖大事孔明曰劉使君與孫將軍自來無舊恐虛費詞説且別無心腹之人可使肅曰先生之兄現為江東參謀日望與先生相見肅不才願與公同見孫將軍共議大事玄德曰孔明是吾之師頃刻不可相離安可去也肅堅請孔明同去玄德佯不許孔明曰事急矣請奉命一行玄德方才許諾魯肅遂別了玄德劉琦與孔明登舟望柴桑郡來正是只因諸葛扁舟去致使曹兵一旦休不知孔明此去畢竟如何且看下文分解
