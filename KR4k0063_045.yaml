body:
  text: 第四十五回三江口曹操折兵群英會蔣幹中計卻説周瑜聞諸葛瑾之言轉恨孔明存心欲謀殺之次日點齊軍將入辭孫權權曰卿先行孤即起兵繼後瑜辭出與程普魯肅領兵起行便邀孔明同往孔明欣然從之一同登舟駕起帆檣迤邐望夏口而進離三江口五六十裏船依次第歇定周瑜在中央下寨岸上依西山結營周圍屯住孔明只在一葉小舟內安身周瑜分拔已定使人請孔明議事孔明至中軍帳敘禮畢瑜曰昔曹操兵少袁紹兵多而操反勝紹者因用許攸之謀先斷烏巢之糧也今操兵八十三萬我兵只五六萬安能拒之亦必須先斷操之糧然後可破我已探知操軍糧草俱屯於聚鐵山先生久居漢上熟知地理敢煩先生與關張子龍輩吾亦助兵千人星夜往聚鐵山斷操糧道彼此各為主人之事幸勿推調孔明暗思此因説我不動設計害我我若推調必為所笑不如應之別有計議乃欣然領諾瑜大喜孔明辭出魯肅密謂瑜曰公使孔明劫糧是何意見瑜曰吾欲殺孔明恐惹人笑故借曹操之手殺之以絶後患耳肅聞言乃往見孔明看他知也不知只見孔明略無難色整點軍馬要行肅不忍以言挑之曰先生此去可成功否孔明笑曰吾水戰步戰馬戰車戰各盡其妙何愁功績不成非比江東公與周郎輩止一能也肅曰吾與公瑾何謂一能孔明曰吾聞江南小兒謠言雲伏路把關饒子敬臨江水戰有周郎公等於陸地但能伏路把關周公瑾但堪水戰不能陸戰耳肅乃以此言告知周瑜瑜怒曰何欺我不能陸戰耶不用他去我自引一萬馬軍往聚鐵山斷操糧道肅又將此言告孔明孔明笑曰公瑾令吾斷糧者實欲使曹操殺吾耳吾故以片言戲之公瑾便容納不下目今用人之際只願吳侯與劉使君同心則功可成如各相謀害大事休矣操賊多謀他平生慣斷人糧道今如何不以重兵提備公瑾若去必為所擒今只當先決水戰挫動北軍鋭氣別尋妙計破之望子敬善言以告公瑾為幸魯肅遂連夜回見周瑜備述孔明之言瑜搖首頓足曰此人見識勝吾十倍今不除之後必為我國之禍肅曰今用人之際望以國家為重且待破曹之後圖之未晚瑜然其説卻説玄德分付劉琦守江夏自領衆將引兵往夏口遙望江南岸旗幡隱隱戈戟重重料是東吳已動兵矣乃盡移江夏之兵至樊口屯扎玄德聚衆曰孔明一去東吳杳無音信不知事體如何誰人可去探聽虛實回報糜竺曰竺願往玄德乃備羊酒禮物令糜竺至東吳以犒軍為名探聽虛實竺領命駕小舟順流而下徑至周瑜大寨前軍士入報周瑜瑜召入竺再拜致玄德相敬之意獻上酒禮瑜受訖設宴款待糜竺竺曰孔明在此已久今願與同回瑜曰孔明方與我同謀破曹豈可便去吾亦欲見劉豫州共議良策奈身統大軍不可暫離若豫州肯枉駕來臨深慰所望竺應諾拜辭而回肅問瑜曰公欲見玄德有何計議瑜曰玄德世之梟雄不可不除吾今乘機誘至殺之實為國家除一後患魯肅再三勸諫瑜只不聽遂傳密令如玄德至先埋伏刀斧手五十人於壁衣中看吾擲杯為號便出下手卻説糜竺回見玄德具言周瑜欲請主公到彼面會別有商議玄德便教收拾快船一隻只今便行雲長諫曰周瑜多謀之士又無孔明書信恐其中有詐不可輕去玄德曰我今結東吳以共破曹操周郎欲見我我若不往非同盟之意兩相猜忌事不諧矣雲長曰兄長若堅意要去弟願同往張飛曰我也跟去玄德曰只雲長隨我去翼德與子龍守寨簡雍固守鄂縣我去便回分付畢即與雲長乘小舟並從者二十餘人飛棹赴江東玄德觀看江東艨艟戰艦旌旗甲兵左右分布整齊心中甚喜軍士飛報周瑜劉豫州來了瑜問帶多少船隻來軍士答曰只有一隻船二十餘從人瑜笑曰此人命合休矣乃命刀斧手先埋伏定然後出寨迎接玄德引雲長等二十餘人直到中軍帳敘禮畢瑜請玄德上坐玄德曰將軍名傳天下備不才何煩將軍重禮乃分賓主而坐周瑜設宴相待且説孔明偶來江邊聞説玄德來此與都督相會吃了一驚急入中軍帳竊看動靜只見周瑜面有殺氣兩邊壁衣中密排刀斧手孔明大驚曰似此如之奈何回視玄德談笑自若卻見玄德背後一人按劍而立乃雲長也孔明喜曰吾主無危矣遂不復入仍回身至江邊等候周瑜與玄德飲宴酒行數巡瑜起身把盞猛見雲長按劍立于玄德背後忙問何人玄德曰吾弟關雲長也瑜驚曰非向日斬顔良文醜者乎玄德曰然也瑜大驚汗流滿背便斟酒與雲長把盞少頃魯肅入玄德曰孔明何在煩子敬請來一會瑜曰且待破了曹操與孔明相會未遲玄德不敢再言雲長以目視玄德玄德會意即起身辭瑜曰備暫告別即日破敵收功之後專當叩賀瑜亦不留送出轅門玄德別了周瑜與雲長等來至江邊只見孔明已在舟中玄德大喜孔明曰主公知今日之危乎玄德愕然曰不知也孔明曰若無雲長主公幾為周郎所害矣玄德方才省悟便請孔明同回樊口孔明曰亮雖居虎口安如泰山今主公但收拾船隻軍馬候用以十一月二十甲子日後為期可令子龍駕小舟來南岸邊等候切勿有誤玄德問其意孔明曰但看東南風起亮必還矣玄德再欲問時孔明催促玄德作速開船言訖自回玄德與雲長及從人開船行不數裏忽見上流頭放下五六十隻船來船頭上一員大將橫矛而立乃張飛也因恐玄德有失雲長獨力難支特來接應於是三人一同回寨不在話下卻説周瑜送了玄德回至寨中魯肅入問曰公既誘玄德至此為何又不下手瑜曰關雲長世之虎將也與玄德行坐相隨吾若下手他必來害我肅愕然忽報曹操遣使送書至瑜喚入使者呈上書看時封面上判雲漢大丞相付周都督開拆瑜大怒更不開看將書扯碎擲於地下喝斬來使肅曰兩國相爭不斬來使瑜曰斬使以示威遂斬使者將首級付從人持回隨令甘寧為先鋒韓當為左翼蔣欽為右翼瑜自部領諸將接應來日四更造飯五更開船鳴鼓呐喊而進卻説曹操知周瑜毀書斬使大怒便喚蔡瑁張允等一班荊州降將為前部操自為後軍催督戰船到三江口早見東吳船隻蔽江而來為首一員大將坐在船頭上大呼曰吾乃甘寧也誰敢來與我決戰蔡瑁令弟蔡中前進兩船將近甘寧拈弓搭箭望蔡射來應弦而倒寧驅船大進萬駑齊發曹軍不能抵當右邊蔣欽左邊韓當直沖入曹軍隊中曹軍大半是青徐之兵素不習水戰大江面上戰船一擺早立腳不住甘寧等三路戰船縱橫水面周瑜又催船助戰曹軍中箭著炮者不計其數從巳時直殺到未時周瑜雖得利只恐寡不敵衆遂下令鳴金收住船隻曹軍敗回操登旱寨再整軍士喚蔡瑁張允責之曰東吳兵少反為所敗是汝等不用心耳蔡瑁曰荊州水軍久不操練青徐之軍又素不習水戰故爾致敗今當先立水寨令青徐軍在中荊州軍在外每日教習精熟方可用之操曰汝既為水軍都督可以便宜從事何必稟我於是張蔡二人自去訓練水軍沿江一帶分二十四座水門以大船居於外為城郭小船居於內可通往來至晚點上燈火照得天心水面通紅旱寨三百餘裏煙火不絶卻説周瑜得勝回寨犒賞三軍一面差人到吳侯處報捷當夜瑜登高觀望只見西邊火光接天左右告曰此皆北軍燈火之光也瑜亦心驚次日瑜欲親往探看曹軍水寨乃命收拾樓船一隻帶著鼓樂隨行健將數員各帶強弓硬駑一齊上船迤麗前進至操寨邊瑜命下了雲石樓船上鼓樂齊奏瑜暗窺他水寨大驚曰此深得水軍之妙也問水軍都督是誰左右曰蔡瑁張允瑜思曰二人久居江東諳習水戰吾必設計先除此二人然後可以破曹正窺看間早有曹軍飛報曹操説周瑜偷看吾寨操命縱船擒捉瑜見水寨中旗號動急教收起雲石兩邊四下一齊輪轉櫓棹望江面上如飛而去比及曹寨中船出時周瑜的樓船已離了十數裏遠追之不及回報曹操操問衆將曰昨日輸了一陳挫動鋭氣今又被他深窺吾寨吾當作何計破之言未畢忽帳下一人出曰某自幼與周朗同窗交契願憑三寸不爛之舌往江東説此人來降曹操大喜視之乃九江人姓蔣名幹字子翼現為帳下幕賓操問曰子翼與周公瑾相厚乎幹曰丞相放心幹到江左必要成功操曰要將何物去幹曰只消一童隨往二仆駕舟其餘不用操甚喜置酒與蔣幹送行幹葛巾布袍駕一隻小舟徑到周瑜寨中命傳報故人蔣幹相訪周瑜正在帳中議事聞幹至笑謂諸將曰説客至矣遂與衆將附耳低言如此如此衆皆應命而去瑜整衣冠引從者數百皆錦衣花帽前後簇擁而出蔣幹引一青衣小童昂然而來瑜拜迎之幹曰公瑾別來無恙瑜曰子翼良苦遠涉江湖為曹氏作説客耶幹愕然曰吾久別足下特來敘舊奈何疑我作説客也瑜笑曰吾雖不及師曠之聰聞弦歌而知雅意幹曰足下待故人如此便請告退瑜笑而挽其臂曰吾但恐兄為曹氏作説客耳既無此心何速去也遂同入帳敘禮畢坐定即傳令悉召江左英傑與子翼相見須臾文官武將各穿錦衣帳下偏裨將校都披銀鎧分兩行而入瑜都教相見畢就列於兩傍而坐大張筵席奏軍中得勝之樂輪換行酒瑜告衆官曰此吾同窗契友也雖從江北到此卻不是曹家説客公等勿疑遂解佩劍付太史慈曰公可佩我劍作監酒今日宴飲但敘朋友交情如有提起曹操與東吳軍旅之事者即斬之太史慈應諾按劍坐于席上蔣幹驚愕不敢多言周瑜曰吾自領軍以來滴酒不飲今日見了故人又無疑忌當飲一醉説罷大笑暢飲座上觥籌交錯飲至半酣瑜攜幹手同步出帳外左右軍士皆全裝慣帶持戈執戟而立瑜曰吾之軍士頗雄壯否幹曰真熊虎之士也瑜又引幹到帳後一望糧草堆如山積瑜曰吾之糧草頗足備否幹曰兵精糧足名不虛傳瑜佯醉大笑曰想周瑜與子翼同學業時不曾望有今日幹曰以吾兄高才實不為過瑜執幹手曰大丈夫處世遇知己之主外托君臣之義內結骨肉之恩言必行計必從禍福共之假使蘇秦張儀陸賈酈生復出口似懸河舌如利刃安能動我心哉言罷大笑蔣幹面如土色瑜復攜幹入帳會諸將再飲因指諸將曰此皆江東之英傑今日此會可名群英會飲至天晚點上燈燭瑜自起舞劍作歌歌曰丈夫處世兮立功名立功名兮慰平生慰平生兮吾將醉吾將醉兮發狂吟歌罷滿座歡笑至夜深幹辭曰不勝酒力矣瑜命撤席諸將辭出瑜曰久不與子翼同榻今宵抵足而眠於是佯作大醉之狀攜幹入帳共寢瑜和衣臥倒嘔吐狼藉蔣幹如何睡得著伏枕聽時軍中鼓打二更起視殘燈尚明看周瑜時鼻息如雷幹見帳內桌上堆著一卷文書乃起床偷視之卻都是往來書信內有一封上寫蔡瑁張允謹封幹大驚暗讀之書略曰某等降曹非圖仁祿迫於勢耳今已賺北軍困於寨中便得其便即將操賊之首獻於麾下早晚人到便有關報幸勿見疑先此敬覆幹思曰原來蔡瑁張允結連東吳遂將書暗藏於衣內再欲檢看他書時床上周瑜翻身幹急滅燈就寢瑜口內含糊曰子翼我數日之內教你看操賊之首幹勉強應之瑜又曰子翼且住教你看操賊之首及幹問之瑜又睡著幹伏於床上將近四更只聽得有人入帳喚曰都督醒否周瑜夢中做忽覺之狀故問那人曰床上睡著何人答曰都督請子翼同寢何故忘卻瑜懊悔曰吾平日未嘗飲醉昨日醉後失事不知可曾説甚言語那人曰江北有人到此瑜喝低聲便喚子翼蔣幹只妝睡著瑜潛出帳幹竊聽之只聞有人在外曰張蔡二都督道急切不得下手後面言語頗低聽不真實少頃瑜入帳又喚子翼蔣幹只是不應蒙頭假睡瑜亦解衣就寢幹尋思周瑜是個精細人天明尋書不見必然害我睡至五更幹起喚周瑜瑜卻睡著幹戴上巾幘潛步出帳喚了小童徑出轅門軍士問先生那裏去幹曰吾在此恐誤都督事權且告別軍士亦不阻當幹下船飛棹回見曹操操問子翼幹事若何幹曰周瑜雅量高致非言詞所能動也操怒曰事又不濟反為所笑幹曰雖不能説周瑜卻與丞相打聽得一件事乞退左右幹取出書信將上項事逐一説與曹操操大怒曰二賊如此無禮耶即便喚蔡瑁張允到帳下操曰我欲使汝二人進兵瑁曰軍尚未曾練熟不可輕進操怒曰軍若練熟吾首級獻于周郎矣蔡張二人不知其意驚慌不能回答操喝武士推出斬之須臾獻頭帳下操方省悟曰吾中計矣後人有詩歎曰曹操姦雄不可當一時詭計中周郎蔡張賣主求生計誰料今朝劍下亡衆將見殺了張蔡二人入問其故操雖心知中計卻不肯認錯乃謂衆將曰二人怠慢軍法吾故斬之衆皆嗟呀不已操于衆將內選毛玠于禁為水軍都督以代蔡張二人之職細作探知報過江東周瑜大喜曰吾所患者此二人耳今既剿除吾無憂矣肅曰都督用兵如此何愁曹賊不破乎瑜曰吾料諸將不知此計獨有諸葛亮識見勝我想此謀亦不能瞞也子敬試以言挑之看他知也不知便當回報正是還將反間成功事去試從旁冷眼人未知肅去問孔明還是如何且看下文分解
