body:
  text: 第四十七回闞澤密獻詐降書龐統巧授連環計卻説闞澤字德潤會稽山陰人也家貧好學與人傭工嘗借人書來看看過一遍更不遺忘口才辨給少有膽氣孫權召為參謀與黃蓋最相善蓋知其能言有膽故欲使獻詐降書澤欣然應諾曰大丈夫處世不能立功建業不幾與草木同腐乎公既捐軀報主澤又何惜微生黃蓋滾下床來拜而謝之澤曰事不可緩即今便行蓋曰書已修下了澤領了書只就當夜扮作漁翁駕小舟望北岸而行是夜寒星滿天三更時候早到曹軍水寨巡江軍士拿住連夜報知曹操操曰莫非是姦細麼軍士曰只一漁翁自稱是東吳參謀闞澤有機密事來見操便教引將入來軍士引闞澤至只見帳上燈燭輝煌曹操憑幾危坐問曰汝既是東吳參謀來此何干澤曰人言曹丞相求賢若渴今觀此問甚不相合黃公覆汝又錯尋思了也操曰吾與東吳旦夕交兵汝私行到此如何不問澤曰黃公覆乃東吳三世舊臣今被周瑜於衆將之前無端毒打不勝忿恨因欲投降丞相為報仇之計特謀之於我我與公覆情同骨肉徑來為獻密書未知丞相肯容納否操曰書在何處闞澤取書呈上操拆書就燈下觀看書略曰蓋受孫氏厚恩本不當懷二心然以今日事勢論之用江東六郡之卒當中國百萬之師衆寡不敵海內所共見也東吳將吏無有智愚皆知其不可周瑜小子偏懷淺戇自負其能輒欲以卵敵石兼之擅作威福無罪受刑有功不賞蓋系舊臣無端為所摧辱心實恨之伏聞丞相誠心待物虛懷納士蓋願率衆歸降以圖建功雪恥糧草軍仗隨船獻納泣血拜白萬勿見疑曹操於幾案上翻覆將書看了十餘次忽然拍案張目大怒曰黃蓋用苦肉計令汝下詐降書就中取事卻敢來戲侮我耶便教左右推出斬之左右將闞澤簇下澤面不改容仰天大笑操教牽回叱曰吾已識破姦計汝何故哂笑澤曰吾不笑你吾笑黃公覆不識人耳操曰何不識人澤曰殺便殺何必多問操曰吾自幼熟讀兵書深知姦偽之道汝這條計只好瞞別人如何瞞得我澤曰你且説書中那件事是姦計操曰我説出你那破綻教你死而無怨你既是真心獻書投降如何不明約幾時你今有何理説闞澤聽罷大笑曰虧汝不惶恐敢自誇熟讀兵書還不及早收兵回去倘若交戰必被周瑜擒矣無學之輩可惜吾屈死汝手操曰何謂我無學澤曰汝不識機謀不明道理豈非無學操曰你且説我那幾般不是處澤曰汝無待賢之禮吾何必言但有死而已操曰汝若説得有理我自然敬服澤曰豈不聞背主作竊不可定期倘今約定日期急切下不得手這裏反來接應事必泄漏但可覷便而行豈可預期相訂乎汝不明此理欲屈殺好人真無學之輩也操聞言改容下席而謝曰某見事不明誤犯尊威幸勿挂懷澤曰吾與黃公覆傾心投降如嬰兒之望父母豈有詐乎操大喜曰若二人能建大功他日受爵必在諸人之上澤曰某等非為爵祿而來實應天順人耳操取酒待之少頃有人入帳於操耳邊私語操曰將書來看其人以密書呈上操觀之顔色頗喜闞澤暗思此必蔡中蔡和來報黃蓋受刑消息操故喜我投降之事為真實也操曰煩先生再回江東與黃公覆約定先通消息過江吾以兵接應澤曰某已離江東不可復還望丞相別遣機密人去操曰若他人去事恐泄漏澤再三推辭良久乃曰若去則不敢久停便當行矣操賜以金帛澤不受辭別出營再駕扁舟重回江東來見黃蓋細説前事蓋曰非公能辨則蓋徒受苦矣澤曰吾今去甘寧寨中探蔡中蔡和消息蓋曰甚善澤至寧寨寧接入澤曰將軍昨為救黃公覆被周公瑾所辱吾甚不平寧笑而不答正話間蔡和蔡中至澤以目送甘寧寧會意乃曰周公瑾只自恃其能全不以我等為念我今被辱羞見江左諸人説罷咬牙切齒拍案大叫澤乃虛與寧耳邊低語寧低頭不言長歎數聲蔡和蔡中見寧澤皆有反意以言挑之曰將軍何故煩惱先生有何不平澤曰吾等腹中之苦汝豈知耶蔡和曰莫非欲背吳投曹耶闞澤失色甘寧拔劍而起曰吾事已為窺破不可不殺之以滅口蔡和蔡中慌曰二公勿憂吾亦當以心腹之事相告寧曰可速言之蔡和曰吾二人乃曹公使來詐降者二公若有歸順之心吾當引進寧曰汝言果真二人齊聲曰安敢相欺寧佯喜曰若如此是天賜其便也二蔡曰黃公覆與將軍被辱之事吾已報知丞相矣澤曰吾已為黃公覆獻書丞相今特來見興霸相約同降耳寧曰大丈夫既遇明主自當傾心相投於是四人共飲同論心事二蔡即時寫書密報曹操説甘寧與某同為內應闞澤另自修書遣人密報曹操書中具言黃蓋欲來未得其便但看船頭插青牙旗而來者即是也卻説曹操連得二書心中疑惑不定聚衆謀士商議曰江左甘寧被周瑜所辱願為內應黃蓋受責令闞澤來納降俱未可深信誰敢直入周瑜寨中探聽實信蔣幹進曰某前日空往東吳未得成功深懷慚愧今願捨身再往務得實信回報丞相操大喜即時令蔣幹上船幹駕小舟徑到江南水寨邊便使人傳報周瑜聽得幹又到大喜曰吾之成功只在此人身上遂囑付魯肅請龐士元來為我如此如此原來襄陽龐統字士元因避亂寓居江東魯肅曾薦之於周瑜統未及往見瑜先使肅問計於統曰破曹當用何策統密謂肅曰欲破曹兵須用火攻但大江面上一船著火餘船四散除非獻連環計教他釘作一處然後功可成也肅以告瑜瑜深服其論因謂肅曰為我行此計者非龐士元不可肅曰只怕曹操姦滑如何去得周瑜沈吟未決正尋思沒個機會忽報蔣幹又來瑜大喜一面分付龐統用計一面坐於帳上使人請幹幹見不來接心中疑慮教把船於僻靜岸口纜系乃入寨見周瑜瑜作色曰子翼何故欺吾太甚蔣乾笑曰吾想與你乃舊日弟兄特來吐心腹事何言相欺也瑜曰汝要説我降除非海枯石爛前番吾念舊日交情請你痛飲一醉留你共榻你卻盜吾私書不辭而去歸報曹操殺了蔡瑁張允致使吾事不成今日無故又來必不懷好意吾不看舊日之情一刀兩段本待送你過去爭奈吾一二日間便要破曹賊待留你在軍中又必有泄漏便教左右送子翼往西山庵中歇息待吾破了曹操那時渡你過江未遲蔣幹再欲開言周瑜已入帳後去了左右取馬與蔣幹乘坐送到西山背後小庵歇息撥兩個軍人伏侍幹在庵內心中憂悶寢食不安是夜星露滿天獨步出庵後只聽得讀書之聲信步尋去見山岩畔有草屋數椽內射燈光幹往窺之只見一人挂劍燈前誦孫吳兵書幹思此必異人也叩戶請見其人開門出迎儀錶非俗幹問姓名答曰姓龐名統字士元幹曰莫非鳳雛先生否統曰然也幹喜曰久聞大名今何僻居此地答曰周瑜自恃才高不能容物吾故隱居於此公乃何人幹曰吾蔣幹也統乃邀入草庵共坐談心幹曰以公之才何往不利如肯歸曹幹當引進統曰吾亦欲離江東久矣公既有引進之心即今便當一行如遲則周瑜聞之必將見害於是與幹連夜下山至江邊尋著原來船隻飛棹投江北既至操寨幹先入見備述前事操聞鳳雛先生來親自出帳迎入分賓主坐定問曰周瑜年幼恃才欺衆不用良謀操久聞先生大名今得惠顧乞不吝教誨統曰某素聞丞相用兵有法今願一睹軍容操教備馬先邀統同觀旱寨統與操並馬登高而望統曰傍山依林前後顧盼出入有門進退曲折雖孫吳再生穰苴復出亦不過此矣操曰先生勿得過譽尚望指教於是又與同觀水寨見向南分二十四座門皆有艨艟戰艦列為城郭中藏小船往來有巷起伏有序統笑曰丞相用兵如此名不虛傳因指江南而言曰周郎周郎克期必亡操大喜回寨請入帳中置酒共飲同説兵機統高談雄辨應答如流操深敬服殷勤相待統佯醉曰敢問軍中有良醫否操問何用統曰水軍多疾須用良醫治之時操軍因不服水土俱生嘔吐之疾多有死者操正慮此事忽聞統言如何不問統曰丞相教練水軍之法甚妙但可惜不全操再三請問統曰某有一策使大小水軍並無疾病安穩成功操大喜請問妙策統曰大江之中潮生潮落風浪不息北兵不慣乘舟受此顛播便生疾病若以大船小船各皆配搭或三十為一排或五十為一排首尾用鐵環連瑣上鋪闊板休言人可渡馬亦可走矣乘此而行任他風浪潮水上下復何懼哉曹操下席而謝曰非先生良謀安能破東吳耶統曰愚淺之見丞相自裁之操即時傳令喚軍中鐵匠連夜打造連環大釘鎖住船隻諸軍聞之俱各喜悅後人有詩曰赤壁鏖兵用火攻運籌決策盡皆同若非龐統連環計公瑾安能立大功龐統又謂操曰某觀江左豪傑多有怨周瑜者某憑三寸舌為丞相説之使皆來降周瑜孤立無援必為丞相所擒瑜既破則劉備無所用矣操曰先生果能成大功操請奏聞天子封為三公之列統曰某非為富貴但欲救萬民耳丞相渡江慎勿殺害操曰吾替天行道安忍殺戮人民統拜求榜文以安宗族操曰先生家屬現居何處統曰只在江邊若得此榜可保全矣操命寫榜僉押付統統拜謝曰別後可速進兵休待周郎知覺操然之統拜別至江邊正欲下船忽見岸上一人道袍竹冠一把扯住統曰你好大膽黃蓋用苦肉計闞澤下詐降書你又來獻連環計只恐燒不盡絶你們把出這等毒手來只好瞞曹操也須瞞我不得嚇得龐統魂飛魄散正是莫道東南能制勝誰雲西北獨無人畢竟此人是誰且看下文分解
