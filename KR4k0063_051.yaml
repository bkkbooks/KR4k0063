body:
  text: 第五十一回曹仁大戰東吳兵孔明一氣周公瑾卻説孔明欲斬雲長玄德曰昔吾三人結義時誓同生死今雲長雖犯法不忍違卻前盟望權記過容將功贖罪孔明方才饒了且説周瑜收軍點將各各敘功申報吳侯所得降卒盡行發付渡江大犒三軍遂進兵攻取南郡前隊臨江下寨前後分五營周瑜居中瑜正與衆商議征進之策忽報劉玄德使孫乾來與都督作賀瑜命請入乾施禮畢言主公特命乾拜謝都督大德有薄禮上獻瑜問曰玄德在何處乾答曰現移兵屯油江口瑜驚曰孔明亦在油江否乾曰孔明與主公同在油江瑜曰足下先回某親來相謝也瑜收了禮物發付孫乾先回肅曰卻才都督為何失驚瑜曰劉備屯兵油江必有取南郡之意我等費了許多軍馬用了許多錢糧目下南郡反手可得彼等心懷不仁要就現成須放著周瑜不死肅曰當用何策退之瑜曰吾自去和他説話好便好不好時不等他取南郡先結果了劉備肅曰某願同往於是瑜與魯肅引三千輕騎徑投油江口來先説孫乾回見玄德言周瑜將親來相謝玄德乃問孔明曰來意若何孔明笑曰那裏為這些薄禮肯來相謝止為南郡而來玄德曰他若提兵來何以待之孔明曰他來便可如此如此應答遂于油江口擺開戰船岸上列著軍馬人報周瑜魯肅引兵到來孔明使趙雲領數騎來接瑜見軍勢雄壯心甚不安行至營門外玄德孔明迎入帳中各敘禮畢設宴相待玄德舉酒致謝鏖兵之事酒至數巡瑜曰豫州移兵在此莫非有取南郡之意否玄德曰聞都督欲取南郡故來相助若都督不取備必取之瑜笑曰吾東吳久欲吞併漢江今南郡已在掌中如何不取玄德曰勝負不可預定曹操臨歸令曹仁守南郡等處必有奇計更兼曹仁勇不可當但恐都督不能取耳瑜曰吾若取不得那時任從公取玄德曰子敬孔明在此為證都督休悔魯肅躊躇未對瑜曰大丈夫一言既出何悔之有孔明曰都督此言甚是公論先讓東吳去取若不下主公取之有何不可瑜與肅辭別玄德孔明上馬而去玄德問孔明曰卻才先生教備如此回答雖一時説了展轉尋思于理未然我今孤窮一身無置足之地欲得南郡權且容身若先教周瑜取了城池已屬東吳矣卻如何得住孔明大笑曰當初亮勸主公取荊州主公不聽今日卻想耶玄德曰前為景升之地故不忍取今為曹操之地理合取之孔明曰不須主公憂慮盡著周瑜去廝殺早晚教主公在南郡城中高坐玄德曰計將安出孔明曰只須如此如此玄德大喜只在江口屯扎按兵不動卻説周瑜魯肅回寨肅曰都督如何亦許玄德取南郡瑜曰吾彈指可得南郡落得虛做人情隨問帳下將士誰敢先取南郡一人應聲而出乃蔣欽也瑜曰汝為先鋒徐盛丁奉為副將撥五千精鋭軍馬先渡江吾隨後引兵接應且説曹仁在南郡分付曹洪守彜陵以為掎角之勢人報吳兵已渡漢江仁曰堅守勿戰為上驍將牛金奮然進曰兵臨城下而不出戰是怯也況吾兵新敗正當重振鋭氣某願借精兵五百決一死戰仁從之令牛金引五百軍出戰丁奉縱馬來迎約戰四五合奉詐敗牛金引軍追趕入陳奉指揮衆軍一裹圍牛金於陳中金左右衝突不能得出曹仁在城上望見牛金困在垓心遂披甲上馬引麾下壯士數百騎出城奮力揮刀殺入吳陳徐盛迎戰不能抵當曹仁殺到垓心救出牛金回顧尚有數十騎在陳不能得出遂復翻身殺入救出重圍正遇蔣欽攔路曹仁與牛金奮力沖散仁弟曹純亦引兵接應混殺一陳吳軍敗走曹仁得勝而回蔣欽兵敗回見周瑜瑜怒欲斬之衆將告免瑜即點兵要親與曹仁決戰甘寧曰都督未可造次今曹仁令曹洪據守彜陵為掎角之勢某願以精兵三千徑取彜陵都督然後可取南郡瑜服其論先教甘寧領三千兵攻打彜陵早有細作報知曹仁仁與陳矯商議矯曰彜陵有失南郡亦不可守矣宜速救之仁遂令曹純與牛金暗地引兵救曹洪曹純先使人報知曹洪令洪出城誘敵甘寧引兵至彜陵洪出與甘寧交鋒戰有二十余合洪敗走寧奪了彜陵至黃昏時曹純牛金兵到兩下相合圍了彜陵探馬飛報周瑜説甘寧困於彜陵城中瑜大驚程普曰可急分兵救之瑜曰此地正當沖要之處若分兵去救倘曹仁引兵來襲奈何呂蒙曰甘興霸乃江東大將豈可不救瑜曰吾欲自往救之但留何人在此代當吾任蒙曰留淩公績當之蒙為前驅都督斷後不須十日必奏凱歌瑜曰未知淩公績肯暫代吾任否淩統曰若十日為期可當之十日之外不勝其任矣瑜大喜遂留兵萬餘付與淩統即日起大兵投彜陵來蒙謂瑜曰彜陵南僻小路取南郡極便可差五百軍去砍倒樹木以斷其路彼軍若攻必走此路馬不能行必棄馬而走吾可得其馬也瑜從之差軍去訖大兵將至彜陵瑜問誰可突圍而入以救甘寧周泰願往即時綽刀縱馬直殺入曹軍之中徑到城下甘寧望見周泰至自出城迎之泰言都督自提兵至寧傳令教軍士嚴裝飽食準備內應卻説曹洪曹純牛金聞周瑜兵將至先使人往南郡報知曹仁一面分兵拒敵及吳兵至曹兵迎之此及交鋒甘寧周泰分兩路殺出曹兵大亂吳兵四下掩殺曹洪曹純牛金果然投小路而走卻被亂柴塞道馬不能行盡皆棄馬而走吳兵得馬五百餘匹周瑜驅兵星夜趕到南郡正遇曹仁軍來救彜陵兩軍接著混戰一場天色已晚各自收兵曹仁回城中與衆商議曹洪曰目今失了彜陵勢已危急何不拆丞相遺計觀之以解此危曹仁曰汝言正合吾意遂拆書觀之大喜便傳令教五更造飯平明大小軍馬盡皆棄城城上遍插旌旗虛張聲勢軍分三門而出卻説周瑜救出甘寧陳兵于南郡城外見曹兵分三門而出瑜上將台觀看只見女牆邊虛搠旌旗無人守護又見軍士腰下各束縛包裹瑜暗忖曹仁必先準備走路遂下將台號令分布兩軍為左右翼如前軍得勝只顧向前追趕直待鳴金方許退步命程普督後軍瑜親自引軍取城對陳鼓聲響處曹洪出馬搦戰瑜自至門旗下使韓當出馬與曹洪交鋒戰到三十余合洪敗走曹仁自出接戰周泰縱馬相迎鬥十餘合仁敗走陳勢錯亂周瑜麾兩翼軍殺出曹軍大敗瑜自引軍馬追至南郡城下曹軍皆不入城望西北而走韓當周泰引前部盡力追趕瑜見城門大開城上又無人遂令衆軍搶城數十騎當先而入瑜在背後縱馬加鞭直入甕城陳矯在敵樓上望見周瑜親入城來暗暗喝采道丞相妙策如神一聲梆子響兩邊弓弩齊發勢如驟雨爭先入城的都顛入陷坑內周瑜急勒馬回時被一弩箭正射中左肋翻身落馬牛金從城中殺出來捉周瑜徐盛丁奉二人捨命救去城中曹兵突出吳兵自相踐踏落塹坑者無數程普急收軍時曹仁曹洪分兵兩路殺回吳兵大敗幸得淩統引一軍從刺斜裏殺來敵住曹兵曹仁引得勝兵進城程普收敗軍回寨丁徐二將救得周瑜到帳中喚行軍醫者用鐵鉗子拔出箭頭將金瘡藥敷掩瘡口疼不可當飲食俱廢醫者曰此箭頭上有毒急切不能痊可若怒氣沖激其瘡復發程普令三軍緊守各寨不許輕出三日後牛金引軍來搦戰程普按兵不動牛金罵至日暮方回次日又來罵戰程普恐瑜生氣不敢報知至第三日牛金直至寨門外叫罵聲聲只道要捉周瑜程普與衆商議欲暫且退兵回見吳侯卻再理會卻説周瑜雖患瘡痛心中自有主張已知曹兵常來寨前叫罵卻不見衆將來稟一日曹仁自引大軍擂鼓呐喊前來搦戰程普拒住不出周瑜喚衆將入帳問何處鼓噪呐喊衆將曰軍中教演士卒瑜怒曰何欺我也吾已知曹兵常來寨前辱罵程德謀既同掌兵權何故坐視遂命人請程普入帳問之普曰吾見公瑾病瘡醫者言勿觸怒故曹兵搦戰不敢報知瑜曰公等不戰主意若何普曰衆將皆欲收兵暫回江東待公箭瘡平復再作區處瑜聽罷於床上奮然躍起曰大丈夫既食君祿當死於戰場以馬革裹尸還幸也豈可為我一人而廢國家大事乎言訖即披甲上馬諸軍衆將無不駭然遂引數百騎出營前望見曹兵已布成陳勢曹仁自立馬於門旗下揚鞭大罵曰周瑜孺子料必橫夭再不敢正覷我兵罵猶未絶瑜從群騎內突然出曰曹仁匹夫見周郎否曹軍看見盡皆驚駭曹仁回顧衆將曰可大罵之衆軍厲聲大罵周瑜大怒使潘璋出戰未及交鋒周瑜忽大叫一聲口中噴血墜于馬下曹兵沖來衆將向前抵住混戰一場救起周瑜回到帳中程普問曰都督貴體若何瑜密謂普曰此吾之計也普曰計將安出瑜曰吾身本無甚痛楚吾所以為此者欲令曹兵知我病危必然欺敵可使心腹軍士去城中詐降説吾已死今夜曹仁必來劫寨吾卻于四下埋伏以應之則曹仁可一鼓而擒也程普曰此計大妙隨就帳下舉起哀聲衆軍大驚盡傳言都督箭瘡大發而死各寨盡皆挂孝卻説曹仁在城中與衆商議言周瑜怒氣沖發金瘡崩裂以致口中噴血墜于馬下不久必亡正論間忽報吳寨內有十數個軍士來降中間亦有二人原是曹兵被虜過去的曹仁忙喚入問之軍士曰今日周瑜陳前金瘡碎裂歸寨即死今衆將皆已挂孝舉哀我等皆受程普之辱故特歸降便報此事曹仁大喜隨即商議今晚便去劫寨奪周瑜之尸斬其首級送赴許都陳矯曰此計速行不可遲誤曹仁遂令牛金為先鋒自為中軍曹洪曹純為合後只留陳矯領些少軍士守城其餘軍兵盡起初更後出城徑投周瑜大寨來到寨門不見一人但見虛插旗槍而已情知中計急忙退軍四下炮聲齊發東邊韓當蔣欽殺來西邊周泰潘璋殺來南邊徐盛丁奉殺來北邊陳武呂蒙殺來曹兵大敗三路軍皆被沖散首尾不能相救曹仁引十數騎殺出重圍正遇曹洪遂引敗殘軍馬一同奔走殺到五更離南郡不遠一聲鼓響淩統又引一軍攔住去路截殺一陳曹仁引軍刺斜而走又遇甘寧大殺一陳曹仁不敢回南郡徑投襄陽大路而行吳軍趕了一程自回周瑜程普收住衆軍徑到南郡城下見旌旗布滿敵樓上一將叫曰都督少罪吾奉軍師將令已取城了吾乃常山趙子龍也周瑜大怒便命攻城城上亂箭射下瑜命且回軍商議使甘寧引數千軍馬徑取荊州淩統引數千軍馬徑取襄陽然後卻再取南郡未遲正分撥間忽然探馬急來報説諸葛亮自得了南郡遂用兵符星夜詐調荊州守城軍馬來救卻教張飛襲了荊州又一探馬飛來報説夏侯惇在襄陽被諸葛亮差人齎兵符詐稱曹仁求救誘惇引兵出卻教雲長襲取了襄陽二處城池全不費力皆屬劉玄德矣周瑜曰諸葛亮怎得兵符程普曰他拿住陳矯兵符自然盡屬之矣周瑜大叫一聲金瘡迸裂正是幾郡城池無我分一場辛苦為誰忙未知性命如何且看下文分解
