body:
  text: 第五十二回諸葛亮智辭魯肅趙子龍計取桂陽卻説周瑜見孔明襲了南郡又聞他襲了荊襄如何不氣氣傷箭瘡半晌方蘇衆將再三勸解瑜曰若不殺諸葛村夫怎息我心中怨氣程德謀可助我攻打南郡定要奪還東吳正議間魯肅至瑜謂之曰吾欲起兵與劉備諸葛亮共決雌雄復奪城池子敬幸助我魯肅曰不可方今與曹操相持尚未分成敗主公現攻合淝不下不爭自家互相吞並倘曹兵乘虛而來其勢危矣況劉玄德舊曾與曹操相厚若逼得緊急獻了城池一同攻打東吳如之奈何瑜曰吾等用計策損兵馬費錢糧他去圖現成豈不可恨肅曰公瑾且耐容某親見玄德將理來説他若説不通那時動兵未遲諸將曰子敬之言甚善於是魯肅引從者徑投南郡來到城下叫門趙雲出問肅曰我要見劉玄德有話説雲答曰吾主與軍師在荊州城中肅遂不入南郡徑奔荊州見旌旗整列軍容甚盛肅暗羡曰孔明真非常人也軍士報入城中説魯子敬要見孔明令大開城門接肅入衙講禮畢分賓主而坐茶罷肅曰吾主吳侯與都督公瑾教某再三申意皇叔前者操引百萬之衆名下江南實欲來圖皇叔幸得東吳殺退曹兵救了皇叔所有荊州九郡合當歸于東吳今皇叔用詭計奪占荊襄使江東空費錢糧軍馬而皇叔安受其利恐於理未順孔明曰子敬乃高明之士何故亦出此言常言道物必歸主荊襄九郡非東吳之地乃劉景升之基業吾主固景升之弟也景升雖亡其子尚在以叔輔侄而取荊州有何不可肅曰若果系公子劉琦占據尚有可解今公子在江夏須不在這裏孔明曰子敬欲見公子乎便命左右請公子出來只見兩從者從屏風後扶出劉琦琦謂肅曰病軀不能施禮子敬勿罪魯肅吃了一驚默然無語良久言曰公子若不在便如何孔明曰公子在一日守一日若不在別有商議肅曰若公子不在須將城池還我東吳孔明曰子敬之言是也遂設宴相待宴罷肅辭出城連夜歸寨具言前事瑜曰劉琦正青春年少如何便得他死這荊州何日得還肅曰都督放心只在魯肅身上務要討荊襄還東吳瑜曰子敬有何高見肅曰吾觀劉琦過於酒色病入膏肓現今面色羸瘦氣喘嘔血不過半年其人必死那時往取荊州劉備須無得推故周瑜猶自忿氣未消忽孫權遣使至瑜令請入使曰主公圍合淝纍戰不捷特令都督收回大軍且撥兵赴合淝相助周瑜只得班師回柴桑養病令程普部領戰船士卒來合淝聽孫權調用卻説劉玄德自得荊州南郡襄陽心中大喜商議久遠之計忽見一人上廳獻策視之乃伊籍也玄德感其舊日之恩十分相敬坐而問之籍曰要知荊州久遠之計何不求賢士以問之玄德曰賢士安在籍曰荊襄馬氏兄弟五人並有才名幼者名謖字幼常其最賢者眉間有白毛名良字季常鄉里為之諺曰馬氏五常白眉最良公何不求此人而與之謀玄德遂命請之馬良至玄德優禮相待請問保守荊襄之策良曰荊襄四面受敵之地恐不可久守可令公子劉琦于此養病招諭舊人以守之就表奏公子為荊州刺史以安民心然後南征武陵長沙桂陽零陵四郡積收錢糧以為根本此久遠之計也玄德大喜遂問四郡當先取何郡良曰湘江之西零陵最近可先取之次取武陵然後湘江之東取桂陽長沙為後玄德遂用馬良為從事伊籍副之請孔明商議送劉琦回襄陽替雲長回荊州便調兵取零陵差張飛為先鋒趙雲合後孔明玄德為中軍人馬一萬五千留雲長守荊州糜竺劉封守江陵卻説零陵太守劉度聞玄德軍馬到來乃與其子劉賢商議賢曰父親放心他雖有張飛趙雲之勇我本州上將邢道榮力敵萬人可以抵對劉度遂命劉賢與邢道榮引兵萬餘離城三十裏依山靠水下寨探馬報説孔明自引一軍到來道榮便引軍出戰兩陳對圓道榮出馬手使開山大斧厲聲高叫反賊安敢侵我境界只見對陳中一簇黃旗出旗開處推出一輛四輪車車中端坐一人頭戴綸巾身披鶴氅手執羽扇用扇招邢道榮曰吾乃南陽諸葛孔明也曹操引百萬之衆被吾聊施小計殺得片甲不回汝等豈堪與我對敵我今來招安汝等何不早降道榮大笑曰赤壁鏖兵乃周郎之謀也幹汝何事敢來誑語輪大斧竟奔孔明孔明便回車望陳中走陳門復閉道榮直衝殺過來陳勢急分兩下而走道榮遙望中央一簇黃旗料是孔明乃只望黃旗而趕抹過山腳黃旗扎住忽地中央分開不見四輪車只見一將挺矛躍馬大喝一聲直取道榮乃張翼德也道榮輪大斧來迎戰不數合氣力不加撥馬便走翼德隨後趕來喊聲大震兩下伏兵齊出道榮舍死沖過前面一員大將攔住去路大叫認得常山趙子龍否道榮料敵不過又無處奔走只得下馬請降子龍縛來寨中見玄德孔明玄德喝教斬首孔明急止之問道榮曰汝若與我捉了劉賢便準你投降道榮連聲願往孔明曰你用何法促他道榮曰軍師若肯放某回去某自有巧説今晚軍師調兵劫寨某為內應活捉劉賢獻與軍師劉賢既擒劉度自降矣玄德不信其言孔明曰邢將軍非謬言也遂放道榮歸道榮得放回寨將前事實訴劉賢賢曰如之奈何道榮曰可將計就計今夜將兵伏於寨外寨中虛立旗幡待孔明來劫寨就而擒之劉賢依計當夜二更果然有一彪軍到寨口每人各帶草把一齊放火劉賢道榮兩下殺來放火軍便退劉賢道榮兩軍乘勢追趕趕了十餘裏軍皆不見劉賢道榮大驚急回本寨只見火光未滅寨中突出一將乃張翼德也劉賢叫道榮不可入寨卻去劫孔明寨便了於是復回軍走不十裏趙雲引一軍刺斜裏殺出一槍刺道榮于馬下劉賢急撥馬奔走背後張飛趕來活捉過馬綁縛見孔明賢告曰邢道榮教某如此實非本心也孔明令釋其縛與衣穿了賜酒壓驚教人送入城説父投降如其不降打破城池滿門盡誅劉賢回零陵見父劉度備述孔明之德勸父投降度從之遂於城上豎起降旗大開城門齎捧印緩出城竟投玄德大寨納降孔明教劉度仍為郡守其子劉賢赴荊州隨軍辦事零陵一郡居民盡皆喜悅玄德入城安撫已畢賞勞三軍乃問衆將曰零陵已取了桂陽郡何人敢取趙雲應曰某願往張飛奮然出曰飛亦願往二人相爭孔明曰終是子龍先應只教子龍去張飛不服定要去取孔明教拈鬮拈著的便去又是子龍拈著張飛怒曰我並不要人相幫只獨領三千軍去穩取城池趙雲曰某也只領三千軍去如不得城願受軍令孔明大喜責了軍令狀選三千精兵付趙雲去張飛不服玄德喝退趙雲領了三千人馬徑往桂陽進發早有探馬報知桂陽太守趙範範急聚衆商議管軍校尉陳應鮑隆願領兵出戰原來二人都是桂陽嶺山鄉獵戶出身陳應會使飛叉鮑隆曾射殺雙虎二人自恃勇力乃對趙範曰劉備若來某二人願為前部趙範曰我聞劉玄德乃大漢皇叔更兼孔明多謀關張極勇今領兵來的趙子龍在當陽長阪百萬軍中如入無人之境我桂陽能有多少人馬不可迎敵只可投降應曰某請出戰若擒不得趙雲那時任太守投降不遲趙范拗不過只得應允陳應領三千人馬出城迎敵早望見趙雲領軍來到陳應列成陳勢飛馬綽叉而出趙雲挺槍出馬責罵陳應曰吾主劉玄德乃劉景升之弟今輔公子劉琦同領荊州特來撫民汝何敢迎敵陳應罵曰我等只服曹丞相豈順劉備趙雲大怒挺槍驟馬直取陳應應撚叉來迎兩馬相交戰到四五合陳應料敵不過撥馬便走趙雲追趕陳應回顧趙雲馬來相近用飛叉擲去被趙雲接住回擲陳應應急躲過雲馬早到將陳應活捉過馬擲於地下喝軍士綁縛回寨敗軍四散奔走雲入寨叱陳應曰量汝安敢敵我我今不殺汝放汝回去説與趙範早來投降陳應謝罪抱頭鼠竄回到城中對趙範盡言其事範曰我本欲降汝強要戰以致如此遂叱退陳應齎捧印綬引十數騎出城投大寨納降雲出寨迎接待以賓禮置酒共飲納了印綬酒至數巡範曰將軍姓趙某亦姓趙五百年前合是一家將軍乃真定人某亦真定人又是同鄉倘得不棄結為兄弟實為萬幸雲大喜各敘年庚雲與范同年雲長長範四個月范遂拜雲為兄二人同鄉同年又同姓十分相得至晚席散範辭回城次日範請雲入城安民雲教軍士休動只帶五十騎隨入城中居民執香伏道而接雲安民已畢趙範邀請入衙飲宴酒至半酣範復邀雲入後堂深處洗盞更酌雲飲微醉範忽請出一婦人與雲把酒子龍見婦人身穿縞素有傾國傾城之色乃問範曰此何人也範曰家嫂樊氏也子龍改容敬之樊氏把盞畢範令就坐雲辭謝樊氏辭歸後堂雲曰賢弟何必煩令嫂舉杯耶範笑曰中間有個緣故乞兄勿阻先兄棄世已三載家嫂寡居終非了局弟常勸其改嫁嫂曰若得三件事兼全之人我方嫁之第一要文武雙全名聞天下第二要相貌堂堂威儀出衆第三要與家兄同姓你道天下那得有這般湊巧的今尊兄堂堂儀錶名震四海又與家兄同姓正合家嫂所言若不嫌家嫂貌陋願陪嫁資與將軍為妻結纍世之親何如雲聞言大怒而起厲聲曰吾既與汝結為兄弟汝嫂即吾嫂也豈可作此亂人倫之事乎趙範羞慚滿面答曰我好意相待如何這般無禮遂目視左右有相害之意雲已覺一拳打倒趙範徑出府門上馬出城去了范急喚陳應鮑隆商議應曰這人發怒去了只索與他廝殺範曰但恐贏他不得鮑隆曰我兩個詐降在他軍中太守卻引兵來搦戰我二人就陳上擒之陳應曰必須帶些人馬隆曰五百騎足矣當夜二人引五百軍徑奔趙雲寨來投降雲已心知其詐遂教喚入二將到帳下説趙范欲用美人計賺將軍只等將軍醉了扶入後堂謀殺將頭去曹丞相處獻功如此不仁某二人見將軍怒出必連纍於某因此投降趙雲佯喜置酒與二人痛飲二人大醉雲乃縛於帳中擒其手下人問之果是詐降雲喚五百軍入各賜酒食傳令曰要害我者陳應鮑隆也不幹衆人之事汝等聽吾行計皆有重賞衆軍拜謝將降將陳鮑二人當時斬了卻教五百軍引路雲引一千軍在後連夜到桂陽城下叫門城上聽時説陳鮑二將軍殺了趙雲回軍請太守商議事務城上將火照看果是自家軍馬趙範急忙出城雲喝左右捉下遂入城安撫百姓已定飛報玄德玄德與孔明親赴桂陽雲迎接入城推趙范於階下孔明問之範備言以嫂許嫁之事孔明謂雲曰此亦美事公何如此雲曰趙範既與某結為兄弟今若娶其嫂惹人唾罵一也其婦再嫁使失大節二也趙范初降其心難測三也主公新定江漢枕席未安雲安敢以一婦人而廢主公之大事玄德曰今日大事已定與汝娶之若何雲曰天下女子不少但恐名譽不立何患無妻子乎玄德曰子龍真丈夫也遂釋趙範仍令為桂陽太守重賞趙雲張飛大叫曰偏子龍幹得功偏我是無用之人只撥三千軍與我去取武陵郡活捉太守金旋來獻孔明大喜曰翼德要去不妨但要依一件事正是軍師決勝多奇策將士爭先立戰功未知孔明説出那一件事來且看下文分解
