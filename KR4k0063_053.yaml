body:
  text: 第五十三回關雲長義釋黃漢升孫仲謀大戰張文遠卻説孔明謂張飛曰前者子龍取桂陽郡時責下軍令狀而去今日翼德要取武陵必須也責下軍令狀方可領兵去張飛遂立軍令狀欣然領三千軍星夜投武陵界上來金旋聽得張飛引兵到乃集將校整點精兵器械出城迎敵從事鞏志諫曰劉玄德乃大漢皇叔仁義布於天下加之張翼德驍勇非常不可迎敵不如納降為上金旋大怒曰汝欲與賊通連為內變耶喝令武士推出斬之衆官皆告曰先斬家人于軍不利金旋乃喝退鞏志自率兵出離城二十裏正迎張飛飛挺矛立馬大喝金旋旋問部將誰敢出戰衆皆畏懼莫敢向前旋自驟馬舞刀迎之張飛大喝一聲渾如巨雷金旋失色不敢交鋒撥馬便走飛引衆軍隨後掩殺金旋走至城邊城上亂箭射下旋驚視之見鞏志立於城上曰汝不順天時自取敗亡吾與百姓自降劉矣言未畢一箭射中金旋面門墜于馬下軍士割頭獻張飛鞏志出城納降飛就令鞏志齎印綬往桂陽見玄德玄德大喜遂令鞏志代金旋之職玄德親至武陵安民畢馳書報雲長言翼德子龍各得一郡雲長乃回書上請曰聞長沙尚未取如兄長不以弟為不才教關某幹這件功勞甚好玄德大喜遂教張飛星夜去替雲長守荊州令雲長來取長沙雲長既至入見玄德孔明孔明曰子龍取桂陽翼德取武陵都是三千軍去今長沙太守韓玄固不足道只是他有一員大將乃南陽人姓黃名忠字漢升是劉表帳下中郎將與劉表之侄劉磐共守長沙後事韓玄雖今年近六旬卻有萬夫不當之勇不可輕敵雲長去必須多帶軍馬雲長曰軍師何故長別人鋭氣滅自己威風量一老卒何足道哉關某不須用三千軍只消本部下五百名校刀手決定斬黃忠韓玄之首獻來麾下玄德苦擋雲長不依只領五百校刀手而去孔明謂玄德曰雲長輕敵黃忠只恐有失主公當往接應玄德從之隨後引兵望長沙進發卻説長沙太守韓玄平生性急輕於殺戮衆皆惡之是時聽知雲長軍到便喚老將黃忠商議忠曰不須主公憂慮憑某這口刀這張弓一千個來一千個死原來黃忠能開二石力之弓百發百中言未畢階下一人應聲而出曰不須老將軍出戰只就某手中定活捉關某韓玄視之乃管軍校尉楊齡韓玄大喜遂令楊齡引軍一千飛奔出城約行五十裏望見塵頭起處雲長軍馬早到楊齡挺槍出馬立於陳前罵戰雲長大怒更不打話飛馬舞刀直取楊齡齡挺槍來迎不三合雲長手起刀落砍楊齡于馬下追殺敗兵直至城下韓玄聞之大驚便教黃忠出馬玄自來城上觀看忠提刀縱馬引五百騎兵飛過吊橋雲長見一老將出馬知是黃忠把五百校刀手一字擺開橫刀立馬而問曰來將莫非黃忠否忠曰既知我名焉敢犯我境雲長曰特來取汝首級言罷兩馬交鋒鬥一百餘合不分勝負韓玄恐黃忠有失鳴金收軍黃忠收軍入城雲長也退軍離城十裏下寨心中暗忖老將黃忠名不虛傳鬥一百合全無破綻來日必用拖刀計背砍贏之次日早飯畢又來城下搦戰韓玄坐在城上教黃忠出馬忠引數百騎殺過吊橋再與雲長交馬又鬥五六十合勝負不分兩軍齊聲喝采鼓聲正急時雲長撥馬便走黃忠趕來雲長方欲用刀砍去忽聽得腦後一聲響急回頭看時見黃忠被戰馬前失掀在地下雲長急回馬雙手舉刀猛喝曰我且饒你性命快換馬來廝殺黃忠急提起馬蹄飛身上馬奔入城中玄驚問之忠曰此馬久不上陳故有此失玄曰汝箭百發百中何不射之忠曰來日再戰必然詐敗誘到吊橋邊射之玄以自己所乘一匹青馬與黃忠忠拜謝而退尋思難得雲長如此義氣他不忍殺害我我又安忍射他若不射又恐違了將令是夜躊躇未定次日天曉人報雲長搦戰忠領兵出城雲長兩日戰黃忠不下十分焦躁抖擻威風與忠交馬戰不到三十餘合忠詐敗雲長趕來忠想昨日不殺之恩不忍便射帶住刀把弓虛拽弦響雲長急閃卻不見箭雲長又趕忠又虛拽雲長急閃又無箭只道黃忠不會射放心趕來將近吊橋黃忠在橋上搭箭開弓弦響箭到正射在雲長盔纓根上前面軍齊聲喊起雲長吃了一驚帶箭回寨方知黃忠有百步穿楊之能今日只射盔纓正是報昨日不殺之恩也雲長領兵而退黃忠回到城上來見韓玄玄便喝左右捉下黃忠忠叫曰無罪玄大怒曰我看了三日汝敢欺我汝前日不力戰必有私心昨日馬失他不殺汝必有關通今日兩番虛拽弓弦第三箭卻止射他盔纓如何不是外通內連若不斬汝必為後患喝令刀斧手推下城門外斬之衆將欲告玄曰但告免黃忠者便是同情剛推到門外恰欲舉刀忽然一將揮刀殺入砍死刀手救起黃忠大叫曰黃漢升乃長沙之保障今殺漢升是殺長沙百姓也韓玄殘暴不仁輕賢慢士當衆共殛之願隨我者便來衆視其人面如重棗目若朗星乃義陽人魏延也自襄陽趕劉玄德不著來投韓玄玄怪其傲慢少禮不肯重用故屈沈於此當日救下黃忠教百姓同殺韓玄袒臂一呼相從者數百餘人黃忠攔當不住魏延直殺上城頭一刀砍韓玄為兩段提頭上馬引百姓出城投拜雲長雲長大喜遂入城安撫已畢請黃忠相見忠托病不出雲長即使人去請玄德孔明卻説玄德自雲長來取長沙與孔明隨後催促人馬接應正行間青旗倒卷一鴉自北南飛連叫三聲而去玄德曰此應何禍福孔明就馬上袖占一課曰長沙郡已得又主得大將午時後定見分曉少頃見一小校飛報前來説關將軍已得長沙郡降將黃忠魏延均等主公到彼玄德大喜遂入長沙雲長接入廳上具言黃忠之事玄德乃親往黃忠家相請忠方出降求葬韓玄尸首于長沙之東後人有詩贊黃忠曰將軍氣概與天參白髮猶然困漢南至死甘心無怨望臨降低首尚懷慚寶刀燦雪彰神勇鐵騎臨風憶戰酣千古高名應不泯長隨孤月照湘潭玄德待黃忠甚厚雲長引魏延來見孔明喝令刀斧手推下斬之玄德驚問孔明曰魏延乃有功無罪之人軍師何故欲殺之孔明曰食其祿而殺其主是不忠也居其土而獻其地是不義也吾觀魏延腦後有反骨久後必反故先斬之以絶禍根玄德曰若斬此人恐降者人人自危望軍師恕之孔明指魏延曰吾今饒汝性命汝可盡忠報主勿生異心若生異心我好歹取汝首級魏延喏喏連聲而退黃忠薦劉表侄劉磐現在攸縣間居玄德取回教掌長沙郡四郡已平玄德班師回荊州改油江口為公安自此錢糧廣盛賢士歸之將軍馬四散屯於隘口且説周瑜自回柴桑養病令甘寧守巴陵郡令淩統守漢陽郡二處分布戰船聽候調遣程普引其餘將士投合淝縣來原來孫權自從赤壁鏖兵之後久在合淝與曹兵交鋒大小十余戰未決勝負不敢逼城下寨離城五十裏屯兵聞程普兵到孫權大喜親自出營勞軍人報魯子敬先至權乃下馬立待之肅慌忙滾鞍下馬施禮衆將見權如此待肅皆大驚異權請肅上馬並轡而行密謂曰孤下馬相迎足顯公否肅曰未也權曰然則何如而後為顯耶肅曰願明公威德加于四海總括九州克成帝業使肅名書竹帛始為顯矣權撫掌大笑同至帳中大設飲宴犒勞鏖兵將士商議破合淝之策忽報張遼差人來下戰書權拆書觀畢大怒曰張遼欺吾太甚汝聞程普軍來故意使人搦戰來日吾不用新軍赴敵看我大戰一場傳令當夜五更三軍出寨望合淝進發辰時左右軍馬行至半途曹兵已到兩邊布成陳勢孫權金盔金甲披挂出馬左宋謙右賈華二將使方天畫戟兩邊護衛三通鼓罷曹軍陳中門旗兩開三員將全裝慣帶立於陳前中央張遼左邊李典右邊樂進張遼縱馬當先專搦孫權決戰權綽槍欲自戰陳門中一將挺槍驟馬早出乃太史慈也張遼揮刀來迎兩將戰有七八十合不分勝負曹陳上李典謂樂進曰對面金盔者孫權也若捉得孫權足可與八十三萬大軍報仇説猶未了樂進一騎馬一口刀從刺斜裏徑取孫權如一道電光飛至面前手起刀落宋謙賈華急將畫戟遮架刀到處兩枝戟齊斷只將戟杆望馬頭上打樂進回馬宋謙綽軍士手中槍趕來李典搭上箭望宋謙心窩裏便射應弦落馬太史慈見背後有人墮馬棄卻張遼望本陳便回張遼乘勢掩殺過來吳兵大亂四散奔走張遼望見孫權驟馬趕來看看趕上刺斜裏撞出一軍為首大將乃程普也截殺一陳救了孫權張遼收軍自回合淝程普保孫權歸大寨敗軍陸續回營孫權因見折了宋謙放聲大哭長史張紘曰主公恃盛壯之氣輕視大敵三軍之衆莫不寒心即使斬將搴旗威振疆埸亦偏將之任非主公所宜也願抑賁育之勇懷王霸之計且今日宋謙死於鋒鏑之下皆主公輕敵之故今後切宜保重權曰是孤之過也從今當改之少頃太史慈入帳言某手下有一人姓戈名定與張遼手下養馬後槽是弟兄後槽被責懷怨今晚使人報來舉火為號刺殺張遼以報宋謙之仇某請引兵為外應權曰戈定何在太史慈曰已混入合淝城中去了某願乞五千兵去諸葛瑾曰張遼多謀恐有準備不可造次太史慈堅執要行權因傷感宋謙之死急要報仇遂令太史慈引兵五千去為外應卻説戈定乃太史慈鄉人當日雜在軍中隨入合淝城尋見養馬後槽兩個商議戈定曰我已使人報太史慈將軍去了今夜必來接應你如何用事後槽曰此間離中軍較遠夜間急不能進只就草堆上放起一把火你去前面叫反城中兵亂就裏刺殺張遼餘軍自走也戈定曰此計大妙是夜張遼得勝回城賞勞三軍傳令不許解甲宿睡左右曰今日全勝吳兵遠遁將軍何不卸甲安息遼曰非也為將之道勿以勝為喜勿以敗為憂倘吳兵度我無備乘虛攻擊何以應之今夜防備當比每夜更加謹慎説猶未了後寨火起一片聲叫反報者如麻張遼出帳上馬喚親從將校十數人當道而立左右曰喊聲甚急可往觀之遼曰豈有一城皆反者此是造反之人故驚軍士耳如亂者先斬無移時李典擒戈定並後槽至遼詢得其情立斬于馬前只聽得城門外鳴鑼擊鼓喊聲大震遼曰此是吳兵外應可就計破之便令人於城門內放起一把火衆皆叫反大開城門放下吊橋太史慈見城門大開只道內變挺槍縱馬先入城上一聲炮響亂箭射下太史慈急退身中數箭背後李典樂進殺出吳兵折其大半乘勢直趕到寨前陸遜董襲殺出救了太史慈曹兵自回孫權見太史慈身帶重傷愈加傷感張昭請權罷兵權從之遂收兵下船回南徐潤州比及屯住軍馬太史慈病重權使張昭等問安太史慈大叫曰大丈夫生於亂世當帶三尺劍立不世之功今所志未遂奈何死乎言訖而亡年四十一歲後人有詩贊曰矢志全忠孝東萊太史慈姓名昭遠塞弓馬震雄師北海酬恩日神亭酣戰時臨終言壯志千古共嗟咨孫權聞慈死傷悼不已命厚葬于南徐北固山下養其子太史亨於府中卻説玄德在荊州整頓軍馬聞孫權合淝兵敗已回南徐與孔明商議孔明曰亮夜觀星象見西北有星墜地必應折一皇族正言間忽報公子劉琦病亡玄德聞之痛哭不已孔明勸曰生死分定主公勿憂恐傷貴體且理大事可急差人到彼守禦城池並料理葬事玄德曰誰可去孔明曰非雲長不可即時便教雲長前去襄陽保守玄德曰今日劉琦已死東吳必來討荊州如何對答孔明曰若有人來亮自有言對答過了半月人報東吳魯肅特來吊喪正是先將計策安排定只等東吳使命來未知孔明如何對答且看下文分解
