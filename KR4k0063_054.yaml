body:
  text: 第五十四回吳國太佛寺看新郎劉皇叔洞房續佳偶卻説孔明聞魯肅到與玄德出城迎接接到公廨相見畢肅曰主公聞令侄棄世特具薄禮遣某前來致祭周都督再三致意劉皇叔諸葛先生玄德孔明起身稱謝收了禮物置酒相待肅曰前者皇叔有言公子不在即還荊州今公子已去世必然見還不識幾時可以交割玄德曰公且飲酒有一個商議肅強飲數杯又開言相問玄德未及回答孔明變色曰子敬好不通理直須待人開口自我高皇帝斬蛇起義開基立業傳至於今不幸姦雄並起各據一方少不得天道好還復歸正統我主人乃中山靖王之後孝景皇帝玄孫今皇上之叔豈不可分茅裂土況劉景升乃我主之兄也弟承兄業有何不順汝主乃錢塘小吏之子素無功德於朝廷今倚勢力占據六郡八十一州尚自貪心不足而欲併吞漢土劉氏天下我主姓劉倒無分汝主姓孫反要強爭且赤壁之戰我主多負勤勞衆將並皆用命豈獨是汝東吳之力若非我借東南風周郎安能展半籌之功江南一破休説二喬置於銅雀宮雖公等家小亦不能保適來我主人不即答應者以子敬乃高明之士不待細説何公不察之甚也一席話説得魯子敬緘口無言半晌乃曰孔明之言怕不有理爭奈魯肅身上甚是不便孔明曰有何不便處肅曰昔日皇叔當陽受難時是肅引孔明渡江見我主公後來周公瑾要興兵取荊州又是肅擋住至説待公子去世還荊州又是肅擔承今卻不應前言教魯肅如何回覆我主與周公瑾必然見罪肅死不恨只恐惹惱東吳興動干戈皇叔亦不能安坐荊州空為天下恥笑耳孔明曰曹操統百萬之衆動以天子為名吾亦不以為意豈懼周郎一小兒乎若恐先生面上不好看我勸主人立紙文書暫借荊州為本待我主別圖得城池之時便交付還東吳此論如何肅曰孔明待奪得何處還我荊州孔明曰中原急未可圖西川劉璋暗弱我主將圖之若圖得西川那時便還肅無奈只得聽從玄德親筆寫成文書一紙押了字保人諸葛孔明也押了字孔明曰亮是皇叔這裏人難道自家作保煩子敬先生也押個字回見吳侯也好看肅曰某知皇叔乃仁義之人必不相負遂押了字收了文書宴罷辭回玄德與孔明送到船邊孔明囑曰子敬回見吳侯善言伸意休生妄想若不準我文書我翻了面皮連八十一州都奪了今只要兩家和氣休教曹賊笑話肅作別下船而回先到柴桑郡見周瑜瑜問曰子敬討荊州如何肅曰有文書在此呈與周瑜瑜頓足曰子敬中諸葛之謀也名為借地實是混賴他説取了四川便還知他幾時取西川假如十年不得西川十年不還這等文書如何中用你卻與他做保他若不還時必須連纍足下主公見罪奈何肅聞言呆了半晌曰恐玄德不負我瑜曰子敬乃誠實人也劉備梟雄之輩諸葛亮姦猾之徒恐不似先生心地肅曰若此如之奈何瑜曰子敬是我恩人想昔日指囷相贈之情如何不救你你且寬心住數日待江北探細的回別有區處魯肅局蹐不安過了數日細作回報荊州城中揚起布幡做好事城外別建新墳軍士各挂孝瑜驚問曰沒了甚人細作曰劉玄德沒了甘夫人即日安排殯葬瑜謂魯肅曰吾計成矣使劉備束手就縛荊州反掌可得肅曰計將安出瑜曰劉備喪妻必將續娶主公有一妹極其剛勇侍婢數百居常帶刀房中軍器擺列遍滿雖男子不及我今上書主公教人去荊州為媒説劉備來入贅賺到南徐妻子不能勾得幽囚在獄中卻使人去討荊州換劉備等他交割了荊州城池我別有主意於子敬身上須無事也魯肅拜謝周瑜寫了書呈選快船送魯肅投南徐見孫權先説借荊州一事呈上文書權曰你卻如此糊塗這樣文書要他何用肅曰周都督有書呈在此説用此計可得荊州權看畢點頭暗喜尋思誰人可去猛然省曰非呂範不可遂召呂範至謂曰近聞劉玄德喪婦吾有一妹欲招贅玄德為壻永結姻親同心破曹以扶漢室非子衡不可為媒望即往荊州一言範領命即日收拾船隻帶數個從人望荊州來卻説玄德自沒了甘夫人晝夜煩惱一日正與孔明間敘人報東吳差呂範到來孔明笑曰此乃周瑜之計必為荊州之故亮只在屏風後潛聽但有甚説話主公都應承了留來人在館驛中安歇別作商議玄德教請呂範入禮畢坐定茶罷玄德問曰子衡來必有所諭範曰范近聞皇叔失偶有一門好親故不避嫌特來作媒未知尊意若何玄德曰中年喪妻大不幸也骨肉未寒安忍便議親範曰人若無妻如屋無梁豈可中道而廢人倫吾主吳侯有一妹美而賢堪奉箕帚若兩家共結秦晉之好則曹賊不敢正視東南也此事家國兩便請皇叔勿疑但我國太吳夫人甚愛幼女不肯遠嫁必求皇叔到東吳就婚玄德曰此事吳侯知否範曰不先稟吳侯如何敢造次來説玄德曰吾年已半百鬢髮斑白吳侯之妹正當妙齡恐非配偶範曰吳侯之妹身雖女子志勝男兒常言若非天下英雄吾不事之今皇叔名聞四海正所謂淑女配君子豈以年齒上下相嫌乎玄德曰公且少留來日回報是日設宴相待留於館舍至晚與孔明商議孔明曰來意亮已知道了適間蔔易得一大吉大利之兆主公便可應允先教孫乾和呂範回見吳侯面許已定擇日便去就親玄德曰周瑜定計欲害劉備豈可以身輕入危險之地孔明大笑曰周瑜雖能用計豈能出諸葛亮之料乎略用小謀使周瑜半籌不展吳侯之妹又屬主公荊州萬無一失玄德懷疑未決孔明竟教孫乾往江南説合親事孫乾領了言語與呂範同到江南來見孫權權曰吾願將小妹招贅玄德並無異心孫乾拜謝回荊州見玄德言吳侯專候主公去結親玄德懷疑不敢往孔明曰吾已定下三條計策非子龍不可行也遂喚趙雲近前附耳言曰汝保主公入吳當領此三個錦襄囊中有三條妙計依次而行即將三個錦囊與雲貼肉收藏孔明先使人往東吳納了聘一切完備時建安十四年冬十月玄德與趙雲孫乾取快船十隻隨行五百餘人離了荊州前往南徐進發荊州之事皆聽孔明裁處玄德心中怏怏不安到南徐州船已傍岸雲曰軍師分付三條妙計依次而行今已到此當先開第一個錦囊來看於是開囊看了計策便喚五百隨行軍士一一分付如此如此衆軍領命而去又教玄德先往見喬國老那喬國老乃二喬之父居於南徐玄德牽羊擔酒先往拜見説呂範為媒娶夫人之事隨行五百軍士俱披紅挂彩入南徐買辦物件傳説玄德入贅東吳城中人盡知其事孫權知玄德已到教呂範相待且就館舍安歇卻説喬國老既見玄德便入見吳國太賀喜國太曰有何喜事喬國老曰令愛已許劉玄德為夫人今玄德已到何故相瞞國太驚曰老身不知此事便使人請吳侯問虛實一面先使人於城中探聽人皆回報果有此事女壻已在館驛安歇五百隨行軍士都在城中買豬羊果品準備成親做媒的女家是呂範男家是孫乾俱在館驛中相待國太吃了一驚少頃孫權入後堂見母親國太捶胸大哭權曰母親何故煩惱國太曰你直如此將我看承得如無物我姐姐臨危之時分付你甚麼話來孫權失驚曰母親有話明説何苦如此國太曰男大須婚女大須嫁古今常理我為你母親事當稟命於我你招劉玄德為壻如何瞞我女兒須是我的權吃了一驚問曰那裏得這話來國太曰若要不知除非莫為滿城百姓那一個不知你倒瞞我喬國老曰老夫已知多日了今特來賀喜權曰非也此是周瑜之計因要取荊州故將此為名賺劉備來拘囚在此要他把荊州來換若其不從先斬劉備此是計策非實意也國太大怒罵周瑜曰汝做六郡八十一州大都督直恁無條計策去取荊州卻將我女兒為名使美人計殺了劉備我女便是望門寡明日再怎的説親須誤了我女兒一世你們好做作喬國老曰若用此計便得荊州也被天下人恥笑此事如何行得説得孫權默然無語國太不住口的罵周瑜喬國老勸曰事已如此劉皇叔乃漢室宗親不如真個招他為壻免得出醜權曰年紀恐不相當國老曰劉皇叔乃當世豪傑若招得這個女壻也不辱了令妹國太曰我不曾認得劉皇叔明日約在甘露寺相見如不中我意任從你們行事若中我的意我自把女兒嫁他孫權乃大孝之人見母親如此言語隨即應承出外喚呂範分付來日甘露寺方丈設宴國太要見劉備呂範曰何不令賈華部領三百刀斧手伏於兩廊若國太不喜時一聲號舉兩邊齊出將他拿下權遂喚賈華分付預先準備只看國太舉動卻説喬國老辭吳國太歸使人去報玄德言來日吳侯國太親自要見好生在意玄德與孫乾趙雲商議雲曰來日此會多凶少吉雲自引五百軍保護次日吳國太喬國老先在甘露寺方丈裏坐定孫權引一班謀士隨後都到卻教呂範來館驛中請玄德玄德內披細鎧外穿錦袍從人背劍緊隨上馬投甘露寺來趙雲全裝慣帶引五百軍隨行來到寺前下馬先見孫權權觀玄德儀錶非凡心中有畏懼之意二人敘禮畢遂入方丈見國太國太見了玄德大喜謂喬國老曰真吾壻也國老曰玄德有龍鳳之姿天日之表更兼仁德布於天下國太得此佳壻真可慶也玄德拜謝共宴于方丈之中少刻子龍帶劍而入立于玄德之測國太問曰此是何人玄德答曰常山趙子龍也國太曰莫非當陽長阪抱阿斗者乎玄德曰然國太曰真將軍也遂賜以酒趙雲謂玄德曰卻才某於廊下巡視見房內有刀斧手埋伏必無好意可告知國太玄德乃跪於國太席前泣而告曰若殺劉備就此請誅國太曰何出此言玄德曰廊下暗伏刀斧手非殺劉備而何國太大怒責罵孫權今日玄德既為我壻即我之兒女也何故伏刀斧手於廊下權推不知喚呂範問之范推賈華國太喚賈華責罵華默然無言國太喝令斬之玄德告曰若斬大將于親不利備難久居膝下矣喬國老也相勸國太方叱退賈華刀斧手皆抱頭鼠竄而去玄德更衣出殿前見庭下有一石塊玄德拔從者所佩之劍仰天祝曰若劉備能勾回荊州成王霸之業一劍揮石為兩段如死於此地劍剁石不開言訖手起劍落火光迸濺砍石為兩段孫權在後面看見問曰玄德公如何恨此石玄德曰備年近五旬不能為國家剿除賊黨心常自恨今蒙國太招為女壻此平生之際遇也恰才問天買卦如破曹興漢砍斷此石今果然如此權暗思劉備莫非用此言瞞我亦掣劍謂玄德曰吾亦問天買卦若破得曹賊亦斷此石卻暗暗祝告曰若再取得荊州興旺東吳砍石為兩半手起劍落巨石亦開至今有十字紋恨石尚存後人觀此勝迹作詩贊曰寶劍落時山石斷金環響處火光生兩朝旺氣皆天數從此乾坤鼎足成二人棄劍相攜入席又飲數巡孫乾目視玄德玄德辭曰備不勝酒力告退孫權送出寺前二人並立觀江山之景玄德曰此乃天下第一江山也至今甘露寺碑上雲天下第一江山後人有詩贊曰江山雨霽擁青螺境界無憂樂最多昔日英雄凝目處岩崖依舊抵風波二人共覽之次江風浩蕩洪波滾雪白浪掀天忽見波上一葉小舟行于江面上如行平地玄德歎曰南人駕船北人乘馬信有之也孫權聞言自思曰劉備此言戲我不慣乘馬耳乃令左右牽過馬來飛身上馬馳驟下山復加鞭上嶺笑謂玄德曰南人不能乘馬乎玄德聞言撩衣一躍躍上馬背飛走下山復馳騁而上二人立馬於山坡之上揚鞭大笑至今此處名為駐馬坡後人有詩曰馳驟龍駒氣概多二人並轡望山河東吳西蜀成王霸千古猶存駐馬坡當日二人並轡而回南徐之民無不稱賀玄德自回館驛與孫乾商議乾曰主公只是哀求喬國老早早畢姻免生別事次日玄德復至喬國老宅前下馬國老接入禮畢茶罷玄德告曰江左之人多有要害劉備者恐不能久居國老曰玄德寬心吾為公告國太令作護持玄德拜謝自回喬國老入見國太言玄德恐人謀害急急要回國太大怒曰我的女壻誰敢害他即時便教搬入書院暫住擇日畢姻玄德自入告國太曰只恐趙雲在外不便軍士無人約束國太教盡搬入府中安歇休留在館驛中免得生事玄德暗喜數日之內大排筵會孫夫人與玄德結親至晚客散兩行紅炬接引玄德入房燈光之下但見槍刀簇滿侍婢皆佩劍懸刀立於兩傍唬得玄德魂不附體正是驚看侍女橫刀立疑是東吳設伏兵畢竟是何緣故且看下文分解
