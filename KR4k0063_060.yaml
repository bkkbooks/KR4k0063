body:
  text: 第六十回張永年反難楊修龐士元議取西蜀卻説那進計于劉璋者乃益州別駕生張名松字永年其人生得額钁頭尖鼻偃齒露身短不滿五尺言語有若銅鍾劉璋問曰別駕有何高見可解張魯之危松曰某聞許都曹操掃蕩中原呂布二袁皆為所滅近又破馬超天下無敵矣主公可備進獻之物松親往許都説曹操興兵取漢中以圖張魯則魯拒敵不暇何敢復窺蜀中耶劉璋大喜收拾金珠錦綺為進獻之物遣張松為使松乃暗畫西川地理圖本藏之帶從人數騎取路赴許都早有人報入荊州孔明便使人入許都打探消息卻説張松到了許都館驛中住定每日去相府伺侯候求見曹操原來曹操自破馬超回傲睨得志每日飲宴無事少出國政皆在相府商議張松候了三日方得通姓名左右近侍先要賄賂卻才引入操坐於堂上松拜畢操問曰汝主劉璋連年不進貢何也松曰為路途艱難賊寇竊發不能通進操叱曰吾掃清中原有何盜賊松曰南有孫權北有張魯西有劉備至少者亦帶甲十余萬豈得為太平耶操先見張松人物猥瑣五分不喜又聞語言衝撞遂拂袖而起轉入後堂左右責松曰汝為使命何不知禮一味衝撞幸得丞相看汝遠來之面不見罪責汝可急急回去松笑曰吾川中無諂佞之人也忽然階下一人大喝曰汝川中不會諂佞吾中原豈有諂佞者乎松觀其人單眉細眼貌白神清問其姓名乃太尉楊彪之子楊修字德祖現為丞相門下掌庫主薄此人博學能言智識過人松知修是個舌辨之士有心難之修亦自恃其才小覷天下之士當時見張松言語譏諷遂邀出外面書院中分賓主而坐謂松曰蜀道崎嶇遠來勞苦松曰奉主之命雖赴湯蹈火弗敢辭也修問蜀中風土何如松曰蜀為西郡古號益州路有錦江之險地連劍閣之雄回還二百八程縱橫三萬餘裏雞鳴犬吠相聞市井閭閻不斷田肥地茂歲無水旱之憂國富民豐時有管弦這樂所産之物阜如山積天下莫可及也修又問曰蜀中人物如何松曰文有相如之賦武有伏波之才醫有仲景之能卜有君平之隱九流三教出乎其類拔乎其萃者不可勝記豈能盡數修又問曰方今劉季玉手下如公者還有幾人松曰文武全才智勇足備忠義慷慨之士動以百數如松不才之輩車載斗量不可勝記修曰公近居何職松曰濫充別駕之任甚不稱職敢問公為朝廷何官修曰現為丞相府主薄松曰久聞公世代簪纓何不立於廟堂輔佐天子乃區區作相府門下一吏乎楊修聞言滿面羞慚強顔而答曰某雖居下寮丞相委以軍政錢糧之重早晚多蒙丞相教誨極有開發故就此職耳松笑曰松聞曹丞相文不明孔孟之道武不達孫吳之機專務強霸而居大位安能有所教誨以開發明公耶修曰公居邊隅安知丞相大才乎吾試令公觀之呼左右於篋中取書一卷以示張松松觀其題曰孟德新書從頭至尾看了一遍了共一十三篇皆用兵之要法松看畢問曰公以此為何書耶修曰此是丞相酌古準今仿孫子十三篇而作公欺丞相無才此堪以傳後世否松大笑曰此書吾蜀中三尺小童亦能暗誦何為新書此是戰國時無名氏所作曹丞相盜竊以為已能止好瞞足下耳修曰丞相祕藏之書雖已成帙未傳於世公言蜀中小兒暗誦如流何相欺乎松曰公如不信吾試誦之遂將孟德新書從頭至尾朗誦一遍並無一字差錯修大驚曰公過目不忘真天下奇才也後人有詩贊曰古怪形容異清高體貌疏語傾三峽水目視十行書膽量魁西蜀文章貫太虛百家並諸子一覽更無餘當下張松欲辭回修曰公且暫居館舍容某再稟丞相令公面君松謝而退修入見操曰適來丞相何慢張松乎操曰言語不遜吾故慢之修曰丞相尚容一禰衡何不納張松操曰禰衡文章播於當今吾故不忍殺之松有何能修曰且無論其口似懸河辨才無礙適修以丞相所撰孟德新書示之彼觀一遍即能暗誦如此博聞強記世所罕有松言此書乃戰國時無名氏所作蜀中小兒皆能熟記操曰莫非古人與我暗合否令扯碎其書燒之修曰此人可使面君教見天朝氣象操曰來日我於西教場點軍汝可先引他來使見我軍容之盛教他回去傳説吾即日下了江南便來收川修領命至次日與張松同至西教場操點虎衛雄兵五萬布於教場中果然盔甲鮮明衣袍燦爛金鼓震天戈矛耀日四方八面各分隊伍旌旗揚彩人馬騰空松斜目視之良久操喚松指而示曰汝川中曾見此英雄人物否松曰吾蜀中不曾見此兵革但以仁義治人操變色視之松全無懼意楊修頻以目視松操謂松曰吾視天下鼠輩猶草芥耳大軍到處戰無不勝攻無不取順吾者生逆吾者死汝知之乎松曰丞相驅兵到處戰必勝攻必取松亦素知昔日濮陽攻呂布之時宛城戰張繡之日赤壁遇周郎華容逢關羽割須棄袍於潼關奪船避箭于渭水此皆無敵於天下也操大怒曰豎儒怎敢揭吾短處喝令左右推出斬之楊修諫曰松雖可斬奈從蜀道而來入貢若斬之恐失遠人之意操怒氣未息荀彧亦諫操方免其死令亂棒打出松歸館舍連夜出城收拾回川松自思曰吾本欲獻西川州郡與曹操誰想如此慢人我來時于劉璋之前開了大口今日怏怏空回須被蜀中人所笑吾聞荊州劉玄德仁義遠播久矣不如徑由那條路回試看此人如何我自有主見於是乘馬引僕從望荊州界上而來前至郢州界口忽見一隊軍馬約有五百餘騎為首一員大將輕妝軟扮勒馬前問曰來者莫非張別駕乎松曰然也那將慌忙下馬聲喏曰趙雲等候多時松下馬答禮曰莫非常山趙子龍乎雲曰然也某奉主公劉玄德之命為大夫遠涉路途鞍馬驅馳特命趙雲聊奉酒食言罷軍士跪奉酒食雲敬進之松自思曰人言劉玄德寬仁愛客今果如此遂與趙雲飲了數杯上馬同行來到荊州界首是日天晚前到館驛見驛門外百餘人侍立擊鼓相接一將于馬前施禮曰奉兄長將令為大夫遠涉風塵令關某灑掃驛庭以待歇宿松下馬與雲長趙雲同入館舍講禮敘坐須臾排上酒筵二人殷相勸飲至更闌方始罷席宿了一宵次日早膳畢上馬行不到三五裏只見一簇人馬到乃是玄德引著伏龍鳳雛親自來接遙見張松早先下馬等候松亦慌忙下馬相見玄德曰久聞大夫高名如雷灌耳恨雲山遙遠不得聽教今聞回都專此相接倘蒙不棄到荒州暫歇片時以敘渴仰之思實為萬幸松大喜遂上馬並轡入城至府堂各各敘禮分賓主依次而坐設宴款待飲酒間玄德只説間話並不起起西川之事松以言挑之曰今皇叔守荊州還有幾郡孔明答曰荊州乃暫借東吳的每每使人取討今我主因是東吳女壻故權且在此安身松曰東吳據六郡八十一州民強國富猶且不知足耶龐統曰吾主漢朝皇叔反不能占據州郡其他皆漢之蟊賊卻都恃強侵占地土惟智者不平焉玄德曰二公休言吾有何德敢多望乎松曰不然明公乃漢室宗親仁義充塞乎四海休道占據州郡便代正統而居帝位亦非分外玄德拱手謝曰公言太過備何敢當自此一連留張松飲宴三日並不提起川中之事松辭去玄德於十裏長亭設宴送行玄德舉酒酌松曰甚荷大夫不外留敘三日今日相別不知何時再得聽教言罷潸然淚下張松自思玄德如此寬仁愛士安可舍之不如説之令取西川乃言曰松亦思朝暮趨侍恨未有便耳松觀荊州東有孫權常懷虎踞北有曹操每欲鯨吞亦非可久戀之地也玄德曰故知如此但未有安迹之所松曰益州險塞沃野千里民殷國富智者之士久慕皇叔之德若起荊襄之衆長驅西指霸業可成漢室可興矣玄德曰備安敢當此劉益州亦帝室宗親恩澤布蜀中久矣他人豈可得而動搖乎松曰某非賣主求榮今遇明公不敢不披瀝肝膽劉季玉雖有益州之地稟性暗弱不能任賢用能加之張魯在北時思侵犯人心離散思得明主松此一行專欲納款於操何期逆賊恣逞姦雄傲賢慢士故特來見明公明公先取西川為基然後北圖漢中收取中原匡正天朝名垂青史功莫大焉明公果有取西川之意松願施犬馬之勞以為內應未知鈞意若何玄德曰深感君之厚意奈劉季玉與備同宗若攻之恐天下人唾罵松曰大丈夫處世當努力建功立業著鞭在先今若不取為他人所取悔之晚矣玄德曰備聞蜀道崎嶇千山萬水車不能方軌馬不能聯轡雖欲取之用何良策松於袖中取出一圖遞與玄德曰松感明公盛德敢獻此圖但看此圖便知蜀中道路矣玄德略展視之上面盡寫著地理行程遠近闊狹山川險要府庫錢糧一一俱載明白松曰明公可速圖之松有心腹契友二人法正孟達此二人必能相助如二人到荊州時可以心事共議玄德供手謝曰青山不老緑水長存他日事成必當厚報松曰松遇明主不得不盡情相告豈敢望報乎説罷作別孔明命雲長等護送數十裏方回張松回益州先見友人法正正字孝直右扶風郡人也賢士法真之子松見正備説曹操輕賢傲士只可同憂不可同樂吾已將益州許劉皇叔矣專欲與兄共議法正曰吾料劉璋無能已有心見劉皇叔久矣此心相同又何疑焉少頃孟達至達字子慶與法正同鄉達入見正與松密語達曰吾已知二公之意將欲獻益州耶松曰是欲如此兄試猜之合獻與誰達曰非劉玄德不可三人撫掌大笑法正謂松曰兄明日見劉璋當若何松曰吾薦二公為使可往荊州二人應允次日張松見劉璋璋問幹事若何松曰操乃漢賊欲篡天下不可為言彼已有取川之心璋曰似此如之奈何松曰松有一謀使張魯曹操必不敢輕犯西川璋曰何計松曰荊州劉皇叔與主公同宗仁慈寬厚有長者風赤壁鏖兵之後操聞之而膽裂何況張魯乎主公何不遣使結好使為外援可以拒曹操張魯矣璋曰吾亦有此心久矣誰可為使松曰非法正孟達不可往也璋即召二人入修書一封令法正為使先通情好次遣孟達領精兵五千迎玄德入川為援正商議間一人自外突入汗流滿面大叫曰主公若聽張松之言由四十一州郡已屬他人矣松大驚視其人乃巴西閬中人姓黃名權字公衡現為劉璋府下主薄璋問曰玄德與我同宗吾故結之為援汝何出此言權曰某素知劉備寬以待人柔能克剛英雄莫敵遠得人心近得民望兼有諸葛亮龐統之智謀關張趙雲黃忠魏延為羽翼若召到蜀中以部曲待之劉備安肯伏低做小若以客禮待之又一國不容二主今聽臣言則西蜀有泰山之安不聽臣言則主公有纍卵之危矣張松昨從荊州過必與劉備同謀可先斬張松後絶劉備則西川萬幸也璋曰曹操張魯到來何以拒之權曰不如閉境絶塞深溝高壘以待時清璋曰賊兵犯界有燒眉之急若待時清則是慢計也遂不從其言遣法正行又一人阻曰不可不可璋視之乃帳前從事官王纍也纍頓首言曰主公今聽張松之説自取其禍璋曰不然吾結好劉玄德實欲拒張魯也纍曰張魯犯界乃癬疥之疾劉備入川乃心腹之大患況劉備世之梟雄先事曹操便思謀害後從孫權便奪荊州心術如此安可同處乎今若召來西川休矣璋叱曰再休亂道玄德是我同宗他安肯奪我基業便教扶二人出遂命法正便行法正離益州徑取荊州來見玄德參拜已畢呈上書信玄德拆封視之書曰族弟劉璋再拜致書于玄德宗兄將軍麾下久伏電天蜀道崎嶇未及齎貢甚切惶愧璋聞吉凶相救患難相扶朋友尚然況宗族乎今張魯在北旦夕興兵侵犯璋界甚不自安專人謹奉尺書上乞鈞聽倘念同宗之情全手足之義即日興師剿滅狂寇永不唇齒自有重酬書不盡言專候車騎玄德看畢大喜設宴相待法正酒過數巡玄德屏退左右密謂正曰久仰孝直英名張別駕多談盛德今獲聽教甚慰平生法正謝曰蜀中小吏何足道哉蓋聞馬逢伯樂而嘶人遇知已而死張別駕昔日之言將軍復有意乎玄德曰備一身寄客未嘗不傷感而歎息嘗思鷦鷯尚存一枝狡兔猶藏三窟何況人乎蜀中豐餘之地非不欲取奈劉季玉系備同宗不忍相圖法正曰益州天府之國非治亂之主不可居也今劉季玉不能用賢此業不久必屬他人今日自付與將軍不可錯失豈不聞逐兔先得之語乎將軍欲取某當效死玄德拱手謝曰尚容商議當日席散孔明親送法正歸館舍玄德獨坐沈吟龐統進曰事當決而不決者愚人也主公高明何多疑耶玄德問曰以公之意當復何如統曰荊州東有孫權北有曹操難以得志益州戶口百萬土廣財富可資大業今幸張松法正為內助此天賜也何必疑哉玄德曰今與吾水火相敵者曹操也操以急吾以寬操以暴吾以仁操以譎吾以忠每與操相反事乃可成若以小利而失信義於天下吾不忍也龐統笑曰主公之言雖合天理奈離亂之時用兵爭強固非一道若拘執常理寸步不可行矣宜從權變且兼弱攻昧逆取順守湯武之道也若事定之後報之以義封為大國何負於信今日不取終被他人取耳主公幸熟思焉玄德乃恍然曰金石之言當銘肺腑於是遂請孔明同議起兵西行孔明曰荊州重地必須分兵守之玄德曰吾與龐士元黃忠魏延前往西川軍師可與關雲長張翼德趙子龍守荊州孔明應允於是孔明總守荊州關公拒襄陽要路當青泥隘口張飛領四郡巡江趙雲屯江陵鎮公安玄德令黃忠為前部魏延為後軍玄德自與劉封關平在中軍龐統為軍師馬步兵五萬起程西行臨行時忽廖化引一軍來降玄德便教廖化輔佐增雲長以拒曹操是年冬月引兵望西川進發行不數程孟達接著拜見玄德説劉益州令某領兵五千遠來迎接玄德使人入益州先報劉璋璋便以書告報沿途州郡供給錢糧璋欲自出涪城親接玄德即下令準備車乘帳幔旌旗鎧甲務要鮮明主薄黃權入諫曰主公此去必被劉備之害某食祿多年不忍主公中他人姦計望三思之張松曰黃權此言疏間宗族之義滋長寇盜之威實無益於主公璋乃叱權曰吾意已決汝何逆曰權叩首流血近前口銜璋衣而諫璋大怒扯衣而起權不放頓落門牙兩個璋喝左右推出黃權權大哭而歸璋欲行一人叫曰主公不納黃公衡忠言乃欲自就死地耶伏於階前而諫璋視之乃建寧俞元人也姓李名恢叩首諫曰竊聞君有諍臣父有諍子黃公衡忠義之言必當聽從若容劉備入川是猶迎虎於門也璋曰玄德是吾宗兄安肯害吾再言者必斬叱左右推出李恢張松曰今蜀中文官各顧妻子不復為主公效力諸將恃功驕傲各有外意不得劉皇叔則敵攻於外民攻於內必敗之道也璋曰公所謀深于吾有益次日上馬出榆橋門人報從事王纍自用繩索倒吊於城門之上一手執諫章一手仗劍口稱如諫不從自割斷其繩索撞死於此地劉璋教取所執諫章觀之其略曰益州從事臣王纍泣血懇告竊聞良藥苦口利於病忠言逆耳利於行昔楚懷王不聽屈原之言會盟于武關為秦所困今主公輕離大郡欲迎劉備於涪城恐有去路而無回路矣倘能斬張松於市絶劉備之約則蜀中老幼幸甚主公之基業亦幸甚劉璋觀畢大怒曰吾與仁人相會如親芝蘭汝何數侮於吾耶王纍大叫一聲自割斷其索撞死於地後人詩歎曰倒挂城門捧諫章拚將一死報劉璋黃權折齒終降備矢節何如王纍剛劉璋將三萬人馬往涪城來後軍裝載資糧錢帛一千餘輛來接玄德卻説玄德前軍已到墊江所到之處一者是西川供給二者是玄德號令嚴明如有妄取百姓一物者斬於是所到之處秋亳無犯百姓扶老攜幼滿路瞻觀焚香禮拜玄德皆用好言撫慰卻説法正密謂龐統曰近張松有密書到此言於涪城相會劉璋便可圖之機會切不可失統曰此意且勿言待二劉相見乘便圖之若預走泄於中有變法正乃祕而不言涪城離成都三百六十裏璋已到使人迎接玄德兩軍皆屯于涪江之上玄德入城與劉璋相見各敘兄弟之情禮畢揮淚訴告衷情飲宴畢各回寨中安歇璋謂衆官曰可笑黃權王纍等輩不知宗兄之心妄相猜疑吾今日見之真仁義之人也吾得他為外援又何慮曹操張魯耶非張松則失之矣乃脫所穿緑袍並黃金五百兩令人往成都賜與張松時部下將佐劉璝泠苞張任鄧賢等一班文武官曰主公且休歡喜劉備柔中有剛其心未可測還宜防之璋笑曰汝等皆多慮吾兄豈有二心哉衆皆嗟歎而退卻説玄德歸到寨中龐統入見曰主公今日席上見劉季玉動靜乎玄德曰季玉真誠實人也統曰季玉雖善其臣劉璝張任等皆有不平之色其間吉凶未可保也以統之計莫若來日設宴請季玉赴席於壁衣中埋伏刀斧手一百人主公擲杯為號就筵上殺之一擁入成都刀不出鞘弓不上弦可坐而定也玄德曰季玉是吾同宗誠心待吾更兼吾初到蜀中恩信未立若行此事上天不容下民亦怨公此謀雖霸者亦不為也統曰此非統之謀是法孝直得張松密書言事不宜遲只在早晚當圖之言未已法正入見曰某等非為自己乃順天命也玄德曰劉季玉與吾同宗不忍取之正曰明公差矣若不如此張魯與蜀有殺母之仇必來攻取明公遠涉山川驅馳士馬既到此地進則有功退則無益若執孤疑之心遷延日久大為失計且恐機謀一泄反為他人所算不若乘此天與人歸之時出其不意早立基業實為上策龐統亦再三相勸正是人主幾番存厚道才臣一意進權謀未知玄德心下如何且看下文分解
