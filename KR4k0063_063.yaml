body:
  text: 第六十三回諸葛亮痛哭龐統張翼德義釋嚴顔卻説法正與那人相見各撫掌而笑龐統問之正曰此公乃廣漢人姓彭名羕字永言蜀中豪傑也因直言觸忤劉璋被璋髡鉗為徒隸因此短髮統乃以賓禮待之問羕從何而來羕曰吾特來救汝數萬人性命見劉將軍方可説法正忙報玄德玄德親自謁見請問其故羕曰將軍有多少軍馬在前寨玄德實告有魏延黃忠在彼羕曰為將之道豈可不知地理乎前寨緊靠涪江若決動江水前後以兵塞之一人無可逃也玄德大悟彭羕曰罡星在西方太白臨於此地當有不吉之事切宜慎之玄德即拜彭羕為幕賓使人密報魏延黃忠教朝暮用心巡警以防決水黃忠魏延商議二人各輪一日如遇敵軍到來互相通報卻説泠苞見當夜風雨大作引了五千軍徑循江邊而進安排決江只聽到後面喊聲亂起泠苞知有準備急急回軍前面魏引軍趕來川兵自相踐踏泠苞正奔走間撞著魏延交馬不數合被魏延活捉去了比及吳蘭雷銅來接應時又被黃忠一軍殺退魏延解泠苞到涪關玄德責之曰吾以仁義相待放汝回去何敢背我今次難饒將泠苞推出斬了重賞魏延玄德設宴管待彭羕忽報荊州諸葛亮軍師特遣馬良奉書至此玄德召入問之馬良禮畢曰荊州平安不勞主公憂念遂呈上軍師書信玄德拆書觀之略雲亮夜算太乙數今年歲次癸巳罡星在西方又觀乾象太白臨於雒城之分主將帥身上多凶少吉切宜謹慎玄德看了書便教馬良先回玄德曰吾將回荊州去論此事龐統暗思孔明怕我取了西川成了功故意將此書相阻耳乃對玄德曰統亦算太乙數已知罡星在西應主公合得西川別不主凶事統亦占天文見太白臨於雒城先斬蜀將泠苞已應凶兆矣主公不可疑心可急進兵玄德見龐統再三催促乃引軍前進黃忠同魏延接入寨去龐統問法正曰前至雒城有多少路法正畫地作圖玄德取張松所遺圖本對之並無差錯法正言山北有條大路正取雒城東門山南有條小路卻取雒城西門兩條路皆可進兵龐統謂玄德曰統令魏延為先鋒取南小路而進主公令黃忠作先鋒從山北大路而進並到雒城取齊玄德曰吾自幼熟于弓馬多行小路軍師可從大路去取東門吾取西門龐統曰大路必有軍邀攔主公引兵當之統取小路玄德曰軍師不可吾夜夢一神人手執鐵棒擊吾右臂覺來猶自臂疼此行莫非不佳龐統曰壯士臨陳不死帶傷理之自然也何故夢寐之事疑心乎玄德曰吾所疑者孔明之書也軍師還守涪關如何龐統大笑曰主公被孔明所惑矣彼不欲令統獨成大功故作此言以疑主公之心心疑則致夢何凶之有統肝腦塗地方稱本心主公再勿多言來早準行當日傳下號令軍士五更造飯平明上馬黃忠魏延領軍先行玄德再與龐統約會忽坐下馬眼生前失把龐統掀將下來玄德跳下馬自來籠住那馬玄德曰軍師何故乘此劣馬龐統曰此馬乘久不曾如此玄德曰臨陳眼生誤人性命吾所騎白馬性極馴熟軍師可騎萬無一失劣馬吾自乘之遂與龐統更換所騎之馬龐統謝曰深感主公恩厚雖萬死亦不能報也遂各上馬取路而進玄德見龐統去了心中甚覺不快怏怏而行卻説雒城中吳懿劉璝聽知折了泠苞遂與衆商議張任曰城東南山僻有一條小路最為要緊某自引一軍守之諸公緊守雒城勿得有失忽報漢兵兩路前來攻城張任急引三千軍先來抄小路埋伏見魏延兵過張任教盡放過去休得驚動後見龐統軍到來張任軍士遙指軍中大將騎白馬者必是劉備張任大喜傳令教如此如此卻説龐統迤邐前進擡頭見兩山逼窄樹木叢雜又值夏末秋初枝葉茂盛龐統心下甚疑勒住馬匹問此處是何地數內有新降軍士指道此處地名落鳳坡龐統驚曰吾道號鳳雛此處名落鳳坡不利於吾令後軍疾退只見山坡前一聲炮響箭如飛蝗只望騎白馬者射來可憐龐統竟死於亂箭之下時年止三十六歲後人有詩歎曰古峴相連紫翠堆士元有宅傍山隈兒童慣識呼鳩曲閭巷曾聞展驥才預計三分平刻削長驅萬里獨俳徊誰知天狗流星墜不使將軍衣錦回先是東南有童謠雲一鳳並一龍相將到蜀中才到半路裏鳳死落坡東風送雨雨隨風隆漢興時蜀道通蜀道通時只有龍當日張任射死龐統漢軍擁塞進退不得死者大半前軍飛報魏延魏延忙勒馬欲回奈山路逼窄廝殺不得又被張任截斷歸路在高阜處用強弓硬弩射來魏延心慌有新降蜀兵曰不如殺奔雒城下取大路而進延從其言當先開路殺奔雒城來塵埃起處前面一軍殺至乃雒城守將吳雷銅也後面張任引兵追來前後夾攻把魏延圍在垓心魏延死戰不能得脫但見吳蘭雷銅後軍自亂二將急回馬去救魏延乘勢趕去當先一將舞刀拍馬大叫文長吾特來救汝視之乃老將黃忠也兩人夾攻殺敗吳蘭雷二將直沖至雒城之下劉璝引兵殺出卻得玄德在後當住接應黃忠魏延翻身便回玄德軍馬比及奔到寨中張任軍馬從小路裏截出劉璝吳蘭雷銅當先趕來玄德守不住二寨且戰且走奔回涪關蜀兵得勝迤邐追趕玄德人困馬乏那裏有心廝殺且只顧奔走將近涪關張任一軍追趕至緊幸得左邊劉封右邊關平二將領三萬生力軍截出殺退張任還趕二十裏奪回戰馬極多玄德一行軍馬再入涪關問龐統消息有落鳳坡逃得性命的軍士報説軍師連人帶馬被亂箭射死於坡前玄德聞言望西痛哭不已遙為招魂設祭諸將皆哭黃忠曰今番折了龐統軍師張任必然來攻打涪關如之奈何不若差人往荊州請諸葛軍師來商議收川之計正説之間人報張任引軍直臨城下搦戰黃忠魏延皆要出戰玄德曰鋭氣新挫宜堅守以待軍師來到黃忠魏延領命只謹守城池玄德寫一封書教關平分付你與我往荊州請軍師去關平領了書星夜往荊州來玄德自守涪關並不出戰卻説孔明在荊州時當七夕佳節大會衆官夜宴共説收川之事只見正西上一星其大如鬥從天墜下流光四散孔明失驚擲杯於地掩面哭曰哀哉痛哉衆官慌問其故孔明曰吾前者算今年罡星在西方不利於軍師天狗犯於吾軍太白臨於雒城已拜書主公教謹防之誰想今夕西方星墜龐士元命必休矣言罷大哭曰今吾主喪一臂矣衆官皆驚未信其言孔明曰數日之內必有消息是夕酒不盡歡而散數日之後孔明與雲長等正坐間人報關平到衆官皆驚關平入呈上玄德書信孔明視之內言本年七月初七日龐軍師被張任在落鳳破前箭射身故孔明大哭衆官無不垂淚孔明曰既主公在涪關進退兩難之際亮不得不去雲長曰軍師去誰人保守荊州荊州乃重地干系非輕孔明曰主公書中雖不明言其人吾已知其意了乃將玄德書與衆官看曰主公書中把荊州托在吾身上教我自量才委用雖然如此今教關平齎書前來其意欲雲長公當此重任雲長想桃園結義之情可竭力保守此地責任非輕公宜勉之雲長更不推辭慨然領諾孔明設宴交割印綬雲長雙手來接孔明擎著印曰這干系都在將軍身上雲長曰大丈夫既領重任除死方休孔明見雲長説個死字心中不悅欲待不與其言已出孔明曰倘曹操引兵來到當如之何雲長曰以力拒之孔明又曰倘曹操孫權齊起兵來如之奈何雲長曰分兵拒之孔明曰若如此荊州危矣吾有八個字將軍牢記可保守荊州雲長問哪八個字孔明曰北拒曹操東和孫權雲長曰軍師之言當銘肺腑孔明遂與了印綬令文官馬良伊籍向朗糜竺武將糜芳廖化關平周倉一班兒輔佐雲長同守荊州一面親自統兵入川先撥精兵一萬教張飛部領取大路殺奔巴州雒城之西先到者為頭功又撥一枝兵教趙雲為先鋒溯江而上會於雒城孔明隨後引簡雍蔣琬等起行那蔣琬字公琰零陵湘鄉人也乃荊襄名士現為書記當日孔明引兵一萬五千與張飛同日起行張飛臨行時孔明囑付曰西川豪傑甚多不可輕敵于路戒約三軍勿得虜掠百姓以失民心所到之處並宜存恤勿得恣逞鞭撻士卒望將軍早會雒城不可有誤張飛欣然領諾上馬而去迤邐前行所到之處但降者秋豪無犯徑取漢川路前至巴郡細作回報巴郡太守嚴顔乃蜀中名將年紀雖高精力未衰善開硬弓使大刀有萬夫不當之勇據住城郭不豎降旗張飛教離城十裏下寨差人入城去説與老匹夫早早來降饒你滿城百姓性命若不歸順即踏平城郭老幼不留卻説嚴顔在巴郡聞劉璋差法正請玄德入川拊心而歎曰此所謂獨坐窮山引虎自衛者也後聞玄德據住涪關大怒屢欲提兵往戰又恐這條路上有兵來當日聞知張飛兵到便點起本部五六千人馬準備迎敵或獻計曰張飛在當陽長阪一聲喝退曹兵百萬之衆曹操亦聞風而避之不可輕敵今只宜深溝高壘堅守不出彼軍無糧不過一月自然退去更兼張飛性如烈火專要鞭撻士卒如不與戰必怒怒則必以暴厲之氣待其軍士軍心一變乘勢擊之張飛可擒也嚴顔從其言教軍士盡數上城守護忽見一個軍士大叫開門嚴顔教放入問之那軍士告説是張將軍差來的把張飛言語依直便説嚴顔大怒罵匹夫怎敢無禮吾嚴將軍豈降賊者乎借你口説與張飛喚武士把軍人割下耳鼻卻放回寨軍人回見張飛哭告嚴顔如此毀罵張飛大怒咬牙睜目披挂上馬引數百騎來巴郡城下搦戰城上衆軍百般痛罵張飛性急幾番殺到吊橋要過護城河又被亂箭射回到晚全無一人出張飛忍一肚氣還寨次日早晨又引軍去搦戰那嚴顔在城敵樓上一箭射中張飛頭盔飛指而恨曰若拿住你這老匹夫我親自食你肉到晚又空回第三日張飛引了軍沿城去罵原來那座城子是個山城周圍都是亂山張飛自乘馬登山下視城中見軍士盡皆披挂分列隊伍伏在城中只是不出又見民夫來來往往搬磚運石相助守城張飛教馬軍下馬步軍皆坐引他出敵並無動靜又罵了一日依舊空回張飛在寨中自思終日叫罵彼只不出如之奈何猛然思得一計教衆軍不要前去搦戰都結束了在寨中等候卻只教三五十個軍士直去城下叫罵引嚴顔軍出來便也廝殺張飛磨拳擦掌只等敵軍來小軍連罵了三日全然不出張飛眉頭一縱又生一計傳令教軍士四散砍打柴草尋覓路徑不來搦戰嚴顔在城中連日不見張飛動靜心中疑惑著十數個小軍扮作張飛砍柴的軍潛地出城雜在軍內入山中探聽當日諸軍回寨張飛坐在寨中頓足大罵嚴顔老匹夫枉氣殺我只見帳前三四個人説道將軍不須心焦這幾日打探得一條小路可以逾過巴郡張飛故意大叫曰既有這個去處何不早來説衆應曰這幾日卻才哨探得出張飛曰事不宜遲只今二更造飯趁三更明月撥寨都起人銜枚馬去鈴悄悄而行我自前面開路汝等依次而行傳了令便滿寨告報探細的軍聽得這個消息盡回城中來報與嚴顔顔大喜曰我算定這匹夫忍耐不得你偷小路過去須是糧草輜重在後我截住後路你如何得過好無謀匹夫中我之計即時傳令教軍士準備赴敵今夜二更也造飯三更出城伏於樹木叢雜去處只等張飛過咽喉小路去了車仗來時只聽鼓響一齊殺出傳了號令看看近夜嚴顔全軍盡皆飽食披挂停當悄悄出城四散伏住只聽鼓響嚴顔自引十數裨將下馬伏于林中約三更後遙望見張飛親自在前橫矛縱馬悄悄引軍前進去不得三四裏背後車仗人馬陸續進發嚴顔看得分曉一齊擂鼓四下伏兵盡起正來槍奪車仗背後一聲鑼響一彪軍掩到大喝老賊休走我等的你恰好嚴顔猛回頭看時為首一員大將豹頭環眼燕頜虎須使丈八矛騎深烏馬乃是張飛四下裏鑼聲大震衆軍殺來嚴顔見了張飛舉手無措交馬戰不十合張飛賣個破綻嚴顔一刀砍來張飛閃過撞將入去扯住嚴顔勒甲縧生擒過來擲於地下衆軍向前用索梆縛住了原來先過去的是假張飛料道嚴顔擊鼓為號張飛卻教鳴金為號金響諸軍齊到川兵大半棄甲倒戈而降張飛殺到巴郡城下後軍已自入城張飛叫休殺百姓出榜安民群刀手把嚴顔推至飛坐于廳上嚴顔不肯下跪飛怒目咬牙大叱曰大將到此何為不降而敢拒敵嚴顔全無懼色回叱飛曰汝等無義侵我州郡但有斷頭將軍無降將軍飛大怒喝左右斬來嚴顔喝曰賊匹夫砍頭便砍何怒也張飛見嚴顔聲音雄壯面不改色乃回嗔作喜下階喝退左右親解其縛取衣衣之扶在正中高坐低頭便拜曰適來言語冒瀆幸勿見責吾素知老將軍乃豪傑之士也嚴顔感其恩義乃降後人有詩贊嚴顔曰白髮居西蜀清名震大邦忠心如皎明浩氣卷長江寧可斷頭死安能屈膝降巴州年老將天下更無雙又有贊張飛詩曰生獲嚴顔勇絶倫惟憑義氣服軍民至今廟貌留巴蜀社酒雞豚日日春張飛請問入川之計嚴顔曰敗軍之將荷蒙厚恩無可以報願施犬馬之勞不須張弓只箭徑取成都正是只因一將傾心後致使連城唾手降未知其計如何且看下文分解
