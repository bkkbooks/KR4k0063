body:
  text: 第六十四回孔明定計捉張任楊阜借兵破馬超卻説張飛問計于嚴顔顔曰從此取雒城凡守禦關隘都是老夫所管官軍皆出於掌握之中今感將軍之恩無可以報老夫當為前部所到之處盡皆喚出拜降張飛稱謝不已於是嚴顔為前部張飛領軍隨後凡到之處儘是嚴顔所管都喚出投降有遲疑未決者顔曰我尚且投降何況汝乎自是望風歸順並不曾廝殺一場卻説孔明已將起程日期申報玄德教都會聚雒城玄德與衆官商議今孔明翼德分兩路取川會於雒城同入成都水陸舟車已於七月二十日起程此時將及待到今我等便可進兵黃忠曰張任每日來搦戰見城中不出彼軍懈怠不做準備今日夜間分兵劫寨勝如白晝廝殺玄德從之教黃忠引兵取左魏延引兵取右玄德取中路當夜二更三路軍馬齊發張任果然不做準備漢軍擁入寨放起火來烈焰騰空蜀兵奔走連夜直趕到雒城城中兵接應入去玄德還中路下寨次日引兵直到雒城圍住攻打張任按兵不出攻到第四日玄德自提一軍攻打西門令黃忠魏延在東門攻打留南門北門放軍行走原來南門一帶都是山路北門有涪水因此不圍張任望見玄德在西門騎馬往來指揮打城從辰至末人馬漸漸力乏張任教吳蘭雷銅二將引兵出北門轉東門敵黃忠魏延自己卻引軍出南門圍西門單迎玄德城內盡撥民兵上城擂鼓助喊卻説玄德見紅日平西教後軍先退軍士方回身城上一片聲喊起南門內軍馬突出張任徑來軍中捉玄德玄德軍中大亂黃忠魏延又被吳蘭雷銅敵住兩下不能相顧玄德敵不住張任撥馬往山僻小路而走張任從背後追來看看趕上玄德獨自一人一馬張任引數騎趕來玄德正望前盡力加鞭而行忽山路一軍沖來玄德馬上叫苦曰前有伏兵後有追兵天亡我也只見來軍當頭一員大將乃是張飛原來張飛與嚴顔正從那條路上來望見塵埃起知與川兵交戰張飛當先而來正撞著張任便就交馬戰到十餘合背後嚴顔引兵大進張任火速回身張飛直趕到城下張任退入城拽起吊橋張飛回見玄德曰軍師溯江而來尚且未到反被我奪了頭功玄德曰山路險阻如何無軍阻擋長驅大進先到於此張飛曰于路關隘四十五處皆出老將嚴顔之功因此于路並不曾費分毫之力遂把義釋嚴顔之事從頭説一遍引嚴顔見玄德玄德謝曰若非老將軍吾弟安能到此即脫身上黃金鎖子甲以賜之嚴顔拜謝正待安排宴飲忽聞哨馬回報黃忠魏延和川將吳蘭雷銅交鋒城中吳懿劉璝又引兵助戰兩下夾攻我軍抵敵不住魏黃二將敗陳投東了張飛聽得便請玄德分兵兩路殺去救援於是張飛在左玄德在右殺奔前來吳懿劉璝見後面喊聲起慌退入城中吳蘭雷銅只顧引兵追趕黃忠魏延卻被玄德張飛截住歸路黃忠魏又回馬轉攻吳蘭雷銅料敵不住只得將本部軍馬前來投降玄德準其降收兵近城下寨卻説張任失了二將心中憂慮吳懿劉璝曰兵勢甚危不決一死戰如何得兵退一面差人去成都見主公告急一面用計敵之張任曰吾來日領一軍搦戰詐敗引轉城北城內再以一軍沖出截斷其中可獲勝也吳懿曰劉將軍相輔公子守城我引兵沖出助戰約會已定次日張任引數千人馬搖旗呐鼓出城搦戰張飛上馬出迎更不打話與張任交鋒戰不十余合張任詐敗繞城而走張飛盡力追之吳懿一軍截住張任引軍復回把張飛圍在垓心進退不得正沒有奈何只見一隊軍從江邊殺出當先一員大將挺槍躍馬與吳懿交鋒只一合生擒吳懿戰退敵軍救出張飛視之乃趙雲也飛問軍師何在雲曰軍師已至想此時已與主公相見了也二人擒吳懿回寨張任自退入東門去了張飛趙雲回寨中孔明簡雍蔣琬已在帳中飛下馬來參軍師孔明驚問曰如何得先到玄德具述義釋嚴顔之事孔明賀曰張將軍能用謀皆主公之洪福也趙雲解吳懿見玄德玄德曰汝降否吳懿曰我既被捉如何不降玄德大喜親解其縛孔明問城中有幾人守城吳懿曰有劉季玉之子劉循輔將劉璝張任劉璝不打緊張任乃蜀郡人極有膽略不可輕敵孔明曰先捉張任然後取雒城問城東這座橋名為何橋吳懿曰金雁橋孔明遂乘馬至橋邊繞河看了一遍回到寨中喚黃忠魏延聽令曰離金雁橋南五六裏兩岸都是蘆葦蒹葭可以埋伏魏延引一千槍手伏于左單戳馬上將黃忠引一千刀手伏于右單砍坐下馬殺散彼軍張任必投山東小路而來張翼德引一千軍伏在那裏就彼處擒之又喚趙雲伏于金雁橋北待我引張任過橋你便將橋拆斷卻勒兵於橋北遙為之勢使張任不敢望北走退投南去卻好中計調遣已定軍師自去誘敵卻説劉璋差卓膺張翼二將前至雒城助戰張任教張翼與劉璝守城自與卓膺為前後二隊任為前隊膺為後隊出城退敵孔明引一隊不整不齊軍過金雁橋來與張任對陳孔明乘四輪車綸巾羽扇而出兩邊百餘騎簇捧遙指張任曰曹操以百萬之衆聞吾之名望風而走今汝何人敢不投降張任看見孔明軍伍不齊在馬上冷笑曰人説諸葛亮用兵如神原來有名無實把槍一招大小軍校齊殺過來孔明棄了四輪車上馬退走過橋張任從背後趕來過了金雁橋見玄德軍在左嚴顔軍在右衝殺將將來張任知是計急回軍時橋已拆斷了欲投北去只見趙雲一軍隔岸擺開遂不敢投北徑往南繞河而走走不到五七裏早到蘆葦叢雜處魏延一軍從蘆中忽起都用長槍亂戳黃忠一軍伏在蘆葦裏用長刀只剁馬蹄馬軍盡倒皆被執縛步軍那裏敢來張任引數十騎望山路而走正撞著張飛張任方欲退走張飛大喝一聲衆軍齊上將張任活捉了原來卓膺見張任中計已投趙雲軍前降了一發都到大寨玄德賞了卓膺張飛解張任至孔明亦坐於帳中玄德望張任曰蜀中將領望風而降汝何不早投降張任睜目怒叫曰忠臣豈肯事二主乎玄德曰汝不識天時耳降即免死任曰今日便降久後也不降可速殺我玄德不忍殺之張任厲聲高罵孔明命斬之以全其名後人有詩贊曰烈士豈甘從二主張君忠勇死猶生高明正似天邊月夜夜流光照雒城玄德感歎不已令收其尸首葬于金雁橋側以表其忠次日令嚴顔吳懿等一班蜀中降將為前部直至雒城大叫早開門受降免一城生靈受苦劉璝在城上大罵嚴顔方待取箭射之忽見城上一將拔劍砍翻劉璝開門投降玄德軍馬入雒城劉循開西門走脫投成都去了玄德出榜安民殺劉璝者乃武陽人張翼也玄德得了雒城重賞諸將孔明曰雒城已破成都只在目前惟恐外州郡不寧可令張翼吳懿引趙雲撫外水江陽犍為等處所屬州郡令嚴顔卓膺引張飛撫巴西德陽所屬州郡就委官治平靖即勒兵回成都取齊張飛趙雲領命各自引兵去了孔明問前去有何處關隘蜀中降將曰止綿竹有重兵守禦若得錦竹成都唾手可得孔明便商議進兵法正曰雒城既破蜀中危矣主公欲以仁義服衆且勿進兵某作一書上劉璋陳説利害璋自然降矣孔明曰孝直之言最善便令寫書遣人徑往成都卻説循逃回見父説雒城已陷劉璋慌聚衆官商議從事鄭度獻策曰今劉備雖攻城奪池然兵不甚多士衆未附野穀是資軍無輜重不如盡驅巴西梓潼民過涪水以西其倉廩野穀盡皆燒除深溝高壘靜以待之彼至請戰勿許久無所資不過百日彼兵自走我乘虛擊之備可擒也劉璋曰不然吾聞拒敵安民未聞動民以備敵也此言非保全之計正議間人報法正有書至劉璋喚入呈上書璋拆開視之其略曰昨蒙遣差結好荊州不意主公左右不得其人以致如此今荊州眷念舊情不忘族誼主公若能幡然歸順量不薄待望三思裁示劉璋大怒扯毀其書大罵法正賣主求榮忘恩背義之賊逐其使者出城即時遣妻弟費觀提兵前去守把錦竹費觀舉保南陽人姓李名嚴字正方一同領兵當下費觀李嚴點三萬軍來守錦竹益州太守董和字幼宰南郡枝江人也上書與劉璋請往漢中借兵璋曰張魯與吾世仇安肯相救和曰雖然與我有仇劉備在雒城勢在危急唇亡則齒寒若以利害説之必然肯從璋乃修書遣使前赴漢中卻説馬超自兵敗入羌二載有餘結好羌兵攻拔隴西州郡所到之處盡皆歸降惟翼城攻打不入刺史韋康纍遣人求救于夏侯淵淵不得曹操言語未敢動兵韋康見救兵不來與衆商議不如投降馬超參軍楊阜哭諫曰超等叛君之徒豈可降之康曰事勢至此不降何待阜苦諫不從韋康大開城門投拜馬超超大怒曰汝今事急請降非真心也將韋康四十餘口盡斬之不留一人有人言楊阜勸韋康休降可斬之超曰此人守義不可斬也復用楊阜為參軍阜薦梁寬趙衢二人超盡用為軍官楊阜告馬超曰阜妻死于臨洮乞告兩個月假歸葬其妻便回馬超從之楊阜過曆城來見撫彜將軍薑敘敘與阜是姑表兄弟敘之母是阜之姑時年已八十二當日楊阜入薑敘內宅拜見其姑哭告曰阜守城不能保主亡不能死愧無面目見姑馬超叛君妄殺郡守一州士民無不恨之今吾兄坐據曆城竟無討賊之心此豈人臣之理乎言罷淚流出血敘母聞言喚薑敘入責之曰韋使君遇害亦爾之罪也又謂阜曰汝既降人且食其祿何故又興心討之阜曰吾從賊者欲留殘生與主報冤也敘曰馬超英勇急難圖之阜曰有勇無謀易圖也吾已暗約下梁寬趙衢兄若肯興兵二人必為內應敘母曰汝不早圖更待何時誰不有死死于忠義死得其所也勿以我為念汝若不聽義山之言吾當先死以絶汝念敘乃與統兵校尉尹奉趙昂商議原來趙昂之子趙月現隨馬超為裨將趙昂當日應允歸見其妻王氏曰吾今日與薑敘楊阜尹奉一處商議欲報韋康之仇吾想子趙月現隨馬超今若興兵超必先殺吾子奈何其妻厲聲曰雪君父之大恥雖喪身亦不惜何況一子乎君若顧子而不行吾當先死矣趙昂乃決次一日同起兵薑敘楊阜屯曆城尹奉趙昂屯祁山王氏乃盡將首飾資帛親自往祁山軍中賞勞軍士以勵其衆馬超聞薑敘楊阜會合尹奉趙昂舉事大怒即將趙月斬之令龐德馬岱盡起軍馬殺奔曆城來薑敘楊阜引兵出兩陳圓處楊阜薑敘衣白袍而出大罵曰叛君無義之賊馬超大怒沖將過來兩軍混戰薑敘楊阜如何抵得馬超大敗而走馬超驅兵趕來背後喊聲起處尹奉趙昂殺來超急回時兩下夾攻首尾不能相顧正鬥間刺斜裏大隊軍馬殺來原來是夏侯淵得了曹操軍令正領軍來破馬超超如何當得三路軍馬大敗奔回走了一夜比及平明到得翼城叫門時城上亂箭射下梁寬趙衢立在城上大罵馬超將馬超妻楊氏從城上一刀砍了撇下尸首來又將馬超幼子三人並至親十餘口都從城上一刀一個剁將下來超氣噎塞胸幾乎墜下馬來背後夏侯淵引兵追趕超見勢大不敢戀戰與龐德馬岱殺開一條路走前面前面又撞見薑敘楊阜殺了一陳沖得過去又撞著尹奉趙昂殺了一陳零零落落剩得五六十騎連夜奔走四更前後走到曆城下守門者只道薑敘兵回大開門接入超從城南門邊殺起盡洗城中百姓至薑敘宅拿出老母母全無懼色指馬超而大罵超大怒自取劍殺之尹奉趙昂全家老幼亦盡被馬超所殺昂妻王氏因在軍中得免於難次日夏侯淵大軍至馬超棄城殺出望西而逃行不得二十裏前面一軍擺開為首的是楊阜超切齒而恨拍馬挺槍刺之阜宗弟七人一齊來助戰馬岱龐德敵住後軍宗弟七人皆被馬超殺死阜身中五槍猶然死戰後面夏侯淵大軍趕來馬超遂走只有龐德馬岱五七騎後隨而去夏侯淵自行安撫隴西諸州人民令薑敘等各各分守用車載楊阜赴許都見曹操操封阜為關內侯阜辭曰阜無捍難之功又無死難之節於法當誅何顔受職操嘉之卒與之爵卻説馬超與龐德馬岱商議徑往漢中投張魯張魯大喜以為得馬超則西可以吞益州東可以拒曹操乃商議欲以女招超為壻大將楊柏諫曰馬超妻子遭慘禍皆超之貽害也主公豈可以女與之魯從其言遂罷招壻之議或以楊柏之言告知馬超超大怒有殺楊柏之意楊柏知之與兄楊松商議亦有圖馬超之心正值劉璋遣使求救于張魯魯不從忽報劉璋又遣黃權到權先來見楊松説東西兩川實為唇齒西川若破東川亦難保矣今若肯相救當以二十州相酬松大喜即引黃權來見張魯説唇齒利害更以二十州相謝魯喜其利從之巴西閻圃諫曰劉璋與主公世仇今事急求救詐許割地不可從也忽階下一人進曰某雖不才願乞一旅之師生擒劉備務要割地以還正是方看真主來西蜀又見精兵出漢中未知其人是誰且看下文分解
