body:
  text: 第六十五回馬超大戰葭萌關劉備自領益州牧卻説閻圃正勸張魯勿助劉璋只見馬超挺身出曰超感主公之恩無可上報願領一軍攻取葭萌關生擒劉備務要劉璋割二十州奉還主公張魯大喜先遣黃權從小路而回隨即點兵二萬與馬超此時龐德臥病不能行留於漢中張魯令楊柏監軍超與弟馬岱選日起程卻説玄德軍馬在雒城法正所差下書人回報説鄭度勸劉璋盡燒野穀並各處倉廩率巴西之民避于涪水西深溝高壘而不戰玄德孔明聞之皆大驚曰若用此言吾勢危矣法正笑曰主公勿憂此計雖毒劉璋必不能用也不一日人傳劉璋不肯遷動百姓不從鄭度之言玄德聞之方始寬心孔明曰可速進兵取綿竹如得此處成都易取矣遂遣黃忠魏延領兵前進費觀聽知玄德兵來差李嚴出迎嚴領三千兵出各布陳完黃忠出馬與李嚴戰四五十合不分勝敗孔明在陳中教鳴金收軍黃忠回陳問曰正待要擒李嚴軍師何故收兵孔明曰吾見李嚴武藝不可力取來日再戰汝可詐敗引入山峪出奇兵以勝之黃忠領計次日李嚴再引兵來黃忠又出戰不十合詐敗引兵便走李嚴趕來迤邐趕入山峪猛然省悟急待回來前面魏延引兵擺開孔明自在山頭喚曰公如不降兩下已伏強弩欲與吾龐士元報仇矣李嚴慌下馬卸甲投降軍士不曾傷害一人孔明引李嚴見玄德玄德待之甚厚嚴曰費觀雖是劉益州親戚與某甚密當往説之玄德即命李嚴回城招降費觀嚴入綿竹城對費觀贊玄德如此仁德今若不降必有大禍觀從其言開門投降玄德遂入綿竹商議分兵取成都忽流星馬急報言孟達霍峻守葭萌關今被東川張魯遣馬超與楊柏馬岱領兵攻打甚急救遲則關隘休矣玄德大驚孔明曰須是張趙二將方可與敵玄德曰子龍引兵在外未回翼德已在此可急遣之孔明主公且勿言容亮激之卻説張飛聞馬超攻關大叫而入曰辭了哥哥便去戰馬超也孔明佯作不聞對玄德曰今馬超侵犯關隘無人可敵除非往荊州取關雲長來方可與敵張飛曰軍師何故小覷吾吾曾獨拒曹操百萬之兵豈愁馬超一匹夫乎孔明曰翼德拒水斷橋此因曹操不知虛實耳若知虛實將軍豈得無事今馬超之勇天下皆知渭橋六戰殺得曹操割須棄袍幾乎喪命非等間之雲長且未必可勝飛曰我只今便去如勝不得馬超甘當軍令孔明曰既爾肯寫文書便為先鋒請主公親自去一遭留亮守綿竹待子龍來卻作商議魏延曰某亦願往孔明令魏延帶五百哨馬先行張飛第二玄德後隊望葭萌關進發魏延哨馬先到關下正遇楊柏魏延與楊柏交戰不十合楊伯敗走魏延要奪張飛頭功乘勢趕去前面一軍擺開為首乃是馬岱魏延只道是馬超舞刀躍馬迎之與岱戰不十合岱敗走延趕去被岱回身一箭中了魏延左臂延急回馬走馬岱趕到關前只見一將喊聲如雷從關上飛馬奔至面前原來是張飛初到關上聽得關前廝殺便來看時正見魏延中箭因驟馬下關救了魏延飛喝馬岱曰汝是何人先通姓名然後廝殺馬岱曰吾乃西涼馬岱是也張飛曰你原來不是馬超快回去非吾對手只令馬超那廝自來説道燕人張飛在此馬岱大怒曰汝焉敢小覷我挺槍躍馬直取張飛戰不十合馬岱敗走張飛欲待追趕關上一騎馬到來叫兄弟且休去飛回視之原來是玄德到來飛遂不趕一同上關玄德曰恐怕你性躁故我隨後趕來到此既然勝了馬岱且歇一宵來日戰馬超次日天明關下鼓聲大震馬超兵到玄德在關上看時門旗影裏馬超縱騎持槍而出獅盔獸帶銀甲白袍一來結束非凡二者人才出衆玄德歎曰人言錦馬超名不虛傳張飛便要下關玄德急止之曰且休出戰無當避其鋭氣關下馬超單搦張飛出馬關上張飛恨不得平吞馬超三五番皆被玄德當住看看午後玄德望見馬超陳上人馬皆倦遂選五百騎跟著張飛沖下關來馬超見張飛軍到把槍望後一招約退軍有一箭之地張飛軍馬一齊扎住關上軍馬陸續下來張飛挺槍出馬大呼認得燕人張翼麼馬超曰吾家屢世公侯豈識村野匹夫張飛大怒兩馬齊出二槍並舉約戰百餘合不分勝負玄德觀之歎曰真虎將也恐張飛有失急鳴金收軍兩將各回張飛回到陳中略歇馬片時不用頭盔只裹包巾上馬又出陳前搦馬超廝殺超又出兩個再戰玄德恐張飛有失自披挂下關直至陳前看張飛與馬超又鬥百餘合兩個精神倍加玄德教鳴金收軍二將分開各回本陳是日天色已晚玄德謂張飛曰馬超英勇不可輕敵且退上關來日再戰張飛殺得性起那裏肯休大叫曰誓死不回玄德曰今日天晚不可戰矣飛曰多點火把安排夜戰馬超亦換了馬再出陳前大叫曰張飛敢夜戰麼張飛性起問玄德換了坐下馬搶出陳來叫曰我捉你不得誓不上關超曰我勝你不得誓不回寨兩軍呐喊點起千百火把照耀如同白日兩將又向陳前鏖戰到二十余合馬超撥回馬便走張飛大叫曰走那裏去原來馬超見贏不得張飛心生一計詐敗佯輸賺張飛趕來暗掣銅錘在手扭回身覷著張飛便打將來張飛見馬超走心中也提防比及銅錘打來時張飛一閃從耳朵邊過去張飛便勒回馬走時馬超卻又趕來張飛帶住馬拈弓搭箭回射馬超超卻閃過二將各自回陳玄德自於陳前叫曰吾以仁義待人不施譎詐馬孟起你收兵歇息我不乘勢趕你馬超聞言親自斷後諸軍漸退玄德亦收軍上關次日張飛又欲下關戰馬超人報軍師來到玄德接著孔明孔明曰亮聞孟起世之虎將若與翼德死戰必有一傷故令子龍漢升守住綿竹我星夜來此可用條小計令馬超歸降主公玄德曰吾見馬超英勇甚愛之如何可得孔明曰亮聞東川張魯欲自立為漢寧王手下謀士楊松極貪賄賂主公可差人從小路徑投漢中先用金銀結好楊松後進書與張魯雲吾與劉璋爭西川是與汝報仇不可聽信離間之語事定之後保汝為漢寧王令其撤回馬超兵待其來撤時便可用計招降馬超矣玄德大喜即時修書差孫乾齎金珠從小路徑至漢中先來見楊松説知此事送了金珠松大喜先引孫乾見張魯陳言方便魯曰玄德只是左將軍如何保得我為漢寧王楊松曰他是大漢皇叔正合保奏張魯大喜便差人教馬超罷兵孫乾只在楊松家聽回信不一日使者回報馬超言未成功不可退兵張魯又遣人去喚又不肯回一連三次不至楊松曰此人素無信行不肯罷兵其意必反遂使人流言雲馬超意欲奪西川自為蜀主與父報仇不肯臣於漢中張魯聞之問計于楊松松曰一面差人去説與馬超汝既欲成功與汝一月限要依我三件事若依得便有賞否則必誅一要取西川二要劉璋首級三要退荊州兵三件事不成可獻頭來一面教張衛點軍守把關隘防馬超兵變魯從之差人到馬超寨中説這三件事超大驚曰如何變得恁的乃與馬岱商議不如罷兵楊松又流言曰馬超回兵必懷異心於是張衛分七路軍堅守隘口不放馬超兵入超進退不得無計可施孔明謂玄德曰今馬超正在進退兩難之際亮憑三寸不爛之舌親往超寨説馬超來降玄德曰先生乃吾之股肱心腹倘有疏虞如之奈何孔明堅意要去玄德再三不肯放去正躊躇間忽報趙雲有書薦西川一人來降玄德召入問之其人乃建寧俞元人也姓李名恢字德昂玄德曰向日聞公苦諫劉璋今何故歸我恢曰吾聞良禽相木而棲賢臣擇主而事前諫劉益州者以盡人臣之心既不能用知必敗矣今將軍仁德布於蜀中知事必成故來歸耳玄德曰先生此來必有益於劉備恢曰今聞馬超在進退兩難之際恢昔在隴西與彼有一面之交願往説馬超歸降若何孔明曰正欲得一人替吾一往願聞公之説詞李恢于孔明耳畔陳説如此如此孔明大喜即時遣行恢行至超寨先使人通姓名馬超曰吾知李恢乃辨士今必來説我先喚二十刀斧手伏於帳下囑曰令汝砍即砍為肉醬須臾李恢昂然而入馬超端坐帳中不動叱李恢曰汝來為何恢曰特來作説客超曰吾匣中寶劍新磨汝試言之其言不通便請試劍恢笑曰將軍之禍不遠矣但恐新磨之劍不能試吾之頭將欲自試也超曰吾有何禍恢曰吾聞越之西子善毀者不能閉其美齊之無鹽善美者不能掩其醜日中則昃月滿則虧此天下之常理也今將軍與曹操有殺父之仇而隴西又有切齒之恨前不能救劉璋而退荊州之兵後不能制楊松而見張魯之面目下四海難容一身無主若復有渭橋之敗翼城之失何面目見天下之人乎超頓首謝曰公言極善但超無路可行恢曰公既聽吾言帳下何故伏刀斧手超大慚盡叱退恢曰劉皇叔禮賢下士吾知其必成故舍劉璋而歸之公之尊人昔年曾與皇叔約共討賊公何不背暗投明以圖上報父仇下立功名乎馬超大喜即喚楊柏入一劍斬之將首級共恢一同上關來降玄德玄德親自接入待以上賓之禮超頓首謝曰今遇明主如撥雲霧而見青天時孫乾已回玄德復命霍峻孟達守關便撤兵來取成都趙雲黃忠接入綿竹人報蜀將劉晙馬漢引軍到趙雲曰某願往擒此二人言訖上馬引軍出玄德在城上管待馬超吃酒未曾安席子龍已斬二人之頭獻於筵前馬超亦驚倍加敬重超曰不須主公軍馬廝殺超自喚出劉璋來降如不肯降超自與弟馬岱取成都雙手奉獻玄德大喜是日盡歡卻説敗兵回到益州報劉璋璋大驚閉門不出人報城北馬超救兵到劉璋方敢登城望之見馬超馬岱立於城下大叫請劉季玉答話劉璋在城上問之超在馬上以鞭指曰吾本領張魯兵來救益州誰想張魯聽信楊松讒言反欲害我今已歸降劉皇叔公可納土拜降免致生靈受苦如或執迷吾先攻城矣劉璋驚得面如土色氣倒於城上衆官救醒璋曰吾之不明悔之何及不若開門投降以救滿城百姓董和曰城中尚有兵三萬余人錢帛糧草可支一年奈何便降劉璋曰吾父子在蜀二十餘年無恩德以加百姓攻戰三年血肉捐於草野皆我罪也我心何安不如投降以安百姓衆人聞之皆墮淚忽一人進曰主公之言正合天意視之乃巴西西充國人也姓譙名周字允南此人素曉天文璋問之周曰某夜觀乾象見群星聚於蜀郡其大星光如皓月乃帝王之象也況一載之前小兒謠雲若要吃新飯須待先主來此乃預兆不可逆天道黃權劉巴聞言皆大怒欲斬之劉璋擋住忽報蜀都太守許靖逾城出降矣劉璋大哭歸府次日人報劉皇叔遣幕賓簡雍在城下喚門璋令開門接入雍坐車中傲睨自若忽一人掣劍大喝曰小輩得志傍若無人汝敢藐視吾蜀中人物耶雍慌下車迎之此人乃廣漢綿竹人也姓秦名宓字子敕雍笑曰不識賢兄幸勿見責遂同入見劉璋具説玄德寬洪大度並無相害之意於是劉璋決計投降厚待簡雍次日親齎印綬文籍與簡雍同車出城投降玄德出寨迎接握手流涕曰非吾不行仁義奈勢不得已也共入寨交割印綬文籍並馬入城玄德入成都百姓香花燈燭迎門而接玄德到公廳升堂坐定郡內諸官皆拜於堂下惟黃權劉巴閉門不出衆將忿怒欲往殺之玄德慌忙傳令曰如有害此二人者滅其三族玄德親自登門請二人出仕二人感玄德恩禮乃出孔明請曰今西川平定難容二主可將劉璋送去荊州玄德曰吾方得蜀郡未可令季玉遠去孔明曰劉璋失基業者皆因太弱耳主公若以婦人之仁臨事不決恐此土難以長久玄德從之設一大宴請劉璋收拾財物佩領振威將軍印綬令將妻子良賤盡赴南郡公安住歇即日起行玄德自領益州牧其所降文武盡皆重賞定擬名爵嚴顔為前將軍法正為蜀郡太守董和為掌軍中郎將許靖為左將軍長史龐義為營中司馬劉巴為左將軍黃權為右將軍其餘吳懿費觀彭羕卓膺李嚴吳蘭雷銅李恢張翼秦宓譙周呂義霍峻鄧芝楊洪周群費禕費詩孟達文武投降官員共六十餘人並皆擢用諸葛亮為軍師關雲長為蕩寇將軍漢壽亭侯張飛為征虜將軍新亭侯趙雲為鎮遠將軍黃忠為征西將軍魏延為楊武將軍馬超為平西將軍孫乾簡雍糜竺糜芳劉封吳班關平周倉廖化馬良馬謖蔣琬伊籍及舊日荊襄一班文武官員盡皆升賞遣使齎黃金五百斤白銀一千斤錢五千萬蜀錦一千匹賜與雲長其餘官將給賞有差殺牛宰馬大餉士卒開倉賑濟百姓軍民大悅益州既定玄德欲將成都有名田宅分賜諸官趙雲諫曰益州人民屢遭兵火田宅皆空今當歸還百姓令安居復業民心方服不宜奪之為私賞也玄德大喜從其言使諸葛軍師定擬治國條例刑法頗重法正曰昔高祖約法三章黎民皆感其德願軍師寬刑省法以慰民望孔明曰君知其一未知其二秦用法暴虐萬民皆怨故高祖以寬仁得之今劉璋暗弱德政不舉威刑不肅君臣之道漸以陵替寵之以位位極則殘順之以恩恩竭則慢所以致弊實由於此吾今威之以法法行則知恩限之以爵爵加則知榮恩榮並濟上下有節為治之道於斯著矣法正拜服自此軍民安堵四十一州地面分兵鎮撫並皆平定法正為蜀都太守凡平日一餐之德睚眥之怨無不報復或告孔明曰孝直太橫宜稍斥之孔明曰昔主公困守荊州北畏曹操東憚孫權賴孝直為之輔翼遂翻然翺翔不可復製今奈何禁止孝直使不得少行其意耶因竟不問法正聞之亦自斂戢一日玄德正與孔明間敘忽報雲長遣關平來謝所賜金帛玄德召入平拜罷呈上書信曰父親知馬超武藝過人要入川來與之比試高低教就稟伯父此事玄德大驚曰若雲長入蜀與孟起比試勢不兩立孔明曰無妨亮自作書回之玄德只恐雲長性急便教孔明寫了書發付關平星夜回荊州平回至荊州雲長問曰我欲與馬孟起比試汝曾説否平答曰軍師有書在此雲長拆開視之其書曰亮聞將軍欲與孟起分別高下以亮度之孟起雖雄烈過人亦乃黥布彭越之徒耳當與翼德並驅爭先猶未及美髯公之絶倫超群也今公受任守荊州不為不重倘一入川若荊州有失罪莫大焉惟翼明照雲長看畢自綽其髯笑曰孔明知我心也將書遍示賓客遂無入川之意卻説東吳孫權知玄德併吞西川將劉璋逐於公安遂召張昭顧雍商議曰當初劉備借我荊州時説取了西川便還荊州今已得巴蜀四十州須用取索漢上諸郡如其不還即動干戈張昭曰吳中方寧不可動兵昭有一計使劉備將荊州雙手奉還主公正是西蜀方開新日月東吳又索舊山川未知其計如何且看下文分解
