body:
  text: 第六十六回關雲長單刀赴會伏皇后為國捐生卻説孫權要索荊州張昭獻計曰劉備所倚仗者諸葛亮耳其兄諸葛瑾今仕于吳何不將瑾老小執下使瑾入川告其弟令勸劉備交割荊州如其不還必纍及我老小亮念同胞之情必然應允權曰諸葛瑾乃誠實君子安忍拘其老小昭曰明教知是計策自然放心權從之召諸葛瑾老小虛監在府一面修書打發諸葛瑾往西川去不數日早到成都先使人報知玄德玄德問孔明曰令兄此來為何孔明曰來索荊州耳玄德曰何以答之孔明曰只須如此如此計會已定孔明出郭接瑾不到私宅徑入賓館參拜畢瑾放聲大哭亮曰兄長有事但説何故發哀瑾曰吾一家老小休矣亮曰莫非為不還荊州乎因弟之故執下兄長老小弟心何安兄休憂慮弟自有計還荊州便了瑾大喜即同孔明入見玄德呈上孫權書玄德看了怒曰孫權既以妹嫁我卻乘我不在荊州竟將妹子潛地取去情理難容我正要大起川兵殺下江南報我之恨卻還想來索荊州乎孔明哭拜於地曰吳侯執下亮兄長老小倘若不還吾兄將全家被戮兄死亮豈能獨生望主公看亮之面將荊州還了東吳全亮兄弟之情玄德再三不肯孔明只是哭求玄德徐徐曰既如此看軍師面分荊州一半還之將長沙零陵桂陽三郡與他亮曰既蒙見允便可寫書與雲長令交割三郡玄德曰子瑜到彼須用善言求吾弟吾弟性如烈火吾尚懼之切宜仔細瑾求了書辭了玄德別了孔明登途徑到荊州雲長請入中堂賓主相敘瑾出玄德書曰皇叔許先以三郡還東吳望將軍即日交割令瑾好回見吾主雲長變色曰吾與吾兄桃園結義誓共匡扶漢室荊州本大漢疆土豈得妄以尺寸與人將在外君命有所不受雖吾兄有書來我卻只不還瑾曰今吳侯執下瑾老小若不得荊州必將被誅望將軍憐之雲長曰此是吳侯譎計如何瞞得我過瑾曰將軍何太無面目雲長執劍在手曰休再言此劍上並無面目關平告曰軍師面上不好看望父親息怒雲長曰不看軍師面上教你回不得東吳瑾滿面羞慚急辭下船再往西川見孔明孔明已自出巡去了瑾只得再見玄德哭告雲長欲殺之事玄德曰吾弟性急極難與言子瑜可暫回容吾取了東川漢中諸郡調雲長往守之那時方得交付荊州瑾不得已只得回東吳見孫權具言前事孫權大怒曰子瑜此去反覆奔走莫非皆是諸葛亮之計瑾曰非也吾弟亦哭告玄德方許將三郡先還又無奈雲長恃頑不肯孫權曰既劉備有先還三郡之言便可差官前去長沙零陵桂陽三郡赴任且看如何瑾曰主公所言極善權乃令瑾取回老小一面差官往三郡赴任不一日三郡差去官吏盡被逐回告孫權曰關雲長不肯相容連夜趕逐回吳遲後者便要殺孫權大怒差人召魯肅責之曰子敬昔為劉備作保借吾荊州今劉備已得西川不肯歸還子敬豈得坐視肅曰肅已思得一計正欲告主公權問何計肅曰今屯兵于陸口使人請關雲長赴會若雲長肯來以善言説之如其不從伏下刀斧手殺之如彼不肯來隨即進兵與決勝負奪取荊州便了孫權曰正合吾意可即行之闞澤進曰不可關雲長乃世之虎將非等間可及恐事不諧反遭其害孫權怒曰若如此荊州何日可得便命魯肅速行此計肅乃辭孫權至陸口召呂蒙甘寧商議設宴于陸口寨外臨江亭上修下請書選帳下能言快語一人為使登舟渡江江口關平問了遂引使人入荊州叩見雲長具道魯肅相邀赴會之意呈上請書雲長看書畢謂來人曰既子敬相請我明日便來赴宴汝可先回使者辭去關平曰魯肅相邀必無好意父親何故許之雲長笑曰吾豈不知耶此是諸葛瑾回報孫權説吾不肯還三郡故令魯肅屯兵陸口邀我赴會便索荊州吾若不往道吾怯矣吾來日獨駕小舟只用親隨十餘人單刀赴會看魯肅如何近我平諫曰父親奈何以萬金之軀親蹈虎狼之穴恐非所以重伯父之寄託也雲長曰吾於千槍萬刃之中矢石交攻之際匹馬縱橫如入無人之境豈憂江東群鼠乎馬良亦諫曰魯肅雖有長者之風但今事急不容不生異心將軍不可輕往雲長曰昔戰國趙人藺相如無縛雞之力于澠池會上覷秦國君臣如無物況吾曾學萬人敵者乎即已許諾不可失信良曰縱將軍去亦當有準備雲長曰只教吾兒選快船十隻藏善水軍五百于江上等候看吾認旗起處便過江來平領命自去準備卻説使者回報魯肅説雲長慨然應允來日準到肅與呂蒙商議此來若何蒙曰彼帶軍馬來某與甘寧各人領一軍伏於岸側放炮為號準備廝殺如無軍來只於庭後伏刀斧手五十人就筵間殺之計會已定次日肅令人於岸口遙望辰時後見江面上一隻船來梢公水手只數人一面紅旗風中招颭顯出一個大關字來船漸近岸見雲長青巾緑袍坐於船上傍邊周倉捧著大刀八九個關西大漢各跨腰刀一口魯肅驚疑接入庭內敘禮畢入席飲酒舉懷相勸不敢仰視雲長談笑自若酒至半酣肅曰有一言斥與君侯幸垂聽焉昔日令兄皇叔使肅於吾主之前保借荊州暫住約於取川之後歸還今西川已得而荊州未還得毋失信乎雲長曰此國家之事筵間不必論之肅曰吾主只區區江東之地而肯以荊州相借者為念君侯等兵敗遠來無以為資故也今已得益州則荊州自應見還乃皇叔但肯先割三郡而君侯又不從恐於理上説不去雲長曰烏林之役左將軍親冒矢石戮力破敵豈得徒勞而無尺土相資今足下復來索地耶肅曰不然君侯始與皇叔同敗于長阪計窮力竭將欲遠竄吾主矜念皇叔身無處所不愛土地使有所托足以圖後功而皇叔愆德隳好已得西川又占荊州貪而背義恐為天下所恥笑惟君侯察之雲長曰此皆吾兄之事非某所宜與也肅曰某聞君侯與皇叔桃園結義誓同生死皇叔即君侯也何得推託乎雲長未及回答周倉在階下厲聲言曰天下土地惟有德者居之豈獨是汝東吳當有耶雲長變色而起奪周倉所捧大刀立於庭中目視周倉而叱曰此國家之事汝何敢多言可速去倉會意先到岸口把紅旗一招關平船如箭發奔過江東來雲長右手提刀左手挽住魯肅手佯推醉曰公今請吾赴宴莫提起荊州之事吾今已醉恐傷故舊之情他日令人請公到荊州赴會另作商議魯肅魂不附體被雲長扯至江邊呂蒙甘寧各引本部軍欲出見雲長手提大刀親握魯肅恐肅被傷遂不敢動雲長到船邊卻才放手早立於船首與魯肅作別肅如癡似呆看關公船已乘風而去後人有詩贊關公曰藐視吳臣若小兒單刀赴會敢平欺當年一段英雄氣尤勝相如在澠池雲長自回荊州魯肅與呂蒙共議此計又不成如之奈何蒙曰可即申報主公起兵與雲長決戰肅即時使人申報孫權權聞之大怒商議起傾國之兵來取荊州忽報曹操又起三十萬軍來也權大驚且教魯肅休惹荊州之兵移兵向合淝濡須以拒曹操卻説操將欲起程南征參軍傅幹字彥材上書諫操書略曰幹聞用武則先威用文則先德威德相濟而後王業成往者天下大亂明公用武攘之十平其九今未承王命者吳與蜀耳吳有長江之險蜀有崇山之阻難以威勝愚以為且宜增修文德按甲寢兵息軍養士待時而動今若舉數十萬之衆頓長江之濱倘賊憑險深藏使我士馬不得逞其能奇變無所用其權則天威屈矣惟明公詳察焉曹操覽之遂罷南征興設學校延禮文士於是侍中王粲杜襲衛凱和洽四人議欲尊曹操為魏王中書令荀攸曰不可丞相官至魏公榮加九錫位已極矣今又進升王位於理不可曹操聞之怒曰此人欲效荀彧耶荀攸知之憂憤成疾臥病十數日而卒亡年五十八歲操厚葬之遂罷魏王事一日曹操帶劍入宮獻帝正與伏後共坐伏後見操來慌忙起身帝見曹操戰栗不已操曰孫權劉備各霸一方不尊朝廷當如之何帝曰盡在魏公裁決操怒曰陛下出此言外人聞之只道吾欺君也帝曰君若肯相輔則幸甚不爾願垂恩相舍操聞言怒目視帝恨恨而出左右或奏帝曰近聞魏公欲自立為王不久必將篡位帝與伏後大哭後曰妾父伏完常有殺操之心妾今當修書一封密與父圖之帝曰昔董承為事不密反遭大禍今恐又泄漏聯與汝皆休矣後曰旦夕如坐針氈似此為人不如早亡妾看宦官中之忠義可托者莫如穆順當令寄此書乃即召穆順入屏後退去左右近侍帝後大哭告順曰操賊欲為魏王早晚必行篡奪之事朕令後父伏完密圖此賊而左右之人俱賊心腹無可托者欲汝將皇后密書寄與伏完量汝忠義必不負朕順泣曰臣感陛下大恩敢不以死報臣即請行後乃修書付順順藏書於發中潛出禁宮徑至伏完宅將書呈上完見是伏後親筆乃謂穆順曰操賊心腹甚衆不可遽圖除非江東孫權西川劉備二處起兵於外操必自往此時卻求在朝忠義之臣一同謀之內外夾攻庶可有濟順曰皇丈可作書覆帝後求密詔暗遣人往吳蜀二處令約會起兵討賊救主伏完即取紙寫書付順順乃藏於頭髻內辭完回宮原來早有人報知曹操操先于宮門等候穆順回遇曹操操問那裏去來順答曰皇后有病命求醫去操曰召得醫人何在順曰還未召至操喝左右遍搜身上並無夾帶放行忽然風吹落其帽操又喚回取帽視之遍觀無物還帽令戴穆順雙手倒戴其帽操心疑令左右搜其頭髮中搜出伏完書來操看時書中言欲連孫劉為外應操大怒執下穆順於密室問之順不肯招操連夜點起甲兵三千圍住伏完私宅老幼並皆拿下搜出伏後親筆之書隨將伏氏三族盡皆下獄平明使禦林將軍郗慮持節入宮先收皇後璽綬是日帝在外殿見郗慮引三百甲兵直入帝問曰有何事慮曰奉魏公命收皇后璽帝知事泄心膽皆碎慮至後宮伏後方起慮便喚管璽綬人索取玉璽而出伏後情知事發便於殿后椒房內夾壁中藏躲少頃尚書令華歆引五百甲兵入到後殿問宮人伏後何在宮人皆推不知歆教甲兵打開朱戶尋覓不見料在壁中便喝甲士破壁搜尋歆親自動手揪後頭髻拖出後曰望免我一命歆叱曰汝自見魏公訴去後披頭跣足二甲士推擁而出原來華歆素有才名向與邴原管寧相友善時人稱三人為一龍華歆為龍頭邴原為龍腹管寧為龍尾一日寧與歆共種園蔬鋤地見金寧揮鋤不顧歆拾而視之然後擲下又一日寧與歆同坐觀書聞戶外傳呼之聲有貴人乘軒而過寧端坐不動歆棄書往觀寧自此鄙歆之為人遂割席分坐不復與之為友後來管寧避居遼東常戴白帽坐臥一樓足不履地終身不肯仕魏而歆乃先事孫權後歸曹操至此乃有收捕伏皇后一事後人有詩歎華歆曰華歆當日逞凶謀破壁生將母后收助虐一朝添虎翼罵名千載笑龍頭又有詩贊管寧曰遼東傳有管寧樓人去樓空名獨留笑殺子魚貪富貴豈如白帽自風流且説華歆將伏後擁至外殿帝望見後乃下殿抱後而哭歆曰魏公有命可速行後哭謂帝曰不能復相活耶帝曰我命亦不知在何時也甲士擁後而去帝捶胸大慟見郗慮在側帝曰郗公天下寧有是事乎哭倒在地郗慮令左右扶帝入宮華歆拿伏後見操操罵曰吾以誠心待汝等汝等反欲害我耶吾不殺汝汝必殺我喝左右亂棒打死隨即入宮將伏後所生二子皆鴆殺之當晚將伏完穆順等宗族二百餘口皆斬於市朝野之人無不驚駭時建安十九年十一月也後人有詩歎曰曹瞞凶殘世所無伏完忠義欲何如可憐帝後分離處不及民間婦與夫獻帝自從壞了伏後連日不食操入曰陛下無憂臣無異心臣女已與陛下為貴人大賢大孝宜居正宮獻帝安敢不從于建安二十年正月朔就慶賀正旦之節册立曹操女曹貴人為正宮皇后群下莫敢有言此時曹操威勢日甚會大臣商議收吳滅蜀之事賈詡曰須召夏侯惇曹仁二人回商議此事操即時發使星夜喚回夏侯惇未至曹仁先到連夜便入府中見操操方被酒而臥許褚仗劍立於堂門之內曹仁欲入被許褚當住曹仁大怒曰吾乃曹氏宗族汝何敢阻當耶許褚曰將軍雖親乃外藩鎮守之官許褚雖疏現充內侍主公醉臥堂上不敢放入仁乃不敢入曹操聞之歎曰許褚真忠臣也不數日夏侯惇亦至共議征伐惇曰吳蜀急未可攻宜先取漢中張魯以得勝之兵取蜀可一鼓而下也曹操曰正合吾意遂起兵西征正是方逞凶謀欺弱主又驅徑卒掃偏邦未知後事如何且看下文分解
