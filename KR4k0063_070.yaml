body:
  text: 第七十回猛張飛智取瓦口隘老黃忠計奪天蕩山卻説張郃部兵三萬分為三寨各傍山險一名宕渠寨一名蒙頭寨一名蕩石寨當日張郃於三寨中各分軍一半去取巴西留一半守寨早有探馬報到巴西説張郃引兵來了張飛急喚雷銅商議銅曰閬中地惡山險可以埋伏將軍引兵出戰我出奇兵相助郃可擒矣張飛撥精兵五千與雷銅去訖飛自引兵一萬離閬中三十裏與張郃兵相遇兩軍擺開張飛出馬單搦張郃郃挺槍縱馬而出戰到二十餘合郃後軍忽然喊起原來望見山背後有蜀兵旗幡故此擾亂張郃不敢戀戰撥馬回走張飛從後掩殺前面雷銅又引兵殺出兩下夾攻郃兵大敗張飛雷銅連夜追襲直趕到宕渠山張郃仍舊分兵守住三寨多置擂木炮石堅守不戰張飛離宕渠十裏下寨次日引兵搦戰郃在山上大吹大擂飲酒並不下山張飛令軍士大罵郃只不出飛只得還營次日雷銅又去山下搦戰郃又不出雷銅驅軍士上山山上擂木炮石打將下來雷銅急退蕩石蒙頭兩寨兵出殺敗雷銅次日張飛又去搦戰張郃又不出飛使軍人百般穢罵郃在山上亦罵張飛尋思無計可施相拒五十餘日飛就在山前扎住大寨每日飲酒飲至大醉坐於山前辱罵玄德差人犒軍見張飛終日飲酒使者回報玄德玄德大驚忙來問孔明孔明笑曰原來如此軍前恐無好酒成都佳釀極多可將五十甕作三車裝送到軍前與張將軍飲玄德曰吾弟自來飲酒失事軍師何故反送酒與他孔明笑曰主公與翼德做了許多年兄弟還不知其為人耶翼德自來剛強然前於收川之時義釋嚴顔此非勇夫所為也今與張郃相拒五十餘日酒醉之後便坐山前辱罵傍若無人此非貪杯乃敗張郃之計耳玄德曰雖然如此未可托大可使魏延助之孔明令魏延解酒赴軍前車上各插黃旗大書軍前公用美酒魏延領命解酒到寨中見張飛傳説主公賜酒飛拜受訖分付魏延雷銅各引一枝人馬為左右翼只看軍中紅旗起便各進兵教將酒擺列帳下令軍士大開旗鼓而飲有細作報上山來張郃自來山頂觀望見張飛坐於帳下飲酒令二小卒於前面相撲為戲郃曰張飛欺我太甚傳令今夜下山劫飛寨令蒙頭蕩石二寨皆出為左右援當夜張郃乘著月色微明引軍從山側而下徑到寨前遙望張飛大明燈燭正坐帳中飲酒張郃當先大喊一聲山頭擂鼓為助直殺入中軍但見張飛端坐不動張郃驟馬到面前一槍刺倒卻是一個草人急勒馬回時帳後連珠炮起一將當先攔住去路睜圓環眼聲如巨雷乃張飛也挺矛躍馬直取張郃兩將在火光中戰到三五十合張郃只盼兩寨來救誰知兩寨救兵已被魏延雷銅兩將殺退就勢奪了二寨張郃不見救兵正沒奈何又見山上火起已被張飛後軍奪了寨柵張郃三寨俱失只得奔瓦口關去了張飛大獲勝捷報入成都玄德大喜方知翼德飲酒是計只要誘張郃下山卻説張郃退守瓦口關三萬軍已折了二萬遣人問曹洪求救洪大怒曰汝不聽吾言強要進兵失了緊要隘口卻又來求救遂不肯發兵使人催督張郃出戰郃心慌只得定計分兩軍去關口山僻埋伏分付曰我詐敗張飛必然趕來汝等就截其歸路當日張郃引軍前進正遇雷銅戰不數合張郃敗走雷銅趕來兩軍齊出截斷回路張郃復回刺雷銅于馬下敗軍回報張飛飛自來與張郃挑戰郃又詐敗張飛不趕郃又回戰不數合又敗走張飛知是計收軍回寨與魏延商議曰張郃用埋伏計殺了雷銅又要賺吾何不將計就計延問曰如何飛曰我明日先引一軍前往汝卻引精兵於後待伏兵出汝可分兵擊之用車十余乘各藏柴草塞住小路放火燒之吾乘勢擒張郃與雷銅報仇魏延領計次日張飛引兵前進張郃兵又至與張飛交鋒戰到十合郃又詐敗張飛引馬步軍趕來郃且戰且走引張飛過山峪口郃將後軍為前復扎住營與飛又戰指望兩彪伏兵出要圍困張飛不想伏兵卻被魏延精兵到趕入峪口將車輛截住山路放火燒車山谷草木皆著煙迷其徑兵不得出張飛只顧引軍衝突張郃大敗死命殺開條路走上瓦口關收聚敗兵堅守不出張飛和魏延連日攻打關隘不下飛見不濟事把軍退二十裏卻和魏延引數十騎自來兩邊哨探小路忽見男女數人各背小包于山僻路攀藤附葛而走飛於馬上用鞭指與魏延曰奪瓦口關只在這幾個百姓身上便喚軍士分付休要驚恐他好生喚那幾個百姓來軍士連忙喚到馬前飛用好言以安其心問其何來百姓告曰某等皆漢中居民今欲還鄉聽知大軍廝殺塞閉閬中官道今過蒼溪從梓潼山檜釿川入漢中還家去飛曰這條路取瓦口關遠近若何百姓曰從梓潼山小路卻是瓦口關背後飛大喜帶百姓入寨中與了酒食分付魏延引兵扣關攻打我親自引騎出梓潼山攻關後便令百姓引路選輕騎五百從小路而進卻説張郃為救軍不到心中正悶人報魏延在關下攻打張郃披挂上馬卻待下山忽報關後四五路火起不知何處兵來郃自領兵來迎旗開處早見張飛郃大驚急往小路而走馬不堪行後面張飛追趕甚急郃棄馬上山尋徑而逃方得走脫隨行只有十餘人步行入南鄭見曹洪洪見張郃只剩十餘人大怒曰吾教汝休去汝取下文狀要去今日折盡大兵尚不自死還來做甚喝令左右推出斬之行軍司馬郭淮諫曰三軍易得一將難求張郃雖然有罪乃魏王所深愛者也不可便誅可再與五千兵徑取葭萌關牽動其各處之兵漢中自安矣如不成功二罪俱罰曹洪從之又與兵五千教張郃取葭萌關郃領命而去卻説葭萌關守將孟達霍峻知張郃兵來霍峻只要堅守孟達定要迎敵引軍下關與張郃交鋒大敗而回霍峻急申文書到成都玄德聞知請軍師商議孔明聚衆將於堂上問曰今葭萌關緊急必須閬中取翼德方可退張郃也法正曰今翼德兵屯瓦口鎮守閬中亦是緊要之地不可取回帳中諸將內選一人去破張郃孔明笑曰張郃乃魏之名將非等間可及除非翼德無人可當忽一人厲聲而出曰軍師何輕視衆人耶吾雖不才願斬張郃首級獻於麾下衆視之乃老將黃忠也孔明曰漢升雖勇爭奈年老恐非張郃對手忠聽了白髮倒豎而言曰某雖老兩臂尚開三石之弓渾身還有千斤之力豈不足敵張郃匹夫耶孔明曰將軍年近七十如何不老忠趨步下堂取架上大刀輪動如飛壁上硬弓邊拽折兩張孔明曰將軍要去誰為副將忠曰老將嚴顔可同我去但有疏虞先納下這白頭玄德大喜即時令嚴顔黃忠去與張郃交戰趙雲諫曰今張郃親犯葭萌關軍師休為兒戲若葭萌關一失益州危矣何故以二老將當此大敵乎孔明曰汝以二人老邁不能成事吾料漢中必於此二人手內可得趙雲等各各哂笑而退卻説黃忠嚴顔到關上孟達霍峻見了心中亦笑孔明欠調度是這般緊要去處如何只教兩個老的來黃忠謂嚴顔曰你可見諸人動靜麼他笑我二人年老今可建奇功以服衆心嚴顔曰願聽將軍之令兩個商議定了黃忠引軍下關與張郃對陳張郃出馬見黃忠笑道你許大年紀猶不識羞尚欲出戰耶忠怒曰豎子欺吾年老吾手中寶刀不老遂拍馬向前與郃決戰二馬相交約戰二十餘合忽然背後喊聲起原來是嚴顔從小路抄在張郃軍後兩軍夾攻張郃大敗連夜趕去張郃兵退八九十裏黃忠嚴顔收兵入寨俱各按兵不動曹洪聽知張郃輸了一陳又欲見罪郭淮曰張郃被迫必投西蜀今可遣將助之就如監臨使不生外心曹洪從之即遣夏侯惇之侄夏侯尚並降將韓玄之弟韓浩二人引五千兵前來助戰二將即時起行到張郃寨中問及軍情郃言老將黃忠甚是英雄更有嚴顔相助不可輕敵韓浩曰我在長沙知此老賊利害他和魏延獻了城池害吾親兄今既相遇必當報仇遂與夏侯尚引新軍離寨前進原來黃忠連日哨探已知路徑嚴顔曰此去有山名天蕩山山中乃是曹操屯糧積草之地若取得那個去處斷其糧草漢中可得也忠曰將軍之言正合吾意可與吾如此如此嚴顔依計自領一枝軍去了卻説黃忠聽知夏侯尚韓浩來遂引軍馬出營韓浩在陳前大罵黃忠無義老賊拍馬挺槍來取黃忠夏侯尚便出夾攻黃忠力戰二將各鬥十余合黃忠敗走二將趕二十余裏奪了黃忠寨忠又草創一營次日夏侯尚韓浩趕來忠又出陳戰數合又敗走二將又趕二十餘裏奪了黃忠營寨喚張郃守後寨郃來前寨諫曰黃忠連退二日於中必有詭計夏侯尚叱張郃曰你如此膽怯可知屢次戰敗今再休多言看吾二人建功張郃羞赧而退次日二將又戰黃忠又敗退二十裏二將迤邐趕上次日二將兵出黃忠望風而走連敗數陳直退在關上二將扣關下寨黃忠堅守不出孟達暗暗發書申報玄德説黃忠連輸數陳現今退在關上玄德慌問孔明孔明曰此乃老將驕兵之計也趙雲等不信玄德差劉封來關上接應黃忠忠與封相見問劉封曰小將軍來助戰何意封曰父親得知將軍數敗故差某來忠笑曰此老夫驕兵之計也看今夜一陳可盡復諸營奪其糧食馬匹此是借寨與彼屯輜重耳今夜留霍峻守關孟將軍可與我搬糧草奪馬匹小將軍看我破敵是夜二更忠引五千軍開關直下原來夏侯尚韓浩二將連日見關上不出盡皆懈怠被黃忠破寨直入人不及甲馬不及鞍二將各自逃命而走軍馬自相踐踏死者無數比及天明連奪三寨寨中丟下軍器鞍馬無數盡教孟達搬運入關黃忠催軍馬隨後而進劉封曰軍士力困可以暫歇忠曰不入虎穴焉得虎子策馬先進士卒皆努力向前張郃軍兵反被自家敗兵衝動都屯扎不住望風而走盡棄了許多寨柵直奔至漢水傍張郃尋見夏侯尚韓浩議曰此天蕩山乃糧草之所更接米倉山亦屯糧之地是漢中軍士養命之源倘若疏失是無漢中也當思所以保之夏侯尚曰米倉山有吾叔夏侯淵分兵守護那裏正接定軍山不必憂慮天蕩山有吾兄夏侯德鎮守我等宜往投之就保此山於是張郃與二將連夜投天蕩山來見夏候德具言前事夏侯德曰吾此處屯十萬兵你可引去復取原寨郃曰只宜堅守不可妄動忽聽山前金鼓大震人報黃忠兵到夏候德大笑曰老賊不諳兵法只恃勇耳郃曰黃忠有謀非止勇也德曰川兵遠涉而來連日疲困更兼深入戰境此無謀也郃曰亦不可輕敵且宜堅守韓浩曰願借精兵三千擊之當無不克德遂分兵與浩下山黃忠整兵來迎劉封諫曰日已西沈矣軍皆遠來勞困且宜暫息忠笑曰不然此天賜奇功不取是逆天也言畢鼓噪大進韓浩引兵來戰黃忠揮刀直取浩只一合斬浩于馬下蜀兵大喊殺上山來張郃夏侯尚急引軍來迎忽聽山後大喊火光沖天而起上下通紅夏侯德提兵來救火時正遇老將嚴顔手起刀落斬夏侯德于馬下原來黃忠預先使嚴顔引軍埋伏於山僻去處只等黃忠軍到卻來放火柴草堆上一齊點著烈焰飛騰照耀山峪嚴顔既斬夏侯德從山後殺來張郃夏侯尚前後不能相顧只得棄天蕩山望定軍山投奔夏侯淵去了黃忠嚴顔守住天蕩山捷音飛報成都玄德聞之聚衆將慶喜法正曰昔曹操降張魯定漢中不因此勢以圖巴蜀乃留夏侯淵張郃二將屯守而自引大軍北還此失計也今張郃新敗天蕩失守主公若乘此時舉大兵親往征之漢中可定也既定漢中然後練兵積粟觀釁伺隙進可討賊退可自守此天與之時不可失也玄德孔明皆深然之遂傳令趙雲張飛為先鋒玄德與孔明親自引兵十萬擇日圖漢中傳檄各外嚴加提備時建安二十三年秋七月吉日玄德大軍出葭萌關下營召黃忠嚴顔到寨厚賞之玄德曰人皆言將軍老矣惟軍師獨知將軍之能今果立奇功但今漢中定軍山乃南鄭保障糧草積聚之所若得定軍山陽平一路無足憂矣將軍還敢取定軍山否黃忠慨然應諾便要領兵前去孔明急止之曰老將軍雖然英勇然夏侯淵非張郃之比也淵深通韜略善曉兵機曹操倚之為西涼藩蔽先曾屯兵長安拒馬孟起今又屯兵漢中操不托他人而獨托淵者以淵有將才也今將軍雖勝張郃未卜能勝夏侯淵吾欲酌量著一人去荊州替回關將軍來方可敵之忠奮然答曰昔廉頗年八十尚食鬥米肉十斤諸侯畏其勇不敢侵犯趙界何況黃忠未及七十乎軍師言吾老吾今並不用副將只將本部兵三千人去立斬夏侯淵首級納於麾下孔明再三不容黃忠只是要去孔明曰既將軍要去吾使一人為監軍同去若何正是請將須行激將法少年不若老年人未知其人是誰且看下文分解
