body:
  text: 第七十四回龐令明擡櫬決死戰關雲長放水淹七軍卻説曹操欲使于禁赴樊城救援問衆將誰敢作先鋒一人應聲願往操視之乃龐德也操大喜曰關某威震華夏未逢對手今遇令明真徑敵也遂加於禁為征南將軍加龐德為征西都先鋒大起七軍前往樊城這七軍皆北方強壯之士兩員領軍將校一名董衡一名董超當日引各頭目參拜於禁董衡曰今將軍提七枝重兵去解樊城之厄期在必勝乃用龐德為先鋒豈不誤事禁驚問其故衡曰龐德原系馬超手下副將不得已而降魏今其故主在蜀職居五虎上將況其親兄龐柔亦西川為官今使他為先鋒是潑油救火也將軍何不啓知魏王別換一人去禁聞此語遂連夜入府啓知曹操操省悟即喚龐德至階下令納下先鋒印德大驚曰某正欲與大王出力何故不肯見用操曰孤本無猜疑但今馬超現在西川汝兄龐柔亦在西川俱佐劉備孤縱不疑奈衆口何龐德聞之免冠頓首流血滿面而告曰某自漢中投降大王每感厚恩雖肝腦塗地不能補報大王何疑于德也德昔在故鄉時與兄同居嫂甚不賢德乘醉殺之兄恨德入骨髓誓不相見恩已斷矣故主馬超有勇無謀兵敗地亡孤身入川今與德各事其主舊義已絶德感大王恩遇安敢萌異志惟大王察之操乃扶起龐德撫慰曰孤素知卿忠義前言特以安衆人之心耳卿可努力建功卿不負孤孤亦必不負卿也德拜謝回家令匠人造一木櫬次日請諸友赴席列櫬於堂衆親友見之皆驚問曰將軍出師何用此不祥之物德舉杯謂親友曰吾受魏王厚恩誓以死報今去樊城與關某決戰我若不能殺彼必為彼所殺即不為彼所殺我亦當自殺故令備此櫬以示無空回之理衆皆嗟歎德喚其妻李氏與其子龐會出謂其妻曰吾今為先鋒義當效死疆場我若死汝好生看養吾兒吾兒有異相長大必當與吾報仇也妻子痛哭送別德令扶櫬而行臨行謂部將曰吾今去與關某決死戰我若被關某所殺汝等即取吾尸置此櫬中我若殺了關某吾亦即取其首置此櫬內回獻魏王部將五百人皆曰將軍如此忠勇某等敢不竭力相助於是引軍前進有人將此言報知曹操操喜曰龐德忠勇如此孤何憂焉賈詡曰龐德恃血氣之勇欲與關某決死戰臣竊慮之操然其言急令人傳旨戒龐德曰關公智勇雙全切不可輕敵可取則取不可取則宜謹守龐德聞命謂衆將曰大王何重視關某也吾料此去當挫關某三十年之聲價禁曰魏王之言不可不從德奮然趲軍前至樊城耀武揚威鳴鑼擊鼓卻説關公正坐帳中忽探馬飛報曹操差於禁為將領七枝精壯兵到來前部先鋒龐德軍前擡一木櫬口出不遜之言誓欲與將軍決一死戰步離城止三十裏矣關公聞言勃然變色美髯飄動大怒曰天下英雄聞吾之名無不畏服龐德豎子何敢藐視吾耶關平一面攻打樊城吾自去斬此匹夫以雪吾恨平曰父親不可以泰山之重與頑石爭高下辱子願代父去戰龐德關公曰汝試一往吾隨後便來接應關平出帳提刀上馬領兵來迎龐德兩陳對圓魏營一面皂旗上大書南安龐德四個白字龐德青袍銀鎧鋼刀白馬立於陳前背後五百軍兵緊隨步卒數人肩擡木櫬而出關平大罵龐德背主之賊龐德問部卒曰此何人也或答曰此關公義子關平也德叫曰吾奉魏王旨來取汝父之首汝乃疥癩小兒吾不殺汝快喚汝父來平大怒縱馬舞刀來取龐德德橫刀來迎戰三十合不分勝負兩家各歇早有人報知關公公大怒令廖化去攻樊城自己親來迎敵龐德關平接著言與龐德交戰不分勝負關公隨即橫刀出馬大叫曰關雲長在此龐德何不早來受死鼓聲響處龐德出馬曰吾奉魏王旨特來取汝首恐汝不信備櫬在此汝若怕死早下馬受降關公大罵曰量汝一匹夫亦何能為可惜我青龍刀斬汝鼠賊縱馬舞刀來取龐德德輪刀來迎二將戰有百餘合精神倍長兩軍各看得癡呆了魏軍恐龐德有失急令鳴金收軍關平恐父年老亦急鳴金二將各退龐德歸寨對衆曰人言關公英雄今日方信也正言間於禁至相見畢禁曰聞將軍戰關公百合之上未得便宜何不且退軍避之德奮然曰魏王命將軍為大將何太弱也吾來日與關某共決一死誓不退避禁不敢阻而回卻説關公回寨謂關平曰龐德刀法慣熟真吾敵手平曰俗雲初生之犢不懼虎父親縱然斬了此人只是西羌一小卒耳倘有疏虞非所以重伯父之托也關公曰吾不殺此人何以雪恨吾意已決再勿多言次日上馬引兵前進龐德亦引兵來迎兩陳對圓二將齊出更不打話出馬交鋒鬥至五十余合龐德撥回馬拖刀而走關公隨後追趕關平恐有疏失亦隨後趕去關公口中大罵龐賊欲使拖刀計吾豈懼汝原來龐德虛作拖刀勢卻把刀就鞍橇挂住偷拽雕弓搭上箭射將來關平眼快見龐德拽弓大叫賊將休放冷箭關公急睜眼看時弓弦響處箭早到來躲閃不及正中左臂關平馬到救父回營龐德勒回馬輪刀趕來忽聽得本營鑼聲大震德恐後軍有失急勒馬回原來于禁見龐德射中關公恐他成了大功滅已威風故鳴金收軍龐德回馬問何故鳴金於禁曰魏王有戒關公智勇雙全他雖中箭只恐有詐故鳴金收軍德曰若不收軍吾已斬了此人也禁曰緊行無好步當緩圖之龐德不知於禁之意只懊悔不已卻説關公回營拔了箭頭幸得箭射不深用金瘡藥敷之關公痛恨龐德謂衆將曰吾誓報此一箭之仇衆將對曰將軍且暫安息幾日然後與戰未遲次日人報龐德引軍搦戰關公就要出戰衆將勸住龐德令小軍毀罵關平把住隘口分付衆將休報關公龐德搦戰十余日無人出迎乃與於禁商議曰眼見關公箭瘡舉發不能動止不若乘此機會統七軍一擁殺入寨中可救樊城之圍于禁恐龐德成功只把魏王戒旨相推不肯動兵龐德纍欲動兵於禁只不允乃移七軍轉過山口離樊城北十裏依山下寨禁自領兵截斷大路令龐德屯兵于穀後使德不能進兵成功卻説關平見關公箭瘡已合甚是喜悅忽聽得於禁移七軍于樊城之北下寨未知其謀即報知關公公遂上馬引數騎上高阜處望之見樊城城上旗號不整軍士慌亂城北十裏山谷之內屯著軍馬又見襄江水勢甚急看了半響喚向導官問曰樊城北十裏山谷是何地名對曰罾口川也關公喜曰於禁必為我擒矣將士問曰將軍何以知之關公曰魚入罾口豈能久乎諸將未信公回本寨時值八月秋天驟雨數日公令人預備船筏收拾水具關平問曰陸地相持何用水具公曰非汝所知也於禁七軍不屯于廣易之地而聚於罾口川險隘之處方今秋雨連綿襄江之水必然泛漲吾已差人堰住各處水口待水發時乘高就船放水淹樊城罾口川之兵皆為魚鱉矣關平拜服卻説魏軍屯於罾口川連日大雨不止督將成何來見於禁曰大軍屯於川口地勢甚低雖有土山離營稍遠即今秋雨連綿軍士艱辛近有人報説荊州兵移于高阜處又於漢水口預備戰筏倘江水泛漲我軍危矣宜早為計於禁叱曰匹夫惑吾軍心耶再有多言者斬之成何羞漸而退卻來見龐德説此事德曰汝所見甚當于將軍不肯移兵吾明日自移軍屯於他處計議方定是夜風雨大作龐德坐於帳中只聽得萬馬爭奔征鼙震地德大驚急出帳上馬看時四面八方大水驟至七軍亂竄隨波逐浪者不計其數平地水深丈余于禁龐德與諸將官各登小山避水比及平明關公及衆將皆搖旗鼓躁乘大船而來于禁見四下無路左右止有五六十人料不能逃口稱願降關公充盡去衣甲拘收入船然後來擒龐德時龐德並二董及成何與步卒五百人皆無衣甲立於堤上見關公來龐德全無懼怯奮然前來接戰關公將船四面圍定軍士一齊放箭射死魏兵大半董衡董超見勢已危乃告龐德曰軍士折傷大半四下無路不如投降龐德大怒曰吾受魏王厚恩豈肯屈節於人遂親斬董衡董超於前厲聲曰再説降者以此二人為例於是衆皆奮力禦敵自平明戰至日中勇力倍增關公催四面急攻矢石如雨德令軍士用短兵接戰德回顧成何曰吾聞勇將不怯死以苟免壯士不毀節而求生今日乃我死日也汝可努力死戰成何依令向前被關公一箭射落水中衆軍皆降止有龐德一人力戰正遇荊州數十人駕小船近堤來德提刀飛身一躍早上小船立殺十余人餘皆棄船赴水逃命龐德一手提刀一手使短棹欲向樊城而走只見上流頭一將撑大筏而至將小船撞翻龐德落于水中船上那將跳下水去生擒龐德上船衆視之擒龐德者乃周倉也倉素知水性又在荊州住了數年愈加慣熟更兼力大因此擒了龐德於禁所領七軍皆死于水中其會水者料無去路亦皆投降後人有詩曰夜半征鼙響震天襄樊平地作深淵關公神算誰能及華夏威名萬古傳關公回到高阜去處升帳而坐群刀手押過於禁來禁拜伏於地乞哀請命關公曰汝怎敢抗吾禁曰上命差遣身不由已望君侯憐憫誓以死報公綽髯笑曰吾殺汝猶殺狗彘耳空汙刀斧令人縛送荊州大牢內監候待吾回別作區處發落去訖關公又令押過龐德德睜眉怒目立而不跪關公曰汝兄現在漢中汝故主馬超亦在蜀中為大將汝如何不早降德大怒曰吾寧死於刀下豈降汝耶罵不絶口公大怒喝令刀斧手推出斬之德引頸受刑關公憐而葬之於是乘水勢未退復上戰船引大小將校來攻樊城卻説樊城周圍白浪滔天水勢益甚城桓漸漸浸塌男女擔土搬磚填塞不住曹軍衆將無不喪膽慌忙來告曹仁曰今日之危非力可救可趁敵軍未至乘舟夜走雖然失城尚可全身仁從其言方欲備船出走滿寵諫曰不可山水驟至豈能長存不旬日即當自退關公雖未攻城已遣別將在郟下其所以敢輕進者慮吾軍襲後也今若棄城而去黃河以南非國家之有矣願將軍固守此城以為保障仁供手稱謝曰非伯寧之教幾誤大事乃騎白馬上城聚衆將發誓曰吾受魏王命保守此城但有言棄城而去者斬諸將皆曰某等願以死據守仁大喜就城上設弓弩數百軍士晝夜防護不敢懈怠老幼居民擔土石填塞城桓旬日之內水勢漸退關公自擒魏將於禁等威震天下無不驚駭忽次子關興來寨內省親公就令興齎諸官立功文書去成都見漢中王各求升遷興拜辭父親徑投成都去訖卻説關公分兵一半直抵郟下公自領兵四面攻打樊城當日關公自到北門立馬揚鞭指而問曰汝等鼠輩不早來降更待何時正言間曹仁在敵樓上見關公身上止披掩心甲斜袒著緑袍乃急招五百弓弩手一齊放箭公急勒馬回時右臂上中一弩箭翻身落馬正是水裏七軍方喪膽城中一箭忽傷身未知關公性命如何且看下文分解
