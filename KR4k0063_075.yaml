body:
  text: 第七十五回關雲長刮骨療毒呂子明白衣渡江卻説曹仁見關公落馬即引兵沖出城來被關平一陳殺回救關公歸寨撥出臂箭原來箭頭有藥毒已入骨右臂青腫不能運動關平慌與衆將商議曰父親若損此臂安能出敵不如暫回荊州調理於是與衆將入帳見關公公問曰汝等來有何事衆對曰某等因見吾侯右臂損傷恐臨敵致怒衝突不便衆議可暫班師回荊州調理公怒曰吾取樊城只在目前取了樊城即當長驅大進徑到許都剿滅操賊以安漢室豈可因小瘡而誤大事汝等敢慢吾軍心耶平等默然而退衆將見公不肯退兵瘡又不痊只得四方訪問名醫忽一日有人從江東駕小舟而來直至寨前小校引見關平平視其人方巾闊服臂挽青囊自言姓名乃沛國譙郡人姓華名他字元化因聞關將軍乃天下英雄今中毒箭特來醫治平曰莫非昔日醫東吳周泰者乎他曰然平大喜即與衆將同引華他入帳見關公時關公本是臂疼恐慢軍心無可消遣正與馬良奕棋聞有醫者至即召入禮畢賜坐茶罷他請臂視之公袒下衣袍伸臂令他看視他曰此乃弩箭所傷其中有烏頭之藥直透入骨若不早治此臂無用矣公曰用何物治之他曰某自有治法但恐君侯懼耳公笑曰吾視死如歸有何懼哉他曰當於靜處立一標柱上釘大環請君侯將臂穿於環中以繩系之然後以被蒙其首吾用尖刀割開皮肉直至於骨刮去骨上箭毒用藥敷之以線縫其口方可無事但恐君侯懼耳公笑曰如此容易何用柱環令設酒席相待公飲數杯酒畢一面仍與馬良奕棋伸臂令他割之他取尖刀在手令一小校捧一大盆於臂下接血他曰某便下手君侯勿驚公曰任汝醫治吾豈比世間俗子懼痛者耶他乃下刀割開皮肉直至於骨骨上已青他用刀刮骨悉悉有聲帳上帳下見者皆掩面失色公飲酒食肉談笑奕棋全無痛苦之色須臾血流盈盆他刮盡其毒敷上藥以線縫之公大笑而起謂衆將曰此臂伸舒如故並無痛矣先生真神醫也他曰某為醫一生未嘗見此君侯真天神也後人有詩曰治病須分內外科世間妙藝苦無多神威罕及惟關將聖手能醫説華他關公箭瘡既愈設席款謝華他他曰君侯箭瘡雖治然須愛護切勿怒氣傷觸過百日後平復如舊矣關公以金百兩酬之他曰某聞君侯高義特來醫治豈望報乎堅辭不受留藥一貼以敷瘡口辭別而去卻説關公擒了於禁斬了龐德威名大震華夏皆驚探馬報到許都曹操大驚聚文武商議曰某素知雲長智勇蓋世今據荊襄如虎生翼于禁被擒龐德被斬魏兵挫鋭倘彼率兵直至許都如之奈何孤欲遷都以避之司馬懿諫曰不可于禁等被水所淹非戰之故於國家大計本無所損今孫劉失好雲長得志孫權必不喜大王可遣使去東吳陳説利害今孫權暗暗起兵躡雲長之後許事平之日割江南之地以封孫權則樊城之危自解矣主薄蔣濟曰仲達之言是也今可即發使往東吳不必遷都動衆操依允遂不遷都因歎謂諸將曰於禁從孤三十年何期臨危反不如龐德也今一面遣使致書東吳一面必得一大將以當雲長之鋭言未畢階下一將應聲而出曰某願往操視之乃徐晃也操大喜遂撥精兵五萬令徐晃為將呂建副之克日起兵前到陽陵坡駐扎看東南有應然後征進卻説孫權接得曹操書信覽畢欣然應允即修書付使者先回乃聚文武商議張昭曰近聞雲長擒於禁斬龐德威震華夏操欲遷都以避其鋒今樊城危急遣使求救事定之後恐有反覆權未及言忽報呂蒙乘小舟自陸口來有事面稟權召入問之蒙曰今雲長提兵圍樊城可乘其遠出襲取荊州權曰孤欲北取徐州如何蒙曰今操遠在河北未暇東顧徐州守兵無多往自可克然其地勢利於陸戰不利水戰縱然得之亦難保守不如先取荊州全據長江別作良圖權曰孤本欲取荊州前言特以試卿耳卿可速為孤圖之孤當隨後便起兵也呂蒙辭了孫權回至陸口早有哨馬報説沿江上下或二十裏或三十裏高阜處各有烽火臺又聞荊州軍馬整肅預有準備蒙大驚曰若如此急難圖也我一時在吳侯面前勸取荊州今卻如何處置尋思無計乃託病不出使人回報孫權權聞呂蒙患病心甚怏怏陸遜進言曰呂子明之病乃詐耳非真病也權曰伯言既知其詐可往視之陸遜領命星夜至陸口寨中來見呂蒙果然面無病色遜曰某奉吳侯命敬探子明貴恙蒙曰賤軀偶病何勞探問遜曰吳侯以重任付公公不乘時而動空懷鬱結何也蒙目視陸遜良久不語遜曰愚有小方能治將軍之疾未審可用否蒙乃屏退左右而問曰伯言良方乞早賜教遜笑曰子明之疾不過因荊州兵馬整肅沿江有烽火臺之備耳豫有一計令沿江守吏不能舉火荊州之兵束手歸降可乎蒙驚謝曰伯言之語如見我肺腑願聞良策陸遜曰雲長倚恃英雄自料無敵所慮者惟將軍耳將軍乘此機會托疾辭職以陸口之任讓之他人使他人卑辭讚美關公以驕其心彼必盡撤荊州之兵以向樊城若荊州無備用一旅之師別出奇計襲之則荊州在掌握之中矣蒙大喜曰真良策也由是呂蒙託病不起上書辭職陸遜回見孫權具言前計孫權乃召呂蒙還建業養病蒙至入見權權問曰陸口之任昔周公瑾薦魯子敬以自代後子敬又薦卿自代今卿亦須薦一才望兼隆者代卿為妙蒙曰若用望重之人雲長必然提備陸遜意思深長而未有遠名非雲長所忌若即用以代臣之任必有所濟權大喜即日拜陸遜為偏將軍右都督代蒙守陸口遜謝曰某年幼無學恐不堪重任權曰子明保卿必不差錯卿毋得推辭遜乃拜受印綬連夜往陸口交割馬步水三軍已畢即修書一封具名馬異錦酒禮等物遣使齎赴樊城見關公時公正將息箭瘡按兵不動忽報江東陸口守將呂蒙病危孫權取回調理近拜陸遜為將代呂蒙守陸口今遜差人齎書具禮特來拜見關公召入指來使而言曰仲某見識短淺用此孺子為將來使伏地告曰陸將軍呈書備禮一來與君侯作賀二來求兩家和好幸乞笑留公拆書視之書詞極其卑謹關公覽畢仰面大笑令左右收了禮物發付使者回去使者回見陸遜曰關公欣喜無復有憂江東之意遜大喜密遣人探得關公果然撤荊州大半兵赴樊城聽調只待箭瘡痊可便欲進兵遜察知備細即差人星夜報知孫權孫權召呂蒙商議曰今雲長果撤荊州之兵攻取樊城便可設計襲取荊州卿與吾弟孫皎同引大軍前去何如孫皎字叔明乃孫權叔父孫靜之次子也蒙曰主公若以蒙可用則獨用蒙若以叔明可用獨用叔明豈不聞昔日周瑜程普為左右都督事雖決於瑜然普自以舊臣而居瑜下頗不相睦後因見瑜之才方始敬服今蒙之才不及瑜而叔明之親勝於普恐未必能相濟也權大悟遂拜呂蒙為大都督總制江東諸路軍馬令孫皎在後接應糧草蒙拜謝點兵三萬快船八十餘隻選會水者扮作商人皆穿白衣在船上搖櫓卻將精兵伏於舟冓舟鹿船中次調韓當蔣欽朱然潘璋周泰徐盛丁奉等七員大將相繼而進其餘皆隨吳侯為合後救應一面遣使致書曹操令進兵以襲雲長之後一面先傳報陸遜然後發白衣人駕快船往潯陽江去晝夜趲行直抵北岸江邊烽火臺上守台軍盤問時吳人答曰我等皆是客商因江中阻風到此一避隨將財物送與守台軍士軍士信之遂任其停泊江邊約至二更舟冓舟鹿中精兵齊出將烽火臺上官軍縛倒暗號一聲八十餘船精兵俱起將緊要去處墩台之軍盡行捉入船中不曾走了一個於是長驅大進徑取荊州無人知覺將至荊州呂蒙將沿江墩台所獲官軍用好言撫慰各各重賞令賺開城門縱火為號衆軍領命呂蒙便教前導比及半夜到城下叫門門吏認得是荊州之兵開了城門衆軍一聲喊起就城門裏放起號火吳兵齊入襲了荊州呂蒙便傳令軍中如有妄殺一人妄取民間一物者定按軍法原任官吏並依舊職將關公家屬另養別宅不許間人攪擾一面遣人申報孫權一日大雨蒙上馬引數騎點看四門忽見一人取民間箬笠以蓋鎧甲蒙喝左右執下問之乃蒙之鄉人也蒙曰汝雖系我同鄉但吾號令已出汝故犯之當按軍法其人泣告曰某恐雨濕官鎧故取遮蓋非為私用乞將軍念同鄉之情蒙曰吾固知汝為覆官鎧然終是不應取民間之物叱左右推下斬之梟首傳示畢然後收其尸首泣而葬之自是三軍震肅不一日孫權領衆至呂蒙出郭迎接入衙權慰勞畢仍命潘浚為治中掌荊州事監內州事監內放出於禁遣歸曹操安民賞軍設宴慶賀權謂呂蒙曰今荊州已得但公安傅士仁南郡糜芳此二處如何收復言未畢忽一人出曰不須張弓只箭某憑三寸不爛之舌説公安傅士仁來降可乎衆視之乃虞翻也權曰仲翔有何良策可使傅士仁歸降翻曰某自幼與士仁交厚今若以利害説之彼必歸矣權大喜遂令虞翻領五百軍徑奔公安來卻説傅士仁聽知荊州有失急令閉城堅守虞翻至見城門緊閉遂寫書拴於箭上射入城中軍士拾得獻與傅士仁士仁拆書視之乃招降之意覽畢想起關公去日恨吾之意不如早降即令大開城門請虞翻入城二人禮畢各訴舊情翻説吳侯寬洪大度禮賢下士士仁大喜即同虞翻齎印綬來荊州投降孫權大悅仍令去守公安呂蒙密謂權曰令雲長未獲留士仁於公安久必有變不若使往南郡招糜芳歸降權乃召傅士仁謂曰糜芳與卿交厚卿可招來歸降孤自當有重賞傅士仁慨然領諾遂引十餘騎徑投南郡招安糜芳正是今日公安無守志從前王甫是良言未知此去如何且看下文分解
