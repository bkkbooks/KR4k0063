body:
  text: 第七十七回玉泉山關公顯聖洛陽城曹操感神卻説孫權求計于呂蒙蒙曰吾料關某兵少必不從大路而逃麥城正北有險峻小路必從此路而去可令朱然引精兵五千伏于麥城之北二十裏彼軍至不可與敵只可隨後掩殺彼軍定無戰心必奔臨沮卻令潘璋引精兵五百伏於臨沮山僻小路關某可擒矣今遣將士各門攻打只空北門待其出走權聞計令呂范再蔔之卦成範告曰此卦主敵人投西北而走今夜亥時必然就擒權大喜遂令朱然潘璋領兩枝精兵各依軍令埋伏去訖且説關公在麥城計點馬步軍兵止剩三百餘人糧草又盡是夜城外吳兵招喚各軍姓名越城而去者甚多救兵又不見到心中無計謂王甫曰吾悔昔日不用公言今日危急將復何如甫哭告曰今日之事雖子牙復生亦無計可施也趙纍曰上庸救兵不至乃劉封孟達按兵不動之故何不棄此孤城奔入西川再整兵來以圖恢復公曰吾亦欲如此遂上城觀之見北門外敵軍不多因問本城居民此去往北地勢若何答曰此去皆是山僻小路可通西川公曰今夜可走此路王甫諫曰小路有埋伏可走大路公曰雖有埋伏吾何懼哉即下令馬步官軍嚴整裝束準備出城甫哭曰君侯於路小心保重某與部卒百餘人死據此城城雖破身不降也專望君侯速來救援公亦與泣別遂留周倉與王甫同守麥城關公自與關平趙纍引殘卒二百餘人突出北門關公橫刀前進行至初更以後約走二十餘裏只見山凹處金鼓齊鳴喊聲大震一彪軍到為首大將朱然驟馬挺槍叫曰雲長休走趁早投降免得一死公大怒拍馬輪刀來戰朱然便走公乘勢追一棒鼓響四下伏兵皆起公不敢戰望臨沮小路而走朱然率兵掩殺關公所隨之兵漸漸稀少走不得四五裏前面喊聲又震火光大起潘璋驟馬舞刀殺來公大怒輪刀相迎只三合潘璋敗走公不敢戀戰急望山路而走背後關平趕來報説趙纍已死於亂軍中關公不勝悲惶遂令關平斷後公自在前開路隨行止剩十餘人行至決石兩下是山山邊皆蘆葦敗草樹木叢雜時已五更將盡正走之間一聲喊起兩下伏兵盡出長鈎套索一齊並舉先把關公坐下馬絆倒關公翻身落馬被潘璋部將馬忠所獲關平知父被擒火速來救背後潘璋朱然率兵齊至把關平四下圍住平孤身獨戰力盡亦被執至天明孫權聞關公父子已被擒獲大喜聚衆將於帳中少時馬忠簇擁關公至前權曰孤久慕將軍盛德欲結秦晉之好何相棄耶公平昔日以為天下無敵今日何由被吾所擒將軍今日還服孫權否關公厲聲罵曰碧眼小兒紫髯鼠輩吾與劉皇叔桃園結義誓扶漢室豈與汝叛漢之賊為伍耶我今誤中姦計有死而已何必多言權回顧衆官曰雲長世之豪傑孤深愛之今欲以禮相待勸使歸降何如主薄左鹹曰不可昔曹操得此人時封侯賜爵三日一小宴五日一大宴上馬一提金下馬一提銀如此恩禮畢竟留之不住聽其斬關殺將而去致使今日反為所逼幾欲遷都以避其鋒今主公既已擒之若不即除恐貽後患孫權沈吟半響曰斯言是也遂命推出於是關公父子皆遇害時建安二十四年冬十二月也關公亡年五十八歲後人有詩歎曰漢末才無敵雲長獨出群神威能奮武儒雅更知文天日心如鏡春秋義薄雲昭然垂萬古不止冠三分又有詩曰人傑惟追古解良士民爭拜漢雲長桃園一日兄和弟俎豆千秋帝與王氣挾風雷無匹敵志垂日月有光芒至今廟貌盈天下古木寒鴉幾夕陽關公既歿會下赤兔馬被馬忠所獲獻與孫權權即賜馬忠騎坐其馬數日不食草料而死卻説王甫在麥城中骨顫肉驚乃問周倉曰昨夜夢見主公渾身血污立於前急問之忽然驚覺不知主何吉凶正説間忽報吳兵在城下將關公父子首級招安王甫周倉大驚急登城視之果關公父子首級也王甫大叫一聲墮城而死周倉自刎而亡於是麥城亦屬東吳卻説關公一魂不散蕩蕩悠悠直至一處乃荊門州當陽縣一座山名為玉泉山山上有一老僧法名普淨原是汜水關鎮國寺中長老後因雲遊天下來到此處見山明水秀就此結草為庵每日坐禪參道身邊只有一小行者化飯度日是夜月白風清三更已後普淨正在庵中默坐忽聞空中有人大呼曰還我頭來普淨仰面諦視只見空中一人騎赤兔馬提青龍刀左有一白麵將軍右有一黑臉虯髯之人相隨一齊按落雲頭至玉泉山頂普淨認得是關公遂以手中鏖尾擊其戶曰雲長安在關公英魂頓悟即下馬乘鳳落於庵前叉手問曰吾師何人願求法號普淨曰老僧普淨昔日汜水關前鎮國寺中曾與君侯相會今日豈遂忘之耶公曰向蒙相救銘感不忘今某已遇禍而死願求清誨指點迷途普淨曰昔非今是一切休論後果前因彼此不爽今將軍為呂蒙所害大呼還我頭來然則顔良文醜五關六將等衆人之頭又將向誰索耶於是關公恍然大悟稽首皈依而去後往往於玉泉山顯聖護民鄉人感其德就於山頂建廟四時致祭後人題一聯於其廟雲赤面秉赤心騎赤兔追風馳驅時無忘赤帝青燈觀青史仗青龍偃月隱微處不愧青天卻説孫權既害了關公遂盡收荊州襄之地賞犒三軍設宴大會諸將慶功置呂蒙于上位顧謂衆將曰孤久不得荊州今唾手而得皆子明之功也蒙再三遜謝權曰昔周郎雄略過人破曹操於赤壁不幸早夭魯子敬代之子敬初見孤時便及帝王大略此一快也曹操東下諸人皆勸孤降子敬獨勸孤召公瑾逆而擊之此二快也惟勸吾荊州與劉備是其一短今子明設計定謀立取荊州勝子敬周郎多矣於是親酌酒賜呂蒙呂蒙接酒欲飲忽然擲杯於地一手揪住孫權厲聲大罵曰碧眼小兒紫髯鼠輩還識我否衆將大驚急救時蒙推倒孫權大步前進坐于孫權位上兩眉倒豎雙眼圓睜大喝曰我自破黃巾以來縱橫天下三十餘年今被汝一旦以姦計圖我我生不能啖汝之肉死當追呂賊之魂我乃漢壽亭侯關雲長也權大驚慌忙率大小將士皆下拜只見呂蒙倒於地上七竊流血而死衆將見之無不恐懼權將呂蒙尸首具棺安葬贈南郡太守孱陵侯命其子呂霸襲爵孫權自此感關公之事驚訝不已忽報張昭自建業而來權召入問之昭曰今主公損了關公父子江東禍不遠矣此人與劉備桃園結義之時誓同生死今劉備已有兩川之兵更兼諸葛亮之謀張黃馬趙之勇備若知雲長父子遇害必起傾國之兵奮力報仇恐東吳難與敵也權聞之大驚跌足曰孤失計較也似此如之奈何昭曰主公勿憂某有一計令西蜀之兵不犯東吳荊州如磐石之安權問何計昭曰今曹操擁百萬之衆虎視華夏劉備急欲報仇必與操約和若二處連兵而來東吳危矣不如先遣人將關公首級轉送曹操明教劉備知是操之所使必痛恨於操西蜀之兵不向吳而向魏矣吾乃觀其勝負於中取事此為上策權從其言隨遣使者以木匣盛關公首級星夜送與曹操時操從摩陂班師回洛陽聞東吳送關公首級至喜曰雲長已死吾夜眠貼席矣階下一人出曰此乃東吳移禍之計也操視之乃主薄司馬懿也操問其故懿曰昔劉關張三人桃園結義之時誓同生死今東吳害了關公懼其復仇故將首級獻與大王使劉備遷怒大王不攻吳而攻魏他卻於中乘便而圖事耳操曰仲達之言是也孤以何策解之懿曰此事極易大王可將關公首級刻一香木之軀以配之葬以大臣之禮劉備知之必深恨孫權盡力南征我卻觀其勝負蜀勝則擊吳吳勝則擊蜀二處若得一處那一處亦不久也操大喜從其計遂召吳使入呈上木匣操開匣視之見關公面如平日操笑曰雲長公別來無恙言未訖只見關公口開目動鬚髮皆張操驚倒衆官急救良久方醒顧謂衆官曰關將軍真天神也吳使又將關公顯聖附體罵孫權追呂蒙之事告操操愈加恐懼遂設牲醴祭祀刻沈香木為軀以王侯之禮葬于洛陽南門外令大小官員送殯操自拜祭贈為荊王差官守墓即遣吳使回江東去訖卻説漢中王自東川回成都法正奏曰王上先夫人去世孫夫人又南歸未必再來人倫之道不可廢也必納王妃以襄內政漢中王從之法正復奏曰吳懿有一妹美而且賢嘗聞有相者相此女後必大貴先曾許劉焉之子劉瑁瑁早夭其女至今寡居大王可納之為妃漢中王曰劉瑁與我同宗於理不可法正曰論其親疏何異晉文之與懷贏乎漢中王乃依允遂納吳氏為王妃後生二子長劉永字公壽次劉理字奉孝且説東西兩川民安國富田禾大成忽有人自荊州來言東吳求婚于關公關公力拒之孔明曰荊州危矣可使人替關公回正商議間荊州捷報使命絡繹而至不一日關興到具言水淹七軍之事忽又報馬到來報説關公于江邊多設墩台提防甚密萬無一失因此玄德放心忽一日玄德自覺渾身肉顫行坐不安至夜不能寧睡起坐內室秉燭看書覺神思昏迷伏幾而臥就室中起一陳冷風燈滅復明擡頭見一人立於燈下玄德問曰汝何人夤夜至吾內室其人不答玄德疑怪自起視之乃是關公於燈影下往來躲避玄德曰賢弟別來無恙夜深至此必有大故吾與汝情同骨肉因何回避關公泣告曰願兄起兵以雪弟恨言訖冷風驟起關公不見玄德忽然驚覺乃是一夢時正三鼓玄德大疑急出前殿使人請孔明來孔明入見玄德細言夢警孔明曰此乃王上心思關公故有此夢何必多疑玄德再三疑慮孔明以善言解之孔明辭出至中門外迎見許靖靖曰某才赴軍師府下報一機密聽知軍師入宮特來至此孔明曰有何機密靖曰某適聞外人傳説東吳呂蒙已襲荊州關公已遇害故特來密報軍師孔明曰吾夜觀天象見將星落于荊楚之地已知雲長必然被禍但恐王上憂慮故未敢言二人正説之間忽然殿內轉出一人扯住孔明衣袖而言曰如此凶信公何瞞我孔明視之乃玄德也孔明許靖奏曰適來所言皆傳聞之事未足深信願王上寬懷勿生憂慮玄德曰孤與雲長誓同生死彼若有失孤豈能獨生耶孔明許靖正勸解之間忽近待奏曰馬良伊籍至玄德急召之問之二人具説荊州已失關公兵敗求救呈上表章未及拆視侍臣又奏荊州廖化至玄德急召入化哭拜於地細奏劉封孟達不發救兵之事玄德大驚曰若如此吾弟休矣孔明曰劉封孟達如此無禮罪不容誅王上寬心亮親提一旅之師去救荊襄之急玄德曰雲長有失孤斷不獨生孤來日自提一軍去救雲長遂一面差人赴閬中報知翼德一面差人會集人馬未及天明一連數次報説關公夜走臨沮為吳將所獲義不屈節父子歸神玄德聽罷大叫一聲昏絶於地正是為念當年同誓死忍教今日獨捐生未知玄德性命如何且看下文分解
