body:
  text: 第八十回曹丕放心篡炎劉漢王正位續大統卻説華歆等一班文武入見獻帝歆奏曰伏睹魏王自登位以來德布四方仁及萬物越古超今雖唐虞無以為此群臣會議言漢祚已終望陛下效堯舜之道以山川社稷禪位與魏王上合天心下合民意則陛下安享清間之福祖宗幸甚生靈幸甚臣等議定特來奏請帝聞奏大驚半晌無言覷百官而哭曰朕想高祖提三尺劍斬蛇起義平秦滅楚創造基業世統相傳四百年矣朕雖不才初無過惡安忍將祖宗大業等間棄了汝百官再從公計議華歆引李伏許芝近前奏曰陛下若不信可問此二人李伏奏曰自魏王即位以來麒麟降生鳳凰來儀黃龍出現嘉禾蔚生甘露下降此是上天示瑞魏當代漢之象也許芝又奏曰臣等職掌司天夜觀乾象見炎漢氣數已終陛下帝星隱匿不明魏國乾象極天際地言之難盡更兼上應圖讖其讖曰鬼在邊委相連當代漢無可言言在東午在西兩日並光上下移以此論之陛下可早禪位鬼在邊委相連是魏字也言在東午在西乃許字也兩日並光上下移乃昌字也此是魏在許昌應受漢禪也願陛下察之帝曰祥瑞圖讖皆虛妄之事奈何以虛妄之事而遽欲朕舍祖宗之基業乎王郎奏曰自古以來有興必有廢有盛必有衰豈有不亡之國不敗之家乎漢室相傳四百餘年延至陛下氣數已盡宜早退避不可遲疑遲則生變矣帝大哭入後殿去了百官哂笑而退次日官僚又集于大殿令宦官入請獻帝帝憂懼不敢出曹後曰百官請陛下設朝陛下何故推阻帝泣曰汝兄欲篡位令百官相逼朕故不出曹後大怒曰吾兄奈何為此亂逆之事耶言未畢只見曹洪曹休帶劍而入請帝出殿曹後大罵曰俱是汝等亂賊希圖富貴共造逆謀吾父功蓋寰區威震天下然且不敢篡竊神器今吾兄嗣位未幾輒思篡漢皇天必不詐爾言罷痛哭入宮左右侍者皆歔欷流涕曹洪曹休力請獻帝出殿帝被逼不過只得更衣出前殿華歆奏曰陛下可依臣等昨日之議免遭大禍帝痛哭曰卿等皆食漢祿久矣中間多有漢朝功臣子孫何忍作此不臣之事歆曰陛下若不從衆議恐旦夕蕭牆禍起非臣等不忠於陛下也帝曰誰敢弒朕耶歆厲聲曰天下之人皆知陛下無人君之福以致四方大亂若非魏王在朝弒陛下者何止一人陛下尚不知恩報德直欲令天下共伐陛下耶帝大驚拂袖而起王朗以目視華歆歆縱步向前扯住龍袍變色而言曰許與不許早發一言帝戰栗不能答曹洪曹休撥劍大呼曰符寶郎何在祖弼應聲出曰符寶郎在此曹洪索要玉璽祖弼叱曰玉璽乃天子之寶安得擅索洪喝令武士推出斬之祖弼大罵不絶口而死後人有詩贊曰漢室亡詐稱禪位效虞唐皆尊魏僅見忠臣符寶郎帝顫栗不已只見階下披甲持戈數百餘人皆是魏兵帝泣謂群臣曰朕願將天下禪于魏王幸留殘喘以終天年賈詡曰魏王必不負陛下陛下可急降詔以安衆心帝只得令陳群草禪國之詔令華歆齎捧詔璽引百官直至魏王宮獻納曹丕大喜開讀詔曰朕在位三十二年遭天下蕩覆幸賴祖宗之靈危而復存然今仰瞻天象俯察民心炎精之數既終行運在乎曹氏是以前王既樹神武之迹今王又光耀明德以應其期歷數昭明信可知矣夫大道之行天下為公唐堯不私於厥子而名播於無窮朕竊慕焉今其追踵堯典禪位於丞相魏王王其毋辭曹丕聽畢便欲受詔司馬懿諫曰不可雖然詔璽已至殿下宜且上表謙辭以絶天下之謗丕從之令王朗作表自稱德薄請別求大賢以嗣天位帝覽表心甚驚疑謂群臣曰魏王廉遜如之奈何華歆曰昔魏武王受王爵之時三辭而詔不許然後受之今陛下可再降詔魏王自當允從又令桓階草詔遣高廟使張音持節奉璽至魏王宮曹丕開讀詔曰咨爾魏王上書廉讓朕竊為漢道陵遲為日已久幸賴武王操德膺符運奮揚神武芟除凶暴清定區夏今王丕纘承前緒至德光昭聲教被四海仁風扇八區天之歷數實在爾躬昔虞舜有大功二十而放勳禪以天下大禹有疏導之績而重華禪以帝位漢承堯運有傳聖之義加順靈祇紹天明命使行禦史大夫張音持節奉皇帝璽綬王其受之曹丕接詔欣喜謂賈詡曰雖二次有詔然終恐天下後世不免篡竊之名也詡曰此事極易可再命張音齎回璽綬卻教華歆令漢帝築一壇名受禪壇擇吉日良辰集大小公卿盡到壇下令天子親奉璽綬禪天下與王使可以釋群疑而絶衆議矣丕大喜即令張音齎回璽綬仍作表謙辭音回奏獻帝帝問群臣曰魏王又讓其意若何華歆奏曰陛下可築一壇名曰受禪壇集公卿庶民明白禪位則陛下子子孫孫必蒙魏恩矣帝從之乃遣太常院官卜地于繁陽築起三層高壇擇於十月庚午日寅時禪讓至期獻帝請魏王曹丕登壇受禪壇下集大小官僚四百余員禦林虎賁禁軍三十余萬帝親捧玉璽奉曹丕丕受之壇下群臣跪聽册曰咨爾魏王昔者唐堯禪位於虞舜舜亦以命禹天命不於常惟歸有德漢道陵遲世失其序降及朕躬大亂滋昏群凶恣逆宇內顛覆賴武王神武拯茲難於四方惟清區夏以保綏我宗廟豈豫一人獲義俾九服實受其賜今王欽承前緒光於乃德恢文武之大業昭爾考之弘烈皇靈降瑞人神告徵誕惟亮采師錫朕命僉曰爾度克協于虞舜用率我唐典敬遜爾位於戲天之歷數在爾躬君其祗順大禮饗萬國以肅承天命讀册已畢魏王曹丕即受八般大禮登了帝位賈詡引大小官僚朝于壇下改延康元年為黃初元年國號大魏丕即傳旨大赦天下諡父曹操為太祖武皇帝華歆曰天無二日民無二主漢帝既禪天下理宜退就藩服乞降明旨安置劉氏于何地言訖扶獻帝跪於壇下聽旨丕降旨封帝為山陽公即日便行華歆按劍指帝厲聲而言曰立一帝廢一帝古之常道今上仁慈不忍加害封汝為山陽公今日便行非宣召不許入朝獻帝含淚拜謝上馬而去壇下軍民等人見之傷感不已丕謂群臣曰禹之事朕知之矣群臣皆呼萬歲後人觀此受禪壇有詩歎曰兩漢經營事頗難一朝失卻舊江山黃初欲學唐虞事司馬將來作樣看百官請曹丕答謝天地丕方下拜忽然壇前卷起一陳怪風飛砂走石急如驟雨對面不見壇上火燭盡皆吹滅丕驚倒於壇上百官急救下壇半晌方醒侍臣扶入宮中數日不能設朝後病稍可方出殿受群臣朝賀封華歆為司徒王郎為司空大小官僚一一升賞丕疾未痊疑許昌宮室多妖乃自許昌幸洛陽大建宮室早有人到成都報説曹丕自立為大魏皇帝于洛陽蓋造宮殿且傳言漢帝已遇害漢中王聞知痛哭終日下令百官挂孝遙望設祭上尊諡曰孝湣皇帝玄德因此憂慮致染成疾不能理事政務皆托與孔明孔明與太傅許靖光祿大夫譙周商議言天下不可一日無君欲尊漢中王為帝譙周曰近有祥風慶雲之瑞成都西北角有黃氣數十丈沖霄而起帝星見於畢胃昴之分煌煌如月此正應漢中王當即帝位以繼漢統更復何疑於是孔明與許靖引大小官僚上表請漢中王即皇帝位漢中王覽表大驚曰卿等欲陷孤為不忠不義之人耶孔明奏曰非也曹丕篡漢自立王上乃漢室苗裔理合繼統以延漢祀漢中王勃然變色曰孤豈效逆賊所為拂袖而起入於後宮衆官皆散三日後孔明又引衆官入朝請漢中王出衆皆拜伏於前許靖奏曰今漢天子已被曹丕所弒王上不即帝位興師討逆不得為忠義也今天下無不欲王上為君為孝湣皇帝雪恨若不從臣等所議是失民望矣漢中王曰孤雖是景帝之孫並未有德澤以布於民今一旦自立為帝與篡竊何異孔明苦勸數次漢中王堅執不從孔明乃設一計謂衆官曰如此如此於是孔明託病不出漢中王聞孔明病篤親到府中直入臥榻邊問曰軍師所感何疾孔明答曰憂心如焚命不久矣漢中王曰軍師所憂何事連問數次孔明只推病重瞑目不答漢中王再三請問孔明喟然歎曰臣自出茅廬得遇大王相隨至今言聽計從今幸大王有兩川之地不負臣夙昔之言目今曹丕篡位漢祀將斬文武官僚咸欲奉大王帝滅魏興劉共圖功名不想大王堅執不肯衆官皆有怨心不久必盡散矣若文武皆散吳魏來攻兩川難保臣安得不憂乎漢中王曰吾非推阻恐天下人議論耳孔明曰聖人雲名不正則言不順今大王名正言順有何可議豈不聞天與弗取反應其咎漢中王曰待軍師病可行之未遲孔明聽罷從榻上躍然而起將屏風一擊外面文武衆官皆入拜伏於地曰王上既允便請擇日以行大禮漢中王視之乃是太傅許靖安漢將軍糜竺青衣侯向舉陽泉侯劉豹別駕趙祚治中楊洪議曹杜瓊從事張爽太常卿賴恭光祿卿黃權祭酒何宗學士尹默司業譙周大司馬殷純偏將軍張裔少府王謀昭文博士伊籍從事郎秦宓等衆也漢中王驚曰陷孤於不義皆卿等也孔明曰王上既允所請便可築壇擇吉恭行大禮即時送漢中王還宮一面令博士許慈諫議郎孟光掌禮築壇于成都武擔之南諸事齊備多官整設鑾駕迎請漢中王登壇致祭譙周在壇上高聲朗讀祭文曰惟建安二十六年四月丙午朔越十二日丁巳皇帝備敢詔告於皇天後土漢有天下歷數無疆曩者王莽篡盜光武皇帝震怒致誅社稷復存今曹操阻兵殘忍戮殺主後罪惡滔天操子丕載肆凶逆竊據神器群下將士以為漢祀墮廢備宜延之嗣武二祖躬行天罰備懼無德忝帝位詢于庶民外及遐荒君長僉曰天命不可以不答祖業不可以久替四海不可以無主率土式望在備一人備畏天明命又懼高光之業將墜於地謹擇吉日登壇告祭受皇帝璽綬撫臨四方惟神饗祚漢家永綏曆服讀罷祭文孔明率衆官恭上玉璽漢中王受了捧於壇上再三推辭曰備無才德請擇才德者受之孔明奏曰王上平定四海功德昭於天下況是大漢宗派宜即正位已祭告天神復何讓焉文武各官皆呼萬歲拜舞禮畢改元章武元年立妃吳氏為皇后長子劉禪為太子封次子劉永為魯王三子劉理為梁王封諸葛亮為丞相許靖為司徒大小官僚一一升賞大赦天下兩川軍民無不欣躍次日設朝文武官僚拜畢列為兩班先主降詔曰朕自桃園與關張結義誓同生死不幸二弟雲長被東吳孫權所害若不報仇是負盟也朕欲起傾國之兵剪伐東吳生擒逆賊以雪此恨言未畢班內一人拜伏於階下諫曰不可先主視之乃虎威將軍趙雲也正是君王未及行天討臣下曾聞進直言未知子龍所諫若何且看下文分解三國演義第三部明羅貫中著
