body:
  text: 第八十四回陸遜營燒七百里孔明巧布八陳圖卻説韓當周泰探知先主移營就涼急來報知陸遜遜大喜遂引兵自來觀看動靜只見平地一屯不滿萬餘人大半皆是老弱之衆大書先鋒吳班旗號周泰曰吾視此等兵如兒戲耳願同韓將軍分兩路擊之如其不勝甘當軍令陸遜看了良久以鞭指曰前面山谷中隱隱有殺氣起其下必有伏兵故於平地設此弱兵以誘我耳諸公切不可出衆將聽了皆以為懦次日吳班引兵來到關前搦戰耀武揚威辱罵不絶多有解衣卸甲赤身裸體或睡或坐徐盛丁奉入帳稟陸遜曰蜀兵欺我太甚某等願出擊之遜笑曰公等但恃血氣之勇未知孫吳妙法此彼誘敵之計也三日後必見詐矣徐盛曰三日後彼移營已定安能擊之乎遜曰吾正欲令彼移營也諸將哂笑而退過三日後會諸將于關上觀望見吳班兵已退去遜指曰殺氣起矣劉備必從山谷中出也言未畢只見蜀兵皆全裝慣束擁先主而過吳兵見了盡皆膽裂遜曰吾之不聽諸公擊班者正為此也今伏兵已出旬日之內必破蜀矣諸將皆曰破蜀當在初時今連營五六百里相守經七八月其諸要害皆已固守安能破乎遜曰諸公不知兵法備乃世之梟雄更多智謀其兵始集法度精專今守之久矣不得我便兵疲意沮取之正今日諸將方才歎服後人有詩贊曰虎帳談兵按六韜安排香餌釣鯨鼇三分自是多英俊又顯江南陸遜高卻説陸遜已定了破蜀之策遂修箋遣使奏聞孫權言指日可以破蜀之意權覽畢大喜曰江東復有此異人孤何憂哉諸將皆上書言其懦孤獨不信今觀其言果非懦也於是大起吳兵來接應卻説先主於猇亭盡驅水軍順流而下沿江屯扎水寨深入吳境黃權諫曰水軍沿江而下進則易退則難臣願為前驅陛下宜在後陳庶萬無一失先主曰吳賊膽落朕長驅大進有何礙乎衆官苦諫先主不從遂分兵兩路命黃權督江北之兵以防防魏寇先主自督江南諸軍夾江分立營寨以圖進取細作探知連夜報知魏主言蜀兵伐吳樹柵連營縱橫七百餘裏分四十餘屯皆傍山林下寨今黃權督兵在江北岸每日出哨百餘裏不知何意魏主聞之仰面笑曰劉備將敗矣群臣請問其故魏主曰劉玄德不曉兵法豈有連營七百里而可以拒敵者乎包原隰險阻屯兵者此兵法之大忌也玄德必敗于東吳陸遜之手旬日之內消息必至矣群臣猶未信皆請撥兵備之魏主曰陸遜若勝必盡舉吳兵去取西川吳兵遠去國中空虛朕虛托以兵助戰令三路一齊進兵東吳唾手可取也衆皆拜服魏主下令使曹仁督一軍出濡須曹休督一軍出洞口曹真督一軍出南郡三路軍馬會合日期暗襲東吳朕隨後自來接應調遣已定不説魏兵襲吳且説馬良至川入見孔明呈上圖本而言曰今移營夾江橫占七百里下四十餘屯皆依溪傍澗林木茂盛之處皇上令良將圖本來與丞相觀之孔明看訖拍案叫苦曰是何人教主上如此下寨可斬此人馬良曰皆主上自為非他人之謀孔明歎曰漢朝氣數休矣良問其故孔明曰包原隰險而結營此兵家之大忌倘彼用火攻何以解救又豈有連營七百里而拒敵乎禍不遠矣陸遜拒守不出正為此也汝當速去見天子改屯諸營不可如此良曰倘今吳兵已勝如之奈何孔明曰陸遜不敢來追成都可保無虞良曰遜何故不追孔明曰恐魏兵襲其後也主上若有失當投白帝城避之吾入川時已伏下十萬兵在魚腹浦矣良大驚曰某於魚復浦往來數次未嘗見一卒丞相何作此詐語孔明曰後來必見不勞多問馬良求了表章火速投禦營來孔明自回成都調撥軍馬救應卻説陸遜見蜀兵懈怠不復提防升帳聚大小將士聽令曰吾自受命以來未嘗出戰今觀蜀兵足知動靜故欲先取江南岸一營誰敢去取言未畢韓當周泰淩統等應聲而出曰某等願往遜教皆退不用獨喚階下末將淳於丹曰吾與汝五千軍去取江南第四營蜀將傅彤所守今晚就要成功吾自提兵接應淳於丹引兵去了又喚徐盛丁奉曰汝等各領兵三千屯於寨外五裏如淳於丹敗回有兵趕來當出救之卻不可追之二將自引軍去了卻説淳于丹于黃昏時分領兵前進到蜀寨時已三更之後丹令衆軍鼓躁而入蜀營內傅彤引軍殺出挺槍直取淳於丹丹敵不住撥馬便回忽然喊聲大震一彪軍攔住去路為首大將趙融丹奪路而走折兵大半正走之間山後一彪蠻兵攔住為首番將沙摩柯丹死戰得脫背後三路軍趕來比及離營五裏吳軍徐盛丁奉二人兩下殺來蜀兵退去救了淳于丹回營丹帶箭入見陸遜請罪遜曰非汝之過也吾欲試敵人之虛實耳破蜀之計吾已定矣徐盛丁奉曰蜀兵勢大難以破之空自損兵折將耳遜笑曰吾這條計但瞞不過諸葛亮耳天幸此人不在使我成大功也遂集大小將士聽令使朱然於水路進兵來日午後東南風大作用船裝載茅草依計而行韓當引一軍攻江北岸周泰引一軍攻江南岸每人手執茅草一把內藏硫黃焰硝各帶火種各執槍刀一齊而上但到蜀營順風舉火蜀兵四十屯只燒二十屯每間一屯燒一屯各軍預帶乾糧不許暫退晝夜追襲只擒了劉備方止衆將聽了軍令各受計而去卻説先主正在禦營尋思破吳之計忽見帳前中軍旗幡無風自倒乃問程畿曰此為何兆畿曰今夜莫非吳兵來劫營先主曰昨夜殺盡安敢再來畿曰倘是陸遜試敵奈何正言間人報山上遠遠望見吳兵盡沿山望東而去先主曰此是疑兵令衆休動命關興張苞各引五百騎出巡黃昏時分關興回奏曰江北營中火起先主急令關興主江北張苞往江南探得虛實倘吳兵到時可急回報二將領命去了初更時分東南風驟起只見禦營左屯火起方欲救時禦營右屯又火起風緊火急樹木皆著喊聲大震兩屯軍馬齊出奔離禦營中禦營軍自相踐踏死者不知其數後面吳兵殺到又不知多少軍馬先主急上馬奔馮習營時習營中火光連天而起江南江北照耀如同白日馮習慌上馬引數十騎而走正逢吳將徐盛軍到敵住廝殺先主見了撥馬投西便走徐盛舍了馮習引兵追來先主正慌前面又一軍攔住乃是吳將丁奉兩下夾攻先主大驚四面無路忽然喊聲大震一彪軍殺入重圍乃是張苞救了先主引禦林軍奔走正行之間前面一軍又到乃蜀將傅彤也合兵一處而行背後吳兵追至先主前到一山名馬鞍山張苞傅彤請先主上的山時山下喊聲又起陸遜大隊人馬將馬鞍山圍住張苞傅彤死據山口先主遙望遍野火光不絶死尸重疊塞江而下次日吳兵又四下放火燒山軍士亂竄先主驚慌忽然火光中一將引數騎殺上山來視之乃關興也興伏地請曰四下火光逼近不可久停陛下速奔白帝城再收軍馬可也先主曰誰敢斷後傅彤奏曰臣願以死當之當日黃昏關興在前張苞在中留傅彤斷後保著先主殺下山來吳兵見先主奔走皆要爭功各引大軍遮天蓋地往西追趕先主令軍士盡脫袍鎧塞道而焚以斷後軍正奔走間喊聲大震吳將朱然引一軍從江岸邊殺來截住去路先主叫曰朕死於此矣關興張苞縱馬衝突被亂箭射回各帶重傷不能殺出背後喊聲又起陸遜引大軍從山谷中殺來先主正慌急之間此時天色已微明只見前面喊聲震天朱然軍紛紛落澗滾滾投岩一彪軍殺入前來救駕先主大喜視之乃常山趙子龍也時趙雲在川中江州聞吳蜀交兵遂引軍出忽見東南一帶火光沖天雲大驚遠遠探視不想先主被困雲奮勇衝殺而來陸遜聞是趙雲急令軍退雲正殺之間忽遇朱然便與交鋒不一合一槍刺朱然于馬下殺散吳兵救出先主望白帝城而走先主曰朕雖得脫諸將士奈何雲曰敵軍在後不可久遲陛下且入白帝城歇息臣再引兵去救應諸將此時先主僅存百餘人入白帝城後人有詩贊陸遜曰持矛舉火破連營玄德窮奔白帝城一旦威名驚蜀魏吳王寧不敬書生卻説傅彤斷後被吳軍八面圍住丁奉大叫曰川兵死者無數降者極多汝主劉備已被擒獲今汝力窮勢孤何不早降傅彤叱曰吾乃漢將安肯降吳狗乎挺槍縱馬率蜀軍奮力死戰不下百餘合往來衝突不能得脫彤長歎曰吾今休矣言訖口中吐血死于吳軍之中後人贊傅彤詩曰彜陵吳蜀大交兵陸遜施謀用火焚至死猶然罵吳狗傅彤不愧漢將軍蜀祭酒程畿匹馬奔至江邊招呼水軍赴敵吳兵隨後追來水軍四散奔逃畿部將叫曰吳兵至矣程祭酒快走罷畿怒曰吾自從主上出軍未嘗赴敵而逃言未畢吳兵驟至四下無路畿撥劍自刎後人有詩贊曰慷慨蜀中程祭酒身留一劍答君王臨危不改平生志博得聲名萬古香時吳班張南久圍彜陵城忽馮習到言蜀兵敗遂引軍來救先主孫桓方才得脫張馮二將正行之間前面吳兵殺來背後孫桓從彜陵城殺出兩下夾攻張南馮習奮力衝突不能得脫死於亂軍之中後人有詩贊曰馮習忠無二張南義無雙沙場甘戰死史册共流芳吳班殺出重圍又遇吳兵追趕幸得趙雲接著救回白帝城去了時的蠻王沙摩柯匹馬奔走正逢周泰戰二十餘合被泰所殺蜀將杜路劉寧盡皆降吳蜀營一應糧草器仗尺寸不存蜀將川兵降者無數時孫夫人在吳聞猇亭兵敗訛傳先主死於軍中遂驅車至江邊望西遙哭投江而死後人立廟江濱號曰梟姬祠尚論者作詩歎之曰先主兵歸白帝城夫人聞難獨捐生至今江畔遺碑在猶著千秋烈女名卻説陸遜大獲全功引得勝之兵往西追襲前離夔關不遠遜在馬上看見前面臨山傍江一陳殺氣沖天而起遂勒馬回顧衆將曰前面必有埋伏三軍不可輕進即倒退十餘裏于地勢空闊處排成陳勢以禦敵軍即差哨馬前去探視回報並無軍屯在此遜不信下馬登高望之殺氣復起遜再令人仔細探視哨馬回報前面並無一人一騎遜見日將西沈殺氣越加心中猶豫令心腹再往探看回報江邊止有亂石八九十堆並無人馬遜大疑令尋土人問之須臾有數人到遜問曰何人將亂石作堆如何亂石堆中有殺氣沖起土人曰此處地名魚腹浦諸葛亮入川之時驅兵到此取石排成陳勢於沙灘之上自此常常有氣如雲從內而起陸遜聽罷上馬引數十騎來看石陳立馬於山坡之上但見四面八方皆有門有戶遜笑曰此乃惑人之術耳有何益焉遂引數騎下山坡來直入石陳觀看部將曰日暮矣請都督早回遜方欲出陳忽然狂風大作一霎時飛沙走石遮天蓋地但見怪石嵯峨槎丫似劍橫沙立土重疊如山江聲浪湧有如劍鼓之聲遜大驚曰吾中諸葛之計也急欲回時無路可出正驚疑間忽見一老人立于馬前笑曰將軍欲出此陳乎遜曰願長者引出老人策杖徐徐而行徑出石陳並無所礙送至山坡之上遜問曰長者何人老人答曰老夫乃諸葛孔明之嶽父黃承彥也昔小壻入川之時於此布下石陳名八陳圖反復八門按遁甲休生傷杜景死驚開每日每時變化無端可比十萬精兵臨去之時曾分付老夫道後有東吳大將迷于陳中莫要引他出來老夫適於山岩之上見將軍從死門而入料想不識此陳必為所迷老夫平生好善不忍將軍陷沒于此故特自生門引出也遜曰公曾學此陳法否黃承彥曰變化無窮不能學也遜慌忙下馬拜謝而回後杜工部有詩曰功蓋三分國名成八陳圖江流石不轉遣恨失吞吳陸遜回寨歎曰孔明真臥龍也吾不能及於是下令班師左右曰劉備兵敗勢窮困守一城正好乘勢擊之今見石陳而退何也遜曰吾非懼石陳而退吾料魏主曹丕其姦詐與父無異今知吾追趕蜀兵必乘虛來襲吾若深入西川急難退矣遂令一將斷後遜率大軍而回退兵未及二日三處人馬飛報魏兵曹丕出濡須曹休出洞口曹真出南郡三路兵馬數十萬星夜至境未知何意遜笑曰不出吾之所料吾已令兵拒之矣正是雄心方欲吞西蜀勝算還須禦北朝未知如何退兵且看下文分解
