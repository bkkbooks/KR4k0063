body:
  text: 第八十九回武鄉侯四番用計南蠻王五次遭擒卻説孔明自駕小車引數百騎前來探路前有一河名曰西洱河水勢雖慢並無一隻船筏孔明令伐木為筏而渡其木到水皆沈孔明遂問呂凱凱曰聞西洱河上流有一山其山多竹大者數圍可令人伐之於河上搭起竹橋以渡軍馬孔明即調三萬人入山伐竹數十萬根順水放下於河面狹處搭起竹橋闊十餘丈乃調大軍于河北岸一字兒下寨便以河為壕塹以浮橋為門壘土為城過橋南岸一字下三個大營以待蠻兵卻説孟獲引數十萬蠻兵恨怒而來將近西洱河孟獲引前部一萬刀牌獠丁直扣前寨搦戰孔明頭戴綸巾身披鶴氅手執羽扇乘駟馬車左右衆將簇擁而出孔明見孟獲身穿犀皮甲頭頂朱紅盔左手挽牌右手執刀騎赤毛牛口中辱罵手下萬余洞丁各舞刀牌往來衝突孔明急令退回本寨四面緊閉不許出戰蠻兵皆裸衣赤身直到寨門前叫罵諸將大怒皆來稟孔明曰某等情願出寨決一死戰孔明不許諸將再三欲戰孔明止曰蠻方之人不遵王化今此一來狂惡正盛不可迎也且宜堅守數日待其猖獗少懈吾自有妙計破之於是蜀兵堅守數日孔明在高阜處探之窺見蠻兵已多懈怠乃聚諸將曰汝等敢出戰否衆將欣然要出孔明先喚趙雲魏延入帳向耳畔低言分付如此如此二人受了計策先進卻喚王平馬忠入帳受計去了又喚馬岱分付曰吾今棄此三寨退過河北吾軍一退汝可便拆浮橋移於下流卻渡趙雲魏延軍馬過河來接應岱受計而去又喚張翼曰吾軍退去寨中多設燈火孟獲知之必來追趕汝卻斷其後張翼受計而退孔明只教關索護車衆軍退去寨中多設燈火蠻兵望見不敢衝突次日平明孟獲引大隊蠻兵徑到蜀寨之時只見三個大寨皆無人馬於內棄下糧草車仗數百餘輛孟優曰諸葛棄寨而走莫非有計否孟獲曰吾料諸葛亮棄輜重而去必因國中有緊急之事若非吳侵定是魏伐故虛張燈火以為疑兵棄車仗而去也可速追之不可錯過於是孟獲自驅前部直到西洱河邊望見河北岸上寨中旗幟整齊如故燦若雲錦沿河一帶又設錦城蠻兵哨見皆不敢進獲謂優曰此是諸葛亮懼吾追趕故就河北岸少住不二日必走矣遂將蠻兵屯於河岸又使人去山上砍竹為筏以備渡河卻將敢戰之兵皆移於寨前面卻不知蜀兵早已入自己之境是日狂風大起四壁廂火明鼓響蜀兵殺到蠻兵獠丁自相衝突孟獲大驚急引宗族洞丁殺開條路徑奔舊寨忽一彪軍從寨中殺出乃是趙雲獲慌忙回西洱河望山僻處而走又一彪軍殺出乃是馬岱孟獲只剩得數十個敗殘兵望山谷中而逃見南北西三處塵頭火光因此不敢前進只得望東奔走方才轉過山口見一大林之前數十從人引一輛小車車上端坐孔明呵呵大笑曰蠻王孟獲天敗至此吾已等候多時也獲大怒回顧左右曰吾遭此人詭計受辱三次今幸得這裏相遇汝等奮力前去連人帶車砍為粉碎數騎蠻兵猛力向前孟獲當先呐喊搶到大林之前撲踏一聲踏了陷坑一齊塌倒大林之內轉出魏延引數百軍來一個個拖出用索縛定孔明先到寨中招安蠻兵並諸甸酋長洞丁此時大蘭皆歸本鄉去了除死傷外其餘盡皆歸降孔明以酒肉相待以好言撫慰盡令放回蠻兵皆感歎而去少頃張翼解孟優至孔明誨之曰汝兄愚迷汝當諫之今被吾擒了四番有何面目再見人耶孟優羞慚滿面伏地告求免死孔明曰吾殺汝不在今日吾且饒汝性命勸諭汝兄令武士解其繩索放起孟優優泣拜而去不一時魏延解孟獲至孔明大怒曰你今番又被吾擒了有何理説獲曰吾今誤中詭計死不瞑目孔明叱武士推出斬之獲全無懼色回顧孔明曰若敢再放吾回去必然報四番之恨孔明大笑令左右去其縛賜酒壓驚就坐於帳中孔明問曰吾今四次以禮相待汝尚然不服何也獲曰吾雖是化外之人不似丞相專施詭計吾如何肯服孔明曰吾再放汝回去復能戰乎獲曰丞相若再拿住吾吾那時傾心降服盡獻本洞之物犒軍誓不反亂孔明即笑而遣之獲欣然拜謝而去於是聚得諸洞壯丁數千人望南迤邐而行早望見塵頭起處一隊兵到乃兄弟孟優重整殘兵來與兄報仇兄弟二人抱頭相哭訴説前事優曰我兵屢敗蜀兵屢勝難以抵當只可就山陰洞中退避不出蜀兵受不過暑氣自然退矣獲問曰何處可避優曰此去西南有一洞名曰禿龍洞洞主朵思大王與弟甚厚可投之於是孟獲先教孟優到禿龍洞見了朵思大王朵思慌引洞兵出迎孟獲入洞禮畢訴説前事朵思曰大王寬心若蜀兵到來令他一人一騎不得還鄉與諸葛亮皆死於此處獲大喜問計於朵思朵思曰此洞中止有兩條路東北上一路就是大王所來之路地勢平坦土厚水甜人馬可行若以木石壘斷洞口雖有百萬之衆不能進也西北上有一條路山險嶺惡道路窄狹其中雖有小路多藏毒蛇惡蠍黃昏時分煙瘴大起直至已午時方收惟未申酉三時可以往來水不可飲人馬難行此處更有四個毒泉一名啞泉其水頗甜人若飲之則不能言不過旬日必死二曰滅泉此水與湯無異人若沐浴則皮肉皆爛見骨必死三曰黑泉其水微清人若濺之在身則手足皆黑而死四曰柔泉其水如冰人若飲之咽喉無暖氣身驅軟弱如綿而死此處蟲鳥皆無惟有漢伏波將軍曾到自此以後更無一人到此今壘斷東北大路令大王穩居敝洞若蜀兵見東路截斷必從西路而入于路無水若見此四泉定然飲水雖百萬之衆皆無歸矣何用刀兵耶孟獲大喜以手加額曰今日方有容身之地又望北指曰任諸葛神機妙算難以施設四泉之水足以報敗兵之恨也自此孟獲孟優終日與朵思大王筵宴卻説孔明連日不見孟獲兵出遂傳號令教大軍離西洱河望南進發此時正當六月炎天其熱如火有後人詠南方苦熱詩曰山澤欲焦枯火光覆太虛不知天地外暑氣更何如又有詩曰赤帝施權柄陰雲不敢生雲蒸孤鶴喘海熱巨鼇驚忍舍溪邊坐慵拋竹裏行如何沙塞客擐甲復長征孔明統領大軍正行之際忽哨馬飛報孟獲退往禿龍洞中不出將洞口要路壘斷內有兵把守山惡嶺峻不能前進孔明請呂凱問之凱曰某曾聞此洞有條路實不知詳細蔣琬曰孟獲四次遭擒既已喪膽安敢再出況天氣炎熱軍馬疲乏征之無益不如班師回國孔明曰若如此正中孟獲之計也吾軍一退彼必乘勢追之今已到此安有復回之理遂令王平領數百軍為前部卻教新降蠻兵引路尋西北小徑而入前到一泉人馬皆渴爭飲此水王平探有此路回報孔明比及到大寨之時皆不能言但指口而已孔明大驚知是中毒遂自駕小車引數十人前來看時見一潭清水深不見底水氣凜凜軍不敢試孔明下車登高望之四壁峰嶺鳥雀不聞心中大疑忽望見遠遠山岡之上有一古廟孔明攀藤附葛而到見一石屋之中塑一將軍端坐旁有石碑乃漢伏波將軍馬援之廟因平蠻到此土人立廟祀之孔明再拜曰亮受先帝托孤之重今承聖旨到此平蠻欲待蠻方既平然後伐魏吞吳重安漢室今軍士不識地理誤飲毒水不能出聲萬望尊神念本朝恩義通靈顯聖護佑三軍祈禱已畢出廟尋土人問之隱隱望見對山一老叟扶杖而來形容甚異孔明請老叟入廟禮畢對坐于石上孔明問曰丈者高姓老叟曰老夫久聞大國丞相隆名幸得拜見蠻方之人多蒙丞相活命皆感恩不淺孔明問泉水之故老叟答曰軍所飲火乃啞泉之水也飲之難言數日而死此泉之外又有三泉東南有一泉其水至冷人若飲之咽喉無暖氣身驅軟弱而死名曰柔泉正南一泉人若濺之在身手足皆黑而死名曰黑泉西南有一泉沸如熱湯人若浴之皮肉盡脫而死名曰滅泉敞處有此四泉毒氣所聚無藥可治又煙瘴甚起惟未申酉三個時辰可往來余者時辰皆瘴氣密布觸之即死孔明曰如此則蠻方不可平矣蠻方不平安能併吞吳魏再興漢室有負先帝托孤之重生不如死也老叟曰丞相勿憂老夫指引一處可以解之孔明曰老丈有何高見望乞指教老叟曰此去正西數裏有一山穀入內行二十裏有一溪名曰萬安溪上有一高士號為萬安隱者此人不出溪有數十餘年矣其草庵後有一泉名安樂泉人若中毒汲其水飲之即愈有人或生疥癩或感瘴氣于萬安溪內浴之自然無事更兼庵前有一等草名曰薤葉藝香人若含一葉則瘴氣不染丞相可速往求之孔明拜謝問曰承丈者如此活命之德感刻不勝願聞高姓老叟入廟曰吾乃本處山神奉伏波將軍之命特來指引言訖喝開廟後石壁而入孔明驚訝不已再拜廟神尋舊路上車回到大寨次日孔明備信香禮物引王平及衆啞軍連夜望山神所言去處迤邐而進入山谷小徑約行二十餘裏但見長松大柏茂竹奇花環繞一莊籬落之中有數間茅屋聞得馨香噴鼻孔明大喜到莊前扣戶有一小童出孔明方欲通姓名早有一人竹冠草履白袍皂縧碧眼黃發欣然出曰來者莫非漢丞相否孔明笑曰高士何以知之隱者曰久聞丞相大纛南征安得不知遂邀孔明入草堂禮畢分賓主坐定孔明告曰亮受昭烈皇帝托孤之重今承嗣君聖旨領大軍至此欲服蠻邦使歸王化不期孟獲潛入洞中軍士誤飲啞泉之水夜來蒙伏波將軍顯聖言高士有藥泉可以治之望乞矜念賜神水以救應衆兵殘生隱者告曰量老夫山野廢人何勞丞相枉駕此泉就在庵後教取來飲於是童子引王平等一起啞軍來到溪邊汲水飲之隨即吐出惡涎便能言語童子又引衆軍到萬安溪中沐浴隱者於庵中進柏子茶松花菜以待孔明隱者告曰此間蠻洞多毒蛇惡蠍柳花飄入溪泉之間水不可飲但掘地為泉汲水飲之方可孔明求薤葉藝香隱者令衆軍盡意採取各人口含一葉自然瘴氣不侵孔明拜求隱者姓名隱者笑曰某乃孟獲之兄孟節是也孔明愕然隱者又曰丞相休疑容伸片言某一父母所生三人長即老夫孟節次孟獲又次孟優父母皆亡二弟強惡不歸王化某屢諫不從故更名改姓隱居於此今辱弟造反又勞丞相深入不毛之地如此生受孟節合該萬死故先于丞相之前請罪孔明歎方信盜跖下惠之事今亦有之遂與孟節曰吾申奏天子立公為王可乎節曰為嫌功名而逃於此豈復有貪富貴之意孔明乃具金帛贈之孟節堅辭不受孔明嗟歎不已拜別而回後人有詩曰高士幽棲獨閉關武侯曾此破諸蠻至今古木無人境猶有寒煙鎖舊山孔明回到大寨之中令軍士掘地取水掘下二十餘丈並無滴水凡掘十餘處皆是如此軍心驚慌孔明夜半焚香告天曰臣亮不才仰承大漢之福受命平蠻今途中乏水軍馬枯渴倘若天不絶大漢即賜甘泉若氣運已終臣亮等願死於此處上夜祝罷平明視之皆得滿井甘泉後人有詩曰為國平蠻統大兵心存正道合神明耿恭拜井甘泉出諸葛虔誠水夜生孔明軍馬既得甘泉遂安然由小徑直入禿龍洞前下寨蠻兵探知來報孟獲曰蜀兵不染瘴疫之氣又無枯渴之患諸泉皆不應朵思大王聞知不信自與孟獲來高山望之只見蜀兵安然無事大桶小擔搬運水漿飲馬造飯朵思見之毛髮聳然回顧孟獲曰此乃神兵也獲曰吾兄弟二人與蜀兵決一死戰就殞於軍前安肯束手受縛朵思曰若大王兵敗吾妻子亦休矣當殺牛宰馬大賞洞丁不避水火直沖蜀寨方可得勝於是大賞蠻兵正欲起程忽報洞後迤西銀冶洞二十一洞主楊鋒引三萬兵來助戰孟獲大喜曰鄰兵助我我必勝矣即與朵思大王出洞迎接楊鋒引兵入曰吾有精兵三萬皆披鐵甲能飛山越嶺足以敵蜀兵百萬我有五子皆武藝足備願助大王鋒令五子入拜皆彪軀虎體威風抖擻孟獲大喜遂設席相待楊鋒父子酒至半酣鋒曰軍中少樂吾隨軍有蠻姑善舞刀牌以助一笑獲欣然從之須臾數十蠻姑皆披發跣足從帳外舞跳而入群蠻拍手以歌和之楊鋒令二子把盞二子舉杯詣孟獲孟優前二人接杯方欲飲酒鋒大喝一聲二子早將孟獲孟優執下座來朵思大王卻待要走已被楊鋒擒了蠻姑橫截于帳上誰敢近前獲曰兔死孤悲物傷其類吾與汝皆是各洞之主往日無冤何故害我鋒曰吾兄弟子侄皆感諸葛丞相活命之恩無可以報今汝反叛何不擒獻於是各洞蠻兵皆走回本鄉楊鋒將孟獲孟優朵思等解赴孔明寨來孔明令入楊鋒等拜於帳下曰某等子侄皆感丞相恩德故擒孟獲孟優等呈獻孔明重賞之令驅孟獲入孔明笑曰汝今番心服乎獲曰非汝之能乃吾洞中之人自相殘害以致如此要殺便殺只是不服孔明曰汝賺吾入無水之地更以啞泉滅泉黑泉柔泉如此之毒吾軍無羌豈非天意乎汝何如此執迷獲又曰吾祖居銀坑山中有三江之險重關之固汝若就彼擒之吾漢子子孫孫傾心服事孔明曰吾再放汝回去重整兵馬與吾共決勝負如那時擒住汝再不服當滅九族叱左右去其縛放起孟獲獲再拜而去孔明又將孟優並朵思大王皆釋其縛賜酒食壓驚二人悚懼不敢正視孔明令鞍馬送回正是深臨險地非容易更展奇謀豈偶然未知孟獲整兵再來勝負如何且看下文分解
