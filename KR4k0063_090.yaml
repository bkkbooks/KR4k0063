body:
  text: 第九十回驅巨獸六破蠻兵燒藤甲七擒孟獲卻説孔明放了孟獲等一干人楊鋒父子皆封官爵重賞洞兵楊鋒等拜謝而去孟獲等連夜奔回銀坑洞那洞外有三江乃是瀘水甘南水西城水三路水會合故為三江其洞北近平坦三百餘裏多産萬物洞西二百里有鹽井西面二百裏直抵瀘甘正南三百里乃是梁都洞洞中有山環抱其洞山上出銀礦故名為銀坑山山中置宮殿樓臺以為蠻王巢穴其中建一祖廟名曰家鬼四時殺牛宰馬享祭名為蔔鬼每年常以蜀人並外鄉之人祭之若人患病不肯服藥只禱師巫名為藥鬼其處無刑法但犯罪即斬有女長成卻於溪中沐浴男女自相混淆任其自配父母不禁名為學藝年歲雨水均調則種稻穀倘若不熟殺蛇為羹煮象為飯每方隅之中上戶號曰洞主次曰酋長每月初一十五兩日皆在三江城中買賣轉易貨物其風俗如此卻説孟獲在洞中聚集宗黨千餘人謂之曰吾屢受辱於蜀兵立誓欲報之汝等有何高見言未畢一人應曰吾舉一人可破諸葛亮衆視之乃孟獲妻弟現為八番部長名曰帶來洞主獲大喜急問何人帶來洞主曰此去西南八納洞洞主木鹿大王深通法術出則騎象能呼風喚雨常有虎豹豺狼毒蛇惡蠍跟隨手下更有三萬神兵甚是英勇大王可修書具禮某親往求之此人若允何懼蜀兵哉獲欣然令國舅齎書而去卻令朵思大王守把三江城以為前面屏障卻説孔明提兵直至三江城遙望見此城三面傍江一面通旱即遣魏延趙雲同領一軍於旱路打城軍到城下時城上弓弩齊發原來洞中之人多習弓弩一弩齊發十矢箭頭上皆用毒藥但有中箭者皮肉皆爛見五臟而死趙雲魏延不能取勝回見孔明言藥箭之事孔明自乘小車到軍前看了虛實回到寨中令軍退數裏下寨蠻兵望見蜀兵遠退皆大笑作賀只疑蜀兵懼怯而退因此夜間安心穩睡不去哨探卻説孔明約軍退後即閉寨不出一連五日並無號令黃昏左側忽起微風孔明傳令曰每軍要衣襟一幅限一更時分應點無者立斬諸將皆不知其意衆軍依令預備初更時分又傳令曰每軍衣襟一幅包土一包無者立斬衆軍亦不知其意只得依令預備孔明又傳令曰諸軍包土俱在三江城下交割先到者有賞衆軍聞令皆包淨土飛奔城下孔明令積土為蹬道先上城者為頭功於是蜀兵十余萬並降兵萬餘將所包之土一齊棄於城下一霎時積土成山接連城上一聲暗號蜀兵皆上城蠻兵急放弩時大半早被執下餘者棄城而走朵思大王死于亂軍之中蜀將督軍分路剿殺孔明取了三江城所得珍寶皆賞三軍敗殘蠻兵逃回見孟獲説朵思大王身死失了三江城獲大驚正慮之間人報蜀兵已渡江現在本洞前下寨孟獲甚是慌張忽然屏風後一人大笑而出曰既為男子何無智也我雖是一婦人願與你出戰獲視之乃妻祝融夫人也夫人世居南蠻乃祝融氏之後善使飛刀百發百中孟獲起身稱謝夫人欣然上馬引宗黨猛將數百員生力洞兵五萬出銀坑宮闕來與蜀兵對敵方才轉過洞口一彪軍拉住為首蜀將乃是張嶷蠻兵見之卻早兩路擺開視融夫人背插五口飛刀手挺丈八長標坐下卷毛赤兔馬張嶷見之暗暗稱奇二人驟馬交鋒戰不數合夫人撥馬便走張嶷趕去空中一把飛刀落下嶷急用手隔正中左臂翻身落馬蠻兵發一聲喊將張嶷執縛去了馬忠聽得張嶷被執急出救時早被蠻兵捆住望見祝融夫人挺標勒馬而立忠忿怒向前去戰坐下馬絆倒亦被擒了都解入洞中來見孟獲獲設席慶賀夫人叱刀斧手推出張嶷馬忠要斬獲止曰諸葛亮放吾五次今番若殺彼將是不義也且囚在洞中待擒住諸葛亮殺之未遲夫人從其言笑飲作樂卻説殘兵來見孔明告知其事孔明即喚馬岱趙雲魏延三人受計各自領軍前去次日蠻兵報入洞中説趙雲搦戰祝融夫人即上馬出迎二人戰不數合雲撥馬便走夫人恐有埋伏勒兵而回魏延又引軍來搦戰夫人縱馬相迎正交鋒緊急延詐敗而逃夫人只不趕次日趙雲又引軍來搦戰夫人領洞兵出迎二人戰不數合雲詐敗而走夫人按標不趕欲收兵回洞時魏延引軍齊聲辱罵夫人急挺標來取魏延延撥馬便走夫人忿忿趕來延驟馬奔入山僻小路忽然背後一聲響亮延回頭視之夫人仰鞍落馬原來馬岱埋伏在此用絆馬索絆倒就裏擒拿解投大寨而來蠻將洞兵皆來救時趙雲一陳殺散孔明端坐於帳上馬岱解祝融夫人到孔明急令武士去其縛請在別帳賜壓驚遣使往告孟獲欲送夫人換張嶷馬忠二將孟獲允諾即放出張嶷馬忠還了孔明孔明遂送夫人入洞孟獲接入又喜又惱忽報八納洞主到孟獲出洞迎接見其人騎著白象身穿金珠纓絡腰懸兩口大刀領著一班喂養虎豹豺狼之士簇擁而入獲再拜哀告訴説前事木鹿大王許以報仇獲大喜設宴相待次日木鹿大王引本洞兵帶猛獸而出趙雲魏延聽知蠻兵出遂將軍馬布成陳勢二將並轡立於陳前視之只見蠻兵旗幟器械皆別人多不穿衣甲盡裸身赤體面目醜陋身帶四把尖刀軍中不鳴鼓角但篩金為號大鹿大王腰挂兩把寶刀手執蒂鍾身騎白象從大旗中而出趙雲見了謂魏延曰我等上陳一生未嘗見如此人物二人正沈吟之際只見木鹿大王口中不知念甚咒語手搖蒂鍾忽然狂風大作飛砂走石如同驟雨一聲畫角響虎豹豺狼毒蛇猛獸乘風而出張牙舞爪沖將過來蜀兵如何抵當往後便退蠻兵隨後追殺直趕到三江界路方向趙雲魏延收聚敗兵來見孔明帳前請罪細説此事孔明笑曰非汝二人之罪吾未出茅廬之時先知南蠻有驅虎豹之法吾在蜀中已辦下破此陳之物也隨軍有二十輛車俱封記在此今日且用一半留下一半後有別用遂令左右俱取了十輛紅油匱車到帳下留十輛黑油匱車在後衆皆不知其意孔明將匱打開皆是木刻彩畫巨獸俱用五色絨線為毛衣鋼鐵為牙爪一個可騎坐十人孔明選了精壯軍士一千餘人領了一百口內裝煙火之物藏在軍中次日孔明驅兵大進布於洞口蠻兵探知入洞報與蠻王木鹿大王自謂無敵即與孟獲引洞兵而出孔明綸巾羽扇身衣道袍端坐于車上孟獲指曰車上坐的便是諸葛亮若擒住此人大事定矣木鹿大王口中念咒手搖蒂鍾頃刻之間狂風大作猛獸突出孔明將羽扇一搖其風便回吹彼陳中去了蜀陳中假獸擁出蠻洞真獸見蜀陳世獸口吐火焰鼻出黑煙身搖銅鈴張牙舞爪而來諸惡獸不敢前進皆奔回蠻洞反將蠻兵沖倒無數孔明驅兵大進鼓角齊鳴望前追殺木鹿大王死于亂軍之中洞內孟獲宗黨皆棄宮闕扒山越嶺而走孔明大軍占了銀坑洞次日孔明正要分兵緝拿孟獲忽報蠻王孟獲妻弟帶來洞主因勸孟獲歸降獲不從今將孟獲並祝融夫人及宗黨數百餘人盡皆擒來獻與丞相孔明聽知即喚張嶷馬忠分付如此如此二將受了計引二千精壯兵伏於兩廊孔明即令守門將俱放進來帶來洞主引刀斧手解孟獲等數人拜於殿下孔明大喝曰與吾擒下兩廊壯兵齊出二人捉一人盡被執縛孔明大笑曰量汝些小詭計如何瞞得過我汝見二次俱是本洞人擒汝來降吾不加害汝只道吾深信故來詐降欲就洞中殺吾喝令武士搜其身畔果然各帶利刀孔明問孟獲曰汝原説在汝家擒住方始心服今日如何獲曰此是我等自來送死非汝之能也吾心未服孔明曰吾擒住六番尚然不服欲待何時耶獲曰汝第七次擒住吾方傾心歸服誓不反矣孔明曰巢穴已破吾何慮哉令武士盡去其縛叱之曰這番擒住再若支吾必不輕恕孟獲等抱頭鼠竄而去卻説敗殘蠻兵有千餘人大半中傷而逃正遇蠻王孟獲獲收了敗兵心中稍喜卻與帶來洞主商議曰吾今洞府已被蜀兵所占今投何地安身帶來洞主曰止有一國可以破蜀獲喜曰何處可去帶來洞主曰此去東南七百里有一國名烏戈國國主兀突骨身長丈二不食五穀以生蛇惡獸為飯身有鱗甲刀箭不能侵其手下軍士俱穿藤甲其藤生於山澗之中盤於石壁之上國人採取浸於油中半年方取出曬之曬乾復浸凡十餘遍卻才造成鎧甲穿在身上渡江不沈經水不濕刀箭不能侵因此號為藤甲軍今大王可往求之若得彼相助擒諸葛亮如利刀破竹也孟獲大喜遂投烏戈國來見兀突骨其洞無宇舍皆居土穴之內孟獲入洞再拜哀告前事兀突骨曰吾起本洞之兵與汝報仇獲欣然拜謝於是兀突骨喚兩個領兵俘長一名士安一名奚泥起三萬兵皆穿藤甲離烏戈國望東北而來行至一江名桃花水兩岸有桃樹歷年落葉于水中若別國人飲之盡死惟烏戈國人飲之倍添精神兀突骨兵至桃花渡口下寨以待蜀兵卻説孔明令蠻人哨探孟獲消息回報曰孟獲請烏戈國主引三萬藤甲軍現屯于桃花渡口孟獲又在各番聚集蠻兵並力拒戰孔明聽説提兵大進直至桃花渡口隔岸望見蠻兵不類人形甚是醜惡又聞土人言説即日桃葉正落水不可飲孔明退五裏下寨留魏延守寨次日烏戈國主引一彪藤甲軍過河來金鼓大震魏延引兵出迎蠻兵卷地而至蜀兵以弩箭射到藤甲之上皆不能透俱落於地刀砍槍刺亦不能入蠻兵皆使利刀鋼叉蜀兵如何抵當盡皆敗走蠻兵不趕而回魏延復回趕到桃花渡口只見蠻兵帶甲渡水而去內有困乏者將甲脫下放在水面以身坐其上而渡魏延急回大寨來稟孔明細言其事孔明請呂凱並土人問之凱曰某素聞南蠻中有一烏戈國無人倫者也更有藤甲護身急切難傷又有桃葉惡水本國人飲之反添精神別國人飲之即死如此蠻方縱使全勝有何益焉不如班師早回孔明笑曰吾非容易到此豈可便去吾明日自有平蠻之策於是令趙雲助魏延守寨且休輕出次日孔明令土人引路自乘小車到桃花渡口北岸山僻去處遍觀地理山險嶺峻之處車不能行孔明棄車步行忽到一山望見一穀形如長蛇皆光峭石壁並無樹木中間一條大路孔明問土人曰此谷何名土人答曰此處名為盤蛇穀出谷則三江城大路穀前名塔郎甸孔明大喜曰此乃天賜吾成功於此也遂回舊路上車歸寨喚馬岱分付曰與汝黑油匱車十輛需用竹竿千條匱內之物如此如此可將本部兵去把住盤蛇穀兩頭依法而行與汝半月限一切完備至期如此施設倘有走漏定按軍法馬岱受計而去又喚趙雲分付曰汝去盤蛇谷後三江大路口如此守把所用之物克日完備趙雲受計而去又喚魏延分付曰汝可引本部兵去桃花渡口下寨如蠻兵渡水來敵汝便棄了寨望白旗處而走限半個月內須要連輸十五陳棄七個寨柵若輸十四陳也休來見我魏延領命心中不樂怏怏而去孔明又喚張翼另引一軍依所指之處築立寨柵去了卻令張嶷馬忠引本洞所降千人如此行之各人都依計而行卻説孟獲與烏戈國主兀突骨曰諸葛亮多有巧計只是埋伏今後交戰分付三軍但見山谷之中林木多處不可輕進兀突骨曰大王説的有理吾已知道中國人多行詭計今後依此言行之吾在前面廝殺汝在背後教道兩人商議已定忽報蜀兵在桃花渡口北岸立起營寨兀突骨即差二俘長引藤甲軍渡了河來與蜀兵交戰不數合魏延敗走蠻兵恐有埋伏不趕自回次日魏延又去立了營寨蠻兵哨得又引衆軍渡過河來戰延出迎之不數合延敗走蠻兵追殺十餘裏見四下並無動靜便在蜀寨中屯住次日二俘長請兀突骨到寨説知此事兀突骨即引兵大進將魏延追一陳蜀兵皆充甲拋戈而走只見前有白旗延引敗兵急奔到白旗處早有一寨就寨中屯住兀突骨驅兵追至魏延引兵棄寨而走蠻兵得了蜀寨次日又望前追殺魏延回兵交戰不三合又敗只看白旗處而走又有一寨延就寨屯住次日蠻兵又至延略戰又走蠻兵占了蜀寨語休絮煩魏延且戰且走已敗十五陳連棄七個營寨蠻兵大進追殺兀突骨自在軍前破敵于路但見林木茂盛之處便不敢進卻使人遠望果見樹陰之中旌旗招颭兀突骨謂孟獲曰果不出大王所料孟獲大笑曰諸葛亮今番被吾識破大王連日勝了他十五陳奪了七個營寨蜀兵望風而走諸葛亮已是計窮只此一進大事定矣兀突骨大喜遂不以蜀兵為念至第十六日魏延引敗殘兵來與藤甲軍對敵兀突骨騎象當先頭戴日月狼須帽身披金珠纓絡兩助下露出生鱗甲眼目中微有光芒手指魏延大罵延撥馬便走後面蠻兵大進魏延引兵轉過了盤蛇穀望白旗而走兀突骨統引兵衆隨後追殺兀突骨望見山上並無草木料無埋伏放心追殺趕到穀中見數十輛黑油匱車在當路蠻兵報曰此是蜀兵運糧道路因大王兵至撇下糧車而走兀突骨大喜催兵追趕將出穀口不見蜀兵只見橫木亂石滾下壘斷穀口兀突骨令兵開路而進忽見前面大小車輛裝載幹柴盡皆火起兀突骨忙教退兵只聞後軍發喊報説穀口已被士柴壘斷車中原來皆是火藥一齊燒著兀突骨見無草木心尚不慌令尋路而走只見山上兩邊亂丟火把火把到處地中藥線皆著就地飛起鐵炮滿穀中火光亂舞但逢藤甲無有不著將兀突骨並三萬藤甲軍燒得互相擁抱死於盤蛇穀中孔明在山上往下看時只見蠻兵被火燒的伸拳舒腳大半被鐵炮打的頭臉粉碎皆死于穀中臭不可聞孔明垂淚而歎曰吾雖有功於社稷必損壽矣左右將士無不感歎卻説孟獲在寨中正望蠻兵回報忽然千余人笑拜於寨前言説烏戈國兵與蜀兵大戰將諸葛亮圍在盤蛇穀中了特請大王前去接應我等皆是本洞之人不得已而降蜀今知大王前到特來助戰孟獲大喜即引宗黨並所聚番人連夜上馬就令蠻兵引路方到盤蛇谷時只見火光甚起臭氣難聞獲知中計急退兵時左邊張嶷右邊馬忠兩路軍殺出獲方欲抵敵一聲喊起蠻兵中大半皆是蜀兵將蠻王宗黨並聚集的番人盡皆擒了孟獲匹馬殺出重圍望山徑而走正走之間見山凹裏一族人馬擁出一輛小車車中端坐一人綸巾羽扇身衣道袍乃孔明也孔明大喝曰反賊孟獲今番如何獲急回馬走旁邊閃過一將攔住去路乃是馬岱孟獲措手不及被馬岱生擒活捉了此時王平張翼已引一軍趕到蠻寨中將祝融夫人並一應老小皆活捉而來孔明歸到寨中升帳而坐謂衆將曰吾今此計不得已而用之大損陰德我料敵人必算吾于林木多處埋伏吾卻空設旌旗實無兵馬疑其心也吾令魏文長連輸十五陳者堅其心也吾見盤蛇穀止一條路兩壁廂皆是光石並無樹木下面都是沙土因令馬岱將黑油匱安排于穀中車中油匱內皆是預先造下的火炮名曰地雷一炮中藏九炮三十步埋之中用竹竿通節以引藥線才一發動山損石裂吾又令趙子龍預備草車安排于穀口又於山上準備大木亂石卻令魏延賺兀突骨並藤甲軍入谷放出魏延即斷其路隨後焚之吾聞利於水者必不利子火藤甲雖刀箭不能入乃油浸之物見火必著蠻兵如此頑皮非火攻安能取勝使烏戈國之人不留種類者是吾之大罪也衆將拜伏曰丞相天機鬼神莫測也孔明令押過孟獲來孟獲跪於帳下孔明令去其縛教且在別帳與酒食壓驚孔明喚管酒食官至坐榻前如此如此分付而去卻説孟獲與祝融夫人並孟優帶來洞主一切宗黨在別帳飲酒忽一人入帳謂孟獲曰丞相面羞不欲與公相見特令我來放公回去再招人馬來決勝負公今可速去孟獲垂淚言曰七擒七縱自古未嘗有也吾雖化外之人頗知禮義直如此無羞恥乎遂同兄弟妻子宗黨人等皆匍匐跪於帳下肉袒謝罪曰丞相天威南人不復反矣孔明曰公今服乎獲泣謝曰某子子孫孫皆感覆載生成之恩安得不服孔明乃請孟獲上帳設宴慶賀就令永為洞主所奪之地盡皆退還孟獲宗黨及諸蠻兵無不感戴皆欣然跳躍而去後人有詩贊孔明曰羽扇綸巾擁碧幢七擒妙策制蠻王至今溪洞傳威德為選高原立廟堂長史費禕入諫曰今丞相親提士卒深入不毛收服蠻方目今蠻王既已歸服何不置官吏與孟獲一同守之孔明曰如此有三不易留人則當留兵兵無所食一不易也蠻人傷破父兄死亡留人而不留兵必成禍患二不易也蠻人纍有廢殺之罪自有嫌疑留外人終不相信三不易也今吾不留外人不運糧與相安於無事而已衆人盡服於是蠻方皆感孔明恩德乃為孔明立生祠四時享祭皆呼之為慈父各送珍珠金寶丹漆藥材耕牛戰馬以資軍用誓不再反南方已定卻説孔明犒軍已畢班師回蜀令魏延引本部兵為前鋒延引兵方至瀘水忽然陰雲四合水面上一陳狂風驟起飛沙走石軍不能進延退兵回報孔明孔明遂請孟獲問之正是塞外蠻人方帖服水邊鬼卒又倡狂未知孟獲所言若何且看下文分解
