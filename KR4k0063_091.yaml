body:
  text: 第九十一回祭瀘水漢相班師伐中原武侯上表卻説孔明班師回國孟獲率引大小洞主酋長諸部落羅拜相送前軍至瀘水時值九月秋天忽然陰雲布合狂風驟起兵不能渡回報孔明孔明遂問孟獲獲曰此水原有猖神作禍往來者必須祭之孔明曰用何物祭享獲曰舊時國中因猖神作禍用七七四十九顆人頭並黑牛白羊祭之自然風恬浪靜更兼連年豐稔孔明曰吾今事已平定安可妄殺一人遂自到瀘水岸邊觀看果見陰風大起波濤洶湧人馬皆驚孔明甚疑即尋土人問之土人告説自丞相經過之後夜夜只聞得水邊鬼哭神號自黃昏直至天曉哭聲不絶瘴煙之內陰鬼無數因此作禍無人敢渡孔明曰此乃我之罪愆也前者馬岱引蜀兵千餘皆死于水中更兼殺死南人盡棄此處狂魂怨鬼不能解釋以致如此吾今晚當親自往祭土人曰須依舊例殺四十九顆人頭為祭則怨鬼自散孔明曰本為人死而成怨鬼豈可又殺生人耶吾自有主意喚行廚宰殺牛馬和麵為劑塑成人頭內以牛羊等肉代之名曰饅頭當夜于瀘水岸上設香案鋪祭物列燈四十九盞揚幡招魂將饅頭等物陳設於地三更時分孔明金冠鶴氅親自臨祭令董厥讀祭文其文曰維大漢建興三年秋九月一日武鄉侯領益州牧丞相諸葛亮謹陳祭儀享于故歿王事蜀中將及南人亡者陰魂曰我大漢皇帝威勝五霸明繼三王昨自遠方侵境異俗起兵縱蠆尾以興妖恣狼心而逞亂我奉王命問罪遐荒大舉貔貅悉除螻蟻雄軍雲集狂冠冰消才聞破竹之聲便是失猿之勢但士卒兒郎儘是九州豪傑官僚將校皆為四海英雄習武從戎投明事主莫不同申三令共展七擒齊堅奉國之誠並效忠君之志何期汝等偶失兵機緣落姦計或為流矢所中魂掩泉台或為刀劍所傷魄歸長夜生則有勇死則成名今凱歌欲還獻俘將及汝等英靈尚在祈禱必聞隨我旌旗逐我部曲同回上國各認本鄉受骨肉之蒸嘗領家人祭祀莫作他鄉之鬼徒為異域之魂我當奏之天子使汝等各家盡沾恩露年給衣糧月賜廩祿用茲酬答以慰汝心至於本境土神南方亡鬼血食有常憑依不遠生者既凜天威死者亦歸王化想宜寧帖毋致號啕聊表丹誠敬陳祭祀嗚呼哀哉伏惟尚饗讀畢祭文孔明放聲大哭極其痛切情動三軍無不下淚孟獲等衆盡皆哭只見愁雲怨霧之中隱隱有數千鬼魂皆隨風而散於是孔明令左右將祭物盡棄于瀘水之中次日孔明引大軍俱到瀘水面南岸但見雲收霧散風靜浪平蜀兵安然盡渡瀘水果然鞭敲金鐙響人唱凱歌還行到永昌孔明留王伉呂凱守四郡發付孟獲領衆自回囑其勤政馭下善撫居民勿失農務孟獲涕泣拜別而去孔明自引大軍回成都後主排鑾駕出郭三十裏迎接下輦立於道傍以候孔明孔明慌忙下車伏道而言曰臣不能速平南方使主上懷憂臣之罪也後主扶起孔明並車而回設太平筵會重賞三軍自此遠邦進貢來朝者二百餘處孔明奏準後主將歿于王事者之家一一優恤人心歡悅朝野清平卻説魏主曹丕在位七年即蜀漢建興四年也丕先納夫人甄氏即袁紹次子袁熙之婦前破鄴城時所得後生一子名睿字元仲自幼聰明丕甚愛之後丕又納安平廣宗人郭永之女為貴妃甚有顔色其父嘗曰吾女乃女中之王也故號為女王自丕納為貴妃因甄夫人失龐郭貴妃欲謀為後卻與幸臣張韜商議時丕有疾韜乃詐稱于甄夫人宮中掘得桐木偶人上書天子年月日時為魘鎮之事丕大怒遂將甄夫人賜死立郭貴妃為後因無出養曹睿為己子雖甚愛之不立為嗣睿年至十五歲弓馬熟嫻當年春二月丕帶睿出獵行於山塢之間趕出子母二鹿丕一箭射倒母鹿回觀小鹿馳於曹睿馬前丕大呼曰吾兒何不射之睿在馬上泣告曰陛下已殺其母臣安忍復殺其子也丕聞之擲弓於地曰吾兒真仁德之主也於是遂封睿為平原王夏五月丕感寒疾醫治不痊乃召中軍大將軍曹真鎮軍大將軍陳群撫軍大將軍司馬懿三人入寢宮丕喚曹睿至指謂曹真等曰今朕病已沈重不能復生此子年幼卿等三人可善輔之勿負朕心三人皆告曰陛下何出此言臣等願竭力以事陛下至千秋萬歲丕曰今年許昌城門無故自崩乃不祥之兆朕故自知必死也正言間內侍奏征東大將軍曹休入宮問安丕召入謂曰卿等皆國家柱石之臣也若能同心輔朕之子朕死亦瞑目矣言訖墮淚而薨時年四十歲在位七年於是曹真陳群司馬懿曹休等一面舉哀一面擁立曹睿為大魏皇帝諡父丕為文皇帝諡母甄氏為文昭皇后封鍾繇為太傅曹真為大將軍曹休為大司馬華歆為太尉王朗為司徒陳群為司空司馬懿為驃騎大將軍其餘文武官僚各各封贈大赦天下時雍涼二州缺人守把司馬懿上表乞守西涼等處曹睿從之遂封懿提督雍涼等處兵馬領詔去訖早有細作飛報入川孔明大驚曰曹丕已死孺子曹睿即位餘皆不足慮司馬懿深有謀略今雍涼兵馬倘訓練成時必為蜀中之大患不如先起兵伐之參軍馬謖曰今丞相平南方回軍馬疲敝只宜存恤豈可復遠征某有一計使司馬懿自死于曹睿之手未知丞相鈞意允否孔明問是何計馬謖曰司馬懿雖是魏國大臣曹睿素懷疑忌何不密遣人往洛陽鄴郡等處布散流言道此人欲反更作司馬懿告示天下榜文遍布諸處使曹睿心疑必然殺此人也孔明從之即遣人密行此計去了卻説鄴城門上忽一日見貼下告示一道守門者揭了來奏曹睿睿觀之其文曰驃騎大將軍總領雍涼等處兵馬事司馬懿謹以信義布告天下昔太祖武皇帝創立基業本欲立陳思王子建為社謖主不幸姦讒交集歲久潛龍皇孫曹睿素無德行妄自居尊有負太祖之遺意今吾應天順人克日興師以慰萬民之望告示到日各宜歸命新君如不順者當滅九族先此告聞想宜知悉曹睿覽畢大驚失色急問群臣太尉華歆奏曰司馬懿上表乞守雍涼正為此也先時太祖武皇帝嘗謂臣曰司馬懿鷹視狼顧不可付以兵權久必為國家大禍今日反情已萌可速誅之王朗奏曰司馬懿深明韜略善曉兵機素有大志若不早除久必為禍睿乃降旨欲興兵禦駕親征忽班部中閃出大將軍曹真奏曰不可文皇帝托孤於臣等數人是知司馬仲達無異志也今事未知真假遽爾加兵乃逼之反耳或者蜀吳姦細行反間之計使我君臣自亂彼卻乘虛而擊未可知也陛下幸察之睿曰司馬懿若果謀反將奈何真曰如陛下心疑可仿漢高偽遊雲夢之計禦駕幸安邑司馬懿必然來迎觀其動靜就車前擒之可也睿從之遂命曹真監國親自領禦林軍十萬徑到安邑司馬懿不知其故欲令天子知其威嚴乃整兵馬率甲士數萬來迎近臣奏曰司馬懿果率兵十余萬前來抗拒實有反心矣睿慌命曹休先領兵迎之司馬懿見兵馬前來只疑車駕親至伏道而迎曹休出曰仲達受先帝托孤之重何故反耶懿大驚失色汗流遍體乃問其故休備言前事懿曰此吳蜀姦細反間之計欲使我君臣自相殘害彼卻乘虛而襲某當自見天子辨之遂急退了軍馬至睿車前俯伏泣奏曰臣受先帝托孤之重安敢有異心必是吳蜀之姦計臣請提一旅之師先破蜀後伐吳報先帝與陛下以明臣心睿疑慮未決華歆奏曰不可付之兵權可即罷歸田裏睿依言將司馬懿削職回鄉命曹休總督雍涼軍馬曹睿駕回洛陽卻説細作探知此事報入川中孔明聞之大喜曰吾欲伐魏久矣奈何司馬懿總雍涼之兵今既中計遭貶吾有何憂次日後主早朝大會官僚孔明出班上出師表一道表曰臣亮言先帝創業未半而中道崩殂今天下三分益州罷敝此誠危急存亡之秋也然侍衛之臣不懈於內忠志之士忘身于外者蓋追先帝之殊遇欲報之于陛下也誠宜開張聖聽以光先帝遺德恢弘志士之氣不宜妄菲薄引喻失義以塞忠諫之路也宮中府中俱為一體陟罰臧否不宜異同若有作姦犯科及為忠善者宜付有司論其刑賞以昭陛下平明之治不宜偏私使內外異法也侍中侍朗郭攸之費禕董允等此皆良實志慮忠純是以先帝簡拔以遺陛下愚以為宮中之事事無大小悉以咨之然後施行必得裨補闕漏有所廣益將軍向寵性行淑均曉暢軍事試用之於昔日先帝稱之曰能是以衆議舉寵以為督愚以為營中之事事無大小悉以咨之必能使行陳和穆優劣得所也親賢臣遠小人此先漢所興隆也親小人遠賢臣此後漢所以傾頽也先帝在時每與臣論此事未嘗不歎息痛恨於桓靈也侍中尚書長史參軍此悉貞亮死節之臣也願陛下親之信之則漢室之隆可計日而待也臣本布衣躬耕南陽苟全性命於亂世不求聞達于諸侯先帝不以臣卑鄙猥自枉屈三顧臣於草廬之中咨臣以當世之事由是感激遂許先帝以驅馳後值傾覆受任於敗軍之際奉命於危難之間爾來二十有一年矣先帝知臣謹慎故臨崩寄臣以大事也受命以來夙夜憂慮恐付託不效以傷先帝之明故五月渡瀘深入不毛今南方已定甲兵已足當獎帥三軍北定中原庶竭駑鈍攘除姦凶興復漢室還於舊都此臣所以報先帝而忠陛下之職分也至於斟酌損益進盡忠言則攸之禕允之任也願陛下托臣以討賊興復之效不效則治臣之罪以告先帝之靈若無興復之言則責攸之禕允等之咎以彰其慢陛下亦宜自謀以咨諏善道察納雅言深追先帝遺詔臣不勝受恩感激今當遠離臨表涕泣不知所云後主覽表曰相父南征遠涉艱難方始回都坐未安席今又欲北征恐勞神思孔明曰臣受先帝托孤之重夙夜未嘗有怠今南方已平可無內顧之憂不就此時討賊恢復中原更待何日忽班部中太史譙周出奏曰近臣觀天象北方旺氣正盛昨曜倍明未可圖也乃顧孔明曰丞相深明天文何故強為孔明曰天道變易不常豈可拘執吾今且駐軍馬於漢中觀其動靜而後行譙周苦諫不從於是孔明乃留郭攸之董允費等為侍中總攝宮中之事又留向寵為大將總督禦林軍馬蔣琬為參軍張裔為長史掌丞相府事杜瓊為諫議大夫杜微楊洪為尚書孟光來敏為祭酒尹默李潠為博士郤正費詩為祕書譙周為太史內外文武官僚一百余員同理蜀中之事孔明受詔歸府喚諸將聽令前督部鎮北將軍領丞相司馬涼州刺史都亭侯魏延前軍都督領扶風太守張翼牙門將裨將軍王平後軍領兵使安漢將軍領建寧太守李恢副將定遠將軍領漢中太守呂義兼管運糧左軍領兵使平北將軍陳倉侯馬岱副將飛衛將軍廖化右軍領兵使奮威將軍博陽亭侯馬忠撫戎將軍關內侯張嶷行中軍師車騎大將軍都鄉侯劉琰中監軍揚武將軍鄧芝中參軍安遠將軍馬謖前將軍都亭侯袁綝左將軍高陽侯吳懿右將軍玄都侯高翔後將軍安爾侯吳班領長史綏軍將軍楊儀前將軍征南大將軍劉巴前護軍偏將軍漢城亭侯許允左護軍篤信中郎將丁鹹右護軍偏將軍劉敏後護軍典軍中郎將官雍行參軍昭武中郎將胡濟行參軍諫議將軍閻晏行參軍偏將軍髧習行參軍裨將軍杜義火武略中郎將杜祺綏戎都尉盛教從事武略中郎將樊岐典軍書記樊建丞相令史董厥帳前左護衛使龍驤將軍關興右護衛使虎翼將軍張苞以上一應官員都隨著平北大都督丞相武鄉侯領益州牧知內外事諸葛亮分撥已定又檄李嚴等守川口以拒東吳選定建興五年春三月丙寅日出師伐魏忽帳下一老將厲聲而進曰我雖年邁尚有廉頗之勇馬援之雄此二古人皆不服老何故不用我耶衆視之乃趙雲也孔明曰吾自平南回都馬孟起病故吾甚惜之以為折一臂也今將軍年紀已高倘稍有參差動搖一世英名減卻蜀中鋭氣雲厲聲曰吾自隨先帝以來臨陳不退遇敵則先大丈夫得死於疆場者幸也吾何恨焉願為前部先鋒孔明再三苦勸不住雲曰如不教我為先鋒就撞死於階下孔明曰將軍既要為先鋒須得一人同去言未盡一人應曰某雖不才願助老將軍先引一軍前去破敵孔明視之乃鄧芝也孔明大喜即撥精兵五千副將十員隨趙雲鄧芝去訖孔明出師後主引百官送於北門外十裏孔明辭了後主旌旗蔽野戈戟如林率軍望漢中迤邐進發卻説邊庭探知此事報入洛陽是日曹睿設朝近臣奏曰邊官報稱諸葛亮率領大兵三十余萬出屯於漢中令趙雲鄧芝為前部先鋒引兵入境睿大驚問群臣曰誰可為將以退蜀兵忽一人應聲而出曰臣父死于漢中切齒之恨未嘗得報今蜀兵犯境臣願引本部猛將更乞陛下賜關西之兵前往破蜀上為國家效力下報父仇臣萬死不恨衆視之乃夏侯淵之子夏侯楙也楙字子休其性最急又最吝自幼嗣與夏侯惇為子後夏侯淵為黃忠所斬曹操憐之以女清河公主招楙為駙馬因此朝中欽敬雖掌兵權未嘗臨陳當時自請出征曹睿即命為大都督調關西諸路軍馬前去迎敵司徒王朗諫曰不可夏侯駙馬素不曾經戰今付以大任非其所宜更兼諸葛亮足智多謀深通韜略不可輕敵夏侯楙叱曰司徒莫非結連諸葛亮欲為內應耶吾自幼從父學習韜略深通兵法汝何欺我年幼吾若不生擒諸葛亮誓不回見天子王朗等皆不敢言夏侯楙辭了魏主星夜到長安調關西諸路軍馬二十萬餘來敵孔明正是欲秉白旄麾將士卻教黃吻掌兵權未知勝負如何且看下文分解
