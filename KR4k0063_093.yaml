body:
  text: 第九十三回薑伯約歸降孔明武鄉侯罵死王朗卻説薑維獻計于馬遵曰諸葛亮必伏兵於郡後賺我兵出城乘虛襲我某願請精兵三千伏于要路太守隨後發兵出城不可遠去止行三十裏便回但看火起為號前後夾攻可獲大勝如諸葛亮自來必為某所擒矣遵用其計付精兵與薑維去訖然後自與梁虔引兵出城等候只留梁緒尹賞守城原來孔明果遣趙雲引一軍埋伏於山僻之中只待天水人馬離城便乘虛襲之當日細作回報趙雲説天水太守馬遵起兵出城只留文官守城趙雲大喜又令人報與張翼高翔教于要路截殺馬遵此二處兵亦是孔明預先埋伏卻説趙雲引五千兵徑投天水郡城下高叫曰吾乃常山趙子龍也汝知中計早獻城池免遭誅戮城上梁緒大笑曰汝中吾薑伯約之計尚然不知耶雲恰待攻城忽然喊聲大震四面火光沖天當先一員少年將軍挺槍躍馬而言曰汝見天水薑伯約乎雲挺槍直取薑維戰不數合維精神倍長雲大驚暗忖曰誰想此處有這般人物正戰時兩路軍夾攻來乃是馬遵梁虔引軍殺回趙雲首尾不能相顧衝開條路引敗兵奔走薑維趕來虧得張翼高翔兩路軍殺出接應回去趙雲歸見孔明説中了敵人之計孔明驚問曰此是何人識吾玄機有南安人告曰此人姓薑名維字伯約天水冀人也事母至孝文武雙全智勇足備真當世之英傑也趙雲又誇獎薑維槍法與他人大不同孔明曰吾今欲取天水不想有此人遂起大軍前來卻説薑維回見馬遵曰趙雲敗去孔明必然自來彼料我軍必在城中今可將本部軍馬分為四枝某引一軍伏於城東如彼兵到則截之太守與梁虔尹賞各引一軍城外埋伏梁緒率百姓在城上守禦分撥已定卻説孔明因慮薑維自為前部望天水郡進發將到城邊孔明傳令曰凡攻城池以初到之日激勵三軍鼓噪直上若遲延日久鋭氣盡隳急難破矣於是大軍徑到城下因見城上旗幟整齊未敢輕攻候至半夜忽然四下火光沖天喊聲震地正不知何處兵來只見城上亦鼓噪呐減相應蜀兵亂竄孔明急上馬有關興張苞二將保護殺出重圍回頭看時正東上軍馬一帶火光勢若長蛇孔明令關興探視回報曰此薑維兵也孔明歎曰兵不在多在人之調遣耳此人真將才也收兵歸寨思之良久乃喚安定人問曰薑維之母現在何處答曰維母今居冀縣孔明喚魏延分付曰汝可引一軍虛張聲勢詐取冀縣若薑維到可放入城又問此在何處緊要安定人曰天水錢糧皆在上邽若打破上邽則糧道自絶矣孔明大喜教趙雲引一軍去攻上邽孔明離城三十裏下寨早有人報入天水郡説蜀兵分為三路一軍守此郡一軍取上邽一軍取冀城薑維聞之哀告馬遵曰維母現在冀城恐母有失維乞一軍往救此城兼保老母馬遵從之遂令薑維引三千軍去保冀城梁虔引三千軍去保上邽卻説薑維引兵至冀城前面一彪軍擺開為首蜀將乃是魏延二將交鋒數合延詐敗奔走維入城閉門率兵守護拜見老母並不出戰趙雲亦放梁虔入上邽城去了孔明乃令人去南安郡取夏侯楙至帳下孔明曰汝懼死乎楙慌拜伏乞命孔明曰目今天水薑維現守冀城使人持書來説但得駙馬在我願歸降吾今饒汝性命汝肯招安薑維否楙曰情願招安孔明乃與衣服鞍馬不令人跟隨放之自去楙得脫出寨欲尋路而走奈不知路徑正行之間逢數人奔走楙問之答曰我等是冀縣百姓今被薑維獻了城池歸降諸葛亮蜀將魏延縱火劫財我等因此棄家奔走投上邽去也楙聞之縱馬望天水而行又見百姓攜男抱女遠來所説皆同楙至天水城下叫門城上人認得是夏侯楙慌忙開門迎接馬遵驚拜問之楙細言薑維之事又將百姓所言説了遵歎曰不想薑維反投蜀矣梁緒曰彼意欲救都督故以此言虛降楙曰今維已降何為虛也正躊躇間時已初更蜀兵又來攻城火光中見薑維在城下挺槍勒馬大叫曰請夏侯都督答話夏侯楙與馬遵等皆到城上見薑維耀武揚威大叫曰我為都督而降都督何背前言楙曰汝受魏恩何故降蜀有何前言耶維應曰汝寫書教我降蜀何出此言汝要脫身卻將我陷了我今降蜀加為上將安有還魏之理言訖驅兵打城至曉方退原來夜間汝薑維者乃孔明之計令部卒形貌相似者假扮薑維攻城因火光之中不辨真偽孔明卻引兵來攻冀城城中糧少軍食不敷薑維在城上見蜀軍大車小輛搬運糧草入魏延寨中去了維引三千兵出城徑來劫糧蜀兵盡棄了糧車尋路而走薑維奪得糧車欲要入城忽然一彪軍攔住為首蜀將張翼也二將交鋒戰不數合王平引一軍又到兩下夾攻維力窮抵敵不住奪路歸城城上早插蜀兵旗號原來已被魏延襲了維殺條路奔天水城手下尚有十餘騎又遇張苞殺了一陳維止剩得匹馬單槍來到天水城下叫門城上軍見是薑維慌報馬遵遵曰此是薑維來賺我城門也令城上亂箭射下薑維回顧蜀兵至近遂飛奔上邽城來城上梁虔見了薑維大罵曰反國之賊安敢來賺我城池吾已知汝降蜀矣遂亂箭射下薑維不能分説仰天長歎兩眼淚流撥馬望長安而走行不數裏前至一派大樹茂林之處一聲喊起數千兵擁出為首蜀將關興截住去路維人困馬乏不能抵當勒回馬便走忽然一輛小車從山坡中轉出其人頭戴綸巾身披鶴氅手搖羽扇乃孔明也孔明喚薑維曰伯約此時何尚不降維尋思良久前有孔明後有關興又無去路只得下馬投降孔明慌忙下車而迎執維手曰吾自出茅廬以來遍求賢者欲傳授平生之學恨未得其人今遇伯約吾願足矣維大喜拜謝孔明遂同薑維回寨升帳商議取天水上邽之計維曰天水城中尹賞梁緒與某至厚當寫密書二封射入城中使其內亂城可得矣孔明從之薑維寫了二封密書拴在箭上縱馬直至城下射入城中小校拾得呈與馬遵遵大疑與夏侯楙商議曰梁緒尹賞與薑維結連欲為內應都督宜早決之楙曰可殺二人尹賞知此消息乃謂梁緒曰不如納城降蜀以圖進用是夜夏侯楙數次使人請梁尹二人説話二人料知事急遂披挂上馬各執兵器引本部軍大開城門放蜀兵入夏侯楙馬遵驚慌引數百人出西門棄城投羌胡城而去梁緒尹賞迎接孔明入城安民已畢孔明問取上邽之計梁緒曰此城乃某親弟梁虔守之願招來降孔明大喜緒當日到上邽喚梁虔出城來降孔明孔明重加賞勞就令梁緒為天水太守尹賞為冀城令梁虔為上邽令孔明分撥已畢整兵進發諸將問曰丞相何不去擒夏侯楙孔明曰吾放夏侯楙如放一鴨耳今得伯約得一鳳也孔明自得三城之後威聲大震遠近州郡望風歸降孔明整頓軍馬盡提漢中之兵前出祁山兵臨渭水之西細作報入洛陽時魏主曹睿太和元年升殿設朝近臣奏曰夏侯駙馬已失三郡逃竄羌中去了今蜀兵已到祁山前軍臨渭水之西乞早發兵破敵睿大驚乃問群臣曰誰可為朕退蜀兵耶司徒王朗出班奏曰臣觀先帝每用大將軍曹真所到必克今陛下何不拜為大都督以退蜀兵睿準奏乃宣曹曰先帝托孤與卿蜀兵入寇中原卿安忍坐視首真奏曰臣才疏智淺不稱其職王朗曰將軍乃社稷之臣不可固辭老臣雖駑鈍願隨將軍一往真又奏曰臣受大恩安敢推辭但乞一人為副將睿曰卿自舉人真乃保太原陽曲人姓郭名淮字伯濟官封射陽亭侯領雍州刺史睿從之遂拜曹真為大都督賜節鉞命郭淮為副都督王朗為軍師朗時年已七十六歲矣選撥東西二京軍馬二十萬與曹真真命宗弟曹遵為先鋒又命蕩寇將軍朱贊為副先鋒當年十一月出師魏主曹睿親自送出西門之外方向曹真領大軍來到長安過渭河之西下寨真與王朗郭淮共議退兵之策朗曰來日可嚴整隊伍大展旌旗老夫自出只用一席話管教諸葛亮拱手而降蜀兵不戰自退真大喜是夜傳令來日四更造飯平明務要隊伍整齊人馬威儀旌旗鼓角各按次序當時使人先下戰書次日兩軍相迎列成陳勢于祁山之前蜀軍見魏兵甚是雄壯與夏侯大不相同三軍鼓角已罷司徒王朗乘馬而出上首乃都督曹真下首乃副都督郭淮兩個先鋒壓住陳角探子馬出軍前大叫曰請對陳主將答話只見蜀兵門旗開處關興張苞分左右而出立馬於兩邊次後一隊隊驍將分列門旗影下中央一輛四輪車孔明端坐車中綸巾羽扇素衣皂縧飄然而出孔明舉目見魏陳前三個麾蓋旗上大書姓名中央白髯老者乃軍師司徒王朗孔明暗忖曰王朗必下説詞吾當隨機應之遂教推車出陳外令護軍小校傳曰漢丞相與司徒會話王朗縱馬而出孔明于車上拱手朗在馬上欠身答禮朗曰久聞公之大名今幸一會公既知天命識時務何故興無名之兵孔明曰吾奉詔討賊何謂無名朗曰天數有變神器更易而歸有德之人此自然之理也曩自桓靈以來黃巾倡亂天下爭橫降至初平建安之歲董卓造逆傕汜繼虐袁術僭號于壽春袁紹稱雄於鄴土劉表占據荊州呂布虎吞徐郡盜賊蜂起姦雄鷹揚社稷有纍卵之危生靈有倒懸之急我太祖武皇帝掃清六合席捲八荒萬姓傾心四方仰德非以權勢取之實天命所歸也世祖文帝神文聖武以膺大統應天合人法堯禪舜處中國以臨萬邦豈非天心人意乎今公蘊大才抱大器自欲比于管樂何乃強欲逆天理背人情而行事耶豈不聞古人雲順天者昌逆天者亡今我大魏帶甲百萬良將千員諒腐草之螢光怎及天心之皓月公可倒戈卸甲以禮來降不失封侯之位國安民樂豈不美哉孔明在車上大笑曰吾以為漢朝大老元臣必有高論豈期出此鄙言吾有一言諸軍靜聽昔日桓靈之世漢統陵替宦官釀禍國亂歲凶四方擾攘黃巾之後董卓傕汜等接踵而起遷劫漢帝殘暴生靈因廟堂之上朽木為官殿陛之間禽獸食祿狼心狗行之輩滾滾當道奴顔婢膝之徒紛紛秉政以致社稷丘墟蒼生塗炭吾素知汝所行世居東海之濱初舉孝廉入仕理合匡君輔國安漢興劉何期反助逆賊同謀篡位罪惡深重天地不容天下之人願食汝肉今幸天意不絶炎漢昭烈皇帝繼統西川吾今奉嗣君之旨興師討賊汝既為諂諛之臣只可潛身縮首苟圖衣食安敢在行伍之前妄稱天數耶皓首匹夫蒼髯老賊汝即日將歸於九泉之下何面目見二十四帝乎老賊速退可教反臣與吾共決勝負王朗聽罷氣滿胸膛大叫一聲撞死于馬下後人有詩贊孔明曰兵馬出西秦雄才敵萬人輕搖三寸舌罵死老姦臣孔明以扇指曹真曰吾不逼汝汝可整頓軍馬來日決戰言訖回車於是兩軍皆退曹真將王朗尸首用棺木盛貯送回長安去了副都督郭淮曰諸葛亮料吾軍中治喪今夜必來劫寨可分兵四路兩路兵從山僻小路乘虛去劫蜀寨兩路兵伏於本寨外左右擊之曹真大喜曰此計與吾相合遂傳令喚曹遵朱贊兩個先鋒分付曰汝二人各引一萬軍抄出祁山之後但見蜀兵望吾寨而來汝可進兵去劫寨蜀寨如蜀兵不動便撤兵回不可輕進二人受計引兵而去真謂淮曰我兩個各引一枝軍伏於寨外寨中虛堆柴草只留數人如蜀兵到放火為號諸將皆分左右各自準備去了卻説孔明歸帳先喚趙雲魏延聽令孔明曰汝二人各引本部軍去劫魏寨魏延進曰曹真深明兵法必料我乘喪劫寨他豈不提防孔明笑曰吾正欲曹真知吾去劫寨也彼必伏兵在祁山之後待我兵過去卻來襲我寨吾故令汝二人引兵前去過山腳後路遠下營寨任魏兵來劫吾寨汝看火起為號分兵兩路文長拒住山口子龍引兵殺回必遇魏兵卻放彼走回汝乘勢攻之彼必自相掩殺可獲全勝二將引兵受計而去又喚關興張苞人分付曰汝二人各引一軍伏于祁山要路放過魏兵卻從魏兵來路殺奔魏寨而去二人引兵受計去了又令馬岱王平張翼張嶷四將伏於寨外四面迎擊魏兵孔明乃虛立寨柵居中堆起柴草以備火號自引諸將退於寨後以觀動靜卻説魏先鋒曹遵朱贊黃昏離寨迤邐前進二更左側遙望山前隱隱有軍行動曹遵自思曰郭都督真神機妙算遂催兵急進到蜀寨時將及三更曹遵先殺入寨卻是空寨並無一人料知中計急撤軍回寨中火起朱贊兵到自相掩殺人馬大亂曹遵與朱贊交馬方知自相踐踏急合兵時忽四面喊聲大震王平馬岱張嶷張翼殺到曹朱二人引心腹軍百余騎望大路奔走忽然鼓角齊鳴一彪軍截住去路為首大將乃常山趙子龍也大叫曰賊將那裏去早早受死曹朱二人奪路而走忽喊聲又起魏延又引一彪軍殺到曹朱二人大敗奪路奔回本寨守寨軍士只道蜀兵來劫寨慌忙放起號火左邊曹真殺至右邊郭淮殺至自相掩殺背後三路蜀兵殺到中央魏延左邊關興右邊張苞大殺一陳魏兵敗走十余裏魏將死者極多孔明全獲大勝方始收兵曹真郭淮收拾敗軍回寨商議曰今魏兵勢孤蜀兵勢大將何策以退之淮曰勝負乃兵家常事不足為憂某有一計使蜀兵首尾不能相顧定然自走矣正是可憐魏將難成事欲向西方索救兵未知其計如何且看下文分解
