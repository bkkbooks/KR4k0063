body:
  text: 第九十四回諸葛亮乘雪破羌兵司馬懿克日擒孟達卻説郭淮謂曹真曰西羌之人自太祖時連年入貢文皇帝亦有恩惠加之我等今可據住險阻遣人從小路直入羌中求救許以和親羌人必起兵襲蜀兵之後吾卻以大兵擊之首尾夾攻豈不大勝真從之即遣人星夜馳書赴羌卻説西羌國王徹裏吉自曹操時年年入貢手下有一文一武文乃雅丹丞相武乃越吉元帥時魏使齎金珠並書到國先來見雅丹丞相送了禮物具言求救之意雅丹引見國王呈上書禮徹裏吉覽了書與衆商議雅丹曰我與魏國素相往來今曹都督求救且許和親理合依允徹裏吉從其言即命雅丹與越吉元帥起羌兵一十五萬皆慣使弓弩槍刀蒺藜飛錘等器又有戰車用鐵葉裹釘裝載糧食軍器什物或用駱駝駕車或用騾馬駕車號為鐵車兵二人辭了國王領兵直扣西平關守關蜀將韓禎急差人齎文報知孔明孔明聞報問衆將曰誰敢去退羌兵張苞關興應曰某等願往孔明曰汝二人要去奈路途不熟遂喚馬岱曰汝素知羌人之性久居彼處可作向導便起精兵五萬與興苞二人同往興苞等引兵而去行有數日早遇羌兵關興先引百餘騎登山坡看時只見羌兵把鐵車首尾相連隨處結寨車上遍排兵器就似城池一般興睹之良久無破敵之策回寨與張苞馬岱商議岱曰且待來日見陳觀看虛實另作計議次早分兵三路關興在中張苞在左馬岱在右三路兵齊進羌兵陳裏越吉元帥手挽鐵錘腰懸寶雕弓躍馬奮勇而出關興招三路兵徑進忽見羌兵分在兩邊中央放出鐵車如潮湧一般弓弩一齊驟發蜀兵大敗馬岱張苞兩軍先退關興一軍被羌兵一裹直圍入西北角上去了興在垓心左沖右突不能得脫鐵車密圍就如城池蜀兵你我不能相顧興望山谷中尋路而走看看天晚但見一簇皂旗蜂擁而來一員羌將手提鐵錘大叫曰小將休走吾乃越吉元帥也關興急走到前面盡力縱馬加鞭正遇斷澗只得回馬來戰越吉興終是膽寒抵敵不住望澗中而逃被越吉趕到一鐵錘打來興急閃過正中馬胯那馬望澗中便倒興落于水中忽聽得一聲響處背後越吉連人帶馬平白地倒下水來興就水中掙起看時只見岸上一員大將殺退羌兵興提刀待砍越吉吉躍水而走關興得了越吉馬牽到岸上整頓鞍轡綽刀上馬只見那員將尚在前面追殺羌兵興自思此人救我性命當與相見遂拍馬趕來看看至近只見雲震之中隱隱有一大將面如重棗眉若臥蠶緑袍金鎧提青龍刀騎赤免馬手綽美髯分明認得是父親關公興大驚忽見關公以手望東南指曰吾兒可速望此路去吾當護汝歸寨言訖不見關興望東南急走至半夜忽一彪軍到乃張苞也問興曰你曾見二伯父否興曰你何由知之苞曰我被鐵軍軍追急忽見伯父自空而下驚退羌兵指曰汝從這條路去救吾兒因此引軍徑來尋你關興亦説前事共相嗟異二人同歸寨內馬岱接著對二人説此軍無計可退我守住寨柵你二人去稟丞相用計破之於是興苞二人星夜來見孔明備説此事孔明隨命趙雲魏延各引一軍埋伏去訖然後點三萬軍帶了薑維張翼關興張苞親自來到馬岱寨中歇定次日上高阜處觀看見鐵車連絡不絶人馬縱橫往來馳驟孔明曰此不難破也喚馬岱張翼分付如此如此二人去了乃喚薑維曰伯約知破車之法否維曰羌人惟恃一勇力豈知妙計乎孔明笑曰汝知吾心也今彤雲密布朔風緊急天將降雪吾計可施矣便令關興張苞二人引兵埋伏去訖令薑維領兵出戰但有鐵車兵來退後便走寨口虛立旌旗不設軍馬準備已定是時十二月終果然天降大雪薑維引軍出越吉引鐵車兵來薑維即退走羌兵趕到寨前薑維從寨後而去羌兵直到寨外觀看聽得寨內鼓琴之聲四壁皆空豎旌旗急回報越吉越吉心疑未敢輕進雅丹丞相曰此諸葛亮詭計虛設疑兵耳可以攻之越吉引兵寨前但見孔明攜琴上車引數騎入寨望後而走羌兵搶入寨柵直趕過山口見小車隱隱轉入林中去了雅丹謂越吉曰這等兵雖有埋伏不足為懼遂引大兵追趕又見薑維兵俱在雪地之中奔走越吉大怒催兵急追山路被雪漫蓋一望平坦正趕之間忽報蜀兵自山後而出雅丹曰縱有些小伏兵何足懼哉只顧催趲兵馬往前進發忽然一聲響如山崩地陷羌兵俱落於坑塹之中背後鐵車正行得緊溜急難收止並擁而來自相踐踏後兵急要回時左邊關興右邊張苞兩軍沖出萬弩齊發背後薑維馬岱張翼三路兵又殺到鐵車兵大亂越吉元帥望後面山谷中而逃正逢關興交馬只一合被興舉刀大喝一聲砍死于馬下雅丹丞相早被馬岱活捉解投大寨來羌兵四散逃竄孔明升帳馬岱押過雅丹來孔明叱武士去其縛賜酒壓驚用好言撫慰雅丹深感其德孔明曰吾主乃大漢皇帝今命吾討賊爾如何反助逆吾今放汝回去説與汝主吾國與爾乃鄰邦永結盟好勿聽反賊之言遂將所獲羌兵及車馬器械盡給還雅丹俱放回國衆皆拜謝而去孔明引三軍連夜投祁山大寨而來命關興張苞引軍先行一面差人齎表奏報捷音卻説曹真連日望羌人消息忽有伏路軍來報説蜀兵拔寨收拾起程郭淮大喜曰此因羌兵攻擊故爾退去遂分兩路追趕前面蜀兵亂走魏兵隨後追襲先鋒曹遵正趕之間忽然鼓聲大震一彪軍閃出為首大將乃魏延也大叫曰反賊休走曹遵大驚拍馬交鋒不三合被魏延一刀斬于馬下副先鋒朱贊引兵追趕忽然一彪軍閃出為首大將乃趙雲也朱贊措手不及被雲一槍刺死曹真郭淮見兩路先鋒有失欲收兵回背後喊聲大震鼓角齊鳴關興張苞兩路兵殺出圍了曹真郭淮痛殺一陳曹郭二人引敗兵沖路走脫蜀兵全勝直追到渭水奪了魏寨曹真折了兩個先鋒哀傷不已只得寫本申朝乞撥援兵卻説魏主曹睿設朝近臣奏曰大都督曹真數敗於蜀折了兩個先鋒羌兵又折了無數其勢甚急今上表求救請陛下裁處睿大驚急問退軍之策華歆奏曰須是陛下禦駕親征大會諸侯人皆用命方可退也不然長安有失關中危矣太傅鍾繇奏曰凡為將者智過於人則能制人孫子雲知彼知己百戰百勝臣量曹真雖久用兵非諸葛亮對手臣以全家良賤保舉一人可退蜀兵未知聖意準否睿曰卿乃大老元臣有何賢士可退蜀兵早召來與朕分憂鍾繇奏曰向者諸葛亮欲興師犯境但懼此人故散流言使陛下疑而去之方敢長驅大進今若復用之則亮自退矣睿問何人繇曰驃騎大將軍司馬懿也睿歎曰此事朕亦悔之今仲達現在何地繇曰近聞仲達在宛城間住睿即降詔遣使持節復司馬懿官職加為平西都督就起南陽諸路軍馬前赴長安睿禦駕親征令司馬懿克日到彼聚會使命星夜望宛城去了卻説孔明自出師以來纍獲全勝心中甚喜正在祁山寨中會聚議事忽報鎮守永安宮李嚴令子李豐來見孔明只道東吳犯境心甚驚疑喚入帳中問之豐曰特來報喜孔明曰有何喜豐曰昔日孟達降魏乃不得已也彼時曹丕愛其才時以駿馬金珠賜之曾同輦出入封為散騎常侍領新城太守鎮守上庸金城等處委以西南之任自丕死後曹睿即位朝中多人嫉妒孟達日夜不安常謂諸將曰我本蜀將勢逼於此今纍差心腹人持書來見家父教早晚代稟丞相前者五能下川之時曾有此感今在新城聽知丞相伐魏欲起金城新城上庸三處軍馬就彼舉事徑取洛陽丞相取長安兩京大定矣今某引來人並纍次書信呈上孔明大喜厚賞李豐等忽細作入報説魏主曹睿一面駕幸長安一面詔司馬懿復職加為平西都督起本處之兵于長安聚會孔明大驚參軍馬謖曰量曹睿何足道若來長安可就而擒之丞相何故驚訝孔明曰吾豈懼曹睿耶所患者惟司馬懿一人而已今孟達欲舉大事若遇司馬懿事必敗矣達非司馬懿對手必被所擒孟達若死中原不易得也馬謖曰何不急修書令孟達提防孔明從之即修書令來人星夜回報孟達卻説孟達在新城專望心腹人回報一日心腹人到來將孔明回書呈上孟達拆封視之書略曰近得書足知公忠義之心不忘故舊吾甚喜慰若成大事則公漢朝中興第一功臣也然極宜謹密不可輕易托人慎之戒之近聞曹睿復詔司馬懿起宛洛之兵若聞公舉事必先至矣須萬全提備勿視為等間也孟達覽畢笑曰人言孔明心多今觀此事可知矣乃具回書令心腹人來答孔明孔明喚入帳中其人呈上回書孔明拆封視之書曰適承鈞教安敢少怠竊謂司馬懿之事不必懼也宛城離洛陽約八百里至新城一千二百里若司馬懿聞達舉事須表奏魏主往復一月間事達城池已固諸將與三軍皆在深險之地司馬懿即來達何懼哉丞相寬懷惟聽捷報孔明看畢擲書於地而頓足曰孟達必死于司馬懿之手矣馬謖問曰丞相何謂也孔明曰兵法雲攻其不備出其不意豈容料在一月之期曹睿既委任司馬懿逢寇即除何待奏聞若知孟達反不須十日兵必到矣安能措手耶衆將皆服孔明急令來人回報曰若未舉事切莫教同事者知之知則必敗其人拜辭歸新城去了卻説司馬懿在宛城間住聞知魏兵纍敗於蜀乃仰天長歎懿長子司馬師字子元次子司馬昭字子尚二人素有大志通曉兵書當日侍立於側見懿長歎乃問曰父親何為長歎懿曰汝輩豈知大事耶司馬師曰莫非歎魏主不用乎司馬昭笑曰早晚必來宣召父親也言未已忽報天使持節至懿聽詔畢遂調宛城諸路軍馬忽又報金城太守申儀家人有機密事求見懿喚入密室問之其人細説孟達欲反之事更有孟達心腹人李輔並達外甥鄧賢隨狀出首司馬懿聽畢以手加額曰此乃皇上齊天之洪福也諸葛亮兵在祁山殺得內外人皆膽落今天子不得已而幸長安若旦夕不用吾時孟達一舉兩京休矣此賊必通謀諸葛亮吾先擒之諸葛亮定然心寒自退兵也長子司馬師曰父親可急寫表申奏天子懿曰若等聖旨往復一月之間事無及矣即傳令教人馬起程一日要行二日之路如遲立斬一面令參軍梁畿齎檄星夜去新城教孟達等準備征進使其不疑梁畿先行懿隨後發兵行了二日山坡下轉出一軍乃是右將軍徐晃晃下馬見懿説天子駕到長安親拒蜀兵今都督何往懿低言曰今孟達造反吾去擒之耳晃曰某願為先鋒懿大喜合兵一處徐晃為前部懿在中軍二子押後又行了二日前軍哨馬捉住孟達心腹人搜出孔明回書來見司馬懿懿曰吾不殺汝汝從頭細説其人只得將孔明孟達往復之事一一告説懿看了孔明回書大驚曰世間能者所見皆同吾機先被孔明識破幸得天子有福獲此消息孟達今無能為矣遂星夜催軍前行卻説孟達在新城約下金城太守申儀上庸太守申耽克日舉事耽儀二人佯許之每日調練軍馬只待魏兵到便為內應卻報孟達言軍器糧草俱未完備不敢約期起事達信之不疑忽報參軍梁畿來到孟達迎入城中畿傳馬馬懿將令曰司馬都督今奉天子詔起諸路軍以退蜀兵太守可集本部軍馬聽候調遣達問曰都督何日起程畿曰此時約離宛城望長安去了達暗喜曰吾大事成矣遂設宴待了梁畿送出城外即報申耽申儀知道明日舉事換上大漢旗號發諸路軍馬徑取洛陽忽報城外塵土沖天不知何處兵來孟達登城視之只見一彪軍打著右將軍徐晃旗號飛奔城下達大驚急扯起吊橋徐晃坐下馬收拾不住直來到壕邊高叫曰反賊孟達早早受降達大怒急開弓射之正中徐晃頭額魏將救去城上亂箭射下魏兵方退孟達恰待開門追趕四面旌旗蔽日司馬懿兵到達仰天長歎曰果不出孔明所料也於是閉門堅守卻説徐晃被孟達射中頭額衆軍救到寨中取了箭頭令醫調治當晚身死時年五十九歲司馬懿令人扶柩還洛陽安葬次日孟達登城遍視只見魏兵四面圍得鐵桶相似達行坐不安驚疑未定忽見兩路兵自外殺來旗上大書申耽申儀孟達只道是救軍到忙引本部兵大開城門殺出耽儀大叫曰反賊休走早早受死達見事變撥馬望城中便走城上亂箭射下李輔鄧賢二人在城上大罵曰吾等已獻了城也達奪路則走申耽趕來達人困馬乏措手不及被申耽一槍刺于馬下梟其首級餘軍皆降李輔鄧賢大開城門迎接司馬懿入城撫民勞軍已畢遂遣人奏知魏主曹睿睿大喜教將孟達首級去洛陽城市示衆加申耽申儀官職就隨司馬懿征進命李輔鄧賢守新城上庸卻説司馬懿引兵到長安城外下寨懿入城來見魏主睿大喜曰朕一時不明誤中反間之計悔之無及今達造反非卿等制之兩京休矣懿奏曰臣聞申儀密告反情意欲表奏陛下恐往復遲滯故不待聖旨星夜而去若待奏聞則中諸葛亮之計也言罷將孔明回孟達密書奉上睿看畢大喜曰卿之學識過於孫吳矣賜金鉞斧一對後遇機密重事不必奏聞便宜行事就令司馬懿出關破蜀懿奏曰臣舉一大將可為先鋒睿曰卿舉何人懿曰左將軍張郃可當此任睿笑曰朕正欲用之遂命張郃為前部先鋒隨司馬懿離長安來破蜀兵正是既有謀臣能用智又求猛將助施威未知勝負如何且看下文分解
