body:
  text: 第九十五回馬謖拒諫失街亭武侯彈琴退仲達卻説魏主曹睿令張郃為先鋒與司馬懿一同征進一面令辛毗孫禮二人領兵五萬往助曹真二人奉詔而去且説司馬懿引二十萬軍出關下寨請先鋒張郃至帳下曰諸葛亮平生謹慎未敢造次行事若是吾用兵先從子午穀徑取長安早得多時矣他非無謀但怕有失不肯弄險今必出軍斜穀來取郿城若取郿城必分兵兩路一軍取箕穀矣吾已發檄文令子丹拒守郿城若兵來不可出戰令孫禮辛毗截住箕穀道口若兵來則出奇兵擊之郃曰今將軍當於何處進兵懿曰吾素知秦嶺之西有一條路地名街亭傍有一城名列柳城此二處皆是漢中咽喉諸葛亮欺子丹無備定從此進吾與汝徑取街亭望陽平關不遠矣亮若知吾斷其街亭要路絶其糧道則隴西一境不能安守必然連夜奔回漢中去也彼若回動吾提兵於小路擊之可得全勝若不歸時吾卻將諸處小路盡皆壘斷俱以兵守之一月無糧蜀兵皆餓死亮必被吾擒矣張郃大悟拜伏於地曰都督神算也懿曰雖然如此諸葛亮不比孟達將軍為先鋒不可輕進當傳與諸將循山西路遠遠哨探如無伏兵方可前進若是怠忽必中諸葛亮之計張郃受計引軍而行卻説孔明在祁山寨中忽報新城探細人來到孔明急喚入問之細作告曰司馬懿倍道而行八日已到新城孟達措手不及又被申耽申儀李輔鄧賢為內應孟達被亂軍所殺今司馬懿撤兵到長安見了魏主同張郃引兵出關來拒我師也孔明大驚曰孟達作事不密死固當然今司馬懿出關必取街亭斷吾咽喉之路便問誰敢引兵去守街亭言未畢參軍馬謖曰某願往孔明曰街亭雖小干系甚重倘街亭有失吾大軍皆休矣汝雖深通謀略此地奈無城郭又無險阻守之極難謖曰某自幼熟讀兵書頗知兵法豈一街亭不能守耶孔明曰司馬懿非等間之輩更有先鋒張郃乃魏之名將恐汝不能敵之謖曰休道司馬懿張郃便是曹睿親來有何懼哉若有差失乞斬全家孔明曰軍中無戲言謖曰願立軍令狀孔明從之謖遂寫了軍令狀呈上孔明曰吾與汝二萬五千精兵再撥一員上將相助你去即喚王平分付曰吾素知汝平生謹慎故特以此重任相托汝可小心謹守此地下寨必當要道之處使賊兵急切不能偷過安營既畢便畫四至八道地理形狀圖本來我看凡事商議停當而行不可輕易如所守無危則是取長安第一功也戒之戒之二人拜辭引兵而去孔明尋思恐二人有失又喚高翔曰街亭東北上有一城名列柳城乃山僻小路此可以屯兵扎寨與汝一萬兵去此城屯扎但街亭危可引兵救之高翔引兵而去孔明又思高翔非張郃對手必得一員大將屯兵于街亭之右方可防之遂喚魏延引本部兵去街亭之後屯扎延曰某為前部理合當先破敵何故置某于安間之地孔明曰前鋒破敵乃偏裨之事耳今令汝接應街亭當陽平關沖要道路總守漢中咽喉此乃大任也何為安間乎汝勿以等間視之失吾大事切宜小心在意魏延大喜引兵而去孔明恰才心安乃喚趙雲鄧芝分付曰今司馬懿出兵與舊日不同汝二人各引一軍出箕穀以為疑兵如逢魏兵或戰或不戰以驚其心吾自統大軍由斜穀徑取郿城若得郿城長安可破矣二人受命而去孔明令薑維作先鋒兵出斜穀卻説馬謖王平二人兵到街亭看了地勢馬謖笑曰丞相何故多心也量此山僻之處魏兵如何敢來王平曰雖然魏兵不敢來可就此五路總口下寨卻令軍士伐木為柵以圖久計謖曰當道豈是下寨之地此處側邊一山四面皆不相連且樹木極廣此乃天賜之險也可就山上屯軍平曰參軍差矣若屯兵當道築起城垣賊兵總有十萬不能偷過今若棄此要路屯兵於山上倘魏兵聚至四面圍定將何策保之謖大笑曰汝真女子之見兵法雲憑高視下勢如劈竹若魏兵到來吾教他片甲不回平曰吾纍隨丞相經陳每到之處丞相盡意指教今觀此山乃絶地也若魏兵絶我汲水之道軍士不戰自亂矣謖曰汝莫亂道孫子雲置之死地而後生若魏兵絶我汲水之道蜀兵豈不死戰以一可當百也吾素讀兵書丞相諸事尚問於我汝奈何相阻耶平曰若參軍欲在山上下寨可分兵與我自於山西下一小寨為掎角之勢倘魏兵至可以相應馬謖不從忽然山中居民成群結隊飛奔而來報説魏兵已到王平欲辭去馬謖曰汝既不聽吾令與汝五千兵自去下寨待吾破了魏兵到丞相面前須分不得功王平引兵離山十裏下寨畫成圖本星夜差人去稟孔明具説馬謖自於山上下寨卻説司馬懿在城中令次子司馬昭去探前路若街亭有兵守禦即當按兵不行司馬昭奉令探了一遍回見父曰街亭有兵守把懿歎曰諸葛亮真乃神人吾不如也昭笑曰父親何故自墮志氣耶男料街亭易取懿問曰汝安敢出此大言昭曰男親自哨見當道並無寨柵軍皆屯于山上故知可破也懿大喜曰若兵果在山上乃天使吾成功矣遂更換衣服引百餘騎親自來看是夜天睛月朗直至山下周圍巡哨了一遍方回馬謖在山上見之大笑曰彼若有命不來圍山傳令與諸將倘兵來只見山頂上紅旗招動即四面皆下卻説司馬懿回到寨中使人打聽是何將引兵守街亭回報曰乃馬良之弟馬謖也懿笑曰徒有虛名乃庸才耳孔明用如此人物如何不誤事又問街亭左右別有軍否探馬報曰離山十裏有王平安營懿乃命張郃引一軍當住王平來路又令申耽申儀引兩路兵圍山先斷了汲水道路待蜀兵自亂然後乘勢擊之當夜調度已定次日天明張郃引兵先往背後去了司馬懿大驅軍馬一擁而進把山四面圍定馬謖在山上看時只見魏兵漫山遍野旌旗隊伍甚是嚴整蜀兵見之盡皆喪膽不敢下山馬謖將紅旗招動軍將你我相推無一人敢動謖大怒自殺二將衆軍驚懼只得努力下山來沖魏兵魏兵端然不動蜀兵又退上山去馬謖見事不諧教軍緊守寨門只等外應卻説王平見魏兵到引軍殺來正遇張郃戰有數十餘合平力窮勢孤只得退去魏兵自辰時困至戌時山上無水軍不得食寨中大亂嚷到半夜時分山南蜀兵大開寨門下山降魏馬謖禁止不住司懿又令人於沿山放火山上蜀兵愈亂馬謖料守不住只得驅殘兵殺下山西逃奔司馬懿放條大路讓過馬謖背後張郃引兵追來趕到三十餘裏前面鼓角齊鳴一彪軍出放過馬謖攔住張郃視之乃魏延也延揮刀縱馬直取張郃郃回軍便走延驅兵趕來復奪街亭趕到五十餘裏一聲喊起兩邊伏兵齊出左邊司馬懿右邊司馬昭卻抄在魏延背後把延困在垓心張郃復來三路兵合在一處魏延左沖右突不得脫身折兵大半正危急間忽一彪軍殺入乃王平也延大喜曰吾得生矣二將合兵一處大殺一陳魏兵方退二將慌忙奔回寨時營中皆是魏兵旌旗申耽申儀從營中殺出王平魏延徑奔列柳城來投高翔此時高翔聞知街亭有失盡起列柳城之兵前來救應正遇延平二人訴説前事高翔曰不如今晚去劫魏寨再復街亭當時三人在山坡下商議已定待天色將晚兵分三路魏延引兵先進徑到街亭不見一人心中大疑未敢輕進且伏在路口等候忽見高翔兵到二人共説魏兵不知在何處正沒理會又不見王平兵到忽然一聲炮響火光沖天鼓聲震地魏兵齊出把魏延高翔圍在垓心二人往來衝突不得脫身忽聽得山坡後喊聲若雷一彪軍殺入乃是王平救了高魏二人徑奔列柳城來比及奔到城下時城邊早有一軍殺到旗上大書魏都督郭淮字樣原來郭淮與曹真商議恐司馬懿得了全功乃分淮來取街亭聞知司馬懿張郃成了此功遂引兵徑襲列柳城正遇三將大殺一陳蜀兵傷者極多魏延恐陽平關有失慌與王平高翔望陽平關來卻説郭淮收了軍馬乃謂左右曰吾雖不得街亭卻取了列柳城亦是大功引兵徑到城下叫門只見城上一聲炮響旗幟皆豎當頭一面大旗上書平西都督司馬懿懿撑起懸空板倚定護心木欄幹大笑曰郭伯濟來何遲也淮大驚曰仲達神機吾不及也遂入城相見已畢懿曰今街亭已失諸葛亮必走公可速與子丹星夜追之郭淮從其言出城而去懿喚張郃曰子丹伯濟恐吾全獲大功故來取此城池吾非獨欲成功乃僥幸而已吾料魏延王平馬謖高翔等輩必先去據陽平關吾若去取此關諸葛亮必隨後掩殺中其計矣兵法雲歸師勿掩窮寇莫追汝可從小路抄箕穀退兵吾自引兵當斜穀之兵若彼敗走不可相拒只宜中途截住蜀兵輜重可盡得也張郃受計引兵一半去了懿下令竟取斜穀由西城而進西城雖山僻小縣乃蜀兵屯糧之所又南安天水安定三郡總路若得此城三郡可復矣於是司馬懿留申耽申儀守列柳城自領大軍望斜谷進發卻説孔明自令馬謖等守街亭去後猶豫不定忽報王平使人送圖本至孔明喚入左右呈上圖本孔明就文幾上拆開視之拍案大驚曰馬謖無知坑陷吾軍矣左右問曰丞相何故失驚孔明曰吾觀此圖本失卻要路占山為寨倘魏兵大至四面圍合斷汲水道路不須二日軍自亂矣倘街亭有失吾等安歸長史楊儀進曰某雖不才願替馬幼常回孔明將安營之法一一分付與楊儀正待要行忽報馬到來説街亭列柳城盡皆失了孔明跌足長歎曰大事去矣此吾之過也急喚關興張苞分付曰汝二人各引三千精兵投武功山小路而行如遇魏兵不可大擊只鼓噪呐喊為疑兵驚之彼當自走亦不可追待軍退盡便投陽平關去又令張翼先引軍去修理劍閣以備歸路又密傳號令教大軍暗暗收拾行裝以備起程又令馬岱薑維斷後先伏於山谷中待諸軍退盡方始收兵又差心腹人分路報與天水南安安定三郡官吏軍民皆入漢中又遣心腹人到冀縣搬取薑維老母送入漢中孔明分撥已定先引五千兵退去西縣搬運糧草忽然十餘次飛馬報到説司馬懿引大軍十五萬望西城蜂擁而來時孔明身邊別無大將只有一班文官所引五千軍已分一半先運糧草去了只剩二千五百軍在城中衆官聽得這個消息盡皆失色孔明登城望之果然塵土沖天魏兵分兩路望西城縣殺來孔明傳令教將旌旗盡皆隱匿諸軍各守城鋪如有妄行出入及高言大語者斬之大開四門每一門用二十軍士扮作百姓灑掃街道如魏兵到時不可擅動吾自有計孔明乃披鶴氅戴綸巾引二小童攜琴一張於城上敵樓前憑欄而坐焚香操琴卻説司馬懿前軍哨到城下見了如此模樣皆不敢進急報與司馬懿懿笑而不信遂止住三軍自飛馬遠遠望之果見孔明坐於城樓之上笑容可掬焚香操琴左有一童子手捧寶劍右有一童子手執麈尾城門內外有二十余百姓低頭灑掃傍若無人懿看畢大疑便到中軍教後軍作前軍前軍作後軍望北山路而退次子司馬昭曰莫非諸葛亮無軍故作此態父親何故便退兵懿曰亮平生謹慎不曾弄險今大開城門必有埋伏我兵若進中其計也汝輩豈知宜速退於是兩路兵盡皆退去孔明見魏軍遠去撫掌而笑衆官無不駭然乃問孔明曰司馬懿乃魏之名將今統十五萬精兵到此見了丞相便速退去何也孔明曰此人料吾生平謹慎必不弄險見如此模樣疑有伏兵所以退去吾非行險蓋因不得已而用之此人必引軍投山北小路去也吾已令興苞二人在彼等候衆皆驚服曰丞相之機神鬼莫測若某等之見必棄城而走矣孔明曰吾兵止有二千五百若棄城而走必不能遠遁得不為司馬懿所擒乎後人有詩贊曰瑤琴三尺勝雄師諸葛西城退敵時十五萬人回馬處土人指點到今疑言訖拍手大笑曰吾若為司馬懿必不便退也遂下令教西城百姓隨軍入漢中司馬懿必將復來於是孔明離西城望漢中而走天水安定南安三郡官吏軍民陸續而來卻説司馬懿望武功山小路而走忽然山坡後喊殺連天鼓聲震地懿回顧二子曰吾若不走必中諸葛亮之計矣只見大路上一軍殺來旗上大書右護衛使虎翼將軍張苞魏兵皆棄甲拋戈而走行不到一程山谷中喊聲震地鼓角喧天前面一杆大旗上書左護衛使龍驤將軍關興山谷應聲不知蜀兵多少更兼魏軍心疑不敢久停只得盡棄輜重而去興苞二人皆遵將令不敢追襲多得軍器糧草而歸司馬懿見山谷中皆有蜀兵不敢出大路遂回街亭此時曹真聽知孔明退兵急引兵追趕山背後一聲炮響蜀兵漫山遍野而來為首大將乃是薑維馬岱真大驚急退軍時先鋒陳造已被馬岱所斬真引兵鼠竄而還蜀兵連夜皆奔回漢中卻説趙雲鄧芝伏兵于箕穀道中聞孔明傳令回軍雲謂芝曰魏軍知吾兵退必然來追吾先引一軍伏於其後公卻引兵打吾旗號徐徐而退吾一步步自有護送也卻説郭淮提兵再回箕穀道中喚先鋒蘇顒分付曰蜀將趙雲英勇無敵汝可小心提防彼軍若退必有計也蘇顒欣然曰都督若肯接應某當生擒趙雲遂引前部三千兵奔入箕穀看看趕上蜀兵只見山坡閃出紅旗白字上書趙雲蘇顒急收兵退走行不到數裏喊聲大震一彪軍撞出為首大將挺槍躍馬大喝曰汝識趙子龍否蘇顒大驚曰如何這裏又有趙雲措手不及被雲一槍刺死于馬下餘軍潰散雲迤邐前進背後又一軍到乃郭淮部將萬政也雲見魏兵追急乃勒馬挺槍立於路口待來將交鋒蜀兵已去三十餘裏萬政認得是趙雲不敢前進雲等得天色黃昏方才撥回馬緩緩而進郭淮兵到萬政言趙雲英勇如舊因此不敢近前淮傳令教軍急趕政令數百騎壯士趕來行至一大林忽聽得背後大喝一聲曰趙子龍在此驚得魏兵落馬者百余人餘者皆越嶺而去萬政勉強來敵被雲一箭射中盔纓驚跌於澗中雲以槍指之曰吾饒汝性命回去快教郭淮趕來萬政脫命而回雲護送車仗人馬望漢中而去沿途並無遺失曹真郭淮復奪三郡以為己功卻説司馬懿分兵而進此時蜀兵盡回漢中去了懿引一軍復到西城因問遺下居民及山僻隱者皆言孔明止有二千五百軍在城中又無武將只有幾個文官別無埋伏武功山小民告曰關興張苞只各有三千軍轉山呐喊鼓噪驚追又無別軍並不敢廝殺懿悔之不及仰天歎曰吾不如孔明也遂安撫了諸處官民引兵徑還長安朝見魏主睿曰今日復得隴西諸郡皆卿之功也懿奏曰今蜀兵皆在漢中未盡剿滅臣乞大兵並力收川以報陛下睿大喜令懿即便興兵忽班內一人出奏曰臣有一計足可定蜀降吳正是蜀中將相方歸國魏地君臣又逞謀未知獻計者是誰且看下文分解
