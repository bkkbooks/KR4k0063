body:
  text: 第九十六回孔明揮淚斬馬謖周魴斷發賺曹休卻説獻計者乃尚書孫資也曹睿問曰卿有何妙計資奏曰昔太祖武皇帝收張魯時危而後濟常對群臣曰南鄭之地真為天獄中斜穀道為五百里石穴非用武之地今若盡起天下之兵伐蜀則東吳又將入寇不如以現在之兵分命大將據守險要養精蓄鋭不過數年中國日盛吳蜀二國必自相殘害那時圖之豈非勝算乞陛下裁之睿乃問司馬懿曰此論若何懿奏曰孫尚書所言極當睿從之命懿分撥諸將守把險要留郭淮張郃守長安大賞三軍駕回洛陽卻説孔明回到漢中計點軍士只少趙雲鄧芝心中甚憂乃令關興張苞各引一軍接應二人正欲起身忽報趙雲鄧芝到來並不曾折一人一騎輜重等器亦無遺失孔明大喜親引諸將出迎趙雲慌忙下馬伏地曰敗軍之將何勞丞相遠接孔明急扶起執手而言曰是吾不識賢愚以致如此各處兵將敗損惟子龍不折一人一騎何也鄧芝告曰某引兵先行子龍獨自斷後斬將立功敵人驚怕因此軍資什物不曾遺棄孔明曰真將軍也遂取金五十斤以贈趙雲又取絹一萬匹賞雲部卒雲辭曰三軍無尺寸之功某等俱各有罪若反受賞乃丞相賞罰不明也且請寄庫候今冬賜與諸軍未遲孔明歎曰先帝在日常稱子龍之德今果如此乃倍加欽敬忽報馬謖王平魏延高翔至孔明先喚王平入帳責之曰吾令汝同馬謖守街亭汝何不諫之致使失事平曰某再三相勸要在當道築土城安營守把參軍大怒不從某因此自引五千軍離山十裏下寨魏兵驟至把山四面圍合某引兵衝殺十餘次皆不能入次日土崩瓦解降者無數某孤軍難立故投魏文長求救半途又被魏兵困在山谷之中某奮死殺出比及歸寨早被魏兵占了及投列柳城時路逢高翔遂分兵三路去劫魏寨指望克復街亭因見街亭並無伏路軍以此心疑登高望之只見魏延高翔被魏兵圍住某即殺入重圍救出二將就同參軍並在一處某恐失卻陽平關因此急來回守非某之不諫也丞相不信可問各部將校孔明喝退又喚馬謖入帳謖自縛跪於帳前孔明變色曰汝自幼飽讀兵書熟諳戰法吾纍次丁寧告戒街亭是吾根本汝以全家之命領此重任汝若早聽王平之言豈有此禍今敗軍折將失地陷城皆汝之過也若不明正軍律何以服衆汝今犯法休得怨吾汝死之後汝之家小吾按月給與祿糧汝不必挂心叱左右推出斬之謖泣曰丞相視某如子某以丞相為父某之死罪實已難逃願丞相思舜帝殛鯀用禹之義某雖死亦無恨於九泉言訖大哭孔明揮淚曰吾與汝義同兄弟汝之子即吾之子也不必多囑左右推出馬謖於轅門之處將斬參軍蔣琬自成都至見武士欲斬馬謖大驚高叫留人乃見孔明曰昔楚殺得臣而文公喜今天下未定而戮智謀之臣豈不可惜乎孔明流涕而答曰昔孫武所以能制勝于天下者用法明也今四方分爭兵戈方始若復廢法何以討賊耶合當斬之須臾武士獻馬謖首級於階下孔明大哭不已蔣琬問曰今幼常得罪既正軍法丞相何故哭耶孔明曰吾非為馬謖而哭吾想先帝在白帝城臨危之時曾囑吾曰馬謖言過其實不可大用今果應此言乃深恨己之不明追思先帝之言因此痛哭耳大小將士無不流涕馬謖亡年三十九歲時建興六年夏五月也後人有詩曰失守街亭罪不輕堪嗟馬謖枉談兵轅門斬首嚴軍法拭淚猶思先帝明卻説孔明斬了馬謖將首級遍示各營已畢用線縫在尸上具棺葬之自修祭文享祀將謖家小加意撫恤按月給與祿米於是孔明自作表文令蔣琬申奏後主請自貶丞相之職琬回成都入見後主進上孔明表章後主拆視之表曰臣本庸才叨竊非據親秉旄鋮以勵三軍不能訓章明法臨事而懼至有街亭違命之闕箕穀不戒之失咎皆在臣授任無方臣明不知人恤事多暗春秋責帥臣職是當請自貶三等以督厥咎臣不勝慚愧俯伏待命後主覽畢曰勝負兵家常事丞相何出此言侍中費禕奏曰臣聞治國者必以奉法為重法若不行何以服人丞相敗績自行貶降正其宜也後主從之乃詔貶孔明為右將軍行丞相事照舊總督軍馬就命費禕齎詔到漢中孔明受詔貶降訖禕恐孔明羞赧乃賀曰蜀中之民知丞相初拔四縣深以為喜孔明變色曰是何言也得而復失與不得同公以此賀我實足使我愧赧耳禕又曰近聞丞相得薑維天子甚喜孔明怒曰兵敗師還不曾奪得寸土此吾之大罪也量得一薑維于魏何損禕又曰丞相現統雄師數十萬可再伐魏乎孔明曰昔大軍屯于祁山箕谷之時我兵多於賊兵而不能破賊反為賊所破此病不在兵之多寡在主將耳今欲減兵省將明罰思過轉變通之道於將來如其不然雖兵多何用自今以後諸人有遠慮于國者但勤攻吾之闕責吾之短則事可定賊可滅功可翹足而待矣費禕諸將皆服其論費禕自回成都孔明在漢中惜軍愛民勵兵講武置造攻城渡水之器聚積糧草預備戰筏以為後圖細作探知報入洛陽魏主曹睿聞知即召司馬懿商議收川之策懿曰蜀未可攻也方今天道亢炎蜀兵必不出若我軍深入其地彼守其險要急切難下睿曰倘蜀兵再來入寇如之奈何懿曰臣已算定今番諸葛亮必效韓信暗度陳倉之計臣舉一人往陳倉道口築城守禦萬無一失此人身長九尺猿臂善射深有謀略若諸葛亮入寇此人足可當之睿大喜問曰此何人也懿奏曰乃太原人姓郝名昭字伯道現為雜號將軍鎮守河西睿從之加郝昭為鎮西將軍命守把陳倉道口遣使持詔去訖忽報揚州司馬大都督曹休上表説東吳鄱陽太守周魴願以郡來降密遣人陳言七事説東吳可破乞早發兵取之睿就禦床上展開與司馬懿同觀懿奏曰此言極有理吳當滅矣臣願引一軍往助曹休忽班中一人進曰吳人之言反覆不一未可深信周魴智謀之士必不肯降此特誘兵之詭計也衆視之乃建威將軍賈逵也懿曰此言亦不可不聽機會亦不可錯失魏主曰仲達可與賈逵同助曹休二人領命去訖於是曹休引大軍徑取皖城賈逵引前將軍滿寵東莞太守胡質徑取陽城直向東關司馬懿引本部軍徑取江陵卻説吳主孫權在武昌東關會多官商議曰今有鄱陽太守周魴密表奏稱魏揚州都督曹休有入寇之意今魴詐施詭計暗陳七事引誘魏兵深入重地可設伏兵擒之今魏兵分三路而來諸卿有何高見顧雍進曰此大任非陸伯言不敢當也權大喜乃召陸遜封為輔國大將軍平北都元帥統禦林大兵攝行王事授以白旄黃鉞文武百官皆聽約束權親自與遜執鞭遜領命謝恩畢乃保二人為左右都督分兵以迎三道權問何人遜曰奮威將軍朱桓綏南將軍全琮二人可為輔佐權從之即命朱桓為左都督全琮為右都督於是陸遜總率江南八十一州並荊湖之衆七十余萬令朱桓在左全琮在右遜自居中三路進兵朱桓獻策曰曹休以親見任非智勇之將也今聽周魴誘言深入重地元帥以兵擊之曹休必敗敗後必走兩條路左乃夾石右乃挂車此二條路皆山僻小徑最為險峻某願與全子璜各引一軍伏於山險先以柴木大石塞斷其路曹休可擒矣若擒了曹休便長驅直進唾手而得壽春以窺許洛此萬世一時也遜曰此非善策吾自有妙用於是朱桓懷不平而退遜令諸葛瑾等拒守江陵以敵司馬懿諸路俱各調撥停當卻説曹休兵臨皖城周魴來迎徑到曹休帳下休問曰近得足下之書所陳七事深為有理奏聞天子故起大軍三路進發若得江東之地足下之功不小有人言足下多謀誠恐所言不實吾料足下必不欺我周魴大哭急掣從人所佩劍欲自刎休急止之魴仗劍而言曰吾所陳七事恨不能吐出心肝今反生疑必有吳人使反間之計也若聽其言吾必死矣吾之忠心惟天可表言訖又欲自刎曹休大驚慌忙抱住曰吾戲言耳足下何故如此魴乃用劍割發擲於地曰吾以忠心待公公以吾為戲吾割父母所遺之發以表此心曹休乃深信之設宴相待席罷周魴辭去忽報建威將軍賈逵來見休令入問曰汝此來何為逵曰某料東吳之兵必盡屯於皖城都督不可輕進待某兩下夾攻賊兵可破矣休怒曰汝欲奪吾功耶逵曰又聞周魴截發為誓此乃詐也昔要離斷臂刺殺慶忌未可深信休大怒曰吾正欲進兵汝何出此言以慢軍心叱左右推出斬之衆將告曰未及進兵先斬大將于軍不利且乞暫免休從之將賈逵兵留在寨中調用自引一軍來取東關時周魴聽知賈逵削去兵權暗喜曰曹休若用賈逵之言則東吳敗矣今天使我成功也即遣人密到皖城報知陸遜遜喚諸將聽令曰前面石亭雖是山路足可埋伏早先去占石亭闊處布成陳勢以待魏軍遂令徐盛為先鋒引兵前進卻説曹休命周魴引兵而進正行間休問曰前至何處魴曰前面石亭也堪以屯兵休從之遂率大軍並車仗等器盡赴石亭駐扎次日哨馬報道前面吳兵不知多少據住山口休大驚曰周魴言無兵為何有準備急尋魴問之人報周魴引數十人不知何處去了休大悔曰吾中賊之計矣雖然如此亦不足懼遂令大將張普為先鋒引數千兵來與吳兵交戰兩陳對圓張普出馬罵曰賊將早降徐盛出馬相迎戰無數合普抵敵不住勒馬收兵回見曹休言徐盛勇不可當休曰吾當以奇兵勝之就令張普引二萬軍伏于石亭之南又令薛喬引二萬軍伏于石亭之北明日吾自引一千兵搦戰卻佯輸詐敗誘到北山之前放炮為號三面夾攻必獲大勝二將受計各引二萬軍到晚埋伏去了卻説陸遜喚朱桓全琮分付曰汝二人各引三萬軍從石亭山路抄到曹休寨後放火為號吾親率大軍從中路而進可擒曹休也當日黃昏二將受計引兵而進二更時分朱桓引一軍正抄到魏寨後迎著張普伏兵普不知是吳兵徑來問時被朱桓一刀斬于馬下魏兵便走桓令後軍放火全琮引一軍抄到魏寨後正撞在薛喬陳裏就那裏大殺一陳薛喬敗走魏兵大損奔回本寨後面朱桓全琮兩路殺來曹休寨中大亂自相衝擊休慌上馬望夾石道奔走徐盛引大隊軍馬從正路殺來魏兵死者不可勝數逃命者盡棄衣甲曹休大驚在夾石道中奮力奔走忽見一彪軍從小路沖出為首大將乃賈逵也休驚慌少息自愧曰吾不用公言果遭此敗逵曰都督可速出此道若被吳兵以木石塞斷吾等皆危矣於是曹休驟馬而行賈逵斷後逵于林木盛茂處及險峻小徑多設旌旗以為疑兵及至徐盛趕到見山坡下閃出旗角疑有埋伏不敢追趕收兵而回因此救了曹休司馬懿聽知休敗亦引兵退去卻説陸遜正望捷音須臾徐盛朱桓全琮皆到所得車仗牛馬驢騾軍資器械不計其數降兵數萬餘人遜大喜即同太守周魴並諸將班師還吳吳主孫權領文武官僚出武昌城迎接以禦蓋覆遜而入諸將盡皆升賞權見周魴無發慰勞曰卿斷發成此大事功名當書於竹帛也即封周魴為關內侯大設筵會勞軍慶賀陸遜奏曰今曹休大敗魏已喪膽可修國書遣使入川教諸葛亮進兵攻之權從其言遂遣使齎書入川去正是只因東國能施計致令西川又動兵未知孔明再來伐魏勝負如何且看下文分解
