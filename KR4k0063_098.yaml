body:
  text: 第九十八回追漢軍王雙受誅襲陳倉武侯取勝卻説司馬懿奏曰臣嘗奏陛下言孔明必出陳倉故以郝昭守之今果然矣彼若從陳倉入寇運糧甚便今幸有郝昭王雙守把不敢從此路運糧其餘小道搬運艱難臣算蜀兵行糧止有一月利在急戰我軍只宜久守陛下可降詔令曹真堅守諸路關隘不要出戰不須一月蜀兵自走那時乘虛而擊之諸葛亮可擒也睿欣然曰卿既有先見之明何不自引一軍以襲之懿曰臣非惜身重命實欲存下此兵以防東吳陸遜耳孫權不久必將僭號稱尊如稱尊號恐陛下伐之定先入寇也臣故欲以兵待之正言間忽近臣奏曰曹都督奏報軍情懿曰陛下可即令人告戒曹真凡追趕蜀兵必須觀其虛實不可深入重地以中諸葛亮之計睿即時下詔遣太常卿韓暨持節告戒曹真切不可戰務在謹守只待蜀兵退去方才擊之司馬懿送韓暨於城外囑之曰吾以此功讓與子丹公見子丹休言是吾所陳之意只道天子降詔教保守為上追趕之人大要仔細勿遣性急氣躁者追之暨辭去卻説曹真正升帳議事忽報天子遣太常卿韓暨持節至真出寨接入受詔已畢退與郭淮孫禮計議淮笑曰此乃司馬仲達之見也真曰此見若何淮曰此言深識諸葛亮用兵之法久後能禦蜀兵者必仲達也真曰倘蜀兵不退又將如何淮曰可密令人去教王雙引兵於小路巡哨彼自不敢運糧待其糧盡兵退乘勢追擊可獲全勝孫禮曰某去祁山虛妝做運糧兵車上盡裝乾柴茅草以硫黃焰硝灌之卻教人虛報隴西運糧到若蜀人無糧必然來搶待入其中放火燒車外以伏兵應之可勝矣真喜曰此計大妙即令孫禮引兵依計而行又遣人教王雙引兵於小路上巡哨郭淮引兵提調箕穀街亭令諸路軍馬守把險要真又令張遼子張虎為先鋒樂進子樂綝為副先鋒同守頭營不許出戰卻説孔明在祁山寨中每日令人挑戰魏兵堅守不出孔明喚薑維等商議曰魏兵堅守不出是料吾軍中無糧也今陳倉轉運不通其餘小路盤涉艱難吾算隨軍糧草不敷一月用度如之奈何正躊躇間忽報隴西魏軍運糧數千車于祁山之西運糧官乃孫孔也孔明曰其人如何有魏人告曰此人曾隨魏主出獵于大石山忽驚起一猛虎直奔禦前孫禮下馬拔劍斬之從此封為上將軍乃曹真心腹人也孔明笑曰此是魏將料吾乏糧故用此計車上裝載者必是茅草引火之物吾平生專用火攻彼乃欲以此計誘我耶彼若知吾軍去劫糧車必來劫吾寨矣可將計就計而行遂喚馬岱分付曰汝引三千軍徑到魏兵屯糧之所不可入營但於上風頭放火若燒著車仗魏兵必來圍吾寨又差馬忠張嶷各引五千兵在周邊住內外夾攻三人受計去了又喚關興張苞分付曰魏兵頭營接連四通之路今晚若西山火起魏兵必來劫吾營汝二人卻伏于魏寨左右只等他兵出寨汝二人便可劫之又喚吳班吳懿分付曰汝二人各引一軍伏于營外如魏兵到可截其歸路孔明分撥已畢自在祁山上憑高而坐魏兵探知蜀兵要來劫糧慌忙報與孫禮禮令人飛報曹真真遣人去頭營分付張虎樂綝看今夜山西火起蜀兵必來救應可以出軍如此如此二將受計令人登樓專看號火卻説孫禮把軍伏於山西只待蜀兵到是夜二更馬岱引三千兵來人皆銜枚馬盡勒口徑到山西見許多車仗重重疊疊攢繞成營車仗虛插旌旗正值西南風起岱令軍士徑去營南放火車仗盡著火光沖天孫禮只道蜀兵到魏寨內放號火急引兵一齊掩至背後鼓角喧天兩路兵殺來乃是馬忠張嶷把魏軍圍在垓心孫禮大驚又聽的魏軍中喊聲起一彪軍從火光邊殺來乃是馬岱內外夾攻魏兵大敗火緊風急人馬亂竄死者無數孫禮引中傷軍突煙冒火而走卻説張虎在營中望見火光大開寨門與樂綝盡引人馬殺奔蜀寨來寨中卻不見一人急收軍回時吳班吳懿兩路兵殺出斷其歸路張樂二將急沖出重圍奔回本寨只見土城之上箭如飛蝗原來卻被關興張苞襲了營寨魏兵大敗皆投曹真寨來方欲入寨只見一彪敗軍飛奔而來乃是孫禮遂同入寨見真各言中計之事真聽知謹守大寨更不出戰蜀兵得勝回見孔明孔明令人密授計與魏延一面教拔寨齊起楊儀曰今已大勝挫盡魏兵鋭氣何故反欲收軍孔明曰吾兵無糧利在急戰今彼堅守不出吾受其病矣彼今雖暫時兵敗中原必有添益若以輕騎襲吾糧道那時要歸不能今乘魏兵新敗不敢正視蜀兵便可出其不意乘機退去所憂者但魏延一軍在陳倉道口拒住王雙急不能脫身吾已令人授以密計教斬王雙使魏人不敢來追只今後隊先行當夜孔明只留金鼓守在寨中打更一夜兵已盡退只落空營卻説曹真正在寨中憂悶忽報左將軍張郃領軍到郃下馬入帳謂真曰某奉聖旨特來聽調真曰曾別仲達否郃曰仲達分付雲吾軍勝蜀兵必不便去若吾軍敗蜀兵必即去矣今吾軍失利之後都督曾往哨探蜀兵消息否真曰未也於是即令人往探之果是虛營只插著數十面旌旗兵已去了二日也曹真懊悔無及且説魏延受了密計當夜二更拔寨急回漢中早有細作報知王雙雙大驅軍馬並力追趕追到二十餘裏看看趕上見魏延旗號在前雙大叫曰魏延休走蜀兵更不回頭雙拍馬趕來背後魏兵叫曰城外寨中火起恐中敵人姦計雙急勒馬回時只見一片火光沖天慌令退軍行到山坡左側忽一騎馬從林中驟出大喝曰魏延在此王雙大驚措手不及被延一刀砍于馬下魏兵疑有埋伏四散逃走延手下止有三十騎入馬望漢中緩緩而行後人有詩贊曰孔明妙算勝孫龐耿若長星照一方進退行兵神莫測陳倉道口斬王雙原來魏延受了孔明密計先教存下三十騎伏于王雙營邊只待王雙起兵趕時卻去他營中放火待他回寨出其不意突出斬之魏延斬了王雙引兵回到漢中見孔明交割了人馬孔明設宴大會不在話下且説張郃追蜀兵不上回到寨中忽有陳倉城郝昭差人申報言王雙被斬曹真聞知傷感不已因此憂成疾病遂回洛陽命郭淮孫禮張郃守長安諸道卻説吳王孫權設朝有細作人報説蜀諸葛丞相出兵兩次魏都督曹真兵損將亡於是群臣皆勸吳王興師伐魏以圖中原權猶豫未決張昭奏曰近聞武昌東山鳳凰來儀大江之中黃龍屢現主公德配唐虞明並文武可即皇帝位然後興兵多官皆應曰子布之言是也遂選定夏四月丙寅日築壇于武昌南郊是日群臣請權登壇即皇帝位改黃武八年為黃龍元年諡父孫堅為武烈皇帝母吳氏為武烈皇后兄孫策為長沙桓王立子孫登為皇太子命諸葛瑾長子諸葛恪為太子左輔張昭次子張休為太子右弼恪字元遜身長七盡極聰明善應對權甚愛之年六歲時值東吳筵會恪隨父在座權見諸葛瑾面長乃令人牽一驢來用粉筆書其面曰諸葛子瑜衆皆大笑恪趨至前取粉筆添二字於其下曰諸葛子瑜之驢滿座之人無不驚訝權大喜遂將驢賜之又一日大宴官僚權命恪把盞巡至張昭面前昭不飲曰此非養老之禮也權謂恪曰汝能強子布飲乎恪領命乃謂昭曰昔薑尚父年九十秉旄仗鉞未嘗言老今臨陳之日先生在後飲酒之日先生在前何謂不養老也昭無言可答只得強飲權因此愛之故命輔太子張昭佐吳王位列三公之上故以其子張休為太子右弼又以顧雍為丞相陸遜為上將軍輔太子守武昌權復還建業群臣共議伐魏之策張昭奏曰陛下初登寶位未可動兵只宜修文偃武增設學校以安民心遣使入川與蜀同盟共分天下緩緩圖之權從其言即令使命星夜入川來見後主禮畢細奏其事後主聞知遂與群臣商議衆議皆謂孫權僭逆宜絶其盟好蔣琬曰可令人問于丞相後主即遣使到漢中問孔明孔明曰可令人齎禮物入吳作賀乞遣陸遜興師伐魏魏必命司馬懿拒之懿若南拒東吳我再出祁山長安可圖也後主依言遂令太尉陳震將名馬玉帶金珠寶貝入吳作賀震至東吳見了孫權呈上國書權大喜設宴相待打發回蜀權召陸遜入告以西蜀約會興兵伐魏之事遜曰此乃孔明懼司馬懿之謀也既與同盟不得不從今卻虛作起兵之勢遙與西蜀為應待孔明攻魏急吾可乘虛取中原也即時下令教荊襄各處都要訓練人馬擇日興師卻説陳震回到漢中報知孔明孔明尚憂陳倉不可輕進先令人去哨探回報説陳倉城中郝昭病重孔明曰大事成矣遂喚魏延薑維分付曰汝二人領五千兵星夜直奔陳倉城下如見火起並力攻城二人俱未深信又來告曰何日可行孔明曰三日都要完備不須辭我即便起行二人受計去了又喚關興張苞至附耳低言如此如此二人各受密計而去且説郭淮聞郝昭病重乃與張郃商議曰郝昭病重你可速去替他我自寫表申奏朝廷別行定奪張郃引著三千兵急來替郝昭時郝昭病危當夜正呻吟之間忽報蜀軍到城下了昭急令人上城守把時各門上火起城中大亂昭聽知驚死蜀兵一擁入城卻説魏延薑維領兵到陳倉城下看時並不見一面旗號又無打更之人二人驚疑不敢攻城忽聽得城上一聲炮響四面旗幟齊豎只見一人綸巾羽扇鶴氅道袍大叫曰汝二人來的遲了二人視之乃孔明也二人慌忙下馬拜伏於地曰丞相真神計也孔明令放入城謂二人曰吾打探得郝昭病重吾令汝三日內領兵取城此乃穩衆人之心也吾卻令關興張苞只推點軍暗出漢中吾即藏於軍中星夜倍道徑到城下使彼不能調兵吾早有細作在城內放火發喊相助令魏兵驚疑不定兵無主將必自亂矣吾因而取之易如反掌兵法雲出其不意攻其無備正謂此也魏延薑維拜伏孔明憐郝昭之死令彼妻小扶靈柩回魏以表其忠孔明謂魏延薑維曰汝二人且莫卸甲可引兵去襲散關把關之人若知兵到必然驚走若稍遲便有魏兵至關即難攻矣魏延薑維受命引兵徑到散關把關之人果然盡走二人上關才要卸甲遙見關外塵頭大起魏兵到來二人相謂曰丞相神算不可測度急登樓視之乃魏將張郃也二人乃分兵守住險道張郃見蜀兵把住要路遂令退軍魏延隨後追殺一陳魏兵死者無數張郃大敗而去延回到關上令人報知孔明孔明先自領兵出陳倉斜穀取了建威後面蜀兵陸續進發後主又命大將陳式來助孔明驅大兵復出祁山安下營寨孔明聚衆言曰吾二次出祁山不得其利今又到此吾料魏人必依舊戰之地與吾相敵彼意疑我取雍郿二處必以兵拒守吾觀陰平武都二郡與漢連接若得此城亦可分魏兵之勢何人敢取之薑維曰某願往王平應曰某亦願往孔明大喜遂令薑維引兵一萬取武都王平引兵一萬取陰平二人領兵去了再説張郃回到長安見郭淮孫禮説陳倉已失郝昭已亡散關亦被蜀兵奪了今孔明復出祁山分道進兵淮大驚曰若如此必取雍郿矣乃留張郃守長安令孫禮保雍城淮自引兵星夜來郿城守禦一面上表入洛陽告急卻説魏主曹睿設朝近臣奏曰陳倉城已失郝昭已亡諸葛亮又出祁山散關亦被蜀兵奪了睿大驚忽又奏滿寵等有表説東吳孫權僭稱帝號與蜀同盟今遣陸遜在武昌訓練人馬聽候調用只在旦夕必入寇矣睿聞知兩處危急舉止失措甚是驚慌此時曹真病未痊即召司馬懿商議懿奏曰以臣愚意所料東吳必不舉兵睿曰卿何以知之懿曰孔明嘗思報猇亭之仇非不欲吞吳也只恐中原乘虛擊彼故暫與東吳結盟陸遜亦知其意故假作興兵之勢以應之實是坐觀成敗耳陛下不必防吳只須防蜀睿曰卿真高見遂封懿為大都督總攝隴西諸路軍馬令近臣取曹真總兵將印來懿曰臣自去取之遂辭帝出朝徑到曹真府下先令人入府報知懿方進見問病畢懿曰東吳西蜀會合興兵入寇今孔明又出祁山下寨明公知之乎真驚訝曰吾家人知我病重不令我知似此國家危急何不拜仲達為都督以退蜀兵耶懿曰某才薄智淺不稱其職真曰取印與仲達懿曰都督少慮某願助一臂之力只不敢受此印也真躍起曰如仲達不領此任中國必危矣吾當抱病見帝以保之懿曰天子已有恩命但懿不敢受耳真大喜曰仲達今領此任可退蜀兵懿見真再三讓印遂受之入內辭了魏主引兵往長安來與孔明決戰正是舊帥印為新帥取兩路兵惟一路來未知勝負如何且看下文分解
