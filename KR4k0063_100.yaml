body:
  text: 第一百回漢兵劫寨破曹真武侯鬥陳辱仲達卻説衆將聞孔明不追魏兵俱入帳告曰魏兵苦雨不能屯扎因此回去正好乘勢追之丞相如何不追孔明曰司馬懿善能用兵今軍退必有埋伏吾若追之正中其計不如縱他遠去吾卻分兵徑出斜谷而取祁山使魏人不提防也衆將曰取長安之地別有路途丞相只取祁山何也孔明曰祁山乃長安之首也隴西諸郡倘有兵來必經由此地更兼前臨渭濱後靠斜谷左出右入可以伏兵乃用武之地吾故欲先取此得地利也衆將皆拜服孔明令魏延張嶷杜瓊陳式出箕穀馬岱王平張翼馬忠出斜穀俱會于祁山調撥已定孔明自提大軍令關興廖化為先鋒隨後進發卻説曹真司馬懿二人在後監督人馬令一軍入陳倉古道探視回報説蜀兵不來又行旬日後面埋伏衆將皆回説蜀兵全無音耗真曰連綿秋雨棧道斷絶蜀人豈知吾等退軍耶懿曰蜀兵隨後出矣真曰何以知之懿曰連日晴朗蜀兵不趕料吾有伏兵也故縱我兵遠去待我兵過盡他卻奪祁山矣曹真不信懿曰子丹如何不信吾料孔明必從兩穀而來吾與子丹各守一穀口十日為期若無蜀兵來我面塗紅粉身穿女衣來營中伏罪真曰若有蜀兵來我願將天子所賜玉帶一條禦馬一匹與你即分兵兩路真引兵屯于祁山之西斜穀口懿引軍屯于祁山之東箕穀口各下寨已畢懿先引一枝兵伏於山谷中其餘軍馬各于要路安營懿更換衣服雜在衆軍之內遍觀各營忽到一營有一偏將仰天而怨曰大雨淋了許多時不肯回去今又在這裏頓住強要賭賽卻不苦了官軍懿聞言歸寨升帳聚衆將皆到帳下挨出那將來懿叱之曰朝廷養軍千日用在一時汝安敢出怨言以慢軍心其人不招懿叫出同伴之人對證那將不能抵賴懿曰吾非賭賽欲勝蜀兵令汝各人有功回朝汝乃妄出怨言自取罪戾喝令武士推出斬之須臾獻首帳下衆將悚然懿曰汝等諸將皆要盡心以防蜀兵聽吾中軍炮響四面皆進衆將受令而退卻説魏延張嶷陳式杜瓊四將引二萬兵取箕穀而進正行之間忽報參謀鄧芝到來四將問其故芝曰丞相有令如出箕谷提防魏兵埋伏不可輕進陳式曰丞相用兵何多疑耶吾料魏兵連遭大雨衣甲皆毀必然急歸安得又有埋伏今吾兵倍道而進可獲大勝如何又教休進芝曰丞相計無不中謀無不成汝安敢違令式笑曰丞相若果多謀不致街亭之失魏延想起孔明向日不聽其計亦笑曰丞相若聽吾言徑出子午穀此時休説長安連洛陽皆得矣今執定要出祁山有何益耶既令進兵今又教休進何其號令不明式曰吾自有五千兵徑出箕穀先到祁山下寨看丞相羞也不羞芝再三阻當式只不聽徑自引五千兵出箕穀去了鄧芝只得飛報孔明卻説陳式引兵行不數裏忽聽的一聲炮響四面伏兵皆出式急退時魏兵塞滿穀口圍得鐵桶相似式左沖右突不能得脫忽聞喊聲大震一彪軍殺入乃是魏延救了陳式回到穀中五千兵只剩得四五百帶傷人馬背後魏兵趕來卻得杜瓊張嶷引兵接應魏兵方退陳魏二人方信孔明先見如神懊悔不及且説鄧芝回見孔明言魏延陳式如此無禮孔明笑曰魏延素有反相吾知彼常有不平之意因憐其勇而用之久後必生患害正言間忽流星馬報到説陳式折了四千餘人止有四五百帶傷人馬屯在穀中孔明令鄧芝再來箕谷撫慰陳式防其生變一面喚馬岱王平分付曰斜谷若有魏兵守把汝二人引本部軍越山嶺夜行晝伏速出祁山之左舉火為號又喚馬忠張翼分付曰汝等亦從山僻小路晝伏夜行徑出祁山之右舉火為號與馬岱王平會合共劫曹真營寨吾自從穀中三面攻之魏兵可破也四人領命分頭引兵去了孔明又喚關興廖化分付曰如此如此二人受了密計引兵而去孔明自領精兵倍道而行正行間又喚吳班吳懿授與密計亦引兵先行卻説曹真心中不信蜀兵來以此怠慢縱令軍士歇息只等十日無事要羞司馬懿不覺守了七日忽有人報穀中有些小蜀兵出來真令副將秦良引五千兵哨探不許縱令蜀兵近界秦良領命引兵剛到穀口哨見蜀兵退去良急引兵趕來行到五六十裏不見蜀兵心下疑惑教軍士下馬歇息忽哨馬報説前面有蜀兵埋伏良上馬看時只見山中塵土大起急令軍士提防不一時四壁廂喊聲大震前面吳班吳懿引兵殺出背後關興廖化引兵殺來左右是山皆無走路山上蜀兵大叫下馬投降者免死魏兵大半多降秦良死戰被廖化一刀斬于馬下孔明把降兵拘於後軍卻將魏兵衣甲與蜀兵五千人穿了扮作魏兵令關興廖化吳班吳懿四將引著徑奔曹真寨來先令報馬入寨説只有些小蜀兵盡趕去了真大喜忽報司馬都督差心腹人至真喚入問之其人告曰今都督用埋伏計殺蜀兵千餘人司馬都督致意將軍教休將賭賽為念務要用心提備真曰吾這裏並無一個蜀兵遂打發來人回去忽又報秦良引兵回來了真自出帳迎之比及到寨人報前後兩把火起真急回寨後看時關興廖化吳班吳懿四將指麾蜀軍就營前殺將進來馬岱王平從後面殺來馬忠張翼亦引兵殺到魏軍措手不及各自逃生衆將保曹真望東而走背後蜀兵趕來曹真正奔走忽然喊聲大震一彪軍殺到真膽戰心驚視之乃司馬懿也懿大戰一場蜀兵方退真得脫羞慚無地懿曰諸葛亮奪了祁山地勢吾等不可久居此處宜去渭濱安營再作良圖真曰仲達何以知吾遭此大敗也懿曰見來人報稱子丹説並無一個蜀兵吾料孔明暗來劫寨因此知之故相接應今果中計切莫言賭賽之事只同心報國曹真甚是惶恐氣成疾病臥床不起兵屯渭濱懿恐軍心有亂不敢教真引兵卻説孔明大驅士馬復出祁山勞軍已畢魏延陳式杜瓊張嶷入帳拜伏請罪孔明曰是誰失陷了軍來延曰陳式不聽號令潛入穀口以此大敗式曰此事魏延教我行來孔明曰他倒救你你反攀他將令已違不必巧説即叱武士推出陳式斬之須臾懸首於帳前以示諸將此時孔明不殺魏延欲留之以為後用也孔明既斬了陳式正議進兵忽有細作報説曹真臥病不起現在營中治療孔明大喜謂諸將曰若曹真病輕必便回長安今魏兵不退必為病重故留於軍中以安衆人之心吾寫下一書教秦良的降兵持與曹真真若見之必然死矣遂喚降兵至帳下問曰汝等皆是魏軍父母妻子多在中原不宜久居蜀中今放汝等回家若何衆軍泣淚拜謝孔明曰曹子丹與吾有約吾有一書汝等帶回送與子丹必有重賞魏軍領了書奔回本寨將孔明書呈與曹真真扶病而起拆封視之其書曰漢丞相武鄉侯諸葛亮致書于大司馬曹子丹之前竊謂夫為將者能去能就能柔能剛能進能退能弱能強不動如山嶽難測如陰陽無窮如天地充實如太倉浩渺如四海眩曜如三光預知天文之旱潦先識地理之平康察陳勢之期會揣敵人之短長嗟爾無學後輩上逆穹蒼助篡國之反賊稱帝號於洛陽走殘兵于斜穀遭霖雨于陳倉水陸困乏人馬倡狂拋盈郊之戈甲棄滿地之刀槍都督心崩而膽裂將軍鼠竄而狼忙無面見關中之父老何顔入相府之廳堂史官秉筆而記録百姓衆口而傳揚仲達聞陳而惕惕子丹望風而遑遑吾軍兵強而馬壯大將虎奮以龍驤掃秦川為平壤蕩魏國作丘荒曹真看畢恨氣填胸至夜死於軍中司馬懿用兵車裝載差人送赴洛陽安葬魏主聞知曹真已死即下詔催司馬懿出戰懿提大軍來與孔明交鋒隔日先下戰書孔明謂諸將曰曹真必死矣遂批回來日交鋒使者去了孔明當夜教薑維受了密計如此而行又喚關興分付如此如此次日孔明盡起祁山之兵前到渭濱一邊是河一邊是山中央平川曠野好片戰場兩軍相迎以弓箭射住陳角三通鼓罷魏陳中門旗開處司馬懿出馬衆將隨後而出只見孔明端坐于四輪車上手搖羽扇懿曰吾主上法堯禪舜相傳二帝坐鎮中原容汝蜀吳二國者乃吾主寬慈仁厚恐傷百姓也汝乃南陽一耕夫不識天數強要相侵理宜殄滅如省心改過宜即早回各守疆界以成鼎足之勢免致生靈塗炭汝等皆得全生孔明笑曰吾受先帝托孤之重安肯不傾心竭力以討賊乎汝曹氏不久為漢所滅汝祖父皆為漢臣世食漢祿不思報效反助篡逆豈不自恥懿羞慚滿面曰吾與汝決一雌雄汝若能勝吾誓不為大將汝若敗時早歸故里吾並不加害孔明曰汝欲鬥將鬥兵鬥陳法懿曰先鬥陳法孔明曰先布陳我看懿入中軍帳下手執黃旗招颭左右軍動排成一陳復上馬出陳問曰汝識吾陳否孔明笑曰吾軍中末將亦能布之此乃混元一氣陳也懿曰汝布陳我看孔明入陳把羽扇一搖復出陳前問曰汝識我陳否懿曰量此八卦陳如何不識孔明曰識便識了敢打我陳否懿曰既識之如何不敢打孔明曰汝只管打來司馬懿回到本陳中喚戴陵張虎樂綝三將分付曰今孔明所布之陳按休生傷杜景死驚開八門汝三人可從正東生門打入征西南休門殺出復從正北開門殺入此陳可破汝等小心在意於是戴陵在中張虎在前樂綝在後各引三十騎從生門打入兩軍呐喊相助三人殺入蜀陳只見陳如連城衝突不出三人慌引騎轉過陳腳往西南沖去卻被蜀兵射住衝突不出陳中重重疊疊都有門戶那裏分東西南北三將不能相顧只管亂撞但見愁雲漠漠慘霧濛濛喊聲起處魏軍一個個皆被縛了送到中軍孔明坐於帳中左右將張虎戴陵樂綝並九十個軍皆縛在帳下孔明笑曰吾縱然捉得汝等何足為奇吾放汝等回見司馬懿教他再讀兵書重觀戰策那時來決雌雄未為遲也汝等性命既饒當留下軍器戰馬遂將衆人衣服脫了以墨塗面步行出陳司馬懿見之大怒回顧諸將曰如此挫敗鋭氣有何面目回見中原大臣耶即指揮三軍奮死掠陳懿自拔劍在手引百余驍將催督衝殺兩軍恰才相會忽然陳後鼓角齊鳴喊聲大震一彪軍從西南上殺來乃關興也懿分後軍當之復催軍向前廝殺忽然魏兵大亂原來薑維引一彪軍悄地殺來蜀兵三路夾攻懿大驚急忙退軍蜀兵周圍殺到懿引三軍望南死命沖出魏兵十傷六七司馬懿退在渭濱南岸下寨堅守不出孔明收得勝之兵回到祁山時永安城李嚴遣都尉苟安解送糧米至軍中交割苟安好酒于路怠慢違限十日孔明大怒曰吾軍中專以糧為大事誤了三日便該處斬汝今誤了十日有何理説喝令推出斬之長史楊儀曰苟安乃李嚴用人又兼錢糧多出於西川若殺此人後無人敢送糧也孔明乃叱武士去其縛杖八十放之苟安被責心中懷恨連夜引親隨五六騎徑奔魏寨投降懿喚入苟安拜告前事懿曰雖然如此孔明多謀汝言難信汝能為我幹一件大功吾那時奏準天子保汝為上將安曰但有甚事即當效力懿曰汝可回成都布散流言説孔明有怨上之意早晚欲稱為帝使汝主召回孔明即是汝之功矣苟安允諾徑回成都見了宦官布散流言説孔明自倚大功早晚必將篡國宦官聞知大驚即入內奏帝細言前事後主驚訝曰似此如之奈何宦官曰可詔還成都削其兵權免生叛逆後主下詔宣孔明班師回朝蔣琬出班奏曰丞相自出師以來纍建大功何故宣回後主曰朕有機密事必須與丞相面議即遣使齎詔星夜宣孔明回使命徑到祁山大寨孔明接入受詔已畢仰天歎曰主上年幼必有佞臣在側吾正欲建功何故取回我如不回是欺主矣若奉命而退日後再難得此機會也薑維問曰若大軍退司馬懿乘勢掩殺當復如何孔明曰吾今退軍可分五路而退今日先退此營假如營內一千兵卻掘二千竈明日掘三千竈後日掘四千竈每日退軍添竈而行楊儀曰昔孫臏擒龐涓用添兵減竈之法而取勝今丞相退兵何故增竈孔明曰司馬懿善能用兵知吾兵退必然追趕心中疑吾有伏兵定于舊營內數竈見每日增竈兵又不知退與不退則疑而不敢追吾徐徐而退自無損兵之患遂傳令退軍卻説司馬懿料苟安行計停當只待蜀兵退時一齊掩殺正躊躇間忽報蜀寨空虛人馬皆去懿因孔明多謀不敢輕追自引百餘騎前來蜀營內踏看教軍士數竈仍回本寨次日又教軍士趕到那個營內查點竈數回報説這營內之竈比前又增一分司馬懿謂諸將曰吾料孔明多謀今果添兵增竈吾若追之必中其計不如且退再作良圖於是回軍不追孔明不折一人望成都而去次日川口土人來報司馬懿説孔明退兵之時未見添兵只見增竈懿仰天長歎曰孔明效虞羽之法瞞過吾也其謀略吾不如之遂引大軍還洛陽正是棋逢敵手難相勝將遇良才不敢驕未知孔明退回成都竟是如何且看下文分解
