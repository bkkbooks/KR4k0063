body:
  text: 第一百二回司馬懿占北原渭橋諸葛亮造木牛流馬卻説譙周官居太史頗明天文見孔明又欲出師乃奏後主曰臣今職掌司天臺但有禍福不可不奏近有群鳥數萬自南飛來投于漢水而死此不祥之兆臣又觀天象見奎星躔于太白之分盛氣在此不利伐魏又成都人民皆聞柏樹夜器有此數般災異丞相只宜謹守不可妄動孔明曰吾受先帝托孤之重當竭力討賊豈可以虛妄之災氛而廢國家大事耶遂命有司設太牢祭於昭烈之廟涕泣拜告曰臣亮五出祁山未得寸土負罪非輕今臣復統全師再出祁山誓竭力盡心剿滅漢賊恢復中原鞠躬盡瘁死而後已祭畢拜辭後主星夜至漢中聚集諸將商議出師忽報關興病亡孔明放聲大哭昏倒於地半晌方蘇衆將再三勸解孔明歎曰可憐忠義之人天不與以壽我今番出師又少一員大將也後人有詩歎曰生死人常理蜉蝣一樣空但存忠孝節何必壽喬松孔明引蜀兵三十四萬分五路而進令薑維魏延為先鋒皆出祁山取齊令李恢先運糧草于斜穀道口伺候卻説魏國因舊歲有青龍自摩坡井內而出改為青龍元年此時乃青龍二年春二月也近臣奏曰邊官飛報蜀兵三十餘萬分五路復出祁山魏主曹睿大驚急召司馬懿至謂曰蜀人三年不曾入寇今諸葛亮又出祁山如之奈何懿奏曰臣夜觀天象見中原旺氣正盛奎星犯太白不利於西川今孔明自負才智逆天而行乃自取敗亡也臣托陛下洪福當往破之但願保四人同去睿曰卿保何人懿曰夏侯淵有四子長名霸字仲權次名威字季權三名惠字稚權四名和字義權霸威二人弓馬熟嫻惠和二人諳知韜略此四人常欲為父報仇臣今保夏侯霸夏侯威為左右先鋒夏侯惠夏侯和為行軍司馬共贊軍機以退蜀兵睿曰向者夏侯楙駙馬違誤軍機失陷了許多人馬至今羞慚不回今此四人亦與楙同否懿曰此四人非夏侯楙所可比也睿乃從其請即命司馬懿為大都督凡將士悉聽量才委用各處兵馬皆聽調遣懿受命辭朝出城睿又以手詔賜懿曰卿到渭濱宜堅壁固守勿與交鋒蜀兵不得志必詐退誘敵卿慎勿追待彼糧盡必將自走然後乘虛攻之則取勝不難亦免軍馬疲勞之苦計莫善於此也司馬懿頓首受詔即日到長安聚集各處軍馬共四十萬皆來渭濱下寨又撥五萬軍于渭水上搭起九座浮橋令先鋒夏侯霸夏侯威過渭水安營又于大營之後東原築起一城以防不虞懿正與衆將商議間忽報郭淮孫禮來見懿迎入禮畢淮曰今蜀兵現在祁山倘跨渭登原接連北山阻絶隴道大可虞也懿曰所言甚善公可就總督隴西軍馬據北原下寨深溝高壘按兵休動只待彼兵糧盡方可攻之郭淮孫禮領命引兵下寨去了卻説孔明復出祁山下五個大寨按左右中前後自斜穀直至劍閣一連又下十四個大寨分屯軍馬以為久計每日令人巡哨忽報郭淮孫禮領隴西之兵于北原下寨孔明謂諸將曰魏兵于北原安營者懼吾取此路阻絶隴道也吾今虛攻北原卻暗取渭濱令人扎木筏百餘隻上載草把選慣熟水手五千人駕之我夤夜只攻北原司馬懿必引兵來救彼若少敗我把後軍先渡過岸去然後把前軍下於筏中休要上岸順水取浮橋放火燒斷以攻其後吾自引一軍去取前營之門若得渭水之南則進兵不難矣諸將遵令而行早有巡哨軍飛報司馬懿懿喚諸將議曰孔明如此設施其中有計彼以取北原為名順水來燒浮橋亂吾後卻攻吾前也即傳令與夏侯霸夏侯威曰若聽得北原發喊便提兵於渭水南山之中待蜀兵至擊之又令張虎樂綝引二千弓弩手伏于渭水浮橋北岸若蜀兵乘木筏順水而來可一齊射之休令近橋又傳令郭淮孫禮曰孔明來北原暗渡渭水汝新立之營人馬不多可盡伏於半路若蜀兵于午後渡水黃昏時分必來攻汝汝詐敗而走蜀兵必追汝等皆以弓弩射之吾水陸並進若蜀兵大至只看吾指揮而擊之各處下令已畢又令二子司馬師司馬昭引兵救應前營懿自引一軍救北原卻説孔明令魏延馬岱引兵渡渭水攻北原令吳班吳懿引木筏兵去燒浮橋令王平張嶷為前隊薑維馬忠為中隊廖化張翼為後隊兵分三路去攻渭水旱營是日午時人馬離大寨盡渡渭水列成陳勢緩緩而行卻説魏延馬岱將近北原天色已昏孫禮哨見便棄營而走魏延知有準備急退軍時四下喊聲大震左有司馬懿右有郭淮兩路兵殺來魏延馬岱奮力殺出蜀兵多半落于水中餘衆奔逃無路幸得吳懿兵殺來救了敗兵過岸拒住吳班分一半兵撑筏順水來燒浮橋卻被張虎樂綝在岸上亂箭射住吳班中箭落水而死餘軍跳水逃命木筏盡被魏兵奪出此時王平張嶷不知北原兵敗直奔到魏營已有二更天氣只聽得喊聲四起王平謂張嶷曰軍馬攻打北原未知勝負渭南之寨現在面前如何不見一個魏兵莫非司馬懿知道了先作準備也我等且看浮橋火起方可進兵二人勒住軍馬忽背後一騎馬來報説丞相教軍馬急回北原兵浮橋兵俱失了王平張嶷大驚急退軍時卻被魏兵抄在背後一聲炮響一齊殺來火光沖天王平張嶷引兵相迎兩軍混戰一場平嶷二人奮力殺出蜀兵折傷大半孔明回到祁山大寨收聚敗兵約折了萬餘人心中憂悶忽報費禕自成都來見丞相孔明請入費禕禮畢孔明曰吾有一書正欲煩公去東吳投遞不知肯去否禕曰丞相之命豈敢推辭孔明即修書付費禕去了禕持書徑到建業入見吳主孫權呈上孔明之書權拆視之書略曰漢室不幸王綱失紀曹賊篡逆蔓延及今亮受昭烈皇帝寄託之重敢不竭力盡忠今大兵已會于祁山狂寇將亡於渭水伏望陛下念同盟之義命將北征共取中原同分天下書不盡言萬希聖聽權覽畢大喜乃謂費禕曰朕乃欲興兵未得會合孔明今既有書到即日朕自親征入居巢門取魏新城再令陸遜諸葛瑾等屯兵于江夏沔口取襄陽孫韶張承等出兵廣陵取淮陰等處三處一齊進軍共三十萬克日興師費禕拜謝曰誠如此則中原不日自破矣權設宴款待費禕飲宴間權問曰丞相軍前用誰當先破敵禕曰魏延為首權笑曰此人勇有餘而心不正若一朝無孔明彼必為禍孔明豈未知耶禕曰陛下之言極當臣今歸去即當以此言告孔明遂拜辭孫權回到祁山見了孔明具言吳主起大兵三十萬禦駕親征兵分三路而進孔明又問曰吳主別有所言否費禕將論魏延之語告之孔明歎曰真聰明之主也吾非不知此人為惜其勇故用之耳禕曰丞相早宜區處孔明曰吾自有法禕辭別孔明自回成都孔明正與諸將商議征進忽報有魏將來投降孔明喚入問之答曰某乃魏國偏將軍鄭文也近與秦朗同領人馬聽司馬懿調用不料懿徇私偏向加秦朗為前將軍而視文如草芥因此不平特來投降丞相願賜收録言未已人報秦朗引兵在寨外單搦鄭文交戰孔明曰此人武藝比汝若何鄭文曰某當立斬之孔明曰汝若先殺秦朗吾方不疑鄭文欣然上馬出營與秦朗交鋒孔明親自出營視之只見秦朗挺槍大罵曰反賊盜我戰馬來此可早早還我言訖直取鄭文文拍馬舞刀相迎只一合斬秦朗于馬下魏軍各自逃走鄭文提首級入營孔明回到帳中坐定喚鄭文至勃然大怒叱左右推出斬之鄭文曰小將無罪孔明曰吾向識秦朗汝今斬者並非秦朗安敢欺我文拜告曰此實秦朗之弟秦明也孔明笑曰司馬懿令汝來詐降於中取事卻如何瞞得我過若不實説必然斬汝鄭文只得訴告其實是詐降泣求免死孔明曰汝既求生可修書一封教司馬懿自來劫營吾便饒汝性命若捉住司馬懿便是汝之功還當重用鄭文只得寫了一書呈與孔明孔明令將鄭文監下樊建問曰丞相何以知此人詐降孔明曰司馬懿不輕用人若加秦朗為前將軍必武藝高強今與鄭文交馬只一合便為文所殺必不是秦朗也以故知其詐衆皆拜服孔明選一舌辨軍士附耳分付如此如此軍士領命持書徑來魏寨求見司馬懿懿喚入拆書看畢問曰汝何人也答曰某乃中原人流落蜀中鄭文與某同鄉今孔明因鄭文有功用為先鋒鄭文特托某來獻書約於明日晚間舉火為號望乞都督盡提大軍前來劫寨鄭文在內為應司馬懿反復詰問又將來書仔細檢看果然是實即賜軍士酒食分付曰本日二更為期我自來劫寨大事若成必重用汝軍士拜別回到本寨告知孔明孔明仗劍步罡禱祝已畢喚王平張嶷分付如此如此又喚馬忠馬岱分付如此如此又喚魏延分付如此如此孔明自引數十人坐于高山之上指揮衆軍卻説司馬懿見了鄭文之書便欲引二子提大兵來劫蜀寨長子司馬師諫曰父親何故據片紙而親入重地倘有疏虞如之奈何不如令別將先去父親為後應可也懿從之遂令秦朗引一萬兵去劫蜀寨懿自引兵接應是夜初更風清月朗將及二更時分忽然陰雲四合黑氣漫空對面不見懿大喜曰天使我成功也於是人盡銜枚馬皆勒口長驅大進秦朗當先引一萬兵直殺入蜀寨中並不見一人朗知中計忙叫退兵四下火把齊明喊聲震地左有王平張嶷右有馬岱馬忠兩路兵殺來秦朗死戰不能得出背後司馬懿見蜀寨火光沖天喊聲不絶又不知魏兵勝負只顧催兵接應望火光中殺來忽然一聲喊聲鼓角喧天火炮震地左有魏延右有薑維兩路殺出魏兵大敗十傷八九四散逃奔此時秦朗所引一萬兵都被蜀兵圍住箭如飛蝗秦朗死於亂軍之中司馬懿引敗兵奔入本寨三更以後天復清朗孔明在山頭上鳴金收軍原來二更時陰雲暗黑乃孔明用遁甲之法後收兵已了天復清朗乃孔明驅六丁六甲掃蕩浮雲也當下孔明得勝回寨命將鄭文斬了再議取渭南之策每日令兵搦戰魏軍只不出迎孔明自乘小車來祁山前渭水東西踏看地理忽到一穀口見其形如葫蘆之狀內中可容千餘人兩山又合一谷可容四五百人背後兩山環抱只可通一人一騎孔明看了心中大喜問向導官曰此處是何地名答曰此名上方穀又號葫蘆穀孔明回到帳中喚裨將杜睿胡忠二人附耳授以密計令喚集隨軍匠作一千余人入葫蘆穀中製造木牛流馬應用又令馬岱領五百兵守住穀口孔明囑馬岱曰匠作人等不許放出外人不許放入吾還不時自來點視捉司馬懿之計只在此舉切不可走漏消息馬岱受命而去杜睿等二人在穀中監督匠作依法製造孔明每日往來指示忽一日長史楊儀入告曰即今糧米皆在劍閣人夫牛馬搬運不便如之奈何孔明笑曰吾已運謀多時也前者所積木料並西川收買下的大木教人製造木牛流馬搬運糧米甚是便利牛馬皆不水食可以晝夜轉運不絶也衆皆驚曰自古及今未聞有木牛流馬之事不知丞相有何妙法造此奇物孔明曰吾已令人依法製造尚未完備吾今先將造木牛流馬之法尺寸方圓長短闊狹開寫明白汝等視之衆大喜孔明即手書一紙付衆觀看衆將環繞而觀造木牛之法雲方腹曲頭一腳四足頭入領中舌著於腹載多而行少獨行者數十裏群行者二十裏曲者為牛頭雙者為牛腳橫者為牛領轉者為牛足覆者為牛背方者為牛腹垂者為牛舌曲者為牛肋刻者為牛齒立者為牛角細者為牛鞅攝者為牛鞦軸牛仰雙轅人行六尺牛行四步每牛載十人所食一月之糧人不大勞牛不飲食造流馬之法雲肋長三尺五寸廣三寸厚二寸二分左右同前軸孔分墨去頭四寸徑中二寸前腳孔分墨二寸去前軸孔四寸五分廣一寸前杠孔去前腳孔分墨二寸七分孔長二寸廣一寸後軸孔去前杠分墨一尺五分大小與前同後腳孔分墨去後軸孔三寸五分大小與前同後杠孔去後腳孔分墨二寸七分後載克去後杠孔分墨四寸五分前杠長一尺八寸廣二寸厚一寸五分後杠與等板方囊二枚厚八分長二尺七寸高一尺六寸五分廣一尺六寸每枚受米二斛三鬥從上杠孔去肋下七寸前後同上杠孔去下杠孔分墨一尺三寸孔長一寸五分廣七分八孔同前後四腳廣二寸厚一寸五分形制如象靬長四寸徑面四寸三分孔徑中三腳杠長二尺一寸廣一寸五分厚一寸四分同杠耳衆將看了一遍皆拜伏曰丞相真神人也過了數日木牛流馬皆造完備宛然如活者一般上山下嶺各盡其便衆軍見之無不欣喜孔明令右將軍高翔引一千兵駕著木牛流馬自劍閣直抵祁山大寨往來搬運糧草供給蜀兵之用後人有詩贊曰劍關險峻驅流馬斜穀崎嶇駕木牛後世若能行此法輸將安得使人愁卻説司馬懿正憂悶間忽哨馬報説蜀兵用木牛流馬轉運糧草人不大勞牛馬不食懿大驚曰吾所以堅守不出者為彼糧草不能接濟欲待其自斃耳今用此法必為久遠之計不思退矣如之奈何急喚張虎樂綝二人分付曰汝二人各引五百軍從斜穀小路抄出待蜀兵驅過木牛流馬任他過盡一齊殺出不可多搶只搶三五匹便回二人依令各引五百軍扮作蜀兵夜間偷過小路伏在穀中果見高翔引兵驅木牛流馬而來將次過盡兩邊一齊鼓噪殺出蜀兵措手不及棄下數匹張虎樂綝歡喜驅回本寨司馬懿看了果然進退如活的一般乃大喜曰汝會用此法難道我不會用便令巧匠百餘人當面拆開分付依其尺寸長短厚薄之法一樣製造木牛流馬不消半月造成二千餘隻與孔明所造者一般法則亦能奔走遂令鎮遠將軍岑威引一千軍驅駕木牛流馬卻隴西搬運糧草往來不絶魏營軍將無不歡喜卻説高翔回見孔明説魏兵搶奪木牛流馬各五六匹去了孔明笑曰吾正要他搶去我只費了幾匹木牛流馬卻不久便得軍中許多資助也諸將問曰丞相何以知之孔明曰司馬懿見了木牛流馬必然仿我法度一樣製造那時我又有計策數日後人報魏兵也會造木牛流馬往隴西搬運糧草孔明大喜曰不出吾之算也便喚王平分付曰汝引一千兵扮作魏人星夜偷過北原只説是巡糧軍徑到運糧之所將護糧之人盡皆殺散卻驅木牛流馬而回徑奔過北原來此處必有魏兵追趕汝便將木牛流馬口內舌頭扭轉牛馬就不能行動汝等竟棄之而走背後魏兵趕到牽拽不動扛擡不去吾再有兵到汝卻回身再將牛馬舌扭過來長驅大行魏兵必疑為怪也王平受計引兵而去孔明又喚張嶷分付曰汝引五百軍都扮作六丁六甲神兵鬼頭獸身用五彩塗面妝作種種怪異之狀一手執繡旗一手仗寶劍身挂葫蘆內藏煙火之物伏於山傍待木牛流馬到時放起煙火一齊擁出驅牛馬而行魏人見之必疑是神鬼不敢來追趕張嶷受計引兵而去孔明又喚魏延薑維分付曰汝二人同引一萬兵去北原寨口接應木牛流馬以防交戰又喚廖化張翼分付曰汝二人引五千兵去斷司馬懿來路又喚馬忠馬岱分付曰汝二人引二千兵去渭南搦戰六人各各遵令而去且説魏將岑威引軍驅木牛流馬裝載糧米正行之間忽報前面有兵巡糧岑威令人哨探果是魏兵遂放心前進兩軍合在一處忽然喊聲大震蜀兵就本隊裏殺起大呼蜀中大將王平在此魏兵措手不及被蜀兵殺死大半岑威引敗兵抵敵被王平一刀斬了餘皆潰散王平引兵盡驅木牛流馬而回敗兵飛奔報入北原寨內郭淮聞軍糧被劫疾忙引軍來救王平令兵扭轉木牛流馬舌頭皆棄於道上且戰且走郭淮教且莫追只驅回木牛流馬衆軍一齊驅趕卻那裏驅得動郭淮心中疑惑正無奈何忽鼓角喧天喊聲四起兩路兵殺來乃魏延薑維也王平復引兵殺回三路夾攻郭淮大敗而走王平令軍士將牛馬舌頭重復扭轉驅趕而行郭淮望見方欲回兵再追只見山後煙雲突起一隊神兵擁出一個個手執旗劍怪異之狀驅駕木牛流馬如風擁而去郭淮大驚曰此必神助也衆軍見了無不驚畏不敢追趕卻説司馬懿聞北原兵敗急自引軍來救方到半路忽一聲炮響兩路兵自險峻處殺出喊聲震地旗上大書漢將張翼廖化司馬懿見了大驚魏軍著慌各自逃竄正是路逢神將糧遭劫身遇奇兵命又危未知司馬懿怎地抵敵且看下文分解
