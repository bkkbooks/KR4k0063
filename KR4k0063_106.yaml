body:
  text: 第一百六回公孫淵兵敗死襄平司馬懿詐病賺曹爽卻説公孫淵乃遼東公孫度之孫公孫康之子也建安十二年曹操追袁尚未到遼東康斬尚首級獻操操封康為襄平侯後康死有二子長曰晃次曰淵皆幼康弟公孫恭繼職曹丕時封恭為車騎將軍襄平侯太和二年淵長大文武兼備性剛好鬥奪其叔公孫恭之位曹睿封淵為揚烈將軍遼東太守後孫權遣張彌許晏齎金珠珍玉赴遼東封淵為燕王淵懼中原乃斬張許二人送首與曹睿睿封淵為大司馬樂浪公淵心不足與衆商議自號為燕王改元紹漢元年副將賈范諫曰中原待主公以上公之爵不為卑賤今若背反實為不順更兼司馬懿善能用兵西蜀諸葛武侯且不能取勝何況主公乎淵大怒叱左右縛賈範將斬之參軍倫直諫曰賈範之言是也聖人雲國家將亡必有妖孽今國中屢見怪異之事近有犬戴巾幘身披紅衣上屋作人行又城南鄉民造飯飯甑之中忽有一小兒蒸死于內襄平北市中地忽陷一穴湧出一塊肉周圍數尺頭面眼耳口鼻都具獨無手足刀箭不能傷不知何物蔔者占之曰有形不成有口無聲國家亡滅故現其形有此三者皆不祥之兆也主公宜避凶就吉不可輕舉妄動淵勃然大怒叱武士綁倫直並賈范同斬於市令大將軍卑衍為元帥楊祚為先鋒起遼兵十五萬殺奔中原來邊官報知魏主曹睿睿大驚乃召司馬懿入朝計議懿奏曰臣部下馬步官軍四萬足可破賊睿曰卿兵少路遠恐難收復懿曰兵不在多在能設奇用智耳臣托陛下洪福必擒公孫淵以獻陛下睿曰卿料公孫淵作何舉動懿曰淵若棄城預走是上計也守遼東拒大軍是中計也坐守襄平是為下計必被臣所擒矣睿曰此去往復幾時懿曰四千里之地往百日攻百日還百日休息六十日大約一年足矣睿曰倘吳蜀入寇如之奈何懿曰臣已定下守禦之策陛下勿憂睿大喜即命司馬懿興師征討公孫淵懿辭朝出城令胡遵為先鋒引前部兵先到遼東下寨哨馬飛報公孫淵淵令卑衍楊祚分八萬兵屯於遼隧圍塹二十餘裏環繞鹿角甚是嚴密胡遵令人報知司馬懿懿笑曰賊不與我戰欲老我兵耳我料賊衆大半在此其巢穴空虛不若棄卻此處徑奔襄平賊必往救卻於中途擊之必獲全功於是勒兵從小路向襄平進發卻説卑衍與楊祚商議曰若魏兵來攻休與交戰彼千裏而來糧草不繼難以持久糧盡必退待他退時然後出奇兵擊之司馬懿可擒也昔司馬懿與蜀兵相拒堅守渭南孔明竟卒於軍中今日正與此理相同二人正商議間忽報魏兵往南去了卑衍大驚曰彼知吾襄平軍少去襲老營也若襄平有失我等守此處無益矣遂拔寨隨後而起早有探馬飛報司馬懿懿笑曰中吾計矣乃令夏侯霸夏侯威各引一軍伏于遼水之濱如遼兵到兩下齊出二人受計而往早望見卑衍楊祚引兵前來一聲炮響兩邊鼓噪搖旗左有夏侯霸右有夏侯威一齊殺出卑楊二人無心戀戰奪路而走奔至首山正逢公孫淵兵到合兵一處回馬再與魏兵交戰卑衍出馬罵曰賊將休使詭計汝敢出戰否夏侯霸縱馬揮刀來迎戰不數合被夏侯霸一刀斬卑衍于馬下遼兵大亂霸驅兵掩殺公孫淵引敗兵奔入襄平城去閉門堅守不出魏兵四面圍合時值秋雨連綿一月不止平地水深三尺運糧船自遼河口直至襄平城下魏兵皆在水中行坐不安左都督裴景入帳告曰雨水不住營中泥濘軍不可停請移於前面山上懿怒曰捉公孫淵只在旦夕安可移營如有再言移營者斬裴景喏喏而退少頃右都督仇連又來告曰軍士苦水乞太尉移營高處懿大怒曰吾軍令已發汝何敢故違即命推出斬之懸首於轅門外於是軍心震懾懿令南寨人馬暫退二十裏縱城內軍民出城樵采柴薪牧放牛馬司馬陳群問曰前太尉攻上庸之時兵分八路八日趕至城下遂生擒孟達而成大功今帶甲四萬數千里而來不令攻打城池卻使久居泥濘之中又縱賊衆樵牧某實不知太尉是何主意懿笑曰公不知兵法耶昔孟達糧多兵少我糧少兵多故不可不速戰出其不意突然攻之方可取勝今遼兵多我兵少賊飢我飽何必力攻正當任彼自走然後乘機擊之我今放開一條路不絶彼之樵牧是容彼自走也陳群拜服於是司馬懿遣人赴洛陽催糧魏主曹睿設朝群臣皆奏曰近日秋雨連綿一月不止人馬疲勞可召回司馬懿權且罷兵睿曰司馬太尉善能用兵臨危制變多有良謀捉公孫淵計日而待卿等何必憂也遂不聽群臣之諫使人運糧解至司馬懿軍前懿在寨中又過數日雨止天晴是夜懿出帳外仰觀天文忽見一星其大如鬥流光數丈自首山東北墜于襄平東南各營將士無不驚駭懿見之大喜乃謂衆將曰五日之後星落處必斬公孫淵矣來日可並力攻城衆將得令次日侵晨引兵四面圍合築土山掘地道立炮架裝雲梯日夜攻打不息箭如急雨射入城去公孫淵在城中糧盡皆宰牛馬為食人人怨恨各無守心欲斬淵首獻城歸降淵聞之甚是驚憂慌令相國王建禦史大夫柳甫往魏寨請降二人自城上系下來告司馬懿曰請太尉退二十裏我君臣自來投降懿大怒曰公孫淵何不自來殊為無理叱武士推出斬之將首級付與從人從人回報公孫淵大驚又遣侍中衛演來到魏營司馬懿升帳聚衆將立於兩邊演膝行而進跪於帳下告曰願太尉息雷霆大怒克日先送世子公孫修為質當然後君臣自縛來降懿曰軍事大要有五能戰當戰不能戰當守不能守當走不能走當降不能降當死耳何必送子為質當叱衛演回報公孫淵演抱頭鼠竄而去歸告公孫淵淵大驚乃與子公孫修密議停當選下一千人馬當夜二更時分開了南門往東南而走淵見無人心中暗喜行不到十裏忽聽得山上一聲炮響鼓角齊鳴一枝兵攔住中央乃司馬懿也左有司馬師右有司馬昭二人大叫曰反賊休走淵大驚急撥馬尋路欲走早有胡遵兵到左有夏侯霸夏侯威右有張虎樂綝四面圍得鐵桶相似公孫淵父子只得下馬納降懿在馬上顧諸將曰吾前夜丙寅日見大星落於此處今夜壬申日應矣衆將稱賀曰太尉真神機也懿傳令斬之公孫淵父子對面受戮司馬懿遂勒兵來取襄平未及到城下時胡遵早引兵入城城中人民焚香拜迎魏兵盡皆入城懿坐於衙上將公孫淵宗族並同謀官僚人等俱殺之計首級七十餘顆出榜安民人告懿曰賈範倫直苦諫淵不可反叛俱被淵所殺懿遂封其墓而榮其子孫就將庫內財物賞勞三軍班師回洛陽卻説魏主在宮中夜至三更忽然一陳陰風吹滅燈光只見毛皇后引數十個宮人哭至座前索命睿因此得病病漸沈重命侍中光祿大夫劉放孫資掌樞密院一切事務又召文帝子燕王曹宇為大將軍佐太子曹芳攝政宇為人恭儉溫和未肯當此大任堅辭不受睿召劉放孫資問曰宗族之內何人可任二人久得曹真之惠仍保奏曰惟曹子丹之子曹爽可也睿從之二人又奏曰欲用曹爽當遣燕王歸國睿然其言二人遂請睿降詔齎出諭燕王曰有天子手詔命燕王歸國限即日就行若無詔不許入朝燕王涕泣而去遂封曹爽為大將軍總攝朝政睿病漸危急令使持節詔司馬懿還朝懿受命徑到許昌入見魏主睿曰朕惟恐不見得見卿今日得見死無恨矣懿頓首奏曰臣在途中聞陛下聖體不安恨不肋生兩翼飛至闕下今日得睹龍顔臣之幸也睿宣太子曹方大將軍曹爽侍中劉放孫資等皆至禦榻之前睿執司馬懿之手曰昔劉玄德在白帝城病危以幼子劉禪托孤于諸葛孔明孔明因此竭盡忠誠至死方休偏邦尚然如此何況大國乎朕幼子曹芳年才八歲不堪掌理社稷幸太尉及宗兄元勳舊臣竭力相輔無負朕心又喚芳曰仲達與朕一體爾宜敬禮之遂命懿攜芳近前芳抱懿頸不放睿曰太尉勿忘幼子今日相戀之情言訖潸然淚下懿頓首流涕魏主昏沈口不能言只以手指太子須臾而卒在位十三年壽三十六歲時魏景初三年春正月下旬也當下司馬懿曹爽扶太子曹芳即皇帝位芳字蘭卿乃睿乞養之子祕在宮中人莫知其所由來於是曹芳諡睿為明帝葬于高平陵尊郭皇后為皇太后改元正始元年司馬懿與曹爽輔政爽事懿甚謹一應大事必先啓知爽字昭伯自幼出入宮中明帝見爽謹慎甚是愛敬爽門下有客五百人內有五人以浮華相尚一是何晏字平叔一是鄧揚字玄茂乃鄧禹之後一是李勝字公昭一是丁謐字彥靖一是畢軌字昭先又有大司農桓範字元則頗有智謀人多稱為智囊此數人皆爽所信任何晏告爽曰主公大權不可委託他人恐生後患爽曰司馬公與我同受先帝托孤之命安忍背之晏曰昔日先公與仲達破蜀兵之時纍受此人之氣因而致死主公如何不察也爽猛然省悟遂與多官計議停當入奏魏主曹芳曰司馬懿功高德重可加為太傅芳從之自是兵權皆歸於爽爽命弟曹羲為中領軍曹訓為武衛將軍曹彥為散騎常侍各引三千禦林軍任其出入禁宮又用何晏鄧揚丁謐為尚書畢軌為司隸校尉李勝為河南尹此五人日夜與爽議事於是曹爽門下賓客日盛司馬懿推病不出二子亦皆退職間居爽每日與何晏等飲酒作樂凡用衣服器皿與朝廷無異各處進貢玩好珍奇之物先取上等者入己然後進宮佳人美女充滿府院黃門張當諂事曹爽私選先帝侍妾七八人送入府中爽又選善歌舞良家子女三四十人為家樂又建重樓畫閣造金銀器皿用巧匠數百人晝夜工作卻説何晏聞平原管輅明數術請與論易時鄧揚在座問輅曰君自謂善易而語不及易中詞義何也輅曰夫善易者不言易也晏笑而贊之曰可謂要言不煩因謂輅曰試為我卜一封可至三公否又問連夢青蠅數十來集鼻上此是何兆輅曰元愷輔舜周公佐周皆以和惠謙恭享有多福今君侯位尊勢重而懷德者鮮畏威者衆殆非小心求福之道且鼻者山也山高而不危所以長守貴也今青蠅臭惡而集焉位峻者顛可不懼乎願君侯裒多益寡非禮勿履然後三公可至青蠅可驅也鄧揚怒曰此老生之常談耳輅曰老生者見不生常談者見不談遂拂袖而去二人大笑曰真狂士也輅到家與舅言之舅大驚曰何鄧二人威權甚重汝奈何犯之輅曰吾與死人語何所畏耶舅問其故輅曰鄧揚行步筋不束骨脈不制肉起立傾倚若無手足此為鬼躁之相何晏視侯魂不守宅血不華色精爽煙浮容若稿木此為鬼幽之相二人早晚必有殺身之禍何足畏也其舅大罵輅為狂子而去卻説曹爽嘗與何晏鄧揚等畋獵其弟曹羲諫曰兄威權太甚而好出外遊獵倘為人所算悔之無及爽叱曰兵權在吾手中何懼之有司農桓範亦諫不聽時魏主曹芳改正始十年為嘉平元年曹爽一向專權不知仲達虛實適魏主除李勝為荊州刺史即令李勝往辭仲達就探消息勝徑到太傅府中早有門吏報入司馬懿謂二子曰此乃曹爽使來探吾病之虛實也乃去冠散發上床擁被而坐又令二婢扶策方請李勝入府勝至床前拜曰一向不見太傅誰想如此病重今天子命某為荊州刺史特來拜辭懿佯答曰並州近朔方好為之備勝曰除荊州刺史非並州也懿笑曰你方從並州來勝曰漢上荊州耳懿大笑曰你從荊州來也勝曰太傅如何病得這等了左右曰太傅耳聾勝曰乞紙筆一用左右取紙筆與勝勝寫畢呈上懿看之笑曰吾病的耳聾了此去保重言訖以手指口侍婢進湯懿將口就之湯流滿襟乃作哽噎之聲曰吾今衰老病篤死在旦夕矣二子不肖望君教之君若見大將軍千萬看覷二子言訖倒在床上聲嘶氣喘李勝拜辭仲達回見曹爽細言其事爽大喜曰此老若死吾無憂矣司馬懿見李勝去了遂起身謂二子曰李勝此去回報消息曹爽必不忌我矣只待他出城畋獵之時方可圖之不一日曹爽請魏主曹芳去謁高平陵祭祀先帝大小官僚皆隨駕出城爽引三弟並心腹人何晏等及禦林軍護駕正行司農桓范叩馬諫曰主公總典禁兵不宜兄弟皆出倘城中有變如之奈何爽以鞭指而叱之曰誰敢為變再勿亂言當日司馬懿見爽出城心中大喜即起舊日手下破敵之人並家將數十引二子上馬徑來謀殺曹爽正是閉戶忽然有起色驅兵自此逞雄風未知曹爽性命如何且看下文分解
