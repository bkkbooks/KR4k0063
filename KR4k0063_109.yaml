body:
  text: 第一百九回困司馬漢將奇謀廢曹芳魏家果報蜀漢延熙十六年秋將軍薑維起兵二十萬令廖化張翼為左右先鋒夏侯霸為參謀張嶷為運糧使大兵出陽平關伐魏維與夏侯霸商議曰向取雍州不克而還今若再出必又有準備公有何高見霸曰隴上諸郡只有南安錢糧最廣若先取之足可為本向者不克而還蓋因羌兵不至今可先遣人會羌人於隴右然後進兵出石營從董亭直取南安維大喜曰公言甚妙遂遣郤正為使齎金珠蜀錦入羌結好羌王羌王迷當得了禮物便起兵五萬令羌將俄何燒戈為大先鋒引兵南安來魏左將軍郭淮聞報飛奏洛陽司馬師問諸將曰誰敢去敵蜀兵輔國將軍徐質曰某願往師素知徐質英勇過人心中大喜即令徐質為先鋒令司馬昭為大都督領兵望隴西進發軍至董亭正遇薑維兩軍列成陳勢徐質使開山大斧出馬挑戰蜀職中廖化出迎戰不數合化拖刀敗回張翼縱馬挺槍而迎戰不數合又敗入陳徐質驅兵掩殺蜀兵大敗退三十餘裏司馬昭亦收兵回各自下寨薑維與夏侯霸商議曰徐質勇甚當以何策擒之霸曰來日詐敗以埋伏之計勝之維曰司馬昭乃仲達之子豈不知兵法若見地勢掩映必不肯追吾見魏兵纍次斷吾糧道今卻用此計誘之可斬徐質矣遂喚廖化分付如此如此又喚張翼分付如此如此二人領兵去了一面令軍士于路撒下鐵蒺藜寨外多排鹿角示以久計徐質連日引兵搦戰蜀兵不出哨兵報司馬昭説蜀兵在鐵籠山後用木牛流馬搬運糧草以為久計只待羌兵策應昭喚徐質曰昔日所以勝蜀者因斷彼糧道也今蜀兵在鐵籠山後運糧汝今夜引兵五千斷其糧道蜀兵自退矣徐質領令初更時分引兵望鐵籠山來果見蜀兵二百餘人驅百余頭木牛流馬裝載糧草而行魏兵一聲喊聲徐質當先攔住蜀兵盡棄糧草而走質分兵一半押送糧草回寨自引兵一半追來追不到十裏前面車仗橫截去路質令軍士下馬拆開車仗只見兩邊忽然火起質急勒馬回走後面山僻窄狹處亦有車仗截路火光迸起質等冒煙突火縱馬而出一聲炮響兩路軍殺來左有廖化右有張翼大殺一陳魏兵大敗徐質奮死隻身而走人困馬乏正奔走間前面一枝兵殺到乃薑維也質大驚無措被維一槍刺倒坐下馬徐質跌下馬來被衆軍亂刀砍死質所分一半押糧兵亦被夏侯霸所擒盡降其衆霸將魏兵衣甲馬匹令蜀兵穿了就令騎坐打著魏軍旗號從小路徑奔回魏寨來魏軍見本部兵回開門放入蜀兵就寨中殺起司馬昭大驚慌忙上馬走時前面廖化殺來昭不能前進急退時薑維引兵從小路殺到昭四下無路只得勒兵上鐵籠山據守原來此山只有一條路四下皆險峻難上其上惟有一泉止夠百人之飲此時昭手下有六千人被薑維絶其路口山上泉水不敷人馬枯渴昭仰天長歎曰吾死於此地矣後人有詩曰妙算薑維不等間魏師受困鐵籠間龐涓始入馬陵道項羽初圍九裏山主簿王韜曰昔日耿恭受困拜井而得甘泉將軍何不效之昭從其言遂上山頂泉邊再拜而祝曰昭奉詔來退蜀兵若昭合死令甘泉枯竭昭自當刎頸教部軍盡降如壽祿未終願蒼天早賜甘泉以活衆命祝畢泉水湧出取之不竭因此人馬不死卻説薑維在山下困住魏兵謂衆將曰昔日丞相在上方谷不曾捉住司馬懿吾深為恨今司馬昭必被吾擒矣卻説郭淮聽知司馬昭困於鐵籠山上欲提兵來陳泰曰薑維會合羌兵欲先取南安今羌兵已到將軍若撤兵去救羌兵必乘虛襲我後也可先令人詐降羌人於中取事若退了此兵方可救鐵籠之圍郭淮從之遂令陳泰引五千兵徑到羌王寨內解甲而入泣拜曰郭淮妄自尊大常有殺泰之心故來投降郭淮軍中虛實某俱知之只今夜願引一軍前去劫寨便可成功如兵到魏寨自有內應迷當大喜遂令俄何燒戈同陳泰來劫魏寨俄何燒戈教泰降兵在後令泰引羌兵為前部是夜二更竟到魏寨寨門大開陳泰一騎馬先入俄何燒戈驟馬挺槍入寨之時只叫得一聲苦連人帶馬跌在陷坑裏陳泰兵從後面殺來郭淮從左邊殺來羌兵大亂自相踐踏死者無數生者盡降俄何燒戈自刎而死郭淮陳泰引兵直殺到羌人寨中迷當大王急出帳上馬時被魏兵生擒活捉來見郭淮淮慌下馬親去其縛用好言撫慰曰朝廷素以公為忠義今何故助蜀人也迷當慚愧伏罪淮乃説迷當曰公今為前部去解鐵籠山之圍退了蜀兵吾奏準天子自有厚賜迷當從之遂引羌兵在前魏兵在後徑奔鐵籠山時值三更先令人報知薑維維大喜教請入相見魏兵多半雜在羌人部內行到蜀寨前維令大兵皆在寨外屯扎迷當引百餘人到中軍帳前薑維夏侯霸二人出迎魏將不等迷當開言就從背後殺將起來維大驚急上馬而走羌魏之兵一齊殺入蜀兵四分五落各自逃生維手無器械腰間止有一副弓箭走得慌忙箭皆落了只有空壺維望山中而走背後郭淮引兵趕來見維手無寸鐵乃驟馬挺槍追之看看至近維虛拽弓弦連響十餘次淮連躲數番不見箭到知維無箭乃挂住鋼槍拈弓搭箭射之維急閃過順手接了就扣在弓弦上待淮追近望面門上盡力射去淮應弦落馬維勒回馬來殺郭淮魏軍驟至維下手不及只掣得淮槍而去魏兵不敢追趕急救淮出寨拔出箭頭血流不止而死司馬昭下山引兵追趕半途而回夏侯霸隨後逃至與薑維一齊奔走維折了許多人馬一路收扎不住自回漢中雖然兵敗卻射死郭淮殺死徐質挫動魏國之威將功補罪卻説司馬昭犒勞羌兵發遣回國去訖班師還洛陽與兄司馬師專制朝權群臣莫敢不服魏主曹芳每見師入朝戰栗不已如針刺背一日芳設朝見師帶劍上殿慌忙下榻迎之師笑曰豈有君迎臣之禮也請陛下穩便須臾群臣奏事司馬師俱自剖斷並不啓奏魏主少時朝退師昂然下殿乘車出內前遮後擁不下數千人馬芳退入後殿顧左右止有三人乃太常夏侯玄中書令李豐光祿大夫張緝緝乃張皇後之父曹芳之皇丈也芳叱退近侍同三人至密室商議芳執張緝之手而哭曰司馬師視朕如小兒覷百官如草芥社稷早晚必歸此人矣言訖大哭李豐奏曰陛下勿憂臣雖不才願以陛下之明詔聚四方之英傑以剿此賊夏侯玄奏曰臣叔夏侯霸降蜀因懼司馬兄弟謀害故耳今若剿除此賊臣叔必回也臣乃國家舊戚安敢坐視姦賊亂國願同奉詔討之芳曰但恐不能耳三人哭奏曰臣等誓當同心滅賊以報陛下芳脫下龍鳳汗衫咬破指尖寫了血詔授與張緝乃囑曰朕祖武皇帝誅董承蓋為機事不密也卿等須謹細勿泄於外豐曰陛下何出此不利之言臣等非董承之輩司馬師安比武祖也陛下勿疑三人辭出至東華門左側正見司馬師帶劍而來從者數百人皆持兵器三人立於道傍師問曰汝三人退朝何遲李豐曰聖上在內廷觀書我三人侍讀故耳師曰所看何書豐曰乃夏商周三代之書也師曰上見此書問何故事豐曰天子所問伊尹扶商周公攝政之事我等皆奏曰今司馬大將軍即伊尹周公也師冷笑曰汝等豈將吾比伊尹周公其心實指吾為王莽董卓三人皆曰我等皆將軍門下之人安敢如此師大怒曰汝等乃口諛之人適間與天子在密室中所哭何事三人曰實無此狀師叱曰汝三人淚眼尚紅如何抵賴夏侯玄知事已泄乃厲聲大罵曰吾等所哭者為汝威震其主將謀篡逆耳師大怒叱武士捉夏侯玄玄揎拳裸袖徑擊司馬師卻被武士擒住師令將各人搜檢于張緝身畔搜出一龍鳳汗衫上有血字左右呈與司馬師師視之乃密詔也詔曰司馬師弟兄共持大權將圖篡逆所行詔制皆非朕意各部官兵將士可同仗忠義討滅賊臣匡扶社稷功成之日重加爵賞司馬師看畢勃然大怒曰原來汝等正欲謀害吾兄弟情理難容遂令將三人腰斬於市滅其三族三人罵不絶口比臨東市中牙齒盡被打落各人含糊數罵而死師直入後宮魏主曹芳正與張皇後商議此事皇后曰內廷耳目甚多倘事泄露必纍妾矣正言間忽見師入皇后大驚師按劍謂芳曰臣父立陛下為德功德不在周公之下臣事陛下亦與伊尹何別乎今反以恩為仇以功為過欲與二三小臣謀害臣兄弟何也芳曰朕無此心師袖中取出汗衫擲之於地曰此誰人所作耶芳魂飛天外魄散九霄戰栗而答曰此皆為他人所逼故也朕豈敢興此心師曰妄誣大臣造反當加何罪芳跪告曰朕合有罪望大將軍恕之師曰陛下請起國法未可廢也乃指張皇後曰此是張緝之女理當除之芳大哭求免師不從叱左右將張後捉出至東華門內用白練絞死後人有詩曰當年伏後出宮門跣足哀號別至尊司馬今朝依此例天教還報在兒孫次日司馬師大會群臣曰今主上荒淫無道褻近娼優聽信讒言閉塞賢路其罪甚於漢之昌邑不能主天下吾謹按伊尹霍光之法別立新君以保社稷以安天下如何衆皆應曰大將軍行伊霍之事所謂應天順人誰敢違命師遂同多官入永寧宮奏聞太后太后曰大將軍欲立何人為君師曰臣觀彭城王曹據聰明仁孝可以為天下之主太后曰彭城王乃老身之叔今立為君我何以當之今有高貴鄉公曹髦乃文皇帝之孫此人溫恭克讓可以立之卿等大臣從長計議一人奏曰太后之言是也便可立之衆視之乃司馬師宗叔司馬孚也師遂遣使往元城召高貴鄉公請太后升太極殿召芳責之曰汝荒淫無度褻近娼優不可承天下當納下璽綬復齊王之爵目下起程非宣召不許入朝芳泣拜太后納了國寶乘王車大哭而去只有數員忠義之臣含淚而送後人有詩曰昔日曹瞞相漢時欺他寡婦與孤兒誰知四十餘年後寡婦孤兒亦被欺卻説高貴鄉公曹髦字彥士乃文帝之孫東海定王霖之子也當日司馬師以太后命宣至文武官僚備鑾駕於西掖門外拜迎髦慌忙答禮太尉王肅曰主上不當答禮髦曰吾亦人臣也安得不答禮乎文武扶髦上輦入營髦辭曰太后詔命不知為何吾安敢乘輦而入遂步行至太極東堂司馬師迎著髦先下拜師急扶起問候已畢引見太后後曰吾見汝年幼時有帝王之相汝今可為天下之主務須恭儉節用布德施仁勿辱先帝也髦再三謙辭師令文武請髦出太極殿是日立為新君改嘉平六年為正元元年大赦天下假大將軍司馬師黃鉞入朝不趨奏事不名帶劍上殿文武百官各有封賜正元二年春正月有細作飛報説鎮東將軍毋儉揚州刺史文欽以廢主為名起兵前來司馬師大驚正是漢臣曾有勤王志魏將還興討賊師未知如何迎敵且看下文分解
