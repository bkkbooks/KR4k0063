body:
  text: 第一百十三回丁奉定計斬孫綝薑維鬥陳破鄧艾卻説薑維恐救兵到先將軍器車仗一應軍需步兵先退然後將馬軍斷後細作報知鄧艾艾笑曰薑維知大將軍兵到故先退去不必追之追則中彼之計也乃令人哨探回報果然駱穀道狹之處堆積柴草準備要燒追兵衆皆稱艾曰將軍真神算也遂遣使齎表奏聞於是司馬昭大喜又加賞鄧艾卻説東吳大將軍孫綝聽知全端唐咨等降魏勃然大怒將各人家眷盡皆斬之吳主孫亮時年方十六見綝殺戮太過心甚不然一日出西苑因食生梅令黃門取蜜須臾取至見蜜內有鼠糞數塊召藏吏責之藏吏叩首曰臣封閉甚嚴安有鼠糞亮曰黃門曾向爾求蜜食否藏吏曰黃門于數日前曾求蜜食臣實不敢與亮指黃門曰此必汝怒藏吏不與爾蜜故置糞於蜜中以陷之也黃門不服亮曰此事易知耳若糞久在蜜中則內外皆濕若新在蜜中則外濕內燥命剖視之果然內燥黃門服罪亮之聰明大抵如此雖然聰明卻被孫綝把持不能主張綝令弟威遠將軍孫據入蒼龍宿衛武衛將軍孫恩偏將軍孫幹長水校尉孫闓分屯諸營一日吳主孫亮悶坐黃門侍郎全紀在側紀乃國舅也亮因泣告曰孫綝專權妄殺欺朕太甚今不圖之必為後患紀曰陛下但有用臣處臣萬死不辭亮曰卿可只今點起禁兵與將軍劉丞各把城門朕自出殺孫綝但此事切不可令卿母知之卿母乃綝之姊也倘若泄漏誤朕匪輕紀曰乞陛下草詔與臣臨行事之時臣將詔示衆使綝手下人皆不敢妄動亮從之即寫密詔付紀紀受詔歸家密告其父全尚尚知此事乃告妻曰三日內殺孫綝矣妻曰殺之是也口雖應之卻私令人持書報知孫綝綝大怒當夜便喚弟兄四人點起精兵先圍大內一面將全尚劉丞並其家小俱拿下比及平明吳主孫亮聽得宮門外金鼓大震內侍慌入奏曰孫綝引兵圍了內苑亮大怒指全後罵曰汝父兄誤我大事矣乃拔劍欲出全後與侍中近臣皆牽其衣而哭不放亮出孫綝先將全尚劉丞等殺訖然後召文武於朝內下令曰主上荒淫久病昏亂無道不可以奉宗廟今當廢之汝諸文武敢有不從者以謀叛論衆皆畏懼應曰願從將軍之令尚書桓彜大怒從班部中挺然而出指孫綝大罵曰今上乃聰明之主汝何敢出此亂言吾寧死不從賊臣之命綝大怒自拔劍斬之即入內指吳主孫亮罵曰無道昏君本當誅戮以謝天下看先帝之面廢汝為會稽王吾自選有德者立之叱中書郎李崇奪其璽綬令鄧程收之亮大哭而去後人有詩歎曰亂賊誣伊尹姦臣冒霍光可憐聰明主不得蒞朝堂孫綝遣宗正孫楷中書郎董朝往虎林迎請琅琊王孫休為君休字子烈乃孫權第六子也在虎林夜夢乘龍上天回顧不見龍尾失驚而覺次日孫楷董朝至拜請回都行至曲阿有一老人自稱姓幹名休叩頭言曰事久必變願殿下速行休謝之行至布塞亭孫恩將車駕來迎休不敢乘輦乃坐小車而入百官拜迎道傍休慌忙下車答禮孫綝出令扶起請入大殿升禦座即天子位休再三謙讓方受玉璽文官武將朝賀已畢大赦天下改元永安元年封孫綝為丞相荊州牧多官各有封賞又封兄之子孫皓為烏程侯孫綝一門五侯皆典禁兵權傾人主吳主孫休恐其內變陽示恩寵內實防之綝驕橫愈甚冬十二月綝奉牛酒入宮上壽吳主孫休不受綝怒乃以牛酒詣左將軍張布府中共飲酒酣乃謂布曰吾初廢會稽王時人皆勸吾為君吾為今上賢故立之今我上壽而見拒是將我等間相待吾早晚教你看布聞言唯唯而已次日布入宮密奏孫休休大懼日夜不安數日後孫綝遣中書郎孟宗撥與中營所管精兵一萬五千出屯武昌又盡將武庫內軍器與之於是將軍魏邈武衛士施朔二人密奏孫休曰綝調兵在外又搬盡武庫內軍器早晚必為變矣休大驚急召張布計議布奏曰老將丁奉計略過人能斷大事可與議之休乃召奉入內密告其事奉奏曰陛下無憂臣有一計為國除害休問何計奉曰來朝臘日只推大會群臣召綝赴席臣自有調遣休大喜奉同魏邈施朔掌外事張布為內應是夜狂風大作飛沙走石將老樹連根拔起天明風定使者奉旨來請孫綝入宮赴會孫綝方起床平地如人推倒心中不悅使者十余人簇擁入內家人止之曰一夜狂風不息今早又無故驚倒恐非吉兆不可赴會綝曰吾弟兄共典禁兵誰敢近身倘有變動於府中放火為號囑訖升車入內吳主孫休忙下禦座迎之請綝高坐酒行數巡衆驚曰宮外望有火起綝便欲起身休止之曰丞相穩便外兵自多何足懼哉言未畢左將軍張布拔劍在手引武士三十余人搶上殿來口中厲聲而言曰有詔擒反賊孫綝綝急欲走時早被武士擒下綝叩頭奏曰願徙交州歸田裏休叱曰爾何不徙滕胤呂據王惇耶命推下斬之於是張布牽孫綝下殿東斬訖從者皆不敢動布宣詔曰罪在孫綝一人餘皆不問衆心乃安布請孫休升五鳳樓丁奉魏邈施朔等擒孫綝兄弟至休命盡斬於市宗黨死者數百人滅其三族命軍士掘開孫峻墳墓戮其尸首將被害諸葛恪滕胤呂據王惇等家重建墳墓以表其忠其牽纍流遠者皆赦還鄉里丁奉等重加封賞馳書報入成都後主劉禪遣使回賀吳使薛珝答禮珝自蜀中歸吳主孫休問蜀中近日作何舉動珝奏曰近日中常侍黃皓用事公卿多阿附之入其朝不聞直言經其野民有菜色所謂燕雀處堂不知大廈之將焚者也休歎曰若諸葛武侯在此何至如此乎於是又寫國書教人齎入成都説司馬昭不日篡魏必將侵吳蜀以示威彼此各宜準備薑維聽得此信欣然上表再議出師伐魏時蜀漢景耀元年冬大將軍薑維以廖化張翼為先鋒王含蔣斌為左軍蔣舒傅僉為右軍胡濟為合後維與夏侯霸總中軍共起蜀兵二十萬拜辭後主徑到漢中與夏侯霸商議當先攻取何地霸曰祁山乃用武之地可以進兵故丞相昔日六出祁山因他處不可出也維從其言遂令三軍並望祁山進發至穀口下寨時鄧艾正在祁山寨中整點隴右之兵忽流星馬報到説蜀兵現下三寨于穀口艾聽知遂登高看了回寨升帳大喜曰不出吾之所料也原來鄧艾先度了地脈故留蜀兵下寨之地地中自祁山寨直至蜀寨早挖了地道待蜀兵至時於中取事此時薑維至穀口分作三寨地道正在左寨之中乃王含蔣斌下寨之處鄧艾喚子鄧忠與師纂各引一萬兵為左右衝擊卻喚副將鄭倫引五百掘子軍於當夜二更徑從地道直至左營於帳後地下擁出卻説王含蔣斌因立寨未定恐魏兵來劫寨不敢解甲而寢忽聞中軍大亂急綽兵器上的馬時寨外鄧忠引兵殺到內外夾攻王蔣二將奮死抵敵不住棄寨而走薑維在帳中聽得左寨中大喊料道有內應外合之兵遂急上馬立於中軍帳前傳令曰如有妄動者斬便有敵兵到營邊休要問他只管以弓弩射之一面傳示右營亦不許妄動果然魏兵十餘次衝擊皆被射回只衝殺到天明魏兵不敢殺入鄧艾收兵回寨乃歎曰薑維深得孔明之法兵在夜而不驚將聞變而不亂真將才也次日王含蔣斌收聚敗兵伏於大寨前請罪維曰非汝等之罪乃吾不明地脈之故也又撥軍馬令二將安營訖卻將傷死身尸填於地道之中以土掩之令人下戰書單搦鄧艾來日交鋒艾欣然應之次日兩軍列于祁山之前維按武侯八陳之法依天地風雲鳥蛇龍虎之形分布已定鄧艾出馬見維布成八卦乃亦布之左右前後門戶一般維持槍縱馬大叫曰汝效吾排八陳亦能變陳否艾笑曰汝道此陳只汝能布耶吾既會布陳豈不知變陳艾便勒馬入陳令執法官把旗左右招颭變成八八六十四個門戶復出陳前曰吾變法若何維曰雖然不差汝敢與吾八陳相圍麼艾曰有何不敢兩軍各依隊伍而進艾在中軍調遣兩軍衝突陳法不曾錯動薑維到中間把旗一招忽然變成長蛇卷地陳將鄧艾困在垓心四面喊聲大震艾不知其陳心中大驚蜀兵漸漸逼近艾引衆將衝突不出只聽得蜀兵齊叫曰鄧艾早降艾仰天長歎曰我一時自逞其能中薑維之計矣忽然西北角上一彪軍殺入艾見是魏兵遂乘勢殺出救鄧艾者乃司馬望也比及救出鄧艾時祁山九寨皆被蜀兵所奪艾引敗兵退于渭水南下寨艾謂望曰公何以知此陳法而救出我也望曰吾幼年遊學于荊南曾與崔州平石廣元為友講論此陳今日薑維所變者乃長蛇卷地陳也若他處擊之必不可破吾見其頭在西北故從西北擊之自破矣艾謝曰我雖學得陳法實不知變法公既知此法來日以此法復奪祁山寨柵如何望曰我之所學恐瞞不過薑維艾曰來日公在陳上與他鬥陳法我卻引一軍暗襲祁山之後兩下混戰可奪舊寨也於是令鄭倫為先鋒艾自引軍襲山後一面令人下戰書搦薑維來日鬥陳法維批回去訖乃謂衆將曰吾受武侯所傳密書此陳變法共三百六十五樣按周天之數今搦吾鬥陳法乃班門弄斧耳但中間必有詐謀公等知之乎廖化曰此必賺我鬥陳法卻引一軍襲我後也維笑曰正合我意即令張翼廖化引一萬兵去山後埋伏次日薑維盡拔九寨之兵分布于祁山之前司馬望引兵離了渭南徑到祁山之前出馬與薑維答話維曰汝請吾鬥陳法汝先布與吾看望布成了八卦維笑曰此即吾所布八陳之法也汝今盜襲何足為奇望曰汝亦竊他人之法耳維曰此陳凡有幾變望笑曰吾既能布豈不會變此陳有九九八十一變維笑曰汝試變來望入陳變了數番復出陳曰汝識吾變否維笑曰吾陳法按周天三百六十五變汝乃井底之蛙安知玄奧乎望自知有此變法實不曾學全乃勉強折辨曰吾不信汝試變來維曰汝教鄧艾出來吾當布與他看望曰鄧將軍自有良謀不好陳法維大笑曰有何良謀不過教汝賺吾在此布陳他卻引兵襲吾山後耳望大驚恰欲進兵混戰被維以鞭稍一指兩翼兵先出殺的那魏兵棄甲拋戈各逃性命卻説鄧艾催督先鋒鄭倫來襲山後倫剛轉過山角忽然一聲炮響鼓角喧天伏兵殺出為首大將乃廖化也二人未及答話兩馬交處被廖化一刀斬鄭倫于馬下鄧艾大驚急勒馬退時張翼引一軍殺到兩下夾攻魏兵大敗艾捨命突出身被四箭奔到渭南寨時司馬望亦到二人商議退兵之策望曰近日蜀主劉禪寵幸中貴黃皓日夜以酒色為樂可用反間計召回薑維此危可解艾問衆謀士曰誰可入蜀交通黃皓言未畢一人應聲曰某願往艾視之乃襄陽黨均也艾大喜即令黨均齎金珠寶物徑到成都結連黃皓布散流言説薑維怨望天子不久投魏於是成都人人所説皆同黃皓奏知後主即遣人星夜宣薑維入朝卻説薑維連日搦戰鄧艾堅守不出維心中甚疑忽使命至詔維入朝維不知何事只得班師回朝鄧艾司馬望知薑維中計遂拔渭南之兵隨後掩殺正是樂毅伐齊曹間阻嶽飛破敵被讒回未知勝負如何且看下文分解
