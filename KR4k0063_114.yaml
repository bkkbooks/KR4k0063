body:
  text: 第一百十四回曹髦驅車死南闕薑維棄糧勝魏兵卻説薑維傳令退兵廖化曰將在外君命有所不受今雖有詔未可動也張翼曰蜀人為大將軍連年動兵皆有怨望不如乘此得勝之時收回人馬以安民心再作良圖維曰善遂令各軍依法而退命廖化張翼斷後以防魏兵追襲卻説鄧艾引兵追趕只見前面蜀兵旗幟整齊人馬徐徐而退艾歎曰薑維深得武侯之法也因此不敢追趕勒軍回祁山寨去了且説薑維至成都入見後主問召回之故後主曰朕為卿在邊庭久不還師恐勞軍士故詔卿回朝別無他意維曰臣已得祁山之寨正欲收功不期半途而廢此必中鄧艾反間之計矣後主默然不語薑維又奏曰臣誓討賊以報國恩陛下休聽小人之言致生疑慮後主良久乃曰朕不疑卿卿且回漢中俟魏國有變再伐之可也薑維歎息出朝自投漢中去訖卻説黨均回到祁山寨中報知此事鄧艾與司馬望曰君臣不和必有內變就令黨均入洛陽報知司馬昭昭大喜便有圖蜀之心乃問中護軍賈充曰吾今伐蜀如何充曰未可伐也天子方疑主公若一旦輕出內難必作矣舊年黃龍兩見於寧陵井中群臣表賀以為祥端天子曰非祥瑞也龍者君象乃上不在天下不在田屈于井中是幽困之兆也遂作潛龍詩一首詩中之意明明道著主公其詩曰傷哉龍受困不能躍深淵上不飛天漢下不見於田蟠居於井底鰍鱔舞其前藏牙伏爪甲嗟我亦同然司馬昭聞之大怒謂賈充曰此人欲效曹芳也若不早圖彼必害我充曰某願為主公早晚圖之時魏甘露五年夏四月司馬昭帶劍上殿髦起迎之群臣皆奏曰大將軍功德巍巍合為晉公加九錫髦低頭不答昭厲聲曰吾父子兄弟三人有大功于魏今為晉公得毋不宜耶髦乃應曰敢不如命昭曰潛龍之詩視吾等如鰍鱔是何禮也髦不能答昭冷笑下殿衆官凜然髦歸後宮召侍中王沈尚書王經散騎常侍王業三人入內計議髦泣曰司馬昭將懷篡逆人所共知朕不能坐受廢辱卿等可助朕討之王經奏曰不可昔魯昭公不忍季氏敗走失國今重權已歸司馬氏久矣內外公卿不顧順逆之理阿附姦賊非一人也且陛下宿衛寡弱無用命之人陛下若不隱忍禍莫大焉且宜緩圖不可造次髦曰是可忍也孰不可忍也朕意已決便死何懼言訖即入告太后王沈王業謂王經曰事已急矣我等不可自取滅族之禍當往司馬公府下出首以免一死經大怒曰主憂臣辱主辱臣死敢懷二心乎王沈王業見經不從徑自往報司馬昭去了少頃魏主曹髦出內令護衛焦伯聚集殿中宿衛蒼頭官僮三百餘人鼓噪而出髦仗劍升輦叱左右徑出南闕王經伏於輦前大哭而諫曰今陛下領數百人伐昭是驅羊而入虎口耳空死無益臣非惜命實見事不可行也髦曰吾軍已行卿無阻當遂望雲龍門而來只見賈充戎服乘馬左有成倅右有成濟引數千鐵甲禁兵呐喊殺來髦仗劍大喝曰吾乃天子也汝等突入宮庭欲弒君耶禁兵見了曹髦皆不敢動賈充呼成濟曰司馬公養你何用正為今日之事也濟乃綽戟在手回顧充曰當殺耶當縛耶充曰司馬公有令只要死的成濟撚戟直奔輦前髦大喝曰匹夫敢無禮乎言未訖被成濟一戟刺中前胸撞出輦來再一戟刃從背上透出死於輦傍焦伯挺槍來迎被成濟一戟刺死衆皆逃走王經隨後趕來大罵賈充曰逆賊安敢弒君耶充大怒叱左右縛定報知司馬昭昭入內見髦已死乃佯作大驚之狀以頭撞輦而哭令人報知各大臣時太傅司馬孚入內見髦尸首枕其股而哭曰弒陛下者臣之罪也遂將髦尸用棺槨盛貯停於偏殿之西昭入殿中召群臣會議群臣皆至獨有尚書仆射陳泰不至昭令泰之舅尚書荀顗召之泰大哭曰論者以泰比舅今舅實不如泰也乃披麻帶孝而入哭拜於靈前昭亦佯哭而問曰今日之事何法處之泰曰獨斬賈充少可以謝天下耳昭沈吟良久又問曰再思其次泰曰惟有進於此者不知其次昭曰成濟大逆不道可剮之滅其三族濟大罵昭曰非我之罪是賈充傳汝之命昭令先割其舌濟至死叫屈不絶弟成倅亦斬於市盡滅三族後人有詩歎曰司馬當年命賈充弒君南闕赭袍紅卻將成濟誅三族只道軍民盡耳聾昭又使人收王經全家下獄王經正在廷尉廳下忽見縛其母至經叩頭大哭曰不孝子纍及慈母矣母大笑曰人誰不死正恐不得死所耳以此棄命何恨之有次日王經全家皆押赴東市王經母子含笑受刑滿城士庶無不垂淚後人有詩曰漢初誇伏劍漢末見王經真烈心無異堅剛志更清節如泰華重命似鴻毛輕母子聲名在應同天地傾傅司馬孚請以王禮葬曹髦昭許之賈充等勸司馬昭受魏禪即天子位昭曰昔文王三分天下有其二以服事殷故聖人稱為至德魏武帝不肯受禪於漢猶吾之不肯受禪于魏也賈充等聞言已知司馬昭留意于子司馬炎矣遂不復勸進是年六月司馬昭立常道鄉公曹璜為帝改元景元元年璜改名曹奐字景明乃武帝曹操之孫燕王曹宇之子也奐封昭為相國晉公賜錢十萬絹萬匹其文武多官各有封賞早有細作報入蜀中薑維聞司馬昭弒了曹髦立了曹奐喜曰吾今日伐魏又有名矣遂發書入吳令起兵問司馬昭弒君之罪一面奏準後主起兵十五萬車乘數千輛皆置板箱於上令廖化張翼為先鋒化取子午穀翼取駱穀維自取斜穀皆要出祁山之前取齊三路兵並起殺奔祁山而來時鄧艾在祁山寨中訓練人馬聞報蜀兵三路殺到乃聚諸將計議參軍王瓘曰吾有一計不可明言現寫在此謹呈將軍台覽艾接來展看畢笑曰此計雖妙只怕瞞不過薑維瓘曰某願捨命前去艾曰公志若堅必能成功遂撥五千兵與瓘瓘連夜從斜穀迎來正撞蜀兵前隊哨馬瓘叫曰我是魏國降兵可報與主帥哨軍報知薑維維令攔住餘兵只教為首的將來見瓘拜伏於地曰某乃王經之侄王瓘也近見司馬昭弒君將叔父一門皆戮某痛恨入骨今幸將軍興師問罪故特引本部兵五千來降願從調遣剿除姦黨以報叔父之恨維大喜謂瓘曰汝既誠心來降吾豈不誠心相待吾軍中所患者不過糧耳今有糧車數千現在川口汝可運赴祁山吾只今去取祁山寨也瓘心中大喜以為中計欣然領諾薑維曰汝去運糧不必用五千人但引三千人去留下二千人引路以打祁山瓘恐維疑惑乃引三千兵去了維令傅僉引二千魏兵隨征聽用忽報夏侯霸到霸曰都督何故準信王瓘之言也吾在魏雖不知備細未聞王瓘是王經之侄其中多詐請將軍察之維大笑曰我已知王瓘之詐故分其兵勢將計就計而行霸曰公試言之維曰司馬昭姦雄比于曹操既殺王經滅其三族安肯存親侄于關外領兵故知其詐也仲權之見與我暗合於是薑維不出斜穀卻令人于路暗伏以防王瓘姦細不旬日果然伏兵捉得王瓘回報鄧艾下書人來見維問了情節搜出私書書中約於八月二十日從小路運糧送歸大寨卻教鄧艾遣兵於壇山谷中接應維將下書人殺了卻將書中之意改作八月十五日約鄧艾自率大兵於壇山谷中接應一面令人扮作魏軍往魏營下書下面令人將現有糧車數百輛卸了糧米裝載乾柴茅草引火之物用青布置之令傅僉引二千原降魏兵執打運糧旗號維卻與夏侯霸各引一軍去山谷中埋伏令蔣舒出斜谷廖化張翼俱各進兵來取祁山卻説鄧艾得了王瓘書信大喜急寫回書令來人回報至八月十五日鄧艾引五萬精兵徑往壇山谷中來遠遠使人憑高眺探只見無數糧車接連不斷從山凹中而行艾勒馬望之果然皆是魏兵左右曰天已昏暮可速接應王瓘出穀口艾曰前面山勢掩映倘有伏兵急難退步只可在此等候正言間忽兩騎馬驟至報曰王將軍因將糧草過界背後人馬趕來望早救應艾大驚急催兵前進時值初更月明如晝只聽得山後呐喊艾只道王瓘在山後廝殺徑奔過山後時忽樹林後一彪軍撞出為首蜀將傅僉縱馬大叫曰鄧艾匹夫已中吾主將之計何不早早下馬受死艾大驚勒回馬便走車上火盡著那火便是號火兩勢下蜀兵盡出殺得魏兵七斷八續但聞四下山上只叫拿住鄧艾的賞千金封萬戶侯唬得鄧艾棄甲丟盔撇了坐下馬雜在步軍之中爬山越嶺而逃薑維夏侯霸只望馬上為首的徑來擒捉不想鄧艾步行走脫維領得勝兵去接王瓘糧車卻説王瓘密約鄧艾先期將糧草車仗整備停當專候舉事忽有心腹人報事已泄漏鄧將軍大敗不知性命如何瓘大驚令人哨探回報三路兵圍殺將來背後又見塵頭大起四下無路瓘叱左右令放火盡燒糧草車輛一霎時火光突起烈火燒空瓘大叫曰事已急矣汝等宜死戰乃提兵望西殺出背後薑維三路追趕維只道王瓘捨命撞回魏國不想反殺入漢中而去瓘因兵少只恐追兵趕上遂將棧道並各關隘盡皆燒毀薑維恐漢中有失遂不追鄧艾提兵連夜抄小路來追殺王瓘瓘被四面蜀兵攻擊投黑龍江而死餘兵盡被薑維坑之維雖然勝了鄧艾卻折了許多糧車又毀了棧道乃引兵還漢中鄧艾引部下敗兵逃回祁山寨內上表請罪自貶其職司馬昭見艾數有大功不忍貶之復加厚賜艾將原賜財物盡分給被害將士之家昭恐蜀兵又出遂添兵五萬與艾守禦薑維連夜修了棧道又議出師正是連修棧道兵連出不伐中原死不休未知勝負如何且看下文分解
