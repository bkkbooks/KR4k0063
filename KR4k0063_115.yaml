body:
  text: 第一百十五回詔班師後主信讒托屯田薑維避禍卻説蜀漢景耀五年冬十月大將軍薑維差人連夜修了棧道整頓軍糧兵器又於漢中水路調撥船隻俱已完備上表奏後主曰臣纍出戰雖未成大功已挫動魏人心膽今養兵日久不戰則懶懶則致病況今軍思效死將思用命臣如不勝當受死罪後主覽表猶豫未決譙周出班奏曰臣夜觀天文見西蜀分野將星暗而不明今大將軍又欲出師此行甚是不利陛下可降詔止之後主曰且看此行若何果然有失卻當阻之譙周再三苦諫不從乃歸家歎息不已遂推病不出卻説薑維臨興兵乃問廖化曰吾今出師誓欲恢復中原當先取何處化曰連年征伐軍民不寧兼魏有鄧艾足智多謀非等間之輩將軍強欲行難為之事此化所以未敢專也維勃然大怒曰昔丞相六出祁山亦為國也吾今八次伐魏豈為一己之私哉今當先取洮陽如有逆吾者立斬遂留廖化守漢中自同諸將提兵三十萬徑取洮陽而來早有川口人報入祁山寨中時鄧艾正與司馬望談兵聞知此信遂令人哨探回報蜀兵盡從洮陽而出司馬望曰薑維多計莫非虛取洮陽而實來取祁山乎鄧艾曰今薑維實出洮陽也望曰公何以知之艾曰向者薑維纍出吾有糧之地今洮陽無糧維必料吾只守祁山不守洮陽故徑取洮陽如得此城屯糧積草結連羌人以圖久計耳望曰若此如之奈何艾曰可盡撤此處之兵分為兩路去救洮陽離洮陽二十五裏有侯河小城乃洮陽咽喉之地公引一軍伏于洮陽偃旗息鼓大開西門如此如此而行我卻引一軍伏侯河必獲大勝也籌畫已定各各依計而行只留偏將師纂守祁山寨卻説薑維令夏侯霸為前部先引一軍徑取洮陽霸提兵前進將近洮陽望見城上並無一杆旌旗四門大開霸心下疑惑未敢入城回顧諸將曰莫非詐乎諸將曰眼見得是空城只有些小百姓聽知大將軍兵到盡棄城而走了霸未信自縱馬于城南視之只見城後老小無數皆望西北而逃霸大喜曰果空城也遂當先殺入餘衆隨後而進方到甕城邊忽然一聲炮響城上鼓角齊鳴旌旗遍豎拽起吊橋霸大驚曰誤中計矣慌欲退時城上矢石如雨可憐夏侯霸同五百軍皆死於城下後人有詩歎曰大膽薑維妙算長誰知鄧艾暗提防可憐投漢夏侯霸頃刻城邊箭下亡司馬望從城內殺出蜀兵大敗而逃隨後薑維引接應兵到殺退司馬望就傍城下寨維聞夏侯霸射死嗟傷不已是夜二更鄧艾自侯河城內暗引一軍潛地殺入蜀寨蜀兵大亂薑維禁止不住城上鼓角喧天司馬望引兵殺出兩下夾攻蜀兵大敗維左沖右突死戰得脫退二十餘裏下寨蜀兵兩番敗走之後心中搖動維與衆將曰勝敗乃兵家之常今雖損兵折將不足為憂成敗之事在此一舉汝等始終勿改如有言退者立斬張翼進言曰魏兵皆在此處祁山必然空虛將軍整兵與鄧艾交鋒攻打洮陽侯河某引一軍取祁山取了祁山九寨便驅兵向長安此為上計維從之即令張翼引後軍徑取祁山維自引兵到侯河搦鄧艾交戰艾引軍出迎兩軍對圓二人交鋒數十餘合不分勝負各收兵回寨次日薑維又引兵挑戰鄧艾按兵不出薑維令軍辱罵鄧艾尋思曰蜀人被吾大殺一陳全然不退連日反來搦戰必分兵去襲祁山寨也守寨將師纂兵少智寡必然敗矣吾當親往救之乃喚子鄧忠分付曰汝用心守把此處任他搦戰卻勿輕出吾今夜引兵去祁山救應是夜二更薑維正在寨中設計忽聽得寨外喊聲震地鼓角喧天人報鄧艾引三千精兵夜戰諸將欲出維止之曰勿得妄動原來鄧艾引兵至蜀寨前哨探了一遍乘勢去救祁山鄧忠自入城去了薑維喚諸將曰鄧艾虛作夜戰之勢必然去救祁山寨矣乃喚傅僉分付曰汝守此寨勿輕與敵囑畢維自引三千兵來助張翼卻説張翼正到祁山攻打守寨將師纂兵少支援不住看看待破忽然鄧艾兵至衝殺了一陳蜀兵大敗把張翼隔在山後絶了歸路正慌急之間忽聽的喊聲大震鼓角喧天只見魏兵紛紛倒退左右報曰大將軍薑伯約殺到翼乘勢驅兵相應兩下夾攻鄧艾折了一陳急退上祁山寨不出薑維令兵四面攻圍話分兩頭卻説後主在成都聽信宦官黃皓之言又溺於酒色不理朝政時有大臣劉琰妻胡氏極有顔色因入宮朝見皇后後留在宮中一月方出琰疑其妻與後主私通乃喚帳下軍士五百人列於前將妻綁縛令軍以履撻其面數十幾死復蘇後主聞之大怒令有司議劉琰罪有司議得卒非撻妻之人面非受刑之地合當棄市遂斬劉琰自此命婦不許入朝然一時官僚以後主荒淫多有疑怨者於是賢人漸退小人日進時右將軍閻宇身無寸功只因阿附黃皓遂得重爵聞薑維統兵在祁山乃説皓奏後主曰薑維屢戰無功可命閻宇代之後主從其言遣使齎詔召回薑維維正在祁山攻打寨柵忽一日三道詔至宣維班師維只得遵命先令洮陽兵退次後與張翼徐徐而退鄧艾在寨中只聽得一夜鼓角喧天不知何意至平明人報蜀兵盡退止留空寨艾疑有計不敢追襲薑維徑到漢中歇住人馬自與使命入成都見後主後主一連十日不朝維心中疑惑是日至東華門遇見祕書郎郤正維問曰天子召維班師公知其故否正笑曰大將軍何尚不知黃皓欲使閻宇立功奏聞朝廷發詔取回將軍今聞鄧艾善能用兵因此寢其事矣維大怒曰我必殺此宦豎郤正止之曰大將軍繼武侯之事任大職重豈可造次倘若天子不容反為不美矣維謝曰先生之言是也次日後主與黃皓在後園宴飲維引數人徑入早有人報知黃皓皓急避於湖山之側維至亭下拜了後主泣奏曰臣困鄧艾于祁山陛下連降三詔召臣回朝未審聖意為何後主默然不語維又奏曰黃皓姦巧專權乃靈帝時十常侍也陛下近則鑒於張讓遠則鑒於趙高早殺此人朝廷自然清平中原方可恢復後主笑曰黃皓乃趨走小臣縱使專權亦無能為昔者董允每切齒恨皓朕甚怪之卿何必介意維叩頭奏曰陛下今日不殺黃皓禍不遠也後主曰愛之欲其生惡之欲其死卿何不容一宦官耶令近侍於湖山之側喚出黃皓至亭下命拜薑維伏罪皓哭拜維曰某早晚趨侍聖上而已並不幹與國政將軍休聽外人之言欲殺某也某命系于將軍惟將軍憐之言罷叩頭流涕維忿忿而出即往見郤正備將此事告之正曰將軍禍不遠矣將軍若危國家隨滅維曰先生幸教我以保國安身之策正曰隴西有一去處名曰遝中此地極其肥壯將軍何不效武侯屯田之事奏知天子前去遝中屯田一者得麥熟以助軍實二者可以盡圖隴右諸郡三者魏人不敢正視漢中四者將軍在外掌握兵權人不能圖可以避禍此乃保國安身之策也宜早行之維大喜謝曰先生金玉之言也次日薑維表奏後主求遝中屯田效武侯之事後主從之維遂還漢中聚諸將曰某纍出師因糧不足未能成功今吾提兵八萬往遝中種麥屯田徐圖進取汝等久戰勞苦今且斂兵聚穀退守漢中魏兵千里運糧經涉山嶺自然疲乏疲乏必退那時乘虛追襲無不勝矣遂令胡濟守漢壽城王含守樂城蔣斌守漢城蔣舒傅僉同守關隘分撥已畢維自引兵八萬來遝中種麥以為久計卻説鄧艾聞薑維在遝中屯田于路下四十余營連絡不絶如長蛇之勢艾遂令細作相了地形畫成圖本具表申奏晉公司馬昭見之大怒曰薑維屢犯中原不能剿除是吾心腹之患也賈充曰薑維深得孔明傳授急難退之須得一智勇之將往刺殺之可免動兵之勞從事中郎荀顗曰不然今蜀主劉禪溺于酒色信用黃皓大臣皆有避禍之心薑維在遝中屯田正避禍之計也若令大將伐之無有不勝何必用刺客乎昭大笑曰此言最善吾欲伐蜀誰可為將荀顗曰鄧艾乃世之良材更得鍾會為副將大事成矣昭大喜曰此言正合吾意乃召鍾會入而問曰吾欲令汝為大將去伐東吳可乎會曰主公之意本不欲伐吳實欲伐蜀也昭大笑曰子誠識吾心也但卿往伐蜀當用何策會曰某料主公欲伐蜀已畫圖本在此昭展開視之圖中細載一路安營下寨屯糧積草之處從何而進從何而退一一皆有法度昭看了大喜曰真良將也卿與鄧艾合兵取蜀何如會曰蜀川道廣非一路可進當使鄧艾分兵各進可也昭遂拜鍾會為鎮西將軍假節鉞都督關中人馬調遣青徐兗豫荊揚等處一面差人持節令鄧艾為征西將軍都督關外隴上使約期伐蜀次日司馬昭於朝中計議此事前將軍鄧敦曰薑維屢犯中原我兵折傷甚多只今守禦尚自未保奈何深入山川危險之地自取禍亂耶昭怒曰吾欲興仁義之師伐無道之主汝安敢逆吾意叱武士推出斬之須臾呈鄧敦首級於階下衆皆失色昭曰吾自征東以來息歇六年治兵繕甲皆已完備欲伐吳蜀久矣今先定西蜀乘順流之勢水陸並進併吞東吳此滅虢取虞之道也吾料西蜀將士守成都者八九萬守邊境者不過四五萬薑維屯田者不過六七萬今吾已令鄧艾引關外隴右之兵十余萬絆住薑維於遝中使不得東顧遣鍾會引關中精兵二三十萬直抵駱谷三路以襲漢中蜀主劉禪昏暗邊城外破士女內震其亡可必矣衆皆拜服卻説鍾會受了鎮西將軍之印起兵伐蜀會恐機謀或泄卻以伐吳為名令青兗豫荊揚等五處各造大船又遣唐咨於登萊等州傍海之處拘集海船司馬昭不知其意遂召鍾會問之曰子從旱路收川何用造船耶會曰蜀若聞我兵大進必求救于東吳也故先布聲勢作伐吳之狀吳必不敢妄動一年之內蜀已破船已成而伐吳豈不順乎昭大喜選日出師時魏景元四年秋七月初三日鍾會出師司馬昭送之於城外十裏方回西曹掾邵悌密謂司馬昭曰今主公遣鍾會領十萬兵伐蜀愚料會志大心高不可使獨掌大權昭笑曰吾豈不知之悌曰主公既知何不使人同領其職昭言無數語使邵悌疑心頓釋正是方當士馬驅馳日早識將軍跋扈心未知其言若何且看下文分解
