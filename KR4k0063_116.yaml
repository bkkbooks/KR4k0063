body:
  text: 第一百十六回鍾會分兵漢中道武侯顯聖定軍山卻説司馬昭謂西曹掾邵悌曰朝臣皆言蜀未可伐是其心怯若使強戰必敗之道也今鍾會獨建伐蜀之策是其心不怯心不怯則破蜀必矣蜀既破則蜀人心膽已裂敗軍之將不可以言勇亡國之大夫不可以圖存會即有異志蜀人安能助之乎至若魏人得勝思歸必不從會而反更不足慮耳此言乃吾與汝知之切不可泄漏邵悌拜服卻説鍾會下寨已畢升帳大集諸將聽令時有監軍衛瓘護軍胡烈大將田續龐會田章爰青彡丘建夏侯咸王買皇甫闓句安等八十餘員會曰必須一大將為先鋒逢山開路遇水疊橋誰敢當之一人應聲曰某願往會視之乃虎將許褚之子許儀也衆皆曰非此人不可為先鋒會喚許儀曰汝乃虎體猿班之將父子有名今衆將亦皆保汝汝可挂先鋒印領五千馬軍一千步軍徑取漢中兵分三路汝領中路出斜穀左軍出駱穀右軍出子午穀此皆崎嶇山險之地當令軍填平道路修理橋梁鑿山破石勿使阻礙如違必按軍法許儀受命領兵而進鍾會隨後提十萬余衆星夜起程卻説鄧艾在隴西既受伐蜀之詔一面令司馬望往遏羌人又遣雍州刺史諸葛緒天水太守王頎隴西太守牽弘金城太守楊欣各調本部兵前來聽令比及軍馬雲集鄧艾夜作一夢夢見登高山望漢中忽於腳下迸出一泉水勢上湧須臾驚覺渾身汗流遂坐而待旦乃召護衛爰邵問之邵素明周易艾備言其夢邵答曰易雲山上有水曰蹇蹇卦者利西南不利東北孔子雲蹇利西南往有功也不利東北其道窮也將軍此行必然克蜀但可惜蹇滯不能還艾聞言愀然不樂忽鍾會檄至約艾起兵於漢中取齊艾遂遣雍州刺史諸葛緒引兵一萬五千先斷薑維歸路次遣天水太守王頎引兵一萬五千從左攻遝中隴西太守牽弘引一萬五千人從右攻遝中又遣金城太守楊欣引一萬五千人于甘松邀薑維之後艾自引兵三萬往來接應卻説鍾會出師之時有百官送出城外旌旗蔽日鎧甲疑霜人強馬壯威風凜然人皆稱羡惟有相國參軍劉實微笑不語太尉王祥見實冷笑就馬上握其手而問曰鍾鄧二人此去可平蜀乎實曰破蜀必矣但恐皆不得還都耳王祥問其故劉實但笑而不答祥遂不復問卻説魏兵既發早有細作入遝中報知薑維維即具表申奏後主請降詔遣左車騎將軍張翼領兵守護陽安關右車騎將軍廖化領兵守陰平橋這二處最為要緊若失二處漢中不保矣一面當遣使入吳求救臣一面自起遝中之兵拒敵時後主改景耀六年為炎興元年日與宦官黃皓在宮中遊樂忽接薑維之表即召黃皓問曰今魏國遣鍾會鄧艾大起人馬分道而來如之奈何皓奏曰此乃薑維欲立功名故上此表陛下寬心勿生疑慮臣聞城中有一師婆供奉一神能知吉凶可召來問之後主從其言於後殿陳設香花紙燭享祭禮物令黃皓用小車請入宮中坐于龍床之上後主焚香祝畢師婆忽然披發跣足就殿上跳躍數十遍盤旋於案上皓曰此神人降矣陛下可退左右親禱之後主盡退侍臣再拜祝之師婆大叫曰吾乃西川土神也陛下欣樂太平何為求問他事數年之後魏國疆土亦歸陛下矣陛下切勿憂慮言訖昏倒於地半晌方蘇後主大喜重加賞賜自此深信師婆之説遂不聽薑維之言每日只在宮中飲宴歡樂薑維纍申告急表文皆被黃皓隱匿因此誤了大事卻説鍾會大軍迤邐望漢中進發前軍先鋒許議要立頭功先領兵至南鄭關儀謂部將曰過此關即漢中矣關上不多人馬我等便可奮力搶關衆將領命一齊並力向前原來守關蜀將盧遜早知魏兵將到先于關前木橋左右伏下軍士裝起武侯所遺十矢連弩比及許議兵來搶關時一聲梆子響處矢石如雨儀急退時早射倒數十騎魏兵大敗儀回報鍾會會自提帳下甲士百餘騎來看果然箭弩一齊射下會撥馬便回關上盧遜引五百軍殺下來會拍馬過橋橋上土塌陷住馬蹄爭些兒掀下馬來馬掙不起會棄馬步行跑下橋時盧遜趕上一槍刺來卻被魏兵中荀愷回身一箭射盧遜落馬鍾會麾衆乘勢搶關關上軍士因有蜀兵在關前不敢放箭被鍾會殺散奪了山關即以荀愷為護軍以全副鞍馬鎧甲賜之會喚許議至帳下責之曰汝為先鋒理合逢山開路遇水疊橋專一修理橋梁道路以便行軍吾方才到橋上陷住馬蹄幾乎墮橋若非荀愷吾已被殺矣汝既違軍令當按軍法叱左右推出斬之諸將告曰其父許褚有功于朝廷望都督恕之會怒曰軍法不明何以令衆遂令斬首示衆諸將無不駭然時蜀將王含守樂城蔣斌守漢城見魏兵勢大不敢出戰只閉門自守鍾會下令曰兵貴神速不可少停乃令前軍李輔圍樂城護軍葛愷圍漢城自引大軍取陽安關守關蜀將傅僉與副將蔣舒商議戰守之策舒曰魏兵甚衆勢不可當不如堅守為上僉曰不然魏兵遠來必然疲困雖多不足懼我等若不下關戰時漢樂二城休矣蔣舒默然不答忽報魏兵大隊已至關前蔣傅二人至關上視之鍾會揚鞭大叫曰吾今統十萬之衆到此如早早出降各依品級升用如執迷不降打破關隘玉石俱焚傅僉大怒令蔣舒把關自引三千兵殺下關來鍾會便走魏兵盡退僉乘勢追之魏兵復合僉欲退入關時關上已豎起魏家旗號只見蔣舒叫曰吾已降了魏也僉大怒厲聲罵曰忘恩背義之賊有何面目見天下人乎撥回馬復與魏兵接戰魏兵四面合來將傅僉圍在垓心僉左沖右突往來死戰不能得脫所領蜀兵十傷八九僉乃仰天歎曰吾生為蜀臣死亦當為蜀鬼乃復拍馬衝殺身被數槍血盈袍鎧坐下馬倒僉自刎而死後人有詩歎曰一日抒忠憤千秋仰義名寧為傅僉死不作蔣舒生鍾會得了陽安關關內所積糧草軍器極多大喜遂犒三軍是夜魏兵宿于陽安城中忽聞西南上喊聲大震鍾會慌忙出帳視之絶無動靜魏軍一夜不敢睡次夜三更西南上喊聲又起鍾會驚疑向曉使人探之回報曰遠哨十餘裏並無一人會驚疑不定乃自引數百騎俱全裝慣帶望西南巡哨前至一山只殺氣四面突起愁雲布合霧鎖山頭會勒住馬問向導官曰此何山也答曰此乃定軍山昔日夏侯淵歿於此處會聞之悵然不樂遂勒馬而回轉過山坡忽然狂風大作背後數千騎突出隨風殺來會大驚引衆縱馬而走諸將墜馬者不計其數及奔到陽安關時不曾折一人一騎只跌損面目失了頭盔皆言曰但見陰雲中人馬殺來比及近身卻不傷人只是一陳旋風而已會問降將蔣舒曰定軍山有神廟乎舒曰並無神廟惟有諸葛武侯之墓會驚曰此必武侯顯聖也吾當親往祭之次日鍾會備祭禮宰太牢自到武侯墓前再拜致祭祭畢狂風頓息愁雲四散忽然清風習習細雨紛紛一陳過後天色晴朗魏兵大喜皆拜謝回營是夜鍾會在帳中伏幾而寢忽然一陳清風過處只一人綸巾羽扇身衣鶴氅素履皂縧面如冠玉辱若抹朱眉清目朗身長八尺飄飄然有神仙之概其人步入帳中會起身迎之曰公何人也其人曰今早重承見顧吾有片言相告雖漢祚已衰天命難違然兩川生靈橫罹兵革誠可憐憫汝入境之後萬勿妄殺生靈言訖拂袖而去會欲挽留之忽然驚醒乃是一夢會知是武侯之靈不勝驚異於是傳令前軍立一白旗上書保國安民四字所到之處如妄殺一人者償命於是漢中人民盡皆出城拜迎會一一撫慰秋毫無犯後人有詩贊曰數萬陰兵繞定軍致令鍾會拜靈神生能決策扶劉氏死尚遺言保蜀民卻説薑維在遝中聽知魏兵大至傳檄廖化張翼董厥提兵接應一面自分兵列將以待之忽報魏兵至維引兵迎之魏陳中為首大將乃天水太守王頎也頎出馬大呼曰吾今大兵百萬上將千員分二十路而進已到成都汝不思早降猶欲抗拒何不知天命耶維大怒挺槍縱馬直取王頎戰不三合頎大敗而走薑維驅兵追殺至二十裏只聽得金鼓齊鳴一枝兵擺開旗上大書隴西太守牽弘字樣維笑曰此等鼠輩非吾敵手遂催兵追之又趕到十裏卻遇鄧艾領兵殺到兩軍混戰維抖擻精神與艾戰有十餘合不分勝負後面鑼鼓又鳴維急退時後軍報説甘松諸寨盡被金城太守楊欣燒毀了維大驚急令副將虛立旗號與鄧艾相拒維自撤後軍星夜來救甘松正遇楊欣欣不敢交戰望山路而走維隨後趕來將至山岩下岩上木石如雨維不能前進比及回到半路蜀兵已被鄧艾殺敗魏兵大隊而來將薑維圍住維引衆騎殺出重圍奔入大寨堅守以待救兵忽然流星馬到報説鍾會打破陽安關守將蔣舒歸降傅僉戰死漢中已屬魏矣樂城守將王含漢志守將蔣斌知漢中已失亦開門而降胡濟抵敵不住逃回成都求援去了維大驚即傳令拔寨是夜兵至疆川口前面一軍擺開為首魏將乃是金城太守楊欣維大怒縱馬交鋒只一合楊欣敗走維拈弓射之連射三箭皆不中維轉怒自折其弓挺槍趕來戰馬前失將維跌在地上楊欣撥回馬來殺薑維維躍起身一槍刺去正中楊欣馬腦背後魏兵驟至救欣去了維騎上從馬欲待追時忽報後面鄧艾兵到維首尾不能相顧遂收兵要奪漢中哨馬報説雍州刺史諸葛緒已斷了歸路維乃據山險下寨魏兵屯于陰平橋頭維進退無路長歎曰天喪我也副將寧隨曰魏兵雖斷陰平橋頭雍州必然兵少將軍若從孔函穀徑取雍州諸葛緒必撤陰平之兵救雍州將軍卻引兵奔劍閣守之則漢中可復矣維從之即發兵入孔函穀詐取雍州細作報知諸葛緒緒大驚曰雍州是吾合守之地倘有疏失朝廷必然問罪急撤大兵從南路去救雍州只留一枝兵守橋頭薑維入北道約行三十裏料知魏兵起行乃勒回兵後隊作前隊徑到橋頭果然魏兵大隊已去只有些小兵把橋被維一陳殺散盡燒其寨柵諸葛緒聽知橋頭火起復引兵回薑維兵已過半日了因此不敢追趕卻説薑維引兵過了橋頭正行之間前面一軍來到乃左將軍張翼右將軍廖化也維問之翼曰黃皓聽信師巫之言不肯發兵翼聞漢中已危自起兵來時陽安關已被鍾會所取今聞將軍受困特來接應遂合兵一處前赴白水關化曰今四面受敵糧道不通不如退守劍閣再作良圖維疑慮未決忽報鍾會鄧艾分兵十余路殺來維欲與翼化分兵迎之化曰白水地狹路多非爭戰之所不如且退去救劍閣可也若劍閣一失是絶路矣維從之遂引兵來投劍閣將近關前忽然鼓角齊鳴喊聲大起旌旗遍豎一枝軍把住關口正是漢中險峻已無有劍閣風波又忽生未知何處之兵且看下文分解
