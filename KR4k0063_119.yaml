body:
  text: 第一百十九回假投降巧計成虛話再受禪依樣畫葫蘆卻説鍾會請薑維計議收鄧艾之策維曰可先令監軍衛瓘收艾艾若殺瓘反情實矣將軍卻起兵討之可也會大喜遂令衛瓘引數十人入成都收鄧艾父子瓘手下人止之曰此是鍾司徒令鄧征西殺將軍以正反情也切不可行瓘曰吾自有計遂先發檄文二三十道其檄曰奉詔收艾其餘各無所問若早來歸爵賞如先敢有不出者滅三族隨備檻車兩乘星夜望成都而來比及雞鳴艾部將見檄文者皆來投拜于衛瓘馬前時鄧艾在府中未起瓘引數十人突入大呼曰奉詔收鄧艾父子艾大驚滾下床來瓘叱武士縛于車上其子鄧忠出問亦被捉下縛于車上府中將吏大驚欲待動手搶奪早望見塵頭大起哨馬報説鍾司徒大兵到了衆各四散奔走鍾會與薑維下馬入府見鄧艾父子已被縛會以鞭撻鄧艾之首而罵曰養犢小兒何敢如此薑維亦罵曰匹夫行險徼幸亦有今日耶艾亦大罵會將艾父子送赴洛陽會入成都盡得鄧艾軍馬威聲大震乃謂薑維曰吾今日方趁平生之願矣維曰昔韓信不聽蒯通之説而有未央宮之禍大夫種不從范蠡於五湖卒伏劍而死斯二子者其功名豈不赫然哉徙以利害未明而見機不早也今公大勳已就威震其主何不泛舟絶迹登峨嵋之嶺而從赤松子遊乎會笑曰君言差矣吾年未四旬方思進取豈能便效此退間之事維曰若不退間當早圖良策此則明公智力所能無煩老夫之言矣會撫掌大笑曰伯約知吾心也二人自此每日商議大事維密與後主書曰望陛下忍數日之辱維將使社稷危而復安日月幽而復明必不使漢室終滅也卻説鍾會正與薑維謀反所報司馬昭有書到會接書書中言吾恐司徒收艾不下自屯兵于長安相見在近以此先報會大驚曰吾兵多艾數倍若但要我擒艾晉公知吾獨能辦之今日自引兵來是疑我也遂與薑維計議維曰君疑臣則臣必死豈不見鄧艾乎會曰吾意決矣事成則得天下不成則退西蜀亦不失作劉備也維曰近聞郭太后新亡可詐稱太后有遺詔教討司馬昭以正弒君之罪據明公之才中原可席捲而定會曰伯約當作先鋒成事之後同享富貴維曰願效犬馬微勞但恐諸將不服耳會曰來日元宵佳節于故宮大張燈水請諸將飲宴如不從者盡殺之維暗喜次日會維二人請諸將飲宴數巡後會執杯大哭諸將驚問其故會曰郭太后臨崩有遺詔在此為司馬昭南闕弒君大逆無道早晚將篡魏命吾討之汝等各自僉名共成此事衆皆大驚面面相覷會拔劍出鞘曰違令者斬衆皆恐懼只得相從畫字已畢會乃困諸將于宮中嚴兵禁守維曰我見諸將不服請坑之會曰吾已令宮中掘一坑置大棒數千如不從者打死坑之時有心腹將丘建在側建乃護軍胡烈部下舊人也時胡烈亦被監在宮建乃密將鍾會所言報知胡烈烈大驚泣告曰吾兒胡淵領兵在外安知會懷此心耶汝可念向日之情透一消息雖死無恨建曰恩主勿憂容某圖之遂出告會曰主公軟監諸將在內水食不便可令一人往來傳遞會素聽丘建之言遂令丘建監臨會分付曰吾以重事托汝休得泄漏建曰主公放心某自有緊嚴之法建暗令胡烈親信人入內烈以密書付其人其人持書火速至胡淵營內細言其事呈上密書淵大驚遂遍示諸營知之衆將大怒急來淵營商議曰我等雖死豈肯從反臣耶淵曰正月十八日中可驟入內如此行之監軍衛瓘深喜胡淵之謀即整頓了人馬令丘建傳與胡烈烈報知諸將卻説鍾會請薑維問曰吾夜夢大蛇數千條咬吾主何吉凶維曰夢龍蛇者畢吉慶之兆也會喜信其言乃謂維曰器仗已備放諸將出問之若何維曰此輩皆有不服之心久必為害不如乘早戮之會從之即命薑維領武士往殺衆魏將維領命方欲行動忽然一陳心疼昏倒在地左右扶起半晌方蘇忽報宮外人聲沸騰會方令人探時喊聲大震四面八方無限兵到維曰此必是諸將作惡可先斬之忽報兵已入內會令閉上殿門使軍士上殿屋以瓦擊之互相殺死數十人宮外四面火起外兵砍開殿門殺入會自掣劍立殺數人卻被亂箭射倒衆將梟其首維拔劍上殿往來衝突不幸心疼轉加維仰天大叫曰吾計不成乃天命也遂自刎而死時年五十九歲宮中死者數百人衛瓘曰衆軍各歸營所以待王命魏兵爭欲報仇共剖維腹其膽大如雞卵衆將又盡取薑維家屬殺之鄧艾部下之人見鍾會薑維已死遂連夜去追劫鄧艾早有人報知衛瓘瓘曰是我捉艾今若留他我無葬身之地矣護軍田續曰昔鄧艾取江油之時欲殺續得衆官告免今日當報此恨瓘大喜遂遣田續引五百兵趕至綿竹正遇鄧艾父子放出檻車欲還成都艾只道是本部兵到不作準備欲待問時被田續一刀斬之鄧忠亦死於亂軍之中後人有詩歎鄧艾曰自幼能籌畫多謀善用兵凝眸知地理仰面識天文馬到山根斷兵來石徑分功成身被害魂繞漢江雲又有詩歎鍾會曰髫年稱早慧曾作祕書郎妙計傾司馬當時號子房壽春多贊畫劍閣顯鷹揚不學陶朱隱遊魂悲故鄉又有詩歎薑維曰水誇英俊涼州産異才系從尚父出術奉武侯來大膽應無懼雄心誓不回成都身死日漢將有餘哀卻説薑維鍾會鄧艾已死張翼等亦死於亂軍之中太子劉璿漢壽亭侯關彜皆被魏兵所殺軍民大亂互相踐踏死者不計其數旬日後賈充先至出榜安民方始寧靖留衛瓘守成都乃遷後主赴洛陽止有尚書令樊建侍中張紹光祿大夫譙周祕書郎郤正等數人跟隨廖化董厥皆託病不起後皆憂死時魏景元五年改為咸熙元年春三月吳將丁奉見蜀已亡遂收兵還吳中書丞華奏吳主孫休曰吳蜀乃唇齒也唇亡則齒寒臣料司馬昭伐吳在即乞陛下深加防禦休從其言遂命陸遜子陸抗為鎮東大將軍領荊州牧守江口左將軍孫異守南徐諸處隘口又沿江一帶屯兵數百營老將丁奉總督之以防魏兵建寧太守霍戈聞成都不守素服望西大哭三日諸將皆曰既漢主失位何不速降戈泣渭曰道路隔絶未知吾主安危若何若魏主以禮待之則舉城而降未為晚也萬一危辱吾主則主辱臣死何可降乎衆然其言乃使人到洛陽探聽後主消息去了且説後主至洛陽時司馬昭已自回朝昭責後主曰公荒淫無道廢賢失政理宜誅戮後主面如土色不知所為文武皆奏曰蜀主既失國紀幸早歸降宜赦之昭乃封禪為安樂公賜住宅月給用度賜絹萬匹僮婢百人子劉瑤及群臣樊建譙周郤正等皆封侯爵後主謝恩出內昭因黃皓蠹國害民令武士押出市曹淩遲處死時霍戈探聽得後主受封遂率部下軍士來降次日後主親詣司馬昭府下拜謝昭設宴款待先以魏樂舞戲於前蜀官感傷獨後主有喜色昭令蜀人扮蜀樂於前蜀官盡皆墮淚後主嬉笑自若酒至半酣昭謂賈充曰人之無情乃至於此雖使諸葛孔明在亦不能輔之久全何況薑維乎乃問後主曰頗思蜀否後主曰此間樂不思蜀也須臾後主起身更衣郤正跟至廂下曰陛下如何答應不思蜀也倘彼再問可泣而答曰先人墳墓遠在蜀地乃心西悲無日不思晉公必放陛下歸蜀矣後主牢記入席酒將微醉昭又問曰頗思蜀否後主如郤正之言以對欲哭無淚遂閉其目昭曰何乃似郤正語耶後主開目驚視曰誠如尊命昭及左右皆笑之昭因此深喜後主誠實並不疑慮後人有詩歎曰追歡作樂笑顔開不念危亡半點哀快樂異鄉忘故國方知後主是庸才卻説朝中大臣因昭收川有功遂尊之為王表奏魏主曹奐時奐名為天子實不能主張政皆由司馬氏不敢不從遂封晉公司馬昭為晉王諡父司馬懿為宣王兄司馬師為景王昭妻乃王肅之女生二子長曰司馬炎人物魁偉立發垂地兩手過膝聰明英武膽量過人次曰司馬攸情性溫和恭儉孝悌昭甚愛之因司馬師無子嗣攸以繼其後昭常曰天下者乃吾兄之天下也於是司馬昭受封晉王欲立攸為世子山濤諫曰廢長立幼違禮不祥賈充何曾裴秀亦諫曰長子聰明神武有超世之才人望既茂天表如此非人臣之相也昭猶豫未決太尉王祥司空荀顗諫曰前代立少多致亂國願殿下思之昭遂立長子司馬炎為世子大臣奏稱當年襄武縣天降一人身長二丈餘腳迹長三尺二寸白髮蒼髯著黃單衣裹黃巾拄藜頭杖自稱曰吾乃民王也今來報汝天下換主立見太平如此在市遊行三日忽然不見此乃殿下之瑞也殿下可戴十二旒冠冕建天子旌旗出警入蹕乘金根車備六馬進王妃為王后立世子為太子昭心中暗喜回到宮中正欲飲食忽中風不語次日病危太尉王祥司徒何曾司馬荀顗及諸大臣入宮問安昭不能言以手指太子司馬炎而死時八月辛卯日也何曾曰天下大事皆在晉王可立太子為晉王然後祭葬是日司馬炎即晉王位封何曾為晉丞相司馬望為司徒石苞為驃騎將軍陳騫為車騎將軍諡父為文王安葬已畢炎召賈充裴秀入宮問曰曹操曾雲若天命在吾吾其為周文王乎果有此事否充曰操世受漢祿恐人言論篡逆之名故出此言乃明教曹丕為天子也炎曰孤父王比曹操何如充曰操雖功蓋華夏下民畏其威而不懷其德子丕繼業差役甚重東西驅馳未有寧歲後我宣王景王纍建大功布恩施德天下歸心久矣文王併吞西蜀功蓋寰宇又豈操之可比乎炎曰曹丕尚紹漢統孤豈不可紹魏統耶賈充裴秀二人再拜而奏曰殿下正當法曹丕紹漢故事復築受禪壇布告天下以即大位炎大喜次日帶劍入內此時魏主曹奐連日不曾設朝心神恍惚舉止失措炎直入後宮奐慌下禦榻而迎炎坐畢問曰魏之天下誰之力也奐曰皆晉王父祖之賜耳炎笑曰吾觀陛下文不能論道武不能經邦何不讓有才德者主之奐大驚口噤不能言傍有黃門侍郎張節大喝曰晉王之言差矣昔日魏武祖皇帝東蕩西除南征北討非容易得此天下今天子有德無罪何故讓與人耶炎大怒曰此社稷乃大漢之社稷也曹操挾天子以令諸侯自立魏王篡奪漢室吾祖父三世輔魏得天下者非曹氏之能實司馬氏之力也四海鹹知吾今日豈不堪紹魏之天下乎節又曰欲行此事是篡國之賊也炎大怒曰吾與漢家報仇有何不可叱武士將張節亂瓜打死于殿下奐泣淚跪告炎起身下殿而去奐謂賈充裴秀曰事已急矣如之奈何充曰天數盡矣陛下不可逆天當照漢獻帝故事重修受禪壇具大禮禪位與晉王上合天心下順民情陛下可保無虞矣奐從之遂令賈充築受禪壇以十二月甲子日奐親捧傳國璽立於壇上大會文武後人有詩歎曰魏吞漢室晉吞曹天運回圈不可逃張節可憐忠國死一拳怎障泰山高請晉王司馬炎登壇授與大禮奐下壇具公服立于班首炎端坐於壇上賈充裴秀列於左右執劍令曹奐再拜伏地聽命充曰自漢建安二十五年魏受漢禪已經四十五歲矣今天祿永終天命在晉司馬氏功德彌隆極天際地可即皇帝正位以紹魏統封汝為陳留王出就金墉城居止當時起程非宣詔不許入京奐泣謝而去太傅司馬孚哭拜於奐前曰臣身為魏臣終不背魏也炎見孚如此封孚為安平王孚不受而退是日文武百官再拜於壇下山呼萬歲炎紹魏統國號大晉改元為泰始元年大赦天下魏遂亡後人有詩歎曰晉國規模如魏王陳留蹤迹似山陽重行受禪台前事回首當年止自傷晉帝司馬炎追諡司馬懿為宣帝伯父司馬師為景帝父司馬昭為文帝立七廟以光祖宗那七廟漢征西將軍司馬鈞鈞生豫章太守司馬量量生潁川太守司馬雋雋生京兆尹司馬防防生宣帝司馬懿懿生景帝司馬師文帝司馬昭是為七廟也大事已定每日設朝計議伐吳之策正是漢家城郭已非陽吳國江山將復更未知怎生伐吳且看下文分解
