body:
  text: 第一百二十回薦杜預老將獻新謀降孫皓三分歸一統卻説吳主孫休聞司馬炎已篡魏知其必將伐吳憂慮成疾臥床不起乃召丞相濮陽興入宮中令太子孫雨單出拜吳主把興臂手指雨單而卒興出與群臣商議欲立太子孫雨單為君左典軍萬彧曰雨單幼不能專政不若取烏程侯孫皓立之左將軍張布亦曰皓才識明斷堪為帝王丞相濮陽興不能決入奏朱太后太后曰吾寡婦人耳安知社稷之事卿等斟酌立之可也興遂迎皓為君皓字元宗大帝孫權太子孫和之子也當年七月即皇帝位改元為元興元年封太子孫雨單為豫章王追諡父和為文皇帝尊母何氏為太后加丁奉為右大司馬次年改為甘露元年皓凶暴日甚酷溺酒色寵幸中常侍岑昏濮陽興張布諫之皓怒斬二人滅其三族由是廷臣緘口不敢再諫又改寶鼎元年以陸凱萬彧為左右丞相時皓居武昌揚州百姓溯流供給甚苦之又奢侈無度公私匱乏陸凱上疏諫曰今無災而民命盡無為而國財空臣竊痛之昔漢室既衰三家鼎立今曹劉失道皆為晉有此目前之明驗也臣愚但為陛下惜國家耳武昌土地險瘠非王者之都且童謠雲寧飲建業水不食武昌魚寧還建業死不止武昌居此足明民心與天意也今國無一年之蓄有露根之漸官吏為苛擾莫之或恤大帝時後宮女不滿百景帝以來乃有千數此耗財之甚者也又左右皆非其人群黨相挾害忠隱賢此皆蠹政病民者也願陛下省百役罷苛擾簡出宮女清選百官則天悅民附而國安矣疏奏皓不悅又大興土木作昭明宮令文武各官入山采木又召術士尚廣令筮蓍問取天下之事尚對曰陛下筮得吉兆庚子歲青蓋當入洛陽皓大喜謂中書丞華本本曰先帝納卿之言分頭命將沿江一帶屯數百營命老將丁奉總之朕欲兼併漢土以為蜀主復仇當取何地為先本本諫曰今成都不守社稷傾崩司馬炎必有吞吳之心陛下宜修德以安吳民乃為上計若強動兵甲正猶披麻救火必致自焚也願陛下察之皓大怒曰朕欲乘時恢復舊業汝出此不利之言若不看汝舊臣之面斬首號令叱武士推出殿門華本本出朝歎曰可惜錦繡江山不久屬於他人矣遂隱居不出於是皓令鎮東將軍陸抗部兵屯江口以圖襄陽早有消息報入洛陽近臣奏知晉主司馬炎晉主聞陸抗寇襄陽與衆官商議賈充出班奏曰臣聞吳國孫皓不修德政專行無道陛下可詔都督羊祜率兵拒之俟其國中有變乘勢攻取東吳反掌可得也炎大喜即降詔遣使到襄陽宣諭羊祜祜奉詔整點軍馬預備迎敵自是羊祜鎮守襄陽甚得軍民之心吳人有降而欲去者皆聽之減戍邏之卒用以墾田八百餘頃其初到時軍無百日之糧及至末年軍中有十年之積祜在軍嘗著輕裘系寬帶不披皚甲帳前侍衛者不過十餘人一日部將入帳稟祜曰哨馬來報吳兵皆懈怠可乘其無備而襲之必獲大勝祜笑曰汝衆人小覷陸抗耶此人足智多謀日前吳主命之攻拔西陵斬了步闡及其將士數十人吾救之無及此人為將我等只可自守候其內有變方可圖取若不審時勢而輕進此取敗之道也衆將服其論只自守疆界而已一日羊祜引諸將打獵正值陸抗亦出獵羊祜下令我軍不許過界衆將得令止于晉地打圍不犯吳境陸抗望見歎曰羊將軍有紀律不可犯也日晚各退祜歸至軍中察問所得禽獸被吳人先射傷者皆送還吳人皆悅來報陸抗抗召來人入問曰汝主帥能飲酒否來人答曰必得佳釀則飲之抗笑曰吾有鬥酒藏之久矣今付與汝持去拜上都督此酒陸某親釀自飲者特奉一勺以表昨日出獵之情來人領諾攜酒而去左右問抗曰將軍以酒與彼有何主意抗曰彼既施德於我我豈得無以酬之衆皆愕然卻説來人回見羊祜以抗所問並奉酒事一一陳告祜笑曰彼亦知吾能飲乎遂命開壺取飲部將陳元曰其中恐有姦詐都督且宜慢飲祜笑曰抗非毒人者也不必疑慮意傾壺飲之自是使人通問常相往來一日抗遣人候祜祜問曰陸將軍安否來人曰主帥臥病數日未出祜曰料彼之病與我相同吾已合成熟藥在此可送與服之來人持藥回見抗衆將曰羊祜乃是吾敵也此藥必非良藥抗曰豈有鴆人羊叔子哉汝衆人勿疑遂服之次日病愈衆將皆拜賀抗曰彼專以德我專以暴是彼將不戰而服我也今宜各保疆界而已無求細利衆將領命忽報吳主遣使來到抗接入問之使曰天子傳諭將軍作急進兵勿使晉人先入抗曰汝先回吾隨有疏章上奏使人辭去抗即草疏遣人齎到建業近臣呈上皓拆觀其疏疏中備言晉未可伐之狀且勸吳主修德慎罰以安內為念不當以黷武為事吳主覽畢大怒曰朕聞抗在邊境與敵人相通今果然矣遂遣使罷其兵權降為司馬卻令左將軍孫翼代領其軍群臣皆不敢諫吳主皓自改元建衡至鳳凰元年恣意妄為窮兵屯戍上下無不嗟怨丞相萬彧將軍留平大司農樓玄三人見皓無道直言苦諫皆被所殺前後十餘年殺忠臣四十余人皓出入常帶鐵騎五萬群臣恐怖莫敢奈何卻説羊祜聞陸抗罷兵孫皓失德見吳有可乘之機乃作表遣人往洛陽請伐吳其略曰夫期運雖天所授而功業必因人而成今江淮之險不如劍閣孫皓之暴過於劉禪吳人之困甚于巴蜀而大晉兵力盛於往時不于此際平一四海而更阻兵相守使天下困於征戍經歷盛衰不可長久也司馬炎觀表大喜便令興師賈充荀勗馮紞三人力言不可炎因此不行祜聞上不允其情歎曰天下不如意事十常八九今天與不取豈不大可惜哉至咸寧四年羊祜入朝奏辭歸鄉養病炎問曰卿有何安邦之策以教寡人祜曰孫皓暴虐已甚於今可不戰而克若皓不幸而歿更立賢君則吳非陛下所能得也炎大悟曰卿今便提兵往伐若何祜曰臣年老多病不堪當此任陛下另選智勇之士可也遂辭炎而歸是年十一月羊祜病危司馬炎駕車親臨其家問安炎至臥榻前祜下淚曰臣萬死不能報陛下也炎亦泣曰朕深恨不能用卿伐吳之策今日誰可繼卿之志祜含淚而言曰臣死矣不敢不盡愚誠右將軍杜預可任若伐吳須當用之炎曰舉善薦賢乃美事也卿何薦人於朝即自焚奏稿不令人知耶祜曰拜官公朝謝恩私門臣所不取也言訖而亡炎大哭回宮敕贈太傅巨平侯南州百姓聞羊祜死罷市而哭江南守邊將士亦皆哭泣襄陽人思祜存日常遊於峴山遂建廟立碑四時祭之往來人見其碑文者無不流涕故名為墮淚碑後人有詩歎曰曉日登臨感晉臣古碑零落峴山春松間殘露頻頻滴疑是當年墮淚人晉主以羊祜之言拜杜預為鎮南大將軍都督荊州事杜預為人老成練達好學不倦最喜讀左丘明春秋傳坐臥常自攜每出入必使人持左傳于馬前時人謂之左傳癖及奉晉主之命在襄陽撫民養兵準備伐吳此時吳國丁奉陸抗皆死吳主皓每宴群臣皆令沈醉又置黃門郎十人為糾彈官宴罷之後各奏過失有犯者或剝其面或鑿其眼由是國人大懼晉益州刺史王濬上疏請伐吳其疏曰孫皓荒淫凶逆宜速征戰若一旦皓死更立賢主則強敵也臣造船七年日有朽敗臣年七十死亡無日三者一乖則難圖矣願陛下無失事機晉主覽疏遂與群臣議曰王公之論與羊都督暗合朕意決矣侍中王渾奏曰臣聞孫皓欲北上軍伍已皆整備聲勢正盛難與爭鋒更遲一年以待其疲方可成功晉主依其奏乃降詔止兵莫動退入後宮與祕書丞張華圍棋消遣近臣奏邊庭有表到晉主開視之乃杜預表也表略雲往者羊祜不博謀於朝臣而密與陛下計故令朝臣多異同之議凡事當以利害相校度此舉之利十有八九而其害止於無功耳自秋以來討賊之形頗露今若中止孫皓恐怖徙都武昌完修江南諸城遷其居民城不可攻野無所掠則明年之計亦無及矣晉主覽表才罷張華突然而起推卻棋枰斂手奏曰陛下聖武國富民強吳主淫虐民憂國敝今若討之可不勞而定願勿以為疑晉主曰卿言洞見利害朕復何疑即出升殿命鎮南大將軍杜預為大都督引兵十萬出江陵鎮東大將軍琅琊王司馬胄出途中安東大將軍王渾出橫江建威將軍王戎出武昌平南將軍胡奮出夏口各引兵五萬皆聽預調用又遣龍驤將軍王濬廣武將軍唐彬浮江東下水陸兵二十余萬戰船數萬艘又令冠軍將軍楊濟出屯襄陽節制諸路人馬早有消息報入東吳吳主皓大驚急召丞相張悌司徒何植司空滕循計議退兵之策悌奏曰可令車騎將軍伍延為都督進兵江陵迎敵杜預驃騎將軍孫歆進兵拒夏口等處軍馬臣敢為軍師領左將軍沈瑩右將軍諸葛靚引兵十萬出兵牛渚接應諸路軍馬皓從之遂令張悌引兵去了皓退入後宮不安憂色幸臣中常侍岑昏問其故皓曰晉兵大至諸路已有兵迎之爭奈王濬率兵數萬戰船齊備順流而下其鋒甚鋭朕因此憂也昏曰臣有一計令王濬之舟皆為齏粉矣皓大喜遂問其計岑昏奏曰江南多鐵可打連環索百餘條長數百丈每環重二三十斤於沿江緊要去處橫截之再造鐵錐數萬長丈余置於水中若晉船乘風而來逢錐則破豈能渡江也皓大喜傳令撥匠工于江邊連夜造成鐵索鐵錐設立停當卻説晉都督杜預兵出江陵令牙將周旨引水手八百人乘小舟暗渡長江夜襲樂鄉多立旌旗于山林之外日則放炮擂鼓夜則各處舉火旨領命引衆渡江伏于巴山次日杜預領大軍水陸並進前哨報道吳主遣伍延出陸路陸景出水路孫歆為先鋒三路來迎杜預引兵前進孫歆船早到兩兵初交杜預便退歆引兵上岸迤邐追時不到二十裏一聲炮響四面晉兵大至吳兵急回杜預乘勢掩殺吳兵死者不計其數孫歆奔到城邊周旨八百軍混雜於中就城上舉火歆大驚曰北來諸軍乃飛渡江也急欲退時被周旨大喝一聲斬于馬下陸景在船上望見江南岸上一片火起巴山上風飄出一面大旗上書晉鎮南大將軍杜預陸景大驚欲上岸逃命被晉將張尚馬到斬之伍延見各軍皆敗乃棄城走被伏兵捉住縛見杜預預曰留之無用叱令武士斬之遂得江陵於是沅湘一帶直抵廣州諸郡守令皆望風齎印出降預令人持節安撫秋毫無犯遂進兵攻武昌武昌亦降杜預軍威大振遂大會諸將共議取建業之策胡奮曰百年之寇未可盡服方今春水泛漲難以久住可俟來春更為大舉預曰昔樂毅濟西一戰而並強齊今兵威大振如破竹之勢數節之後皆迎刃而解無復有著手處也遂馳檄約會諸將一齊進兵攻取建業時龍驤將軍王濬率水兵順流而下前哨報説吳人造鐵索沿江橫截又以鐵錐置於水中為準備濬大笑遂造大筏數十方上縛草為人披甲執杖立于周圍順水放下吳兵見之以為活人望風先走暗錐著筏盡提而去又於筏上作大炬長十餘丈大十餘圍以麻油灌之但遇鐵索燃炬燒之須臾皆斷兩路從大江而來所到之處無不克勝卻説東吳丞相張悌令左將軍沈瑩右將軍諸葛靚來迎晉兵瑩謂靚曰上流諸軍不作提防吾料晉軍必至此宜盡力以敵之若幸得勝江南自安今渡江與戰不幸而敗則大事去矣靚曰公言是也言未畢人報晉兵順流而下勢不可當二人大驚慌來見張悌商議靚謂悌曰東吳危矣何不遁去悌垂泣曰吳之將亡賢愚共知今若君臣畢降無一人死於國難不亦辱乎諸葛靚亦垂泣而去張悌與沈瑩揮兵抵敵晉兵一齊圍之周旨首先殺入吳營張悌獨奮力搏戰死於亂軍之中沈瑩被周旨所殺吳兵四散敗走後人有詩贊張悌曰杜預巴山見大旗江東張悌死忠時已拚王氣南中盡不忍偷生負所知卻説晉兵克了牛渚深入吳境王濬遣人馳報捷音晉主炎聞知大喜賈充奏曰吾兵久勞於外不服水土必生疾病宜召軍還再作後圖張華曰今大兵已入其巢吳人膽落不出一月孫皓必擒矣若輕召還前功盡廢誠可惜也晉主未及應賈充叱華曰汝不省天時地利欲妄邀功績困弊士卒雖斬汝不足以謝天下炎曰此是朕意華但與朕同耳何必爭辨忽報杜預馳表到晉主視表亦言宜急進兵之意晉主遂不復疑竟下征進之命王濬等奉了晉主之命水陸並進風雷鼓動吳人望旗而降吳主皓聞之大驚失色諸臣告曰北兵日近江南軍民不戰而降將如之何皓曰何故不戰衆對曰今日之禍皆岑昏之罪請陛下誅之臣等出城決一死戰皓曰量一中貴何能誤國衆大叫曰陛下豈不見蜀之黃皓乎遂不待吳主之命一齊擁入宮中碎割岑昏生啖其肉陶濬奏曰臣領戰船皆小願得二萬兵乘大船以戰自足破之皓從其言遂撥禦林諸軍與陶濬上流迎敵前將軍張象率水兵下江迎敵二人部兵正行不想西北風大起吳兵旗幟皆不能立盡倒豎於舟中兵卒不肯下船四散奔走只有張象數十軍待敵卻説晉將王濬揚帆而行過三山舟師曰風波甚急船不能行且待風勢少息行之濬大怒拔劍叱之曰吾目下欲取石頭城何言住耶遂擂鼓大進吳將張象引從軍請降濬曰若是真降便為前部立功象回本船直至石頭城下叫開城門接入晉兵孫皓聞晉兵已入城欲自刎中書令胡沖光祿勳薛瑩奏曰陛下何不效安樂公劉禪乎皓從之亦輿櫬自縛率諸文武詣王濬軍前歸降濬釋其縛焚其櫬以王禮待之唐人有詩歎曰西晉樓船下益州金陵王氣黯然收千尋鐵鎖沈江底一片降旗出石頭人世幾回傷往事山形依舊枕寒流今逢四海為家日故壘蕭蕭蘆荻秋於是東吳四州四十三郡三百一十三縣戶口五十二萬三千官吏三萬二千兵二十三萬男女老幼二百三十萬米谷二百八十萬斛舟船五千餘艘後宮五千餘人皆歸大晉大事已定出榜安民盡封府庫倉稟次日陶濬兵不戰自潰琅琊王司馬胄並王戎大兵皆至見王濬成了大功心中欣喜次日杜預亦至大犒三軍開倉賑濟吳民於是吳民安堵惟有建平太守吾彥拒城不下聞吳亡乃降王濬上表報捷朝廷聞吳已平君臣皆賀上壽晉主執杯流涕曰此羊太傅之功也惜其不親見之耳驃騎將軍孫秀退朝向南而哭曰昔討逆壯年以一校尉創立基業今孫皓舉江南而棄之悠悠蒼天此何人哉卻説王濬班師遷吳主皓赴洛陽面君皓登殿稽首以見晉帝帝賜坐曰朕設此座以待卿久矣皓對曰臣于南方亦設此座以待陛下帝大笑賈充問皓曰聞君在南方每鑿人眼目剝人面皮此何等刑耶皓曰人臣弒君及姦回不忠者則加此刑耳充默然甚愧帝封皓為歸命侯子孫封中郎隨降宰輔皆封列侯丞相張悌陳亡封其子孫封王濬為輔國大將軍其餘各加封賞自此三國歸於晉帝司馬炎為一統之基矣此所謂天下大勢合久必分分久必合者也後來後漢皇帝劉禪亡于晉泰始七年魏主曹英亡于太安元年吳主孫皓亡于太康四年皆善終後人有古風一篇以敘其事曰高祖提劍入咸陽炎炎紅日升扶桑光武龍興成大統金烏飛上天中央哀哉獻帝紹海宇紅輪西附咸池傍何進無謀中貴亂涼州董卓居朝堂王允定計誅逆黨李傕郭汜興刀槍四方盜賊如蟻聚六合姦雄皆鷹揚孫堅孫策起江左袁紹袁術興河梁劉焉父子據巴蜀劉表軍旅屯荊襄張燕張魯霸南鄭馬騰韓遂守西涼陶廉張繡公孫瓚各逞雄才占一方曹操專權居相府牢籠英俊用文武威挾天子令諸侯總領貔貅鎮中土樓桑玄德本皇孫義結關張願扶主東西奔走恨無家將寡兵微作羈旅南陽三顧情何深臥龍一見分寰宇先取荊州後取川霸業圖王在天府嗚呼三載逝升遐白帝托孤堪痛楚孔明六出祁山前願以只手將天補何期歷數到此終長星半夜落山塢薑維獨憑氣力高九伐中原空劬勞鍾會鄧艾分兵進漢室江山盡屬曹丕睿芳髦才及奐司馬又將天下交受禪台前雲霧起石頭城下無波濤陳留歸命與安樂王侯公爵從根苗紛紛世事無窮盡天數茫茫不可逃鼎足三分已成夢後人憑吊空牢騷
