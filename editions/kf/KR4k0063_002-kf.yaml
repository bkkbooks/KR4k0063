body:
  text: 第二回張翼德怒鞭督郵何國舅謀誅宦豎且說董卓字仲穎隴西臨洮人也官拜河東太守自來驕傲當日怠慢了玄德張飛性發便欲殺之玄德與關公急止之曰他是朝廷命官豈可擅殺飛曰若不殺這廝反要在他部下聽令其實不甘二兄要便住在此我自投別處去也玄德曰我三人義同生死豈可相離不若都投別處去便了飛曰若如此稍解吾恨於是三人連夜引軍來投朱雋諝待之甚厚合兵一處進討張寶是時曹操自跟皇甫嵩討張梁大戰于曲陽這裏朱諝進攻張寶張寶引賊衆八九萬屯於山後諝令玄德爲其先鋒與賊對敵張寶遣副將高升出馬搦戰玄德使張飛擊之飛縱馬挺矛與升交戰不數合刺升落馬玄德麾軍直沖過去張寶就馬上披發仗劍作起妖法只見風雷大作一股黑氣從天而降黑氣中似有無限人馬殺來玄德連忙回軍軍中大亂敗陣而歸與朱諝計議諝曰彼用妖術我來日可宰豬羊狗血令軍士伏于山頭候賊趕來從高坡上潑之其法可解玄德聽令撥關公張飛各引軍一千伏于山後高岡之上盛豬羊狗血並穢物準備次日張寶搖旗擂鼓引軍搦戰玄德出迎交鋒之際張寶作法風雷大作飛砂走石黑氣漫天滾滾人馬自天而下玄德撥馬便走張寶驅兵趕來將過山頭關張伏軍放起號炮穢物齊潑但見空中紙人草馬紛紛墜地風雷頓息砂石不飛張寶見解了法急欲退軍左關公右張飛兩軍都出背後玄德朱雋一齊趕上賊兵大敗玄德望見地公將軍旗號飛馬趕來張寶落荒而走玄德發箭中其左臂張寶帶箭逃脫走入陽城堅守不出朱雋引兵圍住陽城攻打一面差人打探皇甫嵩消息探子回報具說皇甫嵩大獲勝捷朝廷以董卓屢敗命嵩代之嵩到時張角已死張梁統其衆與我軍相拒被皇甫嵩連勝七陣斬張梁于曲陽發張角之棺戮屍梟首送往京師餘衆懼降朝廷加皇甫嵩爲車騎將軍領冀州牧皇甫嵩又表奏盧植有功無罪朝廷複盧植原官曹操亦以有功除濟南相即日將班師赴任朱雋聽說催促軍馬悉力攻打陽城賊勢危急賊將嚴政刺殺張寶獻首投降朱雋遂平數郡上表獻捷時又黃巾餘黨三人趙弘韓忠孫仲聚衆數萬望風燒劫稱與張角報仇朝廷命朱雋即以得勝之師討之雋奉詔率軍前進時賊據宛城引兵攻之趙弘遣韓忠出戰雋遣玄德關張攻城西南角韓忠盡率精銳之衆來西南角抵敵朱雋自縱鐵騎二千徑取東北角賊恐失城急棄西南而回玄德從背後掩殺賊衆大敗奔入宛城朱雋分兵四面圍定城中斷糧韓忠使人出城投降雋不許玄德曰昔高祖之得天下蓋爲能招降納順公何拒韓忠耶雋曰彼一時此一時也昔秦項之際天下大亂民無定主故招降賞附以勸來耳今海內一統惟黃巾造反若容其降無以勸善使賊得利恣意劫掠失利便投降此長寇之志非良策也玄德曰不容寇降是矣今四面圍如鐵桶賊乞降不得必然死戰萬人一心尚不可當況城中有數萬死命之人乎不若撤去東南獨攻西北賊必棄城而走無心戀戰可即擒也雋然之隨撤東南二面軍馬一齊攻打西北韓忠果引軍棄城而奔雋與玄德關張率三軍掩殺射死韓忠餘皆四散奔走正追趕間趙弘孫仲引賊衆到與雋交戰雋見弘勢大引軍暫退弘乘勢複奪宛城雋離十裏下寨方欲攻打忽見正東一彪人馬到來爲首一將生得廣額闊面虎體熊腰吳郡富春人也姓孫名堅字文台乃孫武子之後年十七歲時與父至錢塘見海賊十余人劫取商人財物于岸上分贓堅謂父曰此賊可擒也遂奮力提刀上岸揚聲大叫東西指揮如喚人狀賊以爲官兵至盡棄財物奔走堅趕上殺一賊由是郡縣知名薦爲校尉後會稽妖賊許昌造反自稱陽明皇帝聚衆數萬堅與郡司馬招募勇士千余人會合州郡破之斬許昌並其子許韶刺史雋臧上表奏其功除堅爲鹽瀆丞又除盱眙丞下邳丞今見黃巾寇起聚集鄉中少年及諸商旅並淮泗精兵一千五百餘人前來接應朱雋大喜便令堅攻打南門玄德打北門朱雋打西門留東門與賊走孫堅首先登城斬賊二十餘人賊衆奔潰趙弘飛馬突槊直取孫堅堅從城上飛身奪弘槊刺弘下馬卻騎弘馬飛身往來殺賊孫仲引賊突出北門正迎玄德無心戀戰只待奔逃玄德張弓一箭正中孫仲翻身落馬朱雋大軍隨後掩殺斬首數萬級降者不可勝計南陽一路十數郡皆平雋班師回京詔封爲車騎將軍河南尹雋表奏孫堅劉備等功堅有人情除別郡司馬上任去了惟玄德聽候日久不得除授三人鬱鬱不樂上街閑行正值郎中張鈞車到玄德見之自陳功績鈞大驚隨入朝見帝曰昔黃巾造反其原皆由十常侍賣官鬻爵非親不用非仇不誅以致天下大亂今宜斬十常侍懸首南郊遣使者布告天下有功者重加賞賜則四海自清平也十常侍奏帝曰張鈞欺主帝令武士逐出張鈞十常侍共議此必破黃巾有功者不得除授故生怨言權且教省家銓注微名待後卻再理會未晚因此玄德除授定州中山府安喜縣尉克日赴任玄德將兵散回鄉裏止帶親隨二十餘人與關張來安喜縣中到任署縣事一月與民秋毫無犯民皆感化到任之後與關張食則同桌寢則同床如玄德在稠人廣坐關張侍立終日不倦到縣未及四月朝廷降詔凡有軍功爲長吏者當沙汰玄德疑在遣中適督郵行部至縣玄德出郭迎接見督郵施禮督郵坐於馬上惟微以鞭指回答關張二公俱怒及到館驛督南面高坐玄德侍立階下良久督郵問曰劉縣尉是何出身玄德曰備乃中山靖王之後自涿郡剿戮黃巾大小三十余戰頗有微功因得除今職督郵大喝曰汝詐稱皇親虛報功績目今朝廷降詔正要沙汰這等濫官汙吏玄德喏喏連聲而退歸到縣中與縣吏商議吏曰督郵作威無非要賄賂耳玄德曰我與民秋毫無犯那得財物與他次日督郵先提縣吏去勒令指稱縣尉害民玄德幾番自往求免俱被門役阻住不肯放參卻說張飛飲了數杯悶酒乘馬從館驛前過見五六十個老人皆在門前痛哭飛問其故衆老人答曰督郵逼勒縣吏欲害劉公我等皆來苦告不得放入反遭把門人趕打張飛大怒睜圓環眼咬碎鋼牙滾鞍下馬徑入館驛把門人那裏阻擋得住直奔後堂見督郵正坐廳上將縣吏綁倒在地飛大喝害民賊認得我麽督郵未及開言早被張飛揪住頭髮扯出館驛直到縣前馬樁上縛住攀下柳條去督郵兩腿上著力鞭打一連打折柳條十數枝玄德正納悶間聽得縣前喧鬧問左右答曰張將軍綁一人在縣前痛打玄德忙去觀之見綁縛者乃督郵也玄德驚問其故飛曰此等害民賊不打死等甚督郵告曰玄德公救我性命玄德終是仁慈的人急喝張飛住手傍邊轉過關公來曰兄長建許多大功僅得縣尉今反被督郵侮辱吾思枳棘叢中非棲鸞鳳之所不如殺督郵棄官歸鄉別圖遠大之計玄德乃取印綬挂於督郵之頸責之曰據汝害民本當殺卻今姑饒汝命吾繳還印綬從此去矣督郵歸告定州太守太守申文省府差人捕捉玄德關張三人往代州投劉恢恢見玄德乃漢室宗親留匿在家不題卻說十常侍既握重權互相商議但有不從己者誅之趙忠張讓差人問破黃巾將士索金帛不從者奏罷職皇甫嵩朱雋皆不肯與趙忠等俱奏罷其官帝又封趙忠等爲車騎將軍張讓等十三人皆封列侯朝政愈壞人民嗟怨於是長沙賊區星作亂漁陽張舉張純反舉稱天子純稱大將軍表章雪片告急十常侍皆藏匿不奏一日帝在後園與十常侍飲宴諫議大夫劉陶徑到帝前大慟帝問其故陶曰天下危在旦夕陛下尚自與閹宦共飲耶帝曰國家承平有何危急陶曰四方盜賊並起侵掠州郡其禍皆由十常侍賣官害民欺君罔上朝廷正人皆去禍在目前矣十常侍皆免冠跪伏於帝前曰大臣不相容臣等不能活矣願乞性命歸田裏盡將家產以助軍資言罷痛哭帝怒謂陶曰汝家亦有近侍之人何獨不容朕耶呼武士推出斬之劉陶大呼臣死不惜可憐漢室天下四百餘年到此一旦休矣武士擁陶出方欲行刑一大臣喝住曰勿得下手待我諫去衆視之乃司徒陳耽徑入宮中來諫帝曰劉諫議得何罪而受誅帝曰譭謗近臣冒瀆朕躬耽曰天下人民欲食十常侍之肉陛下敬之如父母身無寸功皆封列侯況封諝等結連黃巾欲爲內亂陛下今不自省社稷立見崩摧矣帝曰封諝作亂其事不明十常侍中豈無一二忠臣陳耽以頭撞階而諫帝怒命牽出與劉陶皆下獄是夜十常侍即於獄中謀殺之假帝詔以孫堅爲長沙太守討區星不五十日報捷江夏平詔封堅爲烏程侯封劉虞爲幽州牧領兵往漁陽征張舉張純代州劉恢以書薦玄德見虞虞大喜令玄德爲都尉引兵直抵賊巢與賊大戰數日挫動銳氣張純專一兇暴士卒心變帳下頭目刺殺張純將頭納獻率衆來降張舉見勢敗亦自縊死漁陽盡平劉虞表奏劉備大功朝延赦免鞭督郵之罪除下密丞遷高堂尉公孫瓚又表陳玄德前功薦爲別部司馬守平原縣令玄德在平原頗有錢糧軍馬重整舊日氣象劉虞平寇有功封太尉中平六年夏四月靈帝病篤召大將軍何進入宮商議後事那何進起身屠家因妹入宮爲貴人生皇子辯遂立爲皇後進由是得權重任帝又寵倖王美人生皇子協何後嫉妒鴆殺王美人皇子協養于董太后宮中董太后乃靈帝之母解瀆亭侯劉萇之妻也初因桓帝無子迎立解瀆亭侯之子是爲靈帝靈帝入繼大統遂迎養母氏于宮中尊爲太后董太后嘗勸帝立皇子協爲太子帝亦偏愛協欲立之當時病篤中常侍蹇碩奏曰若欲立協必先誅何進以絕後患帝然其說因宣進入宮進至宮門司馬潘隱謂進曰不可入宮蹇碩欲謀殺公進大驚急歸私宅召諸大臣欲盡誅宦官座上一人挺身出曰宦官之勢起自沖質之時朝廷滋蔓極廣安能盡誅倘機不密必有滅族之禍請細詳之進視之乃典軍校尉曹操也進叱曰汝小輩安知朝廷大事正躊躇間潘隱至言帝已崩今蹇碩與十常侍商議秘不發喪矯詔宣何國舅入宮欲絕後患冊立皇子協爲帝說未了使命至宣進速入以定後事操曰今日之計先宜正君位然後圖賊進曰誰敢與吾正君討賊一人挺身出曰願借精兵五千斬關入內冊立新君盡誅閹豎掃清朝廷以安天下進視之乃司徒袁逢之子袁隗之侄名紹甯本初現爲司隸校尉何進大喜遂點禦林軍五千紹全身披挂何進引何顒荀攸鄭泰等大臣三十餘員相繼而入就靈帝柩前扶立太子辯即皇帝位百官呼拜已畢袁紹入宮收蹇碩碩慌走入禦園花陰下爲中常侍郭勝所殺碩所領禁軍盡皆投順紹謂何進曰中官結黨今日可乘勢盡誅之張讓等知事急慌入告何後曰始初設謀陷害大將軍者止蹇碩一人並不幹臣等事今大將軍聽袁紹之言欲盡誅臣等乞娘娘憐憫何太后曰汝等勿憂我當保汝傳旨宣何進入太后密謂曰我與汝出身寒微非張讓等焉能享此富貴今蹇碩不仁既已伏誅汝何聽信人言欲盡誅宦官耶何進聽罷出謂衆官曰蹇碩設謀害我可族滅其家其餘不必妄加殘害袁紹曰若不斬草除根必爲喪身之本進曰吾意已決汝勿多言衆官皆退次日太后命何進參錄尚書事其餘皆封官職董太后宣張讓等入宮商議曰何進之妹始初我擡舉他今日他孩兒即皇帝位內外臣僚皆其心腹威權太重我將如何讓奏曰娘娘可臨朝垂簾聽政封皇子協爲王加國舅董重大官掌握軍權重用臣等大事可圖矣董太后大喜次日設朝董太后降旨封皇子協爲陳留王董重爲驃騎將軍張讓等共預朝政何太后見董太后專權于宮中設一宴請董太后赴席酒至半酣何太后起身捧再拜曰我等皆婦人也參預朝政非其所宜昔呂後因握重權宗族千口皆被戮今我等宜深居九重朝廷大事任大臣元老自行商議此國家之幸也願垂聽焉董後大怒曰汝鴆死王美人設心嫉妒今倚汝子爲君與汝史何進之勢輒敢亂言吾敕驃騎斷兄首如反掌耳何後亦怒曰吾以好言相勸何反怒耶董後曰汝家屠沽小輩有何見識兩宮互相爭競張讓等各勸歸宮何後連夜召何進入宮告以前事何進出召三公共議來早設朝使廷臣奏董太后原系藩妃不宜久居宮中合仍遷於河間安置限日下即出國門一面遣人起送董後一麵點禁軍圍驃騎將軍董重府宅追索印綬董重知事急自刎於後堂家人舉哀軍士方散張讓段珪見董後一枝已廢遂皆以金珠玩好結構何進弟何苗並其母舞陽君令早晚入何太后處善言遮蔽因此十常侍又得近幸六月何進暗使人鴆殺董後於河間驛庭舉樞回京葬於文陵進託病不出司隸校尉袁紹入見進曰張讓段珪等流言於外言公鴆殺董後欲謀大事乘此時不誅閹宦後必爲大禍昔竇武欲誅內豎機謀不密後受其殃今公兄弟部曲將吏皆英俊之士若使盡力事在掌握此天贊之時不可失也進曰且容商議左右密報張讓讓等轉告何苗又多送賄賂苗入奏何後雲大將軍輔佐新君不行仁慈專務殺伐今無端又欲殺十常侍此取亂之道也後納其言少頃何進入白後欲誅中涓何後曰中官統領禁省漢家故事先帝新棄天下爾欲誅殺舊臣非重宗廟也進本是沒決斷之人聽太后言唯唯而出袁紹迎問曰大事若何進曰太后不允如之奈何紹曰可召四方英雄之士勒兵來京盡誅閹豎此時事急不容太后不從進曰此計大妙便發檄至各鎮召赴京師主簿陳琳曰不可俗雲掩目而捕燕雀是自欺也微物尚不可欺以得志況國家大事乎今將軍仗皇威掌兵要龍驤虎步高下在心若欲誅宦官如鼓洪爐燎毛髮耳但當速發雷霆行權立斷則天人順之卻反外檄大臣臨犯京闕英雄聚會各懷一心所謂倒持干戈授人以柄功必不成反生亂矣何進笑曰此懦夫之見也傍邊一人鼓掌大笑曰此事易如反掌何必多議視之乃曹操也正是欲除君側宵人亂須聽朝中智士謀不知曹操說出甚話來且聽下文分解
