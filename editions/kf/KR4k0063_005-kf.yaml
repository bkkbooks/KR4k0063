body:
  text: 第五回發矯詔諸鎮應曹公破關兵三英戰呂布卻說陳宮臨欲下手殺曹操忽轉念曰我爲國家跟他到此殺之不義不若棄而他往插劍上馬不等天明自投東郡去了操覺不見陳宮尋思此人見我說了這兩句疑我不仁棄我而去吾當急行不可久留遂連夜到陳留尋見父親備說前事欲散家資招募義兵父言資少恐不成事此間有孝廉衛弘疏財仗義其家巨富若得相助事可圖矣操置酒張筵拜請衛弘到家告曰今漢室無主董卓專權欺君害民天下切齒操欲力扶社稷恨力不足公乃忠義之士敢求相助衛弘曰吾有是心久矣恨未遇英雄耳既孟德有大志願將家資相助操大喜於是先發矯詔馳報各道然後招集義兵豎起招兵白旗一面上書忠義二字不數日間應募之士如雨駢集一日有一個陽平衛國人姓樂名進字文謙來投曹操又有一個山陽巨野人姓李名典字曼成也來投曹操操皆留爲帳前吏又有沛國譙人夏侯惇字元讓乃夏侯嬰之後自小習槍棒年十四從師學武有人辱駡其師惇殺之逃於外方聞知曹操起兵與其族弟夏侯淵兩個各引壯士千人來會此二人本操之弟兄操父曹嵩原是夏侯氏之子過房與曹家因此是同族不數日曹氏兄弟曹仁曹洪各引兵千餘來助曹仁字子孝曹洪字子廉二人弓馬熟嫻武藝精通操大喜於村中調練軍馬衛弘盡出家財置辦衣甲旗幡四方送糧食者不計其數時袁紹得操矯詔乃聚麾下文武引兵三萬離渤海來與曹操會盟操作檄文以達諸郡檄文曰操等謹以大義布告天下董卓欺天罔地滅國弑君穢亂宮禁殘害生靈狼戾不仁罪惡充積今奉天子密詔大集義兵誓欲掃清華夏剿戮群凶望興義師共泄公憤扶持王室拯救黎民檄文到日可速奉行操發檄文去後各鎮諸侯皆起兵相應第一鎮後將軍南陽太守袁術第二鎮冀州刺史韓馥第三鎮豫州刺史孔伷第四鎮兗州刺史劉岱第五鎮河內郡太守王匡第六鎮陳留太守張邈第七鎮東郡太守喬瑁第八鎮山陽太守袁遺第九鎮濟北相鮑信第十鎮北海太守孔融第十一鎮廣陵太守張超第十二鎮徐州刺史陶謙第十三鎮西涼太守馬騰第十四鎮北平太守公孫瓚第十五鎮上党太守張楊第十六鎮烏程侯長沙太守孫堅第十七鎮祁鄉侯渤海太守袁紹諸路軍馬多少不等有三萬者有一二萬者各領文官武將投洛陽來且說北平太守公孫瓚統領精兵一萬五千路經德州平原縣正行之間遙見桑樹叢中一面黃旗數騎來迎瓚視之乃劉玄德也瓚問曰賢弟何故在此玄德曰舊日蒙兄保備爲平原縣令今聞大軍過此特來奉侯就請兄長入城歇馬瓚指關張而問曰此何人也玄德曰此關羽張飛備結義兄弟也瓚曰乃同破黃巾者乎玄德曰皆此二人之力瓚曰今居何職玄德答曰關羽爲馬弓手張飛爲步弓手瓚歎曰如此可謂埋沒英雄今董卓作亂天下諸侯共往誅之賢弟可棄此卑官一同討賊力扶漢室若何玄德曰願往張飛曰當時若容我殺了此賊免有今日之事雲長曰事已至此即當收拾前去玄德關張引數騎跟公孫瓚來曹操接著衆諸侯亦陸續皆至各自安營下寨連接二百餘裏操乃宰牛殺馬大會諸侯商議進兵之策太守王匡曰今奉大義必立盟主衆聽約束然後進兵操曰袁本初四世三公門多故吏漢朝名相之裔可爲盟主紹再三推辭衆皆曰非本初不可紹方應允次日築台三層遍列五方旗幟上建白旄黃鉞兵符將印請紹登壇紹整衣佩劍慨然而上焚香再拜其盟曰漢室不幸皇綱失統賊臣董卓乘釁縱害禍加至尊虐流百姓紹等懼社稷淪喪糾合義兵並赴國難凡我同盟齊心戮力以致臣節必無二志有渝此盟俾墜其命無克遺育皇天後土祖宗明靈實皆鑒之讀畢歃血衆因其辭氣慷慨皆涕泗橫流歃血已罷下壇衆扶紹升帳而坐兩行依爵位年齒分列坐定操行酒數巡言曰今日既立盟主各聽調遣同扶國家勿以強弱計較袁紹曰紹雖不才既承公等推爲盟主有功必賞有罪必罰國有常刑軍有紀律各宜遵守勿得違犯衆皆曰惟命是聽紹曰吾弟袁術總督糧草應付諸營無使有缺更須一人爲先鋒直抵汜水關挑戰餘各據險要以爲接應長沙太守孫堅出曰堅願爲前部紹曰文台勇烈可當此任堅遂引本部人馬殺奔汜水關來守關將士差流星馬往洛陽丞相府告急董卓自專大權之後每日飲宴李儒接得告急文書徑來稟卓卓大驚急聚衆將商議溫侯呂布挺身出曰父親勿慮關外諸侯布視之如草芥願提虎狼之師盡斬其首懸於都門卓大喜曰吾有奉先高枕無憂矣言未絕呂布背後一人高聲出曰割雞焉用牛刀不勞溫侯親往吾斬衆諸侯首級如探囊取物耳卓視之其人身長九尺虎體狼腰豹頭猿臂關西人也姓華名雄卓聞言大喜加爲驍騎校尉撥馬步軍五萬同李肅胡軫趙岑星夜赴關迎敵衆諸侯內有濟北相鮑信尋思孫堅既爲前部怕他奪了頭功暗撥其弟鮑忠先將馬步軍三千徑抄小路直到關下搦戰華雄引鐵騎五百飛下關來大喝賊將休走鮑忠急待退被華雄手起刀落斬于馬下生擒將校極多華雄遣人齎鮑忠首級來相府報捷卓加雄爲都督卻說孫堅引四將直至關前那四將第一個右北平土垠人姓程名普字德謀使一條鐵脊蛇矛第二人姓黃名蓋字公覆零陵人也使鐵鞭第三個姓韓名當字義公遼西令支人也使一口大刀第四個姓祖名茂字大榮吳郡富春人也使雙刀孫堅披爛銀鎧裹赤幘橫古錠刀騎花鬃馬指關上而罵曰助惡匹夫何不早降華雄副將胡軫引兵五千出關迎戰程普飛馬挺矛直取胡軫鬥不數合程普刺中胡軫喉死于馬下堅揮軍直殺至關前關上矢石如雨孫堅引兵回至梁東屯住使人于袁紹處報捷就于袁術處催糧或說術曰孫堅乃江東猛虎若打破洛陽殺了董卓正是除狼而得虎也今不與糧彼軍必散術聽之不發糧草孫堅軍缺食軍中自亂細作報上關來李肅爲華雄謀曰今夜我引一軍從小路下關襲孫堅寨後將軍擊其前寨堅可擒矣雄從之傳令軍士飽餐乘夜下關是夜月白風清到堅寨時已是半夜鼓噪直進堅慌忙披挂上馬正遇華雄兩馬相交鬥不數合後面李肅軍到竟天價放起火來堅軍亂竄衆將各自混戰止有祖茂跟定孫堅突圍而走背後雄追來堅取箭連放兩箭皆被華雄躲過再放第三箭時因用力太猛拽折了鵲畫弓只得棄弓縱馬而奔祖茂曰主公頭上赤幘射目爲賊所識認可脫幘與某戴之堅就脫幘換茂盔分兩路而走雄軍只望赤幘者追趕堅乃從小路得脫祖茂被華雄追急將赤幘挂於人家燒不盡的庭柱上卻入樹林潛躲華雄軍於月下遙見赤幘四面圍定不敢近前用箭射之方知是計遂向前取了赤幘祖茂于林後殺出揮雙刀欲劈華雄雄大喝一聲將祖茂一刀砍于馬下殺至天明雄方引兵上關程普黃蓋韓當都來尋見孫堅再收拾軍馬屯紮堅爲折了祖茂傷感不已星夜遣人報知袁紹紹大驚曰不想孫文台敗于華雄之手便聚衆諸侯商議衆人都到只有公孫瓚後至紹請入帳列坐紹曰前日鮑將軍之弟不遵調遣擅自進兵殺身喪命折了許多軍士今者孫文台又敗于華雄挫動銳氣爲之奈何諸侯並皆不語紹舉目遍視見公孫瓚背後立著三人容貌異常都在那裏冷笑紹問曰公孫太守背後何人瓚呼玄德出曰此吾自幼同舍兄弟平原令劉備是也曹操曰莫非破黃巾劉玄德乎瓚曰然即令劉玄德拜見瓚將玄德功勞並其出身細說一遍紹曰既是漢室宗派取坐來命坐備遜謝紹曰吾非敬汝名爵吾敬汝是帝室之胄耳玄德乃坐於末位關張叉手侍立於後忽探子來報華雄引鐵騎下關用長竿挑著孫太守赤幘來寨前大罵搦戰紹曰誰敢去戰袁術背後轉出驍將俞涉曰小將願往紹喜便著俞涉出馬即時報來俞涉與華雄戰不三合被華雄斬了衆大驚太守韓馥曰吾有上將潘鳳可斬華雄紹急令出戰潘鳳手提大斧上馬去不多時飛馬來報潘鳳又被華雄斬了衆皆失色紹曰可惜吾上將顔良文醜未至得一人在此何懼華雄言未畢階下一人大呼出曰小將願往斬華雄頭獻於帳下衆視之見其人身長九尺髯長二尺丹鳳眼臥蠶眉面如重棗聲如巨鍾立於帳前紹問何人公孫瓚曰此劉玄德之弟關羽也紹問現居何職瓚曰跟隨劉玄德充馬弓手帳上袁術大喝曰汝欺吾衆諸侯無大將耶量一弓手安敢亂言與我打出曹操急止之曰公路息怒此人既出大言必有勇略試教出馬如其不勝責之未遲袁紹曰使一弓手出戰必被雄所笑操曰此人儀錶不俗華雄安知他是弓手關公如不勝請斬某頭操教釃熱酒一杯與關公飲了上馬關公曰酒且斟下某去便來出帳提刀飛身上馬衆諸侯聽得關外鼓聲大振喊聲大舉如天摧地塌嶽撼山崩衆皆失驚正欲探聽鸞鈴響處馬到中軍雲長提華雄之頭擲於地上其酒尚溫後人有詩贊之曰威鎮乾坤第一功轅門畫鼓響冬冬雲長停盞施英勇酒尚溫時斬華雄曹操大喜只見玄德背後轉出張飛高聲大叫俺哥哥斬了華雄不就這裏殺入關去活拿董卓更待何時袁術大怒喝曰俺大臣尚自謙讓量一縣令手下小卒安敢在此耀武揚威都與趕出帳去曹操曰得功者賞何計貴賤乎袁術曰既然公等只重一縣令我當告退操曰豈可因一言而誤大事耶命公孫瓚且帶玄德關張回寨衆官皆散曹操暗使人齎牛酒撫慰三人卻說華雄手下敗軍報上關來李肅慌忙寫告急文書申聞董卓卓急聚李儒呂布等商議儒曰今失了上將華雄賊勢浩大袁紹爲盟主紹叔袁隗現爲太傅倘或裏應外合深爲不便可先除之請丞相親領大軍分撥剿捕卓然其說喚李傕郭汜領兵五百圍住太傅袁隗家不分老幼盡皆誅絕先將袁隗首級去關前號令卓遂起兵二十萬分爲兩路而來一路先令李傕郭汜引兵五萬把住汜水關不要廝殺卓自將十五萬同李儒呂布樊稠張濟等守虎牢關這關離洛陽五十裏軍馬到關卓令呂布領三萬去關前紮住大寨卓自在關上屯住流星馬探聽得報入袁紹大寨裏來紹聚衆商議操曰董卓屯兵虎牢截俺諸侯中路今可勒兵一半迎敵紹乃分王匡喬瑁鮑信袁遺孔融張楊陶謙公孫瓚八路諸侯往虎牢關迎敵操引軍往來救應八路諸侯各自起兵河內太守王匡引兵先到呂布帶鐵騎三千飛奔來迎王匡將軍馬列成陣勢勒馬門旗下看時見呂布出陣頭戴三叉束發紫金冠體挂西川紅錦百花袍身披獸面吞頭連環鎧腰系勒甲玲瓏獅蠻帶弓箭隨身手持畫戟坐下嘶風赤兔馬果然是人中呂布馬中赤兔王匡回頭問曰誰敢出戰後面一將縱馬挺槍而出匡視之乃河內名將方悅兩馬相交無五合被呂布一戟刺于馬下挺戟直沖過來匡軍大敗四散奔走布東西衝殺如入無人之境幸得喬瑁袁遺兩軍皆至來救王匡呂布方退三路諸侯各折了些人馬退三十退三十裏下寨玄德謂關張曰賊衆我寡必出奇兵方可取勝乃分關公引一千軍伏山左張飛引一千軍伏山右鳴金爲號齊出接應次日玄德與鄒靖引軍鼓噪而進賊衆迎戰玄德引軍便退賊衆乘勢追趕方過山嶺玄德軍中一齊鳴金左右兩軍齊出玄德麾軍回身複殺三路夾攻賊衆大潰直趕至青州城下太守龔景亦率民兵出城助戰賊勢大敗剿戮極多遂解青州之圍後人有詩贊玄德曰運籌決算有神功二虎還須遜一龍初出便能垂偉績自應分鼎在孤窮龔景犒軍畢鄒靖欲回玄德曰近聞中郎將盧植與賊首張角戰于廣宗備昔曾師事盧植欲往助之於是鄒靖引軍自回玄德與關張引本部五百人投廣宗來至盧植軍中入帳施禮具道來意盧植大喜留在帳前聽調時張角賊衆十五萬植兵五萬相拒于廣宗未見勝負植謂玄德曰我今圍賊在此賊弟張梁張寶在潁川與皇甫嵩朱對壘汝可引本部人馬我更助汝一千官軍前去潁川打探消息約期剿捕玄德領命引軍星夜投潁川來時皇甫嵩朱領軍拒賊賊戰不利退入長社依草結營嵩與計曰賊依草結營當用火攻之遂令軍士每人束草一把暗地埋伏其夜大風忽起二更以後一齊縱火嵩與各引兵攻擊賊寨火焰張天賊衆驚慌馬不及鞍人不及甲四散奔走殺到天明張梁張寶引敗殘軍士奪路而走忽見一彪軍馬盡打紅旗當頭來到截住去路爲首閃出一將身長七尺細眼長髯官拜騎都尉沛國譙郡人也姓曹名操字孟德操父曹嵩本姓夏侯氏因爲中常侍曹騰之養子故冒姓曹曹嵩生操小字阿瞞一名吉利操幼時好遊獵喜歌舞有權謀多機變操有叔父見操遊蕩無度嘗怒之言于曹嵩嵩責操操忽心生一計見叔父來詐倒於地作中風之狀叔父驚告嵩嵩急視之操故無恙嵩曰叔言汝中風今已愈乎操曰兒自來無此病因失愛于叔父故見罔耳嵩信其言後叔父但言操過嵩並不聽因此操得恣意放蕩時人有橋玄者謂操曰天下將亂非命世之才不能濟能安之者其在君乎南陽何見操言漢室將亡安天下者必此人也汝南許劭有知人之名操往見之問曰我何如人邵不答又問劭曰子治世之能臣亂世之奸雄也操聞言大喜年二十舉孝廉爲郎除洛陽北部尉初到任即設五色棒十余條於縣之四門有犯禁者不避豪貴皆責之中常侍蹇碩之叔提刀夜行操巡夜拿住就棒責之由是內外莫敢犯者威名頗震後爲頓丘令因黃巾起拜爲騎都尉引馬步軍五千前來潁川助戰正值張梁張寶敗走曹操攔住大殺一陣斬首萬餘級奪得旗幡金鼓馬匹極多張梁張寶死戰得脫操見過皇甫嵩朱隨即引兵追襲張梁張寶去了卻說玄德引關張來潁川聽得喊殺之聲又望見火光燭天急引兵來時賊已敗散玄德見皇甫嵩朱具道盧植之意嵩曰張梁張寶勢窮力乏必投廣宗去依張角玄德可即星夜往助玄德領命遂引兵複回到得半路只見一簇軍馬護送一輛檻車車中之囚乃盧植也玄德大驚滾鞍下馬問其緣故植曰我圍張角將次可破因角用妖術未能即勝朝廷差黃門左豐前來體探問我索取賄賂我答曰軍糧尚缺安有餘錢奉承天使左豐挾恨回奏朝廷說我高壘不戰惰慢軍心因此朝廷震怒遣中郎將董卓來代將我兵取我回京問罪張飛聽罷大怒要斬護送軍人以救盧植玄德急止之曰朝廷自有公論汝豈可造次軍士簇擁盧植去了關公曰盧中郎已被逮別人領兵我等去無所依不如且回涿郡玄德從其言遂引軍北行行無二日忽聞山後喊聲大震玄德引關張縱馬上高岡望之見漢軍大敗後面漫山塞野黃巾蓋地而來旗上大書天公將軍玄德曰此張角也可速戰三人飛馬引軍而出張角正殺敗董卓乘勢趕來忽遇三人衝殺角軍大亂敗走五十餘裏三人救了董卓回寨卓問三人現居何職玄德曰白身卓甚輕之不爲禮玄德出張飛大怒曰我等親赴血戰救了這廝他卻如此無禮若不殺之難消我氣便要提刀入帳來殺董卓正是人情勢利古猶今誰識英雄是白身安得快人如翼德盡誅世上負心人畢竟董卓性命如何且聽下文分解
