body:
  text: 第八回王司徒巧使連環計董太師大鬧鳳儀亭卻說蒯良曰今孫堅已喪其子皆幼乘此虛弱之時火速進軍江東一鼓可得若還屍罷兵容其養成氣力荊州之患也表曰吾有黃祖在彼營中安忍棄之良曰舍一無謀黃祖而取江東有何不可表曰吾與黃祖心腹之交舍之不義遂送桓階回營相約以孫堅屍換黃祖孫策釋回黃祖迎接靈柩罷戰回江東葬父于曲阿之原喪事已畢引軍居江都招賢納士屈己待人四方豪傑漸漸投之不在話下卻說董卓在長安聞孫堅已死乃曰吾除卻一心腹之患也問其子年幾歲矣或答曰十七歲卓遂不以爲意自此愈加驕橫自號爲尚父出入僭天子儀仗封弟董旻爲左將軍鄠侯侄董璜爲侍中總領禁軍董氏宗族不問長幼皆封列侯離長安城二百五十裏別築郿塢役民夫二十五萬人築之其城郭高下厚薄一如長安內蓋宮室倉庫屯積二十年糧食選民間少年美女八百人實其中金玉彩帛珍珠堆積不知其數家屬都住在內卓往來長安或半月一回或一月一回公卿皆候送於橫門外卓常設帳于路與公卿聚飲一日卓出橫門百官皆送卓留宴適北地招安降卒數百人到卓即命於座前或斷其手足或鑿其眼睛或割其舌或以大鍋煮之哀號之聲震天百官戰慄失箸卓飲食談笑自若又一日卓於省台大會百官列坐兩行酒至數巡呂布徑入向卓耳邊言不數句卓笑曰原來如此命呂布筵上揪司空張溫下堂百官失色不多時侍從將一紅盤托張溫頭入獻百官魂不附體卓笑曰諸公勿驚張溫結連袁術欲圖害我因使人寄書來錯下在吾兒奉先處故斬之公等無故不必驚畏衆官唯唯而散司徒王允歸到府中尋思今日席間之事坐不安席至夜深月明策杖步入後園立於荼蘼架側仰天垂淚忽聞有人在牧丹亭畔長籲短歎允潛步窺之乃府中歌伎貂蟬也其女自幼選入府中教以歌舞年方二八色伎俱佳允以親女待之是夜允聽良久喝曰賤人將有私情耶貂蟬驚跪答曰賤妾安敢有私允曰汝無所私何夜深於此長歎蟬曰容妾伸肺腑之言允曰汝勿隱匿當實告我蟬曰妾蒙大人恩養訓習歌舞優禮相待妾雖粉身碎骨莫報萬一近見大人兩眉愁鎖必有國家大事又不敢問今晚又見行坐不安因此長歎不想爲大人窺見倘有用妾之處萬死不辭允以杖擊地曰誰想漢天下卻在汝手中耶隨我到畫閣中來貂蟬跟允到閣中允盡叱出婦妾納貂蟬於坐叩頭便拜貂蟬驚伏於地曰大人何故如此允曰汝可憐漢天下生靈言訖淚如泉湧貂蟬曰適間賤妾曾言但有使令萬死不辭允跪而言曰百姓有倒懸之危君臣有累卵之急非汝不能救也賊臣董卓將欲篡位朝中文武無計可施董卓有一義兒姓呂名布驍勇異常我觀二人皆好色之徒今欲用連環計先將汝許嫁呂布後獻與董卓汝於中取便諜間他父子反顔令布殺卓以絕大惡重扶社稷再立江山皆汝之力也不知汝意若何貂蟬曰妾許大人萬死不辭望即獻妾與彼妾自有道理允曰事若泄漏我滅門矣貂蟬曰大人勿憂妾若不報大義死于萬刃之下允拜謝次日便將家藏明珠數顆令良匠嵌造金冠一頂使人密送呂布布大喜親到王允宅致謝允預備嘉肴美饌候呂布至允出門迎迓接入後堂延之上坐布曰呂布乃相府一將司徒是朝廷大臣何故錯敬允曰方今天下別無英雄惟有將軍耳允非敬將軍之職敬將軍之才也布大喜允殷勤敬酒口稱董太師並布之德不絕布大笑暢飲允叱退左右只留侍妾數人勸酒酒至半酣允曰喚孩兒來少頃二青衣引貂蟬豔妝而出布驚問何人允曰小女貂蟬也允蒙將軍錯愛不異至親故令其與將軍相見便命貂蟬與呂布把盞貂蟬送酒與布兩下眉來眼去允佯醉曰孩兒央及將軍痛飲幾杯吾一家全靠著將軍哩布請貂蟬坐貂蟬假意欲入允曰將軍吾之至友孩兒便坐何妨貂蟬便坐於允側呂布目不轉睛的看又飲數杯允指蟬謂布曰吾欲將此女送與將軍爲妾還肯納否布出席謝曰若得如此布當效犬馬之報允曰早晚選一良辰送至府中布欣喜無限頻以目視貂蟬貂蟬亦以秋波送情少頃席散允曰本欲留將軍止宿恐太師見疑布再三拜謝而去過了數日允在朝堂見了董卓趁呂布不在側伏地拜請曰允欲屈太師車騎到草舍赴宴未審鈞意若何卓曰司徒見招即當趨赴允拜謝歸家水陸畢陳於前廳正中設座錦繡鋪地內外各設幃幔次日晌午董卓來到允具朝服出迎再拜起居卓下車左右持戟甲士百餘簇擁入堂分列兩傍允於堂下再拜卓命扶上賜坐於側允曰太師盛德巍巍伊周不能及也卓大喜進酒作樂允極其致敬天晚酒酣允請卓入後堂卓叱退甲士允捧觴稱賀曰允自幼頗習天文夜觀乾象漢家氣數已盡太師功德振於天下若舜之受堯禹之繼舜正合天心人意卓曰安敢望此允曰自古有道伐無道無德讓有德豈過分乎卓笑曰若果天命歸我司徒當爲元勳允拜謝堂中點上畫燭止留女使進酒供食允曰教坊之樂不足供奉偶有家伎敢使承應卓曰甚妙允教放下簾櫳笙簧繚繞簇捧貂蟬舞於簾外有詞贊之曰原是昭陽宮裏人驚鴻宛轉掌中身只疑飛過洞庭春按徹梁州蓮步穩好花風嫋一枝新畫堂香暖不勝春又詩曰紅牙催拍燕飛忙一片行雲到畫堂眉黛促成遊子恨臉容初斷故人腸榆錢不買千金笑柳帶何須百寶妝舞罷隔簾偷目送不知誰是楚襄王舞罷卓命近前貂蟬入簾內深深再拜卓見貂蟬顔色美麗便問此女何人允曰歌伎貂蟬也卓曰能唱否允命貂蟬執檀板低謳一曲正是一點櫻桃啓絳唇兩行碎玉噴陽春丁香舌吐銜鋼劍要斬奸邪亂國臣卓稱賞不已允命貂蟬把盞卓擎杯問曰青春幾何貂蟬曰賤妾年方二八卓笑曰真神仙中人也允起曰允欲將此女獻上太師未審肯容納否卓曰如此見惠何以報德允曰此女得侍太師其福不淺卓再三稱謝允即命備氈車先將貂蟬送到相府卓亦起身告辭允親送董卓直到相府然後辭回乘馬而行不到半路只見兩行紅燈照道呂布騎馬執戟而來正與王允撞見便勒住馬一把揪住衣襟厲聲問曰司徒既以貂蟬許我今又送與太師何相戲耶允急止之曰此非說話處且請到草舍去布同允到家下馬入後堂敘禮畢允曰將軍何故怪老夫布曰有人報我說你把氈車送貂蟬入相府是何意故允曰將軍原來不知昨日太師在朝堂中對老夫說我有一事明日要到你家允因此準備小宴等候太師飲酒中間說我聞你有一女名喚貂蟬已許吾兒奉先我恐你言未准特來相求並請一見老夫不敢有違隨引貂蟬出拜公公太師曰今日良辰吾即當取此女回去配與奉先將軍試思太師親臨老夫焉敢推阻布曰司徒少罪布一時錯見來日自當負荊允曰小女頗有妝奩待過將軍府下便當送至布謝去次日呂布在府中打聽絕不聞音耗徑入堂中尋問諸侍妾侍妾對曰夜來太師與新人共寢至今未起布大怒潛入卓臥房後窺探時貂蟬起於窗下梳頭忽見窗外池中照一人影極長大頭戴束發冠偷眼視之正是呂布貂蟬故蹙雙眉做憂愁不樂之態複以香羅頻試眼淚呂布窺視良久乃出少頃又入卓已坐于中堂見布來問曰外面無事乎布曰無事侍立卓側卓方食布偷目竊望見繡簾內一女子往來觀覰微露半面以目送情布知是貂蟬神魂飄蕩卓見布如此光景心中疑忌曰奉先無事且退布怏怏而出董卓自納貂蟬後爲色所迷月余不出理事卓偶染小疾貂蟬衣不解帶曲意逢迎卓心愈喜呂布入內問安正值卓睡貂蟬於床後探半身望布以手指心又以手指董卓揮淚不止布心如碎卓朦朧雙目見布注視床後目不轉睛回身一看見貂蟬立於床後卓大怒叱布曰汝敢戲吾愛姬耶喚左右逐出今後不許入堂呂布怒恨而歸路遇李儒告知其故儒急入見卓曰太師欲取天下何故以小過見責溫侯倘彼心變大事去矣卓曰奈何儒曰來朝喚入賜以金帛好言慰之自然無事卓依言次日使人喚布入堂慰之曰吾前日病中心神恍惚誤言傷汝汝勿記心隨賜金十斤錦二十匹布謝歸然身雖在卓左右心實繫念貂蟬卓疾既愈入朝議事布執戟相隨見卓與獻帝共談便乘間提戟出內門上馬徑投相府來系馬府前提戟入後堂尋見貂蟬蟬曰汝可去後園中鳳儀亭邊等我布提戟徑往立于亭下曲欄之傍良久見貂蟬分花拂柳而來果然如月宮仙子泣謂布曰我雖非王司徒親女然待之如己出自見將軍許侍箕帚妾已生平願足誰想太師起不良之心將妾淫汙妾恨不即死止因未與將軍一訣故且忍辱偷生今幸得見妾願畢矣此身已汙不得複事英雄願死於君前以明妾志言訖手攀曲欄望荷花池便跳呂布慌忙抱住泣曰我知汝心久矣只恨不能共語貂蟬手扯布曰妾今生不能與君爲妻願相期於來世布曰我今生不能以汝爲妻非英雄也蟬曰妾度日如年願君憐而救之布曰我今偷空而來恐老賊見疑必當速去蟬牽其衣曰君如此懼怕老賊妾身無見天日之期矣布立住曰容我徐圖良策語罷提戟欲去貂蟬曰妾在深閨聞將軍之名如雷灌耳以爲當世一人而已誰想反受他人之制乎言訖淚下如雨布羞慚滿面重復倚戟回身摟抱貂蟬用好言安慰兩個偎偎倚倚不忍相離卻說董卓在殿上回頭不見呂布心中懷疑連忙辭了獻帝登車回府見布馬系於府前問門吏吏答曰溫侯入後堂去了卓叱退左右徑入後堂中尋覓不見喚貂蟬蟬亦不見急問侍妾侍妾曰貂蟬在後園看花卓尋入後園正見呂布和貂蟬在鳳儀亭下共語畫戟倚在一邊卓怒大喝一聲布見卓至大驚回身便走卓搶了畫戟挺著趕來呂布走得快卓肥胖趕不上擲戟刺布布打戟落地卓拾戟再趕布已走遠卓趕出園門一人飛奔前來與卓胸膛相撞卓倒於地正是沖天怒氣高千丈仆地肥軀做一堆未知此人是誰且聽下文分解
