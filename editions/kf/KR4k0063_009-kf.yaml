body:
  text: 第九回除暴凶呂布助司徒犯長安李傕聽賈詡卻說那撞倒董卓的人正是李儒當下李儒扶起董卓至書院中坐定卓曰汝爲何來此儒曰儒適至府門知太師怒入後園尋問呂布因急走來正遇呂布奔走雲太師殺我儒慌趕入園中勸解不意誤撞恩相死罪死罪卓曰叵耐逆賊戲吾愛姬誓必殺之儒曰恩相差矣昔楚莊王絕纓之會不究戲愛姬之蔣雄後爲秦兵所困得其死力相救今貂蟬不過一女子而呂布乃太師心腹猛將也太師若就此機會以蟬賜布布感大恩必以死報太師太師請自三思卓沈吟良久曰汝言亦是我當思之儒謝而出卓入後堂喚貂蟬問曰汝何與呂布私通耶蟬泣曰妾在後園看花呂布突至妾方驚避布曰我乃太師之子何必相避提戟趕妾至鳳儀亭妾見其心不良恐爲所逼欲投荷池自盡卻被這廝抱住正在生死之間得太師來救了性命董卓曰我今將汝賜與呂布何如貂蟬大驚哭曰妾身已事貴人今忽欲下賜家奴妾甯死不辱遂掣壁間寶劍欲自刎卓慌奪劍擁抱曰吾戲汝貂蟬倒于卓懷掩面大哭曰此必李儒之計也儒與布交厚故設此計卻不顧惜太師體面與賤妾性命妾當生噬其肉卓曰吾安忍舍汝耶蟬曰雖蒙太師憐愛但恐此處不宜久居必被呂布所害卓曰吾明日和你歸郿塢去同受快樂慎勿憂疑蟬方收淚拜謝次日李儒入見曰今日良辰可將貂蟬送與呂布卓曰布與我有父子之分不便賜與我只不究其罪汝傳我意以好言慰之可也儒曰太師不可爲婦人所惑卓變色曰汝之妻肯與呂布否貂蟬之事再勿多言言則必斬李儒出仰天歎曰吾等皆死於婦人之手矣後人讀書至此有詩歎之曰司徒妙算托紅裙不用干戈不用兵三戰虎牢徒費力凱歌卻奏鳳儀亭董卓即日下令還郿塢百官俱拜送貂蟬在車上遙見呂布於稠人之內眼望車中貂蟬虛掩其面如痛哭之狀車已去遠布緩轡於土岡之上眼望車塵歎惜痛恨忽聞背後一人問曰溫侯何不從太師去乃在此遙望而發歎布視之乃司徒王允也相見畢允曰老夫日來因染微恙閉門不出故久未得與將軍一見今日太師駕歸郿塢只得扶病出送卻喜得晤將軍請問將軍爲何在此長歎布曰正爲公女耳允佯驚曰許多時尚未與將軍耶布曰老賊自寵倖久矣允佯大驚曰不信有此事布將前事一一告允允仰面跌足半晌不語良久乃言曰不意太師作此禽獸之行因挽布手曰且到寒舍商議布隨允歸允延入密室置酒款待布又將鳳儀亭相遇之事細述一遍允曰太師淫吾之女奪將軍之妻誠爲天下恥笑非笑太師笑允與將軍耳然允老邁無能之輩不足爲道可惜將軍蓋世英雄亦受此污辱也布怒氣衝天拍案大叫允急曰老夫失語將軍息怒布曰誓當殺此老賊以雪吾恥允急掩其口曰將軍勿言恐累及老夫布曰大丈夫生居天地間豈能鬱鬱久居人下允曰以將軍之才誠非董太師所可限制布曰吾欲殺此老賊奈是父子之情恐惹後人議論允微笑曰將軍自姓呂太師自姓董擲戟之時豈有父子情耶布奮然曰非司徒言布幾自誤允見其意已決便說之曰將軍若扶漢室乃忠臣也青史傳名流芳百世將軍若助董卓乃反臣也載之史筆遺臭萬年布避席下拜曰布意已決司徒勿疑允曰但恐事或不成反招大禍布拔帶刀刺臂出血爲誓允跪謝曰漢祀不斬皆出將軍之賜也切勿泄漏臨期有計自當相報布慨諾而去允即請仆射士孫瑞司隸校尉黃琬商議瑞曰方今主上有疾新愈可遣一能言之人往郿塢請卓議事一面以天子密詔付呂布使伏甲兵於朝門之內引卓入誅之此上策也琬曰何人敢去瑞曰呂布同郡騎都尉李肅以董卓不遷其官甚是懷怨若令此人去卓必不疑允曰善請呂布共議布曰昔日勸吾殺丁建陽亦此人也今若不去吾先斬之使人密請肅至布曰昔日公說布使殺丁建陽而投董卓今卓上欺天子下虐生靈罪惡貫盈人神共憤公可傳天子詔往郿塢宣卓入朝伏兵誅之力扶漢室共作忠臣尊意若何肅曰我亦欲除此賊久矣恨無同心者耳今將軍若此是天賜也肅豈敢有二心遂折箭爲誓允曰公若能幹此事何患不得顯官次日李肅引十數騎前到郿塢人報天子有詔卓教喚入李肅入拜卓曰天子有何詔肅曰天子病體新痊欲會文武於未央殿議將禪位於太師故有此詔卓曰王允之意若何肅曰王司徒已命人築受禪台只等主公到來卓大喜曰吾夜夢一龍罩身今日果得此喜信時哉不可失便命心腹將李傕郭汜張濟樊稠四人領飛熊軍三千守郿塢自己即日排駕回京顧謂李肅曰吾爲帝汝當爲執金吾肅拜謝稱臣卓入辭其母母時年九十餘矣問曰吾兒何往卓曰兒將往受漢禪母親早晚爲太后也母曰吾近日肉顫心驚恐非吉兆卓曰將爲國母豈不預有驚報遂辭母而行臨行謂貂蟬曰吾爲天子當立汝爲貴妃貂蟬已明知就裏假作歡喜拜謝卓出塢上車前遮後擁望長安來行不到三十裏所乘之車忽折一輪卓下車乘馬又行不到十裏那馬咆哮嘶喊掣斷轡頭卓問肅曰車折輪馬斷轡其兆若何肅曰乃太師應紹漢禪棄舊換新將乘玉輦金鞍之兆也卓喜而信其言次日正行間忽然狂風驟起昏霧蔽天卓問肅曰此何祥也肅曰主公登龍位必有紅光紫霧以壯天威耳卓又喜而不疑既至城外百官俱出迎接只有李儒抱病在家不能出迎卓進至相府呂布入賀卓曰吾登九五汝當總督天下兵馬布拜謝就帳前歇宿是夜有十數小兒于郊外作歌風吹歌聲入帳歌曰千里草何青青十日蔔不得生歌聲悲切卓問李肅曰童謠主何吉凶肅曰亦只是言劉氏滅董氏興之意次日侵晨董卓擺列儀從入朝忽見一道人青袍白巾手執長竿上縛布一丈兩頭各一口字卓問肅曰此道人何意肅曰乃心恙之人也呼將士驅去卓進朝群臣各具朝服迎謁於道李肅手執寶劍扶車而行到北掖門軍兵盡擋在門外獨有禦車二十餘人同入董卓遙見王允等各執寶劍立於殿門驚問肅曰持劍是何意肅不應推車直入王允大呼曰反賊至此武士何在兩旁轉出百餘人持戟挺槊刺之卓衷甲不入傷臂墮車大呼曰吾兒奉先何在呂布從車後厲聲出曰有詔討賊一戟直透咽喉李肅早割頭在手呂布左手持戟右手懷中取詔大呼曰奉詔討賊臣董卓其餘不問將吏皆呼萬歲後人有詩歎董卓曰霸業成時爲帝王不成且作富家郎誰知天意無私曲郿塢方成已滅亡卻說當下呂布大呼曰助卓爲虐者皆李儒也誰可擒之李肅應聲願往忽聽朝門外發喊人報李儒家奴已將李儒綁縛來獻王允命縛赴市曹斬之又將董卓屍首號令通衢卓屍肥胖看屍軍士以火置其臍中爲燈膏流滿地百姓過者莫不手擲其頭足踐其屍王允又命呂布同皇甫嵩李肅領兵五萬至郿塢抄籍董卓家產人口卻說李傕郭汜張濟樊稠聞董卓已死呂布將至便引了飛熊軍連夜奔涼州去了呂布至郿塢先取了貂蟬皇甫嵩命將塢中所藏良家子女盡行釋放但系董卓親屬不分老幼悉皆誅戮卓母亦被殺卓弟董旻侄董璜皆斬首號令收籍塢中所蓄黃金數十萬白金數百萬綺羅珠寶器皿糧食不計其數回報王允允乃大犒軍士設宴于都堂召集衆官酌酒稱慶正飲宴間忽人報曰董卓暴屍於市忽有一人伏其屍而大哭允怒曰董卓伏誅士民莫不稱賀此何人獨敢哭耶遂喚武士與吾擒來須臾擒至衆官見之無不驚駭原來那人不是別人乃侍中蔡邕也允叱曰董卓逆賊今日伏誅國之大幸汝爲漢臣乃不爲國慶反爲賊哭何也邕伏罪曰邕雖不才亦知大義豈肯背國而向卓只因一時知遇之感不覺爲之一哭自知罪大願公見原倘得黥首刖足使續成漢史以贖其辜邕之幸也衆官惜邕之才皆力救之太傅馬日石單亦密謂允曰伯喈曠世逸才若使續成漢史誠爲盛事且其孝行素著若遽殺之恐失人望允曰昔孝武不殺司馬遷後使作史遂致謗書流於後世方今國運衰微朝政錯亂不可令佞臣執筆於幼主左右使吾等蒙其訕議也日石單無言而退私謂衆官曰王允其無後乎善人國之紀也製作國之典也滅紀廢典豈能久乎當下王允不聽馬日石單之言命將蔡邕下獄中縊死一時士大會聞者盡爲流涕後人論蔡邕之哭董卓固自不是允之殺之亦爲已甚有詩歎曰董卓專權肆不仁侍中何自竟亡身當時諸葛隆中臥安肯輕身事亂臣且說李傕郭汜張濟樊稠逃居陝西使人至長安上表求赦王允曰卓之跋扈皆此四人助之今雖大赦天下獨不赦此四人使者回報李傕傕曰求赦不得各自逃生可也謀士賈詡曰諸君若棄軍單行則一亭長能縛君矣不若誘集陝人並本部軍馬殺入長安與董卓報仇事濟奉朝廷以正天下若其不勝走亦未遲傕等然其說遂流言於西涼州曰王允將欲洗蕩此方之人矣衆皆驚惶乃複揚言曰徒死無益能從我反乎衆皆願從於是聚衆十余萬分作四路殺奔長安來路逢董卓女婿中郎將牛輔引軍五千人欲去與丈人報仇李傕便與合兵使爲前驅四人陸續進發王允聽知西涼兵來與呂布商議布曰司徒放心量此鼠輩何足數也遂引李肅將兵出敵肅當先迎戰正與牛輔相遇大殺一陣牛輔抵敵不過敗陣而去不想是夜二更牛輔乘肅不備竟來劫寨肅軍亂竄敗走三十餘裏折軍大半來見呂布布大怒曰汝何挫吾銳氣遂斬李肅懸頭軍門次日呂布進兵與牛輔對敵量牛輔如何敵得呂布仍複大敗而走是夜牛輔喚心腹人胡赤兒商議曰呂布驍勇萬不能敵不如瞞了李傕等四人暗藏金珠與親隨三五人棄軍而去胡赤兒應允是夜收拾金珠棄營而走隨行者三四人將渡一河赤兒欲謀取金珠竟殺死牛輔將頭來獻呂布布問起情由從人出首胡赤兒謀殺牛輔奪其金寶布怒即將赤兒誅殺領軍前進正迎著李傕軍馬呂布不等他列陣便挺戟躍馬麾軍直沖過來傕軍不能抵當退走五十餘裏依山下寨請郭汜張濟樊稠共議曰呂布雖勇然而無謀不足爲慮我引軍守住穀口每日誘他廝殺郭將軍可領軍抄擊其後效彭越撓楚之法鳴金進兵擂鼓收兵張樊二公卻分兵兩路徑取長安彼首尾不能救應必然大敗衆用其計卻說呂布勒兵到山下李傕引軍搦戰布忿怒衝殺過去傕退走上山山上矢石如雨布軍不能進忽報郭汜在陣後殺來布急回戰只聞鼓聲大震汜軍已退布方欲收軍鑼聲響處傕軍又來未及對敵背後郭汜又領軍殺到及至呂布來時卻又擂鼓收軍去了激得呂布怒氣填胸一連如此幾日欲戰不得欲止不得正在惱怒忽然飛馬報來說張濟樊稠兩路軍馬竟犯長安京城危急布急領軍回背後李傕郭汜殺來布無心戀戰只顧奔走折了好些人馬比及到長安城下賊兵雲屯雨集圍定城池布軍與戰不利軍士畏呂布暴厲多有降賊者布心甚憂數日之後董卓餘黨李蒙王方在城中爲賊內應偷開城門四路賊軍一齊擁入呂布左沖右突攔擋不住引數百騎往青瑣門外呼王允曰勢急矣請司徒上馬同出關去別圖良策允曰若蒙社稷之靈得安國家吾之願也若不獲已則允奉身以死臨難苟免吾不爲也爲我謝關東諸公努力以國家爲念呂布再三相勸王允只是不肯去不一時各門火焰竟天呂布只得棄卻家小引百餘騎飛奔出關投袁術去了李傕郭汜縱兵大掠太常卿種拂太仆魯馗大鴻臚周奐城門校尉崔烈越騎校尉王頎皆死於國難賊兵圍繞內庭至急侍臣請天子上宣平門止亂李傕等望見黃蓋約住軍士口呼萬歲獻帝倚樓問曰卿不候奏請輒入長安意欲何爲李傕郭汜仰面奏曰董太師乃陛下社稷之臣無端被王允謀殺臣等特來報仇非敢造反但見王允臣便退兵王允時在帝側聞知此言奏曰臣本爲社稷計事已至此陛下不可惜臣以誤國家臣請下見二賊帝徘徊不忍允自宣平門樓上跳下樓去大呼曰王允在此李傕郭汜拔劍叱曰董太師何罪而見殺允曰董賊之罪彌天亙地不可勝言受誅之日長安士民皆相慶賀汝獨不聞乎傕汜曰太師有罪我等何罪不肯相赦王允大罵逆賊何必多言我王允今日有死而已二賊手起把王允殺於樓下史官有詩贊曰王允運機籌奸臣董卓休心懷家國恨眉鎖廟堂憂英氣連霄漢忠誠貫鬥牛至今魂與魄猶繞鳳凰樓衆賊殺了王允一面又差人將王允宗族老幼盡行殺害士民無不下淚當下李傕郭汜尋思曰既到這裏不殺天子謀大事更待何時便持劍大呼殺入內來正是巨魁伏罪災方息從賊縱橫禍又來未知獻帝性命如何且聽下文分解
