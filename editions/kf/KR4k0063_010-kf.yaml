body:
  text: 第十回勤王室馬騰舉義報父仇曹操興師卻說李郭二賊欲弑獻帝張濟樊稠諫曰不可今日若便殺之恐衆人不服不如仍舊奉之爲主賺諸侯入關先去其羽翼然後殺之天下可圖也李郭二人從其言按住兵器帝在樓上宣諭曰王允既誅軍馬何故不退李傕郭汜曰臣等有功王室未蒙賜爵故不敢退軍帝曰卿欲封何爵李郭張樊四人各自寫職銜獻上勒要如此官品帝只得從之封李傕爲車騎將軍池陽侯領司隸校尉假節鉞郭汜爲後將軍美陽侯假節鉞同秉朝政樊稠爲右將軍萬年侯張濟爲驃騎將軍平陽侯領兵屯弘農其餘李蒙王方等各爲校尉然後謝恩領兵出城又下令追尋董卓屍首獲得些零碎皮骨以香木雕成形體安湊停當大設祭祀用王者衣冠棺槨選擇吉日遷葬郿塢臨葬之期天降大雷雨平地水深數尺霹靂震開其棺屍首提出棺外李傕候睛再葬是夜又複如是三次改葬皆不能葬零皮碎骨悉爲雷火消滅天之怒卓可謂甚矣且說李傕郭汜既掌大權殘虐百姓密遣心腹侍帝左右觀其動靜獻帝此時舉動荊棘朝廷官員並由二賊升降因采人望特宣朱雋入朝封爲太仆同領朝政一日人報西涼太守馬騰並州刺史韓遂二將引軍十余萬殺奔長安來聲言討賊原來二將先曾使人入長安結連侍中馬宇諫議大會種邵左中郎將劉范三人爲內應共謀賊黨三人密奏獻帝封馬騰爲征西將軍韓遂爲鎮西將軍各受密詔並力討賊當下李傕郭汜張濟樊稠聞二軍將至一同商議禦敵之策謀士賈詡曰二軍遠來只宜深溝高壘堅守以拒之不過百日彼兵糧盡必將自退然後引兵追之二將可擒矣李蒙王方出曰此非好計願借精兵萬人立斬馬騰韓遂之頭獻於麾下賈詡曰今若即戰必當敗績李蒙王方齊聲曰若吾二人敗情願斬首吾若戰勝公亦當輸首級與我詡謂李傕郭汜曰長安西二百里盩厔山其路險峻可使張樊兩將軍屯兵于此堅壁守之待李蒙王方自引兵迎敵可也李傕郭汜從其言點一萬五千人馬與李蒙王方二人忻喜而去離長安二百八十裏下寨西涼兵到兩個引軍迎去西涼軍馬攔路擺開陣勢馬騰韓遂聯轡而出指李蒙王方罵曰反國之賊誰去擒之言未絕只見一位少年將軍面如冠玉眼若流星虎體猿臂彪腹狼腰手執長槍坐騎駿馬從陣中飛出原來那將即馬騰之子馬超字孟起年方十七歲英勇無敵王方欺他年幼躍馬迎戰戰不到數合早被馬超一槍刺于馬下馬超勒馬便回李蒙見王方刺死一騎馬從馬超背後趕來超只做不知馬騰在陣門下大叫背後有人追趕聲猶未絕只見馬超已將李蒙擒在馬上原來馬超明知李蒙追趕卻故意俄延等他馬近舉槍刺來超將身一閃李蒙搠個空兩馬相並被馬超輕舒猿臂生擒過去軍士無主望風奔逃馬騰韓遂乘勢追殺大獲勝捷直逼隘口下寨把李蒙斬首號令李傕郭汜聽知李蒙王方皆被馬超殺了方信賈詡有先見之明重用其計只理會緊守關防由他搦戰並不出迎果然西涼軍未及兩月糧草俱乏商議回軍恰好長安城中馬宇家僮出首家主與劉范種邵外連馬騰韓遂欲爲內應等情李傕郭汜大怒盡收三家老少良賤斬於市把三顆首級直來門前號令馬騰韓遂見軍糧已盡內應又泄只得拔寨退軍李傕郭汜令張濟引軍趕馬騰樊稠引軍趕韓遂西涼軍大敗馬超在後死戰殺退張濟樊稠去趕韓遂看看趕上相近陳倉韓遂勒馬向樊稠曰吾與公乃同鄉之人今日何太無情樊稠也勒住馬答道上命不可違韓遂曰吾此來亦爲國家耳公何相逼之甚也樊稠聽罷撥轉馬頭收兵回寨讓韓遂去了不提防李傕之侄李別見樊稠放走韓遂回報其叔李傕大怒便欲興兵討樊稠賈詡曰目今人心未寧頻動干戈深爲不便不若設一宴請張濟樊稠慶功就席間擒稠斬之毫不費力李傕大喜便設宴請張濟樊稠二將忻然赴宴酒半闌李傕忽然變色曰樊稠何故交通韓遂欲謀造反稠大驚未及回言只見刀斧手擁出早把樊稠斬首於案下嚇得張濟俯伏於地李傕扶起曰樊稠謀反故爾誅之公乃吾之心腹何須驚懼將樊稠軍撥與張濟管領張濟自回弘農去了李傕郭汜自戰敗西涼兵諸侯莫敢誰何賈詡屢勸撫安百姓結納賢豪自是朝延微有生意不想青州黃巾又起聚衆數十萬頭目不等劫掠良民太仆朱雋保舉一人可破群賊李傕郭汜問是何人朱雋曰要破山東群賊非曹孟德不可李傕曰孟德今在何處雋曰現爲東郡太守廣有軍兵若命此人討賊賊可克日而破也李傕大喜星夜草詔差人齎往東郡命曹操與濟北相鮑信一同破賊操領了聖旨會合鮑信一同興兵擊賊于壽陽鮑信殺入重地爲賊所害操追趕賊兵直到濟北降者數萬操即用賊爲前驅兵馬到處無不降順不過百餘日招安到降兵三十余萬男女百余萬口操擇精銳者號爲青州兵其餘盡令歸農操自此威名日重捷書報到長安朝廷加曹操爲鎮東將軍操在兗州招賢納士有叔侄二人來投操乃潁川潁陰人姓荀名彧字文若荀緄之子也舊事袁紹今棄紹投操操與語大悅曰此吾之子房也遂以爲行軍司馬其侄荀攸字公達海內名士曾拜黃門侍郎後棄官歸鄉今與其叔同投曹操操以爲行軍教授荀彧曰某聞兗州有一賢士今此人不知何在操問是誰彧曰乃東郡東阿人姓程名昱字仲德操曰吾亦聞名久矣遂遣人於鄉中尋問訪得他在山中讀書操拜請之程昱來見曹操大喜昱謂荀彧曰某孤陋寡聞不足當公之薦公之鄉人姓郭名嘉字奉孝乃當今賢士何不羅而致之彧猛省曰吾幾忘卻遂啓操徵聘郭嘉到兗州共論天下之事郭嘉薦光武嫡派子孫淮南成德人姓劉名曄字子陽操即聘曄至曄又薦二人一個是山陽昌邑人姓滿名寵字伯甯一個是任城人姓呂名虔字子恪曹操亦素知這兩個名譽就聘爲軍中從事滿寵呂虔共薦一人乃陳留平邱人姓毛名玠字孝先曹操亦聘爲從事又有一將引軍數百人來投曹操乃泰山巨平人姓於名禁字文則操見其人弓馬熟嫻武藝出衆命爲點軍司馬一日夏侯惇引一大漢來見操問何人惇曰此乃陳留人姓典名韋勇力過人舊跟張邈與帳下人不和手殺數十人逃竄山中惇出射獵見韋逐虎過澗因收於軍中今特薦之於公操曰吾觀此人容貌魁梧必有勇力惇曰他曾爲友報仇殺人提頭直出鬧市數百人不敢近只今所使兩枝鐵戟重八十斤挾之上馬運使如飛操即令韋試之韋挾戟驟馬往來馳騁忽見帳下大旗爲風所吹岌岌欲倒衆軍士挾持不定韋下馬喝退衆軍一手執定旗杆立於風中巍然不動操曰此古之惡來也遂命爲帳前都尉解身上錦襖及駿馬雕鞍賜之自是曹操部下文有謀臣武有猛將威鎮山東乃遣泰山太守應劭往琅琊郡取父曹嵩嵩自陳留避難隱居琅琊當日接了書信便與弟曹德及一家老小四十餘人帶從者百餘人車百餘輛徑望兗州而來道經徐州太守陶謙字恭祖爲人溫厚純篤向欲結納曹操正無其由知操父經過遂出境迎接再拜致敬大設筵宴款待兩日曹嵩要行陶謙親送出郭特差都尉張闓將部兵五百護送曹嵩率家小行到華費間時夏末秋初大雨驟至只得投一古寺歇宿寺僧接入嵩安頓家小命張闓將軍馬屯于兩廊衆軍衣裝都被雨打濕同聲嗟怨張闓喚手下頭目于靜處商議曰我們本是黃巾餘黨勉強降順陶謙未有好處如今曹家輜重車輛無數你們欲得富貴不難只就今夜三更大家砍將入去把曹嵩一家殺了取了財物同往山中落草此計何如衆皆應允是夜風雨未息曹嵩正坐忽聞四壁喊聲大舉曹德提劍出看就被搠死曹嵩忙引一妾奔入方丈後欲越牆而走妾肥胖不能出嵩慌急與妾躲於廁中被亂軍所殺應劭死命逃脫投袁紹去了張闓殺盡曹嵩全家取了財物放火燒寺與五百人逃奔淮南去了後人有詩曰曹操奸雄世所誇曾將呂氏殺全家如今闔戶逢人殺天理迴圈報不差當下應劭部下有逃命的軍士報與曹操操聞之哭倒於地衆人救起操切齒曰陶謙縱兵殺吾父此仇不共戴天吾今悉起大軍洗蕩徐州方雪吾恨遂留荀彧程昱領軍三萬守鄄城範縣東阿三縣其餘盡殺奔徐州來夏侯惇于禁典韋爲先鋒操令但得城池將城中百姓盡行屠戮以雪父仇當有九江太守邊讓與陶謙交厚聞知徐州有難自引兵五千來救操聞之大怒使夏侯惇于路截殺之時陳宮爲東郡從事亦與陶謙交厚聞曹操起兵報仇欲盡殺百姓星夜前來見操操知是爲陶謙作說客欲待不見又滅不過舊恩只得請入帳中相見宮曰今聞明公以大兵臨徐州報尊父之仇所到欲盡殺百姓某因此特來進言陶謙乃仁人君子非好利忘義之輩尊父遇害乃張闓之惡非謙罪也且州縣之民與明公何仇殺之不祥望三思而行操怒曰公昔棄我而去今有何面目複來相見陶謙殺吾一家誓當摘膽剜心以雪吾恨公雖爲陶謙遊說其如吾不聽何陳宮辭出歎曰吾亦無面目見陶謙也遂馳馬投陳留太守張邈去了且說操大軍所到之處殺戮人民發掘墳墓陶謙在徐州聞曹操起軍報仇殺戮百姓仰天慟哭曰我獲罪於天致使徐州之民受此大難急聚衆官商議曹豹曰曹兵既至豈可束手待死某願助使君破之陶謙只得引兵出迎遠望操軍如鋪霜湧雪中軍豎起白旗二面大書報仇雪恨四字軍馬列成陣勢曹操縱馬出陣身穿縞素揚鞭大罵陶謙亦出馬於門旗下欠身施禮曰謙本欲結好明公故托張闓護送不想賊心不改致有此事實不幹陶謙之故望明公察之操大罵曰老匹夫殺吾父尚敢亂言誰可生擒老賊夏侯惇應聲而出陶謙慌走入陣夏侯琅趕來曹豹挺槍躍馬前來迎敵兩馬相交忽然狂風大作飛沙走石兩軍皆亂各自收兵陶謙入城與衆計議曰曹兵勢大難敵吾當自縛往操營任其剖割以救徐州百姓之命言未絕一人進前言曰府君久鎮徐州人民感恩今曹兵雖衆未能即破我城府君與百姓堅守勿出某雖不才願施小策教曹操死無葬身之地衆人大驚便問計將安出正是本爲納交反成怨那知絕處又逢生畢竟此人是誰且聽下文分解
