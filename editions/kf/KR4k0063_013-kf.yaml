body:
  text: 第十三回李傕郭汜大交兵楊奉董承雙救駕卻說曹操大破呂布于定陶布乃收集敗殘軍馬于海濱衆將皆來會集欲再與曹操決戰陳宮曰今曹兵勢大未可與爭先尋取安身之地那時再來未遲布曰吾欲再投袁紹何如宮曰先使人往冀州探聽消息然後可去布從之且說袁紹在冀州聞知曹操與呂布相持謀士審配進曰呂布豺虎也若得兗州必圖冀州不若助操攻之方可無患紹遂遣顔良將兵五萬往助曹操細作探知這個消息飛報呂布布大驚與陳宮商議宮曰聞劉玄德新領徐州可往投之布從其言竟投徐州來有人報知玄德玄德曰布乃當今英勇之士可出迎之糜竺曰呂布乃虎狼之徒不可收留收則傷人矣玄德曰前者非布襲兗州怎解此郡之禍今彼窮而投我豈有他心張飛曰哥哥心腸忒好雖然如此也要準備玄德領衆出城三十裏接著呂布並馬入城都到州衙廳上講禮畢坐下布曰某自與王司徒計殺董卓之後又遭傕汜之變飄零關東諸侯多不能相容近因曹賊不仁侵犯徐州蒙使君力救陶謙布因襲兗州以分其勢不料反墮奸計敗兵折將今投使君共圖大事未審尊意如何玄德曰陶使君新逝無人管領徐州因令備權攝州事今幸將軍至此合當相讓遂將牌印送與呂布呂布卻待要接只見玄德背後關張二公各有怒色布乃佯笑曰量呂布一勇夫何能作州牧乎玄德又讓陳宮曰強賓不壓主請使君勿疑玄德方止遂設宴相待收拾宅院安下次日呂布回席請玄德玄德乃與關張同往飲酒至半酣布請玄德入後堂關張隨入布令妻女出拜玄德玄德再三謙讓布曰賢弟不必推讓張飛聽了瞋目大叱曰我哥哥是金枝玉葉你是何等人敢稱我哥哥爲賢弟你來我和你鬥三百合玄德連忙喝住關公勸飛出玄德與呂布陪話曰劣弟酒後狂言兄勿見責布默然無語須臾席散布送玄德出門張飛躍馬橫槍而來大叫呂布我和你並三百合玄德急令關公勸止次日呂布來辭玄德曰蒙使君不棄但恐令弟輩不能相容布當別投他處玄德曰將軍若去某罪大矣劣弟冒犯另日當令陪話近邑小沛乃備昔日屯兵之處將軍不嫌淺狹權且歇馬如何糧食軍需謹當應付呂布謝了玄德自引軍投小沛安身去了玄德自去埋怨張飛不題卻說曹操平了山東表奏朝廷加操爲建德將軍費亭侯其時李傕自爲大司馬郭汜自爲大將軍橫行無忌朝廷無人敢言太尉楊彪大司農朱雋暗奏獻帝曰今曹操擁兵二十余萬謀臣武將數十員若得此人扶持社稷剿除奸黨天下幸甚獻帝泣曰朕被二賊欺淩久矣若得誅之誠爲大幸彪奏曰臣有一計先令二賊自相殘害然後詔曹操引兵殺之掃清賊党以安朝廷獻帝曰計將安出彪曰聞郭汜之妻最妒可令人于汜妻處用反間計則二賊自相害矣帝乃書密詔付楊彪彪即暗使夫人以他事入郭汜府乘間告汜妻曰聞郭將軍與李司馬夫人有染其情甚密倘司馬知之必遭其害夫人宜絕其往來爲妙汜妻訝曰怪見他經宿不歸卻幹出如此無恥之事非夫人言妾不知也當慎防之彪妻告歸汜事再三稱謝而別過了數日郭汜又將往李傕府中飲宴妻曰傕性不測況今兩雄不並立倘彼酒後置毒妾將奈何汜不肯聽妻再三勸住至晚間傕使人送酒筵至汜妻乃暗置毒于中方始獻入汜便欲食妻曰食自外來豈可便食乃先與犬試之犬立死自此汜心懷疑一日朝罷李傕力邀郭汜赴家飲宴至夜席散汜醉而歸偶然腹痛妻曰必中其毒矣急令將糞汁灌之一吐方定汜大怒曰吾與李傕共圖大事今無端欲謀害我我不先發必遭毒手遂密整本部甲兵欲攻李傕早有人報知傕傕亦大怒曰郭阿多安敢如此遂點本部甲兵來殺郭汜兩處合兵數萬就在長安城下混戰乘勢擄掠居民傕侄李暹引兵圍住宮院用車二乘一乘載天子一乘載伏皇后使賈詡左靈監押車駕其餘宮人內侍並皆步走擁出後宰門正遇郭汜兵到亂箭齊發射死宮人不知其數李傕隨後掩殺郭汜兵退車駕冒險出城不由分說竟擁到李傕營中郭汜領兵入宮盡搶擄宮嬪采女入營放火燒宮殿次日郭汜知李傕劫了天子領軍來營前廝殺帝後都受驚恐後人有詩歎之曰光武中興興漢世上下相承十二帝桓靈無道宗社墮閹臣擅權爲叔季無謀何進作三公欲除社鼠招奸雄豺獺雖驅虎狼入西州逆豎生淫凶王允赤心托紅粉致令董呂成矛盾渠魁殄滅天下甯誰知李郭心懷憤神州荊棘爭奈何六宮饑饉愁干戈人心既離天命去英雄割據分山河後王規此存兢業莫把金甌等閒缺生靈糜爛肝腦塗剩水殘山多怨血我觀遺史不勝悲今古茫茫歎黍離人君當守苞桑戒太阿誰執全綱維卻說郭汜兵到李傕出營接戰汜軍不利暫且退去傕乃移帝後車駕於郿塢使侄李暹監之斷絕內使飲食不繼侍臣皆有饑色帝令人問傕取米五斛牛骨五具以賜左右傕怒曰朝夕上飯何又他求乃以腐肉朽糧與之皆臭不可食帝罵曰逆賊直如此相欺侍中楊琦急奏曰傕性殘暴事勢至此陛下且忍之不可攖其鋒也帝乃低頭無語淚盈袍袖忽左右報曰有一路軍馬槍刀映日金鼓震天前來救駕帝教打聽是誰乃郭汜也帝心轉憂只聞塢外喊聲大起原來李傕引兵出迎郭汜鞭指郭汜而罵曰我待你不薄你如何謀害我汜曰爾乃反賊如何不殺你傕曰我保駕在此何爲反賊汜曰此乃劫駕何爲保駕傕曰不須多言我兩個各不許用軍士只自並輸贏贏的便把皇帝取去罷了二人便就陣前廝殺戰到十合不分勝負只見楊彪拍馬而來大叫二位將軍少歇老夫特邀衆官來與二位講和傕汜乃各自還營楊彪與朱雋會合朝廷官僚六十余人先詣郭汜營中勸和郭汜竟將衆官盡行監下衆官曰我等爲好而來何乃如此相待汜曰李傕劫天子偏我劫不得公卿楊彪曰一劫天子一劫公卿意欲何爲汜大怒便拔劍欲殺彪中郎將楊密力勸汜乃放了楊彪朱雋其餘都監在營中彪謂雋曰爲社稷之臣不能匡君救主空生天地間耳言訖相抱而哭昏絕於地雋歸家成病而死自此之後傕汜每日廝殺一連殺五十余日死者不知其數卻說李傕平日最喜左道妖邪之術常使女巫擊鼓降神於軍中賈詡屢諫不聽侍中楊琦密奏帝曰臣觀賈詡雖爲李傕腹心然實未嘗忘君陛下當與謀之正說之間賈詡來到帝乃屏退左右泣諭詡曰卿能憐漢朝救朕命乎詡拜伏於地曰固臣所願也陛下且勿言臣自圖之帝收淚而謝少頃李傕來見帶劍而入帝面如土色傕謂帝曰郭汜不臣監禁公卿欲劫陛下非臣則駕被擄矣帝拱手稱謝傕乃出時皇甫酈入見帝帝知酈能言又與李傕同鄉詔使往兩邊解和酈奉詔走至汜營說汜汜曰如李傕送出天子我便放出公卿酈即來見李傕曰今天子以某是西涼人與公同鄉特令某來勸和二公汜已奉詔公意若何傕曰吾有敗呂布之大功輔政四年多著勳績天下共知郭阿多盜馬賊耳乃敢擅劫公卿與我相抗誓必誅之君試觀我方略士衆足勝郭阿多否酈答曰不然昔有窮後羿恃其善射不思患難以致滅亡近董太師之強君所目見也呂布受恩而反圖之斯須之間頭懸國門則強固不足恃矣將軍身爲上將持鉞仗節子孫宗族皆居顯位國恩不可謂不厚今郭阿多劫公卿而將軍劫至尊果誰輕誰重耶李傕大怒拔劍叱曰天子使汝來辱我乎我先斬汝頭騎都尉楊奉諫曰今郭汜未除而殺天使則汜興兵有名諸侯皆助之矣賈詡亦力勸傕怒少息詡遂推皇甫酈出酈大叫曰李傕不奉詔欲弑君自立侍中胡邈急止之曰無出此言恐於身不利酈叱之曰胡敬才汝亦爲朝廷之臣如何附賊君辱臣死吾被李傕所殺乃分也大罵不止帝知之急令皇甫酈回西涼卻說李傕之軍大半是西涼人氏更賴羌兵爲助卻被皇甫酈揚言於西涼人曰李傕謀反從之者即爲賊黨後患不淺西涼人多有聽酈之言軍心漸渙傕聞酈言大怒差虎賁王昌追之昌知酈乃忠義之士竟不往追只回報曰酈已不知何往矣賈詡又密諭羌人曰天子知汝等忠義久戰勞苦密詔使汝還郡後當有重賞羌人正怨李傕不與爵賞遂聽詡言都引兵去詡又密奏帝曰李傕貪而無謀今兵散心怯可以重爵餌之帝乃降詔封傕爲大司馬傕喜曰此女巫降神祈禱之力也遂重賞女巫卻不賞軍將騎都尉楊奉大怒謂宋果曰吾等出生入死身冒矢石功反不及女巫耶宋果曰何不殺此賊以救天子奉曰你於中軍放火爲號吾當引兵外應二人約定是夜二更時分舉事不料其事不密有人報知李傕傕大怒令人擒宋果先殺之楊奉引兵在外不見號火李傕自將兵出恰遇楊奉就寨中混戰到四更奉不勝引軍投西安去了李傕自此軍勢漸衰更兼郭汜常來攻擊殺死者甚多忽人來報張濟統領大軍自陝西來到欲與二公解和聲言如不從者引兵擊之傕便賣個人情先遣人赴張濟中許和郭汜亦只是許諾張濟上表請天子駕幸弘農帝喜曰朕思東都久矣今乘此得還乃萬幸也詔封張濟爲驃騎將軍濟進糧食酒肉供給百官汜放公卿出營傕收拾車駕東行遣舊有禦林軍數百持戟護送鑾輿過新豐至霸陵時值秋天金風驟起忽聞喊聲大作數百軍兵來至橋上攔住車駕厲聲問曰來者何人侍中楊琦拍馬上橋曰聖駕過此誰敢攔阻有二將出曰吾等奉郭將軍命把守此橋以防奸細既雲聖駕須親見帝方可准信楊琦高揭珠簾帝諭曰朕躬在此卿何不退衆將皆呼萬歲分於兩邊駕乃得過二將回報郭汜曰駕已去矣汜曰我正欲哄過張濟劫駕再入郿塢你如何擅自放了過去遂斬二將起兵趕來車駕正到華陰縣背後喊聲震天大叫車駕且休動帝泣告大臣曰方離狼窩又逢虎口如之奈何衆皆失色賊軍漸近只聽得一派鼓聲山背後轉出一將當先一面大旗上書大漢楊奉四字引軍千餘殺來原來楊奉自爲李傕所敗便引軍屯終南山下今聞駕至特來保護當下列開陣勢汜將崔勇出馬大罵楊奉反賊奉大怒回顧陣中曰公明何在一將手執大斧飛驟驊騮直取崔勇兩馬相交只一合斬崔勇於馬下楊奉乘勢掩殺汜軍大敗退走二十餘裏奉乃收軍來見天子帝慰諭曰卿救朕躬其功不小奉頓首拜謝帝曰適斬賊將者何人奉乃引此將拜于車下曰此人河東楊郡人姓徐名晃字公明帝慰勞之楊奉保駕至華陰駐蹕將軍段煨具衣服飲膳上獻是夜天子宿于楊奉營中郭汜敗了一陣次日又點軍殺至營前來徐晃當先出馬郭汜大軍八面圍來將天子楊奉困在垓心正在危急之中忽然東南上喊聲大震一將引軍縱馬殺來賊衆奔潰徐晃乘勢攻擊大敗汜軍那人來見天子乃國戚董承也帝哭訴前事承曰陛下免憂臣與楊將軍誓斬二賊以靖天下帝命早赴東都連夜駕起前幸弘農卻說郭汜引敗軍回撞著李傕言楊奉董承救駕往弘農去了若到山東立腳得牢必然布告天下令諸侯共伐我等三族不能保矣傕曰今張濟兵據長安未可輕動我和你乘間合兵一處至弘農殺了漢君平分天下有何不可汜喜諾二人合兵于路劫掠所過一空楊奉董承知賊兵遠來遂勒兵回與賊大戰於東澗傕汜二人商議我衆彼寡只可以混戰勝之於是李傕在左郭汜在右漫山遍野擁來楊奉董承兩邊死戰剛保帝後車出百官宮人符冊典籍一應禦用之物盡皆抛棄郭汜引軍入弘農劫掠承奉保駕走陝北傕汜分兵趕來承奉一面差人與傕汜講和一面密傳聖旨往河東急召故白波帥韓暹李樂胡才三處軍兵前來救應那李樂亦是嘯聚山林之賊今不得已而召之三處軍聞天子赦罪賜官如何不來並拔本營軍士來與董承約會一齊再取弘農其時李傕郭汜但到之處劫掠百姓老弱者殺之強壯者充軍臨敵則驅民兵在前名曰敢死軍賊勢浩大李樂軍到會于渭陽郭汜令軍士將衣服物件抛棄於道樂軍見衣服滿地急往取之隊伍盡失傕汜二軍四面混戰樂軍大敗楊奉董承遮攔不住保駕北走背後賊軍趕來李樂曰事急矣請天子上馬先行帝曰朕不可舍百官而去衆皆號泣相隨胡才被亂軍所殺承奉見賊追急請天子棄車駕步行到黃河岸邊李樂等尋得一隻小舟作渡船時值天氣嚴寒帝與後強扶到岸邊岸又高不得下船後面追兵將至楊奉曰可解馬繮繩接連拴縛帝腰放下船去人叢中國舅伏德挾白絹十數匹至曰我於亂軍中拾得此絹可接連拽輦行軍校尉尚弘用絹包帝及後令衆先挂帝往下放之乃得下船李樂仗劍立於船頭上後兄伏德負後下船中岸上有不得下船者爭扯船纜李樂盡砍于水中渡過帝後再放船渡衆人其爭渡者皆被砍下手指哭聲震天既渡彼岸帝左右止剩得十餘人楊奉尋得牛車一輛載帝至大陽絕食晚宿於瓦屋中野老進粟飯上與後共食粗糲不能下咽次日詔封李樂爲征北將軍韓暹爲征東將軍起駕前行有二大臣尋至哭拜車前乃太尉楊彪太仆韓融也帝後俱哭韓融曰傕汜二賊頗信臣言臣捨命去說二賊罷兵陛下善保龍體韓融去了李樂請帝入楊奉營暫歇楊彪請帝都安邑縣駕至安邑苦無高房帝後都居於茅屋中又無門關閉四邊插荊棘以爲遮罩帝與大臣議事于茅屋之下諸將引兵於籬外鎮壓李樂等專權百官稍有觸犯竟於帝前毆罵故意送濁酒粗食與帝帝勉強納之李樂韓暹又連名保奏無徒部曲巫醫走卒二百余名並爲校尉禦史等官刻印不及以錐畫之全不成體統卻說韓融曲說傕汜二賊二賊從其言乃放百官及宮人歸是歲大荒百姓皆食棗菜餓莩遍野河內太守張楊獻米肉河東太守王邑獻絹帛帝稍得寧董承楊奉商議一面差人修洛陽宮院欲奉車駕還東都李樂不從董承謂李樂曰洛陽本天子建都之地安邑乃小地面如何容得車駕今奉駕還洛陽是正理李樂曰汝等奉駕去我只在此處住承奉乃奉駕起程李樂暗令人結連李傕郭汜一同劫駕董承楊奉韓暹知其謀連夜擺佈軍士護送車駕前奔箕關李樂聞知不等傕汜軍到自引本部人馬前來追趕四更左側趕到箕山下大叫車駕休行李傕郭汜在此嚇得獻帝心驚膽戰山上火光遍起正是不知漢天子怎離此難且聽下文分解
