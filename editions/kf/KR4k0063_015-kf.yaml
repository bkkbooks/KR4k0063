body:
  text: 第十五回太史慈酣鬥小霸王孫伯符大戰嚴白虎卻說張飛拔劍要自刎玄德向前抱住奪劍擲地曰古人雲兄弟如手足妻子如衣服衣服破尚可縫手足斷安可續吾三人桃園結義不求同生但願同死今雖失了城池家小安忍教兄弟中道而亡況城池本非吾有家眷雖被陷呂布必不謀害尚可設計救之堅弟一時之誤何至遽欲捐生耶說罷大哭關張俱感泣且說袁術知呂布襲了徐州星夜差人至呂布處許以糧五萬斛馬五百匹金銀一萬兩彩緞一千匹使夾攻劉備布喜令高順領兵五萬襲玄德之後玄德聞得此信乘陰雨撤兵棄盱眙而走思欲東取廣陵比及高順軍來玄德已去高順與紀靈相見就索所許之物靈曰公且回軍容某見主公計之高順乃別紀靈回軍見呂布具述紀靈語布正在遲疑忽有袁術書至書意雲高順雖來而劉備未除且待捉了劉備那時方以所許之物相送布怒駡袁術失信欲起兵伐之陳宮曰不可術據壽春兵多糧廣不可輕敵不如請玄德還屯小沛使爲我羽翼他日令玄德爲先鋒那時先取袁術後取袁紹可縱橫天下矣布聽其言令人齎書迎玄德回卻說玄德引兵東取廣陵被袁術劫寨折兵大半回來正遇呂布之使呈上書劄玄德大喜關張曰呂布乃無義之人不可信也玄德曰彼既以好情待我奈何疑之遂來到徐州布恐玄德疑惑先令人送還家眷甘糜二夫人見玄德具說呂布令兵把定宅門禁諸人不得入又常使侍妾送物未嘗有缺玄德謂關張曰我知呂布必不害我家眷也乃入城謝呂布張飛恨呂布不肯隨往先奉二嫂往小沛去了玄德入見呂布拜謝呂布曰我非欲奪城因令弟張飛在此恃酒殺人恐有失事故來守之耳玄德曰備欲讓兄久矣布假意仍讓玄德玄德力辭還屯小沛住紮關張心中不忿玄德曰屈身守分以待天時不可與命爭也呂布令人送糧米緞匹自此兩家和好不在話下卻說袁術大宴將士于壽春人報孫策征廬江太守陸康得勝而回術喚策至策拜於堂下問勞已畢便令侍坐飲宴原來孫策自父喪之後退居江南禮賢下士後因陶謙與策母舅丹陽太守吳景不和策乃移母並家屬居於曲阿自己卻投袁術術甚愛之常歎曰使術有子如孫郎死複何恨因使爲懷義校尉引兵攻涇縣大帥祖郎得勝術見策勇複使攻陸康今又得勝而回當日筵散策歸營寨見術席間相待之禮甚傲心中鬱悶乃步月於中庭因思父孫堅如此英雄我今淪落至此不覺放聲大哭忽見一人自外而入大笑曰伯符何故如此尊父在日多曾用我君今有不決之事何不問我乃自哭耶策視之乃丹陽故鄣人姓朱名治字君理孫堅舊從事官也策收淚而延之坐曰策所哭者恨不能繼父之志耳治曰君何不告袁公路借兵往江東假名救吳景實圖大業而乃久困於人之下乎正商議間一人忽入曰公等所謀吾已知之吾手下有精壯百人暫助伯符一馬之力策視其人乃袁術謀士汝南細陽人姓呂名範字子衡策大喜延坐共議呂範曰只恐袁公路不肯借兵策曰吾有亡父留下傳國玉璽以爲質當範曰公路欲得此久矣以此相質必肯發兵三人計議已定次日策入見袁術哭拜曰父仇不能報今母舅吳景又爲揚州刺史劉繇所逼策老母家小皆在曲阿必將被害策敢借雄兵數千渡江救難省親恐明公不信有亡父遺下玉璽權爲質當術聞有玉璽取而視之大喜曰吾非要你玉璽今且權留在此我借兵三千馬五百匹與你平定之後可速回來你職位卑微難掌大權我表你爲折沖校尉殄寇將軍克日領兵便行策拜謝遂引軍馬帶領朱治呂範舊將程普黃蓋韓當等擇日起兵行至曆陽見一軍到當先一人姿質風流儀容秀麗見了孫策下馬便拜策視其人乃廬江舒城人姓周名瑜字公瑾原來孫堅討董卓之時移家舒城瑜與孫策同年交情甚密因結爲昆仲策長瑜兩月瑜以兄事策瑜叔周尚爲丹陽太守今往省親到此與策相遇策見瑜大喜訴以衷情瑜曰某願施犬馬之力共圖大事策喜曰吾得公瑾大事諧矣便令與朱治呂範等相見瑜謂策曰吾兄欲濟大事亦知江東有二張乎策曰何爲二張瑜曰一人乃彭城張昭字子布一人乃廣陵張紘字子綱二人皆有經天緯地之才因避亂隱居於此吾兄何不聘之策喜即便令人齎禮往聘俱辭不至策乃親到其家與語大悅力聘之二人許允策遂拜張昭爲長史兼撫軍中朗將張紘爲參謀正議校尉商議攻擊劉繇卻說劉繇字正禮東萊牟平人也亦是漢室宗親太尉劉寵之侄兗州刺史劉岱之弟舊爲揚州刺史屯于壽春被袁術趕過江東故來曲阿當下聞孫策兵至急聚衆將商議部將張英曰某領一軍屯于牛渚縱有百萬之兵亦不能近言未畢帳下一人高叫曰某願爲前部先鋒衆視之乃東萊黃縣人太史慈也慈自解了北海之圍後便來見劉繇繇留於帳下當日聽得孫策來到願爲前部先鋒繇曰你年尚輕未可爲大將只在吾左右聽命太史慈不喜而退張英領兵至牛渚積糧十萬于邸閣孫策引兵到張英出迎兩軍會于牛渚灘上孫策出馬張英大罵黃蓋便出與張英戰不數合忽然張英軍中大亂報說寨中有人放火張英急回軍孫策引軍前來乘勢掩殺張英棄了牛渚望深山而逃原來那寨後放火的乃是兩員健將一人乃九江壽春人姓蔣名欽字公奕一人乃九江下蔡人姓周名泰字幼平二人皆遭世亂聚人在洋子江中劫掠爲生久聞孫策爲江東豪傑能招賢納士故特引其党三百餘人前來相投策大喜用爲軍前校尉收得牛渚邸閣糧食軍器並降卒四千餘人遂進兵神亭卻說張英敗回見劉繇繇怒欲斬之謀士笮融薛禮勸免使屯兵零陵城拒敵繇自領兵於神亭嶺南下營孫策于嶺北下營策問土人曰近山有漢光武廟否土人曰有廟在嶺上策曰吾夜夢光武召我相見當往祈之長史張昭曰不可嶺南乃劉繇寨倘有伏兵奈何策曰神人佑我吾何懼焉遂披挂綽槍上馬引程普黃蓋韓當蔣欽周泰等共十三騎出寨上嶺到廟焚香下馬參拜已畢策向前跪祝曰若孫策能于江東立業復興故父之基即當重修廟宇四時祭祀祝畢出廟上馬回顧衆將曰吾欲過嶺探看劉繇寨柵諸將皆以爲不可策不從遂同上嶺南望村林早有伏路小軍飛報劉繇繇曰此必是孫策誘敵之計不可追之太史慈踴躍曰此時不捉孫策更待何時遂不候劉繇將令竟自披挂上馬綽槍出營大叫曰有膽氣者都跟我來諸將不動惟有一小將曰太史慈真猛將也吾可助之拍馬同行衆將皆笑卻說孫策看了半晌方始回馬正行過嶺只聽得嶺上叫孫策休走策回頭視之見兩匹馬飛下嶺來策將十三騎一齊擺開策橫槍立馬於嶺下待之太史慈高叫曰那個是孫策策曰你是何人答曰我便是東萊太史慈也特來捉孫策策笑曰只我便是你兩個一齊來並我一個我不懼你我若怕你非孫伯符也慈曰你便衆人都來我亦不怕縱馬橫槍直取孫策策挺槍來迎兩馬相交戰五十合不分勝負程普等暗暗稱奇慈見孫策槍法無半點兒滲漏乃佯輸詐敗引孫策趕來慈卻不由舊路上嶺竟轉過山背後策趕到大喝曰走的不算好漢慈心中自忖這廝有十二從人我只一個便活捉了他也吃衆人奪去再引一程教這廝沒尋處方好下手於是且戰且走策那裏肯舍一直趕到平川之地慈兜回馬再戰又到五十合策一槍搠去慈閃過挾住槍慈也一槍搠去策亦閃過挾住槍兩個用力只一拖都滾下馬來馬不知走的那裏去了兩個棄了槍揪住廝打戰袍扯得粉碎策手快掣了太史慈背上的短戟慈亦掣了策頭上的兜鍪策把戟來刺慈慈把兜鍪遮架忽然喊聲後起乃劉繇接應軍到來約有千餘策正慌急程普等十二騎亦沖到策與慈方才放手慈於軍中討一匹馬取了槍上馬複來孫策的馬卻是程普收得策亦取槍上馬劉繇一千余軍和程普等十二騎混戰逶迤殺到神亭嶺下喊聲起處周瑜領軍來到劉繇自引大軍殺下嶺來時近黃昏風雨暴至兩下各自收軍次日孫策引軍到劉繇營前劉繇引軍出迎兩陣圓處孫策把槍挑太史慈的小戟於陣前令軍士大叫曰太史慈若不是走的快已被刺死了太史慈亦將孫策兜鍪挑於陣前也令軍士大叫曰孫策頭已在此兩軍呐喊這邊誇勝那邊道強太史慈出馬要與孫策決個勝負策遂欲出程普曰不須主公勞力某自擒之程普出到陣前太史慈曰你非我之敵手只教孫策出馬來程普大怒挺槍直取太史慈兩馬相交戰到三十合劉繇急鳴金收軍太史慈曰我正要捉拿賊將何故收軍劉繇曰人報周瑜領軍襲取曲阿有廬江松滋人陳武字子烈接應周瑜入去吾家基業已失不可久留速往秣陵會薛禮笮融軍馬急來接應太史慈跟著劉繇退軍孫策不趕收住人馬長史張昭曰彼軍被周瑜襲取曲阿無戀戰之心今夜正好劫營孫策然之當夜分軍五路長驅大進劉繇軍兵大敗衆皆四紛五落太史慈獨力難當引十數騎連夜投涇縣去了卻說孫策又得陳武爲輔其人身長七尺面黃睛赤形容古怪策甚敬愛之拜爲校尉使作先鋒攻薛禮武引十數騎突入陣去斬首級五十餘顆薛禮閉門不敢出策正攻城忽有人報劉繇會合笮融去取牛渚孫策大怒自提大軍竟奔牛渚劉繇笮融二人出馬迎敵孫策曰吾今到此你如何不降劉繇背後一人挺槍出馬乃部將於糜也與策戰不三合被策生擒過去撥馬回陣繇將樊能見捉了於糜挺槍來趕那槍剛搠到策後心策陣上軍士大叫背後有人暗算策回頭忽見樊能馬到乃大喝一聲聲如巨雷樊能驚駭倒翻身撞下馬來破頭而死策到門旗下將於糜丟下已被挾死一霎時挾死一將喝死一將自此人皆呼孫策爲小霸王當日劉繇兵大敗人馬大半降策策斬首級萬餘劉繇與笮融走豫章投劉表去了孫策還兵複攻秣陵親到城壕邊招諭薛禮投降城上暗放一冷箭正中孫策左腿翻身落馬衆將急救起還營拔箭以金瘡藥傅之策令軍中詐稱主將中箭身死軍中舉哀拔寨齊起薛禮聽知孫策已死連夜起城內之軍與驍將張英陳橫殺出城來追之忽然伏兵四起孫策當先出馬高聲大叫曰孫郎在此衆軍皆驚盡棄槍刀拜於地下策令休殺一人張英撥馬回走被陳武一槍刺死陳橫被蔣欽一箭射死薛禮死於亂軍中策入秣陵安輯居民移兵至涇縣來捉太史慈卻說太史慈招得精壯二千餘人並所部兵正要來與劉繇報仇孫策與周瑜商議活捉太史慈之計瑜令三面攻縣只留東門放走離城二十五裏三路各伏一軍太史慈到那裏人困馬乏必然被擒原來太史慈所招軍大半是山野之民不諳紀律涇縣城頭苦不甚高當夜孫策命陳武短衣持刀首先爬上城放火太史慈見城上火起上馬投東門走背後孫策引軍趕來太史慈正走後軍趕至三十裏卻不趕了太史慈走了五十裏人困馬乏蘆葦之中喊聲忽起慈急待走兩下裏絆馬索齊來將馬絆翻了生擒太史慈解投大寨策知解到太史慈親自出營喝散士卒自釋其縛將自己錦袍衣之請入寨中謂曰我知子義真丈夫也劉繇蠢輩不能用爲大將以致此敗慈見策待之甚厚遂請降策執慈手笑曰神亭相戰之時若公獲我還相害否慈笑曰未可知也策大笑請入帳邀之上坐設宴款待慈曰劉君新破士卒離心某欲自往收拾餘衆以助明公不識能相信否策起謝曰此誠策所願也今與公約明日日中望公來還慈應諾而去諸將曰太史慈此去必不來矣策曰子義乃信義之士必不背我衆皆未信次日立竿于營門以候日影恰將日中太史慈引一千餘衆到寨孫策大喜衆皆服策之知人於是孫策聚數萬之衆下江東安民恤衆投者無數江東之民皆呼策爲孫郎但聞孫郎兵至皆喪膽而走及策軍到並不許一人擄掠雞犬不驚人民皆悅齎牛酒到寨勞軍策以金帛答之歡聲遍野其劉繇舊軍願從軍者聽從不願爲軍者給賞歸農江南之民無不仰頌由是兵勢大盛策乃迎母叔諸弟俱歸曲阿使弟孫權與周泰守宣城策領兵南取吳郡時有嚴白虎自稱東吳德王據吳郡遣部將守住烏程嘉興當日白虎聞策兵至令弟嚴輿出兵會於楓橋輿橫刀立馬於橋上有人報入中軍策便欲出張紘諫曰夫主將乃三軍之所系命不宜輕敵小寇願將軍自重策謝曰先生之言如金石但恐不親冒矢石則將士不用命耳隨遣韓當出馬比及韓當到橋上時蔣欽陳武早駕小舟從河岸邊殺過橋裏亂箭射倒岸上軍二人飛身上岸砍殺嚴輿退走韓當引軍直殺到閶門下賊退入城裏去了策分兵水陸並進圍住吳城一困三日無人出戰策引衆軍到閶門外招諭城上一員裨將左手托定護梁右手指著城下大罵太史慈就馬上拈弓取箭顧軍將曰看我射中這廝左手說聲未絕弓弦響處果然射個正中把那將的左手射透反牢釘在護梁上城下城上人見者無不喝采衆人救了這人下城白虎大驚曰彼軍有如此人安能敵乎遂商量求和次日使嚴輿出城來見孫策策請輿入帳飲酒酒酣問輿曰令兄意欲如何輿曰欲與將軍平分江東策大怒曰鼠輩安敢與吾相等命斬嚴輿輿拔劍起身策飛劍砍之應手而倒割下首級令人送入城中白虎料敵不過棄城而走策進兵追襲黃蓋攻取嘉興太史慈攻取烏程數州皆平白虎奔余杭于路劫掠被土人淩操領鄉人殺敗望會稽而走淩操父子二來接孫策策使爲從征校尉遂同引兵渡江嚴白虎聚寇分佈於西津渡口程普與戰複大敗之連夜趕到會稽會稽太守王朗欲引兵救白虎忽一人出曰不可孫策用仁義之師白虎乃暴虐之衆還宜擒白虎以獻孫策朗視之乃會稽余姚人姓虞名翻字仲翔現爲郡吏朗怒叱之翻長歎而出朗遂引兵會合白虎同陳兵于山陰之野兩陣對圓孫策出馬謂王朗曰吾興仁義之兵來安浙江汝何故助賊朗罵曰汝貪心不足既得吳郡而又強並吾界今日特與嚴氏雪仇孫策大怒正待交戰太史慈早出王朗拍馬舞刀與慈戰不數合朗將周昕殺出助戰孫策陣中黃蓋飛馬接住周昕交鋒兩下鼓聲大震互相鏖戰忽王朗陣後先亂一彪軍從背後抄來郎大驚急回馬來迎原來是周瑜與程普引軍刺斜殺來前後夾攻王郎寡不敵衆與白虎周昕殺條血路走入城中拽起吊橋堅閉城門孫策大軍乘勢趕到城下分佈衆軍四門攻打王朗在城中見孫策攻城甚急欲再出兵決一死戰嚴白虎曰孫策兵勢甚大足下只宜深溝高壘堅壁勿出不消一月彼軍糧盡自然退走那時乘虛掩之可不戰而破也朗依其議乃固守會稽城而不出孫策一連攻了數日不能成功乃與衆將計議孫靜曰王朗負固守城難可卒拔會稽錢糧大半屯于查瀆其地離此數十裏莫若以兵先據其內所謂攻其無備出其不意也策大喜曰叔父妙用足破賊人矣即下令於各門燃火虛張旗號設爲疑兵連夜撤圍南去周瑜進曰主公大兵一起王朗必然出城來趕可用奇兵勝之策曰吾今準備下了取城只在今夜遂令軍馬起行卻說王郎聞報孫策軍馬退去自引衆人來敵樓上觀望見城下煙火並起旌旗不雜心下遲疑周昕曰孫策走矣特設此計以疑我耳可出兵襲之嚴白虎曰孫策此去莫非要去查瀆我令部兵與周將軍追之朗曰查瀆是我屯糧之所正須提防汝引兵先行吾隨後接應白虎與周昕領五千兵出城追趕將近初更離城二十餘裏忽密林裏一聲鼓響火把齊明白虎大驚便勒馬回走一將當先攔住火光中視之乃孫策也周昕舞刀來迎被策一槍刺死餘衆皆降白虎殺條血路望余杭而走王朗聽知前軍已敗不敢入城引部下奔逃海隅去了孫策複回大軍乘勢取了城池安定人民不隔一日只見一人將著嚴白虎首級來孫策軍前投獻策視其人身長八盡面方口闊問其姓名乃會稽餘姚人姓董名襲字元代策喜命爲別部司馬自是東路皆平令叔孫靜守之令朱治爲吳郡太守收軍回江東卻說孫權與周泰守宣城忽山賊竊發四面殺至時值更深不及抵敵泰抱權上馬數十賊衆用刀來砍泰赤體步行提刀殺賊砍殺十餘人隨後一賊躍馬挺槍直取周泰被泰扯住槍拖下馬來奪了槍馬殺條血路救出孫權餘賊遠遁周泰身被十二槍金瘡發脹命在須臾策聞之大驚帳下董襲曰某曾與海寇相持身遭數槍得會稽一個賢郡吏虞翻薦一醫者半月而愈策曰虞翻莫非虞仲翔乎襲曰然策曰此賢士也我當用之乃令張昭與董襲同往聘請虞翻翻至策優禮相待拜爲功曹因言及求醫之意翻曰此人乃沛國譙郡人姓華名佗字元化真當世之神醫也當引之來見不一日引至策見其人童顔鶴發飄然有出世之姿乃待爲上賓請視周泰瘡佗曰此易事耳投之以藥一月而愈策大喜厚謝華佗遂進兵殺除出賊江南皆平孫策分撥將士守把各處隘口一面寫表申奏朝廷一面結交曹操一面使人致書與袁術取玉璽卻說袁術暗有稱帝之心乃回書推託不還急聚長史楊大將都督張勳紀靈橋蕤上將雷薄陳蘭等三十餘人商議曰孫策借我軍馬起事今日盡得江東地面乃不思報本而反來索璽殊爲無禮當以何策圖之長史楊大將曰孫策據長江之險兵精糧廣未可圖也今當先伐劉備以報前日無故相攻之恨然後圖取孫策未遲某獻一計使備即日就擒正是不去江東圖虎豹卻來徐郡鬥蛟龍不知其計若何且聽下文分解
