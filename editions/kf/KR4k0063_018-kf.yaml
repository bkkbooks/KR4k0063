body:
  text: 第十八回賈文和料敵決勝夏侯惇拔矢啖睛卻說賈詡料知曹操之意便欲將計就計而行乃謂張繡曰某在城上見曹操繞城而觀者三日他見城東南角磚土之色新舊不等鹿角多半毀壞意將從此處攻進卻虛去西北上積草詐爲聲勢欲哄我撤兵守西北彼乘夜黑必爬東南角而進也繡曰然則奈何詡曰此易事耳來日可令精壯之兵飽食輕裝盡藏于東南房屋內卻教百姓假扮軍士虛守西北夜間任他在東南角上爬城俟其爬進城時一聲炮響伏兵齊起操可擒矣繡喜從其計早有探馬報曹操說張繡盡撤兵在西北角上呐喊守城東南卻甚空虛操曰中吾計矣遂命軍中密備鍬爬城器具日間只引軍攻西北角至二更時分卻領精兵于東南角上爬過壕去砍開鹿角城中全無動靜衆軍一齊擁入只聽得一聲炮響伏兵四起曹軍急退背後張繡親驅勇壯殺來曹軍大敗退出城外奔走數十裏張繡直殺至天明方收軍入城曹操計點敗軍折兵五萬餘人失去輜重無數呂虔於禁俱各被傷卻說賈詡見操敗走急勸張繡遺書劉表使起兵截其後路表得書即欲起兵忽探馬報孫策屯兵湖口蒯良曰策屯兵湖口乃曹操之計也今操新敗若不乘勢擊之後必有患表乃令黃祖堅守隘口自己統兵至安衆縣截操後路一面約會張繡繡知表兵已起即同賈詡引兵襲操且說操軍緩緩而行至襄城到淯水操忽於馬上放聲大哭衆驚問其故操曰吾思去年於此地折了吾大將典韋不由不哭耳因即下令屯住軍馬大設祭筵吊奠典韋亡魂操親自拈香哭拜三軍無不感歎祭典韋畢方祭侄曹安民及長子曹昂並祭陣亡軍士連那匹射死的大宛馬也都致祭次日忽荀彧差人報說劉表助張繡屯兵安衆截吾歸路操答彧書曰吾日行數裏非不知賊來追我然吾計劃已定若到安衆破繡必矣君等勿疑便催軍行至安衆縣界劉表軍已守險要張繡隨後引軍趕來操乃令衆軍黑夜鑿險開道暗伏奇兵及天色微明劉表張繡軍會合見操兵少疑操遁去俱引兵入險擊之操縱奇兵出大破兩家之兵曹兵出了安衆隘口於隘外下寨劉表張繡各整敗兵相見表曰何期反中曹操奸計繡曰容再圖之於是兩軍集于安衆且說荀彧探知袁紹欲興兵犯許都星夜馳書報曹操操得書心慌即日回兵細作報知張繡繡欲追之賈詡曰不可追也追之必敗劉表曰今日不追坐失機會矣力勸繡引軍萬餘同往追之約行十餘裏趕上曹軍後隊曹軍奮力接戰繡表兩軍大敗而還繡謂詡曰不用公言果有此敗詡曰今可整兵再往追之繡與表俱曰今已敗奈何複追詡曰今番追去必獲大勝如其不然請斬吾首繡信之劉表疑慮不肯同往繡乃自引一軍往追操兵果然大敗軍馬輜重連路散棄而走繡正往前追趕忽山後一彪軍擁出繡不敢前追收軍回安衆劉表問賈詡曰前以精兵追退兵而公曰必敗後以敗卒擊勝兵而公曰必克究竟悉如公言何其事不同而皆驗也願公明教我詡曰此易知耳將軍雖善用兵非曹操敵手操軍雖敗必有勁將爲後殿以防追兵我兵雖銳不能敵之也故知必敗夫操之急於退兵者必因許都有事既破我追軍之後必輕車速回不復爲備我乘其不備而更追之故能勝也劉表張繡俱服其高見詡勸表回荊州繡守襄城以爲唇齒兩軍各散且說曹操正行間聞報後軍爲繡所追急引衆將回身救應只見繡軍已退敗兵回告操曰若非山後這一路人馬阻住中路我等皆被擒矣操急問何人那人綽槍下馬拜見曹操乃鎮威中郎將江夏平春人姓李名通字文達操問何來通曰近守汝南聞丞相與張繡劉表戰特來接應操喜封之爲建功侯守汝南西界以防表繡李通拜謝而去操還許都表奏孫策有功封爲討逆將軍賜爵吳侯遣使齎詔江東諭令防剿劉表操回府衆官參見畢荀彧問曰丞相緩行至安衆何以知必勝賊兵操曰彼退無歸路必將死戰吾緩誘之而暗圖之是以知其必勝也荀彧拜服郭嘉入操曰公來何暮也嘉袖出一書白操曰袁紹使人致書丞相言欲出兵攻公孫瓚特來借糧借兵操曰吾聞紹欲圖許都今見吾歸又別生他議遂拆書觀之見其詞意驕慢乃問嘉曰袁紹如此無狀吾欲討之恨力不及如何嘉曰劉項之不敵公所知也高祖惟智勝項羽雖強終爲所擒今紹有十敗公有十勝紹兵雖盛不足懼也紹繁禮多儀公體任自然此道勝也紹以逆動公以順率此義勝也桓靈以來政失於寬紹以寬濟公以猛糾此治勝也紹外寬內忌所任多親戚公外簡內明用人惟才此度勝也紹多謀少決公得策輒行此謀勝也紹專收名譽公以至誠待人此德勝也紹恤近忽遠公慮無不周此仁勝也紹聽讒惑亂公浸潤不行此明勝也紹是非混淆公法度嚴明此文勝也紹好爲虛勢不知兵要公以少克衆用兵如神此武勝也公有此十勝於以敗紹無難矣操笑曰如公所言孤何足以當之荀彧曰郭奉孝十勝十敗之說正與愚見相合紹兵雖衆何足懼耶嘉曰徐州呂布實心腹大患今紹北征公孫瓚我當乘其遠出先取呂布掃除東南然後圖紹乃爲上計否則我方攻紹布必乘虛來犯許都爲害不淺也操然其言遂議東征呂布荀彧曰可先使人往約劉備待其回報方可動兵操從之一面發書與玄德一面厚遣紹使奏封紹爲大將軍太尉兼都督冀青幽並四州密書答之雲公可討公孫瓚吾當相助紹得書大喜便進兵攻公孫瓚且說呂布在徐州每當賓客宴會之際陳珪父子必盛稱布德陳宮不悅乘間告布曰陳珪父子面諛將軍其心不可測宜善防之布怒叱曰汝無端獻讒欲害好人耶宮出歎曰忠言不入吾輩必受殃矣意欲棄布他往卻又不忍又恐被人嗤笑乃終日悶悶不樂一日帶領數騎去小沛地面圍獵解悶忽見官道上一騎驛馬飛奔前去宮疑之棄了圍場引從騎從小路趕上問曰汝是何處使命那使者知是呂布部下人慌不能答陳宮令搜其身得玄德回答曹操密書一封宮即連人與書拿見呂布布問其故來使曰曹丞相差我往劉豫州處下書今得回書不知書中所言何事布乃拆書細看書略曰奉明命欲圖呂布敢不夙夜用心但備兵微將少不敢輕動丞相興大師備當爲前驅謹嚴兵整甲專待鈞命呂布見了大罵曰操賊焉敢如此遂將使者斬首先使陳宮臧霸結連泰山寇孫觀吳敦尹禮昌豨東取山東兗州諸郡令高順張遼取沛城攻玄德令宋憲魏續西取汝潁布自總中軍爲三路救應且說高順等引兵出徐州將至小沛有人報知玄德玄德急與衆商議孫乾曰可速告急於曹操玄德曰誰可去許都告急階下一人出曰某願往視之乃玄德同鄉人姓簡名雍字憲和現爲玄德幕賓玄德即修書付簡雍使星夜赴許都求援一面整頓守城器具玄德自守南門孫乾守北門雲長守西門張飛守東門令糜竺與其弟糜芳守護中軍原來糜竺有一妹嫁與玄德爲次妻玄德與他兄弟有郎舅之親故令其守中軍保護妻小高順軍至玄德在敵樓上問曰吾與奉先無隙何故引兵至此順曰你結連曹操欲害吾主今事已露何不就縛言訖便麾軍攻城玄德閉門不出次日張遼引兵攻打西門雲長在城上謂之曰公儀錶非俗何故失身於賊張遼低頭不語雲長知此人有忠義之氣更不以惡言相加亦不出戰遼引兵退至東門張飛便出迎戰早有人報知關公關公急來東門看時只見張飛方出城張遼軍已退飛欲追趕關公急召入城飛曰彼懼而退何不追之關公曰此人武藝不在你我之下因我以正言感之頗有自悔之心故不與我等戰耳飛乃悟只令士卒堅守城門更不出戰卻說簡雍至許都見曹操具言前事操即聚衆謀士議曰吾欲攻呂布不憂袁紹掣肘只恐劉表張繡議其後耳荀攸曰二人新破未敢輕動呂布驍勇若更結連袁術縱橫淮泗急難圖矣郭嘉曰今可乘其初叛衆心未附疾往擊之操從其言即命夏侯惇與夏侯淵呂虔李典領兵五萬先行自統大軍陸續進發簡雍隨行早有探馬報知高順順飛報呂布布先令侯成郝萌曹性引二百餘騎接應高順使離沛城三十裏去迎曹軍自引大軍隨後接應玄德在小沛城中見高順退去知是曹家兵至乃只留孫乾守城糜竺糜芳守家自己卻與關張二公提兵盡出城外分頭下寨接應曹軍卻說夏侯惇引軍前進正與高順軍相遇便挺槍出馬搦戰高順迎敵兩馬相交戰有四五十合高順抵敵不住敗下陣來惇縱馬追趕順繞陣而走惇不舍亦繞陣追之陣上曹性看見暗地拈弓搭箭覰得親切一箭射去正中夏侯惇左目惇大叫一聲急用手拔箭不想眼珠拔出乃大呼曰父精母血不可棄也遂納於口內啖之仍複挺槍縱馬直取曹性性不及提防早被一槍搠透面門死于馬下兩邊軍士見者無不駭然夏侯惇既殺曹性縱馬便回高順從背後趕來麾軍齊上曹兵大敗夏侯淵救護其兄而走呂虔李典將敗軍退去濟北下寨高順得勝引軍回擊玄德恰好呂布大軍亦至布與張遼高順分兵三路來攻玄德關張三寨正是啖睛猛將雖能戰中箭先鋒難久持未知玄德勝負如何且聽下文分解
