body:
  text: 第二十一回曹操煮酒論英雄關公賺城斬車胄卻說董承等問馬騰曰公欲用何人馬騰曰現有豫州牧劉玄德在此何不求之承曰此人雖系皇叔今正依附曹操安肯行此事耶騰曰吾觀前日圍場之中曹操迎受衆賀之時雲長在玄德背後挺刀欲殺操玄德以目視之而止玄德非不欲圖操恨操牙爪多恐力不及耳公試求之當必應允吳碩曰此事不宜太速當從容商議衆皆散去次日黑夜裏董承懷詔徑往玄德公館中來門吏入報玄德迎出請入小閣坐定關張侍立於側玄德曰國舅夤夜至此必有事故承曰白日乘馬相訪恐操見疑故黑夜相見玄德命取酒相待承曰前日圍場之中雲長欲殺曹操將軍動目搖頭而退之何也玄德失驚曰公何以知之承曰人皆不見某獨見之玄德不能隱諱遂曰舍弟見操僭越故不覺發怒耳承掩面而哭曰朝廷臣子若盡如雲長何憂不太平哉玄德恐是曹操使他來試探乃佯言曰曹丞相治國爲何憂不太平承變色而起曰公乃漢朝皇叔故剖肝瀝膽以相告公何詐也玄德曰恐國舅有詐故相試耳於是董承取衣帶詔令觀之玄德不勝悲憤又將義狀出示上止有六位一車騎將軍董承二工部侍郎王子服三長水校尉種輯四議郎吳碩五昭信將軍吳子蘭六西涼太守馬騰玄德曰公既奉詔討賊備敢不效犬馬之勞承拜謝便請書名玄德亦書左將軍劉備押了字付承收訖承曰尚容再請三人共聚十義以圖國賊玄德曰切宜緩緩施行不可輕泄共議到五更相別去了玄德也防曹操謀害就下處後園種菜親自澆灌以爲韜晦之計關張二人曰兄不留心天下大事而學小人之事何也玄德曰此非二弟所知也二人乃不復言一日關張不在玄德正在後園澆菜許褚張遼引數十人入園中曰丞相有命請使君便行玄德驚問曰有甚緊事許褚曰不知只教我來相請玄德只得隨二人入府見操操笑曰在家做得好大事唬得玄德面如土色操執玄德手直至後園曰玄德學圃不易玄德方才放心答曰無事消遣耳操曰適見枝頭梅子青青忽感去年征張繡時道上缺水將士皆渴吾心生一計以鞭虛指曰前面有梅林軍士聞之口皆生唾由是不渴今見此梅不可不賞又值煮酒正熟故邀使君小亭一會玄德心神方定隨至小亭已設樽俎盤置青梅一樽煮酒二人對坐開懷暢飲酒至半酣忽陰雲漠漠驟雨將至從人遙指天外龍挂操與玄德憑欄觀之操曰使君知龍之變化否玄德曰未知其詳操曰龍能大能小能升能隱大則興雲吐霧小則隱介藏形升則飛騰於宇宙之間隱則潛伏于波濤之內方今春深龍乘時變化猶人得志而縱橫四海龍之爲物可比世之英雄玄德久曆四方必知當世英雄請試指言之玄德曰備肉眼安識英雄操曰休得過謙玄德曰備叨恩庇得仕於朝天下英雄實有未知操曰既不識其面亦聞其名玄德曰淮南袁術兵糧足備可爲英雄操笑曰塚中枯骨吾早晚必擒之玄德曰河北袁紹四世三公門多故吏今虎踞冀州之地部下能事者極多可爲英雄操笑曰袁紹色厲膽薄好謀無斷幹大事而惜身見小利而忘命非英雄也玄德曰有一人名稱八俊威鎮九州劉景升可爲英雄操曰劉表虛名無實非英雄也玄德曰有一人血氣方剛江東領袖孫伯符乃英雄也操曰孫策籍父之名非英雄也玄德曰益州劉季玉可爲英雄乎操曰劉璋雖系宗室乃守戶之犬耳何足爲英雄玄德曰如張繡張魯韓遂等輩皆何如操鼓掌大笑曰此等碌碌小人何足挂齒玄德曰舍此之外備實不知操曰夫英雄者胸懷大志腹有良謀有包藏宇宙之機吞吐天地之志者也玄德曰誰能當之操以手指玄德後自指曰今天下英雄惟使君與操耳玄德聞言吃了一驚手中所執匙筯不覺落於地下時正值大雨將至雷聲大作玄德乃從容俯首拾筯曰一震之威乃至於此操笑曰丈夫亦畏雷乎玄德曰聖人迅雷風烈必變安得不畏將聞言失筯緣故輕輕掩飾過了操遂不疑玄德後人有詩贊曰勉從虎穴暫趨身說破英雄驚殺人巧借聞雷來掩飾隨機應變信如神天雨方住見兩個人撞入後園手提寶劍突至亭前左右攔擋不住操視之乃關張二人也原來二人從城外射箭方回聽得玄德被許褚張遼請將去了慌忙來相府打聽聞說在後園只恐有失故衝突而入卻見玄德與操對坐飲酒二人按劍而立操問二人何來雲長曰聽知丞相和兄飲酒特來舞劍以助一笑操笑曰此非鴻門會安用項莊項伯乎玄德亦笑操命取酒與二樊噲壓驚關張拜謝須臾席散玄德辭操而歸雲長曰險些驚殺我兩個玄德以箸落事說與關張關張問是何意玄德曰吾之學圃正欲使操知我無大志不意操竟指我爲英雄我故失驚落箸又恐操生疑故借懼雷以掩飾之耳關張曰兄真高見操次日又請玄德正飲間人報滿寵去探聽袁紹而回操召入問之寵曰公孫瓚已被袁紹破了玄德急問曰願聞其詳寵曰瓚與紹戰不利築城圍圈圈上建樓高十丈名曰易京樓積粟三十萬以自守戰士出入不息或有被紹圍者衆請救之瓚曰若救一人後之戰者只望人救不肯死戰矣遂不肯救因此袁紹兵來多有降者瓚勢孤使人持書赴許都求救不意中途爲紹軍所獲瓚又遺書張燕暗約舉火爲號裏應外合下書人又被袁紹擒住卻來城外放火誘敵瓚自出戰伏兵四起軍馬折其大半退守城中被袁紹穿地直入瓚所居之樓下放起火來瓚無走路先殺妻子然後自縊全家都被火焚了今袁紹得了瓚軍聲勢甚盛紹弟袁術在淮南驕奢過度不恤軍民衆皆背反術使人歸帝號于袁紹紹欲取玉璽術約親自送至見今棄淮南欲歸河北若二人協力急難收復乞丞相作急圖之玄德聞公孫瓚已死追念昔日薦己之恩不勝傷感又不知趙子龍如何下落放心不下因暗想曰我不就此時尋個脫身之計更待何時遂起身對操曰術若投紹必從徐州過備請一軍就半路截擊術可擒矣操笑曰來日奏帝即便起兵次日玄德面奏君操令玄德總督五萬人馬又差朱靈路昭二人同行玄德辭帝帝泣送之玄德到寓星夜收拾軍器鞍馬挂了將軍印催促便行董承趕出十裏長亭來送玄德曰國舅甯耐某此行必有以報命承曰公宜留意勿負帝心二人分別關張在馬上問曰兄今番出征何故如此慌速玄德曰吾乃籠中鳥網中魚此一行如魚入大海鳥上青霄不受籠網之羈絆也因命關張催朱靈路昭軍馬速行時郭嘉程昱考較錢糧方回知曹操已遣玄德進兵徐州慌入諫曰丞相何故令劉備督軍操曰欲截袁術耳程昱曰昔劉備爲豫州牧時某等請殺之丞相不聽今日又與之兵此放龍入海縱虎歸山也後欲治之其可得乎郭嘉曰丞相縱不殺備亦不當使之去古人雲一日縱敵萬世之患望丞相察之操然其言遂令許褚將兵五百前往務要追玄德轉來許褚應諾而去卻說玄德正行之間只見後面塵頭驟起謂關張曰此必曹兵追至也遂下了營寨令關張各執軍器立於兩邊許褚至見嚴兵整甲乃下馬入營見玄德玄德曰公來此何干褚曰奉丞相命特請將軍回去別有商議玄德曰將在外君命有所不受吾面過君又蒙丞相鈞語今別無他議公可速回爲我稟覆丞相許褚尋思丞相與他一向交好今番又不曾教我來廝殺只得將他言語回覆另候裁奪便了遂辭了玄德領兵而回回見曹操備述玄德之言操猶豫未決程昱郭嘉曰備不肯回兵可知其心變矣操曰我有朱靈路昭二人在彼料玄德未必敢心變況我既遣之何可複悔遂不復追玄德後人有詩歎玄德曰束兵秣馬去匆匆心念天言衣帶中撞破鐵籠逃虎豹頓開金鎖走蛟龍卻說馬騰見玄德已去邊報又急亦回西涼州去了玄德兵至徐州刺史車胄出迎公宴畢孫乾糜竺等都來參見玄德回家探視老小一面差人探聽袁術探子回報袁術奢侈太過雷簿陳蘭皆投嵩山去了術勢甚衰乃作書讓帝號于袁紹紹命人召術術乃收拾人馬宮禁禦用之物先到徐州來玄德知袁術將至乃引關張朱靈路昭五萬軍出正迎著先鋒紀靈至張飛更不打話直取紀靈鬥無十合張飛大喝一聲刺紀靈于馬下敗軍奔走袁術自引軍來鬥玄德分兵三路朱靈路昭在左關張在右玄德自引兵居中與術相見在門旗下責駡曰汝反逆不道吾今奉明詔前來討汝汝當束手受降免你罪犯袁術罵曰織席編屨小輩安敢輕我麾兵趕來玄德暫退讓左右兩路軍殺出殺得術軍屍橫遍野血流成渠士卒逃亡不可勝計又被嵩山雷薄陳蘭劫去錢糧草料欲回壽春又被群盜所襲只得住于江亭止有一千餘衆皆老弱之輩時當盛暑糧食盡絕只剩麥三十斛分派軍士家人無食多有餓死者術嫌飯粗不能下咽乃命庖人取蜜水止渴庖人曰止有血水安有蜜水術坐於床下大叫一聲倒於地下吐血鬥餘而死時建安四年六月也後人有詩曰漢末刀兵起四方無端袁術太倡狂不思累世爲公相便欲孤身作帝王強暴枉誇傳國璽驕奢妄說應天祥渴思蜜水無由得獨臥空床嘔血亡袁術已死侄袁胤將靈柩及妻子奔廬江來被徐璆盡殺之璆奪得玉璽赴許都獻於曹操操大喜封徐璆爲高陵太守此時玉璽歸操卻說玄德知袁術已喪寫表申奏朝廷書呈曹操令朱靈路昭回許都留下軍馬保守徐州一面親自出城招諭流散人民複業且說朱靈路昭回許都見曹操說玄德留下軍馬操怒欲斬二人荀彧曰權歸劉備二人亦無奈何操乃赦之彧又曰可寫書與車胄就內圖之操從其計暗使人來見車胄傳曹操鈞旨胄隨即請陳登商議此事登曰此事極易令劉備出城招民不日將還將軍可命軍士伏于甕城邊只作接他待馬到來一刀斬之某在城上射住後軍大事濟矣胄從之陳登回見父陳珪備言其事珪命登先往報知玄德登領父命飛馬去報正迎著關張報說如此如此原來關張先回玄德在後張飛聽得便要去廝殺雲長曰他伏甕城邊待我去必有失我有一計可殺車胄乘夜扮作曹軍到徐州引車胄出迎襲而殺之飛然其言那部下軍原有曹操旗號衣甲都同當夜三更到城邊叫門城上問是誰衆應是曹丞相差來張文遠的人馬報知車胄胄急請陳登議曰若不迎接誠恐有疑若出迎之又恐有詐胄乃上城回言黑夜難以分辨平明瞭相見城下答應只恐劉備知道疾快開門車胄猶豫未定城外一片聲叫開門車胄只得披挂上馬引一千軍出城跑過吊橋大叫文遠何在火光中只見雲長提刀縱馬直迎車胄大叫曰匹夫安敢懷詐欲殺吾兄車胄大驚戰未數合遮攔不住拔馬便回到吊橋邊城上陳登亂箭射下車胄繞城而走雲長趕來手起一刀砍于馬下割下首級提回望城上呼曰反賊車胄吾已殺之衆等無罪投降免死諸軍倒戈投降軍民皆安雲長將胄頭去迎玄德具言車胄欲害之事今已斬首玄德大驚曰曹操若來如之奈何雲長曰弟與張飛迎之玄德懊悔不已遂入徐州百姓父老伏道而接玄德到府尋張飛飛已將車胄全家殺盡玄德曰殺了曹操心腹之人如何肯休陳登曰某有一計可退曹操正是正把孤身離虎穴還將妙計息狼煙不知陳登說出甚計來且聽下文分解
