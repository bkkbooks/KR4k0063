body:
  text: 第二十五回屯土山關公約三事救白馬曹操解重圍卻說程昱獻計曰雲長有萬人之敵非智謀不能取之今可即差劉備手下投降之兵入下邳見關公只說是逃回的伏於城中爲內應卻引關公出戰詐敗佯輸誘入他處以精兵截其歸路然後說之可也操聽其謀即令徐州降兵數十徑投下邳來降關公關公以爲舊兵留而不疑次日夏侯惇爲先鋒領兵五千來搦戰關公不出惇即使人於城下辱駡關公大怒引三千人馬出城與夏侯惇交戰約戰十餘合惇回馬走關公趕來惇且戰且走關公約趕二十裏恐下邳有失提兵便回只聽得一聲炮響左有徐晃右有許褚兩隊軍截住去路關公奪路而走兩邊伏兵排下硬弩百張箭如飛蝗關公不得過勒兵再回徐晃許褚接住交戰關公奮力殺退二人引軍欲回下邳夏侯惇又截住廝殺公戰至日晚無路可歸只得到一座土山引兵屯于山頭權且少歇曹兵團團將土山圍住關公於山上遙望下邳城中火光沖天卻是那詐降兵卒偷開城門曹操自提大軍殺入城中只教舉火以惑關公之心關公見下邳火起心中驚惶連夜幾番沖下山來皆被亂箭射回捱到天曉再欲整頓下山衝突忽見一人跑馬上山來視之乃張遼也關公迎謂曰文遠欲來相敵耶遼曰非也想故人舊日之情特來相見遂棄刀下馬與關公敘禮畢坐於山頂公曰文遠莫非說關某乎遼曰不然昔日蒙兄救弟今日弟安得不救兄公曰然則文遠將欲助我乎遼曰亦非也公曰既不助我來此何干遼曰玄德不知存亡翼德未知生死昨夜曹公已破下邳軍民盡無傷害差人護衛玄德家眷不許驚擾如此相待弟特來報兄關公怒曰此言特說我也吾今雖處絕地視死如歸汝當速去吾即下山迎戰張遼大笑曰兄此言豈不爲天下笑乎公曰吾仗忠義而死安得爲天下笑遼曰兄今即死其罪有三公曰汝且說我那三罪遼曰當初劉使君與兄結義之時誓同生死今使君方敗而兄即戰死倘使君複欲求兄相助而不可複得豈不負當年之盟誓乎其罪一也劉使君以家眷付託于兄兄今戰死二夫人無所依賴負卻使君依託之重其罪二也兄武藝超群兼通經史不思共使君匡扶漢室徒欲赴湯蹈火以成匹夫之勇安得爲義其罪三也兄有此三罪弟不得不告公沈吟曰汝說我有三罪欲我如何遼曰今四面皆曹公之兵兄若不降則必死徒死無益不若且降曹公卻打聽劉使君音信如知何處即往投之一者可以保二夫人二者不背桃園之約三者可留有用之身有此三便兄宜詳之公曰兄言三便吾有三約若丞相能從我即當卸甲如其不允吾寧受三罪而死遼曰丞相寬洪大量何所不容願聞三事公曰一者吾與皇叔設誓共扶漢室吾今只降漢帝不降曹操二者二嫂處請給皇叔俸祿養贍一應上下人等皆不許到門三者但知劉皇叔去向不管千裏萬里便當辭去三者缺一斷不肯降望文遠急急回報張遼應諾遂上馬回見曹操先說降漢不降曹之事操笑曰吾爲漢相漢即吾也此可從之遼又言二夫人欲請皇叔俸給並上下人等不許到門操曰吾于皇叔俸內更加倍與之至於嚴禁內外乃是家法又何疑焉遼又曰但知玄德資訊雖遠必往操搖首曰然則吾養雲長何用此事卻難從遼曰豈不聞豫讓衆人國士之論乎劉玄德待雲長不過恩厚耳丞相更施厚恩以結其心何憂雲長之不服也操曰文遠之言甚當吾願從此三事張遼再往山上回報關公關公曰雖然如此暫請丞相退軍容我入城見二嫂告知其事然後投降張遼再回以此言報曹操操即傳令退軍三十裏荀彧曰不可恐不詐操曰雲長義士必不失信遂引軍退關公引兵入下邳見人民安妥不動徑到府中來見二嫂甘糜二夫人聽得關公到來急出迎之公拜於階下曰使二嫂受驚某之罪也二夫人曰皇叔今在何處公曰不知去向二夫人曰二叔今將若何公曰關某出城死戰被困土山張遼勸我投降我以三事相約曹操已皆允從故特退兵放我入城我不曾得嫂嫂主意未敢擅便二夫人問那三事關公將上項三事備述一遍甘夫人曰昨日曹軍入城我等皆以爲必死誰想毫髮不動一軍不敢入門叔叔既已領諾何必問我二人只恐日後曹操不容叔叔去尋皇叔公曰嫂嫂放心關某自有主張二夫人曰叔叔自家裁處凡事不必問俺女流關公辭退遂引數十騎來見曹操操自出轅門相接關公下馬入拜操慌忙答禮關公曰敗兵之將深荷不殺之恩操曰素慕雲長忠義今日幸得相見足慰平生之望關公曰文遠代稟三事蒙丞相應允諒不食言操曰吾言既出安敢失信關公曰關某若知皇叔所在雖蹈水火必往從之此時恐不及拜辭伏乞見原操曰玄德若在必從公去但恐亂軍中亡矣公且寬心尚容緝聽關公拜謝操設宴相待次日班師還許昌關公收拾車仗請二嫂上車親自護車而行于路安歇館驛操欲亂其君臣之禮使關公與二嫂共處一室關公乃秉燭立於戶外自夜達旦毫無倦色操見公如此愈加敬服既到許昌操撥一府與關公居住關公分一宅爲兩院內門撥老軍十人把守關公自居外宅操引關公朝見獻帝帝命爲偏將軍公謝恩歸宅操次日設大宴會衆謀臣武士以客禮待關公延之上座又備綾錦及金銀器皿相送關公都送與二嫂收貯關公自到許昌操待之甚厚小宴三日大宴五日又送美女十人使侍關公關公盡送入內門令伏侍二嫂卻又三日一次於內門外躬身施禮動問二嫂安否二夫人回問皇叔之事畢曰叔叔自便關公方敢退回操聞之又歎服關公不已一日操見關公所穿綠錦戰袍已舊即度其身品取異錦作戰袍一領相贈關公受之穿於衣底上仍用舊袍罩之操笑曰雲長何如此之儉乎公曰某非儉也舊袍乃劉皇叔所賜某穿之如見兄面不敢以丞相之新賜而忘兄長之舊賜故穿於上操歎曰真義士也然口雖稱羨心實不悅一日關公在府忽報內院二夫人哭倒于地不知爲何請將軍速入關公乃整衣跪於內門外問二嫂爲何悲泣甘夫人曰我夜夢皇叔身陷於土坑之內覺來與糜夫人論之想在九泉之下矣是以相哭關公曰夢寐之事不可憑信此是嫂嫂想念之故請勿憂愁正說間適曹操命使來請關公赴宴公辭二嫂往見操操見公有淚容問其故公曰二嫂思兄痛哭不由某心不悲操笑而寬解之頻以酒相勸公醉自綽其髯而言曰生不能報國家而背其兄徒爲人也操問曰雲長髯有數乎公曰約數百根每秋月約退三五根冬月多以皂紗囊裹之恐其斷也操以紗錦作囊與關公護髯次日早朝見帝帝見關公一紗錦囊垂於胸次帝問之關公奏曰臣髯頗長丞相賜囊貯之帝令當殿殿披拂過於其腹帝曰真美髯公也因此人皆呼爲美髯公忽一日操請關公宴臨散送公出府見公馬瘦操曰公馬因何而瘦關公曰賤軀頗重馬不能載因此常瘦操令左右備一馬來須臾牽至那馬身如火炭狀甚雄偉操指曰公識此馬否公曰莫非呂布所騎赤兔馬乎操曰然也遂並鞍轡送與關公關公再拜稱謝操不悅曰吾累送美女金帛公未嘗下拜今吾贈馬乃喜而再拜何賤人而貴畜耶關公曰吾知此馬日行千里今幸得之若知兄長下落可一日而見面矣操愕然而悔關公辭去後人有詩歎曰威傾三國著英豪一宅分居義氣高奸相枉將虛禮待豈知關羽不降曹操問張遼曰吾待雲長不薄而彼常懷去心何也遼曰容某探其情次日往見關公禮畢遼曰我薦兄在丞相處不曾落後公曰深感丞相厚意只是吾身雖在此心念皇叔未嘗去懷遼曰兄言差矣處世不分輕重非丈夫也玄德待兄未必過於丞相兄何故只懷去志公曰吾因知曹公待吾甚厚奈吾受劉皇叔厚恩誓以共死不可背之吾終不留此要必立效以報曹公然後去耳遼曰倘玄德已棄世公何所歸乎公曰願從於地下遼知公終不可留乃告退回見曹操具以實告操歎曰事主不忘其本乃天下之義士也荀彧曰彼言立功方去若不敢教彼立功未必便去操然之卻說玄德在袁紹處旦夕煩惱紹曰玄德何故常憂玄德曰二弟不知音耗妻小陷於曹賊上不能報國下不能保家安得不憂紹曰吾欲進兵赴許都久矣方今春暖正好興兵便商議破曹之策田豐諫曰前操攻徐州許都空虛不及此時進兵今徐州已破操兵方銳未可輕敵不如以久持之待其有隙而後可動也紹曰待我思之因問玄德曰田豐勸我固守何如玄德曰曹操欺君之賊明公若不討之恐失大義於天下紹曰玄德之言甚善遂欲興兵田豐又諫紹怒曰汝等弄文輕武使我失大義田豐頓首曰若不聽臣良言出師不利紹大怒欲斬之玄德力勸乃囚於獄中沮授見田豐下獄乃會其宗族盡散家財與之訣曰吾隨軍而去勝則威無不加敗則一身不保矣衆皆下淚送之紹遣大將顔良作先鋒進攻白馬沮授諫曰顔良性狹雖驍勇不可獨任紹曰吾之上將非汝等可料大軍進發至黎陽東郡太守劉延告急許昌曹操急議興兵抵敵關公聞知遂入相府見操曰聞丞相起兵某願爲前部操曰未敢煩將軍早晚有事當來相請關公乃退操引兵十五萬分三隊而行于路又連接劉延告急文書操先提五萬軍親臨白馬靠土山紮住遙望山前平川曠野之地顔良前部精兵十萬排成陣勢操駭然回顧呂布舊將宋憲曰吾聞汝乃呂布部下猛將今可與顔良一戰宋憲領諾綽槍上馬直出陣前顔良橫刀立馬於門旗下見宋憲馬至良大喝一聲縱馬來迎戰不三合手起刀落斬宋憲於陣前曹操大驚曰真勇將也魏續曰殺我同伴願去報仇操許之續上馬持矛徑出陣前大罵顔良良更不打話交馬一合照頭一刀劈魏續于馬下操曰今誰敢當之徐晃應聲而出與顔良戰二十合敗歸本陣諸將栗然曹操收軍良亦引軍退去操見連折二將心中憂悶程昱曰某舉一人可敵顔良操問是誰昱曰非關公不可操曰吾恐他立了功便去昱曰劉備若在必投袁紹今若使雲長破袁紹之兵紹必疑劉備而殺之矣備既死雲長又安往乎操大喜遂差人去請關公關公即入辭二嫂二嫂曰叔今此去可打聽皇叔消息關公領諾而出提青龍刀上赤兔馬引從者數人直至白馬來見曹操操敍說顔良連誅二將勇不可當特請雲長商議關公曰容某觀之操置酒相待忽報顔良搦戰操引關公上土山觀看操與關公坐諸將環立曹操指山下顔良排的陣勢旗幟鮮明槍刀森布嚴整有威乃謂關公曰河北人馬如此雄壯關公曰以吾觀之如土雞瓦犬耳操又指曰麾蓋之下繡袍金甲持刀立馬者乃顔良也關公舉目一望謂操曰吾觀顔良如插標賣首耳操曰未可輕視關公起身曰某雖不才願去萬軍中取其首級來獻丞相張遼曰軍中無戲言雲長不可忽也關公奮然下馬倒提青龍刀跑下土山來鳳目圓睜蠶眉直豎直沖彼陣河北軍如波開浪裂關公徑奔顔良顔良正在麾蓋下見關公沖來方欲問時關公赤兔馬快早已跑到面前顔良措手不及被雲長手起一刀刺于馬下忽地下馬割了顔良首級拴于馬項之下飛身上馬提刀出陣如入無人之境河北兵將大驚不戰自亂曹軍乘勢攻擊死者不可勝數馬匹器械搶奪極多關公縱馬上山衆將盡皆稱賀公獻首級於操前操曰將軍真神人也關公曰某何足道哉吾弟張翼德于百萬軍中取上將之頭如探囊取物耳操大驚回顧左右曰今後如遇張翼德不可輕敵令寫於衣袍襟底以記之卻說顔良敗軍奔回半路迎見袁紹報說被赤面長須使大刀一勇將匹馬入陣斬顔良而去因此大敗紹驚問曰此人是誰沮授曰此必是劉玄德之弟關雲長也紹大怒指玄德曰汝弟斬吾愛將汝必通謀留爾何用喚刀斧手推出玄德斬之正是初見方爲座上客此日幾同階下囚未知玄德性命如何且聽下文分解
