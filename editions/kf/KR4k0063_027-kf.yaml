body:
  text: 第二十七回美髯公千里走單騎漢壽侯五關斬六將卻說曹操部下諸將中自張遼而外只有徐晃與雲長交厚其餘亦皆敬服獨蔡陽不服關公故今日聞其去欲往追之操曰不忘故主來去明白真丈夫也汝等皆當效之遂叱退蔡陽不令去趕程昱曰丞相待關某甚厚今彼不辭而去亂言片楮冒瀆鈞威其罪大矣若縱之使歸袁紹是與虎添翼也不若追而殺之以絕後患操曰吾昔已許之豈可失信彼各爲其主勿追也因謂張遼曰雲長封金挂印財賄不以動其心爵祿不以移其志此等人吾深敬之想他去此不遠我一發結識他做個人情汝可先去請住他待我與他送行更以路費征袍贈之使爲後日記念張遼領命單騎先往曹操引數十騎隨後而來卻說雲長所騎赤兔馬日行千里本是趕不上因欲護送車仗不敢縱馬按轡徐行忽聽背後有人大叫雲長且慢行回頭視之見張遼拍馬而至關公教車仗從人只管望大路緊行自己勒住赤兔馬按定青龍刀問曰文遠莫非欲追我回乎遼曰非也丞相知兄遠行欲來相送特先使我請住台駕別無他意關公曰便是丞相鐵騎來吾願決一死戰遂立馬於橋上望之見曹操引數十騎飛奔前來背後乃是許褚徐晃于禁李典之輩操見關公橫刀立馬於橋上令諸將勒住馬匹左右排開關公見衆人手中皆無軍器方始放心操曰雲長行何太速關公於馬上欠身答曰關某前曾稟過丞相今故主在河北不由某不急去累次造府不得參見故拜書告辭封金挂印納還丞相望丞相勿忘昔日之言操曰吾欲取信于天下安肯有負前言恐將軍途中乏用特具路資相送一將便從馬上托過黃金一盤關公曰累蒙恩賜尚有餘資留此黃金以賞將士操曰特以少酬大功于萬一何必推辭關公曰區區微勞何足挂齒操笑曰雲長天下義士恨吾福薄不得相留錦袍一領略表寸心令一將下馬雙手捧袍過來雲長恐有他變不敢下馬用青龍刀尖挑錦袍披於身上勒馬回頭稱謝曰蒙丞相賜袍異日更得相會遂下橋望北而去許褚曰此人無禮太甚何不擒之操曰彼一人一騎吾數十余人安得不疑吾言既出不可追也曹操自引將回城于路歎想雲長不已不說曹操自回且說關公來趕車仗約行三十裏卻只不見雲長心慌縱馬四下尋之忽見山頭一人高叫關將軍且住雲長舉目視之只見一少年黃巾錦衣持槍跨馬馬項下懸著首級一顆引百余步卒飛奔前來公問曰汝何人也少年棄槍下馬拜伏於地雲長恐是詐勒馬持刀問曰壯士願通姓名答曰吾本襄陽人姓廖名化字無儉因世亂流落江湖聚衆五百餘人劫掠爲生恰才同伴杜遠下山巡哨誤將兩夫人劫掠上山吾問從者知是大漢劉皇叔夫人且聞將軍護送在此吾即欲送下山來杜遠出言不遜被某殺之今獻頭與將軍請罪關公曰二夫人何在化曰現在山中關公教急取下山不移時百余人簇擁車仗前來關公下馬停刀叉手于車前問候曰二嫂受驚否二夫人曰若非廖將軍保全已被杜遠所辱關公問左右曰廖化怎生救夫人左右曰杜遠劫上山去就要與廖化各分一人爲妻廖化問起根由好生拜敬杜遠不從已被廖化殺了關公聽言乃拜謝廖化廖化欲以部下人送關公關公尋思此人終是黃巾餘黨未可作伴乃謝卻之廖化又拜送金帛關公亦不受廖化拜別自引人伴投山谷中去了雲長將曹操贈袍事告知二嫂催促車仗前行至天晚投一村莊安歇莊主出迎鬚髮皆白問曰將軍姓甚名誰關公施禮曰吾乃劉玄德之弟關某也老人曰莫非斬顔良文醜的關公否公曰便是老人大喜便請入莊關公曰車上還有二夫人老人便喚妻女出迎二夫上至草堂上關公叉手立于二夫人之側老人請公坐公曰尊嫂在上安敢就坐老人乃令妻女請二夫人入內室款待自于草堂款待關公關公問老人姓名老人曰吾姓胡名華桓帝時曾爲議郎致仕歸鄉今有小兒胡班在滎陽太守王植部下爲從事將軍若從此處經過某有一書寄與小兒關公允諾次日早膳畢請二嫂上車取了胡華書信相別而取路投洛陽來前至一關名東嶺關把關將姓孔名秀引五百軍兵在嶺上把守當日關公押車仗上嶺軍士報知孔秀秀出關來迎關公下馬與孔秀施禮秀曰將軍何往公曰某辭丞相特往河北尋兄秀曰河北袁紹正是丞相對頭將軍此去必有丞相文憑公曰因行期慌迫不曾討得秀曰既無文憑待我差人稟過丞相方可放行關公曰待去稟時須誤了我行程秀曰法度所拘不得不如此關公曰汝不容我過關乎秀曰汝要過去留下老小爲質關公大怒舉刀就殺孔秀秀退入關去鳴鼓聚軍披挂上馬殺下關來大喝曰汝敢過去麽關公約退車仗縱馬提刀竟不打話直取孔秀秀挺槍來迎兩馬相交只一合鋼刀起處孔秀屍橫馬下衆軍便走關公曰軍士休走吾殺孔秀不得已也與汝等無干借汝衆軍之口傳語曹丞相言孔秀欲害我我故殺之衆軍俱拜于馬前關公即請二夫人車仗出關望洛陽進發早有軍士報知洛陽太守韓福韓福急聚衆將商議牙將孟坦曰既無丞相文憑即系私行若不阻擋必有罪責韓福曰關公勇猛顔良文醜俱爲所殺今不可力敵只須設計擒之孟坦曰某有一計先將鹿角攔定關口待他到時小將引兵和他交鋒佯敗誘他來追公可用暗箭射之若關某墜馬即擒解許都必得重賞商議停當人報關公車仗已到韓福彎弓插箭引一千人馬排列關口問來者何人關公馬上欠身言曰吾漢壽亭侯關某敢借過路韓福曰有曹丞相文憑否關公曰事冗不曾討得韓福曰吾奉丞相鈞命鎮守此地專一盤詰往來奸細若無文憑即系逃竄關公怒曰東嶺孔秀已被吾殺汝亦欲尋死耶韓福曰誰人與我擒之孟坦出馬輪雙刀來取關公關公約退車伏拍馬來迎孟坦戰不三合撥回馬便走關公趕來孟坦只指望引誘關公不想關公馬快早已趕上只一刀砍爲兩段關公勒馬回來韓福閃在門首盡力放了一箭正射中關公左臂公用口拔出箭血流不住飛馬徑奔韓福沖散衆軍韓福急走不叠關公手起刀落帶頭連肩斬于馬下殺散衆軍保護車仗關公割帛束住箭傷于路恐人暗算不敢久住連夜投汜水關來把關將乃並州人氏姓卞名喜善使流星錘原是黃巾餘黨後投曹操撥來守關當下聞知關公將到尋思一計就關前鎮國寺中埋伏下刀斧手二百餘人誘關公至寺約擊盞爲號欲圖相害安排已定出關迎接關公公見卞喜來迎便下馬相見喜曰將軍名震天下誰不敬仰今歸皇叔足見忠義關公訴說斬孔秀韓福之事卞喜曰將軍殺之是也某見丞相代稟衷曲關公甚喜同上馬過了汜水關到鎮國寺前下馬衆僧鳴鍾出迎原來那鎮國寺乃漢明帝禦前香火院本寺有僧三十餘人內有一僧卻是關公同鄉人法名普淨當下普淨已知其意向前與關公問訊曰將軍離蒲東幾年矣關公曰將及二十年矣普淨曰還認得貧僧否公曰離鄉多年不能相識普淨曰貧僧家與將軍家只隔一條河卞喜見普淨敘出鄉里之情恐有走泄乃叱之曰吾欲請將軍赴宴汝僧人何得多言關公曰不然鄉人相遇安得不敍舊情耶普淨請關公方丈待茶關公曰二位夫人在車上可先獻茶普淨教取茶先奉夫人然後請關公入方丈普淨以手舉所佩戒刀以目視關公公會意命左右持刀緊隨卞喜請關公於法堂筵席關公曰卞君請關某是好意還是歹意卞喜未及回言關公早望見壁衣中有刀斧手乃大喝卞喜曰吾以汝爲好人安敢如此卞喜知事泄大叫左右下手左右方欲動手皆被關公拔劍砍之卞喜下堂繞廊而走關公棄劍執大刀來趕卞喜暗取飛錘擲打關公關公用刀隔開錘趕將入去一刀劈卞喜爲兩段隨即回身來看二嫂早有軍人圍住見關公來四下奔走關公趕散謝普淨曰若非吾師已被此賊害矣普淨曰貧僧此處難容收拾衣缽亦往他處雲遊也後會有期將軍保重關公稱謝護送車仗往滎陽進發滎陽太守王植卻與韓福是兩親家聞得關公殺了韓福商議欲暗害關公乃使人守住關口待關公到時王植出關喜笑相迎關公訴說尋兄之事植曰將軍于路驅馳夫人車上勞困且請入城館驛中暫歇一宵來日登途未遲關公見王植意甚殷勤遂請二嫂入城館驛中皆鋪陳了當王植請公赴宴公辭不往植使人送筵席至館驛關公因于路辛苦請二嫂晚膳畢就正房歇定令從者各自安歇飽喂馬匹關公亦解甲憩息卻說王植密喚從事胡班聽令曰關某背丞相而逃又於路殺太守並守關將校死罪不輕此人武勇難敵汝今晚點一千軍圍住館驛一人一個火把待三更時分一齊放火不問是誰盡皆燒死吾亦自引軍接應胡班領命便點起軍士密將乾柴引火之物搬於館驛門首約時舉事胡班尋思我久聞關雲長之名不識如何模樣試住窺之乃至驛中問驛吏曰關將軍在何處答曰正廳上觀書者是也胡班潛至廳前見關公左手綽髯於燈下憑幾看書班見了失聲歎曰真天人也公問何人胡班入拜曰滎陽太守部下從事胡班關公曰莫非許都城外胡華之子否班曰然也公喚從者於行李中取書付班班看畢歎曰險些誤殺忠良遂密告曰王植心懷不仁欲害將軍暗令人四面圍住館驛約於三更放火今某當先去開了城門將軍急收拾出城關公大驚忙披挂提刀上馬請二嫂上車盡出館驛果見軍士各執火把聽候關公急來到城邊只見城門已開關公催車仗急急出城胡班還去放火關公行不到數裏背後火把照耀人馬趕來當先王植大叫關某休走關公勒馬大罵匹夫我與你無仇如何令人放火燒我王植拍馬挺槍徑奔關公被關公攔腰一刀砍爲兩段人馬都趕散關公催車仗速行于路感胡班不已行至滑州界首有人報與劉延延引數十騎出郭而迎關公馬上欠身而言曰太守別來無恙延曰公今欲何往公曰辭了丞相去尋家兄延曰玄德在袁紹處紹乃丞相仇人如何容公去公曰昔日曾言定來延曰今黃河渡口關隘夏侯惇部將秦琪據守恐不容將軍過渡公曰太守應付船隻若何延曰船隻雖有不敢應付公曰我前者誅顔良文醜亦曾與足下解厄今日求一渡船而不與何也延曰只恐夏侯惇知之必然罪我關公知劉延無用之人遂自催車仗前進到黃河渡口秦琪引軍出問來者何人關公曰漢壽亭侯關某也琪曰今欲何往關公曰欲投河北去尋兄長劉玄德敬來借渡琪曰丞相公文何在公曰吾不受丞相節制有甚公文琪曰吾奉夏侯將軍將令守把關隘你便插翅也飛不過去關公大怒曰你知我于路斬戮攔截者乎琪曰你只殺得無名下將敢殺我麽關公怒曰汝比顔良文醜若何秦琪大怒縱馬提刀直取關公二馬相交只一合關公刀起秦琪頭落關公曰當吾者已死餘人不必驚走速備船隻送我渡河軍士急撐舟傍岸關公請二嫂上船渡河渡過黃河便是袁紹地方關公所曆關隘五處斬將六員後人有詩歎曰挂印封金辭漢相尋兄遙望遠途還馬騎赤兔行千里刀偃青龍出五關忠義慨然沖宇宙英雄從此震江山獨行斬將應無敵今古留題翰墨間關公於馬上自歎曰吾非欲沿途殺人奈事不得已也曹公知之必以我爲負恩之人矣正行間忽見一騎自北而來大叫雲長少住關公勒馬視之乃孫乾也關公曰自汝南相別一向消息若何乾曰劉辟龔都自將軍回兵之後複奪了汝南遣某往河北結好袁紹請玄德同謀破曹之計不想河北將士各相妒忌田豐尚囚獄中沮授黜退不用審配郭圖各自爭權袁紹多疑主持不定某與劉皇叔商議先求脫身之計今皇叔已往汝南會合劉辟去了恐將軍不知反到袁紹處或爲所害特遣某于路迎接將軍幸於此得見將軍可速往汝南與皇叔相會關公教孫乾拜見夫人夫人問其動靜孫乾備說袁紹二次欲斬皇叔今幸脫身往汝南去了夫人可與雲長到此相會二夫人皆掩面垂淚關公依言不投河北去徑取汝南來正行之間背後塵埃起處一彪人馬趕來當先夏侯惇大叫關某休走正是六將阻關徒受死一軍攔路複爭鋒畢竟關公怎生脫身且聽下文分解
