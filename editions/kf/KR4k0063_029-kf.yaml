body:
  text: 第二十九回小霸王怒斬于吉碧眼兒坐領江東卻說孫策自霸江東兵精糧足建安四年襲取廬江敗劉勳使虞翻馳檄豫章豫章太守貨歆投降自此聲勢大振乃遣張紘往許昌上表獻捷曹操知孫策強盛歎曰獅兒難與爭鋒也遂以曹仁之女許配孫策幼弟孫匡兩家結婚留張紘在許昌孫策求爲大司馬曹操不許策恨之常有襲許都之心於是吳郡太守許貢乃暗遣使赴許都上書於曹操其略曰孫策驍勇與項籍相似朝廷宜外示榮龐召還京師不可使居外鎮以爲後患使者齎書渡江被防江將士所獲解赴孫策處策觀書大怒斬其使遣人假意請許貢議事貢至策出書示之叱曰汝欲送我於死地耶命武士絞殺之貢家屬皆逃散有家客三人欲爲許貢報仇恨無其便一日孫策引軍會獵於丹徒之西山趕起一大鹿策縱馬上山逐之正趕之間只見樹林之內有三個人持槍帶弓而立策勒馬問曰汝等何人答曰乃韓當軍士也在此射鹿策方舉轡欲行一人拈槍望策左腿便刺策大驚急取佩劍從馬上砍去劍刃忽墜止存劍把在手一人早拈弓搭箭射來正中孫策面頰策就拔面上箭取弓回射放箭之人應弦而倒那二人舉槍向孫策亂搠大叫曰我等是許貢家客特來爲主人報仇策別無器械只以弓拒之且拒且走二人死戰不退策身被數槍馬亦帶傷正危急之時程普引數人至孫策大叫殺賊程普引衆齊上將許貢家客砍爲肉泥看孫策時血流滿面被傷至重乃以刀割袍裹其傷處救回吳會養病後人有詩贊許家三客曰孫郎智勇冠江湄射獵山中受困危許客三人能死義殺身豫讓未爲奇卻說孫策受傷而回使人尋請華佗醫治不想華佗已往中原去了止有徒弟在吳命其治療其徒曰箭頭有藥毒已入骨須靜養百日方可無虞若怒氣沖激其瘡難治孫策爲人最是性急恨不得即日便愈將息到二十餘日忽聞張紘有使者自許昌回策喚問之使者曰曹操甚懼主公其帳下謀士亦懼敬服惟有郭嘉不服策曰郭嘉曾有何說使者不敢言策怒固問之使者只得從實告曰郭嘉曾對曹操言主公不足懼也輕而無備性急少謀乃匹夫之勇耳他日必死於小人之手策聞言大怒曰匹夫安敢料吾吾誓取許昌遂不待瘡愈便欲商議出兵張昭諫曰醫者戒主公百日休動今何因一時之忿自輕萬金之軀正話間忽報袁紹遣使陳震至策喚入問之震具言袁紹欲結東吳爲外應共攻曹操策大喜即日會諸將於城樓上設宴款待陳震飲酒之間忽見諸將互相耳語紛紛下樓策怪問何故左右曰有于神仙者今從樓下過諸將欲往拜之耳策起身憑欄觀之見一道人身披鶴氅手攜藜杖立于當道百姓俱焚香伏道而拜策怒曰是何妖人快與我擒來左右告曰此人姓于名吉寓居東方往來吳會普施符水救人萬病無有不驗當世呼爲神仙未可輕瀆策愈怒喝令速速擒來違者斬左右不得已只得下樓擁于吉至樓上策叱曰狂道怎敢煽惑人心于吉曰貧道乃琅琊宮道士順帝時曾入山采藥得神書於曲陽泉水上號曰太平青領道凡百餘卷皆治人疾病方術貧道得之惟務代天宣化普救萬人未曾取人毫釐之物安得煽惑人心策曰汝毫不取人衣服飲食從何而得汝即黃巾張角之流今若不誅必爲後患叱左右斬之張昭諫曰于道人在江東數十年並無過犯不可殺害策曰此等妖人吾殺之何異屠豬狗衆官皆苦諫陳震亦勸策怒未息命且囚於獄中衆官俱散陳震自館驛安歇孫策歸府早有內侍傳說此事與策母吳太夫人知道夫人喚孫策入後堂謂曰吾聞汝將于神仙下于縲絏此人多曾醫人疾病軍民敬仰不可加害策曰此乃妖人能以妖術惑衆不可不除夫人再三勸解策曰母親勿聽外人妄言兒自有區處乃出喚獄吏取于吉來問原來獄吏皆敬信于吉吉在獄中時盡去其枷鎖及策喚取方帶枷鎖而出策訪知大怒痛責獄吏仍將于吉械系下獄張昭等數十人連名作狀拜求孫策乞保于神仙策曰公等皆讀書人何不達理昔交州刺史張津聽信邪教鼓瑟焚香常以紅帕裹頭自稱可助出軍之威後竟爲敵軍所殺此等事甚無益諸君自未悟耳吾欲殺于吉正思禁邪覺迷也呂範曰某素知于道人能祈風禱雨方今天旱何不令其祈雨以贖罪策曰吾且看此妖人若何遂命於獄中取出于吉開其枷鎖令登壇求雨吉領命即沐浴更衣取繩自縛於烈日之中百姓觀者填街塞巷于吉謂衆人曰吾求三尺甘霖以救萬民然我終不免一死衆人曰若有靈驗主公必然敬服于吉曰氣數至此恐不能逃少頃孫策親至壇中下令若午時無雨即焚死于吉先令人堆積乾柴伺候將及午時狂風驟起風過處四下陰雲漸合策曰時已近午空有陰雲而無甘雨正是妖人叱左右將于吉扛上柴堆四下舉火焰隨風起忽見黑煙一道沖上空中一聲響亮雷電齊發大雨如注頃刻之間街市成河溪澗皆滿足有三尺甘雨于吉仰臥于柴堆之上大喝一聲雲收雨住複見太陽於是衆官及百姓共將于吉扶下柴堆解去繩索再拜稱謝孫策見官民俱羅拜于水中不顧衣服乃勃然大怒叱曰晴雨乃天地之定數妖人偶乘其便你等何得如此惑亂掣寶劍令左右速斬于吉衆官力諫策怒曰爾等皆欲從于吉造反耶衆官乃不敢複言策叱武士將于吉一刀斬頭落地只見一道青氣投東北去了策命將其屍號令於市以正妖妄之罪是夜風雨交作及曉不見了于吉屍首守屍軍士報知孫策策怒欲殺守屍軍士忽見一人從堂前徐步而來視之卻是于吉策大怒正欲拔劍斫之忽然昏倒於地左右急救入臥內半晌方蘇吳太夫人來視疾謂策曰吾兒屈殺神仙故招此禍策笑曰兒自幼隨父出征殺人如麻何曾有爲禍之理今殺妖人正絕大禍安得反爲我禍夫人曰因汝不信以致如此今可作好事以禳之策曰吾命在天妖人決不能爲禍何必禳耶夫人料勸不信乃自令左右暗修善事禳解是夜二更策臥於內宅忽然陰風驟起燈滅而複明燈影之下見於吉立於床前策大喝曰吾平生誓誅妖妄以靖天下汝既爲陰鬼何敢近我取床頭劍擲之忽然不見吳太夫人聞之轉生憂悶策乃扶病強行以寬母心母謂策曰聖人雲鬼神之爲德其盛矣乎又雲禱爾於上下神祇鬼神之事不可不信汝屈殺于先生豈無報應吾已令人設醮於郡之玉清觀內汝可親往拜禱自然安妥策不敢違母命只得勉強乘轎至玉清觀道士接入請策焚香策焚香而不謝忽香爐中煙起不散結成一座華蓋上面端坐著于吉策怒唾駡之走離殿宇又見於吉於殿門首怒目視策策顧左右曰汝等見妖鬼否左右皆雲未見策愈怒拔佩劍望于吉擲去一人中劍而倒衆視之乃前日動手殺于吉之小卒被劍斫入腦袋七竅流血而死策命扛出葬之比及出觀又見於吉走入觀門來策曰此觀亦藏妖之所也遂坐於觀前命武士五百人拆毀之武士方上屋揭瓦卻見于吉立於屋上飛瓦擲地策大怒傳令逐出本觀道士放火燒毀殿宇火起處又見於吉立於火光之中策怒歸府又見于吉立於府門前策乃不入府隨點起三軍出城外下寨傳喚衆將商議欲起兵助袁紹夾攻曹操衆將俱曰主公玉體違和未可輕動且待平愈出兵未遲是夜孫策宿于寨內又見於吉披發而來策於帳中叱喝不絕次日吳太夫人傳命召策回府策乃歸見其母夫人見策形容憔悴泣曰兒失形矣策即引鏡自照果見形容十分瘦損不覺失驚顧左右曰吾奈何憔悴至此耶言未已忽見於吉立於鏡中策拍鏡大叫一聲金瘡迸裂昏絕於地夫人令扶入臥內須臾蘇醒自歎曰吾不能複生矣隨召張昭等諸人及弟孫權至臥榻前囑付曰天下方亂以吳越之衆三江之固大可有爲子布等幸善相吾弟乃取印綬與孫權曰若舉江東之衆決機於兩陣之間與天下爭衡卿不如我舉賢任能使各盡力以保江東我不如卿卿宜念父兄創業之艱難善自圖之權大哭拜受印綬策告母曰兒天年已盡不能奉慈母今將印綬付弟望母朝夕訓之父兄舊人慎勿輕怠母哭曰恐汝弟年幼不能任大事當複如何策曰弟才勝兒十倍足當大任倘內事不決可問張昭外事不決可問周瑜恨周瑜不在此不得面囑之也又喚諸弟囑曰吾死之後汝等並輔仲謀宗族中敢有生異心者衆共誅之骨肉爲逆不得入祖墳安葬諸弟泣受命又喚妻喬夫人謂曰吾與汝不幸中途相分汝須孝養尊姑早晚汝妹入見可囑其轉致周郎盡力輔佐吾弟休負我平日相知之雅言訖瞑目而逝年止二十六歲後人有詩贊曰獨戰東南地人稱小霸王運籌如虎踞決策似鷹揚威鎮三江靖名聞四海香臨終遺大事專意屬周郎孫策既死孫權哭倒於床前張昭曰此非將軍哭時也宜一面治喪事一面理軍國大事權乃收淚張昭令孫靜理會喪事請孫權出堂受衆文武謁賀孫權生得方頤大口碧眼紫髯昔漢使劉琬入吳見孫家諸昆仲因語人曰吾遍觀孫氏兄弟雖各才氣秀達然皆祿祚不終惟仲謀形貌奇偉骨格非常乃大貴之表又享高夀衆皆不及也且說當時孫權承孫策遺命掌江東之事經理未定人報周瑜自巴丘提兵回吳權曰公瑾已回吾無憂矣原來周瑜守禦巴丘聞知孫策中箭被傷因此回來問候將至吳郡聞策已亡故星夜來奔喪當下周瑜哭拜于孫策靈柩之前吳太夫人出以遺囑之語告瑜瑜拜伏於地曰敢不效犬馬之力繼之以死少頃孫權入周瑜拜見畢權曰願公無忘先兄遺命瑜頓首曰願以肝腦塗地報知己之恩權曰今承父兄之業將何策以守之瑜曰自古得人者昌失人者亡爲今之計須求高明遠見之人爲輔然後江東可定也權曰先兄遺言內事托子布外事全賴公瑾瑜曰子布賢達之士足當大任瑜不才恐負倚托之重願薦一人以輔將軍權問何人瑜曰姓魯名肅字子敬臨淮東城人也此人胸懷韜略腹隱機謀早年喪父事母至孝其家極富嘗散財以濟貧乏瑜爲居巢長之時將數百人過臨淮因乏糧聞魯肅家有兩囷米各三千斛因往求助肅即指一囷相贈其慷慨如此平生好擊劍騎射寓居曲阿祖母亡還葬東城其友劉子揚欲約彼往巢湖投鄭寶肅尚躊躇未往今主公可速召之權大喜即命周瑜往聘瑜奉命親往見肅敘禮畢具道孫權相慕之意肅曰近劉子揚約某往巢湖某將就之瑜曰昔馬援對光武雲當今之世非但君擇臣臣亦擇君今吾孫將軍親賢禮士納奇錄異世所罕有足下不須他計只同我往投東吳爲是肅從其言遂同周瑜來見孫權權甚敬之與之談論終日不倦一日衆官皆散權留魯肅共飲至晚同榻抵足而臥夜半權問肅曰方今漢室傾危四方紛擾孤承父兄餘業思爲桓文之事君將何以教我肅曰昔漢高祖欲尊事義帝而不獲者以項羽爲害也今之曹操可比項羽將軍何由得爲桓文乎肅竊料漢室不可復興曹操不可卒除爲將軍計惟有鼎足江東以觀天下之釁今乘北方多務剿除黃祖進伐劉表竟長江所極而據守之然後建號帝王以圖天下此高祖之業也權聞言大喜披衣起謝次日厚贈魯肅並將衣服幃帳等物賜肅之母肅又薦一人見孫權此人博學多才事母至孝覆姓諸葛名瑾字子瑜琅琊南陽人也權拜之爲上賓瑾勸權勿通袁紹且順曹操然後乘便圖之權依言乃遣陳震回以書絕袁紹卻說曹操聞孫策已死欲起兵下江南侍禦史張紘諫曰乘從之喪而伐之既非義舉若其不克棄好成仇不如因而善遇之操然其說乃即奏封孫權爲將軍兼領會稽太守即令張紘爲會稽都尉齎印往江東孫權大喜又得張紘回吳即命與張昭同理政事張紘又薦一人于孫權此人姓顧名雍字元歎乃中郎蔡邕之徒其爲人少言語不飲酒嚴厲正大權以爲丞行太守事自是孫權威震江東深得民心且說陳震回見袁紹具說孫策已亡孫權繼立曹操封之爲將軍結爲外應矣袁紹大怒遂起冀青幽並等處人馬七十余萬複來攻取許昌正是江南兵革方休息冀北干戈又復興未知勝負若何且聽下文分解
