body:
  text: 第三十回戰官渡本初敗績劫烏巢孟德燒糧卻說袁紹興兵望官渡進發夏侯惇發書告急曹操起兵七萬前往迎敵留荀彧守許都紹兵臨發田豐從獄中上書諫曰今且宜靜守以待天時不可妄興大兵恐有不利逢紀譖曰主公興仁義之師田豐何得出此不祥不語紹因怒欲斬田豐衆官告免紹恨曰待吾破了曹操明正其罪遂催軍進發旌旗遍野刀劍如林行至陽武下定寨柵沮授曰我軍雖衆而勇猛不及彼軍彼軍雖精而糧草不如我軍彼軍無糧利在急戰我軍有糧宜且緩守若能曠以日月則彼軍不戰自敗矣紹怒曰田豐慢我軍心吾回日必斬之汝安敢又如此叱左右將沮授鎖禁軍中待我破曹之後與田豐一體治罪於是下令將大軍七十萬東西南北周圍安營連絡九十餘裏細作探知虛實報至官渡曹軍新到聞之皆懼曹操與衆謀士商議荀攸曰紹軍雖多不足懼也我軍俱精銳之士無不一以當十但利在急戰若遷延日月糧草不敷事可憂矣操曰所言正合吾意遂傳令軍將鼓噪而進紹軍來迎兩邊排成陣勢審配撥弩手一萬伏於兩翼弓箭手五千伏於門旗內約炮響齊發三通鼓罷袁紹金盔金甲錦袍玉帶立馬陣前左右排列著張郃高覽韓猛惇於瓊等諸將旌旗節鉞甚是嚴整曹陣上門旗開處曹操出馬許褚張遼徐晃李典等各持兵器前後擁衛曹操以鞭指袁紹曰吾于天子之前保奏你爲大將軍今何故謀反紹怒曰汝託名漢相實爲漢賊罪惡彌天甚于莽卓乃反誣人造反耶操曰吾今奉詔討汝紹曰吾奉衣帶詔討賊操怒使張遼出戰張郃躍馬來迎二將鬥了四五十合不分勝負曹操見了暗暗稱奇許褚揮刀縱馬直出助戰高覽挺槍接住四員將捉對兒廝殺曹操令夏侯惇曹洪各引三千軍齊沖彼陣審配見曹軍沖陣便令放起號炮兩下萬弩並發中軍內弓箭手一齊擁出陣前亂射曹軍如何抵敵望南急走袁紹驅兵掩殺曹軍大敗盡退至官渡袁紹移軍逼近官渡下寨審配曰今可撥兵十萬守官渡就曹操寨前築起土山令軍人下視寨中放箭操若棄此而去吾得此隘口許昌可破矣紹從之於各寨內選精壯軍人用鐵鍬土擔齊來曹操寨邊壘土成山曹營內見袁軍堆築土山欲待出去衝突被審配弓弩手當住咽喉要路不能前進十日之內築成土山五十餘座上立高櫓分撥弓弩手於其上射箭曹軍大懼皆頂著遮箭牌守禦土山上一聲梆子響處箭下如雨曹軍皆蒙楯伏地袁軍呐喊而笑曹操見軍慌亂集衆謀士問計劉曄進曰可作發石車以破之操令曄進車式連夜造發石車數百乘分佈營牆內正對著土山上雲梯候弓箭手射箭時營內一齊拽動石車炮石飛空往上亂打人無躲處弓箭手死者無數袁軍皆號其車爲霹靂車由是袁軍不敢登高射箭審配又獻一計令軍人用鐵鍬暗打地道直透曹營內號爲掘子軍曹兵望見袁軍於山後掘土抗報知曹操操又問計于劉曄曄曰此袁軍不能攻明而攻暗發掘伏道欲從地下透營而入耳操曰何以禦之曄曰可繞營掘長塹則彼伏道無用也操連夜差軍掘塹袁軍掘伏道到塹邊果不能入空費軍力卻說曹操守官渡自八月起至九月終軍力漸乏糧草不繼意欲棄官渡退回許昌遲疑未決乃作書遣人赴許昌問荀彧彧以書報之書略曰承尊命使決進退之疑愚以袁紹悉衆聚於官渡欲與明公決勝負公以至弱當至強若不能制必爲所乘是天下之大機也紹軍雖衆而不能用以公之神武明哲何向而不濟今軍實雖少未若楚漢在滎陽成臯間也公今畫地而守扼其喉而使不能進情見勢竭必將有變此用奇之時斷不可失惟明公裁察焉曹操得書大喜令將士效力死守紹軍約退三十餘裏操遣將出營巡哨有徐晃部將史渙獲得袁軍細作解見徐晃晃問其軍中虛實答曰早晚大將韓猛運糧至軍前接濟先令我等探路徐晃便將此事報知曹操荀攸曰韓猛匹夫之勇耳若遣一人引輕騎數千從半路擊之斷其糧草紹軍自亂操曰誰人可往攸曰即遣徐晃可也操遂差徐晃將帶史渙並所部兵先出後使張遼許褚引兵救應當夜韓猛押糧車數千輛解赴紹寨正走之間山谷內徐晃史渙引軍截住去路韓猛飛馬來戰徐晃接住廝殺史渙便殺散人夫放火焚燒糧車韓猛抵當不住撥回馬走徐晃催軍燒盡輜重袁紹軍中望見西北上火起正驚疑間敗軍報來糧草被劫紹急遣張郃高覽去截大路正遇徐晃燒糧而回恰欲交鋒背後張遼許褚軍到兩下夾攻殺散袁軍四將合兵一處回官渡寨中曹操大喜重加賞勞又分軍于寨前結營爲掎角之勢卻說韓猛敗軍還營紹大怒欲斬韓猛衆官勸免審配曰行軍以糧食爲重不可不用心提防烏巢乃屯糧之處必得重兵守之袁紹曰吾籌策已定汝可回鄴都監督糧草休教缺乏審配領命而去袁紹遣大將淳于瓊部領督將眭元進韓莒子呂威璜趙睿等引二萬人馬守烏巢那淳於瓊性剛好酒軍士多畏之既至烏巢終日與諸將聚飲且說曹操軍糧告竭急發使往許昌教荀彧作速措辦糧草星夜解赴軍前接濟使者齎書而往行不上三十裏被袁軍捉住縛見謀士許攸那許攸字子遠少時曾與曹操爲友此時卻在袁紹處爲謀士當下搜得使者所齎曹操催糧書信徑來見紹曰曹操屯軍官渡與我相持已久許昌必空虛若分一軍星夜掩襲許昌則許昌可拔而曹操可擒也今操糧草已盡正可乘此機會兩路擊之紹曰曹操詭計極多此書乃誘敵之計也攸曰今若不取後將反受其害正話間忽有使者自鄴郡來呈上審配書書中先說運糧事後言許攸在冀州時嘗濫受民間財物且縱令子侄輩多科稅錢糧入己今已收其子侄下獄矣紹見大怒曰濫行匹夫尚有面目於吾前獻計耶汝與曹操有舊想今亦受他財賄爲他作奸細啜賺吾軍耳本當斬首今權且寄頭在項可速退出今後不許相見許攸出仰天歎曰忠言逆耳豎子不足與謀吾子侄已遭審配之害吾何顔複見冀州之人乎遂欲拔劍自刎左右奪劍勸曰公何輕生至此袁紹不納直言後必爲曹操所擒公既與曹公有舊何不棄暗投明只這兩句言語點醒許攸於是許攸徑投曹寨後人有詩歎曰本初豪氣蓋中華官渡相持枉歎嗟若使許攸謀見用山河爭得屬曹家卻說許攸暗步出營徑投曹操伏路軍人拿住攸曰我是曹丞相故友快與我通報說南陽許攸來見軍士忙報入寨中時操方解衣歇息聞說許攸私奔到寨大喜不及穿履跣足出迎遙見許攸撫掌歡笑攜手共入操先拜於地攸慌扶起曰公乃漢相吾乃布衣何謙恭如此操曰公乃操故友豈敢以名爵相上下乎攸曰某不能擇主屈身袁紹言不聽計不從今特棄之來見故人願賜收錄操曰子遠肯來吾事濟矣願即教我以破紹之計攸曰吾曾教袁紹以輕騎乘虛襲許都首尾相攻操大驚曰若袁紹用子言吾事敗矣攸曰公今軍糧尚有幾何操曰可支一年攸笑曰恐未必操曰有半年耳攸拂袖而起趨步出帳曰吾以誠相投而公見欺如是豈吾所望哉操挽留曰子遠勿嗔尚容實訴軍中糧實可支三月耳攸笑曰世人皆言孟德奸雄今果然也操亦笑曰豈不聞兵不厭詐遂附耳低言曰軍中止有此月之糧攸大聲曰休瞞我糧已盡矣操愕然曰何以知之攸乃出操與荀彧之書以示之曰此書何人所寫操驚問曰何處得之攸以獲使之事相告操執其手曰子遠既念舊交而來願即有以教我攸曰明公以孤軍抗大敵而不求急勝之方此取死之道也攸有一策不過三日使袁紹百萬之衆不戰自破明公還肯聽否操喜曰願聞良策攸曰袁紹軍糧輜重盡積烏巢今撥淳於瓊守把瓊嗜酒無備公可選精兵詐稱袁將蔣奇領兵到彼護糧乘間燒其糧草輜重則紹軍不三日將自亂矣操大喜重待許攸留於寨中次日操自選馬步軍士五千準備往烏巢劫糧張遼曰袁紹屯糧之所安得無備丞相未可輕往恐許攸有詐操曰不然許攸此來天敗袁紹今吾軍糧不給難以久持若不用許攸之計是坐而待困也彼若有詐安肯留我寨中且吾亦欲劫寨久矣今劫糧之舉計在必行君請勿疑遼曰亦須防袁紹乘虛來襲操笑曰吾已籌之熟矣便教荀攸賈詡曹洪同許攸守大寨夏侯惇夏侯淵領一軍伏于左曹仁李典領一軍伏於右以備不虞教張遼許褚在前徐晃於禁在後操自引諸將居中共五千人馬打著袁軍旗號軍士皆束草負薪人銜枚馬勒口黃昏時分望烏巢進發是夜星光滿天且說沮授被袁紹拘禁在軍中是夜因見衆星朗列乃命監者引出中庭仰觀天象忽見太白逆行侵犯牛鬥之分大驚曰禍將至矣遂連夜求見袁紹時紹已醉臥聽說沮授有密事啓報喚入問之授曰適觀天象見太白逆行於柳鬼之間流光射入牛鬥之分恐有賊兵劫掠之害烏巢屯糧之所不可不提備宜速遣精兵猛將于間道山路巡哨免爲曹操所算紹怒叱曰汝乃得罪之人何敢妄言惑衆因叱監者曰吾令汝拘囚之何敢放出遂命斬監者別喚人監押沮授授出掩淚歎曰我軍亡在旦夕我屍骸不知落何處也後人有詩歎曰逆耳忠言反見仇獨夫袁紹少機謀烏巢糧盡根基拔猶欲區區守冀州卻說曹操領兵夜行前過袁紹別寨寨兵問是何處軍馬操使人應曰蔣奇奉命往烏巢護糧袁軍見是自家旗號遂不疑惑凡過數處皆詐稱蔣奇之兵並無阻礙及到烏巢四更已盡操教軍士將束草周圍舉火衆將校鼓噪直入時淳于瓊方與衆將飲了酒醉臥帳中聞鼓噪之聲連忙跳起問何故喧鬧言未已早被撓鈎拖翻眭元進趙睿運糧方回見屯上火起急來救應曹軍飛報曹操說賊兵在後請分軍拒之操大喝曰諸將只顧奮力向前待賊至背後方可回戰於是衆軍將無不爭先掩殺一霎時火焰四起煙迷太空眭趙二將驅兵來救操勒馬回戰二將抵敵不住皆被曹軍所殺糧草盡行燒絕淳於瓊被擒見操操命割去其耳鼻手指縛於馬上放回紹營以辱之卻說袁紹在帳中聞報正北上火光滿天知是烏巢有失急出帳召文武各官商議遣兵往救張郃曰某與高覽同往救之郭圖曰不可曹軍劫糧曹操必然親往操既自出寨必空虛可縱兵先擊曹操之寨操聞之必速還此孫臏圍魏救趙之計也張郃曰非也曹操多謀外出必爲內備以防不虞今若攻操營而不拔瓊等見獲吾屬皆被擒矣郭圖曰曹操只顧劫糧豈留兵在寨耶再三請劫曹營紹乃遣張郃高覽引軍五千往官渡擊曹營遣蔣奇領兵一萬往救烏巢且說曹操殺散淳於瓊部卒盡奪其衣甲旗幟僞詐淳於瓊部下敗軍回寨至山僻小路正遇蔣奇軍馬奇軍問之稱是烏巢敗軍奔回奇遂不疑驅馬徑過張遼許褚忽至大喝蔣奇休走奇措手不及被張遼斬于馬下盡殺蔣奇之兵又使人當先僞報雲蔣奇已自殺散烏剿兵了袁紹因不復遣人接應烏巢只添兵往官渡卻說張郃高覽攻打曹營左邊夏侯惇右邊曹仁中路曹洪一齊沖出三下攻擊袁軍大敗比及接應軍到曹操又從背後殺來四下圍住掩殺張郃高覽奪路走脫袁紹收得烏巢敗殘軍馬歸寨見淳於瓊耳鼻皆無手足盡落紹問如何失了烏巢敗軍告說淳於瓊醉臥因此不能抵敵紹怒立斬之郭圖恐張郃高覽回寨證對是非先于袁紹前譖曰張郃高覽見主公兵敗心中必喜紹曰何出此言圖曰二人素有降曹之意今遣擊寨故意不肯用力以致損折士卒紹大怒遂遣使急召二人歸寨問罪郭圖先使人報二人雲主公將殺汝矣及紹使至高覽問曰主公喚我等爲何使者曰不知何故覽遂拔劍斬來使郃大驚覽曰袁紹聽信讒言必爲曹操所擒吾等豈可坐而待死不如去投曹操郃曰吾亦有此心久矣於是二人領本部兵馬往曹操寨中投降夏侯惇曰張高二人來降未知虛實操曰吾以恩遇之雖有異心亦可變矣遂開營門命二人入二人倒戈卸甲拜伏於地操曰若使袁紹肯從二將軍之言不至有敗今二將軍肯來相投如微子去殷韓信歸漢也遂封張郃爲偏將軍都亭侯高覽爲偏將軍東萊侯二人大喜卻說袁紹既去了許攸又去了張郃高覽又失了烏巢糧軍心皇皇許攸又勸曹操作速進兵張郃高覽請爲先鋒操從之即令張郃高覽領兵往劫紹寨當夜三更時分出軍三路劫寨混戰到明各自收兵紹軍折其大半荀攸獻計曰今可揚言調撥人馬一路取酸棗攻鄴郡一路取黎陽去斷袁兵歸路袁紹聞之必然驚惶分兵拒我我乘其兵動時擊之紹可破也操用其計使大小三軍四遠揚言紹軍聞此信來寨中報說曹操分兵兩路一路取鄴郡一路取黎陽去也紹大驚急遣袁譚分兵五萬救鄴郡辛明分兵五萬救黎陽連夜起行曹操探知袁紹兵動便分大隊軍馬八路齊出直沖紹營袁軍俱無鬥志四散奔走遂大潰袁紹披甲不叠單衣幅巾上馬幼子袁尚後隨張遼許褚徐晃於禁四員將引軍追趕袁紹紹急渡河盡棄圖書車仗金帛止引隨行八百餘騎而去操軍追之不及盡獲遺下之物所殺八萬餘人血流盈溝溺水死者不計其數操獲全勝將所得金寶緞匹給賞軍士于圖書中撿出書信一束皆許都及軍中諸人與紹暗通之書左右曰可逐一點對姓名收而殺之操曰當紹之強孤亦不能自保況他人乎遂命盡焚之更不再問卻說袁紹兵敗而奔沮授因被囚禁急走不脫爲曹軍所獲擒見曹操操素與授相識授見操大呼曰授不降也操曰本初無謀不用君言君何尚執迷耶吾若早得足下天下不足慮也因厚待之留於軍中授乃于營中盜馬欲歸袁氏操怒乃殺之授至死神色不變操歎曰吾誤殺忠義之士也命厚禮殯殮爲建墳安葬于黃河渡口題其墓曰忠烈沮君之墓後人有詩贊曰河北多名士忠貞推沮君凝眸知陣法仰面識天文至死心如鐵臨危氣似雲曹公欽義烈特與建孤墳操下令攻冀州正是勢弱只因多算勝兵強卻爲寡謀亡未知勝負如何且看下文分解
