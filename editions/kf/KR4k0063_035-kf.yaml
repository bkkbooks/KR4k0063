body:
  text: 第三十五回玄德南漳逢隱淪單福新野遇英主卻說蔡瑁方欲回城趙雲引軍趕出城來原來趙雲正飲酒間忽見人馬動急入內觀之席上不見了玄德雲大驚出投館舍聽得人說蔡瑁引軍望西趕去了雲火急綽槍上馬引著原帶來三百軍奔出西門正遇見蔡瑁急問曰吾主何在瑁曰使君逃席而去不知何往趙雲是謹細之人不肯造次即策馬前行遙望大溪別無去路乃複回馬喝問蔡瑁曰汝請吾主赴宴何故引著軍馬追來瑁曰九郡四十二州縣官僚俱在此吾爲上將豈可不防護雲曰汝逼吾主何去了瑁曰聞使君匹馬出西門到此卻又不見雲驚疑不定直來溪邊看時只見隔岸一帶水迹雲暗忖曰難道連馬跳過了溪去令三百軍四散觀望亦不見蹤迹雲再回馬時蔡瑁已入城去了雲乃拿守門軍士追向皆說劉使君飛馬出西門而去雲再欲入城又恐有埋伏遂急引軍歸新野卻說玄德躍馬過溪似醉如癡想此闊澗一躍而過豈非天意迤邐望南漳策馬而行日將沈西正行之間見一牧童跨于牛背上口吹短笛而來玄德歎曰吾不如也遂立馬觀之牧童亦停牛罷笛熟視玄德曰將軍莫非破黃巾劉玄德否玄德驚問曰汝乃村僻小童何以知吾姓字牧童曰我本不知因常侍師父有客到日多曾說有一劉玄德身長七尺五寸垂手過膝目能自顧其耳乃當世之英雄今觀將軍如此模樣想必是也玄德曰汝師何人也牧童曰吾師複姓司馬名徽字德操潁川人也道號水鏡先生玄德曰汝師與誰爲友小童曰與襄陽龐德公龐統爲友玄德曰龐德公乃龐統何人童子曰叔侄也龐德公字山民長俺師父十歲寵統字士元少俺師父五歲一日我師父在樹上采桑適龐統來相訪坐於樹下共相議論終日不倦吾師甚愛龐統呼之爲弟玄德曰汝師今居何處牧童遙指曰前面林中便是莊院玄德曰吾正是劉玄德汝可引我去拜見你師父童子便引玄德行二裏余到莊前下馬入至中門忽聞琴聲甚美玄德教童子且休通報側耳聽之琴聲忽住而不彈一人笑而出曰琴韻清幽音中忽起高抗之調必有英雄竊聽童子指謂玄德曰此即吾師水鏡先生也玄德視其人松形鶴骨器宇不凡慌忙進前施禮衣襟尚濕水鏡曰公今日倖免大難玄德驚訝不已小童曰此劉玄德也水鏡請入草堂分賓主坐定玄德見架上滿堆書卷窗外盛栽松竹橫琴于石床之上清氣飄然水鏡問曰明公何來玄德曰偶爾經由此地因小童相指得拜尊顔不勝萬幸水鏡笑曰公不必隱諱公今必逃難至此玄德遂以襄陽一事告之水鏡曰吾觀公氣色已知之矣因問玄德曰吾久聞明公大名何故至今猶落魄不偶耶玄德曰命途多蹇所以至此水鏡曰不然蓋因將軍左右不得其人耳玄德曰備雖不才文有孫乾糜竺簡雍之輩武有關張趙雲之流竭忠輔相頗賴其力水鏡曰關張趙雲皆萬人敵惜無善用之之人若孫乾糜竺輩乃白面書生非經綸濟世之才也玄德曰備亦嘗側身以求山谷之遺賢奈未遇其人何水鏡曰豈不聞孔子雲十室之邑必有忠信何謂無人玄德曰備愚昧不識願賜指教水鏡曰公聞荊襄諸郡小兒謠言乎其謠曰八九年間始欲衰至十三年無孑遺到頭天命有所歸泥中蟠龍向天飛此謠始于建安初建安八年劉景升喪卻前妻便生家亂此所謂始欲衰也無孑遺者不久則景升將逝文武零落無孑遺矣天命有歸龍向天飛蓋應在將軍也玄德聞言驚謝曰備安敢當此水鏡曰今天下之奇才盡在於此公當往求之玄德急問曰奇才安在果系何人水鏡曰伏龍鳳雛兩人得一可安天下玄德曰伏龍鳳雛何人也水鏡撫掌大笑曰好好玄德再問時水鏡曰天色已晚將軍可于此暫宿一宵明日當言之即命小童具飲饌相待馬牽入後院餵養玄德飲膳畢即宿於草堂之側玄德因思水鏡之言寢不成寐約至更深忽聽一人叩門而入水鏡曰元直何來玄德起床密聽之聞其人答曰久聞劉景升善善惡惡特往謁之及至相見徒有虛名蓋善善而不能用惡惡而不能去者也故遺書別之而來至此水鏡曰公懷王佐之才宜擇人而事奈何輕身往見景升乎且英雄豪傑只在眼前公自不識耳其人曰先生之言是也玄德聞之大喜暗忖此人必是伏龍鳳雛即欲出見又恐造次候至天曉玄德求見水鏡問曰昨夜來者是誰水鏡曰此吾友也玄德求與相見水鏡曰此人欲往投明主已到他處去了玄德請問其姓名水鏡笑曰好好玄德再問伏龍鳳雛果系何人水鏡亦只笑曰好好玄德拜請水鏡出山相助同扶漢室水鏡曰山野閒散之人不堪世用自有勝吾十倍者來助公公宜訪之正談論間忽聞莊外人喊馬嘶小童來報有一將軍引數百人到莊來也玄德大驚急出視之乃趙雲也玄德大喜雲下馬入見曰某夜來回縣尋不見主公連夜跟問到此主公可作速回縣只恐有人來縣中廝殺玄德辭了水鏡與趙雲上馬投新野來行不數裏一彪人馬來到視之乃雲長翼德也相見大喜玄德訴說躍馬檀溪之事共相嗟訝到縣中與孫乾等商議乾曰可先致書于景升訴告此事玄德從其言即令孫乾齎書至荊州劉表喚入問曰吾請玄德襄陽赴會緣何逃席而去孫乾呈上書劄具言蔡瑁設謀相害賴躍馬檀溪得脫表大怒急喚蔡瑁責駡曰汝焉敢害吾弟拿推出斬之蔡夫人出哭求免死表怒猶未息孫乾告曰若殺蔡瑁恐皇叔不能安居于此矣表乃責而釋之使長子劉琦同孫乾至玄德處請罪琦奉命赴新野玄德接著設宴相待酒酣琦忽然墮淚玄德問其故琦曰繼母蔡氏常懷謀害之心侄無計免禍幸叔父指教玄德勸以小心盡孝自然無禍次日琦泣別玄德乘馬送琦出郭因指馬謂琦曰若非此馬吾已爲泉下之人矣琦曰此非馬之力乃叔父之洪福也說罷相別劉琦涕泣而去玄德回馬入城忽見市上一人葛巾布袍皂縧烏履長歌而來歌曰天地反覆兮火欲殂大廈將崩兮一木難扶山谷有賢兮欲投明主明主求賢兮卻不知吾玄德聞歌暗思此人莫非水鏡所言伏龍鳳雛乎遂下馬相見邀入縣衙問其姓名答曰某乃潁上人也姓單名福久聞使君納士招賢欲來投托未敢輒造故行歌於市以動尊聽耳玄德大喜待爲上賓單福曰適使君所乘之馬再乞一觀玄德命去鞍牽於堂下單福曰此非的盧馬乎雖是千里馬卻只妨主不可乘也玄德曰已應之矣遂具言躍檀溪之事福曰此乃救主非妨主也終必妨一主某有一法可禳玄德曰願聞禳法福曰公意中有仇怨之人可將此馬賜之待妨過了此人然後乘之自然無事玄德聞言變色曰公初至此不教吾以正道便教作利己妨人之事備不敢聞教福笑謝曰向聞使君仁德未敢便信故以此言相試耳玄德亦改容起謝曰備安能有仁德及人惟先生教之福曰吾自潁上來此聞新野之人歌曰新野牧劉皇叔自到此民豐足可見使君之仁德及人也玄德乃拜單福爲軍師調練本部人馬卻說曹操自冀州回許都常有取荊州之意特差曹仁李典並降將呂曠呂翔等領兵三萬屯樊城虎視荊襄就探看虛實時呂曠呂翔稟曹仁曰今劉備屯兵新野招軍買馬積草儲糧其志不小不可不早圖之吾二人自降丞相之後未有寸功願請精兵五千取劉備之頭以獻丞相曹仁大喜與二呂兵五千前往新野廝殺探馬飛報玄德玄德請單福商議福曰既有敵兵不可令其入境可使關公引一軍從左而出以敵來軍中路張飛引一軍從右而出以敵來軍後路公自引趙雲出兵前路相迎敵可破矣玄德從其言即差關張二人去訖然後與單福趙雲等共引二千人馬出關相迎行不數裏只見山後塵頭大起呂曠呂翔引軍來到兩邊各射住陣角玄德出馬於旗門下大呼曰來者何人敢犯吾境呂曠出馬曰吾乃大將呂曠也奉丞相命特來擒汝玄德大怒使趙雲出馬二將交戰不數合趙雲一槍刺呂曠于馬下玄德麾軍掩殺呂翔抵敵不住引軍便走正行間路傍一軍突出爲首大將乃關雲長也衝殺一陣呂翔折兵大半奪路走脫行不到十裏又一軍攔住去路爲首大將挺矛大叫張翼德在此直取呂翔翔措手不及被張飛一矛刺中翻身落馬而死餘衆四散奔走玄德合軍追趕大半多被擒獲玄德班師回縣重待單福犒賞三軍卻說敗軍回見曹仁報說二呂被殺軍士多被活捉曹仁大驚與李典商議典曰二將欺敵而亡今只宜按兵不動申報丞相起大兵來征剿乃爲上策仁曰不然今二將陣亡又折許多軍馬此仇不可不急報量新野彈丸之地何勞丞相大軍典曰劉備人傑也不可輕視仁曰公何怯也典曰兵法雲知彼知己百戰百勝某非怯戰但恐不能必勝耳仁怒曰公懷二心耶吾必欲生擒劉備典曰將軍若去某守樊城仁曰汝若不同去真懷二心矣典不得已只得與曹仁點起二萬五千軍馬渡河投新野而來正是偏裨既有輿屍辱主將重興雪恥兵未知勝負何如且聽下文分解
