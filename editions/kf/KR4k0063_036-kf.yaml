body:
  text: 第三十六回玄德用計襲樊城元直走馬薦諸葛卻說曹仁忿怒遂大起本部之兵星夜渡河意欲踏平新野且說單福得勝回縣謂玄德曰曹仁屯兵樊城今知二將被誅必起大軍來戰玄德曰當何以迎之福曰彼若盡提兵而來樊城空虛可乘間奪之玄德問計福附耳低言如此如此玄德大喜預先準備已定忽報馬報說曹仁引大軍渡河來了單福曰果不出吾之料遂請玄德出軍迎敵兩陣對圓趙雲出馬喚彼將答話曹仁命李典出陣與趙雲交鋒約戰十數合李典料敵不過撥馬回陣雲縱馬追趕兩翼軍射住遂各罷兵歸寨李典回見曹仁言彼軍精銳不可輕敵不如回樊城曹仁大怒曰汝未出軍時已慢吾軍心今又賣陣罪當斬首便喝刀斧手推出李典要斬衆將苦告方免乃調李典領後軍仁自引兵爲前部次日鳴鼓進軍布成一個陣勢使人問玄德曰識吾陣否單福便上高處觀看畢謂玄德曰此八門金鎖陣也八門者休生傷杜景死驚開如從生門景門開門而入則吉從傷門驚門休門而入則傷從杜門死門而入則亡今八門雖布得整齊只是中間通欠主持如從東南角上生門擊入往正西景門而出其陣必亂玄德傳令教軍士把住陣角命趙雲引五百軍從東南而入徑往西出雲得令挺槍躍馬引兵徑投東南角上呐喊殺入中軍曹仁便投北走雲不追趕卻突出西門又從西殺轉東南角上來曹仁軍大亂玄德麾軍衝擊曹兵大敗而退單福命休追趕收軍自回卻說曹仁輸了一陣方信李典之言因複請典商議言劉備軍中必有能者吾陣竟爲所破李典曰吾雖在此甚憂樊城曹仁曰今晚去劫寨如得勝再作計議如不勝便退軍回樊城李典曰不可劉備必有準備仁曰若如此多疑何以用兵遂不聽李典之言自引軍爲前隊使李典爲後應當夜二更劫寨卻說單福正與玄德在寨中議事忽信風驟起福曰今夜曹仁必來劫寨玄德曰何以敵之福笑曰吾已預算定了遂密密分撥已畢至二更曹仁兵將近寨只見寨中四圍火起燒著寨柵曹仁知有準備急令退軍趙雲掩殺將來仁不及收兵回寨急望北河而走將到河邊才欲尋船渡河岸上一彪軍殺到爲首大將乃張飛也曹仁死戰李典保護曹仁下船渡河曹軍大半淹死水中曹仁渡過河面上岸奔至樊城令人叫門只見城上一聲鼓響一將引軍而出大喝曰吾已取樊城多時矣衆驚視之乃關雲長也仁大驚撥馬便走雲長追殺過來曹仁又折了好些軍馬星夜投許昌于路打聽方知有單福爲軍師設謀定計不說曹仁敗回許昌且說玄德大獲全勝引軍入樊城縣令劉泌出迎玄德安民已定那劉泌乃長沙人亦漢室宗親遂請玄德到家設宴相待只見一人侍立於側玄德視其人器宇軒昂因問泌曰此何人泌曰此吾之甥寇封本羅侯寇氏之子也因父母雙亡故依於此玄德愛之欲嗣爲義子劉泌欣然從之遂使寇封拜玄德爲父改名劉封玄德帶回令拜雲長翼德爲叔雲長曰兄長既有子何必用螟嶺後必生亂玄德曰吾待之如子彼必事吾如父何亂之有雲長不悅玄德與單福計議令趙雲引一千軍守樊城玄德領衆自回新野卻說曹仁與李典回許都見曹操泣拜於地請罪具言損將折兵之事操曰勝負乃軍家之常但不知誰爲劉備畫策曹仁言是單福之計操曰單福何人也程昱笑曰此非單福也此人幼好學擊劍中平末年嘗爲人報仇殺人披發塗面而走爲吏所獲問其姓名不答吏乃縛于車上擊鼓行於市令市人識之雖有識者不敢言而同伴竊解救之乃更姓名而逃折節向學遍訪名師嘗與司馬徽談論此人乃潁川徐庶字元直單福乃其託名耳操曰徐庶之才比君何如昱曰十倍於昱操曰惜乎賢士歸於劉備羽翼成矣奈何昱曰徐庶雖在彼丞相要用召來不難操曰安得彼來歸昱曰徐庶爲人至孝幼喪其父止有老母在堂現今其弟徐康已亡老母無人侍養丞相可使人賺其母至許昌令作書召其子則徐庶必至矣操大喜使人星夜前去取徐庶母不一日取至操厚待之因謂之曰聞令嗣徐元直乃天下奇才也今在新野助逆臣劉備背叛朝廷正猶美玉落於污泥之中誠爲可惜今煩老母作書喚回許都吾于天子之前保奏必有重賞遂命左右捧過文房四寶令徐母作書徐母曰劉備何如人也操曰沛郡小輩妄稱皇叔全無信義所謂外君子而內小人者也徐母厲聲曰汝何虛誑之甚也吾久聞玄德乃中山靖王之後孝景皇帝閣下玄孫屈身下士恭已待人仁聲素著世之黃童白叟牧子樵夫皆知其名真當世之英雄也吾兒輔之得其主矣汝雖託名漢相實爲漢賊乃反以玄德爲逆臣欲使吾兒背明投暗豈不自恥乎言訖取石硯便打曹操操大怒叱武士執徐母出將斬之程昱急止之入諫操曰徐母觸忤丞相者欲求死也丞相若殺之則招不義之名而成徐母之德徐母既死徐庶必死心助劉備以報仇矣不如留之使徐庶身心兩處縱使助劉備亦不盡力也且留得徐母在昱自有計賺徐庶至此以輔丞相操然其言遂不殺徐母送於別室養之程昱日往問候詐言曾與徐庶結爲兄弟待徐母如親母時常饋送物件必具手啓徐母因亦作手啓答之程昱賺得徐母筆迹乃仿其字體詐修家書一封差一心腹人持書徑奔新野縣尋問單福行幕軍士引見徐庶庶知母有家書至急喚入問之來人曰某乃館下走卒奉老夫人言語有書附達庶拆封視之書曰近汝弟康喪舉目無親正悲淒間不期曹丞相使人賺至許昌言汝背反下我於縲絏賴程昱等救免若得汝降則能免我死如書到日可念劬勞之恩星夜前來以全孝道然後徐圖歸耕故園免遭大禍吾今命苦懸絲專望救援更不多囑徐庶覽畢淚如泉湧持書來見玄德曰某本潁川徐庶字元直爲因逃難更名單福前聞劉景升招賢納士特往見之及與論事方知是無用之人故作書別之夤夜至司馬水鏡莊上訴說其事水鏡深責庶不識主因說劉豫州在此何不事之庶故作狂歌於市以動使君幸蒙不棄即賜重用爭奈老母今被曹操奸計賺至許昌囚禁將欲加害老母手書來喚庶不容不去非不欲效犬馬之勞以報使君奈慈親被執不得盡力今當告歸容圖後會玄德聞言大哭曰子母乃天性之親元直無以備爲念待與老夫人相見之後或者再得奉教徐庶便拜謝欲行玄德曰乞再聚一宵來日餞行孫乾密謂玄德曰元直天下奇才久在新野盡知我軍中虛實今若使歸曹操必然重用我其危矣主公宜苦留之切勿放去操見元直不去必斬其母元直知母死必爲母報仇力攻曹操也玄德曰不可使人殺其母而吾用其子不仁也留之不使去以絕其子母之道不義也吾寧死不爲不仁不義之事衆皆感歎玄德請徐庶飲酒庶曰今聞老母被囚雖金波玉液不能下咽矣玄德曰備聞公將去如失左右手雖龍肝鳳髓亦不甘味二人相對而泣坐以待旦諸將已于郭外安排筵席餞行玄德與徐庶並馬出城至長亭下馬相辭玄德舉杯謂徐庶曰備分淺緣薄不能與先生相聚望先生善事新主以成功名庶泣曰某才微智淺深荷使君重用今不幸半途而別實爲老母故也縱使曹操相逼庶亦終身不設一謀玄德曰先生既去劉備亦將遠遁山林矣庶曰某所以與使君共圖王霸之業者恃此方寸耳今以老母之故方寸亂矣縱使在此無益於事使君宜別求高賢輔佐共圖大業何便灰心如此玄德曰天下高賢恐無出先生右者庶曰某樗櫟庸材何敢當此重譽臨別又顧謂諸將曰願諸公善事使君以圖名垂竹帛功標青史切勿效庶之無始終也諸將無不傷感玄德不忍相離送了一程又送一程庶辭曰不勞使君遠送庶就此告別玄德就馬上執庶之手曰先生此去天各一方未知相會卻在何日說罷淚如雨下庶亦涕泣而別玄德立馬于林畔看徐庶乘馬與從者匆匆而去玄德哭曰元直去矣吾將奈何凝淚而望卻被一樹林隔斷玄德以鞭指曰吾欲盡伐此處樹木衆問何故玄德曰因阻吾望徐元直之目也正望間忽見徐庶拍馬而回玄德曰元直複回莫非無去意乎遂欣然拍馬向前迎問曰先生此回必有主意庶勒馬謂玄德曰某因心緒如麻忘卻一語此間有一奇士只在襄陽城外二十裏隆中使君何不求之玄德曰敢煩元直爲備請來相見庶曰此人不可屈致使君可親往求之若得此人無異周得呂望漢得張良也玄德曰此人比先生才德何如庶曰以某比之譬猶駑馬並麒麟寒鴉配鸞鳳耳此人每嘗自比管仲樂毅以吾觀之管樂殆不及此人此人有經天緯地之才蓋天下一人也玄德喜曰願聞此人姓名庶曰此人乃琅琊陽都人覆姓諸葛名亮字孔明乃漢司隸校尉諸葛豐之後其父名珪字子貢爲泰山郡丞早卒亮從其叔玄玄與荊州劉景升有舊因往依之遂家於襄陽後玄卒亮與弟諸葛均躬耕于南陽嘗好爲梁父吟所居之地有一岡名臥龍岡因自號爲臥龍先生此人乃絕代奇才使君急宜枉駕見之若此人肯相輔佐何愁天下不定乎玄德曰昔水鏡先生曾爲備言伏龍鳳雛兩人得一可安天下今所雲莫非即伏龍鳳雛乎庶曰鳳雛乃襄陽龐統也伏龍正是諸葛孔明玄德踴躍曰今日方知伏龍鳳雛之語何期大賢只在目前非先生言備有眼如盲也後人有贊徐庶走馬薦諸葛詩曰痛恨高賢不再逢臨岐泣別兩情濃片言卻似春雷震能使南陽起臥龍徐庶薦了孔明再別玄德策馬而去玄德聞徐庶之語方悟司馬德操之言似醉方醒如夢初覺引衆將回至新野便具厚幣同關張前去南陽請孔明且說徐庶既別玄德感其留戀之情恐孔明不肯出山輔之遂乘馬直至臥龍岡下入草廬見孔明孔明問其來意庶曰庶本欲事劉豫州奈老母爲曹操所囚馳書來召只得舍之而往臨行時將公薦與玄德玄德即日將來奉謁望公勿推阻即展平生之大才以輔之幸甚孔明聞言作色曰君以我爲享祭之犧牲乎說罷拂袖而入庶羞慚而退上馬趲程赴許昌見母正是囑友一言因愛主赴家千里爲思親未知後事若何下文便見
