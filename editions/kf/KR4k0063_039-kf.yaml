body:
  text: 第三十九回荊州城公子三求計博望坡軍師初用兵卻說孫權督衆攻打夏口黃祖兵敗將亡情知守把不住遂棄江夏望荊州而走甘甯料得黃祖必走荊州乃於東門外伏兵等候祖帶數十騎突出東門正走之間一聲喊起甘寧攔住祖于馬上謂寧曰我向日不曾輕待汝今何相逼耶寧叱曰吾昔在江夏多立功績汝乃以劫江賊待我今日尚有何說黃祖自知難免撥馬而走甘寧衝開士卒直趕將來只聽得後面喊聲起處又有數騎趕來甯視之乃程普也寧恐普來爭功慌忙拈弓搭箭背射黃祖祖中箭翻身落馬甯梟其首級回馬與程普合兵一處回見孫權獻黃祖首級權命以木匣盛貯待回江東祭獻于亡父靈前重賞三軍升甘甯爲都尉商議欲分兵守江夏張昭曰孤城不可守不如且回江東劉表知我破黃祖必來報仇我以逸待勞必敗劉表表而後乘勢攻之荊襄可得也權從其言遂棄江夏班師回江東蘇飛在檻車內密使人告甘寧求救寧曰飛即不言吾豈忘之大軍既至吳會權命將蘇飛梟首與黃祖首級一同祭獻甘甯乃入見權頓首哭告曰某向日若不得蘇飛則骨填溝壑矣安能效命于將軍麾下哉今飛罪當誅某念其昔日之恩情願納還官爵以贖飛罪權曰彼既有恩於君吾爲君赦之但彼若逃去奈何寧曰飛得免誅戮感恩於地豈肯走乎若飛去寧願將首級獻於階下權乃赦蘇飛止將黃祖首級祭獻祭畢設宴大會文武慶功正飲酒間忽見座上一人大哭而起拔劍在手直取甘寧寧忙舉坐椅以迎之權驚視其人乃淩統也因甘甯在江夏時射死他父親淩操今日相見故欲報仇權連忙勸住謂統曰興霸射死卿父彼時各爲其主不容不盡力今既爲一家人豈可複理舊仇萬事皆看吾面淩統叩頭大哭曰不共戴天之仇豈容不報權與衆官再三勸之淩統只是怒目而視甘寧權即日命甘寧領兵五千戰船一百隻往夏口鎮守以避淩統寧拜謝領兵自往夏口去了權又加封淩統爲承烈都尉統只得含恨而止東吳自此廣造戰船分兵守把江岸又命孫靜引一枝軍守吳會孫權自領大軍屯柴桑周瑜日于鄱陽湖教練水軍以備攻戰話分兩頭卻說玄德差人打探江東消息回報東吳已攻殺黃祖現今屯兵柴桑玄德便請孔明計議正話間忽劉表差人來請玄德赴荊州議事孔明曰此必因江東破了黃祖故請主公商議報仇之策也某當與主公同往相機而行自有良策玄德從之留雲長守新野令張飛引五百人馬跟隨往荊州來玄德在馬上謂孔明曰今見景升當若何對答孔明曰當先謝襄陽之事他若令主公去征討江東切不可應允但說容歸新野整頓軍馬玄德依言來到荊州館驛安下留張飛屯兵城外玄德與孔明入城見劉表禮畢玄德請罪於階下表曰吾已悉知賢弟被害之事當時即欲斬蔡瑁之首以獻賢弟因衆人告免故姑恕之賢弟幸勿見罪玄德曰非幹蔡將軍之事想皆下人所爲耳表曰今江夏失守黃祖遇害故請賢弟共議報復之策玄德曰黃祖性暴不能用人故致此禍今若興兵南征倘曹操北來又當奈何表曰吾今年老多病不能理事賢弟可來助我我死之後弟便爲荊州之主也玄德曰兄何出此言量備安敢當此重任孔明以目視玄德玄德曰容徐思良策遂辭出至館驛孔明曰景升欲以荊州付主公奈何卻之玄德曰景升待我恩禮交至安忍乘其危而奪之孔明歎曰真仁慈之主也正商論間忽報公子劉琦來見玄德接入琦泣拜曰繼母不能相容性命只在旦夕望叔父憐而救之玄德曰此賢侄家事耳奈何問我孔明微笑玄德求計于孔明孔明曰此家事亮不敢與聞少時玄德送琦出附耳低言曰來日我使孔明回拜賢侄可如此如此彼定有妙計相告琦謝而去次日玄德只推腹痛乃浼孔明代往回拜劉琦孔明允諾來至公子宅前下馬入見公子公子邀入後堂茶罷琦曰琦不見容于繼母幸先生一言相救孔明曰亮客寄於此豈敢與人骨肉之事倘有漏泄爲害不淺說罷起身告辭琦曰既承光顧安敢慢別乃挽留孔明入密室共飲飲酒之間琦又曰繼母不見容乞先生一言救我孔明曰此非亮所敢謀也言訖又欲辭去琦曰先生不言則已何便欲去孔明乃複坐琦曰琦有一古書請先生一觀乃引孔明登一小樓孔明曰書在何處琦泣拜曰繼母不見容琦命在旦夕先生忍無一言相救乎孔明作色而起便欲下樓只見樓梯已撤去琦告曰琦欲求教良策先生恐有泄漏不肯出言今日上不至天下不至地出君之口入琦之耳可以賜教矣孔明曰疏不間親亮何能爲公子謀琦曰先生終不幸教琦乎琦命固不保矣請即死于先生之前乃掣劍欲自刎孔明止之曰已有良策琦拜曰願即賜教孔明曰公子豈不聞申生重耳之事乎申生在內而亡重耳在外而安今黃祖新亡江夏乏人守禦公子何不上言乞屯兵守江夏則可以避禍矣琦再拜謝教乃命人取梯送孔明下樓孔明辭別回見玄德具言其事玄德大喜次日劉琦上言欲守江夏劉表猶豫未決請玄德共議玄德曰江夏重地固非他人可守正須公子自往東南之事兄父子當之西北之事備願當之表曰近聞曹操于鄴郡作玄武池以練水軍必有南征之意不可不防玄德曰備已知之兄勿憂慮遂拜辭回新野劉表令劉琦引兵三千往江夏鎮守卻說曹操罷三公之職自以丞相兼之以毛玠爲東曹掾崔琰爲西曹掾司馬懿爲文學掾懿字仲達河內溫人也潁川太守司馬雋之孫京兆尹司馬防之子主簿司馬朗之弟也自是文官大備乃聚武將商議南征夏侯惇進曰近聞劉備在新野每日教演士卒必爲後患可早圖之操即命夏侯惇爲教督于禁李典夏侯蘭韓浩爲副將領兵十萬直抵博望城以窺新野荀彧諫曰劉備英雄今更兼諸葛亮爲軍師不可輕敵惇曰劉備鼠輩耳吾必擒之徐庶曰將軍勿輕視劉玄德今玄德得諸葛亮爲輔如虎生翼矣操曰諸葛亮何人也庶曰亮字孔明道號臥龍先生有經天緯地之才出鬼入神之計真當世之奇才非可小覰操曰比公若何庶曰庶安敢比亮庶如螢火之光亮乃皓月之明也夏侯惇曰元直之言謬矣吾看諸葛亮如草芥耳何足懼哉吾若不一陣生擒劉備活捉諸葛願將首級獻與丞相操曰汝早報捷書以慰吾心惇奮然辭曹操引軍登程卻說玄德自得孔明以師禮待之關張二人不悅曰孔明年幼有甚才學兄長待之太過又未見他真實效驗玄德曰吾得孔明猶魚之得水也兩弟勿複多言關張見說不言而退一日有人送頭牛尾至玄德取尾親自結帽孔明入見正色曰明公無複有遠志但事此而已耶玄德投帽于地而謝曰吾聊假此以忘憂耳孔明曰明公自度比曹操若何玄德曰不如也孔明曰明公之衆不過數千人萬一曹兵至何以迎之玄德曰吾正愁此事未得良策孔明曰可速招募民兵亮自教之可以待敵玄德遂招新野之民得三千人孔明朝夕教演陣法忽報曹操差夏侯惇引兵十萬殺奔新野來了張飛聞知謂雲長曰可著孔明前去迎敵便了正說之間玄德召二人入謂曰夏侯惇引兵到來如何迎敵張飛曰哥哥何不使水去玄德曰智賴孔明勇須二弟何可推調關張出玄德請孔明商議孔明曰但恐關張二人不肯聽吾號令主公若欲亮行兵乞假劍印玄德便以劍印付孔明孔明遂聚集衆將聽令張飛謂雲長曰且聽令去看他如何調度孔明令曰博望之左有山名曰豫山右有林名曰安林可以埋伏軍馬雲長可引一千軍往豫山埋伏等彼軍至放過休敵其輜重糧草必在後面但看南面火起可縱兵出擊就焚其糧草翼德可引一千軍去安林背後山穀中埋伏只看南面火起便可出向博望坡舊屯糧草處縱火燒之關平劉封可引五百軍預備引火之物於博望坡後兩邊等候至初更兵到便可放火矣又命于樊城取回趙雲令爲前部不要贏只要輸主公自引一軍爲後援各須依計而行勿使有失雲長曰我等皆出迎敵未審軍師卻作何事孔明曰我只坐守縣城張飛大笑曰我們都去廝殺你卻在家裏坐地好自在孔明曰劍印在此違令者斬玄德曰豈不聞運籌帷幄之中決勝千里之外二弟不可違令張飛冷笑而去雲長曰我們且看他的計應也不應那時卻來問他未遲二人去了衆將皆未知孔明韜略今雖聽令卻教疑惑不定孔明謂玄德曰主公今日可便引兵就博望山下屯住來日黃昏敵軍必到主公便棄營而走但見火起即回軍掩殺亮與糜竺糜芳引五百軍守縣命孫乾簡雍準備慶喜筵席安排功勞簿伺候派撥已畢玄德亦疑惑不定卻說夏侯惇與於禁等引兵至博望分一半精兵作前隊其余盡護糧車而行時當秋月商飆徐起人馬趲行之間望見前面塵頭忽起惇便將人馬擺開問向導官曰此間是何處答曰前面便是博望坡後面是羅川口惇令于禁李典押住陣腳親自出馬陣前遙望軍馬來到惇忽然大笑衆問將軍爲何而笑惇曰吾笑徐元直在丞相面前誇諸葛亮爲天人今觀其用兵乃以此等軍馬爲前部與吾對敵正如驅犬羊與虎豹鬥耳吾于丞相前誇口要活捉劉備諸葛亮今必應吾言矣遂自縱馬向前趙雲出馬惇罵曰汝等隨劉備如孤魂隨鬼耳雲大怒縱馬來戰兩馬相交不數合雲詐敗而走夏侯惇從後追趕雲約走十餘裏回馬又戰不數合又走韓浩拍馬向前諫曰趙雲誘敵恐有埋伏惇曰敵軍如此雖十面埋伏吾何懼哉遂不聽浩言直趕至博望坡一聲炮響玄德自引軍沖將過來接應交戰夏侯惇笑謂韓浩曰此即埋伏之兵也吾今晚不到新野誓不罷兵乃催軍前進玄德趙雲退後便走時天色已晚濃雲密布又無月色晝風既起夜風愈大夏侯惇只顧催軍趕殺于禁李典趕到窄狹處兩邊都是蘆葦典謂禁曰欺敵者必敗南道路狹山川相逼樹木叢雜倘彼用火攻奈何禁曰君言是也吾當往前爲都督言之君可止住後軍李典便勒回馬大叫後軍慢行人馬走發那裏攔當得住于禁驟馬大叫前軍都督且住夏侯惇正走之間見於禁從後軍奔來便問何故禁曰南道路狹山川相逼樹木叢雜可防火攻夏侯惇猛省即回馬令軍馬勿進言未已只聽背後喊聲震起早望見一派火光燒著隨後兩邊蘆葦亦著一霎時四面八方盡皆是火又值風大火勢愈猛曹家人馬自相踐踏死者不計其數趙雲回軍趕殺夏侯惇冒煙突火而走且說李典見勢頭不好急奔回博望坡時火光中一軍攔住當先大將乃關雲長也李典縱馬混戰奪路而走於禁見糧草車輛都被火燒便投小路奔逃去了夏侯蘭韓浩來救糧草正遇張飛戰不數合張飛一槍刺夏侯蘭于馬下韓浩奪路走脫直殺到天明卻才收軍殺得屍橫遍野血流成河後人有詩曰博望相持用火攻指揮如意笑談中直須驚破曹公膽初出茅廬第一功夏侯惇收拾殘軍自回許昌卻說孔明收軍關張二人相謂曰孔明真英傑也行不數裏見糜竺糜芳引軍簇擁著一輛小車車中端坐一人乃孔明也關張下馬拜伏于車前須臾玄德趙雲劉封關平等皆至收聚衆軍把所獲糧草輜重分賞將士班師回新野新野百姓望塵遮道而拜曰吾屬生全皆使君得賢人之力也孔明回至縣中謂玄德曰夏侯惇雖敗去曹操必自引大軍來玄德曰似此如之奈何孔明曰亮有一計可敵曹軍正是破敵未堪息戰馬避兵又必賴良謀未知其計若何且看下文分解
