body:
  text: 第四十回蔡夫人議獻荊州諸葛亮火燒新野卻說玄德問孔明求拒曹兵之計孔明曰新野小縣不可久居近聞劉景升病在危篤可乘此機會取彼荊州爲安身之地庶可拒曹操也玄德曰公言甚善但備受景升之恩安忍圖之孔明曰今若不取後悔何及玄德曰吾寧死不忍作負義之事孔明曰且再作商議卻說夏侯惇敗回許昌自縛見曹操伏地請死操釋之惇曰惇遭諸葛亮詭計用火攻破我軍操曰汝自幼用兵豈不知狹處須防火攻惇曰李典于禁曾言及此悔之不及操乃賞二人惇曰劉備如此倡狂真腹心之患也不可不急除操曰吾所慮者劉備孫權耳餘皆不足介意今當乘此時掃平江南便傳令起大兵五十萬令曹仁曹洪爲第一隊張遼張郃爲第二隊夏侯淵夏侯惇爲第三隊于禁李典爲第四隊操自領諸將爲第五隊每隊各引兵十萬又令許褚爲折沖將軍引兵三千爲先鋒選定建安十三年秋七月丙午日出師太中大夫孔融諫曰劉備劉表皆漢室宗親不可輕伐孫權虎踞六郡且有大江之險亦不易取今丞相興此無義之師恐失天下之望操怒曰劉備劉表孫權皆逆命之臣豈容不討遂叱退孔融下令如有再諫者必斬孔融出府仰天歎曰以至不仁伐至仁安得不敗乎時禦史大夫郗慮家客聞此言報知郗慮慮常被孔融侮慢心正恨之乃以此言入告曹操且曰融平日每每狎侮丞相又與禰衡相善衡贊融曰仲尼不死融贊衡曰顔回復生向者禰衡之辱丞相乃融使之也操大怒遂命廷尉捕捉孔融融有二子年尚少時方在家對坐弈棋左右急報曰尊君被廷尉執去將斬矣二公子何不急避二子曰破巢之下安有完卵乎言未已廷尉又至盡收融家小並二子皆斬之號令融屍於市京兆脂習伏屍而哭操聞之大怒欲殺之荀彧曰彧聞脂習常諫融曰公剛直太過乃取禍之道今融死而來哭乃義人也不可殺操乃止習收融父子屍首皆葬之後人有詩贊孔融曰孔融居北海豪氣貫長虹坐上客長滿樽中酒不空文章驚世俗談笑侮王公史筆褒忠直存官紀太中曹操既殺孔融傳令五隊軍馬次第起行只留荀彧等守許昌卻說荊州劉表病重使人請玄德來托孤玄德引關張至荊州見劉表表曰我病已入膏肓不久便死矣特托孤於賢弟我子無才恐不能承父業我死之後賢弟可自領荊州玄德泣拜曰備當竭力以輔賢侄安敢有他意乎正說間人報曹操自統大兵至玄德急辭劉表星夜回新野劉表病中聞此信吃驚不小商議寫遺囑令玄德輔佐長子劉琦爲荊州之主蔡夫人聞之大怒關上內門使蔡瑁張允二人把住外門時劉琦在江夏知父病危來至荊州探病方到外門蔡瑁當住曰公子奉父命鎮守江夏其任至重今擅離職守倘東吳兵至如之奈何若入見主公主公必生嗔怒病將轉增非孝也宜速回劉琦立於門外大哭一場上馬仍回江夏劉表病勢危篤望劉琦不來至八月戊申日大叫數聲而死後人有詩歎劉表曰昔聞袁氏居河朔又見劉君霸漢陽總爲牝晨致家累可憐不久盡銷亡劉表既死蔡夫人與蔡瑁張允商議假寫遺囑令次子劉琮爲荊州之主然後舉哀報喪時劉琮年方十四歲頗聰明乃聚衆言曰吾父棄世吾兄現在江夏更有叔父玄德在新野汝等立我爲主倘兄與叔興兵問罪如何解釋衆官未及對幕官李珪答曰公子之言甚善今可急發哀書至江夏請大公子爲荊州之主就命玄德一同理事北可以敵曹操南可以拒孫權此萬全之策也蔡瑁叱曰汝何人敢亂言以逆主公遺命李珪大罵曰汝內外朋謀假稱遺命廢長立幼眼見荊襄九郡送于蔡氏之手故主有靈必當殛汝蔡瑁大怒喝令左右推出斬之李珪至死大罵不絕於是蔡瑁遂立劉琮爲主蔡氏宗族分領荊州之兵命治中鄧義別駕劉先守荊州蔡夫人自與劉琮前赴襄陽駐紮以防劉琦劉備就葬劉表之柩於襄陽城東漢陽之原竟不訃告劉琦與玄德劉琮至襄陽方才歇馬忽報曹操引大軍徑望襄陽而來琮大驚遂請蒯越蔡瑁等商議東曹掾傅巽進言曰不特曹操兵來爲可憂今大公子在江夏玄德在新野我皆未往報喪若彼興兵問罪荊襄危矣巽有一計可使荊襄之民安如泰山又可保全主公名爵琮曰計將安出巽曰不如將荊襄九郡獻與曹操操必重待主公也琮叱曰是何言也孤受先君之基業坐尚未穩豈可便棄之他人蒯越傅公悌之言是也夫逆順有大體強弱有定勢今曹操南征北討以朝廷爲名主公拒之其名不順且主公新立外患未寧內憂將作荊襄之民聞曹兵至未戰而膽先寒安能與之敵哉琮曰諸公善言非我不從但以先君之業一旦棄與他人恐貽笑於天下耳言未已一人昂然而進曰傅公悌蒯異度之言甚善何不從之衆視之乃山陽高平人姓王名粲字仲宣粲容貌瘦弱身材短小幼時往見中郎蔡邕時邕高朋滿座聞粲至倒履迎之賓客皆驚曰蔡中郎何獨敬此小子耶邕曰此子有異才吾不如也粲博聞強記人皆不及嘗觀道旁碑文一過便能記誦觀人弈棋棋局亂粲複爲擺出不差一子又善算術其文詞妙絕一時年十七辟爲黃門侍郎不就後因避亂至荊襄劉表以爲上賓當日謂劉琮曰將軍自料比曹公何如琮曰不如也粲曰曹公兵強將勇足智多謀擒呂布於下邳摧袁紹於官渡逐劉備於隴右破烏桓于白狼梟除蕩定者不可勝計今以大軍南下荊襄勢難抵敵傅蒯二君之謀乃長策也將軍不可遲疑致生後悔琮曰先生見教極是但須稟告母親知道只見蔡夫人從屏後轉出謂琮曰既是仲宣公悌異度三人所見相同何必告我於是劉琮意決便寫降書令宋忠潛地往曹操軍前投獻宋忠領命直至宛城接著曹操獻上降書操大喜重賞宋忠分付教劉琮出城迎接便著他永爲荊州之主宋忠拜辭曹操取路回荊襄將欲渡江忽見一枝人馬到來視之乃關雲長也宋忠回避不叠被雲長喚住細問荊州之事忠初時隱諱後被雲長盤問不過只得將前後事情一一實告雲長大驚隨捉宋忠至新野見玄德備言其事玄德聞之大哭張飛曰事已如此可先斬宋忠隨起兵渡江奪了襄陽殺了蔡氏劉琮然後與曹操交戰玄德曰你且緘口我自有斟酌乃叱宋忠曰你知衆人作事何不早來報我今雖斬汝無益於事可速去忠拜謝抱頭鼠竄而去玄德正憂悶間忽報公子劉琦差伊籍到來玄德感伊籍昔日相救之恩降階迎之再三稱謝籍曰大公子在江夏聞荊州已故蔡夫人與蔡瑁等商議不來報喪竟立劉琮爲主公子差人往襄陽探聽回說是實恐使君不知特差某齎哀書呈報並求使君盡起麾下精兵同往襄陽問罪玄德看書畢謂伊籍曰機伯只知劉琮僭立更不知劉琮已將荊襄九郡獻與曹操矣籍大驚曰使君從何知之玄德具言拿獲宋忠之事籍曰若如此使君不如以吊喪爲名前赴襄陽誘劉琮出迎就便擒下誅其黨類則荊州屬使君矣孔明曰機伯之言是也主公可從之玄德垂淚曰吾兄臨危托孤於我今若執其子而奪其地異日死於九泉之下何面目複見吾兄乎孔明曰如不行此事今曹兵已至宛城何以拒敵玄德曰不如走樊城以避之正商議間探馬飛報曹兵已到博望了玄德慌忙發付伊籍回江夏整頓軍馬一面與孔明商議拒敵之計孔明曰主公且寬心前番一把火燒了夏侯惇大半人馬今番曹軍又來必教他中這條計我等在新野住不得了不如早到樊城去便差人四門張榜曉喻居民無問老幼男女願從者即於今日皆跟我往樊城暫避不可自誤差孫乾往河邊調撥船隻救濟百姓差糜竺護送各官家眷到樊城一面聚諸將聽令先教雲長引一千軍去白河上流頭埋伏各帶布袋多裝沙土遏住白河之水至來日三更後只聽下流頭人喊馬嘶急取起布袋放水淹之卻順水殺將下來接應又喚張飛引一千軍去博陵渡口埋伏此處水勢最慢曹軍被淹必從此逃難可便乘勢殺來接應又喚趙雲引軍三千分爲四隊自領一隊伏於東門外其三隊分伏西南北三門卻先於城內人家屋上多藏硫黃焰硝引火之物曹軍入城必安歇民房來日黃昏後必有大風但看風起便令西南北三門伏軍盡將火箭射入城去待城中火勢大作卻於城外呐喊助威只留東門放他出走汝卻於東門外從後擊之天明會合關張二將收軍回樊城再令糜芳劉封二人帶二千軍一半紅旗一半青旗去新野城外三十裏鵲尾坡前屯住一見曹軍到紅旗軍走在左青旗軍走在右他心疑必不敢追汝二人卻去分頭埋伏只望城中火起便可追殺敗兵然後卻來白河上流頭接應孔明分撥已定乃與玄德登高瞭望只候捷音卻說曹仁曹洪引軍十萬爲前隊前面已有許褚引三千鐵甲軍開路浩浩蕩蕩殺奔新野來是日午牌時分來到鵲尾坡望見坡前一簇人馬盡打青紅旗號許褚催軍向前劉封糜芳分爲四隊青紅旗各歸左右許褚勒馬教且休進前面必有伏兵我兵只在此處住下許褚一騎馬飛報前隊曹仁曹仁曰此是疑兵必無埋伏可速進兵我當催軍繼至許褚複回坡前提兵殺入至林下追尋時不見一人時日已墜西許褚方欲前進只聽得山上大吹大擂擡頭看時只見山頂上一簇旗旗叢中兩把傘蓋左玄德右孔明二人對坐飲酒許褚大怒引軍尋路上山山上擂木炮石打將下來不能前進又聞山後喊聲大震欲尋路廝殺天色已晚曹仁領兵到教且奪新野城歇馬軍士至城下時只見四門大開曹兵突入並無阻當城中亦不見一人竟是一座空城了曹洪曰此是勢孤計窮故盡帶百姓逃竄去了我軍權且在城安歇來日平明進兵此時各軍走乏都已饑餓皆去奪房造飯曹仁曹洪就在衙內安歇初更已後狂風大作守門軍士飛報火起曹仁曰此必軍士造飯不小心遺漏之火不可自驚說猶未了接連幾次飛報西南北三門皆火起曹仁急令衆將上馬時滿縣火起上下通紅是夜之火更勝前日博望燒屯之火後人有詩歎曰奸雄曹操守中原九月南征到漢川風伯怒臨新野縣祝融飛下焰摩天曹仁引衆將突煙冒火尋路奔走聞說東門無火急急奔出東門軍士自相踐踏死者無數曹仁等方才脫得火厄背後一聲喊聲趙雲引軍趕來混戰曹軍各逃性命誰肯回身廝殺正奔走間糜芳引一軍至又衝殺一陣曹仁大敗奪路而走劉封又引一軍截殺一陣到四更時分人困馬乏軍士大半焦頭爛額奔至白河邊喜得河水不甚深人馬都下河吃水人相喧嚷馬盡嘶鳴卻說雲長在上流用布袋遏住河水黃昏時分望見新野火起至四更忽聽得下流頭人喊馬嘶急令軍士一齊掣起布袋水勢滔天望下流沖去曹軍人馬俱溺于水中死者極多曹仁引衆將望水勢慢處奪路而走行到博陵渡口只聽喊聲大起一軍攔路當先大將乃張飛也大叫曹賊快來納命曹軍大驚正是城內才看紅焰吐水邊又遇黑風來未知曹仁性命如何且看下文分解三國演義第二部明羅貫中著
