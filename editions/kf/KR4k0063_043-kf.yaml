body:
  text: 第四十三回諸葛亮舌戰群儒魯子敬力排衆議卻說魯肅孔明辭了玄德劉琦登舟望柴桑郡來二人在舟中共議魯肅謂孔明曰先生見孫將軍切不可實言曹操兵多將廣孔明曰不鬚子敬叮嚀亮自有對答之語及船到岸肅請孔明於館驛中暫歇先自往見孫權權正聚文武于堂上議事聞魯肅回急召入問曰子敬往江夏體探虛實若何肅曰已知其略尚容徐稟權將曹操檄文示肅曰操昨遣使齎文至此孤先發遣來使現今會衆商議未定肅接檄文觀看其略曰孤近承帝命奉詞伐罪旄麾南指劉琮束手荊襄之民望風歸順今統雄兵百萬上將千員欲與將軍會獵于江夏共伐劉備同分土地永結盟好幸勿觀望速賜回音魯肅看畢曰主公尊意若何權曰未有定論張昭曰曹操擁百萬之衆借天子之名以征四方拒之不順且主公大勢可以拒操者長江也今操既得荊州長江之險已與我共之矣勢不可敵以愚之計不如納降爲萬安之策衆謀士皆曰子布之言正合天意孫權沈吟不語張昭又曰主公不必多疑如降操則東吳民安江南六郡可保矣孫權低頭不語須臾權起更衣魯肅隨于權後權知肅意乃執肅手而言曰卿欲如何肅曰恰才衆人所言深誤將軍衆人皆可降曹操惟將軍不可降曹操權曰何以言之肅曰如肅等降操當以肅還鄉黨累官故不失州郡也將軍降操欲安所歸乎位不過封侯車不過一乘騎不過一匹從不過數人豈得南面稱孤哉衆人之意各自爲己不可聽也將軍宜早定大計權歎曰諸人議論大失孤望子敬開說大計正與吾見相同此天以子敬賜我也但操新得袁紹之衆近又得荊州之兵恐勢大難以抵敵肅曰肅至江夏引諸葛瑾之弟諸葛亮在此主公可問之便知虛實權曰臥龍先生在此乎肅曰現在館驛中安歇權曰今日天晚且未相見來日聚文武於帳下先教見我江東英俊然後升堂議事肅領命而去次日至館驛中見孔明又囑曰今見我主切不可言曹操兵多孔明笑曰亮自見機而變決不有誤肅乃引孔明至幕下早見張昭顧雍等一班文武二十餘人峨冠博帶整衣端坐孔明逐一相見各問姓名施禮已畢坐於客位張昭等見孔明豐神飄灑器宇軒昂料道此人必來遊說張昭先以言挑之曰昭乃江東微末之士久聞先生高臥隆中自比管樂此語果有之乎孔明曰此亮平生小可之比也昭曰近聞劉豫州三顧先生于草廬之中幸得先生以爲如魚得水思欲席捲荊襄今一旦以屬曹操未審是何主見孔明自思張昭乃孫權手下第一個謀士若不先難倒他如何說得孫權遂答曰吾觀取漢上之地易如反掌我主劉豫州躬行仁義不忍奪同宗之基業故力辭之劉琮孺子聽信佞言暗自投降致使曹操得以猖獗今我主屯兵江夏別有良圖非等閒可知也昭曰若此是先生言行相違也先生自比管樂管仲相桓公霸諸侯一匡天下樂毅扶持微弱之燕下齊七十餘城此二人者真濟世之才也先生在草廬之中但笑傲風月抱膝危坐今既從事劉豫州當爲生靈興利除害剿滅亂賊且劉豫州未得先生之時尚且縱橫寰宇割據城池今得先生人皆仰望雖三尺童蒙亦謂彪虎生翼將見漢室復興曹氏即滅矣朝廷舊臣山林隱士無不拭目而待以爲拂高天之雲翳仰日月之光輝拯民于水火之中措天下于衽席之上在此時也何先生自歸豫州曹兵一出棄甲抛戈望風而竄上不能報劉表以安庶民下不能輔孤子而據疆土乃棄新野走樊城敗當陽奔夏口無容身之地是豫州既得先生之後反不如其初也管仲樂毅果如是乎愚直之言幸勿見怪孔明聽罷啞然而笑曰鵬飛萬里其志豈群鳥能識哉譬如人染沈屙當先用糜粥以飲之和藥以服之待其腑髒調和形體漸安然後用肉食以補之猛藥以治之則病根盡去人得全生也若不待氣脈和緩便投以猛藥厚味欲求安保誠爲難矣吾主劉豫州向日軍敗于汝南寄于劉表兵不滿千將止關張趙雲而已此正如病勢漸羸已極之時也新野山僻小縣人民稀少糧食鮮薄豫州不過暫藉以容身豈真將坐守於此耶夫以甲兵不完城郭不固軍不經練糧不繼日然而博望燒屯白河用水使夏侯惇曹仁輩心驚膽裂竊謂管仲樂毅之用兵未必過此至於劉琮降操豫州實出不知且又不忍乘亂奪同宗之基業此真大仁大義也當陽之敗豫州見有數十萬赴義之民扶老攜幼相隨不忍棄之日行十裏不思進取江陵甘與同敗此亦大仁大義也寡不敵衆勝負乃其常事昔高皇數敗於項羽而垓下一戰成功此非韓信之良謀乎夫信久事高皇未嘗累勝蓋國家大計社稷安危是有主謀非比誇辯之徒虛譽欺人坐議立談無人可及臨機應變百無一能誠爲天下笑耳這一篇言語說得張昭並無一言回答座上忽一人抗聲問曰今曹公兵屯百萬將列千員龍驤虎視平吞江夏公以爲何如孔明視之乃虞翻也孔明曰曹操收袁紹蟻聚之兵劫劉表烏合之衆雖數百萬不足懼也虞翻冷笑曰軍敗于當陽計窮于夏口區區求救於人而猶言不懼此真大言欺人也孔明曰劉豫州以數千仁義之師安能敵百萬殘暴之衆退守夏口所以待時也今江東兵精糧足且有長江之險猶欲使其主屈膝降賊不顧天下恥笑由此論之劉豫州真不懼操賊者矣虞翻不能對座間又一人問曰孔明欲效儀秦之舌遊說東吳耶孔明視之乃步騭也孔明曰步子山以蘇秦張儀爲辯士不知蘇秦張儀亦豪傑也蘇秦佩六國相印張儀兩次相秦皆有匡扶人國之謀非比畏強淩弱懼刀避劍之人也君等聞曹操虛發詐僞之詞便畏懼請降敢笑蘇秦張儀乎步騭默然無語忽一人問曰孔明以曹操何如人也孔明視某人乃薛綜也孔明答曰曹操乃漢賊也又何必問綜曰公言差矣漢傳世至今天數將終今曹公已有天下三分之二人皆歸心劉豫州不識天時強欲與爭正如以卵擊石安得不敗乎孔明厲聲曰薛敬文安得出此無父無君之言乎夫人生天地間以忠孝爲立身之本公既爲漢臣則見有不臣之人當誓共戮之臣之道也今曹操祖宗叨食漢祿不思報效反懷篡逆之心天下之所共憤公乃以天數歸之真無父無君之人也不足與語請勿複言薛綜滿面羞慚不能對答座上又一人應聲問曰曹操雖挾天子以令諸侯猶是相國曹參之後劉豫州雖雲中山靖王苗裔卻無可稽考眼見只是織席販屨之夫耳何足與曹操抗衡哉孔明視之乃陸績也孔明笑曰公非袁術座間懷桔之陸郎乎請安坐聽吾一言曹操既爲曹相國之後則世爲漢臣矣今乃專權肆橫欺淩君父是不惟無君亦且蔑祖不惟漢室之亂臣亦曹氏之賊子也劉豫州堂堂帝胄當今皇帝按譜賜爵何雲無可稽考且高祖起身亭長而終有天下織席販屢又何足爲辱乎公小兒之見不足與高士共語陸績語塞座上一人忽曰孔明所言皆強詞奪理均非正論不必再言且請問孔明治何經典孔明視之乃嚴畯也孔明曰尋章摘句世之腐儒也何能興邦立事且古耕莘伊尹釣渭子牙張良陳平之流鄧禹耿佩之輩皆有匡扶宇宙之才未審其生平治何經典豈亦效書生區區于筆硯之間數黑論黃舞文弄墨而已乎嚴畯低頭喪氣而不能對忽又一人大聲曰公好爲大言未必真有實學恐適爲儒者所笑耳孔明視其人乃汝陽程德樞也孔明答曰儒有君子小人之別君子之儒忠君愛國守正惡邪務使澤及當時名留後世若夫小人之儒惟務雕蟲專工翰墨青春作賦皓首窮經筆下雖有千言胸中實無一策且如楊雄以文章名世而屈身事莽不免投閣而死此所謂小人之儒也雖日賦萬言亦何取哉程德樞不能對衆人見孔明對答如流盡皆失色時座上張溫駱統二人又欲問難忽一人自外而入厲聲言曰孔明乃當世奇才君等以唇舌相難非敬客之禮也曹操大軍臨境不思退敵之策乃徒鬥口耶衆視其人乃零陵人姓黃名蓋字公覆現爲東吳糧官當時黃蓋謂孔明曰愚聞多言獲利不如默而無言何不將金石之論爲我主言之乃與衆人辯論也孔明曰諸君不知世務互相問難不容不答耳於是黃蓋與魯肅引孔明入至中門正遇諸葛瑾孔明施禮瑾曰賢弟既到江東如何不來見我孔明曰弟既事劉豫州理宜先公後私公事未畢不敢及私望兄見諒謹曰賢弟見過吳侯卻來敘話說罷自去魯肅曰適間所囑不可有誤孔明點頭應諾引至堂上孫權降階而迎優禮相待施禮畢賜孔明坐衆文武分兩行而立魯肅立于孔明之側只看他講話孔明致玄德之意畢偷眼看孫權碧眼紫髯堂堂一表孔明暗思此人相貌非常只可激不可說等他問時用言激之便了獻茶已畢孫權曰多聞魯子敬談足下之才今幸得相見敢求教益孔明曰不才無學有辱明問權曰足下近在新野佐劉豫州與曹操決戰必深知彼軍虛實孔明曰劉豫州兵微將寡更兼新野城小無糧安能與曹操相持權曰曹兵共有多少孔明曰馬步水軍約有一百餘萬權曰莫非詐乎孔明曰非詐也曹操就兗州已有青州軍二十萬平了袁紹又得五六十萬中原新招之兵三四十萬今又得荊州之軍二三十萬以此計之不下一百五十萬亮以百萬言之恐驚江東之士也魯肅在旁聞言失色以目視孔明孔明只做不見權曰曹操部下戰將還有多少孔明曰足智多謀之士能征慣戰之將何止一二千人權曰今曹操平了荊楚複有遠圖乎孔明曰即今沿江下寨準備戰船不欲圖江東待取何地權曰若彼有吞並之意戰與不戰請足下爲我一決孔明曰亮有一言但恐將軍不肯聽從權曰願聞高論孔明曰向者宇內大亂故將軍起江東劉豫州收衆漢南與曹操並爭天下今操芟除大難略已平矣近又新破荊州威震海內縱有英雄無用武之地故豫州遁逃至此願將軍量力而處之若能以吳越之衆與中國抗衡不如早與之絕若其不能何不從衆謀士之論按兵束甲北面而事之權未及答孔明又曰將軍外托服從之名內懷疑貳之見事急而不斷禍至無日矣權曰誠如君言劉豫州何不降操孔明曰昔田橫齊之壯士耳猶守義不辱況劉豫州王室之胄英才蓋世衆士仰慕事之不濟此乃天也又安能屈處人下乎孫權聽了孔明此言不覺勃然變色拂衣而起退入後堂衆皆哂笑而散魯肅責孔明曰先生何故出此言幸是吾主寬洪大度不即面責先生之言藐視吾主甚矣孔明仰面笑曰何如此不能容物耶我自有破曹之計彼不問我我故不言肅曰果有良策肅當請主公求救孔明曰吾視曹操百萬之衆如群蟻耳但我一舉手則皆爲齏粉矣肅聞言便入後堂見孫權權怒氣未息顧謂肅曰孔明欺吾太甚肅曰臣亦以此責孔明孔明反笑主公不能容物破曹之策孔明不肯輕言主公何不求之權回嗔作喜曰原來孔明有良謀故以言詞激我我一時淺見幾誤大事便同魯肅重復出堂再請孔明敘話權見孔明謝曰適來冒瀆威嚴幸勿見罪孔明亦謝曰亮言語冒犯望乞恕罪權邀孔明入後堂置酒相待數巡之後權曰曹操平生所惡者呂布劉表袁紹袁術豫州與孤耳今數雄已滅獨豫州與孤尚存孤不能以全吳之地受制於人吾計決矣非劉豫州莫與當曹操者然豫州新敗之後安能抗此難乎孔明曰豫州雖新敗然關雲長猶率精兵萬人劉琦領江夏戰士亦不下萬人曹操之衆遠來疲憊近追豫州輕騎一日夜行三百里此所謂強弩之末勢不能穿魯縞者也且北方之人不習水戰荊州士民附操者迫於勢耳非本心也今將軍誠能與豫州協力同心破曹軍必矣操軍破必北還則荊吳之勢強而鼎足之形成矣成敗之機在於今日惟將軍裁之權大悅曰先生之言頓開茅塞吾意已決更無他疑即日商議起兵共滅曹操遂令魯肅將此意傳諭文武官員就送孔明于館驛安歇張昭知孫權欲興兵遂與衆議曰中了孔明之計也急入見權曰昭等聞主公將興兵與曹操爭鋒主公自思比袁紹若何曹操向日兵微將寡尚能一鼓克袁紹何況今日擁百萬之衆南征豈可輕敵若聽諸葛亮之言妄動甲兵此所謂負薪救火也孫權只低頭不語顧雍曰劉備因爲曹操所敗故欲借我江東之兵以拒之主公奈何爲其所用乎願聽子布之言孫權沈吟未決張昭等出魯肅入見曰適張子布等又勸主公休動兵力主降議此皆全軀保妻子之臣爲自謀之計耳願主公勿聽也孫權尚在沈吟肅曰主公若遲疑必爲衆人誤矣權曰卿且暫退容我三思肅乃退出時武將或有要戰的文官都是要降的議論紛紛不一且說孫權退入內宅寢食不安猶豫不決吳國太見權如此問曰何事在心寢食俱廢權曰今曹操屯兵於江漢有下江南之意問諸文武或欲降者或欲戰者欲待戰來恐寡不敵衆欲待降來又恐曹操不容因此猶豫不決吳國太曰汝何不記吾姐臨終之語乎孫權如醉方醒似夢初覺想出這句話來正是追思國母臨終語引得周郎立戰功畢竟說著甚的且看下文分解
