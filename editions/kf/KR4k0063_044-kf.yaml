body:
  text: 第四十四回孔明用智激周瑜孫權決計破曹操卻說吳國太見孫權疑惑不決乃謂之曰先姊遺言雲伯符臨終有言內事不決問張昭外事不決問周瑜今何不請公瑾問之權大喜即遣使往鄱陽請周瑜議事原來周瑜在鄱陽湖訓練水師聞曹操大軍至漢上便星夜回柴桑郡議軍機事使者未發周瑜已先到魯肅與瑜最厚先來接著將前項事細述一番周瑜曰子敬休憂瑜自有主張今可速請孔明來相見魯肅上馬去了周瑜方才歇息忽報張昭顧雍張紘步騭四人來相探瑜接入堂中坐定敘寒溫畢張昭曰都督知江東之利害否瑜曰未知也昭曰曹操擁衆百萬屯於漢上昨傳檄文至此欲請主公會獵于江夏雖有相吞之意尚未露其形昭等勸主公且降之庶免江東之禍不想魯子敬從江夏帶劉備軍師諸葛亮至此彼因自欲雪憤特下說詞以激主公子敬卻執迷不悟正欲待都督一決瑜曰公等之見皆同否顧雍等曰所議皆同瑜曰吾亦欲降久矣公等請回明早見主公自有定議昭等辭去少頃又報程普黃蓋韓當等一班戰將來見瑜迎入各問慰訖程普曰都督知江東早晚屬他人否瑜曰未知也普曰吾等自隨孫將軍開基創業大小數百戰方才戰得六郡城池今主公聽謀士之言欲降曹操此真可恥可惜之事吾等寧死不辱望都督勸主公決計興兵吾等願效死戰瑜曰將軍等所見皆同否黃蓋忿然而起以手拍額曰吾頭可斷誓不降曹衆人皆曰吾等都不願降瑜曰吾正欲與曹操決戰安肯投降將軍等請回瑜見主公自有定議程普等別去又未幾諸葛瑾呂范等一班兒文官相候瑜迎入講禮方畢諸葛瑾曰舍弟諸葛亮自漢上來言劉豫州欲結東吳共伐曹操文武商議未定因舍弟爲使瑾不敢多言專候都督來決此事瑜曰以公論之若何瑾曰降者易安戰者難保周瑜笑曰瑜自有主張來日同至府下定議瑾等辭退忽又報呂蒙甘甯等一班兒來見瑜請入亦敍談此事有要戰者有要降者互相爭論瑜曰不必多言來日都到府下公議衆乃辭去周瑜冷笑不止至晚人報魯子敬引孔明來拜瑜出中門迎入敘禮畢分賓主而坐肅先問瑜曰今曹操驅衆南侵和與戰二策主公不能決一聽于將軍將軍之意若何瑜曰曹操以天子爲名其師不可拒且其勢大未可輕敵戰則必敗降則易安吾意已決來日見主公便當遣使納降魯肅愕然曰君言差矣江東基業已曆三世豈可一旦棄於他人伯符遺言外事付託將軍今正欲仗將軍保全國家爲泰山之靠奈何從懦夫之議耶瑜曰江東六郡生靈無限若罹兵革之禍必有歸怨於我故決計請降耳肅曰不然以將軍之英雄東吳之險固操未必便能得志也二人互相爭辯孔明只袖手冷笑瑜曰先生何故哂笑孔明曰亮不笑別人笑子敬不識時務耳肅曰先生如何反笑我不識時務孔明曰公瑾主意欲降操甚爲合理瑜曰孔明乃識時務之士必與吾有同心肅曰孔明你也如何說此孔明曰操極善用兵天下莫敢當向只有呂布袁紹袁術劉表敢與對敵今數人皆被操滅天下無人矣獨有劉豫州不識時務強與爭衡今孤身江夏存亡未保將軍決計降曹可以保妻子可以全富貴國祚遷移付之天命何足惜哉魯肅大怒曰汝教吾主屈膝受辱于國賊乎孔明曰愚有一計並不勞牽羊擔酒納士獻印亦不須親自渡江只須遣一介之使扁舟送兩個人到江上操一得此兩人百萬之衆皆卸甲卷旗而退矣瑜曰用何二人可退操兵孔明曰江東去此兩人如大木飄一葉太倉減一粟耳而操得之必大喜而去瑜又問果用何二人孔明曰亮居隆中時即聞操於漳河新造一台名曰銅雀極其壯麗廣選天下美女以實其中操本好色之徒久聞江東喬公有二女長曰大喬次曰小喬有沈魚落雁之容閉月羞花之貌操曾發誓曰吾一願掃平四海以成帝業一願得江東二喬置之銅雀台以樂晚年雖死無恨矣今雖引百萬之衆虎視江南其實爲此二女也將軍何不去尋喬公以千金買此二女差人送與曹操操得二女稱心滿意必班師矣此范蠡獻西施之計何不速爲之瑜曰操欲得二喬有何證驗孔明曰曹操幼子曹植字子建下筆成文操嘗命作一賦名曰銅雀台賦賦中之意單道他家合爲天子誓取二喬瑜曰此賦公能記否孔明曰吾愛其文華美嘗竊記之瑜曰試請一誦孔明即時誦銅雀台賦雲從明後以嬉遊兮登層台以娛情見太府之廣開兮觀聖德之所營建高門之嵯峨兮浮雙闕乎太清立中天之華觀兮連飛閣乎西城臨漳水之長流兮望園果之滋榮立雙台于左右兮有玉龍與金鳳攬二喬于東南兮樂朝夕之與共俯皇都之宏麗兮瞰雲霞之浮動欣群才之來萃兮協飛熊之吉夢仰春風之和穆兮聽百鳥之悲鳴天雲垣其既立兮家願得乎雙逞揚仁化於宇宙兮盡肅恭於上京惟桓文之爲盛兮豈足方乎聖明休矣美矣惠澤遠揚翼佐我皇家兮甯彼四方同天地之規量兮齊日月之輝光永貴尊而無極兮等君壽於東皇禦龍舟以遨遊兮回鸞駕而周章恩化及乎四海兮嘉物阜而民康願斯台之永固兮樂終古而未央周瑜聽罷勃然大怒離座指北而罵曰老賊欺吾太甚孔明急起止之曰昔單于屢侵疆界漢天子許以公主和親今何惜民間二女乎瑜曰公有所不知大喬是孫伯符將軍主婦小喬乃瑜之妻也孔明佯作惶恐之狀曰亮實不知失口亂言死罪死罪瑜曰吾與老賊誓不兩立孔明曰事須三思免致後悔瑜曰吾承伯符寄託安有屈身降操之理適來所言故相試耳吾自離鄱陽湖便有北伐之心雖刀斧加頭不易其志也望孔明助一臂之力同破曹賊孔明曰若蒙不棄願效犬馬之勞早晚拱聽驅策瑜曰來日入見主公便議起兵孔明與魯肅辭出相別而去次日清晨孫權升堂左邊文官張昭顧雍等三十餘人右邊武官程普黃蓋等三十餘人衣冠濟濟劍佩鏘鏘分班侍立少頃周瑜入見禮畢孫權問慰罷瑜曰近聞曹操引兵屯漢上馳書至此主公尊意若何權即取檄文與周瑜瑜看畢笑曰老賊以我江東無人敢如此相侮耶權曰君之意若何瑜曰主公曾與衆文武商議否權曰連日議此事有勸我降者有勸我戰者吾意未定故請公瑾一決瑜曰誰勸主公降權曰張子布等皆主其意瑜即問張昭曰願聞先生所以主降之意昭曰曹操挾天子而征四方動以朝廷爲名近又得荊州威勢愈大吾江東可以拒操者長江耳今操艨艟戰艦何止千百水陸並進何可當之不如且降更圖後計瑜曰此迂儒之論也江東自開國以來今曆三世安忍一旦廢棄權曰若此計將安出瑜曰操雖託名漢相實爲漢賊將軍以神武雄才仗父兄餘業據有江東兵精糧足正當橫行天下爲國家除殘去暴奈何降賊耶且操今此來多犯兵家之忌北土未平馬騰韓遂爲其後患而操久于南征一忌也北軍不熟水戰操舍鞍馬仗舟楫與東吳爭衡二忌也又時值隆冬盛寒馬無槁草三忌也驅中國士卒遠涉江湖不服水土多生疾病四忌也操兵犯此數忌雖多必敗將軍擒操正在今日瑜請得精兵數萬人進屯夏口爲將軍破之權矍然起曰老賊欲廢漢自立久矣所懼二袁呂布劉表與孤耳今數雄已滅惟孤尚存孤與老賊誓不兩立卿言當伐甚合孤意此天以卿授我也瑜曰臣爲將軍決一血戰萬死不辭只恐將軍狐疑不定權拔佩劍砍面前奏案一角曰諸官將有再言降操者與此案同言罷便將此劍賜周瑜即封瑜爲大都督程普爲副都督魯肅爲贊軍校尉如文武官將有不聽號令者即以此劍誅之瑜受了劍對衆言曰吾奉主公之命率衆破曹諸將官吏來日俱于江畔行營聽令如遲誤者依七禁令五十四斬施行言罷辭了孫權起身出府衆文武各無言而散周瑜回到下處便請孔明議事孔明至瑜曰今日府下公議已定願求破曹良策孔明曰孫將軍心尚未穩不可以決策也瑜曰何謂心不穩孔明曰心怯曹兵之多懷寡不敵衆之意將軍能以軍數開解使其了然無疑然後大事可成瑜曰先生之論甚善乃複入見孫權權曰公瑾夜至必有事故瑜曰來日調撥軍馬主公心有疑否權曰但憂曹操兵多寡不敵衆耳他無所疑瑜笑曰瑜特爲此來開解主公主公因見操檄文言水陸大軍百萬故懷疑懼不復料其虛實今以實較之彼將中國之兵不過十五六萬且已久疲所得袁氏之衆亦止七八萬耳尚多懷疑未服夫以久疲之卒禦狐疑之衆其數雖多不足畏也瑜得五萬兵自足破之願主公勿以爲慮權撫瑜背曰公瑾此言足釋吾疑子布無謀深失孤望獨卿及子敬與孤同心耳卿可與子敬程普即日選軍前進孤當續發人馬多載資糧爲卿後應卿前軍倘不如意便還就孤孤當親與操賊決戰更無他疑周瑜謝出暗忖曰孔明早已料著吳侯之心其計畫又高我一頭久必爲江東之患不如殺之乃令人連夜請魯肅入帳言欲殺孔明之事肅曰不可今操賊未破先殺賢士是自去其助也瑜曰此人助劉備必爲江東之患肅曰諸葛瑾乃其親兄可令招此人同事東吳豈不妙哉瑜善其言次日平明瑜赴行營升中軍帳高坐左右立刀斧手聚集文官武將聽令原來程普年長於瑜今瑜爵居其上心中不樂是日乃託病不出令長子程資自代瑜令衆將曰王法無親諸君各守乃職方今曹操弄權甚于董卓囚天子于許昌屯暴兵於境上吾今奉命討之諸君幸皆努力向前大軍到處不得擾民賞勞罰罪並不徇縱令畢即差韓當黃蓋爲前部先鋒領本部戰船即日起行前至三江口下寨別聽將令蔣欽周泰爲第二隊淩統潘璋爲第三隊太史慈呂蒙爲第四隊陸遜董襲爲第五隊呂范朱治爲四方巡警使催督六郡官軍水陸並進克期取齊調撥已畢諸將各自收拾船隻軍器起行程咨回見父程普說周瑜調兵動止有法普大驚曰吾素欺周郎懦弱不足爲將今能如此真將才也我如何不服遂親詣行營謝罪瑜亦遜謝次日瑜請諸葛瑾謂曰令弟孔明有王佐之才如何屈身事劉備今幸至江東欲煩先生不惜齒牙餘論使令弟棄劉備而事東吳則主公既得良輔而先生兄弟又得相見豈不美哉先生幸即一行瑾曰瑾自至江東愧無寸功今都督有命敢不效力即時上馬徑投驛亭來見孔明孔明接入哭拜各訴闊情瑾泣曰弟知伯夷叔齊乎孔明暗思此必周郎教來說我也遂答曰夷齊古之聖賢也瑾曰夷齊雖至餓死首陽山下兄弟二人亦在一處我今與你同胞共乳乃各事其主不能旦暮相聚視夷齊之爲人能無愧乎孔明曰兄所言者情也弟所守者義也弟與兄皆漢人今劉皇叔乃漢室之胄兄若能去東吳而與弟同事劉皇叔則上不愧爲漢臣而骨肉又得相聚此情義兩全之策也不識兄意以爲何如瑾思曰我來說他反被他說了我也遂無言回答起身辭去回見周瑜細述孔明之言瑜曰公意若何瑾曰吾受孫將軍厚恩安肯相背瑜曰公既忠心事主不必多言吾自有伏孔明之計正是智與智逢宜必合才和才角又難容畢竟周瑜定何計伏孔明且看下回分解
