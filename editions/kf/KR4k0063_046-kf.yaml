body:
  text: 第四十六回用奇謀孔明借箭獻密計黃蓋受刑卻說魯肅領了周瑜言語徑來舟中相探孔明孔明接入小舟對坐肅曰連日措辦軍務有失聽教孔明曰便是亮亦未與都督賀喜肅曰何喜孔明曰公瑾使先生來探亮知也不知便是這件事可賀喜耳唬得魯肅失色問曰先生何由知之孔明曰這條計只好弄蔣幹曹操雖被一時瞞過必然便省悟只是不肯認錯耳今蔡張兩人既死江東無患矣如何不賀喜吾聞曹操換毛玠於禁爲水軍都督則這兩個手裏好歹送了水軍性命魯肅聽了開口不得把些言語支吾了半晌別孔明而回孔明囑曰望子敬在公瑾面前勿言亮先知此事恐公瑾心懷妒忌又要尋事害亮魯肅應諾而去回見周瑜把上項事只得實說了瑜大驚曰此人決不可留吾決意斬之肅勸曰若殺孔明卻被曹操笑也瑜曰吾自有公道斬之教他死而無怨肅曰何以公道斬之瑜曰子敬休問來日便見次日聚衆將於帳下教請孔明議事孔明欣然而至坐定瑜問孔明曰即日將與曹軍交戰水路交兵當以何兵器爲先孔明曰大江之上以弓箭爲先瑜曰先生之言甚合愚意但今軍中正缺箭用敢煩先生監造十萬枝箭以爲應敵之具此系公事先生幸勿推卻孔明曰都督見委自當效勞敢問十萬枝箭何時要用瑜曰十日之內可完辦否孔明曰操軍即日將至若候十日必誤大事瑜曰先生料幾日可完辦孔明曰只消三日便可拜納十萬枝箭瑜曰軍中無戲言孔明曰怎敢戲都督願納軍令狀三日不辦甘當重罰瑜大喜喚軍政司當面取了文書置酒相待曰待軍事畢後自有酬勞孔明曰今日已不及來日造起至第三日可差五百小軍到江邊搬箭飲了數杯辭去魯肅曰此人莫非詐乎瑜曰他自送死非我逼他今明白對衆要了文書他便兩脅生翅也飛不去我只分付軍匠人等教他故意遲延凡應用物件都不與齊備如此必然誤了日期那時定罪有何理說公今可去探他虛實卻來回報肅領命來見孔明孔明曰吾曾告子敬休對公瑾說他必要害我不想子敬不肯爲我隱諱今日果然又弄出事來三日內如何造得十萬箭子敬只得救我肅曰公自取其禍我如何救得你孔明曰望子敬借我二十隻船每船要軍士三十人船上皆用青布爲幔各束草千餘個分佈兩邊吾別有妙用第三日包管有十萬枝箭只不可又教公瑾得知若彼知之吾計敗矣肅允諾卻不解其意回報周瑜果然不提起借船之事只言孔明並不用箭竹翎毛膠漆等物自有道理瑜大疑曰且看他三日後如何回覆我卻說魯肅私自撥輕快船二十隻各船三十餘人並布幔束草等物盡皆齊備候孔明調用第一日卻不見孔明動靜第二日亦只不動至第三日四更時分孔明密請魯肅到船中肅問曰公召我來何意孔明曰特請子敬同往取箭肅曰何處去取孔明曰子敬休問前去便見遂命將二十隻船用長索相連徑望北岸進發是夜大霧漫天長江之中霧氣更甚對面不相見孔明促舟前進果然是好大霧前人有篇大霧垂江賦曰大哉長江西接岷峨南控三吳北帶九河彙百川而入海曆萬古以揚波至若龍伯海若江妃水母長鯨千丈天蜈九首鬼怪異類鹹集而有蓋夫鬼神之所憑依英雄之所戰守也時也陰陽既亂昧爽不分訝長空之一色忽大霧之四屯雖輿薪而莫睹惟金鼓之可聞初若溟鯤才隱南山之豹漸而充塞欲迷北海之鯤然後上接高天下垂厚地渺乎蒼茫浩乎無際鯨鯢出水而騰波蛟龍潛淵而吐氣又如梅霖收溽春陽釀寒溟溟漠漠浩浩漫漫東失柴桑之岸南無夏口之山戰船千艘俱沈淪於岩壑漁舟一葉驚出沒於波瀾甚則穹昊無光朝陽失色返白晝爲昏黃變丹山爲水碧雖大禹之智不能測其淺深離婁之明焉能辨乎咫尺於是馮夷息浪屏翳收功魚鼈遁迹鳥獸潛蹤隔斷蓬萊之島暗圍閶闔之宮恍惚奔騰如驟雨之將至紛紜雜遝若寒雲之欲同乃能中隱毒蛇因之而爲瘴癘內藏妖魅憑之而爲禍害降疾厄於人間起風塵於塞外小民遇之夭傷大人觀之感慨蓋將返元氣于洪荒混天地爲大塊當夜五更時候船已近曹操水寨孔明教把船隻頭西尾東一帶擺開就船上擂鼓呐喊魯肅驚曰倘曹兵齊出如之奈何孔明笑曰吾料曹操於重霧中必不敢出吾等只顧酌酒取樂待霧散便回卻說曹寨中聽得擂鼓呐喊毛玠於禁二人慌忙飛報曹操操傳令曰重霧迷江彼軍忽至必有埋伏切不可輕動可撥水軍弓弩手亂箭射之又差人往旱寨內喚張遼徐晃各帶弓弩軍三千火速到江邊助射比及號令到來毛玠於禁怕南軍搶入水寨已差弓弩手在寨前放箭少頃旱寨內弓弩手亦到約一萬餘人盡皆向江中放箭箭如雨發孔明教把船吊回頭東尾西逼近水寨受箭一面擂鼓呐喊待至日高霧散孔明令收船急回二十隻船兩邊束草上排滿箭枝孔明令各船上軍士齊聲叫曰謝丞相箭比及曹軍寨內報知曹操時這裏船輕水急已放回二十餘裏追之不及曹操懊悔不已卻說孔明回船謂魯肅曰每船上箭約五六千矣不費江東半分之力已得十萬餘箭明日即將來射曹軍卻不甚便肅曰先生真神人也何以知今日如此大霧孔明曰爲將而不通天文不識地利不知奇門不曉陰陽不看陣圖不明兵勢是庸才也亮於三日前已算定今日有大霧因此敢任三日之限公瑾教我十日完辦工匠料物都不應手將這一件風流罪過明白要殺我我命系於天公瑾焉能害我哉魯肅拜服船到岸時周瑜已差五百軍在江邊等候搬箭孔明教於船上取之可得十余萬枝都搬入中軍帳交納魯肅入見周瑜備說孔明取箭之事瑜大驚慨然歎曰孔明神機妙算吾不如也後人有詩贊曰一天濃霧滿長江遠近難分水渺茫驟雨飛蝗來戰艦孔明今日伏周郎少頃孔明入寨見周瑜瑜下帳迎之稱羨曰先生神算使人敬服孔明曰詭譎小計何足爲奇瑜邀孔明入帳共飲瑜曰昨吾主遣使來催督進軍瑜未有奇計願先生教我孔明曰亮乃碌碌庸才安有妙計瑜曰某昨觀曹操水寨極是嚴整有法非等閒可攻思得一計不知可否先生幸爲我一決之孔明曰都督且休言各自寫於手內看同也不同瑜大喜教取筆硯來先自暗寫了卻送與孔明孔明亦暗寫了兩個移近坐榻各出掌中之字互相觀看皆大笑原來周瑜掌中字乃一火字孔明掌中亦一火字瑜曰既我兩人所見相同更無疑矣幸勿漏泄孔明曰兩家公事豈有漏泄之理吾料曹操雖兩番經我這條計然必不爲備今都督盡行之可也飲罷分散諸將皆不知其事卻說曹操平白折了十五六萬箭心中氣悶荀攸進計曰江東有周瑜諸葛亮二人用計急切難破可差人去東吳詐降爲奸細內應以通消息方可圖也操曰此言正合吾意汝料軍中誰可行此計攸曰蔡瑁被誅蔡氏宗族皆在軍中瑁之族弟蔡中蔡和現爲副將丞相可以恩結之差往詐降東吳必不見疑操從之當夜密喚二人入帳囑付曰汝二人可引些少軍士去東吳詐降但有動靜使人密報事成之後重加封賞休懷二心二人曰吾等妻子俱在荊州安敢懷二心丞相勿疑某二人必取周瑜諸葛亮之首獻於麾下操厚賞之次日二人帶五百軍士駕船數隻順風望著南岸來且說周瑜正理會進兵之事忽報江北有船來到江口稱是蔡瑁之弟蔡和蔡中特來投降瑜喚入二人哭拜曰吾兄無罪被操賊所殺吾二人欲報兄仇特來投降望賜收錄願爲前部瑜大喜重賞二人即命與甘寧引軍爲前部二人拜謝以爲中計瑜密喚甘寧分付曰此二人不帶家小非真投降乃曹操使來爲奸細者吾今欲將計就計教他通報消息汝可殷勤相待就裏提防至出兵之日先要殺他兩個祭旗汝切須小心不可有誤甘寧領命而去魯肅入見周瑜曰蔡中蔡和之降多應是詐不可收用瑜叱曰彼因曹操殺其兄欲報仇而來降何詐之有你若如此多疑安能容天下之士乎肅默然而退乃往告孔明孔明笑而不言肅曰孔明何故哂笑孔明曰吾笑子敬不識公瑾用計耳大江隔遠細作極難往來操使蔡中蔡和詐降刺探我軍中事公瑾將計就計正要他通報消息兵不厭詐公瑾之謀是也肅方才省悟卻說周瑜夜坐帳中忽見黃蓋潛入中軍來見周瑜瑜問曰公覆夜至必有良謀見教蓋曰彼衆我寡不宜久持何不用火攻之瑜曰誰教公獻此計蓋曰某出自己意非他人之所教也瑜曰吾正欲如此故留蔡中蔡和詐降之人以通消息但恨無一人爲我行詐降計耳蓋曰某願行此計瑜曰不受些苦彼如何肯信蓋曰某受孫氏厚恩雖肝腦塗地亦無怨悔瑜拜而謝之曰君若肯行此苦肉計則江東之萬幸也蓋曰某死亦無怨遂謝而出次日周瑜鳴鼓大會諸將於帳下孔明亦在座周瑜曰操引百萬之衆連絡三百餘裏非一日可破今令諸將各領三個月糧草準備禦敵言未訖黃蓋進曰莫說三個月便支三十個月糧草也不濟事若是這個月破的便破若是這個月破不的只可依張子布之言棄甲倒戈北面而降之耳周瑜勃然變色大怒曰吾奉主公之命督兵破曹敢有再言降者必斬今兩軍相敵之際汝敢出此言慢我軍心不斬汝首難以服衆喝左右將黃蓋斬訖報來黃蓋亦怒曰吾自隨破虜將軍縱橫東南已曆三世那有你來瑜大怒喝令速斬甘寧進前告曰公覆乃東吳舊臣望寬恕之瑜喝曰汝何敢多言亂吾法度先叱左右將甘寧亂棒打出衆官皆跪告曰黃蓋罪固當誅但於軍不利望都督寬恕權且記罪破曹之後斬亦未遲瑜怒未息衆官苦苦告求瑜曰若不看衆官面皮決須斬首今且免死命左右拖翻打一百脊杖以正其罪衆官又告免瑜推翻案桌叱退衆官喝教行杖將黃蓋剝了衣服拖翻在地打了五十脊杖衆官又複苦苦求免瑜躍起指蓋曰汝敢小覰我耶且寄下五十棍再有怠慢二罪俱罰恨聲不絕而入帳中衆官扶起黃蓋打得皮開肉綻鮮血迸流扶歸本寨昏絕幾次動問之人無不下淚魯肅也往看問了來至孔明船中謂孔明曰今日公瑾怒責公覆我等皆是他部下不敢犯顔苦諫先生是客何故袖手旁觀不發一語孔明笑曰子敬欺我肅曰肅與先生渡江以來未嘗一事相欺今何出此言孔明曰子敬豈不知公瑾今日毒打黃公覆乃其計耶如何要我勸他肅方悟孔明曰不用苦肉計何能瞞過曹操今必令黃公覆去詐降卻教蔡中蔡和報知其事矣子敬見公瑾時切勿言亮先知其計只說亮也埋怨都督便了肅辭去入帳見周瑜瑜邀入帳後肅曰今日何故痛責黃公覆瑜曰諸將怨否肅曰多有心中不安者瑜曰孔明之意若何肅曰他也埋怨都督忒情薄瑜笑曰今番須瞞過他也肅曰何謂也瑜曰今日痛打黃蓋乃計也吾欲令他詐降先須用苦肉計瞞過曹操就中用火攻之可以取勝肅乃暗思孔明之高見卻不敢明言且說黃蓋臥於帳中諸將皆來動問蓋不言語但長籲而已忽報參謀闞澤來問蓋令請入臥內叱退左右闞澤曰將軍莫非與都督有仇蓋曰非也澤曰然則公之受責莫非苦肉計乎蓋曰何以知之澤曰某觀公瑾舉動已料著八九分蓋曰某受吳侯三世厚恩無以爲報故獻此計以破曹操吾雖受苦亦無所恨吾遍觀軍中無一人可爲心腹者惟公素有忠義之心敢以心腹相告澤曰公之告我無非要我獻詐降書耳蓋曰實有此意未知肯否闞澤欣然領諾正是勇將輕身思報主謀臣爲國有同心未知闞澤所言若何且看下文分解
