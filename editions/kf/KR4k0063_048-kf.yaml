body:
  text: 第四十八回宴長江曹操賦詩鎖戰船北軍用武卻說龐統聞言吃了一驚急回視其人原來卻是徐庶統見是故人心下方定回顧左右無人乃曰你若說破我計可惜江南八十一州百姓皆是你送了也庶笑曰此間八十三萬人馬性命如何統曰元直真欲破我計耶庶曰吾感劉皇叔厚恩未嘗忘報曹操送死吾母吾已說過終身不設一謀今安肯破兄良策只是我亦隨軍在此兵敗之後玉石不分豈能免難君當教我脫身之術我即緘口遠避矣統笑曰元直如此高見遠識諒此有何難哉庶曰願先生賜教統去徐庶耳邊略說數句庶大喜拜謝龐統別卻徐庶下船自回江東且說徐庶當晚密使近人去各寨中暗布謠言次日寨中三三五五交頭接耳而說早有探事人報知曹操說軍中傳言西涼州韓遂馬騰謀反殺奔許都來操大驚急聚衆謀士商議曰吾引兵南征心中所憂者韓遂馬騰耳軍中謠言雖未辨虛實然不可不防言未畢徐庶進曰庶蒙丞相收錄恨無寸功報效請得三千人馬星夜往散關把住隘口如有緊急再行告報操喜曰若得元直去吾無憂矣散關之上亦有軍兵公統領之目下撥三千馬步軍命臧霸爲先鋒星夜前去不可稽遲徐庶辭了曹操與藏霸便行此便是龐統救徐庶之計後人有詩曰曹操征南日日憂馬騰韓遂起戈矛鳳雛一語教徐庶正似遊魚脫釣鈎曹操自遣徐庶去後心中稍安遂上馬先看沿江旱寨次看水寨乘大船一隻於中央上建帥字旗號兩傍皆列水寨船上埋伏弓弩千張操居於上時建安十三年冬十一月十五日天氣晴明平風靜浪操令置酒設樂於大船之上吾今夕欲會諸將天色向晚東山月上皎皎如同白日長江一帶如橫素練操坐大船之上左右侍禦者數百人皆錦衣繡襖荷戈執戟文武衆官各依次而坐操見南屏山色如畫東視柴桑之境西觀夏口之江南望樊山北覰烏林四顧空闊心中歡喜謂衆官曰吾自起義兵以來與國家除凶去害誓願掃清四海削平天下所未得者江南也今吾有百萬雄師更賴諸公用命何患不成功耶收服江南之後天下無事與諸公共用富貴以樂太平文武皆起謝曰願得早奏凱歌我等終身皆賴丞相福蔭操大喜命左右行酒飲至半夜操酒酣遙指南岸曰周瑜魯肅不識天時今幸有投降之人爲彼心腹之患此天助吾也荀攸曰丞相勿言恐有泄漏操大笑曰座上諸公與近侍左右皆吾心腹之人也言之何礙又指夏口曰劉備諸葛亮汝不料螻蟻之力欲撼泰山何其愚耶顧謂諸將曰吾今年五十四歲矣如得江南竊有所喜昔日喬公與吾至契吾知其二女皆有國色後不料爲策周瑜所娶吾今新構銅雀台于漳水之上如得江南當娶二喬置之臺上以娛暮年吾願足矣言罷大笑唐人杜牧之有詩曰折戟沈沙鐵未消自將磨洗認前朝東風不與周郎便銅雀春深鎖二喬曹操正笑談間忽聞鴉聲望南飛鳴而去操問曰此鴉緣何夜鳴左右答曰鴉見月明疑是天曉故離樹而鳴也操又大笑時操已醉乃取槊立於船頭上以酒奠于江中滿飲三爵橫槊謂諸將曰我持此槊破黃巾擒呂布滅袁術收袁紹深入塞北直抵遼東縱橫天下頗不負大丈夫之志也今對此景甚有慷慨吾當作歌汝等和之歌曰對酒當歌人生幾何譬如朝露去日苦多慨當以慷憂思難忘何以解憂惟有杜康青青子衿悠悠我心但爲君故沈吟至今呦呦鹿鳴食野之蘋我有嘉賓鼓瑟吹笙皎皎如月何時可輟憂從中來不可斷絕越陌度阡枉用相存契闊談宴心念舊恩月明星稀烏鵲南飛繞樹三匝無枝可依山不厭高水不厭深周公吐哺天下歸心歌罷衆和之共皆歡笑忽座間一人進曰大軍相當之際將士用命之時丞相何故出此不吉之言操視之乃揚州刺史沛國相人姓劉名馥字元穎馥起自合肥創立州治聚逃散之民立學校廣屯田興治教久事曹操多立功績當下操橫槊問曰吾言有何不吉馥曰月明星稀烏鵲南飛繞樹三匝無枝可依此不吉之言也操大怒曰汝安敢敗吾興手起一槊刺死劉馥衆皆驚駭遂罷宴次日操酒醒懊恨不已馥子劉熙告請父屍歸葬操泣曰吾昨因醉誤傷汝父悔之無及可以三公厚禮葬之又撥軍士護送靈柩即日回葬次日水軍都督毛玠於禁詣帳下請曰大小船隻俱已配搭連鎖停當旌旗戰具一一齊備請丞相調遣克日進兵操至水軍中央大戰船上坐定喚集諸將各各聽令水旱二軍俱分五色旗號水軍中央黃旗毛玠於禁前軍紅旗張郃後軍皂旗呂虔左軍青旗文聘右軍白旗呂通馬步前軍紅旗徐晃後軍皂旗李典左軍青旗樂進右軍白旗夏侯淵水陸路都接應使夏侯惇曹洪護衛往來監戰使許褚張遼其餘驍將各依隊伍令畢水軍寨中發擂三通各隊伍戰船分門而出是日西北風驟起各船拽起風帆沖波激浪穩如平地北軍在船上踴躍施勇刺槍使刀前後左右各軍旗幡不雜又有小船五十餘隻往來巡警催督操立於將台之上觀看調練心中大喜以爲必勝之法教且收住帆幔各依次序回寨操升帳謂衆謀士曰若非天命助吾安得鳳雛妙計鐵索連舟果然渡江如履平地程昱曰船皆連鎖固是平穩但彼若用火攻難以回避不可不防操大笑曰程仲德雖有遠慮卻還有見不到處荀攸曰仲德之言甚是丞相何故笑之操曰凡用火攻必藉風力方今隆冬之際但有西風北風安有東風南風耶吾居於西北之上彼兵皆在南岸彼若用火是燒自己之兵也吾何懼哉若是十月小春之時吾早已提備矣諸將皆拜伏曰丞相高見衆人不及操顧諸將曰青徐燕代之衆不慣乘舟今非此計安能涉大江之險只見班部中二將挺身出曰小將雖幽燕之人也能乘舟今願借巡船二十隻直至江口奪旗鼓而還以顯北軍亦能乘舟也操視之乃袁紹手下舊將焦觸張南也操曰汝等皆生長北方恐乘舟不便江南之兵往來水上習練精熟汝勿輕以性命爲兒戲也焦觸張南大叫曰如其不勝甘受軍法操曰戰船盡已連鎖惟有小舟每舟可容二十人只恐未便接戰觸曰若用大船何足爲奇乞付小舟二十餘隻某與張南各引一半只今日直抵江南水寨須要奪旗斬將而還操曰吾與汝二十隻船差撥精銳軍五百人皆長槍硬弩到來日天明將大寨船出到江面上遠爲之勢更差文聘亦領三十隻巡船接應汝回焦觸張南欣喜而退次日四更造飯五更結束已定早聽得水寨中擂鼓鳴金船皆出寨分佈水面長江一帶青紅旗號交雜焦觸張南領哨船二十隻穿寨而出望江南進發卻說南岸隔夜聽得鼓聲喧震遙望曹操調練水軍探事人報知周瑜瑜往山頂觀之操軍已收回次日忽又聞鼓聲震天軍士急登高觀望見有小船沖波而來飛報中軍周瑜問帳下誰敢先出韓當周泰二人齊出曰某當權爲先鋒破敵瑜喜傳令各寨嚴加守禦不可輕動韓當周泰各引哨船五隻分左右而出卻說焦觸張南憑一勇之氣飛棹小船而來韓當獨披掩心手執長槍立於船頭焦觸船先到便命軍士亂箭望韓當船上射來當用牌遮隔焦觸撚長槍與韓當交鋒當手起一槍刺死焦觸張南隨後大叫趕來隔斜裏周泰船出張南挺槍立於船頭兩邊弓矢亂射周泰一臂挽牌一手提刀兩船相離七八尺泰即飛身一躍直躍過張南船上手起刀落砍張南于水中亂殺駕舟軍士衆船飛棹急回韓當周泰催船追趕到半江中恰與文聘船相迎兩邊便擺定船廝殺卻說周瑜引衆將立於山頂遙望江北水面艨艟戰船排合江上旗幟號帶皆有次序回看文聘與韓當周泰相持韓當周泰奮力攻擊文聘抵敵不住回船而走韓周二人急催船追趕周瑜恐二人深入重地便將白旗招颭令衆鳴金二人乃揮棹而回周瑜于山頂看隔江戰船盡入水寨瑜顧謂衆將曰江北戰船如蘆葦之密操又多謀當用何計以破之衆未及對忽見曹軍寨中被風吹折中央黃旗飄入江中瑜大笑曰此不祥之兆也正觀之際忽狂風大作江中波濤拍岸一陣風過刮起旗角于周瑜臉上拂過瑜猛然想起一事在心大叫一聲往後便倒口吐鮮血諸將急救起時卻早不省人事正是一時忽笑又忽叫難使南軍破北軍畢竟周瑜性命如何且看下文分解
