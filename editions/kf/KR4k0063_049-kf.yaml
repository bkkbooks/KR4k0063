body:
  text: 第四十九回七星壇諸葛祭風三江口周瑜縱火卻說周瑜立於山頂觀望良久忽然望後而倒口吐鮮血不省人事左右救回帳中諸將皆來動問盡皆愕然相顧曰江北百萬之衆虎踞鯨吞不爭都督如此倘曹兵一至如之奈何慌忙差人申報吳侯一面求醫調治卻說魯肅見周瑜臥病心中憂悶來見孔明言周瑜卒病之事孔明曰公以爲何如肅曰此乃曹操之福江東之禍也孔明笑曰公瑾之病亮亦能醫肅曰誠如此則國家萬幸即請孔明同去看病肅先入見周瑜瑜以被蒙頭而臥肅曰都督病勢若何周瑜曰心腹攪痛時複昏迷肅曰曾服何藥餌瑜曰心中嘔逆藥不能下肅曰適來去望孔明言能醫都督之病現在帳外煩來醫治何如瑜命請入教左右扶起坐於床上孔明曰連日不晤君顔何期貴體不安瑜曰人有旦夕禍福豈能自保孔明笑曰天有不測風雲人又豈能料乎瑜聞失色乃作呻吟之聲孔明曰都督心中似覺煩積否瑜曰然孔明曰必須用涼藥以解之瑜曰已服涼藥全然無效孔明曰須先理其氣氣若順則呼吸之間自然痊可瑜料孔明必知其意乃以言挑之曰欲得順氣當服何藥孔明笑曰亮有一方便教都督氣順瑜曰願先生賜教孔明索紙筆屏退左右密書十六字曰欲破曹公宜用火攻萬事俱備只欠東風寫畢遞與周瑜曰此都督病源也瑜見了大驚暗思孔明真神人也早已知我心事只索以實情告之乃笑曰先生已知我病源將用何藥治之事在危急望即賜教孔明曰亮雖不才曾遇異人傳授八門遁甲天書可以呼風喚雨都督若要東南風時可于南屏山建一台名曰七星壇高九尺作三層用一百二十人手執旗幡圍繞亮于臺上作法借三日三夜東南大風助都督用兵何如瑜曰休道三日三夜只一夜大風大事可成矣只是事在目前不可遲緩孔明曰十一月二十日甲子祭風至二十二日丙寅風息如何瑜聞言大喜矍然而起便傳令差五百精壯軍士往南屏山築壇撥一百二十人執旗守壇聽候使令孔明辭別出帳與魯肅上馬來南屏山相度地勢令軍士取東南方赤土築壇方圓二十四丈每一層高三尺共是九尺下一層插二十八宿旗東方七面青旗按角亢氐房心尾箕布蒼龍之形北方七面皂旗按鬥牛女虛危室壁作玄武之勢西方七面白旗按奎婁胃昴畢觜參踞白虎之威南方七面紅旗按井鬼柳星張翼軫成朱雀之狀第二層周圍黃旗六十四面按六十四卦分八位而立上一層用四人各人戴束發冠穿皂羅袍鳳衣博帶朱履方裾前左立一人手執長竿竿尖上用雞羽爲葆以招風信前右立一人手執長竿竿上系七星號帶以表風色後左立一人捧寶劍後右立一人捧香爐壇下二十四人各持旌旗寶蓋大戟長戈黃鉞白旄朱幡皂纛環繞四面孔明於十一月二十日甲子吉辰沐浴齋戒身披道衣跣足散發來到壇前分付魯肅曰子敬自往軍中相助公瑾調兵倘亮所祈無應不可有怪魯肅別去孔明囑付守壇將士不許擅離方位不許交頭接耳不許失口亂言不許失驚打怪如違令者斬衆皆領命孔明緩步登壇觀瞻方位已定焚香於爐注水於盂仰天暗祝下壇入帳中少歇令軍士更替吃飯孔明一日上壇三次下壇三次卻並不見有東南風且說周瑜請程普魯肅一班軍官在帳中伺候只等東南風起便調兵出一面關報孫權接應黃蓋已自準備火船二十隻船頭密布大釘船內裝載蘆葦乾柴灌以魚油上鋪硫黃焰硝引火之物各用青布油單遮蓋船頭上插青龍牙旗船尾各系走舸在帳下聽候只等周瑜號令甘甯闞澤窩盤蔡和蔡中在水寨中每日飲酒不放一卒登岸周圍儘是東吳軍馬把得水泄不通只等帳上號令下來周瑜正在帳中坐議探子來報吳侯船隻離寨八十五裏停泊只等都督好音瑜即差魯肅遍告各部下官兵將士俱各收拾船隻軍器帆櫓等物號令一出時刻休違倘有違誤即按軍法衆兵將得令一個個磨拳擦掌準備廝殺是日看看近夜天色清明微風不動瑜謂魯肅曰孔明之言謬矣隆冬之時怎得東南風乎肅曰吾料孔明必不謬談將近三更時分忽聽風聲響旗幡轉動瑜出帳看時旗腳竟飄西北霎時間東南風大起瑜駭然曰此人有奪天地造化之法鬼神不測之術若留此人乃東吳禍根也及早殺卻免生他日之憂急喚帳前護軍校尉丁奉徐盛二將各帶一百人徐盛從江內去丁奉從旱路去都到南屏山七星壇前休問長短拿住諸葛亮便行斬首將首級來請功二將領命徐盛下船一百刀斧手蕩開棹漿丁奉上馬一百弓弩手各跨征駒往南屏山來于路正迎著東南風起後人有詩曰七星壇上臥龍登一夜東風江水騰不是孔明施妙計周郎安得逞才能丁奉馬軍先到見壇上執旗將士當風而立丁奉下馬提劍上壇不見孔明慌問守壇將士答曰恰才下壇去了丁奉忙下壇尋時徐盛船已到二人聚于江邊小卒報曰昨晚一隻快船停在前面灘口適間卻見孔明披發下船那船望上水去了丁奉徐盛便分水陸兩路追襲徐盛教拽起滿帆搶風而使遙望前船不遠徐盛在船頭上高聲大叫軍師休去都督有請只見孔明立於船尾大笑曰上覆都督好好用兵諸葛亮暫回夏口異日再容相見徐盛曰請暫少住有緊話說孔明曰吾已料定都督不能容我必來加害預先教趙子龍來相接將軍不必追趕徐盛見前船無篷只顧趕去看看至近趙雲拈弓搭箭立於船尾大叫曰吾乃常山趙子龍也奉令特來接軍師你如何來追趕本待一箭射死你來顯得兩家失了和氣教你知我手段言訖箭到處射斷徐盛船上篷索那篷墮落下水其船便橫趙雲卻教自己船上拽起滿帆乘順風而去其船如飛追之不及岸上丁奉喚徐盛船近岸言曰諸葛亮神機妙算人不可及更兼趙雲有萬夫不當之勇汝知他當陽長阪時否吾等只索回報便了於是二人回見周瑜言孔明預先約趙雲迎接去了周瑜大驚曰此人如此多謀使我曉夜不安矣魯肅曰且待破曹之後卻再圖之瑜從其言喚集諸將聽令先教甘寧帶了蔡中並降卒沿南岸而走只打北軍旗號直取烏林地面正當曹操屯糧之所深入軍中舉火爲號只留下蔡和一人在帳下我有用處第二喚太史慈分付你可領三千兵直奔黃州地界斷曹操合淝接應之兵就逼曹兵放火爲號只看紅旗便是吳侯接應兵到這兩隊兵最遠先發第三喚呂蒙領三千兵去烏林接應甘寧焚燒曹操寨柵第四喚淩統領三千兵直截彜陵界首只看烏林火起以兵應之第五喚董襲領三千兵直取漢陽從漢川殺奔曹操寨中看白旗接應第六喚潘璋領三千兵盡打白旗往漢陽接應董襲六隊船隻各自分路去了卻令黃蓋安排火船使小卒馳書約曹操今夜來降一面撥戰船四隻隨于黃蓋船後接應第一隊領兵軍官韓當第二隊領兵軍官周泰第三隊領兵軍官蔣欽第四隊領兵軍官陳武四隊各引戰船三百隻前面各擺列火船二十隻周瑜自與程普在大艨艟上督戰徐盛丁奉爲左右護衛只留魯肅共闞澤及衆謀士守寨程普見周瑜調軍有法甚相敬服卻說孫權差使命持兵符至說已差陸遜爲先鋒直抵蘄黃地面進兵吳侯自爲後應瑜又差人西山放火炮南屏山舉號旗各各準備停當只等黃昏舉動話分兩頭且說劉玄德在夏口專候孔明回來忽見一隊船到乃是公子劉琦自來探聽消息玄德請上敵樓坐定說東南風起多時子龍去接孔明至今不見到吾心甚憂小校遙指樊口港上一帆風送扁舟來到必軍師也玄德與劉琦下樓迎接須臾船到孔明子龍登岸玄德大喜問候畢孔明曰且無暇告訴別事前者所約軍馬戰船皆已辦否玄德曰收拾久矣只候軍師調用孔明便與玄德劉琦升帳坐定謂趙雲曰子龍可帶三千軍馬渡江徑取烏林小路揀樹木蘆葦密處埋伏今夜四更已後曹操必然從那條路奔走等他軍馬過就半中間放起火來雖然不殺他盡絕也殺一半雲曰烏林有兩條路一條通南郡一條取荊州不知向那條路來孔明曰南郡勢迫曹操不敢往必來荊州然後大軍投許昌而去雲領計去了又喚張飛曰翼德可領三千兵渡江截斷彜陵這條路去葫蘆穀口埋伏曹操不敢走南彜陵必望北彜陵去來日雨過必然來埋鍋造飯只看煙起便就山邊放起火來雖然不捉得曹操翼德這場功料也不小飛領計去了又喚糜竺糜芳劉封三人各駕船隻繞江剿擒敗軍奪取器械三人領計去了孔明起身謂公子劉琦曰武昌一望之地最爲緊要公子便請回率領所部之兵陳於岸口操一敗必有逃來者就而擒之卻不可輕離城郭劉琦便辭玄德孔明去了孔明謂玄德曰主公可于樊口屯兵憑高而望坐看今夜周郎成大功也時雲長在側孔明全然不睬雲長忍耐不住乃高聲曰關某自隨兄長征戰許多年來未嘗落後今日逢大敵軍師卻不委用此是何意孔明笑曰雲長勿怪某本欲煩足下把一個最緊要的隘口怎奈有些違礙不敢教去雲長曰有何違礙願即見諭孔明曰昔日曹操待足下甚厚足下當有以報之今日操兵敗必走華容道若令足下去時必然放他過去因此不敢教去雲長曰軍師好心多當日曹操果是重待某某已斬顔良誅文醜解白馬之圍報過他了今日撞見豈肯放過孔明曰倘若放了時卻如何雲長曰願依軍法孔明曰如此立下了文書雲長便領了軍令狀雲長曰若曹操不從那條路上來如何孔明曰我亦與你軍令狀雲長大喜孔明曰雲長可于華容小路高山之處堆積柴草放起一把火煙引曹操來雲長曰曹操望見煙知有埋伏如何肯來孔明笑曰豈不聞兵法虛虛實實之論操雖能用兵只此可以瞞過他也他見煙起將謂虛張聲勢必然投這條路來將軍休得容情雲長領了將令引關平周倉並五百校刀手投華容道埋伏去了玄德曰吾弟義氣深重若曹操果然投華容道去時只恐端的放了孔明曰亮夜觀乾象操賊未合身亡留這人情教雲長做了亦是美事玄德曰先生神算世所罕及孔明遂與玄德往樊口看周瑜用兵留孫乾簡雍守城卻說曹操在大寨中與衆將商議只等黃蓋消息當日東南風起甚緊程昱入告曹操曰今日東南風起宜預提防操笑曰冬至一陽生來複之時安得無東南風何足爲怪軍士忽報江東一隻小船來到說有黃蓋密書操急喚入其人呈上書書中訴說周瑜關防得緊因此無計脫身今有鄱陽湖新運到糧周瑜差蓋巡哨已有方便好歹殺江東名將獻首來降只在今晚二更船上插青龍牙旗者即糧船也操大喜遂與衆將來水寨中大船上觀望黃蓋船到且說江東天色向晚周瑜喚出蔡和令軍士縛倒和叫無罪瑜曰汝是何等人敢來詐降吾今缺少福物祭旗願借你首級和抵賴不過大叫曰汝家闞澤甘寧亦曾與謀瑜曰此乃吾之所使也蔡和悔之無及瑜令捉至江邊皂纛旗下奠酒燒紙一刀斬了蔡和用血祭旗畢便令開船黃蓋在第三隻火船上獨披掩心手提利刃旗上大書先鋒黃蓋蓋乘一天順風望赤壁進發是時東風大作波浪洶湧操在中軍遙望隔江看看月上照耀江水如萬道金蛇翻波戲浪操迎風大笑自以爲得志忽一軍指說江南隱隱一簇帆幔使風而來操憑高望之報稱皆插青龍牙旗內中有大旗上書先鋒黃蓋名字操笑曰公覆來降此天助我也來船漸近程昱觀望良久謂操曰來船必詐且休教近寨操曰何以知之程昱曰糧在船中船必穩重今觀來船輕而且浮更兼今夜東南風甚緊倘有詐謀何以當之操省悟便問誰去止之文聘曰某在水上頗熟願請一往言畢跳下小船用手一指十數隻巡船隨文聘船出聘立於船頭大叫丞相鈞旨南船且休近寨就江心抛住衆軍齊喝快下了篷言未絕弓弦響處文聘被箭射中左臂倒在船中船上大亂各自奔回南船距操寨止隔二裏水面黃蓋用刀一招前船一齊發火火趁風威風助火勢船如箭發煙焰漲天二十隻火船撞入水寨曹寨中船隻一時盡著又被鐵環鎖住無處逃避隔江炮響四下火船齊到但見三江面上火逐風飛一派通紅漫天徹地曹操回觀岸上營寨幾處煙火黃蓋跳在小船上背後數人駕舟冒煙突火來尋曹操操見勢急方欲跳上岸忽張遼駕一小腳船扶操下得船時那只大船已自著了張遼與十數人保護曹操飛奔岸口黃蓋望見穿絳紅袍者下船料是曹操乃催船速進手提利刃高聲大叫曹賊休走黃蓋在此操叫苦連聲張遼拈弓搭箭覰著黃蓋較近一箭射去此時風聲正大黃蓋在火光中那裏聽得弓弦響正中肩窩翻身落水正是厄盛時遭水厄棒瘡愈後患金瘡未知黃蓋性命如何且看下文分解
