body:
  text: 第五十回諸葛亮智算華容關雲長義釋曹操卻說當夜張遼一箭射黃蓋下水救得曹操登岸尋著馬匹走時軍已大亂韓當冒煙突火來攻水寨忽聽得士卒報道後梢舵上一人高叫將軍表字韓當細聽但聞高叫義公救我當曰此黃公覆也急教救起見黃蓋負箭著傷咬出箭杆箭頭陷在肉內韓當急爲脫去濕衣用刀剜出箭頭扯旗束之脫自己戰袍與黃蓋穿了先令別船送回大寨醫治原來黃蓋深知水性故大寒之時和甲墮江也逃得性命卻說當日滿江火滾喊聲震地左邊是韓當蔣欽兩軍從赤壁西邊殺來右邊是周泰陳武兩軍從赤壁東邊殺來正中是周瑜程普徐盛丁奉大隊船隻都到火須兵應兵仗火威此正是三江水戰赤壁鏖兵曹軍著槍中箭火焚水溺者不計其數後人有詩曰魏吳爭鬥決雌雄赤壁樓船一掃空烈火初張照雲海周郎曾此破曹公又有一絕雲山高月小水茫茫追歎前朝割據忙南士無心迎魏武東風有意便周郎不說江中鏖兵且說甘甯令蔡中引入曹寨深處甯將蔡中一刀砍于馬下就草上放起火來呂蒙遙望中軍火起也放十數處火接應甘寧潘璋董襲分頭放火呐喊四下裏鼓聲大震曹操與張遼引百餘騎在火林內走看前面無一處不著正走之間毛玠救得文聘引十數騎到操令軍尋路張遼指道只有烏林地面空闊可走操徑奔烏林正走間背後一軍趕到大叫曹賊休走火光中現出呂蒙旗號操催軍馬向前留張遼斷後抵敵呂蒙卻見前面火把又起從山谷中擁出一軍大叫淩統在此曹操肝膽皆裂忽刺斜裏一彪軍到大叫丞相休慌徐晃在此彼此混戰一場奪路望北而走忽見一隊軍馬屯在山坡前徐晃出問乃是袁紹手下降將馬延張顗有三千北地軍馬列寨在彼當夜見滿天火起未敢轉動恰好接著曹操操教二將引一千軍馬開路其餘留著護身操得這枝生力軍馬心中稍安馬延張顗二將飛騎前行不到十裏喊聲四起一彪軍出爲首一將大呼曰吾乃東吳甘興霸也馬延正欲交鋒早被甘甯一刀斬于馬下張顗挺槍來迎寧大喝一聲顗措手不及被寧手起一刀翻身落馬後軍飛報曹操操此時指望合淝有兵救應不想孫權在合淝路口望見江中火光知是我軍得勝便教陸遜舉火爲號太史慈見了與陸遜合兵一處沖殺將來操只得望彜陵而走路上撞見張郃操令斷後縱馬加鞭走至五更回望火光漸遠操心方定問曰此是何處左右曰此是烏林之西宜都之北操見樹木叢雜山川險峻乃於馬上仰面大笑不止諸將問曰丞相何故大笑操曰吾不笑別人單笑周瑜無謀諸葛亮少智若是吾用兵之時預先在這裏伏下一軍如之奈何說猶未了兩邊鼓聲震響火光竟天而起驚得曹操幾乎墜馬刺斜裏一彪軍殺出大叫我趙子龍奉軍師將令在此等候多時了操教徐晃張郃雙敵趙雲自己冒煙突火而去子龍不來追趕只顧搶奪旗幟曹操得脫天色微明黑雲罩地東南風尚不息忽然大雨傾盆濕透衣甲操與軍士冒雨而行諸軍皆有饑色操令軍士往村落中劫掠糧食尋覓火種方欲造飯後面一軍趕到操心甚慌原來卻是李典許褚保護著衆謀士來到操大喜令軍馬且行問前面是那裏地面人報一邊是南彜陵大路一邊是北彜陵山路操問那裏投南郡江陵去近軍士稟曰取北彜陵過葫蘆口去最便操教走北彜陵行至葫蘆口軍皆饑餒行走不上馬亦困乏多有倒于路者操教前面暫歇馬上有帶得鑼鍋的也有村中掠得糧米的便就山邊揀幹處埋鍋造飯割馬肉燒吃盡皆脫去濕衣於風頭吹曬馬皆摘鞍野放咽咬草根操坐于疏林之下仰面大笑衆官問曰適來丞相笑周瑜諸葛亮引惹出趙子龍來又折了許多人馬如今爲何又笑操曰吾笑諸葛亮周瑜畢竟智謀不足若是我用兵時就這個去處也埋伏一彪軍馬以逸待勞我等縱然脫得性命也不免重傷矣彼見不到此我是以笑之正說間前軍後軍一齊發喊操大驚棄甲上馬衆軍多有不及收馬者早見四下火煙布合山口一軍擺開爲首乃燕人張翼德橫矛立馬大叫操賊走那裏去諸軍衆將見了張飛盡皆膽寒許褚騎無鞍馬來戰張飛張遼徐晃二將縱馬也來夾攻兩邊軍馬混戰做一團操先撥馬走脫諸將各自脫身張飛從後趕來操迤邐奔逃追兵漸遠回顧衆將多已帶傷正行時軍士稟曰前面有兩條路請問丞相從那條路去操問那條路近軍士曰大路稍平卻遠五十餘裏小路投華容道卻近五十餘裏只是地窄路險坑坎難行操令人上山觀望回報小路山邊有數處煙起大路並無動靜操教前軍便走華容道小路諸將曰烽煙起處必有軍馬何故反走這條路操曰豈不聞兵書有雲虛則實之實則虛之諸葛亮多謀故使人於山僻燒煙使我軍不敢從這條山路走他卻伏兵于大路等著吾料已定偏不教中他計諸將皆曰丞相妙算人不可及遂勒兵走華容道此時人皆饑倒馬盡困乏焦頭爛額者扶策而行中箭著槍者勉強而走衣甲濕透個個不全軍器旗幡紛紛不整大半皆是彜陵道上被趕得慌只騎得禿馬鞍轡衣服盡皆抛棄正值隆冬嚴寒之時其苦何可勝言操見前軍停馬不進問是何故回報曰前面山僻路小因早晨下雨坑塹內積水下流泥陷馬蹄不能前進操大怒叱曰軍旅逢山開路遇水疊橋豈有泥濘不堪行之理傳下號令教老弱中傷軍士在後慢行強壯者擔土束柴搬草運蘆填塞道路務要即時行動如違令者斬衆軍只得都下馬就路旁砍伐竹木填塞山路操恐後軍來趕令張遼許褚徐晃引百騎執刀在手但遲慢者便斬之此時軍已餓乏衆皆倒地操喝令人馬踐踏而行死者不可勝數號哭之聲于路不絕操怒曰生死有命何哭之有如再哭者立斬三停人馬一停落後一停填了溝壑一停跟隨曹操過了險峻路稍平坦操回顧止有三百餘騎隨後並無衣甲包袍鎧整齊者操催速行衆將問馬盡乏矣只好少歇操曰趕到荊州將息未遲又行不到數裏操在馬上揚鞭大笑衆將問丞相何又大笑操曰人皆言周瑜諸葛亮足智多謀以吾觀之到底是無能之輩若使此處伏一旅之師吾等皆束手受縛矣言未畢一聲炮響兩邊五百校刀手擺開爲首大將關雲長提青龍刀跨赤兔馬截住去路操軍見了亡魂喪膽面面相覷操曰既到此處只得決一死戰衆將曰人縱然不怯馬力已乏安能複戰程昱曰某素知雲長傲上而不忍下欺強而不淩弱恩怨分明信義素著丞相舊日有恩於彼今只親自告之可脫此難操從其說即縱馬向前欠身謂雲長曰將軍別來無恙雲長亦欠身答曰關某奉軍師將令等候丞相多時操曰曹操兵敗勢危到此無路望將軍以昔日之情爲重雲長曰昔日關某雖蒙丞相厚恩然已斬顔良誅文醜解白馬之圍以奉報矣今日之事豈敢以私廢公操曰五關斬將之時還能記否大丈夫以信義爲重將軍深明春秋豈不知瘐公之斯追子濯孺子之事乎雲長是個義重如山之人想起當日曹操許多恩義與後來五關斬將之事如何不動心又見曹軍惶惶皆欲垂淚一發心中不忍於是把馬頭勒回謂衆軍曰四散擺開這個分明是放曹操的意思操見雲長回馬便和衆將一齊沖將過去雲長回身時曹操已與衆將過去了雲長大喝一聲衆軍皆下馬哭拜於地雲長愈加不忍正猶豫間張遼縱馬而至雲長見了又動故舊之情長歎一聲並皆放去後人有詩曰曹瞞兵敗走華容正與關公狹路逢只爲當初恩義重放開金鎖走蛟龍曹操既脫華容之難行至穀口回顧所隨軍兵止有二十七騎比及天晚已近南郡火把齊明一簇人馬攔路操大驚曰吾命休矣只見一群哨馬沖到方認得是曹仁軍馬操才心安曹仁接著言雖知兵敗不敢遠離只得在附近迎接操曰幾與汝不相見也於是引衆入南郡安歇隨後張遼也到說雲長之德操點將校中傷者極多操皆令將息曹仁置酒與操解悶衆謀士俱在座操忽仰天大慟衆謀士曰丞相于虎窟中逃難之時全無懼怯今到城中人已得食馬已得料正須整頓軍馬復仇何反痛哭操曰吾哭郭奉孝耳若奉孝在決不使吾有此大失也遂捶胸大哭曰哀哉奉孝痛哉奉孝惜哉奉孝衆謀士皆默然自慚次日操喚曹仁曰吾今暫回許都收拾軍馬必來報仇汝可保全南郡吾有一計密留在此非急休開急則開之依計而行使東吳不敢正視南郡仁曰合淝襄陽誰可保守操曰荊州托汝管領襄陽吾已撥夏侯惇守把合淝最爲緊要之地吾令張遼爲主將樂進李典爲副將保守此地但有緩急飛報將來操分撥已定遂上馬引衆奔回許昌荊州原降文武百官依舊帶回許昌調用曹仁自遣曹洪據守彜陵南郡以防周瑜卻說關雲長放了曹操引軍自回此時諸路軍馬皆得馬匹器械錢糧已回夏口獨雲長不獲一人一騎空身回見玄德孔明正與玄德作賀忽報雲長至孔明忙離坐席執杯相迎曰且喜將軍立此蓋世之功與普天下除大害合宜遠接慶賀雲長默然孔明曰將軍莫非因吾等不曾遠接故爾不樂回顧左右曰汝等緣何不先報雲長曰關某特來請死孔明曰莫非曹操不曾投華容道上來雲長曰是從那裏來關某無能因此被他走脫孔明曰拿得甚將士來雲長曰皆不曾拿孔明曰此是雲長想曹操昔日之恩故意放了但既有軍令狀在此不得不按軍法遂叱武士推出斬之正是拼將一死酬知己致令千秋仰義名未知雲長性命如何且看下文分解
