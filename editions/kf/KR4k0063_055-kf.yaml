body:
  text: 第五十五回玄德智激孫夫人孔明二氣周公瑾卻說玄德見孫夫人房中兩邊槍刀森列侍婢皆佩劍不覺失色管家婆進曰貴人休得驚懼夫人自幼好觀武事居常令侍婢擊劍爲樂故爾如此玄德曰非夫人所觀之事吾甚心寒可命暫去管家婆稟覆孫夫人曰房中擺列兵器嬌客不安今且去之孫夫人笑曰廝殺半生尚懼兵器乎命盡撤去令侍婢解劍伏侍當夜玄德與孫夫人成親兩情歡洽玄德又將金帛散給侍婢以買其心先教孫乾回荊州報喜自此連日飲酒國太十分愛敬卻說孫權差人來柴桑郡報周瑜說我母親力主已將吾妹嫁劉備不想弄假成真此事還複如何瑜聞大驚行坐不安乃思一計修密書付來人持回見孫權權拆書觀之書略曰瑜所謀之事不想反覆如此既已弄假成真又當就此用計劉備以梟雄之姿有關張趙雲之將更兼諸葛用謀必非久屈人下者愚意莫如軟困之于吳中盛爲築宮室以喪其心志多送美色玩好以娛其耳目使分開關張之情隔遠諸葛之契各置一方然後以兵擊之大事可定矣今若縱之恐蛟龍得雲雨終非池中物也願明公熟思之孫權看畢以書示張昭昭曰公瑾之謀正合愚意劉備起身微末奔走天下未嘗受享富貴今若以華堂大廈子女金帛令彼享用自然疏遠孔明關張等使彼各生怨望然後荊州可圖也主公可依公瑾之計而速行之權大喜即日修整東府廣栽花木盛設器用請玄德與妹居住又增女樂數十餘人並金玉錦綺玩好之事國太只道孫權好意喜不自勝玄德果然被聲色所迷全不想回荊州卻說趙雲與五百軍在東府前住終日無事只去城外射箭走馬看看年終雲猛省孔明分付三個錦囊與我教我一到南徐開第一個住到年終開第二個臨到危急無路之時開第三個于內有神出鬼沒之計可保主公回家此時歲已將終主公貪戀女色並不見面何不拆開第二個錦囊看計而行遂拆開視之原來如此神策即日徑到府堂要見玄德侍婢報曰趙子龍有緊急事來報貴人玄德喚入問之雲佯作失驚之狀曰主公深居畫堂不想荊州耶玄德曰有甚事如此驚怪雲曰今早孔明使人來報說曹操要報赤壁鏖兵之恨起精兵五十萬殺奔荊州甚是危急請主公便回玄德曰必須與夫人商議雲曰若和夫人商議必不肯教主公回不如休說今晚便好起程遲則誤事玄德曰你且暫退我自有道理雲故意催逼數番而出玄德入見孫夫人暗暗垂淚孫夫人曰丈夫何故煩惱玄德曰念備一身飄蕩異鄉生不能侍奉二親又不能祭祀宗祖乃大逆不孝也今歲旦在邇使備悒怏不已孫夫人曰你休瞞我我已聽知了也方才趙子龍報說荊州危急你欲還鄉故推此意玄德跪而告曰夫人既知備安敢相瞞備欲不去使荊州有失被天下人恥笑欲去又舍不得夫人因此煩惱夫人曰妾已事君任君所之妾當相隨玄德曰夫人之心雖則如此爭奈國太與吳侯安肯容夫人去夫人若可憐劉備暫時辭別言畢淚如雨下孫夫人勸曰丈夫休得煩惱妾當苦告母親必放妾與君同去玄德曰縱然國太肯時吳侯必然阻擋孫夫人沈吟良久乃曰妾與君正旦拜賀時推稱江邊祭祖不告而去若何玄德又跪而謝曰若如此生死難忘切勿漏泄兩個商議已定玄德密喚趙雲分付正旦日你先引軍士出城於官道等候吾推祭祖與夫人同走雲領諾建安十五年春正月元旦吳侯大會文武於堂上玄德與孫夫人入拜國太孫夫人曰夫主想父母宗祖墳墓俱在涿郡晝夜傷感不已今日欲往江邊望北遙祭須告母親得知國太曰此孝道也豈有不從汝雖不識舅姑可同汝夫前去祭拜亦見爲婦之禮孫夫人同玄德拜謝而出此時只瞞著孫權夫人乘車止帶隨身一應細軟玄德上馬引數騎跟隨出城與趙雲相會五百軍士前遮後擁離了南徐趲程而行當日孫權大醉左右近侍扶入後堂文武皆散比及衆官探得玄德夫人逃遁之時天色已晚要報孫權權醉不醒及至睡覺已是五更次日孫權聞知走了玄德急喚文武商議張昭曰今日走了此人早晚必生禍亂可急追之孫權令陳武潘璋選五百精兵無分晝夜務要趕上拿回二將領命去了孫權深恨玄德將案上玉硯摔爲粉碎程普曰主公空有沖天之怒某料陳武潘璋必擒此人不得權曰焉敢違我令普曰郡主自幼好觀武事嚴毅剛正諸將皆懼既然肯順劉備必同心而去所追之將若見郡主豈肯下手權大怒掣所佩之劍喚蔣欽周泰聽令曰汝二人將這口劍去取吾妹並劉備頭來違令者立斬蔣欽周泰領命隨後引一千軍趕來卻說玄德加鞭縱轡趲程而行當夜于路暫歇兩個更次慌忙起行看看來到柴桑界首望見後面塵頭大起人報追兵至矣玄德慌問趙雲曰追兵既至如之奈何趙雲曰主公先行某願當後轉過前面山腳一彪軍馬攔住去路當先兩員大將厲聲高叫曰劉備早早下馬受縛吾奉周郎督將令守候多時原來周瑜恐玄德走脫先使徐盛丁奉引三千軍馬於沖要之處紮營等候時常令人登高遙望料得玄德若投旱路必經此道而過當日徐盛丁奉了望得玄德一行人到各綽兵器截住去路玄德驚慌勒回馬問趙雲曰前有攔截之兵後有追趕之兵前後無路如之奈何雲曰主公休慌軍師有三條妙計多在錦囊之中已拆了兩個並皆應驗今尚有第三個在此分付遇危難之時方可拆看今日危急當拆觀之便將錦囊拆開獻與玄德玄德看了急來車前泣告孫夫人曰備有心腹之言至此盡當實訴夫人曰丈夫有何言語實對我說玄德曰昔日吳侯與周瑜同謀將夫人招嫁劉備實非爲夫人計乃欲幽困劉備而奪荊州耳奪了荊州必將殺備是以夫人爲香餌而釣備也備不懼萬死而來蓋知夫人有男子之胸襟必能憐備昨聞吳侯將欲加害故托荊州有難以圖歸計幸得夫人不棄同至於此今吳侯又令人在後追趕周瑜又使人於前截住非夫人莫解此禍如夫人不允備請死于車前以報夫人之德夫人怒曰吾兄既不以我爲親骨肉我有何面目重相見乎今日之危我當自解於是叱從人推車直出卷起車簾親喝徐盛丁奉曰你二人欲造反耶徐丁二將慌忙下馬棄了兵器聲諾于車前曰安敢造反爲奉周都督將令屯兵在此專候劉備孫夫人大怒曰周瑜逆賊我東吳不曾虧負你玄德乃大漢皇叔是我丈夫我已對母親哥哥說知回荊州去今你兩個於山腳去處引著軍馬攔截道路意欲劫掠我夫妻財物耶徐盛丁奉喏喏連聲口稱不敢請夫人息怒這不幹我等之事乃是周都督的將令孫夫人叱曰你只怕周瑜獨不怕我周瑜殺得你我豈殺不得周瑜把周瑜大罵一場喝令推車前進徐盛丁奉自思我等是下人安敢與夫人違拗又見趙雲十分怒氣只得把軍喝住放條大路教過去恰才行不得五六裏背後陳武潘璋趕到徐盛丁奉備言其事陳潘二將曰你放他過去差了也我二人奉吳侯旨意特來追捉他回去於是四將合兵一處趲程趕來玄德正行間忽聽得背後喊聲大起玄德又告孫夫人曰後面追兵又到如之奈何夫人曰丈夫先行我與子龍當後玄德先引三百軍望江岸去了子龍勒馬于車傍將士卒擺開專候來將四員將見了孫夫人只得下馬叉手而立夫人曰陳武潘璋來此何干二將答曰奉主公之命請夫人玄德回夫人正色叱曰都是你這夥匹夫離間我兄妹不睦我已嫁他人今日歸去須不是與人私奔我奉母親慈旨令我夫婦回荊州便是我哥哥來也須依禮而行你二人倚仗兵威欲待殺害我耶罵得四人面面相覷各自尋思他一萬年也只是兄妹更兼國太作主吳侯乃大孝之人怎敢違逆母言明日翻過臉來只是我等不是不如做個人情軍中又不見玄德但見趙雲怒目睜眉只待廝殺因此四將喏喏連聲而退孫夫人令推車便行徐盛曰我四人同去見周教督告稟此事四人猶豫未定忽見一軍如旋風而來視之乃蔣欽周泰二將問曰你等曾見劉備否四人曰早晨過去已半日矣蔣欽曰何不拿下四人各言孫夫人發話之事蔣欽曰便是吳侯怕道如此封一口劍在此教先殺他妹後斬劉備違者立斬四將曰去之已遠怎生奈何蔣欽曰他終是些步軍急行不上徐丁二將軍可飛報都督教水路棹快船追趕我四人在岸上追趕無問水旱之路趕上殺了休聽他言語於是徐盛丁奉飛報周瑜蔣欽周泰陳武潘璋四個領兵沿江趕來卻說玄德一行人馬離柴桑較遠來到劉郎浦心才稍寬沿著江岸尋渡一望江水彌漫並無船隻玄德俯首沈吟趙雲曰主公在虎口中逃出今已近本界吾料軍師必有調度何用憂疑玄德聽罷驀然想起在吳繁華之事不覺淒然淚下後人有詩歎曰吳蜀成婚此水潯明珠步障屋黃金誰知一女輕天下欲易劉郎鼎峙心玄德令趙雲望前哨探船隻忽報後面塵土沖天而起玄德登高望之但見軍馬蓋地而來歎曰連日奔走人困馬乏追兵又到死無地矣看看喊聲漸近正慌急間忽見江岸邊一字兒抛著拖篷船二十餘隻趙雲曰天幸有船在此何不速下棹過對岸再作區處玄德與孫夫人便奔上船子龍引五百軍亦都上船只見船艙中一人綸巾道服大笑而出曰主公且喜諸葛亮在此等候多時船中扮作客人的皆是荊州水軍玄德大喜不移時四將趕到孔明笑指岸上人言曰吾已算定多時矣汝等回去傳示周郎教休再使美人局手段岸上亂箭射來船已開的遠了蔣欽等四將只好呆看玄德與孔明正行間忽然江聲大震回頭視之只見戰船無數帥字旗下周瑜自領慣戰水軍左有黃蓋右有韓當勢如飛馬疾似流星看看趕上孔明教棹船投北岸棄了船盡皆上岸而走車馬登程周瑜趕到江邊亦皆上岸追襲大小水軍儘是步行止有爲首官軍騎馬周瑜當先黃蓋韓當徐盛丁奉緊隨周瑜曰此處是那裏軍士答曰前面是黃州界首望見玄德車馬不遠瑜令並力追襲正趕之間一聲鼓響山崦內一彪刀手擁出爲首一員大將乃關雲長也周瑜舉止失措急撥馬便走雲長趕來周瑜縱馬逃命正奔走間左邊黃忠右邊魏延兩軍殺出吳兵大敗周瑜急急下得船時岸上軍士齊聲大叫曰周郎妙計安天下陪了夫人又折兵瑜怒曰可再登岸決一死戰黃蓋韓當力阻瑜自思曰吾計不成有何面目去見吳侯大叫一聲金瘡迸裂倒於船上衆將急救卻早不省人事正是兩番弄巧反成拙此日含嗔卻帶羞未知周郎性命如何且看下文分解
