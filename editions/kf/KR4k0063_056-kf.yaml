body:
  text: 第五十六回曹操大宴銅雀台孔明三氣周公瑾卻說周瑜被諸葛亮預先埋伏關公黃忠魏延三枝軍馬一擊大敗黃蓋韓當急救下船折卻水軍無數遙觀玄德孫夫人車馬僕人都停住於山頂之上瑜如何不氣箭瘡未愈因怒氣沖激瘡口迸裂昏絕於地衆將救醒開船逃去孔明教休追趕自和玄德歸荊州慶喜賞賜衆將周瑜自回柴桑蔣欽等一行人馬自歸南徐報孫權權不勝忿怒欲拜程普爲都督起兵取荊州周瑜又上書請興兵雪恨張昭諫曰不可曹操日夜思報赤壁之恨因恐孫劉同心故未敢興兵今主公若以一時之忿自相吞併操必乘虛來攻國勢危矣顧雍曰許都豈無細作在此若知孫劉不睦操必使人勾結劉備備懼東吳必投曹操若是則江南何日得安爲今之計莫若使人赴許都表劉備爲荊州牧曹操知之則懼而不敢加兵于東南且使劉備不恨於主公然後使心腹用反間之計令曹劉相攻吾乘隙而圖之斯爲得耳權曰元歎之言甚善但誰可爲使雍曰此間有一人乃曹操敬慕者可以爲使權問何人雍曰華歆在此何不遣之權大喜即遣歆齎表赴許都歆領命起程徑到許都來見曹操聞操會群臣於鄴郡慶賞銅雀台歆乃赴鄴郡候見操自赤壁敗後常思報仇只疑孫劉並力因此不敢輕進時建安十五年春造銅雀台成操乃大會文武於鄴郡設宴慶賀其台正臨漳河中央乃銅雀台左邊一座名玉龍台右邊一座名金鳳台各高十丈上橫二橋相通千門萬戶金碧交輝是日曹操頭戴嵌寶金冠身穿綠錦羅袍玉帶珠履憑高而坐文武侍立台下操欲觀武官比試弓箭乃使近侍西川紅錦戰袍一領挂於垂楊枝上下設一箭垛以百步爲界分武官爲兩隊曹氏宗族俱穿紅其餘將士俱穿綠各帶雕弓長箭跨鞍勒馬聽候指揮操傳令曰有能射中箭垛紅心者即以錦袍賜之如射不中罰水一杯號令方下紅袍隊中一個少年將軍驟馬而出衆觀之乃曹休也休飛馬往來賓士三次扣上箭拽滿弓一箭射去正中紅心金鼓齊鳴衆皆喝采曹操于臺上望見大喜曰此吾家千里駒也方欲使人了取錦袍與曹休只見綠袍隊中一騎飛出叫曰丞相錦袍合讓俺外姓先取宗族中不宜攙越操視其人乃文聘也衆官曰且看文仲業射法文聘拈弓縱馬一箭亦中紅心衆皆喝采金鼓亂鳴聘大呼曰快取袍來只見紅袍隊中又一將飛馬而出厲聲曰文烈先射汝何得爭奪看我與你們解箭拽滿弓一箭射去也中紅心衆人齊聲喝采視其人乃曹洪也洪方欲取袍只見綠袍隊裏又一將出揚弓叫曰你三人射法何足爲奇看我射來衆視之乃張郃也郃飛馬翻身背射一箭也中紅心四枝箭齊齊的攢攢在紅心裏衆人都道好射法郃曰錦袍須該是我的言未畢紅袍隊中一將飛馬而出大叫曰汝翻身背射何足稱異看我奪射紅心衆視之乃夏侯淵也淵驟馬至界口紐回身一箭射去正在四箭當中金鼓齊鳴淵勒馬按弓大叫曰此箭可奪得錦袍麽只見綠袍隊裏一將應聲而出大叫且留下錦袍與我徐晃淵曰汝更有何射法可奪我袍晃曰汝奪射紅心不足爲異看我單取錦袍拈弓搭箭遙望柳條射去恰好射斷柳條錦袍墜地徐晃飛取錦袍披於身上驟馬至台前聲喏曰謝丞相袍曹操與衆官無不稱羨晃才勒馬要回猛然台邊躍出一個綠袍將軍大呼曰你將錦袍那裏去早早留下與我衆視之乃許褚也晃曰袍已在此汝何敢強奪褚更不回答竟飛馬來奪袍兩馬相近徐晃便把弓打許褚褚一手按住弓把徐晃拖離鞍鞽晃急棄了弓翻身下馬褚亦下馬兩個揪住廝打操急使人解開那領錦袍已是扯得粉碎操令二人都上臺徐晃睜眉怒目許褚切齒咬牙各有相鬥之意操笑曰孤特視公等之勇耳豈惜一錦袍哉便教諸將盡都上臺各賜蜀錦一匹諸將各各稱謝操命各依位次而坐樂聲競奏水陸並陳文官武將輪次把盞獻酬交錯操顧謂衆文官曰武將既以騎射爲樂足顯威勇矣公等皆飽學之士登此高臺可不進佳章以紀一時之勝事乎衆官皆躬身而言曰原從鈞命時有王朗鍾繇王粲陳琳一班文官進獻詩章詩中多有稱頌曹操功德巍巍合當受命之意曹操逐一覽畢笑曰諸公佳作過譽甚矣孤本愚陋始舉孝廉後值天下大亂築精舍於譙東五十裏欲春夏讀書秋冬射獵以待天下清平方出仕耳不意朝廷征孤爲典軍校尉遂更其意專欲爲國家討賊立功圖死後得題墓道曰漢故征西將軍曹侯之墓平生願足矣念自討董卓剿黃巾以來除袁術破呂布滅袁紹定劉表遂平天下身爲宰相人臣之貴已極又複何望哉如國家無孤一人正不知幾人稱帝幾人稱王或見孤權重妄相忖度疑孤有異心此大謬也孤常念孔子稱文王之至德此言耿耿在心但欲孤委捐兵衆歸就所封武平侯之國實不可耳誠恐一解兵柄爲人所害孤敗則國家傾危是以不得慕虛名而處實禍也諸公必無知孤意者衆皆起拜曰雖伊尹周公不及丞相矣後人有詩曰周公恐懼流言日王莽廉恭下士時假使當年身便死一生真僞有誰知曹操連飲數杯不覺沈醉喚左右捧過筆硯亦欲作銅雀台詩剛才下筆忽報東吳使華歆表奏劉備爲荊州牧孫權以妹嫁劉備漢上九郡大半已屬備矣操聞之手腳慌亂投筆於地程昱曰丞相在萬軍之中矢石交攻之際未嘗動心今聞劉備得了荊州何故如此失驚操曰劉備人中之龍也生平未嘗得水今得荊州是困龍入大海矣孤安得不動心哉程昱曰丞相知華歆來意否操曰未知昱曰孫權本忌劉備欲以兵攻之但恐丞相乘虛而擊故令華歆爲使表薦劉備乃安備之心以塞丞相之望耳操點頭曰是也昱曰某有一計使孫劉自相吞併丞相乘間圖之一鼓而二敵俱破操大喜遂問其計程昱曰東吳所倚者周瑜也丞相今表奏周瑜爲南郡太守程普爲江夏太守留華歆在朝重用之瑜必自與劉備爲仇敵矣我乘其相並而圖之不亦善乎操曰仲德之言正合孤意遂召華歆上臺重加賞賜當日筵散操即引文武回許昌表奏周瑜爲總領南郡太守程普爲江夏太守封華歆爲大理少卿留在許都使命至東吳周瑜程普各受職訖周瑜既領南郡愈思報仇遂上書吳侯乞令魯肅去討還荊州孫權乃命肅曰汝昔保借荊州與劉備今備遷延不還等待何時肅曰文書上明白寫著得了西川便還權叱曰只說取西川到今又不動兵不等老了人肅曰某願往言之遂乘船投荊州而來卻說玄德與孔明在荊州廣聚糧草調練軍馬遠近之士多歸之忽報魯肅到玄德問孔明曰子敬此爲何意孔明曰昨者孫權表主公爲荊州牧此是懼曹操之計操封周瑜爲南郡太守此欲令我兩家自相吞併他好於中取事也今魯肅此來又是周瑜既受太守之職要來索荊州之意玄德曰何以答之孔明曰若魯肅提起荊州之事主公便放聲大哭哭到悲切之處亮自出來解勸計會已定接魯肅入府禮畢敘坐肅曰今日皇叔做了東吳女婿便是魯肅的主人如何敢坐玄德笑曰子敬與我舊交何必太謙肅乃就坐茶罷肅曰令奉吳侯鈞命專爲荊州一事而來皇叔已借住多時未蒙見還今既兩家結親當看親情面上早早交付玄德聞言掩面大哭肅驚曰皇叔何故如此玄德哭聲不絕孔明從屏後出曰亮聽之久矣子敬知吾主人哭的緣故麽肅曰某實不知孔明曰有何難見當初我主人借荊州時許下取得西川便還仔細想來益州劉璋是我的主人之弟一般都是漢朝骨肉若要興兵去取他城池時恐被外人唾駡若要不取還了荊州何處安身若不還時於尊舅面上又不好看事實兩難因此淚出痛腸孔明說罷觸動玄德衷腸真個捶胸頓足放聲大哭魯肅勸曰皇叔且休煩惱與孔明從長計議孔明曰有煩子敬回見吳侯勿惜一言之勞將此煩惱情節懇告吳侯再容幾時肅曰倘吳侯不從如之奈何孔明曰吳侯既以親妹聘嫁皇叔安得不從乎望子敬善言回覆魯肅是個寬仁長者見玄德如此哀痛只得應允玄德孔明拜謝宴畢送魯肅下船徑到柴桑見了周瑜具言其事周瑜頓足曰子敬又中諸葛亮之計也當初劉備依劉表時常有吞併之意何況西川劉璋乎似此推調未免累及老兄矣吾有一計使諸葛亮不能出吾算中子敬便當一行肅曰願聞妙策瑜曰子敬不必去見吳侯再去荊州對劉備說孫劉兩家既結爲親便是一家若劉氏不忍去取西川我東吳起兵去取取得西川時以作嫁資卻把荊州交還東吳肅曰西川迢遞取之非易都督此計莫非不可瑜笑曰子敬真長者也你道我真個去取西川與他我只以此爲名實欲去取荊州且教他不做準備東吳軍馬收川路過荊州就問他索要錢糧劉備必然出城勞軍那時乘勢殺之奪取荊州雪吾之恨解足下之禍魯肅大喜便再往荊州來玄德與孔明商議孔明曰魯肅必不曾見吳侯只到柴桑和周瑜商量了甚計策來誘我耳但說的話主公只看我點頭便滿口應承計會已定魯肅入見禮畢曰吳侯甚是稱讚皇叔盛德遂與諸將商議起兵替皇叔收川取了西川卻換荊州以西川權當嫁資但軍馬經過卻望應些錢糧孔明聽了忙點頭曰難得吳侯好心玄德拱手稱謝曰比皆子敬善言之力孔明曰如雄師到日即當遠接犒勞魯肅暗喜宴罷辭回玄德問孔明曰此是何意孔明大笑曰周郎死日近矣這等計策小兒也瞞不過玄德又問如何孔明曰此乃假途滅虢之計也虛名收川實取荊州等主公出城勞軍乘勢拿下殺入城來攻其無備出其不意也玄德曰如之奈何孔明曰主公寬心只顧準備窩弓以擒猛虎安排香餌以釣鼇魚等周瑜到來他便不死也九分無氣便喚趙雲聽計如此如此其餘我自有擺佈玄德大喜後人有詩歎雲周瑜決策取荊州諸葛先知第一籌指望長江香餌穩不知暗裏釣魚鈎卻說魯肅回見周瑜說玄德孔明歡喜一節準備出城勞軍周瑜大笑曰原來今番也中了吾計便教魯肅稟報吳侯並遣程普引軍接應周瑜此時箭瘡已漸平愈身軀無事使甘甯爲先鋒自與徐盛丁奉爲第二淩統呂蒙爲後隊水陸大兵五萬望荊州而來周瑜在船中時複歡笑以爲孔明中計前軍至夏口周瑜問荊州有人在前面接否人報劉皇叔使糜竺來見都督瑜喚至問勞軍如何糜竺曰主公皆準備安排下了瑜曰皇叔何在竺曰在荊州城門外相等與都督把盞瑜曰今爲汝家之事出兵遠征勞軍之禮休得輕易糜竺領了言語先回戰船密密排在江上依次而進看看至公安並無一隻軍船又無一人遠接周瑜催船速行離荊州十餘裏只見江面上靜蕩蕩的哨探的回報荊州城上插兩面白旗並不見一人之影瑜心疑教把船傍岸親自上岸乘馬帶了甘寧徐盛丁奉一班軍官引親隨精軍三千人徑望荊州來既至城下並不見動靜瑜勒住馬令軍士叫門城上問是誰人吳軍答曰是東吳周都督親自在此言未畢忽一聲梆子響城上軍一齊都豎起槍刀敵樓上趙雲出曰都督此行端的爲何瑜曰吾替汝主取西川汝豈猶未知耶雲曰孔明軍師已知都督假途滅虢之計故留趙雲在此吾主公有言孤與劉璋皆漢室宗親安忍背義而取西川若汝東吳端的取蜀吾當披發入山不失信於天下也周瑜聞之勒馬便回只見一人打著令字旗于馬前報說探得四路軍馬一齊殺到關某從江陵殺來張飛從秭歸殺來黃忠從公安殺來魏延從孱陵小路殺來四路正不知多少軍馬喊聲遠近震動百餘裏皆言要捉周瑜瑜馬上大叫一聲箭瘡複裂墜于馬下正是一著棋高難對敵幾番算定總成空未知性命如何且看下文分解
