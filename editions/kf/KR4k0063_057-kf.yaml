body:
  text: 第五十七回柴桑口臥龍吊喪耒陽縣鳳雛理事卻說周瑜怒氣填胸墜于馬下左右急救歸船軍士傳說玄德孔明在前山頂上飲酒取樂瑜大怒咬牙切齒曰你道我取不得西川吾誓取之正恨間人報吳侯遣弟孫瑜到周瑜接入具言其事孫瑜曰吾奉兄命來助都督遂令催軍前行行至巴丘人報上流有劉封關平二人領軍截住水路周瑜愈怒忽又報孔明遣人送書至周瑜拆封視之書曰漢軍師中郎將諸葛亮致書于東吳大都督公瑾先生麾下亮自柴桑一別至今戀戀不忘聞足下欲取西川亮竊以爲不可益州民強地險劉璋雖暗弱足以自守今勞師遠征轉運萬里欲收全功雖吳起不能定其規孫武不能善其後也曹操失利於赤壁志豈須臾忘報仇哉今足下興兵遠征倘操乘虛而至江南齏粉矣亮不忍坐視特此告知幸垂照鑒周瑜覽畢長歎一聲喚左右取紙筆作書上吳侯乃聚衆將曰吾非不欲盡忠報國奈天命已絕矣汝等善事吳侯共成大業言訖昏絕徐徐又醒仰天長歎曰既生瑜何生亮連叫數聲而亡壽三十六歲後人有詩歎曰赤壁遺雄烈青年有俊聲弦歌知雅意杯酒謝良朋曾謁三千斛常驅十萬兵巴丘終命處憑吊欲傷情周瑜停喪于巴丘衆將將所遺書緘遣人飛報孫權權聞瑜死放聲大哭拆視其書乃薦魯肅以自代也書略曰瑜以凡才荷蒙殊遇委任腹心統禦兵馬敢不竭股肱之力以圖報效奈死生不測修短有命愚志未展微軀已殞遺恨何極方今曹操在北疆場未靜劉備寄寓有似養虎天下之事尚未可知此正朝士旰食之秋至尊垂慮之日也魯肅忠烈臨事不苟可以代瑜之任人之將死其言也善倘蒙垂鑒瑜死不朽矣孫權覽畢哭曰公瑾有王佐之才今忽短命而死孤何賴哉既遺書特薦子敬孤敢不從之即日使命魯肅爲都督總統兵馬一面教發周瑜靈柩回葬卻說孔明在荊州夜觀天文見將星墜地乃笑曰周瑜死矣至曉告于玄德玄德使人探之果然死了玄德問孔明曰周瑜既死還當如何孔明曰代瑜領兵者必魯肅也亮觀天象將星聚於東方亮當以吊喪爲由往江東走一遭就尋賢士佐助主公玄德曰只恐吳中將士加害于先生孔明曰瑜在之日亮猶不懼今瑜已死又可患乎乃與趙雲引五百軍具祭禮下船赴巴丘吊喪於路探聽孫權已令魯肅爲都督周瑜靈柩已回柴桑孔明徑至柴桑魯肅以禮迎接周瑜部將皆欲殺孔明因見趙雲帶劍相隨不敢下手孔明教設祭物於靈前親手奠酒跪於地下讀祭文曰嗚呼公瑾不幸夭亡修短故天人豈不傷我心實痛酹酒一觴君其有靈享我氶嘗吊君幼學以交伯符仗義疏財讓舍以民吊君弱冠萬里鵬摶定建霸業割據江南吊君壯力遠鎮巴丘景升懷慮討逆無憂吊君豐度佳配小喬漢臣之婿不愧當朝吊君氣概諫阻納質始不垂翅終能奮翼吊君鄱陽蔣幹來說揮灑自如雅量高志吊君弘才文武籌略火攻破敵挽強爲弱想君當年雄姿英發哭君早逝俯地流血忠義之心英靈之氣命終三紀名垂百世哀君情切愁腸千結惟我肝膽悲無斷絕昊天昏暗三軍愴然主爲哀泣友爲淚漣亮也不才丐計求謀助吳拒曹輔漢安劉掎角之援首尾相儔若存若亡何慮何憂嗚呼公瑾生死永別樸守其貞冥冥滅滅魂如有靈以鑒我心從此天下更無知音嗚呼痛哉伏惟尚饗孔明祭畢伏地大哭淚如湧泉哀慟不已衆將相謂曰人盡道公瑾與孔明不睦今觀其祭奠之情人皆虛言也魯肅見孔明如此悲切亦爲感傷自思曰孔明自是多情乃公瑾量窄自取死耳後人有詩歎曰臥龍南陽睡未醒又添列曜下舒城蒼天既已生公瑾塵世何須出孔明魯肅設宴款待孔明宴罷孔明辭回方欲下船只見江邊一個道袍竹冠皂縧素履一手揪住孔明大笑曰汝氣死周郎卻又來吊孝明欺東吳無人耶孔明急視其之乃鳳雛先生龐統也孔明亦大笑兩人攜手登舟各訴心事孔明乃留書一封與統囑曰吾料孫仲謀必不能重用足下稍有不如意可來荊州共扶玄德此人寬仁厚德必不負公平生之所學統允諾而別孔明自回荊州卻說魯肅送周瑜靈柩至蕪湖孫權接著哭祭於前命厚葬於本鄉瑜有兩男一女長男循次男胤權皆厚恤之魯肅曰肅碌碌庸才誤蒙公瑾重薦其實不稱所職願舉一人以助主公此人上通天文下曉地理謀略不減于管樂樞機可並于孫吳往日周公瑾多用其言孔明亦深服其智現在江南何不重用權聞言大喜便問此人姓名肅曰此人乃襄陽人姓龐名統字士元道號鳳雛先生權曰孤亦聞其名久矣今既在此可請來相見於是魯肅邀請龐統入見孫權施禮畢權見其人濃眉掀鼻黑面短髯形容古怪心中不喜乃問曰公平生所學以何爲主統曰不必拘執隨機應變權曰公之才學比公瑾如何統笑曰某之所學與公瑾大不相同權平生最喜周瑜見統輕之心中愈不樂乃謂統曰公且退待有用公之時卻來相請統長歎一聲而出魯肅曰主公何不用龐士元權曰狂士也用之何益肅曰赤壁鏖兵之時此人曾獻連環策成第一功主公想必知之權曰此時乃曹操自欲釘船未必此人之功也吾誓不用之魯肅出謂龐統曰非肅不薦足下奈吳侯不肯用公公且耐心統低頭長歎不語肅曰公莫非無意于吳中乎統不答肅曰公抱匡濟之才何往不利可實對肅言將欲何往統曰吾欲投曹操去也肅曰此明珠暗投矣可往荊州投劉皇叔必然重用統曰統意實欲如此前言戲耳肅曰某當作書奉薦公輔玄德必令孫劉兩家無相攻擊同力破曹統曰此某平生之素志也乃求肅書徑往荊州來見玄德此時孔明按察四郡未回門吏傳報江南名士龐統特來相投玄德久聞統名便教請入相見統見玄德長揖不拜玄德見統貌陋心中亦不悅乃問統曰足下遠來不易統不拿出魯肅孔明書投呈但答曰聞皇叔招賢納士特來相投玄德曰荊楚稍定苦無閒職此去東北一百三十裏有一縣名耒陽縣缺一縣宰屈公任之如後有缺卻當重用統思玄德待我何薄欲以才學動之見孔明不在只得勉強相辭而去統到耒陽縣不理政事終日飲酒爲樂一應錢糧詞訟並不理會有人報知玄德言龐統將耒陽縣事盡廢玄德怒曰豎儒焉敢亂吾法度遂喚張飛分付引從人去荊南諸縣巡視如有不公不法者就便究問恐於事有不明處可與孫乾同去張飛領了言語與孫乾前至耒陽縣軍民官吏皆出郭迎接獨不見縣令飛問曰縣令何在同僚覆曰龐縣令自到任及今將百餘日縣中之事並不理問每日飲酒自旦及夜只在醉鄉今日宿酒未醒猶臥不起張飛大怒欲擒之孫乾曰龐士元乃高明之人未可輕忽且到縣問之如果於理不當治罪未晚飛乃入縣正廳上坐定教縣令來見統衣冠不整扶醉而出飛怒曰吾兄以汝爲人令作縣宰汝焉敢盡廢縣事統笑曰將軍以吾廢了縣中何事飛曰汝到任百餘日終日在醉鄉安得不廢政事統曰量百里小縣些小公事何難決斷將軍少坐待我發落隨即喚公吏將百餘日所積公務都取來剖斷吏皆紛然齎抱案卷上廳訴詞被告人等環跪階下統手中批判口中發落耳內聽詞曲直分明並無分毫差錯民皆叩首拜伏不到半日將百餘日之事盡斷畢了投筆於地而對張飛曰所廢之事何在曹操孫權吾視之若掌上觀文量此小縣何足介意飛大驚下席謝曰先生大才小子失敬吾當于兄長處極力舉薦統乃將出魯肅薦書飛曰先生初見吾兄何不將出統曰若便將出似乎專籍薦書來幹謁矣飛顧謂孫乾曰非公則失一大賢也遂辭統回荊州見玄德具說龐統之才玄德大驚曰屈待大賢吾之過也飛將魯肅薦書呈上玄德拆視之書略曰龐士元非百里之才使處治中別駕之任始當展其驥足如以貌取之恐負所學終爲他人所用實可惜也玄德看畢正在嗟歎忽報孔明回玄德接入禮畢孔明先問曰龐軍師近日無恙否玄德曰近治耒陽縣好酒廢事孔明笑曰士元非百里之才胸中之學勝亮十倍亮曾有薦書在士元處曾達主公否玄德曰今日方得子敬書卻未見先生之書孔明曰大賢若處小任往往以酒糊塗倦於視事玄德曰若非吾弟所言險失大賢隨即令張飛往耒陽縣敬請龐統到荊州玄德下階請罪統方將出孔明所薦之書玄德看書之意言鳳雛到日宜即重用玄德喜曰昔司馬德操言伏龍鳳雛兩人得一可安天下今吾二人皆得漢室可興矣遂拜龐統爲副軍師中郎將與孔明共贊方略教練軍士聽候征伐早有人報到許昌言劉備有諸葛亮龐統爲謀士招軍買馬積草屯糧連結東吳早晚必興兵北伐曹操聞之遂聚衆謀士商議南征荀攸進曰周瑜新死可先取孫權次攻劉備操曰我若遠征恐馬騰來襲許都前在赤壁之時軍中有訛言亦傳西涼入寇之事今不可不防也荀攸曰以愚所見不若降詔加馬騰爲征南將軍使討孫權誘入京師先除此人則南征無患矣操大喜即日遣人齎詔至西涼如馬騰卻說騰字壽成漢伏波將軍馬援之後父名肅字子碩桓帝時爲天水蘭幹縣尉後失官流落隴西與羌雜處遂取羌女生騰騰身長八尺體貌雄異稟性溫良人多敬之靈帝末年羌人多叛騰招募民兵破之初平中年因討賊有功拜征西將軍與鎮西將軍韓遂爲兄弟當日奉詔乃與長子馬超商議曰吾自與董承受衣帶詔以來與劉玄德約共討賊不幸董承已死玄德屢敗我又僻處西涼未能協助玄德今聞玄德已得荊州我正欲展昔日之志而曹操反來召我當是如何馬超曰操奉天子之命以召父親今若不往彼必以逆命責我矣當乘其來召竟往京師於中取事則昔日之志可展也馬騰兄子馬岱諫曰曹操心懷叵測叔父若往恐遭其害超曰兒願盡起西涼之兵隨父親殺入許昌爲天下除害有何不可騰曰汝自統羌兵保守西涼只教次子馬休馬鐵並侄馬岱隨我同往曹操見有汝在西涼又有韓遂相助諒不敢加害於我也超曰父親欲往切不可輕入京師當隨機變應觀其動靜騰曰吾自有處不必多慮於是馬騰乃引西涼兵五千先教馬休馬鐵爲前部留馬岱在後接應迤邐望許昌而來離許昌二十裏屯住軍馬曹操聽知馬騰已到喚門下侍郎黃奎分付曰目今馬騰南征吾命汝爲行軍參謀先至馬騰寨中勞軍可對馬騰說西涼路遠運糧甚難不能多帶人馬我當更遣大兵協同前進來日教他入城面君吾就應付糧草與之奎領命來見馬騰騰置酒相待奎酒半酣而言曰吾父黃琬死于李傕郭汜之難嘗懷痛恨不想今日又遇欺君之賊騰曰誰爲欺君之賊奎曰欺君者操賊也公豈不知之而問我耶騰恐是操使來相探急止之曰耳目較近休得亂言奎叱曰公竟忘卻衣帶詔乎騰見他說出心事乃密以實情告之奎曰操欲公入城面君必非好意公不可輕入來日當勒兵城下待曹操出城點軍就點軍處殺之大事濟矣二人商議已定黃奎回家恨氣未息其妻再三問之奎不肯言不料其妾李春香與奎妻弟苗澤私通澤欲得春香正無計可施妾見黃奎憤恨遂對澤曰黃侍郎今日商議軍情回意甚憤恨不知爲誰澤曰汝可以言挑之曰人皆說劉皇叔仁德曹操奸雄何也看他說甚言語是夜黃奎果到春香房中妾以言挑之奎乘醉言曰汝乃婦人尚知邪正何況我乎吾所恨者欲殺曹操也妾曰若欲殺之如何下手奎曰吾已約定馬將軍明日在城外點兵時殺之妾告於苗澤澤報知曹操操便密喚曹洪許褚分付如此如此又喚夏侯淵徐晃分付如此如此各人領命去了一面先將黃奎一家老小拿下次日馬騰領著西涼兵馬將次近城只見前面一簇紅旗打著丞相旗號馬騰只道曹操自來點軍拍馬向前忽聽得一聲炮響紅旗開處弓弩齊發一將當先乃曹洪也馬騰急撥馬回時兩下喊聲又起左邊許褚殺來右邊夏侯淵殺來後面又是徐晃領兵殺至截斷西涼軍馬將馬騰父子三人困在垓心馬騰見不是頭奮力衝殺馬鐵早被亂箭射死馬休隨著馬騰左沖右突不能得出二人身帶重傷坐下馬又被箭射倒父子二人俱被執曹操教將黃奎與馬騰父子一齊綁至黃奎大叫無罪操教苗澤對證馬騰大罵曰豎儒誤我大事我不能爲國殺賊是乃天也操命牽出馬騰罵不絕口與其子馬休及黃奎一同遇害後人有詩歎馬騰曰父子齊芳烈忠貞著一門捐生圖國難誓死答君恩嚼血盟言在誅奸義狀存西涼推世胄不愧伏波孫苗澤告操曰不願加賞只求李春香爲妻操笑曰你爲了一婦人害了你姐夫一家留此不義之人何用便教將苗澤李春香與黃奎一家老小並斬於市觀者無不歎息後人詩歎曰苗澤因私害藎臣春香未得反傷身奸雄亦不相容恕枉自圖謀作小人曹操教招安西涼兵馬諭之曰馬騰父子謀反不幹衆人之事一面使人分付把住關隘休教走了馬岱且說馬岱自引一千兵在後早有許昌城外逃回軍士報知馬岱岱大驚只得棄了兵馬扮作客商連夜逃遁去了曹操殺了馬騰等便決意南征忽人報曰劉備調練軍馬收拾器械將欲取川操驚曰若劉備收川則羽翼成矣將何以圖之言未畢階下一人進言曰某有一計使劉備孫權不能相顧江南西川皆歸丞相正是西州豪傑方遭戮南國英雄又受殃未知獻計者是誰且看下文分解
