body:
  text: 第五十八回馬孟起興兵雪恨曹阿瞞割須棄袍卻說獻策之人乃治書侍禦史陳群字長文操問曰陳長文有何良策群曰今劉備孫權結爲唇齒若劉備欲取西川丞相可命上將提兵會合淝之衆徑取江南則孫權必求救于劉備備意在西川必無心救權權無救則力乏兵衰江東之地必爲丞相所得若得江東則荊州一鼓可平也荊州既平然後徐圖西川天下定矣操曰長文之言正合吾意即時起大兵三十萬徑下江南令合淝張遼准備糧草以爲供給早有細作報知孫權權聚衆將商議張昭曰可差人往魯子敬處教急發書到荊州使玄德同力拒曹子敬有恩于玄德其言必從且玄德既爲東吳之婿亦義不容辭若玄德來相助江南可無患矣權從其言即遣人諭魯肅使求救於玄德肅領命隨即修書使人送玄德玄德看了書中之意留使者于館舍差人往南郡請孔明孔明到荊州玄德將魯肅書與孔明看畢孔明曰也不消動江南之兵也不必動荊州之兵自使曹操不敢正覰東南便回書與魯肅教高枕無憂若但有北方侵犯皇叔自有退兵之策使者去了玄德問曰今操起三十萬大軍會合淝之衆一擁而來先生有何妙計可以退之孔明曰操平生所慮者乃西涼之兵也今操殺馬騰其子馬超現統西涼之衆必切齒操賊主公可作一書往結馬超使馬超興兵入關則操又何暇下江南乎玄德大喜即時作書遣一心腹人徑往西涼州投下卻說馬超在西涼州夜感一夢夢見身臥雪地群虎來咬驚懼而覺心中疑惑聚帳下將佐告說夢中之事帳下一人應聲曰此夢乃不祥之兆也衆視其人乃帳前心腹校尉姓龐名德字令明超問令明所見若何德曰雪地遇虎夢兆殊惡莫非老將軍在許昌有事否言未畢一人踉蹌而入哭拜於地曰叔父與弟皆死矣超視之乃馬岱也超驚問何爲岱曰叔父與侍郎黃奎同謀殺操不幸事泄皆被斬於市二弟亦遇害惟岱扮作客商星夜走脫超聞言哭倒於地衆將救起超咬牙切齒痛恨操賊忽報荊州劉皇叔遣人齎書至超拆視之書略曰伏念漢室不幸操賊專權欺君罔上黎民凋殘備昔與令先君同受密詔誓誅此賊今令先君被操所害此將軍不共天地不同日月之仇也若能率西涼之兵以攻操之右備當舉荊襄之衆以遏操之前則逆操可擒奸黨可滅仇辱可報漢室可興矣書不盡言立待回音馬超看畢即時揮涕回書發使者先回隨後便起西涼軍馬正欲進發忽西涼太守韓遂使人請馬超往見超至遂府遂將出曹操書示之內去若將馬超擒赴許都即封汝爲西涼侯超拜伏於地曰請叔父就縛俺兄弟二人解赴許昌免叔父戈戟之勞韓遂扶起曰吾與汝父結爲兄弟安忍害汝汝若興兵吾當相助馬超拜謝韓遂便將使者推出斬之乃點手下八部軍馬一同進發那八部乃侯選程銀李堪張橫梁興成宜馬玩楊秋也八將隨著韓遂合馬超手下龐德馬岱共起二十萬大兵殺奔長安來長安郡守鍾繇飛報曹操一面引軍拒敵布陣於野西涼州前部先鋒馬岱引軍一萬五千浩浩蕩蕩漫山遍野而來鍾繇出馬答話岱使寶刀一口與繇交戰不一合繇大敗奔走岱提刀趕來馬超韓遂引大軍都到圍住長安鍾繇上城守護長安乃西漢建都之處城郭堅固壕塹險深急切攻打不下一連圍了十日不能攻破龐德進計曰長安城中土硬水鹼甚不堪食更兼無柴今圍十日軍民饑荒不如暫且收軍只須如此如此長安唾手可得馬超曰此計大妙即時差令字旗傳與各部盡教退軍馬超親自斷後各部軍馬漸漸退去鍾繇次日登城看時軍皆退了只恐有計令人哨探果然遠去方才放心縱令軍民出城柴取水大開城門放人出入至第五日人報馬超兵又到軍民競奔入城鍾繇仍複閉城堅守卻說鍾繇弟鍾進守把西門約近三更城門裏一把火起鍾進急來救時城邊轉過一人舉刀縱馬大喝曰龐德在此鍾進措手不及被龐德一刀斬于馬下殺散軍校斬關斷鎖放馬超韓遂軍馬入城鍾繇從東門棄城而走馬超韓遂得了城池賞勞三軍鍾繇退守潼關飛報曹操操知失了長安不敢復議南征遂喚曹洪徐晃分付先帶一萬人馬替鍾繇緊守潼關如十日內失了關隘皆斬十日外不幹汝二人之事我統大軍隨後便至二人領了將令星夜便行曹仁諫曰洪性躁誠恐誤事操曰你與我押送糧草便隨後接應卻說曹洪徐晃到潼關替鍾繇緊守關隘並不出戰馬超領軍來關下把曹操三代毀罵曹洪大怒要提兵下關廝殺徐晃諫曰此是馬超要激將軍廝殺切不可與戰待丞相大軍來必有主畫馬超軍日夜輪流來罵曹洪只要廝殺徐晃苦苦擋住至第九日在關上看時西涼軍都棄馬在於關前草地上坐多半困乏就於地上睡臥曹洪便教備馬點起三千兵殺下關來西涼兵棄馬抛戈而走洪迤邐追趕時徐晃正在關上點視糧車聞曹洪下關廝殺大驚急引兵隨後趕來大叫曹洪回馬忽然背後喊聲大震馬岱引軍殺至曹洪徐晃急回走時一棒鼓響山背後兩軍截出左是馬超右是龐德混殺一陣曹洪抵擋不住折軍大半撞出重圍奔到關上西涼兵隨後趕來洪等棄關而走龐德直追過潼關撞見曹仁軍馬救了曹洪等一軍馬超接應龐德上關曹洪失了潼關奔見曹操操曰與你十日限如何九日失了潼關洪曰西涼軍兵百般辱駡因見彼兵懈怠乘勢趕去不想中賊奸計操曰洪年幼躁暴徐晃你須曉事晃曰累諫不從當日晃在關上點糧車比及知道小將軍已下關了晃恐有失連忙趕去已中賊奸計矣操大怒喝斬曹洪衆官告免曹洪服罪而退操進兵直叩潼關曹仁曰可先下定寨柵然後打關未遲操令砍伐樹木起立排柵分作三寨左寨曹仁右寨夏侯淵操自居中寨次日操引三寨大小將校殺奔關隘前去正遇西涼軍馬兩邊各布陣勢操出馬於門旗下看西涼之兵人人勇健個個英雄又見馬超生得面如傅粉唇若抹朱腰細膀寬聲雄力猛白袍銀鎧手執長槍立馬陣前上首龐德下首馬岱操暗暗稱奇自縱馬謂超曰汝乃漢朝名將子孫何故背反耶超咬牙切齒大罵操賊欺君罔上罪不容誅害我父弟不共戴天之仇吾當活捉生啖汝肉說罷挺槍直殺過來曹操背後於禁出迎兩馬交戰鬥得八九合於禁敗走張郃出迎戰二十合亦敗走李通出迎超奮威交戰數合之中一槍刺李通于馬下超把槍望後一招西涼兵一齊衝殺過來操兵大敗西涼兵來得勢猛左右將佐皆抵當不住馬超龐德馬岱引百餘騎直入中軍捉曹操操在亂軍中只聽得西涼軍大叫穿紅袍的是曹操操就馬上急脫下紅袍又聽得大叫長髯者是曹操操驚慌掣所佩刀斷其髯軍中有人將曹操割髯之事告知馬超超遂令人叫拿短髯者是曹操操聞知即扯旗角包頸而逃後人有詩曰潼關戰敗望風逃孟德愴惶脫錦袍劍割髭髯應喪膽馬超聲價蓋天高曹操正走之間背後一騎趕來回頭視之正是馬超操大驚左右將校見超趕來各自逃命只撇下曹操超厲聲大叫曰曹操休走操驚得馬鞭墜地看看趕上馬超從後使槍搠來操繞樹而走超一槍搠在樹上急拔下時操已走遠超縱馬趕來山坡邊轉過一將大叫勿傷吾主曹洪在此輪刀縱馬攔住馬超操得命走脫洪與馬超戰到四五十合漸漸刀法散亂氣力不加夏侯淵引數十騎隨到馬超獨自一人恐被所算乃撥馬而回夏侯淵也不趕來曹操回寨卻得曹仁死據定了寨柵因此不曾多折軍馬操入帳歎曰吾若殺了曹洪今日必死于馬超之手也遂喚曹洪重加賞賜收拾敗軍堅守寨柵深溝高壘不許出戰超每日引兵來寨前辱駡搦戰操傳令教軍士堅守如亂動者斬諸將曰西涼之兵盡使長槍當選弓弩迎之操曰戰與不戰皆在於我非在賊也賊雖有長槍安能便刺諸公但堅壁觀之賊自退矣諸將皆私相議曰丞相自來征戰一身當先今敗于馬超何如此之弱也過了幾日細作報來馬超又添二萬生力兵來助戰乃是羌人部落操聞知大喜諸將曰馬超添兵丞相反喜何也操曰待吾勝了卻對汝等說三日後又報關上又添軍馬操又大喜就於帳中設宴作賀諸將皆暗笑操曰諸公笑我無破馬超之謀公等有何良策徐晃進曰今丞相盛兵在此賊亦全部現屯關上此去河西必無準備若得一軍暗渡蒲阪津先截賊歸路丞相徑發河北擊之賊兩不相應勢必危矣操曰公明之言正合吾意便教徐晃引精兵四千和朱靈同去徑襲河西伏於山谷之中待我渡河北同時擊之徐晃朱靈領命先引四千軍暗暗去了操下令先教曹洪于蒲阪津安排船筏留曹仁守寨操自領兵渡渭河早有細作報知馬超超曰今操不攻潼關而使人準備船筏欲渡河北必將遏吾之後也吾當引一軍循河拒住岸北操兵不得渡不消二十日河東糧盡操兵必亂卻循河南而擊之操可擒矣韓遂曰不必如此豈不聞兵法有雲兵半渡可擊待操兵渡至一半汝卻于南岸擊之操兵皆死於河內矣超曰叔父之言甚善即使人探聽曹操幾時渡河卻說曹操整兵已畢分三停軍前渡渭河比及人馬到河口時日光初起操先發精兵渡過北岸開創營寨操自引親隨護衛軍將百人按劍坐于南岸看軍渡河忽然人報後邊白袍將軍到了衆皆認得是馬超一擁下船河邊軍爭上船者聲喧不止操猶坐而不動按劍指約休鬧只聽得人喊馬嘶蜂擁而來船上一將躍身上岸呼曰賊至矣請丞相下船操視之乃許褚也操口內猶言賊至何妨回頭視之馬超已離不得百余步許褚拖操下船時船已離岸一丈有餘褚負操一躍上船隨行將士盡皆下水扳住船邊爭欲上船逃命船小將翻褚掣刀亂砍傍船手盡折倒于水中急將船望下水棹去許褚立於梢上忙用木篙撐之操伏在許褚腳邊馬超趕到河岸見船已流在半河遂拈弓搭箭喝令驍將繞河射之矢如雨急褚恐傷曹操以左手舉馬鞍遮之馬超箭不虛發船上駕舟之人應弦落水船中數十人皆被射倒其船反撐不定于急水中旋轉許褚獨奮神威將兩腿夾舵搖撼一手使篙撐船一手舉鞍遮護曹操時有嶺南縣令丁斐在南山之上見馬超追操甚急恐傷操命遂將寨內牛只馬匹盡驅於外漫山遍野皆是牛馬西涼兵見之都回身爭取牛馬無心追趕曹操因此得脫方到北岸便把船筏鑿沈諸將聽得曹操在河中逃難急來救時操已登岸許褚身被重鎧箭皆嵌在甲上衆將保操至野寨中皆拜於地而問安操大笑曰我今日幾爲小賊所困褚曰若非有人縱馬放牛以誘賊賊必努力渡河矣操問曰誘賊者誰也有知者答曰渭南縣令丁斐也少頃斐入見操謝曰若非公之良謀則吾被賊所擒矣遂命爲典軍校尉斐曰賊雖暫去明日必複來須以良策拒之操曰吾已準備了也遂喚諸將各分頭循河築起甬道暫爲寨腳賊若來時陳兵於甬道外內虛立旌旗以爲疑兵更沿河掘下壕塹虛土棚蓋河內以兵誘之賊急來必陷賊陷便可擊矣卻說馬超回見韓遂說幾乎捉住曹操有一將奮勇負操下船去了不知何人遂曰吾聞曹操選極精壯之人爲帳前侍衛名曰虎衛軍以驍將典韋許褚領之典韋已死今救曹操者必許褚也此人勇力過人人皆稱爲虎癡如遇之不可輕敵超曰吾亦聞其名久矣遂曰今操渡河將襲我後可速攻之不可令他創立營寨若立營寨急難剿除超曰以侄愚意還只拒住北岸使彼不得渡河乃是上策遂曰賢侄守寨吾引軍循河戰操若何超曰令龐德爲先鋒跟叔父前去於是韓遂與龐德將兵五萬直抵渭南操令衆將於甬道兩旁誘之龐德先引鐵騎千餘衝突而來喊聲起處人馬俱落于陷馬坑內龐德踴身一跳躍出土坑立於平地立殺數人步行砍出重圍韓遂已被困在垓心龐德步行救之正遇到曹仁部將曹永被龐德一刀砍于馬下奪其馬殺開一條血路救出韓遂投東南而走背後曹兵趕來馬超引軍接應殺敗曹兵複救出大半軍馬戰至日暮方回計點人馬折了將佐程銀張橫陷坑中死者二百余人超與韓遂商議若遷延日久操于河北立了營寨難以退敵不若乘今夜引輕騎去劫野營遂曰須分兵前後相救於是超自爲前部令龐德馬岱爲後應當夜便行卻說曹操收兵屯渭北喚諸將曰賊欺我未立寨柵必來劫野營可四散伏兵虛其中軍號炮響時伏兵盡起一鼓可擒也衆將依令伏兵已畢當夜馬超卻先使成宜引三十騎往前哨探成宜見無人馬徑入中軍操軍見西涼兵到遂放號炮四面伏兵皆出只圍得三十騎成宜被夏侯淵所殺馬超卻自從背後與龐德馬岱兵分三路蜂擁殺來正是縱有伏兵能侯敵怎當健將共爭先未知勝負若何且看下文分解
