body:
  text: 第五十九回許褚裸衣鬥馬超曹操抹書間韓遂卻說當夜兩兵混戰直到天明各自收兵馬超屯兵渭口日夜分兵前後攻擊曹操在渭河內將船筏鎖鏈作浮橋三條接連南岸曹仁引軍夾河立寨將糧草車輛穿連以爲屏障馬超聞之教軍士各挾草一束帶著火種與韓遂引軍並力殺到寨前堆積草把放起烈火操兵抵敵不住棄寨而走車乘浮橋盡被燒毀西涼兵大勝截住渭河曹操立不起營寨心中憂懼荀攸曰可取渭河沙土築起土城可以堅守操撥三萬軍擔土築城馬超又差龐德馬岱各引五百馬軍往來衝突更兼沙土不實築起便倒操無計可施時當九月盡天氣暴冷彤雲密布連日不開曹操在寨中納悶忽人報曰有一老人來見丞相欲陳說方略操請入見其人鶴骨松姿形貌蒼古問之乃京兆人也隱居終南山姓婁名子伯道號夢梅居士操以客禮待之子伯曰丞相欲跨渭安營久矣今何不乘時築之操曰沙土之地築壘不成隱士有何良策賜教子伯曰丞相用兵如神豈不知天時乎連日陰雲布合朔風一起必大凍矣風起之後驅兵士運土潑水比及天明土城已就操大悟厚賞子伯子伯不受而去是夜北風大作操盡驅兵士擔土潑水爲無盛水之具作縑囊盛水澆之隨築隨凍比及天明沙水凍緊土城已築完細作報知馬超超領兵觀之大驚疑有神助次日集大軍鳴鼓而進操自乘馬出營止有許褚一人隨後操揚鞭大呼曰孟德單騎至此請馬超出來答話超乘馬挺槍而出操曰汝欺我營寨不成今一夜天已築就汝何不早降馬超大怒意欲突前擒之見操背後一人睜圓怪眼手提鋼刀勒馬而立超疑是許褚乃揚鞭問曰聞汝軍中有虎侯安在哉許褚提刀大叫曰吾即譙郡許褚也目射神光威風抖擻超不敢動乃勒馬回操亦引許褚回寨兩軍觀之無不駭然操謂諸將曰賊亦知仲康乃虎侯也自此軍中皆稱褚爲虎侯許褚曰某來日必擒馬超操曰馬超英勇不可輕敵褚曰某誓與死戰即使人下戰書說虎侯單搦馬超來日決戰超接書大怒曰何敢如此相欺耶即批次日誓殺虎癡次日兩軍出營布成陣勢超分龐德爲左翼馬岱爲右翼韓遂押中軍超挺槍縱馬立於陣前高叫虎癡快出曹操在門旗下回顧衆將曰馬超不減呂布之勇言未絕許褚拍馬舞刀而出馬超挺槍接戰鬥了一百餘合勝負不分馬匹困乏各回軍中換了馬匹又出陣前又鬥一百餘合不分勝負許褚性起飛回陣中卸了盔甲渾身筋突赤體提刀翻身上馬來與馬超決戰兩軍大駭兩個又鬥了三十余合褚奮威舉刀便砍馬超超閃過一槍望褚心窩刺來褚棄刀將槍挾住兩個在馬上奪槍許褚力大一聲響拗斷槍杆各拿半節在馬上亂打操恐褚有失遂令夏侯淵曹洪兩將齊出夾攻龐德馬岱見操將齊出麾兩翼鐵騎橫衝直撞混殺將來操兵大亂許褚臂中兩箭諸將慌退入寨馬超直殺到壕邊操兵折傷大半操令堅閉休出馬超回至渭口謂韓遂曰吾見惡戰者莫如許褚真虎癡也卻說曹操料馬超可以計破乃密令徐晃朱靈盡渡河西結營前後夾攻一日操於城上見馬超引數百騎直臨寨前往來如飛操觀良久擲兜鍪於地曰馬兒不死吾無葬地矣夏侯淵聽了心中氣忿厲聲曰吾甯死於此地誓滅馬賊遂引本部千餘人大開寨門直趕去操急止不住恐其有失慌自上馬前來接應馬超見曹兵至乃將前軍作後隊後隊作先鋒一字兒擺開夏侯淵到馬超接住廝殺超於亂軍中遙見曹操就撇了夏侯淵直取曹操操大驚撥馬而走曹兵大亂正追之際忽報操有一軍已在河西下了營寨超大驚無心追趕急收軍回寨與韓遂商議言操兵乘虛已渡河西吾軍前後受敵如之奈何部將李堪曰不如割地請和兩家且各罷兵捱過冬天到春暖別作計議韓遂曰李堪之言最善可從之超猶豫未決楊秋侯選皆勸求和於是韓遂遣楊秋爲使直往操寨下書言割地請和之事操曰汝且回寨吾來日使人回報楊秋辭去賈詡入見操曰丞相主意若何操曰公所見若何詡曰兵不厭詐可僞許之然後用反間計令韓馬相疑則一鼓可破也操撫掌大喜曰天下高見多有相合文和之謀正吾心中之事也於是遣人回書言待我徐徐退兵還汝河西之地一面教搭起浮橋作退軍之意馬超得書謂韓遂曰曹操雖然許和奸雄難測倘不準備反受其制超與叔父輪流調兵今日叔向操超向徐晃明日超向操叔向徐晃分頭提備以防其詐韓遂依計而行早有人報知曹操操顧賈詡曰吾事濟矣問來日是誰合向我這邊人報曰韓遂次日操引衆將出營左右圍繞操獨顯一騎於中央韓遂部卒多有不識操者出陣觀看操高叫曰汝諸軍欲觀曹公耶吾亦猶人也非有四目兩口但多智謀耳諸軍皆有懼色操使人過陣謂韓遂曰丞相謹請韓將軍會話韓遂即出陣見操並無甲仗亦棄衣甲輕服匹馬而出二人馬頭相交各按轡對語操曰吾與將軍之父同舉孝廉吾嘗以叔父事之吾亦與公同登仕路不覺有年矣將軍今年妙齡幾何韓遂答曰四十歲矣操曰往日在京師皆青春年少何期又中旬矣安得天下清平共樂耶只把舊事細說並不提起軍情說罷大笑相談有一個時辰方回馬而別各自歸寨早有人將此事報知馬超超忙來問韓遂曰今日曹操陣前所言何事遂曰只訴京師舊事耳超曰安得不言軍務乎遂曰曹操不言吾何獨言之超心甚疑不言而退卻說曹操回寨謂賈詡曰公知吾陣前對語之意否詡曰此意雖妙尚未足間二人某有一策令韓馬自相仇殺操問其計賈詡曰馬超乃一勇之夫不識機密丞相親筆作一書單與韓遂中間朦朧字樣於要害處自行塗抹改易然後封送與韓遂故意使馬超知之超必索書來看若看見上面要緊去處盡皆改抹只猜是韓遂恐超知甚機密事自行改抹正合著單騎會語之疑疑則必生亂我更暗結韓遂部下諸將使互相離間超可圖矣操曰此計甚妙隨寫書一封將緊要處盡皆改抹然後實封故意多遣從人送過寨去下了書自回果然有人報知馬超超心愈疑徑來韓遂處索書看韓遂將書與超超見上面有改抹字樣問遂曰書上如何都改抹糊塗遂曰原書如此不知何故超曰豈有以草稿送與人耶必是叔父怕我知了詳細先改抹了遂曰莫非曹操錯將草稿誤封來了超曰吾又不信曹操是精細之人豈有差錯吾與叔父並力殺賊奈何忽生異心遂曰汝若不信吾心來日吾在陣前賺操說話汝從陣內突出一槍刺殺便了超曰若如此方見叔父真心兩人約定次日韓遂引侯選李堪梁興馬玩楊秋五將出陣馬超藏在門影裏韓遂使人到操寨前高叫韓將軍請丞相攀話操乃令曹洪引數十騎徑出陣前與韓遂相見馬離數步洪馬上欠身言曰夜來丞相拜意將軍之言切莫有誤言訖便回馬超聽得大怒挺槍驟馬便刺韓遂五將攔住勸解回寨遂曰賢侄休疑我無歹心馬超那裏肯信恨怨而去韓遂與五將商議曰這事如何解釋楊秋曰馬超倚仗武勇常有欺淩主公之心便勝得曹操怎肯相讓以某愚見不如暗投曹公他日不失封侯之位遂曰吾與馬騰結爲兄弟安忍背之楊秋曰事以至此不得不然遂曰誰可以通消息楊秋曰某願往遂乃寫密書遣楊秋徑來操寨說投降之事操大喜許封韓遂爲西涼侯楊秋爲西涼太守其餘皆有官爵約定放火爲號共謀馬超楊秋拜辭回見韓遂備言其事約定今夜放火裏應外合遂大喜就令軍士于中軍帳後堆積乾柴五將各懸刀劍聽候韓遂商議欲設宴賺請馬超就席圖之猶豫未決不想馬超早已探知備細便帶親隨數人仗劍先行令龐德馬岱爲後應超潛步入韓遂帳中只見五將與韓遂密語只聽得楊秋口中說道事不宜遲可速行之超大怒揮劍直入大喝曰群賊焉敢謀害我衆皆大驚超一劍望韓遂面門剁去遂慌以手迎之左手早被砍落五將揮刀齊出超縱步出帳外五將圍繞混殺超獨揮寶劍力敵五將劍光明處鮮血濺飛砍翻馬玩剁倒梁興三將各自逃生超複入帳中來殺韓遂時已被左右救去帳後一把火起各寨兵皆動超連忙上馬龐德馬岱亦至互相混戰超領軍殺出時操兵四至前有許褚後有徐晃左有夏侯淵右有曹洪西涼之兵自相並殺超不見了龐德馬岱乃引百餘騎截於渭橋之上天色微明只見李堪領一軍從橋下過超挺槍縱馬逐之李堪拖槍而走恰好於禁從馬超背後趕來禁開弓射馬超超聽得前後弦響急閃過卻射中前面李堪落馬而死超回馬殺於禁禁拍馬走了超回橋上住紮操兵前後大至虎衛軍當先亂箭夾射馬超超以槍撥之矢皆紛紛落地超令從騎往來突殺爭奈曹兵圍裹堅厚不能沖出超於橋上大喝一聲殺入河北從騎皆被截斷超獨在陣中衝突卻被暗弩射倒坐下馬馬超墮於地上操軍逼合正在危急忽西北角上一彪軍殺來乃龐德馬岱也二人救了馬超將軍中戰馬與馬超騎了翻身殺條血路望西北而走曹操聞馬超走脫傳令諸將無分曉夜務要趕到馬兒如得首級者千金賞萬戶侯生獲者封大將軍衆將得令各要爭功迤邐追襲馬超顧不得人馬困乏只顧奔走從騎漸漸皆散步兵走不上者多被擒去止剩得三十余騎與龐德馬岱望隴西臨洮而去曹操親自追至安定知馬超去遠方收兵回長安衆將畢集韓遂已無左手做了殘疾之人操教就于長安歇馬授西涼侯之職楊秋侯選皆封列侯令守渭口下令班師回許都涼州參軍楊阜字文山徑來長安見操操問之楊阜曰馬超有呂布之勇深得羌人之心今丞相若不乘勢剿絕他日養成氣力隴上諸郡非複國家之有也望丞相且休回兵操曰吾本欲留兵征之奈中原多事南方未定不可久留君當爲孤保之阜領諾又保薦韋康爲涼州刺史同領兵屯翼城以防馬超阜臨行請於操曰長安必留重兵以爲後援操曰吾已定下汝但放心阜辭而去衆將皆問曰初賊據潼關渭北道缺丞相不從河東擊馮翊而反守潼關遷延日久而後北渡立營固守何也操曰初賊守潼關若吾初到便取河東賊必以各寨分守諸渡口則河西不可渡矣吾故盛兵皆聚於潼關前使賊盡南守而河西不準備故徐晃朱靈得渡也吾然後引兵北渡連車樹柵爲甬道築冰城欲賊知吾弱以驕其心使不準備吾乃巧用反間畜士卒之力一旦擊破之正所謂疾雷不及掩耳兵之變化固非一道也衆將又請問曰丞相每聞賊加兵添衆則有喜色何也操曰關中邊遠若群賊各依險阻征之非一二年不可平復今皆來聚在一處其衆雖多人心不一易於離間一舉可滅吾故喜也衆將拜曰丞相神謀衆不及也操曰亦賴汝衆文武之力遂重賞諸軍留夏侯淵屯兵長安所得降兵分撥各部夏侯淵保舉馮翊高陵人姓張名既字德容爲京兆尹與淵同守長安操班師回都獻帝排鑾駕出郭迎接詔操贊拜不名入朝不趨劍履上殿如漢相蕭何故事自此威震中外這消息播入漢中早驚動了漢甯太守張魯原來張魯乃沛國豐人其祖張陵在西川鵠鳴山中造作道書以惑人人皆敬之陵死之後其子張衡行之百姓但有學道者助米五鬥世號米賊張衡死張魯行之魯在漢中自號爲師君其來學道者皆號爲鬼卒爲首者號爲祭酒領衆多者號爲治頭大祭酒務以誠信爲主不許欺詐如有病者即設壇使病人居於靜室之中自思已過當面陳首然後爲之祈禱主祈禱之事者號爲奸令祭酒祈禱之法書病人姓名說服罪之意作文三通名爲三官手書一通放於山頂以奏天一通埋於地以奏地一通沈于水以申水官如此之後但病痊可將米五鬥爲謝又蓋義舍舍內飯米柴火肉食齊備許過往人量食多少自取而食多取者受天誅境內有犯法者必恕三次不改者然後施刑所在並無官長盡屬祭酒所管如此雄據漢中之地三十年國家以爲地遠不能征伐就命魯爲鎮南中郎將領漢甯太守通進貢而已當年聞操破西涼之衆威震天下乃聚衆商議曰西涼馬騰遭戮馬超新敗曹操必將侵我漢中我欲自稱漢甯王督兵拒曹操諸君以爲如何閻圃曰漢川之民戶出十萬余衆財富糧足四面險固今馬超新敗西涼之民從子午穀奔入漢中者不下數萬愚意益州劉璋昏弱不如先取西川四十一州爲本然後稱王未遲張魯大喜遂與弟張衛商義起兵早有細作報入川中卻說益州劉璋字季玉即劉焉之子漢魯恭王之後章帝元和中徙封竟陵支庶因居於此後焉官至益州牧興平元年患病疽而死州大吏趙韙等共保璋爲益州牧璋曾殺張魯母及弟因此有仇璋使龐羲爲巴西太守以拒張魯時龐羲探知張魯欲興兵取川急報知劉璋璋平生懦弱聞得此信心中大憂急聚衆官商議忽一人昂然而出曰主公放心某雖不才憑三寸不爛之舌使張魯不敢正眼來覰西川正是只因蜀地謀臣進致引荊州豪傑來未知此人是誰且看下文分解
