body:
  text: 第六十一回趙雲截江奪阿斗孫權遺書退老瞞卻說龐統法正二人勸玄德就席間殺劉璋西川唾手可得玄德曰吾初入蜀中恩信未立此事決不可行二人再三說之玄德只是不從次日複與劉璋宴於城中彼此細敘衷曲情好甚密酒至半酣龐統與法正商議曰事已至此由不得主公了便教魏延登堂舞劍乘勢殺劉璋延遂拔劍進曰筵間無以爲樂願舞劍爲戲龐統便喚衆武士入列於堂下只待魏延下手劉璋手下諸將見魏延舞劍筵前又見階下武士手按刀靶直視堂上從事張任亦掣劍舞曰舞劍必須有對某願與魏將軍同舞二人對舞於筵前魏延目視劉封封亦拔劍助舞於是劉璝泠苞鄧賢各掣劍出曰我等當群舞以助一笑玄德大驚急掣左右所佩之劍立于席上曰吾兄弟相逢痛飲並無疑忌又非鴻門會上何用舞劍不棄劍者立斬劉璋亦叱曰兄弟相聚何必帶刀命侍衛者盡去佩劍衆皆紛然下堂玄德喚諸將士上堂以酒賜之曰吾弟兄同宗骨血共議大事並無二心汝等勿疑諸將皆拜謝劉璋執玄德之手而泣曰吾兄之恩誓不敢忘二人歡飲至晚而散玄德歸寨責龐統曰公等奈何欲陷備於不義耶今後斷勿爲此統嗟歎而退卻說劉璋歸寨劉璝等曰主公見今日席上光景乎不如早回免生後患劉璋曰吾兄劉玄德非比他人衆將曰雖玄德無此心他手下人皆欲吞併西川以圖富貴璋曰汝等無間吾兄弟之情遂不聽日與玄德歡敘忽報張魯整頓兵馬將犯葭萌關劉璋便請玄德往拒之玄德慨然領諾即日引本部兵望葭萌關去了衆將勸劉璋令大將緊守各處關隘以防玄德兵變璋初時不從後因衆人苦勸乃令白水都督楊懷高沛二人守把涪水關劉璋自回成都玄德到葭萌關嚴禁軍士廣施恩惠以收民心早有細作報入東吳吳侯孫權會文武商議顧雍進曰劉備分兵遠涉山險而去未易往還何不差一軍先截川口斷其歸路後盡起東吳之兵一鼓而下荊襄此不可失之機會也權曰此計大妙正商議間忽屏風後一人大喝而出曰進此計者可斬之欲害吾女之命耶衆驚視之乃吳國太也國太怒曰吾一生惟有一女嫁與劉備今若動兵吾女性命如何因叱孫權曰汝掌父兄之業坐領八十一州尚自不足乃顧小利而不念骨肉孫權喏喏連聲答曰老母之訓豈敢有違遂叱退衆官國太恨恨而入孫權立于軒下自思此機會一失荊襄何日可得正沈吟間只見張昭入問曰主公有何憂疑孫權曰正思適間之事張昭曰此極易也今差心腹將一人只帶五百軍潛入荊州下一封密書與郡主只說國太病危欲見親女取郡主星夜回東吳玄德平生只有一子就教帶來那時玄德定把荊州來換阿斗如其不然一任動兵更有何礙權曰此計大妙吾有一人姓周名善最有膽量自幼穿房入戶多隨吾兄今可差他去昭曰切勿漏泄只此便令起行於是密遣周善將五百人扮爲商人分作五船更詐修國書以備盤詰船內暗藏兵器周善領命取荊州水路而來船泊江邊善自入荊州令門吏報孫夫人夫人命周善入善呈上密書夫人見說國太病危灑淚動問周善拜訴曰國太好生病重旦夕只是思念夫人倘去得遲恐不能相見就教夫人帶阿斗去見一面夫人曰皇叔引兵遠山我今欲回須使人知會軍師方可以行周善曰若軍師回言道須報知皇叔候了回命方可下船如之奈何夫人曰若不辭而去恐有阻當周善曰大江之中已準備下船隻只今便請夫人上車出城孫夫人聽知母病危急如何不慌便將七歲孩子阿斗載在車中隨行帶三十餘人各跨刀劍上馬離荊州城便來江邊上船府中人欲報時孫夫人已到沙頭鎮下在船中了周善方欲開船只聽得岸上有人大叫且休開船容與夫人餞行視之乃趙雲也原來趙雲巡哨方回聽得這個消息吃了一驚只帶四五騎旋風般沿江趕來周善手執長戈大喝曰汝何人敢當主母叱令軍士一齊開船各將軍器出來擺列在船上風順水急船皆隨流而去趙雲沿江趕叫任從夫人去只有一句話拜稟周善不睬只催船速進趙雲沿江趕到十餘裏忽見江灘斜纜一隻漁船在那裏趙雲棄馬執槍跳上漁船只兩人駕船前來望著夫人所坐大船追趕周善教軍士放箭趙雲以槍撥之箭皆紛紛落水離大船懸隔丈余吳兵用槍亂刺趙雲棄槍在小船上掣所佩青钅工劍在手分開槍搠望吳船湧身一跳早登大船吳兵盡皆驚倒趙雲入艙中只見夫人抱阿斗于懷中喝趙雲曰何故無禮雲插劍聲喏曰主母欲何往何故不令軍師知會夫人曰我母親病在危篤無暇報知雲曰主母探病何故帶小主人去夫人曰阿斗是吾子留在荊州無人看覰雲曰主母差矣主人一生只有這點骨血小將在當陽長阪坡百萬軍中救出今日夫人卻欲抱將去是何道理夫人怒曰量汝只是帳下一武夫安敢管我家事雲曰夫人要去便去只留下小主人夫人喝曰汝半路輒入船中必有反意雲曰若不留下小主人縱然萬死亦不敢放夫人去夫人喝侍婢向前揪捽被趙雲推倒就懷中奪了阿斗抱出船頭上欲要傍岸又無幫手欲要行凶又恐礙於道理進退不得夫人喝侍婢奪阿斗趙雲一手抱定阿斗一手仗劍人不敢近周善在後梢挾住舵只顧放船下水風順水急望中流而去趙雲孤掌難鳴只護得阿斗安能移舟傍岸正在危急忽見下流頭港內一字兒使出十餘隻船來船上磨旗擂鼓趙雲自思今番中了東吳之計只見當頭船上一員大將手執長矛高聲大叫嫂嫂留下侄兒去原來張飛巡哨聽得這個消息急來油江夾口正撞著吳船急忙截住當下張飛提劍跳上吳船周善見張飛上船提刀來迎被張飛手起一劍砍倒提頭擲于孫夫人前夫人大驚曰叔叔何故無禮張飛曰嫂嫂不以俺哥哥爲重私自歸家這便無禮夫人曰吾母病重甚是危急若等你哥哥回報須誤了我事若你不放我回去我情願投江而死張飛與趙雲商議若逼死夫人非爲臣下之道只護著阿斗過船去罷乃謂夫人曰俺哥哥大漢皇叔也不辱沒嫂嫂今日相別若思哥恩義早早回來說罷抱了阿斗自與趙雲回船放孫夫人五隻船去了後人有詩贊子龍曰昔年救主在當陽今日飛身向大江船上吳兵皆膽裂子龍英勇世無雙又有詩贊翼德曰長阪橋邊怒飛騰一聲虎嘯退曹兵今朝江上扶危主青史應傳萬載名二人歡喜回船行不數裏孔明引大隊船隻接來見阿斗已奪回大喜三人並馬而歸孔明自申文書往葭萌關報知玄德卻說孫夫人回吳具說張飛趙雲殺了周善截江奪了阿鬥孫權大怒曰今吾妹已歸與彼不親殺周善之仇如何不報喚集文武商議起軍攻取荊州正商議調兵忽報曹操起軍四十萬來報赤壁之仇孫權大驚且按下荊州商議拒敵曹操人報長史張紘辭疾回家今已病故有哀書上呈權拆視之書中勸孫權遷居秣陵言秣陵山咱有帝王之氣可速遷於此以爲萬世之業孫權覽書大哭謂衆官曰張子綱勸吾遷居秣陵吾如何不從即命遷治建業築石頭城呂蒙進曰曹操兵來可于濡須水口築塢以拒之諸將皆曰上岸擊賊跣足入船何用築城蒙曰兵有利鈍戰無必勝如猝然遇敵步騎相促人尚不暇及水何能入船乎權曰人無遠慮必有近憂子明之見甚遠便差軍數萬築濡須塢曉夜並工刻期告竣卻說曹操在許都威福日甚長史董昭進曰自古以來人臣未有如丞相之功者雖周公呂望莫可及也櫛風沐雨三十餘年掃蕩群凶與百姓除害使漢室複存豈可與諸臣宰同列乎合受魏公之位加九錫以彰功德你道哪九錫一車馬大輅戎輅各一大輅金車也戎輅兵車也玄牡二駟黃馬八匹二衣服袞冕之服赤舄副焉袞冕王者之服赤舄朱履也三樂懸樂懸王者之樂也四朱戶居以朱戶紅門也五納陛納陛以登陛階也六虎賁虎賁三百人守門之軍也七鈇鉞鈇鉞各一鈇即斧也鉞斧屬八弓矢彤弓一彤矢百彤赤色也玈弓十玈矢千玈黑色也九秬鬯圭瓚秬鬯一卣圭瓚副焉秬黑黍也鬯香酒灌地以求神于陰卣中樽也圭瓚宗廟祭器以祀先王也侍中荀彧曰不可丞相本興義兵匡扶漢室當秉忠貞之志守謙退之節君子愛人以德不宜如此曹操聞言勃然變色董昭曰豈可以一人而阻衆望遂上表請尊操爲魏公加九錫荀彧歎曰吾不想今日見此事操聞深恨之以爲不助己也建安十七年冬十月曹操興兵下江南就命荀彧同行彧已知操有殺己之心託病止于壽春忽曹操使人飲食一盒至盒上有操親筆封記開盒視之並無一物彧會其意遂服毒而亡年五十歲後人有詩歎曰文若才華天下聞可憐失足在權門後人休把留侯比臨沒無顔見漢君其子荀惲發哀書報曹操操甚懊悔命厚葬之諡曰敬侯且說曹操大軍至濡須先差曹洪領三萬鐵甲馬軍哨至江邊回報雲遙望沿江一帶旗幡無數不知兵聚何處操放心不下自領兵前進就濡須口排開軍陣操領百餘人上山坡遙望戰船各分隊伍依次擺列旗分五色兵器鮮明當中大船上青羅傘下坐著孫權左右文武侍立兩邊操以鞭指曰生子當如孫仲謀若劉景升兒子豚犬耳忽一聲響動南船一齊飛奔過來濡須塢內又一軍出衝動曹兵曹操軍馬退後便走止喝不住忽有千百騎趕到山邊爲首馬上一人碧眼紫髯衆人認得正是孫權權自引一隊馬軍來擊曹操操大驚急回馬時東吳大將韓當周泰兩騎馬直沖將上來操背後許褚縱馬舞馬敵住二將曹操得脫歸寨許褚與二將戰三十合方回操回寨重賞許褚責駡衆將臨敵先退挫吾銳氣後若如此盡皆斬首是夜二更時分忽寨外喊聲大震操急上馬見四下裏火起卻被吳兵劫入大寨殺至天明曹兵退五十餘裏下寨操心中鬱悶閑看兵書程昱曰丞相既知兵法豈不知兵貴神速乎丞相起兵遷延日久故孫權得以準備夾濡須水口爲塢難於攻擊不若且退兵還許都別作良圖操不應程昱出操伏幾而臥忽聞潮聲洶湧如萬馬爭奔之狀操急視之見大江中推出一輪紅日光芒射目仰望天上又有兩輪太陽對照忽見江心那輪紅日直飛起來墜入寨前山中其聲如雷猛然驚覺原來在帳中做了一夢帳前軍報道午時曹操教備馬引五十餘騎徑奔出寨至夢中所見落日山邊正看之間忽見一簇人馬當先一人金盔金甲操視之乃孫權也權見操至也不慌忙在山上勒住馬以鞭指操曰丞相坐鎮中原富貴已極何故貪心不足又來侵我江南操答曰汝爲臣下不尊王室吾奉天子詔特來討汝孫權笑曰此言豈不羞乎天下豈不知你挾天子令諸侯吾非不尊漢朝正欲討汝以正國家耳操大怒叱諸將上山捉孫權忽一聲鼓響山背後兩彪軍出右邊韓當周泰左邊陳武潘璋四員將帶三千弓弩手亂射矢如雨發操急引衆將回走背後四將趕來甚急趕到半路許褚引衆虎衛軍敵住救回曹操吳兵齊奏凱歌回濡須去了操還營自思孫權非等閒人物紅日之應久後必爲帝王於是心中有退兵之意又恐東吳恥笑進退未決兩邊又相拒了月餘戰了數場互相勝負直至來年正月春雨連綿水港皆滿軍士多在泥水之中困苦異常操心甚憂當日正在寨中與衆謀士商議或勸操收兵或雲目今春暖正好相持不可退回操猶豫未定忽報東吳有使齎書到操啓視之書略曰孤與丞相彼此皆漢朝臣宰丞相不思報國安民乃妄動干戈殘虐生靈豈仁人之所爲哉即日春水方生公當速去如其不然複有赤壁之禍矣公宜自思焉書背後後又批兩行雲足下不死孤不得安曹操看畢大笑曰孫仲謀不欺我也重賞來使遂下令班師命廬江太守朱光鎮守皖城自引大軍回許昌孫權亦收軍回秣陵權與衆將商議曹操雖然北去劉備尚在葭萌關未還何不引拒曹操之兵以取荊州張昭獻計曰且未可動兵某有一計使劉備不能再還荊州正是孟德雄兵方退北仲謀壯志又圖南不知張昭說出甚計且看下文分解
