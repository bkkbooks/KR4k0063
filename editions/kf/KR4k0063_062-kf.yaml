body:
  text: 第六十二回取涪關楊高授首攻雒城黃魏爭功卻說張昭獻計曰且休要動兵若一興師曹操必複至不如修書二封一封與劉璋言劉備結連東吳共取西川使劉璋心疑而攻劉備一封與張魯教進兵向荊州來著劉備首尾不能救應我然後起兵取之事可諧矣權從之即發使二處去訖且說玄德在葭萌關日久甚得民心忽接得孔明文書知孫夫人已回東吳又聞曹操興兵犯濡須乃與龐統議曰曹操擊孫權操勝必將取荊州權勝亦必將取荊州矣爲之奈何龐統曰主公勿憂有孔明在彼料想東吳不敢犯荊州主公可馳書去劉璋處只推曹操攻擊孫權權求救於荊州吾與孫權唇齒之邦不容不相援張魯自守之賊決不敢來犯界吾今欲勒兵回荊州與孫權會同破曹操奈兵少糧缺望推同宗之誼速發精後三四萬行糧十萬斛相助請勿有誤若得軍馬錢糧卻另作商議玄德從之遣人往成都來到關前楊懷高沛聞知此事遂教高沛守關楊懷同使者入成都見劉璋呈上書信劉璋看畢問楊懷爲何亦同來楊懷曰專爲此書而來劉備自從入川廣布恩德以收民心其意甚是不善今求軍馬錢糧切不可與如若相助是把薪助火也劉璋曰吾與玄德有兄弟之情豈可不助一人出曰劉備梟雄久留于蜀而不遣是縱虎入室矣今更助之以軍馬錢糧何異與虎添翼乎衆視其人乃零陵氶陽人姓劉名巴字子初劉璋聞劉巴之言猶豫未決黃權又複苦諫璋乃量撥老弱軍四千米一萬斛發書遣使報玄德仍令楊懷高沛緊守關隘劉璋使者到葭萌關見玄德呈上回書玄德大怒曰吾爲汝禦敵費力勞心汝今積財吝賞何以使士卒效命乎遂扯毀回書大罵而起使者逃回成都龐統曰主公只以仁義爲重今日毀書發怒前情盡棄矣玄德曰如此當若何龐統曰某有三條計策請主公自擇而行玄德問那三條計統曰只今便選精兵晝夜兼道徑襲成都此爲上計楊懷高沛乃蜀中名將各仗強兵拒守關隘今主公佯以回荊州爲名二將聞知必來相送就送行處擒而殺之奪了關隘先取涪城然後卻向成都此爲中計也退還白帝連夜回荊州徐圖進取此爲下計若覺吟不去將至大困不可救矣玄德曰軍師上計太促下計太緩中計不遲不疾可以行之於是發書致劉璋只說曹操令部將樂進引兵至青泥鎮衆將抵敵不住吾當親往拒之不及面會特書相辭書至成都張松聽得說劉玄德欲回荊州只道是真心乃修書一封欲令人送與玄德卻值親兄廣漢太守張肅到松急藏書於袖中與肅相陪說話肅見松神情恍惚心中疑惑松取酒與肅共飲獻酬之間忽落此書於地被肅從人拾得席散後從人以書呈肅肅開視之書略曰松昨進言于皇叔並無虛謬何乃遲遲不發逆取順守古人所貴今大事已在掌握之中何故欲棄此而回荊州乎使松聞之如有所失書呈到日疾速進兵松當爲內應萬勿自誤張肅見了大驚曰吾弟作滅門之事不可不首連夜將書見劉璋具言弟張松與劉備同謀欲獻西川劉璋大怒曰吾平日未嘗薄待他何故欲謀反遂下令捉張松全家盡斬於市後人有詩歎曰一覽無遺世所稀誰知書信泄天機未觀玄德興王業先向成都血染衣道理可速退龐統大笑而起左右亦扶玄德入後堂睡至半夜劉璋既斬張松聚集文武商議曰劉備欲奪吾基業當如之何黃權曰事不宜遲便可差人告報各處關隘添兵把守不許放荊州一人一騎入關璋從其言星夜馳檄各關去訖卻說玄德提兵回涪城先令人報上涪水關請楊懷高沛出關相別楊高二將聞報商議曰玄德此回若何高沛曰玄德合死我等各藏利刃在身就送行處刺之以絕吾主之患楊懷曰此計大妙二人只帶隨行二百人出關送行其餘並留在關上玄德大軍盡發前至涪水之上龐統在馬上謂玄德曰楊懷高沛若欣然而來可提防之若彼不來便起兵徑取其關不可遲緩正說間忽起一陣旋風把馬前帥字旗吹倒玄德問龐統曰此何兆也統曰此警報也楊懷高沛二人必有行刺之意宜善防之玄德乃身披重鎧自佩寶劍防備人報楊高二將前來送行玄德令軍馬歇定龐統分付魏延黃忠但關上來的軍士不問多少馬步軍兵一個也休放回二將得令而去卻說楊懷高沛二人身邊各藏利刃帶二百軍兵牽羊送酒直至軍前見並無準備心中暗喜以爲中計入至帳下見玄德正與龐統坐於帳中二將聲喏曰聞皇叔遠回特具薄禮相送遂進酒勸玄德玄德曰二將軍守關不易當先飲此杯二將飲酒畢玄德曰吾有密事與二將軍商議閒人退避遂將帶來二百人盡趕出中軍玄德叱曰左右與吾捉下二賊帳後劉封關平應聲而出楊高二人急待爭鬥劉封關平各捉住一人玄德喝曰吾與汝主是同宗兄弟汝二人何故同謀離間親情龐統叱左右搜其身畔果然各搜出利刃一口統便喝斬二人玄德還猶未決統曰二人本意欲殺吾主罪不容誅遂叱刀斧手斬楊懷高沛於帳前黃忠魏延早將二百從人先自捉下不曾走了一個玄德喚入各賜酒壓驚玄德曰楊懷高沛離間吾兄弟又藏利刃行刺故行誅戮爾等無罪不必驚疑衆各拜謝龐統曰吾今即用汝等引路帶吾軍取關各有重賞衆皆應允是夜二百人先行大軍隨後前軍至關下叫曰二將軍有急事回可速開關城上聽得是自家軍即時開關大軍一擁而入兵不血刃得了涪關蜀兵皆降玄德各加重賞遂即分兵前後守把次日勞軍設宴於公廳玄德酒酣顧龐統曰今日之會可爲樂乎龐統曰伐人之國而以爲樂非仁者之兵也玄德曰吾聞昔日武王伐紂作樂象功此亦非仁者之兵歟汝言何不合酒醒左右以逐龐統之言告知玄德玄德大悔次早穿衣升堂請龐統謝罪曰昨日酒醉言語觸犯幸勿挂懷龐統談笑自若玄德曰昨日之言惟吾有失龐統曰君臣俱失何獨主公玄德亦大笑其樂如初卻說劉璋聞玄德殺了楊高二將襲了涪水關大驚曰不料今日果有此事遂聚文武問退兵之策黃權曰可連夜遣兵屯雒縣塞住咽喉之路劉備雖有精兵猛將不能過也璋遂令劉璝泠苞張任鄧賢點五萬大軍星夜往守雒縣以拒劉備四將行兵之次劉璝曰吾聞錦屏山有一異人道號紫虛上人知人生死貴賤吾輩今日行軍正從錦屏山過何不試往問之張任曰大丈夫行兵拒敵豈可問于山野之人乎璝曰不然聖人雲至誠之道可以前知吾等問于高明之人當趨吉避凶於是四人引五六十騎至山下問徑樵夫樵夫指高山絕頂上便是上人所居四人上山至庵前見一道童出迎問了姓名引入庵中只見紫虛上人坐于蒲墩之四人下拜求問前程之事紫虛上人曰貧道乃山野人廢人豈知休咎劉璝再三拜問紫虛遂命道童取紙筆寫下八句言語付與劉璝其文曰左龍右鳳飛入西川雛鳳墜地臥龍升天一得一失天數當然見機而作勿喪九泉劉璝又問曰我四人氣數如何紫虛上人曰定數難逃何必再問璝又請問時上人眉垂目合恰似睡著的一般並不答應四人下山劉璝曰仙之人言不可不信張任曰此狂叟也聽之何益遂上馬前行既至雒縣分調人馬守把各處隘口劉璝曰雒城乃成都之保障失此則成都難保吾四人公議著二人守城二人去雒縣前面依山傍險紮下兩個寨子勿使敵兵臨城泠苞鄧賢曰某願往結寨劉璝大喜分兵二萬與泠鄧二人離城六十裏下寨劉璝張任守護雒城卻說玄德既得涪水關與龐統商議進取雒城人報劉璋撥四將前來即令泠苞鄧賢領二萬軍離城六十裏紮下兩個大寨玄德聚衆將問曰誰敢建頭功去取二將寨柵老將黃忠應聲出曰老夫願往玄德曰老將軍率本部人馬前至雒城如取得泠苞鄧賢營寨必當重賞黃忠大喜即領本部兵馬謝了要行忽帳下一人出曰老將軍年紀高大如何去得小將不才願往玄德視之乃是魏延黃忠曰我已領下將令你如何敢攙越魏延曰老者不以筋骨爲能吾聞泠苞鄧賢乃蜀中名將血氣方剛恐老將軍近他不得豈不誤了主公大事因此願相替本是好意黃忠大怒曰汝說吾老敢與我比試武藝麽魏延曰就主公之前當面比試贏得的便去何如黃忠遂趨步下階便叫小校將刀來玄德急止之曰不可吾今提兵取川全仗汝二人之力今兩虎相鬥必有一傷須誤了我大事吾與你二人勸解休得爭論龐統曰汝二人不必相爭即今泠苞鄧賢下了兩個營寨今汝二人自領本部軍馬各打一寨如先奪得者便爲頭功於是分定黃忠打泠苞寨魏延打鄧賢寨二人各領命去了龐統曰此二人去恐于路上相爭主公可自引軍爲後應玄德留龐統守城自與劉封關平引五千軍隨後進發卻說黃忠歸寨傳令來日四更造飯五更結束平明進兵取左邊山谷而進魏延卻暗使人探聽黃忠甚時起兵探事人回報來日四更造飯五更起兵魏延暗喜分付衆軍士二更造飯三更起兵平明要到鄧賢寨邊軍士得令都飽餐一頓馬摘鈴人銜枚卷旗束甲暗地去劫寨三更前後離寨前進到半路魏延馬上尋思只去打鄧賢寨不顯能處不如先去打泠苞寨卻將得勝兵打鄧賢寨兩外功勞都是我的就馬上傳令教軍士都投左邊山路裏去天色微明離泠苞寨不遠教軍士少歇排搠金鼓旗幡槍刀器械早有伏路小軍飛報入寨泠苞已有準備了一聲炮響三軍上馬殺將出來魏延縱馬提刀與泠苞接戰二將交馬戰到三十合川兵分兩路來襲漢軍漢軍走了半夜人馬力乏抵當不住退後便走魏延聽得背後陣腳亂撇了泠苞撥馬回走川兵隨後趕來漢軍大敗走不到五裏山背後鼓聲震地鄧賢引一彪軍從山谷裏截出來大叫魏延快下馬受降魏延策馬飛奔那馬忽失前蹄引足跪地將魏延掀將下來鄧賢馬奔到梃槍來刺魏延槍未到處弓弦響鄧賢撞下馬後面泠苞方欲來救一員大將從山坡上躍馬而來厲聲大叫老將黃忠在此舞刀直取泠苞泠苞抵敵不住望後便走黃忠乘勢追趕川兵大亂黃忠一支軍救了魏延殺了鄧賢直趕到寨前泠苞回馬與黃忠再戰不到十餘合後面軍馬擁將上來泠苞只得棄了左寨引敗軍來投右寨只見寨中旗幟全別泠苞大驚兜住馬看時當頭一員大將金甲錦袍乃是劉玄德左邊劉封右邊關平大喝道寨子吾已奪下汝欲何往原來玄德引兵從後接應便乘勢奪了鄧賢寨子泠苞兩頭無路取山僻小徑要回雒城行不到十裏狹路伏兵忽起搭鈎齊舉把泠苞活捉了原來卻是魏延自知罪犯無可解釋收拾後軍令蜀兵引路伏在這裏等個正著用索縛了泠苞解投玄德寨來卻說玄德立起免死旗但川兵倒戈卸甲者並不許殺害如傷者償命又諭衆降兵曰汝川人皆有父母妻子願降者充軍不願降者放回於是歡聲動地黃忠安下寨腳徑來見玄德說魏延違了軍令可斬之玄德急召魏延魏延解泠苞至玄德曰延雖有罪此功可贖令魏延謝黃忠救命之恩今後毋得相爭魏延頓首伏罪玄德重賞黃忠使人押泠苞到帳下玄德去其縛賜酒壓驚問曰汝肯降否泠苞曰既蒙免死如何不降劉璝張任與某爲生死之交若肯放某回去當即招二人來降就獻雒城玄德大喜便賜衣服鞍馬令回雒城魏延曰此人不可放回若脫身一去不復來矣玄德曰吾以仁義待人人不負我卻說泠苞得回雒城見劉璝張任不說捉去放回只說被我殺了十餘人奪得馬匹逃回劉璝忙遣人往成都求救劉璋聽知折了鄧賢大驚慌忙聚衆商議長子劉循進曰兒願領兵前去守雒城璋曰既吾兒肯去當遣誰人爲輔一人出曰某願往璋視之乃舅氏吳懿也璋曰得尊舅去最好誰可爲副將吳懿保吳蘭雷銅二人爲副將點二萬軍馬來到雒城劉璝張任接著具言前事吳懿曰兵臨城下難以拒敵汝等有何高見泠苞曰此間一帶正靠涪江江水大急前面寨占山腳其形最低某乞五千軍各帶鍬鋤前去決涪江之水可盡淹死劉備之兵也吳懿從其計即令泠苞前往決水吳蘭雷銅引兵接應泠苞領命自去準備決水器械卻說玄德令黃忠魏延各守一寨自回涪城與軍師龐統商議細作報說東吳孫權遣人結好東川張魯將欲來攻葭萌關玄德驚曰若葭萌關有失截斷後路吾進退不得當如之何龐統謂孟達曰公乃蜀中人多知地理去守葭萌關如何達曰某保一人與某同去守關萬無一失玄德問何人達曰此人曾在荊州劉表部下爲中郎將乃南郡枝江人姓霍名峻字仲邈玄德大喜即時遣孟達霍峻守葭萌關去了龐統退歸館舍門吏忽報有客特來相訪統出迎接見其人身長八尺形貌甚偉頭髮截短披於頸上衣服不甚齊整統問曰先生何人也其人不答徑登堂仰臥床上統甚疑之再三請問其人曰且消停吾當與汝說天下大事統聞之愈疑命左右進酒食其人起而便食並無謙遜飲食甚多食罷又睡統疑惑不定使人請法正視之恐是細作法正慌忙到來統出迎接謂正曰有一人如此如此法正曰莫非彭永言乎升階視之其人躍起曰孝直別來羌正是只爲川人逢舊識遂令涪水息洪流畢竟此人是誰且看下文分解
