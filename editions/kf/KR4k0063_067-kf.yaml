body:
  text: 第六十七回曹操平定漢中地張遼威震逍遙津卻說曹操興師西征分兵三隊前部先逢夏侯淵張郃操自領諸將居中後部曹仁夏侯惇押運糧草早有細作報入漢中來張魯與弟張衛商議退敵之策衛曰漢中最險無如陽平關可于關之左右依山傍林下十餘個寨柵迎敵曹兵兄在漢甯多撥糧草應付張魯依言遣大將楊昂楊任與其弟即日起程軍馬到陽平關下寨已定夏侯淵張郃前軍隨到聞陽平關已有準備離關一十五裏下寨是夜軍士疲困各自歇息忽寨後一把火起楊昂楊任兩路兵殺來劫寨夏侯淵張郃急上得馬四下裏大兵擁入曹兵大敗退見曹操操怒曰汝二人行軍許多年豈不知兵若遠行疲困可防劫寨如何不作準備欲斬二人以明軍法衆官告免操次日自引兵爲前隊見山勢險惡林木叢雜不知路徑恐有伏兵即引軍回寨謂許褚徐晃二將曰吾若知此處如此險惡必不起兵來許褚曰兵已至此主公不可憚勞次日操上馬只帶許褚徐晃二人來看張衛寨柵三匹馬轉過山坡早望見張衛寨柵操揚鞭遙指謂二將曰如此堅固急切難下言未已背後一聲喊起箭如雨發楊昂楊任分兩路殺來操大驚許褚大呼曰吾當敵賊徐公明善保主公說罷提刀縱馬向前力敵二將楊昂楊任不能當許褚之勇回馬退去其餘不敢向前徐晃保著曹操奔過山坡前面又一軍到看時卻是夏侯淵張郃二將聽得喊聲故引軍殺來接應於是殺退楊昂楊任救得曹操回寨操重賞四將自此兩邊相拒五十餘日只不交戰曹操傳令退軍賈詡曰賊勢未見強弱主公何故自退耶操曰吾料賊兵每日提備急難取勝吾以退軍爲名使賊懈而無備然後分輕騎抄襲其後必勝賊矣賈詡曰丞相神機不可測也於是令夏侯淵張郃分兵兩路各引輕騎三千取小路抄陽平關後曹操一面引大軍撥寨盡起楊昂聽得曹兵退請楊任商議欲乘勢擊之楊任曰操詭計極多未知真實不可追趕楊昂曰公不往吾當自去楊任苦諫不從楊昂盡提五寨軍馬前進只留些少軍士守寨是日大霧迷漫對面不相見楊昂軍至半路不能行且權紮住卻說夏侯淵一軍抄過山後見重霧垂空又聞人語馬嘶恐有伏兵急催人馬行動大霧中誤走到楊昂寨前守寨軍士聽得馬蹄響只道是楊昂兵回開門納之曹軍一擁而入見是空寨便就寨中放起火來五寨軍士盡皆棄寨而走比及霧散楊任領兵來救與夏侯淵戰不數合背後張郃兵到楊任殺條大路奔回南鄭楊昂待要回時已被夏侯淵張郃兩個占了寨柵背後曹操大隊軍馬趕來兩下夾攻四邊無路楊昂欲突陣而出正撞著張郃兩個交手被張郃殺死敗兵回投陽平關來見張衛原來衛知二將敗走諸營已失半夜棄關奔回去了曹操遂得陽平關並諸寨張衛楊任回見張魯衛言二將失了隘口因此守關不住張魯大怒欲斬楊任任曰某曾諫楊昂休追操兵他不肯聽信故有此敗任再乞一軍前去挑戰必斬曹操如不勝甘當軍令張魯取了軍令狀楊任上馬引二萬軍離南鄭下寨卻說曹操提軍將進先令夏侯淵五千軍往南鄭路上哨探正迎著楊任軍馬兩軍擺開任遣部將昌奇出馬與淵交鋒戰不三合被淵一刀斬于馬下楊任自挺槍出馬與淵戰三十餘合不分勝負淵佯敗而走任從後追來被淵用拖刀計斬于馬下軍士大敗而回曹操知夏侯淵斬了楊任即時進兵直抵南鄭下寨張魯慌聚文武商議閻圃曰某保一人可敵曹操手下諸將魯問是誰圃曰南安龐德前隨馬超投主公後馬超往西川龐德臥病不曾行現今蒙主公恩養何不令此人去張魯大喜即召龐德至厚加賞勞點一萬軍馬今龐德出離城十餘裏與曹兵相對龐德出馬搦戰曹操在渭橋時深知龐德之勇乃囑諸將曰龐德乃西涼勇將原屬馬超今雖依張魯未稱其心吾欲得此人汝等須皆與緩鬥使其力乏然後擒之張郃先出戰了數合便退夏侯淵也戰數合退了徐晃又戰三五合也退了臨後許褚戰五十餘合亦退龐德力戰四將並無懼怯各將皆於操前誇龐德好武藝曹操心中大喜與衆將商議如何得此人投降賈詡曰某知張魯手下有一謀士楊松其人極貪賄賂今可暗以金帛送之使譖龐德于張魯便可圖矣操曰何由得人入南鄭詡曰來日交鋒詐敗佯輸棄寨而走使龐德據我寨我卻於夤夜引兵劫寨龐德必退入城卻選一能言軍士扮作彼軍雜在陣中便得入城操聽其計選一精細軍校重加賞賜付與金掩心甲一副令披在貼肉外穿漢中軍士號衣先於半路上等候次日先撥夏侯淵張郃兩枝軍遠去埋伏卻教徐晃挑戰不數合敗走龐德招軍掩殺曹兵盡退龐德卻奪了曹操寨柵見寨中糧草極多大喜即時申報張魯一面在寨中設宴慶賀當夜二更之後忽然三路火起正中是徐晃許褚左張郃右夏侯淵三路軍馬齊來劫寨龐德不及提備只得上馬沖殺出來望城而走背後三路兵追來龐德急喚開城門領兵一擁而入此時細作已雜到城中徑投楊松府下謁見具說魏公曹丞相久聞盛德特使某送金甲爲信更有密書呈上松大喜看了密書中言語謂細作曰上覆魏公但請放心某自有良策奉報打發來人先回便連夜入見張魯說龐德受了曹操賄賂賣此一陣張魯大怒喚龐德責駡欲斬之閻圃苦諫張魯曰你來日出戰不勝必斬龐德抱恨而退次日曹兵攻城龐德引兵沖出操令許褚交戰褚詐敗龐德趕來操自乘馬於山坡上喚曰龐令明何不早降龐德尋思拿住曹操抵一千員上將遂飛馬上坡一聲喊起天崩地塌連人和馬跌入陷坑內去四壁鈎索一齊上前活捉了龐德押上坡來曹操下馬叱退軍士親釋其縛問龐德肯降否龐德尋思張魯不仁情願拜降曹操親扶上馬共回大寨故意教城上望見人報張魯德與操並馬而行魯益信楊松之言爲實次日曹操三面豎立雲梯飛炮攻打張魯見其勢已極與弟張衛商議衛曰放火盡燒倉廩府庫出奔南山去守巴中可也楊松曰不如開門投降張魯猶豫不定衛曰只是燒了便行張魯曰我向本欲歸命國家而意未得達今不得已而出奔倉廩府庫國家之有不可廢也遂盡封鎖是夜二更張魯引全家老小開南山殺出曹操教休追趕提兵入南鄭見魯封閉庫藏心甚憐之遂差人往巴中勸使投降張魯欲降張衛不肯楊松以密書報操便教進兵松爲內應操得書親自引兵往巴中張魯使弟張衛領兵出敵與許褚交鋒被褚斬于馬下敗軍回報張魯魯欲堅守楊松曰今若不出坐而待斃矣某守城主公當親與決一死戰魯從之閻圃諫魯休出魯不聽遂引軍出迎未及交鋒後軍已走張魯急退背後曹兵趕來魯到城下楊松閉門不開張魯無路可走操從後追至大叫何不早降魯乃下馬投拜操大喜念其封倉庫之心優禮相待封魯爲鎮南將軍閻圃等皆封列侯於是漢中皆平曹操傳令各郡分設太守置都尉大賞士卒惟有楊松賣主求榮即命斬之于市曹示衆後人有詩曰歎曰妨賢賣主逞奇功積得金銀總是空家未榮華身受戮令人千載笑楊松曹操已得東川主薄司馬懿進曰劉備以詐力取劉璋蜀人尚未歸心今主公已得漢中益州震動可速進兵攻之勢必瓦解智者貴于乘時時不可失也曹操歎曰人苦不知足既得隴複望蜀耶劉曄曰司馬仲達之言是也若少遲緩諸葛亮明于治國而爲相關張等勇冠三軍而爲將蜀民既定據守關隘不可犯矣操曰士卒遠涉勞苦且宜存恤遂按兵不動卻說西川百姓聽說曹操已取東川料必來取西川一日之間數遍驚恐玄德請軍師商議孔明曰亮有一計曹操自退玄德問何計孔明曰曹操分軍屯合淝懼孫權也今我若分江夏長沙桂陽三郡還吳遣舌辯之士陳說利害令吳起兵襲合淝牽動其勢操必勒兵南向矣玄德問誰可爲使伊籍曰某願往玄德大喜遂作書具禮令伊籍先到荊州知會雲長然後入吳到秣陵來見孫權先通了姓名權召籍入籍見權禮畢權問曰汝到此何爲籍曰昨承諸葛子瑜取長沙等三郡爲軍師不在有失交割今傳書送還所有荊州南郡零陵本欲送還被曹操襲取東川使關將軍無容身之地今合淝空虛望君侯起兵攻之使曹操撤兵回南吾主若取了東川即還荊州全土權曰汝且全歸館舍容吾商議伊籍退出權問計于衆謀士張昭曰此是劉備恐曹操取西川故爲此謀雖然如此可因操在漢中乘勢取合淝亦是上計權從之發付伊籍回蜀去訖便議起兵攻操令魯肅收取長沙江夏桂陽三郡屯兵于陸口取呂蒙甘寧回又去餘杭取淩統回不一日呂蒙甘寧先到蒙獻策曰現今曹操令廬江太守朱光屯兵於皖城大開稻田納谷於合淝以充軍實今可先取皖城然後攻合淝權曰此計甚合吾意遂教呂蒙甘甯爲先鋒蔣欽潘璋爲合後權自引周泰陳武董襲徐盛爲中軍時程普黃蓋韓當在各處鎮守都未隨征卻說軍馬渡江取和州徑到皖城皖城太守朱光使人往合淝求救一面固守城池堅壁不出權自到城下看時城上箭如雨發射中孫權麾蓋權回寨問衆將曰如何取得皖城董襲曰可差軍士築起土山攻之徐盛曰可豎雲梯造虹橋下觀城中而攻之呂蒙曰此法皆費日月而成合淝救軍一至不可圖矣今我軍初到士氣方銳正可乘此銳氣奮力攻擊來日平明進兵午未時便當破城權從之次日五更飯畢三軍大進城上矢石齊下甘寧手執鐵鏈冒矢石而上朱光令弓弩手齊射甘甯撥開箭林一鏈打倒朱光呂蒙親自擂鼓士卒皆一擁而上亂刀砍死朱光餘衆多降得了皖城方才辰時張遼引軍至半路哨馬回報皖城已失遼即回兵歸合淝孫權入皖城淩統亦引軍到權慰勞畢大犒三軍重賞呂蒙甘甯諸將設宴慶功呂蒙遜甘甯上坐盛稱其功勞酒至半酣淩統想起甘甯殺父之仇又見呂蒙誇美之心中大怒瞪目直視良久忽撥左右所佩之劍立於筵上曰筵前無樂看吾舞劍甘寧知其意推開果桌起身兩手取兩枝戟挾定縱步出曰看我筵前使戟呂蒙見二人各無好意便一手挽牌一手提刀立於其中曰二公雖能皆不如我巧也說罷舞起刀牌將二人分於兩下早有人報知孫權權慌跨馬直至筵前衆見權至方各放下軍器權曰吾常言二人休念舊仇今日又何如此淩統哭拜於地孫權再三勸止至次日起兵進取合淝三軍盡發張遼爲失了皖城回到合淝心中愁悶忽曹操差薛悌送木匣一個上有操封傍書雲賊來乃發是日報說孫權自引十萬大軍來攻合淝張遼便開匣觀之內書雲若孫權至張李二將軍出戰樂將軍守城張遼將教帖與李典樂進觀之樂進曰將軍之意若何張遼曰主公遠征在外吳兵以爲破我必矣今可發兵出迎奮力與戰折其鋒銳以安衆心然後可守也李典素與張遼不睦聞遼此言默然不答樂進見李典不語便道賊衆我寡難以迎敵不如堅守張遼曰公等皆是私意不顧公事吾今自出迎敵決一死戰便教左右備馬李典慨然而起曰將軍如此典豈敢以私憾而忘公事乎願聽指揮張遼大喜曰既曼成肯相助來日引一軍於逍遙津北埋伏待吳兵殺過來可先斷小師橋吾與樂文謙擊之李典領命自去點軍埋伏卻說孫權令呂蒙甘寧爲前隊自與淩統居中其餘諸將陸續進發望合淝殺來呂蒙甘寧前隊兵進正與樂進相迎甘甯出馬與樂進交鋒戰不數合樂進詐敗而走甘甯招呼呂蒙一齊引軍趕去孫權在第二隊聽得前軍得勝催兵行至逍遙津北忽聞連珠炮響左邊張遼一軍殺來右邊李典一軍殺來孫權大驚急令人喚呂蒙甘甯回救時張遼兵已到淩統手下止有三百餘騎當不得曹軍勢如山倒淩統大呼曰主公何不速渡小師橋言未畢張遼引二千餘騎當先殺至淩統翻身死戰孫權縱馬上橋橋南已折丈餘並無一片板孫權驚得手足無措牙將谷利大呼曰主公可約馬退後再放馬向前跳過橋去孫權收回馬來三丈餘遠然後縱轡加鞭那馬一跳飛過橋南後人的詩曰的盧當日跳檀溪又見吳侯敗合淝退後著鞭馳駿騎逍遙津上玉龍飛孫權跳過橋南徐盛董襲駕舟相迎淩統穀利抵住張遼甘甯呂蒙引軍回救卻被樂進從後追來李典又截住廝殺吳兵折了大半淩統所領三百餘人盡被殺死統身中數槍殺到橋邊橋已拆斷繞河而逃孫權在舟中望見急令董襲棹舟接之乃得渡回呂蒙甘寧皆死命逃過河南這一陣殺得江南人人害怕聞張遼大名小兒也不敢夜啼衆將保護孫權回營權乃重賞淩統穀利收軍回濡須整頓船隻商議水陸並進一面差人回江南再起人馬來助戰卻說張遼聞孫權在濡須將欲興兵進取恐合淝兵少難以抵敵急令薛悌星夜往漢中報知曹操求請救兵操同衆官議曰此時可收西川否劉曄曰今蜀中稍定已有提備不可擊也不如撤兵去救合淝之急就下江南操乃留夏侯淵守漢中定軍山隘口留張守郃蒙頭岩等隘口其餘軍兵拔寨都起殺奔濡須塢來正是鐵騎甫能平隴右旌旄又複指江南未知勝負如何且看下文分解
