body:
  text: 第六十八回甘甯百騎劫魏營左慈擲杯戲曹操卻說孫權在濡須口收拾軍馬忽報曹操自漢中領兵四十萬前來救合淝孫權與謀士計議先撥董襲徐盛二人領五十隻大船在濡須口埋伏令陳武帶領人馬往來江岸巡哨張昭曰今曹操遠來必須先挫其銳氣權乃問帳下曰曹操遠來誰敢當先破敵以挫其稅氣淩統出曰某願往權曰帶多少軍去統曰三千人足矣甘寧曰只須百騎便可破敵何必三千淩統大怒兩個就在孫權面前爭競起來權曰曹軍勢大不可輕敵乃命淩統帶三千軍出濡須口去哨探遇曹兵便與交戰淩統領命引著三千人馬離濡須塢塵頭起處曹兵早到先鋒張遼與淩統交鋒鬥五十合不分勝敗孫權恐淩統有失令呂蒙接應回營甘甯見淩統回即告權曰寧今夜只帶一百人馬去劫曹營若折了一人一騎也不算功孫權壯之乃調撥帳下一百精銳馬兵付寧又以酒五十瓶羊肉五十斤賞賜軍士甘甯回到營中教一百人皆列坐先將銀碗斟酒自吃兩碗乃語百人曰今夜奉命劫寨請諸公各滿飲一觴努力向前衆人聞言面面相覷甘寧見衆人有難色乃撥劍在手怒叱曰我爲上將且不惜命汝等何得遲疑衆人見甘寧作色皆起拜曰願效死力甘寧將酒肉與百人共飲食盡約至二更時候取白鵝翎一百根插於盔上爲號都披甲上馬飛奔曹操寨邊拔開鹿角大喊一聲殺入寨中徑奔中軍來殺曹操原來中軍人馬以車仗伏路穿連圍得鐵桶相似不能得進甘寧只將百騎左沖右突曹兵驚慌正不知敵兵多少自相擾亂那甘寧百騎在營內縱橫馳驟逢著便殺各營鼓躁舉火如星喊聲大震甘甯從寨之南門殺出無人敢當孫權令周泰引一枝兵來接應甘寧將百騎回到濡須操兵恐有埋伏不敢追襲後人有詩贊曰鼙鼓聲喧震地來吳師到處鬼神哀百翎直貫曹家寨盡說甘甯虎將才甘寧引百騎到寨不折一人一騎至營門令百人皆擊鼓吹笛口稱萬歲歡聲大震孫權自來迎接甘寧下馬拜伏權扶起攜寧手曰將軍此去足使老賊驚駭非孤相舍正欲觀卿膽耳即賜絹千匹利刀百口寧拜受訖遂分賞百人權語諸將曰孟德有張遼孤有甘興霸足以相敵也次日張遼引兵搦戰淩統見甘甯有功奮然曰統願敵張遼權許之統遂領兵五千離濡須權自引甘寧臨陣觀戰對陣圓處張遼出馬左有李典右有樂進淩統縱馬提刀出至陣前張遼使樂進出迎兩個鬥到五十合未分勝敗曹操聞知親自策馬到門旗下來看見二將酣鬥乃令曹休暗放冷箭曹休便閃到張遼背後開弓一箭正中淩統坐下馬那馬直立起來把淩統掀翻在地樂進連忙持槍來刺槍還未到只聽得弓弦響處一箭射中樂進面門翻身落馬兩軍齊出各救一將回營鳴金罷戰淩統回寨中拜謝孫權權曰放箭救你者甘寧也淩統乃頓首拜寧曰不想公能如此垂恩自此與甘寧結爲生死之交再不爲惡且說曹操見樂進中箭令自到帳中調治次日分兵五路來襲濡須操自領中路左一路張遼二路李典右一路徐晃二路龐德每路各帶一萬人馬殺奔江邊來時董襲徐盛二將在樓船上見五路軍馬到來諸軍各有懼色徐盛曰食君之祿忠君之事何懼哉遂引猛士數百人用小船渡過江邊殺入李典軍中去了董襲在船上令衆軍擂鼓呐喊助威忽然江上猛風大作白浪掀天波濤洶湧軍士見大船將覆爭下腳艦逃命董襲仗劍大喝曰將受君命在此防賊怎能棄船而去立斬下船軍士十余人須臾風急船覆董襲竟死于江口水中徐盛在李典軍中往來衝突卻說陳武聽得江邊廝殺引一軍來正與龐德相遇兩軍混戰孫權在濡須塢中聽得曹兵殺到江邊親自與周泰引軍前來助戰正見徐盛在李典軍中攪做一團廝殺便麾軍殺入接應卻被張遼徐晃兩枝軍把孫權困在垓心曹操上高阜處看見孫權被圍急令許褚縱馬持刀殺入軍中把孫權軍沖作兩段彼此不能相救卻說周泰從軍中殺出到江邊不見孫權勒回馬從外又殺入陣中問本部軍主公何在軍人以手指兵馬厚處曰主公被圍甚急周泰挺身殺入尋見孫權泰曰主公可隨泰殺出於是泰在前權在後奮力衝突泰到江邊回頭又不見孫權乃複翻身殺入圍中又尋見孫權權曰弓弩齊發不能得出如何泰曰主公在前某在後可以出圍孫權乃縱馬前行周泰左右遮護身被數槍箭透重鎧救得孫權到江邊呂蒙引一枝水軍前來接應下船權曰吾虧周泰三番衝殺得脫重圍但徐盛在垓心如何得脫周泰曰吾再救去遂輪槍複翻身殺入重圍之中救出徐盛二將各帶重傷呂蒙教軍士亂箭射住岸上兵救二將下船卻說陳武與龐德大戰後面又無應兵被龐德趕到峪口樹林叢密陳武再欲回身交戰被樹株抓住袍袖不能迎敵爲龐德所殺曹操見孫權走脫了自策馬驅兵趕到江邊對射呂蒙箭盡正慌間忽對江一宗船到爲首一員大將乃是孫策女婿陸遜自引十萬兵到一陣射退曹兵乘勢登岸追殺曹兵複奪戰馬數千匹曹兵傷者不計其數大敗而回於亂軍中尋見陳武屍首孫權知陳武已亡董襲又沈江而死哀痛至切令人入水中尋見董襲屍首與陳武屍一齊厚葬之又感周泰救護之功設宴款之權親自把盞撫其背淚流滿面曰卿兩番相救不惜性命被槍數十膚如刻畫孤亦何心不待卿以骨肉之恩委卿以兵馬之重乎卿乃孤之功臣孤當與卿共榮辱同休戚也言罷令周泰解衣與衆觀之皮肉肌膚如同刀剜盤根遍體孫權手指其痕一一問之周泰具言戰鬥被傷之狀一處傷令吃一觥酒是日周泰大醉權以青羅傘賜之令出入張蓋以爲顯耀權在濡須與操相拒月餘不能取勝張昭顧雍上言曹操勢大不可力取若與久戰大損士卒不若求和安民爲上孫權從其言令步騭往曹營求和許年納歲貢操見江南急未可下乃從之令孫權先撤人馬吾然後班師步騭回覆權只留蔣欽周泰守濡須口盡發大兵上船回秣陵操留曹仁張遼屯合淝班師回許昌文武衆官皆議立曹操爲魏王尚書崔琰力言不可衆官曰汝獨不見荀文若乎琰大怒曰時乎時乎會當有變任自爲之有與琰不和者告知操操大怒收琰下獄問之琰虎目虯髯只是大罵曹操欺君奸賊廷尉白操操令杖殺崔琰在獄中後人有詩贊曰清河崔琰天性堅剛虯髯虎目鐵石心腸奸邪辟易聲節顯昂忠於漢主千古名揚建安二十一年夏五月群臣表奏獻帝頌魏公曹操功德極天際地伊周莫及宜進爵爲王獻帝即令鍾繇草詔冊立曹操爲魏王曹操假意上書三辭詔三報不許操乃拜命受魏王之爵冕十二旒乘金根車駕六馬用天子車服鑾儀出警入蹕于鄴郡蓋魏王宮議立世子操大妻丁夫人無出妾劉氏生子曹昂因征張繡時死于宛城卞氏所生四子長曰丕次曰彰三曰植四曰熊於是黜丁夫人而立卞氏爲魏王后第三子曹植字子建極聰明舉筆成章操欲立之爲後嗣長子曹丕恐不得立乃問計于中大夫賈詡詡教如此如此自是但凡操出征諸子送行曹植乃稱述功德發言成章惟曹丕辭父只是流涕而拜左右皆感傷於是操疑植乖巧誠心不及丕也丕又使人買囑近待皆言丕之德操欲立後嗣躊躇不定乃問賈詡曰孤欲立後嗣當立誰賈詡不答操問其故詡曰正有所思故不能即答耳操曰何所思詡對曰思袁本初劉景升父子也操大笑遂立長子曹丕爲王世子冬十月魏王宮成差人往各處收取奇花異果栽植後苑有使者到吳地見了孫權傳魏王令旨再往溫州取柑子時孫權正尊讓魏王便令人於本城選了大柑子四十餘擔星夜送往鄴郡至中途挑擔役夫疲困歇於山腳下見一先生眇一目跛一足頭戴白藤冠身穿青懶衣來與腳夫作禮言曰你等挑擔勞苦貧道都替你挑一肩何如衆人大喜於是先生每擔各挑五裏但是先生挑過的擔兒都輕了衆皆驚疑先生臨去與領柑子官說貧道乃魏王鄉中故人姓左名慈字元放道號烏角先生如你到鄴郡可說左慈申意遂拂袖而去取柑人至鄴郡見操呈上柑子操親剖之但只空殼內並無肉操大驚問取柑人取柑人以左慈之事對操未肯信門吏忽報有一先生自稱左慈求見大王操召入取柑人曰此正途中所見之人操叱之曰汝以何妖術攝吾佳果慈笑曰豈有此事取柑剖之內皆有肉其味甚甜但操自剖者皆空殼操愈驚乃賜左慈坐而問之慈索酒肉操令與之飲酒五鬥不醉肉食全羊不飽操問曰汝有何術以至於此慈曰貧道于西川嘉陵峨嵋山中學道三十年忽聞石壁中有聲呼我之名及視不見如此者數日忽有天雷震碎石壁得天書三卷名曰遁甲天書上卷名天遁中卷名地遁下卷名人遁天遁能騰雲跨風飛升太虛地遁能穿山透石人遁能去遊四海藏形變身飛劍擲刀取人首級大王位極人臣何不退步跟貧道往峨嵋山中修行當以三卷天書相授操曰我亦久思急流勇退奈朝廷未得其人耳慈笑曰益州劉玄德乃帝室之胄何不讓此位與之不然貧道當飛劍取汝之頭也操大怒曰此正是劉備細作喝左右拿下慈大笑不止操令十數獄卒捉下拷之獄卒著力痛打看左慈時卻齁齁熟睡全無痛楚操怒命取大枷鐵釘釘了鐵鎖鎖了送入牢中監收令人看守只見枷鎖盡落左慈臥於地上並無傷損連監禁七日不與飲食及看時慈端坐於地上面皮轉紅獄卒報知曹操操取出問之慈曰我數十年不食亦不妨日食千羊亦能盡操無可奈何是日諸官皆至王宮大宴正行酒間左慈足穿木履立於筵前衆官驚怪左慈曰大王今日水陸俱備大宴群臣四方異物極多內中欠少何物貧道願取之操曰我要龍肝作羹汝能取否慈曰有何難哉取墨筆於粉牆上畫一條龍以袍袖一拂龍腹自開左慈于龍腹中提出龍肝一副鮮血尚流操不信叱之曰汝先藏於袖中耳慈曰即今天寒草木枯死大王要甚好花隨意所欲操曰吾只要牡丹花慈曰易耳令取大花盆放筵前以水噀之頃刻發出牡丹一株開放雙花衆官大驚邀慈同坐而食少刻庖人進魚膾慈曰膾必松江鱸魚者方美操曰千里之隔安能取之慈曰此亦何難取教把釣竿來於堂下魚池中釣之頃刻釣出數十尾大鱸魚放在殿上操曰吾池中原有此魚慈曰大王何相欺耶天下鱸魚只兩腮惟松江鱸魚有四腮此可辯也衆官視之果是四腮慈曰烹松江鱸魚須紫芽姜方可操曰汝亦能取之否慈曰易耳令取金盆一個慈以衣覆之須臾得紫芽姜滿盆進上操前操以手取之忽盆內有書一本題曰孟德新書操取視之一字不差操大疑慈取桌上玉杯滿斟佳釀進操曰大王可飲此酒壽有千年操曰汝可先飲慈遂拔冠上玉簪於杯中一畫將酒分爲兩半自飲一半將一半奉操操叱之慈擲杯於空中化成一白鳩繞殿而飛衆官仰面視之左慈不知所往左右忽報左慈出宮門去了操曰如此妖人必當除之否則必將爲害遂命許褚引三百鐵甲軍追擒之褚上馬引軍趕至城門望見左慈穿木履在前慢步而行褚飛馬追之卻只追不上直趕到一山中有牧羊小童趕著一群羊而來慈走入羊群內褚取箭射之慈即不見褚盡殺群羊而回牧羊小童守羊而哭忽見羊頭在地上作人言喚小童曰汝可將羊頭都湊在死羊腔之上小童大驚掩面而走忽聞有人在後呼曰不須驚走還汝活羊小童回顧見左慈已將地上死羊湊活趕將來了小童急欲問時左慈已拂袖而去其行如飛倏忽不見了小童歸告主人主人不敢隱諱報知曹操操畫影圖形各處捉拿左慈三日之內城裏城外所捉眇一目跛一足白藤冠青懶衣穿術履先生都一般模樣者有三四百個哄動街市操令衆將將豬羊血潑之押送城南教場曹操親自引甲兵五百人圍住盡皆斬之人人頸腔內各起一道青氣到上天聚成一處化成一個左慈向空招白鶴一隻騎坐拍手大笑曰土鼠隨金虎奸雄一旦休操令衆將以弓箭射之忽然狂風大作走石揚沙所斬之屍皆跳起來手提其頭奔上演武廳來打曹操文官武將掩面驚倒各不相顧正是奸雄權勢能傾國道士仙機更異人未知曹操性命如何且看下文分解
