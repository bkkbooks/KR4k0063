body:
  text: 第六十九回卜周易管輅知機討漢賊五臣死節卻說當日曹操見黑風中群屍皆起驚倒於地須臾風定群屍皆不見左右扶操回宮驚而成疾後人有詩贊左慈曰飛步淩雲遍九州獨憑遁甲自邀遊等閒施設神仙術點悟曹瞞不轉頭曹操染病服藥無愈適太史丞許芝自許昌來見操操令芝卜易芝曰大王曾聞神卜管輅否操曰頗聞其名未知其術汝可詳言之芝曰管輅字公明平原人也容貌粗醜好酒疏狂其父曾爲琅琊即丘長輅自幼便喜仰視星辰夜不肯寐父母不能禁止常雲家雞野鵠尚自知時何況爲人在世乎與鄰兒共戲輒畫地爲天文分佈日月星辰及稍長即深明周易仰觀風角數學通神兼善相術琅琊太守單子春聞其名召輅相見時有坐客百餘人皆能言之士輅謂子春曰輅年少膽氣未堅先請美酒三升飲而後言子春奇之遂與酒三升飲畢輅問子春今欲與輅爲對者若府君四座之士耶子春曰吾自與卿旗鼓相當於是與輅講論易理輅亹亹而談言言精奧子春反覆辯難輅對答如流從曉至暮酒食不行子春及衆賓客無不歎服於是天下號爲神童後有居民郭恩者兄弟三人皆得躄疾請輅蔔之輅曰卦中有君家本墓中女鬼非君伯母即叔母也昔饑荒之年謀數升米之利推之落井以大石壓破其頭孤魂痛苦自訴於天故君兄弟有此報不可禳也郭恩等涕泣伏罪安平太守王基知輅神蔔延輅至家適信都令妻常患頭風其子又患心痛因請輅蔔之輅曰此堂之西角有二死屍一男持矛一男持弓箭頭在壁內腳在壁外持矛者主刺頭故頭痛持弓箭者主刺胸腹故心痛乃掘之入地八尺果有二棺一棺中有矛一棺中有角弓及箭木俱已朽爛輅令徙骸骨去城外十裏埋之妻與子遂無恙館陶令諸葛原遷新興太守輅往送行客言輅能覆射諸葛原不信暗取燕卵蜂窠蜘蛛三物分置三盒之中令輅蔔之卦成各寫四句於盒上其一曰含氣須變依乎宇堂雌雄以形羽翼舒張此燕卵也其二曰家室倒懸門戶衆多藏精育毒得秋乃化此蜂窠也其三曰觳觫長足吐絲成羅尋網求食利在昏夜此蜘蛛也滿座驚駭鄉中有老婦失牛求蔔之輅判曰北溪之濱七人宰烹急往追尋皮肉尚存老婦果往尋之七人於茅舍後煮食皮肉猶存婦告本郡太守劉邠捕七人罪之因問老婦曰汝何以知之婦告以管輅之神蔔劉邠不信請輅至府取印囊及山雞毛藏於盒中令蔔之輅蔔其一曰內方外圓五色成文含寶守信出則有章此印囊也其二曰岩岩有鳥錦體朱衣羽翼玄黃鳴不失晨此山雞毛也劉邠大驚遂待爲上賓一日出郊閑行見一少年耕于田中輅立道傍觀之良久問曰少年高姓貴庚答曰姓趙名顔年十九歲矣敢問先生爲誰輅曰吾管輅也吾見汝眉間有死氣三日內必死汝貌美可惜無壽趙顔回家急告其父父聞之趕上管輅哭拜於地曰請歸救吾子輅曰此乃天命也安可禳乎父告曰老夫止有此子望乞垂救趙顔亦哭求輅見其父子情切乃謂趙顔曰汝可備淨酒一瓶鹿脯一塊來日齎往南山之中大樹之下看磐石上有二人弈棋一人向南坐穿白袍其貌甚惡一人向北坐穿紅袍其貌甚美汝可乘其弈興濃時將酒及鹿脯跑進之待其飲食畢汝乃哭拜求壽必得益算矣但切勿言是吾所教老人留輅在家次日趙顔攜酒脯杯盤入南山之中約行五六裏果有二人于大松樹下磐石上著棋全然不顧趙顔跪進酒脯二人貪著棋不覺飲酒已盡趙顔哭拜於地而求壽二人大驚穿紅袍者曰此必管子之言也吾二人既受其私必須憐之穿白袍者乃于身邊取出薄籍檢看謂趙顔曰汝今年十九歲當死吾今於十字上添一九字汝壽可至九十九回見管輅教再休泄漏天機不然必致天譴穿紅者出筆添訖一陣香風過處二人化作二白鶴沖天而去趙顔歸問管輅輅曰穿紅者南斗也穿白者北斗也顔曰吾聞北斗九星何止一人輅曰散而爲九合而爲一也北斗注死南斗注生今已添注壽算子複何憂父子拜謝自此管輅恐泄天機更不輕爲人蔔此人現在平原大王欲知休咎何不召之操大喜即差人往平原召輅輅至參拜訖操令蔔之輅答曰此幻術耳何必爲憂操心安病乃漸可操令蔔天下之事輅蔔曰三八縱橫黃豬遇虎定軍之南傷折一股又令卜傳祚修短之數輅蔔曰獅子宮中以安神位王道鼎新子孫極貴操問其詳輅曰茫茫天數不可預知待後自驗操欲封輅爲太史輅曰命薄相窮不稱此職不敢受也操問其故答曰輅額無主骨眼無守睛鼻無梁柱腳無天根背無三甲腹無三壬只可泰山治鬼不能治生人也操曰汝相吾若何輅曰位極人臣又何必相再三問之輅但笑而不答操令輅遍相文武官僚輅曰皆治世之臣也操問休咎皆不肯盡言後人有詩贊曰平原神卜管公明能算南辰北斗星八卦幽微通鬼竅六爻玄奧究天庭預知相法應無壽自覺心源極有靈可惜當年奇異術後人無複授遺經操令卜東吳西蜀二處輅設卦雲東吳主亡一大將西蜀有兵犯界操不信忽合淝報來東吳陸口守將魯肅身故操大驚便差人往漢中探聽消息不數日飛報劉玄德遣張飛馬超兵屯下辨取關操大怒便欲自領大兵再入漢中令管輅蔔之輅曰大王未可妄動來春許都必有火災操見輅言累驗故不敢輕動留居鄴郡使曹洪領兵五萬往助夏侯淵張郃同守東川又差夏侯惇領兵三萬于許都來往巡警以備不虞又教長史王必總督禦林軍馬主薄司馬懿曰王必嗜酒性寬恐不堪任此職操曰王必是孤披荊棘曆艱難時相隨之人忠而且勤心如鐵石最足相當遂委王必領禦林軍馬屯于許都東華門外時有一人姓耿名紀字季行洛陽人也舊爲丞相府掾後遷侍中少府與司直韋晃甚厚見曹操進封王爵出入用天子車服心甚不平時建安二十三年春正月耿紀與韋晃密議曰操賊奸惡日甚將來必爲篡逆之事吾等爲漢臣豈可同惡相濟韋晃曰吾有心腹人姓金名禕乃漢相金日之後素有討操之心更兼與王必甚厚若得同謀大事濟矣耿紀曰他既與王必交厚豈肯與我等同謀乎韋晃曰且往說之看是如何於是二人同至金禕宅中禕接入後堂坐定晃曰德偉與王長史甚厚吾二人特來告求禕曰所求何事晃曰吾聞魏王早晚受禪將登大寶公與王長史必高遷望不相棄曲賜提攜感德非淺禕拂袖而起適從者奉茶至便將茶潑於地上晃佯驚曰德偉故人何薄情也禕曰吾與汝交厚爲汝等是漢朝臣宰之後今不思報本欲輔造反之人吾有何面目與汝爲友耿紀曰奈天數如此不得不爲耳禕大怒耿紀韋晃見禕果有忠義之心乃以實情相告曰吾等本欲討賊來求足下前言特相試耳禕曰吾累世漢臣安能從賊公等欲扶漢室有何高見晃曰雖有報國之心未有討賊之計禕曰吾欲裏應外合殺了王必奪其兵權扶助鑾輿更結劉皇叔爲外援操賊可滅矣二人聞之撫掌稱善禕曰我有心腹二人與操賊有殺父之仇現居城外可用爲羽翼耿紀問是何人禕曰太醫吉平之子長名吉邈字文然次名吉穆字思然操昔日爲董承衣帶詔事曾殺其父二子逃竄遠鄉得免於難今已潛歸許都若使相助討賊無有不從耿紀韋晃大喜金禕即使人密喚二吉須臾二人至禕具言其事二人感憤流淚怨氣沖天誓殺國賊金禕曰正月十五夜間城中大張燈火慶賞元宵耿少府韋司直你二人各領家僮殺到王必營前只看營中火起分兩路殺入殺了王必徑跟我入內請天子登五鳳樓召百官面諭討賊吉文然兄弟于城外殺入放火爲號各要揚聲叫百姓誅殺國賊截住城內救軍待天子降召招安已定便進兵殺投鄴郡擒曹操即發使齎詔召劉皇叔今日約定至其二更舉事勿似董承自取其禍五人對天說誓歃血爲盟各自歸家整頓軍馬器械臨期而行且說耿紀韋晃二人各有家僮三四百預備器械吉邈兄弟亦聚三百人口只推圍獵安排已定金禕先期來見王必言方今海宇稍安魏王威震天下今值無宵令節不可不放燈火以示太平氣象王必然其言告諭城內居民盡張燈結綵慶賞佳節至正月十五夜天色睛霽星月交輝六街三市竟放花燈真個金吾不禁玉漏無催王必與禦林諸將在營中飲宴二更以後忽聞營中呐喊人報營後火起王必慌忙出帳看時只見火光亂滾又聞喊殺連天知是營中有變急上馬出南門正遇耿紀一箭射中肩膊幾乎墜馬遂望西門而走背後有軍趕來王必著忙棄馬步行至金禕門首慌叩其門原來金禕一面使人于營中放火一面親領家僮隨後助戰只留婦女在家時家中聞王必叩門之聲只道金禕歸來禕妻從隔門便問曰王必那廝殺了麽王必大驚方悟金禕同謀徑投曹休家報知金禕耿紀等同謀反休急披挂上馬引千餘人在城中拒敵城內四下火起燒著五鳳樓帝避于深宮曹氏心腹爪牙死據營門城中但聞人叫殺盡曹賊以扶漢室原來夏侯惇奉曹操命巡警許都領三萬軍離城五裏屯紮是夜遙望見城中火起便領大軍前來圍住許都使一枝軍入城接應曹休直混殺至天明耿紀韋晃等無人相助人報金禕二吉皆被殺死耿紀韋晃奪路殺出城門正遇夏侯惇大軍圍住活捉去了手下百餘人皆被殺夏侯禕入城救滅遺火盡收五人老小宗族使人飛報曹操操傳令教將耿韋二人及五家宗族老小皆斬於市並將在朝大小百官盡行拿解鄴郡聽候發落夏侯惇押耿韋二人至市曹耿紀厲聲大叫曰曹阿瞞吾生不能殺汝死當作厲鬼以擊賊劊子以刀搠其口流血滿地大罵不絕而死韋晃以面頰頓地曰可恨可恨咬牙皆碎而死後人有詩贊曰耿紀精忠韋晃賢各持空手欲扶天誰知漢祚相將盡恨滿心胸喪九泉夏侯惇盡殺五家老小宗族將百官解赴鄴郡曹操於教場立紅旗于左白旗於右下令曰耿紀韋晃等造反放火焚許都汝等亦有出救火者亦有閉門不出者如曾救火者可立於紅旗下如不曾出救火者可立於白旗下衆官自思救火者必無罪於是多奔紅旗之下三停內只有一停立於白旗下操教盡拿立於紅旗下者衆官各言無罪操曰汝當時之心非是救火實欲助賊耳盡命牽出漳河邊斬之死者三百餘員其立於白旗下者盡皆賞賜乃令還許都時王必已被箭瘡發而死操命厚葬之令曹休總督禦林軍馬鍾繇爲相國華歆爲禦史大夫遂定侯爵六等十八級關中侯爵十七級皆金印紫綬又置關內外侯十六級銀印龜紐墨綬五大夫十五級銅印環紐墨綬定爵封官朝廷又換一班人物曹操方悟管輅火災之說遂重賞輅略不受卻說曹洪領兵到漢中令張郃夏侯淵各據險要曹洪親自進兵拒敵時張飛自與雷銅守把巴西馬超兵至下辨令吳蘭爲先鋒領軍哨出正與曹洪軍相遇吳蘭欲退牙將任夔曰賊兵初至若不先挫其銳氣何顔見孟起乎於是驟馬挺槍搦曹洪戰洪自提刀躍馬而出交鋒三合斬夔于馬下乘勢掩殺吳蘭大敗回見馬超超責之曰汝不得吾令何故輕敵致敗吳蘭曰任夔不聽吾言故有此敗馬超曰可緊守隘口勿與交鋒一面申報成都聽候行止曹洪見馬超連日不出恐有詐謀引軍退回南鄭張郃來見曹洪問曰將軍既已斬將如何退兵洪曰吾見馬超不出恐有別謀且我在鄴都聞神卜管輅有言當於此地折一員大將吾疑此言故不敢輕進張郃大笑曰將軍行兵半生今奈何信蔔者之言而惑其心哉郃雖不才願以本部兵取巴西若得巴西蜀郡易耳洪曰巴西守將張飛非比等閒不可輕敵張郃曰人皆怕張飛吾視之如小兒耳此去必擒之洪曰倘有疏失若何郃曰甘當軍令洪勒了文狀張郃進兵正是自古驕兵多致敗從來輕敵少成功未知勝負如何且看下文分解
