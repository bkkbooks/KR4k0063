body:
  text: 第七十一回占對山黃忠逸待勞據漢水趙雲寡勝衆卻說孔明分付黃忠你既要去吾教法正助你凡事計議而行吾隨後撥人馬來接應黃忠應允和法正領本部兵去了孔明告玄德曰此老將不著言語激他雖去不能成功他今既去須撥人馬前去接應乃喚趙雲將一枝人馬從小路出奇兵接應黃忠若忠勝不必出戰倘忠有失即去救應又遣劉封孟達領三千兵於山中險要去處多立旌旗以壯我兵之聲勢令敵人驚疑三人各自領兵去了又差人往下辨授計與馬超令他如此而行又差嚴顔往巴西閬中守隘替張飛魏延來同取漢中卻說張郃與夏侯尚來見夏侯淵說天蕩山已失折了夏侯德韓浩今聞劉備親自領兵來取漢中可速奏魏王早發精兵猛將前來策應夏侯淵便差人報知曹洪洪星夜前到許昌稟知曹操操大驚急聚文武商議發兵救漢中長史劉曄進曰漢中若失中原震動大王休辭勞苦必須親自征討操自悔曰恨當時不用卿言以致如此忙傳令旨起兵四十萬親征時建安二十三年秋七月也曹操兵分三路而進前部先鋒夏侯惇操自領中軍使曹休押後三軍陸續起行操騎白馬金鞍玉帶錦衣武士手執大紅羅銷傘蓋左右金瓜銀鉞鐙棒戈矛打日明龍鳳旌旗護駕龍虎官軍二萬五千公爲五隊每隊五千按青黃赤白黑五色旗幡甲馬並依本色光輝燦爛極其雄壯兵出潼關操在馬上望見一簇林木極其茂盛問近侍曰此何處也答曰此名藍田林木之間乃蔡邕莊也今邕女蔡琰與其夫董祀居此原來操素與蔡邕相善先時其女蔡琰乃衛仲道之妻後被北方擄去於北地生二子作胡笳十八拍流入中原操深憐之使人持千金入北方贖之左賢王懼操之勢送蔡琰還漢操乃以琰配與董祀爲妻當日到莊前因想起蔡邕之事令軍馬先行操引近侍百餘騎到莊門下馬時董祀出仕於外止有蔡琰在家琰聞操至忙出迎接操至堂琰起居畢侍立於側操偶見壁間懸一碑文圖軸起身觀之問于蔡琰琰答曰此乃曹峨之碑也昔和帝時上虞有一巫者名曹盱能波娑樂神五月五日醉舞舟中墮江而死其女年十四歲繞江啼哭七晝夜跳入波中後五日負父之屍浮于江面裏人葬之江邊上虞令度尚奏聞朝廷表爲孝女度尚令邯鄲淳作文鐫碑以記其事時邯鄲年方十三歲文不加點一揮而就立石墓側時人奇之妾父蔡邕聞而往觀時日已暮乃於暗中以手摸碑文而讀之索筆大書八字於其背後人鐫石並鐫此八字操讀八字雲黃絹幻婦外孫虀臼操問琰曰汝解此意否琰曰雖先人遺筆妾實不解其意操回顧從謀士曰汝等解否衆皆不能答於內一人出曰某已解其意操視之乃主薄楊修也操曰卿且勿言容吾思之遂辭了蔡琰引衆出莊上馬行三裏忽省悟笑謂修曰卿試言之修曰此隱語耳黃絹乃顔色之絲也色傍加絲是絕字幻婦者少女也女傍少字是妙字外孫乃女之子也女傍子字是好字虀臼乃受五辛之器也受傍辛字是辤字總而言之是絕妙好辭四字操大驚曰正合孤意衆皆歎羨楊修才識之敏不一日軍至南鄭曹洪接著備言張郃之事操曰非郃之罪勝負乃兵家常事耳洪曰目今劉備使黃忠攻打定軍山夏侯淵知大王兵至固守未曾出戰操曰若不出戰是示懦也便差人持節到定軍山教夏侯淵進兵劉曄諫曰淵性太剛恐中奸計操乃作手書與之使命持節到淵營淵接入使者出書淵拆視之略曰凡爲將者當以剛柔相濟不可徒恃其勇若但任勇則是一夫之敵耳吾今屯大軍于南鄭欲觀卿之妙才勿辱二字可也夏侯淵覽畢大喜打發使命回訖乃與張郃商議曰今魏王率大兵屯于南鄭以討劉備吾與汝久守此地豈能建立功業來日吾出戰務要生擒黃忠張郃曰黃忠謀勇兼備況有法正相助不可輕敵此間山路險峻只宜堅守淵曰若他人建了功勞吾與汝有何面目見魏王耶汝只守山吾去出戰遂下令曰誰敢出哨誘敵夏侯尚曰吾願往淵曰汝去出哨與黃忠交戰只宜輸不宜贏吾有妙計如此如此尚受令引三千軍離定軍山大寨前行卻說黃忠與法正兵屯於定軍山口累次挑戰夏侯淵堅守不出欲要進攻又恐山路危險難以料敵只得據守是日忽報山上曹兵下來搦戰黃忠恰待引軍出迎牙將陳式曰將軍休動某願當之忠大喜遂令陳式引軍一千出山口列陣夏侯尚兵至遂與交鋒不數合尚詐敗而走式趕去行到半路被兩山上擂木炮石打將下來不能前進正欲回時背後夏侯淵引兵突出陳式不能抵當被夏侯淵生擒回寨部卒多降有敗軍逃得性命回報黃忠說陳式被擒忠慌與法正商議正曰淵爲人輕躁恃勇少謀可激勸士卒撥寨前進步步爲營誘淵來戰而擒之此乃反客爲主之法忠用其謀將應有之物盡賞三軍歡聲滿穀願效死戰黃忠即日撥寨而進步步爲營每營住數日又進淵聞之欲出戰張郃曰此乃反客爲主之計不可出戰戰則有失淵不從令夏侯尚引千兵出戰直到黃忠寨前忠上馬提刀出迎與夏侯尚交馬只一合生擒夏侯尚歸寨余皆敗走回報夏侯淵淵急使人到黃忠寨言願將陳式來換夏侯尚忠約定來日陣前相換次日兩軍皆到山谷闊處布成陣勢黃忠夏侯淵各立馬於本陣門旗之下黃忠帶著夏侯尚夏侯淵帶著陳式各不與袍鎧只穿蔽體薄衣一聲鼓響陳式夏侯尚各望本陣奔回夏侯尚比及到陣門時被黃忠一箭射中後心尚帶箭而回淵大怒驟馬徑取黃忠忠正要激淵廝殺兩將交馬戰到二十余合曹軍內忽然鳴金收兵淵慌撥馬而回被忠乘勢殺了一陣淵回陣問押陣官爲何鳴金答曰某見山凹中有蜀兵旗幡數處恐是伏兵故急招將軍回淵信其說遂堅守不出黃忠逼到定軍山下與法正商議正以手指曰定軍山西巍然有一座高山四下皆是險道此山上足可下視定軍山之虛實將軍若取得此山定軍山只在掌中也忠仰視見山頭稍平山上有些少人馬是夜二更忠引軍士鳴金擊鼓直殺上山頂此山有夏侯淵部將杜襲守把止有數百餘人當時見黃忠大隊擁上只得棄山而走忠得了山頂正與定軍山相對法正曰將軍可守在半山某居山頂待夏侯淵兵至吾舉白旗爲號將軍卻按兵勿動待他倦怠無備吾卻舉起紅旗將軍便下山擊之以逸待勞必當取勝忠大喜從其計卻說杜襲引軍逃回見夏侯淵說黃忠奪了對山淵大怒曰黃忠占了對山不容我不出戰張郃諫曰此乃法正之謀也將軍不可出戰只宜堅守淵曰占了吾對山觀吾虛實如何不出戰郃苦諫不聽淵分軍圍住對山大罵挑戰法正在山上舉起白旗任從夏侯淵百船辱駡黃忠只不出戰午時以後法正見曹兵倦怠銳氣已墮多下馬坐息乃將紅旗招展鼓角齊鳴喊聲大震黃忠一馬當先馳下山來猶如天崩城塌之勢夏侯淵措手不及被黃忠趕到麾蓋之下大喝一聲猶如雷吼淵未及相迎黃忠寶刀已落連頭帶肩砍爲兩段後人有詩贊黃忠曰蒼頭臨大敵皓首逞神威力趁雕弓發風迎雪刃揮雄聲如虎吼駿馬似龍飛獻馘功勳重開疆展帝畿黃忠斬了夏侯淵曹兵大潰各自逃生黃忠乘勢去奪定軍山張郃領兵來迎忠與陳式兩下夾攻混殺一陣張郃敗走忽然山傍閃出一彪人馬當住去路爲首一員大將大叫常山趙子龍在此張郃大驚引敗軍奪路望定軍山而走只見前面一枝兵來迎乃杜襲也襲曰今定軍山已被劉封孟達奪了郃大驚遂與杜襲引敗兵到漢水紮營一面令人飛報曹操操聞淵死放聲大哭方悟管輅所言三八縱橫乃建安二十四年也黃豬遇虎乃歲在己亥正月也定軍之南乃定軍山之南也傷折一股乃淵與操有兄弟之親情也操令人尋管輅時不知何處去了操深恨黃忠遂親統大軍來定軍山與夏侯淵報仇令徐晃作先鋒行到漢水張郃杜襲接著曹操二將曰今定軍山已失可將米倉山糧草移於北山寨中屯積然後進兵曹操依允卻說黃忠斬了夏侯淵首級來到葭萌關上見玄德獻功玄德大喜加忠爲征西大將軍設宴慶賀忽牙將張著來報說曹操自領大軍二十萬來與夏侯淵報仇目今張郃在米倉山搬運糧草移于漢水北山腳下孔明曰今操引大兵至此恐糧草不敷故勒兵不進若得一人深入其境燒其糧草奪其輜重則操之銳氣挫矣黃忠曰老夫願當此任孔明曰操非夏侯淵之比不可輕敵玄德曰夏侯淵雖是總帥乃一勇夫耳安及張郃若斬得張郃勝斬夏侯淵十倍也忠奮然曰吾願往斬之孔明曰你可與趙子龍同領一枝兵去凡事計議而行看誰立功忠應允便行孔明就令張著爲副將同去雲謂忠曰今操引二十萬衆分屯十營將軍在主公前要去奪糧非小可之事將軍當用何策忠曰看我先去如何雲曰等我先去忠曰我是主將你是副將如何爭先雲曰我與你都一般爲主公出力何必計較我二人拈鬮拈著的先去忠依允當時黃忠拈著先去雲曰既將軍先去某當相助可約定時候如將軍依時而還某按兵不動若將軍過時而不還某即引軍來接應忠曰公言是也於是二人約定午時爲期雲回本寨謂部將張翼曰黃漢升約定明日去奪糧草若午時不回我當往助吾營前臨漢水地勢危險我若去時汝可謹守寨柵不可輕動張翼應諾卻說黃忠回到寨中謂副將張著曰我斬了夏侯淵張郃喪膽吾明日領命去劫糧草只留五百軍守營你可助吾今夜三更盡皆飽食四更離營殺到北山腳下先捉張郃後劫糧草張著依令當夜黃忠領人馬在前張著在後偷過漢水直到北山之下東方日出見糧積如山有些少軍士看守見蜀兵到盡棄而走黃忠教馬軍一齊下馬取柴堆于米糧之上正欲放火張郃兵到與忠混戰一處曹操聞知急令徐晃接應晃領兵前進將黃忠困於垓心張著引三百軍走脫正要回寨忽一枝兵撞出攔住去路爲首大將乃是文聘後面曹兵又至把張著圍住卻說趙雲在營中看看等到午時不見忠回急忙披挂上馬引三千軍向前接應臨行謂張翼曰汝可堅守營寨兩壁廂多設弓弩以爲準備翼連聲應諾雲挺槍驟馬直殺往前去迎頭一將攔路乃文聘部將慕容烈也拍馬舞刀來迎趙雲被雲手起一槍刺死曹兵敗走雲直殺入重圍又一枝兵截住爲首乃魏將焦炳雲喝問曰蜀兵何在炳曰已殺盡矣雲大怒驟馬一槍又刺死焦炳殺散餘兵直至北山之下見張郃徐晃兩人圍住黃忠軍士被困多時雲大喝一聲挺槍驟馬殺入重圍左沖右突如入無人之境那槍渾身上下若舞梨花遍體紛紛如飄瑞雪張郃徐晃心驚膽戰不敢迎敵雲救出黃忠且戰且走所到之處無人敢阻操于高處望見驚問衆將曰此將何人也有識者告曰此乃常山趙子龍也操曰昔日當陽長阪英雄尚在急傳令曰所到之處不可輕敵趙雲救了黃忠殺透重圍有軍士指曰東南上圍的必是副將張著雲不回本寨遂望東南殺來所到之處但見常山趙雲四字旗號曾在當陽長阪知其勇者互相傳說盡皆逃竄雲又救了張著曹操見雲東沖西突所向無前莫敢迎敵救了黃忠又救了張著奮然大怒自領左右將士來趕趙雲雲已殺回本寨部將張翼接著望見後面塵起知是曹兵追來即謂雲曰追兵漸近可令軍士閉上寨門上敵樓防護雲喝曰休閉寨門汝豈不知吾昔在當陽長阪時單槍匹馬覰曹兵八十三萬如草芥今有軍有將又何懼哉遂撥弓弩手於寨外壕中埋伏將營內旗槍盡皆倒偃金鼓不鳴雲匹馬單槍立于營門之外卻說張郃徐晃領兵追至蜀寨天色已暮見寨中偃旗息鼓又見趙雲匹馬單槍立于營外寨門大開二將不敢前進正疑之間曹操親到急催督衆軍向前衆軍聽令大喊一聲殺奔營前見趙雲全然不動曹兵翻身就回趙雲把槍一招壕中弓弩齊發時天色昏黑正不知蜀兵多少操先撥回馬走只聽得後面喊聲大震鼓角齊鳴蜀兵趕來曹兵自相踐踏擁到漢水河邊落水死者不知其數趙雲黃忠張著各引兵一枝追殺甚急操正奔走間忽劉封孟達率二枝兵從米倉山路殺來放火燒糧草操棄了北山糧草忙回南鄭徐晃張郃紮腳不住亦棄本寨而走趙雲占了曹寨黃忠奪了糧草漢水所得軍器無數大獲勝捷差人去報玄德玄德遂同孔明前至漢水問趙雲的部卒曰子龍如何廝殺軍士將子龍救黃忠拒漢水之事細述一遍玄德大喜看了山前山後險峻之路欣然謂孔明曰子龍一身都是膽也後人有詩贊曰昔日戰長阪威風猶未減突陣顯英雄被圍施勇敢鬼哭與神號天驚並地慘常山趙子龍一身都是膽於是玄德號子龍爲虎威將軍大勞將士歡宴至晚忽報曹操複遣大軍從斜穀小路而進來取漢水玄德笑曰操此來無能爲也我料必得漢水矣乃率兵于漢水之西以迎之曹操命徐晃爲先鋒前來決戰帳前一人出曰某深知地理願助徐將軍同去破蜀操視之乃巴西宕渠人也姓王名平字子均現充牙門將軍操大喜遂命王平爲副先鋒相助徐晃操屯兵於定軍山北徐晃王平引軍至漢水晃令前軍渡水列陣平曰軍若渡水倘要急退如之奈何晃曰昔韓信背水爲陣所謂致之死地而後生也平曰不然昔者韓信料敵人無謀而用此計今將軍能料趙雲黃忠之意否晃曰汝可引步軍拒敵看我引馬軍破之遂令搭起浮橋隨即過河來戰蜀兵正是魏人妄意宗韓信蜀相那知是子房預知後事如何且看下回分解
