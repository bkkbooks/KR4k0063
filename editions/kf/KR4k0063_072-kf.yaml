body:
  text: 第七十二回諸葛亮智取漢中曹阿瞞兵退斜穀卻說徐晃引軍渡漢水王平苦諫不聽渡過漢水紮營黃忠趙雲告玄德曰某等各引本部兵去迎曹兵玄德應允二人引兵而行忠謂雲曰今徐晃恃勇而來且休與敵待日暮兵疲你我分兵兩路擊之可也雲然之各引一軍據住寨柵徐晃引兵從辰時搦戰直至申時蜀兵不動晃盡教弓弩手向前望蜀營射去黃忠謂趙雲曰徐晃令弓弩手射者其軍必將退也可乘時擊之言未已忽報曹兵後隊果然退動於是蜀營鼓聲大震黃忠領兵左出趙雲領兵右出兩下夾攻徐晃大敗軍士逼入漢水死者無數晃死戰得脫回營責王平曰汝見吾軍勢將危如何不救平曰我若來救此寨亦不能保我曾諫公休去公不肯聽以致此敗晃大怒欲殺王平平當夜引本部軍就營中放起火來曹兵大亂徐晃棄營而走王平渡漢水來投趙雲雲引見玄德王平盡言漢水地理玄德大喜曰孤得王子均取漢中無疑矣遂命王平爲偏將軍領向導使卻說徐晃逃回見操說王平反去降劉備矣操大怒親統大軍來奪漢水寨柵趙雲恐孤軍難立遂退于漢水之西兩軍隔水相拒玄德與孔明來觀形勢孔明見漢水上流頭有一帶土山可伏千餘人乃回到營中喚趙雲分付汝可引五百人皆帶鼓角伏于土山之下或半夜或黃昏只聽我營中炮響炮響一番擂鼓一番只不要出戰子龍受計去了孔明卻在高山上暗窺次日曹兵到來搦戰蜀營中一人不出弓弩亦都不發曹兵自回當夜更深孔明見曹營燈火方息軍土歇定遂放號炮子龍聽得令鼓角齊鳴曹兵驚慌只疑劫寨及至出寨不見一軍方才回營欲歇號炮又響鼓角又鳴呐喊震地山谷應聲曹兵徹夜不安一連三夜如此驚疑操心怯撥寨退三十裏就空闊處紮營孔明笑曰曹操雖知兵法不知詭計遂請玄德親渡漢水背水結營玄德問計孔明曰可如此如此曹操見玄德背水下寨心中疑惑使人來下戰書孔明批來日決戰次日兩軍會于中路五界山前列成陣勢操出馬立於門旗下兩行布列龍鳳旌旗擂鼓三通喚玄德答話玄德引劉封孟達並川中諸將而出操揚鞭大罵曰劉備忘恩失義反判朝廷之賊玄德曰吾乃大漢宗親奉詔討賊汝上弑母后自立爲王僭用天子鑾輿非反而何操怒命徐晃出馬來戰劉封出迎交戰之時玄德先走入陣封敵晃不住撥馬便走操下令捉得劉備便爲西川之主大軍齊呐喊殺過陣來蜀兵望漢水而逃盡棄營寨馬匹軍器材丟滿道上曹軍皆爭取操急鳴金收軍衆將曰某等正待捉劉備大王何故收軍操曰吾見蜀兵背漢水安營其可疑一也多棄馬匹軍器其可疑二也可急退軍休取衣物遂下令曰妄取一物者立斬火速退兵曹兵方回頭時孔明號旗舉起玄德中軍領兵便出黃忠左邊殺來趙雲右邊殺來曹兵大潰而逃孔明連夜追趕操傳令軍回南鄭只見五路火起原來魏延張飛得嚴顔代守閬中分兵殺來先得了南鄭操心驚望陽平關而走玄德大兵追至南鄭褒州安民已畢玄德問孔明曰曹操此來何敗之速也孔明曰操平生爲人多疑雖能用兵疑則多敗吾以疑兵勝之玄德曰今操退守陽平關其勢已孤先生將何策以退之孔明曰亮已算定了便差張飛魏延分兵兩路去截曹操糧道令黃忠趙雲分兵兩路去放火燒山四路軍將各引向導官軍去了卻說曹操退守陽平關令軍哨探回報曰今蜀兵將遠近小路盡皆塞斷砍柴去處盡放火燒絕不知兵在何處操正疑惑間又報張飛魏延分兵劫糧操問曰誰敢敵張飛許褚曰某願往操令許褚引一千精兵去陽平關路上護接糧草解糧官接著喜曰若非將軍到此糧不得到陽平關矣遂將車上的酒肉獻與許褚褚痛飲不覺大醉便乘酒興催糧車行解糧官曰日已暮矣前褒州之地山勢險惡未可過去褚曰吾有萬夫之勇豈懼他人哉今夜乘著月色正好使糧車行走許褚當先橫刀縱馬引軍前進二更已後往褒州路上而來行到半路忽山凹裏鼓角震天一枝軍當住爲首大將乃張飛也挺矛縱馬直取許褚褚舞刀來迎卻因酒醉敵不住張飛戰不數合被飛一矛刺中肩膀翻身落馬軍士急忙救起退後便走張飛盡奪糧草車輛而回卻說衆將保著許褚回見曹操操令醫士療治金瘡一面親自提兵來與蜀兵決戰玄德引軍出迎兩陣對圓玄德令劉封出馬操罵曰賣履小兒常使假子拒敵吾若喚黃須兒來汝假子爲肉泥矣劉封大怒挺槍驟馬徑取曹操操令徐晃來迎封詐敗而走操引兵追趕蜀兵營中四下炮響鼓角齊鳴操恐有伏兵急教退軍曹兵自相踐踏死者極多奔回陽平關方才歇定蜀兵趕到城下東門放火西門呐喊南門放火北門擂鼓操大懼棄關而走蜀兵從後追襲操正走之間前面張飛引一枝兵截住趙雲引一枝兵從背後殺來黃忠又引兵從褒州殺來操大敗諸將保護曹操奪路而走方逃至斜穀界口前面塵頭忽起一枝兵到操曰此軍若是伏兵吾休矣及兵將近乃操次子曹彰也彰字子文少善騎射膂力過人能手格猛獸操嘗戒之曰汝不讀書而好弓馬此匹夫之勇何足貴乎彰曰大丈夫當學衛青霍去病立功沙漠長驅數十萬衆縱橫天下何能作博士耶操嘗問諸子之志彰曰好爲將操問爲將何如彰曰披堅執銳臨難不顧身先士卒賞必行罰必信操大笑建安二十三年代郡烏桓反操令彰引兵五萬討之臨行戒之曰居家爲父子受事爲君臣法不徇情爾宜深戒彰到代北身先戰陣直殺至桑幹北方皆平因聞操在陽平敗陣故來助戰操見彰至大喜曰我黃須兒來破劉備必矣遂勒兵複回于斜穀界口安營有人報知玄德言曹彰到玄德問曰誰敢去戰曹彰劉封曰某願往孟達又說要去玄德曰汝二人同去看誰成功各引兵五千來迎劉封在先孟達在後曹彰出馬與封交戰只三合封大敗而回孟達引兵前進方欲交鋒只見曹兵大亂原來馬超吳蘭兩軍殺來曹兵驚動孟達引兵夾攻馬超士卒畜銳日久到此耀武揚威勢不可當曹兵敗走曹彰正遇吳蘭兩個交鋒不數合曹彰一戟刺吳蘭于馬下三軍混戰操收兵于斜穀界口紮住操屯兵日久欲要進兵又被馬超拒守欲收兵回又恐被蜀兵恥笑心中猶豫不決適庖官進雞湯操見碗中有雞肋因而有感於懷正沈吟間夏侯惇入帳稟請夜間口號操隨口曰雞肋雞肋惇傳令衆官都稱雞肋行軍主薄楊修見傳雞肋二字便教隨行軍士各收拾行裝準備歸程有人報知夏侯惇惇大驚遂請楊修至帳中問曰公何收拾行裝修曰以今夜號令便知魏王不日將退兵歸也雞肋者食之無肉棄之有味今進不能勝退恐人笑在此無益不如早歸來日魏王必班師矣故先收拾行裝免得臨行慌亂夏侯惇曰公真知魏王肺腑也遂亦收拾行裝於是寨中諸將無不準備歸計當夜曹操心亂不能穩睡遂手提鋼斧繞寨私行只見夏侯惇寨內軍士各準備行裝操大驚急回帳召惇問其故惇曰主薄楊德祖先知大王欲歸之意操喚楊修問之修以雞肋之意對操大怒曰汝怎敢造言亂我軍心喝刀斧手推出斬之將首級號令於轅門外原來楊修爲人恃才放曠數犯曹操之忌操嘗造花園一所造成操往觀之不置褒貶只取筆於門上書一活字而去人皆不曉其意修曰門內添活字乃闊字也丞相賺園門闊耳於是再築牆圍改造停當又請操觀之操大喜問曰誰知吾意左右曰楊修也操雖稱美心甚忌之又一是塞北送酥一盒至操自寫一合酥三字於盒上置之案頭修入見之竟取匙與衆分食訖操問其故修答曰盒上明書一人一口酥豈敢違丞相之命乎操雖喜笑而心惡之操恐人暗中謀害己身常分付左右吾夢中好殺人凡吾睡著汝等切勿近前一日晝寢帳中落被於地一近侍慌取覆蓋操躍起撥劍斬之複上床睡半響而起佯驚問何人殺吾近侍衆以實對操痛哭命厚葬之人皆認爲操果夢中殺人惟修知其意臨葬時指而歎曰丞相非在夢中君乃在夢中耳操聞而愈惡之操第三子曹植愛修之才常邀修談論終夜不息操與衆商議欲立植爲世子曹丕知之密請朝歌長吳質入內府商議因恐有人知覺乃用大簏藏吳質於中只說是絹匹在內載入府中修知其事徑來告操操令人於丕府門伺察之丕慌告吳質質曰無憂也明日用大簏裝絹再入以惑之丕如其言以大簏載絹入使者搜看簏中果絹也回報曹操操困疑修譖害曹丕愈惡之操欲試曹丕曹植之才幹一日令各出鄴城門卻密使人分付門吏令勿放出曹丕先至門吏阻之丕只得退回植聞之問于修修曰君奉王命而出如有阻當者竟斬之可也植然其言及至門門吏阻住植叱曰吾奉王命誰敢阻當立斬之於是曹操以植爲能後有人告操曰此乃楊修之所教也操大怒因此亦不喜植修又嘗爲曹植作答教十餘條但操有問植即依條答之操每以軍國之事問植植對答如流操心中甚疑後曹丕暗買植左右偷答教來告操操見了大怒曰匹夫安敢欺我耶此時已有殺修之心今乃借惑亂軍心之罪殺之修死年三十四歲後人有詩曰聰明楊德祖世代繼簪纓筆下龍蛇走胸中錦繡成開談驚四座捷對冠群英身死因才誤非關欲退兵曹操既殺楊修佯怒夏侯惇亦欲斬之衆官告免操乃叱退夏侯惇下令來日進兵次日兵出斜穀界口前面一軍相迎爲首大將乃魏延也操招魏延歸降延大罵操令龐德出戰二將正鬥間曹寨內火起人報馬超劫了中後二寨操撥劍在手曰諸將退後者斬衆將努力向前魏延詐敗而走操方麾軍回戰馬超自立馬于高阜處看兩軍爭戰忽一彪軍撞至面前大叫魏延在此拈弓搭箭射中曹操操翻身落馬延棄弓綽刀驟馬上山坡來殺曹操刺斜裏閃出一將大叫休傷吾主視之乃龐德也德奮力向前戰退魏延保操前行馬超已退操帶傷歸寨原來被魏延射中人中折卻門牙兩個急令醫士調治方憶楊修之言隨將修屍收回厚葬就令班師卻教龐德斷後操臥于氈車之中左右虎賁軍護衛而行忽報斜穀山上兩邊火起伏兵趕來曹兵人人驚恐正是依稀昔日潼關厄仿佛當年赤壁危未知曹操性命如何且看下文分解
