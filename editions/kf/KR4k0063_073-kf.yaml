body:
  text: 第七十三回玄德進位漢中王雲長攻拔襄陽郡卻說曹操退兵至斜谷孔明料他必棄漢中而走故差馬超等諸將分兵十數路不時攻劫因此操不能久住又被魏延射了一箭急急班師三軍銳氣墮盡前隊才行兩下火起乃是馬超伏兵追趕曹兵人人喪膽操令軍士急行曉夜奔走無停直至京兆方始安心且說玄德命劉封孟達王平等攻取上庸諸郡申耽等聞操已棄漢中而走遂皆投降玄德安民已定大賞三軍人心大悅於是衆將皆有推尊玄德爲帝之心未敢徑啓卻來稟告諸葛軍師孔明曰吾意已有定奪了隨引法正等入見玄德曰今曹操專權百姓無主主公仁義著於天下今撫有兩川之地可以應天順人即皇帝位名正言順以討國賊事不宜遲便請擇吉玄德大驚曰軍師之言差矣劉備雖然漢之宗室乃臣子也若爲此事是反漢矣孔明曰非也方今天下分崩英雄並起各霸一方四海才德之士舍死亡生而事其上者皆欲攀龍附鳳建立功名也今主公避嫌守義恐失衆人之望願主公熟思之玄德曰要吾僭居尊位吾必不敢可再商議長策諸將齊言曰主公若只推卻衆心解矣孔明曰主公平生以義爲本未肯便稱尊號今有荊襄兩川之地可暫爲漢中王玄德曰汝等雖欲尊吾爲王不得天子明詔是僭也孔明曰今宜從權不可拘執常理張飛大叫曰異姓之人皆欲爲君何況哥哥乃漢朝宗派莫說漢中王就稱皇帝有何不可玄德叱曰汝勿多言孔明曰主公宜從權變先進位漢中王然後表奏天子未爲遲也玄德再三推辭不過只得依允建安二十四年秋七月築壇于沔陽方圓九裏分佈五方各設旌旗儀仗群臣皆依次序排列許靖法正請玄德登壇進冠冕璽綬訖面南而坐受文武官員拜賀爲漢中王子劉禪立爲王世子封許靖爲太傅法正爲尚書令諸葛亮爲軍師總理軍國重事封關羽張飛趙雲馬超黃忠爲五虎大將魏延爲漢中太守其餘各擬功勳定爵玄德既爲漢中王遂修表一道差人齎赴許都表曰備以具臣之才荷上將之任總督三軍奉辭於外不能掃除寇難靖匡王室久使陛下聖教陵遲六合之內而未泰惟憂反側痰如疾首曩者董卓僞爲亂階自是之後群凶縱橫殘剝海內賴陛下聖德威臨人臣同應或忠義奮討或上天降罰暴逆並殪以漸冰消惟獨曹操久未梟除侵擅國權恣心極亂臣昔與車騎將軍董承圖謀討操機事不密承見陷害臣播越失據忠義不果遂得使操窮凶極逆主後戮殺皇子鴆害雖糾合同盟念在奮力懦弱不武歷年未效常恐殞沒辜負國恩寤寐永歎夕惕若厲今臣群僚以爲在昔虞書敦敘九族庶明勵翼帝王相傳此道不廢周監二代並建諸姬實賴晉鄭夾輔之力高祖龍興尊王子弟大啓九國卒斬諸呂以安大宗今操惡直醜正實繁有徒包藏禍心篡盜已顯既宗室微弱帝族無位斟酌古式依假權宜上臣爲大司馬漢中王臣伏自三省受國厚恩荷任一方陳力未效所獲已過不宜複忝高位以重罪謗群僚見逼迫臣以義臣退惟寇賊不梟國難未已宗廟傾危社稷將墜誠臣憂心碎首之日若應權通變以寧靜聖朝雖赴水火所不得辭輒順衆議拜受印璽以崇國威仰惟爵號位高寵厚俯思報效憂深責重驚怖惕息如臨于穀敢不盡力輸誠獎勵六師率齊群義應天順時以寧社稷謹拜表以聞表到許都曹操在鄴郡聞知玄德自立漢中王大怒曰織席小兒安敢如此吾誓滅之即時傳令盡起傾國之兵赴兩川與漢中王決雌雄一人出班諫曰大王不可因一時之怒親勞車駕遠征臣有一計不須張弓只箭令劉備在蜀自受其禍待其兵衰力盡只須一將往征之便可成功操視其人乃司馬懿也操喜問曰仲達有何高見懿曰江東孫權以妹嫁劉備而又乘間竊取回去劉備又據占荊州不還彼此俱有切齒之恨今可差一舌辯之士齎書往說孫權使興兵取荊州劉備必發兩川之兵以救荊州那時大王興兵去取漢川令劉備首尾不能相救勢必危矣操大喜即修書令滿寵爲使星夜投江東來見孫權權知滿寵到遂與謀士商議張昭進曰魏與吳本無仇前因聽諸葛之說詞致兩家連年征戰不息生靈遭其塗炭今滿伯甯來必有講和之意可以禮接之權依其言令衆謀士接滿寵入城相見禮畢權以賓禮待龐龐呈上操書曰吳魏自來無仇皆因劉備之故致生釁隙魏王差某到此約將軍攻取荊州魏王以兵臨漢川首尾夾擊破劉之後共分疆土誓不相侵孫權覽書畢設筵相待滿龐送歸館舍安歇權與衆謀士商議顧雍曰雖是說詞其中有理今可一面送滿龐回約會曹操首尾相擊一面使人過江探雲長動靜方可行事諸葛瑾曰某聞雲長自到荊州劉備娶與妻室先生一子次生一女其女尚幼未許字人某願往與主公世子求婚若雲長肯許即與雲長計議共破曹操若雲長不肯然後助曹取荊州孫權用其謀先送滿龐回許都卻遣諸葛瑾爲使投荊州來入城見雲長禮畢雲長曰子瑜此來何意瑾曰特來求結兩家之好吾主吳侯有一子甚聰明聞將軍有一女特來求親兩家結好並力破曹此誠美事請君侯思之雲長勃然大怒曰吾虎女安肯嫁犬子乎不看汝弟之面立斬汝首再休多言遂喚左右逐出瑾抱頭鼠竄回見吳侯不敢隱匿遂以實告權大怒曰何太無禮耶便喚張昭等文武官員商議取荊州之策步騭曰曹操久欲篡漢所懼者劉備也今遣使令吳興兵吞蜀此嫁禍于吳也權曰孤亦欲取荊州久矣騭曰今曹仁現屯兵于襄陽樊城又無長江之險旱路可取荊州如何不取卻令主公動兵只此便見其心主公可遣使去許都見操令曹仁旱路先起兵取荊州雲長必掣荊州之兵而取樊城若雲長一動主公可遣一將暗取荊州一舉可得矣權從其議即時遣使過江上書曹操陳說此事操大喜發付使者先回隨遣滿寵往樊城助曹仁爲參謀官商議動兵一面馳檄東吳令領兵水路接應以取荊州卻說漢中王令魏延總督軍馬守禦東川遂引百軍回成都差官起造宮庭又置館舍自成都至白水共建四百餘處館舍亭郵廣積糧草多造軍器以圖進取中原細作人探聽得曹操結連東吳欲取荊州即飛報入蜀漢中王忙請孔明商議孔明曰某已料曹操必有此謀然吳中謀士極多必教操令曹仁先興兵矣漢中王曰似此如之奈何孔明曰可差使命就送官誥與雲長令先起兵取樊城使敵軍膽寒自然瓦解矣漢中王大喜即差前司馬費詩爲使齎捧誥命投荊州來雲長出郭迎接入城至公廨禮畢雲長問曰漢中王封我何爵詩曰五虎大將之首雲長問那五虎將詩曰關張趙馬黃是也雲長怒曰翼德吾弟也孟起世代名家子龍久隨吾兄即吾弟也位與吾相並可也黃忠何等人敢與吾同列大丈夫終不與老卒爲伍遂不肯受印詩笑曰將軍差矣昔蕭何曹參與高祖同舉大事最爲親近而韓信乃楚之亡將也然信立爲王居蕭曹之上未聞蕭曹以此爲怒今漢中王雖有五虎將之封而與將軍有兄弟之義視同一體將軍即漢中王漢中王即將軍也豈與諸人等哉將軍受漢中王厚恩當與同休戚共禍福不宜計較官號高下願將軍熟思之雲長大悟乃再拜曰某之不明非足下見教幾誤大事即拜受印綬費詩方出王旨令雲長領兵取樊城雲長領命即時便差傅士仁糜芳二人爲先鋒先引一軍於荊州城外屯紮一面設宴城中款待費詩飲至二更忽報城外寨中火起雲長急披挂上馬出城看時乃是傅士仁糜芳飲酒帳後遺火燒著火炮滿營撼動把軍器糧草盡皆燒毀雲長引兵救撲至四更方才火滅雲長入城召傅士仁糜芳責之曰吾令汝二人作先鋒不曾出師先將許多軍器糧草燒毀火炮打死本部軍人如此誤事要你二人何用叱令斬之費詩告曰未曾出師先斬大將于軍不利可暫免其罪雲長怒氣不息叱二人曰吾不看費司馬之面必斬汝二人之首乃喚武士各杖四十摘去先鋒印綬罰糜芳守南郡傅士仁守公安且曰若吾得勝回來之日稍有差池二罪並罰二人滿面羞慚喏喏而去雲長便令廖化爲先鋒關平爲副將自總中軍馬良伊籍爲參謀一同征進先是有胡華之子胡班到荊州來投降關公公念其舊日相救之情甚愛之令隨費詩入川見漢中王受爵費詩辭別關公帶了胡班自回蜀中去了且說關公是日祭了帥字大旗假寐於帳中忽見一豬其大如牛渾身黑色奔入帳中徑咬雲長之足雲長大怒急拔劍斬之聲如裂帛霎然驚覺乃是一夢便覺左足陰陰疼痛心中大疑喚關平至以夢告之平對曰豬亦有龍象龍附足乃升騰之意不必疑忌雲長聚多官於帳下告以夢兆或言吉祥者或言不祥者衆論不一雲長曰吾大丈夫年近六旬即死何憾正言間蜀使至傳漢中王旨拜雲長爲前將軍假節鉞都督荊襄九郡事雲長受命訖衆官拜賀曰此足見豬龍之瑞也於是雲長坦然不疑遂起兵奔襄陽大路而來曹仁正在城中忽報雲長自領兵來仁大驚欲堅守不出副將翟元曰今魏王令將軍約會東吳取荊州今彼自來是送死也何故避之參謀滿寵諫曰吾素知雲長勇而有謀未可輕敵不如堅守乃爲上策驍將夏侯存曰此書生之言耳豈不聞水來土掩將至兵迎我軍以逸待勞自可取勝曹仁從其言令滿寵守樊城自領兵來迎雲長雲長知曹兵來喚關平廖化二將受計而往與曹兵兩陣對圓廖化出馬搦戰翟元出迎二將戰不多時化詐敗撥馬而走翟元從後追殺荊州兵退二十裏次日又來搦戰夏侯存翟元一齊出迎荊州兵又敗又追殺二十餘裏忽聽得背後喊聲大震鼓角齊鳴曹仁急命前軍速回背後關平廖化殺來曹兵大亂曹仁知是中計先掣一軍飛奔襄陽離城數裏前面繡旗招颭雲長勒馬橫刀攔住去路曹仁膽戰心驚不敢交鋒望襄陽斜路而走雲長不趕須臾夏侯存軍至見了雲長大怒便與雲長交鋒只一合被雲長砍死翟元便走被關平趕上一刀斬之乘勢追殺曹兵大半死於襄江之中曹仁退守樊城雲長得了襄陽賞軍撫民隨軍司馬王甫曰將軍一鼓而下襄陽曹兵雖然喪膽然以愚意論之今東吳呂蒙屯兵陸口常有吞併荊州之意倘率兵徑取荊州如之奈何雲長曰吾亦念及此汝便可提調此事去沿江上下或二十裏或三十裏選高阜處置一烽火臺每台用五十軍守之倘吳兵渡江夜則明火晝則舉煙爲號吾當親往擊之王甫曰糜芳傅土仁守二隘口恐不竭力必須再得一人以總督荊州雲長曰吾已差治中潘浚守之有何慮焉甫曰潘浚平生多忌而好利不可任用可差軍前都督糧料官趙累代之趙累爲人忠誠廉直若用此人萬無一失雲長曰吾素知潘浚爲人今既差定不必更改趙累現掌糧料亦是重事汝勿多疑只與我築烽火臺去王甫怏怏拜辭而行雲長令關平準備船隻渡襄江攻打樊城卻說曹仁折了二將退守樊城謂滿寵曰不聽公言兵敗將亡失卻襄陽如之奈何寵曰雲長虎將足智多謀不可輕敵只宜堅守正言間人報雲長渡江而來攻打樊城仁大驚寵曰只宜堅守部將呂常奮然曰某乞兵數千願當來軍于襄江之內寵諫曰不可呂常怒曰據汝等文官之言只宜堅守何能退敵豈不聞兵法雲軍半渡可擊今雲長軍半渡襄江何不擊之若兵臨城下將至壕邊急難抵當矣仁即與兵二千令呂常出樊城迎敵呂常來至江口只見前面繡旗開處雲長橫刀出馬呂常卻欲來迎後面衆軍見雲長神威凜凜不戰先走呂常喝止不住雲長混殺過來曹兵大敗馬步軍折其大半殘敗軍奔入樊城曹仁急差人求救使命星夜至長安將書呈上曹操言雲長破了襄陽現圍樊城甚急望撥大將前來救援曹操指班部內一人而言曰汝可去解樊城之圍其人應聲而出衆視之乃於禁也禁曰某求一將作先鋒領兵同去操又問衆人曰誰敢作先鋒一人奮然出曰某願施犬馬之勞生擒關某獻於麾下操觀之大喜正是未見東吳來伺隙先看北魏又添兵未知此人是誰且看下文分解
