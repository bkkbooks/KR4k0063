body:
  text: 第七十六回徐公明大戰沔水關雲長敗走麥城卻說糜芳聞荊州有失正無計可施忽報公安守將傅士仁至芳忙接入城問其事故士仁曰吾非不忠勢危力困不能支援我今已降東吳將軍亦不如早降芳曰吾等受漢中王厚恩安忍背之士仁曰關公去日痛恨吾二人倘一日得勝而回必無輕恕公細察之芳曰吾兄弟久事漢中王豈可一朝相背正猶豫間忽報關公遣使至接入廳上使者曰關公軍中缺糧特來南郡公安二處取白米十萬石令二將軍星夜解去軍前交割如遲立斬芳大驚顧謂傅士仁曰今荊州已被東吳所取此糧怎得過去士仁厲聲曰不必多疑遂撥劍斬來使於堂上芳驚曰公如何斬之士仁曰關公此意正要斬我二人我等安可束手受死公今不早降東吳必被關公所殺正說間忽報呂蒙兵殺至城下芳大驚乃同傅士仁出城投降蒙大喜引見孫權權重賞二人安民已畢大犒三軍時曹操在許都正與衆謀士議荊州之事忽報東吳遣使奉書至操召入使者呈上書信操拆視之書中具言吳兵將襲荊州求操夾攻雲長且囑勿泄漏使雲長有備也操與衆謀士商議主薄董昭曰今樊城被困引頸望救不如令人將書射入樊城以寬軍心且使關公知吳將襲荊州彼恐荊州有失必速退兵卻令徐晃乘勢掩殺可獲全功操從其謀一面差人催徐晃急戰一面親統大兵徑往洛陽之南陽陵坡駐紮以救曹仁卻說徐晃正坐帳中忽報魏王使至晃接入問之使曰今魏王引兵已過洛陽令將軍急戰關公以解樊城之困正說間探馬報說關平屯兵在偃城廖化屯兵在四塚前後一十二寨柵連絡不絕晃即差副將徐商呂建假著徐晃旗號前赴偃城與關平交戰晃卻自引精兵五百循沔水去襲偃城之後且說關平聞徐晃自引兵至遂提本部兵迎敵兩陣對圓關平出馬與徐商交鋒只三合商大敗而走呂建出戰五六合亦敗走平乘勝追殺二十餘裏忽報城中火起平知中計急勒兵回救偃城正遇一彪軍擺開徐晃立馬在門旗下高叫曰關平賢侄好不知死汝荊州已被東吳奪了猶然在此狂爲平大怒縱馬輪刀直取徐晃不三四合三軍喊叫偃城中火光大起平不敢戀戰殺條大路徑奔四塚寨來廖化接著化曰人言荊州已被呂蒙襲了軍心驚慌如之奈何平曰此必訛言也軍士再言者斬之馬到報說正北第一屯被徐晃領兵攻打平曰若第一屯有失諸營豈得安寧此間皆靠沔水賊兵不敢到此吾與汝同去救第一屯廖化喚部將分付曰汝等堅守營寨如有賊到即便舉火部將曰四塚寨鹿角十重雖飛鳥亦不能入何慮賊兵於是關平廖化盡起四塚寨精兵奔至第一屯住紮關平看見魏兵屯於淺山之上謂廖化曰徐晃屯兵不得地利今夜可引兵劫寨化曰將軍可分兵一半前去某當謹守本寨是夜關平引一枝兵殺入魏寨不見一人平知是計火速退時左邊徐商右邊呂建兩下夾攻平大敗回營魏兵乘勢追殺前來四面圍住關平廖化支援不住棄了第一屯徑投四塚寨來早望見寨中火起急到寨前只見皆是魏兵旗號關平等退兵忙奔樊城大路而走前面一軍攔住爲首大將乃是徐晃也平化二人奮力死戰奪路而走回到大寨來見關公曰今徐晃奪了偃城等處又兼曹操自引大軍分三路來救樊城多有人言荊州已被呂蒙襲了關公喝曰此敵人訛言以亂我軍心耳東吳呂蒙病危孺子陸孫代之不足爲慮言未畢忽報徐晃兵至公令備馬平諫曰父體未痊不可與敵公曰徐晃與吾有舊深知其能若彼不退吾先斬之以警魏將遂披挂提刀上馬奮然而出魏軍見之無不驚懼公勒馬問曰徐公明安在魏營門旗開處徐晃出馬欠身而言曰自別君侯倏忽數載不想君侯須發已蒼白矣憶昔壯年相從多蒙教誨感謝不忘今君侯英風震于華夏使故人聞之不勝歎羨茲幸得一見深慰渴懷公曰吾與公明交契深厚非比他人今何故數窮吾兒耶晃回顧衆將厲聲大叫曰若取得雲長首級者重賞千金公驚曰公明何出此言晃曰今日乃國家之事某不敢以私廢公言訖揮大斧直取關公公大怒亦揮刀迎之戰八十餘合公雖武藝絕倫終是右臂少力關平恐公有失火急鳴金公撥馬回寨忽聞四下裏喊聲大震原來是樊城曹仁聞曹操救兵至引軍殺出城來與徐晃會合兩下夾攻荊州兵大亂關公上馬引衆將急奔襄江上流頭背後魏兵追至關公急渡過襄江望襄陽而奔忽流星馬到報說荊州已被呂蒙所奪家眷被陷關公大驚不敢奔襄陽提兵投公安來探馬又報公安傅士仁已降東吳了關公大怒忽催糧人到報說公安傅士仁往南郡殺了使命招糜芳都降東吳去了關公聞言怒氣沖塞瘡口迸裂昏絕於地衆將救醒公顧謂司馬王甫曰悔不聽足下之言今日果有此事因問沿江上下何不舉火探馬答曰呂蒙使水手盡穿白衣扮作客商渡江將精兵伏於舟冓舟鹿之中先擒了守台士卒因此不得舉火公跌足歎曰吾中奸賊之謀矣有何面目見兄長耶管糧都督趙累曰今事急矣可一面差人往成都求救一面從旱路去取荊州關公依言差馬良伊籍齎文三道星夜赴成都求救一面引兵來取荊州自領前隊先行留廖化關平斷後卻說樊城圍解曹仁引衆將來見曹操泣拜請罪操曰此乃天數非汝等之罪也操重賞三軍親至四塚寨周圍閱視顧謂衆將曰荊州兵圍塹鹿角數重徐公明深入其中竟獲全功孤用兵三十餘年未敢長驅徑入敵圍公明真膽識兼優者也衆皆歎服操班師還於摩陂駐紮徐晃兵至操親出寨迎之見晃軍皆按隊伍而行並無差亂操大喜曰徐將軍真有周亞夫之風矣遂封徐晃爲平南將軍同夏侯尚守襄陽以遏關公之師操因荊州未定就屯兵於摩陂以候消息卻說關公在荊州路上進退無路謂趙累曰目今前有吳兵後有魏兵吾在其中救兵不至如之奈何累曰昔呂蒙在陸口時嘗致書君侯兩家和好共誅操賊今卻助操而襲我是背盟也君侯暫駐軍於此可差人遺書呂蒙責之看彼如何對答關公從其言遂修書遣使赴荊州來卻說呂蒙在荊州傳下號令凡荊州諸郡有隨關公出征將士之家不許吳兵攪擾按月給與糧米有患病者遣醫治療將士之家感其恩惠安堵不動忽報關公使至呂蒙出郭迎接入城以賓禮相待使者呈書與蒙蒙看畢謂來使曰蒙昔日與關將軍結好乃一已之私見今日之事乃上命差遣不得自主煩使者回報將軍善言致意遂設宴款待送歸館驛安歇於是隨征將士之家皆來問信有附家書者有口傳音信者皆言家門無恙衣食不缺使者辭別呂蒙蒙親送出城使者回見關公具道呂蒙之語並說荊州城中君侯寶眷並諸將軍屬俱各無恙供給不缺公大怒曰此奸賊之計也我生不能殺此賊死必殺之以雪吾恨喝退使者使者出寨衆將皆來探問家中之事使者具言各家安好呂蒙極其恩恤並將書信信送各將各將欣喜皆無戰心關公率兵取荊州軍行之次將士多有逃回荊州者關公愈加恨怒遂催軍前進忽然喊聲大震一彪軍攔住爲首大將乃蔣欽也勒馬挺槍大叫曰雲長何不早降關公罵曰吾乃漢將豈降賊乎拍馬舞刀直取蔣欽不三合欽敗走關公提刀追殺二十餘裏喊聲忽起左邊山谷中韓當領軍沖出右邊山谷中周泰引軍沖出蔣欽回馬複戰三路夾攻關公急撤軍回走行無數裏只見南山岡上人煙聚集一面白旗招氵菐上寫荊州土人四字衆人都叫本處人速速投降關公大怒欲上岡殺之山崦內又有兩軍撞出左邊丁奉右邊徐盛併合蔣欽等三路軍馬喊聲震地鼓角喧天將關公困在垓心手下將士漸漸消疏比及殺到黃昏關公遙望四山之上皆是荊州士兵呼兄喚弟覓子尋爺喊聲不住軍心盡變皆應聲而去關公止喝不住部從止有三百人殺至三更正東上喊聲連天乃是關平廖化分兩路兵殺入重圍救出關公關平告曰軍心亂矣必得城池暫屯以待援兵麥城雖小足可屯紮關公從之催促殘軍前至麥城分兵緊閉四門聚將士商議趙累曰此處相近上庸現有劉封孟達在彼把守可速差人往求救兵若得這枝軍馬救濟以待川兵大至軍心自安矣正議間忽報吳兵已至將城四面圍定公問曰誰敢突圍而出往上庸求救廖化曰某願往關平曰我護送汝出重圍關公即修書付廖化藏於身畔飽食上馬開門出城正遇吳將丁奉截住被關平奮力衝殺奉敗走廖化乘勢殺出重圍投上庸去了關平入城堅守不出且說劉封孟達自取上庸太守申耽率衆歸降因此漢中王加劉封爲副將軍與孟達同守上庸當日探知關公兵敗二人正議間忽報廖化至封令請入問之化曰關公兵敗現困于麥城被圍至急蜀中援兵不能旦夕即至特命某突圍而出來此求救望二將軍速起上庸之兵以救此危倘稍遲延公必陷矣封曰將軍且歇容某計議化乃至館驛安歇專候發兵劉封謂孟達曰叔父被困如之奈何達曰東吳兵精將勇且荊州九郡俱已屬彼止有麥城乃彈丸之地又聞曹操親督大軍四五十萬屯於摩陂量我等山城之衆安能敵得兩家之強兵不可輕敵封曰吾亦知之奈關公是吾叔父安忍坐視而不救乎達笑曰將軍以關公爲叔恐關公未必以將軍爲侄也某聞漢中王初嗣將軍之時關公即不悅後漢中王登位之後欲立後嗣問于孔明孔明曰此家事也問關張可矣漢中王遂遣人至荊州問關公關公以將軍乃螟蛉之子不可僭立勸漢中王遠置將軍于上庸山城之地以杜後患此事人人知之將軍豈反不知耶何今日猶沾沾以叔侄之義而欲冒險輕動乎封曰君言雖是但以何詞卻之達曰但言山城初附民心未定不敢造次興兵恐失所守封從其言次日請廖化至言此山城初附之所未能分兵相救化大驚以頭叩地曰若如此則關公休矣達曰我今即往一杯之水安能救一車薪之火乎將軍速回靜候蜀兵至可也化大慟告求劉封孟達皆拂袖而入廖化知事不諧尋思須告漢中王求救遂上馬大罵出城望成都而去卻說關公在麥城盼望上庸兵到卻不見動靜手下止有五六百人多半帶傷城中無糧甚是苦楚忽報城下一人教休放箭有話來見君侯公令放入問之乃諸葛瑾也禮畢茶罷瑾曰今奉吳侯命特來勸諭將軍自古道識時務者爲俊傑今將軍所統漢上九郡皆已屬他人矣止有孤城一區內無糧草外無救兵危在旦夕將軍何不從瑾之言歸順吳侯複鎮荊襄可以保全家眷幸君侯熟思之關公正色而言曰吾乃解良一武夫蒙吾主以手足相待安肯背義投敵國乎城若破有死而已玉可碎而不可改其白竹可焚而不可毀其節身雖殞名可垂於竹帛也汝勿多言速請出城吾欲與孫權決一死戰瑾曰吳侯欲與君侯結秦晉之好同力破曹共扶漢室別無他意君侯何執迷如是言未畢關平撥劍而前欲斬諸葛瑾公止之曰彼弟孔明在蜀佐汝伯父今若殺彼傷其兄弟之情也遂令左右逐出諸葛瑾瑾滿面羞慚上馬出城回見吳侯曰關公心如鐵石不可說也孫權曰真忠臣也似此如之奈何呂範曰某請蔔其休咎權即令蔔之范揲蓍成象乃地水師卦更有玄武臨應主敵人遠奔權問呂蒙卦主敵人遠奔卿以何策擒之蒙笑曰卦象正合某之機也關公雖有沖天之翼飛不出吾羅網矣正是龍遊溝壑遭蝦戲鳳入牢籠被鳥欺畢竟呂蒙之計若何且看下文分解
