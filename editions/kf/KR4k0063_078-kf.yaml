body:
  text: 第七十八回治風疾神醫身死傳遺命奸雄數終卻說漢中王聞關公父子遇害哭倒於地衆文武急救半晌方醒扶入內殿孔明勸曰王上少憂自古道死生有命關公平日剛而自矜故今日有此禍王上且宜保養尊體徐圖報仇玄德曰孤與關張二弟桃園結義時誓同生死今雲長已亡孤豈能獨享富貴乎言未已只見關興號慟而來玄德見了大叫一聲又哭絕於地衆官救醒一日哭絕三五次三日水漿不進只是痛哭淚濕衣襟斑斑成血孔明與衆官再三勸解玄德曰孤與東吳誓不同日月也孔明曰聞東吳將關公首級獻與曹操操以王候禮祭葬之玄德曰此何意也孔明曰此是東吳欲移禍於曹操操知其謀故以厚禮葬關公令王上歸怨于吳也玄德曰吾今即提兵問罪于吳以雪吾恨孔明諫曰不可方今吳欲令我伐魏魏亦欲令我伐吳各懷譎計伺隙而乘王上只宜按兵不動且與關公發喪待吳魏不和乘時而伐之可也衆官又再三勸諫玄德方才進膳傳旨川中大小將士盡皆挂孝漢中王親出南門招魂祭奠號哭終日卻說曹操在洛陽自葬關公後每夜合眼便見關公操甚驚懼問於衆官衆官曰洛陽行宮舊殿多妖可造新殿居之操曰吾欲起一殿名建始殿恨無良工賈詡曰洛陽良工有蘇越者最有巧思操召入令畫像蘇越畫成九間大殿前後廊廡樓閣呈與操操視之曰汝畫甚合孤意但恐無棟梁之材蘇越曰此去離城三十裏有一潭名躍龍潭前有一祠名躍龍祠祠傍有一株大梨樹高十餘丈堪作建始殿之梁操大喜即令人工到彼砍伐次日回報此樹鋸解不開斧砍不入不能斬伐操不信自領數百騎直至躍龍祠前下馬仰觀那樹亭亭如華蓋直侵雲漢並無曲節操命砍之鄉老數人前來諫曰此樹已數百年矣常有神人居其上恐未可伐操大怒曰吾平生遊歷普天之下四十餘年上至天子下及庶人無不懼孤是何妖神敢違孤意言訖拔所佩劍親自砍之錚然有聲血濺滿身操愕然大驚擲劍上馬回至宮內是夜二更操睡臥不安坐於殿中隱幾而寐忽見一人披頭仗劍身穿皂衣直至面前指操喝曰吾乃梨樹之神也汝蓋建始殿意欲篡逆卻來伐吾神木吾知汝數盡特來殺汝操大驚急呼武士安在皂衣人仗劍砍操操大叫一聲忽然驚覺頭腦疼痛不可忍急傳旨遍求良醫治療不能痊可衆官皆憂華歆入奏曰大王知有神醫華佗否操曰即江東醫周泰者乎歆曰是也操曰雖聞其名未知其術歆曰華佗字元化沛國譙郡人也其醫術之妙世所罕有但有患者或用藥或用針或用灸隨手而愈若患五髒六腑之疾藥不能效者以麻肺湯飲之令病者如醉死卻用尖刀剖開其腹以藥湯洗其臟腑病人略無疼痛洗畢然後以藥線縫口用藥敷之或一月或二十日即平復矣其神妙如此一日佗行於道上聞一人呻吟之聲佗曰此飲食不下之病問之果然佗令取蒜齏汁三升飲之吐蛇一條長二三尺飲食即下廣陵太守陳登心中煩懣面赤不能飲食求佗醫治佗以藥飲之吐蟲三升皆赤頭首尾動搖登問其故佗曰此因多食魚腥故有此毒今日雖可三年之後必將復發不可救也後陳登果三年而死又有一人眉間生一瘤癢不可當令佗視之佗曰內有飛物人皆笑之佗以刀割開一黃雀飛去病者即愈有一人被犬咬足指隨長肉二塊一痛一癢俱不可忍佗曰痛者內有針十個庠者內有黑白棋子二枚人皆不信佗以刀割開果應其言此人真扁鵲倉公之流也現居金城離此不遠大王何不召之操即差人星夜請華佗入內令診脈視疾佗曰大王頭腦疼痛因患風而起病根在腦袋中風涎不能出枉服湯藥不可治療某有一法先飲麻肺湯然後用利斧砍開腦袋取出風涎方可除根操大怒曰汝要殺孤耶佗曰大王曾聞關公中毒箭傷其右臂某刮骨療毒關公略無懼色今大王小可之疾何多疑焉操曰臂痛可刮腦袋安可砍開汝必與關公情熱乘此機會欲報仇耳呼左右拿下獄中拷問其情賈詡諫曰似此良醫世罕其匹未可廢也操叱曰此人欲乘機害我正與吉平無異急令追拷華佗在獄有一獄卒姓吳人皆稱爲吳押獄此人每日以酒食供奉華佗佗感其恩乃告曰我今將死恨有青囊書未傳於世感公厚意無可爲報我修一書公可遣人送與我家取青囊書來贈公以繼吾術吳押獄大喜曰我若得此書棄了此役醫治天下病人以傳先生之德佗即修書付吳押獄吳押獄直至金城問佗之妻取了青囊書回到獄中付與華佗檢看畢佗即將書贈與吳押獄吳押獄持回家中藏之旬日之後華佗竟死於獄中吳押獄買棺殯殮訖脫了差役回家欲取青囊書看習只見其妻正將書在那裏焚燒吳押獄大驚連忙搶奪全卷已被燒毀只剩下一兩葉吳押獄怒駡其妻妻曰縱然學得與華佗一般神妙只落得死於牢中要他何用吳押獄嗟歎而止因此青囊書不曾傳於世所傳者止閹雞豬等小法乃燒剩一兩葉中所載也後人有詩歎曰華佗仙術比長桑神識如窺垣一方惆悵人亡書亦絕後人無複見青囊卻說曹操自殺華佗之後病勢愈重又憂吳蜀之事正慮間近臣忽奏東吳遣使上書操取書拆視之略曰臣孫權久知天命已歸王上伏望早正大位遣將剿滅劉備掃平兩川臣即率群下納土歸降矣操觀畢大笑出示群臣曰是兒欲使吾居爐火上耶侍中陳群等奏曰漢室久已衰微殿下功德巍巍生靈仰望今孫權稱臣歸命此天上之應異氣齊聲殿下宜應天順人早正大位操笑曰吾事漢多年雖有功德及民然位至于王名爵已極何敢更有他望苟天命在孤孤爲周文王矣司馬懿曰今孫權既稱臣歸附王上可封官賜爵令拒劉備操從之表封孫權爲驃騎將軍南昌侯領荊州牧即日遣使齎誥敕赴東吳去訖操病勢轉加忽一夜夢三馬同槽而食及曉問賈詡曰孤向日曾夢三馬同槽疑是馬騰父子爲禍今騰已死昨宵複夢三馬同槽主何吉凶詡曰祿馬吉兆也祿馬歸于曹王上何必疑乎操因此不疑後人有詩曰三馬同槽事可疑不知已植晉根基曹瞞寬有奸雄略豈識朝中司馬師是夜操臥寢室至三更覺頭目昏眩乃起伏幾而臥忽聞殿中聲如裂帛操驚視之忽見伏皇后董貴人二皇子並伏完董承等二十餘人渾身血污立於愁雲之內隱隱聞索命之聲操急撥劍望空砍去忽然一聲響亮震塌殿宇西南一角操驚倒於地近侍救出迂于別宮養病次夜又聞殿外男女哭聲不絕至曉操召群臣入曰孤在戎馬之中三十餘年未嘗信怪異之事今日爲何如此群臣奏曰大王當命道士設蘸修禳操曰聖人曰獲罪於天無所禱也孤天命已盡安可救乎遂不允設蘸次日覺氣沖上焦目不見物急召夏侯惇商議惇至殿門前忽見伏皇后董貴人二皇子伏完董承等立于陰雲之中惇大驚昏倒左右扶出自此得病操召曹洪陳群賈詡司馬懿等同至臥榻前囑以後事曹洪等頓首曰大王善保玉體不日定當霍然操曰孤縱橫天下三十餘年群雄皆滅止有江東孫權西蜀劉備未曾剿除孤今病危不能再與卿等相敘特以家事相托孤長子曹昂劉氏所生不幸早年歿于宛城今卞氏生四子丕彰植熊孤平生所愛第三子植爲人虛華少誠實嗜酒放縱因此不立次子曹彰勇而無謀四子曹熊多病難保惟長子曹丕篤厚恭謹可繼我業卿等宜輔佐之曹洪等涕泣領命而出操令近侍取平日所藏名香分賜諸侍妾且囑曰吾死之後汝等須勤習女工多造絲履賣之可以得錢自給又命諸妾多居於銅雀台中每日設祭必令女伎奏樂上食又遺命于彰德府講武城外設立疑塚七十二勿令後人知吾葬處恐爲人所發掘故也囑畢長歎一聲淚如雨下須臾氣絕而死壽六十六歲時建安二十五年春正月也後人有鄴中歌一篇歎曹操雲鄴則鄴城水漳水定有異人從此起雄謀韻事與文心群臣兄弟而父子英雄未有俗胸中出沒豈隨人眼底功首罪魁非兩人遺臭流芳本一身文章有神霸有氣豈能苟爾化爲群橫流築台距太行氣與理勢相低昂安有斯人不作逆小不爲霸大不王霸王降作兒女鳴無可奈何中不平向帳明知非有益分香未可謂無情嗚呼古人作事無巨細寂寞豪華皆有意書生輕議塚中人塚中笑爾書生氣曹操身亡文武百官盡皆舉哀一面遣人赴世子曹丕鄢陵侯曹彰臨淄侯曹植蕭懷侯曹熊處報喪衆官用金棺銀槨將操入殮星夜舉靈櫬赴鄴郡來曹丕妝知父喪放聲痛哭率大小官員出城十裏伏道迎櫬入城停於偏殿官僚挂孝聚哭於殿上忽見一人挺身出曰請世子息哀且議大事衆視之乃中庶子司馬孚也孚曰魏王既薨天下震動當早立嗣王以安衆心何但哭泣耶群臣曰世子宜嗣位但未得天子詔命豈可造次而行兵部尚書陳矯曰王薨於外愛子私立彼此生變由社稷危矣遂拔劍割下袍袖厲聲曰即今日便請世子嗣位衆官有異義者以此袍爲例百官悚懼忽報華歆自許昌飛馬而至衆皆大驚須臾華歆入衆問其來意歆曰今魏王薨逝天下震動何不早請世子嗣位衆官曰正因不及侯詔命方議欲以王后卞氏慈旨立世子爲王歆曰吾已於當漢帝處索得詔命在此衆皆踴躍稱賀歆於懷中取出詔命開讀原來華歆諂事魏故草此詔威逼獻帝降之帝只得聽從故下詔即封曹丕爲魏王丞相冀州牧丕即日登位受大小官僚拜舞起居正宴會慶賀間忽報鄢陵侯曹彰自長安領十萬大軍來到丕大驚遂問群臣曰黃須小弟平日性剛深通武藝今提兵遠來必與孤爭王位也如之奈何忽階下一人應聲出曰臣請往見鄢陵侯以片言折之人衆皆曰非大夫莫能解此禍也正是試看曹氏丕彰事幾作袁家譚尚爭未知此人是誰且看下文分解
