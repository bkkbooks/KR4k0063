body:
  text: 第七十九回兄逼弟曹植賦詩侄陷叔劉封伏法卻說曹丕聞曹彰提兵而來驚問衆官一人挺身而出願往折服之衆視其人乃諫議大夫賈逵也曹丕大喜即命賈逵前往逵領命出城迎見曹彰彰問曰先王璽綬安在逵正色而言曰家有長子國有儲君先王璽綬非君侯之所宜問也彰默然無語乃與賈逵同入城至宮門前逵問曰君侯此來欲奔喪耶欲爭位耶彰曰吾來奔喪別無異心逵曰既無異心何故帶兵入城彰即時叱退左右將士隻身入內拜見曹丕兄弟二人相抱大哭曹彰將本部軍馬盡交與曹丕丕令彰回鄢陵自守彰拜辭而去於是曹丕安居王位改建安二十五年爲延康元年封賈詡爲太尉華歆爲相國王郎爲禦史大夫大小官僚盡皆升賞諡曹操曰武王葬于鄴郡高陵令于禁董治陵事禁奉命到彼只見陵屋中白粉壁上圖畫關雲長水淹七軍擒獲於禁之事畫雲長儼然上坐龐德憤怒不屈於禁拜伏於地哀求乞命之狀原來曹丕以於禁兵敗被擒不能死節既降敵而複歸心鄙其爲人故令人圖畫陵屋粉壁故意使之往見以愧之當下於禁見此畫像又羞又惱氣憤成病不久而死後人有詩歎曰三十年來說舊交可憐臨難不忠曹知人未向心中識畫虎今從骨裏描卻說華歆奏曹丕曰鄢陵侯已交割軍馬赴本國去了臨淄侯植蕭懷侯熊二人竟不來奔喪理當問罪丕從之即分遣二使往二處問罪不一日蕭懷使者回報蕭懷侯曹熊懼罪自縊身死丕令厚葬之追贈蕭懷王又過了一日臨淄使者回報說臨淄侯日與丁儀丁廙兄弟二人酣飲悖慢無禮聞使命至臨淄侯端坐不動丁儀罵曰昔者先王本欲立吾主爲世子被讒臣所阻今主喪未遠便問罪於骨肉何也丁廙又曰據吾主聰明冠世自當承嗣大位今反不得立汝那廟堂之臣何不識人才若此臨淄侯因怒叱武士將臣亂棒打出丕聞之大怒即令許褚領虎衛軍三千火速至臨淄擒曹植等一干人來褚奉命引軍至臨淄城守將攔阻褚立斬之直入城中無一人敢當鋒銳徑到府堂只見曹植與丁儀丁廙等盡皆醉倒褚皆縛之載于車上並將府下大小屬官盡行拿解鄴郡聽候曹丕發落丕下令先將丁儀丁廙等盡行誅戮丁儀字正禮丁廙字敬禮沛郡人乃一時文士及其被殺人多惜之卻說曹丕之母卞氏聽得曹熊縊死心甚悲傷忽又聞曹植被擒其党丁儀等已殺大驚急出殿召曹丕相見丕見母出殿慌忙拜謁卞氏哭謂丕曰汝弟植平生嗜酒疏狂蓋因自恃胸中之才故爾放縱汝可念同胞之情存其性命吾至九泉亦瞑目也丕曰兒亦深愛其才安肯害他今正欲戒其性耳母親勿憂卞氏灑淚而入丕出偏殿召曹植入華歆問曰適來莫非太后勸殿下勿殺子建乎丕曰然歆曰子建懷才抱智終非池中物若不早除必爲後患丕曰母命不可違歆曰人皆言子建出口成章臣未深信主上可召入以才試之若不能即殺之若果能則貶之以絕天下文人之口丕從之須臾曹植入見惶恐伏拜請罪丕曰吾與汝情雖兄弟義屬君臣汝安敢恃才蔑禮昔先君在日汝常以文章誇示於人吾深疑汝必用他人代筆吾今限汝行七步吟詩一首若果能則免一死若不能則從重治罪決不姑恕植曰願訖題目時殿上懸一水墨畫畫著兩隻牛鬥於土牆之下一牛墜井而亡丕指畫曰即以此畫爲題詩中不許犯著二牛鬥牆下一牛墜井死字樣植行七步其詩已成詩曰兩肉齊道行頭上帶凹骨相遇塊山下欻起相搪突二敵不俱剛一肉臥土窟非是力不如盛氣不泄畢曹丕及群臣皆驚丕又曰七步成章吾猶以爲遲汝能應聲而作詩一首否植曰願即命題丕曰吾與汝乃兄弟也以此爲題亦不許犯著兄弟字樣植略不思索即口占一首曰煮豆燃豆萁豆在釜中泣本是同根生相煎何太急曹丕聞之潸然下其母卞氏從殿后出曰兄何逼弟之甚耶丕慌忙離坐告曰國法不可廢耳於是貶曹植爲安鄉侯植拜辭上馬而去曹丕自繼位之後法令一新威逼漢帝甚于其父早有細作報入成都漢中王聞之大驚即與文武商議曰曹操已死曹丕繼位威逼天子更甚於操東吳孫權拱手稱臣孤欲先伐東吳以報雲長之仇次討中原以除亂賊言未畢廖化出班哭拜於地曰關公父子遇害實劉封孟達之罪乞誅此二賊玄德便欲遣人擒之孔明諫曰不可且宜緩圖之急則生變矣可升此二人爲郡守分調開去然後可擒玄德從之遂遣使升劉封去守綿竹原來彭羕與孟達甚厚聽知此事急回家作書遣心腹人馳報孟達使者方出南門外被馬超巡視軍捉獲解見馬超超審知此事即往見彭羕羕接入置酒相待酒至數巡超以言挑之曰昔漢中王待公甚厚今何漸薄也羕因酒醉恨罵曰老革荒悖吾必有以報之超又探曰某亦懷怨心久矣羕曰公起本部軍結連孟達爲外合某領川兵爲內應大事可圖也超曰先生之言甚當來日再議超辭了彭羕即將人與書解見漢中王細言其事玄德大怒即令擒彭羕下獄拷問其情羕在獄中悔之無及玄德問孔明曰彭羕有謀反之意當何以治之孔明曰羕雖狂士然留之久必生禍於是玄德賜彭羕死於獄羕既死有人報知孟達達大驚舉止失措忽使命至調劉封回守綿竹去訖孟達慌請上庸房陵都尉申耽申儀弟兄二人商議曰我與法孝直同有功于漢中王今孝直已死而漢中王忘我前功乃欲見害爲之奈何耽曰某有一計使漢中王不能加害於公達大喜急問何計耽曰吾弟兄欲投魏久矣公可作一表辭了漢中王投魏王曹丕丕必重用吾二人亦隨後來降也達猛然省悟即寫表一通付與來使當晚引五十余騎投魏去了使命持表回成都奏漢中王言孟達投魏之事先主大怒覽其表曰臣達伏惟殿下將建伊呂之業追桓文之功大事草創假勢吳楚是以有爲之士望風歸順臣委質以來愆戾山積臣猶自知況於君乎今王朝英俊鱗集臣內無輔佐之器外無將領之才列次功臣誠足自愧臣聞範蠡識微浮於五湖舅犯謝罪逡巡河上夫際會之間請命乞身何哉欲潔去就之分也況臣卑鄙無元功臣勳自系于時竊慕前賢早思遠恥昔申生至孝見疑於親子胥至忠見誅於君蒙恬拓境而被大刑樂毅破齊而遭讒佞臣每讀其書未嘗不感慨流涕而親當其事益用傷悼邇者荊州覆敗大臣失節百無一還惟臣尋事自致房陵上庸而複乞身自放於外伏想殿下聖恩感悟湣臣之心悼臣之舉臣誠小人不能始終知而爲之敢謂非罪臣每聞交絕無惡聲去臣無怨辭臣過奉教于君子願君王勉之臣不勝惶恐之至玄德看畢大怒曰匹夫叛吾安敢以文辭相戲耶即欲起兵擒之孔明曰可就遣劉封進兵令二虎相並劉封或有功或敗績必歸成都就而除之可絕兩害玄德從之遂遣使到綿竹傳諭劉封封受命率兵來擒孟達卻說曹丕正聚文武議事忽近臣奏曰蜀將孟達來降丕召入問曰汝此來莫非詐降乎達曰臣爲不救關公之危漢中王欲殺臣因此懼罪來降別無他意曹丕尚未准信忽報劉封引五萬兵來取襄陽單搦孟達廝殺丕曰汝既是真心便可去襄陽取劉封首級來孤方准信達曰臣以利害說之不必動兵令劉封亦來降也丕大喜遂加孟達爲散騎常侍建武將軍平陽亭侯領新城太守去守襄陽樊城願來夏侯尚徐晃已先在襄陽正將收取上庸諸部孟達到了襄陽與二將禮畢探得劉封離城五十裏下寨達即修書一封使人齎赴蜀寨招降劉封劉封覽書大怒曰此賊誤吾叔侄之義又間吾父子之親使吾爲不忠不孝之人也遂扯碎來書斬其使次日引軍前來搦戰孟達知劉封扯書斬使勃然大怒亦領兵出迎兩陣對圓封立馬於門旗下以刀指罵曰背國反叛安敢亂言孟達汝死已臨頭上還自執迷不省封大怒拍馬輪刀真奔孟達戰不三合達敗走封乘虛追殺二十餘裏一聲喊起伏兵盡出左邊夏侯尚殺來右邊徐晃殺來孟達回身複戰三軍夾攻劉封大敗而走連夜奔回上庸背後魏兵趕來劉封到城下叫門城上亂箭射下申耽在敵樓上叫曰吾已降了魏也封大怒欲要攻城背後追軍將至封立腳不住只得望房陵而奔見城上已盡插魏旗申儀在敵樓上將旗一氵菐城後一彪軍出旗上大書右將軍徐晃封抵敵不住急望西川而走晃乘勢追殺劉封部下只剩得百餘騎到了成都入見漢中王哭拜於地細奏前事玄德怒曰辱子有何面目複來見吾封曰叔父之難非兒不救因孟達諫阻故耳玄德轉怒曰汝須食人食穿人衣非土木偶人安可聽讒賊所阻命左右推出斬之漢中王既斬劉封後聞孟達招之毀書斬使之事心中頗悔又衰痛關公以致染病因此按兵不動且說魏曹丕自即王位將文武官僚盡皆升賞遂統甲兵三十萬南巡沛國譙縣大饗先塋鄉中父老揚塵遮道奉觴進酒效漢高祖還沛之事人報大將軍夏侯惇病危丕即還鄴郡時惇已卒丕爲挂孝以厚禮殯葬是歲八月間報稱石邑縣鳳凰來儀臨淄城麒麟出現黃龍現於鄴郡於是中郎將李伏太史丞許芝商議種種瑞征乃魏當代漢之兆可安排受禪之禮令漢帝將天下讓于魏王遂同華歆王郎辛毗賈詡劉廙劉曄陳矯陳群桓階等一班文武官僚四十余人直入內殿來奏漢獻帝請禪位于魏王曹丕正是魏家社稷將建漢代江山忽已移未知獻帝如何回答且看下文分解
