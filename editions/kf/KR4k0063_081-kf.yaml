body:
  text: 第八十一回急兄仇張飛遇害雪弟恨先主興兵卻說先主欲起兵東征趙雲諫曰國賊乃曹操非孫權也今曹丕篡漢神人共怒陛下可早圖關中屯兵於渭河上流以討凶逆則關東義士必裹糧策馬以迎王師若舍魏以伐吳兵勢一交豈能驟解願陛下察之先主曰孫權害了朕弟又兼得傅士仁糜芳潘璋馬忠皆有切齒之仇啖其肉而滅其族方雪朕恨卿何阻耶雲曰漢賊之仇公也兄弟之仇私也願以天下爲重先主答曰朕不爲弟報仇雖有萬里江山何足爲貴遂不聽趙雲之諫下令起兵伐吳且發使往五溪借番兵五萬共相策應一面差使往閬中遷張飛爲車騎將軍領司隸校尉封西鄉侯兼閬中牧使命齎詔而去卻說張飛在閬中聞知關公被東吳所害旦夕號泣血濕衣襟諸將以酒勸解酒醉怒氣愈加帳上帳下但有犯者即鞭撻之多有鞭死者每日望南切齒睜目怒恨放聲痛哭不已忽報使至慌忙接入開讀詔旨飛受爵望北拜畢設酒款待來使飛曰吾兄被害仇深似海廟堂之臣何不早奏興兵使者曰多有勸先滅魏而後伐吳者飛怒曰是何言也昔我三人桃園結義誓同生死今不幸二兄半途而逝吾安得獨享富貴耶吾當面見天子願爲前部先鋒挂孝伐吳生擒逆賊祭告二兄以踐前盟言訖就同使命望成都而來卻說先主每日自下教場操演軍馬克日興師禦駕親征於是公卿都至丞相府中見孔明曰今天子初臨大位親統軍伍非所以重社稷也丞相秉鈞衡之職何不規諫孔明曰吾苦諫數次只是不聽今日公等隨我入教場諫去當下孔明引百官來奏先主曰陛下初登寶位若欲北討漢賊以伸大義于天下方可親統六師若只欲伐吳命一上將統軍伐可也何必親勞聖駕先主見也孔明苦諫心中稍回忽報張飛到來先主急召入飛至演武廳拜伏於地抱先主足而哭先主亦哭飛曰陛下今日爲君早忘了桃園之誓二兄之仇如何不報先生曰多官諫阻未敢輕舉飛曰他人豈知昔日之盟若陛下不去臣舍此軀與二兄報仇若不能報時臣甯死不見陛下也先主曰朕與卿同往卿提本部兵自閬州而出朕統精兵會于江州共伐東吳以雪此恨飛臨行先主囑曰朕素知卿酒後暴怒鞭撻健兒而複令在左右此取禍之道也今後務宜寬容不可如前飛拜辭而去次日先主整兵要行學士秦宓奏曰陛下舍萬乘之軀而徇小義古人所不取也願陛下思之先主曰雲長與朕猶一體也大義尚在豈可忘耶宓伏地不起曰陛下不從臣言誠恐有失先主大怒曰朕欲興兵爾何出此不利之言叱武士推出斬之宓面不改色回顧先主而笑曰臣死無恨但可惜新創之業又將顛覆耳衆官皆爲秦宓告免先主曰暫且囚下待朕報仇回時發落孔明聞知即上表救秦宓其略曰臣亮等切以吳賊逞奸詭之計致荊州有覆亡之禍隕將星于鬥牛折天柱于楚地此情哀痛誠不可忘但念遷漢鼎者罪由曹操移劉祚者過非孫權竊謂魏賊若除由吳自賓服願陛下納秦宓金石之言以養士卒之力別作良圖則社稷幸甚天下幸甚先主看畢擲表於地曰朕意已決無得再諫遂命丞相諸葛亮保太子守兩川驃騎將軍馬超並弟馬岱助鎮北將軍魏延守漢中以當魏兵虎威將軍趙雲爲後應兼督糧草黃權程畿爲參謀馬良陳震掌理文書黃忠爲前部先鋒馮習張南爲副將傅彤張翼爲中軍護尉趙融廖淳爲合後川將數百員並五溪番將等共兵七十五萬擇定章武元年七月丙寅日出師卻說張飛回到閬中下令軍中限三日內制辦白旗白甲三軍挂孝伐吳次日帳下兩員末將范疆張達入帳告曰白旗白甲一時無措須寬限方可飛大怒曰吾急欲報仇恨不明日便到逆賊之境汝安敢違我將令叱武士縛于樹上各鞭背五十鞭畢以手指之曰來日俱要完備若違了限即殺汝二人示衆打得二人滿口出血回到營中商議範疆曰今日受了刑責著我等如何辦得其人性暴如火倘來日不完你我皆被殺矣張達曰此如他殺我不如我殺他疆曰怎奈不得近前達曰我兩個若不當死則他醉於床上若是當死則他不醉二人商議停當卻說張飛在帳中神思昏亂動止恍惚乃問部將曰吾今心驚肉顫坐臥不安此何意也部將答曰此是君侯思念關公以至如此飛令人將酒來與部將同飲不覺大醉臥於帳中范張二賊探知消息初更時分各藏短刀密入帳中詐言欲稟機密重事直至床前原來張飛每睡不合眼當夜寢於帳中二賊見他須豎目張本不敢動手因聞鼻息如雷方敢近前以短刀刺入飛腹飛大叫一聲而亡時年五十五歲後人有詩歎曰安喜曾聞鞭督郵黃巾掃盡佐炎劉虎牢關上聲先震長阪橋邊水逆流義釋嚴顔安蜀境智欺張郃定中州伐吳未克身先死秋草長遺閬地愁卻說二賊當夜割了張飛首級便引數十人連夜投東吳去了次日軍中聞知起兵追之不及時有張飛部將吳班向自荊州來見先主先主用爲牙門將使佐張飛守閬中當下吳班先以發表章奏知天子然後令長子張苞具棺槨盛貯令弟張紹守閬中苞自來報先主時先主已擇期出師大小官僚皆隨孔明送十裏方回孔明回至成都怏怏不樂顧謂衆官曰法孝直若在必能制主上東行也卻說先主是夜心驚肉顫寢臥不安出帳仰視天文見西北一星其大如鬥忽然墜地先主大疑連夜令人求問孔明孔明回奏曰合損一上將三日之內必有驚報先主因此按兵不動忽侍臣奏曰閬中張車騎部將吳班差人齎表至先主頓足曰噫三弟休矣及至覽表果報張飛兇信先主放聲大哭昏絕於地衆官救醒次日人報一隊軍馬驟風而至先主出營觀之良久見一員小將白袍銀鎧滾鞍下馬伏地而哭乃張苞也苞曰范疆張達殺了臣父將首級投吳去了先主哀痛至甚飲食不進群臣苦諫曰陛下方欲爲二弟報仇何可先自摧殘龍體先主方才進膳遂謂張苞曰卿與吳班敢引本部軍作先鋒爲卿父報仇否苞曰爲國爲父萬死不辭先主正欲遣苞起兵又報一彪軍風擁而至先主令侍臣探之須臾侍臣引一小將軍白袍銀鎧入營伏地而哭先主視之乃關興也先主見了關興想起關公又放聲大哭衆官苦勸先主曰聯想布衣與關張結義誓同生死今朕爲天子正欲與兩弟同享富貴不幸懼死於非命見此二侄能不斷腸言訖又哭衆官曰二小將軍且退容聖上將息龍體侍臣奏曰陛下年過六旬不宜過於哀痛先主曰二弟懼亡朕安忍獨生言訖以頭頓地而哭多官商議曰今天子如此煩惱將何解勸馬良曰主上親統大兵伐吳終日號泣於軍不利陳震曰吾聞成都青城山之西有一隱者姓李名意世人傳說此老已三百餘歲能知人之生死吉凶乃當世之神仙也何不奏知天子召此老來問他吉凶勝如吾等之言遂入奏先主先主從之即遣陳震齎詔往青城山宣召震星夜到了青城令鄉人引入山谷深處遙望仙莊清雲隱隱瑞氣非凡忽見一小童來迎曰來者莫非陳孝起乎震大驚曰仙童如何知我姓字童子曰吾師昨者有言今日必有皇帝詔命至使者必是陳孝起震曰真神仙也人言信不誣矣遂與小童同入仙莊拜見李意宣天子詔命李意推老不行震曰天子急欲見仙翁一面幸勿吝鶴駕再三敦請李意方行既至禦營入見先主先主見李意鶴髮童顔碧眼方瞳灼灼有光身如古柏之狀知是異人優禮相待李意曰老夫乃荒山村叟無學無識辱陛下宣召不知有何見諭先主曰朕與關張二弟結生死之交三十餘年矣今二弟被害親統大軍報仇未知休咎如何久聞仙翁通曉玄機望乞賜教李意曰此乃天數非老夫所知也先主再三求問意乃索紙筆畫兵馬器械四十余張畫畢便一一扯碎又畫一大人仰臥于地上傍邊一人倔土埋之上寫一大白字遂稽首而去先主不悅謂群臣曰此狂叟也不足爲信即以火焚之便摧軍前進張苞入奏曰吳班軍馬已至小臣乞爲先鋒先主壯其志即取先鋒印賜張苞苞欲挂印又一少年將奮然出曰留下印與我視之乃關興也苞曰我已奉詔矣興曰汝有何能敢當此任苞曰我自幼習學武藝箭無虛發先主曰朕正要觀賢侄武藝以定優劣苞令軍士于百步之外立一面旗旗上畫一紅心苞拈弓連射三箭皆中紅心衆皆稱善關興挽弓在手曰射中紅心何足爲奇正言間忽值頭上一行雁過興指曰吾射這飛雁第三隻一箭射去那只雁應弦而落文武官僚齊聲喝采苞大怒飛身上馬手挺父所使丈八點鋼矛大叫曰你敢與我比試武藝否興亦上馬綽家傳大砍刀縱馬而出曰偏你能使矛吾豈不能使刀二將方欲交鋒先主喝曰二子休得無禮興苞二人慌忙下馬各棄兵器拜伏請罪先主曰朕自涿郡與卿等之父結異姓之交親如骨肉今汝二人亦是昆仲之分正當同心協力共報父仇奈何自相爭競失其大義父喪未遠而猶如此況日後乎二人再拜伏罪先主問曰卿二人誰年長苞曰臣長關興一歲先主即命興拜苞爲兄二人就帳前折箭爲誓永相救護先主下詔使吳班爲先鋒令張苞關興護駕水陸並進船騎雙行浩浩蕩蕩殺奔吳國來卻說范疆張達將張飛首級投獻吳侯細告前事孫權聽罷收了二人乃謂百官曰今劉玄德即了帝位統精七十余萬禦駕親征其勢甚大如之奈何百官盡皆失色面面相覷諸葛瑾出曰某食君侯之祿久矣無可報效願舍殘生去見蜀主以利害說之使兩國相和共討曹丕之罪權大喜即遣諸葛瑾爲使來說先主罷兵正是兩國相爭通使命一言解難賴行人未知諸葛瑾此去如何且看下文分解
