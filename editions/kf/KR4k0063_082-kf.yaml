body:
  text: 第八十二回孫權降魏受九錫先主征吳賞六軍卻說章武元年秋八月先主起大軍至夔關駕屯白帝城前隊軍馬已出川口近臣奏曰吳使諸葛瑾至先主傳旨教休放入黃權奏曰瑾弟在蜀爲相必有事而來陛下何故絕之當召入看他言語可從則從如不可則就借彼口說與孫權令知問罪有名也先主從之召瑾入城瑾拜伏於地先主問曰子瑜遠來有何事故瑾曰臣弟久事陛下臣故不避斧鉞特來奏荊州之事前者關公在荊州時吳侯數次求親關公不允後關公取襄陽曹操屢次致書吳侯使襲荊州吳侯本不肯許因呂蒙與關公不睦故擅自興兵誤成大事今吳侯悔之不及此乃呂蒙之罪非吳侯之過也今呂蒙已死冤仇已息孫夫人一向思歸今吳侯令臣爲使願送歸夫人縛還降將並將荊州仍舊交還永結盟好共滅曹丕以正篡逆之罪先主怒曰汝東吳害了朕弟今日敢以巧言來說乎瑾曰臣請以輕重大小之事與陛下論之陛下乃漢朝皇叔今漢帝已被曹丕篡奪不思剿除卻爲異姓之親而屈萬乘之尊是舍大義而就小義也中原乃海內之地兩都皆大漢創業之方陛下不取而但爭荊州是棄重而取輕也天下皆知陛下即位必興漢室恢復山河今陛下置魏不問反欲伐吳竊爲陛下不取先主大怒曰殺吾弟之仇不共戴天欲朕罷兵除死方休不看丞相之面先斬汝首今且放汝回去說與孫權洗頸就戮諸葛瑾見先主不聽只得自回江南卻說張昭見孫權曰諸葛子瑜知蜀兵勢大故假以請和爲辭欲背吳入蜀此去必不回矣權曰孤與子瑜有生死不易之盟孤不負子瑜子瑜亦不負孤昔子瑜在柴桑時孔明來吳孤欲使子瑜留之子瑜曰弟已事玄德義無二心弟之不留猶瑾之不往其言足貫神明今日豈肯降蜀乎孤與子瑜可謂神交非外言所得間也正言間忽報諸葛瑾回權曰孤言若何張昭滿面羞漸而退瑾見孫權言先主不肯通和之意權大驚曰若如此則江南危矣階下一人進曰某有一計可解此危視之乃中大夫趙咨也權曰德度有何良策咨曰主公可作一表某願爲使往見魏帝曹丕陳說利害使襲漢中則蜀兵自危矣權曰此計最善但卿此去休失了東吳氣象咨曰若有些小差失即投江而死安有面目見江南人物乎權大喜即寫表稱臣令趙咨爲使星夜到了許都先見太尉賈詡等並大小官僚次日早朝賈詡出班奏曰東吳遣中大夫趙咨上表曹丕笑曰此欲退蜀兵故也即令召入咨拜伏於丹墀丕覽表畢遂問咨曰吳侯乃何如主也咨曰聰明仁智雄略之主也丕笑曰卿褒獎毋乃太甚咨曰臣非過譽也吳侯納魯肅於凡品是其聰也拔呂蒙於行陣是其明也獲於禁而不害是其仁也取荊州兵不血刃是其智也據三江虎視天下是其雄也屈身于陛下是其略也以此論之豈不爲聰明仁智雄略之主乎丕又問曰吳主頗知學乎咨曰吳主浮江萬艘帶甲百萬任賢使能志存經略少有餘閑博覽書傳曆觀史籍采其大旨不效書生尋章摘句而已丕曰朕欲伐吳可乎咨曰大國有征伐之兵小國有禦備之策丕曰吳畏魏乎咨曰帶甲百萬江漢爲池何畏之有丕曰東吳如大夫者幾人咨曰聰明特達者八九十人如臣之輩車載斗量不可勝數丕歎曰使于四方不辱君命卿可以當之矣於是即降詔命太常卿邢貞齎冊孫權爲吳王加九錫趙咨謝恩出城大夫劉曄諫曰今孫權懼蜀兵之勢故來請降以臣愚見蜀吳交兵乃天亡之也今若遣上將提數萬之兵渡江襲之蜀攻其外魏攻其內吳國之亡不出旬日吳亡則蜀孤矣陛下何不早圖之丕曰孫權既以禮服朕朕若攻之是沮天下欲降者之心不若納之爲是劉曄又曰孫權雖有雄才乃殘漢驃騎將軍南昌侯之職官輕則勢微尚有畏中原之心若加以王位則去陛下一階耳今陛下信其詐降崇其位號以封殖之是與虎添翼也丕曰不然朕不助吳亦不助蜀待看吳蜀交兵若滅一國止存一國那時除之有何難哉朕意已決卿勿複言遂命太常卿邢貞同趙咨捧執冊錫徑至東吳卻說孫權聚集百官商議禦蜀兵之策忽報魏帝封主公爲王禮當遠接顧雍諫曰主公宜自稱上將軍九州伯之位不當受魏帝封爵權曰當日沛公受項羽之封蓋因時也何故卻之遂率百官出城迎接邢貞自恃上國天使入門不下車張昭大怒厲聲曰禮無不敬法無不肅而君敢自尊大豈以江南無方寸之刃耶邢貞慌忙下車與孫權相見並車入城忽車後一人放聲哭曰吾等不能奮身捨命爲主並魏吞蜀乃令主公受人封爵不亦辱乎衆視之乃徐盛也邢貞聞之歎曰江東將相如此終非久在人下者也卻說孫權受了封爵衆文武官僚拜賀已畢命收拾美玉明珠等物遣人齎進謝恩早有細作報說蜀主引本國大兵及蠻王沙摩柯番兵數萬又有洞溪漢將杜路劉寧二枝兵水陸並進聲勢震天水路軍已出巫口旱路軍已到秭歸時孫權雖登王位奈魏主不肯接應乃問文武曰蜀兵勢大當複如何衆皆默然權歎曰周郎之後有魯肅魯肅之後有呂蒙今呂蒙已亡無人與孤分憂也言未畢忽班部中一少年將奮然而出伏地奏曰臣雖年幼頗習兵書願乞數萬之兵以破蜀兵權視之乃孫桓也桓字叔武其父名河本姓俞氏孫策愛之賜姓孫因此亦系吳王宗族河生四子桓居其長弓馬熟嫻常從吳王征討累立奇功官授武衛都尉時年二十五歲權曰汝有何策勝之桓曰臣有大將二員一名李異一名謝旌俱有萬夫不當之勇乞數萬之衆往擒劉備權曰侄雖英勇爭奈年幼必得一人相助方可虎威將軍朱然出曰臣願與小將軍同擒劉備權許之遂點水陸軍五萬封孫桓爲左都督朱然爲右都督即日起兵哨馬探得蜀兵已至宜都下寨孫桓引二萬五千軍馬屯於宜都界口前後分作三營以拒蜀兵卻說蜀將吳班領先鋒之印自出川以來所到之處望風而降兵不血刃直到宜都探知孫桓在彼下寨飛奏先主時先主已到秭歸聞奏怒曰量此小兒安敢與朕抗耶關興奏曰即孫權令此子爲將不勞陛下遣大將臣願往擒之先主曰朕正欲觀汝壯氣即命關興前往興拜辭欲行張苞出曰既關興前去討賊臣願同行先主曰二侄同行甚妙但須謹慎不可造次二人拜辭先主會合先鋒一同進兵列成陣勢孫桓聽知蜀兵大至合寨多起兩陣對圓桓領李異謝旌立馬於門旗之下見蜀營中擁出二員大將皆銀盔銀鎧白馬白旗上首張苞挺丈八點鋼矛下首關興橫著大砍刀苞大罵曰孫桓豎子死在臨時尚敢抗拒天兵乎桓亦罵曰汝父已作無頭之鬼今汝又來討死好生不智張苞大怒挺槍直取孫桓桓背後謝旌驟馬來迎兩將戰有三十餘合旌敗走苞乘勝趕來李異見謝旌敗了慌忙拍馬輪蘸金斧接戰張苞與戰二十餘合不分勝負吳軍中裨將譚雄見張苞英勇李異不能勝卻放一冷箭正射中張苞所騎之馬那馬負痛奔回本陣未到門旗邊撲地便倒將張苞掀在地上李異急向前輪起大斧望張苞腦袋便砍忽一道紅光閃處李異頭早落地原來關興見張苞馬回正待接應忽見張苞馬倒李異趕來興大喝一聲劈李異于馬下救了張苞乘勢掩殺孫桓大敗各自鳴金收軍次日孫桓又引軍來張苞關興齊出關興立馬於陣前單搦孫桓交鋒桓大怒拍馬輪刀與關興戰三十餘合氣力不加大敗回陣二小將追殺入營吳班引著張南馮習驅兵掩殺張苞奮勇當先殺入昊軍正遇謝旌被張苞一矛刺死吳軍四散奔走蜀將得勝收兵只不見關興張苞大驚曰安國有失吾不獨生言訖綽槍上馬尋不數裏只見關興左手提刀右手活挾一將苞問曰此是何人關興答曰吾在亂軍中正遇仇人故生擒來苞視之乃昨日放冷箭的譚雄也苞大喜同回本營斬首瀝血祭了死馬遂寫表差人赴先主處報捷孫桓折了李異謝旌譚雄等許多將士力窮勢孤不能抵敵即差人回吳求救蜀將張南馮習謂吳班曰目今吳兵勢敗正好乘虛劫寨班曰孫桓雖然折了許多將士朱然水軍現今結營江上未曾損折今日若去劫寨倘水軍上岸斷我歸路如之奈何南曰此事至易可教關張二將軍各引五千軍伏於山谷中如朱然來救左右兩軍齊出夾攻必然取勝班曰不如先使小卒詐作降兵卻將劫寨事告與朱然然見火起必來救應卻令伏兵擊之則大事濟矣馮習等大喜遂依計而行卻說朱然聽知孫桓損兵折將正欲來救忽伏路軍引幾個小卒上船投降然問之小卒曰我等是馮習帳下士卒因賞罰不明特來投降就報機密然曰所報何事小卒曰今晚馮習乘虛要劫孫將軍營寨約定舉火爲號朱然聽畢即使人報知孫桓報事人行至半途被關興殺了朱然一面商議欲引兵去救應孫桓部將崔禹曰小卒之言未可深信倘有疏虞水陸二軍盡皆休矣將軍只宜穩守水寨某願替將軍一行然從之遂令崔禹引一萬軍前去是夜馮習張南吳班分兵三路直殺入孫桓寨中四面火起吳兵大亂尋路奔走且說崔禹正行之間忽見火起急催兵前進剛才轉過山來忽山谷中鼓聲大震左邊關興右邊張苞兩路夾攻崔禹大驚方欲奔走正遇張苞交馬只一合被苞生擒而回朱然聽知危急將船往下水退五六十裏去了孫桓引敗軍逃走問部將曰前去何處城堅糧廣部將曰此去正北彜陵城可以屯兵桓引敗軍急望彜陵而走方進得城吳班等追至將城四面圍定關興張苞等解崔禹到秭歸來先主大喜傳旨將崔禹斬卻大賞三軍自此威風震動江南諸將無不膽寒卻說孫桓令人求救于吳王吳王大驚即召文武商議曰今孫桓受困於彜陵朱然大敗于江中蜀兵勢大如之奈何張昭奏曰今諸將雖多物故然尚有十余人何慮于劉備可命韓當爲正將周泰爲副將潘璋爲先鋒淩統爲合後甘寧爲救應起兵十萬拒之權依所奏即命諸將速行此時甘寧已患痢疾帶病從征卻說先主從巫峽建平起直接彜陵界分七十餘裏連結四十餘寨見關興張苞屢立大功歎曰昔日從朕諸將皆老邁無用矣複有二侄如此英雄朕何慮孫權乎正言間忽報韓當周泰領兵來到先主欲遣將迎敵近臣奏曰老將黃忠引五六人投東吳去了先主笑曰黃漢升非反叛之人也因朕失口誤言老者無用彼必不服老故奮力去相持矣即召關興張苞曰黃漢升此去必然有失賢侄休辭勞苦可去相助略有微功便可令回勿使有失二小將拜辭先主引本部軍來助黃忠正是老臣素矢忠君志年少能成報國功未知黃忠此去如何且看下文分解
