body:
  text: 第八十三回戰猇亭先主得仇人守江口書生拜大將卻說章武二年春正月武威後將軍黃忠隨先主伐吳忽聞先主言老將無用即提刀上馬引親隨五六人徑到彜陵營中吳班與張南馮習接入問曰老將軍此來有何事故忠曰吾自長沙跟天子到今多負勤勞今雖七旬有餘尚食肉十斤臂開二石之弓能乘千里之馬未足爲老昨日主上言吾等老邁無用故來此與東吳交鋒看吾斬將老也不老正言間忽報東吳前部已到哨馬臨營忠奮然而起出帳上馬馮習等勸曰老將軍且休輕進忠不聽縱馬而去吳班令馮習引兵助戰忠在吳軍陣前勒馬橫刀單搦先鋒潘璋交戰璋引部將史迹出馬迹欺忠年老挺槍出戰鬥不三合被忠一刀斬于馬下潘璋大怒揮關公使的青龍刀來戰黃忠交馬數合不分勝負忠奮力惡戰璋料敵不過撥馬便走忠乘勢追殺全勝而歸路逢關興張苞興曰我等奉聖旨來助老將軍既已立了功請速回營忠不聽次日潘璋又來搦戰黃忠奮然上馬興苞二人要助戰忠不從吳班要助戰忠亦不從只自引五千軍出迎戰不數合璋拖刀便走忠縱馬追之厲聲大叫曰賊將休走吾今爲關公報仇追至三十餘裏四面喊聲大震伏兵齊出右邊周泰左邊韓當前有潘璋後有淩統把黃忠困在垓心忽然狂風大起忠急退時山坡上馬忠引一軍出一箭射中黃忠肩窩險些兒落馬吳兵見忠中箭一齊來攻忽後面喊聲大起兩路軍殺來吳兵潰散救出黃忠乃關興張苞也二小將保送黃忠徑到禦前營中忠年老血衰箭瘡痛裂病甚沈重先主禦駕自來看視撫其背曰令老將軍中傷朕之過也忠曰臣乃一武夫耳幸遇陛下臣今年七十有五壽亦足矣望陛下善保龍體以圖中原言訖不省人事是夜殞于禦營後人有詩歎曰老將說黃忠收川立大功重披金鎖甲雙挽鐵胎弓膽氣驚河北威名鎮蜀中臨亡頭似雪猶自顯英雄先主見黃忠氣絕哀傷不已敕具棺槨葬于成都先主歎曰五虎大將已亡三人朕尚不能復仇深可痛哉乃引禦林軍直至猇亭大會諸將分軍八路水陸俱進水路令黃權領兵先主自率大軍于旱路進發時章武二年二月中旬也韓當周泰聽知先主禦駕來征引兵出迎兩陣對圓韓當周泰出馬只見蜀營門旗開處先主自出黃羅銷金傘蓋左右白旄黃鉞金銀旌節前後圍繞當大叫曰陛下今爲蜀主何自輕出倘有疏虞悔之何及先主遙指罵曰汝等吳狗傷朕手足誓不與立於天地之間當回顧衆將曰誰敢衝突蜀兵部將夏恂挺槍出馬先主背後張苞挺丈八矛縱馬而出大喝一聲直取夏恂恂見苞聲若巨雷心中驚懼恰待要走周泰弟周平見恂抵敵不住揮刀縱馬而來關興見了躍馬提刀來迎張苞大喝一聲一矛刺中夏恂倒撞下馬周平大驚措手不及被關興一刀斬了二小將便取韓當周泰韓周二人慌退入陣中先主視之歎曰虎父無犬子也用禦鞭一指蜀兵一齊掩殺過去吳兵大敗那八路兵勢如泉湧殺的那吳軍屍橫遍野血流成河卻說甘寧正在船中養病聽知蜀兵大至火急上馬正遇一彪蠻兵人皆披發跣足皆使弓弩長槍搪牌刀斧爲首乃是番王沙摩柯生得面如噀血碧眼突出使一個鐵蒺藜骨朵腰帶兩張弓威風抖擻甘寧見其勢大不敢交鋒撥馬而走被沙摩柯一箭射中頭顱寧帶箭而走到于富池口坐於大樹之下而死樹上群鴉數百圍繞其屍吳王聞之哀痛不已具禮厚葬立廟祭祀後人有詩歎曰吳郡甘興霸長江錦幔舟酬君重知已報友化仇讎劫寨將輕騎驅兵飲巨甌神鴉能顯聖香火永千秋卻說先主乘勢追殺遂得猇亭吳兵四散逃走先主收兵只不見關興先主慌令張苞等四面跟尋原來關興殺入吳陣正遇仇人潘璋驟馬追之璋大驚奔入山谷內不知所往興尋思只在山裏往來尋覓不見看看天晚迷蹤失路幸得星月有光追至山僻之間時已二更到一莊上下馬叩門一老者出問何人興曰吾是戰將迷路到此求一飯充饑老人引入興見堂內點著明燭中堂繪畫關公神像興大哭而拜老人問曰將軍何故哭拜興曰此吾父也老人聞言即便下拜興曰何故供養吾父老人答曰此間皆是尊神地方在生之日家家侍奉何況今日爲神乎老夫只望蜀兵早早報仇今將軍到此百姓有福矣遂置酒食待之卸鞍喂馬三更以後忽門外又一人擊戶老人出而問之乃吳將潘璋亦來投宿恰入草堂關興見了按劍大喝曰歹賊休走璋回身便出忽門外一人面如重棗丹鳳眼臥蠶眉飄三縷美髯綠袍金鎧按劍而入璋見是關公顯聖大叫一聲神魂驚散欲待轉身早被關興手起劍落斬於地上取心瀝血就關公神像前祭祀興得了父親的青龍偃月刀卻將潘璋首級擐于馬項之下辭了老人就騎了潘璋的馬望本營而來老人自將潘璋之屍拖出燒化且說關興行無數裏忽聽得人言馬嘶一彪軍來到爲首一將乃潘璋部將馬忠也忠見興殺了主將潘璋將首級擐於馬項之下青龍刀又被關興得了勃然大怒縱馬來取關興興見馬忠是害父仇人氣沖牛斗舉青龍刀望忠便砍忠部下三百軍並力上前一聲喊起將關興圍在垓心興力孤勢危忽見西北上一彪軍殺來乃是張苞馬忠見救兵到來慌忙引軍自退關興張苞一處趕來趕不數裏前面糜芳傅士仁引兵來尋馬忠兩軍相合混戰一處苞興二人兵少慌忙撤退回至猇亭來見先主獻上首級具言此事先主驚異賞犒三軍卻說馬忠回見韓當周泰收聚敗軍各分頭守把軍士中傷者不計其數馬忠引傅士仁糜芳于江渚屯紮當夜三更軍士皆哭聲不止糜芳暗聽之有一夥軍言曰我等皆是荊州之兵被呂蒙詭計送了主公性命今劉皇叔禦駕親征東吳早晚休矣所恨者糜芳傅士仁也我等何不殺此二賊去蜀營投降功勞不小又一夥軍言曰不要性急等個空兒便就下手糜芳聽畢大驚遂與傅士仁商議曰軍心變動我二人性命難保今蜀主所恨者馬忠耳何不殺他將首級獻蜀主告稱我等不得已而降吳今知禦駕前來特地詣營請罪仁曰不可去必有禍芳曰蜀主寬仁厚德目今阿斗太子是我外甥彼但念我國戚之情必不肯加害二人計較已定先備了馬三更時分入帳刺殺馬忠將首級割了二人帶數十騎徑投猇亭而來伏路軍人先引見張南馮習具說其事次日到禦營中來見先主獻上馬忠首級哭告於前曰臣等實無反心被呂蒙詭計稱言關公已亡賺開城門臣等不得已而降今聞聖駕前來特殺此賊以雪陛下之恨伏乞陛下恕臣等之罪先主大怒曰朕自離成都許多時你兩個如何不來請罪今日勢危故來巧言欲全性命朕若饒你至九泉之下有何面目見關公乎言訖令關興在禦營中設關公靈位先主親捧馬忠首級詣前祭祀又令關興將糜芳傅士仁剝去衣服跪於靈前親自用刀剮之以祭關公忽張苞上帳哭拜於前曰二伯父仇人皆已誅戮臣父冤仇何日可報先主曰賢侄勿憂朕當削平江南殺盡吳狗務擒二賊與汝親自醢之以祭汝父苞泣謝而退此時先主威聲大震江南之人盡皆膽裂日夜號哭韓當周泰大驚急奏吳王具言糜芳傅士仁殺了馬忠去歸蜀帝亦被蜀帝殺了孫權心怯遂聚文武商議步騭奏曰蜀主所恨者乃呂蒙潘璋馬忠糜芳傅士仁也今此數人皆亡獨有范疆張達二人現在東吳何不擒此二人並張飛首級遣使送還交與荊州送歸夫人上表求和再會前情共圖滅魏則蜀兵自退矣權從其言遂具沈香木匣盛貯飛首綁縛范疆張達囚于檻車之內令程秉爲使齎國書望猇亭而來卻說先主欲發兵前進忽近臣奏曰東吳遣使送張車騎之首並囚范疆張達二賊至先主兩手加額曰此天之所賜亦由三弟之靈也即令張苞設飛靈位先主見張飛首級在匣中面不改色放聲大哭張苞自仗利刀將范疆張達萬剮淩遲祭父之靈祭畢先主怒氣不息定要滅吳馬良奏曰仇人盡戮其恨可雪矣吳大夫程秉到此欲還荊州送回夫人永結盟好共圖滅魏伏候聖旨先主怒曰朕切齒仇人乃孫權也今若與之連和是負二弟當日之盟矣令先滅吳次滅魏便欲斬來使以絕吳情多官苦告方免程秉抱頭鼠竄回奏吳主曰蜀不從講和誓欲先滅東吳然後伐魏衆臣苦諫不聽如之奈何權大驚舉止失措闞澤出班奏曰現有擎天之柱如何不用耶權急問何人澤曰昔日東吳大事全任周郎後魯子敬代之子敬亡後決于呂子明今子明雖喪現有陸伯言在荊州此人名雖儒生實有雄才大略以臣論之不在周郎之下前破關公其謀皆出於伯言主上若能用之破蜀必矣如或有失臣願與同罪權曰非德潤之言孤幾誤大事張昭曰陸遜乃一書生耳非劉備敵手恐不可用顧雍亦曰陸遜年幼望輕恐諸公不服若不服則生禍亂必誤大事步騭亦曰遜才堪治郡耳若托以大事非其宜也闞澤大呼曰若不用陸伯言則東吳休矣臣願以全家保之權曰孤亦素知陸伯言乃奇才也孤意已決卿等勿言於是命召陸遜遜本名陸議後改名遜字伯言乃吳郡吳人也漢城門校尉陸紆之孫九江都尉陸駿之子身長八尺面如美玉官領鎮西將軍妝下奉召而至參拜畢權曰今蜀兵臨境孤特命卿總督軍馬以破劉備遜曰江東文武皆大王故舊之臣臣年幼無才安能制之權曰闞德潤以全家保卿孤亦素知卿才今拜卿爲大都督卿勿推辭遜曰倘文武不服何如權取所佩劍與之曰如有不聽號令者先斬後奏遜曰荷蒙重托敢不拜命但乞大王于來日會聚衆官然後賜臣闞澤曰古之命將必築壇會衆賜白旄黃鉞印綬兵符然後威行令肅今大王宜遵此禮擇日築壇拜伯言爲大都督假節鉞則衆人自無不服矣權從之命人連夜築壇完備大會百官請陸遜登壇拜爲大都督右護軍鎮西將軍進封婁侯賜以寶劍印綬令掌六郡八十一州兼荊楚諸路軍馬吳王囑之曰閫以內孤主之閫以外將軍制之遜領命下壇令徐盛丁奉爲護衛即日出師一面調諸路軍馬水陸並進文書到猇亭韓當周泰大驚曰主上如何以一書生總兵耶比及遜至衆皆不服遜升帳議事衆人勉強參賀遜曰主上命吾爲大將督軍破蜀軍有常法公等各宜遵守違者王法無親勿致後悔衆皆默然周泰曰目今安東將軍孫桓乃主上之侄現困於彜陵城中內無糧草外無救兵請都督早施良策救出孫桓以安主上之心遜曰吾素知孫安東深得軍心必能堅守不必救之待吾破蜀後彼自出矣衆皆暗笑而退韓當謂周泰曰命此孺子爲將東吳休矣公見彼所行乎泰曰吾聊以言試之早無一計安能破蜀也次日陸遜傳下號令教諸將各處關防牢守隘口不許輕敵衆皆笑其懦不肯堅守次日陸遜升帳喚諸將曰吾欽承王命總督諸軍昨已三令五申令汝等各處堅守俱不遵吾令何也韓當曰吾自從孫將軍平定江南經數百戰其餘諸將或從討逆將軍或從當今大王皆披挂執銳出生入死之士今主上命公爲大都督令退蜀兵宜早定計調撥軍馬分頭征進以圖大事乃只令堅守勿戰豈欲待天自殺賊耶吾非貪生怕死之人奈何使吾等墮其銳氣於是帳下諸將皆應聲而言曰韓將軍之言是也吾等情願決一死戰陸遜聽畢掣劍在手厲聲曰仆雖一介書生今蒙主上托以重任者以吾有尺寸可取能忍辱負重故也汝等只各守隘口牢把險要不許妄動如違令者皆斬衆皆憤憤而退卻說先主自猇亭布列軍馬直至川口接連七百里前後四十營寨晝則旌旗蔽日夜則火光耀天忽細作報說東吳用陸遜爲大都督總制軍馬遜令諸將各守險要不出先主問曰陸遜何如人也馬良奏曰遜雖東吳一書生然年幼多才深有謀略前襲荊州皆系此人之詭計先主大怒曰豎子詭計損朕二弟今當擒之便傳令進兵馬良諫曰陸遜之才不亞周郎未可輕敵先主曰朕用兵老矣豈反不如一黃口孺子耶遂親領前軍攻打諸處關津隘口韓當見先主兵來差人報知陸遜遜恐韓當妄動急飛馬自來觀看正見韓當立馬於山上遠望蜀兵漫山遍野而來軍中隱隱黃羅蓋傘韓當接著陸遜並馬而觀當指曰軍中必有劉備吾欲擊之遜曰劉備舉兵東下連勝十餘陣銳氣正盛今只乘高守險不可輕出出則不利但宜獎勵將士廣布守禦之策以觀其變今彼馳騁于平原廣野之間正自得志我堅守不出彼求戰不得必移屯于山林樹木間吾當以奇計勝之韓當口雖應諾心中只是不服先主使前隊搦戰辱駡百端遜令塞耳休聽不許出迎親自遍曆諸關隘口撫慰將士皆令堅守先主見吳軍不出心中焦躁馬良曰陸遜深有謀略今陛下遠來攻戰自春曆夏彼之不出欲待我軍之變也願陛下察之先主曰彼有何謀但怯敵耳向者數敗今吾敢再出先鋒馮習奏曰即今天氣炎熱軍屯於赤火之中取水深爲不便先主遂命各營皆移于山林茂盛之地近溪傍澗待過夏到秋並力進兵馮習遂奉旨將諸寨皆移于林木陰密之處馬良奏曰我軍若動倘吳兵驟至如之奈何先主曰朕令吳班引萬餘弱兵近吳寨平地屯住朕親選八千精兵伏於山谷之中若陸遜知朕移營必乘勢來擊卻令吳班詐敗遜若追來朕引兵突出斷其歸路小子可擒矣文武皆賀曰陛下神機妙算諸臣不及也馬良曰近聞諸葛丞相在東川點看各處隘口恐魏兵入寇陛下何不將各營移居之地畫成圖本問于丞相先主曰朕亦頗知兵法何必又問丞相良曰古雲兼聽則明偏聽則蔽望陛下察之先主曰卿可自去各營畫成四至八道圖本親到東川去問丞相如有不便可急來報知馬良領命而去於是先主移兵于林木陰密處避暑早有細作報知韓當周泰二人聽得此事大喜來見陸遜曰目今蜀兵四十余營皆移于山林密處依溪傍澗就水歇涼都督可乘虛擊之正是蜀主有謀能設伏吳兵好勇定遭擒未知陸遜可聽其言否且看下文分解
