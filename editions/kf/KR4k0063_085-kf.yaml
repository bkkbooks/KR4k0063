body:
  text: 第八十五回劉先主遣詔托孤兒諸葛亮安居平五路卻說章武二年夏六月東吳陸遜大破蜀兵於猇亭彜陵之地先主奔白帝城趙雲引兵據守忽馬良至見大軍已敗懊悔不及將孔明之言奏知先主先主歎曰朕早聽丞相之言不致今日之敗今有何面目複回成都見群臣乎遂傳旨就在白帝城住紮將館驛改爲永安宮人報馮習張南傅彤程畿沙摩柯等皆歿于王事先主傷感不已又近臣奏稱黃權引江北之兵降魏去了陛下可將彼家屬送有司問罪先主曰黃權被吳兵隔斷在江北岸欲歸無路不得已而降魏是朕負權非權負朕也何必罪其家屬仍給祿米以養之卻說黃權降魏諸將引見曹丕丕曰卿今降朕欲追慕于陳韓耶權泣而奏曰臣受蜀帝之恩殊遇甚厚令臣督諸軍於江北被陸遜絕斷臣歸蜀無路降吳不可故來投陛下敗軍之將免死爲幸安敢追慕于古人耶丕大喜遂拜黃權爲鎮南將軍權堅辭不受忽近臣奏曰有細作人自蜀中來說蜀主將黃權家屬盡皆誅戮權曰臣與蜀主推誠相信知臣本心必不肯殺臣之家小也丕然之後人有詩責黃權曰降吳不可卻降曹忠義安能事兩朝堪歎黃權惜一死紫陽書法不輕饒曹丕問賈詡曰朕欲一統天下先取蜀乎先取吳乎詡曰劉備雄才更兼諸葛亮善能治國東吳孫權能識虛實陸遜現屯兵於險要隔江泛湖皆難卒謀以臣觀之諸將之中皆無孫權劉備敵手雖以陛下天威臨之亦未見萬全之勢也只可持守以待二國之變丕曰朕已遣三路大兵伐吳安有不勝之理尚書劉曄曰近東吳陸遜新破蜀兵七十萬上下齊心更無江湖之阻不可卒制陸遜多謀必有準備丕曰卿前勸朕伐吳今又諫阻何也曄曰時有不同也昔東吳累敗於蜀其勢頓挫故可擊耳今既獲全勝銳氣百倍未可攻也丕曰朕意已決卿勿複言遂引禦林軍親往接應三路兵馬早有哨馬報說東吳已有準備令呂範引兵拒住曹休諸葛瑾引兵在南郡拒住曹真朱桓引兵當住濡須以拒曹仁劉曄曰既有準備去恐無益丕不從引兵而去卻說吳將朱桓年方二十七歲極有膽略孫權甚愛之時督軍于濡須聞曹仁引大軍去取羨溪桓遂盡撥軍守把羨溪去了止留五千騎守城忽報曹仁令大將常雕同諸葛虔王雙引五萬精兵飛奔濡須城來衆軍皆有懼色桓按劍而言曰勝負在將不在兵之多寡兵法雲客兵倍而主兵半者主兵尚能勝於客兵今曹仁千里跋涉人馬疲困吾與汝等共據高城南臨大江北背山險以逸待勞以主制客此乃百戰百勝之勢雖曹丕自來尚不足憂況仁等耶於是傳令教衆軍偃旗息鼓只作無人守把之狀且說魏將先鋒常雕領精兵來取濡須城遙望城上並無軍馬雕催軍急進離城不遠一聲炮響旌旗齊豎朱桓橫刀飛馬而出直取常雕戰不三合被桓一刀斬常雕于馬下吳兵乘勢衝殺一陣魏兵大敗死者無數朱桓大勝得了無數旌旗軍器戰馬曹仁領兵隨後到來卻被吳兵從羨溪殺出曹仁大敗而退回見魏主細奏大敗之事丕大驚正議之間忽探馬報曹真夏侯尚圍了南郡被陸遜伏兵于內諸葛瑾伏兵於外內外夾攻因此大敗言未畢忽探馬又報曹休亦被呂範殺敗丕聽知三路兵敗乃喟然歎曰朕不聽賈詡劉曄之言果有此敗時值夏天大疫流行馬步軍十死六七遂引軍回洛陽吳魏自此不和卻說先主在永安宮染病不起漸漸沈重至章武三年夏四月先主自知病入四肢又哭關張二弟其病癒深兩目昏花厭見侍從之人乃叱退左右獨臥于龍榻之上忽然陰風驟起將燈吹搖滅而複明只見燈影之下二人侍立先主怒曰朕心緒不寧教汝等且退何故又來叱之不退先主起而視之上首乃雲長下首乃翼德也先主大驚曰二弟原來尚在雲長曰臣等非人乃鬼也上帝以臣二人平生不失信義皆敕命爲神哥哥與兄弟聚會不遠矣先主扯定大哭忽然驚覺二弟不見即喚從人問之時正三更先主歎曰朕不久于人世矣遂遣使往成都請丞相諸葛亮尚書令李嚴等星夜來永安宮聽受遺命孔明等與先主次子魯王劉永梁王劉理來到永安宮見帝留太子劉禪守成都且說孔明到永安宮見先主病危慌忙拜伏于龍榻之下先主傳旨請孔明坐于龍榻之側撫其背曰朕自得丞相幸成帝業何期智識淺陋不納丞相之言自取其敗悔恨成疾死在旦夕嗣子孱弱不得不以大事相托言訖淚流滿面孔明亦涕泣曰願陛下善保龍體以副天下之望先主以目遍視只見馬良之弟馬謖在傍先主令且退謖退出先主謂孔明曰丞相觀馬謖之才何如孔明曰此人亦當世之英才也先主曰不然朕觀此人言過其實不可大用丞相宜深察之分付畢傳旨召諸臣入殿取紙筆寫了遣詔遞與孔明而歎曰朕不讀書粗知大略聖人雲鳥之將死其鳴也哀人之將死其言必善朕本待與卿等同滅曹賊共扶漢室不幸中道而別煩丞相將詔付與太子禪令勿以爲常言凡事更望丞相教之孔明等泣拜於地曰願陛下將息龍體臣等盡施犬馬之勞以報陛下知遇之恩也先主命內侍扶起孔明一手掩淚一手執其手曰朕今死矣有心腹之言相告孔明曰有何聖諭先主泣曰君才十倍曹丕必能安邦定國終定大事若嗣子可輔則輔之如其不才君可自爲成都之主孔明聽畢汗流遍體手足失措泣拜於地曰臣安敢不竭股肱之力盡忠貞之節繼之以死乎言訖叩頭流血先主又請孔明坐於榻上喚魯王劉永梁王劉理近前分付曰爾等皆記朕言朕亡之後爾兄弟三人皆以父事丞相不可怠慢言罷遂命二王同拜孔明二王拜畢孔明曰臣雖肝腦塗地安能報知遇之恩也先主謂衆官曰朕已托孤于丞相令嗣子以父事之卿等俱不可怠慢以負朕望又囑趙雲曰朕與卿於患難之中相從到今不想於此地分別卿可想朕故交早晚看覰吾子勿負朕言雲泣拜曰臣敢不效犬馬之勞先主又謂衆官曰卿等衆官朕不能一一分囑願皆自愛言畢駕崩壽六十三歲時章武三年夏四月二十四日也後杜工部有詩歎曰蜀主窺吳向三峽崩年亦在永安宮翠華想像空山外玉殿虛無野寺中古廟杉松巢水鶴歲時伏臘走村翁武侯祠屋長鄰近一體君臣祭祀同先主駕崩文武官僚無不哀痛孔明率衆官奉梓宮還成都太子劉禪出城迎接靈柩安於正殿之內舉哀行禮畢開讀遺詔詔曰朕初得疾但下痢耳後轉生雜病殆不自濟朕聞人年五十稱夭壽今朕年六十有餘死複何恨但以卿兄弟爲念耳勉之勉之勿以惡小而爲之勿以善小而不爲惟賢惟德可以服人卿父德薄不足效也卿與丞相從事事之如父勿怠勿忘卿兄弟更求聞達至囑至囑群臣讀詔已畢孔明曰國不可一日無君請立嗣君以承漢統乃立太子劉禪即皇帝位改元建興加諸葛亮爲武鄉侯領益州牧葬先主于惠陵諡曰昭烈皇帝尊皇后吳氏爲皇太后諡甘夫人爲昭烈皇后糜夫人亦追諡爲皇后升賞群臣大赦天下早有魏軍探知此事報入中原近臣奏知魏主曹丕大喜曰劉備已亡朕無憂矣何不乘其國中無主起兵伐之賈詡諫曰劉備雖亡必托孤於諸葛亮亮感備知遇之恩必傾心竭力扶持嗣主陛下不可倉卒伐之正言間忽一人從班部中奮然而出曰不乘此時進兵更待何時衆視之乃司馬懿也丕大喜遂問計於懿懿曰若只起中國之兵急難取勝須用五路大兵四面夾攻令諸葛亮首尾不能救應然後可圖丕問何五路懿曰可修書一封差使往遼東鮮卑國見國王軻比能贈以金帛令起遼西羌兵十萬先從旱路取西平關此一路也再修遣使齎官誥賞賜直入南蠻見蠻王孟獲令起兵十萬攻打益州永昌牂牁越巂四郡以擊西川之南此二路也再遣使入吳修好許以割地令孫權起兵十萬攻兩川峽口徑取涪城此三路也又可差使至降將孟達處起上庸兵十萬西攻漢中此四路也然後命大將軍曹真爲大都督提兵十萬由京兆徑出陽平關取西川此五路也共大兵五十萬五路並進諸葛亮便有呂望之才安能當此乎丕大喜隨即密遣能言官四員爲使前去又命曹真爲大都督領兵十萬徑取陽平關此時張遼等一班舊將皆封列侯俱在冀徐青及合淝等處據守關津隘口故不復調用卻說蜀漢後主劉禪自即位以來舊臣多有病亡者不能細說凡一應朝廷選法錢糧詞訟等事皆聽諸葛丞相裁處時後主未立皇后孔明與群臣上言曰故車騎將軍張飛之女甚賢年十七歲可納爲正宮皇后後主即納之建興元年秋八月忽有邊報說魏調五路大兵來取西川第一路曹真爲大都督起兵十萬取陽平關第二路乃反將孟達起上庸兵十萬犯漢中第三路乃東吳孫權起精兵十萬取峽口入川第四路乃蠻王孟獲起蠻兵十萬犯益州四郡第五路乃番王軻比能起羌兵十萬犯西平關此五路軍馬甚是利害已先報知丞相丞相不知爲何數日不出視事後主聽罷大驚即差近待齎旨宣召孔明入朝使命去了半日回報丞相府下人言丞相染病不出後主轉慌次日又命黃門侍郎董允諫議大夫杜瓊去丞相臥榻前告此大事董杜二人初到丞相府前皆不得入杜瓊曰先帝托孤于丞相今主上初登寶位被曹丕五路兵犯境軍情至急丞相何故推病不出良久門吏傳丞相令言病體稍可明早出都堂議事董杜二人歎息而歸次日多官又來丞相府前伺候從早到晚又不見出多官惶惶只得散去杜瓊入奏後主曰請陛下聖駕親往丞相府問計後主即引多官入宮啓奏皇太后太后大驚曰丞相府何故如此有負先帝委託之意也我當自往董允奏曰娘娘未可輕往臣料丞相必有高明之見且待主上先往如果怠慢請娘娘于太廟中召丞相問之未遲太后依奏次日後主車駕親至相府門吏見駕到慌忙拜伏於地而迎後主問曰丞相在何處門吏曰不知在何處只有丞相鈞旨教擋住百官勿得輒入後主乃下車步行獨進第三重門見孔明獨倚竹杖在小池邊觀魚後主在後立久乃徐徐而言曰丞相安樂否孔明回顧見是後主慌忙棄杖拜伏於地曰臣該萬死後主扶起問曰今曹丕分兵五路犯境甚急相父緣何不肯出府視事孔明大笑扶後主入內室坐定奏曰五路兵至臣安得不知臣非觀魚有所思也後主曰如之奈何孔明曰羌王軻比能蠻王孟獲反將孟達魏將曹真此四路兵臣已皆退去了止有孫權這一路兵臣已有退之之計但須一能言之人爲使因未得其人故熟思之陛下何必憂乎後主聽罷又驚又喜曰相父果有鬼神不測之機也願聞退兵之策孔明曰先帝以陛下付託與臣臣安敢旦夕怠慢成都衆官皆不曉兵法之妙貴在使人不測豈可泄漏於人老臣先知西番國王軻比能引兵犯西平關臣料馬超積祖西州人氏素得羌人之心羌人以超爲神威天將軍臣已先遣一人星夜馳檄令馬超緊守西平關伏四路奇兵每日交換以兵拒之此一路不必憂矣又南蠻孟獲兵犯四郡臣亦飛繳魏延領一軍左出右入右出左入爲疑兵之計蠻兵惟憑勇力其心多疑若見疑兵必不敢進此一路又不足憂矣又知孟達引兵出漢中達與李嚴曾結生死之交臣回成都時留李嚴守永安宮臣已作一書只做李嚴親筆令人送與孟達達必然推病不出以慢軍心此一路又不足憂矣又知曹真引兵犯陽平關此地險峻可以保守臣已調趙雲引一軍守把關隘並不出戰曹真若見我軍不出不久自退矣此四路兵俱不足憂臣尚恐不能全保又密調關興張苞二將各引兵三萬屯於緊要之處爲各路救應此數處調遣之事皆不曾經由成都故無人知覺只有東吳這一路兵未必便動如見四路兵勝川中危急必來相攻若四路不濟安肯動乎臣料孫權想曹丕三路侵吞之怨必不肯從其言雖然如此須用一舌辯之士徑往東吳以利害說之則先退東吳其四路之兵何足憂乎但未得說吳之人臣故躊躇何勞陛下聖駕來臨後主曰太后亦欲來見相父今朕聞相父之言如夢初覺複何憂哉孔明與後主共飲數杯送後主出府衆官皆環立於門外見後主面有喜色後主別了孔明上禦車回朝衆皆疑惑不定孔明見衆官中一人仰天而笑面亦有喜色孔明視之乃義陽新野人姓鄧名芝字伯苗現爲戶部尚書漢司馬鄧禹之後孔明暗令人留住鄧芝多官皆散孔明請芝到書院中問芝曰今蜀魏吳鼎分三國欲討二國一統中興當先伐何國芝曰以愚意論之魏雖漢賊其勢甚大急難搖動當徐徐緩圖今主上初登寶位民心未安當與東吳連合結爲唇齒一洗先帝舊怨此乃長久之計也未審丞相鈞意若何孔明大笑曰吾思之久矣奈未得其人今日方得也芝曰丞相欲其人何爲孔明曰吾欲使人往結東吳公既能明此意必不能辱君命使乎之任非公不可芝曰愚才疏智淺恐不堪當此任孔明曰吾來日奏知天子便請伯苗一行切勿推辭芝應允而退至次日孔明奏准後主差鄧芝往說東吳芝拜辭望東吳而來正是吳人方見干戈息蜀使還將玉帛通未知鄧芝此去若何且看下文分解
