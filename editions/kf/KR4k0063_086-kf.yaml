body:
  text: 第八十六回難張溫秦宓逞天辯破曹丕徐盛用火攻卻說東吳陸遜自退魏兵之後吳王拜遜爲輔國將軍江陵侯領荊州牧自此軍權皆歸於遜張昭顧雍啓奏吳王請自改元權從之遂改爲黃武元年忽報魏主遣使至權召入使命陳說蜀前使人求救于魏魏一時不明故發兵應之今已大悔欲起四路兵取川東吳可來接應若得蜀土各分一半權聞言不能決乃問于張昭顧雍等昭曰陸伯言極有高見可問之權即召陸遜至遜奏曰曹丕坐鎮中原急不可圖今若不從必爲仇矣臣料魏與吳皆無諸葛亮之敵今且勉強應允整軍預備只探聽四路如何若四路勝川中危急諸葛亮首尾不能救主上則以兵以應之先取成都深爲上策如四路兵敗別作商議權從之乃謂魏使曰軍需未辦擇日便當起程使者拜辭而去權令人探得西番兵出西平關見了馬超不戰自退南蠻孟獲起兵攻四郡皆被魏延用疑兵計殺退回洞去上庸孟達兵至半路忽然染病不能行曹真兵出陽平關趙子龍拒住各處險道果然一將守關萬夫莫開曹真屯兵于斜穀道不能取勝而回孫權知了此信乃謂文武曰陸伯言真神算也孤若妄動又結怨於西蜀矣忽報西蜀遣鄧芝到張昭曰此又是諸葛亮退兵之計遣鄧芝爲說客也權曰當何以答之昭曰先於殿前立一大鼎貯油數百斤下用炭燒待其油沸可選身長面大武士一千人各執刀在手從宮門前直擺至殿上卻喚芝入見休等此人開言下說詞責以酈食其說齊故事效此例烹之看其人如何對答權從其言遂立油鼎命武士立于左右各執軍器召鄧芝入芝整衣冠而入行至宮門前只見兩行武士威風凜凜各持鋼刀大斧長戟短劍直列至殿上芝曉其意並無懼色昂然而行至殿前又見鼎鑊內熱油正沸左右武士以目視之芝但微微而笑近臣引至簾前鄧芝長揖不拜權令卷起珠簾大喝曰何不拜芝昂然而答曰上國天使不拜小邦之主權大怒曰汝不自料欲掉三寸之舌效酈生說齊乎可速入油鼎芝大笑曰人皆言東吳多賢誰想懼一儒生權轉怒曰孤何懼爾一匹夫耶芝曰既不懼鄧伯苗何愁來說汝等也權曰爾欲爲諸葛亮作說客來說孤絕魏向蜀是否芝曰吾乃蜀中一儒生特爲吳國利害而來乃設兵陳鼎以拒一使何其局量之不能容物耶權聞言惶愧即叱退武士命芝上殿賜坐而問曰吳魏之利害若何願先生教我芝曰大王欲與蜀和還是欲與魏和權曰孤正欲與蜀主講和但恐蜀主年輕識淺不能全始全終耳芝曰大王乃命世之英豪諸葛亮亦一時之俊傑蜀有山川之險吳有三江之固若二固連和共爲唇齒進則可以兼吞天下退則可以鼎足而立今大王若委質稱臣于魏魏必望大王進覲求太子以爲內侍如其不從則興兵來攻蜀亦順流而進取如此則江南之地不復爲大王有矣若大王以愚言不然愚將就死于大王之前以絕說客之名也言訖撩衣下殿望油鼎中便跳權急命止之請入後殿以上賓之禮相待權曰先生之言正合孤意孤今欲與蜀主連和先生肯爲我介紹乎芝曰適欲烹小臣者乃大王也今欲使小臣者亦大王也大王猶自孤疑未定安能取信於人權曰孤意已決先生勿疑於是吳王留住鄧芝集多官問曰孤掌江南八十一州更有荊楚之地反不如西蜀偏僻之處也蜀有鄧芝不辱其主吳並無一人入蜀以達孤意忽一人出班奏曰臣願爲使衆視之乃吳郡吳人姓張名溫字惠恕現爲中郎將權曰恐卿到蜀見諸葛亮不能達孤之情溫曰孔明亦人耳臣何畏彼哉權大喜重賞張溫使同鄧芝入川通好卻說孔明自鄧芝去後奏後主曰鄧芝此去其事必成吳地多賢定有人來答禮陛下當禮貌之令彼回吳以通盟好吳若通和魏必不敢加兵於蜀矣吳魏寧靖臣當征南平定蠻方然後圖魏魏削而東吳亦不能久存可以複一統之基業也後主然之忽報東吳遣張溫與鄧芝入川答禮後主聚文武於丹墀令鄧芝張溫入溫自以爲得志昂然上殿見後主施禮後主賜錦墩坐于殿左設禦宴待之後主但敬禮而已宴罷百官送張溫到館舍次日孔明設宴相待孔明謂張溫曰先帝在日與吳不睦今已晏駕當今主上深慕吳王欲揖舊忿永結盟好並力破魏望大夫善言回奏張溫領諾酒至半酣張溫喜笑自若頗有傲慢之意次日後主將金帛賜與張溫設宴于城南郵亭之上命衆官相送孔明殷勤勸酒正飲酒間忽一人乘醉而入昂然長揖入席就坐溫怪之乃問孔明曰此何人也孔明答曰姓秦名宓字子敕現爲益州學士溫笑曰名稱學士未知胸中曾學事否宓正色而言曰蜀中三尺小童尚皆就學何況於我溫曰且說公何所學宓對曰上至天文下至地理三教九流諸子百家無所不通古今興廢聖賢經傳無所不覽溫笑曰公既出大言請即以天爲問天有頭乎宓曰有頭溫曰頭在何方宓曰在西方詩雲乃眷西顧以此推之頭在西方也溫又問天有耳乎宓答曰天處高而聽卑詩雲鶴鳴九臯聲聞於天無耳何能聽溫又問曰天有足乎宓曰有足詩雲天步艱難無足何能步溫又問天有姓乎宓曰豈得無姓溫曰何姓宓答曰姓劉溫曰何以知之宓曰天子姓劉以故知之溫又問曰日生於東乎宓對曰雖生於東而沒於西此時秦宓語言清朗答問如流滿座皆驚張溫無語宓乃問曰先生東吳名士既以天事下問必能深明天之理昔混沌既分陰陽剖判輕清者上浮而爲天重濁者下凝而爲地至共工氏戰敗頭觸不周山天柱折地維缺天傾西北地陷東南天既輕清而上浮何以傾其西北乎又未知輕清之外還是何物願先生教我張溫無言可對乃避席而謝曰不意蜀中多出俊傑恰聞講論使仆頓開茅塞孔明恐溫羞愧故以善言解之曰席間問難皆戲談耳足下深知安邦定國之道何在唇齒之戲哉溫拜謝孔明又令鄧芝入吳答禮就與張溫同行張鄧二人拜辭孔明望東吳而來卻說吳王見張溫入蜀未還乃聚文武商議忽近臣奏曰蜀遣鄧芝同張溫入國答禮權召入張溫拜於殿前備稱後主孔明之德願求永結盟好特遣鄧尚文又來答禮權大喜乃設宴待之權問鄧芝曰若吳蜀二國同心滅魏得天下太平二主分治豈不樂乎芝答曰天無二日民無二王如滅魏之後未識天命所歸何人但爲君者各修其德爲臣者各盡其忠則戰爭方息耳權大笑曰君之誠款乃如是耶遂厚贈鄧芝還蜀自此吳蜀通好卻說魏國細作探知此事火速報入中原魏王曹丕聽知大怒曰吳蜀連和必有圖中原之意也不若朕先伐之於是大集文武商議起兵伐吳此時大司馬曹仁太尉賈詡已亡侍中辛毗出班奏曰中原之地土闊民稀而欲用兵未見其利今日之計莫若養兵屯田十年足食足兵然後用之則吳蜀方可破也丕怒曰此迂儒之論也今吳蜀連和早晚必來侵境何暇等待十年即傳旨起兵伐吳司馬懿奏曰吳有長江之險非船莫渡陛下必禦駕親征可選大小戰船從蔡潁而入淮取壽春至廣陵渡江口徑取南徐此爲上策丕從之於是日夜並工造龍舟十只長二十餘丈可容二千餘人收拾戰船三千餘隻魏黃初五年秋八月會聚大小將士令曹真爲前部張遼張郃文聘徐晃等爲大將先行許褚呂虔爲中軍護衛曹休爲合後劉曄蔣濟爲參謀官前後水陸軍馬三十余萬克日起兵封司馬懿爲尚書仆射留在許昌凡國政大事並皆聽懿決斷不說魏兵起程卻說東吳細作探知此事報入吳國近臣慌奏吳王曰今魏王曹丕親自乘駕龍舟提水陸大軍三十餘萬從蔡潁出淮必取廣陵渡江來下江南甚爲利害孫權大驚即聚文武商議顧雍曰今主上既與西蜀連和可修書與諸葛孔明令起兵出漢中以分其勢一面遣一大將屯兵南徐以拒之權曰非陸伯言不可當此大任雍曰陸伯言鎮守荊州不可輕動權曰孤非不知奈眼前無替力之人言未盡一人從班部內應聲而出曰臣雖不才願統一軍以當魏兵若曹丕親渡大江臣必生擒以獻殿下若不渡江亦殺魏兵大半令魏兵不敢正視東吳權視之乃徐盛也權大喜曰如果卿守江南一帶孤何憂哉遂封徐盛爲安東將軍總鎮都督建業南徐軍馬盛謝恩領命而退即傳令教衆官軍多置器械多設旌旗以爲守護江岸之計忽一人挺身出曰今日大王以重任委託將軍欲破魏兵以擒曹丕將軍何不早發軍馬渡江於淮南之地迎敵直待曹丕兵至恐無及矣盛視之乃吳王侄孫韶也韶字公禮官授揚威將軍曾在廣陵守禦年幼負氣極有膽勇盛曰曹丕勢大更有名將爲先鋒不可渡江迎敵待彼船皆集於北岸吾自有計破之韶曰吾手下自有三千軍馬更兼深知廣陵路勢吾願自去江北與曹丕決一死戰如不勝甘當軍令盛不從韶堅執要去盛只是不肯韶再三要行盛怒曰汝如此不聽號令吾安能制諸將乎叱武士推出斬之刀斧手擁孫韶出轅門之外立起皂旗韶部將飛報孫權權聽知急上馬來救武士恰待行刑孫權早到喝散刀斧手救了孫韶韶哭奏曰臣往年在廣陵深知地利不就那裏與曹丕廝殺直待他下了長江東吳指日休矣權徑入營來徐盛迎接入帳奏曰大王命臣爲都督提兵拒魏今揚威將軍孫韶不遵軍法違令當斬大王何故赦之權曰韶倚血氣之壯誤犯軍法萬希寬怒盛曰法非臣所立亦非大王所立乃國家之典刑也若以親而免之何以令衆乎權曰韶犯法本應任將軍處治奈此子雖本姓俞氏然孤兄甚愛之賜姓孫於孤頗有勞績令若殺之負兄義矣盛曰且看大王之面寄下死罪權令孫韶謝韶不肯拜厲聲而言曰據吾之見只是引軍去破曹丕便死也不服你的見識徐盛變色權叱退孫韶謂徐盛曰便無此子何損於兵今後勿再用之言訖自回是夜人報徐盛說孫韶引本部三千精兵潛地過江去了盛恐有失于吳王面上不好看乃喚丁奉授以密計引三千兵渡江接應卻說魏王駕龍舟至廣陵前部曹真已領兵列于大江之岸曹丕問曰江岸有多少兵真曰隔岸遠望並不見一人亦無旌旗營寨丕曰此必詭計也朕自往觀其虛實於是大開江道放龍舟直至大江泊於江岸船上建龍鳳日月五色旌旗儀鑾簇擁光耀射目曹丕端坐舟中遙望江南不見一人回顧劉曄蔣濟曰可渡江否曄曰兵法實實虛虛彼見大軍至如何不作整備陛下未可造次且待三五日看其動靜然後發先鋒渡江以探之丕曰卿言正合朕意是日天晚宿于江中當夜月黑軍士皆執燈火明耀天地恰如白晝遙望江南並不見半點兒火光丕問左右曰此何故也近臣奏曰想聞陛下天兵來到故望風逃竄耳丕暗笑及至天曉大霧迷漫對面不見須臾風起霧散雲收望見江南一帶皆是連城城樓上槍刀耀日遍城盡插旌旗號帶頃刻數次人來報南徐沿江一帶直至石頭城一連數百里城郭舟車連綿不絕一夜成就曹丕大驚原來徐盛束縛蘆葦爲人盡穿青衣執旌旗立於假城疑樓之上魏兵見城上許多人馬如何不膽寒丕歎曰魏雖有武士千群無所用之江南人物如此未可圖也正驚訝間忽然狂風大作白浪滔天江水濺濕龍袍大船將覆曹真慌令文聘撐小舟急來救駕龍舟上人立站不住文聘跳上龍舟負丕下得小舟奔入河港忽流星馬報道趙雲引兵出陽平關徑取長安丕聽得大驚失色便教回軍衆軍各自奔走背後吳兵追至丕傳旨教盡棄禦用之物而走龍舟將次入淮忽然鼓角齊鳴喊聲大震斜刺裏一彪軍殺到爲首大將乃孫韶也魏兵不能抵當折其大半淹死者無數諸將奮力救出魏主魏主渡淮河行不三十裏淮河中一帶蘆葦預灌魚油盡皆火著順風而下風勢甚急火焰漫空絕住龍舟丕大驚急下小船傍岸時龍舟上早已火著丕慌忙上馬岸上一彪軍殺來爲首一將乃丁奉也張遼急拍馬來迎被奉一箭射中其腰卻得徐晃救了同保魏主而走折軍無數背後孫韶丁奉奪得馬匹車仗船隻器械不計其數魏兵大敗而回吳將徐盛全獲大功吳王重加賞賜張遼回到許昌箭瘡迸裂而亡曹丕厚葬之不在話下卻說趙雲引兵殺出陽平關之次忽報丞相有文書到說益州耆帥雍闓結連蠻王孟獲起十萬蠻兵侵掠四郡因此宣雲回軍令馬超堅守陽平關丞相欲自南征趙雲乃急收兵而回此時孔明在成都整飭軍馬親自南征正是方見東吳敵北魏又看西蜀戰南蠻未知勝負如何且看下文分解
