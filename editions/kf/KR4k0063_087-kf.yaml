body:
  text: 第八十七回征南寇丞相大興師抗天兵蠻王初受執卻說諸葛丞相在於成都事無大小皆親自從公決斷兩川之民忻樂太平夜不閉戶路不拾遺又幸連年大熟老幼鼓腹謳歌凡遇差徭爭先早辦因此軍需器械應用之物無不完備米滿倉廒財盈府庫建興三年益州飛報蠻王孟獲大起蠻兵十萬犯境侵掠建甯太守雍闓乃漢朝什方侯雍齒之後今結連孟獲造反牂牁郡太守朱褒越闓郡太守高定二人獻了城止有永昌太守王伉不肯反現今雍闓朱褒高定三人部下人馬皆與孟獲爲向導官攻打永昌郡今王伉與功曹呂凱會集百姓死守此城其勢甚急孔明乃入朝奏後主曰臣觀南蠻不服實國家之大患也臣當自領大軍前去征討後主曰東有孫權北有曹丕今相父棄朕而去倘吳魏來攻如之奈何孔明曰東吳方與我國講和料無異心若有異心李嚴在白帝城此人可當陸遜也曹丕新敗銳氣已喪未能遠圖且馬超守把漢中諸處關口不必憂也臣又留關興張苞等分兩軍爲救應保陛下萬無一失今臣先去掃蕩蠻方然後北伐以圖中原報先帝三顧之恩托孤之重後主曰朕年幼無知惟相父斟酌行之言未畢班部內一人出曰不可不可衆視之乃南陽人也姓王名連字文儀現爲諫義大夫連諫曰南方不毛之地瘴疫之鄉丞相秉鈞衡之重任而自遠征非所宜也且雍闓等乃疥癬之疾丞相只須遣一大將討之必然成功孔明曰南蠻之地離國甚遠人多不習王化收伏甚難吾當親去征之可剛可柔別有斟酌非可容易托人王連再三苦勸孔明不從是日孔明辭了後主令蔣琬爲參軍費禕爲長史董厥樊建二人掾史趙雲魏延爲大將總督軍馬王平張翼爲副將並川將數十員共起川兵五十萬前望益州進發忽有關公第三子關索入軍來見孔明曰自荊州失陷逃難在鮑家莊養病每要赴川見先帝報仇瘡痕未合不能起行近已安痊打探得東吳仇人已皆誅戮徑來西川見帝恰在途中遇見征南之兵特投見孔明聞之嗟訝不已一面遣人申報朝廷就令關索爲前部先鋒一同征南大隊人馬各依隊伍而行饑餐渴飲夜住曉行所經之處秋亳無犯卻說雍闓聽知孔明自統大軍而來即與高定朱褒商議分兵三路高定取中路雍闓在左朱褒在右三路各引兵五六萬迎敵於是高定令鄂煥爲前部先鋒煥身長九尺面貌醜惡使一枝方天戟有萬夫不當之勇領本部兵離了大寨來迎蜀兵卻說孔明統大軍已到益州界分前部先鋒魏延副將張翼王平才入界口正遇鄂煥軍馬兩陣對圓魏延出馬大罵曰反賊早早受降鄂煥拍馬與魏延交鋒戰不數合延詐敗走煥隨後趕來走不數裏喊聲大震張翼王平兩路軍殺來絕其後路延複回三員將並力拒戰生擒鄂煥解到大寨入見孔明孔明令去其縛以酒食待之問曰汝是何人部將煥曰某是高定部將孔明曰吾知高定乃忠義之士今爲雍闓所惑以致如此吾今放汝回去令高太守早早歸降免遭大禍鄂煥拜謝而去回見高定說孔明之德定亦感激不已次日雍闓至寨禮畢闓曰如何得鄂煥回也定曰諸葛亮以義放之闓曰此乃諸葛亮反間之計欲令我兩人不和故施此謀也定半信不信心中猶豫忽報蜀將搦戰闓自引三萬兵出迎戰不數合闓撥馬便走延率兵大進追殺二十餘裏次日雍闓又起兵來迎孔明一連三日不出至第四日雍闓高定分兵兩路來取蜀寨卻說孔明令魏延兩路伺候果然雍闓高定兩路兵來被伏兵殺傷大半生擒者無數都解到大寨來雍闓的人囚在一邊高定的人囚在一邊卻令軍士謠說但是高定的人免死雍闓的人盡殺衆軍皆聞此言少時孔明令取雍闓的人到帳前問曰汝等皆是何人部從衆僞曰高定部下人也孔明教皆免其死與酒食賞勞令人送出界首縱放回寨孔明又喚高定的人問之衆皆告曰吾等實是高定部下軍士孔明亦皆免其死賜以酒食卻揚言曰雍闓今日使人投降要獻汝主並朱褒首級以爲功勞吾甚不忍汝等既是高定部下軍吾放汝等回去再不可背反若再擒來決不輕恕衆皆拜謝而去回到本寨入見高定說知此事定乃密遣人去闓寨中探聽卻有一般放回的人言說孔明之德因此雍闓部軍多有歸順高定之心雖然如此高定心中不穩又令一人來見孔明寨中探聽虛實被伏路軍捉來見孔明孔明故意認做雍闓的人喚入帳中問曰汝元帥既約下獻高定朱褒二人首級因何誤了日期汝這廝不精細如何做得細作軍士含糊答應孔明以酒食賜之修密書一封付軍士曰汝持此書付雍闓教他早早下手休得誤事細作拜謝而去回見高定呈上孔明之書說雍闓如此如此定看書畢大怒曰吾以真心待之彼反欲害吾情理難難容便喚鄂煥商議煥曰孔明乃仁人背之不祥我等謀反作惡皆是雍闓之故不如殺闓以投孔明定曰如何下手煥曰可設一席令人去請雍闓彼若無異心必坦然而來若其不來必有異心我主可攻其前某伏於寨後小路候之闓可擒矣高定從其言設席請雍闓闓果疑前日放回軍士之言懼而不來是夜高定引兵殺投雍闓寨中原來有孔明放回免死的人皆想高定之德乘時助戰雍闓軍不戰自亂闓上馬望山路而走行不二裏鼓聲響處一彪軍出乃鄂煥也挺方天戟驟馬當先雍闓措手不及被煥一戟刺于馬下就梟其首級闓部下軍士皆降高定定引兩部軍來降孔明獻雍闓首級於帳下孔明高坐於帳上喝令左右推轉高定斬首報來定曰某感丞相大恩今將雍闓首級來降何故斬也孔明大笑曰汝來詐降敢瞞吾耶定曰丞相何以知吾詐降孔明於匣中取出一緘與高定曰朱褒已使人密獻詔書說你與雍闓結生死之交豈肯一旦便殺此人吾故汝詐也定叫屈曰朱褒乃反間計也丞相切不可信孔明曰吾亦難憑一面之詞汝若捉得朱褒方表其心定曰丞相休疑某去擒朱褒來見丞相若何孔明曰若如此吾疑心方息也高定即引部將鄂煥並本部兵殺奔朱褒營來比及離寨約有十裏山後一彪軍到乃朱褒也褒見高定軍來慌忙與高定答話定大罵曰汝如何寫書與諸葛丞相處使反間之計害吾耶褒目瞪口呆不能回答忽然鄂煥于馬後轉過一戟刺朱褒于馬下定厲聲而言曰如不順者皆戮之於是衆軍一齊拜降定引兩部軍來見孔明獻朱褒首級於帳下孔明大笑曰吾故使汝殺此二賊以表忠心遂命高定爲益州太守總攝三郡令鄂煥爲牙將三路軍馬已平於是永昌太守王伉出城迎接孔明孔明入城已畢問曰誰與公守此城以保無虞伉曰某今日得此郡無危者皆賴永昌不韋人姓呂名凱字季平皆此人之力孔明遂請呂凱至凱入見禮畢孔明曰久聞公乃永昌高士多虧公保守此城今欲平蠻方公有何高見呂凱遂取一圖呈與孔明曰某自曆仕以來知南人欲反久矣故密遣人入其境察看可屯兵交戰之處畫成一圖名曰平蠻指掌圖今敢獻與明公明公試觀之可爲征蠻之一助也孔明大喜就用呂凱爲行軍教授兼向導官於是孔明提兵大進深入南蠻之境正行軍之次忽報天子差使命至孔明請入中軍但見一人素袍白衣而進乃馬謖也爲兄馬良新亡因此挂謖曰奉主上敕命賜衆軍酒帛孔明接詔已畢依命一一給散遂留馬謖在帳敘話孔明問曰吾奉天子詔削平蠻方久聞幼常高見望乞賜教謖曰愚有片言望丞相察之南蠻恃其地遠山險不服久矣雖今日破之明日複叛丞相大軍到彼必然平服但班師之日必用北伐曹丕蠻兵若知內虛其反必速夫用兵之道攻心爲上攻城爲下心戰爲上兵戰爲下願丞相但服其心足矣孔明歎曰幼常足知吾肺俯也於是孔明遂令馬謖爲參軍即統大兵前進卻說蠻王孟獲聽知孔明智破雍闓等遂聚三洞元帥商議第一洞乃金環三結元帥第二洞乃董荼那元帥第三洞乃阿會喃元帥三洞元帥入見孟獲獲曰今諸葛丞相領大軍來侵我境界不得不並力敵之汝三人可分兵三路而進如得勝者便爲洞主於是分金環三結取中路董荼那取左路阿會喃取右路各引五萬蠻兵依令而行卻說孔明正在寨中議事忽哨馬飛報說三洞元帥分兵三路到來孔明聽畢即喚趙雲魏延至卻都不分付更喚王平馬忠至囑之曰今蠻兵三路而來吾欲令子龍文長去此二人不識地理未敢用之王平可往左路迎敵馬忠可往右路迎敵吾卻使子龍文長隨後接應今日整頓軍馬來日平明進發二人聽令而去又喚張嶷張翼分付曰汝二人同領一軍往中路迎敵今日整點軍馬來日與王平馬忠約會而進吾欲令子龍文長去取奈二人不識地理故未敢用之張嶷張翼聽令去了趙雲魏延見孔明不用各有慍色孔明曰吾非不用汝二人但恐以中年涉險爲蠻人所算失其銳氣耳趙雲曰倘我等識地理若何孔明曰汝二人只宜小心休得妄動二人怏怏而退趙雲請魏延到自己寨內商議曰吾二人爲先鋒卻說不識地理而不肯用今用此後輩吾等豈不羞乎延曰吾二人只今就上馬親去探之捉住土人便教引進以敵蠻兵大事可成雲從之遂上馬徑取中路而來方行不數裏遠遠望見塵頭大起二人上山坡看時果見數十騎蠻兵縱馬而來二人兩路沖出蠻兵見了大驚而走趙雲魏延各生擒幾人回到本寨以酒食待之卻細問其故蠻兵告曰前面是金環三結元帥大寨正在山口寨邊東西兩路卻通五溪洞並董荼那阿會喃各寨之後趙雲魏延聽知此話遂點精兵五千教擒來蠻兵引路比及起軍時已是二更天氣月明星朗趁著月色而行剛到金環三結大寨之時約有四更蠻兵方起造飯準備天明廝殺忽然趙雲魏延兩路殺入蠻兵大亂趙雲直殺入中軍正逢金環三結元帥交馬只一合被雲一槍刺落馬下就梟其首級餘軍潰散魏延便分兵一半望東路抄董荼那寨來趙雲分兵一半望西路抄阿會喃寨來比及殺到蠻兵大寨之時天已平明先說魏延殺奔到董荼那寨來董荼那聽知寨後有軍殺至便引兵出寨拒敵忽然寨前門一聲喊起蠻兵大亂原來王平軍馬早已到了兩下夾攻蠻兵大敗董荼那奪路走脫魏延追趕不上卻說趙雲引兵殺到阿會喃寨後之時馬忠已殺到寨前兩下夾攻蠻兵大敗阿會喃乘亂走脫各自收軍回見孔明孔明問曰三洞蠻兵走了兩洞之主金環三結元帥首級安在趙雲將首級獻功衆皆言曰董荼那阿會喃皆棄馬越嶺而去因此趕他不上孔明大笑曰二人吾已擒下趙魏二人並諸將皆不信少頃張嶷解董荼那到張翼解阿會喃到衆皆驚訝孔明曰吾觀呂凱圖本已知他各人下的寨子故以言激子龍文長之銳氣故教深入重地先破金環三結隨即分兵左右寨後抄出以王平馬忠應之非子龍文長不可當此任也吾料董荼那阿會喃必從便徑往山路而走故遣張嶷張翼以伏兵待之令關索以兵接應擒此二人諸將皆拜伏曰丞相機算神鬼莫測孔明令押過董荼那阿會喃至帳下盡去其縛以酒食衣服賜之令各自歸洞勿得助惡二人泣拜各投小路而去孔明謂諸將曰來日孟獲必然親自引兵廝殺便可就此擒之乃喚趙雲魏延至付與計策各引五千兵去了又喚王平關索同引一軍授計而去孔明分撥已畢坐於帳上待之卻說蠻王孟獲在帳中正坐忽哨馬報來說三洞元帥俱被孔明捉將去了部下之兵各自潰散獲大怒遂起蠻兵迤邐進發正遇王平軍馬兩陣對圓王平出馬橫刀望之只見門旗開處數百南蠻騎將兩勢擺開中間孟獲出馬頭頂嵌寶紫金冠身披纓絡紅錦袍腰系碾玉獅子帶腳穿鷹嘴抹綠靴騎一匹卷毛赤兔馬懸兩口松紋鑲寶劍昂然觀望回顧左右蠻將曰人每說諸葛亮善能用兵今觀此陣旌旗雜亂隊伍交錯刀槍器械無一可能勝吾者始知前日之言謬也早知如此吾反多時矣誰敢去擒蜀將以振軍威言未盡一將應聲而出名喚牙長使一口截頭大刀騎一匹黃驃馬來取王平二將交鋒戰不數合王平便走孟獲驅兵大進迤邐追趕關索略戰又走約退二十餘裏孟獲正追殺之間忽然喊聲大起左有張嶷右有張翼兩路兵殺出截斷歸路王平關索複兵殺回前後夾攻蠻兵大敗孟獲引部將死戰得脫望錦帶山而逃背後三路兵追殺將來獲正奔走之間前面喊聲大起一彪軍攔住爲首大將乃常山趙子龍也獲見了大驚慌忙奔錦帶山小路而走子龍衝殺一陣蠻兵大敗生擒者無數孟獲止與數十騎奔入山谷之中背後追兵至近前面路狹馬不能行乃棄了馬匹爬山越嶺而逃忽然山谷中一聲鼓響乃是魏延受了孔明計策引五百步軍伏於此處孟獲抵敵不住被魏延生擒活捉了從騎皆降魏延解孟獲到大寨來見孔明孔明早已殺牛宰羊設宴在寨卻教帳中排開七重圍子手刀槍劍戟燦若霜雪又執禦賜黃金鋮斧曲柄傘蓋前後羽葆鼓吹左右排開禦林軍布列得十分嚴整孔明端坐於帳上只見蠻兵紛紛穰穰解到無數孔明喚到帳中盡去其縛撫諭曰汝等皆是好百姓不幸被孟獲所拘今受驚唬吾想汝等父母兄弟妻子必倚門而望若聽知陣敗定然割肚牽腸眼中流血吾今盡放汝等回去以安各人父母兄弟妻子之心言訖各賜酒食米糧而遣之蠻兵深感其恩泣拜而去孔明教喚武士押過孟獲來不移時前推後擁縛至帳前獲跪於帳下孔明曰先帝待汝不薄汝何敢背反獲曰兩川之地皆是他人所占土地汝主倚強奪之自稱爲帝吾世居此處汝等無禮侵我土地何爲反耶孔明曰吾今擒汝汝心服否獲曰山僻路狹誤遭汝手如何肯服孔明曰汝既不服吾放汝去若何獲曰汝放我回去再整軍馬共決雌雄若能再擒吾吾方服也孔明即令去其縛與衣服穿了賜以酒食給與鞍馬差人送出路徑望本寨而去正是寇入掌中還放去人居化外未能降未知再來交戰若何且看下文分解
