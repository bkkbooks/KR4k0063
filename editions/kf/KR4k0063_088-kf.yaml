body:
  text: 第八十八回渡瀘水再縛番王識詐降三擒孟獲卻說孔明放了孟獲衆將上帳問曰孟獲乃南蠻渠魁今幸被擒南方便定丞相何故放之孔明笑曰吾擒此人如囊中取物耳直須降伏其心自然平矣諸將聞言皆未肯信當日孟獲行至瀘水正遇手下敗殘的蠻兵皆來尋探衆兵見了孟獲且驚且喜拜問曰大王如何能勾回來獲曰蜀人監我在帳中被我殺死十餘人乘夜黑而走正行間逢著一哨馬軍亦被我殺之奪了此馬因此得脫衆皆大喜擁孟獲渡過瀘水下住寨柵會集各洞酋長陸續招聚原放回的蠻兵約有十余萬騎此時董荼那阿會喃已在洞中孟獲使人去請二人懼怕只得也引洞兵來獲傳令曰吾已知諸葛亮之計矣不可與戰戰則中他詭計彼川兵遠來勞苦況即日天炎彼兵豈能久住吾等有此瀘水之險將船筏盡拘在南岸一帶皆築土城深溝高壘看諸葛亮如何施謀衆酋長從其計盡拘船筏于南岸一帶築起土城有傍山傍崖之地高豎敵樓樓上多設弓弩炮石準備久處之計糧草皆是各洞供運孟獲以爲萬全之策坦然不憂卻說孔明提兵大進前軍已至瀘水哨馬飛報說瀘水之內並無船筏又兼水勢甚急隔岸一帶築起土城皆有蠻兵守把時值五月天氣炎熱南方之地分外炎酷軍馬衣甲皆穿不得孔明自至瀘水邊觀畢回到本寨聚諸將至帳中傳令曰今孟獲兵屯瀘水之南深溝高壘以拒我兵吾既提兵至此如何空回汝等各各引兵依山傍樹揀林木茂盛之處與我將息人馬乃遣呂凱離瀘水百里揀陰涼之地分作四個寨子使王平張嶷張翼關索各守一寨內外皆搭草柵遮蓋馬匹將士乘涼以避暑氣參軍蔣琬看了入問孔明曰某看呂凱所造之寨甚不好正犯昔日先帝敗於東吳時之地勢矣倘蠻兵偷渡瀘水前來劫寨若用火攻如何解救孔明笑曰公勿多疑吾自有妙算蔣琬等皆不曉其意忽報蜀中差馬岱解暑藥並糧米到孔明令入岱參拜畢一面將米藥分派四寨孔明問曰汝帶多少軍來馬岱曰有三千軍孔明曰吾軍累戰疲困欲用汝軍未知肯向前否岱曰皆是朝廷軍馬何分彼我丞相要用雖死不辭孔明曰今孟獲拒住瀘水無路可渡吾欲先斷其糧道令彼軍自亂岱曰如何斷得孔明曰離此一百五十裏瀘水下流沙口此處水慢可以紮筏而渡汝提本部三千軍渡水直入蠻洞先斷其糧然後會合董荼那阿會喃兩個洞主使爲內應不可有誤馬岱欣然去了領兵前到沙口驅兵渡水因見水淺大半不下筏只裸衣而過半渡皆倒急救傍岸口鼻出血而死馬岱大驚連夜回告孔明孔明隨喚向導土人問之土人曰目今炎天毒聚瀘水日間甚熱毒氣正發有人渡水必中其毒或飲此水其人必死若要渡時須待夜靜水冷毒氣不起飽食渡之方可無事孔明遂令土人引路又選精壯軍五六百隨著馬岱來到瀘水沙口紮起木筏半夜渡水果然無事貸領著二千壯軍令土人引路徑取蠻洞運糧總路口夾山峪而來那夾山峪兩下是山中間一條路止容一人一馬而過馬岱占了夾山峪分撥軍士立起寨柵洞蠻不知正解糧到被岱前後截住奪糧百余車蠻人報入孟獲大寨中此時孟獲在寨中終日飲酒作樂不理軍務謂衆酋長曰吾若與諸葛亮對敵必中奸計今靠此瀘水之險深溝高壘以待之蜀人受不過酷熱必然退走那時吾與汝等隨後擊之便可擒諸葛亮也言訖呵呵大笑忽然班內一酋長曰沙口水淺倘蜀兵透漏過來深爲利害當分軍守把獲笑曰汝是本處土人如何不知吾正要蜀兵來渡此水渡則必死于水中矣酋長曰倘有土人說與夜渡之法當複何如獲曰不必多疑吾境內之人安肯助敵人耶正言之間忽報蜀兵不知多少暗渡瀘水絕斷了夾山糧道打著平北將軍馬岱旗號獲笑曰量此小輩何足道哉即遣副將忙牙長引三千兵投夾山峪來卻說馬岱望見蠻兵已到遂將二千軍擺在山前兩陣對圓忙牙長出馬與馬岱交鋒只一合被岱一刀斬于馬下蠻兵大敗走回來見孟獲細言其事獲喚諸將問曰誰敢去敵馬岱言未畢董荼那曰某願往孟獲大喜遂與三千兵而去獲又恐有人再渡瀘水即遣阿會喃引三千軍去守把沙口卻說董荼那引蠻兵到了夾山峪下寨馬岱引兵來迎部內軍有認得是董荼那說與馬岱如此如此岱縱馬向前大罵曰無義背恩之徒吾丞相饒汝性命今又背反豈不自羞董荼那滿面慚愧無言可答不戰而退馬岱掩殺一陣而回董荼那回見孟獲曰馬岱英雄抵敵不住獲大怒曰吾知汝原受諸葛亮之恩今故不戰而退正是賣陣之計喝教推出斬了衆酋長再三哀告方才免死叱武士將董荼那打了一百大棍放歸本寨諸多酋長皆來告董荼那曰我等雖居蠻方未嘗敢犯中國中國亦不曾侵我今因孟獲勢力相逼不得已而造反想孔明神機莫測曹操孫權尚自懼之何況我等蠻方乎況我等皆受其活命之恩無可爲報今欲舍一死命殺孟獲去投孔明以免洞中百姓塗炭之苦董荼那曰未知汝等心下若何內有原蒙孔明放回的人一齊同聲應曰願往於是董荼那手執鋼馬引百餘人直奔大寨而來時孟獲大醉於帳中董荼那引衆人持刀而入帳下有兩將侍立董荼那以刀指曰汝等亦受諸葛丞相活命之恩宜當報效二將曰不須將軍下手某當生擒孟獲去獻丞相於是一齊入帳將孟獲執縛已定押到瀘水邊駕船直過北岸先使人報知孔明卻說孔明已有細作探知此事於是密傳號令教各寨將士整頓軍器方教爲首酋長解孟獲入來其餘皆回本寨聽候董荼那先入中軍見孔明細說其事孔明重加賞勞用好言撫慰遣董荼那引衆酋長去了然後令刀斧手推孟獲入孔明笑曰汝前者有言但再擒得便肯降服今日如何獲曰此非汝之能也乃吾手下之人自相殘害以致如此如何肯服孔明曰吾今再放汝去若何孟獲曰吾雖蠻人頗知兵法若丞相端的肯放吾回洞中吾當率兵再決勝負若丞相這番再擒得我那時傾心吐膽歸降並不敢改移也孔明曰這番生擒如當不服必無輕恕令左右去其繩索仍前賜以酒食列坐於帳上孔明曰吾自出茅廬戰無不勝攻無不取汝蠻邦之人何爲不服獲默然不答孔明酒後喚孟獲同上馬出寨觀看諸營寨柵所屯糧草所積軍器孔明指謂孟獲曰汝不降吾真愚人也吾有如此之精兵猛將糧草兵器汝安能勝吾哉汝若早降吾當奏聞天子令汝不失王位子子孫孫永鎮蠻邦意下若何獲曰某雖肯降怎奈洞中之人未肯心服若丞相肯放回去就當招安本部人馬同心合膽方可歸順孔明忻然又與孟獲回到大寨飲酒至晚獲辭去孔明親自送到瀘水邊以船送獲歸寨孟獲來到大寨先伏刀斧手於帳下差心腹到董荼那阿會喃寨中只推孔明有使命至將二人賺到大寨帳下盡皆殺之棄屍於澗孟獲隨即遣親信之人守把隘口自引軍出了夾山峪要與馬岱交戰卻並不見一人及問土人皆言昨夜盡搬糧草複渡瀘水歸大寨去了獲再回洞中與親弟孟優商議曰如今諸葛亮之虛實吾已盡知汝可去如此如此孟優領了兄計引百餘蠻兵搬載金珠寶貝象牙犀角之類渡過瀘水往投孔明大寨而來方才過了河時前面鼓角齊鳴一彪軍擺開爲首大將乃馬岱也孟優大驚岱問了來情令在外廂差人來報孔明孔明正在帳中與馬謖呂凱蔣琬費禕等共議平蠻之事忽帳下一人報孟獲差弟孟優來進寶貝孔明回顧馬謖曰汝知其來意否謖曰不敢明言容某暗寫於紙上呈與丞相看合鈞意否孔明從之馬謖寫訖呈與孔明孔明看畢撫掌大笑曰擒孟獲之計吾已差派下也汝之所見正與吾同遂喚趙雲入向耳畔分付如此如此又喚魏延入亦低言分付又喚王平馬忠關索入亦密密地分付各人受了計策皆依令而去方召孟優入帳優再拜於帳下曰家兄孟獲感丞相活命之恩無可奉獻輒具金珠寶貝若干權爲賞軍之資續後別有進貢天子禮物孔明曰汝兄今在何處優曰爲感丞相天恩徑往銀坑山中收拾寶物去了少時便回來也孔明曰汝帶多少人來優曰不敢多帶只是隨行百餘人皆運貨物者孔明盡教入帳看時皆是青眼黑面黃發紫須耳帶金環鬅頭跣足身長力大之士孔明就令隨席而坐教諸將勸酒殷勤相待卻說孟獲在帳中專望回音忽報有二人回了喚入問之具說諸葛亮受了禮物大喜將隨行之人皆喚入帳中殺牛宰羊設宴相待二大王令某密報大王今夜二更裏應外合以成大事孟獲聽知甚喜即點三萬蠻兵分爲三隊獲喚各洞酋長分付曰各軍盡帶火具今晚到了蜀寨時放火爲號吾當自取中軍以擒諸葛亮諸多蠻將受了計策黃昏左側各渡瀘水而來孟獲帶領心腹蠻將百餘人徑投孔明大寨於路並無一軍阻當前至寨門獲率衆將驟馬而入乃是空寨並不見一人獲撞入中軍只見帳中燈燭熒煌孟優並番兵皆醉倒原來孟優被孔明教馬謖呂凱二人管待令樂人搬做雜劇殷勤勸酒酒內下藥盡皆昏倒渾如醉死之人孟獲入帳問之內有醒者但指口而已獲知中計急救了孟優等一干人卻待奔回中隊前面喊聲大震火光驟起蠻兵各自逃竄一彪軍殺到乃是蜀將王平獲大驚急奔左隊時火光沖天一彪軍殺到爲首蜀將乃是魏延獲慌忙望右隊而來只見火光又起又一彪軍殺到爲首蜀將乃是趙雲三路軍夾攻將來四下無路孟獲棄了軍士匹馬望瀘水而逃正見瀘水上數十個蠻兵駕一小舟獲慌令近岸人馬方才下船一聲號起將孟獲縛住原來馬岱受了計策引本部兵扮作蠻兵撐船在此誘擒孟獲於是孔明招安蠻兵降者無數孔明一一撫慰並不加害就教救滅了餘火須臾馬岱擒孟獲至趙雲擒孟優至魏延馬忠王平關索擒諸洞酋長至孔明指孟獲而笑曰汝先令汝弟以禮詐降如何瞞得過吾今番又被我擒汝可服否獲曰此乃吾弟貪口腹之故誤中汝毒因此失了大事吾若自來弟以兵應之必然成功此乃天敗非吾之不能也如何肯服孔明曰今已三次如何不服孟獲低頭無語孔明笑曰吾再放汝回去孟獲曰丞相若肯放吾兄弟回去收拾家下親丁和丞相大戰一場那時擒得方才死心塌地而降孔明曰再若擒住必不輕恕汝可小心在意勤攻韜略之書再整親信之士早用良策勿生後悔遂令武士去其繩索放起孟獲並孟優及各洞酋長一齊都放孟獲等拜謝去了此時蜀兵已渡瀘水孟獲等過了瀘水只見岸口陣兵列陣旗幟紛紛獲到營前馬岱高坐以劍指之曰這番拿住必無輕放孟獲到了自己寨時趙雲早已襲了此寨布列兵馬雲坐於大旗下按劍而言曰丞相如此相待休忘大恩獲喏喏連聲而去將出界口山坡魏延引一千精兵擺在坡上勒馬厲聲而言曰吾今已深入巢穴奪汝險要汝尚自愚迷抗拒大軍這回拿住碎屍萬段決不輕饒孟獲等抱頭鼠竄望本洞而去後人有詩贊曰五月驅兵入不毛月明瀘水瘴煙高誓將雄略酬三顧豈憚征蠻七縱勞卻說孔明渡了瀘水下寨已畢大賞三軍聚衆將於帳下曰孟獲第二番擒來吾令遍觀各營虛實正欲令其來劫營也吾知孟獲頗知兵法吾以兵馬糧草炫耀實令孟獲看吾破綻必用火攻彼令其弟詐降欲爲內應耳吾三番擒之而不殺誠欲服其心不欲滅其類也吾今明告汝等勿得辭勞可用心報國衆將拜伏曰丞相智仁勇三者足備雖子牙張良不能及也孔明曰吾今安敢望古人耶皆賴汝等之力共成功業耳帳下諸將聽得孔明之言盡皆喜悅卻說孟獲受了三擒之氣忿忿歸到銀坑洞中即差心腹人齎金珠寶貝往八番九十三甸等處並蠻方部落借使牌刀獠丁軍健數十萬克日齊備各隊人馬雲堆霧擁俱聽孟獲調用伏路軍探知其事來報孔明孔明笑曰吾正欲令蠻兵皆至見吾之能也遂上小車而行正是若非洞主威風猛怎顯軍師手段高未知勝負如何且看下文分解
