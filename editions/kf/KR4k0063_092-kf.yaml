body:
  text: 第九十二回趙子龍力斬五將諸葛亮智取三城卻說孔明率兵前至沔陽經過馬超墳墓乃令其弟馬岱挂孝孔明親自祭之祭畢回到寨中商議進兵忽哨馬報道魏主曹睿遣駙馬夏侯楙調關中諸路軍馬前來拒敵魏延上帳獻策曰夏侯楙乃膏粱子弟懦弱無謀延願得精兵五千取路出褒中循秦嶺以東當子午穀而投北不過十日可到長安夏侯楙若聞某驟至必然棄城望橫門邸閣而走某卻從東方而來丞相可大驅士馬自斜穀而進如此行之則咸陽以西一舉可定也孔明笑曰此非萬全之計也汝欺中原無好人物倘有人進言於山僻中以兵截殺非惟五千人受害亦大傷銳氣決不可用魏延又曰丞相兵從大路進發彼必盡起關中之兵于路迎敵則曠日持久何時而得中原孔明曰吾從隴右取平坦大路依法進兵何憂不勝遂不用魏延之計魏延怏怏不悅孔明差人令趙雲進兵卻說夏侯楙在長安聚集諸路軍馬有時西涼大將韓德善使開山大斧有萬夫不當之勇引西羌諸路兵八萬到來見了夏侯楙楙重賞之就遣爲先鋒德有四子皆精通武藝弓馬過人長子韓瑛次子韓瑤三子韓瓊四子韓琪韓德帶四子並西羌兵八萬取路至鳳鳴山正遇蜀兵兩陣對圓韓德出馬四子列於兩邊德厲聲大罵曰反國之賊安敢犯吾境界趙雲大怒挺槍縱馬單搦韓德交戰長子韓瑛躍馬來迎戰不三合被趙雲一槍刺死于馬下次子韓瑤見之縱馬揮刀來戰趙雲施逞舊日虎威抖擻精神迎戰瑤抵敵不住三子韓瓊急挺方天戟驟馬前來夾攻雲全然不懼槍法不亂四子韓琪見二兄戰雲不下也縱馬掄兩口日月刀而來圍住趙雲雲在中央獨戰三將少時韓琪中槍落馬韓陣中偏將急出救去雲拖槍便走韓瓊按戟急取弓箭射之連放三箭皆被雲用槍撥落瓊大怒仍綽方天戟縱馬趕來卻被雲一箭射中面門落馬而死韓瑤縱馬舉寶刀便砍趙雲雲棄槍於地閃過寶刀生擒韓瑤歸陣複縱馬取槍殺過陣來韓德見四子皆喪于趙雲之手肝膽皆裂先走入陣去西涼兵素知趙雲之名今見其英勇如昔誰敢交鋒趙雲馬到處陣陣倒退趙雲匹馬單槍往來衝突如入無人之境後人有詩贊曰憶昔常山趙子龍年登七十建奇功獨誅四將來沖陣猶似當陽救主雄鄧芝見趙雲大勝率蜀兵掩殺西涼兵大敗而走韓德險被趙雲擒住棄甲步行而逃雲與鄧芝收軍回寨芝賀曰將軍壽已七旬英勇如昨今日陣前力斬四將世所罕有雲曰丞相以吾年邁不肯見用吾故卿以自表耳遂差人解韓瑤申報捷書以達孔明卻說韓德引敗軍回見夏侯楙哭告其事楙自統兵來迎趙雲探馬報入蜀寨說夏侯楙引兵到雲上馬綽槍引千餘軍就鳳鳴山前擺成陣勢當日夏侯楙戴金盔坐白馬手提大砍民立在門旗之下見趙雲躍馬挺槍往來馳騁楙欲自戰韓德曰殺吾四子之仇如何不報縱馬輪開山大斧直取趙雲雲奮怒挺槍來迎戰不三合槍起處刺死韓德于馬下急撥馬直取夏侯楙楙慌忙閃入本陣鄧芝驅兵掩殺魏兵又折一陣退十餘裏下寨楙連夜與衆將商議曰吾久聞趙雲之名未嘗見面今日年老英雄尚在方信當陽長阪之事似此無人可敵如之奈何參軍程武乃程昱之子也進言曰某料趙雲有勇無謀不足爲慮來日都督再引兵出先伏兩軍於左右都督臨陣先退誘趙雲到伏兵處都督卻登山指揮四面軍馬重疊圍住雲可擒矣楙從其言遂遣董禧引三萬軍伏于左薛則引三萬軍伏於右二人埋伏已定次日夏侯楙複整金鼓旗幡率兵而進趙雲鄧芝出迎芝在馬上謂趙雲曰昨夜魏兵大敗而走今日複來必有詐也老將軍防之子龍曰量此乳臭小兒何足道哉吾今日必當擒之便躍馬而出魏將潘遂出迎戰不三合撥馬便走趙雲趕去魏陣中八員將一齊來迎放過夏侯楙先走八將陸續奔走趙雲乘勢追殺鄧芝引兵繼進趙雲深入重地只聽得四面喊聲大震鄧芝急忙收軍退回左有董禧右有薛則兩路兵殺到鄧芝兵少不能解救趙雲被困在垓心東沖西突魏兵越厚時雲手下止有千餘人殺到山坡之下只見夏侯楙在山上指揮三軍趙雲投東則望東指投西則望西指因此趙雲不能突圍乃引兵殺上山來半山中擂木炮石打將下來不能上山趙雲從辰時殺到酉時不是脫走只得下馬少歇且待月明再戰卻才卸甲而坐月光方出忽四下火光沖天鼓聲大震矢石如雨魏兵殺到皆叫曰趙雲早降雲急上馬迎敵四面軍馬漸漸逼近八方弩箭交射甚急人馬皆不能向前雲仰天歎曰吾不服老死於此地矣忽東北角上喊聲大起魏兵紛紛亂竄一彪軍殺到爲首大將持丈八點鋼矛馬項下挂一顆人頭雲視之乃張苞也苞見了趙雲言曰丞相恐老將軍有失特遣某引五千兵來接應聞老將軍被困故殺透重圍正遇魏將薛則攔路被某殺之雲大喜即與張苞殺出西北角來只見魏兵棄戈奔走一彪軍從外呐喊殺入爲首大將提偃月青龍刀手挽人頭雲視之乃關興也興曰奉丞相之命恐老將軍有失特引五千兵前來接應卻才陣上逢著魏將董禧被吾一刀斬之梟首在此丞相隨後便到也雲曰二將軍已建奇功何不趁今日擒住夏侯楙以定大事張苞聞言遂引兵去了興曰我也幹功去遂亦引兵去了雲回顧左右曰他兩個是吾子侄輩尚且爭先幹功吾乃國家上將朝廷舊臣反不如此小兒耶吾當舍老命以報先帝之恩於是引兵來捉夏侯楙當夜三路兵夾攻大破魏軍一陣鄧芝引兵接應殺得屍橫遍野血流成河夏侯楙乃無謀之人更兼年功不曾經戰見軍大亂遂引帳下驍將百余人望南安郡而走衆軍因見無主盡皆逃竄興苞二將聞夏侯楙望南安郡去了連夜趕來楙走入城中令緊閉城門驅兵守禦興苞二人趕到將城圍住趙雲隨後也到三面攻打少時鄧芝亦引兵到一連圍了十日攻打不下忽報丞相留後軍住沔陽左軍屯陽平右軍屯石城自引中軍來到趙雲鄧芝關興張苞皆來拜問孔明說連日攻城不下孔明遂乘小車親到城邊周圍看了一遍回寨升帳而坐衆將環立聽令孔明曰此郡壕深城峻不易攻也吾正事不在此城汝等如只久攻倘魏兵分道而出以取漢中吾軍危矣鄧芝曰夏侯楙乃魏之駙馬若擒此人勝斬百將今困於此豈可棄之而去孔明曰吾自有計此處西連天水郡北抵安定郡二個太守不知何人探卒曰天水太守馬遵安定太守崔諒孔明大喜乃喚魏延受計如此如此又喚關興張苞受計如此如此又喚心腹軍士二人受計如此行之各將領命引兵而去孔明卻在南安城外令軍運柴昌堆於城下口稱燒城魏兵聞知皆大笑不懼卻說這安定太守崔諒在城中聞蜀兵圍了南安困住夏侯楙十分慌懼即點軍馬約共四千守住城池忽見一人自正南而爲口稱有機密事崔諒喚入問之答曰某是夏侯都督帳下心腹將裴緒今奉都督將令特來求救于天水安定二郡南安甚急每日城上縱火爲號專望二郡救兵並不見到因複差某殺出重圍來此告急可星夜起兵爲外應都督若見二郡兵到卻開城門接應也諒曰有都督文書否緒貼肉取出汗已濕透略教一視急令手下換了乏馬便出城望天水而去不二日又有報馬到告天水太守已起兵救援南安去了教安定早早接應崔諒與府官商議多官曰若不去救失了南安送了夏侯駙馬皆我兩郡之罪也只得救之諒即點起人馬離城而去只留文官守城崔諒提兵向南安大路進發遙望見火光沖天催兵星夜前進離南安尚有五十余裏忽聞前後喊聲大震哨馬報道前面關興截住去路背後張苞殺來安定之兵四下逃竄諒大驚乃領手下百餘人往小路死戰得脫奔回安定方到城壕邊城上亂箭射下來蜀將魏延在城上叫曰吾已取了城也何不早降原來魏延扮作安定軍夤夜賺開城門蜀兵盡入因此得了安定崔諒慌投天水郡來行不到一程前面一彪軍擺開大旗之下一人綸巾羽扇道袍鶴氅端坐于車上諒視之乃孔明也急撥回馬走關興張苞兩路兵追到只叫早降崔諒見四面皆是蜀兵不得已遂降同歸大寨孔明以上賓相待孔明曰南安太守與足下交厚否諒曰此人乃是楊阜之族弟楊陵也與某鄰郡交契甚厚孔明曰今欲煩足下入城說楊陵擒夏侯楙可乎諒曰丞相若令某去可暫退軍馬容某入城說之孔明從其言即時傳令教四面軍馬各退二十裏下寨崔諒匹馬到城邊叫開城門入到府中與楊陵禮畢細言其事陵曰我等受魏主大恩安忍背之可將計就計而行遂引崔諒到夏侯楙處備細說知楙曰當用何計楊陵曰只推某獻城門賺蜀兵入卻就城中殺之崔諒依計而行出城見孔明說楊陵獻城門放大軍入城以擒夏侯楙楊陵本欲自捉因手下勇士不多未敢輕動孔明曰此事至易今有足下原降兵百余人於內暗藏蜀將扮作安定軍馬帶入城去先伏于夏侯楙府下卻暗約楊陵待半夜之時獻開城門裏應外合崔諒暗思若不帶蜀將去恐孔明生疑且帶入去就內先斬之舉火爲號賺孔明入來殺之可也因此應允孔明囑曰吾遣親信將關興張苞隨足下先去只推救軍殺入城中以安夏侯楙但舉火吾當親入城去擒之時值黃昏關興張苞受了孔明密計披挂上馬各執兵器雜在安定軍中隨崔諒來到南安城下楊陵在城上撐起懸空板倚定護心欄問曰何處軍馬崔諒曰安定救軍來到諒先射一號箭上城箭上帶著密書曰今諸葛亮先遣二將伏於城中要裏應外合且不可驚動恐泄漏計策待入府中圖之楊陵將書見了夏侯楙細言其事楙曰既然諸葛亮中計可教刀斧手百餘人伏於府中如二將隨崔太守到府下馬閉門斬之卻於城上舉火賺諸葛亮入城伏兵齊出亮可擒矣安排已畢楊陵回到城上言曰既是安定軍馬可放入城關興跟崔諒先行張苞在後楊陵下城在門邊迎接興手起刀落斬楊陵于馬下崔諒大驚急撥馬奔到吊橋邊張苞大喝曰賊子休走汝等詭計如何瞞得丞相耶手起一槍刺崔諒于馬下關興早到城上放起火來四面蜀兵齊入夏侯楙措手不及開南門並力殺出一彪軍攔住爲首大將乃是王平交馬只一合生擒夏侯楙于馬上餘皆殺死孔明入南安招諭軍民秋毫無犯衆將各各獻功孔明將夏侯楙囚于車中鄧芝問曰丞相何故知崔諒詐也孔明曰吾已知此人無降心故意使入城彼必盡情告與夏侯楙欲將計就計而行吾見來情足知其詐複使二將同去以穩其心此人若有真心必然阻當彼忻然同去者恐吾疑也他意中度二將同去賺入城內殺之未遲又令吾軍有托放心而進吾已暗囑二將就城門下圖之城內必無準備吾軍隨後便到此出其不意也衆將拜服孔明曰賺崔諒者吾使心腹人詐作魏將裴緒也吾又去賺天水郡至今未到不知何故今可乘勢取之乃留吳懿守南安劉琰守安定替出魏延軍馬去取天水郡卻說天水郡太守馬遵聽知夏侯楙困在南安城中乃聚文武官商議功曹梁緒主薄尹賞主記梁虔等曰夏侯駙馬乃金枝玉葉倘有疏虞難逃坐視之罪太守何不盡起本部兵以救之馬遵正疑慮間忽報夏侯駙馬差心腹將裴緒到緒入府取公文交付馬遵說都督求安定天水兩郡之兵星夜救應言訖匆匆而去次日又有報馬到稱說安定兵已先去了教太守火急前來會合馬遵正欲起兵忽一人自外而入曰太守中諸葛亮之計矣衆視之乃天水冀人也姓薑名維字伯約父名冏昔日曾爲天水郡功曹因羌人亂沒于王事維自幼博覽群書兵法武藝無所不通奉母至孝郡人敬之後爲中郎將就參本郡軍事當日姜維謂馬遵曰近聞諸葛亮殺敗夏侯楙困于南安水泄不通安得有人自重圍之中而出又且裴緒乃無名下將從不曾見況安定報馬又無公文以此察之此人乃蜀將詐稱魏將賺得太守出城料城中無備必然暗伏一軍於左近乘虛而取天水也馬遵大悟曰非伯約之言則誤中奸計矣維笑曰太守放心某有一計可擒諸葛亮解南安之危正是運籌又遇強中手鬥智還逢意外人未知其計如何且看下文分解
