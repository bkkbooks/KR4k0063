body:
  text: 第九十七回討魏國武侯再上表破曹兵薑維詐獻書卻說蜀漢建興六年秋九月魏都督曹休被東吳陸遜大破於石亭車仗馬匹軍資器械並皆罄盡休惶恐之甚氣憂成病到洛陽疽發背而死魏主曹睿敕令厚葬司馬懿引兵還衆將接入問曰曹都督兵敗即元帥之干系何故急回耶懿曰吾料諸葛亮知吾兵敗必乘虛來取長安倘隴西緊急何人救之吾故回耳衆皆以爲懼怯哂笑而退卻說東吳遣使致書蜀中請兵伐魏並言大破曹休之事一者顯自己威風二者通和會之好後主大喜令人持書至漢中報知孔明時孔明兵強馬壯糧草豐足所用之物一切完備正要出師聽知此信即設宴大會諸將計議出師忽一陣大風自東北角上而起把庭前松樹吹折衆皆大驚孔明就占一課曰此風主損一大將諸將未信正飲酒間忽報鎮南將軍趙雲長子趙統次子趙廣來見丞相孔明大驚擲杯於地曰子龍休矣二子入見拜哭曰某父昨夜三更病重而死孔明跌足而哭曰子龍身故國家損一棟梁吾去一臂也衆將無不揮涕孔明令二子入成都面君報喪後主聞雲死放聲大哭曰朕昔年幼非子龍則死於亂軍之中矣即下詔追贈大將軍諡封順平侯敕葬于成都錦屏山之東建立廟堂四時享祭後人有詩曰常山有虎將智勇匹關張漢水功勳在當陽姓字彰兩番扶幼主一念答先皇青史書忠烈應流百世芳卻說後主思念趙雲昔日之功祭葬甚厚封趙統爲虎賁中郎趙廣爲牙門將就令守墳二人辭謝而去忽近臣奏曰諸葛丞相將軍馬分撥已定即日將出師伐魏後主問在朝諸臣諸臣多言未可輕動後主疑慮未決忽奏丞相令楊儀齎出師表至後主宣入儀呈上表章後主就禦案上拆視其表曰先帝慮漢賊不兩立王業不偏安故托臣以討賊也以先帝之明量臣之才故知臣伐賊才弱敵強也然不伐賊王業亦亡惟坐而待亡孰與伐之是故托臣而弗疑也臣受命之日寢不安席食不甘味思惟北征宜先入南故五月渡瀘深入不毛並日而食臣非不自惜也顧王業不可偏安于蜀都故冒危難以奉先帝之遺意而議者謂爲非計今賊適疲于西又務於東兵法乘勞此進趨之時也謹陳其事如左高帝明並日月謀臣淵深然涉險被創危然後安今陛下未及高帝謀臣不如良平而欲以長策取勝坐定天下此臣之未解一也劉繇王朗各據州郡論安言計動引聖人群疑滿腹衆難塞胸今歲不戰明年不征使孫策坐大遂並江東此臣之未解二也曹操智計殊絕於人其用兵也仿佛孫吳然困於南陽險于烏巢危于祁連逼于黎陽幾敗北山殆死潼關然後僞定一時耳況臣才弱而欲以不危而定之此臣之未解三也曹操五攻昌霸不下四越巢湖不成任用李服而李服圖之委任夏侯而夏侯敗亡先帝每稱操爲能猶有此失況臣弩下何能必勝此臣之未解四也自臣到漢中中間期年耳然喪趙雲陽群馬玉閻芝丁立白壽劉郃鄧銅等及曲長屯將七十餘人突將無前寑叟青羌散騎武騎一千餘人此皆數十年之內所糾合四方之精銳非一州之所有若複數年則損三分之二也當何以圖敵此臣之未解五也今民窮兵疲而事不可息事不可息則住與行勞費正等而不及今圖之欲以一州之地與賊持久此臣之未解六也夫難平者事也昔先帝敗軍于楚當此之時曹操拊手謂天下已定然後先帝東連吳越西取巴蜀舉兵北征夏侯授首此操之失計而漢事將成也然後吳更違盟關羽毀敗秭歸蹉跌曹丕稱帝凡事如是難可逆見臣鞠躬盡瘁死而後已至於成敗利鈍非臣之明所能逆睹也後主覽表甚喜即敕令孔明出師孔明受命起三十萬精兵令魏延總督前部先鋒徑奔陳倉道口而來早有細作報入洛陽司馬懿奏知魏主大會文武商議大將軍曹真出班奏曰臣昨守隴西功微罪大不勝惶恐今乞引大軍往擒諸葛亮臣近得一員大將使六十斤大刀騎千裏征馬開兩石鐵胎弓暗藏三個流星錘百發百中有萬夫不當之勇乃隴西狄道人姓王名雙字子全臣保此人爲先鋒睿大喜便召王雙上殿視之身長九尺面黑睛黃熊腰虎背睿笑曰朕得此大將有何慮哉遂賜錦袍金甲封爲虎威將軍前部大先鋒曹真爲大都督真謝恩出朝遂引十五萬精兵會合郭淮張郃分道守把隘口卻說蜀兵前隊哨至陳倉回報孔明說陳倉口已築起一城內有大將郝昭守把深溝高壘遍排鹿角十分謹嚴不如棄了此城從太白嶺鳥道出祁山甚便孔明曰陳倉正北是街亭必得此城方可進兵命魏延引兵到城下四面攻之連日不能破魏延複來告孔明說城難打孔明大怒欲斬魏延忽帳下一人告曰某雖無才隨丞相多年未嘗報效願去陳倉城中說郝昭來降不用張弓只箭衆視之乃部曲靳祥也孔明曰汝用何言以說之祥曰郝昭與某同是隴西人氏自幼交契某今到彼以利害說之必來降矣孔明即令前去靳祥驟馬徑到城下叫曰郝伯道故人靳祥來見城上人報知郝昭昭令開門放入登城相見昭問曰故人因何到此祥曰吾在西蜀孔明帳下參贊軍機待以上賓之禮特令某來見公有言相告昭勃然變色曰諸葛亮乃我國仇敵也吾事魏汝事蜀各事其主昔時爲昆仲今時爲仇敵汝再不必多言便請出城靳祥又欲開言郝昭已出敵樓上了魏軍急催上馬趕出城外祥回頭視之見昭倚定護心木欄杆祥勒馬以鞭指之曰伯道賢弟何太情薄耶昭曰魏國法度兄所知也吾受國恩但有死而已兄不必下說詞早回見諸葛亮教快來攻城吾不懼也祥回告孔明曰郝昭未等某開言便先阻卻孔明曰汝可再去見他以利害說之祥又到城下請郝昭相見昭出到敵樓上祥勒馬高叫曰伯道賢弟聽吾忠言汝據守一孤城怎拒數十萬之衆今不早降後悔無及且不順大漢而事奸魏抑何不知天命不辨清濁乎願伯道思之郝昭大怒拈弓搭箭指靳祥而喝曰吾前言已定汝不必再言可速退吾不射汝靳祥回見孔明具言郝昭如此光景孔明大怒曰匹夫無禮太甚豈欺吾無攻城之具耶隨叫土人問曰陳倉城中有多少人馬土人告曰雖不知的數約有三千人孔明笑曰量此小城安能禦我休等他救兵到火速攻之於是軍中起百乘雲梯一乘上可立十數人周圍用木板遮護軍士各把短梯軟索聽軍中擂鼓一齊上城郝昭在敵樓上望見蜀兵裝起雲梯四面而來即令三千軍各執火箭分佈四面待雲梯近城一齊射之孔明只道城中無備故大造雲梯令三軍鼓噪呐喊而進不期城上火箭齊發雲梯盡著梯上軍士多被燒死城上矢石如雨蜀兵皆退孔明大怒曰汝燒吾雲梯吾卻用沖車之法於是連夜安排下沖車次日又四面鼓嗓呐喊而進郝昭急命運石鑿眼用葛繩穿定飛打沖車皆被打折孔明又令人運土填城壕教廖化引三千鍬軍從夜間掘地道暗入城去郝昭又於城中掘重壕橫截之如此晝夜相攻二十餘日無計可破孔明正在營中憂悶忽報東邊救兵到了旗上書魏先鋒大將王雙孔明問曰誰可迎之魏延出曰某願往孔明曰汝乃先鋒大將未可輕出又問誰敢迎之裨將謝雄應聲而出孔明與三千軍去了孔明又問曰誰敢再去裨將龔起應聲要去孔明亦與三千兵去了孔明恐城內郝昭引兵沖出乃把人馬退二十裏下寨卻說謝雄引軍前行正遇王雙戰不三合被雙一刀劈死蜀兵敗走雙隨後趕來龔起接著交馬只三合亦被雙所斬敗兵回報孔明孔明大驚忙令廖化王平張嶷三人出迎兩陣對圓張嶷出馬王平廖化壓住陣角王雙縱馬來與張嶷交馬數合不分勝負雙詐敗便走嶷隨後趕去王平見張嶷中計忙叫曰休趕嶷急回馬時王雙流星錘早到正中其背嶷伏鞍而走雙回馬趕來王平廖化截住救得張嶷回陣王雙驅兵大殺一陣蜀兵折傷甚多嶷吐血數口回見孔明說王雙英雄無敵如今將二萬兵就陳倉城外下寨四圍立起排柵築起重城深挖壕塹守禦甚嚴孔明見折二將張嶷又被打傷即喚薑維曰陳倉道口這條路不可行別求何策維曰陳倉城池堅固郝昭守禦甚密又得王雙相助實不可取不若令一大將依山傍水下寨固守再令良將守把要道以防街亭之攻卻統大軍去襲祁山某卻如此如此用計可捉曹真也孔明從其言即令王平李恢引二枝兵守街亭小路魏延引一軍守陳倉口馬岱爲先鋒關興張苞爲前後救應使從小徑出斜谷望祁山進發卻說曹真因思前番被司馬懿奪了功勞因此到洛陽分調郭淮孫禮東西守把又聽的陳倉告急已令王雙去救聞知王雙斬將立功大喜乃令中護軍大將費耀權攝前部總督諸將各自守把隘口忽報山谷中捉得細作來見曹真令押入跪於帳前其人告曰小人不是奸細有機密來見都督誤被伏路軍捉來乞退左右真乃教去其縛左右暫退其人曰小人乃姜伯約心腹人也蒙本官遣送密書真曰書安在其人於貼肉衣內取出呈上真拆視曰罪將薑維百拜書吾大都督曹麾下維念世食魏祿忝守邊城叨竊厚恩無門補報昨日誤遭諸葛亮之計陷身於巔崖之中思念舊國何日忘之今幸蜀兵西出諸葛亮甚不相疑賴都督親提大兵而來如遇敵人可以詐敗維當在後以舉火爲號先燒蜀人糧草卻以大兵翻身掩之則諸葛亮可擒也非敢立功報國實欲自贖前罪倘蒙照察速賜來命曹真看畢大喜曰天使吾成功也遂重賞來人便令回報依期會合真喚費耀商議曰今薑維暗獻密書令吾如此如此耀曰諸葛亮多謀姜維智廣或者是諸葛亮所使恐其中有詐真曰他原是魏人不得已而降蜀又何疑乎耀曰都督不可輕去只守定本寨某願引一軍接應薑維如成盡歸都督倘有奸計某自支當真大喜遂令費耀引五萬兵望斜穀而進行了兩三程屯下軍馬令人哨探當日申時分回報斜穀道中有蜀兵來也耀忙催兵進蜀兵未及交戰先退耀引兵追之蜀兵又來方欲對陣蜀兵又退如此者三次俄延至次日申時分魏軍一日一夜不曾敢歇只恐蜀兵攻擊方欲屯軍造飯忽然四面喊聲大震鼓角齊鳴蜀兵漫山遍野而來門旗開處閃出一輛四輪車孔明端坐其中令人請魏軍主將答話耀縱馬而出遙見孔明心中暗喜回顧左右曰如蜀兵掩至便退後走若見山後火起卻回身殺去自有兵來相應分付畢躍馬出呼曰前者敗將今何敢又來孔明曰喚汝曹真來答話耀罵曰曹都督乃金枝玉葉安肯與反賊相見耶孔明大怒把羽扇一招左有馬岱右有張嶷兩路兵沖出魏兵便退行不到三十裏望見蜀兵背後火起喊聲不絕費耀只道號火便回身殺來蜀兵齊退耀提刀在前只望喊處追趕將次近火山路中鼓角喧天喊聲震地兩軍殺出左有關興右有張苞山上矢石如雨往下射來魏兵大敗費耀知是中計急退軍望山谷中而走人馬困乏背後關興引生力軍趕來魏兵自相踐踏及落澗身死者不知其數耀逃命而走正遇山坡口一彪軍乃是薑維耀大罵曰反賊無信吾不幸誤中汝奸計也維笑曰吾欲擒曹真誤賺汝矣速下馬受降耀驟馬奪路望山穀中而走忽見穀口火光沖天背後追兵又至耀自刎身死餘衆盡降孔明連夜驅兵直出祁山前下寨收住軍馬重賞薑維維曰某恨不得殺曹真也孔明亦曰可惜大計小用矣卻說曹真聽知折了費耀悔之不及遂與郭淮商議退兵之策於是孫禮辛毗星夜具表申奏魏主言蜀兵又出祁山曹真損兵折將勢甚危急睿大驚即召司馬懿入內曰曹真損兵折將蜀兵又出祁山卿有何策可以退之懿曰臣已有退諸葛亮之計不用魏軍揚武耀威蜀兵自然走矣正是已見子丹無勝術全憑仲達有良謀未知其計如何且看下文分解
