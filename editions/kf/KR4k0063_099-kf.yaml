body:
  text: 第九十九回諸葛亮大破魏兵司馬懿入寇西蜀蜀漢建興七年夏四月孔明兵在祁山分作三寨專候魏兵卻說司馬懿引兵到長安張郃接見備言前事懿令郃爲先鋒戴陵爲副將引十萬兵到祁山于渭水之南下寨郭淮孫禮入寨參見懿問曰汝等曾與蜀兵對陣否二人答曰未也懿曰蜀兵千里而來利在速戰今來此不戰必有謀也隴西諸路曾有資訊否淮曰已有細作探得各郡十分用心日夜提防並無他事只有武都陰平二處未曾回報懿曰吾自差人與孔明交戰汝二人急從小路去救二郡卻掩在蜀兵之後彼必自亂矣二人受計引兵五千從隴西小路來救武都陰平就襲蜀兵之後郭淮于路謂孫禮曰仲達比孔明如何禮曰孔明勝仲達多矣淮曰孔明雖勝此一計足顯仲達有過人之智蜀兵如正攻兩郡我等從後抄到彼豈不自亂乎正言間忽哨馬來報陰平已被王平打破了武都已被薑維打破了前離蜀兵不遠禮曰蜀兵既已打破了城池如何陳兵於外必有詐也不如速退郭淮從之方傳令教軍退時忽然一聲炮響山背後閃出一枝軍馬來旗上大書漢丞相諸葛亮中央一輛四輪車孔明端坐于上左有關興右有張苞孫郭二人見之大驚孔明大笑曰郭淮孫禮休走司馬懿之計安能瞞得過吾他每日令人在前交戰卻教汝等襲吾軍後武都陰平吾已取了汝二人不早來降欲驅兵與吾決戰耶郭淮孫禮聽畢大慌忽然背後喊殺連天王平薑維引兵從後殺來興苞二將又引軍從前面殺來兩下夾攻魏兵大敗郭孫二人棄馬爬山而走張苞望見驟馬趕來不期連人帶馬跌入澗內後軍急忙救起頭已跌破孔明令人送回成都養病卻說郭孫二人走脫回見司馬懿曰武都陰平二郡已失孔明伏于要路前後攻殺因此大敗棄馬步行方得逃回懿曰非汝等之罪孔明智在吾先可再引兵守把雍郿二城切勿出戰吾自有破敵之策二人拜辭而去懿又喚張郃戴陵分付曰今孔明得了武都陰平必然撫百姓以安民心不在營中矣汝二人各引一萬精兵今夜起身抄在蜀兵營後一齊奮勇殺將過來吾卻引軍在前布陣只待蜀兵勢亂吾大驅士馬攻殺進去兩軍並力可奪蜀寨也若得此地山勢破敵何難二人受計引兵而去戴陵在左張郃在右各取小路進發深入蜀兵之後三更時分來到大路兩軍相遇合兵一處卻從蜀兵背後殺來行不到三十裏前軍不行張戴二人自縱馬視之只見數百輛草車橫截去路郃曰此必有準備可急取路而回才傳令退軍只見滿山火光齊明鼓角大震伏兵四下皆出把二人圍住孔明在祁山上大叫曰戴陵張郃可聽吾言司馬懿料吾往武都陰平撫民不在營中故令汝二人來劫吾寨卻中吾之計也汝二人乃無名下將吾不殺害下馬早降郃大怒指孔明而罵曰汝乃山野村夫侵吾大國境界如何敢發此言吾若捉住汝時碎屍萬段言訖縱馬挺槍殺上山來山上矢石如雨郃不能上山乃拍馬舞槍沖出重圍無人敢當蜀兵困戴陵在垓心郃殺出舊路不見戴陵即奮勇翻身又殺入重圍救出戴陵而回孔明在山上見郃在萬軍之中往來沖突英勇倍加乃謂左右曰嘗聞張翼德大戰張郃人皆驚懼吾今日見之方知其勇也若留下此人必爲蜀中之害吾當除之遂收軍還營卻說司馬懿引兵布成陣勢只待蜀兵亂動一齊攻之忽見張郃戴陵狼狽而來告曰孔明先如此提防因此大敗而歸懿大驚曰孔明真神人也不如且退即傳令教大軍盡回本寨堅守不出且說孔明大勝所得器械馬匹不計其數乃引大軍回寨每日令魏延挑戰魏兵不出一連半月不曾交兵孔明正在帳中思慮忽報天子遣侍中費禕齎詔至孔明接入營中焚香禮畢開詔讀曰街亭之役咎由馬謖而君引愆深自貶抑重違君意聽順所守前年耀師馘斬王雙今歲爰征郭淮遁走降集氐羌復興二郡威震兇暴功勳顯然方今天下騷擾元惡未梟君受大任幹國之重而久自抑損非所以光揚洪烈矣今複君丞相君其勿辭孔明聽詔畢謂費禕曰吾國事未成安可複丞相之職堅辭不受禕曰丞相若不受職拂了天子之意又冷淡了將士之心宜且權受孔明方才拜受禕辭去孔明見司馬懿不出思得一計傳令教各處皆拔寨而起當有細作報知司馬懿說孔明退兵了懿曰孔明必有大謀不可輕動張郃曰此必因糧盡而回如何不追懿曰吾料孔明上年大收今又麥熟糧草豐足雖然轉運艱難亦可支吾半載安肯便走彼見吾連日不戰故作此計引誘可令人遠遠哨之軍士探知回報說孔明離此三十裏下寨懿曰吾料孔明果不走且堅守寨柵不可輕進住了旬日絕無音信並不見蜀將來戰懿再令人哨探回報說蜀兵已起營去了懿未信乃更換衣服雜在軍中親自來看果見蜀兵又退三十裏下寨懿回營謂張郃曰此乃孔明之計也不可追趕又住了旬日再令人哨探回報說蜀兵又退三十裏下寨郃曰孔明用緩兵之計漸退漢中都督何故懷疑不早追之郃願往決一戰懿曰孔明詭計極多倘有差失喪我軍之銳氣不可輕進郃曰某去若敗甘當軍令懿曰既汝要去可分兵兩枝汝引一枝先行須要奮力死戰吾隨後接應以防伏兵汝次日先進到半途駐紮後日交戰使兵力不乏遂分兵已畢次日張郃戴陵引副將數十員精兵三萬奮勇先進到半路下寨司馬懿留下許多軍馬守寨只引五千精兵隨後進發原來孔明密令人哨探見魏兵半路而歇是夜孔明喚衆將商議曰今魏兵來追必然死戰汝等須以一當十吾以伏兵截其後非智勇之將不可當此任言畢以目視魏延延低頭不語王平出曰某願當之孔明曰若有失如何平曰願當軍令孔明歎曰王平肯捨身親冒矢石真忠臣也雖然如此奈魏兵分兩枝前後而來斷吾伏兵在中平縱然智勇只可當一頭豈可分身兩處須再得一將同去爲妙怎奈軍中再無舍死當先之人言未畢一將出曰某願往孔明視之乃張翼也孔明曰張郃乃魏之名將有萬夫不當之勇汝非敵手翼曰若有失事願獻首於帳下孔明曰汝既敢去可與王平各引一萬精兵伏於山谷中只待魏兵趕上任他過盡汝等卻引伏兵從後掩殺若司馬懿隨後趕來卻分兵兩頭張翼引一軍當住後隊王平引一軍截其前隊兩軍須要死戰吾自有別計相助二人受計引兵而去孔明又喚姜維廖化分付曰與汝二人一個錦囊引三千精兵偃旗息鼓伏於前山之上如見魏兵圍住王平張翼十分危急不必去救只開錦囊看視自有解危之策二人受計引兵而去又令吳班吳懿馬忠張嶷四將附耳分付曰如來日魏兵到銳氣正盛不可便迎且戰且走只看關興引兵來掠陣之時汝等便回軍趕殺吾自有兵接應四將受計引兵而去又喚關興分付曰汝引五千精兵伏於山谷只看山上紅旗颭動卻引兵殺出興受計引兵而去卻說張郃戴陵領兵前來驟如風雨馬忠張嶷吳懿吳班四將接著出馬交鋒張郃大怒驅兵追殺蜀兵且戰且走魏兵追趕約有二十余裏時值六月天氣十分炎熱人馬汗如潑水走到五十裏外魏兵盡皆氣喘孔明在山上把紅旗一招關興引兵殺出馬忠等四將一齊引兵掩殺回來張郃戴陵死戰不退忽然喊聲大震兩路軍殺出乃王平張翼也各奮勇追殺截其後路郃大叫衆將曰汝等到此不決一死戰更待何時魏兵奮力衝突不得脫身忽然背後鼓角喧天司馬懿自領精兵殺到懿指揮衆將把王平張翼圍在垓心翼大呼曰丞相真神人也計已算定必有良謀吾等當決一死戰即分兵兩路平引一軍截住張郃戴陵翼引一軍力當司馬懿兩頭死戰叫殺連天姜維廖化在山上探望見魏兵勢大蜀兵力危漸漸抵當不住維謂化曰如此危急可開錦囊看計二人拆開視之內書雲若司馬懿兵來圍王平張翼至急汝二人可分兵兩枝竟襲司馬懿之營懿必急退汝可乘亂攻之營雖不得可獲全勝二人大喜即分兵兩路徑襲司馬懿營中而去原來司馬懿亦恐中孔明之計沿途不住的令人傳報懿正催戰間忽流星馬飛報言蜀兵兩路竟取大寨去了懿大驚失色乃謂衆將曰吾料孔明有計汝等不信勉強追來卻誤了大事即提兵急回軍心惶惶亂走張翼隨後掩殺魏兵大敗張郃戴陵見勢孤亦望山僻小路而走蜀兵大勝背後關興引兵接應諸路司馬懿大敗一陣奔入寨時蜀兵已自回去懿收聚敗軍責駡諸將曰汝等不知兵法只憑血氣之勇強欲出戰致有此敗今後切不許妄動再有不遵決正軍法衆皆羞慚而退這一陣魏軍死者極多遣棄馬匹器械無數卻說孔明收得勝軍馬入寨又欲起兵進取忽報有人自成都來說張苞身死孔明聞知放聲大哭口中吐血昏絕於地衆人救醒孔明自此得病臥床不起諸將無不焦急後人有詩歎曰悍勇張苞欲建功可憐天不助英雄武侯淚向西風灑爲念無人佐鞠躬旬日之後孔明喚董厥樊建等入帳分付曰吾自覺昏沈不能理事不如且回漢中養病再作良圖汝等切勿走泄司馬懿若知必來攻擊遂傳號令教當夜暗暗拔寨皆回漢中孔明去了五日懿方得知乃長歎曰孔明真有神出鬼沒之計吾不能及也於是司馬懿留諸將在寨中分兵守把各處隘口懿自班師回卻說孔明將大軍屯於漢中自回成都養病文武官僚出城迎接送入丞相府中後主禦駕自來問病命禦醫調治日漸痊可建興八年秋七月魏都督曹真病可乃上表說蜀兵數次侵界屢犯中原若不剿除必爲後患今時值秋涼人馬安閒正當征伐臣願與司馬懿同領大軍徑入漢中殄滅奸黨以清邊境魏主大喜問侍中劉曄曰子丹勸朕伐蜀若何曄奏曰大將軍之言是也今若不剿除後必爲大患陛下便可行之睿點頭曄出內回家有衆大臣相探問曰聞天子與公計議興兵伐蜀此事如何曄應曰無此事也蜀有山川之險非可易圖空費軍馬之勞于國無益衆官皆默然而出楊暨入內奏曰昨聞劉曄勸陛下伐蜀今日與衆臣議又言不可伐是欺陛下也陛下何不召而問之睿即召劉曄入內問曰卿勸朕伐蜀今又言不可何也曄曰臣細詳之蜀不可伐睿大笑少時楊暨出內曄奏曰臣昨日勸陛下伐蜀乃國之大事豈可妄泄於人夫兵者詭道也事未發切宜秘之睿大悟曰卿言是也自此愈加敬重旬日內司馬懿入朝魏主將曹真表奏之事逐一言之懿奏曰臣料東吳未敢動兵今日正可乘此去伐蜀睿即拜曹真爲大司馬征西大都督司馬懿爲大將軍征西副都督劉曄爲軍師三人拜辭魏主引四十萬大兵前行至長安徑奔劍閣來取漢中其餘郭淮孫禮等各取路而行漢中人報入成都此時孔明病好多時每日操練人馬習學八陣之法盡皆精熟欲取中原聽得這個消息遂喚張嶷王平分付曰汝二人先引一千兵去守陳倉古道以當魏兵吾卻提大兵便來接應二人告曰人報魏軍四十萬詐稱八十萬聲勢甚大如何只與一千兵去守隘口倘魏兵大至何以拒之孔明曰吾欲多與恐士卒辛苦耳嶷與平面面相覷皆不敢去孔明曰若有疏失非汝等之罪不必多言可疾去二人又哀告曰丞相欲殺某二人就此請殺只不敢去孔明笑曰何其愚也吾令汝等去自有主見吾昨夜仰觀天文見畢星廛于太陰之分此月內必有大雨淋漓魏兵雖有四十萬安敢深入山險之地因此不用多軍決不受害吾將大軍皆在漢中安居一月待魏兵退那時以大兵掩之以逸待勞吾十萬之衆可勝魏兵四十萬也二人聽畢方大喜拜辭而去孔明隨統大軍出漢中傳令教各處隘口預備乾柴草料細糧俱夠一月人馬支用以防秋雨將大軍寬限一月先給衣食伺候出征卻說曹真司馬懿同領大軍徑到陳倉城內不見一間房屋尋土人問之皆言孔明回時放火燒毀曹真便要從陳倉道進發懿曰不可輕進我夜觀天文見畢星躔于太陰之分此月內心有大雨若深入重地常勝則可倘有疏虞人馬受苦要退則難且宜在城中搭起窩鋪住紮以防陰雨真從其言未及半月天雨大降淋漓不止陳倉城外平地水深三尺軍器盡濕人不得睡晝夜不安大雨連降三十日馬無草料死者無數軍士怨聲不絕傳入洛陽魏主設壇求晴不得黃門侍郎王肅上疏曰前志有之千里饋糧士有饑色樵蘇後爨師不宿飽此謂平途之行軍者也又況於深入險阻鑿路而前則其爲勞必相百也今又加之以霖雨山阪峻滑衆逼而不展糧遠而難繼實行軍之大忌也聞曹真發已逾月而行方半穀治道功大戰士悉作是彼偏得以逸待勞乃兵家之所憚也言之前代則武王伐紂出關而複還論之近事則武文征權臨江而不濟豈非順天知時通于權變者哉願陛下念水雨艱劇之故休息士卒後日有釁乘時用之所謂悅以犯難民忘其死者也魏主覽表正在猶豫楊阜華歆亦上疏諫魏主即下詔遣使詔曹真司馬懿還朝卻說曹真與司馬懿商議曰今連陰三十日軍無戰心各有思歸之意如何禁止懿曰不如且回真曰倘孔明追來怎生退之懿曰先伏兩軍斷後方可回兵正議間忽使命來召二人遂將大軍前隊作後隊後隊作前隊徐徐而退卻說孔明計算一月秋雨將盡天尚未晴自提一軍屯於城固又傳令教大軍會於赤坡駐紮孔明升帳喚衆將言曰吾料魏兵必走魏主必下詔來取曹真司馬懿兵回吾若追之必有準備不如任他且去再作良圖忽王平令人報來說魏兵已回孔明分付來人傳與王平不可追襲吾自有破魏兵之策正是魏兵縱使能埋伏漢相原來不肯追未知孔明怎生破魏且看下文分解
