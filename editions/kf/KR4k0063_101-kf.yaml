body:
  text: 第一百一回出隴上諸葛妝神奔劍閣張郃中計卻說孔明用減兵添竈之法退兵到漢中司馬懿恐有埋伏不敢追趕亦收兵回長安去了因此蜀兵不曾折了一人孔明大賞三軍已畢回到成都入見後主奏曰老臣出了祁山欲取長安忽承陛下降詔召回不知有何大事後主無言可對良久乃曰朕久不見丞相之面心甚思慕故特詔回一無他事孔明曰此非陛下本心必有奸臣讒譖言臣有異志也後主聞言默然無語孔明曰老臣受先帝厚恩誓以死報今若內有奸邪臣安能討賊乎後主曰朕因過聽宦官之言一時召回丞相今日茅寨方開悔之不及矣孔明遂喚衆宦官究問方知是苟安流言急令人捕之已投魏國去了孔明將妄奏的宦官誅戮余皆廢出宮外又深責蔣琬費禕等不能覺察奸邪規諫天子二人唯唯服罪孔明拜辭後主複到漢中一面發檄令李嚴應付糧草仍運赴軍前一面再議出師楊儀曰前數興兵軍力罷敝糧又不繼今不如分兵兩班以三個月爲期且如二十萬之兵只領十萬出祁山住了三個月卻教這十萬替回迴圈相轉若此則兵力不乏然後徐徐而進中原可圖矣孔明曰此言正合我意吾伐中原非一朝一夕之事正當爲此長久之計遂下令分兵兩班限一百日爲期迴圈相轉違限者按軍法處治建興九年春二月孔明複出師伐魏時魏太和五年也魏主曹睿知孔明又伐中原急召司馬懿商議懿曰今子丹已亡臣願竭一人之力剿除寇賊以報陛下睿大喜設宴待之次日人報蜀兵寇急睿即命司馬懿出師禦敵親排鑾駕送出城外懿辭了魏主徑到長安大會諸路人馬計議破蜀兵之策張郃曰吾願引一軍去守雍郿以拒蜀兵懿曰吾前軍不能獨當孔明之衆而又分兵爲前後非勝算也不如留兵守上邽餘衆悉往祁山公肯爲先鋒否郃大喜曰吾素懷忠義欲盡心報國惜未遇知己今都督肯委重任是萬死不辭於是司馬懿令張郃爲先鋒總督大軍又令郭淮守隴西諸郡其餘衆將各分道而進前軍哨馬報說孔明率大軍望祁山進發前部先鋒王平張嶷徑出陳倉過劍閣由散關望斜穀而來司馬懿謂張郃曰今孔明長驅大進必將割隴西小麥以資軍糧汝可結營守祁山吾與郭淮巡略天水諸郡以防蜀兵割麥郃領諾遂引四萬兵守祁山懿引大軍望隴西而去卻說孔明兵至祁山安營已畢見渭濱有魏軍提備乃謂諸將曰此必是司馬懿也即今營中乏糧屢遣人催並李嚴運米應付卻只是不到吾料隴上麥熟可密引兵割之於是留王平張嶷吳班吳懿四將守祁山營孔明自引薑維魏延等諸將前到鹵城鹵城太守素知孔明慌忙開城出降孔明撫慰畢問曰此時何處麥熟太守告曰隴上麥已熟孔明乃留張翼馬忠守鹵城自引諸將並三軍望隴上而來前軍回報說司馬懿引兵在此孔明驚曰此人預知吾來割麥也即沐浴更衣推過一般三輛四輪車來車上皆要一樣妝飾此車乃孔明在蜀中預先造下的當下令薑維引一千軍護車五百軍擂鼓伏在上邽之後馬岱在左魏延在右亦各引一千軍護車五百軍擂鼓每一輛車用二十四人皂衣跣足披發仗劍手執七星皂幡在左右推車三人各受計引兵推車而去孔明又令三萬軍皆執鐮刀馱繩伺候割麥卻選二十四個精壯之士各穿皂衣披發跣足仗劍簇擁四輪車爲推車使者令關興結束做天蓬模樣手執七星皂幡步行于車前孔明端坐於上望魏營而來哨探軍見之大驚不知是人是鬼火速報知司馬懿懿自出營視之只見孔明簪冠鶴氅手搖羽扇端坐于四輪車上左右二十四人披發仗劍前面一人手執皂幡隱隱似天神一般懿曰這個又是孔明作怪也遂撥二千人馬分付曰汝等疾去連車帶人盡情都捉來魏兵領命一齊追趕孔明見魏兵趕來便教回車遙望蜀營緩緩而行魏兵皆驟馬追趕但見陰風習習冷霧漫漫盡力趕了一程追之不上各人大驚都勒住馬言曰奇怪我等急急趕了三十裏只見在前追之不上如之奈何孔明見兵不來又令推車過來朝著魏兵歇下魏兵猶豫良久又放馬趕來孔明複回車慢慢而行魏兵又趕了二十裏只見在前不曾趕上盡皆癡呆孔明教回過車朝著魏軍推車倒行魏兵又欲追趕後面司馬懿自引一軍到傳令曰孔明善會八門遁甲能驅六丁六甲之神此乃六甲天書之縮地之法也衆軍不可追之衆軍方勒馬回時左勢下戰鼓大震一彪軍殺來懿急令兵拒之只見蜀兵隊裏二十四人披發仗劍皂衣跣足擁出一輛四輪車車上端坐孔明簪冠鶴氅手搖羽扇懿大驚曰方才那個車上坐著孔明趕了五十裏追之不上如何這裏又有孔明怪哉怪哉言未畢右勢下戰鼓又鳴一彪軍殺來四輪車上亦坐著一個孔明左右亦有二十四人皂衣跣足披發仗劍擁車而來懿心中大疑回顧諸將曰此必神兵也衆軍心下大亂不敢交戰各自奔走正行之際忽然鼓聲大震又一彪軍殺來當先一輛四輪車孔明端坐於上左右前後推車使者同前一般魏兵無不駭然司馬懿不知是人是鬼又不知多少蜀兵十分驚懼急急引兵奔入上邽閉門不出此時孔明早令三萬精兵將隴上小麥割盡運赴鹵城打曬去了司馬懿在上邽城中三日不敢出城後見蜀兵退去方敢令軍出哨于路捉得一蜀兵來見司馬懿懿問之其人告曰某乃割麥之人因走失馬匹被捉前來懿曰前者是何神兵答曰三路伏兵皆不是孔明乃姜維馬岱魏延也每一路只有一千軍護車五百軍擂鼓只是先來誘陣的車上乃孔明也懿仰天長歎曰孔明有神出鬼沒之機忽報副都督郭淮入見懿接入禮畢淮曰吾聞蜀兵不多現在鹵城打麥可以擊之懿細言前事淮笑曰只瞞過一時今已識破何足道哉吾引一軍攻其後公引一軍攻其前鹵城可破孔明可擒矣懿從之遂分兵兩路而來卻說孔明引軍在鹵城打曬小麥忽喚諸將聽令曰今夜敵人必來攻城吾料鹵城東西麥田之內足可伏兵誰敢爲我一往姜維魏延馬忠馬岱四將出曰某等願往孔明大喜乃命姜維魏延各引二千兵伏在東南西北兩處馬岱馬忠各引二千兵伏在西南東北兩處只聽炮響四角一齊殺來四將受計引兵去了孔明自引百餘人各帶火炮出城伏在麥田之內等候卻說司馬懿引兵徑到鹵城下日已昏黑乃謂諸將曰若白日進兵城中必有準備今可乘夜晚攻之此處城低壕淺可便打破遂屯兵城外一更時分郭淮亦引兵到兩下合兵一聲鼓響把鹵城圍得鐵桶相似城上萬弩齊發矢石如雨魏兵不敢前進忽然魏軍中信炮連聲三軍大驚又不知何處兵來淮令人去麥田搜時四角上火光沖天喊聲大震四路蜀兵一齊殺至鹵城四門大開城內兵殺出裏應外合大殺了一陣魏兵死者無數司馬懿引敗兵奮死突出重圍占住了山頭郭淮亦引敗兵奔到山後紮住孔明入城令四將於四角下安營郭淮告司馬懿曰今與蜀兵相持許久無策可退目下又被殺了一陣折傷三千餘人若不早圖日後難退矣懿曰當複如何淮曰可發檄文調雍涼人馬並力剿殺吾願引軍襲劍閣截其歸路使彼糧草不通三軍慌亂那時乘勢擊之敵可滅矣懿從之即發檄文星夜往雍涼調撥人馬不一日大將孫禮引雍涼諸郡人馬到懿即令孫禮約會郭淮去襲劍閣卻說孔明在鹵城相拒日久不見魏兵出戰乃喚姜維馬岱入城聽令曰今魏兵守住山險不與我戰一者料吾麥盡無糧二者令兵去襲劍閣斷吾糧道也汝二人各引一萬軍先去守住險要魏兵見有準備自然退去二人引兵去了長史楊儀入帳告曰向者丞相令大兵一百日一換今已限足漢中兵已出川口前路公文已到只待會兵交換現存八萬軍內四萬該與換班孔明曰既有令便教速行衆軍聞知各各收拾起程忽報孫禮引雍涼人馬二十萬來助戰去襲劍閣司馬懿自引兵來攻鹵城了蜀兵無不驚駭楊儀入告孔明曰魏兵來得甚急丞相可將換班軍且留下退敵待新來兵到然後換之孔明曰不可吾用兵命將以信爲本既有令在先豈可失信且蜀兵應去者皆準備歸計其父母妻子倚扉而望吾今便有大難決不留他即傳令教應去之兵當日便行衆軍聞之皆大呼曰丞相如此施恩於衆我等願且不回各舍一命大殺魏兵以報丞相孔明曰爾等該還家豈可複留於此衆軍皆要出戰不願回家孔明曰汝等既要與我出戰可出城安營待魏兵到莫待他息喘便急攻之此以逸待勞之法也衆兵領命各執兵器歡喜出城列陣而待卻說西涼人馬倍道而來走的人馬困乏方欲下營歇息被蜀兵一擁而進人人奮勇將銳兵驍雍涼兵抵敵不住望後便退蜀兵奮力追殺殺得那雍涼兵屍橫遍野血流成渠孔明出城收聚得勝之兵入城賞勞忽報永安李嚴有書告急孔明大驚拆封視之書雲近聞東吳令人入洛陽與魏連和魏令吳取蜀幸吳尚未起兵今嚴探知消息伏望丞相早作良圖孔明覽畢甚是驚疑乃聚諸將曰若東吳興兵寇蜀吾須索速回也即傳令教祁山大寨人馬且退回西川司馬懿知吾屯軍在此必不敢追趕於是王平張嶷吳班吳懿分兵兩路徐徐退入西川去了張郃見蜀兵退去恐有計策不敢來追乃引兵往見司馬懿曰今蜀兵退去不知何意懿曰孔明詭計極多不可輕動不如堅守待他糧盡自然退去大將魏平出曰蜀兵拔祁山之營而退正可乘勢追之都督按兵不動畏蜀如虎奈天下笑何懿堅執不從卻說孔明知祁山兵已回遂令楊儀馬忠入帳授以密計令先引一萬弓弩手去劍閣木門道兩下埋伏若魏兵追到聽吾炮響急滾下木石先截其去路兩頭一齊射之二人引兵去了又喚魏延關興引兵斷後城上四面遍插旌旗城內亂堆柴草虛放煙火大兵盡望木門道而去魏營巡哨軍來報司馬懿曰蜀兵大隊已退但不知城中還有多少兵懿自往視之見城上插旗城中煙起笑曰此乃空城也令人探之果是空城懿大喜曰孔明已退誰敢追之先鋒張郃曰吾願往懿阻曰公性急躁不可去郃曰都督出關之時命吾爲先鋒今日正是立功之際卻不用吾何也懿曰蜀兵退去險阻處必有埋伏須十分仔細方可追之郃曰吾已知得不必挂慮懿曰公自欲去莫要追悔郃曰大丈夫捨身報國雖萬死無恨懿曰公既堅執要去可引五千兵先行卻教魏平引二萬馬步兵後行以防埋伏吾卻引三千兵隨後策應張郃領命引兵火速望前追趕行到三十餘裏忽然背後一聲喊起樹林內閃出一彪軍爲首大將橫刀勒馬大叫曰賊將引兵那裏去郃回頭視之乃魏延也郃大怒回馬交鋒不十合延詐敗而走郃又追趕三十餘裏勒馬回顧全無伏兵又策馬前追方轉過山坡忽喊聲大起一彪軍閃出爲首大將乃關興也橫刀勒馬大叫曰張郃休趕有吾在此郃就拍馬交鋒不十合興撥馬便走郃隨後追之趕到一密林內郃心疑令人四下哨探並無伏兵於是放心又趕不想魏延卻抄在前面郃又與戰十餘合延又敗走郃奮怒追來又被關興抄在前面截住去路郃大怒拍馬交鋒戰有十合蜀兵盡棄衣甲什物等件塞滿道路魏軍皆下馬爭取延興二將輪流交戰張郃奮勇追趕看看天晚趕到木門道口魏延撥回馬高聲大罵曰張郃逆賊吾不與汝相拒汝只顧趕來吾今與汝決一死戰郃十分忿怒挺槍驟馬直取魏延延揮刀來迎戰不十合延大敗盡棄衣甲頭盔匹馬引敗兵望木門道中而走張郃殺得性起又見魏延大敗而逃乃驟馬趕來此時天色昏黑一聲炮響山上火光沖天大石亂柴滾將下來阻截去路郃大驚曰我中計矣急回馬時背後已被木石塞滿了歸路中間只有一段空地兩邊皆是峭壁郃進退無路忽一聲梆子響兩下萬弩齊發將張郃並百餘個部將皆射死於木門道中後人有詩曰伏弩齊飛萬點星木門道上射雄兵至今劍閣行人過猶說軍師舊日名卻說張郃已死隨後魏兵追到見塞了道路已知張郃中計衆軍勒回馬急退忽聽得山頭上大叫曰諸葛丞相在此衆軍仰視只見孔明立於火光之中指衆軍而言曰吾今日圍獵欲射一馬誤中一獐汝各人安心而去上覆仲達早晚必爲吾所擒矣魏兵回見司馬懿細告前事懿悲傷不已仰天歎曰張雋義身死吾之過也乃收兵回洛陽魏主聞張郃死揮淚歎息令人收其屍厚葬之卻說孔明入漢中欲歸成都見後主都護李嚴妄奏後主曰臣已辦備軍糧行將運赴丞相軍前不知丞相何故忽然班師後主聞奏即命尚書費禕入漢中見孔明問班師之故禕至漢中宣後主之意孔明大驚曰李嚴發書告急說東吳將興兵寇川因此回師費禕曰李嚴奏稱軍糧已辦丞相無故回師天子因此命某來問耳孔明大怒令人訪察乃是李嚴因軍糧不濟怕丞相見罪故發書取回卻又妄奏天子遮飾己過孔明大怒曰匹夫爲一己之故廢國家大事令人召至欲斬之費禕勸曰丞相念先帝托孤之意姑且寬恕孔明從之費禕即具表啓奏後主後主覽表勃然大怒叱武士推李嚴出斬之參軍蔣琬出班奏曰李嚴乃先帝托孤之臣乞望恩寬恕後主從之即謫爲庶人徒於梓潼郡閑住孔明回到成都用李嚴子李豐爲長史積草屯糧講陣論武整治軍器存恤將士三年然後出征兩川人民軍士皆仰其恩德光陰荏苒不覺三年時建興十二年春二月孔明入朝奏曰臣今存恤軍士已經三年糧草豐足軍器完備人馬雄壯可以伐魏今番若不掃清奸党恢復中原誓不見陛下也後主曰方今已成鼎足之勢吳魏不曾入寇相父何不安享太平孔明曰臣受先帝知遇之恩夢寐之間未嘗不設伐魏之策竭力盡忠爲陛下克復中原重興漢室臣之願也言未畢班部中一人出曰丞相不可興兵衆視之乃譙周也正是武侯盡瘁惟憂國太史知機又論天未知譙周有何議論且看下文分解
