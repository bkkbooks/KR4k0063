body:
  text: 第一百三回上方谷司馬受困五太原諸葛禳星卻說司馬懿被張翼廖化一陣殺敗匹馬單槍望密林間而走張翼收住後軍廖化當先追趕看看趕上懿著慌繞樹而轉化一刀砍去正砍在樹上及拔出刀時懿已走出林外廖化隨後趕出卻不知去向但見樹林之東落下金盔一個廖化取盔捎在馬上一直望東追趕原來司馬懿把金盔棄于林東卻反向西走去了廖化追了一程不見蹤迹奔出谷口遇見薑維同回寨見孔明張嶷早驅木牛流馬到寨交割已畢獲糧萬余石廖化獻上金盔錄爲頭功魏延心中不悅口出怨言孔明只做不知且說司馬懿逃回寨中心甚惱悶忽使命齎詔至言東吳三路入寇朝延正議命將抵敵令懿等堅守勿戰懿受命已畢深溝高壘堅守不出卻說曹睿聞孫權分兵三路而來亦起兵三路迎之令劉劭引兵救江夏田豫引兵救襄陽睿自與滿寵率大軍救合淝滿寵先引一軍至巢湖口望見東岸戰船無數旌旗整肅寵入軍中奏魏主曰吳人必輕我遠來未曾提備今夜可乘虛劫其水寨必得全勝魏主曰汝言正合朕意即令驍將張球領五千兵各帶火具從湖口攻之滿寵引兵五千從東岸攻之是夜二更時分張球滿寵各引軍悄悄望湖口進發將近水寨一齊呐喊殺入吳兵慌亂不戰而走被魏軍四下舉火燒毀戰船糧草器具不計其數諸葛瑾率敗兵逃走沔口魏兵大勝而回次日哨軍報知陸遜遜集諸將議曰吾當作表申奏主上請撤新城之圍以兵斷魏軍歸路吾率衆攻其前彼首尾不敵一鼓可破也衆服其言陸遜即具表遣一小校密地齎往新城小校領命齎著表文行至渡口不期被魏軍伏路的捉住解赴軍中見魏主曹睿睿搜出陸遜表文覽畢歎曰東吳陸遜真妙算也遂命將吳卒監下令劉劭謹防孫權後兵卻說諸葛瑾大敗一陣又值暑天人馬多生疾病乃修書一封令人轉達陸遜議欲撤兵還國遜看書畢謂來人曰拜上將軍吾自有主意使者回報諸葛瑾瑾曰陸將軍作何舉動使者曰但見陸將軍催督衆人于營外種豆菽自與諸將在轅門射戲瑾大驚親自往陸遜營中與遜相見問曰今曹睿親來兵勢甚盛都督何以禦之遜曰吾前遣人奉表於主上不料爲敵人所獲機謀既泄彼必知備與戰無益不如且退已差人奉表約主上緩緩退兵矣瑾曰都督既有此意即宜速退何以遲延遜曰吾軍欲退當徐徐而動今若便退魏人必乘勢追趕此取敗之道也足下宜先督船隻詐爲拒敵之意吾悉以人馬向襄陽而進爲疑敵之計然後徐徐退歸江東魏兵自不敢近耳瑾依其計辭遜歸本營整頓船隻預備起行陸遜整肅部伍張揚聲勢望襄陽進發早有細作報知魏主說吳兵已動須用提防魏將聞之皆要出戰魏主素知陸遜之才諭衆將曰陸遜有謀莫非用誘敵之計不可輕進衆將乃止數日後哨卒報來東吳三路兵馬皆退矣魏主未信再令人探之回報果然盡退魏主曰陸遜用兵不亞孫吳東南未可平也因敕諸將各守險要自引大軍屯合淝以伺其變卻說孔明在祁山欲爲久駐之計乃令蜀兵與魏民相雜種田軍一分民二分並不侵犯魏民皆安心樂業司馬師入告其父曰蜀兵劫去我許多糧米今又令蜀兵與我民相雜屯田於渭濱以爲久計似此真爲國家大患父親何不與孔明約期大戰一場以決雌雄懿曰吾奉旨堅守不可輕動正議間忽報魏延將著元帥前日所失金盔前來罵戰衆將忿怒俱欲出戰懿笑曰聖人雲小不忍則亂大謀但堅守爲上諸將依令不出魏延辱駡良久方回孔明見司馬懿不肯出戰乃密令馬岱造成木柵營中掘下深塹多積乾柴引火之物周圍山上多用柴草虛搭窩鋪內外皆伏地雷置備停當孔明附耳囑之曰可將葫蘆穀後路塞斷暗伏兵于穀中若司馬懿追到任他入穀便將地雷幹柴一齊放起火來又令軍士晝舉七星號帶于穀口夜設七盞明燈於山上以爲暗號馬岱受計引兵而去孔明又喚魏延分付曰汝可引五百兵去魏寨討戰務要誘司馬懿出戰不可取勝只可詐敗懿必追趕汝卻望七星旗處而入若是夜間則望七盞燈處而走只要引得司馬懿入葫蘆穀內吾自有擒之之計魏延受計引兵而去孔明又喚高翔分付曰汝將木牛流馬或二三十爲一群或四五十爲一群各裝米糧於山路往來行走如魏兵搶去便是汝之功高翔領計驅駕木牛流馬去了孔明將祁山兵一一調去只推屯田分付如別兵來戰只許詐敗若司馬懿自來方並力只攻渭南斷其歸路孔明分撥已畢自引一軍近上方谷下營且說夏侯惠夏侯和二人入寨告司馬懿曰今蜀兵四散結營各處屯田以爲久計若不趁此時除之縱令安居日久深根固蒂難以搖動懿曰此必又是孔明之計二人曰都督若如此疑慮寇敵何時得滅我兄弟二人當奮力決一死戰以報國恩懿曰既如此汝二人可分頭出戰遂令夏侯惠夏侯和各引五千兵去訖懿坐待回音卻說夏侯惠夏侯和二人分兵兩路正行之間忽見蜀兵驅木牛流馬而來二人一齊殺將過去蜀兵大敗奔走木牛流馬盡被魏兵搶獲解送司馬懿營中次日又劫擄得人馬百餘亦解赴大寨懿將解到蜀兵詰審虛實蜀兵告曰孔明只料都督堅守不出盡命我等四散屯田以爲久計不想卻被擒獲懿即將蜀兵盡皆放回夏侯和曰何不殺之懿曰量此小卒殺之無益放歸本寨令說魏將寬厚仁慈釋彼戰心此呂蒙取荊州之計也遂傳令今後凡有擒到蜀兵俱當善遣之仍重賞有功將吏諸將皆聽令而去卻說孔明令高翔佯作運糧驅駕木牛流馬往來于上方穀內夏侯惠等不時截殺半月之間連勝數陣司馬懿見蜀兵屢敗心中歡喜一日又擒到蜀兵數十人懿喚至帳下問曰孔明今在何處衆告曰諸葛丞相不在祁山在上方穀西十裏下營安住今每日運糧屯于上方穀懿備細問了即將衆人放去乃喚諸將分付曰孔明今不在祁山在上方穀安營汝等於明日可一齊並力攻取祁山大寨吾自引兵來接應衆將領命各各準備出戰司馬師曰父親何故反欲攻其後懿曰祁山乃蜀人之根本若見我兵攻之各營必盡來救我卻取上方穀燒其糧草使彼首尾不接必大敗也司馬師拜服懿即發兵起行令張虎樂綝各引五千兵在後救應且說孔明正在山上望見魏兵或三五千一行或一二千一行隊伍紛紛前後顧盼料必來取祁山大寨乃密傳令衆將若司馬懿自來汝等便往劫魏寨奪了渭南衆將各各聽令卻說魏兵皆奔祁山寨來蜀兵四下一齊呐喊奔走虛作救應之勢司馬懿見蜀兵都去救祁山寨便引二子並中軍護衛人馬殺奔上方穀來魏延在穀口只盼司馬懿到來忽見一枝魏兵殺到延縱馬向前視之正是司馬懿延大喝曰司馬懿休走舞刀相迎懿挺槍接戰不上三合延撥回馬便走懿隨後趕來延只望七星旗處而走懿見魏延只一人軍馬又少放心追之令司馬師在左司馬昭在右懿自居中一齊攻殺將來魏延引五百兵皆退入穀中去懿追到穀口先令人入穀中哨探回報穀內並無伏兵山上皆是草房懿曰此必是積糧之所也遂大驅士馬盡入穀中懿忽見草房上盡是乾柴前面魏延已不見了懿心疑謂二子曰倘有兵截斷穀口如之奈何言未已只聽得喊聲大震山上一齊丟下火把來燒斷穀口魏兵奔逃無路山上火箭射下地雷一齊突出草房內乾柴都著刮刮雜雜火勢沖天司馬懿驚得手足無措乃下馬抱二子大哭曰我父子三人皆死於此處矣正哭之間忽然狂風大作黑氣漫空一聲霹靂響處驟雨傾盆滿穀之火盡皆澆滅地雷不震火器無功司馬懿大喜曰不就此時殺出更待何時即引兵奮力衝殺張虎樂綝亦各引兵殺來接應馬岱軍少不敢追趕司馬懿父子與張虎樂綝合兵一處同歸渭南大寨不想寨柵已被蜀兵奪了郭淮孫禮正在浮橋上與蜀兵接戰司馬懿等引兵殺到蜀兵退去懿燒斷浮橋據住北岸且說魏兵在祁山攻打蜀寨聽知司馬懿大敗失了渭南營寨軍心慌亂急退時四面蜀兵衝殺將來魏兵大敗十傷八九死者無數余衆奔過渭北逃生孔明在山上見魏延誘司馬懿入穀一霎時火光大起心中甚喜以爲司馬懿此番必死不期天降大雨火不能著哨馬報說司馬懿父子俱逃去了孔明歎曰謀事在人成事在天不可強也後人有詩歎曰穀口風狂烈焰飄何期驟雨降青霄武侯妙計如能就安得山河屬晉朝卻說司馬懿在渭北寨內傳令曰渭南寨柵今已失了諸將如再言出戰者斬衆將聽令據守不出郭淮入告曰近日孔明引兵巡哨必將擇地安營懿曰孔明若出武功依山而東我等皆危矣若出渭南西止五丈原方無事也令人探之回報果屯五丈原司馬懿以手加額曰大魏皇帝之洪福也遂令諸將堅守勿出彼久必自變且說孔明自引一軍屯于五丈原累令人搦戰魏兵只不出孔明乃取巾幗並婦人縞素之服盛於大盒之內修書一封遣人送至魏寨諸將不敢隱蔽引來使入見司馬懿懿對衆啓盒視之內有巾幗婦人之衣並書一封懿拆視其書略曰仲達既爲大將統領中原之衆不思披堅執銳以決雌雄乃甘窟守土巢謹避刀箭與婦人又何異哉今遣人送巾幗素衣至如不出戰可再拜而受之倘恥心未泯猶有男子胸襟早與批回依期赴敵司馬懿看畢心中大怒乃佯笑曰孔明視我爲婦人耶即受之令重待來使懿問曰孔明寢食及事之煩簡若何使者曰丞相夙興夜寐罰二十以上皆親覽焉所啖之食日不過數升懿顧謂諸將曰孔明食少事煩其能久乎使者辭去回到五丈原見了孔明具說司馬懿受了巾幗女衣看了書劄並不嗔怒只問丞相寢食及事之煩簡絕不提起軍旅之事某如此應對彼言食少事煩豈能長久孔明歎曰彼深知我也主簿楊顒諫曰某見丞相常自校簿書竊以爲不必夫爲治有體上下不可相侵譬之治家之道必使仆執耕婢典爨私業無曠所求皆足其家主從容自在高枕飲食而已若皆身親其事將形疲神困終無一成豈其智之不如婢仆哉失爲家主之道也是故古人稱坐而論道謂之三公作而行之謂之士大夫昔丙吉憂牛喘而不問橫道死人陳平不知錢谷之數曰自有主者今丞相親理細事汗流終日豈不勞乎司馬懿之言真至言也孔明泣曰吾非不知但受先帝托孤之重惟恐他人不似我盡心也衆皆垂淚自此孔明自覺神思不寧諸將因此未敢進兵卻說魏將皆知孔明以巾幗女衣辱司馬懿懿受之不戰衆將不忿入帳告曰我等皆大國名將安忍受蜀人如此之辱即請出戰以決雌雄懿曰吾非不敢出戰而甘心受辱也奈天子明詔令堅守勿動今若輕出有違君命矣衆將俱忿怒不平懿曰汝等既要出戰待我奏准天子同力赴敵何如衆皆允諾懿乃寫表遣使直至合淝軍前奏聞魏主曹睿睿拆表覽之表略曰臣才薄任重伏蒙明旨令臣堅守不戰以待蜀人之自敝奈今諸葛亮遺臣以巾幗待臣如婦人恥辱至甚臣謹先達聖聰旦夕將效死一戰以報朝廷之恩以雪三軍之恥臣不勝激切之至睿覽訖乃謂多官曰司馬懿堅守不出今何故又上表求戰衛尉辛毗曰司馬懿本無戰心必因諸葛亮恥辱衆將忿怒之故特上此表欲更乞明旨以遏諸將之心耳睿然其言即令辛毗持節至渭北寨傳諭令勿出戰司馬懿接詔入帳辛毗宣諭曰如再有敢言出戰者即以違旨論衆將只得奉詔懿暗謂辛毗曰公真知我心也於是令軍中傳說魏主命辛毗持節傳諭司馬懿勿得出戰蜀將聞知此事報與孔明孔明笑曰此乃司馬懿安三軍之法也薑維曰丞相何以知之孔明曰彼本無戰心所以請戰者以示武於衆耳豈不聞將在外君命有所不受安有千里而請戰者乎此乃司馬懿因將士忿怒故借曹睿之意以制衆人今又播傳此言欲懈我軍心也正論間忽報費禕到孔明請入問之禕曰魏主曹睿聞東吳三路進兵乃自引大軍至合淝令滿寵田豫劉劭分兵三路迎敵滿寵設計盡燒東吳糧草戰具吳兵多病陸遜上表于吳王約會前後夾攻不意齎表人中途被魏兵所獲因此機關泄漏吳兵無功而退孔明聽知此信長歎一聲不覺昏倒於地衆將急救半晌方蘇孔明歎曰吾心昏亂舊病復發恐不能生矣是夜孔明扶病出帳仰觀天文十分驚慌入帳謂薑維曰吾命在旦夕矣維曰丞相何出此言孔明曰吾見三台星中客星倍明主星幽隱相輔列曜其光昏暗天象如此吾命可知維曰天象雖則如此丞相何不用祈禳之法挽回之孔明曰吾素諳祈禳之法但未知天意若何汝可引甲士四十九人各執皂旗穿皂衣環繞帳外我自於帳中祈禳北斗若七日內主燈不滅吾壽可增一紀如燈滅吾必死矣閒雜人等休教放入凡一應需用之物只令二小童搬運薑維領命自去準備時值八月中秋是夜銀河耿耿玉露零零旌旗不動刁鬥無聲薑維在帳外引四十九人守護孔明自於帳中設香花祭物地上分佈七盞大燈外布四十九盞小燈內安本命燈一盞孔明拜祝曰亮生於亂世甘老林泉承昭烈皇帝三顧之恩托孤之重不敢不竭犬馬之勞誓討國賊不意將星欲墜陽壽將終謹書尺素上告穹蒼伏望天慈俯垂鑒聽曲延臣算使得上報君恩下救民命克復舊物永延漢祀非敢妄祈實由情切拜祝畢就帳中俯伏待旦次日扶病理事吐血不止日則計議軍機夜則步罡踏鬥卻說司馬懿在營中堅守忽一夜仰觀天文大喜謂夏侯霸曰吾見將星失位孔明必然有病不久便死你可引一千軍去五丈原哨探若蜀人攘亂不出接戰孔明必然患病矣吾當乘勢擊之霸引兵而去孔明在帳中祈禳已及六夜見主燈明亮心中甚喜薑維入帳正見孔明披發仗劍踏罡步鬥壓鎮將星忽聽得寨外呐喊方欲令人出問魏延飛步入告曰魏兵至矣延腳步急竟將主燈撲滅孔明棄劍而歎曰死生有命不可得而禳也魏延惶恐伏地請罪薑維忿怒拔劍欲殺魏延正是萬事不由人做主一心難與命爭衡未知魏延性命如何且看下文分解
