body:
  text: 第一百四回隕大星漢丞相歸天見木像魏都督喪膽卻說姜維見魏延踏滅了燈心中忿怒拔劍欲殺之孔明止之曰此吾命當絕非文長之過也維乃收劍孔明吐血數口臥倒床上謂魏延曰此是司馬懿料吾有病故令人來探視虛實汝可急出迎敵魏延領命出帳上馬引兵殺出寨來夏侯霸見了魏延慌忙引軍退走延追趕二十餘裏方回孔明令魏延自回本寨把守薑維入帳直至孔明榻前問安孔明曰吾本欲竭忠盡力恢復中原重興漢室奈天意如此吾旦夕將死吾平生所學已著書二十四篇計十萬四千一百一十二字內有八務七戒六恐五懼之法吾遍觀諸將無人可授獨汝可傳我書切勿輕忽維哭拜而受孔明又曰吾有連弩之法不曾用得其法矢長八寸一弩可發十矢皆畫成圖本汝可依法造用維亦拜受孔明又曰蜀中諸道皆不必多憂惟陰平之地切須仔細此地雖險峻久必有失又喚馬岱入帳附耳低言授以密計囑曰我死之後汝可依計行之岱領計而出少頃楊儀入孔明喚至榻前授與一錦囊密囑曰我死魏延必反待其反時汝與臨陣方開此囊那時自有斬魏延之人也孔明一一調度已畢便昏然而倒至晚方蘇便連夜表奏後主後主聞奏大驚急命尚書李福星夜至軍中問安兼詢後事李福領命趲程赴五丈原入見孔明傳後主之命問安畢孔明流涕曰吾不幸中道喪亡虛廢國家大事得罪於天下我死後公等宜竭忠輔主國家舊制不可改易吾所用之人亦不可輕廢吾兵法皆授與薑維他自能繼吾之志爲國家出力吾命已在旦夕當即有遺表上奏天子也李福領了言語匆匆辭去孔明強支病體令左右扶上小車出寨遍觀各營自覺秋風吹面徹骨生寒乃長歎曰再不能臨陣討賊矣悠悠蒼天曷此其極歎息良久回到帳中病轉沈重乃喚楊儀分付曰王平廖化張嶷張翼吳懿等皆忠義之士久經戰陣多歲勤勞堪可委用我死之後凡事俱依舊法而行緩緩退兵不可急驟汝深通謀略不必多囑姜伯約智勇足備可以斷後楊儀泣拜受命孔明令取文房四寶於臥榻上手書遺表以達後主表略曰伏聞生死有常難逃定數死之將至願盡愚忠臣亮賦性愚拙遭時艱難分符擁節專掌鈞衡興師北伐未獲成功何期病入膏肓命垂旦夕不及終事陛下飲恨無窮伏願陛下清心寡欲約己愛民達孝道於先皇布仁恩於宇下提拔幽隱以進賢良屏斥奸邪以厚風俗臣家成都有桑八百株薄田十五頃子弟衣食自有餘饒至於臣在外任別無調度隨身衣食悉仰於官不別治生以長尺寸臣死之日不使內有餘帛外有贏財以負陛下也孔明寫畢又囑楊儀曰吾死之後不可發喪可作一大龕將吾屍坐於龕中以米七粒放吾口內腳下用明燈一盞軍中安靜如常切勿舉哀則將星不墜吾陰魂更自起鎮之司馬懿見將星不墜必然驚疑吾軍可令後寨先行然後一營一營緩緩而退若司馬懿來追汝可布成陣勢回旗返鼓等他來到卻將我先時所雕木像安于車上推出軍前令大小將士分列左右懿見之必驚走矣楊儀一一領諾是夜孔明令人扶出仰觀北斗遙指一星曰此吾之將星也衆視之見其色昏暗搖搖欲墜孔明以劍指之口中念咒咒畢急回帳中不省人事衆將正慌亂間忽尚書李福又至見孔明昏絕口不能言乃大哭曰我誤國家之大事也須臾孔明複醒開目遍視見李福立於榻前孔明曰吾已知公複來之意福謝曰福奉天子命問丞相百年後誰可任大事者適因匆遽失於諮請故複來耳孔明曰吾死之後可任大事者蔣公琰其宜也福曰公琰之後誰可繼之孔明曰費文偉可繼之福又問文偉之後誰當繼者孔明不答衆將近前視之已薨矣時建興十二年秋八月二十三日也壽五十四歲後杜工部有詩歎曰長星昨夜墜前營訃報先生此日傾虎帳不聞施號令麟台惟顯著勳名空余門下三千客辜負胸中十萬兵好看綠陰清晝裏於今無複雅歌聲白樂天亦有詩曰先生晦迹臥山林三顧那逢聖主尋魚到南陽方得水龍飛天漢便爲霖托孤既盡殷勤禮報國還傾忠義心前後出師遺表在令人一覽淚沾襟初蜀長水校尉廖立自謂才名宜爲孔明之副嘗以職位閒散怏怏不平怨謗不已於是孔明廢之爲庶人徙之汶山及聞孔明亡乃垂泣曰吾終爲左衽矣李嚴聞之亦大哭病死蓋嚴嘗望孔明複收已得自補前過度孔明死後人不能用之故也後元微之有贊孔明詩曰撥亂扶危主殷勤受託孤英才過管樂妙策勝孫吳凜凜出師表堂堂八陣圖如公全盛德應歎古今無是夜天愁地慘月色無光孔明奄然歸天姜維楊儀遵孔明遺命不敢舉哀依法成殮安置龕中令心腹將卒三百人守護隨傳密令使魏延斷後各處營寨一一退去卻說司馬懿夜觀天文見一大星赤色光芒有角自東北方流于西南方墜于蜀營內三投再起隱隱有聲懿驚喜曰孔明死矣即傳令起大兵追之方出寨門忽又疑慮曰孔明善會六丁六甲之法今見我久不出戰故以此術詐死誘我出耳今若追之必中其計遂複勒馬回寨不出只令夏侯霸暗引數十騎往五丈原山僻哨探消息卻說魏延在本寨中夜作一夢夢見頭上忽生二角醒來甚是疑異次日行軍司馬趙直至延請入問曰久知足下深明易理吾夜夢頭生二角不知主何吉凶煩足下爲我決之趙直想了半晌答曰此大吉之兆麒麟頭上有角蒼龍頭上有角乃變化飛騰之象也延大喜曰如應公言當有重謝直辭去行不數裏正遇尚書費禕禕問何來直曰適至魏文長營中文長夢頭生角令我決其吉凶此本非吉兆但恐直言見怪因以麒麟蒼龍解之禕曰足下何以知非吉兆直曰角之字形乃刀下用也今頭上用刀其凶甚矣禕曰君且勿泄漏直別去費禕至魏延寨中屏退左右告曰昨夜三更丞相已辭世矣臨終再三囑咐令將軍斷後以當司馬懿緩緩而退不可發喪今兵符在此便可起兵延曰何人代理丞相之大事禕曰丞相一應大事盡托與楊儀用兵密法皆授與姜伯約此兵符乃楊儀之令也延曰丞相雖亡吾今現在楊儀不過一長史安能當此大任他只宜扶柩入川安葬我自率大兵攻司馬懿務要成功豈可因丞相一人而廢國家大事耶禕曰丞相遺令教且暫退不可有違延怒曰丞相當時若依我計取長安久矣吾今官任前將軍征西大將軍南鄭侯安肯與長史斷後禕曰將軍之言雖是然不可輕動令敵人恥笑待吾往見楊儀以利害說之令彼將兵權讓與將軍何如延依其言禕辭延出營急到大寨見楊儀具述魏延之語儀曰丞相臨終曾密囑我曰魏延必有異志今我以兵符往實欲探其心耳今果應丞相之言吾自令伯約斷後可也於是楊儀領兵扶柩先行令薑維斷後依孔明遺令徐徐而退魏延在寨中不見費禕來回復心中疑惑乃令馬岱引十數騎往探消息回報曰後軍乃姜維總督前軍大半退入穀中去了延大怒曰豎儒安敢欺我我必殺之因顧謂岱曰公肯相助否岱曰某亦素恨楊儀今願助將軍攻之延大喜即拔寨引本部兵望南而行卻說夏侯霸引軍至五丈原看時不見一人急回報司馬懿曰蜀兵已盡退矣懿跌足曰孔明真死矣可速追之夏侯霸曰都督不可輕追當令偏將先往懿曰此番須吾自行遂引兵同二子一齊殺奔五丈原來呐喊搖旗殺入蜀寨時果無一人懿顧二子曰汝急催兵趕來吾先引軍前進於是司馬師司馬昭在後催軍懿自引軍當先追到山腳下望見蜀兵不遠乃奮力追趕忽然山後一聲炮響喊聲大震只見蜀兵俱回旗返鼓樹影中飄出中軍大旗上書一行大字曰漢丞相武鄉侯諸葛亮懿大驚失色定睛看時只見中軍數十員上將擁出一輛四輪車來車上端坐孔明綸巾羽扇鶴氅皂縧懿大驚曰孔明尚在吾輕入重地墮其計矣急勒回馬便走背後薑維大叫賊將休走你中了我丞相之計也魏兵魂飛魄散棄甲丟盔抛戈撇戟各逃性命自相踐踏死者無數司馬懿奔走了五十餘裏背後兩員魏將趕上扯住馬嚼環叫曰都督勿驚懿用手摸頭曰我有頭否二將曰都督休怕蜀兵去遠了懿喘息半晌神色方定睜目視之乃夏侯霸夏侯惠也乃徐徐按轡與二將尋小路奔歸本寨使衆將引兵四散哨探過了兩日鄉民奔告曰蜀兵退入谷中之時哀聲震地軍中揚起白旗孔明果然死了止留薑維引一千兵斷後前日車上之孔明乃木人也懿歎曰吾能料其生不能料其死也因此蜀中人諺曰死諸葛能走生仲達後人有詩歎曰長星半夜落天樞奔走還疑亮未殂關外至今人冷笑頭顱猶問有和無司馬懿知孔明死信已確乃複引兵追趕行到赤岸坡見蜀兵已去遠乃引還顧謂衆將曰孔明已死我等皆高枕無憂矣遂班師回一路上見孔明安營下寨之處前後左右整整有法懿歎曰此天下奇才也於是引兵回長安分調衆將各守隘口懿自回洛陽面君去了卻說楊儀姜維排成陣勢緩緩退入棧閣道口然後更衣發喪楊幡舉哀蜀軍皆撞跌而哭至有哭死者蜀兵前隊正回到棧閣道口忽見前面火光沖天喊聲震地一彪軍攔路衆將大驚急報楊儀正是已見魏營諸將去不知蜀地甚兵來未知來者是何處軍馬且看下文分解
