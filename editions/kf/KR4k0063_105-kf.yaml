body:
  text: 第一百五回武侯預伏錦囊計魏主拆取承露盤卻說楊儀聞報前路有兵攔截忙令人哨探回報說魏延燒絕棧道引兵攔路儀大驚曰丞相在日料此人久後必反誰想今日果然如此今斷吾歸路當複如何費禕曰此人必先捏奏天子誣吾等造反故燒絕棧道阻遏歸路吾等亦當表奏天子陳魏延反情然後圖之薑維曰此間有一小徑名槎山雖崎嶇險峻可以抄出棧道之後一面寫表奏聞天子一面將人馬望槎山小道進發且說後主在成都寢食不安動止不寧夜作一夢夢見成都錦屏山崩倒遂驚覺坐而待旦聚集文武入朝圓夢譙周曰臣昨夜仰觀天文見一星赤色光芒有角自東北落于西南主丞相有大凶之事今陛下夢山崩正應此兆後主愈加驚怖忽報李福到後主急召入問之福頓首泣奏丞相已亡將丞相臨終言語細述一遍後主聞言大哭曰天喪我也哭倒于龍床之上侍臣扶入後宮吳太后聞之亦放聲大哭不已諸官無不哀慟百姓人人涕泣後主連日傷感不能設朝忽報魏延表奏楊儀造反群臣大駭入宮啓奏後主時吳太后亦在宮中後主聞奏大驚命近臣讀魏延表其略曰征西大將軍南鄭侯臣魏延誠惶誠恐頓首上言楊儀自總兵權率衆造反劫丞相靈柩欲引敵人入境臣先燒絕棧道以兵守禦謹此奏聞讀畢後主曰魏延乃勇將足可拒楊儀等衆何故燒絕棧道吳太后曰嘗聞先帝有言孔明識魏延腦後有反骨每欲斬之因憐其勇故姑留用今彼奏楊儀等造反未可輕信楊儀乃文人丞相委以長史之任必其人可用今日若聽此一面之詞楊儀等必投魏矣此事當深慮遠議不可造次衆官正商議間忽報長史楊儀有緊急表到近臣拆表讀曰長史綏軍將軍臣楊儀誠惶誠恐頓首謹表丞相臨終將大事委於臣照依舊制不敢變更使魏延斷後薑維次之今魏延不遵丞相遺語自提本部人馬先入漢中放火燒斷棧道劫丞相靈車謀爲不軌變起倉卒謹飛章奏聞太后聽畢問卿等所見若何蔣琬奏曰以臣愚見楊儀爲人雖稟性過急不能容物至於籌度糧草參贊軍機與丞相辦事多時今丞相臨終委以大事決非背反之人魏延平日恃功務高人皆下之儀獨不假借延心懷恨今見儀總兵心中不服故燒棧道斷其歸路又誣奏而圖陷害臣願將全家良賤保楊儀不反實不敢保魏延董允亦奏曰魏延自恃功高常有不平之心口出怨言向所以不即反者懼丞相耳今丞相新亡乘機爲亂勢所必然若楊儀才幹敏達爲丞相所任用必不背反後主曰若魏延果反當用何策禦之蔣琬曰丞相素疑此人必有遺計授與楊儀若儀無恃安能退入穀口乎延必中計矣陛下寬心不多時魏延又表至告稱楊儀背反正覽表之間楊儀又表到奏稱魏延背反二人接連具表各陳是非忽報費禕到後主召入禕細奏魏延反情後主曰若如此且令董允假節釋勸用好言撫慰允奉詔而去卻說魏延燒斷棧道屯兵南穀把住隘口自以爲得計不想楊儀薑維星夜引兵抄到南穀之後儀恐漢中有失令先鋒何平引三千兵先行儀同薑維等引兵扶柩望漢中而來且說何平引兵徑到南穀之後擂鼓呐喊哨馬飛報魏延說楊儀令先鋒何平引兵自槎山小路抄來搦戰延大怒急披挂上馬提刀引兵來迎兩陣對圓何平出馬大罵曰反賊魏延安在延亦罵曰汝助楊儀造反何敢罵我平叱曰丞相新亡骨肉未寒汝焉敢造反乃揚鞭指川兵曰汝等軍士皆是西川之人川中多有父母妻子兄弟親朋丞相在日不曾薄待汝等今不可助反賊宜各回家鄉聽候賞賜衆軍聞言大喊一聲散去大半延大怒揮刀縱馬直取何平平挺槍來迎戰不數合平詐敗而走延隨後趕來衆軍弓弩齊發延撥馬而回見從軍紛紛潰散延轉怒拍馬趕上殺了數人卻只止遏不住只有馬岱所領三百人不動延謂岱曰公真心助我事成之後決不相負遂與馬岱追殺何平平引兵飛奔而去魏延收聚殘軍與馬岱商議曰我等投魏若何岱曰將軍之言不智甚也大丈夫何不自圖霸業乃輕屈膝於人耶吾觀將軍智勇足備兩川之士誰敢抵敵吾誓同將軍先取漢中隨後進攻西川延大喜遂同馬岱引兵直取南鄭姜維在南鄭城上見魏延馬岱耀武揚威風擁而來維急令拽起吊橋延岱二人大叫早降姜維令人請楊儀商議曰魏延勇猛更兼馬岱相助雖然軍少何計退之儀曰丞相臨終遺一錦囊囑曰若魏延造反臨陣對敵之時方可開拆便有斬魏延之計今當取出一看遂出錦囊拆封看時題曰待與魏延對敵馬上方許拆開維大喜曰既丞相有戒約長史可收執吾先引兵出城列爲陣勢公可便來薑維披挂上馬綽槍在手引三千軍開了城門一齊沖出鼓聲大震排成陣勢維挺槍立馬於門旗之下高聲大罵曰反賊魏延丞相不曾虧你今日如何背反延橫刀勒馬而言曰伯約不幹你事只教楊儀來儀在門旗影裏拆開錦囊視之如此如此儀大喜輕騎而出立馬陣前手指魏延而笑曰丞相在日知汝久後必反教我提備今果應其言汝敢在馬上連叫三聲誰敢殺我便是真大丈夫吾就獻漢中城池與汝延大笑曰楊儀匹夫聽著若孔明在日吾尚懼他三分他今已亡天下誰敢敵我休道連叫三聲便叫三萬聲亦有何難遂提刀按轡於馬上大叫曰誰敢殺我一聲未畢腦後一人厲聲而應曰吾敢殺汝手起刀落斬魏延于馬下衆皆駭然斬魏延者乃馬岱也原來孔明臨終之時授馬岱以密計只待魏延喊叫時便出其不意斬之當日楊儀讀罷錦囊計策已知伏下馬岱在彼故依計而行果然殺了魏延後人有詩曰諸葛先機識魏延已知日後反西川錦囊遺計人難料卻見成功在馬前卻說董允未及到南鄭馬岱已斬了魏延與薑維合兵一處楊儀具表星夜奏聞後主後主降旨曰既已名正其罪仍念前功賜棺槨葬之楊儀等扶孔明靈柩到成都後主引文武官僚盡皆挂孝出城二十裏迎接後主放聲大哭上至公卿大夫下及山林百姓男女老幼無不痛哭哀聲震地後主命扶柩入城停于丞相府中其子諸葛瞻守孝居喪後主還朝楊儀自縛請罪後主令近臣去其縛曰若非卿能依丞相遺教靈柩何日得歸魏延如何得滅大事保全皆卿之力也遂加楊儀爲中軍師馬岱有討逆之功即以魏延之爵爵之儀呈上孔明遺表後主覽畢大哭降旨卜地安葬費禕奏曰丞相臨終命葬於定軍山不用牆垣磚石亦不用一切祭物後主從之擇本年十月吉日後主自送靈柩至定軍山安葬後主降詔致祭諡號忠武侯令建廟于沔陽四時享祭後杜工部有詩曰丞相祠堂何處尋錦官城外柏森森映階碧草自春色隔葉黃鸝空好音三顧頻煩天下計兩朝開濟老臣心出師未捷身先死長使英雄淚滿襟又杜工部詩曰諸葛大名垂宇宙宗臣遺像肅清高三分割據紆籌策萬古雲霄一羽毛伯仲之間見伊呂指揮若定失蕭曹運移漢祚終難複志決身殲軍務勞卻說後主回到成都忽近臣奏曰邊庭報來東吳令全琮引兵數萬屯于巴丘界口未知何意後主驚曰丞相新亡東吳負盟侵界如之奈何蔣琬奏曰臣敢保王平張嶷引兵數萬屯于長安以防不測陛下再命一人去東吳報喪以探其動靜後主曰須得一舌辯之士爲使一人應聲而出曰微臣願往衆視之乃南陽安衆人姓宗名預字德豔官任參軍右中郎將後主大喜即命宗預往東吳報喪兼探虛實宗預領命徑到金陵入見吳主孫權禮畢只見左右人皆著素衣權作色而言曰吳蜀已爲一家卿主何故而增白帝之守也預曰臣以爲東益巴丘之戍西增白帝之守皆事勢宜然俱不足以相問也權笑曰卿不亞于鄧芝乃謂宗預曰朕聞諸葛丞相歸天每日流涕令官僚盡皆挂孝朕恐魏人乘喪取蜀故增巴丘守兵萬人以爲救援別無他意也預頓首拜謝權曰朕既許以同盟安有背義之理預曰天子因丞相新亡特命臣來報喪權遂取金鈚箭一枝折之設誓曰朕若負前盟子孫絕滅又命使齎香帛奠儀入川致祭宗預拜辭吳主同吳使還成都入見後主奏曰吳主因丞相新亡亦自流涕令群臣皆挂孝其益兵巴丘者恐魏人乘虛而入別無異心今折箭爲誓並不背盟後主大喜重賞宗預厚待吳使去訖遂依孔明遺言加蔣琬爲丞相大將軍錄尚書事加費禕爲尚書令同理丞相事加吳懿爲車騎將軍假節督漢中姜維爲輔漢將軍平襄侯總督諸處人馬同吳懿出屯漢中以防魏兵其餘將校各依舊職楊儀自以爲年宦先于蔣琬而位出琬下且自恃功高未有重賞口出怨言謂費禕曰昔日丞相初亡吾若將全師投魏寧當寂寞如此耶費禕乃將此言具表密奏後主後主大怒命將楊儀下獄勘問欲斬之蔣琬奏曰儀雖有罪但日前隨丞相多立功營未可斬也當廢爲庶人後主從之遂貶楊儀赴漢嘉郡爲民儀羞慚自刎而死蜀漢建興十三年魏主曹睿青龍三年吳主孫權嘉禾四年三國各不興兵單說魏主封司馬懿爲太尉總督軍馬安鎮諸邊懿拜謝回洛陽去訖魏主在許昌大興土木建蓋宮殿又於洛陽造朝陽殿太極殿築總章觀俱高十丈又立崇華殿青霄閣鳳凰樓九龍池命博士馬鈞監造極其華麗雕梁畫棟碧瓦金磚光輝耀日選天下巧匠三萬餘人民夫三十余萬不分晝夜而造民力疲困怨聲不絕睿又降旨起土木于芳林園使公卿皆負土樹木於其中司徒董尋上表切諫曰伏自建安以來野戰死亡或閘殫戶盡雖有存者遺孤老弱若今宮室狹小欲廣大之猶宜隨時不妨農務況作無益之物乎陛下既尊群臣顯以冠冕被以文繡載以華輿所以異於小人也今又使負木擔土沾體塗足毀國之光以崇無益甚無謂也孔子雲君使臣以禮臣事君以忠無忠無禮國何以立臣知言出必死而自比于牛之一毛生既無益死亦何損秉筆流涕心與世辭臣有八子臣死之後累陛下矣不勝戰慄待命之至睿覽表怒曰董尋不怕死耶左右奏請斬之睿曰此人素有忠義今且廢爲庶人再有妄言者必斬時有太子舍人張茂字彥材亦上表切諫睿命斬之即日召馬鈞問曰朕建高臺峻閣欲與神仙往來以求長生不老之方鈞奏曰漢朝二十四帝惟武帝享國最久壽算極高蓋因服天上日精月華之氣也嘗于長安宮中建柏梁台臺上立一銅人手捧一盤名曰承露盤接三更北斗所降沆瀣之水其名曰天漿又曰甘露取此水用美玉爲屑調和服之可以反老還童睿大喜曰汝今可引人夫星夜至長安拆取銅人移置芳林園中鈞領命引一萬人至長安令周圍搭起木架上柏梁台去不移時間五千人連繩引索旋環而上那柏梁台高二十丈銅柱圓十圍馬鈞教先拆銅人多人並力拆下銅人來只見銅人眼中潸然淚下衆皆大驚忽然台邊一陣狂風起處飛砂走石急若驟雨一聲響亮就如天崩地裂台傾柱倒壓死千餘人鈞取銅人及金盤回洛陽入見魏主獻上銅人承露盤魏主問曰銅柱安在鈞奏曰柱重百萬斤不能運至睿令將銅柱打碎運來洛陽鑄成兩個銅人號爲翁仲列于司馬門外又鑄銅龍鳳兩個龍高四丈鳳高三丈餘立在殿前又于上林苑中種奇花異木蓄養珍禽怪獸少傅楊阜上表諫曰臣聞堯尚茅茨而萬國安居禹卑宮室而天下樂業乃至殷周或堂崇三尺度以九筵耳古之聖帝明王未有極宮室之高麗以凋敝百姓之財力者也桀作璿室象廊紂爲傾宮鹿台以喪其社稷楚靈以築章華而身受其禍秦始皇作阿房而殃及其子天下叛之二世而滅夫不度萬民之力以從耳目之欲未有不亡者也陛下當以堯舜禹湯文武爲法則以桀紂楚秦爲深誡而乃自暇自逸惟宮台是飾必有危亡之禍矣君作元首臣爲股肱存亡一體得失同之臣雖弩怯敢忘諍臣之義言不切至不足以感寤陛下謹叩棺沐浴伏俟重誅表上睿不省只催督馬鈞建造高臺安置銅人承露盤又降旨廣選天下美女入芳林園中衆官紛紛上表諫諍睿俱不聽卻說曹睿之後毛氏乃河內人也先年睿爲平原王時最相恩愛及即帝位立爲後後睿因寵郭夫人毛後失寵郭夫人美而慧睿甚嬖之每日取樂月余不出宮闥是歲春三月芳林園中百花爭放睿同郭夫人到園中賞玩飲酒郭夫人曰何不請皇后同樂睿曰若彼在朕涓滴不能下咽也遂傳諭宮娥不許令毛後知道毛後見睿月餘不入正宮是日引十余宮人來翠花樓上消遣只聽的樂聲嘹亮乃問曰何處奏樂一宮官啓曰乃聖上與郭夫人于禦花園中賞花飲酒毛後聞之心中煩惱回宮安歇次日毛皇后乘小車出宮遊玩正迎見睿于曲廊之間乃笑曰陛下昨遊北園其樂不淺也睿大怒即命擒昨日侍奉諸人到叱曰昨遊北園朕禁左右不許使毛後知道何得又宣露喝令宮官將諸侍奉人盡斬之毛後大驚回車至宮睿即降詔賜毛皇后死立郭夫人爲皇后朝臣莫敢諫者忽一日幽州刺史母丘儉上表報稱遼東公孫淵造反自號爲燕王改元紹漢元年建宮殿立官職興兵入寇搖動北方睿大驚即聚文武官僚商議起兵退淵之策正是才將土木勞中國又見干戈起外方未知何以禦之且看下文分解
