body:
  text: 第一百七回魏主政歸司馬氏薑維兵敗牛頭山卻說司馬懿聞曹爽同弟曹羲曹訓曹彥並心腹何晏鄧丁謐畢軌李勝等及禦林軍隨魏主曹芳出城謁明帝墓就去畋獵懿大喜即到省中令司徒高柔假以節鉞行大將軍事先據曹爽營又令太仆王觀行中領軍事據曹羲營懿引舊官入後宮奏郭太后言爽背先帝托孤之恩奸邪亂國其罪當廢郭太后大驚曰天子在外如之奈何懿曰臣有奏天子之表誅奸臣之計太后勿憂太后懼怕只得從之懿急令太尉蔣濟尚書令司馬孚一同寫表遣黃門齎出城外徑至帝前申奏懿自引大軍據武庫早有人報知曹爽家其妻劉氏急出廳前喚守府官問曰今主公在外仲達起兵何意守門將潘舉曰夫人勿驚我去問來乃引弓弩手數十人登門樓望之正見司馬懿引兵過府前舉令人亂箭射下懿不得過偏將孫謙在後止之曰太傅爲國家大事休得放箭連止三次舉方不射司馬昭護父司馬懿而過引兵出城屯於洛河守住浮橋且說曹爽手下司馬魯芝見城中事變來與參軍辛敞商議曰今仲達如此變亂將如之何敞曰可引本部兵出城去見天子芝然其言敞急入後堂其姊辛憲英見之問曰汝有何事慌速如此敞告曰天子在外太傅閉了城門必將謀逆憲英曰司馬公未必謀逆特欲殺曹將軍耳敞驚曰此事未知如何憲英曰曹將軍非司馬公之對手必然敗矣敞曰今魯司馬教我同去未知可去否憲英曰職守人之大義也凡人在難猶或恤之執鞭而棄其事不祥莫大焉敞從其言乃與魯芝引數十騎斬關奪門而出人報知司馬懿懿恐桓範亦走急令人召之范與其子商議其子曰車駕在外不如南出範從其言乃上馬至平昌門城門已閉把門將乃桓范舊吏司蕃也範袖中取出一竹版曰太后有詔可即開門司蕃曰請詔驗之範叱曰汝是吾故吏何敢如此蕃只得開門放出範出的城外喚司蕃曰太傅造反汝可速隨我去蕃大驚追之不及人報知司馬懿懿大驚曰智囊泄矣如之奈何蔣濟曰駑馬戀棧豆必不能用也懿乃召許允陳泰曰汝去見曹爽說太傅別無他事只是削汝兄弟兵權而已許陳二人去了又召殿中校尉尹大目至令蔣濟作書與目持去見爽懿分付曰汝與爽厚可領此任汝見爽說吾與蔣濟指洛水爲誓只因兵權之事別無他意尹大目依令而去卻說曹爽正飛鷹走犬之際忽報城內有變太傅有表爽大驚幾乎落馬黃門官捧表跪于天子之前爽接表拆封令近臣讀之表略曰征西大都督太傅臣司馬懿誠惶誠恐頓首謹表臣昔從遼東還先帝詔陛下與秦王及臣等升禦床把臣臂深以後事爲念今大將軍曹爽背棄顧命敗亂國典內則僭擬外專威權以黃門張當爲都監專共交關看察至尊候伺神器離間二宮傷害骨肉天下洶洶人懷危懼此非先帝詔陛下及囑臣之本意也臣雖朽邁敢忘往言太尉臣濟尚書令臣孚等皆以爽爲有無君之心兄弟不宜典兵宿衛奏永寧宮皇太后令敕臣如奏施行臣輒敕主者及黃門令罷爽羲訓吏兵以侯就第不得逗留以稽車駕敢有稽留便以軍法從事臣輒力疾將兵屯于洛水浮橋伺察非常謹此上聞伏幹聖聽魏主曹芳聽畢乃喚曹爽曰太傅之言若此卿如何裁處爽手足失措回顧二弟曰爲之奈何羲曰劣弟亦曾諫兄兄執迷不聽致有今日司馬懿譎詐無比孔明尚不能勝況我兄弟乎不如自縛見之以免一死言未畢參軍辛敞司馬魯芝到爽問之二人告曰城中把得鐵桶相似太傅引兵屯于洛水浮橋勢將不可複歸宜早定大計正言間司農桓范驟馬而至謂爽曰太傅已變將軍何不請天子幸許都調外兵以討司馬懿耶爽曰吾等全家皆在城中豈可投他處求援範曰匹夫臨難尚欲望活今主公身隨天子號令天下誰敢不應豈可自投死地乎爽聞言不決惟流涕而已範又曰此去許都不過中宿城中糧草足支數載今主公別營兵馬近在闕南呼之即至大司馬之印某將在此主公可急行遲則休矣爽曰多官勿太催逼待吾細細思之少頃侍中許允尚書陳泰至二人告曰太傅只爲將軍權重不過要削去兵權別無他意將軍可早歸城中爽默然不語又只見殿中校尉尹大目到目曰太傅指洛水爲誓並無他意有蔣太尉書在此將軍可削去兵權早歸相府爽信爲良言桓範又告曰事急矣休聽外言而就死地是夜曹爽意不能決乃拔劍在手嗟歎尋思自黃昏直流淚到曉終是狐疑不定桓範入帳催之曰主公思慮一晝夜何尚不能決爽擲劍而歎曰我不起兵情願棄官但爲富家翁足矣範大哭出帳曰曹子丹以智謀自矜今兄弟三人真豚犢耳痛哭不已許允陳泰令爽先納印綬與司馬懿爽令將印送去主簿楊綜扯住印綬而哭曰主公今日舍兵權自縛去降不免東市受戮也爽曰太傅必不失信於我於是曹爽將印綬與許陳二人先齎與司馬懿衆軍見無將印盡皆四散爽手下只有數騎官僚到浮橋時懿傳令教曹爽兄弟三人且回私宅餘皆發監聽候敕旨爽等入城時並無一人侍從桓範至浮橋邊懿在馬上以鞭指之曰桓大夫何故如此範低頭不語入城而去於是司馬懿請駕拔營入洛陽曹爽兄弟三人回家之後懿用大鎖鎖門令居民八百人圍守其宅曹爽心中憂悶羲謂爽曰今家中乏糧兄可作書與太傅借糧如肯以糧借我必無相害之心爽乃作書令人持去司馬懿覽畢遂遣人送糧一百斛運至曹爽府內爽大喜曰司馬公本無害我之心也遂不以爲憂原來司馬懿先將黃門張當捉下獄中問罪當曰非我一人更有何晏鄧颺李勝畢軌丁謐等五人同謀篡逆懿取了張當供詞卻捉何晏等勘問明白皆稱三月間欲反懿用長枷釘了城門守將司蕃告稱桓範矯詔出城口稱太傅謀反懿曰誣人反情抵罪反坐亦將桓範等皆下獄然後押曹爽兄弟三人並一干人犯皆斬于市曹滅其三族其家產財物盡抄入庫時有曹爽從弟文叔之妻乃夏侯令女也早寡而無子其父欲改嫁之女截耳自誓及爽被誅其父複將嫁之女又斷去其鼻其家驚惶謂之曰人生世間如輕塵棲弱草何至自苦如此且夫家又被司馬氏誅戮已盡守此欲誰爲哉女泣曰吾聞仁者不以盛衰改節義者不以存亡易心曹氏盛時尚欲保終況今滅亡何忍棄之此禽獸之行吾豈爲乎懿聞而賢之聽使乞子以養爲曹氏後後人有詩曰弱草微塵盡達觀夏侯有女義如山丈夫不及裙釵節自顧鬚眉亦汗顔卻說司馬懿斬了曹爽太尉蔣濟曰尚有魯芝辛敞斬關奪門而出楊綜奪印不與皆不可縱懿曰彼各爲其主乃義人也遂複各人舊職辛敞歎曰吾若不問于姊失大義矣後人有詩贊辛憲英曰臣食祿當思報事主臨危合盡忠辛氏憲英曾勸弟故令千載頌高風司馬懿饒了辛敞等仍出榜曉諭但有曹爽門下一應人等盡皆免死有官者照舊複職軍民各守家業內外安堵何鄧二人死於非命果應管輅之言後人有詩贊管輅曰傳得聖賢真妙訣平原管輅相通神鬼幽鬼躁分何鄧未喪先知是死人卻說魏主曹芳封司馬懿爲丞相加九錫懿固辭不肯受芳不准令父子三人同領國事懿忽然想起曹爽全家雖誅尚有夏侯玄守備雍州等處系爽親族倘驟然作亂如何提備必當處置即下詔遣使往雍州取征西將軍夏侯玄赴洛陽議事玄叔夏侯霸聽知大驚便引本部三千兵造反有鎮守雍州刺史郭淮聽知夏侯霸反即率本部兵來與夏侯霸交戰淮出馬大罵曰汝既是大魏皇族天子又不曾虧汝何故背反霸亦罵曰吾祖父于國家多建勤勞今司馬懿何等匹夫滅吾兄曹爽宗族又來取我早晚必思篡位吾仗義討賊何反之有淮大怒挺槍驟馬直取夏侯霸霸揮刀縱馬來迎戰不十合淮敗走霸隨後趕來忽聽的後軍呐喊霸急回馬時陳泰引兵殺來郭淮複回兩路夾攻霸大敗而走折兵大半尋思無計遂投漢中來降後主有人報與薑維維心不信令人體訪得實方教入城霸拜見畢哭告前事維曰昔微子去周成萬古之名公能匡扶漢室無愧古人也遂設宴相待維就席問曰今司馬懿父子掌握重權有窺我國之志否霸曰老賊方圖謀逆未暇及外但魏國新有二人正在妙齡之際若使領兵馬實吳蜀之大患也維問二人是誰霸告曰一人現爲秘書郎乃潁川長社人姓鍾名會字士季太傅仲繇之子幼有膽智繇嘗率二子見文帝會時年七歲其兄毓年八歲毓見帝惶懼汗流滿面帝問毓曰卿何以汗毓對曰戰戰惶惶汗出如漿帝問會曰卿何以不汗會對曰戰戰慄栗汗不敢出帝獨奇之及稍長喜讀兵書深明韜略司馬懿與蔣濟皆奇其才一人現爲掾吏乃義陽人也姓鄧名艾字士載幼年失父素有大志但見高山大澤輒窺度指畫何處可以屯兵何處可以積糧何處可以埋伏人皆笑之獨司馬懿奇其才遂令參贊軍機艾爲人口吃每奏事必稱艾艾懿戲謂曰卿稱艾艾當有幾艾艾應聲曰鳳兮鳳兮故是一鳳其資性敏捷大抵如此此二人深可畏也維笑曰量此孺子何足道哉於是姜維引夏侯霸至成都入見後主維奏曰司馬懿謀殺曹爽又來賺夏侯霸霸因此投降目今司馬懿父子專權曹芳懦弱魏國將危臣在漢中有年兵精糧足臣願領王師即以霸爲向導官克服中原重興漢室以報陛下之恩以終丞相之志尚書令費禕諫曰近者蔣琬董允皆相繼而亡內治無人伯約只宜待時不宜輕動維曰不然人生如白駒過隙似此遷延歲月何日恢復中原乎禕又曰孫子雲知彼知己百戰百勝我等皆不如丞相遠甚丞相尚不能恢復中原何況我等維曰吾久居隴上深知羌人之心今若結羌人爲援雖未能克復中原自隴而西可斷而有也後主曰卿既欲伐魏可盡忠竭力勿墮銳氣以負朕命於是薑維領敕辭朝同夏侯霸徑到漢中計議起兵維曰可先遣使去羌人處通盟然後出西平近雍州先築二城於麴山之下令兵守之以爲掎角之勢我等盡發糧草於川口依丞相舊制次第進兵是年秋八月先差蜀將句安李歆同引一萬五千兵往麴山前連築二城句安守東城李歆守西城早有細作報與雍州刺史郭淮淮一面申報洛陽一面遣副將陳泰引兵五萬來與蜀兵交戰句安李歆各引一軍出迎因兵少不能抵敵退入城中泰令兵四面圍住攻打又以兵斷其漢中糧道句安李歆城中糧缺郭淮自引兵亦到看了地勢忻然而喜回到寨中乃與陳泰計議曰此城山勢高阜必然水少須出城取水若斷其上流蜀兵皆渴死矣遂令軍士掘土堰斷上流城中果然無水李歆引兵出城取水雍州兵圍困甚急歆死戰不能出只得退入城去句安城中亦無水乃會了李歆引兵出城並在一處大戰良久又敗入城去軍士枯渴安與歆曰姜都督之兵至今未到不知何故歆曰我當捨命殺出求救遂引數十騎開了城門殺將出來雍州兵四面圍合歆奮死衝突方才得脫只落得獨自一人身帶重傷余皆沒於亂軍之中是夜北風大起陰雲布合天降大雪因此城內蜀兵分糧化雪而食卻說李歆撞出重圍從西山小路行了兩日正迎著薑維人馬歆下馬伏地告曰麴山二城皆被魏兵圍困絕了水道幸得天降大雪因此化雪度日甚是危急維曰吾非來遲爲聚羌兵未到因此誤了遂令人送李歆入川養病維問夏侯霸曰羌兵未到魏兵圍困麴山甚急將軍有何高見霸曰若等羌兵到麴山二城皆陷矣吾料雍州兵必盡來麴山攻打雍州城定然空虛將軍可引兵徑往牛頭山抄在雍州之後郭淮陳泰必回救雍州則麴山之圍自解矣維大喜曰此計最善於是薑維引兵望牛頭山而去卻說陳泰見李歆殺出城去了乃謂郭淮曰李歆若告急于姜維薑維料吾大兵皆在麴山必抄牛頭山襲吾之後將軍可引一軍去取洮水斷絕蜀兵糧道吾分兵一半徑往牛頭山擊之彼若知糧道已絕必然自走矣郭淮從之遂引一軍暗取洮水陳泰引一軍徑往牛頭山來卻說姜維兵至牛頭山忽聽的前軍發喊報說魏兵截住去路維慌忙自到軍前視之陳泰大喝曰汝欲襲吾雍州吾已等候多時了維大怒挺槍縱馬直取陳泰泰揮刀而迎戰不三合泰敗走維揮兵掩殺雍州兵退回占住山頭維收兵就牛頭山下寨維每日令兵搦戰不分勝負夏侯霸謂薑維曰此處不是久停之所連日交戰不分勝負乃誘兵之計耳必有異謀不如暫退再作良圖正言間忽報郭淮引一軍取洮水斷了糧道維大驚急令夏侯霸先退維自斷後陳泰分兵五路趕來維獨拒五路總口戰住魏兵泰勒兵上山矢石如雨維急退到洮水之時郭淮引兵殺來維引兵往來衝突魏兵阻其去路密如鐵桶維奮死殺出折兵大半飛奔上陽平關來前面又一軍殺到爲首一員大將縱馬橫刀而出那人生得圓面大耳方口厚唇左目下生個黑瘤瘤上生數十根黑毛乃司馬懿長子驃騎將軍司馬師也維大怒曰孺子焉敢阻吾歸路拍馬挺槍直來刺師師揮刀相迎只三合殺敗了司馬師維脫身徑奔陽平關來城上人開門放入薑維司馬師也來搶關兩邊伏弩齊發一弩發十矢乃武侯臨終時所遺連弩之法也正是難支此日三軍敗獨賴當年十矢傳未知司馬師性命如何且看下文分解
