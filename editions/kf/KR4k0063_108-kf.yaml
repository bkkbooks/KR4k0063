body:
  text: 第一百八回丁奉雪中奮短兵孫峻席間施密計卻說薑維正走遇著司馬師引兵攔截原來薑維取雍州之時郭淮飛報入朝魏主與司馬懿商議停當懿遣長子司馬師引兵五萬前來雍州助戰師聽知郭淮敵退蜀兵師料蜀兵勢弱就來半路擊之直趕到陽平關卻被姜維用武侯連傳連弩法于兩邊暗伏連弩百余張一弩發十矢皆是藥箭兩邊弩箭齊發前軍連人帶馬射死不知其數司馬師於亂軍之中逃命而回卻說麴山城中蜀將句安見援兵不至乃開門降魏薑維折兵數萬領敗兵回漢中屯紮司馬師自還洛陽至嘉平三年秋八月司馬懿染病漸漸沈重乃喚二子至榻前囑曰吾事魏歷年官授太傅人臣之位極矣人皆疑吾有異志吾嘗懷恐懼吾死之後汝二人善理國政慎之慎之言訖而亡長子司馬師次子司馬昭二人申奏魏主曹芳芳厚加祭葬優錫贈諡封師爲大將軍總領尚書機密大事昭爲驃騎上將軍卻說吳主孫權先有太子孫登乃徐夫人所生于吳赤烏四年身亡遂立次子孫和爲太子乃琅琊王夫人所生和因與全公主不睦被公主所譖權廢之和憂恨而死又立三子孫亮爲太子乃潘夫人所生此時陸遜諸葛瑾皆亡一應大小事務皆歸於諸葛恪太元元年秋八月初一日忽起大風江海湧濤平地水深八尺吳主先陵所種松柏盡皆拔起直飛到建業城南門外倒卓於道上權因此受驚成病至次年四月內病勢沈重乃召太傅諸葛恪大司馬呂岱至榻前囑以後事囑訖而甍在位二十四年壽七十一歲乃蜀漢延熙十五年也後人有詩曰紫髯碧眼號英雄能使臣僚肯盡忠二十四年興大業龍盤虎踞在江東孫權既亡諸葛恪立孫亮爲帝大赦天下改元建興元年諡權曰大皇帝葬于蔣陵早有細作探知其事報入洛陽司馬師聞孫權已死遂議起兵伐吳尚書傅嘏曰吳有長江之險先帝屢次征伐皆不遂意不如各守邊疆乃爲上策師曰天道三十年一變豈得常爲鼎峙乎吾欲伐吳昭曰今孫權新亡孫亮幼懦其隙正可乘也遂令征南大將軍王昶引兵十萬攻南郡征東將軍胡遵引兵十萬攻東興鎮南都督毋丘儉引兵十萬攻武昌三路進發又遣弟司馬昭爲大都督總領三路軍馬是年冬十二月司馬昭兵至東吳邊界屯住人馬喚王昶胡遵毋丘儉到帳中計議曰東吳最緊要處惟東興郡也今他築起大堤左右又築兩城以防巢湖後面攻擊諸公須要仔細遂令王昶毋丘儉各引一萬兵列在左右且勿進發待取了東興郡那時一齊進兵昶儉二人受令而去昭又令胡遵爲先鋒總領三路兵前去先搭浮橋取東興大堤若奪得左右二城便是大功遵領兵來搭浮橋卻說吳太傅諸葛恪聽知魏兵三路而來聚衆商議平北將軍丁奉曰東興乃東吳緊要處所若有失則南郡武昌危矣恪曰此論正合吾意公可就引三千水兵從江中去吾隨後令呂據唐咨留贊各引一萬馬步兵分三路來接應但聽連珠炮響一齊進兵吾自引大兵後至丁奉得令即引三千水兵分作三十隻船望東興而來卻說胡遵渡過浮橋屯軍於堤上差桓嘉韓綜攻打二城左城中乃吳將全端守把右城中乃吳將留略守把此二城高峻堅固急切攻打不下全留二人見魏兵勢大不敢出戰死守城池胡遵在徐塘下寨時值嚴寒天降大雪胡遵與衆將設席高會忽報水上有三十隻戰船來到遵出寨視之見船將次傍岸每船上約有百人遂還帳中謂諸將曰不過三千人耳何足懼哉只令部將哨探仍前飲酒丁奉將船一字兒抛在水上乃謂部將曰大丈夫立功名取富貴正在今日遂令衆軍脫去衣甲卸了頭盔不用長槍大戟止帶短刀魏兵見之大笑更不準備忽然連珠炮響了三聲丁奉扯刀當先一躍上岸衆軍皆拔短刀隨奉上岸砍入魏寨魏兵措手不及韓綜急拔帳前大戟迎之早被丁奉搶入懷內手起刀落砍翻在地桓嘉從左邊轉出忙綽槍刺丁奉被奉挾住槍桿嘉棄槍而走奉一刀飛去正中左肩嘉望後便倒奉趕上就以槍刺之三千吳兵在魏寨中左沖右突胡遵急上馬奪路而走魏兵齊奔上浮橋浮橋已斷大半落水而死殺倒在雪地者不知其數車仗馬匹軍器皆被吳兵所獲司馬昭王昶毋丘儉聽知東興兵敗亦勒兵而退卻說諸葛恪引兵至東興收兵賞勞了畢乃聚諸將曰司馬昭兵敗北歸正好乘勢進取中原遂一面遣人齎書入蜀求薑維進兵攻其北許以平分天下一面起大兵二十萬來伐中原臨行時忽見一道白氣從地而起遮斷三軍對面不見蔣延曰此氣乃白虹也主喪兵之兆太傅只可回朝不可伐魏恪大怒曰汝安敢出不利之言以慢吾軍心叱武士斬之衆皆告免恪乃貶蔣延爲庶人仍催兵前進丁奉曰魏以新城爲總隘口若先取得此城司馬師破膽矣恪大喜即趲兵直至新城守城牙門將軍張特見吳兵大至閉門堅守恪令兵四面圍定早有流星馬報入洛陽主簿虞松告司馬師曰今諸葛恪困新城且未可與戰吳兵遠來人多糧少糧儘自走矣待其將走然後擊之必得全勝但恐蜀兵犯境不可不防師然其言遂令司馬昭引一軍助郭淮防薑維毋丘儉胡遵拒住吳兵卻說諸葛恪連月攻打新城不下下令衆將並力攻城怠慢者立斬於是諸將奮力攻打城東北角將陷張特在城中定下一計乃令一舌辯之士齎捧冊籍赴吳寨見諸葛恪告曰魏國之法若敵人困城守城將堅守一百日而無救兵至然後出城降敵者家族不坐罪今將軍圍城已九十餘日望乞再容數日某主將盡率軍民出城投降今先具冊籍呈上恪深信之收了軍馬遂不攻城原來張特用緩兵之計哄退吳兵遂拆城中房屋於破城處修補完備乃登城大罵曰吾城中尚有半年之糧豈肯降吳狗耶盡戰無妨恪大怒催兵打城城上亂箭射下恪額上正中一箭翻身落馬諸將救起還寨金瘡舉發衆軍皆無戰心又因天氣亢炎軍士多病恪金稍可欲催兵攻城營吏告曰人人皆病安能戰乎恪大怒曰再說病者斬之衆軍聞知逃者無數忽報都督蔡林引本部軍投魏去了恪大驚自乘馬遍視各營果見軍士面色黃腫各帶病容遂勒兵還吳早有細作報知毋丘儉儉盡起大兵隨後掩殺吳兵大敗而歸恪甚羞慚托病不朝吳主孫亮自幸其宅問安文武官僚皆來拜見恪恐人議論先搜求衆官將過失輕則發遣邊方重則斬首示衆於是內外官僚無不悚懼又令心腹將張約朱恩管禦林軍以爲牙爪卻說孫峻字子遠乃孫堅弟孫靜曾孫孫恭之子也孫權存日甚愛之命掌禦林軍馬今聞諸葛恪令張約朱恩二人掌禦林軍奪其權心中大怒太常卿滕胤素與諸葛恪有隙乃乘間說峻曰諸葛恪專權恣虐殺害公卿將有不臣之心公系宗室何不早圖之峻曰我有是心久矣今當即奏天子請旨誅之於是孫峻滕胤入見吳主孫亮密奏其事亮曰朕見此人亦甚恐怖常欲除之未得其便今卿等果有忠義可密圖之胤曰陛下可設席召恪暗伏武士于壁衣中擲杯爲號就席間殺之以絕後患亮從之卻說諸葛恪自兵敗回朝託病居家心神恍惚一日偶出中堂忽見一人穿麻挂孝而入恪叱問之其人大驚無措恪令拿下拷問其人告曰某因新喪父親入城請僧追薦初見是寺院而入卻不想是太傅之府卻怎麽來到此處也恪大怒召守門軍士問之軍士告曰某等數十人皆荷戈把門未嘗暫離並不見一人入來恪大怒盡數斬之是夜恪睡臥不安忽聽得正堂中聲響如霹靂恪自出視之見中梁折爲兩段恪驚歸寢室忽然一陣陰風起處見所殺披麻人與守門軍士數十人各提頭索命恪驚倒在地良久方蘇次早洗面聞水甚血臭恪叱侍婢連換數十盆皆臭無異驚正驚疑間忽報天子有使至宣太傅赴宴恪令安排車仗方欲出府有黃犬銜住衣服嚶嚶作聲如哭之狀恪怒曰犬戲我也叱左右逐去之遂乘車出府行不數步見車前一道白虹自地而起如白練沖天而去恪甚驚怪心腹張約進車前密告曰今日宮中設宴未知好歹主公不可輕入恪聽罷便令回車行不到十余步孫峻滕胤乘馬至車前曰太傅何故便回恪曰吾忽然腹痛不可見天子胤曰朝廷爲太傅軍回不曾面敘故特設宴相召兼議大事太傅雖感貴恙還當勉強一行恪從其言遂同孫峻滕胤入宮張約亦隨入恪見吳主孫亮施禮畢就席而坐亮命進酒恪心疑辭曰病軀不勝杯酌孫峻曰太傅府中常服藥酒可取飲乎恪曰可也遂令從人回府取自製藥酒倒恪方才放心飲之酒至數巡吳主孫亮托事先起孫峻下殿脫了長服著短衣內披環甲手提利刃上殿大呼曰天子有詔誅逆賊諸葛恪大驚擲杯於地欲拔劍迎之頭已落地張約見峻斬恪揮刀來迎峻急閃過刀尖傷其左指峻轉身一刀砍中張約右臂武士一齊擁出砍倒張約剁爲肉泥孫峻一面令武士收恪家眷一面令人將張約並諸葛恪屍首用蘆席包裹以小車載出棄于城南門外石崗亂塚坑內卻說諸葛恪之妻正在房中心神恍惚動止不寧忽一婢女入房恪妻問曰汝遍身如何血臭其婢忽然反目切齒飛身跳躍頭撞屋梁口中大叫吾乃諸葛恪也被奸賊孫峻謀殺恪合家老幼驚惶號哭不一時軍馬至圍住府第將恪全家老幼俱縛至市曹斬首時吳建興二年冬十月也昔諸葛瑾存日見恪聰明盡顯於外歎曰此子非保家之主也又魏光祿大夫張緝曾對司馬師曰諸葛恪不久死矣師問其故緝曰威震其主何能久乎至此果中其言卻說孫峻殺了諸葛恪吳主孫亮封峻爲丞相大將軍富春侯總督中外諸軍事自此權柄盡歸孫峻矣且說姜維在成都接得諸葛恪書欲求相助伐魏遂入朝奏准後主複起大兵北伐中原正是一度興師未奏績兩番討賊欲成功未知勝負如何且看下文分解
