body:
  text: 第一百十回文鴦單騎退雄兵姜維背水破大敵卻說魏正元二年正月揚州都督鎮東將軍領淮南軍馬毋丘儉字仲恭河東聞喜人也聞司馬師擅行廢立之事心中大怒長子毋丘甸曰父親官居方面司馬師專權廢主國家有累卵之危安可宴然自守儉曰吾兒之言是也遂請刺史文欽商議欽乃曹爽門下客當日聞儉相請即來參謁儉邀入後堂禮畢說話間儉流淚不止欽問其故儉曰司馬師專權廢主天地反覆安得不傷心乎欽曰都督鎮守方面若肯仗義討賊欽願舍死相助欽中子文淑小字阿鴦有萬夫不當之勇常欲殺司馬師兄弟與曹爽報仇今可令爲先鋒儉大喜即時酹酒爲誓二人詐稱太后有密詔令淮南大小官兵將士皆入壽春城立一壇於西宰白馬歃血爲盟宣言司馬師大逆不道今奉太后密詔令盡起淮南軍馬仗義討賊衆皆悅服儉提六萬兵屯于項城文欽領兵二萬在外爲遊兵往來接應儉移檄諸郡令各起兵相助卻說司馬師左眼肉瘤不時痛癢乃命醫官割之以藥封閉連日在府養病忽聞淮南告急乃請太尉王肅商議肅曰昔關雲長威震華夏孫權令呂蒙襲取荊州撫恤將士家屬因此關公軍勢瓦解今淮南將士家屬皆在中原可急撫恤更以兵斷其歸路必有土崩之勢矣師曰公言極善但吾新割目瘤不能自往若使他人心又不穩時中書侍郎鍾會在側進言曰淮楚兵強其鋒甚銳若遣人領兵去退多是不利倘有疏虞則大事廢矣師蹶然起曰非吾自往不可破賊遂留弟司馬昭守洛陽總攝朝政師乘軟輿帶病東行令鎮東將軍諸葛誕總督豫州諸軍從安風津取壽春又令征東將軍胡遵領青州諸軍出譙宋之地絕其歸路又遣荊州刺史監軍王基領前部兵先取鎮南之地師領大軍屯於襄陽聚文武於帳下商議光祿勳鄭袤曰毋丘儉好謀而無斷文欽有勇而無智今大軍出其不意江淮之卒銳氣正盛不可輕敵只宜深溝高壘以挫其銳此亞夫之長策也監軍王基曰不可淮南之反非軍民思亂也皆因毋丘儉勢力所逼不得已而從之若大軍一臨必然瓦解師曰此言甚妙遂進兵于紞水之上中軍屯於氵隱橋基曰南頓極好屯兵可提兵星夜取之若遲則毋丘儉必先至矣師遂令王基領前部兵來南頓城下寨卻說毋丘儉在項城聞知司馬師自來乃聚衆商議先鋒葛雍曰南頓之地依山傍水極好屯兵若魏兵先占難以驅遣可速取之儉然其言起兵投南頓來正行之間前面流星馬報說南頓已有人馬下寨儉不信自到軍前視之果然旌旗遍野營寨齊整儉回到軍中無計可施忽哨馬飛報東吳孫峻提兵渡江襲壽春來了儉大驚曰壽春若失吾歸何處是夜退兵于項城司馬師見毋丘儉軍退聚多官商議尚書傅嘏曰今儉兵退者憂吳人襲壽春也必回項城分兵拒守將軍可令一軍取樂嘉城一軍取項城一軍取壽春則淮南之卒必退矣袞州刺史鄧艾足智多謀若領兵徑取樂嘉更以重兵應之破賊不難也師從之急遣使持檄文教鄧艾起袞州之兵破樂嘉城師隨後引兵到彼會合卻說毋丘儉在項城不時差人去樂嘉城哨探只恐有兵來請文欽到營共議欽曰都督勿憂我與拙子文鴦只消五千兵敢保樂嘉城儉大喜欽父子引五千兵投樂嘉來前軍報說樂嘉城西皆是魏兵約有萬餘遙望中軍白旄黃鉞皂蓋朱幡族擁虎帳內豎一面綿繡帥字旗必是司馬師也安立營寨尚未完備時文鴦懸鞭立于父側聞知此語乃告父曰趁彼營寨未成可分兵兩路左右擊之可全勝也欽曰何時可去鴦曰今夜黃昏父引二千五百兵從城南殺來兒引二千五百兵從城北殺來三更時分要在魏寨會合欽從之當晚分兵兩路且說文鴦年方十八歲身長八尺全裝慣甲腰懸鋼鞭綽槍上馬遙望魏寨而進是夜司馬師兵到樂嘉立下營寨等鄧艾未至師爲眼下新割肉瘤瘡口疼痛臥於帳中令數百甲士環立護衛三更時分忽然寨內喊聲大震人馬大亂師急問之人報曰一軍從寨北斬圍直入爲首一將勇不可當師大驚心如火烈眼珠從肉瘤瘡口內迸出血流遍地疼痛難當又恐有亂軍心只咬被頭而忍被皆咬爛原來文鴦軍馬先到一擁而進在寨中左沖右突所到之處人不敢當有相拒者槍搠鞭打無不被殺鴦只望父到以爲外應並不見來數番殺到中軍皆被弓弩射回鴦直殺到天明只聽得北邊鼓角喧天鴦回顧從者曰父親不在南面爲應卻從北至何也鴦縱馬看時只見一軍行如猛風爲首一將乃鄧艾也躍馬橫刀大呼曰反賊休走鴦大怒挺槍迎之戰有五十合不分勝敗正鬥間魏兵大進前後夾攻鴦部下兵各自逃散只文鴦單人獨馬衝開魏兵望南而走背後數百員魏將抖擻精神驟馬追來將至樂嘉橋邊看看趕上鴦忽然勒回馬大喝一聲直沖入魏將陣中來鋼鞭起處紛紛落馬各各倒退鴦複緩緩而行魏將聚在一處驚訝曰此人尚敢退我等之衆耶可並力追之於是魏將百員複來追趕鴦勃然大怒曰鼠輩何不惜命也提鞭撥馬殺入魏將叢中用鞭打死數人複回馬緩轡而行魏將連追四五番皆被文鴦一人殺退後人有詩曰長阪當年獨拒曹子龍從此顯英豪樂嘉城內爭鋒處又見文鴦膽氣高原來文欽被山路崎嶇迷入穀中行了半夜比及尋路而出天色已曉文鴦人馬不知所向只見魏兵大勝欽不戰而退魏兵乘勢追殺欽引兵望壽春而走卻說魏殿中校尉尹大目乃曹爽心腹之人因爽被司馬懿謀殺故事司馬師常有殺師報爽之心又素與文欽交厚今見師眼瘤突出不能動止乃入帳告曰文欽本無反心今被毋丘儉逼迫以致如此某去說之必然來降師從之大目頂盔慣甲乘馬來趕文欽看看趕上乃高聲大叫曰文刺史見尹大目麽欽回頭視之大目除盔放於鞍鞽之前以鞭指曰文刺史何不忍耐數日也此是大目知師將亡故來留欽欽不解其意厲聲大罵便欲開弓射之大目大哭而回欽收聚人馬奔壽春時已被諸葛誕引兵取了欲複回項城時胡遵王基鄧艾三路兵皆到欽見勢危遂投東吳孫峻去了卻說毋丘儉在項城內聽知壽春已失文欽勢敗城外三路兵到儉遂盡撤城中之兵出城正與鄧艾相遇儉令葛雍出馬與艾交鋒不一合被艾一刀斬之引兵殺過陣來毋丘儉死戰相拒江淮兵大亂胡遵王基引兵四面夾攻毋丘儉敵不住引十余騎奪路而走前至慎縣城下縣令宋白開門接入設席待之儉大醉被宋白令人殺了將頭獻與魏兵於是淮南平定司馬師臥病不起喚諸葛涎入帳賜以印綬加爲鎮東大將軍都督揚州諸路軍馬一面班師回許昌師目痛不止每夜只見李豐張緝夏侯玄三人立於榻前師心神恍惚自料難保遂令人往洛陽取司馬昭到昭哭拜於床下師遺言曰吾今權重雖欲卸肩不可得也汝繼我爲之大事切不可輕托他人自取滅族之禍言訖以印綬付之淚流滿面昭急欲問時師大叫一聲眼睛迸出而死時正元二年二月也於是司馬昭發喪申奏魏主曹髦髦遣使持詔到許昌即命暫留司馬昭屯軍許昌以防東吳昭心中猶豫未決鍾會曰大將軍新亡人心未定將軍若留守于此萬一朝廷有變悔之何及昭從之即起兵還屯洛水之南髦聞之大驚太尉王肅奏曰昭既繼其兄掌大權陛下可封爵以安之髦遂命王肅持詔封司馬昭爲大將軍錄尚書事昭入朝謝恩畢自此中外大小事情皆歸於昭卻說西蜀細作哨知此事報入成都薑維奏後主曰司馬師新亡司馬昭初握重權必不敢擅離洛陽臣請乘間伐魏以複中原後主從之遂命薑維興師伐魏維到漢中整頓人馬征西大將軍張翼曰蜀地淺狹錢糧鮮薄不宜遠征不如據險守分恤軍愛民此乃保國之計也維曰不然昔丞相未出茅蘆已定三分天下然且六出祁山以圖中原不幸半途而喪以致功業未成今吾既受丞相遺命當盡忠報國以繼其志雖死而無恨也今魏有隙可乘不就此時伐之更待何時夏侯霸曰將軍之言是也可將輕騎先出枹罕若得洮西南安則諸郡可定張翼曰向者不克而還皆因軍出甚遲也兵法雲攻其無備出其不意今若火速進兵使魏人不能提防必然全勝矣於是薑維引兵五萬望枹罕進發兵至洮水守邊軍士報知雍州刺史王經征西將軍陳泰王經先起馬步兵七萬來迎姜維分付張翼如此如此又分付夏侯霸如此如此二人領計去了維乃自引大軍背洮水列陣王經引數員牙將出而問曰魏與吳蜀已成鼎足之勢汝累次入寇何也維曰司馬師無故廢主鄰邦理宜問罪何況仇敵之國乎經回顧張明花永劉達朱芳四將曰蜀兵背水爲陣敗則皆沒於水矣薑維驍勇汝四將可戰之彼若退動便可追擊四將分左右而出來戰薑維維略戰數合撥回馬望本陣中便走王經大驅士馬一齊趕來維引兵望著洮水而走將次近水大呼將士曰事急矣諸將何不努力衆將一齊奮力殺回魏兵大敗張翼夏侯霸抄在魏兵之後分兩路殺來把魏兵困在垓心維奮武揚威殺入魏軍之中左沖右突魏兵大亂自相踐踏死者大半逼入洮水者無數斬首萬餘壘屍數裏王經引敗兵百騎奮力殺出徑往狄道城而走奔入城中閉門保守姜維大獲全功犒軍已畢便欲進兵攻打狄道城張翼諫曰將軍功績已成威聲大震可以止矣今若前進倘不如意正如畫蛇添足也維曰不然向者兵敗尚欲進取縱橫中原今日洮水一戰魏人膽裂吾料狄道唾手可得汝勿自墮其志也張翼再三勸諫維不從遂勒兵來取狄道城卻說雍州征西將軍陳泰正欲起兵與王經報兵敗之仇忽兗州刺史鄧艾引兵到泰接著禮畢艾曰今奉大將軍之命特來助將軍破敵泰問計于鄧艾艾曰洮水得勝若招羌人之衆東爭關隴傳檄四郡此吾兵之大患也今彼不思如此卻圖狄道城其城垣堅固急切難攻空勞兵費力耳吾今陳兵于項嶺然後進兵擊之蜀兵必敗矣陳泰曰真妙論也遂先撥二十隊兵每隊五十人盡帶旌旗彭角烽火之類日伏夜行去狄道城東南高山深谷之中埋伏只待兵來一齊鳴鼓吹角爲應夜則舉火放炮以驚之調度已畢專候蜀兵到來於是陳泰鄧艾各引二萬兵相繼而進卻說姜維圍住狄道城令兵八面攻之連攻數日不下心中鬱悶無計可施是日黃昏時分忽三五次流星馬報說有兩路兵來旗上明書大字一路是征西將軍陳泰一路是兗州刺史鄧艾維大驚遂請夏侯霸商議霸曰吾向嘗爲將軍言鄧艾自幼深明兵法善曉地理今領兵到頗爲勁敵維曰彼軍遠來我休容他住腳便可擊之乃留張翼攻城命夏侯霸引兵迎陳泰維自引兵來迎鄧艾行不到五裏忽然東南一聲炮響彭角震地火光沖天維縱馬看時只見周圍皆是魏兵旗號維大驚曰中鄧艾之計矣遂傳令教夏侯霸張翼各棄狄道而退於是蜀兵皆退於漢中維自斷後只聽得背後鼓聲不絕維退入劍閣之時方知火鼓二十餘處皆虛設也維收兵退屯于鍾提且說後主因薑維有洮西之功降詔封維爲大將軍維受了職上表謝恩畢再議出師伐魏之策正是成功不必添蛇足討賊猶思奮虎威不知此番北伐如何且看下文分解
