body:
  text: 第一百十一回鄧士載智敗姜伯約諸葛誕義討司馬昭卻說姜維退兵屯于鍾提魏兵屯于狄道城外王經迎接陳泰鄧艾入城拜謝解圍之事設宴相待大賞三軍泰將鄧艾之功申奏魏主曹髦髦封艾爲安西將軍假節領護東羌校尉同陳泰屯兵於雍涼等處鄧艾上表謝恩畢陳泰設席與鄧艾作賀曰薑維夜遁其力已竭不敢再出矣艾笑曰吾料蜀兵必出有五泰問其故艾曰蜀兵雖退終有乘勝之勢吾兵終有弱敗之實其必出一也蜀兵皆是孔明教演精銳之兵容易調遣吾將不時更換軍又訓練不熟其必出二也蜀人多以船行吾軍皆在旱地勞逸不同其必出三也狄道隴西南安祁山四處皆是守戰之地蜀人或聲東擊西指南攻北吾兵必須分頭守把蜀兵合爲一處而來以一分當我四分其必出四也若蜀兵自南安隴西則可取羌人之穀爲食若出祁山則有麥可就食其必出五也陳泰歎服曰公料敵如神蜀兵何足慮哉於是陳泰與鄧艾結爲忘年之交艾遂將雍涼等處之兵每日操練各處隘口皆立營寨以防不測卻說姜維在鍾提大設筵宴會集諸將商議伐魏之事令史樊建諫曰將軍屢出未獲全功今日洮西之捷魏人已服威名何故又欲出也萬一不利前功盡棄維曰汝等只知魏國地寬人廣急不可得卻不知攻魏者有五可勝衆問之維答曰彼洮西一敗挫盡銳氣吾兵雖退不曾損折今若進兵一可勝也吾兵船載而進不致勞困彼兵皆從旱地來迎二可勝也吾兵久經訓練之衆彼皆烏合之徒不曾有法度三可勝也吾兵自出祁山掠抄秋穀爲食四可勝也彼兵須各守備軍力分開吾兵一處而去彼安能救五可勝也不在此時伐魏更待何日耶夏侯霸曰艾年雖幼而機謀深遠近封爲安西將軍之職必於各處準備非同往日矣維厲聲曰吾何畏彼哉公等休長他人銳氣滅自己威風吾意已決必先取隴西衆不敢諫維自領前部令衆將隨後而進於是蜀兵盡離鍾提殺奔祁山來哨馬報說魏兵已先在祁山立下九個寨柵維不信引數騎憑高望之果見祁山九寨勢如長蛇首尾相顧維回顧左右曰夏侯霸之言信不誣矣此寨形勢絕妙止吾師諸葛丞相能之今觀鄧艾所爲不在吾師之下遂回本寨喚諸將曰魏人既有準備必知吾來矣吾料鄧艾必在此間汝等可虛張吾旗號據此穀口下寨每日令百餘騎出哨每出哨一回換一番衣甲旗號按青黃赤白黑五方旗幟相換吾卻提大兵偷出董亭徑襲南安去也遂令鮑素屯兵於祁山谷口維盡率大兵望南安進發卻說鄧艾知蜀兵出祁山早與陳泰下寨準備見蜀兵連日不來搦戰一日五番哨馬出寨或十裏或十五裏而回艾憑高望畢慌入帳與陳泰曰薑維不在此間必取董亭襲南安去了出寨哨馬只是這幾匹更換衣甲往來哨探其馬皆困乏主將必無能者陳將軍可引一軍攻之其寨可破也破了寨柵便引兵襲董亭之路先斷薑維之後吾當先引一軍救南安徑取武城山若先占此山頭薑維必取上邽上邽有一穀名曰段穀地狹山險正好埋伏彼來爭武城山時吾先伏兩軍於段穀破維必矣泰曰吾守隴西二三十年未嘗如此明察地理公之所言真神算也公可速去吾自攻此處寨柵於是鄧艾引軍星夜倍道而行徑到武城山下寨已畢蜀兵未到即令子鄧忠與帳前校尉師篡各引五千兵先去段穀埋伏如此如此而行二人受計而去艾令偃旗息鼓以待蜀兵卻說姜維從董亭望南安而來至武城山前謂夏侯霸曰近南安有一山名武城山若先得了可奪南安之勢只恐鄧艾多謀必先提防正疑慮間忽然山上一聲炮響喊聲大震鼓角齊鳴旌旗遍豎皆是魏兵中央風飄起一黃旗大書鄧艾字樣蜀兵大驚山上數處精兵殺下勢不可當前軍大敗維急率中軍人馬去救時魏兵已退維直來武城山下搦鄧艾戰山上魏兵並不下來維令軍士辱駡至晚方欲退軍山上鼓角齊鳴卻又不見魏兵下來維欲上山衝殺山上炮石甚嚴不能得進守至三更欲回山上鼓角又鳴維移兵下山屯紮比及令軍搬運木石方欲豎立爲寨山上鼓角又鳴魏兵驟至蜀兵大亂自相踐踏退回舊寨次日薑維令軍士運糧草車仗至武城山穿連排定欲立起寨柵以爲屯兵之計是夜二更鄧艾令五百人各執火把分兩路下山放火燒車仗兩兵混殺了一夜營寨又立不成維複引兵退再與夏侯霸商議曰南安未得不如先取上邽上邽乃南安屯糧之所若得上邽南安自危矣遂留霸屯于武城山維盡引精兵猛將徑取上邽行了一宿將及天明見山勢狹峻道路崎嶇乃問向導官曰此處何名答曰段穀維大驚曰其名不美段穀者斷穀也倘有人斷其穀口如之奈何正躊躇未決忽前軍來報山後塵頭大起必有伏兵維急令退兵師篡鄧忠兩軍殺出維且戰且走前面喊聲大震鄧艾引兵殺到三路夾攻蜀兵大敗幸得夏侯霸引兵殺到魏兵方退救了薑維欲再往祁山霸曰祁山寨已被陳泰打破鮑素陣亡全寨人馬皆退回漢中去了維不敢取董亭急投山僻小路而回後面鄧艾急追維令諸軍前進自爲斷後正行之際忽然山中一軍突出乃魏將陳泰也魏兵一聲喊起將薑維困在垓心維人馬困乏左沖右突不能得出蕩寇將軍張嶷聞薑維受困引數百騎殺入重圍維因乘勢殺出嶷被魏兵亂箭射死維得脫重圍複回漢中因感張嶷忠勇歿于王事乃表贈其子孫於是蜀中將士多有陣亡者皆歸罪於薑維維照武侯街亭舊例乃上表自貶爲後將軍行大將軍事卻說鄧艾見蜀兵退盡乃與陳泰設宴相賀大賞三軍泰表鄧艾之功司馬昭遣使持節加艾官爵賜印綬並封其子鄧忠爲亭侯時魏主曹髦改正元三年爲甘露元年司馬昭自爲天下兵馬大都督出入常令三千鐵甲驍將前後簇擁以爲護衛一應事務不奏朝廷就於相府裁處自此常懷篡逆之心有一心腹人姓賈名充字公閭乃故建威將軍賈逵之子爲昭府下長史充語昭曰今主公掌握大柄四方人心必然未安且當暗訪然後徐圖大事昭曰吾正欲如此汝可爲我東行只推慰勞出征軍士爲名以探消息賈充領命徑到淮南入見鎮東大將軍諸葛誕誕字公休乃琅琊南陽人即武侯之族弟也向事于魏因武侯在蜀爲相因此不得重用後武侯身亡誕在魏歷任重職封高平侯總攝兩淮軍馬當日賈充託名勞軍至淮南見諸葛誕誕設宴待之酒至半酣充以言挑誕曰近來洛陽諸賢皆以主上懦弱不堪爲君司馬大將軍三輩輔國功德彌天可以禪代魏統未審鈞意若何誕大怒曰汝乃賈豫州之子世食魏祿安敢出此亂言充謝曰某以他人之言告公耳誕曰朝廷有難吾當以死報之充默然次日辭歸見司馬昭細言其事昭大怒曰鼠輩安敢如此充曰誕在淮南深得人心久必爲患可速除之昭遂暗發密書與揚州刺史樂綝一面遣使齎詔征誕爲司空誕得了詔書已知是賈充告變遂捉來使拷問使者曰此事樂綝知之誕曰他如何得知使者曰司馬將軍已令人到揚州送密書與樂綝矣誕大怒叱左右斬了來使遂起部下兵千人殺奔揚州來將至南門城門已閉吊橋拽起誕在城下叫門城上並無一人回答誕大怒曰樂綝匹夫安敢如此遂令將士打城手下十餘驍騎下馬渡壕飛身上城殺散軍士大開城門於是諸葛誕引兵入城乘風放火殺至綝家綝慌上樓避之誕提劍上樓大喝曰汝父樂進昔日受魏國大恩不思報本反欲順司馬昭耶綝未及回言爲誕所殺一面具表數司馬昭之罪使人申奏洛陽一面大聚兩淮屯田戶口十余萬並揚州新降兵四萬餘人積草屯糧準備進兵又令長史吳綱送子諸葛靚入吳爲質求援務要合兵誅討司馬昭此時東吳丞相孫峻病亡從弟孫綝輔政綝字子通爲人強暴殺大司馬滕胤將軍呂據王惇等因此權柄皆歸於綝吳主孫亮雖然聰明無可奈何於是吳綱將諸葛靚至石頭城入拜孫綝綝問其故綱曰諸葛誕乃蜀漢諸葛武侯之族弟也向事魏國今見司馬昭欺君罔上廢主弄權欲興師討之而力不及故特來歸降誠恐無憑專送親子諸葛靚爲質伏望發兵相助綝從其請便遣大將全懌全端爲主將于詮爲合後朱異唐咨爲先鋒文欽爲向導起兵七萬分三隊而進吳綱回壽春報知諸葛誕誕大喜遂陳兵準備卻說諸葛誕表文到洛陽司馬昭見了大怒欲自往討之賈充諫曰主公乘父兄之基業恩德未及四海今棄天子而去若一朝有變悔之何及不如奏請太后及天子一同出征可保無虞昭喜曰此言正合吾意遂入奏太后曰諸葛誕謀反臣與文武官僚計議停當請太后同天子禦駕親征以繼先帝之遺意太后畏懼只得從之次日昭請魏主曹髦起程髦曰大將軍都督天下軍馬任從調遣何必朕自行也昭曰不然昔日武祖縱橫四海文帝明帝有包括宇宙之志併吞八荒之心凡遇大敵必須自行陛下正宜追配先君掃清故孽何自畏也髦畏威權只得從之昭遂下詔盡起兩都之兵二十六萬命鎮南將軍王基爲正先鋒安東將軍陳騫爲副先鋒監軍石苞爲左軍兗州刺史州泰爲右軍保護車駕浩浩蕩蕩殺奔淮南而來東吳先鋒朱異引兵迎敵兩軍對圓魏軍中王基出馬朱異來迎戰不三合朱異敗走唐咨出馬戰不三合亦大敗而走王基驅兵掩殺吳兵大敗退五十裏下寨報入壽春城中諸葛誕自引本部銳兵會合文欽並二子文鴦文虎雄兵數萬來敵司馬昭正是方見吳兵銳氣墮又看魏將勁兵來未知勝負如何且看下文分解
