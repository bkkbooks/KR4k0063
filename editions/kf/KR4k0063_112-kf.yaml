body:
  text: 第一百十二回救壽春於詮死節取長城伯約鏖兵卻說司馬昭聞諸葛誕會合吳兵前來決戰乃召散騎長史裴秀黃門侍郎鍾會商議破敵之策鍾會曰吳兵之助諸葛誕實爲利也以利誘之則必勝矣昭從其言遂令石苞州泰先引兩軍於石頭城埋伏王基陳騫領精兵在後卻令偏將成倅引兵數萬先去誘敵又令陳俊引車仗牛馬驢騾裝載賞軍之物四面聚集於陣中如敵來則棄之是日諸葛誕令吳將朱異在左文欽在右見魏陣中人馬不整誕乃大驅士馬徑進成倅退走誕驅兵掩殺見牛馬驢騾遍滿郊野南兵爭取無心戀戰忽然一聲炮響兩路兵殺來左有石苞右有州泰誕大驚急欲退時王基陳騫精兵殺到誕兵大敗司馬昭又引兵接應誕引敗兵奔入壽春閉門堅守昭令兵四面圍困並力攻城時吳兵退屯安豐魏主車駕駐于項城鍾會曰今諸葛誕雖敗壽春城中糧草尚多更有吳兵屯安豐以爲掎角之勢今吾兵四面攻圍彼緩則堅守急則死戰吳兵或乘勢夾攻吾軍無益不如三面攻之留南門大路容賊自走走而擊之可全勝也吳兵遠來糧必不繼我引輕騎抄在其後可不戰而自破矣昭撫會背曰君真吾之子房也遂令王基撤退南門之兵卻說吳兵屯于安豐孫綝喚朱異責之曰量一壽春城不能救安可併吞中原如再不勝必斬朱異乃回本寨商議於詮曰今壽春南門不圍某願領一軍從南門入去助諸葛誕守城將軍與魏兵挑戰我卻從城中殺出兩路夾攻魏兵可破矣異然其言於是全懌全端文欽等皆願入城遂同於詮引兵一萬從南門而入城魏兵不得將令未敢輕敵任吳兵入城乃報知司馬昭昭曰此欲與朱異內外夾攻以破我軍也乃召王基陳騫分付曰汝可引五千兵截斷朱異來路從背後擊之二人領命而去朱異正引兵來忽背後喊聲大震左有王基右有陳騫兩路軍殺來吳兵大敗朱異回見孫綝綝大怒曰累敗之將要汝何用叱武士推出斬之又責全端子全禕曰若退不得魏兵汝父子休來見我於是孫綝自回建業去了鍾會與昭曰今孫綝退去外無救兵城可圍矣昭從之遂催軍攻圍全禕引兵欲入壽春見魏兵勢大尋思進退無路遂降司馬昭昭加禕爲偏將軍禕感昭恩德乃修家書與父全端叔全懌言孫綝不仁不若降魏將書射入城中懌得禕書遂與端引數千人開門出降諸葛誕在城中憂悶謀士蔣班焦彜進言曰城中糧少兵多不能久守可率吳楚之衆與魏兵決一死戰誕大怒曰吾欲守汝欲戰莫非有異心乎再言必斬二人仰天長歎曰誕將亡矣我等不如早降免至一死是夜二更時分蔣焦二人逾城降魏司馬昭重用之因此城中雖有敢戰之士不敢言戰誕在城中見魏兵四下築起土城以防淮水只望水泛沖倒土城驅兵擊之不想自秋至冬並無霖雨淮水不泛城中看看糧盡文欽在小城內與二子堅守見軍士漸漸餓倒只得來告誕曰糧皆盡絕軍士餓損不如將北方之兵盡放出城以省其食誕大怒曰汝教我盡去北軍欲謀我耶叱左右推出斬之文鴦文虎見父被殺各拔短刀立殺數十人飛身上城一躍而下越壕赴魏寨投降司馬昭恨文鴦昔日單騎退兵之仇欲斬之鍾會諫曰罪在文欽今文欽已亡二子勢窮來歸若殺降將是堅城內人之心也昭從之遂召文鴦文虎入帳用好言撫慰賜駿馬錦衣加爲偏將軍封關內侯二子拜謝上馬繞城大叫曰我二人蒙大將軍赦罪賜爵汝等何不早降城內人聞言皆計議曰文鴦乃司馬氏仇人尚且重用何況我等乎於是皆欲投降諸葛誕聞之大怒日夜自來巡城以殺爲威鍾會知城中人心已變乃入帳告昭曰可乘此時攻城矣昭大喜遂激三軍四面雲集一齊攻打守將曾宣獻了北門放魏兵入城誕知魏兵已入慌引麾下數百人自城中小路突出至吊橋邊正撞著胡奮手起刀落斬誕于馬下數百人皆被縛王基引兵殺到西門正遇吳將於詮基大喝曰何不早降詮大怒曰受命而出爲人救難既不能救又降他人義所不爲也乃擲盔於地大呼曰人生在世得死於戰場者幸耳急揮刀死戰三十餘合人困馬乏爲亂軍所殺後人有詩贊曰司馬當年圍壽春降兵無數拜車塵東吳雖有英雄士誰及於詮肯殺身司馬昭入壽春將諸葛誕老小盡皆梟首滅其三族武士將所擒諸葛誕部卒數百人縛至昭曰汝等降否衆皆大叫曰願與諸葛公同死決不降汝昭大怒叱武士盡縛於城外逐一問曰降者免死並無一人言降直殺至盡終無一人降者昭深知歎息不已令皆埋之後人有詩贊曰忠臣矢志不偷生諸葛公休帳下兵薤露歌聲應未斷遺蹤直欲繼田橫卻說吳兵大半降魏裴秀告司馬昭曰吳兵老小盡在東南江淮之地今若留之久必爲變不如坑之鍾會曰不然古之用兵者全國爲上戮其元惡而已若盡坑之是不仁也不如放歸江南以顯中國之寬大昭曰此妙論也遂將吳兵盡皆放歸本國唐咨因懼孫綝不敢回國亦來降魏昭皆重用令分佈三河之地淮南已平正欲退兵忽報西蜀薑維引兵來取長城邀截糧草昭大驚慌與多官計議退兵之策時蜀漢延熙二十年改爲景耀元年薑維在漢中選川將兩員每日操練人馬一是蔣舒一是傅僉二人頗有膽勇維甚愛之忽報淮南諸葛誕起兵討司馬昭東吳孫綝助之昭大起兩都之兵將魏太后並魏主一同出征去了維大喜曰吾今番大事濟矣遂表奏後主願興兵伐魏中散大夫譙周聽知歎曰近來朝廷溺于酒色信任中貴黃皓不理國事只圖歡樂伯約累欲征伐不恤軍士國將危矣乃作仇國論一篇寄與薑維維拆封視之論曰或問古往能以弱勝強者其術何如曰處大國無患者恒多慢處小國有憂者恒思善多慢則生亂思善則生治理之常也胡周文養民以少取多句踐恤衆以弱斃強此其術也或曰曩者楚強漢弱約分鴻溝張良以爲民志既定則難動也率兵追羽終斃項氏豈必由文王句踐之事乎曰商周之際王侯世尊君臣久固當此之時雖有漢祖安能仗劍取天下乎及秦罷侯置守之後民疲秦役天下土崩於是豪傑並爭今我與彼皆傳國易世矣既非秦末鼎沸之時實有六國並據之勢故可爲文王難爲漢祖時可而後動數合而後舉故湯武之師不再戰而克誠重民勞而度時審也如遂極武黷征不幸遇難雖有智者不能謀之矣姜維看畢大怒曰此腐儒之論也擲之於地遂提川兵來取中原乃問傅僉曰以公度之可出何地僉曰魏屯糧草皆在長城今可徑取駱谷度沈嶺直到長城先燒糧草然後直取秦川則中原指日可得矣維曰公之見與吾計暗合也即提兵徑取駱谷度沈嶺望長城而來卻說長城鎮守將軍司馬望乃司馬昭之族兄也城內糧草甚多人馬卻少望聽知蜀兵到急與王真李鵬二將引兵離城二十裏下寨次日蜀兵來到望引二將出陣薑維出馬指望而言曰今司馬昭遷主於軍中必有李傕郭汜之意也吾今奉朝廷明命前來問罪汝當早降若還愚迷全家誅戮望大聲而答曰汝等無禮數犯上國如不早退令汝片甲不歸言未畢望背後王真挺槍出馬蜀陣中傅僉出迎戰不十合僉賣個破綻王真便挺槍來刺傅僉閃過活捉真於馬上便回本陣李鵬大怒縱馬輪刀來救僉故意放慢等李鵬將近努力擲真於地暗掣四楞鐵簡在手鵬趕上舉刀待砍傅僉偷身回顧向李鵬面門只一簡打得眼珠迸出死于馬下王真被蜀軍亂槍刺死薑維驅兵大進司馬望棄寨入城閉門不出維下令曰軍士今夜且歇一宿以養銳氣來日須要入城次日平明蜀兵爭先大進一擁至城下用火箭火炮打入城中城上草屋一派燒著魏兵自亂維又令人取乾柴堆滿城下一齊放火烈焰沖天城已將陷魏兵在城內嚎啕痛哭聲聞四野正攻打之間忽然背後喊聲大震維勒馬回看只見魏兵鼓噪搖旗浩浩而來維遂令後隊爲前隊自立於門旗下候之只見魏陣中一小將全裝慣帶挺槍縱馬而出約年二十余歲面如傅粉唇似抹朱厲聲大叫曰認得鄧將軍否維自思曰此必是鄧艾矣挺槍縱馬來迎二人抖擻精神戰到三四十合不分勝負那小將軍槍法無半點放閑維心中自思不用此計安得勝乎便撥馬望左邊山路中而走那小將驟馬追來維挂住了鋼槍暗取雕弓羽箭射之那小將眼乖早已見了弓弦響處把身望前一倒放過羽箭維回頭看時小將已到挺槍來刺維一閃那槍從肋傍邊過被維挾住那小將棄槍望本陣而走維嗟歎曰可惜可惜再撥馬趕來追至陣門前一將提刀而出曰薑維匹夫勿趕吾兒鄧艾在此維大驚原來小將乃艾之子鄧忠也維暗暗稱奇欲戰鄧艾又恐馬乏乃虛指艾曰吾今日識汝父子也各且收兵來日決戰艾見戰場不利亦勒馬應曰既如此各自收兵暗算者非丈夫也於是兩軍皆退鄧艾據渭水下寨薑維跨兩山安營艾見了蜀兵地理乃作書于司馬望曰我等切不可戰只宜固守待關中兵至時蜀兵糧草皆盡三面攻之無不勝也今遣長子鄧忠相助守城一面差人于司馬昭處求救卻說姜維令人于艾寨中下戰書約來日大戰艾佯應之次日五更維令三軍造飯平明布陣等候艾營中偃旗息鼓卻如無人之狀維至晚方回次日又令人下戰書責以失期之罪艾以酒食待使答曰微軀小疾有誤相持明日會戰次日維又引兵到艾仍前不出如此五六番傅僉謂維曰此必有謀也宜防之維曰此必捱關中兵到三面擊我耳吾今令人持書與東吳孫綝使並力攻之忽探馬報說司馬昭攻打壽春殺了諸葛誕吳兵皆降昭班師回洛陽便欲引兵來救長城維大驚曰今番伐魏又成畫餅矣不如且回正是已歎四番難奏績又嗟五度未成功未知如何退兵且看下文分解
