body:
  text: 第一百十七回鄧士載偷度陰平諸葛瞻戰死綿竹卻說輔國大將軍董厥聞魏兵十余路入境乃引二萬兵守住劍閣當日望塵頭大起疑是魏兵急引軍把住關口董厥自臨軍前視之乃姜維廖化張翼也厥大喜接入關上禮畢哭訴後主黃皓之事維曰公勿憂慮若有維在必不容魏來吞蜀也且守劍閣徐圖退敵之計厥曰此關雖然可守爭奈成都無人倘爲敵人所襲大勢瓦解矣維曰成都山險地峻非可易取不必憂也正言間忽報諸葛緒領兵殺至關下維大怒急引五千兵殺下關來直撞入魏陣中左沖右突殺得諸葛緒大敗而走退數十裏下寨魏軍死者無數蜀兵搶了許多馬匹器械維收兵回關卻說鍾會離劍閣二十裏下寨諸葛緒自來伏罪會怒曰吾令汝守把陰平橋頭以斷姜維歸路如何失了今又不得吾令擅自進兵以致此敗緒曰維詭計多端詐取雍州緒恐雍州有失引兵去救維乘機走脫緒因趕至關下不想又爲所敗會大怒叱令斬之監軍衛瓘曰緒雖有罪乃鄧征西所督之人不爭將軍殺之恐傷和氣會曰吾奉天子明詔晉公鈞命特來伐蜀便是鄧艾有罪亦當斬之衆皆力勸會乃將諸葛緒用檻車載赴洛陽任晉公發落隨將緒所領之兵收在部下調遣有人報與鄧艾艾大怒曰吾與汝官品一般吾久鎮邊疆于國多勞汝安敢妄自尊大耶子鄧忠勸曰小不忍則亂大謀父親若與他不睦必誤國家大事望且容忍之艾從其言然畢竟心中懷怒乃引十數騎來見鍾會會聞艾至便問左右艾引多少軍來左右答曰只有十數騎會乃令帳上帳下列武士數百人艾下馬入見會接入帳禮畢艾見軍容甚肅心中不安乃以言挑之曰將軍得了漢中乃朝廷之大幸也可定策早取劍閣會曰將軍明見若何艾再三推稱無能會固問之艾答曰以愚意度之可引一軍從陰平小路出漢中德陽亭用奇兵徑取成都薑維必撤兵來救將軍乘虛就取劍閣可獲全功會大喜曰將軍此計甚妙可即引兵去吾在此專候捷音二人飲酒相別會回本帳與諸將曰人皆謂鄧艾有能今日觀之乃庸才耳衆問其故會曰陰平小路皆高山峻嶺若蜀以百餘人守其險要斷其歸路則鄧艾之兵皆餓死矣吾只以正道而行何愁蜀地不破乎遂置雲梯炮架只打劍閣關卻說鄧艾出轅門上馬回顧從者曰鍾會待吾若何從者曰觀其辭色甚不以將軍之言爲然但以口強應而已艾笑曰彼料我不能取成都我偏欲取之回到本寨師纂鄧忠一班將士接問曰今日與鍾鎮西有何高論艾曰吾以實心告彼彼以庸才視我彼今得漢中以爲莫大之功若非吾屯遝中絆住薑維彼安能成功耶吾今若取了成都勝取漢中矣當夜下令盡拔寨望陰平小路進兵離劍閣七百里下寨有人報鍾會說鄧艾要去取成都了會笑艾不智卻說鄧艾一面修密書遣使馳報司馬昭一面聚諸將於帳下問曰吾今乘虛去取成都與汝等立功名於不朽汝等肯從乎諸將應曰願遵軍令萬死不辭艾乃先令子鄧忠引五千精兵不穿衣甲各執斧鑿器具凡遇峻危之處鑿山開路搭造橋閣以便軍行艾選兵三萬各帶乾糧繩索進發約行百餘裏選下三千兵就彼紮寨又行百餘裏又選三千兵下寨是年十月自陰平進兵至於巔崖峻穀之中凡二十余日行七百餘裏皆是無人之地魏兵沿途下了數寨只剩下二千人馬前至一嶺名摩天嶺馬不堪行艾步行上嶺正與鄧忠與開路壯士盡皆哭泣艾問其故忠告曰此嶺西皆是峻壁巔崖不能開鑿虛廢前勞因此哭泣艾曰吾軍到此已行了七百餘裏過此便是江油豈可複退乃喚諸軍曰不入虎穴焉得虎子吾與汝等來到此地若得成功富貴共之衆皆應曰願從將軍之命艾令先將軍器攛將下去艾取氈自裹其身先滾下去副將有氈衫者裹身滾下無氈衫者各用繩索束腰攀木挂樹魚貫而進鄧艾鄧忠並二千軍及開山壯士皆度了摩天嶺方才整頓衣甲器械而行忽見道傍有一石碣上刻丞相諸葛武侯題其文雲二火初興有人越此二士爭衡不久自死艾觀訖大驚慌忙對碣再拜曰武侯真神人也艾不能以師事之惜哉後人有詩曰踏平峻嶺與天齊玄鶴徘徊尚怯飛鄧艾裹氈從此下誰知諸葛有先機卻說鄧艾暗度陰平引兵行時又見一個大空寨左右告曰聞武侯在日曾撥一千兵守此險隘今蜀主劉禪廢之艾嗟呀不已乃謂衆人曰吾等有來路而無歸路矣前江油城中糧食足備汝等前進可活後退即死須並力攻之衆皆應曰願死戰於是鄧艾步行引二千餘人星夜倍道來搶江油城卻說江油城守將馬邈聞東川已失雖爲準備只是提防大路又仗著姜維全師守住劍閣關遂將軍情不以爲重當日操練人馬回家與妻李氏擁爐飲酒其妻問曰屢聞邊情甚急將軍全無憂色何也邈曰大事自有姜伯約掌握幹我甚事其妻曰雖然如此將軍所守城池不爲不重邈曰天子聽信黃皓溺於酒色吾料禍不遠矣魏兵若到降之爲上何必慮戰其妻大怒唾邈面曰汝爲男子先懷不忠不義之心枉受國家爵祿吾有何面目與汝相見耶馬邈羞慚無語忽家人慌入報曰魏將鄧艾不知從何而來引二千餘人一擁而入城矣邈大驚慌出納降拜伏於公堂之下泣告曰某有心歸降久矣今願招城中居民及本部人馬盡降將軍艾准其降遂收江油軍馬於部下調遣即用馬邈爲向導官忽報馬邈夫人自縊身死艾問其故邈以實告艾感其賢令厚禮葬之親往致祭魏人聞者無不嗟歎後人有詩贊曰後主昏迷漢祚顛天差鄧艾取西川可憐巴蜀多名將不及江油李氏賢鄧艾取了江油遂接陰平小路諸軍皆到江油取齊徑來攻涪城部將田續曰我軍涉險而來甚是營頓且當休養數日然後進兵艾大怒曰兵貴神速汝敢亂我軍心耶喝令左右推出斬之衆將苦告方免艾自驅兵至涪城城內官吏軍民疑從天降盡皆投降蜀人飛報入成都後主聞知慌召黃皓問之皓奏曰此詐傳耳神人必不肯誤陛下也後主又宣師婆問時卻不知何處去了此時遠近告急表文一似雪片往來使者聯絡不絕後主設朝計議多官面面相覷並無一言郤正出班奏曰事已急矣陛下可宣武侯之子商議退兵之策原來武侯之子諸葛瞻字思遠其母黃氏即黃承彥之女也母貌甚陋而有奇才上通天文下察地理凡韜略遁甲諸書無所不曉武侯在南陽時聞其賢求以爲室武侯之學夫人多所贊助焉及武侯死後夫人尋逝臨終遺教惟以忠孝勉其子瞻瞻自幼聰敏尚後主女爲駙馬都尉後襲父武鄉侯之爵景耀四年遷行軍護衛將軍時爲黃皓用事故託病不出當下後主從郤正之言即時連發三詔召瞻至殿下後主泣訴曰鄧艾兵已屯涪城成都危矣卿看先君之面救朕之命瞻亦泣奏曰臣父子蒙先帝厚恩陛下殊遇雖肝腦塗地不能補報願陛下盡發成都之兵與臣領去決一死戰後主即撥成都兵將七萬與瞻瞻辭了後主整頓軍馬聚集諸將問曰誰敢爲先鋒言未訖一少年將出曰父親既掌大權兒願爲先鋒衆視之乃瞻長子諸葛尚也尚時年一十九歲博覽兵書多習武藝瞻大喜遂命尚爲先鋒是日大軍離了成都來迎魏兵卻說鄧艾得馬邈獻地理圖一本備寫涪城至成都三百六十裏山川道路闊狹險峻一一分明艾看畢大驚曰若只守涪城倘被蜀人據住前山何能成功耶如遷延日久薑維兵到我軍危矣速喚師纂並子鄧忠分付曰汝等可引一軍星夜徑去綿竹以拒蜀兵吾隨後便至切不可怠緩若縱他先據了險要決斬汝首師鄧二人引兵將至綿竹早遇蜀兵兩軍各布成陣師鄧二人勒馬於門旗下只見蜀兵列成八陣三冬鼓罷門旗兩分數十員將簇擁一輛四輪車車上端坐一人綸巾羽扇鶴氅方裾車傍展開一面黃旗上書漢丞相諸葛武侯唬得師鄧二人汗流遍身回顧軍士曰原來孔明尚在我等休矣急勒兵回時蜀兵掩殺將來魏兵大敗而走蜀兵掩殺二十余裏遇見鄧艾援兵接應兩家各自收兵艾升帳而坐喚師纂鄧忠責之曰汝二人不戰而退何也忠曰但見蜀陣中諸葛孔明領兵因此奔還艾怒曰縱使孔明更生我何懼戰汝等輕退以致於敗宜速斬以正軍法衆皆苦勸艾方息怒令人哨探回說孔明之子諸葛瞻爲大將瞻之子諸葛尚爲先鋒車上坐者乃木刻孔明遺像也艾聞之謂師纂鄧忠曰成敗之機在此一舉汝二人再不取勝必當斬首師鄧二人又引一萬兵來戰諸葛尚匹馬單槍抖擻精神戰退二人諸葛瞻指揮兩掖兵沖出直撞入魏陣中左沖右突往來殺有數十番魏兵大敗死者不計其數師纂鄧忠中傷而逃瞻驅士馬隨後掩殺二十餘裏紮營相拒師纂鄧忠回見鄧艾艾見二人俱傷未便加責乃與衆將商議曰蜀有諸葛瞻善繼父志兩番殺吾萬餘人馬今若不速破後必爲禍監軍丘本曰何不作一書以誘之艾從其言遂作書一封遣使送入蜀寨守門將引至帳下呈上其書瞻拆封視之書曰征西將軍鄧艾致書於行軍護衛將軍諸葛思遠麾下切觀近代賢才未有如公之尊父也昔自出茅廬一言已分三國掃平荊益遂成霸業古今鮮有及者後六出祁山非其智力不足乃天數耳今後主昏弱王氣已終艾奉天子之命以重兵伐蜀已皆得其地矣成都危在旦夕公何不應天順人仗義來歸艾當表公爲琅琊王以光耀祖宗決不虛言幸存照鑒瞻看畢勃然大怒扯碎其書叱武士立斬來使令從者持首級回魏營見鄧艾艾大怒即欲出戰丘本諫曰將軍不可輕出當用奇兵勝之艾從其言遂令天水太守王頎隴西太守牽弘伏兩軍于後艾自引兵而來此時諸葛瞻正欲搦戰忽報鄧艾自引兵到瞻大怒即引兵出徑殺入魏陣中鄧艾敗走瞻隨後掩殺將來忽然兩下伏兵殺出蜀兵大敗退入綿竹艾令圍之於是魏兵一齊呐喊將綿竹圍的鐵桶相似諸葛瞻在城中見事勢已迫乃令彭和齎書殺出往東吳求救和至東吳見了吳主孫休呈上告急之書吳主看罷與群臣計議曰既蜀中危急孤豈可坐視不救即令老將丁奉爲主帥丁封孫異爲副將率兵五萬前往救蜀丁奉領旨出師分撥丁封孫異引兵二萬向沔中而進自率兵三萬向壽春而進分兵三路來援卻說諸葛瞻見救兵不至謂衆將曰久守非良圖遂留子尚與尚書張遵守城瞻自披挂上馬引三軍大開三門殺出鄧艾見兵出便撤兵退瞻奮力追殺忽然一聲炮響四面兵合把瞻困在垓心瞻引兵左沖右突殺死數百人艾令衆放箭射之蜀兵四散瞻中箭落馬乃大呼曰吾力竭矣當以一死報國遂拔劍自刎而死其子諸葛尚在城上見父死於軍中勃然大怒遂披挂上馬張遵諫曰小將軍勿得輕出尚歎曰吾父子祖孫荷國厚恩今父既死于敵我何用生爲遂策馬殺出死於陣中後人有詩贊瞻尚父子曰不是忠臣獨少謀蒼天有意絕炎劉當年諸葛留嘉胤節義真堪繼武侯鄧艾憐其忠將父子合葬乘虛攻打綿竹張遵黃崇李球三人各引一軍殺出蜀兵寡魏兵衆三人亦皆戰死艾因此得了綿竹勞軍已畢遂來取成都正是試觀後主臨危日無異劉璋受逼時未知成都如何守禦且看下文分解
