body:
  text: 第一百十八回哭祖廟一王死孝入西川二士爭功卻說後主在成都聞鄧艾取了綿竹諸葛瞻父子已亡大驚急召文武商議近臣奏曰城外百姓扶老攜幼哭聲大震各逃生命後主驚惶無措忽哨馬報到說魏兵將近城下多官議曰兵微將寡難以迎敵不如早棄成都奔南中七郡其地險峻可以自守就借蠻兵再來克復未遲光祿大夫譙周曰不可南蠻久反之人平昔無惠今若投之必遭大禍多官又奏曰蜀吳既同盟今事急矣可以投之周又諫曰自古以來無寄他國爲天子者臣料魏能吞吳吳不能吞魏若稱臣于吳是一辱也若吳被魏所吞陛下再稱臣于魏是兩番之辱矣不如不投吳而降魏魏必裂土以封陛下則上能自守宗廟下可以保安黎民願陛下思之後主未決退入宮中次日衆議紛然譙周見事急複上疏諍之後主從譙周之言正欲出降忽屏風後轉出一人厲聲而罵周曰偷生腐儒豈可妄議社稷大事自古安有降天子哉後主視之乃第五子北地王劉諶也後主生七子長子劉璿次子劉瑤三子劉琮四子劉瓚五子即北地王劉諶六子劉恂七子劉璩七子中惟諶自幼聰明英敏過人餘皆懦善後主謂諶曰今大臣皆議當降汝獨仗血氣之勇欲令滿城流血耶諶曰昔先帝在日譙周未嘗干預國政今妄議大事輒起亂言甚非理也臣切料成都之兵尚有數萬姜維全師皆在劍閣若知魏兵犯闕必來救應內外攻擊可獲大功豈可聽腐儒之言輕廢先帝之基業乎後主叱之曰汝小兒豈識天時諶叩頭哭曰若勢窮力極禍敗將及便當父子君臣背城一戰同死社稷以見先帝可也奈何降乎後主不聽諶放聲大哭曰先帝非容易創立基業今一旦棄之吾寧死不辱也後主令近臣推出宮門遂令譙周作降書遣私署侍中張紹駙馬都尉鄧良同譙周齎玉璽來雒城請降時鄧艾每日令數百鐵騎來成都哨探當日見立了降旗艾大喜不一時張紹等至艾令人迎入三人拜伏於階下呈上降款玉璽艾拆降書視之大喜受下玉璽重待張紹譙周鄧良等艾作回書付三人齎回成都以安人心三人拜辭鄧艾徑還成都入見後主呈上回書細言鄧艾相待之善後主拆封視之大喜即遣太仆蔣顯齎敕令薑維早降遣尚書郎李虎送文簿與艾共戶二十八萬男女九十四萬帶甲將士十萬二千官吏四萬倉糧四十余萬金銀各二千斤錦綺彩絹各二十萬匹餘物在庫不及具數擇十二月初一日君臣出降北地王劉諶聞知怒氣衝天乃帶劍入宮其妻崔夫人問曰大王今日顔色異常何也諶曰魏兵將近父皇已納降款明日君臣出降社稷從此殄滅吾欲先死以見先帝于地下不屈膝於他人也崔夫人曰賢哉賢哉得其死矣妾請先死王死未遲諶曰汝何死耶崔夫人曰王死父妾死夫其義同也夫亡妻死何必問焉言訖觸柱而死諶乃自殺其三子並割妻頭提至昭烈廟中伏地哭曰臣羞見基業棄於他人故先殺妻子以絕挂念後將一命報祖祖如有靈知孫之心大哭一場眼中流血自刎而死蜀人聞知無不哀痛後人有詩贊曰君臣甘屈膝一子獨悲傷去矣西川事雄哉北地王捐身酬烈祖搔首泣穹蒼凜凜人如在誰雲漢已亡後主聽知北地王自刎乃令人葬之次日魏兵大至後主率太子諸王及群臣六十餘人面縛輿櫬出北門十裏而降鄧艾扶起後主親解其縛焚其輿櫬並車入城後人有詩歎曰魏兵數萬入川來後主偷生失自裁黃皓終存欺國意薑維空負濟時才全忠義士心何烈守節王孫志可哀昭烈經營良不易一朝功業頓成灰於是成都之人皆具香花迎接艾拜後主爲驃騎將軍其余文武各隨高下拜官請後主還宮出榜安民交割倉庫又令太常張峻益州別駕張紹招安各郡軍民又令人說薑維歸降一面遣人赴洛陽報捷艾聞黃皓奸險欲斬之皓用金寶賂其左右因此得免自是漢亡後人因漢之亡有追思武侯詩曰魚鳥猶疑畏簡書風雲長爲護儲胥徒令上將揮神筆終見降王走傳車管樂有才真不忝關張無命欲何如他年錦裏經祠廟梁父吟成恨有餘且說太仆蔣顯到劍閣入見薑維傳後主敕命言歸降之事維大驚失語帳下衆將聽知一齊怨恨咬牙怒目鬚髮倒豎拔刀砍石大呼曰吾等死戰何故先降耶號哭之聲聞數十裏維見人心思漢乃以善言撫之曰衆將勿憂吾有一計可複漢室衆皆求問姜維與諸將附耳低言說了計策即于劍閣關遍豎降旗先令人報入鍾會寨中說薑維引張翼廖化董厥等來降會大喜令人迎接維入帳會曰伯約來何遲也維正色流涕曰國家全軍在吾今日至此猶爲速也會甚奇之下座相拜待爲上賓維說會曰聞將軍自淮南以來算無遺策司馬氏之盛皆將軍之力維故甘心俯首如鄧士載當與決一死戰安肯降之乎會遂折箭爲誓與維結爲兄弟情愛甚密仍令照舊領兵維暗喜遂令蔣顯回成都去了卻說鄧艾封師纂爲益州刺史牽弘王頎等各領州郡又於綿竹築台以彰戰功大會蜀中諸官飲宴艾酒至半酣乃指衆官曰汝等幸遇我故有今日耳若遇他將必皆殄滅矣多官起身拜謝忽蔣顯至說薑維自降鍾鎮西了艾因此痛恨鍾會遂修書令人齎赴洛陽致晉公司馬昭昭得書視之書曰臣艾切謂兵有先聲而後實者今因平蜀之勢以乘吳此席卷之時也然大舉之後將士疲勞不可便用宜留隴右兵二萬蜀兵二萬煮鹽興冶並造舟船預備順流之計然後發使告以利害吳可不征而定也今宜厚待劉禪以致孫休若便送禪來京吳人必疑則于向化之心不勸且權留之於蜀須來年冬月抵京今即可封禪爲扶風王錫以資財供其左右爵其子爲公侯以顯歸命之寵則吳人畏威懷德望風而從矣司馬昭覽畢深疑鄧艾有自專之心乃先發手書與衛瓘隨後降封艾詔曰征西將軍鄧艾耀威奮武深入敵境使僭號之主系頸歸降兵不逾時戰不終日雲徹席捲蕩定巴蜀雖白起破強楚韓信克勁趙不足比勳也其以艾爲太尉增邑二萬戶封二子爲亭侯各食邑千戶鄧艾受詔畢監軍衛瓘取出司馬昭手書與艾書中說鄧艾所言之事須侯奏報不可輒行艾曰將在外君命有所不受吾既奉詔專征如何阻當遂又作書令來使齎赴洛陽時朝中皆言鄧艾必有反意司馬昭愈加疑忌忽使命回呈上鄧艾之書昭拆封視之書曰艾銜命西征元惡既服當權宜行事以安初附若待國命則往復道途延引日月春秋之義大夫出疆有可以安社稷利國家專之可也今吳未賓勢與蜀連不可拘常以失事機兵法進不求名退不避罪艾雖無古人之節終不自嫌以損于國也先此申狀見可施行司馬昭看畢大驚忙與賈充計議曰鄧艾恃功而驕任意行事反形露矣如之奈何賈充曰主公何不封鍾會以制之昭從其議遣使齎詔封會爲司徒就令衛瓘監督兩路軍馬以手書付瓘使與會伺察鄧艾以防其變會接讀詔書詔曰鎮西將軍鍾會所向無敵前無強梁節制衆城網羅迸逸蜀之豪帥面縛歸命謀無遺策舉無廢功其以會爲司徒進封縣侯增邑萬戶封子二人亭侯邑各千戶鍾會既受封即請薑維計議曰鄧艾功在吾之上又封太尉之職今司馬公疑艾有反志故令衛瓘爲監軍詔吾制之伯約有何高見維曰愚聞鄧艾出身微賤幼爲農家養犢今僥倖自陰平斜徑攀木懸崖成此大功非出良謀實賴國家洪福耳若非將軍與維相拒於劍閣艾安能成此功耶今欲封蜀主爲扶風王乃大結蜀人之心其反情不言可見矣晉公疑之是也會深喜其言維又曰請退左右維有一事密告會令左右盡退維袖中取一圖與會曰昔日武侯出草廬時以此圖獻先帝且曰益州之地沃野千里民殷國富可爲霸業先帝因此遂創成都今鄧艾至此安得不狂會大喜指問山川形勢維一一言之會又問曰當以何策除艾維曰乘晉公疑忌之際當急上表言艾反狀晉公必令將軍討之一舉而可擒矣會依言即遣人齎表進赴洛陽言鄧艾專權恣肆結好蜀人早晚必反矣於是朝中文武皆驚會又令人於中途截了鄧艾表文按艾筆法改寫傲慢之辭以實己之語司馬昭見了鄧艾表章大怒即遣人到鍾會軍前令會收艾又遣賈充引三萬兵入斜穀昭乃同魏主曹奐禦駕親征西曹掾邵悌諫曰鍾會之兵多艾六倍當令會收艾足矣何必明公自行耶昭笑曰汝忘了舊日之言耶汝曾道會後必反吾今此行非爲艾實爲會耳悌笑曰某恐明公忘之故以相問今既有此意切宜秘之不可泄漏昭然其言遂提大兵起程時賈充亦疑鍾會有變密告司馬昭昭曰如遣汝亦疑汝耶吾到長安自有明白早有細作報知鍾會說昭已至長安會慌請薑維商議收艾之策正是才看西蜀收降將又見長安動大兵不知姜維以何策破艾且看下文分解
